version: '3.8'

services:
  # PostgreSQL Projector - Structured queries
  postgresql-projector:
    build:
      context: .
      dockerfile: module8-postgresql-projector/Dockerfile
    container_name: module8-postgresql-projector
    ports:
      - "8050:8050"
    environment:
      # Kafka configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # PostgreSQL configuration
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-module8_clinical}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Processing configuration
      BATCH_SIZE: 50
      FLUSH_INTERVAL: 10
    networks:
      - module8-network
    depends_on:
      - postgres
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MongoDB Projector - Document storage
  mongodb-projector:
    build:
      context: .
      dockerfile: module8-mongodb-projector/Dockerfile
    container_name: module8-mongodb-projector
    ports:
      - "8051:8051"
    environment:
      # Kafka configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # MongoDB configuration
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DATABASE: module8_clinical
      # Processing configuration
      BATCH_SIZE: 100
      FLUSH_TIMEOUT: 5
    networks:
      - module8-network
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Elasticsearch Projector - Search and analytics
  elasticsearch-projector:
    build:
      context: .
      dockerfile: module8-elasticsearch-projector/Dockerfile
    container_name: module8-elasticsearch-projector
    ports:
      - "8052:8052"
    environment:
      # Kafka configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # Elasticsearch configuration
      ELASTICSEARCH_URL: http://elasticsearch:9200
      # Processing configuration
      BATCH_SIZE: 100
      FLUSH_TIMEOUT: 5
    networks:
      - module8-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ClickHouse Projector - Analytics and time-series
  clickhouse-projector:
    build:
      context: .
      dockerfile: module8-clickhouse-projector/Dockerfile
    container_name: module8-clickhouse-projector
    ports:
      - "8053:8053"
    environment:
      # Kafka configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # ClickHouse configuration
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: module8_analytics
      CLICKHOUSE_USER: module8_user
      CLICKHOUSE_PASSWORD: module8_password
      # Processing configuration
      BATCH_SIZE: 500
      FLUSH_INTERVAL: 5
    networks:
      - module8-network
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL database (if not already running)
  postgres:
    image: postgres:15-alpine
    container_name: module8-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: module8_clinical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - module8-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  module8-network:
    external: true

volumes:
  postgres_data:
    name: module8-postgres-data
    driver: local
