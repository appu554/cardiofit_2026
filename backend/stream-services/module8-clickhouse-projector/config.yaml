# ClickHouse Projector Configuration

kafka:
  bootstrap_servers: "localhost:9092"
  topic: "prod.ehr.events.enriched"  # Used by projector, not passed to KafkaConsumer
  group_id: "module8-clickhouse-projector-v1"
  auto_offset_reset: "latest"
  enable_auto_commit: false
  max_poll_records: 500  # Larger batches for analytics
  max_poll_interval_ms: 300000  # 5 minutes

clickhouse:
  host: "localhost"
  port: 9000  # Native protocol port
  database: "module8_analytics"
  user: "module8_user"
  password: "module8_password"

batch:
  size: 500  # Larger for analytics workloads
  timeout: 30  # 30 seconds for batching

service:
  name: "module8-clickhouse-projector"
  version: "1.0.0"
  port: 8053
