# Wave 2.7 SKELETON — placeholder Kafka Streams config.
# Real values (Confluent Cloud bootstrap, SASL creds, schema-registry URL,
# state-store dir, num.stream.threads) are V1 work.

application.id=substrate-pipeline
bootstrap.servers=PLACEHOLDER:9092

# TODO(wave-2.7-runtime): SASL_SSL config for Confluent Cloud, mirror
# stage1-validator-enricher's settings.
# security.protocol=SASL_SSL
# sasl.mechanism=PLAIN
# sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="..." password="...";

# Default serdes — V1 will switch to Avro + schema registry.
default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde

# Operational defaults — tune in V1 load test.
num.stream.threads=2
processing.guarantee=at_least_once
commit.interval.ms=1000

# kb-20 REST endpoint that SubstrateWriterProcessor will POST to (V1 wiring).
kb20.base.url=http://kb-20-patient-profile:8131
