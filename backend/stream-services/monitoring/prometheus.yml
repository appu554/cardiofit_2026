# Prometheus Configuration for Module 8 Storage Projectors
# Scrape metrics from all 8 projector services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'module8-projectors'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'localhost:9093'

# Load alerting rules
rule_files:
  - 'alerts-module8.yml'

# Scrape configurations
scrape_configs:
  # Module 8 Storage Projectors
  - job_name: 'module8-projectors'
    static_configs:
      - targets:
        - 'postgresql-projector:8050'
        - 'mongodb-projector:8051'
        - 'elasticsearch-projector:8052'
        - 'clickhouse-projector:8053'
        - 'influxdb-projector:8054'
        - 'ups-projector:8055'
        - 'fhir-store-projector:8056'
        - 'neo4j-graph-projector:8057'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    metric_relabel_configs:
      # Add projector label from instance
      - source_labels: [__address__]
        regex: '(.*)-projector:.*'
        target_label: projector
        replacement: '$1'

  # Kafka metrics (if JMX exporter is configured)
  - job_name: 'kafka'
    static_configs:
      - targets:
        - 'localhost:7071'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL metrics
  - job_name: 'postgresql'
    static_configs:
      - targets:
        - 'localhost:9187'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # MongoDB metrics
  - job_name: 'mongodb'
    static_configs:
      - targets:
        - 'localhost:9216'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Elasticsearch metrics
  - job_name: 'elasticsearch'
    static_configs:
      - targets:
        - 'localhost:9114'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # ClickHouse metrics
  - job_name: 'clickhouse'
    static_configs:
      - targets:
        - 'localhost:9363'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # InfluxDB metrics
  - job_name: 'influxdb'
    static_configs:
      - targets:
        - 'localhost:8086'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Neo4j metrics
  - job_name: 'neo4j'
    static_configs:
      - targets:
        - 'localhost:2004'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Node exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets:
        - 'localhost:9100'
    metrics_path: '/metrics'
    scrape_interval: 30s
