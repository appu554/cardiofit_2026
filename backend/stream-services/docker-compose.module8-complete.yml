version: '3.8'

# Module 8 Complete Storage Projectors Orchestration
# All 8 projectors with database dependencies

services:
  # ========================================
  # PROJECTOR SERVICES (8 total)
  # ========================================

  # 1. PostgreSQL Projector - Structured queries and analytics
  postgresql-projector:
    build:
      context: .
      dockerfile: module8-postgresql-projector/Dockerfile
    container_name: module8-postgresql-projector
    ports:
      - "8050:8050"
    environment:
      # Kafka Configuration (Confluent Cloud)
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # PostgreSQL Configuration (external container a2f55d83b1fa)
      POSTGRES_HOST: ${POSTGRES_HOST:-172.21.0.4}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-cardiofit_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-cardiofit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Processing Configuration
      BATCH_SIZE: 50
      FLUSH_INTERVAL: 10
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./module8-shared:/app/module8-shared:ro
    networks:
      - module8-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. MongoDB Projector - Document storage and flexible schemas
  mongodb-projector:
    build:
      context: .
      dockerfile: module8-mongodb-projector/Dockerfile
    container_name: module8-mongodb-projector
    ports:
      - "8051:8051"
    environment:
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # MongoDB Configuration
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongodb:27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-module8_clinical}
      # Processing Configuration
      BATCH_SIZE: 100
      FLUSH_TIMEOUT: 5
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./module8-shared:/app/module8-shared:ro
    networks:
      - module8-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8051/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. Elasticsearch Projector - Full-text search and analytics
  elasticsearch-projector:
    build:
      context: .
      dockerfile: module8-elasticsearch-projector/Dockerfile
    container_name: module8-elasticsearch-projector
    ports:
      - "8052:8052"
    environment:
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # Elasticsearch Configuration
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      # Processing Configuration
      BATCH_SIZE: 100
      FLUSH_TIMEOUT: 5
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./module8-shared:/app/module8-shared:ro
    networks:
      - module8-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8052/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 4. ClickHouse Projector - High-performance analytics and time-series
  clickhouse-projector:
    build:
      context: .
      dockerfile: module8-clickhouse-projector/Dockerfile
    container_name: module8-clickhouse-projector
    ports:
      - "8053:8053"
    environment:
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # ClickHouse Configuration
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-module8_analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-module8_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-module8_password}
      # Processing Configuration
      BATCH_SIZE: 500
      FLUSH_INTERVAL: 5
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./module8-shared:/app/module8-shared:ro
    networks:
      - module8-network
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8053/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 5. InfluxDB Projector - Time-series metrics and device data
  influxdb-projector:
    build:
      context: .
      dockerfile: module8-influxdb-projector/Dockerfile
    container_name: module8-influxdb-projector
    ports:
      - "8054:8054"
    environment:
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # InfluxDB Configuration (external container 8502fd5d078d)
      INFLUXDB_URL: ${INFLUXDB_URL:-http://172.21.0.3:8086}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-cardiofit}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-clinical_metrics}
      # Processing Configuration
      BATCH_SIZE: 100
      FLUSH_INTERVAL: 5
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./module8-shared:/app/module8-shared:ro
    networks:
      - module8-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8054/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 6. UPS Projector - Universal Persistence Service
  ups-projector:
    build:
      context: .
      dockerfile: module8-ups-projector/Dockerfile
    container_name: module8-ups-projector
    ports:
      - "8055:8055"
    environment:
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # PostgreSQL Configuration (same as projector #1)
      POSTGRES_HOST: ${POSTGRES_HOST:-172.21.0.4}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-cardiofit_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-cardiofit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Processing Configuration
      BATCH_SIZE: 50
      FLUSH_INTERVAL: 10
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./module8-shared:/app/module8-shared:ro
    networks:
      - module8-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8055/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 7. FHIR Store Projector - Google Healthcare API integration
  fhir-store-projector:
    build:
      context: .
      dockerfile: module8-fhir-store-projector/Dockerfile
    container_name: module8-fhir-store-projector
    ports:
      - "8056:8056"
    environment:
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # Google FHIR Store Configuration
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID}
      GOOGLE_LOCATION: ${GOOGLE_LOCATION:-us-central1}
      GOOGLE_DATASET_ID: ${GOOGLE_DATASET_ID:-cardiofit_fhir_dataset}
      GOOGLE_FHIR_STORE_ID: ${GOOGLE_FHIR_STORE_ID:-cardiofit_fhir_store}
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/google-credentials.json
      # Processing Configuration
      BATCH_SIZE: 50
      FLUSH_INTERVAL: 10
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./module8-shared:/app/module8-shared:ro
      - ${GOOGLE_CREDENTIALS_PATH}:/app/credentials/google-credentials.json:ro
    networks:
      - module8-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8056/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 8. Neo4j Graph Projector - Clinical knowledge graph
  neo4j-graph-projector:
    build:
      context: .
      dockerfile: module8-neo4j-graph-projector/Dockerfile
    container_name: module8-neo4j-graph-projector
    ports:
      - "8057:8057"
    environment:
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      # Neo4j Configuration (external container e8b3df4d8a02)
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-cardiofit}
      # Processing Configuration
      BATCH_SIZE: 100
      FLUSH_INTERVAL: 10
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./module8-shared:/app/module8-shared:ro
    networks:
      - module8-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8057/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # INFRASTRUCTURE SERVICES
  # ========================================

  # MongoDB - Document storage
  mongodb:
    image: mongo:7
    container_name: module8-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: module8_clinical
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - module8-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Elasticsearch - Search and analytics
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: module8-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - cluster.name=module8-clinical-cluster
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - bootstrap.memory_lock=true
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - module8-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ClickHouse - Analytics and time-series
  clickhouse:
    image: clickhouse/clickhouse-server:23.11
    container_name: module8-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: module8_analytics
      CLICKHOUSE_USER: module8_user
      CLICKHOUSE_PASSWORD: module8_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - module8-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - Caching and real-time data
  redis:
    image: redis:7-alpine
    container_name: module8-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - module8-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  module8-network:
    name: module8-network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

volumes:
  mongodb_data:
    name: module8-mongodb-data
  mongodb_config:
    name: module8-mongodb-config
  elasticsearch_data:
    name: module8-elasticsearch-data
  clickhouse_data:
    name: module8-clickhouse-data
  redis_data:
    name: module8-redis-data
