version: '3.8'

services:
  global-outbox-service-rust:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: global-outbox-service-rust
    ports:
      - "8043:8043"  # HTTP API
      - "50053:50053"  # gRPC API
    environment:
      - OUTBOX_PROJECT_NAME=Global Outbox Service Rust
      - OUTBOX_VERSION=1.0.0
      - OUTBOX_ENVIRONMENT=production
      - OUTBOX_HOST=0.0.0.0
      - OUTBOX_PORT=8043
      - OUTBOX_GRPC_PORT=50053
      - OUTBOX_LOG_LEVEL=INFO
      - OUTBOX_DEBUG=false
      
      # Database Configuration (using existing Supabase)
      - OUTBOX_DATABASE_URL=postgresql://postgres.auugxeqzgrnknklgwqrh:9FTqQnA4LRCsu8sw@aws-0-ap-south-1.pooler.supabase.com:5432/postgres
      - OUTBOX_DATABASE_POOL_SIZE=20
      - OUTBOX_DATABASE_MAX_OVERFLOW=30
      - OUTBOX_DATABASE_POOL_TIMEOUT=30
      
      # Kafka Configuration (using existing Confluent Cloud)
      - OUTBOX_KAFKA_BOOTSTRAP_SERVERS=pkc-619z3.us-east1.gcp.confluent.cloud:9092
      - OUTBOX_KAFKA_API_KEY=LGJ3AQ2L6VRPW4S2
      - OUTBOX_KAFKA_API_SECRET=2hYzQLmG1XGyQ9oLZcjwAIBdAZUS6N4JoWD8oZQhk0qVBmmyVVHU7TqoLjYef0kl
      - OUTBOX_KAFKA_SECURITY_PROTOCOL=SASL_SSL
      - OUTBOX_KAFKA_SASL_MECHANISM=PLAIN
      
      # Publisher Configuration
      - OUTBOX_PUBLISHER_ENABLED=true
      - OUTBOX_PUBLISHER_POLL_INTERVAL_SECS=2
      - OUTBOX_PUBLISHER_BATCH_SIZE=100
      - OUTBOX_PUBLISHER_MAX_WORKERS=4
      
      # Medical Circuit Breaker
      - OUTBOX_MEDICAL_CIRCUIT_BREAKER_ENABLED=true
      - OUTBOX_MEDICAL_CIRCUIT_BREAKER_MAX_QUEUE_DEPTH=1000
      - OUTBOX_MEDICAL_CIRCUIT_BREAKER_CRITICAL_THRESHOLD=0.8
      - OUTBOX_MEDICAL_CIRCUIT_BREAKER_RECOVERY_TIMEOUT_SECS=30
      
      # Monitoring
      - OUTBOX_ENABLE_METRICS=true
      - OUTBOX_METRICS_PORT=8044
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8043/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    networks:
      - outbox-network
    
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

networks:
  outbox-network:
    driver: bridge