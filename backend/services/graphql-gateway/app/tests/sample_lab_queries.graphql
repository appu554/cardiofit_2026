# Query to get all lab results for a patient
query GetPatientLabResults($patientId: String!) {
  patientLabResults(patientId: $patientId) {
    id
    resourceType
    status
    category {
      coding {
        system
        code
        display
      }
      text
    }
    code {
      coding {
        system
        code
        display
      }
      text
    }
    subject {
      reference
    }
    effectiveDateTime
    valueQuantity {
      value
      unit
      system
      code
    }
    valueString
    interpretation {
      coding {
        system
        code
        display
      }
      text
    }
  }
}

# Query to get specific lab results for a patient by code
query GetPatientLabResultsByCode($patientId: String!, $code: String!) {
  patientLabResults(patientId: $patientId, code: $code) {
    id
    resourceType
    status
    code {
      coding {
        system
        code
        display
      }
      text
    }
    effectiveDateTime
    valueQuantity {
      value
      unit
    }
    interpretation {
      coding {
        system
        code
        display
      }
      text
    }
  }
}

