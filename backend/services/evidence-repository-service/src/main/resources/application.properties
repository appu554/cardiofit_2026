# Evidence Repository Service Configuration

# Server Configuration
server.port=8015
spring.application.name=evidence-repository-service

# PubMed API Configuration
# Register for free API key at: https://www.ncbi.nlm.nih.gov/account/
# With API key: 10 requests/second
# Without API key: 3 requests/second
# Priority: Environment variable PUBMED_API_KEY > fallback value below
pubmed.api.key=${PUBMED_API_KEY:3ddce7afddefb52bd45a79f3a4416dabaf0a}

# Logging Configuration
logging.level.root=INFO
logging.level.com.cardiofit.evidence=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Logging File (optional)
# logging.file.name=logs/evidence-repository.log
# logging.file.max-size=10MB
# logging.file.max-history=30

# Actuator Configuration (Health Checks, Metrics)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Application Info (displayed at /actuator/info)
info.app.name=Evidence Repository Service
info.app.description=Medical literature citation management with PubMed integration
info.app.version=1.0.0
info.app.phase=Phase 7 - Evidence Repository

# JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# HTTP Encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# Scheduler Configuration
# Scheduled tasks are defined in EvidenceUpdateService with cron expressions:
# - Daily retraction check: 2 AM (cron: 0 0 2 * * *)
# - Monthly evidence search: 3 AM on 1st (cron: 0 0 3 1 * *)
# - Quarterly verification: 4 AM on 1st of quarter (cron: 0 0 4 1 */3 *)
spring.task.scheduling.pool.size=3

# Development Mode
# spring.devtools.restart.enabled=true
# spring.devtools.livereload.enabled=true

# API Documentation (Springdoc OpenAPI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.packages-to-scan=com.cardiofit.evidence

# CORS Configuration (if needed for frontend integration)
# spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200
# spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH
# spring.web.cors.allowed-headers=*
