syntax = "proto3";

package notification;

option go_package = "github.com/cardiofit/notification-service/pkg/proto";

import "google/protobuf/timestamp.proto";

// NotificationService provides notification delivery and management
service NotificationService {
  // SendNotification manually triggers a notification
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);

  // GetDeliveryStatus retrieves the delivery status of a notification
  rpc GetDeliveryStatus(GetDeliveryStatusRequest) returns (GetDeliveryStatusResponse);

  // AcknowledgeAlert marks an alert as acknowledged
  rpc AcknowledgeAlert(AcknowledgeAlertRequest) returns (AcknowledgeAlertResponse);

  // UpdatePreferences updates user notification preferences
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (UpdatePreferencesResponse);

  // GetPreferences retrieves user notification preferences
  rpc GetPreferences(GetPreferencesRequest) returns (GetPreferencesResponse);
}

message SendNotificationRequest {
  string patient_id = 1;
  string priority = 2;
  string type = 3;
  string title = 4;
  string message = 5;
  repeated string recipients = 6;
  map<string, string> metadata = 7;
  bool requires_ack = 8;
}

message SendNotificationResponse {
  string notification_id = 1;
  string status = 2;
  google.protobuf.Timestamp created_at = 3;
}

message GetDeliveryStatusRequest {
  string notification_id = 1;
}

message GetDeliveryStatusResponse {
  string notification_id = 1;
  string status = 2;
  string channel = 3;
  repeated DeliveryAttempt attempts = 4;
  google.protobuf.Timestamp last_updated = 5;
}

message DeliveryAttempt {
  string channel = 1;
  bool success = 2;
  string error = 3;
  google.protobuf.Timestamp attempted_at = 4;
}

message UpdatePreferencesRequest {
  string user_id = 1;
  repeated string preferred_channels = 2;
  string quiet_hours_start = 3;
  string quiet_hours_end = 4;
  repeated string enabled_alert_types = 5;
  string priority_threshold = 6;
}

message UpdatePreferencesResponse {
  bool success = 1;
  string message = 2;
}

message GetPreferencesRequest {
  string user_id = 1;
}

message GetPreferencesResponse {
  string user_id = 1;
  repeated string preferred_channels = 2;
  string quiet_hours_start = 3;
  string quiet_hours_end = 4;
  repeated string enabled_alert_types = 5;
  string priority_threshold = 6;
}

message AcknowledgeAlertRequest {
  string alert_id = 1;
  string user_id = 2;
  string notification_id = 3;
  string acknowledgment_note = 4;
  google.protobuf.Timestamp acknowledged_at = 5;
}

message AcknowledgeAlertResponse {
  bool success = 1;
  string message = 2;
  google.protobuf.Timestamp acknowledged_at = 3;
}
