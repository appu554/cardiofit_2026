apiVersion: v1
kind: ConfigMap
metadata:
  name: device-ingestion-config
  namespace: clinical-synthesis-hub
  labels:
    app: device-ingestion-service
    component: configuration
data:
  # Service Configuration
  PROJECT_NAME: "Device Data Ingestion Service"
  VERSION: "1.0.0"
  DEBUG: "false"
  PORT: "8015"
  
  # Outbox Configuration
  OUTBOX_BATCH_SIZE: "50"
  OUTBOX_POLL_INTERVAL: "5"
  MAX_CONCURRENT_VENDORS: "10"
  OUTBOX_RETRY_BACKOFF_SECONDS: "60"
  
  # Kafka Configuration
  KAFKA_BOOTSTRAP_SERVERS: "pkc-619z3.us-east1.gcp.confluent.cloud:9092"
  KAFKA_TOPIC_DEVICE_DATA: "raw-device-data.v1"
  
  # Monitoring Configuration
  GCP_PROJECT_ID: "cardiofit-905a8"
  ENABLE_CLOUD_METRICS: "true"
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"
  
  # Authentication
  AUTH_SERVICE_URL: "http://auth-service:8001"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: outbox-publisher-config
  namespace: clinical-synthesis-hub
  labels:
    app: outbox-publisher-service
    component: configuration
data:
  # Publisher Configuration
  OUTBOX_BATCH_SIZE: "50"
  OUTBOX_POLL_INTERVAL: "5"
  MAX_CONCURRENT_VENDORS: "10"
  OUTBOX_RETRY_BACKOFF_SECONDS: "60"
  
  # Kafka Configuration
  KAFKA_BOOTSTRAP_SERVERS: "pkc-619z3.us-east1.gcp.confluent.cloud:9092"
  KAFKA_TOPIC_DEVICE_DATA: "raw-device-data.v1"
  
  # Monitoring Configuration
  GCP_PROJECT_ID: "cardiofit-905a8"
  ENABLE_CLOUD_METRICS: "true"
