apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: device-ingestion-network-policy
  namespace: clinical-synthesis-hub
  labels:
    app: device-ingestion-service
    component: security
spec:
  podSelector:
    matchLabels:
      app: device-ingestion-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: clinical-synthesis-hub
    - namespaceSelector:
        matchLabels:
          name: istio-system
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8015
    - protocol: TCP
      port: 9090
  - from: []
    ports:
    - protocol: TCP
      port: 8015
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  - to: []
    ports:
    - protocol: TCP
      port: 5432
  - to: []
    ports:
    - protocol: TCP
      port: 9092

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outbox-publisher-network-policy
  namespace: clinical-synthesis-hub
  labels:
    app: outbox-publisher-service
    component: security
spec:
  podSelector:
    matchLabels:
      app: outbox-publisher-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  - to: []
    ports:
    - protocol: TCP
      port: 5432
  - to: []
    ports:
    - protocol: TCP
      port: 9092
