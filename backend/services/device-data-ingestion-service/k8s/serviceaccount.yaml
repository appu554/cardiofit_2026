apiVersion: v1
kind: ServiceAccount
metadata:
  name: device-ingestion-service
  namespace: clinical-synthesis-hub
  labels:
    app: device-ingestion-service
    component: api
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT-ID:role/device-ingestion-service-role
    iam.gke.io/gcp-service-account: device-ingestion@cardiofit-905a8.iam.gserviceaccount.com

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: outbox-publisher-service
  namespace: clinical-synthesis-hub
  labels:
    app: outbox-publisher-service
    component: background-processor
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT-ID:role/outbox-publisher-service-role
    iam.gke.io/gcp-service-account: outbox-publisher@cardiofit-905a8.iam.gserviceaccount.com

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: clinical-synthesis-hub
  name: device-ingestion-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: device-ingestion-rolebinding
  namespace: clinical-synthesis-hub
subjects:
- kind: ServiceAccount
  name: device-ingestion-service
  namespace: clinical-synthesis-hub
- kind: ServiceAccount
  name: outbox-publisher-service
  namespace: clinical-synthesis-hub
roleRef:
  kind: Role
  name: device-ingestion-role
  apiGroup: rbac.authorization.k8s.io
