apiVersion: v1
kind: Service
metadata:
  name: device-ingestion-service
  namespace: clinical-synthesis-hub
  labels:
    app: device-ingestion-service
    component: api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8015
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: device-ingestion-service

---
apiVersion: v1
kind: Service
metadata:
  name: device-ingestion-service-internal
  namespace: clinical-synthesis-hub
  labels:
    app: device-ingestion-service
    component: api
    type: internal
spec:
  type: ClusterIP
  ports:
  - port: 8015
    targetPort: 8015
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: device-ingestion-service

---
apiVersion: v1
kind: Service
metadata:
  name: outbox-publisher-metrics
  namespace: clinical-synthesis-hub
  labels:
    app: outbox-publisher-service
    component: metrics
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: outbox-publisher-service
