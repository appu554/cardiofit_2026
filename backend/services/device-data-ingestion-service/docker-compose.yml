# Docker Compose for Device Data Ingestion Service with Outbox Pattern
# Includes ingestion service, publisher service, and supporting infrastructure

version: '3.8'

services:
  # Device Data Ingestion Service (API)
  ingestion-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VERSION: ${VERSION:-1.0.0}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD)}
    image: clinical-synthesis-hub/device-ingestion:${VERSION:-latest}
    container_name: device-ingestion-service
    restart: unless-stopped
    ports:
      - "8015:8015"
    environment:
      # Service Configuration
      PROJECT_NAME: "Device Data Ingestion Service"
      VERSION: ${VERSION:-1.0.0}
      DEBUG: ${DEBUG:-false}
      PORT: 8015
      
      # Database Configuration
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:Cardiofit@123@db.auugxeqzgrnknklgwqrh.supabase.co:5432/postgres}
      
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-pkc-619z3.us-east1.gcp.confluent.cloud:9092}
      KAFKA_API_KEY: ${KAFKA_API_KEY:-LGJ3AQ2L6VRPW4S2}
      KAFKA_API_SECRET: ${KAFKA_API_SECRET}
      KAFKA_TOPIC_DEVICE_DATA: ${KAFKA_TOPIC_DEVICE_DATA:-raw-device-data.v1}
      
      # Outbox Configuration
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-50}
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-5}
      MAX_CONCURRENT_VENDORS: ${MAX_CONCURRENT_VENDORS:-10}
      
      # Monitoring Configuration
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-cardiofit-905a8}
      ENABLE_CLOUD_METRICS: ${ENABLE_CLOUD_METRICS:-true}
      
      # Authentication
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - clinical-synthesis-hub
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ingestion.rule=Host(`ingestion.clinical-synthesis-hub.local`)"
      - "traefik.http.services.ingestion.loadbalancer.server.port=8015"

  # Outbox Publisher Service (Background)
  outbox-publisher:
    build:
      context: .
      dockerfile: Dockerfile.publisher
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VERSION: ${VERSION:-1.0.0}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD)}
    image: clinical-synthesis-hub/outbox-publisher:${VERSION:-latest}
    container_name: outbox-publisher-service
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:Cardiofit@123@db.auugxeqzgrnknklgwqrh.supabase.co:5432/postgres}
      
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-pkc-619z3.us-east1.gcp.confluent.cloud:9092}
      KAFKA_API_KEY: ${KAFKA_API_KEY:-LGJ3AQ2L6VRPW4S2}
      KAFKA_API_SECRET: ${KAFKA_API_SECRET}
      KAFKA_TOPIC_DEVICE_DATA: ${KAFKA_TOPIC_DEVICE_DATA:-raw-device-data.v1}
      
      # Outbox Configuration
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-50}
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-5}
      MAX_CONCURRENT_VENDORS: ${MAX_CONCURRENT_VENDORS:-10}
      OUTBOX_RETRY_BACKOFF_SECONDS: ${OUTBOX_RETRY_BACKOFF_SECONDS:-60}
      
      # Monitoring Configuration
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-cardiofit-905a8}
      ENABLE_CLOUD_METRICS: ${ENABLE_CLOUD_METRICS:-true}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - clinical-synthesis-hub
    depends_on:
      - postgres
      - ingestion-service
    healthcheck:
      test: ["CMD", "python", "run_outbox_publisher.py", "--health-check"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

  # PostgreSQL Database (for development/testing)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-outbox
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinical_synthesis_hub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Cardiofit@123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - clinical-synthesis-hub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - clinical-synthesis-hub
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus (for metrics collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - clinical-synthesis-hub
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  # Grafana (for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - clinical-synthesis-hub

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  clinical-synthesis-hub:
    driver: bridge
    name: clinical-synthesis-hub
