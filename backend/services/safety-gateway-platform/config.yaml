# Safety Gateway Platform Configuration
service:
  name: "safety-gateway-platform"
  port: 8080
  http_port: 8081
  environment: "production"

# Performance settings
performance:
  max_concurrent_requests: 1000
  request_timeout: "30s"
  max_request_size_mb: 10
  enable_compression: true
  cache_ttl: "5m"

# Phase 1: Snapshot Configuration
snapshot:
  enabled: true
  cache:
    ttl: "10m"
    max_size: 1000
    cleanup_interval: "1m"
  validation:
    enable_checksum: true
    enable_signature: true
    max_age: "1h"
  http_client:
    timeout: "30s"
    max_idle_conns: 100
    max_conns_per_host: 10
    idle_conn_timeout: "90s"
    circuit_breaker:
      failure_threshold: 5
      reset_timeout: "30s"

# Phase 2: Advanced Orchestration Configuration
advanced_orchestration:
  enabled: true
  max_concurrent_requests: 1000
  request_timeout: "10s"
  
  # Batch Processing Configuration
  batch_processing:
    enabled: true
    max_batch_size: 50
    batch_timeout: "100ms"
    concurrency: 10
    patient_grouping: true
    snapshot_optimized: true
    max_concurrent_batches: 20
    worker_pool_size: 15
    
    # Processing strategies
    strategies:
      - "patient_grouped"
      - "snapshot_optimized"  
      - "parallel_direct"
      - "standard"
    
    # Performance thresholds
    performance:
      max_processing_time: "5s"
      target_throughput_rps: 500
      max_queue_size: 1000
  
  # Load Balancing Configuration
  load_balancing:
    strategy: "adaptive"                    # adaptive | round_robin | least_loaded | performance_weighted
    enable_health_check: true
    health_check_interval: "30s"
    adaptive_weight_decay: 0.1
    performance_window_size: 100
    
    # Engine selection criteria
    engine_selection_criteria:
      max_error_rate: 0.05                 # 5% max error rate
      max_average_latency_ms: 1000         # 1 second max latency
      min_throughput_per_sec: 1.0          # 1 RPS minimum
      load_score_threshold: 0.8            # 80% load threshold
    
    # Failover configuration
    failover:
      max_retries: 3
      retry_delay: "1s"
      circuit_breaker_threshold: 10
      recovery_time: "30s"
  
  # Intelligent Routing Configuration
  routing:
    enable_intelligent_routing: true
    default_tier: "veto_critical"
    dynamic_rule_evaluation: true
    max_routing_time: "50ms"
    
    # Engine priorities for load balancing
    engine_priorities:
      drug_interaction_engine: 100
      allergy_check_engine: 90
      dosage_validation_engine: 80
      contraindication_engine: 70
      clinical_advisory_engine: 50
    
    # Fallback chains for fault tolerance
    fallback_chains:
      veto_critical:
        - "drug_interaction_engine"
        - "allergy_check_engine"  
        - "contraindication_engine"
      advisory:
        - "clinical_advisory_engine"
        - "dosage_validation_engine"
    
    # Custom routing rules
    routing_rules:
      - name: "critical_priority_routing"
        description: "Route critical priority requests to veto engines"
        condition:
          field: "priority"
          operator: "in"
          value: ["critical", "high"]
        target_tier: "veto_critical"
        priority: 100
        enabled: true
      
      - name: "medication_interaction_routing"
        description: "Route medication interaction checks to specialized engines"
        condition:
          and:
            - field: "action_type"
              operator: "equals"
              value: "medication_interaction"
            - field: "medication_count"
              operator: "gt"
              value: 1
        target_tier: "veto_critical"
        priority: 90
        enabled: true
        
      - name: "routine_advisory_routing"
        description: "Route low priority requests to advisory engines"
        condition:
          field: "priority"
          operator: "in"
          value: ["low", "routine"]
        target_tier: "advisory"
        priority: 10
        enabled: true
  
  # Comprehensive Metrics Configuration
  metrics:
    enable_metrics: true
    metrics_interval: "10s"
    history_retention_period: "24h"
    max_history_size: 10000
    
    # Metric categories
    enable_performance_metrics: true
    enable_load_metrics: true
    enable_routing_metrics: true
    enable_batch_metrics: true
    enable_snapshot_metrics: true
    
    # Export configuration
    export_json: true
    json_export_path: "/tmp/orchestration_metrics.json"
    export_prometheus: false
    prometheus_namespace: "safety_gateway"
    prometheus_port: 9090
    
    # Alert thresholds
    alert_thresholds:
      error_rate_warning: 0.05             # 5%
      error_rate_critical: 0.15            # 15%
      response_time_warning_ms: 500        # 500ms
      response_time_critical_ms: 2000      # 2s
      throughput_warning_rps: 50           # 50 RPS
      batch_failure_rate_warning: 0.10    # 10%
      cache_hit_ratio_warning: 0.70       # 70%
    
    # Performance targets
    performance_targets:
      target_response_time_ms: 200         # <200ms target
      target_throughput_rps: 500           # 500 RPS target
      target_error_rate: 0.01              # <1% error rate
      target_cache_hit_ratio: 0.90         # >90% cache hit ratio
  
  # Performance Optimization
  performance:
    enable_performance_optimization: true
    adaptive_throttling: true
    circuit_breaker_threshold: 10
    memory_optimization: true
    cpu_optimization: true
    max_memory_mb: 1024
    max_cpu_cores: 4
    goroutine_pool_size: 100
    optimization_interval: "1m"
    resource_check_interval: "10s"

# Logging Configuration
logging:
  level: "info"
  format: "json"
  output: "stdout"
  enable_colors: false
  enable_caller: true
  enable_stacktrace: false
  
  # Advanced logging for Phase 2
  advanced:
    enable_request_tracing: true
    enable_performance_logging: true
    enable_batch_logging: true
    enable_metrics_logging: false  # Reduce noise
    log_slow_requests_ms: 1000     # Log requests >1s
    
  # Log sampling for high volume
  sampling:
    enabled: true
    initial: 100
    thereafter: 10

# Security Configuration
security:
  enable_tls: false
  cert_file: ""
  key_file: ""
  ca_file: ""
  
  # Authentication
  auth:
    enabled: false
    jwt_secret: ""
    token_expiry: "1h"
  
  # Rate limiting
  rate_limiting:
    enabled: true
    requests_per_second: 1000
    burst_size: 1500
    cleanup_interval: "1m"

# Database connections (if needed)
database:
  # PostgreSQL for knowledge base services
  postgres:
    host: "localhost"
    port: 5432
    database: "safety_gateway"
    username: "safety_user"
    password: "${DB_PASSWORD}"
    ssl_mode: "disable"
    max_connections: 20
    max_idle_connections: 5
    connection_timeout: "30s"
  
  # Redis for caching
  redis:
    host: "localhost"
    port: 6379
    password: ""
    database: 0
    max_connections: 50
    connection_timeout: "5s"
    read_timeout: "3s"
    write_timeout: "3s"

# External service connections
external_services:
  # Context Service integration
  context_service:
    base_url: "http://localhost:8002"
    timeout: "30s"
    max_retries: 3
    retry_delay: "1s"
    
  # Clinical Reasoning Service (if separate)
  clinical_reasoning_service:
    host: "localhost"
    port: 8027
    timeout: "60s"
    max_retries: 2
    
  # Knowledge Base Services
  knowledge_services:
    drug_rules_service:
      base_url: "http://localhost:8081"
      timeout: "10s"
    guideline_evidence_service:
      base_url: "http://localhost:8084"  
      timeout: "15s"

# Health check configuration
health:
  enabled: true
  endpoint: "/health"
  detailed_endpoint: "/health/detailed"
  check_interval: "30s"
  timeout: "5s"
  
  # Component health checks
  components:
    database: true
    redis: true
    external_services: true
    orchestration: true
    engines: true
    metrics: true

# Monitoring and observability
monitoring:
  metrics_enabled: true
  metrics_endpoint: "/metrics"
  pprof_enabled: false  # Enable in development only
  tracing_enabled: false
  
  # Prometheus integration
  prometheus:
    enabled: false
    pushgateway_url: ""
    job_name: "safety-gateway"
    push_interval: "15s"

# Environment-specific overrides
environments:
  development:
    logging:
      level: "debug"
      enable_colors: true
    monitoring:
      pprof_enabled: true
    advanced_orchestration:
      load_balancing:
        strategy: "round_robin"  # Simpler for dev
      batch_processing:
        max_batch_size: 10       # Smaller batches for testing
  
  staging:
    advanced_orchestration:
      load_balancing:
        strategy: "least_loaded" # Conservative for staging
      metrics:
        metrics_interval: "5s"   # More frequent in staging
  
  production:
    logging:
      level: "warn"
    advanced_orchestration:
      load_balancing:
        strategy: "adaptive"     # Full intelligence in production
      performance:
        enable_performance_optimization: true