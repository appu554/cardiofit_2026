# Safety Gateway Platform - Phase 5 Test Configuration
# Comprehensive test settings for all test suites

# Global test settings
global:
  timeout: 30m
  parallel_workers: 4
  retry_attempts: 3
  log_level: debug
  reports_directory: "./reports"
  coverage_threshold: 85.0

# Test environment configuration
environment:
  # Service endpoints
  safety_gateway_url: "http://localhost:8030"
  cache_redis_url: "redis://localhost:6379"
  database_url: "postgres://test:test@localhost:5432/safety_gateway_test"
  
  # External services (mocked for testing)
  kafka_brokers: ["localhost:9092"]
  grpc_services:
    cae_engine: "localhost:8080"
    knowledge_base: "localhost:8081"
  
  # Authentication
  test_tokens:
    admin: "test-admin-token-123"
    clinician: "test-clinician-token-456"
    viewer: "test-viewer-token-789"

# Performance targets and thresholds
performance_targets:
  latency:
    p50_ms: 100
    p95_ms: 180
    p99_ms: 300
    p999_ms: 500
  
  throughput:
    min_rps: 500
    target_rps: 750
    max_rps: 1000
  
  resource_usage:
    max_memory_gb: 2.0
    max_cpu_percent: 80.0
    max_disk_usage_gb: 5.0
  
  availability:
    min_uptime_percent: 99.9
    max_error_rate_percent: 0.1
  
  cache:
    min_hit_rate_percent: 90.0
    max_miss_latency_ms: 200
    max_eviction_rate_percent: 5.0

# Integration test configuration
integration_tests:
  timeout: 10m
  scenarios:
    - name: "Basic Snapshot Creation"
      description: "Test basic clinical snapshot creation workflow"
      patient_types: ["simple", "complex", "critical"]
      complexity_levels: ["low", "medium", "high"]
      expected_latency_ms: 150
    
    - name: "Cache Performance"
      description: "Test snapshot cache hit rates and performance"
      cache_scenarios: ["cold_cache", "warm_cache", "hot_cache"]
      expected_hit_rate: 0.85
    
    - name: "Override Token Generation"
      description: "Test enhanced override token generation"
      override_scenarios: ["routine", "emergency", "high_risk"]
      expected_latency_ms: 50
    
    - name: "Decision Reproducibility"
      description: "Test decision replay and reproducibility"
      reproducibility_threshold: 0.99
      replay_timeout_ms: 30000

# Performance test configuration
performance_tests:
  timeout: 15m
  warmup_duration: 2m
  test_duration: 10m
  cooldown_duration: 1m
  
  load_patterns:
    - name: "Steady Load"
      type: "constant"
      rps: 200
      duration: 5m
      concurrent_users: 50
    
    - name: "Ramp Up Load"
      type: "linear_ramp"
      initial_rps: 50
      final_rps: 500
      duration: 3m
      concurrent_users: 100
    
    - name: "Spike Load"
      type: "spike"
      baseline_rps: 100
      spike_rps: 800
      spike_duration: 30s
      total_duration: 2m
  
  user_behavior:
    think_time_ms: 1000
    session_duration_minutes: 10
    request_patterns:
      routine_medication: 0.60
      complex_assessment: 0.25
      emergency_override: 0.15

# Chaos engineering test configuration
chaos_tests:
  timeout: 20m
  scenarios:
    - name: "Latency Injection"
      type: "latency_fault"
      target_services: ["cache", "database", "grpc"]
      fault_parameters:
        min_latency_ms: 50
        max_latency_ms: 2000
        probability: 0.3
        distribution: "exponential"
    
    - name: "Memory Pressure"
      type: "memory_fault"
      fault_parameters:
        leak_rate_mb_per_sec: 1
        max_memory_usage_gb: 1.5
        pressure_type: "gradual"
    
    - name: "Cache Corruption"
      type: "data_corruption"
      target_components: ["snapshot_cache", "token_cache"]
      fault_parameters:
        corruption_rate: 0.1
        corruption_types: ["data_scramble", "partial_loss"]
    
    - name: "Network Partition"
      type: "network_fault"
      fault_parameters:
        partition_type: "split_brain"
        duration_seconds: 30
        affected_services: ["kafka", "redis"]
    
    - name: "Cascading Failure"
      type: "service_failure"
      fault_parameters:
        initial_failure: "cae_engine"
        propagation_delay_seconds: 5
        failure_chain: ["cache_service", "event_publisher"]

# Security test configuration
security_tests:
  timeout: 12m
  encryption:
    algorithms_to_test: ["AES-256-GCM", "AES-128-GCM"]
    key_sizes: [16, 24, 32]
    weak_key_detection: true
  
  access_control:
    roles: ["admin", "clinician", "viewer", "unauthorized"]
    resources: ["snapshots", "override_tokens", "audit_logs"]
    actions: ["create", "read", "update", "delete", "execute"]
  
  malicious_payloads:
    sql_injection:
      - "'; DROP TABLE patients; --"
      - "1' OR '1'='1"
    xss_attacks:
      - "<script>alert('xss')</script>"
      - "javascript:alert('xss')"
    buffer_overflow:
      - large_string: 10000  # 10KB string
    path_traversal:
      - "../../etc/passwd"
      - "../../../windows/system32"
  
  signature_validation:
    algorithms: ["RSA-PSS", "ECDSA"]
    key_strengths: [2048, 4096]
    tamper_detection: true

# Load test configuration
load_tests:
  timeout: 30m
  scenarios:
    - name: "Basic Capacity"
      concurrent_users: 100
      duration: 5m
      rps: 200
      ramp_up_time: 1m
    
    - name: "Peak Load"
      concurrent_users: 300
      duration: 10m
      rps: 500
      ramp_up_time: 2m
    
    - name: "Endurance Test"
      concurrent_users: 150
      duration: 20m
      rps: 250
      ramp_up_time: 3m
    
    - name: "Stress Test"
      concurrent_users: 500
      duration: 5m
      rps: 1000
      ramp_up_time: 1m
  
  clinical_scenarios:
    patient_distribution:
      simple: 0.40
      complex: 0.35
      critical: 0.15
      multi_condition: 0.10
    
    complexity_distribution:
      low: 0.30
      medium: 0.40
      high: 0.20
      very_high: 0.10
    
    override_scenarios:
      routine_override: 0.05
      emergency_override: 0.02
      high_risk_override: 0.01

# Compliance test configuration
compliance_tests:
  timeout: 8m
  regulations:
    hipaa:
      enabled: true
      tests:
        - privacy_rule_compliance
        - security_rule_compliance
        - breach_notification_rule
        - minimum_necessary_standard
    
    fda_21cfr_part11:
      enabled: true
      tests:
        - electronic_records_validation
        - electronic_signatures_validation
        - audit_trail_requirements
        - system_validation
    
    sox:
      enabled: true
      tests:
        - internal_controls
        - data_governance
        - financial_reporting_controls
        - auditor_independence
  
  audit_requirements:
    required_events:
      - snapshot_created
      - safety_decision_made
      - override_token_generated
      - override_request_processed
      - decision_replayed
      - data_accessed
      - user_authenticated
      - system_error_occurred
    
    mandatory_fields:
      - event_id
      - timestamp
      - user_id
      - action
      - resource
      - result
      - ip_address
      - integrity_hash
    
    retention_periods:
      audit_logs: 7_years
      clinical_decisions: 7_years
      override_tokens: 7_years
      system_logs: 1_year

# Data fixtures and test data
test_data:
  patients:
    simple_patients: 100
    complex_patients: 50
    critical_patients: 25
  
  clinical_scenarios:
    medication_checks: 200
    drug_interactions: 100
    contraindication_alerts: 75
    dosage_adjustments: 150
  
  override_scenarios:
    routine_overrides: 50
    emergency_overrides: 25
    high_risk_overrides: 15

# Reporting configuration
reporting:
  formats: ["html", "json", "junit", "markdown"]
  include_graphs: true
  include_metrics: true
  include_traces: true
  
  thresholds:
    error_rate_alert: 1.0  # Alert if error rate > 1%
    latency_alert_p95_ms: 200  # Alert if P95 > 200ms
    memory_alert_gb: 1.8  # Alert if memory > 1.8GB
    cpu_alert_percent: 85  # Alert if CPU > 85%
  
  notifications:
    slack_webhook: ""  # Set in environment
    email_recipients: []  # Set in environment
    teams_webhook: ""  # Set in environment

# Monitoring and observability
monitoring:
  metrics_collection_interval: 5s
  enable_tracing: true
  enable_profiling: true
  
  custom_metrics:
    - name: "snapshot_creation_rate"
      type: "counter"
      description: "Rate of clinical snapshot creation"
    
    - name: "cache_hit_ratio"
      type: "gauge"
      description: "Snapshot cache hit ratio"
    
    - name: "override_token_generation_latency"
      type: "histogram"
      description: "Override token generation latency distribution"
    
    - name: "decision_reproducibility_score"
      type: "gauge"
      description: "Decision reproducibility score"

# Test execution matrix
execution_matrix:
  environments: ["local", "ci", "staging"]
  go_versions: ["1.23"]
  os_platforms: ["ubuntu-latest", "windows-latest", "macos-latest"]
  
  test_combinations:
    - name: "Full Suite"
      suites: ["integration", "performance", "security", "compliance"]
      required: true
    
    - name: "Extended Suite"
      suites: ["integration", "performance", "security", "compliance", "load"]
      required: false
      trigger: "nightly"
    
    - name: "Chaos Suite"
      suites: ["integration", "security", "chaos"]
      required: false
      trigger: "manual"

# Quality gates
quality_gates:
  - name: "Integration Tests"
    type: "required"
    criteria:
      - test_pass_rate: 100.0
      - coverage_threshold: 85.0
  
  - name: "Performance Tests"
    type: "required"
    criteria:
      - p95_latency_ms: 180
      - throughput_rps: 450  # 90% of target
      - error_rate_percent: 0.1
  
  - name: "Security Tests"
    type: "required"
    criteria:
      - vulnerability_count: 0
      - encryption_strength: "strong"
      - access_control_violations: 0
  
  - name: "Compliance Tests"
    type: "required"
    criteria:
      - compliance_score: 95.0
      - critical_issues: 0
      - audit_trail_completeness: 100.0