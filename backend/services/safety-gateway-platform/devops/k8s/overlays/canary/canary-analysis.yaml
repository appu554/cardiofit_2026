apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: safety-gateway-canary-analysis
  labels:
    app: safety-gateway
    component: canary-analysis
spec:
  # Analysis duration - 15 minutes for comprehensive testing
  args:
  - name: canary-service
    value: canary-safety-gateway-service
  - name: stable-service  
    value: safety-gateway-service
  - name: analysis-duration
    value: "15m"
  - name: error-rate-threshold
    value: "1.0"
  - name: latency-threshold
    value: "200"
  - name: success-rate-threshold
    value: "99.0"
  
  # Metrics for canary analysis
  metrics:
  # Error rate comparison between canary and stable
  - name: error-rate
    interval: 30s
    count: 30  # 15 minutes of samples
    successCondition: result[0] < {{args.error-rate-threshold}}
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(safety_gateway_requests_total{service="{{args.canary-service}}",status_code!~"2.."}[2m])) / 
          sum(rate(safety_gateway_requests_total{service="{{args.canary-service}}"}[2m])) * 100
  
  # Response time P95 comparison
  - name: response-time-p95
    interval: 30s
    count: 30
    successCondition: result[0] < {{args.latency-threshold}}
    failureLimit: 5
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          histogram_quantile(0.95, 
            sum(rate(safety_gateway_request_duration_seconds_bucket{service="{{args.canary-service}}"}[2m])) by (le)
          ) * 1000
  
  # Safety decision accuracy - critical for healthcare
  - name: safety-decision-accuracy
    interval: 60s
    count: 15
    successCondition: result[0] >= {{args.success-rate-threshold}}
    failureLimit: 2
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          (sum(rate(safety_gateway_decisions_total{service="{{args.canary-service}}",decision!="error"}[5m])) / 
           sum(rate(safety_gateway_decisions_total{service="{{args.canary-service}}"}[5m]))) * 100
  
  # CAE service connectivity
  - name: cae-connection-health
    interval: 30s
    count: 30
    successCondition: result[0] >= 0.99
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          avg(safety_gateway_cae_connection_status{service="{{args.canary-service}}"})
  
  # Memory usage stability
  - name: memory-usage
    interval: 60s
    count: 15
    successCondition: result[0] < 0.8  # Less than 80% memory usage
    failureLimit: 5
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          avg(container_memory_working_set_bytes{pod=~"canary-safety-gateway-.*"}) / 
          avg(container_spec_memory_limit_bytes{pod=~"canary-safety-gateway-.*"})
  
  # CPU usage stability
  - name: cpu-usage
    interval: 60s
    count: 15
    successCondition: result[0] < 0.7  # Less than 70% CPU usage
    failureLimit: 5
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          avg(rate(container_cpu_usage_seconds_total{pod=~"canary-safety-gateway-.*"}[2m])) /
          avg(container_spec_cpu_quota{pod=~"canary-safety-gateway-.*"} / container_spec_cpu_period{pod=~"canary-safety-gateway-.*"})
  
  # Database connection health
  - name: database-connection-health
    interval: 60s
    count: 15
    successCondition: result[0] >= 0.99
    failureLimit: 2
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          avg(safety_gateway_database_connection_status{service="{{args.canary-service}}"})
  
  # Override token usage patterns - detect unusual behavior
  - name: override-token-usage-rate
    interval: 120s
    count: 8
    successCondition: result[0] < 0.01  # Less than 1% override usage
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(safety_gateway_override_tokens_used_total{service="{{args.canary-service}}"}[5m])) / 
          sum(rate(safety_gateway_requests_total{service="{{args.canary-service}}"}[5m])) * 100
  
  # Critical safety violations - zero tolerance
  - name: critical-safety-violations
    interval: 60s
    count: 15
    successCondition: result[0] == 0
    failureLimit: 1  # Immediate failure on any critical violation
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          sum(increase(safety_gateway_critical_violations_total{service="{{args.canary-service}}"}[1m]))

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisRun
metadata:
  name: safety-gateway-canary-analysis-run
  labels:
    app: safety-gateway
    component: canary-analysis-run
spec:
  # Reference to the analysis template
  analysisTemplate:
    templateName: safety-gateway-canary-analysis
    clusterScope: false
  
  # Arguments for this specific run
  args:
  - name: canary-service
    value: "canary-safety-gateway-service"
  - name: stable-service
    value: "safety-gateway-service"
  - name: analysis-duration
    value: "15m"
  - name: error-rate-threshold
    value: "0.5"  # Very strict 0.5% error rate for safety-critical system
  - name: latency-threshold
    value: "150"  # 150ms P95 latency threshold
  - name: success-rate-threshold
    value: "99.9" # 99.9% success rate required
  
  # Dry run mode for initial testing
  dryRun:
  - metricName: error-rate
  - metricName: response-time-p95

---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: safety-gateway-rollout
  labels:
    app: safety-gateway
    component: progressive-rollout
spec:
  # Number of replicas
  replicas: 5
  
  # Rollout strategy - canary with analysis
  strategy:
    canary:
      # Canary service for traffic splitting
      canaryService: canary-safety-gateway-service
      stableService: safety-gateway-service
      
      # Traffic routing
      trafficRouting:
        istio:
          virtualService:
            name: safety-gateway-vs
            routes:
            - primary
          destinationRule:
            name: safety-gateway-dr
            canarySubsetName: canary
            stableSubsetName: stable
      
      # Canary steps with analysis
      steps:
      # Step 1: Deploy canary with 0% traffic for basic health checks
      - setWeight: 0
      - pause:
          duration: 2m
      
      # Step 2: Start with 1% traffic
      - setWeight: 1
      - pause:
          duration: 2m
      - analysis:
          templateName: safety-gateway-canary-analysis
          args:
          - name: canary-service
            value: "canary-safety-gateway-service"
          - name: error-rate-threshold
            value: "0.1"  # Very strict for initial rollout
      
      # Step 3: Increase to 5% if analysis passes
      - setWeight: 5
      - pause:
          duration: 5m
      - analysis:
          templateName: safety-gateway-canary-analysis
          args:
          - name: canary-service
            value: "canary-safety-gateway-service"
          - name: error-rate-threshold
            value: "0.5"
      
      # Step 4: Increase to 10% for broader testing
      - setWeight: 10
      - pause:
          duration: 5m
      - analysis:
          templateName: safety-gateway-canary-analysis
          args:
          - name: canary-service
            value: "canary-safety-gateway-service"
          - name: error-rate-threshold
            value: "0.8"
      
      # Step 5: Increase to 25% if still stable
      - setWeight: 25
      - pause:
          duration: 10m
      - analysis:
          templateName: safety-gateway-canary-analysis
          args:
          - name: canary-service
            value: "canary-safety-gateway-service"
          - name: error-rate-threshold
            value: "1.0"
      
      # Step 6: Final promotion to 50%
      - setWeight: 50
      - pause:
          duration: 10m
      - analysis:
          templateName: safety-gateway-canary-analysis
          args:
          - name: canary-service
            value: "canary-safety-gateway-service"
          - name: error-rate-threshold
            value: "1.0"
      
      # Step 7: Full promotion after final analysis
      - setWeight: 100
  
  # Rollback configuration
  rollbackWindow:
    revisions: 3
  
  # Selector for pods
  selector:
    matchLabels:
      app: safety-gateway
  
  # Pod template
  template:
    metadata:
      labels:
        app: safety-gateway
        version: canary
    spec:
      containers:
      - name: safety-gateway
        image: safety-gateway-platform:canary-latest
        ports:
        - containerPort: 8030
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: CANARY_MODE
          value: "true"
        - name: ENFORCEMENT_ENABLED
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # Health checks remain the same as base deployment

---
# Istio VirtualService for traffic splitting
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: safety-gateway-vs
  labels:
    app: safety-gateway
spec:
  hosts:
  - safety-gateway.cardiofit.local
  http:
  - name: primary
    match:
    - headers:
        end-user:
          exact: canary-tester
    route:
    - destination:
        host: canary-safety-gateway-service
        subset: canary
      weight: 100
  - name: secondary
    route:
    - destination:
        host: safety-gateway-service
        subset: stable
      weight: 100
    - destination:
        host: canary-safety-gateway-service
        subset: canary
      weight: 0  # This will be modified by Argo Rollouts

---
# Istio DestinationRule for subset definitions
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: safety-gateway-dr
  labels:
    app: safety-gateway
spec:
  host: safety-gateway-service
  subsets:
  - name: stable
    labels:
      version: stable
  - name: canary
    labels:
      version: canary
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 100
        http:
          http1MaxPendingRequests: 50
          maxRequestsPerConnection: 10
      outlierDetection:
        consecutiveErrors: 3
        interval: 30s
        baseEjectionTime: 30s