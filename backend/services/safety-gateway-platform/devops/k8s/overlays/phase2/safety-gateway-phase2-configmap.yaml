apiVersion: v1
kind: ConfigMap
metadata:
  name: safety-gateway-phase2-config
  labels:
    app: safety-gateway
    component: safety-platform
    version: v2.0.0
    phase: "2"
  annotations:
    safety-gateway.platform/config-version: "2.0"
    safety-gateway.platform/features: "advanced-orchestration,batch-processing,intelligent-routing,comprehensive-metrics"
data:
  # Phase 2 specific configuration
  phase2-config.yaml: |
    # Safety Gateway Platform - Phase 2 Configuration
    # Advanced Orchestration Enhancement
    
    service:
      name: "safety-gateway-platform"
      port: 8030
      http_port: 8031
      grpc_port: 8032
      health_port: 8033
      orchestration_port: 8034
      environment: "production"
      version: "2.0.0"
      phase: "2"
    
    # Enhanced Performance Settings for Phase 2
    performance:
      max_concurrent_requests: 1000
      request_timeout: "10s"
      max_request_size_mb: 20
      enable_compression: true
      cache_ttl: "10m"
      connection_pool_size: 100
      keep_alive_timeout: "60s"
      read_header_timeout: "10s"
      write_timeout: "30s"
      idle_timeout: "120s"
    
    # Phase 2 Advanced Orchestration Configuration
    advanced_orchestration:
      enabled: true
      max_concurrent_requests: 1000
      request_timeout: "5s"
      
      # Enhanced Batch Processing Configuration
      batch_processing:
        enabled: true
        max_batch_size: 50
        batch_timeout: "100ms"
        concurrency: 15
        patient_grouping: true
        snapshot_optimized: true
        max_concurrent_batches: 30
        worker_pool_size: 20
        
        # Processing strategies
        strategies:
          - "patient_grouped"
          - "snapshot_optimized"
          - "parallel_direct"
          - "standard"
          - "high_performance"
          - "low_latency"
        
        # Performance thresholds
        performance:
          max_processing_time: "3s"
          target_throughput_rps: 1000
          max_queue_size: 2000
          queue_timeout: "30s"
          
        # Batch routing rules
        routing_rules:
          patient_grouped:
            max_patients_per_batch: 10
            grouping_timeout: "50ms"
            preferred_engine_types: ["cae", "veto_critical"]
          snapshot_optimized:
            max_snapshots_per_batch: 5
            snapshot_reuse_threshold: 3
            cache_priority: "high"
          parallel_direct:
            max_parallel_workers: 20
            load_balancing: "round_robin"
            timeout_ms: 1000
      
      # Advanced Load Balancing Configuration
      load_balancing:
        strategy: "adaptive"  # adaptive | round_robin | least_loaded | performance_weighted | consistent_hash
        enable_health_check: true
        health_check_interval: "15s"
        adaptive_weight_decay: 0.15
        performance_window_size: 200
        circuit_breaker_enabled: true
        
        # Engine selection criteria
        engine_selection_criteria:
          max_error_rate: 0.03              # 3% max error rate
          max_average_latency_ms: 500       # 500ms max latency
          min_throughput_per_sec: 2.0       # 2 RPS minimum
          load_score_threshold: 0.75        # 75% load threshold
          health_score_threshold: 0.9       # 90% health threshold
          
        # Failover configuration
        failover:
          max_retries: 3
          retry_delay: "500ms"
          exponential_backoff: true
          circuit_breaker_threshold: 5
          recovery_time: "15s"
          max_recovery_attempts: 3
          
        # Advanced routing algorithms
        algorithms:
          consistent_hash:
            virtual_nodes: 150
            hash_function: "sha256"
          weighted_round_robin:
            weight_adjustment_interval: "30s"
            min_weight: 1
            max_weight: 100
          adaptive:
            learning_rate: 0.1
            response_time_weight: 0.4
            throughput_weight: 0.3
            error_rate_weight: 0.3
      
      # Intelligent Routing Configuration
      routing:
        enable_intelligent_routing: true
        default_tier: "veto_critical"
        dynamic_rule_evaluation: true
        max_routing_time: "25ms"
        cache_routing_decisions: true
        routing_cache_ttl: "5m"
        
        # Engine priorities for load balancing
        engine_priorities:
          drug_interaction_engine: 100
          allergy_check_engine: 95
          dosage_validation_engine: 90
          contraindication_engine: 85
          clinical_advisory_engine: 70
          protocol_engine: 60
          knowledge_base_engine: 50
        
        # Enhanced fallback chains for fault tolerance
        fallback_chains:
          veto_critical:
            primary:
              - "drug_interaction_engine"
              - "allergy_check_engine"
              - "contraindication_engine"
            secondary:
              - "clinical_advisory_engine"
              - "protocol_engine"
            emergency:
              - "knowledge_base_engine"
          advisory:
            primary:
              - "clinical_advisory_engine"
              - "dosage_validation_engine"
            secondary:
              - "knowledge_base_engine"
          emergency_fallback:
            - "mock_safe_engine"
        
        # Enhanced routing rules
        routing_rules:
          - name: "critical_priority_routing"
            description: "Route critical priority requests to veto engines"
            condition:
              field: "priority"
              operator: "in"
              value: ["critical", "urgent"]
            target_tier: "veto_critical"
            priority: 100
            enabled: true
            weight: 1.0
            
          - name: "high_volume_routing"
            description: "Route high volume requests to optimized engines"
            condition:
              and:
                - field: "request_volume"
                  operator: "gt"
                  value: 100
                - field: "complexity_score"
                  operator: "lt"
                  value: 0.5
            target_tier: "advisory"
            priority: 80
            enabled: true
            weight: 0.8
            
          - name: "medication_interaction_routing"
            description: "Route medication interaction checks to specialized engines"
            condition:
              and:
                - field: "action_type"
                  operator: "equals"
                  value: "medication_interaction"
                - field: "medication_count"
                  operator: "gt"
                  value: 1
            target_tier: "veto_critical"
            priority: 90
            enabled: true
            weight: 1.0
            
          - name: "complex_patient_routing"
            description: "Route complex patients to comprehensive analysis"
            condition:
              or:
                - field: "condition_count"
                  operator: "gt"
                  value: 5
                - field: "medication_count"
                  operator: "gt"
                  value: 10
                - field: "risk_score"
                  operator: "gt"
                  value: 0.8
            target_tier: "veto_critical"
            priority: 85
            enabled: true
            weight: 1.2
            
          - name: "routine_advisory_routing"
            description: "Route low priority requests to advisory engines"
            condition:
              and:
                - field: "priority"
                  operator: "in"
                  value: ["low", "routine"]
                - field: "complexity_score"
                  operator: "lt"
                  value: 0.3
            target_tier: "advisory"
            priority: 20
            enabled: true
            weight: 0.6
            
          - name: "time_sensitive_routing"
            description: "Route time-sensitive requests to fastest engines"
            condition:
              field: "time_sensitivity"
              operator: "equals"
              value: "urgent"
            target_tier: "veto_critical"
            priority: 95
            enabled: true
            weight: 1.1
            routing_strategy: "least_loaded"
      
      # Comprehensive Metrics Configuration
      metrics:
        enable_metrics: true
        metrics_interval: "5s"
        history_retention_period: "48h"
        max_history_size: 50000
        
        # Metric categories
        enable_performance_metrics: true
        enable_load_metrics: true
        enable_routing_metrics: true
        enable_batch_metrics: true
        enable_snapshot_metrics: true
        enable_engine_metrics: true
        enable_orchestration_metrics: true
        
        # Export configuration
        export_json: true
        json_export_path: "/var/metrics/safety-gateway/orchestration_metrics.json"
        export_prometheus: true
        prometheus_namespace: "safety_gateway_phase2"
        prometheus_port: 9090
        prometheus_endpoint: "/metrics"
        
        # Real-time streaming
        enable_streaming: true
        streaming_endpoint: "/api/v1/metrics/stream"
        streaming_buffer_size: 1000
        
        # Alert thresholds
        alert_thresholds:
          error_rate_warning: 0.03             # 3%
          error_rate_critical: 0.10            # 10%
          response_time_warning_ms: 200        # 200ms
          response_time_critical_ms: 1000      # 1s
          throughput_warning_rps: 100          # 100 RPS
          throughput_critical_rps: 50          # 50 RPS
          batch_failure_rate_warning: 0.05    # 5%
          batch_failure_rate_critical: 0.15   # 15%
          cache_hit_ratio_warning: 0.80       # 80%
          cache_hit_ratio_critical: 0.60      # 60%
          queue_size_warning: 500
          queue_size_critical: 1000
          memory_usage_warning: 0.80          # 80%
          memory_usage_critical: 0.95         # 95%
          cpu_usage_warning: 0.75             # 75%
          cpu_usage_critical: 0.90            # 90%
        
        # Performance targets
        performance_targets:
          target_response_time_ms: 100         # <100ms target
          target_throughput_rps: 1000          # 1000 RPS target
          target_error_rate: 0.005             # <0.5% error rate
          target_cache_hit_ratio: 0.95         # >95% cache hit ratio
          target_batch_success_rate: 0.99      # >99% batch success
          target_availability: 0.999           # 99.9% availability
          
        # Custom metrics
        custom_metrics:
          - name: "safety_decisions_per_minute"
            type: "counter"
            description: "Number of safety decisions made per minute"
            labels: ["engine_type", "decision_type", "priority"]
          - name: "batch_processing_efficiency"
            type: "histogram"
            description: "Efficiency ratio of batch processing"
            buckets: [0.1, 0.25, 0.5, 0.75, 0.9, 0.95, 0.99, 1.0]
          - name: "routing_decision_time"
            type: "histogram"
            description: "Time taken to make routing decisions"
            buckets: [1, 5, 10, 25, 50, 100, 250, 500]
      
      # Performance Optimization
      performance:
        enable_performance_optimization: true
        adaptive_throttling: true
        circuit_breaker_threshold: 5
        memory_optimization: true
        cpu_optimization: true
        gc_optimization: true
        max_memory_mb: 1536
        max_cpu_cores: 2
        goroutine_pool_size: 200
        optimization_interval: "30s"
        resource_check_interval: "5s"
        
        # Advanced optimizations
        jit_compilation: true
        memory_pooling: true
        connection_pooling: true
        query_optimization: true
        cache_prewarming: true
        predictive_scaling: true
    
    # Enhanced Logging Configuration for Phase 2
    logging:
      level: "info"
      format: "json"
      output: "stdout"
      enable_colors: false
      enable_caller: true
      enable_stacktrace: false
      
      # Advanced logging for Phase 2
      advanced:
        enable_request_tracing: true
        enable_performance_logging: true
        enable_batch_logging: true
        enable_metrics_logging: true
        enable_orchestration_logging: true
        enable_routing_logging: true
        log_slow_requests_ms: 500     # Log requests >500ms
        log_large_batches: 20         # Log batches >20 requests
        
      # Structured logging
      structured:
        enable_structured_logging: true
        include_request_id: true
        include_trace_id: true
        include_span_id: true
        include_user_id: true
        include_patient_id: true
        include_engine_id: true
        
      # Log sampling for high volume
      sampling:
        enabled: true
        initial: 100
        thereafter: 25
        
      # Log rotation
      rotation:
        enabled: true
        max_size: "100MB"
        max_age: "7d"
        max_backups: 10
        compress: true
    
    # Enhanced Security Configuration
    security:
      enable_tls: true
      cert_file: "/etc/ssl/certs/safety-gateway.crt"
      key_file: "/etc/ssl/private/safety-gateway.key"
      ca_file: "/etc/ssl/certs/ca.crt"
      min_tls_version: "1.2"
      cipher_suites:
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      
      # Authentication
      auth:
        enabled: true
        jwt_secret: "${JWT_SECRET}"
        token_expiry: "1h"
        refresh_token_expiry: "24h"
        issuer: "safety-gateway-platform"
        audience: "clinical-services"
        
      # Authorization
      authz:
        enabled: true
        rbac_enabled: true
        policy_file: "/app/config/rbac-policy.yaml"
        
      # Rate limiting
      rate_limiting:
        enabled: true
        requests_per_second: 2000
        burst_size: 3000
        cleanup_interval: "30s"
        per_ip_limit: 100
        per_user_limit: 500
        
      # Security headers
      headers:
        enable_security_headers: true
        hsts_max_age: 31536000
        content_security_policy: "default-src 'self'"
        x_frame_options: "DENY"
        x_content_type_options: "nosniff"
    
    # Database connections
    database:
      # PostgreSQL for Phase 2 data
      postgres:
        host: "${POSTGRES_HOST}"
        port: 5432
        database: "safety_gateway_phase2"
        username: "${POSTGRES_USER}"
        password: "${POSTGRES_PASSWORD}"
        ssl_mode: "require"
        max_connections: 50
        max_idle_connections: 10
        connection_timeout: "30s"
        query_timeout: "60s"
        
      # Redis for enhanced caching
      redis:
        host: "${REDIS_HOST}"
        port: 6379
        password: "${REDIS_PASSWORD}"
        database: 0
        max_connections: 100
        connection_timeout: "5s"
        read_timeout: "3s"
        write_timeout: "3s"
        pool_size: 50
        min_idle_connections: 10
    
    # External service connections
    external_services:
      # Context Service integration
      context_service:
        base_url: "${CONTEXT_SERVICE_URL}"
        timeout: "30s"
        max_retries: 3
        retry_delay: "1s"
        circuit_breaker:
          enabled: true
          failure_threshold: 5
          recovery_timeout: "30s"
        
      # Clinical Reasoning Service (CAE)
      clinical_reasoning_service:
        host: "${CAE_SERVICE_HOST}"
        port: 8027
        timeout: "60s"
        max_retries: 2
        keep_alive: true
        pool_size: 20
        
      # Knowledge Base Services
      knowledge_services:
        drug_rules_service:
          base_url: "${DRUG_RULES_SERVICE_URL}"
          timeout: "10s"
          api_key: "${DRUG_RULES_API_KEY}"
        guideline_evidence_service:
          base_url: "${GUIDELINE_SERVICE_URL}"
          timeout: "15s"
          api_key: "${GUIDELINE_API_KEY}"
        
      # Event streaming
      kafka:
        bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS}"
        security_protocol: "SASL_SSL"
        sasl_mechanism: "PLAIN"
        sasl_username: "${KAFKA_USERNAME}"
        sasl_password: "${KAFKA_PASSWORD}"
        ssl_ca_location: "/etc/ssl/certs/kafka-ca.crt"
        
        # Producer configuration
        producer:
          acks: "all"
          retries: 3
          batch_size: 16384
          linger_ms: 5
          buffer_memory: 33554432
          compression_type: "snappy"
          
        # Consumer configuration
        consumer:
          group_id: "safety-gateway-phase2"
          auto_offset_reset: "earliest"
          enable_auto_commit: false
          max_poll_records: 500
          session_timeout_ms: 30000
    
    # Health check configuration
    health:
      enabled: true
      endpoint: "/health"
      detailed_endpoint: "/health/detailed"
      orchestration_endpoint: "/health/orchestration"
      check_interval: "15s"
      timeout: "3s"
      
      # Component health checks
      components:
        database: true
        redis: true
        external_services: true
        orchestration: true
        engines: true
        metrics: true
        batch_processor: true
        load_balancer: true
        routing_engine: true
        
      # Advanced health checks
      advanced_checks:
        memory_usage_threshold: 0.90
        cpu_usage_threshold: 0.85
        disk_usage_threshold: 0.80
        connection_pool_threshold: 0.90
        queue_size_threshold: 1000
        response_time_threshold_ms: 1000
    
    # Monitoring and observability
    monitoring:
      metrics_enabled: true
      metrics_endpoint: "/metrics"
      pprof_enabled: false  # Disable in production
      tracing_enabled: true
      tracing_endpoint: "/trace"
      
      # Distributed tracing
      tracing:
        service_name: "safety-gateway-phase2"
        sampler_type: "probabilistic"
        sampler_param: 0.1  # 10% sampling
        reporter_log_spans: false
        
      # Prometheus integration
      prometheus:
        enabled: true
        pushgateway_url: "${PROMETHEUS_PUSHGATEWAY_URL}"
        job_name: "safety-gateway-phase2"
        push_interval: "10s"
        basic_auth:
          username: "${PROMETHEUS_USERNAME}"
          password: "${PROMETHEUS_PASSWORD}"

  # Environment-specific overrides for Phase 2
  production-overrides.yaml: |
    advanced_orchestration:
      load_balancing:
        strategy: "adaptive"
        performance_window_size: 500
      batch_processing:
        max_batch_size: 50
        worker_pool_size: 20
      metrics:
        metrics_interval: "10s"
        export_prometheus: true
      performance:
        enable_performance_optimization: true
        max_memory_mb: 1536
        max_cpu_cores: 2
    logging:
      level: "warn"
      advanced:
        log_slow_requests_ms: 500
    security:
      rate_limiting:
        requests_per_second: 2000
        burst_size: 3000
        
  staging-overrides.yaml: |
    advanced_orchestration:
      load_balancing:
        strategy: "least_loaded"
      batch_processing:
        max_batch_size: 30
        worker_pool_size: 15
      metrics:
        metrics_interval: "5s"
        export_prometheus: true
        export_json: true
    logging:
      level: "info"
      advanced:
        log_slow_requests_ms: 300
    security:
      rate_limiting:
        requests_per_second: 1000
        burst_size: 1500
        
  development-overrides.yaml: |
    advanced_orchestration:
      load_balancing:
        strategy: "round_robin"
      batch_processing:
        max_batch_size: 10
        worker_pool_size: 5
      metrics:
        metrics_interval: "2s"
        export_json: true
        export_prometheus: false
    logging:
      level: "debug"
      enable_colors: true
      advanced:
        log_slow_requests_ms: 100
    monitoring:
      pprof_enabled: true
    security:
      rate_limiting:
        requests_per_second: 100
        burst_size: 200

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: safety-gateway-phase2-migrations
  labels:
    app: safety-gateway
    component: safety-platform
    version: v2.0.0
    phase: "2"
data:
  001_phase2_init.up.sql: |
    -- Phase 2 Advanced Orchestration Tables
    
    -- Batch processing tracking
    CREATE TABLE IF NOT EXISTS batch_requests (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      batch_id VARCHAR(255) UNIQUE NOT NULL,
      strategy VARCHAR(50) NOT NULL,
      priority VARCHAR(20) NOT NULL,
      request_count INTEGER NOT NULL,
      status VARCHAR(20) NOT NULL DEFAULT 'pending',
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      started_at TIMESTAMPTZ,
      completed_at TIMESTAMPTZ,
      processing_time_ms INTEGER,
      metadata JSONB,
      INDEX idx_batch_requests_status (status),
      INDEX idx_batch_requests_created_at (created_at),
      INDEX idx_batch_requests_strategy (strategy)
    );
    
    -- Orchestration metrics
    CREATE TABLE IF NOT EXISTS orchestration_metrics (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      metric_name VARCHAR(100) NOT NULL,
      metric_value DOUBLE PRECISION NOT NULL,
      metric_type VARCHAR(20) NOT NULL,
      labels JSONB,
      timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      INDEX idx_orchestration_metrics_name_timestamp (metric_name, timestamp),
      INDEX idx_orchestration_metrics_timestamp (timestamp)
    );
    
    -- Engine performance tracking
    CREATE TABLE IF NOT EXISTS engine_performance (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      engine_id VARCHAR(100) NOT NULL,
      engine_name VARCHAR(100) NOT NULL,
      request_count BIGINT NOT NULL DEFAULT 0,
      success_count BIGINT NOT NULL DEFAULT 0,
      error_count BIGINT NOT NULL DEFAULT 0,
      total_processing_time_ms BIGINT NOT NULL DEFAULT 0,
      avg_processing_time_ms DOUBLE PRECISION NOT NULL DEFAULT 0,
      last_request_at TIMESTAMPTZ,
      health_score DOUBLE PRECISION NOT NULL DEFAULT 1.0,
      load_score DOUBLE PRECISION NOT NULL DEFAULT 0.0,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      INDEX idx_engine_performance_engine_id (engine_id),
      INDEX idx_engine_performance_updated_at (updated_at)
    );
    
    -- Routing decisions audit
    CREATE TABLE IF NOT EXISTS routing_decisions (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      request_id VARCHAR(255) NOT NULL,
      routing_rule VARCHAR(100),
      selected_tier VARCHAR(50) NOT NULL,
      selected_engines JSONB NOT NULL,
      routing_time_ms INTEGER NOT NULL,
      decision_factors JSONB,
      timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      INDEX idx_routing_decisions_request_id (request_id),
      INDEX idx_routing_decisions_timestamp (timestamp)
    );
    
    -- Create time-series tables using TimescaleDB
    SELECT create_hypertable('orchestration_metrics', 'timestamp', if_not_exists => TRUE);
    SELECT create_hypertable('routing_decisions', 'timestamp', if_not_exists => TRUE);
    
    -- Create retention policies
    SELECT add_retention_policy('orchestration_metrics', INTERVAL '30 days', if_not_exists => TRUE);
    SELECT add_retention_policy('routing_decisions', INTERVAL '90 days', if_not_exists => TRUE);

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-phase2-config
  labels:
    app: safety-gateway
    component: logging
    version: v2.0.0
    phase: "2"
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        
    [INPUT]
        Name              tail
        Path              /var/log/safety-gateway/*.log
        Parser            safety_gateway_json
        Tag               safety-gateway.phase2
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        
    [INPUT]
        Name              tail
        Path              /var/log/safety-gateway/orchestration/*.log
        Parser            safety_gateway_json
        Tag               safety-gateway.orchestration
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        
    [INPUT]
        Name              tail
        Path              /var/log/safety-gateway/batch/*.log
        Parser            safety_gateway_json
        Tag               safety-gateway.batch
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        
    [FILTER]
        Name                kubernetes
        Match               safety-gateway.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     safety-gateway.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        
    [FILTER]
        Name                nest
        Match               safety-gateway.*
        Operation           lift
        Nested_under        kubernetes
        Add_prefix          k8s_
        
    [OUTPUT]
        Name                elasticsearch
        Match               safety-gateway.*
        Host                ${FLUENT_ELASTICSEARCH_HOST}
        Port                ${FLUENT_ELASTICSEARCH_PORT}
        Index               safety-gateway-phase2
        Type                _doc
        HTTP_User           ${ELASTICSEARCH_USERNAME}
        HTTP_Passwd         ${ELASTICSEARCH_PASSWORD}
        Logstash_Format     On
        Logstash_Prefix     safety-gateway-phase2
        Logstash_DateFormat %Y.%m.%d
        Include_Tag_Key     On
        Tag_Key             @tag
        Retry_Limit         5
        
  parsers.conf: |
    [PARSER]
        Name   safety_gateway_json
        Format json
        Time_Key timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep On