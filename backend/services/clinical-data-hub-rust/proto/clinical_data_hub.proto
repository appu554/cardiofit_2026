syntax = "proto3";

package clinical_data_hub;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Clinical Data Hub Service - Ultra-high performance clinical data aggregation
service ClinicalDataHub {
  // Multi-layer caching operations
  rpc GetCachedData(GetCachedDataRequest) returns (CachedDataResponse);
  rpc SetCachedData(SetCachedDataRequest) returns (SetCachedDataResponse);
  rpc InvalidateCache(InvalidateCacheRequest) returns (InvalidateCacheResponse);
  rpc WarmCache(WarmCacheRequest) returns (WarmCacheResponse);
  
  // Parallel data aggregation
  rpc AggregateData(AggregateDataRequest) returns (AggregateDataResponse);
  rpc BatchAggregate(BatchAggregateRequest) returns (BatchAggregateResponse);
  
  // Stream processing for real-time updates
  rpc StreamDataUpdates(StreamDataRequest) returns (stream DataUpdateEvent);
  rpc ProcessDataStream(stream DataStreamEvent) returns (ProcessDataStreamResponse);
  
  // Performance analytics and optimization
  rpc GetPerformanceMetrics(PerformanceMetricsRequest) returns (PerformanceMetricsResponse);
  rpc OptimizeCache(OptimizeCacheRequest) returns (OptimizeCacheResponse);
  
  // Health and diagnostics
  rpc GetServiceHealth(HealthRequest) returns (HealthResponse);
  rpc RunDiagnostics(DiagnosticsRequest) returns (DiagnosticsResponse);
}

// Request Messages
message GetCachedDataRequest {
  string cache_key = 1;
  CacheLayer preferred_layer = 2;
  bool allow_stale = 3;
  int32 max_staleness_seconds = 4;
}

message SetCachedDataRequest {
  string cache_key = 1;
  google.protobuf.Struct data = 2;
  int32 ttl_seconds = 3;
  repeated CacheLayer target_layers = 4;
  CompressionType compression = 5;
}

message InvalidateCacheRequest {
  repeated string cache_keys = 1;
  string pattern = 2;
  repeated CacheLayer target_layers = 3;
  string reason = 4;
}

message WarmCacheRequest {
  repeated string patient_ids = 1;
  repeated string data_types = 2;
  CacheWarmingStrategy strategy = 3;
}

message AggregateDataRequest {
  string patient_id = 1;
  repeated DataSource sources = 2;
  AggregationRules rules = 3;
  PerformanceHints hints = 4;
}

message BatchAggregateRequest {
  repeated AggregateDataRequest requests = 1;
  int32 concurrency_limit = 2;
  int32 timeout_ms = 3;
}

message StreamDataRequest {
  repeated string patient_ids = 1;
  repeated string data_types = 2;
  StreamFilters filters = 3;
}

message PerformanceMetricsRequest {
  string time_range = 1;
  repeated MetricType metric_types = 2;
  bool include_breakdown = 3;
}

message OptimizeCacheRequest {
  OptimizationStrategy strategy = 1;
  repeated string target_keys = 2;
}

message HealthRequest {
  bool include_cache_stats = 1;
  bool include_dependencies = 2;
}

message DiagnosticsRequest {
  DiagnosticLevel level = 1;
  repeated string components = 2;
}

// Response Messages
message CachedDataResponse {
  google.protobuf.Struct data = 1;
  CacheHitInfo hit_info = 2;
  DataFreshness freshness = 3;
  PerformanceStats performance = 4;
}

message SetCachedDataResponse {
  bool success = 1;
  repeated CacheSetResult results = 2;
  PerformanceStats performance = 3;
}

message InvalidateCacheResponse {
  int64 keys_invalidated = 1;
  repeated InvalidationResult results = 2;
  PerformanceStats performance = 3;
}

message WarmCacheResponse {
  int64 items_warmed = 1;
  repeated WarmingResult results = 2;
  PerformanceStats performance = 3;
}

message AggregateDataResponse {
  google.protobuf.Struct aggregated_data = 1;
  DataQualityMetrics quality = 2;
  repeated SourceResult source_results = 3;
  PerformanceStats performance = 4;
}

message BatchAggregateResponse {
  repeated AggregateDataResponse responses = 1;
  BatchPerformanceStats batch_performance = 2;
}

message DataUpdateEvent {
  string patient_id = 1;
  string data_type = 2;
  google.protobuf.Struct updated_data = 3;
  UpdateType update_type = 4;
  google.protobuf.Timestamp timestamp = 5;
  string source = 6;
}

message ProcessDataStreamResponse {
  int64 events_processed = 1;
  int64 events_cached = 2;
  repeated ProcessingError errors = 3;
  PerformanceStats performance = 4;
}

message PerformanceMetricsResponse {
  google.protobuf.Struct metrics = 1;
  google.protobuf.Timestamp generated_at = 2;
  string time_range = 3;
}

message OptimizeCacheResponse {
  bool success = 1;
  OptimizationResults results = 2;
  PerformanceStats performance = 3;
}

message HealthResponse {
  ServiceStatus status = 1;
  google.protobuf.Timestamp timestamp = 2;
  repeated ComponentHealth components = 3;
  CacheHealthStats cache_health = 4;
}

message DiagnosticsResponse {
  repeated DiagnosticResult results = 1;
  google.protobuf.Timestamp generated_at = 2;
}

// Core Data Models
message DataSource {
  string source_id = 1;
  SourceType source_type = 2;
  string endpoint = 3;
  int32 timeout_ms = 4;
  int32 retry_count = 5;
  SourcePriority priority = 6;
  repeated string required_fields = 7;
}

message AggregationRules {
  bool parallel_execution = 1;
  int32 max_concurrency = 2;
  int32 timeout_budget_ms = 3;
  ConflictResolution conflict_resolution = 4;
  DataTransformation transformation = 5;
}

message PerformanceHints {
  bool use_cache = 1;
  bool allow_partial_results = 2;
  CompressionType preferred_compression = 3;
  int32 memory_limit_mb = 4;
}

message StreamFilters {
  repeated string include_fields = 1;
  repeated string exclude_fields = 2;
  google.protobuf.Struct conditions = 3;
  int32 buffer_size = 4;
}

// Supporting Messages
message CacheHitInfo {
  CacheLayer hit_layer = 1;
  bool cache_hit = 2;
  google.protobuf.Timestamp cached_at = 3;
  int32 access_count = 4;
}

message DataFreshness {
  google.protobuf.Timestamp last_updated = 1;
  int32 age_seconds = 2;
  FreshnessLevel level = 3;
  bool within_threshold = 4;
}

message PerformanceStats {
  int64 duration_microseconds = 1;
  int64 memory_used_bytes = 2;
  int32 network_calls = 3;
  int32 cache_operations = 4;
  double cpu_utilization = 5;
}

message DataQualityMetrics {
  double completeness_score = 1;
  double consistency_score = 2;
  double accuracy_score = 3;
  repeated QualityIssue issues = 4;
}

message SourceResult {
  string source_id = 1;
  bool success = 2;
  google.protobuf.Struct data = 3;
  int64 response_time_microseconds = 4;
  optional string error_message = 5;
}

message BatchPerformanceStats {
  int64 total_duration_microseconds = 1;
  int32 successful_requests = 2;
  int32 failed_requests = 3;
  double average_response_time_ms = 4;
  double p95_response_time_ms = 5;
  double p99_response_time_ms = 6;
}

message CacheSetResult {
  CacheLayer layer = 1;
  bool success = 2;
  int64 size_bytes = 3;
  optional string error = 4;
}

message InvalidationResult {
  string cache_key = 1;
  CacheLayer layer = 2;
  bool success = 3;
  optional string error = 4;
}

message WarmingResult {
  string cache_key = 1;
  bool success = 2;
  int64 duration_microseconds = 3;
  optional string error = 4;
}

message ProcessingError {
  string event_id = 1;
  string error_type = 2;
  string error_message = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message OptimizationResults {
  int64 keys_optimized = 1;
  int64 space_saved_bytes = 2;
  int64 performance_improvement_ms = 3;
  repeated OptimizationAction actions = 4;
}

message ComponentHealth {
  string component = 1;
  ServiceStatus status = 2;
  google.protobuf.Timestamp last_check = 3;
  optional string message = 4;
  google.protobuf.Struct details = 5;
}

message CacheHealthStats {
  repeated CacheLayerStats layer_stats = 1;
  double overall_hit_ratio = 2;
  int64 total_memory_usage_bytes = 3;
  int64 total_operations_per_second = 4;
}

message CacheLayerStats {
  CacheLayer layer = 1;
  int64 total_entries = 2;
  int64 memory_usage_bytes = 3;
  double hit_ratio = 4;
  int64 operations_per_second = 5;
  int32 evictions_per_minute = 6;
}

message DiagnosticResult {
  string component = 1;
  DiagnosticStatus status = 2;
  string message = 3;
  google.protobuf.Struct details = 4;
  repeated string recommendations = 5;
}

message QualityIssue {
  QualityIssueType issue_type = 1;
  string field = 2;
  string description = 3;
  QualityIssueSeverity severity = 4;
}

message OptimizationAction {
  OptimizationActionType action_type = 1;
  string target = 2;
  string description = 3;
  int64 impact_bytes = 4;
}

message DataStreamEvent {
  string event_id = 1;
  string patient_id = 2;
  string data_type = 3;
  google.protobuf.Struct payload = 4;
  google.protobuf.Timestamp timestamp = 5;
  string source = 6;
}

// Enums
enum CacheLayer {
  CACHE_LAYER_UNKNOWN = 0;
  CACHE_LAYER_L1_MEMORY = 1;
  CACHE_LAYER_L2_REDIS = 2;
  CACHE_LAYER_L3_PERSISTENT = 3;
}

enum CompressionType {
  COMPRESSION_NONE = 0;
  COMPRESSION_LZ4 = 1;
  COMPRESSION_ZSTD = 2;
  COMPRESSION_MSGPACK = 3;
}

enum CacheWarmingStrategy {
  CACHE_WARMING_UNKNOWN = 0;
  CACHE_WARMING_PREDICTIVE = 1;
  CACHE_WARMING_HISTORICAL = 2;
  CACHE_WARMING_SCHEDULED = 3;
}

enum SourceType {
  SOURCE_TYPE_UNKNOWN = 0;
  SOURCE_TYPE_GRPC = 1;
  SOURCE_TYPE_REST = 2;
  SOURCE_TYPE_GRAPHQL = 3;
  SOURCE_TYPE_FHIR = 4;
  SOURCE_TYPE_DATABASE = 5;
}

enum SourcePriority {
  SOURCE_PRIORITY_UNKNOWN = 0;
  SOURCE_PRIORITY_LOW = 1;
  SOURCE_PRIORITY_MEDIUM = 2;
  SOURCE_PRIORITY_HIGH = 3;
  SOURCE_PRIORITY_CRITICAL = 4;
}

enum ConflictResolution {
  CONFLICT_RESOLUTION_UNKNOWN = 0;
  CONFLICT_RESOLUTION_LATEST = 1;
  CONFLICT_RESOLUTION_PRIORITY = 2;
  CONFLICT_RESOLUTION_MERGE = 3;
}

enum DataTransformation {
  DATA_TRANSFORMATION_NONE = 0;
  DATA_TRANSFORMATION_NORMALIZE = 1;
  DATA_TRANSFORMATION_AGGREGATE = 2;
  DATA_TRANSFORMATION_ENRICH = 3;
}

enum UpdateType {
  UPDATE_TYPE_UNKNOWN = 0;
  UPDATE_TYPE_CREATE = 1;
  UPDATE_TYPE_UPDATE = 2;
  UPDATE_TYPE_DELETE = 3;
  UPDATE_TYPE_BATCH = 4;
}

enum FreshnessLevel {
  FRESHNESS_UNKNOWN = 0;
  FRESHNESS_REALTIME = 1;
  FRESHNESS_FRESH = 2;
  FRESHNESS_ACCEPTABLE = 3;
  FRESHNESS_STALE = 4;
}

enum ServiceStatus {
  SERVICE_STATUS_UNKNOWN = 0;
  SERVICE_STATUS_HEALTHY = 1;
  SERVICE_STATUS_DEGRADED = 2;
  SERVICE_STATUS_UNHEALTHY = 3;
}

enum DiagnosticLevel {
  DIAGNOSTIC_LEVEL_UNKNOWN = 0;
  DIAGNOSTIC_LEVEL_BASIC = 1;
  DIAGNOSTIC_LEVEL_DETAILED = 2;
  DIAGNOSTIC_LEVEL_COMPREHENSIVE = 3;
}

enum DiagnosticStatus {
  DIAGNOSTIC_STATUS_UNKNOWN = 0;
  DIAGNOSTIC_STATUS_PASS = 1;
  DIAGNOSTIC_STATUS_WARN = 2;
  DIAGNOSTIC_STATUS_FAIL = 3;
}

enum MetricType {
  METRIC_TYPE_UNKNOWN = 0;
  METRIC_TYPE_LATENCY = 1;
  METRIC_TYPE_THROUGHPUT = 2;
  METRIC_TYPE_MEMORY = 3;
  METRIC_TYPE_CACHE = 4;
  METRIC_TYPE_ERRORS = 5;
}

enum OptimizationStrategy {
  OPTIMIZATION_STRATEGY_UNKNOWN = 0;
  OPTIMIZATION_STRATEGY_MEMORY = 1;
  OPTIMIZATION_STRATEGY_PERFORMANCE = 2;
  OPTIMIZATION_STRATEGY_BALANCED = 3;
}

enum QualityIssueType {
  QUALITY_ISSUE_UNKNOWN = 0;
  QUALITY_ISSUE_MISSING_DATA = 1;
  QUALITY_ISSUE_STALE_DATA = 2;
  QUALITY_ISSUE_INCONSISTENT_DATA = 3;
  QUALITY_ISSUE_INVALID_FORMAT = 4;
}

enum QualityIssueSeverity {
  QUALITY_ISSUE_SEVERITY_UNKNOWN = 0;
  QUALITY_ISSUE_SEVERITY_LOW = 1;
  QUALITY_ISSUE_SEVERITY_MEDIUM = 2;
  QUALITY_ISSUE_SEVERITY_HIGH = 3;
  QUALITY_ISSUE_SEVERITY_CRITICAL = 4;
}

enum OptimizationActionType {
  OPTIMIZATION_ACTION_UNKNOWN = 0;
  OPTIMIZATION_ACTION_COMPRESS = 1;
  OPTIMIZATION_ACTION_EVICT = 2;
  OPTIMIZATION_ACTION_REORGANIZE = 3;
  OPTIMIZATION_ACTION_PREFETCH = 4;
}