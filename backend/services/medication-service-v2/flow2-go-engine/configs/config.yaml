# Flow 2 Go Engine Configuration

server:
  port: 8080
  environment: development
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

rust_engine:
  address: ""  # REQUIRED: Must be set via RUST_ENGINE_ADDRESS environment variable
  timeout: 30s
  max_retries: 3
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout: 60s
    max_requests: 10

context_service:
  url: ""  # REQUIRED: Must be set via CONTEXT_SERVICE_URL environment variable
  timeout: 10s
  api_key: ""

medication_api:
  url: ""  # REQUIRED: Must be set via MEDICATION_API_URL environment variable
  timeout: 10s
  api_key: ""

redis:
  address: ""  # REQUIRED: Must be set via REDIS_URL environment variable
  password: ""
  db: 0
  pool_size: 10

rate_limit:
  requests_per_second: 1000
  burst_size: 2000
  window_size: 1m

observability:
  metrics_enabled: true
  tracing_enabled: true
  log_level: info
