syntax = "proto3";

package medication.v1;

option go_package = "medication-service-v2/proto/medication/v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Medication Service Definition
service MedicationService {
  // Medication Proposal Management
  rpc CreateMedicationProposal(CreateMedicationProposalRequest) returns (CreateMedicationProposalResponse);
  rpc GetMedicationProposal(GetMedicationProposalRequest) returns (GetMedicationProposalResponse);
  rpc UpdateMedicationProposal(UpdateMedicationProposalRequest) returns (UpdateMedicationProposalResponse);
  rpc DeleteMedicationProposal(DeleteMedicationProposalRequest) returns (DeleteMedicationProposalResponse);
  rpc ListMedicationProposals(ListMedicationProposalsRequest) returns (ListMedicationProposalsResponse);
  rpc ValidateMedicationProposal(ValidateMedicationProposalRequest) returns (ValidateMedicationProposalResponse);
  
  // Recipe Resolver Operations
  rpc ResolveRecipe(ResolveRecipeRequest) returns (ResolveRecipeResponse);
  rpc GetRecipeTemplate(GetRecipeTemplateRequest) returns (GetRecipeTemplateResponse);
  rpc CreateRecipeTemplate(CreateRecipeTemplateRequest) returns (CreateRecipeTemplateResponse);
  rpc ListRecipeTemplates(ListRecipeTemplatesRequest) returns (ListRecipeTemplatesResponse);
  
  // Clinical Engine Operations
  rpc CalculateDosage(CalculateDosageRequest) returns (CalculateDosageResponse);
  rpc AssessRisk(AssessRiskRequest) returns (AssessRiskResponse);
  rpc PerformSafetyChecks(PerformSafetyChecksRequest) returns (PerformSafetyChecksResponse);
  rpc EvaluateClinicalRules(EvaluateClinicalRulesRequest) returns (EvaluateClinicalRulesResponse);
  
  // Context Gateway Operations
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
  rpc GetSnapshot(GetSnapshotRequest) returns (GetSnapshotResponse);
  rpc UpdateSnapshot(UpdateSnapshotRequest) returns (UpdateSnapshotResponse);
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);
  rpc QueryContext(QueryContextRequest) returns (QueryContextResponse);
  
  // Workflow Orchestration
  rpc StartWorkflow(StartWorkflowRequest) returns (StartWorkflowResponse);
  rpc GetWorkflowStatus(GetWorkflowStatusRequest) returns (GetWorkflowStatusResponse);
  rpc UpdateWorkflow(UpdateWorkflowRequest) returns (UpdateWorkflowResponse);
  rpc CancelWorkflow(CancelWorkflowRequest) returns (CancelWorkflowResponse);
  
  // Knowledge Base Operations
  rpc QueryKnowledge(QueryKnowledgeRequest) returns (QueryKnowledgeResponse);
  rpc GetEvidenceSources(GetEvidenceSourcesRequest) returns (GetEvidenceSourcesResponse);
  rpc GetGuidelines(GetGuidelinesRequest) returns (GetGuidelinesResponse);
  
  // Health and Monitoring
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
}

// Request/Response Messages for Medication Proposal Management
message CreateMedicationProposalRequest {
  string patient_id = 1;
  string protocol_id = 2;
  string indication = 3;
  ClinicalContext clinical_context = 4;
  MedicationDetails medication_details = 5;
  string created_by = 6;
}

message CreateMedicationProposalResponse {
  MedicationProposal proposal = 1;
  OperationStatus status = 2;
}

message GetMedicationProposalRequest {
  string proposal_id = 1;
}

message GetMedicationProposalResponse {
  MedicationProposal proposal = 1;
  OperationStatus status = 2;
}

message UpdateMedicationProposalRequest {
  string proposal_id = 1;
  MedicationProposal proposal = 2;
  string updated_by = 3;
}

message UpdateMedicationProposalResponse {
  MedicationProposal proposal = 1;
  OperationStatus status = 2;
}

message DeleteMedicationProposalRequest {
  string proposal_id = 1;
}

message DeleteMedicationProposalResponse {
  OperationStatus status = 1;
}

message ListMedicationProposalsRequest {
  string patient_id = 1;
  ProposalStatus status = 2;
  int32 page = 3;
  int32 page_size = 4;
  string sort_by = 5;
  string sort_order = 6;
}

message ListMedicationProposalsResponse {
  repeated MedicationProposal proposals = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
  OperationStatus status = 5;
}

message ValidateMedicationProposalRequest {
  string proposal_id = 1;
  string validated_by = 2;
}

message ValidateMedicationProposalResponse {
  MedicationProposal proposal = 1;
  repeated ValidationResult validation_results = 2;
  OperationStatus status = 3;
}

// Request/Response Messages for Recipe Resolver
message ResolveRecipeRequest {
  string protocol_id = 1;
  ClinicalContext clinical_context = 2;
  map<string, string> parameters = 3;
}

message ResolveRecipeResponse {
  Recipe recipe = 1;
  repeated DosageRecommendation dosage_recommendations = 2;
  repeated SafetyConstraint safety_constraints = 3;
  OperationStatus status = 4;
}

message GetRecipeTemplateRequest {
  string template_id = 1;
}

message GetRecipeTemplateResponse {
  RecipeTemplate template = 1;
  OperationStatus status = 2;
}

message CreateRecipeTemplateRequest {
  RecipeTemplate template = 1;
  string created_by = 2;
}

message CreateRecipeTemplateResponse {
  RecipeTemplate template = 1;
  OperationStatus status = 2;
}

message ListRecipeTemplatesRequest {
  string protocol_id = 1;
  string indication = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListRecipeTemplatesResponse {
  repeated RecipeTemplate templates = 1;
  int32 total_count = 2;
  OperationStatus status = 3;
}

// Request/Response Messages for Clinical Engine
message CalculateDosageRequest {
  ClinicalContext clinical_context = 1;
  MedicationDetails medication_details = 2;
  string calculation_method = 3;
  map<string, string> parameters = 4;
}

message CalculateDosageResponse {
  repeated DosageRecommendation recommendations = 1;
  repeated SafetyConstraint constraints = 2;
  float confidence_score = 3;
  OperationStatus status = 4;
}

message AssessRiskRequest {
  string patient_id = 1;
  ClinicalContext clinical_context = 2;
  MedicationDetails medication_details = 3;
  repeated DosageRecommendation proposed_dosages = 4;
}

message AssessRiskResponse {
  RiskAssessment risk_assessment = 1;
  repeated SafetyAlert safety_alerts = 2;
  OperationStatus status = 3;
}

message PerformSafetyChecksRequest {
  string patient_id = 1;
  ClinicalContext clinical_context = 2;
  MedicationDetails medication_details = 3;
  repeated DosageRecommendation proposed_dosages = 4;
}

message PerformSafetyChecksResponse {
  repeated SafetyCheckResult safety_results = 1;
  bool overall_safe = 2;
  OperationStatus status = 3;
}

message EvaluateClinicalRulesRequest {
  string rule_set = 1;
  ClinicalContext clinical_context = 2;
  map<string, google.protobuf.Value> input_parameters = 3;
}

message EvaluateClinicalRulesResponse {
  repeated RuleEngineResult rule_results = 1;
  map<string, google.protobuf.Value> output_parameters = 2;
  OperationStatus status = 3;
}

// Request/Response Messages for Context Gateway
message CreateSnapshotRequest {
  string patient_id = 1;
  string context_type = 2;
  google.protobuf.Struct data = 3;
  map<string, string> metadata = 4;
  string created_by = 5;
}

message CreateSnapshotResponse {
  Snapshot snapshot = 1;
  OperationStatus status = 2;
}

message GetSnapshotRequest {
  string snapshot_id = 1;
}

message GetSnapshotResponse {
  Snapshot snapshot = 1;
  OperationStatus status = 2;
}

message UpdateSnapshotRequest {
  string snapshot_id = 1;
  google.protobuf.Struct data = 2;
  map<string, string> metadata = 3;
  string updated_by = 4;
}

message UpdateSnapshotResponse {
  Snapshot snapshot = 1;
  OperationStatus status = 2;
}

message DeleteSnapshotRequest {
  string snapshot_id = 1;
}

message DeleteSnapshotResponse {
  OperationStatus status = 1;
}

message QueryContextRequest {
  string patient_id = 1;
  string context_type = 2;
  map<string, string> filters = 3;
  google.protobuf.Timestamp from_time = 4;
  google.protobuf.Timestamp to_time = 5;
}

message QueryContextResponse {
  repeated Snapshot snapshots = 1;
  int32 total_count = 2;
  OperationStatus status = 3;
}

// Request/Response Messages for Workflow Orchestration
message StartWorkflowRequest {
  string workflow_type = 1;
  string patient_id = 2;
  string protocol_id = 3;
  ClinicalContext clinical_context = 4;
  map<string, google.protobuf.Value> input_parameters = 5;
  string initiated_by = 6;
}

message StartWorkflowResponse {
  string workflow_id = 1;
  WorkflowStatus workflow_status = 2;
  OperationStatus status = 3;
}

message GetWorkflowStatusRequest {
  string workflow_id = 1;
}

message GetWorkflowStatusResponse {
  WorkflowStatus workflow_status = 1;
  OperationStatus status = 2;
}

message UpdateWorkflowRequest {
  string workflow_id = 1;
  map<string, google.protobuf.Value> update_parameters = 2;
  string updated_by = 3;
}

message UpdateWorkflowResponse {
  WorkflowStatus workflow_status = 1;
  OperationStatus status = 2;
}

message CancelWorkflowRequest {
  string workflow_id = 1;
  string reason = 2;
  string cancelled_by = 3;
}

message CancelWorkflowResponse {
  OperationStatus status = 1;
}

// Request/Response Messages for Knowledge Base
message QueryKnowledgeRequest {
  string knowledge_base = 1;
  string query = 2;
  map<string, string> filters = 3;
  int32 limit = 4;
}

message QueryKnowledgeResponse {
  repeated KnowledgeResult results = 1;
  int32 total_count = 2;
  OperationStatus status = 3;
}

message GetEvidenceSourcesRequest {
  string topic = 1;
  string drug_name = 2;
  string indication = 3;
}

message GetEvidenceSourcesResponse {
  repeated EvidenceSource evidence_sources = 1;
  OperationStatus status = 2;
}

message GetGuidelinesRequest {
  string condition = 1;
  string drug_class = 2;
  string specialty = 3;
}

message GetGuidelinesResponse {
  repeated ClinicalGuideline guidelines = 1;
  OperationStatus status = 2;
}

// Health and Monitoring
message HealthCheckRequest {
  bool deep_check = 1;
}

message HealthCheckResponse {
  string status = 1;
  map<string, ServiceHealth> service_health = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message GetMetricsRequest {
  repeated string metric_names = 1;
  google.protobuf.Timestamp from_time = 2;
  google.protobuf.Timestamp to_time = 3;
}

message GetMetricsResponse {
  map<string, MetricData> metrics = 1;
  OperationStatus status = 2;
}

// Core Data Types
message MedicationProposal {
  string id = 1;
  string patient_id = 2;
  string protocol_id = 3;
  string indication = 4;
  ProposalStatus status = 5;
  ClinicalContext clinical_context = 6;
  MedicationDetails medication_details = 7;
  repeated DosageRecommendation dosage_recommendations = 8;
  repeated SafetyConstraint safety_constraints = 9;
  string snapshot_id = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  string created_by = 13;
  string validated_by = 14;
  google.protobuf.Timestamp validation_timestamp = 15;
}

message ClinicalContext {
  string patient_id = 1;
  double weight_kg = 2;
  double height_cm = 3;
  int32 age_years = 4;
  string gender = 5;
  double bsa_m2 = 6;
  double creatinine_mg_dl = 7;
  double egfr = 8;
  repeated string allergies = 9;
  repeated string conditions = 10;
  repeated CurrentMedication current_medications = 11;
  map<string, LabValue> lab_values = 12;
}

message CurrentMedication {
  string medication_name = 1;
  double dose_mg = 2;
  string frequency = 3;
  google.protobuf.Timestamp start_date = 4;
  string route = 5;
}

message LabValue {
  double value = 1;
  string unit = 2;
  google.protobuf.Timestamp timestamp = 3;
  string reference_range = 4;
}

message MedicationDetails {
  string drug_name = 1;
  string generic_name = 2;
  string brand_name = 3;
  string drug_class = 4;
  string mechanism = 5;
  string indication = 6;
  repeated string contraindications = 7;
  repeated DrugInteraction interactions = 8;
  repeated FormulationType formulation_types = 9;
  string therapeutic_class = 10;
  PharmacologyProfile pharmacology_profile = 11;
}

message DrugInteraction {
  string interacting_drug = 1;
  string severity = 2;
  string description = 3;
  string management = 4;
}

message FormulationType {
  string form = 1;
  repeated string strengths = 2;
  string route = 3;
  string availability = 4;
}

message PharmacologyProfile {
  double half_life_hours = 1;
  int32 onset_minutes = 2;
  double peak_hours = 3;
  double duration_hours = 4;
  double bioavailability = 5;
  double protein_binding = 6;
  string metabolism = 7;
  string excretion = 8;
  bool renal_adjustment = 9;
  bool hepatic_adjustment = 10;
}

message DosageRecommendation {
  string id = 1;
  string recommendation_type = 2;
  double dose_mg = 3;
  int32 frequency_per_day = 4;
  string route = 5;
  int32 duration_days = 6;
  double max_dose_mg = 7;
  double min_dose_mg = 8;
  string adjustment_reason = 9;
  string calculation_method = 10;
  double confidence_score = 11;
  string clinical_notes = 12;
  repeated MonitoringRequirement monitoring_required = 13;
}

message MonitoringRequirement {
  string parameter = 1;
  string frequency = 2;
  string target_range = 3;
  double alert_threshold = 4;
  string notes = 5;
}

message SafetyConstraint {
  string id = 1;
  string constraint_type = 2;
  string severity = 3;
  string parameter = 4;
  string operator = 5;
  double threshold_value = 6;
  string unit = 7;
  string message = 8;
  string action = 9;
  string source = 10;
}

message Recipe {
  string id = 1;
  string protocol_id = 2;
  string name = 3;
  string description = 4;
  string indication = 5;
  repeated RecipeStep steps = 6;
  map<string, google.protobuf.Value> parameters = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message RecipeStep {
  int32 order = 1;
  string action = 2;
  map<string, google.protobuf.Value> parameters = 3;
  string description = 4;
}

message RecipeTemplate {
  string id = 1;
  string name = 2;
  string description = 3;
  string protocol_id = 4;
  string indication = 5;
  repeated TemplateRule rules = 6;
  map<string, google.protobuf.Value> default_parameters = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message TemplateRule {
  string condition = 1;
  string action = 2;
  map<string, google.protobuf.Value> parameters = 3;
  int32 priority = 4;
}

message Snapshot {
  string id = 1;
  string patient_id = 2;
  string context_type = 3;
  google.protobuf.Struct data = 4;
  map<string, string> metadata = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  string created_by = 8;
  string version = 9;
}

message WorkflowStatus {
  string workflow_id = 1;
  string workflow_type = 2;
  string status = 3;
  string current_phase = 4;
  int32 progress_percentage = 5;
  repeated WorkflowStep completed_steps = 6;
  WorkflowStep current_step = 7;
  repeated WorkflowStep pending_steps = 8;
  map<string, google.protobuf.Value> output_data = 9;
  repeated WorkflowError errors = 10;
  google.protobuf.Timestamp started_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp estimated_completion = 13;
}

message WorkflowStep {
  string step_id = 1;
  string name = 2;
  string status = 3;
  map<string, google.protobuf.Value> input_data = 4;
  map<string, google.protobuf.Value> output_data = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp completed_at = 7;
  string error_message = 8;
}

message WorkflowError {
  string error_code = 1;
  string message = 2;
  string step_id = 3;
  google.protobuf.Timestamp timestamp = 4;
  bool recoverable = 5;
}

message RiskAssessment {
  string assessment_id = 1;
  string overall_risk_level = 2;
  double risk_score = 3;
  repeated RiskFactor risk_factors = 4;
  repeated string mitigation_strategies = 5;
  google.protobuf.Timestamp assessed_at = 6;
}

message RiskFactor {
  string factor_type = 1;
  string severity = 2;
  string description = 3;
  double impact_score = 4;
  double probability = 5;
}

message SafetyAlert {
  string alert_id = 1;
  string alert_type = 2;
  string severity = 3;
  string message = 4;
  string source = 5;
  google.protobuf.Timestamp timestamp = 6;
  bool acknowledged = 7;
}

message SafetyCheckResult {
  string check_type = 1;
  string status = 2;
  string message = 3;
  repeated string recommendations = 4;
  double confidence = 5;
}

message RuleEngineResult {
  string rule_id = 1;
  string rule_name = 2;
  bool fired = 3;
  map<string, google.protobuf.Value> output_values = 4;
  string execution_details = 5;
  double confidence = 6;
}

message KnowledgeResult {
  string id = 1;
  string title = 2;
  string content = 3;
  string source = 4;
  double relevance_score = 5;
  map<string, string> metadata = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message EvidenceSource {
  string id = 1;
  string title = 2;
  string authors = 3;
  string journal = 4;
  string publication_date = 5;
  string doi = 6;
  string abstract = 7;
  string evidence_level = 8;
  double quality_score = 9;
}

message ClinicalGuideline {
  string id = 1;
  string title = 2;
  string organization = 3;
  string specialty = 4;
  string condition = 5;
  repeated GuidelineRecommendation recommendations = 6;
  string publication_date = 7;
  string version = 8;
  string url = 9;
}

message GuidelineRecommendation {
  string id = 1;
  string text = 2;
  string strength = 3;
  string quality_of_evidence = 4;
  repeated string supporting_references = 5;
}

message ValidationResult {
  string field = 1;
  string message = 2;
  string severity = 3;
  string code = 4;
}

message OperationStatus {
  int32 code = 1;
  string message = 2;
  bool success = 3;
  repeated string details = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message ServiceHealth {
  string name = 1;
  string status = 2;
  string message = 3;
  google.protobuf.Timestamp last_check = 4;
  int64 response_time_ms = 5;
}

message MetricData {
  string name = 1;
  string type = 2;
  repeated DataPoint data_points = 3;
  string unit = 4;
}

message DataPoint {
  google.protobuf.Timestamp timestamp = 1;
  double value = 2;
  map<string, string> labels = 3;
}

// Enums
enum ProposalStatus {
  PROPOSAL_STATUS_UNSPECIFIED = 0;
  PROPOSAL_STATUS_DRAFT = 1;
  PROPOSAL_STATUS_PROPOSED = 2;
  PROPOSAL_STATUS_VALIDATED = 3;
  PROPOSAL_STATUS_REJECTED = 4;
  PROPOSAL_STATUS_COMMITTED = 5;
  PROPOSAL_STATUS_EXPIRED = 6;
}