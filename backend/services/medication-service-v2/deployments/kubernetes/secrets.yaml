# Secrets for Medication Service V2
# Healthcare-grade secret management with encryption

apiVersion: v1
kind: Secret
metadata:
  name: medication-service-secrets
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: secrets
    version: v1
  annotations:
    description: "Main secrets for Medication Service V2"
    secret.reloader.stakater.com/reload: "true"
    # Vault annotations for secret management
    vault.security.banzaicloud.io/vault-addr: "https://vault.cardiofit.internal:8200"
    vault.security.banzaicloud.io/vault-role: "medication-service-v2"
type: Opaque
stringData:
  # NOTE: In production, these should be injected via external secret management
  # systems like HashiCorp Vault, AWS Secrets Manager, etc.
  
  # Database credentials
  DB_PASSWORD: "REPLACE_WITH_SECURE_DB_PASSWORD"
  DATABASE_URL: "postgresql://medication_user:REPLACE_WITH_SECURE_DB_PASSWORD@postgres-service:5432/medication_v2?sslmode=require"
  
  # Redis credentials
  REDIS_PASSWORD: "REPLACE_WITH_SECURE_REDIS_PASSWORD"
  REDIS_URL: "redis://:REPLACE_WITH_SECURE_REDIS_PASSWORD@redis-service:6379/0"
  
  # JWT & Encryption
  JWT_SECRET: "REPLACE_WITH_64_CHAR_JWT_SECRET_FOR_PRODUCTION_USE_ONLY"
  ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_ENCRYPTION_KEY_FOR_HIPAA_COMPLIANCE"
  
  # API Keys for external services
  API_KEY: "REPLACE_WITH_EXTERNAL_SERVICE_API_KEY"
  GOOGLE_HEALTHCARE_API_KEY: "REPLACE_WITH_GOOGLE_HEALTHCARE_API_KEY"
  
  # Certificate passwords (if using password-protected certs)
  TLS_CERT_PASSWORD: "REPLACE_WITH_TLS_CERT_PASSWORD"

---
# TLS Certificates Secret
apiVersion: v1
kind: Secret
metadata:
  name: medication-service-tls
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: tls
    version: v1
  annotations:
    description: "TLS certificates for HTTPS and gRPC"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
type: kubernetes.io/tls
data:
  # NOTE: Replace with actual base64-encoded certificates
  # Use: cat cert.pem | base64 -w 0
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...  # Base64 encoded certificate
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...  # Base64 encoded private key
  ca.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...   # Base64 encoded CA certificate

---
# Database SSL Certificates
apiVersion: v1
kind: Secret
metadata:
  name: postgres-ssl-certs
  namespace: cardiofit-medication-v2
  labels:
    app: postgres
    component: ssl
    version: v1
type: Opaque
data:
  # PostgreSQL SSL certificates (base64 encoded)
  server.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
  server.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...
  ca.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...

---
# Service Account Token Secret
apiVersion: v1
kind: Secret
metadata:
  name: medication-service-sa-token
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: serviceaccount
  annotations:
    kubernetes.io/service-account.name: medication-service-v2
type: kubernetes.io/service-account-token

---
# External Service Secrets
apiVersion: v1
kind: Secret
metadata:
  name: external-service-secrets
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: external-secrets
type: Opaque
stringData:
  # Google Healthcare API Service Account Key
  GOOGLE_SERVICE_ACCOUNT_KEY: |
    {
      "type": "service_account",
      "project_id": "REPLACE_WITH_PROJECT_ID",
      "private_key_id": "REPLACE_WITH_PRIVATE_KEY_ID",
      "private_key": "REPLACE_WITH_PRIVATE_KEY",
      "client_email": "REPLACE_WITH_CLIENT_EMAIL",
      "client_id": "REPLACE_WITH_CLIENT_ID",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "REPLACE_WITH_CERT_URL"
    }
  
  # SMTP credentials for alerts
  EMAIL_SMTP_USER: "REPLACE_WITH_SMTP_USERNAME"
  EMAIL_SMTP_PASSWORD: "REPLACE_WITH_SMTP_PASSWORD"
  
  # Slack webhook for alerts
  SLACK_WEBHOOK_URL: "REPLACE_WITH_SLACK_WEBHOOK_URL"

---
# Monitoring Secrets
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secrets
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: monitoring
type: Opaque
stringData:
  # Grafana admin password
  GRAFANA_ADMIN_PASSWORD: "REPLACE_WITH_SECURE_GRAFANA_PASSWORD"
  
  # AlertManager SMTP password
  ALERTMANAGER_SMTP_PASSWORD: "REPLACE_WITH_ALERTMANAGER_SMTP_PASSWORD"
  
  # Jaeger authentication (if required)
  JAEGER_AUTH_TOKEN: "REPLACE_WITH_JAEGER_AUTH_TOKEN"

---
# Backup Secrets
apiVersion: v1
kind: Secret
metadata:
  name: backup-secrets
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: backup
type: Opaque
stringData:
  # S3/Cloud Storage credentials for backups
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_AWS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_AWS_SECRET_KEY"
  S3_BUCKET_NAME: "cardiofit-medication-backups-prod"
  
  # Encryption key for backup encryption
  BACKUP_ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_BACKUP_ENCRYPTION_KEY"

---
# External Secret Operator Configuration (if using ESO)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-secret-store
  namespace: cardiofit-medication-v2
spec:
  provider:
    vault:
      server: "https://vault.cardiofit.internal:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "medication-service-v2"

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: medication-service-external-secret
  namespace: cardiofit-medication-v2
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: medication-service-vault-secrets
    creationPolicy: Owner
  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: medication-service-v2/database
      property: password
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: medication-service-v2/redis
      property: password
  - secretKey: JWT_SECRET
    remoteRef:
      key: medication-service-v2/auth
      property: jwt_secret
  - secretKey: ENCRYPTION_KEY
    remoteRef:
      key: medication-service-v2/crypto
      property: encryption_key