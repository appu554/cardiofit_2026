# Medication Service V2 Kubernetes Deployment
# Production-ready healthcare deployment with high availability and security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: medication-service-v2
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: api-server
    version: v1
    tier: backend
    environment: production
    compliance: hipaa
  annotations:
    description: "Medication Service V2 - FHIR-compliant medication management"
    deployment.kubernetes.io/revision: "1"
    config.reloader.stakater.com/reload: "medication-service-config,medication-service-secrets"
spec:
  replicas: 3  # High availability with 3 replicas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: medication-service-v2
      component: api-server
  template:
    metadata:
      labels:
        app: medication-service-v2
        component: api-server
        version: v1
        tier: backend
        sidecar.istio.io/inject: "true"  # Enable Istio service mesh
      annotations:
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
        prometheus.io/path: "/metrics"
        # Security context
        container.apparmor.security.beta.kubernetes.io/medication-service: runtime/default
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    spec:
      serviceAccountName: medication-service-v2
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532  # nonroot user
        runAsGroup: 65532
        fsGroup: 65532
        supplementalGroups: [65532]
        seccompProfile:
          type: RuntimeDefault
      
      # Pod Anti-Affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - medication-service-v2
              topologyKey: kubernetes.io/hostname
      
      # Tolerations for dedicated healthcare nodes
      tolerations:
      - key: "healthcare-workload"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      # Node selection for healthcare-compliant nodes
      nodeSelector:
        workload-type: healthcare
        compliance: hipaa
        security-level: high
      
      # Init container for database migrations
      initContainers:
      - name: db-migration
        image: cardiofit/medication-service-v2:1.0.0
        imagePullPolicy: Always
        command: ["/app/medication-service-v2"]
        args: ["migrate", "--up"]
        envFrom:
        - configMapRef:
            name: medication-service-config
        - configMapRef:
            name: medication-service-db-config
        - secretRef:
            name: medication-service-secrets
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: migrations
          mountPath: /app/migrations
          readOnly: true
      
      containers:
      - name: medication-service
        image: cardiofit/medication-service-v2:1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8005
          protocol: TCP
        - name: grpc
          containerPort: 50005
          protocol: TCP
        - name: metrics
          containerPort: 8005
          protocol: TCP
        
        # Environment variables from ConfigMaps and Secrets
        envFrom:
        - configMapRef:
            name: medication-service-config
        - configMapRef:
            name: medication-service-db-config
        - configMapRef:
            name: medication-service-redis-config
        - configMapRef:
            name: medication-service-external-config
        - configMapRef:
            name: medication-service-monitoring-config
        - secretRef:
            name: medication-service-secrets
        
        # Additional environment variables
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CONTAINER_MEMORY_LIMIT
          valueFrom:
            resourceFieldRef:
              resource: limits.memory
        - name: CONTAINER_CPU_LIMIT
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu
        
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        # Resource limits and requests
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "512Mi"
            cpu: "500m"
            ephemeral-storage: "2Gi"
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
        - name: logs
          mountPath: /app/logs
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: migrations
          mountPath: /app/migrations
          readOnly: true
        - name: tls-certs
          mountPath: /app/certs
          readOnly: true
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8005
            scheme: HTTPS
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8005
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        
        # Startup probe for initial startup
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8005
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 12  # Allow 2 minutes for startup
          successThreshold: 1
        
        # Lifecycle hooks
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - sleep 15  # Allow time for connections to drain
      
      # Sidecar container for log shipping
      - name: fluent-bit
        image: fluent/fluent-bit:2.1
        ports:
        - containerPort: 2020
          name: metrics
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
          readOnly: true
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc
          readOnly: true
        - name: tmp
          mountPath: /tmp
      
      # Volumes
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 100Mi
      - name: cache
        emptyDir:
          sizeLimit: 500Mi
      - name: logs
        emptyDir:
          sizeLimit: 1Gi
      - name: config
        configMap:
          name: medication-service-config
          defaultMode: 0444
      - name: migrations
        configMap:
          name: migration-scripts
          defaultMode: 0555
      - name: tls-certs
        secret:
          secretName: medication-service-tls
          defaultMode: 0400
      - name: fluent-bit-config
        configMap:
          name: fluent-bit-config
          defaultMode: 0444
      
      # DNS configuration
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
        - name: ndots
          value: "2"
        - name: edns0
      
      # Termination grace period
      terminationGracePeriodSeconds: 60
      
      # Image pull secrets
      imagePullSecrets:
      - name: cardiofit-registry-secret
      
      # Priority class for healthcare workloads
      priorityClassName: healthcare-critical

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medication-service-v2-hpa
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medication-service-v2
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: custom_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 60

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: medication-service-v2-pdb
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: pdb
spec:
  minAvailable: 2  # Always maintain at least 2 pods
  selector:
    matchLabels:
      app: medication-service-v2
      component: api-server

---
# Vertical Pod Autoscaler
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: medication-service-v2-vpa
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medication-service-v2
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: medication-service
      maxAllowed:
        cpu: 1
        memory: 1Gi
      minAllowed:
        cpu: 100m
        memory: 128Mi
      controlledResources: ["cpu", "memory"]