# Kubernetes Namespace for Medication Service V2
# Healthcare-grade isolation and security policies

apiVersion: v1
kind: Namespace
metadata:
  name: cardiofit-medication-v2
  labels:
    name: cardiofit-medication-v2
    environment: production
    compliance: hipaa
    security-policy: healthcare
    version: v1
  annotations:
    description: "Medication Service V2 - FHIR-compliant medication management"
    contact: "devops@cardiofit.health"
    compliance.policy/hipaa: "enabled"
    compliance.policy/soc2: "enabled"
    security.policy/network-isolation: "strict"
    security.policy/pod-security: "restricted"
    cost-center: "clinical-services"

---
# Network Policy for strict network isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medication-service-network-policy
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    security: network-policy
spec:
  podSelector:
    matchLabels:
      app: medication-service-v2
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from NGINX ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 50005
  # Allow ingress from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8005
  # Allow ingress from same namespace (inter-service communication)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 50005
  egress:
  # Allow egress to database
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow egress to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow egress to external services (Context Gateway, etc.)
  - to: []
    ports:
    - protocol: TCP
      port: 8020  # Context Gateway
    - protocol: TCP
      port: 4000  # Apollo Federation
    - protocol: TCP
      port: 8095  # Rust Engine
    - protocol: TCP
      port: 8085  # Flow2 Go Engine
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS outbound for external APIs
  - to: []
    ports:
    - protocol: TCP
      port: 443

---
# Pod Security Policy (if PSP is available)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: medication-service-psp
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    security: pod-security-policy
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: 'MustRunAsNonRoot'
  supplementalGroups:
    rule: 'MustRunAs'
    ranges:
      - min: 1
        max: 65535
  fsGroup:
    rule: 'MustRunAs'
    ranges:
      - min: 1
        max: 65535
  readOnlyRootFilesystem: true
  seLinux:
    rule: RunAsAny

---
# Resource Quota for namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: medication-service-quota
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    resource-management: quota
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    services: "10"
    secrets: "20"
    configmaps: "20"
    count/deployments.apps: "5"
    count/jobs.batch: "10"

---
# Limit Range for pod resources
apiVersion: v1
kind: LimitRange
metadata:
  name: medication-service-limits
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    resource-management: limits
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 250m
      memory: 256Mi
    type: Container
  - max:
      cpu: "2"
      memory: 2Gi
    min:
      cpu: 100m
      memory: 128Mi
    type: Container
  - max:
      storage: 100Gi
    type: PersistentVolumeClaim