# ConfigMaps for Medication Service V2
# Healthcare configuration with security and compliance

apiVersion: v1
kind: ConfigMap
metadata:
  name: medication-service-config
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: config
    version: v1
  annotations:
    description: "Main configuration for Medication Service V2"
    config.reloader.stakater.com/reload: "true"
data:
  # Service Configuration
  SERVICE_NAME: "medication-service-v2"
  SERVICE_VERSION: "1.0.0"
  SERVICE_PORT: "8005"
  GIN_MODE: "release"
  
  # Performance Configuration
  GOMAXPROCS: "4"
  GOGC: "100"
  MAX_CONCURRENT_CALCULATIONS: "100"
  REQUEST_TIMEOUT_SECONDS: "30"
  
  # Cache Configuration
  CACHE_ENABLED: "true"
  CACHE_L1_SIZE: "1000"
  CACHE_L1_TTL_MINUTES: "5"
  CACHE_L2_TTL_HOURS: "1"
  CACHE_PROMOTION_THRESHOLD: "3"
  CACHE_DEMOTION_TIMEOUT_MINUTES: "15"
  CACHE_ENCRYPTION_ENABLED: "true"
  CACHE_AUDIT_ENABLED: "true"
  CACHE_PERFORMANCE_OPT: "true"
  CACHE_OPTIMIZE_FOR_LATENCY: "true"
  CACHE_HOT_CACHE_SIZE: "500"
  CACHE_HOT_CACHE_TTL_MINUTES: "10"
  CACHE_ANALYTICS_ENABLED: "true"
  CACHE_MONITORING_ENABLED: "true"
  CACHE_WARMUP_ENABLED: "true"
  CACHE_WARMUP_INTERVAL_MINUTES: "15"
  
  # Healthcare & Compliance Configuration
  HIPAA_COMPLIANCE: "true"
  CLINICAL_AUDIT_ENABLED: "true"
  MANDATORY_DOUBLE_CHECK: "true"
  REQUIRE_SUPERVISOR_APPROVAL: "false"
  
  # Monitoring & Observability
  PROMETHEUS_ENABLED: "true"
  METRICS_ENABLED: "true"
  LOG_LEVEL: "info"
  
  # Feature Flags
  ENABLE_RECIPE_CACHING: "true"
  ENABLE_SNAPSHOT_VALIDATION: "true"
  ENABLE_CLINICAL_INTELLIGENCE: "true"
  ENABLE_SAFETY_CHECKS: "true"
  ENABLE_AUDIT_LOGGING: "true"
  
  # Rate Limiting
  RATE_LIMIT_REQUESTS_PER_MINUTE: "100"
  RATE_LIMIT_BURST: "10"
  RATE_LIMIT_CLINICAL_REQUESTS_PER_MINUTE: "50"
  
  # TLS Configuration
  TLS_ENABLED: "true"
  TLS_CERT_PATH: "/app/certs/tls.crt"
  TLS_KEY_PATH: "/app/certs/tls.key"

---
# Database Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: medication-service-db-config
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: database
    version: v1
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "medication_v2"
  DB_USER: "medication_user"
  DB_SSLMODE: "require"
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME_MINUTES: "30"

---
# Redis Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: medication-service-redis-config
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: cache
    version: v1
data:
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_MAX_RETRIES: "3"
  REDIS_POOL_SIZE: "10"
  REDIS_MIN_IDLE_CONNS: "2"

---
# External Services Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: medication-service-external-config
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: external-services
    version: v1
data:
  CONTEXT_GATEWAY_URL: "http://context-gateway-service:8020"
  APOLLO_FEDERATION_URL: "http://apollo-federation-service:4000/graphql"
  RUST_ENGINE_URL: "http://rust-engine-service:8095"
  FLOW2_GO_ENGINE_URL: "http://flow2-go-engine-service:8085"
  SAFETY_GATEWAY_URL: "http://safety-gateway-service:8030"
  KB_DRUG_RULES_URL: "http://kb-drug-rules-service:8086"
  KB_GUIDELINES_URL: "http://kb-guidelines-service:8089"
  FHIR_SERVER_URL: "https://healthcare.googleapis.com/v1/projects/cardiofit-prod/locations/us-central1/datasets/clinical-data/fhirStores/medication-store/fhir"
  CLINICAL_DECISION_SUPPORT_URL: "http://clinical-decision-support-service:8090"
  DRUG_DATABASE_URL: "https://api.fda.gov"

---
# Logging Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: medication-service-logging-config
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: logging
    version: v1
data:
  logging.yaml: |
    level: info
    format: json
    output: stdout
    fields:
      service: medication-service-v2
      version: "1.0.0"
      environment: production
    audit:
      enabled: true
      level: info
      output: /var/log/audit.log
      retention_days: 90
    healthcare:
      phi_logging: false
      compliance_logging: true
      security_events: true
    structured_logging:
      enabled: true
      include_caller: true
      include_stack_trace: true
    sampling:
      initial: 100
      thereafter: 100

---
# Monitoring Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: medication-service-monitoring-config
  namespace: cardiofit-medication-v2
  labels:
    app: medication-service-v2
    component: monitoring
    version: v1
data:
  JAEGER_ENDPOINT: "http://jaeger-collector:14268/api/traces"
  JAEGER_SAMPLER_TYPE: "probabilistic"
  JAEGER_SAMPLER_PARAM: "0.1"
  OTEL_EXPORTER_JAEGER_ENDPOINT: "http://jaeger-collector:14268/api/traces"
  OTEL_SERVICE_NAME: "medication-service-v2"
  OTEL_SERVICE_VERSION: "1.0.0"
  PROMETHEUS_METRICS_PATH: "/metrics"
  PROMETHEUS_METRICS_PORT: "8005"

---
# PostgreSQL Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: cardiofit-medication-v2
  labels:
    app: postgres
    component: database
data:
  postgresql.conf: |
    # Connection Settings
    listen_addresses = '*'
    port = 5432
    max_connections = 200
    
    # Memory Settings
    shared_buffers = 256MB
    effective_cache_size = 1GB
    work_mem = 4MB
    maintenance_work_mem = 64MB
    
    # Checkpoint Settings
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    
    # Query Planner Settings
    default_statistics_target = 100
    random_page_cost = 1.1
    
    # Logging Settings
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_statement = 'mod'
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    
    # Security Settings
    ssl = on
    ssl_cert_file = '/etc/ssl/certs/server.crt'
    ssl_key_file = '/etc/ssl/private/server.key'
    ssl_ca_file = '/etc/ssl/certs/ca.crt'
    password_encryption = scram-sha-256
    
    # HIPAA Compliance Settings
    log_statement = 'all'
    log_min_messages = warning
    audit_log_destination = 'syslog'

---
# Redis Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: cardiofit-medication-v2
  labels:
    app: redis
    component: cache
data:
  redis.conf: |
    # Network
    bind 0.0.0.0
    port 6379
    tcp-keepalive 60
    timeout 300
    
    # Memory
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    
    # Persistence
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    
    # Security
    requirepass ${REDIS_PASSWORD}
    rename-command FLUSHDB ""
    rename-command FLUSHALL ""
    rename-command DEBUG ""
    rename-command CONFIG ""
    
    # Logging
    loglevel notice
    syslog-enabled yes
    syslog-ident redis-medication-v2