# Production Docker Compose for Medication Service V2
# Healthcare-grade deployment with security, monitoring, and compliance

version: '3.8'

networks:
  cardiofit-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  monitor-network:
    driver: bridge
  database-network:
    driver: bridge
    internal: true  # Database network isolated from external access

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      device: /opt/cardiofit/data/postgres
      o: bind
  redis-data:
    driver: local
    driver_opts:
      type: none
      device: /opt/cardiofit/data/redis
      o: bind
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  jaeger-data:
    driver: local

services:
  # Main Application Service
  medication-service-v2:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.production
      args:
        SERVICE_VERSION: "${SERVICE_VERSION:-1.0.0}"
        BUILD_DATE: "${BUILD_DATE}"
        VCS_REF: "${VCS_REF}"
    image: cardiofit/medication-service-v2:${SERVICE_VERSION:-latest}
    container_name: medication-service-v2-prod
    restart: always
    environment:
      - SERVICE_NAME=medication-service-v2
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - SERVICE_PORT=8005
      - GIN_MODE=release
      - DATABASE_URL=postgresql://medication_user:${DB_PASSWORD}@postgres:5432/medication_v2?sslmode=require
      - REDIS_URL=redis://redis:6379/0
      - CONTEXT_GATEWAY_URL=http://context-gateway:8020
      - APOLLO_FEDERATION_URL=http://apollo-federation:4000/graphql
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - PROMETHEUS_ENABLED=true
      - LOG_LEVEL=info
      - HIPAA_COMPLIANCE=true
      - CLINICAL_AUDIT_ENABLED=true
      - TLS_ENABLED=true
      - TLS_CERT_PATH=/app/certs/server.crt
      - TLS_KEY_PATH=/app/certs/server.key
    ports:
      - "8005:8005"
      - "50005:50005"
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
    networks:
      - cardiofit-network
      - database-network
      - monitor-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD", "/app/medication-service-v2", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # PostgreSQL Database - Production Configuration
  postgres:
    image: postgres:15-alpine
    container_name: medication-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: medication_v2
      POSTGRES_USER: medication_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - database-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medication_user -d medication_v2"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

  # Redis Cache - Production Configuration
  redis:
    image: redis:7-alpine
    container_name: medication-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - database-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus - Monitoring
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: medication-prometheus-prod
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://prometheus:9090'
    networks:
      - monitor-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
    security_opt:
      - no-new-privileges:true

  # Grafana - Dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: medication-grafana-prod
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - monitor-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
    security_opt:
      - no-new-privileges:true

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.49
    container_name: medication-jaeger-prod
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    volumes:
      - jaeger-data:/badger
    networks:
      - monitor-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

  # NGINX - SSL Termination & Load Balancing
  nginx:
    image: nginx:1.25-alpine
    container_name: medication-nginx-prod
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - cardiofit-network
    depends_on:
      - medication-service-v2
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    security_opt:
      - no-new-privileges:true

  # Log Aggregation - Fluent Bit
  fluent-bit:
    image: fluent/fluent-bit:2.1
    container_name: medication-fluent-bit-prod
    restart: always
    volumes:
      - ./logging/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./logs:/logs:ro
      - /var/log:/var/log:ro
    networks:
      - monitor-network
    depends_on:
      - medication-service-v2
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  # Security Scanner - Trivy
  trivy-scanner:
    image: aquasec/trivy:0.45.0
    container_name: medication-trivy-scanner
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./security/trivy-reports:/reports
    command: >
      image --format json --output /reports/security-scan-$(date +%Y%m%d).json
      cardiofit/medication-service-v2:${SERVICE_VERSION:-latest}
    networks:
      - monitor-network
    profiles:
      - security-scan

  # Backup Service
  backup:
    image: postgres:15-alpine
    container_name: medication-backup-prod
    restart: "no"
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: ["/bin/sh", "/backup.sh"]
    networks:
      - database-network
    depends_on:
      - postgres
    profiles:
      - backup