# Helm Chart for Medication Service V2
# Healthcare-grade Kubernetes package manager configuration

apiVersion: v2
name: medication-service-v2
description: |
  Medication Service V2 - FHIR-compliant medication management service
  with Recipe & Snapshot architecture, healthcare-grade security, and HIPAA compliance.
  
  Features:
  - Recipe Resolver service with clinical intelligence
  - Context Gateway integration for real-time decision support  
  - 4-Phase Workflow orchestration (Validation, Resolution, Calculation, Snapshot)
  - Rust Clinical Engine integration for high-performance rule evaluation
  - Apollo Federation GraphQL client for seamless API composition
  - Multi-level caching with encryption and audit logging
  - Healthcare compliance monitoring and security hardening
  - High availability with auto-scaling and disaster recovery
  
  This chart deploys the complete medication service stack including:
  - Application services with multiple replicas
  - PostgreSQL database cluster with SSL/TLS
  - Redis cache cluster with persistence
  - Monitoring stack (Prometheus, Grafana, Jaeger)
  - Security scanning and compliance validation
  - Backup and disaster recovery services

type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - healthcare
  - fhir
  - medication
  - clinical
  - hipaa
  - compliance
  - microservices

home: https://github.com/clinical-synthesis-hub/cardiofit
sources:
  - https://github.com/clinical-synthesis-hub/cardiofit/tree/main/backend/services/medication-service-v2
  - https://docs.cardiofit.health/medication-service-v2

maintainers:
  - name: Clinical Synthesis Hub DevOps Team
    email: devops@cardiofit.health
    url: https://cardiofit.health
  - name: Healthcare Platform Team
    email: platform@cardiofit.health
    url: https://platform.cardiofit.health

annotations:
  # Helm annotations
  helm.sh/hook-weight: "0"
  helm.sh/resource-policy: keep
  
  # Category and marketplace annotations
  category: Healthcare
  marketplace: Healthcare Applications
  
  # Compliance annotations
  compliance.healthcare/hipaa: "true"
  compliance.healthcare/soc2: "true"
  compliance.healthcare/iso27001: "true"
  security.policy/level: "high"
  
  # OpenShift certifications
  charts.openshift.io/name: medication-service-v2
  charts.openshift.io/provider: Clinical Synthesis Hub
  charts.openshift.io/supportURL: https://support.cardiofit.health
  
  # Artifact Hub annotations
  artifacthub.io/category: healthcare
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changes: |
    - kind: added
      description: Recipe Resolver service with clinical intelligence
    - kind: added  
      description: Context Gateway integration for real-time decision support
    - kind: added
      description: 4-Phase Workflow orchestration system
    - kind: added
      description: Rust Clinical Engine integration for high-performance rules
    - kind: added
      description: Apollo Federation GraphQL client
    - kind: added
      description: Multi-level caching with HIPAA-compliant encryption
    - kind: added
      description: Healthcare-grade monitoring and observability
    - kind: added
      description: Security hardening and vulnerability scanning
    - kind: security
      description: HIPAA compliance validation and audit logging
    - kind: security
      description: SSL/TLS encryption for all communications
  artifacthub.io/crds: |
    - kind: MedicationServiceV2
      version: v1
      name: medicationservicesv2.healthcare.cardiofit.io
      displayName: Medication Service V2
      description: Custom resource for managing medication service instances
  artifacthub.io/crdsExamples: |
    - apiVersion: healthcare.cardiofit.io/v1
      kind: MedicationServiceV2
      metadata:
        name: medication-service-prod
      spec:
        replicas: 3
        environment: production
        compliance:
          hipaa: true
          soc2: true
        database:
          replicas: 3
          storage: 100Gi
        cache:
          replicas: 3
          memory: 1Gi
  
  # Security scanning results
  security.scan/trivy: "passed"
  security.scan/snyk: "passed" 
  security.scan/falco: "compliant"
  
  # Performance benchmarks
  performance.benchmark/latency-p99: "<250ms"
  performance.benchmark/throughput: ">1000rps"
  performance.benchmark/availability: "99.9%"

# Chart dependencies for sub-charts
dependencies:
  - name: postgresql
    version: "12.12.10"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
    tags:
      - database
    import-values:
      - child: auth.postgresPassword
        parent: postgresql.auth.postgresPassword
      - child: auth.database
        parent: postgresql.auth.database

  - name: redis
    version: "18.1.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
    tags:
      - cache
    import-values:
      - child: auth.password
        parent: redis.auth.password

  - name: prometheus
    version: "25.8.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.prometheus.enabled
    tags:
      - monitoring

  - name: grafana
    version: "7.0.11"
    repository: "https://grafana.github.io/helm-charts"
    condition: monitoring.grafana.enabled
    tags:
      - monitoring
      - dashboard

  - name: jaeger
    version: "0.71.14"
    repository: "https://jaegertracing.github.io/helm-charts"
    condition: monitoring.jaeger.enabled
    tags:
      - monitoring
      - tracing

  - name: cert-manager
    version: "1.13.2"
    repository: "https://charts.jetstack.io"
    condition: security.certManager.enabled
    tags:
      - security
      - certificates

  - name: external-secrets
    version: "0.9.11"
    repository: "https://charts.external-secrets.io"
    condition: security.externalSecrets.enabled
    tags:
      - security
      - secrets

  - name: falco
    version: "4.0.0"
    repository: "https://falcosecurity.github.io/charts"
    condition: security.falco.enabled
    tags:
      - security
      - monitoring

# Engine requirements
kubeVersion: ">=1.25.0-0"
engine: gotpl