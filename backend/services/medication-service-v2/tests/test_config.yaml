# Medication Service V2 - Comprehensive Test Configuration

# Performance Targets
performance:
  end_to_end_target_ms: 250
  recipe_resolution_target_ms: 10
  clinical_engine_target_ms: 50
  target_rps: 1000
  memory_limit_mb: 512
  cache_improvement_percent: 30

# Test Coverage Requirements  
coverage:
  unit_tests_target: 90
  integration_tests_target: 85
  overall_target: 85
  exclude_files:
    - "*_test.go"
    - "*/mocks/*"
    - "*/testsetup/*"

# Test Database Configuration
database:
  host: "localhost"
  port: "5434"
  user: "test_user"
  password: "test_password"
  name: "medication_service_test"
  sslmode: "disable"
  connection_pool_size: 10
  max_idle_connections: 5

# Test Redis Configuration
redis:
  host: "localhost"
  port: "6381"
  password: ""
  db: 0
  pool_size: 20
  max_retries: 3
  min_idle_conns: 5

# External Service Configuration for Testing
external_services:
  rust_engine:
    enabled: false # Use mock by default
    host: "localhost"
    port: "8095"
    timeout_ms: 5000
  
  apollo_federation:
    enabled: false # Use mock by default
    host: "localhost"
    port: "4000"
    timeout_ms: 3000
  
  context_gateway:
    enabled: false # Use mock by default
    host: "localhost"
    port: "8020"
    timeout_ms: 2000

# Test Suite Configurations
test_suites:
  unit:
    timeout: "5m"
    parallel: true
    race_detection: true
    coverage: true
    tags: ""
    
  integration:
    timeout: "15m"
    parallel: false
    race_detection: true
    coverage: true
    tags: "integration"
    requires_database: true
    requires_redis: true
    
  performance:
    timeout: "30m"
    parallel: false
    race_detection: false
    coverage: false
    tags: "performance"
    requires_database: true
    requires_redis: true
    requires_optimized_setup: true
    
  clinical:
    timeout: "10m"
    parallel: true
    race_detection: true
    coverage: false
    tags: "clinical"
    requires_database: true
    
  security:
    timeout: "10m"
    parallel: true
    race_detection: true
    coverage: false
    tags: "security"
    requires_database: true

# Clinical Test Data
clinical_test_data:
  patients:
    adult_standard:
      age: 45
      weight_kg: 70.0
      height_cm: 175.0
      gender: "female"
      bsa_m2: 1.8
    
    pediatric:
      age: 8
      weight_kg: 25.0
      height_cm: 120.0
      gender: "male"
      bsa_m2: 0.95
    
    renal_impaired:
      age: 65
      weight_kg: 80.0
      height_cm: 180.0
      gender: "male"
      egfr: 45.0
      creatinine_mg_dl: 2.1
    
    pregnant:
      age: 28
      weight_kg: 65.0
      height_cm: 165.0
      gender: "female"
      pregnancy_status: true

  medications:
    vincristine:
      drug_name: "Vincristine"
      generic_name: "vincristine sulfate"
      drug_class: "Vinca alkaloid"
      max_dose_mg: 2.0
      calculation_method: "bsa_based"
      dose_per_m2: 1.4

# Security Test Configuration
security:
  jwt_test_secret: "test-secret-key-for-jwt-testing-only"
  token_expiry: "1h"
  test_users:
    admin:
      user_id: "admin-user"
      username: "admin"
      roles: ["admin", "clinician"]
      scopes: ["medication:read", "medication:write", "medication:admin"]
    
    clinician:
      user_id: "clinician-user"
      username: "dr-smith"
      roles: ["clinician"]
      scopes: ["medication:read", "medication:write"]
    
    readonly:
      user_id: "readonly-user"
      username: "readonly"
      roles: ["viewer"]
      scopes: ["medication:read"]

# FHIR Compliance Test Configuration
fhir:
  version: "R4"
  base_url: "http://test-fhir-server/fhir"
  required_resources:
    - "MedicationRequest"
    - "Patient"
    - "Practitioner"
    - "Medication"
  
  validation_rules:
    - "status_values_valid"
    - "intent_values_valid"
    - "subject_reference_present"
    - "medication_concept_present"
    - "dosage_instruction_valid"

# Load Testing Configuration
load_testing:
  concurrent_users: 50
  test_duration: "30s"
  ramp_up_time: "10s"
  think_time_ms: 100
  
  scenarios:
    medication_proposal_creation:
      weight: 70
      endpoint: "/api/v1/medication-proposals"
      method: "POST"
    
    proposal_validation:
      weight: 20
      endpoint: "/api/v1/medication-proposals/{id}/validate"
      method: "POST"
    
    proposal_retrieval:
      weight: 10
      endpoint: "/api/v1/medication-proposals/{id}"
      method: "GET"

# Monitoring and Alerting for Tests
monitoring:
  collect_metrics: true
  metric_collectors:
    - "prometheus"
    - "custom"
  
  alert_thresholds:
    response_time_p95_ms: 300
    error_rate_percent: 1.0
    memory_usage_mb: 600
    cpu_usage_percent: 80

# Test Reporting Configuration
reporting:
  formats:
    - "junit"
    - "json"
    - "html"
  
  output_directory: "./test-results"
  
  include_sections:
    - "summary"
    - "coverage"
    - "performance_metrics"
    - "failed_tests"
    - "security_scan_results"
    - "clinical_validation_results"

# Environment-Specific Overrides
environments:
  ci:
    timeout_multiplier: 1.5
    parallel_execution: true
    coverage_required: true
    external_services:
      rust_engine:
        enabled: true
      apollo_federation:
        enabled: true
      context_gateway:
        enabled: true
  
  local:
    timeout_multiplier: 1.0
    parallel_execution: true
    coverage_required: false
    external_services:
      rust_engine:
        enabled: false
      apollo_federation:
        enabled: false
      context_gateway:
        enabled: false