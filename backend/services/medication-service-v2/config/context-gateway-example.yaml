# Context Gateway Integration Configuration Example
# This file shows how to configure the Context Gateway integration for Medication Service V2

service:
  name: "medication-service-v2"
  version: "1.0.0"
  port: "8005"

server:
  http:
    port: "8005"
    host: "0.0.0.0"
    read_timeout: "30s"
    write_timeout: "30s"
    idle_timeout: "120s"
  grpc:
    port: "50005"
    host: "0.0.0.0"

# External services configuration
external_services:
  context_gateway:
    url: "http://localhost:8020"
    timeout: "30s"
    max_retries: 3
    circuit_breaker:
      enabled: true
      max_requests: 3
      interval: "60s"
      timeout: "10s"
      failure_threshold: 0.6
  
  apollo_federation:
    url: "http://localhost:4000/graphql"
    timeout: "15s"
    max_retries: 2
  
  rust_engine:
    url: "http://localhost:8095"
    timeout: "10s"
    max_retries: 3
    
  flow2_go_engine:
    url: "http://localhost:8085"
    timeout: "20s"
    max_retries: 2
    
  safety_gateway:
    url: "http://localhost:8030"
    timeout: "25s"
    max_retries: 3

# Context Gateway Service Configuration
context_gateway:
  # Snapshot creation settings
  default_snapshot_ttl: "24h"
  snapshot_creation_timeout: "30s"
  
  # Retry configuration
  max_retries: 3
  retry_backoff_multiplier: 2.0
  initial_retry_delay: "1s"
  
  # Quality settings
  min_required_quality_score: 0.7
  required_fields:
    - "demographics"
    - "medications"
    - "allergies"
  optional_fields:
    - "vital_signs"
    - "lab_results"
    - "conditions"
    - "procedures"
    - "observations"
  
  # Performance settings
  enable_async_snapshot_creation: false
  snapshot_creation_workers: 5
  
  # Validation settings
  enable_snapshot_validation: true
  validation_level: "standard"  # minimal, standard, comprehensive
  
  # Data freshness requirements by field type
  freshness_requirements:
    demographics: "168h"      # 7 days - patient demographics change infrequently
    vital_signs: "4h"         # 4 hours - vital signs need to be recent
    lab_results: "24h"        # 24 hours - lab results valid for a day
    medications: "1h"         # 1 hour - medication changes need immediate reflection
    allergies: "720h"         # 30 days - allergies are relatively stable
    conditions: "168h"        # 7 days - conditions change slowly
    procedures: "72h"         # 3 days - procedure history relevance
    observations: "12h"       # 12 hours - clinical observations

# Context Integration Workflow Configuration
context_integration:
  # Workflow control
  enable_snapshot_creation: true
  auto_create_snapshots: true
  snapshot_creation_mode: "sync"  # Options: sync, async, conditional
  
  # Performance settings
  max_concurrent_snapshots: 10
  snapshot_creation_timeout: "30s"
  
  # Quality gates
  min_resolution_quality: 0.6      # Minimum recipe resolution quality to proceed
  require_validated_snapshots: false  # Set to true for production environments
  
  # Error handling
  continue_on_snapshot_failure: true   # Continue workflow even if snapshot fails
  retry_failed_snapshots: true        # Retry failed snapshot creation
  
  # Snapshot lifecycle management
  enable_snapshot_supersession: true   # Allow creating new snapshots to replace old ones
  cleanup_superseded_snapshots: false # Auto-cleanup superseded snapshots (set to true for prod)

# Recipe Resolver Configuration (existing)
recipe_resolver:
  cache_enabled: true
  cache_ttl: "10m"
  default_ttl: "1h"
  max_recipe_size: 1048576  # 1MB
  validation_level: "strict"

# Database configuration
database:
  url: "postgresql://user:password@localhost:5432/medication_service_v2"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "1h"
  conn_max_idle_time: "30m"

# Redis configuration
redis:
  url: "redis://localhost:6379"
  password: ""
  db: 0
  pool_size: 10
  max_retries: 3
  dial_timeout: "5s"

# Clinical Engine configuration
clinical_engine:
  rust_engine_url: "http://localhost:8095"
  timeout: "30s"
  max_retries: 3
  max_concurrent_requests: 100
  performance_targets:
    end_to_end_latency_p95: "250ms"
    recipe_resolution: "10ms"
    snapshot_creation: "100ms"
    clinical_calculations: "50ms"
    target_throughput_rps: 1000

# Knowledge Bases configuration
knowledge_bases:
  drug_rules_url: "http://localhost:8086"
  guidelines_url: "http://localhost:8089"
  apollo_federation_url: "http://localhost:4000/graphql"
  cache_enabled: true
  cache_ttl: "30m"

# Monitoring configuration
monitoring:
  enabled: true
  metrics_path: "/metrics"
  health_path: "/health"
  jaeger_endpoint: "http://localhost:14268/api/traces"
  sample_rate: 0.1

# Logging configuration
logging:
  level: "info"
  format: "json"
  development: false
  audit_trail:
    enabled: true
    log_path: "./logs/audit.log"
    max_size: 100  # MB
    max_backups: 30
    max_age: 90    # days

# Performance configuration
performance:
  max_concurrent_calculations: 100
  cache_ttl: "300s"
  snapshot_expiry_hours: 24
  connection_pooling:
    max_idle_conns: 10
    max_open_conns: 100
    conn_max_lifetime: "1h"