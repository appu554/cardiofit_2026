# Rust Clinical Engine Configuration
# This file configures the integration between the Go medication service
# and the high-performance Rust Clinical Engine

# Connection Settings
base_url: "http://localhost:8090"
health_check_url: "/health"
metrics_url: "/metrics"
timeout: "5s"

# Retry Settings
max_retries: 3
retry_delay: "100ms"
exponential_backoff: true

# Performance Settings
max_concurrent_requests: 100
request_timeout: "2s"
keep_alive: "30s"

# Feature Flags
enable_caching: true
enable_metrics: true
enable_health_checks: true
enable_tracing: true

# Performance Targets (microsecond response times)
performance_targets:
  drug_interaction_analysis: "50ms"   # Target: <50ms for drug interaction analysis
  dosage_calculation: "30ms"          # Target: <30ms for dosage calculations
  safety_validation: "75ms"           # Target: <75ms for safety validation
  rule_evaluation: "40ms"             # Target: <40ms for clinical rule evaluation
  health_check: "500ms"               # Target: <500ms for health checks
  metrics_retrieval: "1s"             # Target: <1s for metrics collection

# Service Endpoints
endpoints:
  # Core clinical operations
  drug_interactions: "/api/v1/drug-interactions"
  dosage_calculation: "/api/v1/dosage-calculation"
  safety_validation: "/api/v1/safety-validation"
  rule_evaluation: "/api/v1/evaluate-rules"
  
  # Batch processing endpoints
  batch_drug_interactions: "/api/v1/batch/drug-interactions"
  batch_dosage_calculation: "/api/v1/batch/dosage-calculation"
  batch_safety_validation: "/api/v1/batch/safety-validation"
  
  # Management endpoints
  health: "/health"
  metrics: "/metrics"
  status: "/status"
  version: "/version"
  
  # Advanced clinical intelligence
  clinical_intelligence: "/api/v1/clinical-intelligence"
  risk_assessment: "/api/v1/risk-assessment"
  recommendation_engine: "/api/v1/recommendations"

# Circuit Breaker Configuration
circuit_breaker:
  enabled: true
  failure_threshold: 5     # Open circuit after 5 consecutive failures
  success_threshold: 3     # Close circuit after 3 consecutive successes
  timeout: "30s"           # Time to wait before retrying in open state
  max_requests: 10         # Max requests allowed in half-open state
  interval: "10s"          # Interval to check for recovery

# Clinical Calculation Service Configuration
clinical_calculation_service:
  enable_caching: true
  cache_expiration_time: "10m"
  max_concurrent_requests: 100
  default_timeout: "2s"
  
  performance_targets:
    drug_interaction_analysis: "50ms"
    dosage_calculation: "30ms"
    safety_validation: "75ms"
    rule_evaluation: "40ms"

# Monitoring Configuration
monitoring:
  health_check_interval: "30s"
  metrics_collection_interval: "60s"
  health_cache_expiration: "10s"
  alert_on_failure_count: 5
  enable_performance_logging: true
  
  performance_alert_threshold:
    drug_interactions: "100ms"     # Alert if response time > 100ms
    dosage_calculation: "75ms"     # Alert if response time > 75ms
    safety_validation: "150ms"     # Alert if response time > 150ms
    rule_evaluation: "100ms"       # Alert if response time > 100ms

# Environment-Specific Configurations

# Development Environment Overrides
development:
  base_url: "http://localhost:8090"
  performance_targets:
    drug_interaction_analysis: "100ms"  # More lenient in development
    dosage_calculation: "75ms"
    safety_validation: "150ms"
    rule_evaluation: "100ms"
  enable_performance_logging: true
  circuit_breaker:
    enabled: false  # Disable circuit breaker in development

# Staging Environment Overrides
staging:
  base_url: "http://rust-engine-staging:8090"
  performance_targets:
    drug_interaction_analysis: "75ms"   # Moderate targets for staging
    dosage_calculation: "50ms"
    safety_validation: "100ms"
    rule_evaluation: "75ms"
  enable_tracing: true
  circuit_breaker:
    enabled: true
    failure_threshold: 3

# Production Environment Overrides
production:
  base_url: "http://rust-engine-prod:8090"
  performance_targets:
    drug_interaction_analysis: "25ms"   # Aggressive targets for production
    dosage_calculation: "15ms"
    safety_validation: "40ms"
    rule_evaluation: "20ms"
  max_concurrent_requests: 200
  enable_caching: true
  enable_metrics: true
  enable_tracing: false  # Disable detailed tracing in production for performance
  
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    success_threshold: 3
    timeout: "60s"  # Longer timeout in production
  
  monitoring:
    health_check_interval: "15s"      # More frequent health checks
    metrics_collection_interval: "30s" # More frequent metrics collection
    alert_on_failure_count: 3         # Alert sooner in production

# Security Configuration (if required)
security:
  enable_tls: false
  tls_cert_path: ""
  tls_key_path: ""
  api_key: ""
  enable_api_key_auth: false

# Logging Configuration
logging:
  level: "info"
  enable_request_logging: true
  enable_response_logging: false  # Disable to avoid logging sensitive data
  enable_performance_logging: true
  log_format: "json"

# Feature Flags for Advanced Functionality
feature_flags:
  enable_batch_processing: true
  enable_advanced_analytics: true
  enable_predictive_modeling: false  # Future feature
  enable_machine_learning_optimization: false  # Future feature

# Cache Configuration
cache:
  type: "memory"  # Options: memory, redis
  redis_url: ""   # Only if type is redis
  default_expiration: "5m"
  cleanup_interval: "10m"
  max_entries: 10000

# Metrics Export Configuration
metrics_export:
  enabled: true
  endpoint: "/metrics"
  format: "prometheus"  # Options: prometheus, json
  include_histograms: true
  include_counters: true
  include_gauges: true

# Health Check Configuration
health_checks:
  startup_delay: "5s"
  shutdown_timeout: "30s"
  readiness_check_interval: "5s"
  liveness_check_interval: "30s"

# Resource Limits
resource_limits:
  max_memory_usage: "500MB"
  max_cpu_usage: "80%"
  max_open_connections: 100
  connection_pool_size: 20

# Error Handling Configuration
error_handling:
  max_retry_attempts: 3
  base_retry_delay: "100ms"
  max_retry_delay: "5s"
  jitter: true
  circuit_breaker_recovery_timeout: "60s"

# Quality Assurance Settings
quality_assurance:
  minimum_confidence_threshold: 0.8
  enable_validation_checks: true
  enable_data_integrity_checks: true
  enable_performance_regression_detection: true

# Compliance and Audit Settings
compliance:
  enable_audit_logging: true
  audit_log_level: "info"
  enable_data_privacy_filtering: true
  enable_hipaa_compliance_mode: true
  log_retention_days: 90

# Integration Testing Configuration
testing:
  mock_mode: false
  test_data_path: "./testdata"
  enable_integration_tests: true
  test_timeout: "30s"
  performance_test_iterations: 100