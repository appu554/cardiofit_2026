# Storage configuration
storage:
  tsdb:
    # Healthcare compliance: 30 days local retention
    retention: "30d"
    retention.size: "10GB"
    # Enable compression for healthcare data efficiency
    wal-compression: true

# Healthcare-specific recording rules for efficient querying
recording_rules:
  - name: medication_service_aggregations
    interval: 30s
    rules:
      # SLA calculations
      - record: medication_service:availability:5m
        expr: avg_over_time(up{job="medication-service-v2"}[5m])
        
      - record: medication_service:latency_p95:5m
        expr: histogram_quantile(0.95, rate(medication_service_http_request_duration_seconds_bucket[5m]))
        
      - record: medication_service:error_rate:5m
        expr: rate(medication_service_errors_total[5m]) / rate(medication_service_http_requests_total[5m])
        
      # Business metrics aggregations
      - record: medication_service:proposals_per_minute:5m
        expr: rate(medication_service_proposals_total[5m]) * 60
        
      - record: medication_service:clinical_processing_p95:5m
        expr: histogram_quantile(0.95, rate(medication_service_clinical_calculation_duration_seconds_bucket[5m]))
        
      # Safety metrics
      - record: medication_service:safety_violations:1h
        expr: increase(medication_service_safety_violations_total[1h])
        
      - record: medication_service:dosage_accuracy:5m
        expr: avg(medication_service_dosage_calculation_accuracy)
        
      # Data quality metrics
      - record: medication_service:data_freshness:5m
        expr: avg(medication_service_clinical_data_freshness_score)
        
  # Infrastructure aggregations
  - name: infrastructure_aggregations
    interval: 30s
    rules:
      - record: medication_service:cpu_usage:5m
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
        
      - record: medication_service:memory_usage:5m
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
        
      - record: medication_service:disk_usage:5m
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100

