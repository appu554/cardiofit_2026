# Vancomycin (Glycopeptide Antibiotic) - AUC-Targeted Model
# Version: 2.1.0
# Evidence: IDSA-2020, ASHP-2020, Rybak-2020
# Classification: COMPILED MODEL (AUC-targeted dosing with PK parameters)

[meta]
drug_id = "vancomycin"
name = "Vancomycin"
generic_name = "vancomycin"
version = "2.1.0"
calculation_strategy = "custom_model_vancomycin_auc"  # Routes to compiled model
therapeutic_class = ["glycopeptide", "antibiotic"]
mechanism_of_action = ["cell_wall_synthesis_inhibition"]
evidence = ["IDSA-2020", "ASHP-2020", "Rybak-2020"]
last_updated = "2025-01-18T00:00:00Z"
clinical_reviewer = "Dr. Jennifer Kim, PharmD"
clinical_reviewer_id = "JK98765"
approval_date = "2025-01-18"
next_review_date = "2026-01-18"

[validation]
# Self-validation rules for model-based calculation
min_dose_possible = 500.0
max_dose_possible = 4000.0
incompatible_conditions = ["vancomycin_allergy", "severe_hearing_loss"]

[hard_contraindications]
allergy_codes = ["GLYCOPEPTIDE", "VANCOMYCIN"]
severe_hearing_loss = true

[hepatic]
# Vancomycin not significantly metabolized by liver
max_child_pugh = "C"    # Allow in all hepatic impairment levels

[renal]
# Critical renal adjustments - nephrotoxicity risk
bands = [
  { min = 0,   max = 14, action = "block", reason = "eGFR < 15: contraindicated due to accumulation risk" },
  { min = 15,  max = 29, action = "model_adjust", target_auc = 300, reason = "Severe CKD: reduce target AUC" },
  { min = 30,  max = 59, action = "model_adjust", target_auc = 400, reason = "Moderate CKD: standard target AUC" },
  { min = 60,  max = 300, action = "allow", target_auc = 500, reason = "Normal renal function: standard target" }
]
egfr_metric = "crcl_or_egfr"  # Prefer CrCl for vancomycin

[dose_limits]
absolute_max_mg_per_dose = 2000
absolute_min_mg_per_dose = 500
max_mg_per_day = 4000

[duplicate_class]
class_id = "GLYCOPEPTIDE"
block_combination = false  # Can combine with other antibiotics
flag_severity = "minor"

[qt_rules]
applies = false  # Vancomycin doesn't typically prolong QT

# AUC-Targeted Model Parameters
[model_parameters]
target_auc_default = 500.0  # mg*h/L for serious infections
target_auc_range = [400.0, 600.0]
population_clearance_l_h = 4.0
population_volume_l = 70.0
population_half_life_h = 6.0

# PK Parameter Adjustments
[pk_adjustments]
# Clearance adjustment based on renal function
clearance_renal_factor = true
# Volume adjustment based on weight
volume_weight_factor = true
# Age-related changes
elderly_clearance_reduction = 0.15  # 15% reduction in elderly

[monitoring_requirements]
# TDM requirements for vancomycin
trough_target_range = [10.0, 20.0]  # mg/L
peak_avoid = true  # AUC-based dosing doesn't require peaks
frequency = "steady_state"  # Monitor at steady state (day 3-5)

[clinical_info]
default_route = "iv"
default_frequency = "q12h"
default_duration = "infection_dependent"
special_instructions = [
    "Monitor renal function daily",
    "Check hearing baseline and during therapy",
    "Infuse over 60-90 minutes minimum",
    "Monitor for red man syndrome",
    "TDM required for optimal dosing"
]

[[alternatives]]
drug_id = "linezolid"
name = "Linezolid"
rationale = "MRSA alternative if vancomycin intolerant"
relative_efficacy = 0.90

[[alternatives]]
drug_id = "daptomycin"
name = "Daptomycin"
rationale = "Alternative for complicated skin infections"
relative_efficacy = 0.95

# Clinical Notes:
# - This drug uses COMPILED MODEL calculation because:
#   * Complex AUC-targeted dosing
#   * Individual PK parameter estimation required
#   * Non-linear dose-response relationship
#   * TDM integration needed
# - Target AUC 400-600 mg*h/L for serious infections
# - Monitor renal function and hearing
# - Avoid rapid infusion (red man syndrome)
# - TDM essential for optimization
