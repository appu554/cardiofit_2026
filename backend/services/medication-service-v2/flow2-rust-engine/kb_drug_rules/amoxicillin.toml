# Amoxicillin (Beta-lactam Antibiotic) - Weight-Based Dosing
# Version: 1.5.0
# Evidence: AAP-2021, IDSA-2019, FDA-Label-2024
# Classification: RULE-BASED (Weight-based with age adjustments)

[meta]
drug_id = "amoxicillin"
name = "Amoxicillin"
generic_name = "amoxicillin"
version = "1.5.0"
calculation_strategy = "standard_rules"  # Rule-based calculation
therapeutic_class = ["beta_lactam", "penicillin", "antibiotic"]
mechanism_of_action = ["cell_wall_synthesis_inhibition"]
evidence = ["AAP-2021", "IDSA-2019", "FDA-Label-2024"]
last_updated = "2025-01-18T00:00:00Z"
clinical_reviewer = "Dr. Michael Rodriguez, MD"
clinical_reviewer_id = "MR54321"
approval_date = "2025-01-18"
next_review_date = "2026-01-18"

[validation]
# Self-validation rules for weight-based calculation
min_dose_possible = 125.0
max_dose_possible = 4000.0
incompatible_conditions = ["penicillin_allergy", "severe_diarrhea"]

[hard_contraindications]
allergy_codes = ["PENICILLIN", "BETA_LACTAM"]
severe_gi_disease = false  # Relative contraindication only

[hepatic]
# Amoxicillin generally safe in hepatic impairment
max_child_pugh = "C"    # Allow in all hepatic impairment levels

[renal]
# Renal dose adjustments for amoxicillin
bands = [
  { min = 0,   max = 14, action = "cap", max_dose_mg_per_day = 1000, min_interval_h = 24, reason = "Severe CKD: reduce dose and extend interval" },
  { min = 15,  max = 29, action = "cap", max_dose_mg_per_day = 1500, min_interval_h = 12, reason = "Moderate-severe CKD: moderate reduction" },
  { min = 30,  max = 59, action = "cap", max_dose_mg_per_day = 2000, min_interval_h = 8, reason = "Mild-moderate CKD: slight reduction" },
  { min = 60,  max = 300, action = "allow", reason = "Normal renal function" }
]
egfr_metric = "crcl_or_egfr"

[dose_limits]
absolute_max_mg_per_day = 4000
absolute_min_mg = 125

[duplicate_class]
class_id = "BETA_LACTAM"
block_combination = false  # Can combine with other antibiotics
flag_severity = "minor"

[qt_rules]
applies = false  # Amoxicillin doesn't affect QT interval

# Rule-Based Dose Calculation Rules
[calculation_rules]
[calculation_rules.base_dose]
default_mg = 500.0
calculation_method = "weight_based"
weight_factor_mg_per_kg = 25.0  # Standard 25 mg/kg/day

[calculation_rules.weight_adjustment]
enabled = true
reference_weight_kg = 70.0
min_weight_kg = 5.0   # Pediatric minimum
max_weight_kg = 150.0
# Weight-based dosing - no adjustment factor needed (direct calculation)

[calculation_rules.age_adjustment]
enabled = true
pediatric_age_threshold = 18
pediatric_weight_factor_mg_per_kg = 45.0  # Higher dose for children
adult_weight_factor_mg_per_kg = 25.0     # Standard adult dose
elderly_age_threshold = 65
elderly_dose_reduction_factor = 1.0      # No reduction needed for amoxicillin

[calculation_rules.indication_specific]
[calculation_rules.indication_specific.otitis_media]
weight_factor_mg_per_kg = 45.0  # Higher dose for otitis media
frequency_per_day = 2
max_dose_mg_per_day = 2000.0

[calculation_rules.indication_specific.pneumonia]
weight_factor_mg_per_kg = 50.0  # Higher dose for pneumonia
frequency_per_day = 3
max_dose_mg_per_day = 3000.0

[calculation_rules.indication_specific.uti]
weight_factor_mg_per_kg = 25.0  # Standard dose for UTI
frequency_per_day = 3
max_dose_mg_per_day = 1500.0

[calculation_rules.indication_specific.skin_infection]
weight_factor_mg_per_kg = 25.0  # Standard dose
frequency_per_day = 3
max_dose_mg_per_day = 2000.0

[clinical_info]
default_route = "oral"
default_frequency = "tid"
default_duration = "7-10_days"
special_instructions = [
    "Take with or without food",
    "Complete full course even if feeling better",
    "Report severe diarrhea immediately",
    "Shake suspension well before use",
    "Store suspension in refrigerator"
]

[[alternatives]]
drug_id = "azithromycin"
name = "Azithromycin"
rationale = "Macrolide alternative if penicillin allergy"
relative_efficacy = 0.85

[[alternatives]]
drug_id = "cephalexin"
name = "Cephalexin"
rationale = "Cephalosporin alternative (use with caution if penicillin allergy)"
relative_efficacy = 0.90

# Clinical Notes:
# - This drug uses RULE-BASED calculation because:
#   * Straightforward weight-based dosing
#   * Linear dose-response relationship
#   * Well-established pediatric and adult dosing
#   * Simple renal adjustments
# - Higher doses needed for respiratory infections
# - Monitor for C. diff with prolonged use
# - Safe in pregnancy (Category B)
# - Adjust dose for renal impairment
