syntax = "proto3";

package flow2;

option go_package = "medication-service-v2/internal/grpc/flow2pb";

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Flow2 Engine Service - Main gRPC service for medication intelligence
service Flow2Engine {
  // Execute a medication recipe with clinical context
  rpc ExecuteRecipe(RecipeExecutionRequest) returns (RecipeExecutionResponse);

  // Optimize medication dosing based on patient parameters
  rpc OptimizeDose(DoseOptimizationRequest) returns (DoseOptimizationResponse);

  // Perform comprehensive medication intelligence analysis
  rpc AnalyzeMedication(MedicationIntelligenceRequest) returns (MedicationIntelligenceResponse);

  // Execute Flow2 workflow for complex clinical decisions
  rpc ExecuteFlow2(Flow2Request) returns (Flow2Response);

  // Health check for service availability
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // Stream patient updates for real-time monitoring
  rpc StreamPatientUpdates(stream PatientUpdateRequest) returns (stream ClinicalAlert);
}

// Core request/response messages

message RecipeExecutionRequest {
  string request_id = 1;
  string recipe_id = 2;
  string patient_id = 3;
  string medication_code = 4;
  google.protobuf.Struct clinical_context = 5;
  string snapshot_id = 6;
  map<string, string> metadata = 7;
}

message RecipeExecutionResponse {
  string request_id = 1;
  bool success = 2;
  RecipeResult result = 3;
  repeated string errors = 4;
  google.protobuf.Timestamp timestamp = 5;
  int64 execution_time_ms = 6;
}

message RecipeResult {
  string recipe_id = 1;
  string recipe_name = 2;
  SafetyStatus safety_status = 3;
  repeated SafetyAlert alerts = 4;
  repeated ClinicalRecommendation recommendations = 5;
  google.protobuf.Struct clinical_evidence = 6;
}

message DoseOptimizationRequest {
  string request_id = 1;
  string patient_id = 2;
  string medication_code = 3;
  PatientContext patient_context = 4;
  DosePurpose purpose = 5;
  map<string, double> parameters = 6;
}

message DoseOptimizationResponse {
  string request_id = 1;
  bool success = 2;
  DoseRecommendation recommendation = 3;
  repeated SafetyAlert safety_alerts = 4;
  repeated string errors = 5;
}

message MedicationIntelligenceRequest {
  string request_id = 1;
  string patient_id = 2;
  repeated string medication_codes = 3;
  IntelligenceType intelligence_type = 4;
  AnalysisDepth analysis_depth = 5;
  PatientContext patient_context = 6;
}

message MedicationIntelligenceResponse {
  string request_id = 1;
  bool success = 2;
  MedicationAnalysis analysis = 3;
  repeated DrugInteraction interactions = 4;
  repeated SafetyAlert alerts = 5;
  repeated string errors = 6;
}

message Flow2Request {
  string request_id = 1;
  string patient_id = 2;
  string action_type = 3;
  google.protobuf.Struct parameters = 4;
  google.protobuf.Struct clinical_data = 5;
}

message Flow2Response {
  string request_id = 1;
  bool success = 2;
  google.protobuf.Any data = 3;
  repeated string errors = 4;
  map<string, string> metadata = 5;
}

// Supporting message types

message PatientContext {
  string patient_id = 1;
  double age_years = 2;
  double weight_kg = 3;
  double height_cm = 4;
  string gender = 5;
  double creatinine_clearance = 6;
  double egfr = 7;
  string hepatic_function = 8;
  string pregnancy_status = 9;
  repeated string active_conditions = 10;
  repeated string current_medications = 11;
  repeated Allergy allergies = 12;
  map<string, double> lab_values = 13;
}

message DoseRecommendation {
  double dose_value = 1;
  string dose_unit = 2;
  string route = 3;
  string frequency = 4;
  int32 duration_days = 5;
  string calculation_method = 6;
  map<string, string> calculation_factors = 7;
  repeated DoseAdjustment adjustments = 8;
}

message DoseAdjustment {
  string reason = 1;
  string adjustment_type = 2;
  double factor = 3;
  string clinical_rationale = 4;
}

message SafetyAlert {
  string alert_id = 1;
  AlertSeverity severity = 2;
  string category = 3;
  string message = 4;
  string clinical_significance = 5;
  repeated string recommended_actions = 6;
  repeated Reference evidence_references = 7;
}

message ClinicalRecommendation {
  string recommendation_id = 1;
  string type = 2;
  string description = 3;
  Priority priority = 4;
  string rationale = 5;
  repeated string action_items = 6;
}

message DrugInteraction {
  string drug1_code = 1;
  string drug1_name = 2;
  string drug2_code = 3;
  string drug2_name = 4;
  InteractionSeverity severity = 5;
  string mechanism = 6;
  string clinical_effect = 7;
  string management = 8;
  repeated Reference references = 9;
}

message MedicationAnalysis {
  string medication_code = 1;
  string medication_name = 2;
  repeated SafetyConsideration safety_considerations = 3;
  PharmacokineticProfile pk_profile = 4;
  repeated TherapeuticGuideline guidelines = 5;
  repeated MonitoringRequirement monitoring = 6;
}

message SafetyConsideration {
  string type = 1;
  string description = 2;
  RiskLevel risk_level = 3;
  repeated string mitigation_strategies = 4;
}

message PharmacokineticProfile {
  double half_life_hours = 1;
  double clearance = 2;
  double volume_distribution = 3;
  string metabolism_pathway = 4;
  repeated string cyp_interactions = 5;
  double bioavailability = 6;
}

message TherapeuticGuideline {
  string condition = 1;
  string population = 2;
  DoseRange dose_range = 3;
  string monitoring_parameters = 4;
  string evidence_level = 5;
}

message DoseRange {
  double min_dose = 1;
  double max_dose = 2;
  string unit = 3;
  string frequency = 4;
}

message MonitoringRequirement {
  string parameter = 1;
  string frequency = 2;
  string target_range = 3;
  string clinical_significance = 4;
}

message Allergy {
  string allergen_code = 1;
  string allergen_name = 2;
  string reaction_type = 3;
  string severity = 4;
}

message Reference {
  string source = 1;
  string title = 2;
  string url = 3;
  string evidence_level = 4;
}

message PatientUpdateRequest {
  string patient_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  UpdateType update_type = 3;
  google.protobuf.Any update_data = 4;
}

message ClinicalAlert {
  string alert_id = 1;
  string patient_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  AlertSeverity severity = 4;
  string message = 5;
  repeated string actions = 6;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  ServiceStatus status = 1;
  string version = 2;
  map<string, string> capabilities = 3;
  google.protobuf.Timestamp timestamp = 4;
}

// Enumerations

enum SafetyStatus {
  SAFETY_STATUS_UNKNOWN = 0;
  SAFETY_STATUS_SAFE = 1;
  SAFETY_STATUS_CAUTION = 2;
  SAFETY_STATUS_WARNING = 3;
  SAFETY_STATUS_CONTRAINDICATED = 4;
}

enum AlertSeverity {
  ALERT_SEVERITY_UNKNOWN = 0;
  ALERT_SEVERITY_INFO = 1;
  ALERT_SEVERITY_LOW = 2;
  ALERT_SEVERITY_MEDIUM = 3;
  ALERT_SEVERITY_HIGH = 4;
  ALERT_SEVERITY_CRITICAL = 5;
}

enum Priority {
  PRIORITY_UNKNOWN = 0;
  PRIORITY_LOW = 1;
  PRIORITY_MEDIUM = 2;
  PRIORITY_HIGH = 3;
  PRIORITY_URGENT = 4;
}

enum InteractionSeverity {
  INTERACTION_SEVERITY_UNKNOWN = 0;
  INTERACTION_SEVERITY_MINOR = 1;
  INTERACTION_SEVERITY_MODERATE = 2;
  INTERACTION_SEVERITY_MAJOR = 3;
  INTERACTION_SEVERITY_CONTRAINDICATED = 4;
}

enum RiskLevel {
  RISK_LEVEL_UNKNOWN = 0;
  RISK_LEVEL_LOW = 1;
  RISK_LEVEL_MODERATE = 2;
  RISK_LEVEL_HIGH = 3;
  RISK_LEVEL_VERY_HIGH = 4;
}

enum IntelligenceType {
  INTELLIGENCE_TYPE_UNKNOWN = 0;
  INTELLIGENCE_TYPE_BASIC = 1;
  INTELLIGENCE_TYPE_COMPREHENSIVE = 2;
  INTELLIGENCE_TYPE_ADVANCED = 3;
}

enum AnalysisDepth {
  ANALYSIS_DEPTH_UNKNOWN = 0;
  ANALYSIS_DEPTH_SHALLOW = 1;
  ANALYSIS_DEPTH_DEEP = 2;
  ANALYSIS_DEPTH_COMPREHENSIVE = 3;
}

enum DosePurpose {
  DOSE_PURPOSE_UNKNOWN = 0;
  DOSE_PURPOSE_INITIAL = 1;
  DOSE_PURPOSE_MAINTENANCE = 2;
  DOSE_PURPOSE_LOADING = 3;
  DOSE_PURPOSE_TITRATION = 4;
}

enum UpdateType {
  UPDATE_TYPE_UNKNOWN = 0;
  UPDATE_TYPE_VITAL_SIGNS = 1;
  UPDATE_TYPE_LAB_RESULTS = 2;
  UPDATE_TYPE_MEDICATION_CHANGE = 3;
  UPDATE_TYPE_CONDITION_CHANGE = 4;
}

enum ServiceStatus {
  SERVICE_STATUS_UNKNOWN = 0;
  SERVICE_STATUS_HEALTHY = 1;
  SERVICE_STATUS_DEGRADED = 2;
  SERVICE_STATUS_UNAVAILABLE = 3;
}