# Warfarin Drug-Drug Interaction Rules
# Clinical Evidence Level: A (High Quality)
# Last Updated: 2025-01-15

[meta]
rule_pack_id = "warfarin_ddi"
version = "2.1.0"
drug_class = "anticoagulant"
last_updated = "2025-01-15"

[[interactions]]
drug_a = "warfarin"
drug_b = "amiodarone"
severity = "Major"
mechanism = "CYP2C9 inhibition"
clinical_effect = "Significantly increased INR and bleeding risk"
management = "Reduce warfarin dose by 25-50%, monitor INR closely"
evidence_level = "A"

[[interactions]]
drug_a = "warfarin"
drug_b = "fluconazole"
severity = "Major"
mechanism = "CYP2C9 inhibition"
clinical_effect = "Markedly increased anticoagulation"
management = "Reduce warfarin dose, monitor INR every 2-3 days"
evidence_level = "A"

[[interactions]]
drug_a = "warfarin"
drug_b = "rifampin"
severity = "Major"
mechanism = "CYP2C9 induction"
clinical_effect = "Significantly decreased anticoagulation"
management = "May need to increase warfarin dose by 2-5x"
evidence_level = "A"

[[interactions]]
drug_a = "warfarin"
drug_b = "aspirin"
severity = "Major"
mechanism = "Additive antiplatelet effect"
clinical_effect = "Severe bleeding risk"
management = "Avoid combination or use lowest effective doses"
evidence_level = "A"

[[interactions]]
drug_a = "warfarin"
drug_b = "acetaminophen"
severity = "Moderate"
mechanism = "Unknown mechanism"
clinical_effect = "Increased INR with chronic high-dose use"
management = "Monitor INR if >2g/day for >1 week"
evidence_level = "B"

[[interactions]]
drug_a = "warfarin"
drug_b = "omeprazole"
severity = "Moderate"
mechanism = "CYP2C19 interaction"
clinical_effect = "Possible increased anticoagulation"
management = "Monitor INR when starting/stopping PPI"
evidence_level = "B"

[[interactions]]
drug_a = "warfarin"
drug_b = "vitamin_k"
severity = "Major"
mechanism = "Direct antagonism"
clinical_effect = "Reversal of anticoagulation"
management = "Avoid high vitamin K foods, use for reversal"
evidence_level = "A"

[[interactions]]
drug_a = "warfarin"
drug_b = "cranberry_juice"
severity = "Moderate"
mechanism = "Possible CYP2C9 inhibition"
clinical_effect = "Potential increased bleeding risk"
management = "Avoid large quantities, monitor INR"
evidence_level = "C"
