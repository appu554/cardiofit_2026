# Amoxicillin - Pediatric Weight-Based Dosing

# Top-level monitoring requirements (required by schema)
monitoring_requirements = []


[meta]
drug_id = "amoxicillin"
generic_name = "Amoxicillin"
brand_names = ["Amoxil", "Trimox", "Moxatag"]
drug_class = "Penicillin Antibiotic"
indication = "Bacterial infections, otitis media, pneumonia"
route = "PO"
calculation_type = "rule_based"
version = "1.0.0"
last_updated = "2024-01-15"
clinical_reviewer = "Dr. Clinical Pharmacist"
evidence_sources = ["FDA-2021", "Penicillin-Guidelines"]

[dose_calculation]

[dose_calculation.base_dose]
default_mg = 250.0
calculation_method = "weight_based"
weight_factor_mg_per_kg = 25.0
bsa_factor_mg_per_m2 = 500.0

[dose_calculation.dose_limits]
absolute_min_mg = 125.0
absolute_max_mg = 3000.0
max_mg_per_kg = 50.0
max_mg_per_day = 3000.0

[[dose_calculation.weight_adjustment.bands]]
min_kg = 0.0
max_kg = 10.0
factor = 1.2
action = "multiply"

[[dose_calculation.weight_adjustment.bands]]
min_kg = 10.1
max_kg = 40.0
factor = 1.0
action = "multiply"

[[dose_calculation.weight_adjustment.bands]]
min_kg = 40.1
max_kg = 100.0
factor = 0.8
action = "multiply"

[[dose_calculation.age_adjustment.bands]]
min_years = 0
max_years = 2
factor = 1.1
action = "multiply"

[[dose_calculation.age_adjustment.bands]]
min_years = 3
max_years = 12
factor = 1.0
action = "multiply"

[[dose_calculation.age_adjustment.bands]]
min_years = 13
max_years = 18
factor = 0.9
action = "multiply"

[[dose_calculation.age_adjustment.bands]]
min_years = 19
max_years = 120
factor = 0.7
action = "multiply"

# Renal adjustment for amoxicillin
[dose_calculation.renal_adjustment]
bands = [
    { min_egfr = 0.0, max_egfr = 30.0, multiplier = 0.5, frequency_adjustment = "q12h" },
    { min_egfr = 30.1, max_egfr = 60.0, multiplier = 0.75, frequency_adjustment = "q8h" },
    { min_egfr = 60.1, max_egfr = 999.0, multiplier = 1.0, frequency_adjustment = "q8h" }
]

# Safety verification
[safety_verification]
[safety_verification.absolute_contraindications]
pregnancy = false
breastfeeding = false
allergy_classes = ["penicillin", "beta_lactam"]
conditions = ["anaphylaxis_history"]

# Optional: baseline monitoring in safety section
[[safety_verification.monitoring_requirements]]
lab_test = "renal_function"
frequency = "every_48_hours"
action_on_alert = "dose_adjust_or_hold"
reason = "Dose adjustment required in renal impairment"


[safety_verification.renal_safety]
[[safety_verification.renal_safety.bands]]
min_egfr = 0.0
max_egfr = 30.0
action = "dose_reduce"
dose_multiplier = 0.5
monitoring_required = ["renal_function_q48h"]
reason = "Renal impairment: dose reduction required"
evidence = ["FDA-2021", "Penicillin-Guidelines"]

[[safety_verification.renal_safety.bands]]
min_egfr = 30.1
max_egfr = 999.0
action = "proceed"
reason = "Normal renal function"
evidence = ["FDA-2021", "Penicillin-Guidelines"]

# Allergy screening
[safety_verification.allergies]
screen_for = [
    "penicillin_allergy",
    "beta_lactam_allergy",
    "amoxicillin_allergy"
]

# Drug interactions
[[safety_verification.interactions.major]]
interacting_drug_classes = ["methotrexate"]
action = "monitor_closely"
reason = "Increased methotrexate toxicity risk"

[[safety_verification.interactions.moderate]]
interacting_drug_classes = ["warfarin", "oral_contraceptives"]
action = "monitor_closely"
monitoring_required = ["INR", "contraceptive_efficacy"]
reason = "May affect anticoagulation and contraceptive efficacy"

# Contraindications
[safety_verification.contraindications]
absolute = [
    "penicillin_allergy",
    "amoxicillin_allergy",
    "severe_beta_lactam_allergy"
]
relative = [
    "mononucleosis",

# Monitoring requirements (unified section already provided under safety_verification)

    "lymphocytic_leukemia"
]

# Monitoring requirements
[safety_verification.monitoring]
required = [
    "Clinical response assessment",
    "Allergy monitoring",
    "GI tolerance assessment"
]

# Clinical notes
[clinical_notes]
notes = [
    "Take with food to reduce GI upset",
    "Complete full course even if feeling better",
    "Monitor for allergic reactions",
    "Rash common with viral infections"
]

[[alternatives]]
drug_id = "azithromycin"
name = "Azithromycin"
rationale = "Macrolide alternative if penicillin allergy"
relative_efficacy = 0.85

[[alternatives]]
drug_id = "cephalexin"
name = "Cephalexin"
rationale = "Cephalosporin alternative (use with caution if penicillin allergy)"
relative_efficacy = 0.90
