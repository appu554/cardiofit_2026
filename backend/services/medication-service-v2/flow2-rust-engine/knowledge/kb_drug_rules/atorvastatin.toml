# Atorvastatin - Unified Clinical Engine Knowledge Base
# HMG-CoA reductase inhibitor for dyslipidemia

[meta]
drug_id = "atorvastatin"
generic_name = "atorvastatin"
version = "1.0.0"
evidence_sources = ["AHA-CHOL-2024", "ACC-ASCVD-2024", "FDA-Label-2024"]
last_updated = "2025-08-16"
clinical_reviewer = "Dr. Clinical AI"
calculation_strategy = "standard_rules"
therapeutic_class = ["statin", "hmg_coa_reductase_inhibitor"]

# Dose calculation rules
[dose_calculation]

[dose_calculation.base_dose]
default_mg = 20.0
calculation_method = "indication_based"
weight_factor_mg_per_kg = 0.3
bsa_factor_mg_per_m2 = 12.0

[dose_calculation.dose_limits]
absolute_min_mg = 10.0
absolute_max_mg = 80.0
max_mg_per_kg = 1.2
max_mg_per_day = 80.0

# Weight adjustment bands
[[dose_calculation.weight_adjustment.bands]]
min_kg = 40.0
max_kg = 70.0
factor = 0.8
action = "multiply"

[[dose_calculation.weight_adjustment.bands]]
min_kg = 70.1
max_kg = 100.0
factor = 1.0
action = "multiply"

[[dose_calculation.weight_adjustment.bands]]
min_kg = 100.1
max_kg = 150.0
factor = 1.2
action = "multiply"

# Age adjustment bands
[[dose_calculation.age_adjustment.bands]]
min_years = 18
max_years = 64
factor = 1.0
action = "multiply"

[[dose_calculation.age_adjustment.bands]]
min_years = 65
max_years = 120
factor = 0.9
action = "multiply"

# Indication-specific dosing
[dose_calculation.indication_specific.primary_prevention]
base_dose_mg = 20.0
weight_factor = 0.3
max_dose_mg = 40.0

[dose_calculation.indication_specific.secondary_prevention]
base_dose_mg = 40.0
weight_factor = 0.4
max_dose_mg = 80.0

[dose_calculation.indication_specific.familial_hypercholesterolemia]
base_dose_mg = 40.0
weight_factor = 0.5
max_dose_mg = 80.0

# Safety verification rules
[safety_verification]

[safety_verification.absolute_contraindications]
pregnancy = true  # Contraindicated in pregnancy
breastfeeding = true  # Contraindicated during breastfeeding
allergy_classes = ["statin", "hmg_coa_reductase_inhibitor"]
conditions = ["active_liver_disease", "unexplained_elevated_transaminases"]

# Renal safety bands (statins generally safe in renal impairment)
[[safety_verification.renal_safety.bands]]
min_egfr = 0.0
max_egfr = 29.0
action = "proceed"
reason = "Statins safe in renal impairment, no dose adjustment needed"
evidence = ["FDA-Label-2024", "KDIGO-CKD-2022"]

[[safety_verification.renal_safety.bands]]
min_egfr = 30.0
max_egfr = 999.0
action = "proceed"
reason = "Normal dosing for all levels of renal function"
evidence = ["FDA-Label-2024"]

# Hepatic safety
[[safety_verification.hepatic_safety.child_pugh_restrictions]]
class = "A"
action = "contraindicated"

# Drug interactions
[[safety_verification.interactions.major]]
interacting_drug_classes = ["strong_cyp3a4_inhibitors"]
action = "dose_cap"
max_dose_mg_per_day = 20.0
reason = "Strong CYP3A4 inhibitors increase atorvastatin levels"

[[safety_verification.interactions.major]]
interacting_drug_classes = ["gemfibrozil"]
action = "contraindicated"
reason = "High risk of rhabdomyolysis"

[[safety_verification.interactions.moderate]]
interacting_drug_classes = ["warfarin"]
action = "monitor_closely"
monitoring_required = ["inr", "pt_ptt"]
reason = "May potentiate anticoagulant effect"

# Monitoring requirements within safety verification
[[safety_verification.monitoring_requirements]]
lab_test = "alt"
frequency = "baseline_then_as_needed"
alert_threshold_high = 120.0
action_on_alert = "discontinuation"
reason = "Monitor for hepatotoxicity"

[[safety_verification.monitoring_requirements]]
lab_test = "cpk"
frequency = "baseline_then_as_needed"
alert_threshold_high = 1000.0
action_on_alert = "discontinuation"
reason = "Monitor for rhabdomyolysis"

# Top-level monitoring requirements
[[monitoring_requirements]]
lab_test = "alt"
frequency = "baseline_then_as_needed"
alert_threshold_high = 120.0  # 3x ULN
action_on_alert = "discontinuation"
reason = "Monitor for hepatotoxicity"

[[monitoring_requirements]]
lab_test = "ast"
frequency = "baseline_then_as_needed"
alert_threshold_high = 120.0  # 3x ULN
action_on_alert = "discontinuation"
reason = "Monitor for hepatotoxicity"

[[monitoring_requirements]]
lab_test = "cpk"
frequency = "baseline_then_as_needed"
alert_threshold_high = 1000.0  # 10x ULN
action_on_alert = "discontinuation"
reason = "Monitor for myopathy/rhabdomyolysis"

[[monitoring_requirements]]
lab_test = "ldl_cholesterol"
frequency = "every_6_weeks_initially_then_quarterly"
target_value = 70.0  # mg/dL for secondary prevention
action_on_alert = "dose_adjustment"
reason = "Monitor therapeutic response"

[[monitoring_requirements]]
lab_test = "muscle_symptoms"
frequency = "every_visit"
action_on_alert = "discontinuation"
reason = "Monitor for myalgia, myopathy, or rhabdomyolysis symptoms"
