[meta]
drug_id = "warfarin"
generic_name = "warfarin"
version = "1.0.0"
evidence_sources = ["IWPC-2009", "Gage-2008", "FDA-2017"]
last_updated = "2025-01-15"
clinical_reviewer = "Dr. Clinical Pharmacist"
calculation_strategy = "standard_rules"
therapeutic_class = ["anticoagulant", "vitamin_k_antagonist"]

[dose_calculation]

[dose_calculation.base_dose]
default_mg = 5.0
calculation_method = "fixed"

[dose_calculation.dose_limits]
absolute_min_mg = 1.0
absolute_max_mg = 15.0
max_mg_per_day = 15.0

[dose_calculation.interaction_adjustments]
amiodarone_factor = 0.7
rifampin_factor = 1.5

[safety_verification]
monitoring_requirements = []

[safety_verification.absolute_contraindications]
pregnancy = true
breastfeeding = false
allergy_classes = ["coumarin", "warfarin"]
conditions = ["active_bleeding", "hemorrhagic_stroke"]

[safety_verification.interactions]

[[safety_verification.interactions.major]]
interacting_drug_classes = ["amiodarone", "fluconazole", "metronidazole"]
action = "avoid_concurrent_use"
duration_hours = 24
reason = "Significantly increases INR and bleeding risk"

[[safety_verification.interactions.moderate]]
interacting_drug_classes = ["atorvastatin", "omeprazole", "acetaminophen"]
action = "monitor_closely"
duration_hours = 12
monitoring_required = ["inr_more_frequent"]
reason = "May affect warfarin metabolism"

[[monitoring_requirements]]
lab_test = "inr"
frequency = "every_2_days_until_stable_then_monthly"
target_min = 2.0
target_max = 3.0
action_on_alert = "dose_adjustment"
reason = "Therapeutic monitoring"


