# Insulin Glargine (Basal Insulin) Safety Rules
# Version: 1.1.0
# Evidence: ADA-SOC-2025, FDA-Label-2024, AACE-2024

[meta]
drug_id = "insulin_glargine"
version = "1.1.0"
evidence = ["ADA-SOC-2025", "FDA-Label-2024", "AACE-2024"]

[hard_contraindications]
pregnancy = false  # Safe in pregnancy, preferred over oral agents
allergy_codes = ["INSULIN", "INSULIN_GLARGINE"]

[hepatic]
# Insulin metabolism may be altered in severe hepatic impairment
max_child_pugh = "C"

[renal]
# Insulin clearance reduced in CKD - increased hypoglycemia risk
bands = [
  { min = 0,   max = 29, action = "cap", max_dose_mg = 0.8, reason = "Severe CKD: reduce dose 20-50% due to decreased insulin clearance" },
  { min = 30,  max = 44, action = "cap", max_dose_mg = 0.9, reason = "Moderate CKD: reduce dose 10-25%, monitor closely" },
  { min = 45,  max = 300, action = "allow", reason = "Normal renal function" }
]
egfr_metric = "crcl_or_egfr"

# Note: Insulin doses are typically in units, not mg
# These dose_mg values represent dose reduction factors (0.8 = 80% of original dose)
[dose_limits]
absolute_max_mg_per_day = 2.0  # Max 200% of calculated dose
absolute_min_mg = 0.1          # Min 10% of calculated dose

[duplicate_class]
class_id = "BASAL_INSULIN"
block_combination = true  # Only one basal insulin at a time
flag_severity = "major"

[qt_rules]
applies = false

# Insulin-specific safety rules
[hypoglycemia_rules]
# Recent severe hypoglycemia
recent_severe_hypo_days = 14
dose_reduction_factor = 0.8  # Reduce by 20%

# A1c near target with recent hypoglycemia
a1c_target_threshold = 7.0
a1c_near_target_threshold = 7.5

# Hypoglycemia unawareness
hypo_unawareness_dose_reduction = 0.7  # Reduce by 30%

[special_rules]
# Sick day management
sick_day_monitoring = true

# Exercise adjustments
exercise_dose_reduction = true

# Alcohol interaction
alcohol_hypoglycemia_risk = true

# Injection site rotation
lipodystrophy_prevention = true

# Storage requirements
temperature_stability = "2-8C_unopened_room_temp_28days_opened"

# Clinical Notes:
# - Doses are in units (U), not mg - this TOML uses factors for calculation
# - Peak action: minimal (peakless profile)
# - Duration: 24 hours
# - Timing: same time daily, preferably bedtime
# - Monitor for hypoglycemia, especially overnight
# - Adjust based on fasting glucose patterns
# - Reduce dose with recent severe hypoglycemia
# - Safe in pregnancy (preferred over oral agents)
# - Injection site rotation important
# - Store unopened in refrigerator, opened at room temp up to 28 days
