# Clinical Context Recipe: Medication Prescribing (Pessimistic Pattern)
# Implements the ratified design for comprehensive medication prescribing context
# Approved by Clinical Governance Board for production use

recipe_id: "medication_prescribing_v2"
recipe_name: "Medication Prescribing Context"
version: "2.0"
clinical_scenario: "medication_ordering"
workflow_category: "command_initiated"
execution_pattern: "pessimistic"

# Performance requirements
sla_ms: 40  # Context gathering budget from 250ms total workflow budget
cache_duration_seconds: 180
real_data_only: true
mock_data_detection: true

# Required data points for medication prescribing
required_data_points:
  - name: "patient_demographics"
    source_type: "patient_service"
    fields: ["age", "weight", "height", "gender", "date_of_birth"]
    required: true
    max_age_hours: 24
    quality_threshold: 0.95
    timeout_ms: 8000
    retry_count: 2
    fallback_sources: ["fhir_store"]

  - name: "current_medications"
    source_type: "medication_service"
    fields: ["medication_name", "dosage", "frequency", "start_date", "interactions", "status"]
    required: true
    max_age_hours: 1
    quality_threshold: 0.90
    timeout_ms: 12000
    retry_count: 2
    fallback_sources: ["fhir_store"]

  - name: "allergies"
    source_type: "allergy_service"
    fields: ["allergen", "reaction_type", "severity", "cross_reactions", "onset_date"]
    required: true
    max_age_hours: 168  # 1 week
    quality_threshold: 0.85
    timeout_ms: 8000
    retry_count: 2
    fallback_sources: ["patient_service", "fhir_store"]

  - name: "medical_history"
    source_type: "condition_service"
    fields: ["condition_name", "icd_code", "status", "onset_date", "severity"]
    required: true
    max_age_hours: 72
    quality_threshold: 0.80
    timeout_ms: 10000
    retry_count: 2
    fallback_sources: ["fhir_store"]

  - name: "provider_context"
    source_type: "context_service_internal"
    fields: ["provider_id", "specialty", "prescribing_authority", "dea_number"]
    required: true
    max_age_hours: 8
    quality_threshold: 0.95
    timeout_ms: 5000
    retry_count: 1
    fallback_sources: []

  - name: "formulary_context"
    source_type: "medication_service"
    fields: ["formulary_id", "coverage_status", "prior_auth_required", "alternatives"]
    required: false
    max_age_hours: 24
    quality_threshold: 0.70
    timeout_ms: 8000
    retry_count: 2
    fallback_sources: []

# Conditional rules for additional data requirements
conditional_rules:
  - condition: "patient.age < 18"
    description: "Pediatric patient requires additional dosing context"
    additional_data_points:
      - name: "pediatric_dosing_weight"
        source_type: "patient_service"
        fields: ["weight_kg", "bsa_m2", "age_months"]
        required: true
        max_age_hours: 24
        quality_threshold: 0.95
        timeout_ms: 5000
        retry_count: 2

  - condition: "medication.category == 'controlled_substance'"
    description: "Controlled substance requires DEA verification"
    additional_data_points:
      - name: "dea_verification"
        source_type: "context_service_internal"
        fields: ["dea_number", "expiry_date", "schedule_authority"]
        required: true
        max_age_hours: 1
        quality_threshold: 1.0
        timeout_ms: 3000
        retry_count: 1

  - condition: "patient.renal_function_impaired == true"
    description: "Renal impairment requires lab context"
    additional_data_points:
      - name: "renal_function"
        source_type: "lab_service"
        fields: ["creatinine", "egfr", "bun", "renal_status"]
        required: true
        max_age_hours: 72
        quality_threshold: 0.90
        timeout_ms: 8000
        retry_count: 2

# Quality constraints
quality_constraints:
  minimum_completeness: 0.85
  maximum_age_hours: 24
  required_fields: ["patient_demographics", "current_medications", "allergies"]
  accuracy_threshold: 0.90

# Safety requirements
safety_requirements:
  minimum_completeness_score: 0.85
  absolute_required_enforcement: "STRICT"
  preferred_data_handling: "GRACEFUL_DEGRADE"
  critical_missing_data_action: "FAIL_WORKFLOW"
  stale_data_action: "FLAG_FOR_REVIEW"
  mock_data_policy: "STRICTLY_PROHIBITED"

# Cache strategy
cache_strategy:
  l1_ttl_seconds: 180  # 3 minutes
  l2_ttl_seconds: 300  # 5 minutes
  l3_ttl_seconds: 600  # 10 minutes
  cache_key_pattern: "context:medication_prescribing:{patient_id}:{provider_id}"
  invalidation_events:
    - "clinical-data-changes.patient.medication.added"
    - "clinical-data-changes.patient.medication.updated"
    - "clinical-data-changes.patient.allergy.added"
    - "clinical-data-changes.patient.condition.updated"
    - "clinical-data-changes.patient.demographics.updated"

# Assembly rules
assembly_rules:
  parallel_execution: true
  timeout_budget_ms: 35  # 35ms of the 40ms SLA budget
  circuit_breaker_enabled: true
  retry_failed_sources: true
  validate_data_freshness: true
  enforce_quality_constraints: true

# Governance metadata
governance_metadata:
  approved_by: "Clinical Governance Board"
  approval_date: "2024-01-15T10:00:00Z"
  version: "2.0"
  effective_date: "2024-01-15T00:00:00Z"
  expiry_date: "2025-01-15T00:00:00Z"
  clinical_board_approval_id: "CGB-MED-PRESCRIBE-20240115"
  tags: ["approved", "production", "medication", "prescribing", "pessimistic"]
  change_log:
    - "v2.0: Added formulary context and enhanced conditional rules"
    - "v1.0: Initial approved version for medication prescribing workflows"

# Data source endpoints (for reference)
data_sources:
  - service: "patient_service"
    endpoint: "http://localhost:8003"
    timeout_ms: 8000
    health_check: "/health"
    protocol: "http"

  - service: "medication_service"
    endpoint: "http://localhost:8009"
    timeout_ms: 12000
    health_check: "/health"
    protocol: "http"

  - service: "allergy_service"
    endpoint: "http://localhost:8003/api/allergies"
    timeout_ms: 8000
    health_check: "/health"
    protocol: "http"

  - service: "condition_service"
    endpoint: "http://localhost:8010"
    timeout_ms: 10000
    health_check: "/health"
    protocol: "http"

  - service: "fhir_store"
    endpoint: "projects/cardiofit-905a8/locations/asia-south1/datasets/clinical-synthesis-hub/fhirStores/fhir-store"
    timeout_ms: 10000
    protocol: "google_healthcare_api"

  - service: "cae_service"
    endpoint: "localhost:8027"
    timeout_ms: 8000
    protocol: "grpc"

# Clinical decision support integration
clinical_decision_support:
  drug_interaction_checking: true
  allergy_screening: true
  dosing_validation: true
  contraindication_checking: true
  formulary_validation: true
  prior_authorization_checking: true

# Audit and compliance
audit_requirements:
  log_all_data_access: true
  track_data_sources: true
  record_assembly_time: true
  capture_safety_flags: true
  maintain_data_lineage: true
