# Clinical Context Recipe: Workflow Engine Integration Context
# Implements workflow engine integration for orchestration
# Based on ContextRecipeBook.txt specifications

recipe_id: "workflow_engine_context_v1"
recipe_name: "Workflow Engine Integration Context"
version: "1.0"
clinical_scenario: "workflow_orchestration"
workflow_category: "command_initiated"
execution_pattern: "optimistic"

# Performance requirements (Production SLA)
sla_ms: 200  # Context gathering budget
cache_duration_seconds: 300
real_data_only: true
mock_data_detection: true
mock_data_policy: "STRICTLY_PROHIBITED"

# Clinical recipe references
clinical_recipe_refs:
  - "workflow-orchestration-v1.0"

# Triggers
triggers:
  - domain: "workflow"
  - action: ["execute", "validate", "orchestrate"]
  - workflow_type: ["command_initiated", "event_triggered"]

# Required data points for workflow engine integration
required_data_points:
  - name: "workflow_execution_context"
    source_type: "workflow_engine"
    endpoint: "http://localhost:8025/api/workflows"
    fields: ["workflow_id", "workflow_type", "execution_status", "context_requirements"]
    required: true
    max_age_hours: 0  # Real-time
    quality_threshold: 0.95
    timeout_ms: 100
    retry_count: 2
    fallback_sources: []
    protocol: "http"
    critical: true

  - name: "context_service_data"
    source_type: "context_service"
    endpoint: "http://localhost:8016/api/context"
    fields: ["patient_context", "clinical_context", "safety_context"]
    required: true
    max_age_hours: 0.083  # 5 minutes
    quality_threshold: 0.90
    timeout_ms: 150
    retry_count: 2
    fallback_sources: []
    protocol: "http"
    critical: true

# Optional data points
optional_data_points:
  - name: "workflow_analytics"
    source_type: "workflow_engine"
    endpoint: "http://localhost:8025/api/analytics"
    fields: ["execution_patterns", "performance_metrics", "success_rates"]
    required: false
    max_age_hours: 24
    quality_threshold: 0.80
    timeout_ms: 100
    retry_count: 1
    fallback_sources: []
    protocol: "http"
    fallback: "skip_analytics"

# Conditional rules for additional data requirements
conditional_rules:
  - condition: "workflow.type == 'medication_prescribing'"
    description: "Medication workflow requires medication safety context"
    additional_data_points:
      - name: "medication_safety_context"
        source_type: "context_service"
        endpoint: "http://localhost:8016/api/context/medication-safety"
        fields: ["drug_interactions", "allergies", "contraindications"]
        required: true
        max_age_hours: 0.083
        quality_threshold: 0.95
        timeout_ms: 150
        retry_count: 2

  - condition: "workflow.priority == 'emergency'"
    description: "Emergency workflow requires emergency context"
    additional_data_points:
      - name: "emergency_context"
        source_type: "context_service"
        endpoint: "http://localhost:8016/api/context/emergency"
        fields: ["code_status", "emergency_medications", "critical_allergies"]
        required: true
        max_age_hours: 0
        quality_threshold: 0.98
        timeout_ms: 100
        retry_count: 1

# Quality constraints
quality_constraints:
  minimum_completeness: 0.85
  maximum_age_hours: 1
  required_fields: ["workflow_execution_context", "context_service_data"]
  accuracy_threshold: 0.90

# Safety requirements (Production)
safety_requirements:
  minimum_completeness_score: 0.85
  absolute_required_enforcement: "STRICT"
  preferred_data_handling: "GRACEFUL_DEGRADE"
  critical_missing_data_action: "FAIL_WORKFLOW"
  stale_data_action: "FLAG_FOR_REVIEW"
  mock_data_policy: "STRICTLY_PROHIBITED"

# Performance strategy
performance_strategy:
  parallelization: true
  sla_budget_ms: 200
  circuit_breaker: true
  retry_policy: "exponential_backoff"

# Cache strategy (Production L1/L2/L3)
cache_strategy:
  l1_ttl_seconds: 300    # 5 minutes
  l2_ttl_seconds: 1800   # 30 minutes
  l3_ttl_seconds: 7200   # 2 hours
  cache_key_pattern: "context:workflow:{workflow_id}:{patient_id}"
  invalidation_events:
    - "workflow.status.changed"
    - "clinical-data-changes.patient.updated"
    - "context.requirements.changed"

# Assembly rules (Production)
assembly_rules:
  parallel_execution: true
  timeout_budget_ms: 180  # 180ms of the 200ms SLA budget
  circuit_breaker_enabled: true
  retry_failed_sources: true
  validate_data_freshness: true
  enforce_quality_constraints: true
  fail_fast: false

# QoS Tier
qos_tier: "gold"
max_latency: 200
availability: "99.9%"

# Governance metadata
governance_metadata:
  approved_by: "Clinical Governance Board"
  approval_date: "2025-07-31T10:00:00Z"
  version: "1.0"
  effective_date: "2025-07-31T00:00:00Z"
  expiry_date: "2026-07-31T00:00:00Z"
  clinical_board_approval_id: "CGB-WORKFLOW-ENGINE-20250731"
  tags: ["approved", "production", "workflow", "orchestration"]
  change_log:
    - "v1.0: Initial production implementation with workflow engine integration"

# Data source endpoints (Production)
data_sources:
  - service: "workflow_engine"
    endpoint: "http://localhost:8025"
    timeout_ms: 100
    health_check: "/health"
    protocol: "http"

  - service: "context_service"
    endpoint: "http://localhost:8016"
    timeout_ms: 150
    health_check: "/health"
    protocol: "http"

# Workflow-specific configuration
workflow_configuration:
  supported_workflows:
    - "medication_prescribing"
    - "clinical_deterioration_response"
    - "routine_medication_refill"
    - "emergency_response"
    - "discharge_planning"
  
  execution_patterns:
    - "pessimistic"
    - "optimistic"
    - "digital_reflex_arc"
  
  integration_points:
    - "context_assembly"
    - "safety_validation"
    - "clinical_reasoning"
    - "outcome_tracking"

# Clinical decision support integration
clinical_decision_support:
  workflow_validation: true
  context_optimization: true
  performance_monitoring: true
  outcome_tracking: true

# Audit and compliance
audit_requirements:
  log_all_data_access: true
  track_data_sources: true
  record_assembly_time: true
  capture_safety_flags: true
  maintain_data_lineage: true
  log_workflow_decisions: true
  track_execution_patterns: true
