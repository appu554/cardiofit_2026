# gqlgen configuration for Apollo Federation
schema:
  - graph/*.graphql

exec:
  filename: graph/generated/generated.go
  package: generated

model:
  filename: graph/model/models_gen.go
  package: model

resolver:
  filename: graph/resolver.go
  package: graph
  type: Resolver

# Federation configuration
federation:
  filename: graph/generated/federation.go
  package: generated
  version: 2

# Model configuration
models:
  # Scalars
  DateTime:
    model: time.Time
  JSON:
    model: interface{}
  
  # Domain objects that should use our existing types
  WorkflowInstance:
    model: workflow-engine/graph/model.WorkflowInstance
  MedicationWorkflowResult:
    model: workflow-engine/internal/orchestration.OrchestrationResponse
  ExecutionMetrics:
    model: workflow-engine/internal/orchestration.ExecutionMetrics
  ValidationSummary:
    model: workflow-engine/internal/orchestration.ValidationSummary
  CommitSummary:
    model: workflow-engine/internal/orchestration.CommitSummary
  
  # Input types
  MedicationWorkflowInput:
    model: workflow-engine/graph/model.MedicationWorkflowInput
  WorkflowListFilters:
    model: workflow-engine/internal/services.WorkflowListFilters

# Skip generation for federation types
skip_mod_tidy: true

# Configure which fields should be generated vs custom resolved
struct_tag: json

# Autobind existing types where possible
autobind:
  - workflow-engine/internal/domain
  - workflow-engine/internal/orchestration
  - workflow-engine/internal/services
  - workflow-engine/pkg/clients

# Disable introspection in production
omit_interface_checks: false
omit_complexity: false