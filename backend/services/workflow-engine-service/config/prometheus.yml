# Prometheus configuration for Calculate > Validate > Commit Workflow monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'clinical-synthesis-hub'
    environment: 'development'

# Rules for alerting
rule_files:
  - "alert_rules.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Scrape configurations
scrape_configs:
  # Workflow Engine Service metrics
  - job_name: 'workflow-engine'
    static_configs:
      - targets: ['host.docker.internal:8050']  # Workflow engine service
    metrics_path: '/monitoring/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true

  # Safety Gateway metrics
  - job_name: 'safety-gateway'
    static_configs:
      - targets: ['host.docker.internal:8080']  # Safety Gateway
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 5s

  # Medication Service metrics
  - job_name: 'medication-service'
    static_configs:
      - targets: ['host.docker.internal:8004']  # Medication service
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 5s

  # PostgreSQL metrics (if postgres_exporter is available)
  - job_name: 'postgres'
    static_configs:
      - targets: ['host.docker.internal:9187']
    scrape_interval: 30s
    scrape_timeout: 10s

  # System metrics from node_exporter
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # Container metrics from cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # AlertManager metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    scrape_interval: 30s

# Remote write configuration (for production environments)
# remote_write:
#   - url: "https://your-prometheus-remote-write-endpoint"
#     queue_config:
#       max_samples_per_send: 1000
#       max_shards: 200
