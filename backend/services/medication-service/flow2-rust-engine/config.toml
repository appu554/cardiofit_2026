# Rust Recipe Engine Configuration
# Production-ready configuration for clinical decision support

[server]
host = "0.0.0.0"
port = 8027
workers = 4
max_connections = 1000
keep_alive_timeout = 75
request_timeout = 30

[knowledge_base]
path = "./knowledge"
auto_reload = true
cache_ttl_seconds = 3600
validation_enabled = true

[security]
enable_auth = false
api_key_header = "X-API-Key"
cors_enabled = true
cors_origins = ["*"]

[security.rate_limit]
enabled = true
max_requests = 1000
window_seconds = 60
burst_size = 100

[performance]
enable_compression = true
compression_level = 6
cache_enabled = true
cache_size_mb = 256
thread_pool_size = 8

[logging]
level = "info"
format = "json"
file_enabled = false
file_path = "logs/engine.log"
console_enabled = true

[monitoring]
metrics_enabled = true
health_check_enabled = true
tracing_enabled = true
performance_monitoring = true

[clinical]
enable_safety_checks = true
enable_drug_interactions = true
enable_dose_validation = true
enable_contraindication_checks = true
max_calculation_time_ms = 5000

[advanced_features]
enable_parallel_processing = true
enable_model_sandbox = true
enable_hot_reloading = true
enable_risk_assessment = true
enable_titration_engine = true

[database]
# Optional database configuration for caching and audit trails
enabled = false
url = "postgresql://localhost/clinical_engine"
max_connections = 10
connection_timeout = 30
