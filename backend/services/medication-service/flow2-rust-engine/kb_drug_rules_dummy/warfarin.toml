# Warfarin Drug Rules - Anticoagulation Management
# Clinical Evidence Level: A (High Quality)
# Last Updated: 2025-01-15

[meta]
drug_id = "warfarin"
generic_name = "Warfarin Sodium"
version = "3.2.0"
evidence_sources = [
    "CHEST 2012 Antithrombotic Guidelines",
    "AHA/ACC/HRS 2019 Atrial Fibrillation Guidelines",
    "ACCP 2012 Guidelines"
]
last_updated = "2025-01-15"
clinical_reviewer = "Dr. Lisa Rodriguez, MD, Hematology"

[dose_calculation]
strategy = "inr_guided_titration"

[[dose_calculation.indication_doses]]
indication = "atrial_fibrillation"
starting_dose_mg = 5.0
frequency_per_day = 1
titration_schedule = "inr_based"
max_dose_mg_per_day = 15.0

[[dose_calculation.indication_doses]]
indication = "venous_thromboembolism"
starting_dose_mg = 5.0
frequency_per_day = 1
titration_schedule = "inr_based"
max_dose_mg_per_day = 15.0

[[dose_calculation.indication_doses]]
indication = "mechanical_heart_valve"
starting_dose_mg = 5.0
frequency_per_day = 1
titration_schedule = "inr_based"
max_dose_mg_per_day = 20.0

[dose_calculation.weight_adjustments]
enabled = true
reference_weight_kg = 70.0
min_weight_kg = 40.0
max_weight_kg = 120.0
adjustment_factor_per_kg = 0.05

[dose_calculation.age_adjustments]
enabled = true

[[dose_calculation.age_adjustments.bands]]
min_age = 65
max_age = 120
dose_reduction_factor = 0.8
reason = "Increased sensitivity and bleeding risk in elderly"

[dose_calculation.renal_adjustments]
enabled = false

[dose_calculation.hepatic_adjustments]
enabled = true

[[dose_calculation.hepatic_adjustments.child_pugh_adjustments]]
class = "A"
dose_reduction_factor = 0.9
contraindicated = false

[[dose_calculation.hepatic_adjustments.child_pugh_adjustments]]
class = "B"
dose_reduction_factor = 0.7
contraindicated = false

[[dose_calculation.hepatic_adjustments.child_pugh_adjustments]]
class = "C"
dose_reduction_factor = 0.0
contraindicated = true

[safety_verification]

[safety_verification.absolute_contraindications]
pregnancy = true
breastfeeding = false
allergy_classes = ["warfarin", "coumarin"]
conditions = [
    "active_bleeding",
    "severe_hepatic_impairment",
    "recent_major_surgery",
    "intracranial_hemorrhage_history"
]

[safety_verification.hepatic_safety]

[[safety_verification.hepatic_safety.child_pugh_restrictions]]
class = "C"
action = "contraindicated"
dose_reduction_factor = 0.0

# UNIFIED STRUCTURE: Use 'interactions' instead of 'drug_interactions'
[safety_verification.interactions]

[[safety_verification.interactions.major]]
interacting_drug_classes = ["aspirin", "nsaids"]
action = "avoid_or_monitor_closely"
reason = "Significantly increased bleeding risk"

[[safety_verification.interactions.major]]
interacting_drug_classes = ["antibiotics_broad_spectrum"]
action = "monitor_inr_closely"
duration_hours = 168
reason = "Altered gut flora affects vitamin K synthesis"

[[safety_verification.interactions.moderate]]
interacting_drug_classes = ["statins"]
action = "monitor_inr"
monitoring_required = ["inr", "bleeding_signs"]
reason = "Potential CYP2C9 interaction"

[[safety_verification.monitoring_requirements]]
lab_test = "inr"
frequency = "daily_until_stable_then_weekly"
alert_threshold_low = 1.8
alert_threshold_high = 3.5
action_on_alert = "adjust_dose"
reason = "Maintain therapeutic anticoagulation"

[[safety_verification.monitoring_requirements]]
lab_test = "complete_blood_count"
frequency = "weekly_initially"
alert_threshold_low = 8.0
action_on_alert = "assess_bleeding_risk"
reason = "Monitor for bleeding complications"

[[safety_verification.monitoring_requirements]]
lab_test = "liver_function_tests"
frequency = "baseline_then_prn"
alert_threshold_high = 3.0
action_on_alert = "consider_discontinuation"
reason = "Monitor hepatic function"
