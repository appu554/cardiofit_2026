# Empagliflozin (SGLT2 Inhibitor) Safety Rules
# Version: 1.3.0
# Evidence: ADA-SOC-2025, KDIGO-CKD-2022, FDA-Label-2024

[meta]
drug_id = "empagliflozin"
version = "1.3.0"
evidence = ["ADA-SOC-2025", "KDIGO-CKD-2022", "FDA-Label-2024"]

[hard_contraindications]
pregnancy = true  # Not recommended in pregnancy
allergy_codes = ["SGLT2_INHIBITOR"]

[hepatic]
# Generally safe in hepatic impairment
max_child_pugh = "C"

[renal]
# SGLT2 inhibitors have renoprotective benefits even with reduced eGFR
bands = [
  { min = 0,   max = 19, action = "block", reason = "eGFR < 20: insufficient efficacy, increased risk" },
  { min = 20,  max = 29, action = "cap", max_dose_mg = 10, reason = "eGFR 20-29: reduced glycemic efficacy, renoprotective benefit retained" },
  { min = 30,  max = 44, action = "allow", reason = "eGFR 30-44: renoprotective benefit, monitor closely" },
  { min = 45,  max = 300, action = "allow", reason = "Normal renal function" }
]
egfr_metric = "egfr_only"

[dose_limits]
absolute_max_mg_per_day = 25
absolute_min_mg = 10

[duplicate_class]
class_id = "SGLT2_INHIBITOR"
block_combination = true  # Only one SGLT2 inhibitor at a time
flag_severity = "major"

[qt_rules]
applies = false

# SGLT2-specific safety considerations
[special_rules]
# Diabetic ketoacidosis risk factors
dka_risk_factors = [
  "type_1_diabetes",
  "recent_surgery",
  "severe_illness",
  "reduced_insulin_dose",
  "dehydration"
]

# Genital mycotic infection risk
gmi_risk_factors = [
  "history_genital_infections",
  "uncircumcised_male",
  "poor_glycemic_control"
]

# Fournier's gangrene (rare but serious)
fournier_risk_factors = [
  "male_gender",
  "diabetes_complications",
  "immunocompromised"
]

# Volume depletion risk
volume_depletion_risk = [
  "elderly",
  "loop_diuretics",
  "low_blood_pressure",
  "dehydration"
]

# Clinical Notes:
# - Monitor for DKA even with normal glucose levels
# - Educate on genital hygiene
# - Hold during acute illness/surgery
# - Benefits: cardiovascular protection, renal protection, weight loss
# - Side effects: UTIs, genital infections, volume depletion
# - Rare: Fournier's gangrene, lower limb amputation (canagliflozin)
# - Continue for renoprotection even if eGFR 20-30
