# ACE Inhibitor Drug-Drug Interaction Rules
# Clinical Evidence Level: A (High Quality)
# Last Updated: 2025-01-15

[meta]
rule_pack_id = "ace_inhibitor_ddi"
version = "1.5.0"
drug_class = "ace_inhibitor"
last_updated = "2025-01-15"

[[interactions]]
drug_a = "lisinopril"
drug_b = "potassium_chloride"
severity = "Major"
mechanism = "Additive hyperkalemia risk"
clinical_effect = "Severe hyperkalemia (K+ >5.5 mEq/L)"
management = "Avoid combination or monitor K+ closely"
evidence_level = "A"

[[interactions]]
drug_a = "lisinopril"
drug_b = "spironolactone"
severity = "Major"
mechanism = "Dual potassium retention"
clinical_effect = "Life-threatening hyperkalemia"
management = "Use with extreme caution, frequent K+ monitoring"
evidence_level = "A"

[[interactions]]
drug_a = "lisinopril"
drug_b = "ibuprofen"
severity = "Moderate"
mechanism = "Reduced renal prostaglandin synthesis"
clinical_effect = "Acute kidney injury, reduced antihypertensive effect"
management = "Monitor renal function and BP closely"
evidence_level = "A"

[[interactions]]
drug_a = "lisinopril"
drug_b = "hydrochlorothiazide"
severity = "Minor"
mechanism = "Synergistic antihypertensive effect"
clinical_effect = "Enhanced blood pressure reduction"
management = "Monitor for hypotension, beneficial combination"
evidence_level = "A"

[[interactions]]
drug_a = "enalapril"
drug_b = "lithium"
severity = "Moderate"
mechanism = "Reduced lithium clearance"
clinical_effect = "Lithium toxicity"
management = "Monitor lithium levels closely"
evidence_level = "B"

[[interactions]]
drug_a = "captopril"
drug_b = "allopurinol"
severity = "Moderate"
mechanism = "Unknown mechanism"
clinical_effect = "Increased risk of hypersensitivity reactions"
management = "Monitor for skin reactions and blood dyscrasias"
evidence_level = "C"
