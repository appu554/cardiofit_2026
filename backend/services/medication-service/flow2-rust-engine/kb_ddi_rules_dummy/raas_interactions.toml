# RAAS (Renin-Angiotensin-Aldosterone System) Drug Interactions
# Version: 1.1.0
# Evidence: ACC/AHA-HTN-2017, ESC/ESH-2018, KDIGO-CKD-2022

[meta]
id = "DDI-RAAS-001"
version = "1.1.0"
evidence = ["ACC/AHA-HTN-2017", "ESC/ESH-2018", "KDIGO-CKD-2022"]

# ACE Inhibitor + ARB combinations
[[pairs.rule]]
a_class = "ACE_INHIBITOR"
b_class = "ARB"
severity = "major"
action = "avoid_combination"
code = "DDI-ACEI-ARB"
description = "Dual RAAS blockade increases risk of hyperkalemia, hypotension, and acute kidney injury"
monitoring = "If used together: monitor K+, BP, SCr closely"

# ACE Inhibitor + ARNI combinations (contraindicated)
[[pairs.rule]]
a_class = "ACE_INHIBITOR"
b_class = "ARNI"
severity = "contraindicated"
action = "block"
code = "DDI-ACEI-ARNI"
description = "Contraindicated due to increased risk of angioedema"
washout_period_hours = 36

# ARB + ARNI combinations (contraindicated)
[[pairs.rule]]
a_class = "ARB"
b_class = "ARNI"
severity = "contraindicated"
action = "block"
code = "DDI-ARB-ARNI"
description = "Contraindicated due to increased risk of angioedema"
washout_period_hours = 36

# ACE Inhibitor + Potassium-sparing diuretics
[[pairs.rule]]
a_class = "ACE_INHIBITOR"
b_class = "POTASSIUM_SPARING_DIURETIC"
severity = "major"
action = "monitor_potassium"
code = "DDI-ACEI-K-SPARING"
description = "Increased risk of hyperkalemia"
monitoring = "Monitor serum potassium closely, especially in CKD patients"

# ARB + Potassium-sparing diuretics
[[pairs.rule]]
a_class = "ARB"
b_class = "POTASSIUM_SPARING_DIURETIC"
severity = "major"
action = "monitor_potassium"
code = "DDI-ARB-K-SPARING"
description = "Increased risk of hyperkalemia"
monitoring = "Monitor serum potassium closely, especially in CKD patients"

# ACE Inhibitor + NSAIDs
[[pairs.rule]]
a_class = "ACE_INHIBITOR"
b_class = "NSAID"
severity = "moderate"
action = "monitor_renal_function"
code = "DDI-ACEI-NSAID"
description = "Increased risk of acute kidney injury, especially in elderly or volume depleted patients"
monitoring = "Monitor renal function and blood pressure"

# ARB + NSAIDs
[[pairs.rule]]
a_class = "ARB"
b_class = "NSAID"
severity = "moderate"
action = "monitor_renal_function"
code = "DDI-ARB-NSAID"
description = "Increased risk of acute kidney injury, especially in elderly or volume depleted patients"
monitoring = "Monitor renal function and blood pressure"

# Specific drug pairs
[[pairs.rule]]
a_drug = "lisinopril"
b_drug = "losartan"
severity = "major"
action = "avoid_combination"
code = "DDI-LISINOPRIL-LOSARTAN"
description = "Specific ACE inhibitor + ARB combination - avoid dual RAAS blockade"

[[pairs.rule]]
a_drug = "lisinopril"
b_drug = "sacubitril_valsartan"
severity = "contraindicated"
action = "block"
code = "DDI-LISINOPRIL-ENTRESTO"
description = "ACE inhibitor + ARNI contraindicated - angioedema risk"
washout_period_hours = 36

# Clinical Notes:
# - Dual RAAS blockade generally not recommended
# - Exception: ARB + MRA in heart failure with reduced EF
# - Monitor K+, BP, and renal function with any RAAS combination
# - ARNI requires 36-hour washout from ACE inhibitor
# - Consider single-agent optimization before combination therapy
