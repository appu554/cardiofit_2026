
# Lisinopril - Unified Clinical Engine Knowledge Base
# ACE Inhibitor for hypertension and heart failure

[meta]
drug_id = "lisinopril"
generic_name = "lisinopril"
version = "1.0.0"
evidence_sources = ["AHA-HTN-2024", "ACC-HF-2024", "FDA-Label-2024"]
last_updated = "2025-08-16"
clinical_reviewer = "Dr. Clinical AI"
calculation_strategy = "standard_rules"
therapeutic_class = ["ace_inhibitor", "antihypertensive"]

# Dose calculation rules
[dose_calculation]

[dose_calculation.base_dose]
default_mg = 10.0
calculation_method = "indication_based"
weight_factor_mg_per_kg = 0.15
bsa_factor_mg_per_m2 = 6.0

[dose_calculation.dose_limits]
absolute_min_mg = 2.5
absolute_max_mg = 40.0
max_mg_per_kg = 0.6
max_mg_per_day = 40.0

# Weight adjustment bands
[[dose_calculation.weight_adjustment.bands]]
min_kg = 40.0
max_kg = 70.0
factor = 0.8
action = "multiply"

[[dose_calculation.weight_adjustment.bands]]
min_kg = 70.1
max_kg = 100.0
factor = 1.0
action = "multiply"

[[dose_calculation.weight_adjustment.bands]]
min_kg = 100.1
max_kg = 150.0
factor = 1.2
action = "multiply"

# Age adjustment bands
[[dose_calculation.age_adjustment.bands]]
min_years = 18
max_years = 64
factor = 1.0
action = "multiply"

[[dose_calculation.age_adjustment.bands]]
min_years = 65
max_years = 120
factor = 0.75
action = "multiply"

# Indication-specific dosing
[dose_calculation.indication_specific.hypertension]
base_dose_mg = 10.0
weight_factor = 0.15
max_dose_mg = 40.0

[dose_calculation.indication_specific.heart_failure]
base_dose_mg = 5.0
weight_factor = 0.1
max_dose_mg = 35.0

[dose_calculation.indication_specific.post_mi]
base_dose_mg = 5.0
weight_factor = 0.1
max_dose_mg = 10.0

# Safety verification rules
[safety_verification]

[safety_verification.absolute_contraindications]
pregnancy = true  # Contraindicated in pregnancy
breastfeeding = false  # Compatible with breastfeeding
allergy_classes = ["ace_inhibitor"]
conditions = ["angioedema_history", "bilateral_renal_artery_stenosis"]

# Renal safety bands
[[safety_verification.renal_safety.bands]]
min_egfr = 0.0
max_egfr = 29.0
action = "contraindicated"
reason = "eGFR < 30: high risk of hyperkalemia and AKI"
evidence = ["KDIGO-CKD-2022"]

[[safety_verification.renal_safety.bands]]
min_egfr = 30.0
max_egfr = 44.0
action = "dose_cap"
max_dose_mg_per_day = 20.0
monitoring_required = ["renal_function_q2weeks", "potassium_q2weeks"]
reason = "eGFR 30-44: reduce dose, monitor closely"
evidence = ["KDIGO-CKD-2022"]

[[safety_verification.renal_safety.bands]]
min_egfr = 45.0
max_egfr = 59.0
action = "dose_cap"
max_dose_mg_per_day = 30.0
monitoring_required = ["renal_function_q1month", "potassium_q1month"]
reason = "eGFR 45-59: moderate dose reduction"
evidence = ["KDIGO-CKD-2022"]

[[safety_verification.renal_safety.bands]]
min_egfr = 60.0
max_egfr = 999.0
action = "proceed"
reason = "Normal renal function"
evidence = ["FDA-Label-2024"]

# Hepatic safety
[[safety_verification.hepatic_safety.child_pugh_restrictions]]
class = "C"
action = "dose_reduction"
dose_reduction_factor = 0.5

# Drug interactions
[[safety_verification.interactions.major]]
interacting_drug_classes = ["potassium_supplements", "potassium_sparing_diuretics"]
action = "contraindicated"
reason = "High risk of hyperkalemia"

[[safety_verification.interactions.major]]
interacting_drug_classes = ["nsaids"]
action = "monitor_closely"
reason = "Increased risk of renal impairment"

[[safety_verification.interactions.moderate]]
interacting_drug_classes = ["lithium"]
action = "monitor_closely"
monitoring_required = ["lithium_levels", "renal_function"]
reason = "ACE inhibitors may increase lithium levels"

# Monitoring requirements within safety verification
[[safety_verification.monitoring_requirements]]
lab_test = "potassium"
frequency = "every_2_weeks_initially_then_monthly"
alert_threshold_high = 5.5
action_on_alert = "dose_reduction_or_discontinuation"
reason = "Monitor for hyperkalemia"

[[safety_verification.monitoring_requirements]]
lab_test = "egfr"
frequency = "every_2_weeks_initially_then_monthly"
alert_threshold_low = 30.0
action_on_alert = "dose_reduction_or_discontinuation"
reason = "Monitor for declining renal function"

# Top-level monitoring requirements
[[monitoring_requirements]]
lab_test = "potassium"
frequency = "every_2_weeks_initially_then_monthly"
alert_threshold_high = 5.5
action_on_alert = "dose_reduction_or_discontinuation"
reason = "Monitor for hyperkalemia"

[[monitoring_requirements]]
lab_test = "creatinine"
frequency = "every_2_weeks_initially_then_monthly"
alert_threshold_increase_percent = 30.0
action_on_alert = "dose_reduction_or_discontinuation"
reason = "Monitor for acute kidney injury"

[[monitoring_requirements]]
lab_test = "blood_pressure"
frequency = "weekly_initially_then_monthly"
target_systolic = 130.0
action_on_alert = "dose_adjustment"
target_diastolic = 80.0
reason = "Monitor therapeutic response"


[safety_verification.contraindications]
absolute = ["pregnancy", "angioedema_history", "bilateral_renal_artery_stenosis"]
