# ACE Inhibitor Drug-Drug Interactions
# Unified Clinical Engine Knowledge Base

[meta]
rule_pack_id = "ace_inhibitor_ddi"
version = "1.0.0"
drug_class = "ace_inhibitor"
last_updated = "2025-08-16"

# Major interactions
[[rules]]
drug_a = "ace_inhibitor"
drug_b = "potassium_supplement"
severity = "major"
mechanism = "additive_hyperkalemia"
clinical_effect = "Hyperkalemia (K+ > 5.5 mEq/L)"
management = "Avoid combination. Monitor potassium closely if must use."
evidence_level = "high"

[[rules]]
drug_a = "ace_inhibitor"
drug_b = "potassium_sparing_diuretic"
severity = "major"
mechanism = "additive_hyperkalemia"
clinical_effect = "Severe hyperkalemia risk"
management = "Contraindicated. Use alternative diuretic."
evidence_level = "high"

[[rules]]
drug_a = "ace_inhibitor"
drug_b = "nsaid"
severity = "moderate"
mechanism = "reduced_renal_function"
clinical_effect = "Acute kidney injury, reduced antihypertensive effect"
management = "Monitor renal function and blood pressure closely"
evidence_level = "high"

[[rules]]
drug_a = "ace_inhibitor"
drug_b = "lithium"
severity = "moderate"
mechanism = "reduced_lithium_clearance"
clinical_effect = "Lithium toxicity"
management = "Monitor lithium levels closely, consider dose reduction"
evidence_level = "moderate"

# Moderate interactions
[[rules]]
drug_a = "ace_inhibitor"
drug_b = "thiazide_diuretic"
severity = "minor"
mechanism = "synergistic_hypotension"
clinical_effect = "Enhanced antihypertensive effect"
management = "Monitor blood pressure, may need dose adjustment"
evidence_level = "high"

[[rules]]
drug_a = "ace_inhibitor"
drug_b = "beta_blocker"
severity = "minor"
mechanism = "synergistic_hypotension"
clinical_effect = "Enhanced antihypertensive effect"
management = "Monitor blood pressure, beneficial combination"
evidence_level = "high"
