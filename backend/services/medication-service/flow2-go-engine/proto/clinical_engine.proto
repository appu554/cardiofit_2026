syntax = "proto3";

package clinical_engine;

option go_package = "flow2-go-engine/proto/clinical_engine";

// ClinicalEngine service provides clinical recipe execution capabilities
service ClinicalEngine {
  // Execute Flow 2 with multiple recipes
  rpc ExecuteFlow2(Flow2ExecutionRequest) returns (Flow2ExecutionResponse);
  
  // Execute medication intelligence analysis
  rpc ExecuteMedicationIntelligence(MedicationIntelligenceRequest) returns (MedicationIntelligenceResponse);
  
  // Execute dose optimization
  rpc ExecuteDoseOptimization(DoseOptimizationRequest) returns (DoseOptimizationResponse);
  
  // Execute safety validation
  rpc ExecuteSafetyValidation(SafetyValidationRequest) returns (SafetyValidationResponse);
  
  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// Flow 2 execution request
message Flow2ExecutionRequest {
  string request_id = 1;
  string patient_id = 2;
  string action_type = 3;
  repeated Medication medications = 4;
  string clinical_context = 5;  // JSON-encoded clinical context
  map<string, string> processing_hints = 6;
  int64 timeout_ms = 7;
}

// Flow 2 execution response
message Flow2ExecutionResponse {
  string request_id = 1;
  string overall_status = 2;  // "SAFE", "WARNING", "UNSAFE", "ERROR"
  repeated RecipeResult recipe_results = 3;
  string clinical_decision_support = 4;  // JSON-encoded CDS
  repeated string safety_alerts = 5;
  repeated string recommendations = 6;
  uint64 execution_time_ms = 7;
  string engine_version = 8;
}

// Medication intelligence request
message MedicationIntelligenceRequest {
  string request_id = 1;
  string patient_id = 2;
  repeated Medication medications = 3;
  string intelligence_type = 4;  // "comprehensive", "interactions", "alternatives"
  string analysis_depth = 5;     // "basic", "detailed", "deep"
  string clinical_context = 6;   // JSON-encoded clinical context
  map<string, string> processing_hints = 7;
}

// Medication intelligence response
message MedicationIntelligenceResponse {
  string request_id = 1;
  double intelligence_score = 2;
  string medication_analysis = 3;          // JSON-encoded analysis
  string interaction_analysis = 4;         // JSON-encoded interactions
  string outcome_predictions = 5;          // JSON-encoded predictions
  string alternative_recommendations = 6;  // JSON-encoded alternatives
  string clinical_insights = 7;            // JSON-encoded insights
  uint64 execution_time_ms = 8;
}

// Dose optimization request
message DoseOptimizationRequest {
  string request_id = 1;
  string patient_id = 2;
  string medication_code = 3;
  string clinical_parameters = 4;  // JSON-encoded parameters
  string clinical_context = 5;     // JSON-encoded context
  map<string, string> processing_hints = 6;
}

// Dose optimization response
message DoseOptimizationResponse {
  string request_id = 1;
  double optimized_dose = 2;
  double optimization_score = 3;
  string confidence_interval = 4;           // JSON-encoded interval
  string pharmacokinetic_predictions = 5;   // JSON-encoded predictions
  string monitoring_recommendations = 6;    // JSON-encoded recommendations
  string clinical_rationale = 7;
  uint64 execution_time_ms = 8;
}

// Safety validation request
message SafetyValidationRequest {
  string request_id = 1;
  string patient_id = 2;
  repeated Medication medications = 3;
  string clinical_context = 4;  // JSON-encoded context
  string validation_level = 5;  // "basic", "comprehensive", "strict"
  map<string, string> processing_hints = 6;
}

// Safety validation response
message SafetyValidationResponse {
  string request_id = 1;
  string overall_safety_status = 2;  // "SAFE", "WARNING", "UNSAFE"
  repeated DrugInteraction drug_interactions = 3;
  repeated AllergyAlert allergy_alerts = 4;
  repeated ContraindicationAlert contraindication_alerts = 5;
  repeated DosingAlert dosing_alerts = 6;
  repeated MonitoringRequirement monitoring_requirements = 7;
  double safety_score = 8;
  uint64 execution_time_ms = 9;
}

// Health check request
message HealthCheckRequest {
  string service = 1;
}

// Health check response
message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;
  }
  ServingStatus status = 1;
}

// Supporting message types
message Medication {
  string code = 1;
  string name = 2;
  double dose = 3;
  string unit = 4;
  string frequency = 5;
  string route = 6;
  string duration = 7;
  string indication = 8;
  map<string, string> properties = 9;
}

message RecipeResult {
  string recipe_id = 1;
  string recipe_name = 2;
  string overall_status = 3;  // "SAFE", "WARNING", "UNSAFE", "ERROR"
  uint64 execution_time_ms = 4;
  repeated RecipeValidation validations = 5;
  string clinical_decision_support = 6;  // JSON-encoded CDS
  repeated string recommendations = 7;
  repeated string warnings = 8;
  repeated string errors = 9;
  map<string, string> metadata = 10;
}

message RecipeValidation {
  bool passed = 1;
  string severity = 2;  // "INFO", "WARNING", "CRITICAL"
  string message = 3;
  string explanation = 4;
  string code = 5;
}

message DrugInteraction {
  string drug1 = 1;
  string drug2 = 2;
  string severity = 3;  // "MINOR", "MODERATE", "MAJOR", "CONTRAINDICATED"
  string type = 4;      // "PHARMACOKINETIC", "PHARMACODYNAMIC", "UNKNOWN"
  string description = 5;
  string management = 6;
}

message AllergyAlert {
  string allergen = 1;
  string medication = 2;
  string severity = 3;  // "MILD", "MODERATE", "SEVERE", "LIFE_THREATENING"
  string reaction = 4;
  double confidence = 5;
}

message ContraindicationAlert {
  string medication = 1;
  string condition = 2;
  string severity = 3;  // "RELATIVE", "ABSOLUTE"
  string rationale = 4;
  repeated string alternatives = 5;
}

message DosingAlert {
  string medication = 1;
  string alert_type = 2;  // "OVERDOSE", "UNDERDOSE", "FREQUENCY", "DURATION"
  double current_dose = 3;
  double recommended_dose = 4;
  string rationale = 5;
}

message MonitoringRequirement {
  string parameter = 1;     // "CBC", "LFT", "CREATININE", etc.
  string frequency = 2;     // "DAILY", "WEEKLY", "MONTHLY", etc.
  string target = 3;        // Target range or value
  string rationale = 4;     // Why monitoring is needed
  string priority = 5;      // "LOW", "MEDIUM", "HIGH", "CRITICAL"
}
