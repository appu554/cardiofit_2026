# Metformin (Biguanide) - Complete Dose Calculation & Safety Rules
# Version: 2.0.0
# Evidence: ADA-SOC-2025, FDA-Label-2024, KDIGO-CKD-2022

[meta]
drug_id = "metformin"
generic_name = "metformin"
version = "2.0.0"
evidence_sources = ["ADA-SOC-2025", "FDA-Label-2024", "KDIGO-CKD-2022"]
last_updated = "2025-08-16"
clinical_reviewer = "Dr. Clinical AI"
calculation_strategy = "weight_renal_adjusted"
therapeutic_class = ["biguanide", "antidiabetic"]

# DOSE CALCULATION RULES - Required for real calculations
[dose_calculation]

[dose_calculation.base_dose]
default_mg = 500.0
calculation_method = "indication_based"
weight_factor_mg_per_kg = 10.0  # Starting point for weight-based adjustment

[dose_calculation.dose_limits]
absolute_min_mg = 500.0
absolute_max_mg = 2550.0
max_mg_per_day = 2550.0

# Weight-based adjustments
[dose_calculation.weight_adjustment]

[[dose_calculation.weight_adjustment.bands]]
min_kg = 40.0
max_kg = 60.0
factor = 0.8
action = "multiply"

[[dose_calculation.weight_adjustment.bands]]
min_kg = 60.1
max_kg = 80.0
factor = 1.0
action = "multiply"

[[dose_calculation.weight_adjustment.bands]]
min_kg = 80.1
max_kg = 120.0
factor = 1.2
action = "multiply"

[[dose_calculation.weight_adjustment.bands]]
min_kg = 120.1
max_kg = 200.0
factor = 1.4
action = "multiply"

# Age-based adjustments
[dose_calculation.age_adjustment]

[[dose_calculation.age_adjustment.bands]]
min_years = 18
max_years = 64
factor = 1.0
action = "multiply"

[[dose_calculation.age_adjustment.bands]]
min_years = 65
max_years = 79
factor = 0.8
action = "multiply"

[[dose_calculation.age_adjustment.bands]]
min_years = 80
max_years = 120
factor = 0.6
action = "multiply"

# Indication-specific dosing
[dose_calculation.indication_specific.type_2_diabetes]
base_dose_mg = 500.0
weight_factor = 10.0
max_dose_mg = 2000.0

[dose_calculation.indication_specific.gestational_diabetes]
base_dose_mg = 500.0
weight_factor = 8.0
max_dose_mg = 2000.0

# SAFETY VERIFICATION RULES - Required for safety checks
[safety_verification]

[safety_verification.absolute_contraindications]
pregnancy = false  # Safe in pregnancy for gestational diabetes
breastfeeding = false  # Safe during breastfeeding
allergy_classes = ["biguanide"]
conditions = ["diabetic_ketoacidosis", "severe_metabolic_acidosis"]

[safety_verification.renal_safety]
enabled = true
metric = "egfr_ckd_epi"

[[safety_verification.renal_safety.bands]]
min_egfr = 0.0
max_egfr = 29.0
action = "contraindicated"
reason = "eGFR < 30: contraindicated due to lactic acidosis risk"
evidence = ["FDA-BLACK-BOX-2024"]

[[safety_verification.renal_safety.bands]]
min_egfr = 30.0
max_egfr = 44.0
action = "dose_cap"
reason = "eGFR 30-44: reduce dose, monitor closely"
evidence = ["FDA-LABEL-2024", "KDIGO-CKD-2022"]

[[safety_verification.renal_safety.bands]]
min_egfr = 45.0
max_egfr = 59.0
action = "dose_cap"
reason = "eGFR 45-59: moderate dose reduction"
evidence = ["FDA-LABEL-2024", "KDIGO-CKD-2022"]

[[safety_verification.renal_safety.bands]]
min_egfr = 60.0
max_egfr = 999.0
action = "proceed"
reason = "Normal renal function"
evidence = ["FDA-LABEL-2024"]

# Drug interactions
[safety_verification.interactions]

[[safety_verification.interactions.major]]
interacting_drug_classes = ["iodinated_contrast"]
action = "temporary_discontinuation"
duration_hours = 48
reason = "Contrast-induced nephropathy risk"

[[safety_verification.interactions.moderate]]
interacting_drug_classes = ["ace_inhibitors", "arbs"]
action = "monitor_closely"
monitoring_required = ["renal_function", "electrolytes"]
reason = "Increased risk of lactic acidosis with renal impairment"

# MONITORING REQUIREMENTS
[[safety_verification.monitoring_requirements]]
lab_test = "egfr"
frequency = "every_3_months"
alert_threshold_low = 30.0
action_on_alert = "dose_reduction_or_discontinuation"
reason = "Monitor for declining renal function"

[[safety_verification.monitoring_requirements]]
lab_test = "vitamin_b12"
frequency = "annually"
action_on_alert = "monitor_closely"
reason = "Metformin-induced B12 deficiency with long-term use"

[[safety_verification.monitoring_requirements]]
lab_test = "hba1c"
frequency = "every_3_months"
action_on_alert = "adjust_dose"
reason = "Monitor glycemic control effectiveness"

# TOP-LEVEL MONITORING REQUIREMENTS (empty for unified structure)
monitoring_requirements = []

[hard_contraindications]
conditions = [
    "diabetic_ketoacidosis",
    "severe_metabolic_acidosis",
    "severe_renal_impairment_egfr_lt_30",
    "acute_dehydration",
    "severe_infection_sepsis",
    "acute_myocardial_infarction",
    "acute_heart_failure",
    "severe_liver_disease",
    "alcohol_intoxication",
    "hypoxic_states"
]

allergies = [
    "metformin_hypersensitivity",
    "biguanide_class_allergy"
]

drug_interactions = [
    "iodinated_contrast_agents_within_48h"
]

[relative_contraindications]
conditions = [
    "moderate_renal_impairment_egfr_30_60",
    "elderly_over_80_years",
    "heart_failure_nyha_class_iii_iv",
    "chronic_liver_disease",
    "copd_with_hypoxemia",
    "planned_surgery_within_48h",
    "planned_contrast_study"
]

monitoring_required = [
    "renal_function_q3months",
    "vitamin_b12_annually",
    "lactic_acid_if_symptoms"
]

[dose_adjustments]

[dose_adjustments.renal]
enabled = true
parameter = "egfr_ckd_epi"

[[dose_adjustments.renal.bands]]
min_egfr = 60.0
max_egfr = 999.0
dose_factor = 1.0
max_daily_dose_mg = 2550.0
frequency_adjustment = "none"
monitoring = "routine"

[[dose_adjustments.renal.bands]]
min_egfr = 45.0
max_egfr = 59.9
dose_factor = 0.75
max_daily_dose_mg = 1500.0
frequency_adjustment = "reduce_to_bid"
monitoring = "q3months"

[[dose_adjustments.renal.bands]]
min_egfr = 30.0
max_egfr = 44.9
dose_factor = 0.5
max_daily_dose_mg = 1000.0
frequency_adjustment = "reduce_to_daily"
monitoring = "monthly"

[[dose_adjustments.renal.bands]]
min_egfr = 0.0
max_egfr = 29.9
dose_factor = 0.0
max_daily_dose_mg = 0.0
frequency_adjustment = "contraindicated"
monitoring = "contraindicated"

[dose_adjustments.hepatic]
enabled = true
parameter = "child_pugh_score"

[[dose_adjustments.hepatic.bands]]
child_pugh_class = "A"
dose_factor = 1.0
monitoring = "routine"

[[dose_adjustments.hepatic.bands]]
child_pugh_class = "B"
dose_factor = 0.75
monitoring = "monthly"

[[dose_adjustments.hepatic.bands]]
child_pugh_class = "C"
dose_factor = 0.0
monitoring = "contraindicated"

[dose_adjustments.age]
enabled = true

[[dose_adjustments.age.bands]]
min_age_years = 18
max_age_years = 64
dose_factor = 1.0
monitoring = "routine"

[[dose_adjustments.age.bands]]
min_age_years = 65
max_age_years = 79
dose_factor = 0.8
monitoring = "q3months"
reason = "Reduced renal clearance in elderly"

[[dose_adjustments.age.bands]]
min_age_years = 80
max_age_years = 999
dose_factor = 0.6
monitoring = "monthly"
reason = "Significantly reduced renal clearance, increased lactic acidosis risk"

[clinical_decision_support]
beers_criteria = true
pregnancy_category = "B"
lactation_safety = "compatible"
pediatric_use = false

[clinical_decision_support.drug_interactions]

[[clinical_decision_support.drug_interactions.major]]
interacting_drugs = ["iodinated_contrast"]
mechanism = "increased_nephrotoxicity"
clinical_effect = "acute_kidney_injury_lactic_acidosis"
management = "discontinue_48h_before_and_after_contrast"
evidence_level = "high"

[[clinical_decision_support.drug_interactions.moderate]]
interacting_drugs = ["furosemide", "thiazide_diuretics"]
mechanism = "volume_depletion"
clinical_effect = "increased_lactic_acidosis_risk"
management = "monitor_hydration_status"
evidence_level = "moderate"

[[clinical_decision_support.monitoring_alerts]]
parameter = "egfr"
threshold_value = 30.0
threshold_direction = "below"
alert_level = "critical"
action = "discontinue_immediately"
message = "eGFR < 30: Discontinue metformin immediately due to lactic acidosis risk"

[[clinical_decision_support.monitoring_alerts]]
parameter = "vitamin_b12"
threshold_value = 200.0
threshold_direction = "below"
alert_level = "warning"
action = "supplement_b12"
message = "Low B12 levels: Consider B12 supplementation with long-term metformin use"

[evidence_base]
primary_studies = [
    "UKPDS-34-1998",
    "DPP-2002",
    "Cochrane-Metformin-2020"
]

guidelines = [
    "ADA-SOC-2025",
    "EASD-ADA-2022",
    "KDIGO-CKD-2022"
]

regulatory_approvals = [
    "FDA-1994",
    "EMA-2000",
    "Health-Canada-1999"
]

last_evidence_review = "2025-01-15"
next_review_due = "2026-01-15"
