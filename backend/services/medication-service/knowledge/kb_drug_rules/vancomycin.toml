# Vancomycin Drug Rules - Glycopeptide Antibiotic Management
# Clinical Evidence Level: A (High Quality)
# Last Updated: 2025-08-16

[meta]
drug_id = "vancomycin"
generic_name = "Vancomycin Hydrochloride"
version = "3.0.0"
evidence_sources = [
    "IDSA Guidelines 2020",
    "Cochrane Review 2019",
    "FDA Label 2021"
]
last_updated = "2025-08-16"
clinical_reviewer = "Dr. Clinical Pharmacist, PharmD"

# UNIFIED SAFETY VERIFICATION - CLEAN STRUCTURE
[safety_verification]

# Absolute contraindications (REQUIRED by unified engine)
[safety_verification.absolute_contraindications]
pregnancy = false
breastfeeding = false
allergy_classes = ["vancomycin", "glycopeptides", "teicoplanin"]
conditions = ["severe_hearing_loss", "anuria", "severe_red_man_syndrome_history"]

# Drug interactions (UNIFIED FIELD NAME: 'interactions')
[safety_verification.interactions]

[[safety_verification.interactions.major]]
interacting_drug_classes = ["aminoglycosides", "amphotericin_b", "cisplatin"]
action = "avoid_concurrent_use"
duration_hours = 24
reason = "Increased risk of nephrotoxicity"

[[safety_verification.interactions.major]]
interacting_drug_classes = ["loop_diuretics", "ethacrynic_acid"]
action = "avoid_concurrent_use"
duration_hours = 12
reason = "Increased risk of ototoxicity"

[[safety_verification.interactions.moderate]]
interacting_drug_classes = ["neuromuscular_blocking_agents"]
action = "monitor_closely"
monitoring_required = ["neuromuscular_function", "respiratory_status"]
reason = "Enhanced neuromuscular blockade"

# Renal safety monitoring (UNIFIED STRUCTURE: requires 'bands')
[safety_verification.renal_safety]

[[safety_verification.renal_safety.bands]]
min_egfr = 0.0
max_egfr = 29.0
action = "contraindicated"
reason = "severe_renal_impairment_nephrotoxicity_risk"
evidence = ["FDA-BLACK-BOX-2024"]

[[safety_verification.renal_safety.bands]]
min_egfr = 30.0
max_egfr = 59.0
action = "dose_reduction"
reason = "moderate_renal_impairment"
evidence = ["IDSA-Guidelines-2020"]
max_dose_mg_per_day = 1000.0
monitoring_required = ["renal_function_daily"]

# UNIFIED MONITORING REQUIREMENTS
[[safety_verification.monitoring_requirements]]
lab_test = "vancomycin_trough_level"
frequency = "daily"
alert_threshold_low = 5.0
alert_threshold_high = 30.0
action_on_alert = "dose_adjustment"
reason = "Therapeutic drug monitoring"

[[safety_verification.monitoring_requirements]]
lab_test = "serum_creatinine"
frequency = "daily"
alert_threshold_high = 2.0
action_on_alert = "nephrology_consult"
reason = "Nephrotoxicity monitoring"

[[safety_verification.monitoring_requirements]]
lab_test = "hearing_assessment"
frequency = "weekly"
action_on_alert = "discontinuation_if_ototoxicity"
reason = "Ototoxicity monitoring"