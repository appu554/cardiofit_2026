# UNIFIED WARFARIN DRUG RULES - MINIMAL WORKING VERSION
# Version: 3.0.0 - Unified Clinical Engine Compatible
# Last Updated: 2025-08-16
# Based on: UNIFIED_DRUG_TEMPLATE.toml

[meta]
drug_id = "warfarin"
generic_name = "Warfarin Sodium"
version = "3.0.0"
evidence_sources = [
    "CHEST 2012 Antithrombotic Guidelines",
    "AHA/ACC/HRS 2019 Atrial Fibrillation Guidelines",
    "ACCP 2012 Guidelines"
]
last_updated = "2025-08-16"
clinical_reviewer = "Dr. Lisa Rodriguez, MD, Hematology"

# UNIFIED SAFETY VERIFICATION - COMPLETE STRUCTURE
[safety_verification]

# Absolute contraindications (REQUIRED by unified engine)
[safety_verification.absolute_contraindications]
pregnancy = true
breastfeeding = true
allergy_classes = ["warfarin", "coumarins"]
conditions = ["active_bleeding", "severe_liver_disease"]

# Drug interactions (UNIFIED FIELD NAME: 'interactions')
[safety_verification.interactions]

[[safety_verification.interactions.major]]
interacting_drug_classes = ["aspirin", "nsaids", "heparin"]
action = "avoid_concurrent_use"
duration_hours = 24
reason = "Increased bleeding risk"

[[safety_verification.interactions.moderate]]
interacting_drug_classes = ["antibiotics", "antifungals"]
action = "monitor_closely"
monitoring_required = ["inr_levels", "bleeding_signs"]
reason = "Potential INR elevation"

# Monitoring requirements (REQUIRED FIELD - must be present)
[[safety_verification.monitoring_requirements]]
lab_test = "inr"
frequency = "daily_until_stable_then_weekly"
alert_threshold_low = 1.8
alert_threshold_high = 3.5
action_on_alert = "adjust_dose"
reason = "Maintain therapeutic anticoagulation"

[[safety_verification.monitoring_requirements]]
lab_test = "complete_blood_count"
frequency = "weekly_initially"
alert_threshold_low = 8.0
action_on_alert = "assess_bleeding_risk"
reason = "Monitor for bleeding complications"

# REQUIRED: monitoring_requirements field
[[safety_verification.monitoring_requirements]]
parameter = "inr"
frequency_hours = 24
target_range = { min = 2.0, max = 3.0, units = "inr" }
critical_values = { min = 1.5, max = 4.0 }
action_required = ["dose_adjustment"]
