# Vancomycin Drug-Drug Interactions - CLEAN WORKING VERSION
# Matches exact Rust struct expectations for Unified Clinical Engine

[meta]
rule_pack_id = "vancomycin_interactions"
version = "1.0.0"
drug_class = "glycopeptide_antibiotic"
last_updated = "2024-01-15"

# MAJOR NEPHROTOXIC INTERACTIONS
[[interactions]]
drug_a = "vancomycin"
drug_b = "gentamicin"
severity = "major"
mechanism = "additive_nephrotoxicity"
clinical_effect = "Increased risk of acute kidney injury (AKI) - up to 35% incidence"
management = "Monitor SCr daily, reduce doses by 25%, consider alternative if possible"
evidence_level = "A"

[[interactions]]
drug_a = "vancomycin"
drug_b = "tobramycin"
severity = "major"
mechanism = "additive_nephrotoxicity"
clinical_effect = "Increased risk of acute kidney injury - similar to gentamicin"
management = "Monitor SCr daily, reduce doses by 25%, consider alternative if possible"
evidence_level = "A"

[[interactions]]
drug_a = "vancomycin"
drug_b = "amikacin"
severity = "major"
mechanism = "additive_nephrotoxicity"
clinical_effect = "Increased risk of acute kidney injury - highest risk aminoglycoside"
management = "Monitor SCr daily, reduce doses by 30%, strongly consider alternative"
evidence_level = "A"

[[interactions]]
drug_a = "vancomycin"
drug_b = "amphotericin_b"
severity = "major"
mechanism = "additive_nephrotoxicity"
clinical_effect = "Severe nephrotoxicity risk - up to 80% incidence"
management = "Avoid combination if possible, use liposomal amphotericin, reduce vancomycin 50%"
evidence_level = "A"

[[interactions]]
drug_a = "vancomycin"
drug_b = "cisplatin"
severity = "major"
mechanism = "additive_nephrotoxicity"
clinical_effect = "Increased risk of acute kidney injury and chronic kidney disease"
management = "Aggressive hydration, monitor SCr daily, reduce vancomycin 25%"
evidence_level = "A"

[[interactions]]
drug_a = "vancomycin"
drug_b = "cyclosporine"
severity = "major"
mechanism = "additive_nephrotoxicity"
clinical_effect = "Increased risk of acute kidney injury"
management = "Monitor SCr and cyclosporine levels daily, reduce vancomycin 25%"
evidence_level = "A"

# MAJOR OTOTOXIC INTERACTIONS
[[interactions]]
drug_a = "vancomycin"
drug_b = "furosemide"
severity = "moderate"
mechanism = "additive_ototoxicity"
clinical_effect = "Increased risk of hearing loss, especially high-dose IV furosemide"
management = "Monitor hearing function, consider alternative diuretic, avoid high doses"
evidence_level = "B"

[[interactions]]
drug_a = "vancomycin"
drug_b = "ethacrynic_acid"
severity = "major"
mechanism = "additive_ototoxicity"
clinical_effect = "High risk of permanent hearing loss"
management = "AVOID COMBINATION - use alternative diuretic"
evidence_level = "A"

# COAGULATION INTERACTIONS
[[interactions]]
drug_a = "vancomycin"
drug_b = "warfarin"
severity = "moderate"
mechanism = "protein_binding_displacement"
clinical_effect = "Increased anticoagulation effect - INR elevation"
management = "Monitor INR more frequently (every 2-3 days initially)"
evidence_level = "B"

# NEUROMUSCULAR INTERACTIONS
[[interactions]]
drug_a = "vancomycin"
drug_b = "vecuronium"
severity = "moderate"
mechanism = "enhanced_neuromuscular_blockade"
clinical_effect = "Prolonged neuromuscular blockade and paralysis"
management = "Monitor neuromuscular function continuously, have reversal agents ready"
evidence_level = "B"

[[interactions]]
drug_a = "vancomycin"
drug_b = "succinylcholine"
severity = "moderate"
mechanism = "enhanced_neuromuscular_blockade"
clinical_effect = "Prolonged paralysis beyond expected duration"
management = "Monitor neuromuscular function continuously, be prepared for prolonged ventilation"
evidence_level = "B"
