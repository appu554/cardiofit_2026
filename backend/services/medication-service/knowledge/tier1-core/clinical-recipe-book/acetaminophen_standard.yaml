recipe_id: "acetaminophen-standard-v2"
version: "2.0.0"
name: "Acetaminophen Standard Dosing"
description: "Weight-based acetaminophen dosing with hepatotoxicity prevention"
medication_code: "acetaminophen"
indication: "pain_mild_to_moderate"

# Algorithm
algorithm:
  type: "weight_based_dosing"
  steps:
    - step_id: "calculate_dose"
      description: "Calculate weight-based dose"
      action: "multiply"
      parameters:
        weight_kg: "patient_weight"
        dose_per_kg: 15.0
        max_single_dose: 1000
        max_daily_dose: 4000
      conditions: []
  parameters:
    adult_dose_mg_per_kg: 15.0
    max_single_dose_mg: 1000
    max_daily_dose_mg: 4000
    frequency_hours: 6
  validation:
    - rule_id: "max_dose_check"
      description: "Ensure dose does not exceed maximum"
      field: "calculated_dose"
      operator: "less_than_or_equal"
      value: 1000
      error_message: "Dose exceeds maximum single dose of 1000mg"

# Safety checks
safety_checks:
  - check_id: "dose_limits"
    description: "Validate dose limits for acetaminophen"
    type: "dose_validation"
    severity: "critical"
    action: "reject_if_exceeded"
    
  - check_id: "liver_disease_check"
    description: "Check for liver disease contraindications"
    type: "contraindication_check"
    severity: "critical"
    action: "reject_or_reduce_dose"
    
  - check_id: "alcohol_use_check"
    description: "Check for chronic alcohol use"
    type: "risk_assessment"
    severity: "warning"
    action: "reduce_dose_and_monitor"

# Monitoring requirements
monitoring:
  required: false
  frequency: "as_needed"
  parameters:
    - parameter: "pain_relief"
      type: "clinical"
      normal_range: "adequate_relief"
      critical_range: "no_relief_after_appropriate_dose"
    - parameter: "liver_function"
      type: "laboratory"
      normal_range: "baseline"
      critical_range: "elevated_enzymes"
  alerts:
    - alert_id: "inadequate_response"
      condition: "no_pain_relief_after_maximum_dose"
      severity: "warning"
      action: "consider_alternative_analgesic"
      message: "Consider alternative analgesic if inadequate response"
    - alert_id: "hepatotoxicity_risk"
      condition: "chronic_high_dose_use"
      severity: "warning"
      action: "monitor_liver_function"
      message: "Monitor liver function with chronic high-dose use"

# Documentation
documentation:
  guidelines:
    - "WHO Pain Management Guidelines"
    - "AAP Fever Management Guidelines"
  references:
    - "Acetaminophen dosing guidelines 2024"
  evidence: "Level A - Strong evidence"
  last_review: "2024-01-15"
