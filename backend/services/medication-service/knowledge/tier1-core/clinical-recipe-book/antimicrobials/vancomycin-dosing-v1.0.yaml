id: vancomycin-dosing-v1.0
calculation_variants:
  standard_auc:
    logic_steps:
      - { name: "calculate_loading_dose", operation: [{ variable: weight_kg, operator: multiply, value: 25 }], max_value: 3000, output: loading_dose }
