- fragment_id: "demographics.weight.actual_kg"
  description: "Actual body weight in kilograms"
  source_service: "patient_service"
  source_api_endpoint: "/api/patients/{patient_id}/demographics"

- fragment_id: "demographics.weight.ideal_kg"
  description: "Ideal body weight in kilograms"
  source_service: "context_service"
  derivation_formula_id: "ideal_body_weight"
  dependencies: ["demographics.height_cm", "demographics.gender"]

- fragment_id: "demographics.weight.adjusted_kg"
  description: "Calculated adjusted body weight for obesity dosing."
  source_service: "context_service"
  derivation_formula_id: "adjusted_body_weight"
  dependencies: ["demographics.weight.actual_kg", "demographics.weight.ideal_kg"]

- fragment_id: "demographics.height_cm"
  description: "Patient height in centimeters"
  source_service: "patient_service"
  source_api_endpoint: "/api/patients/{patient_id}/demographics"

- fragment_id: "demographics.age_years"
  description: "Patient age in years"
  source_service: "patient_service"
  source_api_endpoint: "/api/patients/{patient_id}/demographics"

- fragment_id: "demographics.patient_age_years"
  description: "Alias for patient age in years"
  source_service: "patient_service"
  source_api_endpoint: "/api/patients/{patient_id}/demographics"

- fragment_id: "demographics.age_months"
  description: "Patient age in months (pediatrics)"
  source_service: "patient_service"
  source_api_endpoint: "/api/patients/{patient_id}/demographics"

- fragment_id: "demographics.gender"
  description: "Administrative gender"
  source_service: "patient_service"
  source_api_endpoint: "/api/patients/{patient_id}/demographics"

- fragment_id: "demographics.bmi"
  description: "Body Mass Index"
  source_service: "context_service"
  derivation_formula_id: "bmi_kg_m2"
  dependencies: ["demographics.weight.actual_kg", "demographics.height_cm"]

- fragment_id: "demographics.creatinine_clearance"
  description: "Estimated creatinine clearance (Cockcroft-Gault)"
  source_service: "context_service"
  derivation_formula_id: "cockcroft_gault"
  dependencies: ["demographics.age_years", "demographics.weight.actual_kg", "labs.serum_creatinine[latest]", "demographics.gender"]
