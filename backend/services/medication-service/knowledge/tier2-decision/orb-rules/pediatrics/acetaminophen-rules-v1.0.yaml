- id: "acetaminophen-max-daily-dose-safety-check-v1"
  priority: 9000
  conditions:
    all_of:
      - { fact: "drug_name", operator: "equal", value: "Acetaminophen" }
      - { fact: "calculated_24h_cumulative_dose_mg_kg", operator: "gt", value: 75 }
  action:
    type: "workflow_interrupt"
    severity: "hard_stop"
- id: "acetaminophen-standard-selection-v1"
  priority: 10
  conditions:
    all_of:
      - { fact: "drug_name", operator: "equal", value: "Acetaminophen" }
  action:
    generate_manifest:
      recipe_id: "acetaminophen-peds-v1.0"
      variant: "standard"
      data_manifest:
        required: ["demographics.age_months", "demographics.weight.actual_kg"]
