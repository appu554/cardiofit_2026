- id: "amoxicillin-pediatric-aom-selection-v1"
  priority: 100
  conditions:
    all_of:
      - { fact: "drug_name", operator: "equal", value: "Amoxicillin" }
      - { fact: "patient_age_years", operator: "lt", value: 18 }
  action:
    generate_manifest:
      recipe_id: "amoxicillin-peds-aom-v1.0"
      variant: "standard_high_dose"
      data_manifest:
        required: ["demographics.age_months", "demographics.weight.actual_kg"]
