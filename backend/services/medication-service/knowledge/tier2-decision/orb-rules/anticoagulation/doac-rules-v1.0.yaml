- id: "doac-apixaban-renal-adjustment-v1"
  priority: 100
  conditions:
    - { fact: "drug_name", operator: "equal", value: "Apixaban" }
    - count_true: 2
      conditions:
        - { fact: "patient_age_years", operator: "gte", value: 80 }
        - { fact: "patient_weight_kg", operator: "lte", value: 60 }
        - { fact: "labs.serum_creatinine[latest]", operator: "gte", value: 1.5 }
  action:
    generate_manifest:
      recipe_id: "doac-initiation-v1.0"
      variant: "apixaban_reduced_dose"
