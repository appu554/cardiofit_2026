- id: "insulin-transition-iv-to-subq-v1"
  priority: 200
  conditions:
    all_of:
      - { fact: "current_insulin_route", operator: "equal", value: "IV" }
      - { fact: "patient_eating", operator: "equal", value: true }
  action:
    generate_manifest:
      recipe_id: "insulin-protocol-v1.0"
      variant: "transition_iv_to_subq"
      data_manifest:
        required: ["demographics.weight.actual_kg", "labs.blood_glucose_achs"]
