# Nginx Load Balancer Configuration for Context Services
# Handles intelligent routing between Go Context Gateway and Rust Clinical Data Hub

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging configuration
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    
    # Upstream definitions for Go Context Gateway
    upstream context_gateway_grpc {
        least_conn;
        server context-gateway-go:8017 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream context_gateway_http {
        least_conn;
        server context-gateway-go:8117 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }
    
    # Upstream definitions for Rust Clinical Data Hub
    upstream clinical_hub_grpc {
        least_conn;
        server clinical-data-hub-rust:8018 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream clinical_hub_http {
        least_conn;
        server clinical-data-hub-rust:8118 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }
    
    # HTTP Load Balancer (Port 8080)
    server {
        listen 8080;
        server_name _;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx-context-gateway","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }
        
        # Context Gateway HTTP endpoints (recipes, snapshots)
        location /api/context/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://context_gateway_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Headers
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }
        
        # Clinical Data Hub HTTP endpoints (cache, metrics)
        location /api/clinical/ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://clinical_hub_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Optimized for high-performance cache operations
            proxy_connect_timeout 2s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }
        
        # Metrics endpoints aggregation
        location /metrics {
            # Combine metrics from both services
            location = /metrics/context {
                internal;
                proxy_pass http://context_gateway_http/metrics;
            }
            
            location = /metrics/clinical {
                internal;
                proxy_pass http://clinical_hub_http/metrics;
            }
            
            # Return aggregated metrics
            content_by_lua_block {
                local http = require "resty.http"
                local httpc = http.new()
                
                -- Fetch Context Gateway metrics
                local context_res, context_err = httpc:request_uri("http://context-gateway-go:8117/metrics")
                local context_metrics = context_res and context_res.body or ""
                
                -- Fetch Clinical Hub metrics
                local clinical_res, clinical_err = httpc:request_uri("http://clinical-data-hub-rust:8118/metrics")
                local clinical_metrics = clinical_res and clinical_res.body or ""
                
                -- Combine and return
                ngx.header["Content-Type"] = "text/plain; version=0.0.4; charset=utf-8"
                ngx.say("# Combined Context Services Metrics")
                ngx.say("# Context Gateway Metrics")
                ngx.say(context_metrics)
                ngx.say("# Clinical Data Hub Metrics") 
                ngx.say(clinical_metrics)
            }
        }
        
        # WebSocket support for real-time updates
        location /ws/ {
            proxy_pass http://clinical_hub_http;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # HTTPS Load Balancer (Port 8443)
    server {
        listen 8443 ssl http2;
        server_name _;
        
        # SSL configuration
        ssl_certificate /etc/nginx/ssl/context-services.crt;
        ssl_certificate_key /etc/nginx/ssl/context-services.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Same configuration as HTTP but with SSL
        include /etc/nginx/conf.d/context-services-common.conf;
    }
    
    # gRPC Load Balancer for Context Gateway (Port 8017)
    server {
        listen 50051 http2;
        server_name _;
        
        location / {
            grpc_pass grpc://context_gateway_grpc;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # gRPC specific settings
            grpc_connect_timeout 5s;
            grpc_send_timeout 30s;
            grpc_read_timeout 30s;
            
            # Error handling
            error_page 502 = /grpc_502;
        }
        
        location = /grpc_502 {
            internal;
            return 502 '{"error": "Context Gateway service unavailable"}';
            add_header Content-Type application/json;
        }
    }
    
    # gRPC Load Balancer for Clinical Data Hub (Port 8018)
    server {
        listen 50052 http2;
        server_name _;
        
        location / {
            grpc_pass grpc://clinical_hub_grpc;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Optimized for high-performance operations
            grpc_connect_timeout 2s;
            grpc_send_timeout 10s;
            grpc_read_timeout 10s;
            
            error_page 502 = /grpc_clinical_502;
        }
        
        location = /grpc_clinical_502 {
            internal;
            return 502 '{"error": "Clinical Data Hub service unavailable"}';
            add_header Content-Type application/json;
        }
    }
    
    # Status and monitoring endpoint
    server {
        listen 8090;
        server_name _;
        
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.20.0.0/16;
            deny all;
        }
        
        location /health/detailed {
            content_by_lua_block {
                local http = require "resty.http"
                local cjson = require "cjson"
                local httpc = http.new()
                
                local health_status = {
                    nginx = {
                        status = "healthy",
                        timestamp = ngx.time()
                    },
                    services = {}
                }
                
                -- Check Context Gateway health
                local context_res = httpc:request_uri("http://context-gateway-go:8117/health", {
                    timeout = 5000
                })
                health_status.services.context_gateway = {
                    status = (context_res and context_res.status == 200) and "healthy" or "unhealthy",
                    response_time_ms = context_res and context_res.response_time or nil
                }
                
                -- Check Clinical Hub health
                local clinical_res = httpc:request_uri("http://clinical-data-hub-rust:8118/health", {
                    timeout = 5000
                })
                health_status.services.clinical_hub = {
                    status = (clinical_res and clinical_res.status == 200) and "healthy" or "unhealthy",
                    response_time_ms = clinical_res and clinical_res.response_time or nil
                }
                
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode(health_status))
            }
        }
    }
}

# Stream block for gRPC load balancing
stream {
    # Load balancing for raw gRPC connections
    upstream context_grpc_stream {
        least_conn;
        server context-gateway-go:8017;
    }
    
    upstream clinical_grpc_stream {
        least_conn;
        server clinical-data-hub-rust:8018;
    }
    
    # Context Gateway gRPC proxy
    server {
        listen 9017;
        proxy_pass context_grpc_stream;
        proxy_timeout 30s;
        proxy_connect_timeout 5s;
    }
    
    # Clinical Data Hub gRPC proxy
    server {
        listen 9018;
        proxy_pass clinical_grpc_stream;
        proxy_timeout 10s;
        proxy_connect_timeout 2s;
    }
}