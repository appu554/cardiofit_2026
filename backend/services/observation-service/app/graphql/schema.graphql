"""
GraphQL schema definition for the Observation Service.
This file defines the complete GraphQL schema including types, queries, and mutations.
"""

# Scalar types
scalar DateTime
scalar JSON

# FHIR CodeableConcept type
type CodeableConcept {
  coding: [Coding!]
  text: String
}

type Coding {
  system: String
  code: String!
  display: String
  version: String
  userSelected: Boolean
}

# FHIR Reference type
type Reference {
  reference: String
  type: String
  display: String
}

# FHIR Quantity type
type Quantity {
  value: Float
  unit: String
  system: String
  code: String
}

# FHIR Range type
type Range {
  low: Quantity
  high: Quantity
}

# FHIR Ratio type
type Ratio {
  numerator: Quantity
  denominator: Quantity
}

# FHIR Period type
type Period {
  start: DateTime
  end: DateTime
}

# FHIR Annotation type
type Annotation {
  authorReference: Reference
  authorString: String
  time: DateTime
  text: String!
}

# FHIR ReferenceRange type
type ReferenceRange {
  low: Quantity
  high: Quantity
  type: CodeableConcept
  appliesTo: [CodeableConcept]
  age: Range
  text: String
}

# FHIR Component type
type Component {
  code: CodeableConcept!
  valueQuantity: Quantity
  valueCodeableConcept: CodeableConcept
  valueString: String
  valueBoolean: Boolean
  valueInteger: Int
  valueRange: Range
  valueRatio: Ratio
  valueSampledData: JSON
  valueTime: String
  valueDateTime: DateTime
  valuePeriod: Period
  dataAbsentReason: CodeableConcept
  interpretation: [CodeableConcept]
  referenceRange: [ReferenceRange]
}

# FHIR Observation type with Apollo Federation
# This is the main type that will be extended by other services
type Observation @key(fields: "id") {
  # Standard FHIR fields
  id: ID!
  resourceType: String! @external
  status: String!
  category: [CodeableConcept]
  code: CodeableConcept!
  subject: Reference
  encounter: Reference
  effectiveDateTime: DateTime
  effectivePeriod: Period
  issued: DateTime
  performer: [Reference]
  
  # Value fields (mutually exclusive)
  valueQuantity: Quantity
  valueCodeableConcept: CodeableConcept
  valueString: String
  valueBoolean: Boolean
  valueInteger: Int
  valueRange: Range
  valueRatio: Ratio
  valueSampledData: JSON
  valueTime: String
  valueDateTime: DateTime
  valuePeriod: Period
  
  # Additional fields
  dataAbsentReason: CodeableConcept
  interpretation: [CodeableConcept]
  note: [Annotation]
  bodySite: CodeableConcept
  method: CodeableConcept
  specimen: Reference
  device: Reference
  referenceRange: [ReferenceRange]
  hasMember: [Reference]
  derivedFrom: [Reference]
  component: [Component]
  
  # Metadata
  meta: Meta
}

type Meta {
  versionId: String
  lastUpdated: DateTime
  source: String
  profile: [String]
  security: [Coding]
  tag: [Coding]
}

# Input types
input CodeableConceptInput {
  coding: [CodingInput!]
  text: String
}

input CodingInput {
  system: String
  code: String!
  display: String
  version: String
  userSelected: Boolean
}

input ReferenceInput {
  reference: String
  type: String
  display: String
}

input QuantityInput {
  value: Float
  unit: String
  system: String
  code: String
}

input RangeInput {
  low: QuantityInput
  high: QuantityInput
}

input RatioInput {
  numerator: QuantityInput!
  denominator: QuantityInput!
}

input PeriodInput {
  start: DateTime
  end: DateTime
}

input AnnotationInput {
  authorReference: ReferenceInput
  authorString: String
  time: DateTime
  text: String!
}

input ReferenceRangeInput {
  low: QuantityInput
  high: QuantityInput
  type: CodeableConceptInput
  appliesTo: [CodeableConceptInput]
  age: RangeInput
  text: String
}

input ComponentInput {
  code: CodeableConceptInput!
  valueQuantity: QuantityInput
  valueCodeableConcept: CodeableConceptInput
  valueString: String
  valueBoolean: Boolean
  valueInteger: Int
  valueRange: RangeInput
  valueRatio: RatioInput
  valueSampledData: JSON
  valueTime: String
  valueDateTime: DateTime
  valuePeriod: PeriodInput
  dataAbsentReason: CodeableConceptInput
  interpretation: [CodeableConceptInput]
  referenceRange: [ReferenceRangeInput]
}

input ObservationFilterInput {
  patient: ID
  category: String
  code: String
  date: String
  status: String
  _lastUpdated: String
  _tag: String
  _profile: String
  _security: String
  _source: String
}

input ObservationOrderByInput {
  field: String!
  direction: String! # ASC or DESC
}

input CreateObservationInput {
  status: String!
  category: [CodeableConceptInput!]
  code: CodeableConceptInput!
  subject: ReferenceInput
  encounter: ReferenceInput
  effectiveDateTime: DateTime
  effectivePeriod: PeriodInput
  issued: DateTime
  performer: [ReferenceInput!]
  valueQuantity: QuantityInput
  valueCodeableConcept: CodeableConceptInput
  valueString: String
  valueBoolean: Boolean
  valueInteger: Int
  valueRange: RangeInput
  valueRatio: RatioInput
  valueSampledData: JSON
  valueTime: String
  valueDateTime: DateTime
  valuePeriod: PeriodInput
  dataAbsentReason: CodeableConceptInput
  interpretation: [CodeableConceptInput!]
  note: [AnnotationInput!]
  bodySite: CodeableConceptInput
  method: CodeableConceptInput
  specimen: ReferenceInput
  device: ReferenceInput
  referenceRange: [ReferenceRangeInput!]
  hasMember: [ReferenceInput!]
  derivedFrom: [ReferenceInput!]
  component: [ComponentInput!]
}

input UpdateObservationInput {
  status: String
  category: [CodeableConceptInput!]
  code: CodeableConceptInput
  subject: ReferenceInput
  encounter: ReferenceInput
  effectiveDateTime: DateTime
  effectivePeriod: PeriodInput
  issued: DateTime
  performer: [ReferenceInput!]
  valueQuantity: QuantityInput
  valueCodeableConcept: CodeableConceptInput
  valueString: String
  valueBoolean: Boolean
  valueInteger: Int
  valueRange: RangeInput
  valueRatio: RatioInput
  valueSampledData: JSON
  valueTime: String
  valueDateTime: DateTime
  valuePeriod: PeriodInput
  dataAbsentReason: CodeableConceptInput
  interpretation: [CodeableConceptInput!]
  note: [AnnotationInput!]
  bodySite: CodeableConceptInput
  method: CodeableConceptInput
  specimen: ReferenceInput
  device: ReferenceInput
  referenceRange: [ReferenceRangeInput!]
  hasMember: [ReferenceInput!]
  derivedFrom: [ReferenceInput!]
  component: [ComponentInput!]
}

# Response types
type ObservationResponse {
  success: Boolean!
  message: String
  observation: Observation
}

type ObservationConnection {
  totalCount: Int!
  pageInfo: PageInfo!
  edges: [ObservationEdge!]!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ObservationEdge {
  node: Observation!
  cursor: String!
}

# Query type
type Query {
  # Get a single observation by ID
  observation(id: ID!): Observation
  
  # Search observations with filtering and pagination
  observations(
    filter: ObservationFilterInput
    first: Int = 10
    after: String
    last: Int
    before: String
    orderBy: [ObservationOrderByInput!]
  ): ObservationConnection!
  
  # Get observations for a specific patient
  patientObservations(
    patientId: ID!
    category: String
    code: String
    date: String
    status: String
    first: Int = 10
    after: String
  ): ObservationConnection!
  
  # Get observations by category
  observationsByCategory(
    category: String!
    patientId: ID
    code: String
    date: String
    status: String
    first: Int = 10
    after: String
  ): ObservationConnection!
}

# Mutation type
type Mutation {
  # Create a new observation
  createObservation(input: CreateObservationInput!): ObservationResponse!
  
  # Update an existing observation
  updateObservation(id: ID!, input: UpdateObservationInput!): ObservationResponse!
  
  # Delete an observation (soft delete)
  deleteObservation(id: ID!): ObservationResponse!
}

# Subscription type
type Subscription {
  # Subscribe to new observations
  observationCreated: Observation!
  
  # Subscribe to observation updates
  observationUpdated(observationId: ID!): Observation!
  
  # Subscribe to observation deletions
  observationDeleted: Observation!
}

# Schema definition
schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}
