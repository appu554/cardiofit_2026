# Cardiovascular Phenotype Definitions
# These phenotypes use CEL (Common Expression Language) for evaluation

phenotypes:
  - id: "high_cardiovascular_risk"
    name: "High Cardiovascular Risk"
    description: "Identifies patients with high risk for cardiovascular events"
    category: "cardiovascular"
    priority: 1
    version: "1.0.0"
    cel_rule: >
      age >= 65 && 
      (has_condition('hypertension') || has_condition('diabetes') || has_condition('hyperlipidemia')) &&
      (lab_value('total_cholesterol') > 200 || lab_value('ldl') > 130)
    metadata:
      evidence_level: "A"
      guideline_source: "ACC/AHA 2019"
      last_updated: "2023-11-01"

  - id: "heart_failure_risk"
    name: "Heart Failure Risk"
    description: "Identifies patients at risk for heart failure"
    category: "cardiovascular"
    priority: 2
    version: "1.0.0"
    cel_rule: >
      (has_condition('hypertension') && age > 65) ||
      (has_condition('diabetes') && has_condition('coronary_artery_disease')) ||
      (lab_value('bnp') > 100 || lab_value('nt_probnp') > 300)
    metadata:
      evidence_level: "B"
      guideline_source: "AHA/ACC/HFSA 2022"

  - id: "atrial_fibrillation_risk"
    name: "Atrial Fibrillation Risk"
    description: "CHA2DS2-VASc based atrial fibrillation risk assessment"
    category: "cardiovascular"
    priority: 2
    version: "1.0.0"
    cel_rule: >
      has_condition('atrial_fibrillation') &&
      (age >= 75 || 
       has_condition('heart_failure') || 
       has_condition('hypertension') ||
       has_condition('diabetes') ||
       has_condition('stroke_history') ||
       has_condition('vascular_disease'))
    metadata:
      scoring_system: "CHA2DS2-VASc"
      evidence_level: "A"

  - id: "coronary_artery_disease_progression"
    name: "CAD Progression Risk"
    description: "Risk of coronary artery disease progression"
    category: "cardiovascular"
    priority: 2
    version: "1.0.0"
    cel_rule: >
      has_condition('coronary_artery_disease') &&
      (lab_value('ldl') > 70 || 
       lab_value('hba1c') > 7.0 ||
       vital_value('systolic_bp') > 140 ||
       has_condition('smoking'))
    metadata:
      target_ldl: "<70 mg/dL"
      target_hba1c: "<7%"
      target_bp: "<140/90 mmHg"

  - id: "metabolic_syndrome"
    name: "Metabolic Syndrome"
    description: "NCEP ATP III criteria for metabolic syndrome"
    category: "cardiovascular"
    priority: 3
    version: "1.0.0"
    cel_rule: >
      (vital_value('waist_circumference') > 102 && gender == 'male') ||
      (vital_value('waist_circumference') > 88 && gender == 'female') ||
      lab_value('triglycerides') >= 150 ||
      (lab_value('hdl') < 40 && gender == 'male') ||
      (lab_value('hdl') < 50 && gender == 'female') ||
      vital_value('systolic_bp') >= 130 ||
      lab_value('fasting_glucose') >= 100
    metadata:
      criteria: "NCEP ATP III"
      minimum_criteria: 3

# Rule validation metadata
validation:
  required_fields:
    - age
    - gender
    - conditions
  optional_fields:
    - labs
    - vitals
    - medications
  supported_conditions:
    - hypertension
    - diabetes
    - hyperlipidemia
    - coronary_artery_disease
    - heart_failure
    - atrial_fibrillation
    - stroke_history
    - vascular_disease
    - smoking
  supported_labs:
    - total_cholesterol
    - ldl
    - hdl
    - triglycerides
    - bnp
    - nt_probnp
    - hba1c
    - fasting_glucose
  supported_vitals:
    - systolic_bp
    - diastolic_bp
    - waist_circumference