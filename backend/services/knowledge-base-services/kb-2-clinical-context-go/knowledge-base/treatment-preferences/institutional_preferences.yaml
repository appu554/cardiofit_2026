# Institutional Treatment Preferences and Rules

institutional_rules:
  diabetes_management:
    rule_id: "diabetes_first_line_2023"
    name: "Diabetes First-Line Treatment Guidelines"
    version: "2023.1"
    effective_date: "2023-01-01"
    
    conditions: ["type2_diabetes", "diabetes"]
    
    preferences:
      first_line:
        medication: "metformin"
        rationale: "ADA/EASD 2023 consensus - first-line therapy unless contraindicated"
        contraindications:
          - "severe_kidney_disease"
          - "liver_disease" 
          - "heart_failure_class_iv"
          - "metformin_allergy"
        
      second_line_options:
        - medication_class: "SGLT2_inhibitors"
          preference_score: 0.9
          conditions: ["cardiovascular_disease", "heart_failure", "ckd"]
          rationale: "Cardiovascular and renal protection benefits"
          
        - medication_class: "GLP1_agonists"
          preference_score: 0.85
          conditions: ["obesity", "cardiovascular_disease"]
          rationale: "Weight loss and cardiovascular benefits"
          
        - medication_class: "DPP4_inhibitors" 
          preference_score: 0.7
          conditions: ["elderly", "mild_kidney_disease"]
          rationale: "Good safety profile, minimal hypoglycemia risk"
          
        - medication_class: "sulfonylureas"
          preference_score: 0.6
          conditions: ["cost_constraints", "no_hypoglycemia_risk"]
          rationale: "Cost-effective, established efficacy"
    
    special_populations:
      elderly_patients:
        age_threshold: 75
        hba1c_target: [7.0, 8.5]
        avoid_medications: ["insulin_sliding_scale", "long_acting_sulfonylureas"]
        preferred_medications: ["DPP4_inhibitors", "short_acting_insulin"]
        
      ckd_patients:
        egfr_thresholds:
          stage_3a: [45, 60]  # Dose adjust metformin
          stage_3b: [30, 45]  # Stop metformin
          stage_4: [15, 30]   # Avoid most oral agents
          stage_5: [0, 15]    # Insulin preferred
          
      heart_failure:
        nyha_class: [1, 4]
        preferred: ["SGLT2_inhibitors"]
        avoid: ["thiazolidinediones", "metformin_if_class_iv"]

  hypertension_management:
    rule_id: "htn_treatment_acc_aha_2017"
    name: "Hypertension Treatment - ACC/AHA Guidelines"
    version: "2017.1"
    
    conditions: ["hypertension", "elevated_bp"]
    
    blood_pressure_targets:
      general_population:
        target: [130, 80]
        rationale: "ACC/AHA 2017 guidelines"
        
      diabetes:
        target: [130, 80]
        rationale: "Diabetes-specific BP target"
        
      ckd:
        target: [130, 80]
        rationale: "CKD progression prevention"
        
      elderly:
        age_threshold: 65
        target: [130, 80]
        rationale: "SPRINT trial evidence"
    
    first_line_combinations:
      - medications: ["ACE_inhibitor", "thiazide_diuretic"]
        preference_score: 0.95
        rationale: "Proven cardiovascular outcomes"
        
      - medications: ["ARB", "thiazide_diuretic"] 
        preference_score: 0.9
        rationale: "Alternative for ACE inhibitor intolerance"
        
      - medications: ["ACE_inhibitor", "CCB"]
        preference_score: 0.85
        rationale: "Good for diabetics and elderly"
        
      - medications: ["ARB", "CCB"]
        preference_score: 0.8
        rationale: "Alternative combination"
    
    special_considerations:
      diabetes:
        preferred_classes: ["ACE_inhibitor", "ARB"]
        rationale: "Renal protection benefits"
        
      heart_failure:
        preferred_classes: ["ACE_inhibitor", "ARB", "beta_blocker", "aldosterone_antagonist"]
        avoid: ["CCB_immediate_release"]
        
      african_american:
        first_line: ["thiazide_diuretic", "CCB"]
        rationale: "Better response in African American patients"

  lipid_management:
    rule_id: "lipid_acc_aha_2018"
    name: "Lipid Management Guidelines"
    version: "2018.1"
    
    conditions: ["hyperlipidemia", "cardiovascular_disease", "diabetes"]
    
    risk_stratification:
      very_high_risk:
        conditions: ["acute_coronary_syndrome", "stroke", "peripheral_artery_disease"]
        ldl_target: 70
        preferred_intensity: "high_intensity_statin"
        
      high_risk:
        conditions: ["diabetes", "familial_hypercholesterolemia", "10_year_risk_20_percent"]
        ldl_target: 100
        preferred_intensity: "moderate_to_high_intensity_statin"
        
      moderate_risk:
        conditions: ["10_year_risk_7.5_to_20_percent"]
        ldl_target: 130
        preferred_intensity: "moderate_intensity_statin"
    
    statin_therapy:
      high_intensity:
        medications: ["atorvastatin_40_80mg", "rosuvastatin_20_40mg"]
        ldl_reduction: [50, 60]
        
      moderate_intensity:
        medications: ["atorvastatin_10_20mg", "rosuvastatin_5_10mg", "simvastatin_20_40mg"]
        ldl_reduction: [30, 50]
        
      low_intensity:
        medications: ["simvastatin_10mg", "pravastatin_10_20mg", "fluvastatin_20_40mg"]
        ldl_reduction: [20, 30]
    
    combination_therapy:
      ezetimibe:
        indication: "inadequate_ldl_reduction_with_statin"
        additional_reduction: 25
        
      pcsk9_inhibitors:
        indication: "very_high_risk_inadequate_response"
        additional_reduction: [50, 60]
        cost_consideration: "high"

# Cost-effectiveness rules
cost_effectiveness:
  formulary_preferences:
    diabetes:
      tier_1: ["metformin", "glipizide", "glyburide"] 
      tier_2: ["sitagliptin", "linagliptin"]
      tier_3: ["empagliflozin", "liraglutide"]
      tier_4: ["semaglutide", "tirzepatide"]
      
    hypertension:
      tier_1: ["lisinopril", "losartan", "amlodipine", "hydrochlorothiazide"]
      tier_2: ["telmisartan", "olmesartan"] 
      tier_3: ["sacubitril_valsartan"]
      
    lipids:
      tier_1: ["atorvastatin", "simvastatin"]
      tier_2: ["rosuvastatin", "pravastatin"]
      tier_3: ["ezetimibe"]
      tier_4: ["pcsk9_inhibitors"]
  
  generic_preferences:
    prefer_generic: true
    brand_justification_required: true
    cost_difference_threshold: 2.0  # Prefer generic if >2x cheaper
  
  step_therapy:
    diabetes:
      - step: 1
        medications: ["metformin"]
        trial_duration_weeks: 12
        
      - step: 2
        medications: ["metformin", "sulfonylurea"]
        trial_duration_weeks: 12
        
      - step: 3
        medications: ["metformin", "SGLT2_inhibitor_or_GLP1_agonist"]
        prior_authorization_required: true

# Quality metrics and monitoring
quality_metrics:
  diabetes:
    hba1c_target_achievement: 0.8  # 80% of patients
    bp_target_achievement: 0.7     # 70% of patients
    ldl_target_achievement: 0.6    # 60% of patients
    
  hypertension:
    bp_control_rate: 0.8          # 80% of patients
    medication_adherence: 0.85    # 85% adherence rate
    
  monitoring_requirements:
    diabetes:
      hba1c_frequency: "quarterly"
      lipid_panel_frequency: "annually"
      kidney_function_frequency: "annually"
      
    hypertension:
      bp_monitoring: "monthly_until_controlled_then_quarterly"
      kidney_function: "annually"

# Conflict resolution hierarchy
conflict_resolution:
  priority_order:
    1: "patient_safety"
    2: "clinical_efficacy" 
    3: "institutional_guidelines"
    4: "cost_effectiveness"
    5: "patient_preferences"
  
  safety_overrides:
    - contraindication_absolute: "never_override"
    - contraindication_relative: "physician_discretion"
    - drug_interaction_major: "require_monitoring"
    - drug_interaction_moderate: "caution_advised"
  
  clinical_efficacy:
    evidence_level_minimum: "B"
    guideline_concordance_required: true
    outcomes_data_preference: true
  
  patient_preference_accommodation:
    dosing_frequency: "accommodate_when_possible"
    route_of_administration: "accommodate_when_equivalent"
    cost_concerns: "consider_generics_and_assistance_programs"

# Approval workflows
approval_workflows:
  high_cost_medications:
    cost_threshold: 500  # USD per month
    approval_required: true
    documentation_required:
      - "clinical_justification"
      - "tried_and_failed_alternatives"
      - "patient_assistance_programs_considered"
  
  off_label_use:
    approval_required: true
    documentation_required:
      - "literature_review"
      - "risk_benefit_analysis"
      - "informed_consent"
  
  controlled_substances:
    approval_required: true
    monitoring_required: true
    documentation_required:
      - "pain_assessment"
      - "functional_goals"
      - "risk_stratification"