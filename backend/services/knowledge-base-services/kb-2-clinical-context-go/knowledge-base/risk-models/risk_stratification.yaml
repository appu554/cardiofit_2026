# Risk Stratification Models Configuration

risk_models:
  cardiovascular:
    name: "Cardiovascular Risk Assessment"
    version: "2.0.0"
    description: "Multi-factorial cardiovascular risk assessment model"
    base_model: "framingham_risk_score"
    
    risk_factors:
      age:
        weight: 0.3
        thresholds:
          low: [20, 45]
          moderate: [45, 65]
          high: [65, 80]
          very_high: [80, 120]
      
      gender:
        weight: 0.15
        male_risk_multiplier: 1.2
        female_risk_multiplier: 1.0
      
      smoking:
        weight: 0.25
        current_smoker: 1.5
        former_smoker: 1.2
        never_smoker: 1.0
      
      blood_pressure:
        weight: 0.2
        systolic_thresholds:
          normal: [90, 120]
          elevated: [120, 130]
          stage1: [130, 140]
          stage2: [140, 180]
          crisis: [180, 250]
      
      cholesterol:
        weight: 0.15
        total_cholesterol_thresholds:
          optimal: [100, 200]
          borderline: [200, 240]
          high: [240, 300]
        ldl_thresholds:
          optimal: [50, 100]
          near_optimal: [100, 130]
          borderline: [130, 160]
          high: [160, 190]
          very_high: [190, 300]
      
      diabetes:
        weight: 0.2
        type1_multiplier: 1.8
        type2_multiplier: 1.6
        hba1c_thresholds:
          controlled: [4.0, 7.0]
          moderate: [7.0, 8.0]
          poor: [8.0, 12.0]
    
    calculation_method: "weighted_composite"
    output_scale: [0, 1]
    
  diabetes:
    name: "Diabetes Complications Risk"
    version: "1.5.0" 
    description: "Risk assessment for diabetic complications"
    
    risk_factors:
      diabetes_duration:
        weight: 0.25
        duration_years_thresholds:
          early: [0, 5]
          moderate: [5, 10]
          established: [10, 20]
          long_term: [20, 50]
      
      glycemic_control:
        weight: 0.3
        hba1c_thresholds:
          excellent: [4.0, 6.5]
          good: [6.5, 7.0]
          fair: [7.0, 8.0]
          poor: [8.0, 10.0]
          very_poor: [10.0, 15.0]
      
      kidney_function:
        weight: 0.2
        egfr_thresholds:
          normal: [90, 150]
          mild_decrease: [60, 90]
          moderate_decrease: [30, 60]
          severe_decrease: [15, 30]
          kidney_failure: [0, 15]
        microalbumin_thresholds:
          normal: [0, 30]
          microalbuminuria: [30, 300]
          macroalbuminuria: [300, 2000]
      
      blood_pressure:
        weight: 0.15
        target_bp: [120, 80]
        hypertensive_multiplier: 1.4
      
      lipid_profile:
        weight: 0.1
        ldl_target: 100
        hdl_minimum: 40
    
    complications:
      nephropathy:
        primary_factors: ["kidney_function", "glycemic_control", "blood_pressure"]
        weight_adjustment: 1.2
      retinopathy:
        primary_factors: ["diabetes_duration", "glycemic_control"]
        weight_adjustment: 1.0
      neuropathy:
        primary_factors: ["diabetes_duration", "glycemic_control", "age"]
        weight_adjustment: 1.1
    
  medication:
    name: "Medication Interaction Risk"
    version: "1.0.0"
    description: "Risk assessment for drug-drug interactions and adverse events"
    
    risk_factors:
      polypharmacy:
        weight: 0.3
        medication_count_thresholds:
          low: [1, 4]
          moderate: [5, 9]
          high: [10, 14]
          very_high: [15, 30]
      
      age_related_risk:
        weight: 0.25
        elderly_threshold: 65
        very_elderly_threshold: 80
        pediatric_threshold: 18
      
      organ_function:
        weight: 0.2
        kidney_function_weight: 0.6
        liver_function_weight: 0.4
      
      high_risk_medications:
        weight: 0.25
        categories:
          anticoagulants: 2.0
          antiarrhythmics: 1.8
          immunosuppressants: 1.7
          chemotherapy: 2.5
          insulin: 1.6
          opioids: 1.5
    
    interaction_severity:
      contraindicated: 4.0
      major: 3.0
      moderate: 2.0
      minor: 1.0
    
  fall:
    name: "Fall Risk Assessment"
    version: "1.0.0"
    description: "Multi-factorial fall risk assessment for elderly patients"
    
    target_population:
      min_age: 65
      applicable_conditions: ["mobility_impairment", "balance_disorder", "cognitive_impairment"]
    
    risk_factors:
      age:
        weight: 0.2
        age_groups:
          young_elderly: [65, 75]
          middle_elderly: [75, 85]
          old_elderly: [85, 100]
      
      medications:
        weight: 0.25
        fall_risk_medications:
          sedatives: 1.8
          antipsychotics: 1.9
          benzodiazepines: 2.0
          antihypertensives: 1.4
          opioids: 1.6
      
      medical_conditions:
        weight: 0.2
        conditions:
          parkinsons: 2.2
          stroke: 1.8
          arthritis: 1.4
          osteoporosis: 1.6
          visual_impairment: 1.7
      
      functional_status:
        weight: 0.15
        mobility_aids: 1.5
        balance_impairment: 1.8
        gait_disorder: 1.6
      
      environmental_factors:
        weight: 0.1
        home_hazards: 1.3
        lighting_issues: 1.2
      
      fall_history:
        weight: 0.3
        recent_falls_multiplier: 2.5
        recurrent_falls_multiplier: 3.0
    
  bleeding:
    name: "Bleeding Risk Assessment"
    version: "1.0.0"
    description: "HAS-BLED based bleeding risk assessment for anticoagulated patients"
    
    applicable_conditions: ["atrial_fibrillation", "venous_thromboembolism", "mechanical_heart_valve"]
    
    risk_factors:
      hypertension:
        weight: 1.0
        threshold: "SBP > 160 mmHg"
      
      abnormal_renal_liver_function:
        weight: 1.0
        renal_criteria: "creatinine > 2.26 mg/dL or dialysis"
        liver_criteria: "cirrhosis or bilirubin > 2x normal or AST/ALT > 3x normal"
      
      stroke_history:
        weight: 1.0
        includes: "previous stroke or TIA"
      
      bleeding_history:
        weight: 1.0
        includes: "major bleeding history or predisposition"
      
      labile_inr:
        weight: 1.0
        criteria: "TTR < 60% or frequent INR fluctuations"
      
      elderly:
        weight: 1.0
        threshold: "age > 65 years"
      
      drugs_alcohol:
        weight: 1.0
        drugs: "antiplatelet agents, NSAIDs"
        alcohol: "≥ 8 units per week"
    
    scoring:
      low_risk: [0, 2]
      moderate_risk: [3, 4]
      high_risk: [5, 9]
    
    annual_bleeding_rates:
      score_0: 1.13
      score_1: 1.02
      score_2: 1.88
      score_3: 3.74
      score_4: 8.70
      score_5: 12.50

# Global risk model configuration
global_config:
  default_time_horizon: "5_year"
  confidence_intervals: [0.90, 0.95, 0.99]
  minimum_data_completeness: 0.7
  
  output_format:
    include_percentiles: true
    include_confidence_intervals: true
    include_contributing_factors: true
    max_factors_returned: 10
  
  performance_targets:
    max_calculation_time_ms: 100
    batch_size_limit: 1000
  
  validation:
    require_age: true
    require_gender: true
    minimum_conditions: 0
    minimum_labs: 0

# Model versioning and updates
versioning:
  semantic_versioning: true
  backward_compatibility_versions: 2
  deprecation_notice_months: 6
  
  update_triggers:
    new_clinical_evidence: true
    guideline_updates: true
    performance_improvements: true
    security_patches: true