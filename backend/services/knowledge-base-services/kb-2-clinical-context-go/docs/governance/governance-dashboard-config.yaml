# KB-2 Clinical Context Service - Governance Dashboard Configuration

metadata:
  service_name: "KB-2 Clinical Context Service"
  version: "1.0.0"
  dashboard_version: "1.0"
  created_date: "2025-01-15"
  last_updated: "2025-01-15"
  owner: "Clinical Governance Committee"
  
governance_framework:
  clinical_governance_committee:
    chair: "Medical Director"
    members:
      - "Chief Medical Informatics Officer"
      - "Clinical Informatics Specialist (2)"
      - "Biostatistician"
      - "Quality Assurance Director"
      - "Platform Engineering Lead"
    meeting_schedule: "Monthly - First Tuesday 2:00 PM"
    next_meeting: "2025-02-04"
    
  technical_governance_board:
    chair: "Platform Engineering Director"
    members:
      - "Senior Software Architect (2)"
      - "DevOps Lead"
      - "Security Engineer"
      - "Performance Engineer"
      - "Clinical Informatics Technical Lead"
    meeting_schedule: "Bi-weekly - Alternating Wednesdays 10:00 AM"
    next_meeting: "2025-01-22"

review_schedules:
  - component: "Phenotype Rules"
    frequency: "Quarterly"
    review_body: "Clinical Informatics Team"
    next_review: "2025-04-15"
    risk_level: "Medium"
    status: "Scheduled"
    
  - component: "Risk Models"
    frequency: "Annual"
    review_body: "Biostatistics + Clinical Committee"
    next_review: "2026-01-15"
    risk_level: "High"
    status: "Scheduled"
    
  - component: "Treatment Preferences"
    frequency: "Semi-Annual"
    review_body: "P&T Committee"
    next_review: "2025-07-15"
    risk_level: "Medium"
    status: "Scheduled"
    
  - component: "Performance Metrics"
    frequency: "Monthly"
    review_body: "Platform Team"
    next_review: "2025-02-01"
    risk_level: "Low"
    status: "Ongoing"
    
  - component: "Security Policies"
    frequency: "Quarterly"
    review_body: "Security Team"
    next_review: "2025-04-15"
    risk_level: "High"
    status: "Scheduled"
    
  - component: "Integration Patterns"
    frequency: "Bi-Annual"
    review_body: "Technical Board"
    next_review: "2025-07-15"
    risk_level: "Medium"
    status: "Scheduled"

quality_metrics:
  clinical_quality:
    phenotype_accuracy:
      target: ">= 98%"
      current: "98.5%"
      measurement: "Expert review of random sample (n=100 weekly)"
      alert_threshold: "< 95%"
      status: "✅ Compliant"
      
    risk_model_performance:
      target: ">= 0.80 AUC-ROC"
      current: "0.85 AUC-ROC"
      measurement: "Quarterly validation against outcomes"
      alert_threshold: "< 0.75"
      status: "✅ Compliant"
      
    treatment_appropriateness:
      target: ">= 95%"
      current: "96.2%"
      measurement: "Monthly P&T committee review"
      alert_threshold: "< 90%"
      status: "✅ Compliant"
      
  technical_performance:
    response_time_p95:
      target: "< 100ms"
      current: "47ms"
      measurement: "Continuous monitoring"
      alert_threshold: "> 150ms"
      status: "✅ Compliant"
      
    system_availability:
      target: ">= 99.9%"
      current: "99.95%"
      measurement: "Uptime monitoring"
      alert_threshold: "< 99.5%"
      status: "✅ Compliant"
      
    error_rate:
      target: "< 0.1%"
      current: "0.05%"
      measurement: "HTTP error rate monitoring"
      alert_threshold: "> 0.5%"
      status: "✅ Compliant"

