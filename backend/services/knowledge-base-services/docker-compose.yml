version: '3.8'

services:
  # ==================== KNOWLEDGE BASE SERVICES ====================
  
  kb-drug-rules:
    build: ./kb-drug-rules
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/kb_drug_rules
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=kb-artifacts
      - KAFKA_BROKERS=kafka:9092
      - SIGNING_KEY_PATH=/app/keys/signing.key
      - RUST_LOG=info
    depends_on:
      - db
      - redis
      - minio
      - kafka
    volumes:
      - ./keys:/app/keys:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  kb-ddi:
    build: ./kb-ddi
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/kb_ddi
      - REDIS_URL=redis://redis:6379/1
      - KAFKA_BROKERS=kafka:9092
      - RUST_LOG=info
    depends_on:
      - db
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  kb-patient-safety:
    build: ./kb-patient-safety
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/kb_patient_safety
      - REDIS_URL=redis://redis:6379/2
      - KAFKA_BROKERS=kafka:9092
      - RUST_LOG=info
    depends_on:
      - db
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  kb-clinical-pathways:
    build: ./kb-clinical-pathways
    ports:
      - "8084:8084"
    environment:
      - DATABASE_URL=postgresql://kb_clinical_pathways_user:kb_password@db:5432/kb_clinical_pathways
      - REDIS_URL=redis://redis:6379/3
      - KAFKA_BROKERS=kafka:9092
      - PORT=8084
      - DEBUG=false
    depends_on:
      - db
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3



  kb-formulary:
    build: ./kb-formulary
    ports:
      - "8085:8085"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/kb_formulary
      - REDIS_URL=redis://redis:6379/4
      - KAFKA_BROKERS=kafka:9092
      - RUST_LOG=info
    depends_on:
      - db
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  kb-terminology:
    build: ./kb-terminology
    ports:
      - "8086:8086"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/kb_terminology
      - REDIS_URL=redis://redis:6379/5
      - KAFKA_BROKERS=kafka:9092
      - RUST_LOG=info
    depends_on:
      - db
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  kb-drug-master:
    build: ./kb-drug-master
    ports:
      - "8087:8087"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/kb_drug_master
      - REDIS_URL=redis://redis:6379/6
      - KAFKA_BROKERS=kafka:9092
      - RUST_LOG=info
    depends_on:
      - db
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== INFRASTRUCTURE SERVICES ====================

  db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== MONITORING SERVICES ====================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  kafka_data:
  zookeeper_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: kb-network
