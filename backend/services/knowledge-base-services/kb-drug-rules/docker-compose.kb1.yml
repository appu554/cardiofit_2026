# KB-1 Drug Dosing Rules Service - Docker Compose
# Standalone deployment with PostgreSQL and Redis
# Port: 8081

version: '3.8'

services:
  # ==================== KB-1 DRUG RULES SERVICE ====================
  kb-drug-rules:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb1-drug-rules
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DEBUG=false
      - DATABASE_URL=postgresql://kb_drug_rules_user:kb_password@kb1-postgres:5432/kb_drug_rules?sslmode=disable
      - REDIS_URL=redis://kb1-redis:6379/0
      - CACHE_TTL=3600
      - CACHE_MAX_SIZE=10000
      - REQUIRE_APPROVAL=false
      - REQUIRE_SIGNATURE=false
      - DEFAULT_REGION=US
      - SUPPORTED_REGIONS=US,EU,CA,AU,IN
      - METRICS_ENABLED=true
      - METRICS_PATH=/metrics
    depends_on:
      kb1-postgres:
        condition: service_healthy
      kb1-redis:
        condition: service_healthy
    networks:
      - kb1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ==================== POSTGRESQL DATABASE ====================
  kb1-postgres:
    image: postgres:15-alpine
    container_name: kb1-postgres
    ports:
      - "5481:5432"  # Using 5481 to avoid conflicts with other KB services
    environment:
      - POSTGRES_USER=kb_drug_rules_user
      - POSTGRES_PASSWORD=kb_password
      - POSTGRES_DB=kb_drug_rules
    volumes:
      - kb1_postgres_data:/var/lib/postgresql/data
      - ./init-db-kb1.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - kb1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_drug_rules_user -d kb_drug_rules"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== REDIS CACHE ====================
  kb1-redis:
    image: redis:7-alpine
    container_name: kb1-redis
    ports:
      - "6382:6379"  # Using 6382 to avoid conflicts with kb3 (6380) and kb4 (6381)
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - kb1_redis_data:/data
    networks:
      - kb1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==================== ADMINER (DB UI) ====================
  kb1-adminer:
    image: adminer:latest
    container_name: kb1-adminer
    ports:
      - "8181:8080"  # Using 8181 to avoid conflicts
    environment:
      - ADMINER_DEFAULT_SERVER=kb1-postgres
    depends_on:
      - kb1-postgres
    networks:
      - kb1-network
    restart: unless-stopped
    profiles:
      - dev  # Only start with --profile dev

volumes:
  kb1_postgres_data:
    name: kb1_postgres_data
  kb1_redis_data:
    name: kb1_redis_data

networks:
  kb1-network:
    name: kb1-network
    driver: bridge
