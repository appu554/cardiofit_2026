# Sample Drug Rule in TOML Format
# Drug: Metformin - First-line treatment for Type 2 Diabetes

[meta]
drug_id = "metformin_hcl_500mg"
name = "Metformin Hydrochloride 500mg"
version = "2.1.0"
clinical_reviewer = "Dr. Sarah Johnson"
therapeutic_class = "Biguanide Antidiabetic"
evidence_grade = "A"
last_updated = "2025-01-20T10:30:00Z"
regions = ["US", "EU", "CA"]

[indications]
primary = "Type 2 Diabetes Mellitus"
secondary = [
    "Polycystic Ovary Syndrome (PCOS)",
    "Prediabetes (impaired glucose tolerance)",
    "Gestational diabetes (off-label)"
]

[dose_calculation]
base_dose_mg = 500.0
max_daily_dose_mg = 2550.0
min_dose_mg = 250.0
titration_interval_days = 7
administration_frequency = "twice_daily"

# Renal adjustment based on eGFR
[dose_calculation.renal_adjustment]
egfr_30_45 = "reduce_by_50_percent"
egfr_below_30 = "contraindicated"
dialysis = "contraindicated"

# Hepatic adjustment
[dose_calculation.hepatic_adjustment]
mild_impairment = "no_adjustment"
moderate_severe = "contraindicated"

[safety_verification]
contraindications = [
    "Severe renal impairment (eGFR < 30 mL/min/1.73m²)",
    "Metabolic acidosis, including diabetic ketoacidosis",
    "Severe hepatic impairment",
    "Hypersensitivity to metformin",
    "Acute or chronic conditions predisposing to hypoxemia"
]

warnings = [
    "Risk of lactic acidosis",
    "Vitamin B12 deficiency with long-term use",
    "Temporary discontinuation before contrast procedures"
]

precautions = [
    "Monitor renal function regularly",
    "Assess for signs of lactic acidosis",
    "Consider B12 supplementation for long-term use"
]

[monitoring_requirements]
baseline = [
    "Complete blood count",
    "Comprehensive metabolic panel",
    "HbA1c",
    "Vitamin B12 level"
]

ongoing = [
    "HbA1c every 3-6 months",
    "Renal function every 6-12 months",
    "Vitamin B12 annually"
]

[drug_interactions]
major = [
    "Contrast agents (iodinated)",
    "Alcohol (chronic use)",
    "Cimetidine"
]

moderate = [
    "Furosemide",
    "Nifedipine",
    "Vancomycin",
    "Amiloride"
]

minor = [
    "Thiazide diuretics",
    "Corticosteroids",
    "Phenytoin"
]

[adverse_effects]
common = [
    "Gastrointestinal upset (nausea, diarrhea)",
    "Metallic taste",
    "Decreased appetite"
]

serious = [
    "Lactic acidosis (rare but potentially fatal)",
    "Vitamin B12 deficiency"
]

[clinical_protocols]
initiation = """
1. Start with 500mg once daily with evening meal
2. Increase to 500mg twice daily after 1 week if tolerated
3. Further titration based on glycemic response and tolerance
4. Maximum effective dose typically 2000mg daily
"""

titration_schedule = [
    { week = 1, dose_mg = 500, frequency = "once_daily" },
    { week = 2, dose_mg = 500, frequency = "twice_daily" },
    { week = 4, dose_mg = 1000, frequency = "twice_daily" },
    { week = 8, dose_mg = 1275, frequency = "twice_daily" }
]

[patient_counseling]
key_points = [
    "Take with meals to reduce GI side effects",
    "Do not crush or chew extended-release tablets",
    "Report persistent nausea, vomiting, or unusual fatigue",
    "Inform healthcare providers before contrast procedures"
]

dietary_advice = [
    "Maintain consistent carbohydrate intake",
    "Limit alcohol consumption",
    "Stay well hydrated"
]

[regional_variations]
[regional_variations.US]
max_daily_dose_mg = 2550.0
preferred_formulation = "immediate_release"
notes = "FDA-approved for pediatric use ≥10 years"

[regional_variations.EU]
max_daily_dose_mg = 3000.0
preferred_formulation = "extended_release"
notes = "EMA-approved for pediatric use ≥10 years"

[regional_variations.CA]
max_daily_dose_mg = 2550.0
preferred_formulation = "immediate_release"
notes = "Health Canada approved"

[quality_metrics]
evidence_level = "1A"
guideline_concordance = "ADA/EASD_2023"
last_literature_review = "2024-12-15"
peer_review_status = "approved"

[version_history]
[[version_history.changes]]
version = "2.0.0"
date = "2024-06-15"
changes = "Updated renal dosing guidelines"
reviewer = "Dr. Michael Chen"

[[version_history.changes]]
version = "2.1.0"
date = "2025-01-20"
changes = "Added regional variations and updated drug interactions"
reviewer = "Dr. Sarah Johnson"
