# KB-1 Vancomycin Dosing Rules (Production Example)
# Drug: Vancomycin - Glycopeptide Antibiotic
# Specification: KB-1 Drug Dosing Rules Documentation
# Clinical Grade: SaMD Class II - Renal dosing with trough monitoring

[meta]
name = "vancomycin"
semantic_version = "1.0.0"
authors = ["ID PharmD: Raj Patel"]
approvals = []
kb3_refs = ["IDSA-Guidelines-2020", "Vancomycin-Consensus-2009"]
kb4_refs = ["SAF-ID-VANC", "OTOTOX-NEPHROTOX-2025"]
effective_from = "2025-09-01"
drug_code = "rxnorm:11124"
drug_name = "Vancomycin Hydrochloride"

[base_dose]
unit = "mg"
loading = "15-20 mg/kg IBW"
maintenance = "15-20 mg/kg IBW q8-12h"
max_single = 2000
max_daily = 4000
frequency = "q8h"
note = "IV dosing based on ideal body weight (IBW)"

[[formulations]]
form = "injection"
strengths = [500, 1000, 1500] # mg vials
route = "intravenous"

[[formulations]]
form = "oral_capsule"
strengths = [125, 250] # mg capsules
route = "oral"
note = "Oral form for C. difficile colitis only"

# Renal function-based dosing (critical for vancomycin)
[[adjustments.renal]]
egfr_min = 90
egfr_max = 200
action = "standard_dosing"
factor = 1.0
interval = "q8h"
note = "Normal renal function"

[[adjustments.renal]]
egfr_min = 60
egfr_max = 89
action = "standard_dosing"
factor = 1.0
interval = "q12h"
note = "Mild renal impairment - extend interval"

[[adjustments.renal]]
egfr_min = 30
egfr_max = 59
action = "reduce_dose"
factor = 0.75
interval = "q12h"
note = "Moderate renal impairment"

[[adjustments.renal]]
egfr_min = 15
egfr_max = 29
action = "reduce_dose"
factor = 0.5
interval = "q24h"
note = "Severe renal impairment"

[[adjustments.renal]]
egfr_min = 0
egfr_max = 14
action = "individualized"
note = "ESRD - individualize based on trough levels and dialysis schedule"

# Dialysis-specific adjustments
[adjustments.dialysis.hemodialysis]
dose_multiplier = 1.0
supplemental_dose = 1000 # mg
timing_relative_to_dialysis = "post_dialysis"
note = "Administer supplemental dose after hemodialysis"

[adjustments.dialysis.peritoneal]
dose_multiplier = 0.75
interval = "q24h"
note = "Reduced clearance with peritoneal dialysis"

[adjustments.dialysis.crrt]
dose_multiplier = 1.25
interval = "q12h"
note = "Increased clearance with CRRT"

# Weight-based adjustments (IBW vs actual weight)
[[adjustments.weight]]
weight_min = 0
weight_max = 50
use_actual_weight = true
note = "Underweight patients - use actual weight"

[[adjustments.weight]]
weight_min = 50
weight_max = 150
use_ideal_weight = true
note = "Normal to overweight - use ideal body weight"

[[adjustments.weight]]
weight_min = 150
weight_max = 500
dose_cap_mg_per_kg = 20
note = "Obese patients - cap at 20 mg/kg IBW"

# No routine titration - dose based on trough levels
# Monitoring schedule instead of titration
[monitoring.trough_levels]
target_range = "10-20 mg/L"
timing = "steady_state" # After 3-5 half-lives
frequency = "with_each_dose_change"
critical_high = 30 # mg/L
critical_low = 5   # mg/L

[monitoring.safety_labs]
baseline = ["SCr", "BUN", "Hearing assessment"]
ongoing = ["SCr", "BUN"]
frequency = "every_2_3_doses"

# Age-based adjustments
[[adjustments.age]]
age_min = 65
age_max = 150
factor = 0.9
note = "Geriatric - increased ototoxicity/nephrotoxicity risk"

# Special populations
[population.pediatric]
age_min = 1
age_max = 17
formula = "15 * weight_kg" # mg/kg/dose
max_dose_mg = 2000
interval = "q6-8h"
note = "Pediatric dosing - higher clearance"

[population.neonatal]
age_min = 0
age_max = 0 # Use gestational age instead
formula = "gestational_age_dependent"
note = "Neonatal dosing requires gestational age and postnatal age"

[population.pregnancy]
contraindicated = true
note = "Ototoxicity and nephrotoxicity risk to fetus"

[population.breastfeeding]
contraindicated = false
factor = 1.0
note = "Minimal excretion in breast milk"

# Safety verification (critical for vancomycin)
[safety_verification]
contraindications = [
    "Known hypersensitivity to vancomycin",
    "Previous vancomycin-induced ototoxicity",
    "Red man syndrome with previous exposure"
]

warnings = [
    "Nephrotoxicity risk - monitor renal function",
    "Ototoxicity risk - monitor hearing",
    "Red man syndrome with rapid infusion",
    "Thrombophlebitis at injection site"
]

precautions = [
    "Infuse over at least 60 minutes",
    "Monitor trough levels at steady state",
    "Avoid concurrent nephrotoxic agents",
    "Adjust dose based on renal function"
]

lab_monitoring = [
    "Vancomycin trough level",
    "Serum creatinine",
    "Blood urea nitrogen",
    "Complete blood count",
    "Urinalysis"
]

# Drug interactions (high-risk combinations)
[drug_interactions]
nephrotoxic_agents = [
    "Aminoglycosides",
    "Amphotericin B", 
    "Cisplatin",
    "Loop diuretics (high dose)",
    "NSAIDs"
]

ototoxic_agents = [
    "Aminoglycosides",
    "Loop diuretics",
    "Cisplatin"
]

# Regional regulatory variations
[regional_variations.US]
max_daily_dose_mg = 4000
trough_target = "10-20 mg/L"
notes = "FDA guidelines - IDSA/ASHP consensus"

[regional_variations.EU]
max_daily_dose_mg = 4000
trough_target = "10-20 mg/L" 
notes = "EMA guidelines"

[regional_variations.CA]
max_daily_dose_mg = 4000
trough_target = "10-20 mg/L"
notes = "Health Canada guidelines"

[regional_variations.AU]
max_daily_dose_mg = 4000
trough_target = "10-20 mg/L"
notes = "TGA guidelines"