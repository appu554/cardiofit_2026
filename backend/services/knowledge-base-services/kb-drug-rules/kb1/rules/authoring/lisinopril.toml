# KB-1 Lisinopril Dosing Rules (Production Example)
# Drug: Lisinopril - ACE Inhibitor for Hypertension
# Specification: KB-1 Drug Dosing Rules Documentation
# Clinical Grade: SaMD Class II

[meta]
name = "lisinopril"
semantic_version = "1.0.0"
authors = ["PharmD: Alice Johnson"]
approvals = []
kb3_refs = ["ACC-AHA-HTN-2017:first-line"]
kb4_refs = ["SAF-HTN-ACEI-2025"]
effective_from = "2025-09-01"
drug_code = "rxnorm:8610"
drug_name = "Lisinopril"

[base_dose]
unit = "mg"
starting = 10
max_daily = 40
min_daily = 2.5
frequency = "once_daily"
note = "Adult oral starting dose for hypertension"

[[formulations]]
form = "tablet"
strengths = [2.5, 5, 10, 20]
route = "oral"

[[formulations]]
form = "oral_solution"
strengths = [1] # mg/mL
route = "oral"

# Renal function adjustments per ACC/AHA guidelines
[[adjustments.renal]]
egfr_min = 30
egfr_max = 59
action = "cap_max"
cap_max = 20
note = "Moderate renal impairment - reduce maximum dose"

[[adjustments.renal]]
egfr_min = 0
egfr_max = 29
action = "contraindicated"
contraindicated = true
note = "Severe renal impairment - refer to KB-4 for safety verification"

# Hepatic adjustments
[[adjustments.hepatic]]
child_pugh_class = "A"
action = "no_adjustment"
factor = 1.0

[[adjustments.hepatic]]
child_pugh_class = "B"
action = "reduce_max"
factor = 0.75
note = "Moderate hepatic impairment"

[[adjustments.hepatic]]
child_pugh_class = "C"
action = "contraindicated"
contraindicated = true

# Age-based adjustments
[[adjustments.age]]
age_min = 65
age_max = 150
factor = 0.8
max_dose_mg = 30
note = "Geriatric population - increased sensitivity"

# Titration schedule per clinical guidelines
[[titration]]
step = 1
after_days = 7
action = "increase_by"
increase_by = 5
max_step = 3
monitoring = "Blood pressure, serum creatinine, potassium"

[[titration]]
step = 2
after_days = 14
action = "increase_by"
increase_by = 5
max_step = 3
monitoring = "Blood pressure, serum creatinine, potassium"

[[titration]]
step = 3
after_days = 21
action = "increase_by"
increase_by = 10
max_step = 3
monitoring = "Blood pressure, serum creatinine, potassium"

# Special populations
[population.pediatric]
age_min = 6
age_max = 17
formula = "0.07 * weight_kg" # mg/kg
max_dose_mg = 20
contraindicated = false
note = "Pediatric dosing based on weight"

[population.pregnancy]
age_min = 18
age_max = 50
contraindicated = true
note = "Contraindicated in pregnancy - teratogenic risk"

[population.breastfeeding]
age_min = 18
age_max = 50
contraindicated = false
factor = 1.0
note = "Compatible with breastfeeding - monitor infant"

# Safety verification rules
[safety_verification]
contraindications = [
    "Severe renal impairment (eGFR < 30 mL/min/1.73m²)",
    "History of angioedema with ACE inhibitors",
    "Pregnancy",
    "Bilateral renal artery stenosis"
]

warnings = [
    "First-dose hypotension risk",
    "Hyperkalemia risk with renal impairment",
    "Dry cough in 10-15% of patients",
    "Angioedema (rare but serious)"
]

precautions = [
    "Monitor blood pressure regularly",
    "Check renal function within 1-2 weeks of initiation",
    "Monitor serum potassium",
    "Educate patient about dry cough"
]

lab_monitoring = [
    "Serum creatinine",
    "eGFR",
    "Serum potassium",
    "Blood pressure"
]

# Regional variations per regulatory requirements
[regional_variations.US]
max_daily_dose_mg = 40
notes = "FDA-approved dosing"
preferred_formulation = "tablet"

[regional_variations.EU]
max_daily_dose_mg = 40
notes = "EMA-approved dosing"
preferred_formulation = "tablet"

[regional_variations.CA]
max_daily_dose_mg = 40
notes = "Health Canada approved"
preferred_formulation = "tablet"

[regional_variations.AU]
max_daily_dose_mg = 40
notes = "TGA-approved dosing"
preferred_formulation = "tablet"