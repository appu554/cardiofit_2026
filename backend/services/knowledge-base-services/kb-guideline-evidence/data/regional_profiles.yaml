# Regional Profiles for KB-3 Guideline Evidence
# Defines regional preferences, measurement units, and regulatory frameworks

regional_profiles:
  
  US:
    region: "US"
    primary_sources:
      - "ADA"      # American Diabetes Association
      - "ACC/AHA"  # American College of Cardiology/American Heart Association  
      - "KDIGO"    # Kidney Disease: Improving Global Outcomes
      - "ADCES"    # Association of Diabetes Care & Education Specialists
      - "SAMBA"    # Society for Ambulatory Anesthesia
      - "ACP"      # American College of Physicians
      - "AACE"     # American Association of Clinical Endocrinologists
    measurement_units:
      glucose: "mg/dL"
      hba1c: "%"
      blood_pressure: "mmHg"
      cholesterol: "mg/dL"
      creatinine: "mg/dL"
      weight: "lbs"
      height: "inches"
      temperature: "°F"
    regulatory_framework: "FDA"
    currency: "USD"
    healthcare_system: "private_insurance_medicaid_medicare"
    prescribing_authority:
      - "MD"
      - "DO" 
      - "NP"
      - "PA"
      - "PharmD"
    special_considerations:
      insurance_formularies: true
      prior_authorization_common: true
      generic_substitution_encouraged: true
      biosimilar_adoption: "moderate"
    cultural_factors:
      language_primary: "en-US"
      dietary_preferences:
        - "standard_american"
        - "mediterranean_adapted"
        - "low_carb_popular"
      exercise_preferences:
        - "gym_based"
        - "walking"
        - "home_fitness"
    quality_measures:
      - "HEDIS"
      - "CMS_Quality_Measures"
      - "Joint_Commission"
      - "NCQA"
  
  EU:
    region: "EU"
    primary_sources:
      - "ESC/ESH"  # European Society of Cardiology/Hypertension
      - "EASD"     # European Association for the Study of Diabetes
      - "EMA"      # European Medicines Agency
      - "NICE"     # National Institute for Health and Care Excellence (UK)
      - "KDIGO"    # Kidney Disease: Improving Global Outcomes
    measurement_units:
      glucose: "mmol/L"
      hba1c: "mmol/mol"  # IFCC units preferred
      hba1c_alternative: "%"  # DCCT units still used
      blood_pressure: "mmHg"
      cholesterol: "mmol/L"
      creatinine: "μmol/L"
      weight: "kg"
      height: "cm"
      temperature: "°C"
    regulatory_framework: "EMA"
    currency: "EUR"
    healthcare_system: "universal_healthcare"
    prescribing_authority:
      - "General_Practitioner"
      - "Specialist_Physician"
      - "Clinical_Pharmacist"  # Limited in some countries
    special_considerations:
      centralized_drug_approval: true
      cost_effectiveness_required: true
      generic_substitution_mandatory: true
      biosimilar_adoption: "high"
      reference_pricing: true
    cultural_factors:
      language_primary: "multi_language"
      dietary_preferences:
        - "mediterranean"
        - "nordic"
        - "central_european"
      exercise_preferences:
        - "walking_cycling"
        - "public_transport_activity"
        - "outdoor_activities"
    quality_measures:
      - "EMA_Risk_Management"
      - "National_Quality_Frameworks"
      - "DRG_Systems"
    conversion_factors:
      glucose_mgdl_to_mmoll: 0.0555
      hba1c_percent_to_mmolmol: "((% * 10.93) - 23.5)"
      cholesterol_mgdl_to_mmoll: 0.02586
  
  AU:
    region: "AU"
    primary_sources:
      - "NHFA"     # National Heart Foundation of Australia
      - "ADS"      # Australian Diabetes Society  
      - "RACGP"    # Royal Australian College of General Practitioners
      - "TGA"      # Therapeutic Goods Administration
      - "NHMRC"    # National Health and Medical Research Council
    measurement_units:
      glucose: "mmol/L"
      hba1c: "%"  # DCCT units commonly used
      hba1c_alternative: "mmol/mol"  # IFCC units available
      blood_pressure: "mmHg"
      cholesterol: "mmol/L"
      creatinine: "μmol/L"
      weight: "kg"
      height: "cm"
      temperature: "°C"
    regulatory_framework: "TGA"
    currency: "AUD"
    healthcare_system: "medicare_with_private"
    prescribing_authority:
      - "General_Practitioner"
      - "Specialist"
      - "Nurse_Practitioner"
      - "Clinical_Pharmacist"  # Limited scope
    special_considerations:
      pbs_formulary_critical: true
      aboriginal_torres_strait_considerations: true
      remote_area_access_issues: true
      seasonal_worker_populations: true
      generic_substitution_encouraged: true
      biosimilar_adoption: "moderate_to_high"
    cultural_factors:
      language_primary: "en-AU"
      indigenous_populations: true
      dietary_preferences:
        - "mediterranean_adapted"
        - "asian_influenced"
        - "bush_tucker"  # Indigenous foods
      exercise_preferences:
        - "outdoor_activities"
        - "swimming"
        - "walking"
      seasonal_considerations:
        - "hot_climate_adaptations"
        - "skin_cancer_awareness"
    quality_measures:
      - "Australian_Commission_Safety_Quality"
      - "RACGP_Standards"
      - "ACHS_Standards"
    special_populations:
      aboriginal_torres_strait_islander:
        diabetes_prevalence_higher: true
        cardiovascular_risk_higher: true
        access_barriers: true
        cultural_dietary_practices: true
        social_determinants_significant: true
  
  WHO:
    region: "WHO"
    primary_sources:
      - "WHO"      # World Health Organization
      - "IDF"      # International Diabetes Federation
      - "ISH"      # International Society of Hypertension
      - "World_Heart_Federation"
    measurement_units:
      glucose: "mmol/L"  # Preferred international standard
      glucose_alternative: "mg/dL"  # Still widely used
      hba1c: "%"
      blood_pressure: "mmHg"
      cholesterol: "mmol/L"
      creatinine: "μmol/L"
      weight: "kg"
      height: "cm"
      temperature: "°C"
    regulatory_framework: "WHO"
    applicability: "resource_limited_settings"
    focus: "essential_medicines"
    healthcare_system: "varied_global"
    prescribing_authority:
      - "Physician"
      - "Clinical_Officer"
      - "Nurse"
      - "Community_Health_Worker"  # Task-shifting approach
    special_considerations:
      cost_minimization_critical: true
      infrastructure_limitations: true
      supply_chain_challenges: true
      generic_medicines_priority: true
      biosimilar_adoption: "varies_by_country"
      training_resource_constraints: true
      technology_limitations: true
    cultural_factors:
      language_primary: "multi_language_global"
      dietary_preferences: "highly_varied_regional"
      exercise_preferences: "walking_manual_labor_prevalent"
      economic_constraints: "significant"
    quality_measures:
      - "WHO_Essential_Medicines"
      - "Universal_Health_Coverage_Metrics"
      - "Sustainable_Development_Goals"
    priority_conditions:
      - "diabetes"
      - "hypertension" 
      - "cardiovascular_disease"
      - "chronic_kidney_disease"
    intervention_focus:
      - "prevention"
      - "early_detection"
      - "basic_management"
      - "cost_effective_treatments"
    resource_considerations:
      laboratory_access: "limited"
      specialist_access: "very_limited"
      medication_access: "essential_medicines_focus"
      technology_access: "basic"
  
  # Additional Regional Profiles
  
  CA:
    region: "CA"
    primary_sources:
      - "Diabetes_Canada"
      - "Hypertension_Canada"
      - "Canadian_Cardiovascular_Society"
      - "Health_Canada"
    measurement_units:
      glucose: "mmol/L"
      hba1c: "%"
      blood_pressure: "mmHg"
      cholesterol: "mmol/L"
      creatinine: "μmol/L"
      weight: "kg"
      height: "cm"
      temperature: "°C"
    regulatory_framework: "Health_Canada"
    currency: "CAD"
    healthcare_system: "universal_provincial"
    special_considerations:
      provincial_formulary_variations: true
      indigenous_populations: true
      bilingual_requirements: true  # English/French
      cold_climate_considerations: true
  
  UK:
    region: "UK"
    primary_sources:
      - "NICE"     # National Institute for Health and Care Excellence
      - "SIGN"     # Scottish Intercollegiate Guidelines Network
      - "BHS"      # British Hypertension Society
      - "Diabetes_UK"
      - "MHRA"     # Medicines and Healthcare products Regulatory Agency
    measurement_units:
      glucose: "mmol/L"
      hba1c: "mmol/mol"  # IFCC units mandated
      blood_pressure: "mmHg"
      cholesterol: "mmol/L"
      creatinine: "μmol/L"
      weight: "kg"
      height: "cm"
      temperature: "°C"
    regulatory_framework: "MHRA"
    currency: "GBP"
    healthcare_system: "NHS"
    special_considerations:
      nice_approval_required: true
      cost_effectiveness_mandatory: true
      postcode_lottery_concerns: true
      brexit_medicine_supply_considerations: true

# Regional Conversion Utilities
conversion_utilities:
  glucose:
    mgdl_to_mmoll: 0.0555
    mmoll_to_mgdl: 18.0
    
  hba1c:
    percent_to_mmolmol: "((percent * 10.93) - 23.5)"
    mmolmol_to_percent: "((mmolmol + 23.5) / 10.93)"
    
  cholesterol:
    mgdl_to_mmoll: 0.02586
    mmoll_to_mgdl: 38.67
    
  creatinine:
    mgdl_to_umoll: 88.4
    umoll_to_mgdl: 0.0113

# Regional Priority Settings
regional_priorities:
  US:
    priority_conditions:
      - "diabetes"
      - "hypertension"
      - "dyslipidemia"
      - "obesity"
    focus_areas:
      - "cardiovascular_risk_reduction"
      - "cost_effectiveness"
      - "quality_measures"
      
  EU:
    priority_conditions:
      - "cardiovascular_disease"
      - "diabetes"
      - "hypertension"
    focus_areas:
      - "population_health"
      - "health_technology_assessment"
      - "regulatory_harmonization"
      
  AU:
    priority_conditions:
      - "diabetes"
      - "cardiovascular_disease"
      - "chronic_kidney_disease"
    focus_areas:
      - "indigenous_health_equity"
      - "rural_remote_access"
      - "preventive_care"
      
  WHO:
    priority_conditions:
      - "diabetes"
      - "hypertension"
      - "cardiovascular_disease"
    focus_areas:
      - "essential_medicines_access"
      - "health_system_strengthening"
      - "universal_health_coverage"