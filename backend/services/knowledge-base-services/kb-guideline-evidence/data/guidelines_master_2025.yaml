guidelines:
  
  # ========== DIABETES GUIDELINES ==========
  
  - guideline_id: "ADA-DM-2025"
    source:
      organization: "ADA"
      full_name: "American Diabetes Association"
      country: "United States"
      region: "US"
    condition:
      primary: "Type 2 Diabetes Mellitus"
      secondary: ["Prediabetes", "Gestational Diabetes"]
      icd10_codes: ["E11", "E11.9", "E11.65", "R73.03"]
      snomed_codes: ["44054006", "9414007"]
    version: "2025"
    effective_date: "2025-01-01"
    superseded_date: null
    supersedes: "ADA-DM-2024"
    publication:
      doi: "10.2337/dc25-S001"
      journal: "Diabetes Care"
      year: 2025
      url: "https://diabetesjournals.org/care/issue/48/Supplement_1"
    
    recommendations:
      # Diagnosis
      - rec_id: "ADA-DM-2025-001"
        domain: "diagnosis"
        subdomain: "criteria"
        recommendation: "Diabetes diagnosed with A1C ≥6.5%, FPG ≥126 mg/dL, 2-hr PG ≥200 mg/dL during OGTT, or random PG ≥200 mg/dL with symptoms"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "A"
        applicability:
          populations: ["adults", "adolescents"]
          exclusions: ["pregnancy", "hemoglobinopathies"]
        linked_kb_refs:
          kb2_phenotypes: ["diabetes_newly_diagnosed"]
          kb7_terminology: ["hba1c_test", "glucose_tests"]
        metrics:
          outcome_measure: "Diagnostic accuracy"
          nnt: null
          absolute_risk_reduction: null
          relative_risk_reduction: null
      
      # Glycemic Targets
      - rec_id: "ADA-DM-2025-002"
        domain: "glycemic_control"
        subdomain: "targets"
        recommendation: "A1C goal <7% for most nonpregnant adults with diabetes"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "A"
        applicability:
          populations: ["adults", "non_pregnant"]
          exclusions: ["hypoglycemia_unawareness", "limited_life_expectancy"]
          special_populations:
            elderly: "Consider <8% if frail or comorbid"
            pediatric: "Consider <7.5% for adolescents"
            pregnancy: "<6% if achievable without hypoglycemia"
            renal_impairment: "Individualize based on CKD stage"
        linked_kb_refs:
          kb2_phenotypes: ["t2dm_standard_control", "t2dm_intensive_control"]
          kb4_safety: ["hypoglycemia_risk_assessment"]
          kb7_terminology: ["hba1c_monitoring"]
        metrics:
          outcome_measure: "Cardiovascular events reduction"
          nnt: 155
          absolute_risk_reduction: 0.0064
          relative_risk_reduction: 0.17
      
      # First-Line Therapy
      - rec_id: "ADA-DM-2025-003"
        domain: "pharmacologic_therapy"
        subdomain: "first_line"
        recommendation: "Metformin is the preferred initial pharmacologic agent for type 2 diabetes"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "A"
        applicability:
          populations: ["newly_diagnosed_t2dm", "adults"]
          exclusions: ["eGFR <30", "metabolic_acidosis", "severe_heart_failure"]
        linked_kb_refs:
          kb1_dosing: ["metformin_initial", "metformin_titration", "metformin_renal_adjustment"]
          kb4_safety: ["metformin_contraindications", "lactic_acidosis_risk"]
          kb5_interactions: ["metformin_ddi"]
          kb6_formulary: ["metformin_generic"]
        metrics:
          outcome_measure: "A1C reduction"
          nnt: 3.2
          absolute_risk_reduction: 1.12
          relative_risk_reduction: null
      
      # Cardiovascular Protection
      - rec_id: "ADA-DM-2025-004"
        domain: "cardiovascular"
        subdomain: "risk_reduction"
        recommendation: "Use GLP-1 RA or SGLT2i with proven CVD benefit in patients with ASCVD, heart failure, or CKD"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "A"
        applicability:
          populations: ["t2dm_with_ascvd", "t2dm_with_heart_failure", "t2dm_with_ckd"]
          exclusions: ["type_1_diabetes", "pancreatitis_history"]
        linked_kb_refs:
          kb1_dosing: ["sglt2i_cv_dosing", "glp1ra_cv_dosing"]
          kb2_phenotypes: ["t2dm_with_ascvd", "t2dm_with_hf"]
          kb4_safety: ["sglt2i_dka_risk", "glp1ra_pancreatitis"]
          kb6_formulary: ["cv_benefit_agents"]
        metrics:
          outcome_measure: "MACE reduction"
          nnt: 72
          absolute_risk_reduction: 0.014
          relative_risk_reduction: 0.14

      # Insulin Therapy  
      - rec_id: "ADA-DM-2025-005"
        domain: "pharmacologic_therapy"
        subdomain: "insulin"
        recommendation: "Initiate insulin therapy in patients with A1C >10%, BG >300 mg/dL, or symptoms of hyperglycemia"
        evidence_grade: "A"
        strength: "Strong"
        applicability:
          populations: ["severe_hyperglycemia", "newly_diagnosed_t2dm"]
        linked_kb_refs:
          kb1_dosing: ["insulin_initiation", "basal_insulin_titration"]
          kb4_safety: ["hypoglycemia_prevention"]
          kb7_terminology: ["insulin_types"]

  # ========== HYPERTENSION GUIDELINES ==========
  
  - guideline_id: "ACC-AHA-HTN-2017"
    source:
      organization: "ACC/AHA"
      full_name: "American College of Cardiology/American Heart Association"
      country: "United States"
      region: "US"
    condition:
      primary: "Hypertension"
      secondary: ["Prehypertension", "Resistant Hypertension"]
      icd10_codes: ["I10", "I11", "I12", "I13", "I15"]
      snomed_codes: ["38341003", "59621000"]
    version: "2017 with 2024 focused update"
    effective_date: "2024-06-01"
    superseded_date: null
    supersedes: "JNC8-2014"
    publication:
      doi: "10.1161/HYP.0000000000000065"
      pmid: "29133354"
      journal: "Hypertension"
      year: 2017
      url: "https://www.ahajournals.org/doi/10.1161/HYP.0000000000000065"
    
    recommendations:
      # BP Classification
      - rec_id: "ACC-AHA-HTN-2017-001"
        domain: "diagnosis"
        subdomain: "classification"
        recommendation: "Stage 1 HTN: 130-139/80-89 mmHg; Stage 2 HTN: ≥140/90 mmHg"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "B-R"
        linked_kb_refs:
          kb2_phenotypes: ["htn_stage1", "htn_stage2", "htn_crisis"]
          kb7_terminology: ["bp_measurement_codes", "bp_classification"]
      
      # Treatment Threshold
      - rec_id: "ACC-AHA-HTN-2017-002"
        domain: "treatment"
        subdomain: "initiation"
        recommendation: "Initiate pharmacologic therapy for Stage 1 HTN with ASCVD or 10-year risk ≥10%"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "A"
        applicability:
          populations: ["adults_with_cv_risk", "stage1_htn"]
          exclusions: ["pregnancy", "secondary_htn_untreated"]
        linked_kb_refs:
          kb2_phenotypes: ["htn_high_risk", "ascvd_risk_high"]
          kb1_dosing: ["antihypertensive_initial"]
        metrics:
          outcome_measure: "CV event reduction"
          nnt: 61
          absolute_risk_reduction: 0.016
          relative_risk_reduction: 0.25
      
      # BP Target
      - rec_id: "ACC-AHA-HTN-2017-003"
        domain: "treatment"
        subdomain: "targets"
        recommendation: "BP goal <130/80 mmHg for most adults with hypertension"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "B-R"
        applicability:
          populations: ["adults", "diabetes", "ckd"]
          special_populations:
            elderly: "SBP <130 if tolerated, individualize if frail"
            renal_impairment: "<130/80 if CKD"
            heart_failure: "<130/80 with evidence-based therapy"
        linked_kb_refs:
          kb4_safety: ["hypotension_monitoring", "fall_risk"]
          kb1_dosing: ["bp_target_titration"]
        metrics:
          outcome_measure: "Stroke reduction"
          nnt: 125
          absolute_risk_reduction: 0.008
          relative_risk_reduction: 0.13

      # First-line Antihypertensives
      - rec_id: "ACC-AHA-HTN-2017-004"
        domain: "pharmacologic_therapy"
        subdomain: "first_line"
        recommendation: "First-line agents include thiazide diuretics, ACE inhibitors, ARBs, or CCBs"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "A"
        linked_kb_refs:
          kb1_dosing: ["thiazide_initial", "acei_initial", "arb_initial", "ccb_initial"]
          kb4_safety: ["antihypertensive_monitoring"]
          kb5_interactions: ["antihypertensive_ddi"]
          kb6_formulary: ["first_line_htn_agents"]

  # ========== EUROPEAN GUIDELINES ==========
  
  - guideline_id: "ESC-ESH-HTN-2023"
    source:
      organization: "ESC/ESH"
      full_name: "European Society of Cardiology/European Society of Hypertension"
      country: "European Union"
      region: "EU"
    condition:
      primary: "Arterial Hypertension"
      icd10_codes: ["I10", "I11", "I12"]
      snomed_codes: ["38341003"]
    version: "2023"
    effective_date: "2023-09-01"
    superseded_date: null
    supersedes: "ESC-ESH-HTN-2018"
    publication:
      doi: "10.1093/eurheartj/ehad193"
      journal: "European Heart Journal"
      year: 2023
    
    recommendations:
      - rec_id: "ESC-ESH-HTN-2023-001"
        domain: "treatment"
        subdomain: "initiation"
        recommendation: "Start treatment at ≥140/90 mmHg in most patients, ≥130/80 in high CV risk"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "A"
        applicability:
          populations: ["european_adults"]
          special_populations:
            elderly: "Start at ≥160/90 if age >80"
            diabetes: "Start at ≥130/80"
        linked_kb_refs:
          kb2_phenotypes: ["htn_european_criteria"]
          kb1_dosing: ["eu_antihypertensive_dosing"]
      
      - rec_id: "ESC-ESH-HTN-2023-002"
        domain: "treatment"
        subdomain: "combination"
        recommendation: "Prefer dual combination therapy as initial treatment for most patients"
        evidence_grade: "A"
        strength: "Strong"
        linked_kb_refs:
          kb1_dosing: ["combination_antihypertensive"]
          kb6_formulary: ["eu_combination_pills"]

  # ========== AUSTRALIAN GUIDELINES ==========
  
  - guideline_id: "NHFA-AU-HTN-2024"
    source:
      organization: "NHFA"
      full_name: "National Heart Foundation of Australia"
      country: "Australia"
      region: "AU"
    condition:
      primary: "Hypertension"
      icd10_codes: ["I10"]
    version: "2024"
    effective_date: "2024-03-01"
    superseded_date: null
    publication:
      doi: "10.5694/mja2.52234"
      journal: "Medical Journal of Australia"
      year: 2024
    
    recommendations:
      - rec_id: "NHFA-AU-HTN-2024-001"
        domain: "treatment"
        subdomain: "targets"
        recommendation: "Target <140/90 mmHg, or <130/80 if tolerated and high CV risk"
        evidence_grade: "A"
        strength: "Strong"
        applicability:
          populations: ["australian_adults"]
          special_populations:
            aboriginal_torres_strait: "Consider social determinants and access to care"
        linked_kb_refs:
          kb6_formulary: ["pbs_antihypertensives"]
          kb2_phenotypes: ["indigenous_australian_htn"]

  # ========== WHO GUIDELINES ==========
  
  - guideline_id: "WHO-HTN-2023"
    source:
      organization: "WHO"
      full_name: "World Health Organization"
      country: "International"
      region: "WHO"
    condition:
      primary: "Hypertension"
      icd10_codes: ["I10"]
    version: "2023"
    effective_date: "2023-06-01"
    publication:
      url: "https://www.who.int/publications/i/item/9789240081062"
    
    recommendations:
      - rec_id: "WHO-HTN-2023-001"
        domain: "treatment"
        subdomain: "essential_medicines"
        recommendation: "Use thiazide diuretics, ACE inhibitors, ARBs, or CCBs as first-line therapy"
        evidence_grade: "A"
        strength: "Strong"
        applicability:
          populations: ["resource_limited_settings", "low_middle_income_countries"]
        linked_kb_refs:
          kb1_dosing: ["essential_antihypertensives"]
          kb6_formulary: ["who_essential_medicines"]

  # ========== SICK DAY MANAGEMENT GUIDELINES ==========
  
  - guideline_id: "ADCES-SICK-2024"
    source:
      organization: "ADCES"
      full_name: "Association of Diabetes Care & Education Specialists"
      country: "United States"
      region: "US"
    condition:
      primary: "Diabetes Sick Day Management"
      secondary: ["Acute Illness in Diabetes"]
      icd10_codes: ["E11", "R50.9", "R06.00"]
      snomed_codes: ["44054006", "50177009"]
    version: "2024"
    effective_date: "2024-01-01"
    
    recommendations:
      - rec_id: "ADCES-SICK-2024-001"
        domain: "sick_day"
        subdomain: "medication_adjustment"
        recommendation: "Hold metformin during acute illness with dehydration, vomiting, or renal impairment"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "B-R"
        applicability:
          populations: ["t2dm_on_metformin"]
          exclusions: ["stable_mild_illness"]
        linked_kb_refs:
          kb1_dosing: ["sick_day_adjustments", "metformin_hold_criteria"]
          kb4_safety: ["metformin_lactic_acidosis", "dehydration_risk"]
        metrics:
          outcome_measure: "Lactic acidosis prevention"
          nnh: 1000
      
      - rec_id: "ADCES-SICK-2024-002"
        domain: "sick_day"
        subdomain: "sglt2_management"
        recommendation: "Discontinue SGLT2 inhibitors immediately with any acute illness"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "B-R"
        applicability:
          populations: ["t2dm_on_sglt2i"]
        linked_kb_refs:
          kb1_dosing: ["sglt2i_sick_day_hold"]
          kb4_safety: ["euglycemic_dka_risk", "volume_depletion"]
        metrics:
          outcome_measure: "DKA prevention"
          nnh: 300
      
      - rec_id: "ADCES-SICK-2024-003"
        domain: "sick_day"
        subdomain: "monitoring"
        recommendation: "Check blood glucose and ketones every 2-4 hours during illness"
        evidence_grade: "B"
        strength: "Strong"
        linked_kb_refs:
          kb7_terminology: ["ketone_monitoring", "glucose_monitoring"]
          kb2_phenotypes: ["sick_day_diabetes"]

  # ========== PERIOPERATIVE GUIDELINES ==========
  
  - guideline_id: "SAMBA-PERIOP-2024"
    source:
      organization: "SAMBA"
      full_name: "Society for Ambulatory Anesthesia"
      country: "United States"
      region: "US"
    condition:
      primary: "Perioperative Diabetes Management"
      secondary: ["Surgical Diabetes Care"]
      icd10_codes: ["E11", "Z51.A"]
    version: "2024"
    effective_date: "2024-01-01"
    
    recommendations:
      - rec_id: "SAMBA-PERIOP-2024-001"
        domain: "perioperative"
        subdomain: "glucose_targets"
        recommendation: "Maintain glucose 140-180 mg/dL intraoperatively for most patients"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "A"
        applicability:
          populations: ["surgical_patients_diabetes"]
          exclusions: ["cardiac_surgery", "neurosurgery"]
          special_populations:
            cardiac_surgery: "Target 120-160 mg/dL"
            neurosurgery: "Target 140-160 mg/dL"
        linked_kb_refs:
          kb1_dosing: ["insulin_infusion_protocol", "periop_insulin_adjustment"]
          kb4_safety: ["hypoglycemia_prevention_periop", "hyperglycemia_complications"]
        metrics:
          outcome_measure: "Surgical site infection reduction"
          nnt: 25
          absolute_risk_reduction: 0.04
      
      - rec_id: "SAMBA-PERIOP-2024-002"
        domain: "perioperative"
        subdomain: "medication_management"
        recommendation: "Hold metformin 48 hours before surgery with contrast or renal impairment risk"
        evidence_grade: "B"
        strength: "Strong"
        applicability:
          populations: ["periop_diabetes_metformin"]
        linked_kb_refs:
          kb1_dosing: ["periop_metformin_hold"]
          kb4_safety: ["contrast_nephropathy_risk"]

  # ========== LIPID GUIDELINES ==========

  - guideline_id: "ACC-AHA-LIPID-2022"
    source:
      organization: "ACC/AHA"
      full_name: "American College of Cardiology/American Heart Association"
      country: "United States"  
      region: "US"
    condition:
      primary: "Dyslipidemia"
      secondary: ["Hypercholesterolemia", "ASCVD Prevention"]
      icd10_codes: ["E78.0", "E78.5", "Z13.220"]
      snomed_codes: ["55822004", "13644009"]
    version: "2022"
    effective_date: "2022-01-01"
    publication:
      doi: "10.1161/CIR.0000000000001046"
      journal: "Circulation"
      year: 2022

    recommendations:
      - rec_id: "ACC-AHA-LIPID-2022-001"
        domain: "treatment"
        subdomain: "statin_therapy" 
        recommendation: "Initiate high-intensity statin therapy in patients with clinical ASCVD"
        evidence_grade: "A"
        strength: "Strong"
        class_of_recommendation: "I"
        level_of_evidence: "A"
        applicability:
          populations: ["ascvd_patients", "adults_21_75"]
        linked_kb_refs:
          kb1_dosing: ["high_intensity_statin", "statin_titration"]
          kb4_safety: ["statin_myopathy", "statin_liver_monitoring"]
          kb5_interactions: ["statin_drug_interactions"]
          kb6_formulary: ["high_intensity_statins"]
        metrics:
          outcome_measure: "Major vascular events reduction"
          nnt: 67
          relative_risk_reduction: 0.21