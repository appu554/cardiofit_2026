services:
  zookeeper-lite:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cardiofit-zookeeper-lite
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper_lite_data:/bitnami/zookeeper
    networks:
      - cardiofit-lite

  kafka-lite:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cardiofit-kafka-lite
    restart: unless-stopped
    depends_on:
      - zookeeper-lite
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper-lite:2181
      # Dual listeners: INTERNAL for container-to-container, EXTERNAL for host access
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-lite:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=3
    volumes:
      - kafka_lite_data:/bitnami/kafka
    networks:
      - cardiofit-lite

networks:
  cardiofit-lite:
    name: cardiofit-lite
    driver: bridge

volumes:
  zookeeper_lite_data:
  kafka_lite_data:
