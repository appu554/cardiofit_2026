# Docker Compose for Hybrid Kafka Architecture
# Complete deployment stack for TransactionalMultiSinkRouter and downstream systems
version: '3.8'

services:
  # ============================================
  # KAFKA INFRASTRUCTURE
  # ============================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hybrid-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cardiofit-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cardiofit-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      # Broker configuration
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Hybrid architecture optimization
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"  # We create topics explicitly
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600

      # Transaction support for exactly-once semantics
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

      # Compression and performance
      KAFKA_COMPRESSION_TYPE: snappy
      KAFKA_LOG_CLEANUP_POLICY: "delete,compact"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days default
      KAFKA_LOG_SEGMENT_BYTES: 1073741824  # 1GB

      # Message size for clinical events
      KAFKA_MESSAGE_MAX_BYTES: 10485760  # 10MB
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760

      # JVM settings
      KAFKA_HEAP_OPTS: "-Xmx2G -Xms2G"
      KAFKA_JVM_PERFORMANCE_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20"
    ports:
      - "29092:29092"
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./scripts:/scripts
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - cardiofit-network

  # Kafka Schema Registry for Avro schemas
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: cardiofit-schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: INFO
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cardiofit-network

  # Kafka Connect for downstream connectors
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: cardiofit-kafka-connect
    hostname: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: cardiofit-connect-cluster

      # Converters
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      # Internal topics
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_PARTITIONS: 25
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_PARTITIONS: 5

      # Plugin installation
      CONNECT_PLUGIN_PATH: "/usr/share/confluent-hub-components,/usr/share/kafka/plugins"
      CONNECT_LOG4J_LOGGERS: "org.apache.kafka.connect=INFO"

      # JVM settings
      KAFKA_HEAP_OPTS: "-Xmx2G -Xms2G"
    ports:
      - "8083:8083"
    volumes:
      - ./kafka-connect/connectors:/etc/kafka-connect/connectors
      - ./kafka-connect/plugins:/usr/share/kafka/plugins
    command:
      - bash
      - -c
      - |
        # Install connectors
        confluent-hub install --no-prompt confluentinc/kafka-connect-elasticsearch:14.0.3
        confluent-hub install --no-prompt neo4j/kafka-connect-neo4j:2.0.2
        confluent-hub install --no-prompt clickhouse/clickhouse-kafka-connect:0.0.16
        confluent-hub install --no-prompt jcustenborder/kafka-connect-redis:0.0.2.11

        # Start Connect
        /etc/confluent/docker/run
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - cardiofit-network

  # ============================================
  # FLINK PROCESSING
  # ============================================

  flink-jobmanager:
    image: flink:1.17-java11
    container_name: cardiofit-flink-jobmanager
    hostname: flink-jobmanager
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - FLINK_PROPERTIES=
        jobmanager.rpc.address:flink-jobmanager
        jobmanager.memory.process.size:2g
        jobmanager.memory.jvm-overhead.max:512m
        execution.checkpointing.interval:30s
        execution.checkpointing.mode:EXACTLY_ONCE
        execution.checkpointing.timeout:60s
        state.backend:filesystem
        state.checkpoints.dir:file:///tmp/flink-checkpoints
        state.savepoints.dir:file:///tmp/flink-savepoints
    ports:
      - "8082:8081"  # Web UI (using 8082 to avoid conflict)
      - "6123:6123"  # RPC
    volumes:
      - ./flink-checkpoints:/tmp/flink-checkpoints
      - ./flink-savepoints:/tmp/flink-savepoints
      - ./target:/opt/flink/usrlib  # Mount JAR files
    command: jobmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cardiofit-network

  flink-taskmanager:
    image: flink:1.17-java11
    # No container_name for scaled services
    hostname: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - FLINK_PROPERTIES=
        jobmanager.rpc.address:flink-jobmanager
        taskmanager.memory.process.size:4g
        taskmanager.memory.managed.size:2g
        taskmanager.memory.network.fraction:0.2
        taskmanager.numberOfTaskSlots:4
        parallelism.default:4
        pipeline.object-reuse:true
        execution.buffer-timeout:100ms
    volumes:
      - ./flink-checkpoints:/tmp/flink-checkpoints
      - ./flink-savepoints:/tmp/flink-savepoints
      - ./target:/opt/flink/usrlib
    command: taskmanager
    scale: 2  # Run 2 TaskManagers
    networks:
      - cardiofit-network

  # ============================================
  # DOWNSTREAM DATA STORES
  # ============================================

  # Redis for caching critical alerts and FHIR state
  redis:
    image: redis:7.2-alpine
    container_name: cardiofit-redis
    hostname: redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cardiofit-network

  # ClickHouse for analytics
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: cardiofit-clickhouse
    hostname: clickhouse
    environment:
      CLICKHOUSE_USER: cardiofit_user
      CLICKHOUSE_PASSWORD: ClickHouse2024!
      CLICKHOUSE_DB: cardiofit_analytics
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native protocol
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cardiofit-network

  # Neo4j for graph relationships
  neo4j:
    image: neo4j:5.12
    container_name: cardiofit-neo4j
    hostname: neo4j
    environment:
      NEO4J_AUTH: neo4j/CardioFit2024!
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 2G
      NEO4J_dbms_default_database: cardiofit
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "CardioFit2024!", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cardiofit-network

  # ============================================
  # MONITORING & MANAGEMENT
  # ============================================

  # Kafka UI for topic management
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cardiofit-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: cardiofit-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: cardiofit-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    ports:
      - "8080:8080"
    networks:
      - cardiofit-network

  # ============================================
  # INITIALIZATION CONTAINER
  # ============================================

  init-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cardiofit-init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
      - ./kafka-connect/connectors:/connectors
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka to be ready..."
        sleep 10

        echo "Creating hybrid architecture topics..."

        # Phase 1: Central System of Record
        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic prod.ehr.events.enriched \
          --partitions 24 --replication-factor 1 \
          --config retention.ms=7776000000 \
          --config cleanup.policy=delete \
          --if-not-exists

        # Phase 2: Critical Action Topics
        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic prod.ehr.alerts.critical \
          --partitions 16 --replication-factor 1 \
          --config retention.ms=604800000 \
          --config cleanup.policy=delete \
          --if-not-exists

        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic prod.ehr.fhir.upsert \
          --partitions 12 --replication-factor 1 \
          --config retention.ms=31536000000 \
          --config cleanup.policy=compact \
          --config min.compaction.lag.ms=3600000 \
          --if-not-exists

        # Phase 3: Supporting Systems
        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic prod.ehr.analytics.events \
          --partitions 32 --replication-factor 1 \
          --config retention.ms=15552000000 \
          --config cleanup.policy=delete \
          --config compression.type=snappy \
          --if-not-exists

        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic prod.ehr.graph.mutations \
          --partitions 16 --replication-factor 1 \
          --config retention.ms=2592000000 \
          --config cleanup.policy=delete \
          --if-not-exists

        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic prod.ehr.semantic.mesh \
          --partitions 8 --replication-factor 1 \
          --config retention.ms=7776000000 \
          --config cleanup.policy=compact \
          --if-not-exists

        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic prod.ehr.audit.logs \
          --partitions 8 --replication-factor 1 \
          --config retention.ms=220898664000 \
          --config cleanup.policy=delete \
          --if-not-exists

        # Source topics for Flink job
        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic patient-events --partitions 12 --replication-factor 1 --if-not-exists

        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic medication-events --partitions 12 --replication-factor 1 --if-not-exists

        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic safety-events --partitions 12 --replication-factor 1 --if-not-exists

        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic vital-signs-events --partitions 12 --replication-factor 1 --if-not-exists

        kafka-topics --bootstrap-server kafka:9092 --create \
          --topic lab-result-events --partitions 12 --replication-factor 1 --if-not-exists

        echo "Topics created successfully!"
        kafka-topics --bootstrap-server kafka:9092 --list

        echo "Waiting for Kafka Connect to be ready..."
        while ! curl -f http://kafka-connect:8083/ > /dev/null 2>&1; do
          sleep 5
        done

        echo "Deploying Kafka Connect connectors..."

        # Deploy each connector
        for connector in /connectors/*.json; do
          if [ -f "$connector" ]; then
            echo "Deploying connector: $connector"
            curl -X POST -H "Content-Type: application/json" \
              -d @"$connector" \
              http://kafka-connect:8083/connectors || true
          fi
        done

        echo "Initialization complete!"
    networks:
      - cardiofit-network

networks:
  cardiofit-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  redis-data:
  clickhouse-data:
  clickhouse-logs:
  neo4j-data:
  neo4j-logs: