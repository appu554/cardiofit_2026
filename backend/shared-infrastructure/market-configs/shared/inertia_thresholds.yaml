# Therapeutic Inertia Detection Thresholds — Shared Baseline
# Sources: Khunti et al. 2018, ADA Standards of Care 2025, ESC/EASD 2023
# All durations in weeks unless noted

# ---------------------------------------------------------------------------
# Evidence windows — minimum data required to trigger inertia detection
# ---------------------------------------------------------------------------
windows:
  hba1c:
    min_readings: 2
    min_duration_weeks: 12
    target_source: "individualised_per_patient"
    default_target: 7.0          # %

  cgm:
    min_days: 14
    min_wear_pct: 70             # % of days with ≥ 70% active time
    tir_target: 70               # % time in range 70-180 mg/dL
    tbr_critical: 4              # % time below 54 mg/dL

  bp:
    min_weeks: 4
    min_readings_per_week: 2
    systolic_target: 130         # mmHg (SPRINT/ESC)
    diastolic_target: 80         # mmHg

  renal:
    trigger: "stage_transition"  # eGFR category worsening
    max_response_weeks: 4
    slope_threshold: -5.0        # mL/min/1.73m²/year — rapid decliner

  post_event:
    max_response_weeks: 4
    qualifying_events:
      - ACS
      - HEART_FAILURE_ADMISSION
      - STROKE
      - HYPOGLYCAEMIA_SEVERE
      - DKA

# ---------------------------------------------------------------------------
# Severity brackets — Khunti duration-based classification
# ---------------------------------------------------------------------------
severity:
  mild:
    min_weeks: 12
    max_weeks: 25
    label: "MILD"
    risk_accumulation: "LOW"
    nudge_frequency_days: 30

  moderate:
    min_weeks: 26
    max_weeks: 51
    label: "MODERATE"
    risk_accumulation: "MODERATE"
    nudge_frequency_days: 14

  severe:
    min_weeks: 52
    max_weeks: 77
    label: "SEVERE"
    risk_accumulation: "HIGH"
    nudge_frequency_days: 7

  critical:
    min_weeks: 78
    label: "CRITICAL"
    risk_accumulation: "VERY_HIGH"
    nudge_frequency_days: 3

# ---------------------------------------------------------------------------
# Exclusions — conditions that suppress inertia flagging
# ---------------------------------------------------------------------------
exclusions:
  reasons:
    - PATIENT_REFUSED
    - PALLIATIVE_CARE
    - TERMINAL_ILLNESS
    - PREGNANCY
    - ACUTE_ILLNESS
    - FRAILTY_OVERRIDE
    - DEPRESCRIBING_PATHWAY
    - ADVERSE_REACTION_DOCUMENTED

  titration_grace_period_weeks: 6    # suppress inertia during active titration
  post_initiation_grace_weeks: 8     # grace after starting a new drug class
  post_event_evaluation_weeks: 2     # hold inertia detection post-acute event

# ---------------------------------------------------------------------------
# Scoring — composite inertia score weighting
# ---------------------------------------------------------------------------
scoring:
  domain_weights:
    GLYCAEMIC: 0.35
    HEMODYNAMIC: 0.30
    RENAL: 0.20
    LIPID: 0.15
  dual_domain_multiplier: 1.5
  post_event_multiplier: 2.0
  max_score: 100.0
