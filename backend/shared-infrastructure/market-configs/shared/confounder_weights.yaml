# Base weights for each confounder category.
# Market-specific calendars add event-level detail.

# Category-level maximum contribution to composite score
category_caps:
  MEDICATION: 0.40
  ADHERENCE: 0.25
  SEASONAL: 0.15
  RELIGIOUS_FASTING: 0.25
  FESTIVAL_DIETARY: 0.15
  ACUTE_ILLNESS: 0.35
  IATROGENIC: 0.40
  LIFESTYLE: 0.20
  ENVIRONMENTAL: 0.10

# Medication confounder detail (refined from original)
medication:
  per_concurrent_change: 0.12
  max_concurrent_contribution: 0.40
  dose_change_weight: 0.08
  class_change_weight: 0.15

# Adherence confounder detail
adherence:
  per_10pct_drop: 0.10
  max_contribution: 0.25

# Clinical event weights
clinical_events:
  steroid_course:
    weight: 0.35
    affected_outcomes: ["DELTA_HBA1C", "DELTA_FBG", "DELTA_SBP", "DELTA_WEIGHT"]
    expected_direction: "WORSENS_ALL"
    washout_days: 28
    detection: ["MEDICATION_RECORD_PREDNISOLONE", "MEDICATION_RECORD_DEXAMETHASONE",
                "MEDICATION_RECORD_METHYLPREDNISOLONE"]

  hospitalization:
    weight: 0.30
    affected_outcomes: ["DELTA_HBA1C", "DELTA_SBP", "DELTA_EGFR", "DELTA_WEIGHT"]
    expected_direction: "VARIABLE"
    washout_days: 42
    detection: ["ADMISSION_EVENT", "DISCHARGE_EVENT"]

  acute_infection:
    weight: 0.20
    affected_outcomes: ["DELTA_HBA1C", "DELTA_FBG", "DELTA_EGFR"]
    expected_direction: "WORSENS_GLUCOSE_AND_RENAL"
    washout_days: 21
    detection: ["ELEVATED_CRP", "ANTIBIOTIC_PRESCRIPTION", "UTI_DIAGNOSIS"]

  surgery:
    weight: 0.30
    affected_outcomes: ["DELTA_HBA1C", "DELTA_SBP", "DELTA_WEIGHT", "DELTA_EGFR"]
    expected_direction: "VARIABLE"
    washout_days: 56
    detection: ["SURGICAL_EVENT"]

  acute_kidney_injury:
    weight: 0.40
    affected_outcomes: ["DELTA_EGFR"]
    expected_direction: "WORSENS_RENAL"
    washout_days: 90
    detection: ["CREATININE_SPIKE", "EGFR_ACUTE_DROP"]

# Lifestyle confounder weights
lifestyle:
  engagement_collapse:
    weight: 0.15
    threshold: 0.30
    detection: "MODULE_9_ENGAGEMENT"

  exercise_cessation:
    weight: 0.10
    detection: "MODULE_11_FITNESS"

  dietary_shift:
    weight: 0.10
    detection: "MODULE_10_MEAL"

# Outcome deferral thresholds
deferral:
  composite_threshold: 0.70
  steroid_active_defer: true
  ramadan_active_defer_glucose: true
  hospitalization_washout_defer: true
