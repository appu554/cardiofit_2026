# International Consensus 2023 CGM Targets
# Sources: Battelino et al. 2023 (Diabetes Care), ATTD Consensus 2022
# Applies to all markets; market-specific overrides in india/ and australia/

version: "2023.1"

data_sufficiency:
  min_coverage_pct: 70
  min_days_for_report: 14
  readings_per_day_expected: 96        # 1 reading every 15 min
  sensor_warmup_minutes: 60
  max_gap_minutes: 60                  # gaps > 60 min flagged as missing

ranges:
  very_low: 54          # mg/dL — Level 2 hypoglycaemia
  low: 70               # mg/dL — Level 1 hypoglycaemia
  target_low: 70        # mg/dL — lower TIR bound
  target_high: 180      # mg/dL — upper TIR bound
  high: 180             # mg/dL — Level 1 hyperglycaemia
  very_high: 250        # mg/dL — Level 2 hyperglycaemia

targets:
  general_adult:
    tir_pct: 70          # Time in Range (70-180)
    tbr_l1_pct: 4        # Time Below Range L1 (54-70)
    tbr_l2_pct: 1        # Time Below Range L2 (<54)
    tar_l1_pct: 25       # Time Above Range L1 (180-250)
    tar_l2_pct: 5        # Time Above Range L2 (>250)
    cv_pct: 36           # Coefficient of Variation
    gmi_target: 7.0      # Glucose Management Indicator

  elderly_frail:
    tir_pct: 50
    tbr_l1_pct: 1
    tbr_l2_pct: 0

gri:
  weights:
    very_low: 3.0
    low: 2.4
    very_high: 1.6
    high: 0.8
  zones:
    A: 20                # GRI 0-20
    B: 40                # GRI 21-40
    C: 60                # GRI 41-60
    D: 80                # GRI 61-80
                         # E: >80

gmi:
  intercept: 3.31
  slope: 0.02392
  discrepancy_threshold: 0.5   # |GMI - lab HbA1c| flag

agp:
  bucket_minutes: 30
  percentiles: [10, 25, 50, 75, 90]

alerts:
  sustained_hypo_minutes: 15
  sustained_hyper_minutes: 120
  nocturnal_hypo_window: "00:00-06:00"
