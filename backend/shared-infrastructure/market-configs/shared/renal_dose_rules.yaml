# Renal Dose Gating Rules — Shared Baseline
# Sources: KDIGO 2024, ADA Standards of Care 2025, ESC/EASD 2023
# All eGFR thresholds in mL/min/1.73m²

stale_egfr:
  warning_days: 90
  critical_days: 180

rapid_decline_threshold: -5.0   # mL/min/1.73m² per year

drug_rules:
  - drug_class: METFORMIN
    contraindicated_below: 30
    dose_reduce_below: 45
    max_dose_reduced_mg: 1000
    monitor_escalate_below: 60
    requires_potassium_check: false
    potassium_contra_above: 0
    efficacy_cliff_below: 0
    substitute_class: DPP4i
    anticipate_months: 6
    source_guideline: "KDIGO 2024 §4.2; ADA 2025 §9"

  - drug_class: SGLT2i
    contraindicated_below: 20
    dose_reduce_below: 0
    max_dose_reduced_mg: 0
    monitor_escalate_below: 45
    requires_potassium_check: false
    potassium_contra_above: 0
    efficacy_cliff_below: 30
    substitute_class: GLP1_RA
    anticipate_months: 6
    source_guideline: "KDIGO 2024 §3.1; ESC/EASD 2023"

  - drug_class: GLP1_RA
    contraindicated_below: 15
    dose_reduce_below: 0
    max_dose_reduced_mg: 0
    monitor_escalate_below: 30
    requires_potassium_check: false
    potassium_contra_above: 0
    efficacy_cliff_below: 0
    substitute_class: INSULIN
    anticipate_months: 3
    source_guideline: "ADA 2025 §9; KDIGO 2024 §4.3"

  - drug_class: EXENATIDE
    contraindicated_below: 30
    dose_reduce_below: 0
    max_dose_reduced_mg: 0
    monitor_escalate_below: 50
    requires_potassium_check: false
    potassium_contra_above: 0
    efficacy_cliff_below: 0
    substitute_class: GLP1_RA
    anticipate_months: 6
    source_guideline: "ADA 2025 §9"

  - drug_class: ACEi
    contraindicated_below: 15
    dose_reduce_below: 30
    max_dose_reduced_mg: 0
    monitor_escalate_below: 45
    requires_potassium_check: true
    potassium_contra_above: 5.5
    efficacy_cliff_below: 0
    substitute_class: ARB
    anticipate_months: 3
    source_guideline: "KDIGO 2024 §3.3; ESC 2023"

  - drug_class: ARB
    contraindicated_below: 15
    dose_reduce_below: 30
    max_dose_reduced_mg: 0
    monitor_escalate_below: 45
    requires_potassium_check: true
    potassium_contra_above: 5.5
    efficacy_cliff_below: 0
    substitute_class: CCB
    anticipate_months: 3
    source_guideline: "KDIGO 2024 §3.3; ESC 2023"

  - drug_class: MRA
    contraindicated_below: 30
    dose_reduce_below: 45
    max_dose_reduced_mg: 25
    monitor_escalate_below: 60
    requires_potassium_check: true
    potassium_contra_above: 5.0
    efficacy_cliff_below: 0
    substitute_class: FINERENONE
    anticipate_months: 3
    source_guideline: "KDIGO 2024 §3.4; ESC 2023"

  - drug_class: FINERENONE
    contraindicated_below: 25
    dose_reduce_below: 0
    max_dose_reduced_mg: 0
    monitor_escalate_below: 60
    requires_potassium_check: true
    potassium_contra_above: 5.0
    efficacy_cliff_below: 0
    substitute_class: ""
    anticipate_months: 3
    source_guideline: "FIDELIO-DKD; FIGARO-DKD; KDIGO 2024 §3.4"

  - drug_class: THIAZIDE
    contraindicated_below: 15
    dose_reduce_below: 0
    max_dose_reduced_mg: 0
    monitor_escalate_below: 45
    requires_potassium_check: false
    potassium_contra_above: 0
    efficacy_cliff_below: 30
    substitute_class: LOOP_DIURETIC
    anticipate_months: 6
    source_guideline: "KDIGO 2024 §5.2; ADA 2025"

  - drug_class: SULFONYLUREA
    contraindicated_below: 30
    dose_reduce_below: 45
    max_dose_reduced_mg: 0
    monitor_escalate_below: 60
    requires_potassium_check: false
    potassium_contra_above: 0
    efficacy_cliff_below: 0
    substitute_class: DPP4i
    anticipate_months: 6
    source_guideline: "ADA 2025 §9; KDIGO 2024"

  - drug_class: DPP4i
    contraindicated_below: 0
    dose_reduce_below: 45
    max_dose_reduced_mg: 25
    monitor_escalate_below: 30
    requires_potassium_check: false
    potassium_contra_above: 0
    efficacy_cliff_below: 0
    substitute_class: ""
    anticipate_months: 0
    source_guideline: "ADA 2025 §9"

  - drug_class: INSULIN
    contraindicated_below: 0
    dose_reduce_below: 30
    max_dose_reduced_mg: 0
    monitor_escalate_below: 45
    requires_potassium_check: false
    potassium_contra_above: 0
    efficacy_cliff_below: 0
    substitute_class: ""
    anticipate_months: 0
    source_guideline: "ADA 2025 §9; KDIGO 2024 §4.5"
