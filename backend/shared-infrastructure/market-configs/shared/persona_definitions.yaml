# Persona definitions for worklist presentation.

personas:
  HCF_CARE_MANAGER:
    max_items: 15
    scope: ASSIGNED_PANEL
    actions: [CALL_PATIENT, SCHEDULE_CLINIC, ESCALATE_TO_GP, DEFER, ACKNOWLEDGE]
    language: en-AU
    primary_action: CALL_PATIENT

  AGED_CARE_NURSE:
    max_items: 20
    scope: FACILITY
    actions: [RECHECK_VITALS, CALL_GP, MEDICATION_HOLD, ACKNOWLEDGE, HANDOVER_NOTE]
    language: en-AU
    primary_action: RECHECK_VITALS

  AUSTRALIA_GP:
    max_items: 25
    scope: ASSIGNED_PANEL
    actions: [MEDICATION_REVIEW, SCHEDULE_APPOINTMENT, TELEHEALTH, REFERRAL, ACKNOWLEDGE]
    language: en-AU
    primary_action: MEDICATION_REVIEW

  INDIA_GP:
    max_items: 15
    scope: ASSIGNED_PANEL
    actions: [CALL_PATIENT, TELECONSULT, ASHA_OUTREACH, PRESCRIPTION_REVIEW, DEFER]
    language: en-IN
    primary_action: CALL_PATIENT

  ASHA_WORKER:
    max_items: 10
    scope: VILLAGE
    actions: [VISIT_TODAY, VISIT_TOMORROW, CALL_ANM, RECORD_VITALS]
    language: hi-IN
    primary_action: VISIT_TODAY
