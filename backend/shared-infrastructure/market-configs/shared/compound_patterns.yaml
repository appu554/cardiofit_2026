# Compound multi-organ deterioration patterns.

patterns:
  CARDIORENAL_SYNDROME:
    required:
      - vital: egfr
        direction: below
        min_deviation_pct: 15
      - vital: sbp
        direction: below
        min_deviation_mmhg: 15
        alternative:
          vital: weight
          direction: above
          min_gain_kg: 1.5
    severity_escalation: 1
    clinical_syndrome: "Simultaneous renal and hemodynamic deterioration — possible cardiorenal syndrome"
    recommended_response: "Urgent cardiology-nephrology co-management. Assess volume status."

  INFECTION_CASCADE:
    required:
      - vital: glucose_fbg
        direction: above
        min_deviation_pct: 30
      - vital: sbp
        direction: below
        min_deviation_pct: 15
    optional:
      - measurement_freq_drop_pct: 50
    severity_escalation: 1
    clinical_syndrome: "Compound metabolic + hemodynamic deterioration with disengagement — possible infection"
    recommended_response: "Urgent assessment. Screen for infection source. Consider empiric antibiotics."

  MEDICATION_CRISIS:
    required:
      - any_deviation: true
        min_significance: "MODERATE"
      - new_medication_within_days: 14
    severity_escalation: 1
    clinical_syndrome: "Temporal correlation between new medication and deterioration"
    recommended_response: "Consider stopping or reducing the recently started medication."

  FLUID_OVERLOAD_TRIAD:
    required:
      - vital: weight
        direction: above
        min_gain_kg: 1.5
      - vital: sbp
        direction: above
        min_deviation_mmhg: 10
    context_required: "CKM_4C"
    severity_escalation: 1
    clinical_syndrome: "Classic fluid overload — weight gain + hypertension in HF patient"
    recommended_response: "Increase diuretic immediately. If no response in 24h, clinic review."

  POST_DISCHARGE_DETERIORATION:
    required:
      - any_deviation: true
        min_significance: "MODERATE"
    context_required: "WITHIN_30D_DISCHARGE"
    severity_escalation: 1
    clinical_syndrome: "Post-discharge deterioration — elevated readmission risk"
    recommended_response: "Verify medication reconciliation. Assess readmission risk factors."
