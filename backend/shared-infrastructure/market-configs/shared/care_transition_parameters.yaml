# Care Transition Bridge parameters.

windows:
  standard_days: 30
  short_days: 14
  extended_days: 60

baseline_adjustment:
  post_discharge_start_delay_hours: 48
  minimum_readings_for_new_baseline: 5
  fallback_to_pre_admission_days: 14
  hospital_baseline_excluded: true

heightened_surveillance:
  deviation_threshold_multiplier: 0.75
  pai_context_boost_points: 15
  engagement_gap_alert_hours: 72
  escalation_amplification:
    ROUTINE: URGENT
    URGENT: IMMEDIATE

milestones:
  medication_reconciliation:
    offset_hours: 48
    required: true
  first_followup:
    offset_hours: 168
    required: true
  midpoint_review:
    offset_hours: 336
    required: true
  exit_assessment:
    offset_hours: 720
    required: true
  engagement_check:
    offset_hours: 72
    conditional: true
  medication_supply_check:
    offset_hours: 24
    conditional: true

reconciliation:
  high_risk_drug_classes:
    - ANTICOAGULANT
    - INSULIN
    - OPIOID
    - DIGOXIN
    - AMIODARONE
    - IMMUNOSUPPRESSANT
  urgency_mapping:
    CLEAN: ROUTINE
    DISCREPANCIES_CLINICIAN_REVIEW: URGENT
    HIGH_RISK_URGENT: IMMEDIATE
    UNCLEAR_INSUFFICIENT_DATA: URGENT
