# Intensification Pathways — Shared Baseline
# Sources: ADA/EASD Consensus 2022, ESC/EASD 2023, NICE NG28
# Each step represents the next recommended intensification action

# ---------------------------------------------------------------------------
# Glycaemic pathway — T2DM medication escalation
# ---------------------------------------------------------------------------
glycaemic_pathway:
  name: "Standard Glycaemic Intensification"
  source: "ADA/EASD 2022 Consensus"

  steps:
    - step: 1
      drug_class: METFORMIN
      typical_start_dose_mg: 500
      typical_max_dose_mg: 2000
      titration_interval_weeks: 4
      requires_egfr_above: 30

    - step: 2
      drug_class: SGLT2i
      typical_start_dose_mg: 10       # dapagliflozin
      typical_max_dose_mg: 10
      titration_interval_weeks: 0     # single dose, no titration
      requires_egfr_above: 20
      preferred_if:
        - ASCVD
        - HEART_FAILURE
        - CKD
        - HIGH_WEIGHT

    - step: 3
      drug_class: GLP1_RA
      typical_start_dose_mg: 0.25     # semaglutide (weekly)
      typical_max_dose_mg: 2.0
      titration_interval_weeks: 4
      requires_egfr_above: 15
      preferred_if:
        - ASCVD
        - HIGH_WEIGHT
        - HIGH_HBA1C

    - step: 4
      drug_class: BASAL_INSULIN
      typical_start_dose_iu_kg: 0.1
      typical_max_dose_iu_kg: 0.5
      titration_interval_weeks: 1
      requires_egfr_above: 0
      last_resort: true

# ---------------------------------------------------------------------------
# Hemodynamic pathway — antihypertensive escalation
# ---------------------------------------------------------------------------
hemodynamic_pathway:
  name: "Standard Antihypertensive Intensification"
  source: "ESC 2024 Hypertension Guidelines"

  steps:
    - step: 1
      drug_class: ACEi_ARB
      typical_agents:
        - ramipril
        - perindopril
        - telmisartan
      titration_interval_weeks: 4
      requires_potassium_below: 5.5

    - step: 2
      drug_class: CCB
      typical_agents:
        - amlodipine
        - lercanidipine
      titration_interval_weeks: 4
      combine_with: ACEi_ARB

    - step: 3
      drug_class: THIAZIDE
      typical_agents:
        - indapamide
        - chlorthalidone
      titration_interval_weeks: 4
      combine_with: ACEi_ARB+CCB
      monitor: [potassium, sodium, creatinine]

    - step: 4
      drug_class: SPIRONOLACTONE
      typical_start_dose_mg: 25
      typical_max_dose_mg: 50
      titration_interval_weeks: 6
      requires_potassium_below: 5.0
      requires_egfr_above: 30
      specialist_referral_if_insufficient: true

# ---------------------------------------------------------------------------
# Renal protection pathway — nephroprotective escalation
# ---------------------------------------------------------------------------
renal_pathway:
  name: "Nephroprotective Intensification"
  source: "KDIGO 2024, ADA 2025 §11"

  steps:
    - step: 1
      drug_class: ACEi_ARB
      note: "Max tolerated dose for albuminuria control"

    - step: 2
      drug_class: SGLT2i
      note: "Add if eGFR ≥ 20; continue even if eGFR dips initially"

    - step: 3
      drug_class: FINERENONE
      note: "Add if UACR ≥ 30 mg/g and K+ < 5.0"
      requires_potassium_below: 5.0
      requires_uacr_above: 30

# ---------------------------------------------------------------------------
# Lipid pathway — statin intensification
# ---------------------------------------------------------------------------
lipid_pathway:
  name: "LDL-C Intensification"
  source: "ESC 2019/2024 Dyslipidaemia, ADA 2025 §10"

  steps:
    - step: 1
      drug_class: HIGH_INTENSITY_STATIN
      typical_agents:
        - atorvastatin_40_80
        - rosuvastatin_20_40

    - step: 2
      drug_class: EZETIMIBE
      combine_with: HIGH_INTENSITY_STATIN

    - step: 3
      drug_class: PCSK9i
      typical_agents:
        - evolocumab
        - alirocumab
      specialist_referral: true
      pbs_authority_required: true
