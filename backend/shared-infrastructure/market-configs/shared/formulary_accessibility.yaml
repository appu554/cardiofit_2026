# Shared Formulary Accessibility Rules
# Drug availability status per class. Market-specific overrides in
# australia/ and india/ directories take precedence.
# Phase 10 P10-E/F/G.
#
# Status values:
#   AVAILABLE     — generally accessible without restrictions
#   RESTRICTED    — available with prior authorization or specialist referral
#   NOT_AVAILABLE — not approved or not marketed in this jurisdiction
#   SUBSIDISED    — government-subsidised (PBS/NLEM), lower patient cost

drug_classes:
  METFORMIN:
    status: AVAILABLE
    note: "First-line T2DM globally"
  SGLT2i:
    status: AVAILABLE
    note: "Empagliflozin, dapagliflozin, canagliflozin"
  GLP1_RA:
    status: AVAILABLE
    note: "Semaglutide, liraglutide, dulaglutide"
  DPP4i:
    status: AVAILABLE
    note: "Sitagliptin, vildagliptin, saxagliptin"
  SULFONYLUREA:
    status: AVAILABLE
    note: "Gliclazide, glimepiride"
  INSULIN:
    status: AVAILABLE
  BASAL_INSULIN:
    status: AVAILABLE
  ACEi:
    status: AVAILABLE
    note: "Ramipril, lisinopril, enalapril"
  ARB:
    status: AVAILABLE
    note: "Losartan, telmisartan, valsartan"
  ARNI:
    status: AVAILABLE
    note: "Sacubitril/valsartan"
  CCB:
    status: AVAILABLE
    note: "Amlodipine, nifedipine"
  BETA_BLOCKER:
    status: AVAILABLE
    note: "Metoprolol, bisoprolol, carvedilol"
  THIAZIDE:
    status: AVAILABLE
    note: "Hydrochlorothiazide, chlorthalidone, indapamide"
  MRA:
    status: AVAILABLE
    note: "Spironolactone, eplerenone"
  FINERENONE:
    status: RESTRICTED
    note: "Newer non-steroidal MRA — availability varies by market"
  STATIN:
    status: AVAILABLE
    note: "Atorvastatin, rosuvastatin"
  EZETIMIBE:
    status: AVAILABLE
