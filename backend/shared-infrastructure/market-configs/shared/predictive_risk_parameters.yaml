# Predictive Risk — Sprint 1 heuristic weights.

heuristic_weights:
  trajectory_declining:
    weight: 25
    threshold_slope: -0.5
    max_contribution: 25
    modifiable: false
    interpretation: "Clinical trajectory has been declining"
  pai_trend_rising:
    weight: 20
    threshold_slope: 0.3
    max_contribution: 20
    modifiable: false
    interpretation: "Urgency score has been rising over 30 days"
  engagement_declining:
    weight: 20
    threshold_drop: 0.20
    max_contribution: 20
    modifiable: true
    interpretation: "Patient engagement declining"
    action: "Schedule engagement re-establishment outreach within 7 days"
  post_discharge_window:
    weight: 15
    max_days: 30
    max_contribution: 15
    modifiable: false
    interpretation: "Patient is in post-discharge high-risk window"
  medication_complexity:
    weight: 10
    threshold_changes: 2
    threshold_polypharmacy: 8
    max_contribution: 10
    modifiable: true
    interpretation: "Recent medication changes or high polypharmacy"
    action: "Schedule medication reconciliation review"
  confounder_burden:
    weight: 10
    threshold_score: 0.3
    max_contribution: 10
    modifiable: false
    interpretation: "Active confounders may be affecting clinical trajectory"

risk_tiers:
  high: 50
  moderate: 25
  low: 0

counterfactual_estimate:
  engagement_intervention_reduction: 8
  medication_review_reduction: 5

outreach:
  max_per_clinician_per_day: 8
  min_risk_score: 25
  exclude_pai_tiers: [CRITICAL, HIGH]
  cooldown_days: 14

prediction_window_days: 30
prediction_expiry_hours: 24
