# Acute-on-chronic detection thresholds.

baseline:
  primary_lookback_days: 7
  fallback_lookback_days: 14
  min_readings_high_confidence: 7
  min_readings_moderate_confidence: 3
  min_readings_any: 3
  low_confidence_threshold_multiplier: 1.5

vital_signs:
  egfr:
    direction: "below"
    thresholds:
      critical_deviation_pct: 30
      high_deviation_pct: 25
      moderate_deviation_pct: 20
    absolute_critical: 20
    suggested_action: "Order stat eGFR. Review nephrotoxic medications. Assess hydration."
    cooldown_hours: 72

  sbp:
    direction: "both"
    thresholds:
      critical_deviation_mmhg: 40
      high_deviation_mmhg: 30
      moderate_deviation_mmhg: 25
    absolute_critical_high: 180
    absolute_critical_low: 90
    suggested_action_high: "Assess for end-organ damage. If symptomatic, emergency referral."
    suggested_action_low: "Hold antihypertensives. Assess for dehydration, sepsis, cardiac event."
    cooldown_hours: 24

  weight:
    direction: "above"
    window_hours: 72
    thresholds:
      critical_gain_kg: 3.0
      high_gain_kg: 2.0
      moderate_gain_kg: 1.5
    requires_context: "CKM_4C"
    non_hf_max_severity: "MODERATE"
    suggested_action: "Increase diuretic. If no response in 24h, clinic review. If dyspnea, emergency."
    cooldown_hours: 48

  potassium:
    direction: "above"
    thresholds:
      critical_absolute: 6.0
      high_absolute: 5.5
      high_with_medication: true
    potassium_medications: ["ACEi", "ARB", "MRA", "FINERENONE"]
    suggested_action: "Stat ECG. Hold potassium-affecting medications. If >6.5, emergency."
    cooldown_hours: 24

  glucose_fbg:
    direction: "above"
    thresholds:
      high_absolute: 300
      moderate_deviation_pct: 40
    suggested_action: "Check ketones. If positive, emergency for DKA. If negative, urgent medication review."
    cooldown_hours: 24

gap_amplification:
  threshold_hours: 48
  amplify_levels: 1
  rural_threshold_hours: 72

confounder_dampening:
  enabled: true
  dampen_levels: 1
  min_floor: "MODERATE"
