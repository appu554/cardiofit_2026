# Patient Acuity Index dimension weights and thresholds.

weights:
  velocity: 0.30
  proximity: 0.25
  behavioral: 0.20
  context: 0.15
  attention: 0.10

velocity:
  composite_slope:
    severe_decline: -2.0
    moderate_decline: -1.0
    mild_decline: -0.3
    stable: 0.3
    improving: 0.3
  second_derivative:
    accelerating_decline: 1.5
    decelerating_decline: 0.7
    stable: 1.0
    accelerating_improvement: 0.5
  concordant_bonus: 15
  per_additional_domain: 5

proximity:
  egfr:
    danger_threshold: 30
    warning_start: 45
    score_at_danger: 100
    score_at_warning: 50
    direction: "below"
  hba1c:
    danger_threshold: 10.0
    warning_start: 8.0
    score_at_danger: 80
    score_at_warning: 40
    direction: "above"
  sbp:
    danger_threshold: 180
    warning_start: 160
    score_at_danger: 100
    score_at_warning: 60
    direction: "above"
  potassium:
    danger_threshold: 6.0
    warning_start: 5.5
    score_at_danger: 100
    score_at_warning: 50
    direction: "above"
  tbr_l2:
    danger_threshold: 5.0
    warning_start: 2.0
    score_at_danger: 90
    score_at_warning: 40
    direction: "above"
  acute_weight_gain:
    danger_threshold: 3.0
    warning_start: 2.0
    score_at_danger: 85
    score_at_warning: 40
    direction: "above"
    requires_context: "CKM_4C"
  scaling: "exponential"
  exponent: 2.0

behavioral:
  engagement_thresholds:
    disengaged: 0.3
    declining: 0.5
    active: 0.7
    engaged: 1.0
  measurement_frequency:
    cessation_days: 5
    reduced_threshold: 0.50
    slightly_reduced: 0.25
  compound_both: 95

context:
  ckm_stage_base:
    "0": 0
    "1": 5
    "2": 10
    "3": 20
    "4a": 35
    "4b": 50
    "4c": 65
  modifiers:
    post_discharge_30d: 25
    acute_illness: 20
    recent_hypo: 15
    active_steroid: 10
    polypharmacy_elderly: 15
  nyha_amplifier:
    "IV": 1.5
    "III": 1.3
    "II": 1.1
    "I": 1.0
  max_score: 100

attention:
  days_since_clinician:
    critical: 90
    high: 60
    moderate: 30
    adequate: 14
    recent: 14
  unacknowledged_cards:
    per_card: 10
    per_day_oldest: 3
    cap: 50

tiers:
  critical: 80
  high: 60
  moderate: 40
  low: 20

significant_change:
  score_delta: 10
  tier_change: true

rate_limit:
  min_interval_minutes: 15
  max_computations_per_hour: 8

confounder_dampening:
  enabled: true
  max_velocity_during_season: 60
  reason: "Seasonal confounder active — velocity urgency dampened to prevent false escalation"
