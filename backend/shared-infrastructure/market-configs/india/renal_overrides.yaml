# India Renal Overrides
# Sources: RSSDI 2024, Indian CKD Guidelines, ICMR recommendations
# Adaptations for cost-awareness, drug availability, and local practice patterns

market: india

stale_egfr:
  hard_block_on_critical: false   # Soft block — alert but don't veto

drug_overrides:
  - drug_class: METFORMIN
    substitute_class: SULFONYLUREA   # Cost-effective, widely available

  - drug_class: GLP1_RA
    availability_flag: LIMITED_AFFORDABLE   # High cost, limited insurance coverage

formulary_accessibility:
  tier_1_universal:
    - METFORMIN
    - SULFONYLUREA
    - INSULIN
    - ACEi
    - ARB
    - THIAZIDE
  tier_2_available:
    - DPP4i
    - MRA
  tier_3_limited:
    - SGLT2i
    - GLP1_RA
    - FINERENONE
    - EXENATIDE

ramadan_fasting:
  enabled: true
  sulfonylurea_caution: true
  insulin_adjustment_required: true
  metformin_iftar_preference: true
