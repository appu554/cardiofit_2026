# India Confounder Calendar
# Cultural, religious, and environmental events that confound clinical outcomes.
# Used by the enhanced confounder scorer (V4-8) to annotate IOR outcome windows.

market: india

# ─── Religious Fasting Events ───────────────────────────────────────────────────

religious_events:
  - name: RAMADAN
    category: RELIGIOUS_FASTING
    recurrence_type: ISLAMIC_LUNAR
    duration_days: 30
    affected_outcomes: ["DELTA_HBA1C", "DELTA_FBG", "DELTA_WEIGHT"]
    expected_direction: "VARIABLE_GLUCOSE_WEIGHT_LOSS"
    expected_magnitude: "MODERATE"
    base_weight: 0.25
    post_event_washout_days: 28
    applies_to: MUSLIM
    dates_2026:
      start: "2026-02-18"
      end: "2026-03-19"
    dates_2027:
      start: "2027-02-07"
      end: "2027-03-08"
    notes: >
      Dawn-to-dusk fasting affects meal timing, medication adherence,
      and glucose patterns. Weight loss common but rebound frequent post-Eid.

  - name: NAVRATRI_CHAITRA
    category: RELIGIOUS_FASTING
    recurrence_type: HINDU_LUNAR
    duration_days: 9
    affected_outcomes: ["DELTA_FBG", "DELTA_WEIGHT"]
    expected_direction: "MILD_GLUCOSE_VARIATION"
    expected_magnitude: "MILD"
    base_weight: 0.10
    post_event_washout_days: 7
    applies_to: HINDU
    dates_2026:
      start: "2026-03-29"
      end: "2026-04-06"
    notes: >
      Spring Navratri. Many Hindus observe partial or full fasts.
      Dietary shifts to sattvic foods may affect glucose and weight mildly.

  - name: NAVRATRI_SHARAD
    category: RELIGIOUS_FASTING
    recurrence_type: HINDU_LUNAR
    duration_days: 9
    affected_outcomes: ["DELTA_FBG", "DELTA_WEIGHT"]
    expected_direction: "MILD_GLUCOSE_VARIATION"
    expected_magnitude: "MILD"
    base_weight: 0.10
    post_event_washout_days: 7
    applies_to: HINDU
    dates_2026:
      start: "2026-10-02"
      end: "2026-10-10"
    notes: >
      Autumn Navratri preceding Dussehra/Diwali season.
      Similar fasting patterns to Chaitra Navratri.

# ─── Festival / Dietary Events ──────────────────────────────────────────────────

festival_events:
  - name: DIWALI_SEASON
    category: FESTIVAL_DIETARY
    recurrence_type: HINDU_LUNAR
    duration_days: 21
    affected_outcomes: ["DELTA_HBA1C", "DELTA_FBG", "DELTA_WEIGHT", "DELTA_SBP"]
    expected_direction: "WORSENS_GLUCOSE_AND_WEIGHT"
    expected_magnitude: "MODERATE"
    base_weight: 0.20
    post_event_washout_days: 21
    applies_to: ALL
    dates_2026:
      start: "2026-10-10"
      end: "2026-10-31"
    notes: >
      Extended Diwali season includes Dhanteras through Bhai Dooj.
      High-calorie sweets, fried foods, alcohol consumption increase.
      Significant impact on glycemic control and blood pressure.

  - name: WEDDING_SEASON
    category: FESTIVAL_DIETARY
    recurrence_type: GREGORIAN_SEASONAL
    duration_days: 120
    affected_outcomes: ["DELTA_HBA1C", "DELTA_FBG", "DELTA_WEIGHT", "DELTA_SBP"]
    expected_direction: "WORSENS_GLUCOSE_AND_WEIGHT"
    expected_magnitude: "MILD_TO_MODERATE"
    base_weight: 0.15
    post_event_washout_days: 30
    applies_to: ALL
    gregorian_approx_month: [10, 11, 12, 1]
    notes: >
      Indian wedding season peaks Oct-Jan. Multiple social events with
      rich food, late nights, disrupted routines, and alcohol.

  - name: PONGAL_MAKAR_SANKRANTI
    category: FESTIVAL_DIETARY
    recurrence_type: GREGORIAN_FIXED
    duration_days: 4
    affected_outcomes: ["DELTA_FBG", "DELTA_WEIGHT"]
    expected_direction: "MILD_GLUCOSE_SPIKE"
    expected_magnitude: "MILD"
    base_weight: 0.08
    post_event_washout_days: 7
    applies_to: ALL
    dates_2026:
      start: "2026-01-14"
      end: "2026-01-17"
    notes: >
      Harvest festival. Traditional sweets (pongal, tilgul) increase
      sugar and calorie intake over the festival days.

# ─── Seasonal / Environmental Events ────────────────────────────────────────────

seasonal_events:
  - name: MONSOON_SEASON
    category: ENVIRONMENTAL
    recurrence_type: GREGORIAN_SEASONAL
    duration_days: 120
    affected_outcomes: ["DELTA_SBP", "DELTA_WEIGHT"]
    expected_direction: "VARIABLE_BP_REDUCED_ACTIVITY"
    expected_magnitude: "MILD"
    base_weight: 0.10
    post_event_washout_days: 14
    applies_to: ALL
    gregorian_approx_month: [6, 7, 8, 9]
    region_specific: true
    regions: [MUMBAI, KOLKATA, CHENNAI, KERALA, GOA]
    notes: >
      Heavy monsoon reduces outdoor physical activity, increases
      humidity-related discomfort, and may disrupt medication access.

  - name: EXTREME_SUMMER
    category: ENVIRONMENTAL
    recurrence_type: GREGORIAN_SEASONAL
    duration_days: 90
    affected_outcomes: ["DELTA_SBP", "DELTA_WEIGHT", "DELTA_EGFR"]
    expected_direction: "DEHYDRATION_RISK_BP_VARIATION"
    expected_magnitude: "MILD_TO_MODERATE"
    base_weight: 0.12
    post_event_washout_days: 14
    applies_to: ALL
    gregorian_approx_month: [4, 5, 6]
    region_specific: true
    regions: [RAJASTHAN, MADHYA_PRADESH, DELHI, UTTAR_PRADESH]
    notes: >
      Extreme heat (>45C) causes dehydration risk, affects renal function,
      alters blood pressure readings, and reduces outdoor activity.

# ─── Seasonal HbA1c Pattern ─────────────────────────────────────────────────────

seasonal_hba1c:
  pattern: TROPICAL_MILD
  peak_months: [7, 8, 9]
  trough_months: [1, 2, 3]
  magnitude_pct: 0.15
  notes: >
    Mild tropical seasonal HbA1c variation. Monsoon months show slightly
    higher readings due to reduced activity and dietary shifts.
