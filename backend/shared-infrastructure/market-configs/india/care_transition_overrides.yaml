# India care transition overrides

asha_integration:
  enabled: true
  heightened_contact_schedule: "weekly"
  escalation_path: [ASHA, ANM, PHC_PHYSICIAN]

manual_discharge:
  patient_reported_accepted: true
  asha_reported_accepted: true
  validation_window_days: 7
  manual_data_confidence: LOW

supply_gap:
  check_frequency_hours: 48
  alert_threshold: LOW

seasonal_adjustments:
  monsoon_months: [6, 7, 8, 9]
  festival_months: [10, 11]
  asha_visit_frequency_override: "twice_weekly"
