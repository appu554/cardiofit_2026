# India CGM Overrides
# Sources: RSSDI 2023 CGM Position Statement, Indian Diabetes Congress 2023
# Adaptations for isCGM scan patterns, sulfonylurea prevalence, Ramadan fasting

market: india

device_landscape:
  primary_device: FREESTYLE_LIBRE_2
  data_format: ISCGM_SCAN              # Intermittently-scanned CGM (requires manual scan)

targets_override:
  sulfonylurea_insulin_combination:
    tbr_l1_pct: 2                       # Stricter hypo target — SU+insulin = high hypo risk
    tbr_l2_pct: 0                       # Zero tolerance for severe hypo on dual hypo agents

ramadan:
  enabled: true
  adjusted_targets:
    tir_pct: 60                         # Relaxed TIR during fasting
    tbr_l1_pct: 2                       # Tighter hypo vigilance during Sehri-to-Iftar
  fasting_hypo_alert_mg_dl: 80          # Alert if glucose < 80 during fasting hours

intermittent_use:
  enabled: true
  pattern: 2_WEEKS_ON_12_WEEKS_OFF      # Cost-driven intermittent CGM pattern
  min_cgm_days_for_mhri_switch: 7       # Minimum CGM days before switching to MHRI scoring
