# India Formulary Accessibility — NLEM 2022 (National List of Essential Medicines)
# Overrides shared/formulary_accessibility.yaml for India market.
# Phase 10 P10-E.
#
# NLEM drugs are price-controlled and widely available at public
# health facilities. Non-NLEM drugs may be available but at higher
# cost and lower accessibility in rural/public settings.
#
# Source: Ministry of Health & Family Welfare, NLEM 2022
# Reference: https://main.mohfw.gov.in/NLEM-2022

drug_classes:
  METFORMIN:
    status: SUBSIDISED
    note: "NLEM 2022 — first-line T2DM, widely available at PHCs"
    nlem_listed: true
  SGLT2i:
    status: AVAILABLE
    note: "Not NLEM-listed. Available at tertiary centres. Higher cost."
    nlem_listed: false
    alternative: "METFORMIN"
    alternative_note: "Consider metformin + sulfonylurea if SGLT2i cost-prohibitive"
  GLP1_RA:
    status: RESTRICTED
    note: "Not NLEM. Limited availability outside metros. Requires cold chain."
    nlem_listed: false
    alternative: "DPP4i"
    alternative_note: "DPP4i (oral) as lower-cost incretin alternative"
  DPP4i:
    status: AVAILABLE
    note: "Widely available. Not NLEM but affordable generics exist."
    nlem_listed: false
  SULFONYLUREA:
    status: SUBSIDISED
    note: "NLEM 2022 (gliclazide) — widely available, very low cost"
    nlem_listed: true
  INSULIN:
    status: SUBSIDISED
    note: "NLEM 2022 (human insulin) — available at district hospitals"
    nlem_listed: true
  ACEi:
    status: SUBSIDISED
    note: "NLEM 2022 (enalapril, ramipril) — widely available"
    nlem_listed: true
  ARB:
    status: AVAILABLE
    note: "Losartan NLEM-listed. Telmisartan widely available generic."
    nlem_listed: true
  ARNI:
    status: RESTRICTED
    note: "Not NLEM. Available at cardiac centres. Specialist initiation."
    nlem_listed: false
    alternative: "ACEi"
    alternative_note: "ACEi (ramipril) as NLEM-listed RAAS alternative"
  CCB:
    status: SUBSIDISED
    note: "NLEM 2022 (amlodipine) — first-line antihypertensive"
    nlem_listed: true
  BETA_BLOCKER:
    status: SUBSIDISED
    note: "NLEM 2022 (metoprolol, atenolol)"
    nlem_listed: true
  THIAZIDE:
    status: SUBSIDISED
    note: "NLEM 2022 (hydrochlorothiazide)"
    nlem_listed: true
  MRA:
    status: AVAILABLE
    note: "Spironolactone NLEM-listed for HF. Eplerenone non-NLEM."
    nlem_listed: true
  FINERENONE:
    status: NOT_AVAILABLE
    note: "Not yet approved in India (as of 2026). Use spironolactone."
    alternative: "MRA"
    alternative_note: "Spironolactone (NLEM) as MRA alternative"
  STATIN:
    status: SUBSIDISED
    note: "NLEM 2022 (atorvastatin) — widely available"
    nlem_listed: true
  EZETIMIBE:
    status: AVAILABLE
    note: "Not NLEM but affordable generics available"
    nlem_listed: false
