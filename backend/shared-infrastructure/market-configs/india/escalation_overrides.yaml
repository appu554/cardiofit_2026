# India escalation overrides
# Sources: Practo 2023, ASHA worker protocols

channel_priorities:
  SAFETY: [whatsapp, sms, push]
  IMMEDIATE: [whatsapp, push, sms]
  URGENT: [push, whatsapp]

asha_escalation_chain:
  - role: ASHA
    channel: sms
    timeout_minutes: 60
  - role: ANM
    channel: whatsapp
    timeout_minutes: 120
  - role: PHC_PHYSICIAN
    channel: sms
    timeout_minutes: 30

rural_connectivity:
  safety_timeout_override_minutes: 60
  extend_all_timeouts_multiplier: 2.0

quiet_hours:
  default_start: "22:00"
  default_end: "06:00"
  timezone: "Asia/Kolkata"

cost_limits:
  max_sms_per_patient_per_month: 20
  max_whatsapp_per_patient_per_month: 30
