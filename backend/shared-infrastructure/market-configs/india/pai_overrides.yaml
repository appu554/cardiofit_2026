# India PAI overrides
# Sources: RSSDI 2023, ICMR guidelines

weights_override:
  velocity: 0.32
  behavioral: 0.18

attention_override:
  asha_patient_segment:
    days_since_clinician:
      critical: 120
      high: 90
      adequate: 30

seasonal_velocity_dampening:
  diwali_season:
    months: [10, 11]
    max_velocity: 50
  ramadan:
    applies_to: "MUSLIM"
    max_velocity: 55

telehealth:
  enabled: true
  pai_threshold_for_priority_slot: 60
  pai_threshold_for_asha_visit: 40
