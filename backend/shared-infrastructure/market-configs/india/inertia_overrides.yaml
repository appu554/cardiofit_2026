# Therapeutic Inertia Overrides — India
# Sources: RSSDI 2024, ICMR Guidelines, India-specific clinical practice patterns
# Overrides shared/inertia_thresholds.yaml and shared/intensification_pathways.yaml

# ---------------------------------------------------------------------------
# RSSDI glycaemic pathway override
# ---------------------------------------------------------------------------
glycaemic_pathway_override:
  source: "RSSDI Clinical Practice Recommendations 2024"
  note: "Sulfonylurea preferred at step 2 due to cost and availability"

  steps:
    - step: 2
      drug_class: SULFONYLUREA
      typical_agents:
        - glimepiride
        - gliclazide_mr
      typical_start_dose_mg: 1       # glimepiride
      typical_max_dose_mg: 4
      titration_interval_weeks: 4
      rationale: "Cost-effective; widely available across India"

    - step: 3
      drug_class: SGLT2i
      note: "Moved to step 3 per RSSDI; cost barrier for many patients"

    - step: 4
      drug_class: GLP1_RA
      note: "Limited availability; high out-of-pocket cost"

# ---------------------------------------------------------------------------
# Extended evidence windows for India
# ---------------------------------------------------------------------------
window_overrides:
  hba1c:
    min_duration_weeks: 16           # extended from 12 — less frequent testing
    min_readings: 2

  bp:
    min_readings_per_week: 1         # reduced from 2 — limited home BP access
    min_weeks: 6                     # extended from 4

  renal:
    max_response_weeks: 6            # extended from 4

# ---------------------------------------------------------------------------
# Cost barrier detection
# ---------------------------------------------------------------------------
cost_barriers:
  flag_cost_barrier: true

  high_cost_classes:
    - drug_class: GLP1_RA
      monthly_cost_inr: 8000
      barrier_likely: true
      alternative: SULFONYLUREA

    - drug_class: SGLT2i
      monthly_cost_inr: 1500
      barrier_likely: false          # becoming affordable
      note: "Generic dapagliflozin widely available since 2023"

    - drug_class: FINERENONE
      monthly_cost_inr: 4500
      barrier_likely: true
      alternative: SPIRONOLACTONE

    - drug_class: PCSK9i
      monthly_cost_inr: 25000
      barrier_likely: true
      alternative: EZETIMIBE

# ---------------------------------------------------------------------------
# Seasonal exclusions — cultural and religious fasting periods
# ---------------------------------------------------------------------------
seasonal_exclusions:
  ramadan:
    grace_period_weeks: 6
    note: "Fasting affects glycaemic control; defer inertia detection"
    applies_to:
      - GLYCAEMIC

  diwali:
    grace_period_weeks: 2
    note: "Festive dietary changes; defer glycaemic/lipid inertia"
    applies_to:
      - GLYCAEMIC
      - LIPID

  navratri:
    grace_period_weeks: 2
    note: "Fasting period; defer glycaemic inertia"
    applies_to:
      - GLYCAEMIC

# ---------------------------------------------------------------------------
# Additional exclusions specific to India
# ---------------------------------------------------------------------------
exclusion_overrides:
  additional_reasons:
    - MEDICATION_STOCKOUT
    - CLINIC_ACCESS_BARRIER
    - MONSOON_TRAVEL_DISRUPTION

  titration_grace_period_weeks: 8    # extended from 6 — longer follow-up intervals
