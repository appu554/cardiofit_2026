# Australia CGM Overrides
# Sources: ADS-ADEA 2024 Position Statement, NDSS Subsidy Schedule, MHR Integration Spec
# Adaptations for subsidised device access, indigenous remote health, My Health Record

market: australia

device_landscape:
  supported_devices:
    - FREESTYLE_LIBRE_2
    - DEXCOM_G7
  ndss_subsidized: true                 # National Diabetes Services Scheme covers CGM

indigenous_overrides:
  offline_sync_max_days: 14             # Remote communities may have delayed data upload
  relaxed_targets:
    tir_pct: 50                         # Adjusted for remote care realities
    tbr_l1_pct: 2                       # Slightly relaxed hypo threshold

mhr_integration:
  emit_cgm_summary: true                # Push CGM summaries to My Health Record
  fhir_document_type: CGM_SUMMARY_REPORT
