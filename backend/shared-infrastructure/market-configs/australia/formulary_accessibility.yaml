# Australia Formulary Accessibility — PBS (Pharmaceutical Benefits Scheme)
# Overrides shared/formulary_accessibility.yaml for Australia market.
# Phase 10 P10-F.
#
# PBS-listed drugs are government-subsidised — patients pay a capped
# co-payment (general ~$31.60, concession ~$7.70 as of 2026).
# Non-PBS drugs are full private cost. Authority Required drugs need
# prior approval via the PBS Online system.
#
# Source: Services Australia PBS Schedule
# Reference: https://www.pbs.gov.au

drug_classes:
  METFORMIN:
    status: SUBSIDISED
    note: "PBS general listing. First-line T2DM."
    pbs_listed: true
    authority_required: false
  SGLT2i:
    status: SUBSIDISED
    note: "PBS listed (empagliflozin, dapagliflozin). Authority Required for HF indication."
    pbs_listed: true
    authority_required: true
    authority_note: "Authority Required for use in HFrEF (LVEF ≤40%). Streamlined for T2DM."
  GLP1_RA:
    status: SUBSIDISED
    note: "PBS listed (dulaglutide, semaglutide). Authority Required — must have failed metformin + sulfonylurea."
    pbs_listed: true
    authority_required: true
    authority_note: "Authority Required: must demonstrate inadequate control on dual oral therapy"
  DPP4i:
    status: SUBSIDISED
    note: "PBS listed (sitagliptin, vildagliptin). Streamlined authority."
    pbs_listed: true
    authority_required: false
  SULFONYLUREA:
    status: SUBSIDISED
    note: "PBS general listing (gliclazide, glimepiride)"
    pbs_listed: true
    authority_required: false
  INSULIN:
    status: SUBSIDISED
    note: "PBS listed. All major insulin types available."
    pbs_listed: true
    authority_required: false
  ACEi:
    status: SUBSIDISED
    note: "PBS general listing (ramipril, perindopril)"
    pbs_listed: true
    authority_required: false
  ARB:
    status: SUBSIDISED
    note: "PBS listed (irbesartan, candesartan, telmisartan)"
    pbs_listed: true
    authority_required: false
  ARNI:
    status: SUBSIDISED
    note: "PBS listed (sacubitril/valsartan). Authority Required for HFrEF."
    pbs_listed: true
    authority_required: true
    authority_note: "Authority Required: LVEF ≤40%, NYHA II-IV, despite ACEi/ARB + beta-blocker"
  CCB:
    status: SUBSIDISED
    note: "PBS general listing (amlodipine, felodipine)"
    pbs_listed: true
    authority_required: false
  BETA_BLOCKER:
    status: SUBSIDISED
    note: "PBS general listing (metoprolol, bisoprolol)"
    pbs_listed: true
    authority_required: false
  THIAZIDE:
    status: SUBSIDISED
    note: "PBS listed (indapamide, hydrochlorothiazide)"
    pbs_listed: true
    authority_required: false
  MRA:
    status: SUBSIDISED
    note: "PBS listed (spironolactone). Eplerenone Authority Required."
    pbs_listed: true
    authority_required: false
  FINERENONE:
    status: RESTRICTED
    note: "PBS Authority Required. TGA-approved 2023 for DKD with T2DM."
    pbs_listed: true
    authority_required: true
    authority_note: "Authority Required: confirmed DKD (eGFR 25-75 + ACR ≥30) on max tolerated ACEi/ARB"
  STATIN:
    status: SUBSIDISED
    note: "PBS general listing (atorvastatin, rosuvastatin)"
    pbs_listed: true
    authority_required: false
  EZETIMIBE:
    status: SUBSIDISED
    note: "PBS listed. Streamlined authority when statin alone insufficient."
    pbs_listed: true
    authority_required: false
