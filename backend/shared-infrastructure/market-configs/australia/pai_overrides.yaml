# Australia PAI overrides
# Sources: RACGP 2024, Heart Foundation 2022, NACCHO guidelines

indigenous_override:
  attention:
    days_since_clinician:
      critical: 56
      high: 42
      adequate: 21
  apply_when: "PATIENT_SEGMENT == INDIGENOUS_REMOTE"

gpmp:
  include_pai_trajectory: true
  gpmp_review_months: 6

aged_care:
  enabled: true
  facility_level_pai: true
  high_acuity_threshold: 60
