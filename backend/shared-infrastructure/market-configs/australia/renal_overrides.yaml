# Australia Renal Overrides
# Sources: PBS Schedule, CARI Guidelines, TGA, NACCHO recommendations
# Adaptations for PBS requirements, specialist initiation rules, and indigenous health

market: australia

stale_egfr:
  hard_block_on_critical: true   # Hard block — PBS compliance requires current labs

drug_overrides:
  - drug_class: SGLT2i
    initiation_min_egfr: 25.0     # PBS authority required; initiation >=25
    continuation_min_egfr: 20.0   # May continue below initiation threshold

  - drug_class: FINERENONE
    requires_specialist_initiation: true   # Nephrologist or endocrinologist required
    initiation_min_egfr: 25.0

indigenous_renal_overrides:
  enabled: true
  monitoring_multiplier: 2.0       # Double monitoring frequency for high-risk populations
  egfr_equation: CKD_EPI_2021     # Race-neutral equation mandatory
  early_referral_egfr: 45.0       # Earlier nephrology referral threshold
  community_health_worker_alerts: true
