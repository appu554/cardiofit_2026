# Therapeutic Inertia Overrides — Australia
# Sources: PBS Schedule 2025, RACGP Guidelines, Diabetes Australia,
#          National Aboriginal Community Controlled Health Organisation (NACCHO)
# Overrides shared/inertia_thresholds.yaml and shared/intensification_pathways.yaml

# ---------------------------------------------------------------------------
# PBS authority barrier detection
# ---------------------------------------------------------------------------
pbs_barriers:
  flag_pbs_authority: true

  authority_required_classes:
    - drug_class: SGLT2i
      pbs_item_code: "12325"
      authority_type: "STREAMLINED"
      requires_hba1c_above: 7.0
      requires_metformin_trial: true
      note: "Authority required — streamlined code 12325"

    - drug_class: GLP1_RA
      pbs_item_code: "12920"
      authority_type: "PHONE"
      requires_hba1c_above: 7.0
      requires_bmi_above: 35
      note: "Phone authority — BMI ≥ 35 required for PBS subsidy"

    - drug_class: FINERENONE
      pbs_item_code: "13445"
      authority_type: "STREAMLINED"
      requires_uacr_above: 30
      requires_acei_arb: true
      note: "Streamlined authority — must be on max-tolerated ACEi/ARB"

    - drug_class: PCSK9i
      pbs_item_code: "13102"
      authority_type: "PHONE"
      requires_ldl_above: 2.6       # mmol/L after max statin + ezetimibe
      specialist_only: true
      note: "Specialist-initiated; phone authority required"

# ---------------------------------------------------------------------------
# Indigenous health overrides — NACCHO/RACGP guidelines
# ---------------------------------------------------------------------------
indigenous_overrides:
  enabled: true
  applies_when: "patient.indigenous_status IN ('ABORIGINAL', 'TORRES_STRAIT', 'BOTH')"

  window_adjustments:
    bp:
      min_weeks: 8                   # extended from 4 — remote clinic access
      min_readings_per_week: 1       # reduced from 2
    hba1c:
      min_duration_weeks: 20         # extended from 12 — testing frequency
      min_readings: 2
    renal:
      max_response_weeks: 8          # extended from 4

  additional_barriers:
    - referral_access_barrier: true
      note: "Specialist access limited in remote communities"
    - telehealth_eligible: true
      note: "Prioritise telehealth pathways for medication review"
    - ams_referral_preferred: true
      note: "Aboriginal Medical Service referral preferred over mainstream"

  screening_adjustments:
    ckd_screening_age: 18            # vs 40 for general population (KDIGO)
    annual_uacr: true
    annual_hba1c: true

# ---------------------------------------------------------------------------
# GPMP (General Practitioner Management Plan) integration
# ---------------------------------------------------------------------------
gpmp_integration:
  review_cycle_months: 6
  note: "Align inertia review with GPMP/TCA review cycle for MBS billing"
  mbs_items:
    gpmp: "721"
    tca: "723"
    review: "732"

  multidisciplinary_trigger:
    inertia_severity_threshold: "MODERATE"
    note: "Trigger TCA review if inertia detected at moderate or above"

# ---------------------------------------------------------------------------
# Window overrides for general Australian population
# ---------------------------------------------------------------------------
window_overrides:
  hba1c:
    min_duration_weeks: 12           # same as shared baseline
    default_target: 7.0

  bp:
    systolic_target: 140             # RACGP/Heart Foundation 2024
    note: "140 for general; 130 for high-risk per Heart Foundation"

# ---------------------------------------------------------------------------
# Pathway adjustments
# ---------------------------------------------------------------------------
pathway_overrides:
  glycaemic_step_2_note: "SGLT2i preferred (PBS streamlined); SU if PBS barrier"
  hemodynamic_step_1_note: "Perindopril/amlodipine SPC preferred (PBS listed)"
