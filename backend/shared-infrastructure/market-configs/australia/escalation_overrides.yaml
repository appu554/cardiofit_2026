# Australia escalation overrides
# Sources: RACGP 2024, NACCHO guidelines

channel_priorities:
  SAFETY: [push, sms]
  IMMEDIATE: [push]
  URGENT: [push]

aged_care_escalation_chain:
  - role: FACILITY_RN
    channel: push
    timeout_minutes: 15
  - role: FACILITY_MANAGER
    channel: sms
    timeout_minutes: 30
  - role: VISITING_GP
    channel: sms
    timeout_minutes: 60
  - role: AFTER_HOURS_GP
    channel: sms
    timeout_minutes: 15

indigenous_remote:
  attention_override:
    safety_timeout_minutes: 60
    extend_all_timeouts_multiplier: 1.5

mhr_integration:
  trigger_on_safety: true
  update_shared_health_summary: true

gpmp_alignment:
  routine_consolidation: true
  consolidation_period_months: 6
