# Australia Confounder Calendar
# Cultural, seasonal, and environmental events that confound clinical outcomes.
# Used by the enhanced confounder scorer (V4-8) to annotate IOR outcome windows.

market: australia

# ─── Festival / Holiday Events ──────────────────────────────────────────────────

festival_events:
  - name: CHRISTMAS_NEW_YEAR_HOLIDAYS
    category: FESTIVAL_DIETARY
    recurrence_type: GREGORIAN_FIXED
    duration_days: 21
    affected_outcomes: ["DELTA_HBA1C", "DELTA_FBG", "DELTA_WEIGHT", "DELTA_SBP"]
    expected_direction: "WORSENS_GLUCOSE_AND_WEIGHT"
    expected_magnitude: "MODERATE"
    base_weight: 0.15
    post_event_washout_days: 21
    applies_to: ALL
    dates_2026:
      start: "2026-12-20"
      end: "2027-01-10"
    notes: >
      Summer holiday season in Australia. Increased alcohol, BBQs, social events,
      and reduced routine compliance. Coincides with peak summer heat.

  - name: EASTER_SCHOOL_HOLIDAYS
    category: FESTIVAL_DIETARY
    recurrence_type: GREGORIAN_VARIABLE
    duration_days: 14
    affected_outcomes: ["DELTA_FBG", "DELTA_WEIGHT"]
    expected_direction: "MILD_GLUCOSE_AND_WEIGHT_INCREASE"
    expected_magnitude: "MILD"
    base_weight: 0.08
    post_event_washout_days: 7
    applies_to: ALL
    dates_2026:
      start: "2026-04-03"
      end: "2026-04-17"
    notes: >
      Easter and autumn school holidays. Chocolate consumption spike,
      family gatherings, and disrupted daily routines.

# ─── Seasonal / Environmental Events ────────────────────────────────────────────

seasonal_events:
  - name: WINTER_TEMPERATE
    category: SEASONAL
    recurrence_type: GREGORIAN_SEASONAL
    duration_days: 90
    affected_outcomes: ["DELTA_HBA1C", "DELTA_SBP", "DELTA_WEIGHT"]
    expected_direction: "WORSENS_HBA1C_AND_BP"
    expected_magnitude: "MODERATE"
    base_weight: 0.15
    post_event_washout_days: 21
    applies_to: ALL
    gregorian_approx_month: [6, 7, 8]
    region_specific: true
    regions: [VIC, NSW, TAS, SA, ACT]
    notes: >
      Southern hemisphere winter. Reduced physical activity, comfort eating,
      vitamin D deficiency, and cold-induced BP elevation.

  - name: BUSHFIRE_SEASON
    category: ENVIRONMENTAL
    recurrence_type: GREGORIAN_SEASONAL
    duration_days: 120
    affected_outcomes: ["DELTA_SBP", "DELTA_EGFR", "DELTA_HBA1C"]
    expected_direction: "STRESS_AND_AIR_QUALITY_IMPACT"
    expected_magnitude: "MODERATE_TO_SEVERE"
    base_weight: 0.20
    post_event_washout_days: 42
    applies_to: ALL
    gregorian_approx_month: [11, 12, 1, 2]
    region_specific: true
    regions: [NSW, VIC, SA, QLD]
    notes: >
      Bushfire season causes air quality deterioration, psychological stress,
      displacement, medication access disruption, and respiratory/renal impact.

# ─── Indigenous Cultural Events ─────────────────────────────────────────────────

indigenous_events:
  - name: SORRY_BUSINESS
    category: LIFESTYLE
    recurrence_type: PATIENT_SPECIFIC
    duration_days: 14
    affected_outcomes: ["DELTA_HBA1C", "DELTA_FBG", "DELTA_SBP", "DELTA_WEIGHT"]
    expected_direction: "VARIABLE_ALL_OUTCOMES"
    expected_magnitude: "MODERATE"
    base_weight: 0.15
    post_event_washout_days: 14
    applies_to: INDIGENOUS
    notes: >
      Aboriginal and Torres Strait Islander mourning and cultural obligations.
      Significant disruption to routine, medication adherence, diet, and
      emotional wellbeing. Duration and impact vary by community and kinship.

  - name: CEREMONY_SEASON
    category: LIFESTYLE
    recurrence_type: PATIENT_SPECIFIC
    duration_days: 21
    affected_outcomes: ["DELTA_HBA1C", "DELTA_FBG", "DELTA_WEIGHT"]
    expected_direction: "VARIABLE_GLUCOSE_AND_WEIGHT"
    expected_magnitude: "MILD_TO_MODERATE"
    base_weight: 0.12
    post_event_washout_days: 14
    applies_to: INDIGENOUS
    notes: >
      Cultural ceremony periods involving travel to country, dietary changes,
      altered routines, and community obligations. Timing is patient-specific
      and community-dependent.

# ─── Seasonal HbA1c Pattern ─────────────────────────────────────────────────────

seasonal_hba1c:
  pattern: TEMPERATE_SOUTHERN_HEMISPHERE
  peak_months: [7, 8, 9]
  trough_months: [1, 2, 3]
  magnitude_pct: 0.30
  notes: >
    Significant southern hemisphere seasonal HbA1c variation. Winter months
    show higher readings due to reduced activity, comfort eating, and
    cold-induced metabolic changes. Stronger effect than tropical climates.
