# ============================================================
# ACUTE ISCHEMIC STROKE PROTOCOL - CDS-COMPLIANT ENHANCED VERSION
# ============================================================
# Clinical Guideline: AHA/ASA 2024 Stroke Guidelines
# Evidence Level: STRONG (Class I, Level A for tPA within 4.5 hours)
# Last Updated: 2025-10-21
# ============================================================

protocol_id: "STROKE-tPA-001"
name: "Acute Ischemic Stroke with tPA Administration - Door-to-Needle <60 Minutes"
category: "NEUROLOGICAL"
specialty: "NEUROLOGY"
version: "2.0"
last_updated: "2025-10-21"

# ============================================================
# SECTION 2: TRIGGER CRITERIA
# ============================================================
trigger_criteria:
  match_logic: "ANY_OF"

  conditions:
    # Condition 1: Moderate to severe stroke (NIHSS ≥4)
    - condition_id: "STROKE-TRIG-001"
      description: "NIHSS score ≥4 with known symptom onset <4.5 hours"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "nihss_score"
          operator: ">="
          threshold: 4
          source: "clinical_assessment"

        - parameter: "symptom_onset_hours"
          operator: "<"
          threshold: 4.5
          unit: "hours"
          source: "clinical_assessment"

        - parameter: "age"
          operator: ">="
          threshold: 18
          unit: "years"

    # Condition 2: Acute focal neurological deficit with known onset
    - condition_id: "STROKE-TRIG-002"
      description: "Acute focal neurological deficit with known time of onset <4.5 hours"
      match_logic: "ALL_OF"
      conditions:
        - match_logic: "ANY_OF"
          conditions:
            - parameter: "facial_droop"
              operator: "=="
              threshold: true
            - parameter: "arm_weakness"
              operator: "=="
              threshold: true
            - parameter: "speech_difficulty"
              operator: "=="
              threshold: true

        - parameter: "symptom_onset_known"
          operator: "=="
          threshold: true

        - parameter: "symptom_onset_hours"
          operator: "<"
          threshold: 4.5
          unit: "hours"

    # Condition 3: Wake-up stroke with DWI-FLAIR mismatch
    - condition_id: "STROKE-TRIG-003"
      description: "Wake-up stroke with MRI criteria suggesting onset within 4.5 hours"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "wake_up_stroke"
          operator: "=="
          threshold: true

        - parameter: "dwi_flair_mismatch"
          operator: "=="
          threshold: true
          source: "imaging"

# ============================================================
# SECTION 3: CONFIDENCE SCORING
# ============================================================
confidence_scoring:
  base_confidence: 0.88  # Strong evidence for tPA within 4.5 hours

  modifiers:
    - modifier_id: "STROKE-CONF-001"
      description: "Symptom onset <3 hours (strongest evidence window)"
      condition:
        parameter: "symptom_onset_hours"
        operator: "<"
        threshold: 3.0
        unit: "hours"
      adjustment: 0.10

    - modifier_id: "STROKE-CONF-002"
      description: "Severe stroke (NIHSS ≥10) likely large vessel occlusion"
      condition:
        parameter: "nihss_score"
        operator: ">="
        threshold: 10
      adjustment: 0.08

    - modifier_id: "STROKE-CONF-003"
      description: "No hemorrhage on CT confirms ischemic stroke"
      condition:
        parameter: "ct_hemorrhage"
        operator: "=="
        threshold: false
      adjustment: 0.06

    - modifier_id: "STROKE-CONF-004"
      description: "Platelet count normal (>100,000) reduces bleeding risk"
      condition:
        parameter: "platelets"
        operator: ">"
        threshold: 100000
        unit: "cells/mm3"
      adjustment: 0.05

    - modifier_id: "STROKE-CONF-005"
      description: "Large vessel occlusion confirmed (consider thrombectomy)"
      condition:
        parameter: "large_vessel_occlusion"
        operator: "=="
        threshold: true
      adjustment: 0.07

  activation_threshold: 0.70

# ============================================================
# SECTION 4: EVIDENCE SOURCE
# ============================================================
evidence_source:
  primary_guideline: "AHA/ASA Guidelines for Early Management of Acute Ischemic Stroke 2024"
  guideline_version: "AHA/ASA 2024"
  publication_date: "2024-02"
  evidence_level: "STRONG"

  key_citations:
    - citation_id: "AHA-ASA-STROKE-2024"
      authors: "Powers WJ, Rabinstein AA, Ackerson T, et al."
      title: "Guidelines for the Early Management of Patients With Acute Ischemic Stroke: 2024 Update"
      journal: "Stroke"
      year: 2024
      pmid: "38284373"
      doi: "10.1161/STR.0000000000000452"

    - citation_id: "NINDS-tPA-TRIAL"
      authors: "The National Institute of Neurological Disorders and Stroke rt-PA Stroke Study Group"
      title: "Tissue plasminogen activator for acute ischemic stroke"
      journal: "New England Journal of Medicine"
      year: 1995
      pmid: "7477192"

    - citation_id: "ECASS-III"
      authors: "Hacke W, Kaste M, Bluhmki E, et al."
      title: "Thrombolysis with alteplase 3 to 4.5 hours after acute ischemic stroke"
      journal: "Lancet"
      year: 2008
      pmid: "18757088"

  last_review_date: "2024-06-01"
  next_review_date: "2026-06-01"

# ============================================================
# SECTION 5: ACTIONS
# ============================================================
actions:
  - action_id: "STROKE-ACT-001"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 1

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 20

    diagnostic:
      test_name: "Non-contrast head CT"
      urgency: "STAT"
      instructions: "Rule out intracranial hemorrhage which is absolute contraindication to tPA. Include posterior fossa views. Immediate radiologist interpretation required within 15-20 minutes."

  - action_id: "STROKE-ACT-002"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 2

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 30

    diagnostic:
      test_name: "CBC with platelets, PT/INR, aPTT, glucose, creatinine"
      test_code: "LOINC-CBC-COAG"
      sample_type: "blood"
      urgency: "STAT"
      instructions: "Identify contraindications (thrombocytopenia <100k, INR >1.7, hypoglycemia). DO NOT delay tPA for lab results unless clinical suspicion of coagulopathy."

  - action_id: "STROKE-ACT-003"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 3

    timing:
      window: "URGENT"
      max_delay_minutes: 60  # Door-to-needle goal

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "tPA_ELIGIBLE_NO_CONTRAINDICATIONS"
          description: "Alteplase (tPA) for acute ischemic stroke within 4.5 hours"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "symptom_onset_hours"
                operator: "<="
                threshold: 4.5
                unit: "hours"
              - parameter: "ct_hemorrhage"
                operator: "=="
                threshold: false
              - parameter: "systolic_bp"
                operator: "<"
                threshold: 185
                unit: "mmHg"

          primary_medication:
            name: "Alteplase (tPA)"
            generic_name: "Tissue plasminogen activator"
            dose: "0.9"
            dose_unit: "mg/kg"
            route: "IV"
            frequency: "Single dose"
            duration: "61 minutes (1 min bolus + 60 min infusion)"
            administration_instructions: "Total dose 0.9 mg/kg (max 90 mg). Give 10% as IV bolus over 1 minute, remaining 90% as continuous infusion over 60 minutes via dedicated IV line. NINDS protocol."

          alternative_medication:
            name: "Tenecteplase (investigational)"
            dose: "0.25 mg/kg (max 25 mg)"
            dose_unit: "mg/kg"
            route: "IV bolus"
            frequency: "Single bolus"
            indication: "Alternative thrombolytic under investigation (not yet FDA-approved for stroke)"

        - criteria_id: "RENAL_IMPAIRMENT_tPA"
          description: "tPA dosing in renal impairment (no adjustment needed)"

          condition:
            parameter: "creatinine_clearance"
            operator: "<"
            threshold: 30.0
            unit: "mL/min"

          primary_medication:
            name: "Alteplase (tPA)"
            dose: "0.9"
            dose_unit: "mg/kg"
            route: "IV"
            frequency: "Single dose"
            dose_adjustment_rationale: "No dose adjustment required for renal impairment. tPA cleared by hepatic metabolism."
            administration_instructions: "Standard dosing. Monitor closely for bleeding given potential platelet dysfunction in renal failure."

  - action_id: "STROKE-ACT-004"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 4

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 30

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "BP_CONTROL_PRE_tPA"
          description: "Blood pressure control to <185/110 mmHg before tPA"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "systolic_bp"
                operator: ">="
                threshold: 185
                unit: "mmHg"
              - parameter: "diastolic_bp"
                operator: ">="
                threshold: 110
                unit: "mmHg"

          primary_medication:
            name: "Labetalol"
            dose: "10-20 mg IV push (may repeat q10min, max 300mg)"
            dose_unit: "mg"
            route: "IV"
            frequency: "PRN to maintain BP <185/110 pre-tPA, <180/105 post-tPA"
            administration_instructions: "IV push over 1-2 minutes. Monitor BP every 5-15 minutes. Goal: BP <185/110 before tPA, <180/105 for 24h post-tPA."

          alternative_medication:
            name: "Nicardipine"
            dose: "5 mg/hr infusion, titrate by 2.5 mg/hr q5-15min (max 15 mg/hr)"
            dose_unit: "mg/hr"
            route: "IV infusion"
            frequency: "Continuous infusion"
            indication: "If labetalol contraindicated (heart failure, severe asthma) or ineffective"

        - criteria_id: "SEVERE_ASTHMA_CONTRAINDICATION"
          description: "Use nicardipine instead of labetalol if severe asthma or heart failure"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "severe_asthma"
                operator: "=="
                threshold: true
              - parameter: "decompensated_heart_failure"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Nicardipine"
            dose: "5 mg/hr infusion (titrate)"
            dose_unit: "mg/hr"
            route: "IV infusion"
            frequency: "Continuous"
            dose_adjustment_rationale: "Nicardipine preferred over labetalol in reactive airway disease and heart failure"

  - action_id: "STROKE-ACT-005"
    type: "CLINICAL_ASSESSMENT"
    priority: "CRITICAL"
    sequence_number: 5

    clinical_assessment:
      assessment_type: "Intensive neurological monitoring post-tPA"
      frequency: "NIHSS every 15 min during and 2h after tPA, then hourly x 6h, then q2h x 16h"
      duration_hours: 24
      specific_parameters:
        - "NIHSS exam (detect deterioration - NIHSS worsening ≥4 points suggests ICH)"
        - "Blood pressure every 15 min x 2h, q30min x 6h, hourly x 16h (total 24h)"
        - "Monitor for severe headache, vomiting, acute hypertension, seizures (ICH warning signs)"

  - action_id: "STROKE-ACT-006"
    type: "CONSULTATION"
    priority: "HIGH"
    sequence_number: 6

    timing:
      window: "URGENT"
      max_delay_minutes: 20

    consultation:
      specialty: "INTERVENTIONAL_NEURORADIOLOGY"
      urgency: "STAT"
      reason: "Large vessel occlusion (NIHSS ≥6, anterior circulation or basilar artery) for mechanical thrombectomy evaluation"
      specific_questions:
        - "Is patient candidate for mechanical thrombectomy (within 24 hours of last known well)?"
        - "CT angiography or MR angiography showing large vessel occlusion?"

  - action_id: "STROKE-ACT-007"
    type: "DIAGNOSTIC"
    priority: "MEDIUM"
    sequence_number: 7

    timing:
      window: "ROUTINE"
      max_delay_minutes: 1440  # 24 hours post-tPA

    diagnostic:
      test_name: "Non-contrast head CT at 24 hours post-tPA"
      urgency: "ROUTINE"
      instructions: "Rule out asymptomatic hemorrhage before initiating antiplatelet therapy. If no hemorrhage, start aspirin 325 mg daily."

# ============================================================
# SECTION 6: TIME CONSTRAINTS
# ============================================================
time_constraints:
  - constraint_id: "STROKE-DOOR-TO-NEEDLE"
    bundle_name: "Door-to-Needle Time"
    description: "tPA administration within 60 minutes of hospital arrival"
    offset_minutes: 60
    critical: true

    required_actions:
      - action_id: "STROKE-ACT-001"
        description: "Head CT obtained and interpreted (no hemorrhage)"
      - action_id: "STROKE-ACT-003"
        description: "tPA infusion initiated"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 45
      critical_alert_at_minutes: 0
      missed_deadline_message: "CRITICAL: Door-to-needle time >60 minutes. Every 15-minute delay reduces likelihood of excellent outcome by 4%."

  - constraint_id: "STROKE-tPA-WINDOW"
    bundle_name: "tPA Treatment Window"
    description: "tPA must be administered within 4.5 hours of symptom onset"
    offset_minutes: 270  # 4.5 hours
    critical: true

    required_actions:
      - action_id: "STROKE-ACT-003"
        description: "tPA infusion completed within 4.5 hours of symptom onset"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 240
      critical_alert_at_minutes: 0
      missed_deadline_message: "CRITICAL: tPA contraindicated if >4.5 hours from symptom onset. Consider thrombectomy if large vessel occlusion."

# ============================================================
# SECTION 7: CONTRAINDICATIONS
# ============================================================
contraindications:
  - contraindication_id: "STROKE-CONTRA-001"
    condition_description: "Intracranial hemorrhage on CT scan"

    trigger_condition:
      parameter: "ct_hemorrhage"
      operator: "=="
      threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "STROKE-ACT-003"

    alternative_action:
      action_id: "STROKE-ALT-001"
      rationale: "Hemorrhagic stroke requires neurosurgical evaluation, not thrombolysis"

  - contraindication_id: "STROKE-CONTRA-002"
    condition_description: "Symptom onset >4.5 hours or unknown time of onset"

    trigger_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "symptom_onset_hours"
          operator: ">"
          threshold: 4.5
          unit: "hours"
        - parameter: "symptom_onset_unknown"
          operator: "=="
          threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "STROKE-ACT-003"

    alternative_action:
      action_id: "STROKE-ALT-002"
      rationale: "Consider mechanical thrombectomy if large vessel occlusion within 24 hours, or MRI for wake-up stroke protocol"

# ============================================================
# SECTION 8: MONITORING REQUIREMENTS
# ============================================================
monitoring_requirements:
  - monitoring_id: "STROKE-MON-001"
    parameter: "nihss_score"

    target_range:
      min: null
      max: null
      unit: null

    frequency: "Every 15 min during and 2h after tPA, hourly x 6h, q2h x 16h"
    duration_hours: 24

    alert_condition:
      parameter: "nihss_worsening"
      operator: ">="
      threshold: 4

  - monitoring_id: "STROKE-MON-002"
    parameter: "blood_pressure"

    target_range:
      min: null
      max: 180
      unit: "mmHg (systolic)"

    frequency: "Every 15 min x 2h, q30min x 6h, hourly x 16h"
    duration_hours: 24

    alert_condition:
      parameter: "systolic_bp"
      operator: ">"
      threshold: 180

# ============================================================
# SECTION 9: SPECIAL POPULATIONS
# ============================================================
special_populations:
  - population_id: "ELDERLY"
    description: "Patients ≥80 years old"

    inclusion_criteria:
      parameter: "age"
      operator: ">="
      threshold: 80
      unit: "years"

    modifications:
      - action_id: "STROKE-ACT-003"
        modification_type: "CAUTION"
        rationale: "Increased ICH risk in elderly, but tPA still beneficial if no other contraindications"

        new_parameters:
          monitoring: "Enhanced monitoring for ICH signs. Benefit of tPA maintained in elderly per ECASS III subgroup analysis."

  - population_id: "SEVERE_STROKE"
    description: "Patients with severe stroke (NIHSS >22)"

    inclusion_criteria:
      parameter: "nihss_score"
      operator: ">"
      threshold: 22

    modifications:
      - action_id: "STROKE-ACT-003"
        modification_type: "CAUTION"
        rationale: "Severe stroke associated with higher ICH risk but still potential for benefit"

        new_parameters:
          monitoring: "Shared decision-making with family regarding tPA benefit vs ICH risk. Consider thrombectomy as primary intervention."

  - population_id: "RECENT_ANTICOAGULATION"
    description: "Patients on direct oral anticoagulants (DOACs) within 48 hours"

    inclusion_criteria:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "dabigatran_use_48h"
          operator: "=="
          threshold: true
        - parameter: "apixaban_rivaroxaban_use_48h"
          operator: "=="
          threshold: true

    modifications:
      - action_id: "STROKE-ACT-003"
        modification_type: "CONTRAINDICATION"
        rationale: "Recent DOAC use increases bleeding risk with tPA"

        contraindications:
          - "tPA contraindicated if DOAC use within 48 hours"

        alternative_medication:
          name: "DOAC reversal agent + tPA"
          dose: "Idarucizumab 5g IV (for dabigatran) OR Andexanet alfa (for Xa inhibitors)"
          route: "IV"
          indication: "Rapid DOAC reversal may allow tPA administration if reversal agent available"

# ============================================================
# SECTION 10: ESCALATION RULES
# ============================================================
escalation_rules:
  - rule_id: "STROKE-ESC-001"
    description: "Immediate neurosurgery consultation for suspected ICH during/after tPA"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "sudden_severe_headache"
          operator: "=="
          threshold: true
        - parameter: "nihss_worsening"
          operator: ">="
          threshold: 4
        - parameter: "acute_hypertension"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "IMMEDIATE_TRANSFER"
      urgency: "STAT"
      rationale: "Suspected symptomatic intracranial hemorrhage requires immediate intervention"

      required_interventions:
        - "STOP tPA immediately"
        - "STAT head CT to confirm ICH"
        - "Reverse coagulopathy: cryoprecipitate 10 units, tranexamic acid 1g IV"
        - "Neurosurgery consultation for possible surgical evacuation"

      specialist_consultation:
        - specialty: "NEUROSURGERY"
          urgency: "STAT"
          specific_question: "Surgical intervention for symptomatic ICH post-tPA"

  - rule_id: "STROKE-ESC-002"
    description: "Thrombectomy evaluation for large vessel occlusion"

    escalation_trigger:
      match_logic: "ALL_OF"
      conditions:
        - parameter: "nihss_score"
          operator: ">="
          threshold: 6
        - parameter: "large_vessel_occlusion_suspected"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "CONSULT"
      urgency: "URGENT"
      rationale: "Large vessel occlusion may benefit from mechanical thrombectomy in addition to or instead of tPA"

      specialist_consultation:
        - specialty: "INTERVENTIONAL_NEURORADIOLOGY"
          urgency: "URGENT"
          specific_question: "Mechanical thrombectomy for large vessel occlusion (within 24 hours of last known well)"

# ============================================================
# SECTION 11: DE-ESCALATION CRITERIA
# ============================================================
de_escalation_criteria:
  - criteria_id: "STROKE-DE-ESC-001"
    description: "Initiate antiplatelet therapy after 24-hour CT shows no hemorrhage"

    conditions:
      - parameter: "ct_24h_no_hemorrhage"
        operator: "=="
        threshold: true

      - parameter: "neurologically_stable"
        operator: "=="
        threshold: true

    recommendation:
      action: "Start aspirin 325 mg daily for secondary stroke prevention"
      rationale: "Antiplatelet therapy safe after tPA if 24-hour imaging excludes hemorrhage"

# ============================================================
# SECTION 12: OUTCOME TRACKING
# ============================================================
outcome_tracking:
  primary_outcomes:
    - outcome_id: "STROKE-OUT-001"
      metric: "door_to_needle_time"
      target: "<60 minutes"
      benchmark_source: "AHA/ASA 2024 Stroke Guidelines"

    - outcome_id: "STROKE-OUT-002"
      metric: "modified_rankin_scale_0_2_at_90_days"
      target: ">40%"
      benchmark_source: "NINDS rt-PA Trial"

  process_measures:
    - measure_id: "STROKE-PROC-001"
      description: "CT scan within 20 minutes of arrival"
      target: ">80% compliance"

    - measure_id: "STROKE-PROC-002"
      description: "tPA administration within 60 minutes of arrival"
      target: ">70% compliance"

  balancing_measures:
    - measure_id: "STROKE-BAL-001"
      description: "Symptomatic intracranial hemorrhage rate"
      target: "<6.4%"

# ============================================================
# SECTION 13: METADATA
# ============================================================
metadata:
  protocol_type: "CLINICAL_PATHWAY"
  implementation_complexity: "HIGH"
  requires_icu_level_care: true
  estimated_implementation_time_minutes: 90
  review_cycle_months: 12

  tags:
    - "time-sensitive"
    - "door-to-needle"
    - "thrombolysis"
    - "tPA"
    - "stroke-code"

  related_protocols:
    - protocol_id: "STROKE-THROMBECTOMY-001"
      relationship: "COMPLEMENTS"

  approval_history:
    - approver: "Clinical Governance Committee"
      approval_date: "2025-10-21"
      version: "2.0"

  change_log:
    - version: "2.0"
      date: "2025-10-21"
      changes:
        - "Migrated to enhanced CDS-compliant YAML structure"
        - "Added trigger_criteria for NIHSS ≥4, acute deficits, wake-up stroke"
        - "Added confidence_scoring with symptom onset and severity modifiers"
        - "Enhanced medication_selection for tPA and blood pressure control"
        - "Added door-to-needle time constraint (<60 minutes)"
        - "Added tPA window constraint (<4.5 hours from onset)"
        - "Added special_populations (elderly, severe stroke, recent anticoagulation)"
        - "Added escalation_rules for ICH and thrombectomy evaluation"
        - "Based on AHA/ASA 2024 Stroke Guidelines"
