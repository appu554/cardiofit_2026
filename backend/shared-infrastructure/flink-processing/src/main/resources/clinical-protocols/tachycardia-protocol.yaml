# Supraventricular Tachycardia Management Protocol - ACC/AHA/HRS 2015
protocol_id: "SVT-MANAGEMENT-001"
name: "Supraventricular Tachycardia Management"
version: "2015.1"
category: "CARDIOVASCULAR"
source: "ACC/AHA/HRS 2015 SVT Guidelines"
guideline_reference: "Page RL, et al. J Am Coll Cardiol. 2016;67(13):e27-115"
last_updated: "2015-09-23"

# Activation criteria - ANY of these conditions triggers the protocol
activation_criteria:
  - condition: "heart_rate > 150 AND regular_rhythm AND narrow_complex"
    description: "Classic SVT presentation requiring acute management"
    parameters:
      - "QRS_duration < 120 ms"
      - "regular_RR_intervals"
      - "symptomatic (palpitations, dyspnea, chest_pain, lightheadedness)"
  - condition: "paroxysmal_supraventricular_tachycardia AND hemodynamically_stable"
    description: "Regular narrow-complex tachycardia with abrupt onset"
    parameters:
      - "abrupt_onset_and_offset"
      - "P_waves_difficult_to_identify OR retrograde_P_waves"
  - condition: "heart_rate > 150 AND symptomatic_palpitations"
    description: "Rapid regular palpitations with hemodynamic symptoms"
    parameters:
      - "palpitations"
      - "dyspnea OR chest_discomfort"
      - "presyncope OR dizziness"

# Priority determination based on severity
priority_determination:
  base_priority: "P4_URGENT"
  urgency_factors:
    - condition: "hemodynamically_unstable (hypotension OR altered_mental_status OR chest_pain OR heart_failure)"
      priority_modifier: "IMMEDIATE"
      timeframe: "0 minutes"
    - condition: "heart_rate > 200"
      priority_modifier: "IMMEDIATE"
      timeframe: "0 minutes"
    - condition: "heart_rate > 150 AND symptomatic"
      priority_modifier: "URGENT"
      timeframe: "< 30 minutes"
    - condition: "heart_rate > 150 AND asymptomatic"
      priority_modifier: "SEMI_URGENT"
      timeframe: "< 1 hour"
  default_timeframe: "< 1 hour"

# Clinical actions in recommended sequence
actions:
  - action_id: "SVT-ACT-001"
    category: "DIAGNOSTIC"
    sequence_order: 1
    description: "Obtain 12-lead ECG to confirm SVT and rule out other tachyarrhythmias"
    urgency: "STAT"
    timeframe: "within 5 minutes"
    rationale: "ECG distinguishes SVT from other tachycardias (VT, atrial fibrillation, atrial flutter) and identifies WPW pattern"

    diagnostic_details:
      test_name: "12-lead ECG"
      test_type: "CARDIAC"
      loinc_code: "11524-6"
      clinical_indication: "Confirm SVT diagnosis and identify underlying mechanism"
      expected_findings: "Regular narrow-complex tachycardia (QRS <120ms), HR >150, P waves buried in QRS or retrograde, no beat-to-beat variation"
      interpretation_guidance: "Narrow QRS + regular rhythm = SVT; Wide QRS may be VT or SVT with aberrancy; irregular rhythm suggests AFib; look for delta waves suggesting WPW"
      result_timeframe: "Immediate"

    evidence:
      - title: "ACC/AHA/HRS 2015 - ECG in SVT Diagnosis"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "4.1"
        grade: "1C"
        summary: "12-lead ECG mandatory for tachycardia diagnosis and management decisions"

    prerequisite_checks:
      - "Ensure continuous cardiac monitoring during ECG acquisition"
      - "Obtain ECG before and after interventions to document rhythm changes"

    monitoring_parameters: "Compare baseline ECG (if available) to identify delta waves or pre-excitation suggesting WPW"

  - action_id: "SVT-ACT-002"
    category: "DIAGNOSTIC"
    sequence_order: 2
    description: "Assess hemodynamic stability and symptoms"
    urgency: "STAT"
    timeframe: "within 5 minutes"
    rationale: "Hemodynamic instability requires immediate cardioversion rather than medical management"

    diagnostic_details:
      test_name: "Hemodynamic assessment"
      test_type: "CLINICAL_EXAM"
      clinical_indication: "Determine if patient stable for vagal maneuvers and medications vs. immediate cardioversion"
      expected_findings: "Stable: alert, BP >90/60, no chest pain, no heart failure. Unstable: hypotension, altered mental status, acute heart failure, severe chest pain"
      interpretation_guidance: "ANY sign of instability (hypotension, AMS, chest pain, heart failure) requires immediate cardioversion"

    evidence:
      - title: "ACC/AHA/HRS 2015 - Unstable Tachycardia Management"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "5.1"
        grade: "1C"
        summary: "Unstable tachycardia requires immediate synchronized cardioversion"

    monitoring_parameters: "Continuous BP, mental status, chest pain assessment; prepare for cardioversion if any instability"

  - action_id: "SVT-ACT-003"
    category: "INTERVENTION"
    sequence_order: 3
    description: "Attempt vagal maneuvers (Valsalva, carotid massage)"
    urgency: "URGENT"
    timeframe: "within 10 minutes"
    rationale: "Vagal maneuvers terminate 20-30% of AVNRT/AVRT episodes without medication; safe first-line intervention"

    diagnostic_details:
      test_name: "Vagal maneuvers"
      test_type: "INTERVENTION"
      clinical_indication: "Non-pharmacologic termination of SVT by increasing AV node refractoriness"
      expected_findings: "Successful: abrupt termination to sinus rhythm. Unsuccessful: no change in rate or rhythm"
      interpretation_guidance: "Modified Valsalva (strain 40mmHg x 15 seconds, then supine with legs elevated) most effective; carotid massage only if no carotid bruits"

    evidence:
      - title: "ACC/AHA/HRS 2015 - Vagal Maneuvers"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "6.1"
        grade: "1B"
        summary: "Vagal maneuvers recommended as first-line intervention for stable SVT"
      - title: "Appelboam A, et al. Postural modification to Valsalva maneuver"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "Lancet. 2015;386(9996):683-4"
        summary: "Modified Valsalva increases success rate from 17% to 43%"

    contraindications:
      - type: "CLINICAL_CONTEXT"
        description: "Recent stroke, transient ischemic attack, or known carotid stenosis"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Avoid carotid massage; Valsalva maneuver safe; proceed to adenosine if unsuccessful"

      - type: "HEMODYNAMIC_INSTABILITY"
        description: "Hypotension, altered mental status, or acute heart failure"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Skip vagal maneuvers; proceed directly to synchronized cardioversion"

    prerequisite_checks:
      - "Auscultate carotid arteries (no bruits before carotid massage)"
      - "Confirm patient hemodynamically stable"
      - "Have IV access and adenosine available in case vagal maneuvers fail"

    monitoring_parameters: "Continuous cardiac monitoring during maneuvers; document rhythm change with ECG strip"

  - action_id: "SVT-ACT-004"
    category: "MEDICATION"
    sequence_order: 4
    description: "Administer adenosine 6mg IV rapid push"
    urgency: "URGENT"
    timeframe: "within 15 minutes if vagal maneuvers unsuccessful"
    rationale: "Adenosine terminates 90% of AVNRT and AVRT by transiently blocking AV node; ultra-short half-life (10 seconds) provides safety"

    medication_details:
      name: "Adenosine"
      brand_name: "Adenocard"
      drug_class: "Purine nucleoside, antiarrhythmic"
      indication: "Acute termination of AVNRT and AVRT"

      dose_calculation_method: "bolus_escalation"
      standard_dose: "6"
      dose_unit: "mg"
      dose_range: "6-12"

      route: "IV"
      administration_instructions: "Rapid IV push over 1-2 seconds via large proximal vein (antecubital preferred), immediately follow with 20 mL saline flush; elevate arm after administration"
      frequency: "Single dose, may repeat with 12 mg if no response after 1-2 minutes"
      duration: "Single administration (effect within 30 seconds, duration <10 seconds)"

      max_single_dose: "12 mg"
      max_daily_dose: "30 mg (6mg + 12mg + 12mg dosing sequence)"

      adverse_effects:
        - "Chest discomfort, dyspnea (very common, transient <10 seconds)"
        - "Facial flushing (very common, brief)"
        - "Transient bradycardia or asystole (1-3 seconds, expected and benign)"
        - "Bronchospasm (in asthma patients)"
        - "Rarely precipitates atrial fibrillation (usually self-terminates)"

      lab_monitoring:
        - "Continuous cardiac monitoring during and 2 minutes after administration"
        - "Document rhythm with ECG strip immediately after administration"

    evidence:
      - title: "ACC/AHA/HRS 2015 - Adenosine for SVT"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "6.2"
        grade: "1B"
        summary: "Adenosine recommended for acute termination of stable SVT"
      - title: "Glatter KA, et al. Efficacy and safety of adenosine"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "Circulation. 2001;104(22):2704-9"
        summary: "Adenosine terminates 90% of AVNRT with excellent safety profile"

    contraindications:
      - type: "CARDIAC_CONDITION"
        description: "Wolff-Parkinson-White syndrome with atrial fibrillation"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "WPW + AFib can lead to ventricular fibrillation with AV nodal blockers; use procainamide or cardioversion instead"

      - type: "PULMONARY_CONDITION"
        description: "Severe asthma or COPD with active bronchospasm"
        severity: "RELATIVE"
        alternative_action:
          medication_name: "Diltiazem"
          dose: "0.25"
          dose_unit: "mg/kg"
          route: "IV"
          frequency: "over 2 minutes"
          rationale: "Calcium channel blocker safer in bronchospastic disease"

      - type: "CARDIAC_CONDITION"
        description: "Second or third-degree AV block"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Risk of prolonged asystole; consider cardioversion instead"

      - type: "MEDICATION_INTERACTION"
        description: "Dipyridamole or carbamazepine use (potentiate adenosine effect)"
        severity: "RELATIVE"
        alternative_action:
          medication_name: "Adenosine (reduced dose)"
          dose: "3"
          dose_unit: "mg"
          frequency: "initial dose, then 6mg if needed"
          rationale: "Start with half-dose (3mg) due to potentiation; increase cautiously"

    prerequisite_checks:
      - "Verify no WPW pattern on ECG (delta waves, short PR interval)"
      - "Confirm IV access in large proximal vein (antecubital or larger)"
      - "Have crash cart and defibrillator immediately available"
      - "Warn patient of brief chest discomfort and dyspnea (10 seconds)"
      - "Check for dipyridamole or carbamazepine use"

    required_lab_values:
      - "baseline_ecg"

    monitoring_parameters: "Continuous monitoring for 2 minutes after administration; document rhythm change; prepare for second dose (12mg) if first dose ineffective"

  - action_id: "SVT-ACT-005"
    category: "MEDICATION"
    sequence_order: 5
    description: "Administer adenosine 12mg IV if first dose unsuccessful"
    urgency: "URGENT"
    timeframe: "1-2 minutes after first dose"
    rationale: "Second dose of 12mg successful in additional 10% of patients who failed 6mg dose"

    medication_details:
      name: "Adenosine"
      brand_name: "Adenocard"
      drug_class: "Purine nucleoside, antiarrhythmic"
      indication: "Second attempt at SVT termination after 6mg failure"

      dose_calculation_method: "fixed_dose"
      standard_dose: "12"
      dose_unit: "mg"

      route: "IV"
      administration_instructions: "Rapid IV push over 1-2 seconds, immediately follow with 20 mL saline flush; may repeat 12mg dose once more if no response"
      frequency: "Single dose, may repeat x1"
      duration: "Single administration"

      max_single_dose: "12 mg"

    evidence:
      - title: "ACC/AHA/HRS 2015 - Adenosine Dosing"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "6.2"
        grade: "1B"
        summary: "If first dose ineffective, 12mg doses recommended"

    monitoring_parameters: "Continuous monitoring; document rhythm; if second 12mg dose fails, consider alternative diagnosis or calcium channel blocker"

  - action_id: "SVT-ACT-006"
    category: "MEDICATION"
    sequence_order: 6
    description: "Administer IV diltiazem if adenosine unsuccessful or contraindicated"
    urgency: "URGENT"
    timeframe: "within 30 minutes if adenosine fails"
    rationale: "Calcium channel blockers provide alternative AV nodal blockade with longer duration; effective for rate control and termination"

    medication_details:
      name: "Diltiazem"
      brand_name: "Cardizem"
      drug_class: "Non-dihydropyridine calcium channel blocker"
      indication: "SVT termination or rate control when adenosine unsuccessful"

      dose_calculation_method: "weight_based"
      standard_dose: "0.25"
      dose_unit: "mg/kg"
      weight_based_formula: "0.25 mg/kg (typical 15-25mg for 60-100kg patient)"

      route: "IV"
      administration_instructions: "Infuse slowly over 2 minutes; if inadequate response after 15 minutes, may give second dose of 0.35 mg/kg"
      frequency: "Single dose, may repeat once at higher dose"
      duration: "Single administration, followed by continuous infusion if needed (5-15 mg/hr)"

      max_single_dose: "0.35 mg/kg (second dose)"
      max_daily_dose: "Varies with continuous infusion"

      adverse_effects:
        - "Hypotension (especially with IV administration)"
        - "Bradycardia"
        - "AV block (dose-related)"
        - "Dizziness"
        - "Heart failure exacerbation (in reduced EF patients)"

      lab_monitoring:
        - "Continuous BP and heart rate monitoring"
        - "ECG monitoring for AV block"

    evidence:
      - title: "ACC/AHA/HRS 2015 - Calcium Channel Blockers for SVT"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "6.3"
        grade: "1B"
        summary: "Diltiazem or verapamil effective for SVT termination and rate control"

    contraindications:
      - type: "CARDIAC_CONDITION"
        description: "Wolff-Parkinson-White syndrome (WPW) with pre-excitation"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "AV nodal blockers can precipitate ventricular fibrillation in WPW; use procainamide or cardioversion"

      - type: "CARDIAC_CONDITION"
        description: "Heart failure with reduced ejection fraction (EF <40%)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Consider cardioversion instead; if medication necessary, use cautiously with close monitoring"

      - type: "CARDIAC_CONDITION"
        description: "Hypotension (SBP <90 mmHg)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Proceed to synchronized cardioversion"

      - type: "CARDIAC_CONDITION"
        description: "Second or third-degree AV block, sick sinus syndrome"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Risk of complete heart block; cardioversion preferred"

    prerequisite_checks:
      - "Verify no WPW on ECG (no delta waves, normal PR interval)"
      - "Check blood pressure (SBP >100 mmHg preferred)"
      - "Assess for heart failure history (check EF if known)"
      - "Review for concurrent beta-blocker use (additive AV blockade)"

    required_lab_values:
      - "blood_pressure"
      - "heart_rate"

    monitoring_parameters: "BP every 5 minutes during and 15 minutes after administration; HR and rhythm continuously; watch for hypotension or excessive bradycardia"

  - action_id: "SVT-ACT-007"
    category: "INTERVENTION"
    sequence_order: 7
    description: "Synchronized cardioversion if medications fail or hemodynamically unstable"
    urgency: "IMMEDIATE"
    timeframe: "within 5 minutes if unstable, within 30 minutes if stable but refractory"
    rationale: "Cardioversion is definitive therapy for refractory SVT and mandatory for unstable patients"

    diagnostic_details:
      test_name: "Synchronized cardioversion"
      test_type: "ELECTRICAL_CARDIOVERSION"
      clinical_indication: "Hemodynamically unstable SVT or stable SVT refractory to medications"
      expected_findings: "Immediate termination to sinus rhythm with synchronized shock"
      interpretation_guidance: "Use synchronized mode (not defibrillation); start with 50-100 J biphasic, escalate to 200 J if needed"

    evidence:
      - title: "ACC/AHA/HRS 2015 - Cardioversion for SVT"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "5.1"
        grade: "1C"
        summary: "Immediate cardioversion indicated for unstable tachycardia; effective for refractory stable SVT"

    contraindications:
      - type: "GOALS_OF_CARE"
        description: "Do not resuscitate (DNR) orders"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Clarify goals of care; cardioversion may be acceptable even with DNR depending on patient wishes"

    prerequisite_checks:
      - "Verify synchronized mode on defibrillator (sync to R wave)"
      - "Sedate patient if stable (midazolam 2-5mg IV or propofol)"
      - "Have airway equipment available"
      - "Apply defibrillation pads in anterolateral or anteroposterior position"

    monitoring_parameters: "Continuous cardiac monitoring; assess rhythm after cardioversion; prepare for repeat shock if initial unsuccessful"

  - action_id: "SVT-ACT-008"
    category: "CONSULTATION"
    sequence_order: 8
    description: "Cardiology consultation for recurrent SVT or refractory cases"
    urgency: "SEMI_URGENT"
    timeframe: "within 24 hours if rhythm controlled"
    rationale: "Recurrent SVT may benefit from catheter ablation (95% cure rate); cardiology evaluation guides long-term management"

    escalation_criteria:
      - "Recurrent SVT episodes despite acute management"
      - "Failed cardioversion or multiple medication attempts"
      - "WPW syndrome identified"
      - "Patient desires definitive therapy (ablation)"
      - "Unclear diagnosis (wide-complex tachycardia)"

    evidence:
      - title: "ACC/AHA/HRS 2015 - Catheter Ablation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "8.1"
        grade: "1B"
        summary: "Catheter ablation first-line therapy for symptomatic recurrent SVT"

# Overall protocol contraindications
contraindications:
  - type: "CARDIAC_CONDITION"
    description: "Wolff-Parkinson-White syndrome with atrial fibrillation"
    severity: "ABSOLUTE"
    rationale: "AV nodal blockers (adenosine, diltiazem, beta-blockers) can cause ventricular fibrillation in WPW with AFib"

  - type: "RHYTHM_DIAGNOSIS"
    description: "Wide-complex tachycardia of uncertain etiology"
    severity: "ABSOLUTE"
    rationale: "Treat wide-complex tachycardia as ventricular tachycardia until proven otherwise; avoid AV nodal blockers"

  - type: "HEMODYNAMIC_INSTABILITY"
    description: "Unstable patient (hypotension, AMS, chest pain, heart failure)"
    severity: "ABSOLUTE"
    rationale: "Skip medications and vagal maneuvers; proceed directly to synchronized cardioversion"

# Monitoring requirements for overall protocol
monitoring_requirements:
  - parameter: "Heart rate and rhythm"
    frequency: "Continuous cardiac monitoring"
    target: "Termination to sinus rhythm; HR 60-100 after conversion"

  - parameter: "Blood pressure"
    frequency: "Every 5 minutes during interventions"
    target: "SBP >90 mmHg; watch for medication-induced hypotension"

  - parameter: "Symptoms"
    frequency: "Continuous assessment"
    target: "Resolution of palpitations, chest discomfort, dyspnea"

  - parameter: "12-lead ECG"
    frequency: "Before intervention, after each intervention, post-conversion"
    target: "Document rhythm changes and assess for WPW pattern in sinus rhythm"

  - parameter: "Oxygen saturation"
    frequency: "Continuous"
    target: "SpO2 >92%"

# Escalation criteria for worsening clinical status
escalation_criteria:
  - condition: "Hemodynamic instability develops (hypotension, AMS, chest pain)"
    action: "Immediate synchronized cardioversion, do not delay for medications"
    timeframe: "Immediate"

  - condition: "Adenosine and calcium channel blocker both unsuccessful"
    action: "Consider alternative diagnosis (atrial flutter, atrial tachycardia), cardiology consult, consider cardioversion"
    timeframe: "< 30 minutes"

  - condition: "Wide-complex tachycardia on ECG"
    action: "Stop AV nodal blockers, treat as VT with amiodarone or cardioversion, cardiology consult STAT"
    timeframe: "Immediate"

  - condition: "SVT converts to atrial fibrillation"
    action: "Assess need for anticoagulation, rate control vs. rhythm control strategy, cardiology consultation"
    timeframe: "< 24 hours"

  - condition: "Recurrent SVT within 24 hours despite treatment"
    action: "Cardiology consult for consideration of catheter ablation, continuous infusion of calcium channel blocker or beta-blocker"
    timeframe: "< 6 hours"

# Expected clinical outcomes
expected_outcomes:
  - outcome: "Termination of SVT to sinus rhythm"
    timeframe: "15-30 minutes"

  - outcome: "Resolution of symptoms (palpitations, dyspnea, chest discomfort)"
    timeframe: "Immediate upon rhythm conversion"

  - outcome: "Stable sinus rhythm maintained"
    timeframe: "24 hours post-conversion"

  - outcome: "Cardiology follow-up arranged for recurrent SVT"
    timeframe: "Within 1-2 weeks"

# De-escalation and completion criteria
completion_criteria:
  - "SVT successfully terminated to sinus rhythm"
  - "Patient hemodynamically stable in sinus rhythm for 4-6 hours"
  - "No recurrence of SVT during observation period"
  - "Underlying causes addressed (electrolyte abnormalities, stimulant use, thyroid dysfunction)"
  - "Outpatient cardiology follow-up scheduled for recurrent SVT or ablation consideration"
  - "Patient educated on SVT triggers (caffeine, alcohol, stress) and vagal maneuvers for home use"
