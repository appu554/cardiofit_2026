# ============================================================
# ACUTE RESPIRATORY FAILURE MANAGEMENT PROTOCOL
# ============================================================
# Clinical Guideline: BTS/ATS Respiratory Failure Guidelines 2023
# Evidence Level: STRONG (Grade A-B for most recommendations)
# Last Updated: 2025-10-21
# ============================================================

# ============================================================
# SECTION 1: PROTOCOL IDENTIFICATION
# ============================================================
protocol_id: "RESP-FAIL-001"
name: "Acute Respiratory Failure Management"
category: "RESPIRATORY"
specialty: "PULMONARY_CRITICAL_CARE"
version: "2.0"
last_updated: "2025-10-21"
description: "Comprehensive protocol for acute hypoxemic respiratory failure and ARDS management with escalation pathways for non-invasive and invasive ventilation support"

# ============================================================
# SECTION 2: TRIGGER CRITERIA
# ============================================================
trigger_criteria:
  match_logic: "ANY_OF"

  conditions:
    # Condition 1: Severe hypoxemia
    - condition_id: "RESP-FAIL-TRIG-001"
      description: "Severe hypoxemia with SpO2 <90% or tachypnea >30"
      match_logic: "ANY_OF"
      conditions:
        - parameter: "spo2"
          operator: "<"
          threshold: 90
          unit: "%"
          source: "vital_signs"

        - parameter: "respiratory_rate"
          operator: ">"
          threshold: 30
          unit: "breaths/min"
          source: "vital_signs"

    # Condition 2: Respiratory distress alert from Module 2
    - condition_id: "RESP-FAIL-TRIG-002"
      description: "Respiratory distress or hypoxemia alert from Module 2 alerting"
      match_logic: "ANY_OF"
      conditions:
        - parameter: "alert_type"
          operator: "=="
          threshold: "RESPIRATORY_DISTRESS"
          source: "alerts"

        - parameter: "alert_type"
          operator: "=="
          threshold: "HYPOXEMIA"
          source: "alerts"

    # Condition 3: ARDS criteria (PaO2/FiO2 ratio < 300)
    - condition_id: "RESP-FAIL-TRIG-003"
      description: "PaO2/FiO2 ratio <300 indicating ARDS"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "pao2_fio2_ratio"
          operator: "<"
          threshold: 300
          source: "lab_results"

    # Condition 4: Accessory muscle use with tachypnea
    - condition_id: "RESP-FAIL-TRIG-004"
      description: "Accessory muscle use indicating respiratory distress"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "accessory_muscle_use"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

        - parameter: "respiratory_rate"
          operator: ">"
          threshold: 25
          unit: "breaths/min"
          source: "vital_signs"

# ============================================================
# SECTION 3: CONFIDENCE SCORING
# ============================================================
confidence_scoring:
  base_confidence: 0.85

  modifiers:
    - modifier_id: "RESP-FAIL-CONF-001"
      description: "Severe hypoxemia (SpO2 <85%) increases urgency and confidence"
      condition:
        parameter: "spo2"
        operator: "<"
        threshold: 85
        unit: "%"
      adjustment: 0.10

    - modifier_id: "RESP-FAIL-CONF-002"
      description: "ARDS criteria met (PaO2/FiO2 <200)"
      condition:
        parameter: "pao2_fio2_ratio"
        operator: "<"
        threshold: 200
      adjustment: 0.08

    - modifier_id: "RESP-FAIL-CONF-003"
      description: "Bilateral infiltrates on CXR consistent with ARDS"
      condition:
        parameter: "bilateral_infiltrates"
        operator: "=="
        threshold: true
      adjustment: 0.07

    - modifier_id: "RESP-FAIL-CONF-004"
      description: "Accessory muscle use indicates severe respiratory distress"
      condition:
        parameter: "accessory_muscle_use"
        operator: "=="
        threshold: true
      adjustment: 0.05

  activation_threshold: 0.75

# ============================================================
# SECTION 4: EVIDENCE SOURCE
# ============================================================
evidence_source:
  primary_guideline: "BTS/ATS Respiratory Failure Guidelines 2023"
  guideline_version: "BTS 2019, ATS 2023"
  publication_date: "2023-05"
  evidence_level: "STRONG"

  key_citations:
    - citation_id: "BTS-OXYGEN-2019"
      authors: "O'Driscoll BR, Howard LS, Earis J, Mak V, et al."
      title: "BTS guideline for oxygen use in adults in healthcare and emergency settings"
      journal: "Thorax"
      year: 2017
      pmid: "28507176"
      doi: "10.1136/thoraxjnl-2016-209729"

    - citation_id: "FLORALI-TRIAL"
      authors: "Frat JP, Thille AW, Mercat A, et al."
      title: "High-flow oxygen through nasal cannula in acute hypoxemic respiratory failure"
      journal: "New England Journal of Medicine"
      year: 2015
      pmid: "25981908"
      doi: "10.1056/NEJMoa1503326"

    - citation_id: "ARDS-NETWORK-2000"
      authors: "ARDS Network"
      title: "Ventilation with lower tidal volumes as compared with traditional tidal volumes for acute lung injury and ARDS"
      journal: "New England Journal of Medicine"
      year: 2000
      pmid: "10793162"

  last_review_date: "2024-06-01"
  next_review_date: "2026-06-01"

# ============================================================
# SECTION 5: ACTIONS
# ============================================================
actions:
  # ========== P0: IMMEDIATE OXYGEN THERAPY ==========
  - action_id: "RESP-O2-001"
    type: "INTERVENTION"
    priority: "CRITICAL"
    sequence_number: 1

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 5

    intervention:
      intervention_type: "OXYGEN_THERAPY"
      description: "Initiate supplemental oxygen therapy targeting SpO2 92-96%"
      instructions: "Start with nasal cannula 2-6 L/min or simple face mask 5-10 L/min. Titrate to SpO2 92-96%. Avoid hyperoxia (SpO2 >96%) which may worsen outcomes."
      rationale: "Immediate oxygen supplementation prevents tissue hypoxia. Target SpO2 92-96% balances adequate oxygenation with avoiding hyperoxia complications (PMID: 28507176)."

  # ========== P0: HIGH-FLOW NASAL CANNULA (HFNC) ==========
  - action_id: "RESP-O2-002"
    type: "INTERVENTION"
    priority: "CRITICAL"
    sequence_number: 2

    timing:
      window: "URGENT"
      max_delay_minutes: 15

    intervention:
      intervention_type: "HFNC"
      description: "Initiate High-Flow Nasal Cannula (HFNC) at 40-60 L/min if SpO2 <92% on standard oxygen"
      instructions: "Set HFNC flow rate 40-60 L/min, FiO2 0.6-1.0 initially. Titrate to SpO2 92-96%. HFNC provides PEEP effect, reduces work of breathing, and improves oxygenation."
      rationale: "FLORALI trial (PMID: 25981908) showed HFNC reduces intubation rates and 90-day mortality in acute hypoxemic respiratory failure compared to conventional oxygen or NIV."

    contraindications:
      - "Impending respiratory arrest (GCS <8, apnea)"
      - "Hemodynamic instability requiring immediate intubation"
      - "Inability to protect airway"

  # ========== P0: AIRWAY ASSESSMENT ==========
  - action_id: "RESP-AIRWAY-001"
    type: "CLINICAL_ASSESSMENT"
    priority: "CRITICAL"
    sequence_number: 3

    clinical_assessment:
      assessment_type: "Airway and respiratory status evaluation"
      frequency: "q1h for first 6 hours, then q2h"
      duration_hours: 24
      specific_parameters:
        - "Respiratory rate and work of breathing (accessory muscle use, paradoxical breathing)"
        - "Mental status (GCS, ability to protect airway)"
        - "SpO2 on current oxygen support"
        - "Hemodynamic stability"
        - "Intubation criteria assessment (see escalation rules)"

  # ========== P0: POSITIONING ==========
  - action_id: "RESP-POSITION-001"
    type: "INTERVENTION"
    priority: "HIGH"
    sequence_number: 4

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 10

    intervention:
      intervention_type: "POSITIONING"
      description: "Elevate head of bed 30-45 degrees"
      instructions: "Position patient semi-recumbent (30-45° head elevation) unless contraindicated. Consider prone positioning if PaO2/FiO2 <150 and not improving with HFNC."
      rationale: "Head elevation improves oxygenation and reduces aspiration risk. Prone positioning improves V/Q matching in ARDS."

  # ========== P0: DIAGNOSTIC - PORTABLE CHEST X-RAY ==========
  - action_id: "RESP-IMG-001"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 5

    timing:
      window: "URGENT"
      max_delay_minutes: 30

    diagnostic:
      test_name: "Portable Chest X-Ray (AP)"
      test_code: "CPT-71045"
      urgency: "STAT"
      instructions: "Portable AP chest X-ray to identify cause: pneumonia, pulmonary edema, pneumothorax, pleural effusion, ARDS bilateral infiltrates. Essential for guiding therapy."

  # ========== P0: DIAGNOSTIC - ARTERIAL BLOOD GAS ==========
  - action_id: "RESP-LAB-001"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 6

    timing:
      window: "URGENT"
      max_delay_minutes: 20

    diagnostic:
      test_name: "Arterial Blood Gas (ABG)"
      test_code: "LOINC-24336-0"
      sample_type: "arterial_blood"
      urgency: "STAT"
      instructions: "Obtain ABG for PaO2, PaCO2, pH, lactate assessment. Calculate PaO2/FiO2 ratio to assess ARDS severity. Repeat ABG 1-2 hours after therapy changes."

      repeat_testing:
        repeat_interval_hours: 2
        repeat_condition:
          parameter: "pao2_fio2_ratio"
          operator: "<"
          threshold: 200

  # ========== P0: DIAGNOSTIC - LABS ==========
  - action_id: "RESP-LAB-002"
    type: "DIAGNOSTIC"
    priority: "HIGH"
    sequence_number: 7

    timing:
      window: "URGENT"
      max_delay_minutes: 30

    diagnostic:
      test_name: "CBC, CMP, lactate, troponin, BNP"
      urgency: "STAT"
      instructions: "Comprehensive labs to identify etiology and assess organ function. Lactate for shock assessment. Troponin/BNP to distinguish cardiac vs respiratory cause."

  # ========== P1: MEDICATION - BRONCHODILATORS ==========
  - action_id: "RESP-MED-001"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 8

    timing:
      window: "URGENT"
      max_delay_minutes: 30

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "BRONCHOSPASM_PRESENT"
          description: "Bronchodilator therapy for wheezing or obstructive component"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "wheezing"
                operator: "=="
                threshold: true
              - parameter: "copd_history"
                operator: "=="
                threshold: true
              - parameter: "asthma_history"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Albuterol (Nebulized)"
            dose: "2.5-5"
            dose_unit: "mg"
            route: "Nebulized"
            frequency: "q4-6h or continuous if severe bronchospasm"
            administration_instructions: "Nebulize over 5-10 minutes. Can use continuous nebulization (10-15 mg/hr) for severe bronchospasm. Monitor HR (hold if >150 bpm)."

          alternative_medication:
            name: "Ipratropium Bromide (combined with albuterol)"
            dose: "0.5 mg + 2.5 mg albuterol"
            route: "Nebulized"
            frequency: "q6h"
            indication: "Add if inadequate response to beta-agonist alone"

  # ========== P1: MEDICATION - CORTICOSTEROIDS ==========
  - action_id: "RESP-MED-002"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 9

    timing:
      window: "ROUTINE"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "COPD_ASTHMA_EXACERBATION"
          description: "Systemic corticosteroids for COPD/asthma exacerbation"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "copd_exacerbation"
                operator: "=="
                threshold: true
              - parameter: "asthma_exacerbation"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Methylprednisolone"
            dose: "125"
            dose_unit: "mg"
            route: "IV"
            frequency: "once, then 60 mg q6h for 5-7 days"
            administration_instructions: "Loading dose 125 mg IV, then 60 mg q6h. Total course 5-7 days. Taper not needed for short course. Monitor glucose."

          alternative_medication:
            name: "Prednisone"
            dose: "40-60"
            dose_unit: "mg"
            route: "PO"
            frequency: "daily for 5-7 days"
            indication: "If patient can tolerate PO and no IV access"

  # ========== P1: MEDICATION - ANTIBIOTICS (if indicated) ==========
  - action_id: "RESP-MED-003"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 10

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "PNEUMONIA_SUSPECTED"
          description: "Empiric antibiotics if pneumonia suspected (infiltrate + fever/leukocytosis)"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "infiltrate_on_cxr"
                operator: "=="
                threshold: true
              - match_logic: "ANY_OF"
                conditions:
                  - parameter: "temperature"
                    operator: ">"
                    threshold: 38.0
                    unit: "celsius"
                  - parameter: "wbc"
                    operator: ">"
                    threshold: 12000
                    unit: "cells/mm3"

          primary_medication:
            name: "Ceftriaxone + Azithromycin"
            dose: "2 g ceftriaxone + 500 mg azithromycin"
            route: "IV"
            frequency: "q24h (ceftriaxone) + daily (azithromycin)"
            administration_instructions: "Empiric community-acquired pneumonia coverage. Covers S. pneumoniae, H. influenzae, atypicals. Adjust based on cultures."

  # ========== P1: MEDICATION - DIURETICS ==========
  - action_id: "RESP-MED-004"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 11

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "PULMONARY_EDEMA_SUSPECTED"
          description: "Diuretics for cardiogenic pulmonary edema"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "pulmonary_edema_on_cxr"
                operator: "=="
                threshold: true
              - match_logic: "ANY_OF"
                conditions:
                  - parameter: "bnp"
                    operator: ">"
                    threshold: 500
                    unit: "pg/mL"
                  - parameter: "elevated_jvp"
                    operator: "=="
                    threshold: true
                  - parameter: "s3_gallop"
                    operator: "=="
                    threshold: true

          primary_medication:
            name: "Furosemide"
            dose: "40-80"
            dose_unit: "mg"
            route: "IV"
            frequency: "once or twice daily, titrate to response"
            administration_instructions: "IV furosemide 40-80 mg bolus. Double dose if on home furosemide. Monitor urine output, electrolytes, renal function. Add nitroglycerin infusion if severe pulmonary edema."

  # ========== P1: CONSULTATION - CRITICAL CARE ==========
  - action_id: "RESP-CONSULT-001"
    type: "CONSULTATION"
    priority: "HIGH"
    sequence_number: 12

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    consultation:
      specialty: "CRITICAL_CARE"
      urgency: "URGENT"
      reason: "Acute hypoxemic respiratory failure requiring ICU-level monitoring and potential intubation"
      specific_questions:
        - "Need for non-invasive ventilation (BiPAP/CPAP)?"
        - "Intubation timing and strategy?"
        - "ICU transfer indicated?"

# ============================================================
# SECTION 6: TIME CONSTRAINTS
# ============================================================
time_constraints:
  # Critical Oxygen Initiation
  - constraint_id: "RESP-OXYGEN-TIME"
    bundle_name: "Oxygen Initiation"
    description: "Supplemental oxygen within 5 minutes of recognition"
    offset_minutes: 5
    critical: true

    required_actions:
      - action_id: "RESP-O2-001"
        description: "Oxygen therapy initiated"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 3
      critical_alert_at_minutes: 0
      missed_deadline_message: "CRITICAL: Oxygen therapy delayed beyond 5 minutes. Immediate oxygen supplementation required."

  # HFNC Escalation
  - constraint_id: "RESP-HFNC-TIME"
    bundle_name: "HFNC Escalation"
    description: "HFNC initiated within 15 minutes if SpO2 <92% on standard oxygen"
    offset_minutes: 15
    critical: true

    required_actions:
      - action_id: "RESP-O2-002"
        description: "HFNC initiated if criteria met"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 10
      critical_alert_at_minutes: 0
      missed_deadline_message: "HFNC escalation delayed. Consider early intubation if patient deteriorating."

# ============================================================
# SECTION 7: CONTRAINDICATIONS
# ============================================================
contraindications:
  # HFNC contraindications
  - contraindication_id: "RESP-CONTRA-001"
    condition_description: "HFNC contraindicated in impending respiratory arrest"

    trigger_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "gcs"
          operator: "<"
          threshold: 8
        - parameter: "apnea"
          operator: "=="
          threshold: true
        - parameter: "hemodynamic_instability"
          operator: "=="
          threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "RESP-O2-002"

    alternative_action:
      action_id: "RESP-ALT-001"
      type: "INTERVENTION"
      rationale: "Immediate intubation required instead of HFNC trial"
      intervention:
        description: "IMMEDIATE intubation for airway protection and mechanical ventilation"

# ============================================================
# SECTION 8: MONITORING REQUIREMENTS
# ============================================================
monitoring_requirements:
  - monitoring_id: "RESP-MON-001"
    parameter: "spo2"

    target_range:
      min: 92
      max: 96
      unit: "%"

    frequency: "continuous"
    duration_hours: 24

    alert_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "spo2"
          operator: "<"
          threshold: 90
        - parameter: "spo2_trending_down"
          operator: "=="
          threshold: true

  - monitoring_id: "RESP-MON-002"
    parameter: "respiratory_rate"

    target_range:
      min: 12
      max: 25
      unit: "breaths/min"

    frequency: "q1h for 6h, then q2h"
    duration_hours: 24

    alert_condition:
      parameter: "respiratory_rate"
      operator: ">"
      threshold: 30

  - monitoring_id: "RESP-MON-003"
    parameter: "pao2_fio2_ratio"

    target_range:
      min: 200
      max: null
      unit: "mmHg"

    frequency: "q2-4h with ABG"
    duration_hours: 24

    alert_condition:
      parameter: "pao2_fio2_ratio"
      operator: "<"
      threshold: 150

# ============================================================
# SECTION 9: SPECIAL POPULATIONS
# ============================================================
special_populations:
  # COPD patients
  - population_id: "COPD_PATIENTS"
    description: "Patients with chronic COPD (at risk for CO2 retention)"

    inclusion_criteria:
      parameter: "copd_history"
      operator: "=="
      threshold: true

    modifications:
      - action_id: "RESP-O2-001"
        modification_type: "CAUTION"
        rationale: "COPD patients at risk for hypercapnic respiratory failure with excessive oxygen"

        new_parameters:
          target_spo2: "88-92% (lower target to avoid CO2 retention)"
          monitoring: "Monitor for rising PaCO2 on ABG. Accept lower SpO2 target in chronic hypercapnic COPD."

  # Pregnancy
  - population_id: "PREGNANCY"
    description: "Pregnant patients with respiratory failure"

    inclusion_criteria:
      parameter: "pregnancy_status"
      operator: "=="
      threshold: true

    modifications:
      - action_id: "RESP-O2-001"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Higher oxygen targets in pregnancy for fetal oxygenation"

        new_parameters:
          target_spo2: "94-98% (higher target for fetal oxygenation)"
          monitoring: "Continuous fetal monitoring if viable gestation. Early ICU/OB consultation."

# ============================================================
# SECTION 10: ESCALATION RULES
# ============================================================
escalation_rules:
  # ICU transfer for severe respiratory failure
  - rule_id: "RESP-ESC-001"
    description: "ICU transfer for severe hypoxemic respiratory failure requiring intubation"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        # Severe ARDS
        - parameter: "pao2_fio2_ratio"
          operator: "<"
          threshold: 150

        # Failure of HFNC
        - match_logic: "ALL_OF"
          conditions:
            - parameter: "spo2"
              operator: "<"
              threshold: 90
            - parameter: "on_hfnc"
              operator: "=="
              threshold: true

        # Intubation criteria
        - match_logic: "ANY_OF"
          conditions:
            - parameter: "gcs"
              operator: "<"
              threshold: 8
            - parameter: "respiratory_arrest"
              operator: "=="
              threshold: true
            - parameter: "hemodynamic_instability"
              operator: "=="
              threshold: true

    recommendation:
      escalation_level: "ICU_TRANSFER"
      urgency: "IMMEDIATE"
      rationale: "Severe hypoxemic respiratory failure requiring invasive mechanical ventilation and ICU-level care"

      required_interventions:
        - "IMMEDIATE ICU transfer"
        - "Rapid sequence intubation (RSI) preparation"
        - "Mechanical ventilation with lung-protective strategy (Vt 6 mL/kg PBW, plateau pressure <30 cmH2O)"
        - "PEEP titration for PaO2/FiO2 optimization"
        - "Consider prone positioning if PaO2/FiO2 <150 on PEEP ≥5"

      specialist_consultation:
        - specialty: "CRITICAL_CARE"
          urgency: "STAT"
          specific_question: "Intubation timing, ventilator management strategy, prone positioning indication"

  # Pulmonology consultation
  - rule_id: "RESP-ESC-002"
    description: "Pulmonology consultation for complex respiratory failure or ARDS"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        # ARDS criteria
        - parameter: "pao2_fio2_ratio"
          operator: "<"
          threshold: 200

        # Bilateral infiltrates
        - parameter: "bilateral_infiltrates"
          operator: "=="
          threshold: true

        # No improvement after 12 hours
        - parameter: "no_improvement_12h"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "CONSULT"
      urgency: "URGENT"
      rationale: "Complex respiratory failure requiring specialist input for advanced therapies"

      specialist_consultation:
        - specialty: "PULMONARY"
          urgency: "URGENT"
          specific_question: "ARDS management strategy, consideration for advanced therapies (ECMO, prone positioning, neuromuscular blockade)"

# ============================================================
# SECTION 11: DE-ESCALATION CRITERIA
# ============================================================
de_escalation_criteria:
  - criteria_id: "RESP-DE-ESC-001"
    description: "Wean HFNC to standard oxygen when improving"

    conditions:
      - parameter: "spo2"
        operator: ">="
        threshold: 94
        unit: "%"

      - parameter: "respiratory_rate"
        operator: "<"
        threshold: 25
        unit: "breaths/min"

      - parameter: "no_accessory_muscle_use"
        operator: "=="
        threshold: true

      - parameter: "stable_for_hours"
        operator: ">="
        threshold: 6
        unit: "hours"

    recommendation:
      action: "Wean HFNC flow rate by 10 L/min every 2-4 hours while maintaining SpO2 >92%"
      rationale: "Gradual weaning reduces work of breathing while assessing for spontaneous improvement"
      specific_changes:
        - "Reduce HFNC flow to 30 L/min → 20 L/min → transition to nasal cannula 2-6 L/min"
        - "Monitor SpO2 closely during weaning (target >92%)"
        - "If SpO2 drops <90% during weaning, return to previous HFNC settings"

# ============================================================
# SECTION 12: OUTCOME TRACKING
# ============================================================
outcome_tracking:
  primary_outcomes:
    - outcome_id: "RESP-OUT-001"
      metric: "intubation_rate"
      target: "<30%"
      benchmark_source: "FLORALI trial (HFNC reduces intubation vs standard oxygen)"

    - outcome_id: "RESP-OUT-002"
      metric: "icu_mortality"
      target: "<20%"
      benchmark_source: "ARDS Network lung-protective ventilation trials"

  process_measures:
    - measure_id: "RESP-PROC-001"
      description: "Oxygen initiated within 5 minutes"
      target: ">95% compliance"

    - measure_id: "RESP-PROC-002"
      description: "HFNC escalation within 15 minutes if criteria met"
      target: ">85% compliance"

    - measure_id: "RESP-PROC-003"
      description: "ABG obtained within 30 minutes"
      target: ">90% compliance"

  balancing_measures:
    - measure_id: "RESP-BAL-001"
      description: "Hyperoxia rate (SpO2 >98% for >2 hours)"
      target: "<10%"

    - measure_id: "RESP-BAL-002"
