# ============================================================
# ANAPHYLAXIS EMERGENCY MANAGEMENT PROTOCOL (CDS-COMPLIANT)
# ============================================================
# AAAAI 2020 Practice Parameters for Anaphylaxis
# Shaker MS, et al. J Allergy Clin Immunol. 2020;145(4):1082-1123
# Last Updated: 2025-10-21
# ============================================================

protocol_id: "ANAPHYLAXIS-EMERGENCY-001"
name: "Anaphylaxis Emergency Management Protocol"
category: "ALLERGY_IMMUNOLOGY"
specialty: "EMERGENCY_MEDICINE"
version: "2.1"
last_updated: "2025-10-21"

# ============================================================
# TRIGGER CRITERIA
# ============================================================
trigger_criteria:
  match_logic: "ANY_OF"

  conditions:
    - condition_id: "ANAPHY-TRIG-001"
      description: "Classic anaphylaxis with multi-system involvement"
      match_logic: "ALL_OF"
      conditions:
        - match_logic: "ANY_OF"
          conditions:
            - parameter: "urticaria"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "angioedema"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "flushing"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

        - match_logic: "ANY_OF"
          conditions:
            - parameter: "dyspnea"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "wheeze"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "systolic_bp"
              operator: "<"
              threshold: 90
              unit: "mmHg"
              source: "vital_signs"

            - parameter: "abdominal_pain"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

    - condition_id: "ANAPHY-TRIG-002"
      description: "Hypotension after allergen exposure"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "allergen_exposure"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

        - match_logic: "ANY_OF"
          conditions:
            - parameter: "systolic_bp"
              operator: "<"
              threshold: 90
              unit: "mmHg"
              source: "vital_signs"

            - parameter: "bp_drop_percentage"
              operator: ">="
              threshold: 30
              unit: "%"
              source: "vital_signs"

    - condition_id: "ANAPHY-TRIG-003"
      description: "Respiratory compromise after allergen exposure"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "allergen_exposure"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

        - match_logic: "ANY_OF"
          conditions:
            - parameter: "dyspnea"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "wheeze"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "stridor"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "spo2"
              operator: "<"
              threshold: 90
              unit: "%"
              source: "vital_signs"

# ============================================================
# CONFIDENCE SCORING
# ============================================================
confidence_scoring:
  base_confidence: 0.90

  modifiers:
    - modifier_id: "ANAPHY-CONF-001"
      description: "Severe hypotension or shock"
      condition:
        parameter: "systolic_bp"
        operator: "<"
        threshold: 90
        unit: "mmHg"
      adjustment: 0.08

    - modifier_id: "ANAPHY-CONF-002"
      description: "Airway involvement (stridor)"
      condition:
        parameter: "stridor"
        operator: "=="
        threshold: true
      adjustment: 0.07

    - modifier_id: "ANAPHY-CONF-003"
      description: "Known allergen exposure"
      condition:
        parameter: "known_allergen_exposure"
        operator: "=="
        threshold: true
      adjustment: 0.05

  activation_threshold: 0.70

# ============================================================
# EVIDENCE SOURCE
# ============================================================
evidence_source:
  primary_guideline: "American Academy of Allergy, Asthma & Immunology (AAAAI) 2020 Practice Parameters for Anaphylaxis"
  guideline_version: "AAAAI 2020"
  publication_date: "2020-04"
  evidence_level: "STRONG"

  key_citations:
    - citation_id: "AAAAI-2020-ANAPHY"
      authors: "Shaker MS, Wallace DV, Golden DBK, et al."
      title: "Anaphylaxis-a 2020 practice parameter update, systematic review, and Grading of Recommendations, Assessment, Development and Evaluation (GRADE) analysis"
      journal: "J Allergy Clin Immunol"
      year: 2020
      pmid: "32001253"
      doi: "10.1016/j.jaci.2020.01.017"

  last_review_date: "2024-04-01"
  next_review_date: "2026-04-01"

# ============================================================
# ACTIONS
# ============================================================
actions:
  # ==========================================================
  # ACTION 1: INTRAMUSCULAR EPINEPHRINE (IMMEDIATE)
  # ==========================================================
  - action_id: "ANAPHY-ACT-001"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 1

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 1

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "ADULT_DOSING"
          description: "Standard adult epinephrine dosing"

          condition:
            parameter: "age"
            operator: ">="
            threshold: 12
            unit: "years"

          primary_medication:
            name: "Epinephrine"
            generic_name: "Epinephrine (1:1000)"
            dose: "0.3-0.5"
            dose_unit: "mg"
            route: "IM"
            frequency: "May repeat every 5-15 minutes if no improvement"
            administration_instructions: "Inject 1:1000 solution IM into anterolateral thigh (vastus lateralis); can be given through clothing if needed; do NOT use 1:10,000 solution IM"

        - criteria_id: "PEDIATRIC_DOSING"
          description: "Weight-based dosing for pediatrics"

          condition:
            parameter: "age"
            operator: "<"
            threshold: 12
            unit: "years"

          primary_medication:
            name: "Epinephrine"
            dose: "0.01"
            dose_unit: "mg/kg"
            route: "IM"
            frequency: "May repeat every 5-15 minutes (max 0.5 mg per dose)"
            administration_instructions: "0.01 mg/kg IM (max 0.3 mg for children <30 kg, max 0.5 mg for >30 kg)"

  # ==========================================================
  # ACTION 2: PATIENT POSITIONING
  # ==========================================================
  - action_id: "ANAPHY-ACT-002"
    type: "CLINICAL_ASSESSMENT"
    priority: "CRITICAL"
    sequence_number: 2

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 2

    clinical_assessment:
      assessment_type: "Supine positioning with leg elevation and IV access"
      frequency: "continuous"
      duration_hours: 4
      specific_parameters:
        - "Keep patient supine (do NOT sit upright - may cause cardiac arrest)"
        - "Elevate legs to improve venous return"
        - "Establish large-bore IV (18G or larger)"
        - "If vomiting, position on side to prevent aspiration"

  # ==========================================================
  # ACTION 3: OXYGEN THERAPY
  # ==========================================================
  - action_id: "ANAPHY-ACT-003"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 3

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 2

    medication:
      name: "Oxygen"
      dose: "10-15"
      dose_unit: "L/min"
      route: "Inhalation (non-rebreather mask)"
      frequency: "Continuous"
      administration_instructions: "Apply non-rebreather mask at 10-15 L/min; titrate to maintain SpO2 >90%"

  # ==========================================================
  # ACTION 4: IV FLUID RESUSCITATION
  # ==========================================================
  - action_id: "ANAPHY-ACT-004"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 4

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 5

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "ADULT_FLUID_RESUSCITATION"
          description: "Adult fluid bolus for hypotension"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "age"
                operator: ">="
                threshold: 18
                unit: "years"

              - parameter: "systolic_bp"
                operator: "<"
                threshold: 90
                unit: "mmHg"

          primary_medication:
            name: "0.9% Normal Saline"
            dose: "1000-2000"
            dose_unit: "mL"
            route: "IV"
            frequency: "Rapid bolus, repeat PRN"
            administration_instructions: "Rapid bolus via large-bore IV; may require 2-4 L in adults for refractory hypotension"

        - criteria_id: "PEDIATRIC_FLUID_RESUSCITATION"
          description: "Pediatric weight-based fluid bolus"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "age"
                operator: "<"
                threshold: 18
                unit: "years"

              - parameter: "systolic_bp"
                operator: "<"
                threshold: 90
                unit: "mmHg"

          primary_medication:
            name: "0.9% Normal Saline"
            dose: "10-20"
            dose_unit: "mL/kg"
            route: "IV"
            frequency: "Rapid bolus, reassess and repeat PRN"
            administration_instructions: "10-20 mL/kg IV bolus; reassess after each bolus"

  # ==========================================================
  # ACTION 5: H1-ANTIHISTAMINE (ADJUNCTIVE)
  # ==========================================================
  - action_id: "ANAPHY-ACT-005"
    type: "MEDICATION"
    priority: "MEDIUM"
    sequence_number: 5

    timing:
      window: "URGENT"
      max_delay_minutes: 10

    medication:
      name: "Diphenhydramine"
      dose: "25-50"
      dose_unit: "mg"
      route: "IV or IM"
      frequency: "Single dose, may repeat q6h PRN"
      administration_instructions: "Give 25-50 mg IV push over 2-3 minutes OR 50 mg IM; ONLY after epinephrine administered"

  # ==========================================================
  # ACTION 6: H2-ANTIHISTAMINE (ADJUNCTIVE)
  # ==========================================================
  - action_id: "ANAPHY-ACT-006"
    type: "MEDICATION"
    priority: "MEDIUM"
    sequence_number: 6

    timing:
      window: "URGENT"
      max_delay_minutes: 10

    medication:
      name: "Famotidine"
      dose: "20"
      dose_unit: "mg"
      route: "IV"
      frequency: "Single dose, may repeat q12h PRN"
      administration_instructions: "Give 20 mg IV push over 2 minutes; ONLY after epinephrine administered"

  # ==========================================================
  # ACTION 7: CORTICOSTEROID (BIPHASIC REACTION PREVENTION)
  # ==========================================================
  - action_id: "ANAPHY-ACT-007"
    type: "MEDICATION"
    priority: "MEDIUM"
    sequence_number: 7

    timing:
      window: "URGENT"
      max_delay_minutes: 15

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "STANDARD_STEROID"
          description: "Methylprednisolone for biphasic reaction prevention"

          condition:
            parameter: "weight"
            operator: ">="
            threshold: 50
            unit: "kg"

          primary_medication:
            name: "Methylprednisolone"
            dose: "125"
            dose_unit: "mg"
            route: "IV"
            frequency: "Single dose, then q6h for 24-48h if severe"
            administration_instructions: "Give 125 mg IV push over 5 minutes; ONLY after epinephrine"

          alternative_medication:
            name: "Prednisone"
            dose: "40-60"
            dose_unit: "mg"
            route: "PO"
            frequency: "Daily for 2-3 days"
            indication: "Oral alternative if IV not available or for discharge"

  # ==========================================================
  # ACTION 8: BRONCHODILATOR (IF BRONCHOSPASM)
  # ==========================================================
  - action_id: "ANAPHY-ACT-008"
    type: "MEDICATION"
    priority: "MEDIUM"
    sequence_number: 8

    timing:
      window: "URGENT"
      max_delay_minutes: 10

    medication:
      name: "Albuterol"
      dose: "2.5-5"
      dose_unit: "mg"
      route: "Nebulized"
      frequency: "May repeat every 20 minutes x3 doses, then q1-4h PRN"
      administration_instructions: "Nebulize 2.5-5 mg in 3 mL normal saline over 10-15 minutes; ONLY for bronchospasm, ONLY after epinephrine"

  # ==========================================================
  # ACTION 9: OBSERVATION PERIOD
  # ==========================================================
  - action_id: "ANAPHY-ACT-009"
    type: "CLINICAL_ASSESSMENT"
    priority: "HIGH"
    sequence_number: 9

    timing:
      window: "ROUTINE"
      max_delay_minutes: 480  # 8 hours

    clinical_assessment:
      assessment_type: "Observation for biphasic reactions"
      frequency: "continuous"
      duration_hours: 8
      specific_parameters:
        - "Continuous vital signs for minimum 4 hours (8 hours if severe)"
        - "Assess for symptom recurrence"
        - "Do NOT discharge if any ongoing symptoms"
        - "Biphasic reactions occur in 5-20% of cases (4-12 hours after initial event)"

# ============================================================
# TIME CONSTRAINTS
# ============================================================
time_constraints:
  - constraint_id: "ANAPHY-TIME-001"
    bundle_name: "Immediate Resuscitation Bundle"
    description: "Life-saving interventions within first 5 minutes"
    offset_minutes: 5
    critical: true

    required_actions:
      - action_id: "ANAPHY-ACT-001"
        description: "IM Epinephrine (MUST be first)"
      - action_id: "ANAPHY-ACT-002"
        description: "Supine positioning"
      - action_id: "ANAPHY-ACT-003"
        description: "Oxygen therapy"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 2
      critical_alert_at_minutes: 0
      missed_deadline_message: "CRITICAL: Epinephrine must be administered within 1 minute of anaphylaxis recognition"

# ============================================================
# CONTRAINDICATIONS
# ============================================================
# NOTE: Anaphylaxis has NO absolute contraindications for epinephrine
contraindications:
  - contraindication_id: "ANAPHY-CONTRA-001"
    condition_description: "NONE - Epinephrine has NO absolute contraindications in anaphylaxis"

    trigger_condition:
      parameter: "anaphylaxis"
      operator: "=="
      threshold: true

    severity: "NONE"
    affected_actions: []

    alternative_action:
      action_id: "ANAPHY-CONTRA-NOTE-001"
      type: "CLINICAL_ASSESSMENT"
      rationale: "There are NO absolute contraindications to epinephrine in anaphylaxis. Even in severe CAD, recent MI, or uncontrolled hypertension, epinephrine MUST be given. Benefits vastly outweigh risks. Monitor closely for arrhythmias and cardiac ischemia."

  - contraindication_id: "ANAPHY-CONTRA-002"
    condition_description: "Beta-blocker therapy (relative caution, NOT contraindication)"

    trigger_condition:
      parameter: "beta_blocker_use"
      operator: "=="
      threshold: true

    severity: "MODERATE"  # Caution, NOT contraindication
    affected_actions:
      - "ANAPHY-ACT-001"

    alternative_action:
      action_id: "ANAPHY-CONTRA-ALT-002"
      type: "MEDICATION"
      medication:
        name: "Glucagon"
        dose: "1-5"
        dose_unit: "mg"
        route: "IV"
        frequency: "Bolus, then 5-15 mcg/min infusion if needed"
      rationale: "STILL ADMINISTER EPINEPHRINE as usual; may require higher/repeated doses. Add glucagon if refractory hypotension despite epinephrine."

# ============================================================
# MONITORING REQUIREMENTS
# ============================================================
monitoring_requirements:
  - monitoring_id: "ANAPHY-MON-001"
    parameter: "vital_signs"

    target_range:
      min: 90  # SBP minimum
      max: null
      unit: "mmHg"

    frequency: "every 2-5 minutes for first hour, then every 15 minutes"
    duration_hours: 8

    alert_condition:
      parameter: "systolic_bp"
      operator: "<"
      threshold: 90

  - monitoring_id: "ANAPHY-MON-002"
    parameter: "respiratory_status"

    target_range:
      min: 90  # SpO2 minimum
      max: null
      unit: "%"

    frequency: "continuous"
    duration_hours: 8

    alert_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "spo2"
          operator: "<"
          threshold: 90

        - parameter: "stridor"
          operator: "=="
          threshold: true

# ============================================================
# SPECIAL POPULATIONS
# ============================================================
special_populations:
  - population_id: "ELDERLY"
    description: "Patients ≥65 years with cardiac disease"

    inclusion_criteria:
      match_logic: "ALL_OF"
      conditions:
        - parameter: "age"
          operator: ">="
          threshold: 65
          unit: "years"

        - parameter: "cardiovascular_disease"
          operator: "=="
          threshold: true

    modifications:
      - action_id: "ANAPHY-ACT-001"
        modification_type: "CAUTION"
        rationale: "STILL ADMINISTER EPINEPHRINE (life-saving); monitor closely for arrhythmias and cardiac ischemia"

        new_parameters:
          monitoring: "Continuous cardiac monitoring; have cardiac medications available; benefits of epinephrine vastly outweigh risks even in severe CAD"

  - population_id: "PREGNANCY"
    description: "Pregnant patients"

    inclusion_criteria:
      parameter: "pregnancy_status"
      operator: "=="
      threshold: true

    modifications:
      - action_id: "ANAPHY-ACT-001"
        modification_type: "CAUTION"
        rationale: "STILL ADMINISTER EPINEPHRINE - it is life-saving for mother and fetus"

        new_parameters:
          monitoring: "Maternal death from anaphylaxis is catastrophic for fetus; epinephrine is the ONLY effective treatment and must be given without delay"

  - population_id: "BETA_BLOCKER_USE"
    description: "Patients on beta-blocker therapy"

    inclusion_criteria:
      parameter: "beta_blocker_use"
      operator: "=="
      threshold: true

    modifications:
      - action_id: "ANAPHY-ACT-001"
        modification_type: "BROADER_COVERAGE"
        rationale: "May require higher/repeated epinephrine doses; add glucagon if refractory"

        additional_medications:
          - name: "Glucagon"
            dose: "1-5"
            dose_unit: "mg"
            route: "IV"
            frequency: "Bolus, then infusion if needed"
            indication: "Epinephrine may be less effective in beta-blocker patients; glucagon bypasses beta-receptors"

# ============================================================
# ESCALATION RULES
# ============================================================
escalation_rules:
  - rule_id: "ANAPHY-ESC-001"
    description: "ICU transfer for refractory anaphylaxis"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - match_logic: "ALL_OF"
          conditions:
            - parameter: "epinephrine_doses"
              operator: ">="
              threshold: 3

            - parameter: "systolic_bp"
              operator: "<"
              threshold: 90
              unit: "mmHg"

        - parameter: "stridor"
          operator: "=="
          threshold: true

        - parameter: "spo2"
          operator: "<"
          threshold: 90

    recommendation:
      escalation_level: "ICU_TRANSFER"
      urgency: "IMMEDIATE"
      rationale: "Refractory anaphylaxis requires intensive monitoring and continuous epinephrine infusion"

      required_interventions:
        - "Continuous epinephrine infusion (2-10 mcg/min)"
        - "Consider vasopressors"
        - "Prepare for intubation if airway compromise"
        - "Central venous access"

      specialist_consultation:
        - specialty: "CRITICAL_CARE"
          urgency: "STAT"
          specific_question: "Continuous epinephrine infusion and hemodynamic support"

  - rule_id: "ANAPHY-ESC-002"
    description: "Emergent airway management"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "stridor"
          operator: "=="
          threshold: true

        - parameter: "spo2"
          operator: "<"
          threshold: 90

        - parameter: "altered_mental_status"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "IMMEDIATE_TRANSFER"
      urgency: "STAT"
      rationale: "Severe airway compromise requires emergent intubation by experienced provider"

      specialist_consultation:
        - specialty: "ANESTHESIOLOGY"
          urgency: "STAT"
          specific_question: "Emergent intubation for laryngeal edema; prepare for difficult airway/cricothyrotomy"

# ============================================================
# DE-ESCALATION CRITERIA
# ============================================================
de_escalation_criteria:
  - criteria_id: "ANAPHY-DE-ESC-001"
    description: "Discharge readiness after observation period"

    conditions:
      - parameter: "symptom_resolution"
        operator: "=="
        threshold: true

      - parameter: "hemodynamic_stability"
        operator: "=="
        threshold: true

      - parameter: "observation_hours"
        operator: ">="
        threshold: 4

      - parameter: "no_biphasic_reaction"
        operator: "=="
        threshold: true

    recommendation:
      action: "Discharge with EpiPen prescription and allergy referral"
      rationale: "Complete resolution after adequate observation period"
      specific_changes:
        - "Prescribe epinephrine auto-injector (EpiPen) for patient to carry"
        - "Allergy/immunology referral within 1-2 weeks"
        - "Patient education on allergen avoidance and auto-injector use"
        - "Consider 2-3 day prednisone taper (40-60 mg daily)"

# ============================================================
# OUTCOME TRACKING
# ============================================================
outcome_tracking:
  primary_outcomes:
    - outcome_id: "ANAPHY-OUT-001"
      metric: "time_to_epinephrine"
      target: "<5 minutes from symptom onset in >90% of cases"

    - outcome_id: "ANAPHY-OUT-002"
      metric: "resolution_of_symptoms"
      target: ">95% achieve complete resolution within 2-4 hours"

  process_measures:
    - measure_id: "ANAPHY-PROC-001"
      description: "Epinephrine administered before adjunctive medications"
      target: "100% compliance (epinephrine FIRST)"

    - measure_id: "ANAPHY-PROC-002"
      description: "Observation period compliance"
      target: ">95% observed for minimum 4 hours"

  balancing_measures:
    - measure_id: "ANAPHY-BAL-001"
      description: "Biphasic reaction rate"
      target: "<10% (with appropriate observation and steroids)"

# ============================================================
# METADATA
# ============================================================
metadata:
  protocol_type: "CLINICAL_PATHWAY"
  implementation_complexity: "HIGH"
  requires_icu_level_care: false
  estimated_implementation_time_minutes: 15

  tags:
    - "time-critical"
    - "life-threatening"
    - "epinephrine-first-line"
    - "no-absolute-contraindications"

  change_log:
    - version: "2.1"
      date: "2025-10-21"
      changes:
        - "Enhanced to CDS-compliant structure"
        - "Emphasized NO absolute contraindications for epinephrine"
        - "Added medication selection algorithms"
        - "Added time constraints for immediate interventions"
        - "Enhanced special population guidance (beta-blockers, cardiac disease)"
