# ============================================================
# ENHANCED CLINICAL PROTOCOL: Metabolic Syndrome Management
# ============================================================
# Version: 2.0 (CDS-Compliant)
# Based on: AHA/NHLBI 2005 Metabolic Syndrome Guidelines
# Last Updated: 2025-10-21
# ============================================================

protocol_id: "METABOLIC-SYNDROME-001"
name: "Metabolic Syndrome Comprehensive Management"
category: "ENDOCRINE"
specialty: "ENDOCRINOLOGY"
version: "2.0"
last_updated: "2025-10-21"

# ============================================================
# TRIGGER CRITERIA
# ============================================================
trigger_criteria:
  match_logic: "ANY_OF"

  conditions:
    - condition_id: "METS-TRIG-001"
      description: "ATP III criteria: 3 or more metabolic syndrome components"
      match_logic: "ANY_OF"
      conditions:
        - parameter: "metabolic_syndrome_criteria_count"
          operator: ">="
          threshold: 3
          source: "clinical_assessment"

    - condition_id: "METS-TRIG-002"
      description: "Individual metabolic syndrome components present"
      match_logic: "ALL_OF"
      conditions:
        - match_logic: "ANY_OF"
          conditions:
            - match_logic: "ALL_OF"
              conditions:
                - parameter: "waist_circumference"
                  operator: ">"
                  threshold: 40
                  unit: "inches"
                  source: "vital_signs"
                - parameter: "sex"
                  operator: "=="
                  threshold: "male"

            - match_logic: "ALL_OF"
              conditions:
                - parameter: "waist_circumference"
                  operator: ">"
                  threshold: 35
                  unit: "inches"
                  source: "vital_signs"
                - parameter: "sex"
                  operator: "=="
                  threshold: "female"

        - match_logic: "ANY_OF"
          conditions:
            - parameter: "triglycerides"
              operator: ">="
              threshold: 150
              unit: "mg/dL"
              source: "lab_results"

            - match_logic: "ALL_OF"
              conditions:
                - parameter: "hdl_cholesterol"
                  operator: "<"
                  threshold: 40
                  unit: "mg/dL"
                  source: "lab_results"
                - parameter: "sex"
                  operator: "=="
                  threshold: "male"

            - match_logic: "ALL_OF"
              conditions:
                - parameter: "hdl_cholesterol"
                  operator: "<"
                  threshold: 50
                  unit: "mg/dL"
                  source: "lab_results"
                - parameter: "sex"
                  operator: "=="
                  threshold: "female"

    - condition_id: "METS-TRIG-003"
      description: "High cardiovascular risk with multiple metabolic factors"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "ten_year_ascvd_risk"
          operator: ">"
          threshold: 10
          unit: "percent"
          source: "risk_assessment"

        - parameter: "metabolic_risk_factors"
          operator: ">="
          threshold: 2
          source: "clinical_assessment"

# ============================================================
# CONFIDENCE SCORING
# ============================================================
confidence_scoring:
  base_confidence: 0.80

  modifiers:
    - modifier_id: "METS-CONF-001"
      description: "All 5 ATP III criteria met"
      condition:
        parameter: "metabolic_syndrome_criteria_count"
        operator: "=="
        threshold: 5
      adjustment: 0.15

    - modifier_id: "METS-CONF-002"
      description: "4 ATP III criteria met"
      condition:
        parameter: "metabolic_syndrome_criteria_count"
        operator: "=="
        threshold: 4
      adjustment: 0.10

    - modifier_id: "METS-CONF-003"
      description: "High ASCVD risk enhances confidence"
      condition:
        parameter: "ten_year_ascvd_risk"
        operator: ">="
        threshold: 20
        unit: "percent"
      adjustment: 0.08

    - modifier_id: "METS-CONF-004"
      description: "Prediabetes present"
      condition:
        match_logic: "ANY_OF"
        conditions:
          - match_logic: "ALL_OF"
            conditions:
              - parameter: "fasting_glucose"
                operator: ">="
                threshold: 100
              - parameter: "fasting_glucose"
                operator: "<"
                threshold: 126
                unit: "mg/dL"

          - match_logic: "ALL_OF"
            conditions:
              - parameter: "hba1c"
                operator: ">="
                threshold: 5.7
              - parameter: "hba1c"
                operator: "<"
                threshold: 6.5
                unit: "percent"
      adjustment: 0.07

  activation_threshold: 0.70

# ============================================================
# EVIDENCE SOURCE
# ============================================================
evidence_source:
  primary_guideline: "AHA/NHLBI Scientific Statement on Metabolic Syndrome (2005)"
  guideline_version: "2005.1"
  publication_date: "2005-09"
  evidence_level: "STRONG"

  key_citations:
    - citation_id: "CITE-001"
      authors: "Grundy SM, Cleeman JI, Daniels SR, et al."
      title: "Diagnosis and Management of the Metabolic Syndrome: An American Heart Association/National Heart, Lung, and Blood Institute Scientific Statement"
      journal: "Circulation"
      year: 2005
      pmid: "16157765"
      doi: "10.1161/CIRCULATIONAHA.105.169404"

    - citation_id: "CITE-002"
      authors: "DPP Research Group"
      title: "Reduction in the Incidence of Type 2 Diabetes with Lifestyle Intervention or Metformin"
      journal: "N Engl J Med"
      year: 2002
      pmid: "11832527"

  last_review_date: "2024-06-01"
  next_review_date: "2026-06-01"

# ============================================================
# ACTIONS
# ============================================================
actions:
  - action_id: "METS-ACT-001"
    type: "DIAGNOSTIC"
    priority: "HIGH"
    sequence_number: 1

    timing:
      window: "URGENT"
      max_delay_minutes: 2880  # 2 weeks

    diagnostic:
      test_name: "Metabolic syndrome comprehensive panel"
      urgency: "SEMI_URGENT"
      instructions: "Fasting 8-12 hours before draw; include lipid panel, glucose, HbA1c"

      repeat_testing:
        repeat_interval_hours: 2160  # 3 months
        repeat_condition:
          parameter: "on_therapy"
          operator: "=="
          threshold: true

  - action_id: "METS-ACT-002"
    type: "CLINICAL_ASSESSMENT"
    priority: "HIGH"
    sequence_number: 2

    timing:
      window: "URGENT"
      max_delay_minutes: 2880  # 2 weeks

    clinical_assessment:
      assessment_type: "10-year ASCVD risk calculation"
      frequency: "annually"
      specific_parameters:
        - "Age, sex, race"
        - "Total cholesterol, HDL cholesterol"
        - "Systolic blood pressure"
        - "Diabetes status, smoking status"
        - "Treatment for hypertension"

  - action_id: "METS-ACT-003"
    type: "CLINICAL_ASSESSMENT"
    priority: "CRITICAL"
    sequence_number: 3

    timing:
      window: "URGENT"
      max_delay_minutes: 2880  # 2 weeks

    clinical_assessment:
      assessment_type: "Intensive lifestyle modification counseling"
      frequency: "monthly initially, then quarterly"
      duration_hours: null
      specific_parameters:
        - "7-10% weight loss goal"
        - "150 minutes/week moderate exercise"
        - "Mediterranean or DASH diet"
        - "Smoking cessation if applicable"

  - action_id: "METS-ACT-004"
    type: "MEDICATION"
    priority: "MEDIUM"
    sequence_number: 4

    timing:
      window: "ROUTINE"
      max_delay_minutes: 5760  # 4 weeks

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "PREDIABETES_CRITERIA"
          description: "Metformin for prediabetes with high-risk features"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - match_logic: "ANY_OF"
                conditions:
                  - match_logic: "ALL_OF"
                    conditions:
                      - parameter: "fasting_glucose"
                        operator: ">="
                        threshold: 100
                      - parameter: "fasting_glucose"
                        operator: "<"
                        threshold: 126
                        unit: "mg/dL"

                  - match_logic: "ALL_OF"
                    conditions:
                      - parameter: "hba1c"
                        operator: ">="
                        threshold: 5.7
                      - parameter: "hba1c"
                        operator: "<"
                        threshold: 6.5
                        unit: "percent"

              - match_logic: "ANY_OF"
                conditions:
                  - parameter: "bmi"
                    operator: ">="
                    threshold: 35
                  - parameter: "age"
                    operator: "<"
                    threshold: 60
                  - parameter: "gestational_diabetes_history"
                    operator: "=="
                    threshold: true

          primary_medication:
            name: "Metformin"
            generic_name: "Metformin"
            dose: "500"
            dose_unit: "mg"
            route: "PO"
            frequency: "once daily with dinner initially"
            duration: "long-term (years)"
            administration_instructions: "Start 500mg daily with dinner; increase by 500mg weekly as tolerated to target 1000mg BID or 2000mg daily; extended-release formulation reduces GI side effects"

        - criteria_id: "RENAL_IMPAIRMENT"
          description: "Reduced metformin dose for moderate renal impairment"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "egfr"
                operator: ">="
                threshold: 30
              - parameter: "egfr"
                operator: "<"
                threshold: 45
                unit: "mL/min/1.73m2"

          primary_medication:
            name: "Metformin (reduced dose)"
            dose: "500"
            dose_unit: "mg"
            route: "PO"
            frequency: "once daily, max 1000mg/day"
            dose_adjustment_rationale: "Reduce dose by 50% in moderate renal impairment; monitor renal function closely"

  - action_id: "METS-ACT-005"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 5

    timing:
      window: "URGENT"
      max_delay_minutes: 5760  # 4 weeks

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "STATIN_INDICATION"
          description: "Statin therapy for ASCVD risk ≥7.5% or LDL ≥100 with risk enhancers"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "ten_year_ascvd_risk"
                operator: ">="
                threshold: 7.5
                unit: "percent"

              - match_logic: "ALL_OF"
                conditions:
                  - parameter: "ldl_cholesterol"
                    operator: ">="
                    threshold: 100
                    unit: "mg/dL"
                  - parameter: "metabolic_syndrome"
                    operator: "=="
                    threshold: true

          primary_medication:
            name: "Atorvastatin"
            generic_name: "Atorvastatin"
            dose: "10-20"
            dose_unit: "mg"
            route: "PO"
            frequency: "once daily"
            duration: "long-term (indefinite)"
            administration_instructions: "Take once daily at any time; 10-20mg for moderate-intensity, 40-80mg for high-intensity LDL lowering"

          alternative_medication:
            name: "Rosuvastatin"
            dose: "5-10"
            dose_unit: "mg"
            route: "PO"
            frequency: "once daily"
            indication: "Alternative statin or for patients requiring more potent LDL reduction"

        - criteria_id: "STATIN_INTOLERANCE"
          description: "Ezetimibe for statin-intolerant patients"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "statin_associated_muscle_symptoms"
                operator: "=="
                threshold: true
              - parameter: "statin_intolerance"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Ezetimibe"
            dose: "10"
            dose_unit: "mg"
            route: "PO"
            frequency: "once daily"
            indication: "Non-statin LDL-lowering for statin-intolerant patients"
            administration_instructions: "May combine with low-dose statin if tolerated"

  - action_id: "METS-ACT-006"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 6

    timing:
      window: "URGENT"
      max_delay_minutes: 5760  # 4 weeks

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "HYPERTENSION_TREATMENT"
          description: "ACE inhibitor or ARB for hypertension (BP ≥130/85)"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "systolic_bp"
                operator: ">="
                threshold: 130
                unit: "mmHg"

              - parameter: "diastolic_bp"
                operator: ">="
                threshold: 85
                unit: "mmHg"

              - parameter: "on_antihypertensive_medication"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Lisinopril"
            generic_name: "Lisinopril"
            dose: "10"
            dose_unit: "mg"
            route: "PO"
            frequency: "once daily"
            duration: "long-term (indefinite)"
            administration_instructions: "Start 10mg once daily; titrate by 10mg every 2-4 weeks to achieve BP <130/80; max 40mg daily"

          alternative_medication:
            name: "Losartan"
            dose: "50"
            dose_unit: "mg"
            route: "PO"
            frequency: "once daily"
            indication: "ACE inhibitor intolerance (cough, angioedema)"
            administration_instructions: "ARB alternative for ACE inhibitor side effects"

  - action_id: "METS-ACT-007"
    type: "CLINICAL_ASSESSMENT"
    priority: "MEDIUM"
    sequence_number: 7

    timing:
      window: "ROUTINE"

    clinical_assessment:
      assessment_type: "Regular follow-up monitoring"
      frequency: "monthly initially, then quarterly"
      specific_parameters:
        - "Weight, BMI, waist circumference"
        - "Blood pressure"
        - "Lipid panel (every 3-6 months)"
        - "HbA1c (every 3-6 months if prediabetic)"
        - "Lifestyle adherence"

  - action_id: "METS-ACT-008"
    type: "CONSULTATION"
    priority: "MEDIUM"
    sequence_number: 8

    timing:
      window: "ROUTINE"

    consultation:
      specialty: "ENDOCRINOLOGY"
      urgency: "SEMI_URGENT"
      reason: "Refractory metabolic syndrome or progression to diabetes"
      specific_questions:
        - "Diabetes management if HbA1c ≥6.5%?"
        - "Bariatric surgery evaluation if BMI ≥40 or ≥35 with comorbidities?"
        - "Advanced lipid management if LDL not at goal?"

# ============================================================
# TIME CONSTRAINTS
# ============================================================
time_constraints:
  - constraint_id: "METS-TIME-001"
    bundle_name: "Initial Assessment Bundle"
    description: "Complete metabolic assessment within 2 weeks"
    offset_minutes: 20160  # 2 weeks
    critical: false

    required_actions:
      - action_id: "METS-ACT-001"
        description: "Laboratory evaluation"
      - action_id: "METS-ACT-002"
        description: "ASCVD risk calculation"

  - constraint_id: "METS-TIME-002"
    bundle_name: "Lifestyle Intervention Initiation"
    description: "Begin intensive lifestyle counseling within 2 weeks"
    offset_minutes: 20160  # 2 weeks
    critical: true

    required_actions:
      - action_id: "METS-ACT-003"
        description: "Lifestyle modification counseling"

# ============================================================
# CONTRAINDICATIONS
# ============================================================
contraindications:
  - contraindication_id: "METS-CONTRA-001"
    condition_description: "Severe renal impairment contraindicates metformin"

    trigger_condition:
      parameter: "egfr"
      operator: "<"
      threshold: 30
      unit: "mL/min/1.73m2"

    severity: "CRITICAL"
    affected_actions:
      - "METS-ACT-004"

    alternative_action:
      action_id: "METS-ALT-001"
      type: "CLINICAL_ASSESSMENT"
      rationale: "Metformin contraindicated in severe renal impairment; focus on lifestyle intervention; consider GLP-1 agonist if diabetes develops"

  - contraindication_id: "METS-CONTRA-002"
    condition_description: "Pregnancy contraindicates ACE inhibitors/ARBs and statins"

    trigger_condition:
      parameter: "pregnancy_status"
      operator: "=="
      threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "METS-ACT-005"
      - "METS-ACT-006"

    alternative_action:
      action_id: "METS-ALT-002"
      type: "MEDICATION"
      medication:
        name: "Nifedipine XL"
        dose: "30"
        dose_unit: "mg"
        route: "PO"
        frequency: "once daily"
      rationale: "Calcium channel blocker safe in pregnancy; discontinue statin; lipid management deferred during pregnancy"

  - contraindication_id: "METS-CONTRA-003"
    condition_description: "Active liver disease contraindicates statins"

    trigger_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "alt"
          operator: ">"
          threshold: 120  # 3x ULN assuming ULN=40
          unit: "U/L"
        - parameter: "active_liver_disease"
          operator: "=="
          threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "METS-ACT-005"

    alternative_action:
      action_id: "METS-ALT-003"
      type: "MEDICATION"
      medication:
        name: "Ezetimibe"
        dose: "10"
        dose_unit: "mg"
        route: "PO"
        frequency: "once daily"
      rationale: "Non-statin lipid-lowering therapy for patients with active liver disease"

# ============================================================
# MONITORING REQUIREMENTS
# ============================================================
monitoring_requirements:
  - monitoring_id: "METS-MON-001"
    parameter: "weight"

    target_range:
      min: null
      max: null
      unit: "kg"

    frequency: "monthly for first 3-6 months, then quarterly"
    duration_hours: null

    alert_condition:
      parameter: "weight_change_percent"
      operator: "<"
      threshold: 5  # <5% weight loss after 3 months

  - monitoring_id: "METS-MON-002"
    parameter: "blood_pressure"

    target_range:
      min: null
      max: 130
      unit: "mmHg"

    frequency: "at every visit (monthly initially)"
    duration_hours: null

    alert_condition:
      parameter: "systolic_bp"
      operator: ">="
      threshold: 140

  - monitoring_id: "METS-MON-003"
    parameter: "hba1c"

    target_range:
      min: null
      max: 5.7
      unit: "percent"

    frequency: "every 3-6 months"
    duration_hours: null

    alert_condition:
      parameter: "hba1c"
      operator: ">="
      threshold: 6.5

    escalation_action:
      description: "Progression to diabetes - endocrinology referral"

  - monitoring_id: "METS-MON-004"
    parameter: "ldl_cholesterol"

    target_range:
      min: null
      max: null
      unit: "mg/dL"

    frequency: "every 3-6 months during therapy adjustment"
    duration_hours: null

    alert_condition:
      parameter: "ldl_reduction_percent"
      operator: "<"
      threshold: 30  # <30% reduction

# ============================================================
# SPECIAL POPULATIONS
# ============================================================
special_populations:
  - population_id: "ELDERLY"
    description: "Patients ≥75 years"

    inclusion_criteria:
      parameter: "age"
      operator: ">="
      threshold: 75
      unit: "years"

    modifications:
      - action_id: "METS-ACT-005"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Lower statin intensity may be appropriate in elderly with multiple comorbidities"

        new_parameters:
          dose: "Consider moderate-intensity statin (atorvastatin 10mg) rather than high-intensity"
          monitoring: "Assess fall risk, cognitive function, polypharmacy concerns"

  - population_id: "RENAL_DISEASE"
    description: "Patients with chronic kidney disease (eGFR <60)"

    inclusion_criteria:
      parameter: "egfr"
      operator: "<"
      threshold: 60
      unit: "mL/min/1.73m2"

    modifications:
      - action_id: "METS-ACT-004"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Metformin dose adjustment based on renal function"

        new_parameters:
          dose: "Reduce dose if eGFR 30-45; contraindicated if eGFR <30"
          monitoring: "Monitor renal function every 3-6 months; assess before contrast procedures"

      - action_id: "METS-ACT-006"
        modification_type: "CAUTION"
        rationale: "ACE inhibitors/ARBs require close renal monitoring in CKD"

        new_parameters:
          monitoring: "Check creatinine and potassium 1-2 weeks after initiation or dose change; acceptable for Cr to increase <30%"

  - population_id: "HEPATIC_IMPAIRMENT"
    description: "Patients with liver disease"

    inclusion_criteria:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "alt"
          operator: ">"
          threshold: 80  # 2x ULN
          unit: "U/L"
        - parameter: "cirrhosis"
          operator: "=="
          threshold: true

    modifications:
      - action_id: "METS-ACT-004"
        modification_type: "CAUTION"
        rationale: "Metformin generally safe in mild-moderate liver disease; avoid in decompensated cirrhosis"

        new_parameters:
          monitoring: "Monitor liver function; avoid if decompensated cirrhosis or lactic acidosis risk"

      - action_id: "METS-ACT-005"
        modification_type: "CONTRAINDICATION"
        rationale: "Statins contraindicated in active liver disease or persistent ALT >3x ULN"

        alternative_medication:
          name: "Ezetimibe"
          dose: "10"
          dose_unit: "mg"
          route: "PO"
          frequency: "once daily"

# ============================================================
# ESCALATION RULES
# ============================================================
escalation_rules:
  - rule_id: "METS-ESC-001"
    description: "Endocrinology referral for progression to diabetes"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - match_logic: "ALL_OF"
          conditions:
            - parameter: "fasting_glucose"
              operator: ">="
              threshold: 126
              unit: "mg/dL"
            - parameter: "repeat_fasting_glucose"
              operator: ">="
              threshold: 126

        - match_logic: "ALL_OF"
          conditions:
            - parameter: "hba1c"
              operator: ">="
              threshold: 6.5
              unit: "percent"
            - parameter: "repeat_hba1c"
              operator: ">="
              threshold: 6.5

    recommendation:
      escalation_level: "CONSULT"
      urgency: "URGENT"
      rationale: "Progression to diabetes requires intensified glycemic management"

      specialist_consultation:
        - specialty: "ENDOCRINOLOGY"
          urgency: "URGENT"
          specific_question: "Diabetes management initiation and optimization"

  - rule_id: "METS-ESC-002"
    description: "Cardiology referral for refractory dyslipidemia"

    escalation_trigger:
      match_logic: "ALL_OF"
      conditions:
        - parameter: "ldl_reduction_percent"
          operator: "<"
          threshold: 30

        - parameter: "maximally_tolerated_statin"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "CONSULT"
      urgency: "ROUTINE"
      rationale: "Consider PCSK9 inhibitor or advanced lipid therapies"

      specialist_consultation:
        - specialty: "CARDIOLOGY"
          urgency: "ROUTINE"
          specific_question: "PCSK9 inhibitor or advanced lipid-lowering therapy candidacy"

  - rule_id: "METS-ESC-003"
    description: "Bariatric surgery evaluation for severe obesity"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "bmi"
          operator: ">="
          threshold: 40

        - match_logic: "ALL_OF"
          conditions:
            - parameter: "bmi"
              operator: ">="
              threshold: 35
            - parameter: "obesity_related_comorbidities"
              operator: ">="
              threshold: 1

    recommendation:
      escalation_level: "CONSULT"
      urgency: "ROUTINE"
      rationale: "Bariatric surgery highly effective for weight loss and metabolic syndrome resolution"

      specialist_consultation:
        - specialty: "BARIATRIC_SURGERY"
          urgency: "ROUTINE"
          specific_question: "Surgical weight loss candidacy and pre-operative evaluation"

# ============================================================
# DE-ESCALATION CRITERIA
# ============================================================
de_escalation_criteria:
  - criteria_id: "METS-DE-ESC-001"
    description: "Transition to annual monitoring for stable patients meeting goals"

    conditions:
      - parameter: "all_metabolic_goals_achieved"
        operator: "=="
        threshold: true

      - parameter: "stable_weight_maintenance_months"
        operator: ">="
        threshold: 6

      - parameter: "hba1c"
        operator: "<"
        threshold: 5.7
        unit: "percent"

    recommendation:
      action: "Reduce monitoring frequency to annual visits for stable patients"
      rationale: "Patients meeting all goals with stable weight can transition to maintenance monitoring"
      specific_changes:
        - "Annual comprehensive metabolic panel"
        - "Annual lipid panel and HbA1c"
        - "Continue lifestyle modifications"

# ============================================================
# OUTCOME TRACKING
# ============================================================
outcome_tracking:
  primary_outcomes:
    - outcome_id: "METS-OUT-001"
      metric: "weight_loss_7_10_percent"
      target: ">60% of patients achieve 7-10% weight loss"
      benchmark_source: "DPP Research Group 2002"

    - outcome_id: "METS-OUT-002"
      metric: "diabetes_prevention"
      target: "<10% progress to diabetes at 3 years"
      benchmark_source: "DPP Research Group 2002"

    - outcome_id: "METS-OUT-003"
      metric: "bp_control_rate"
      target: ">70% achieve BP <130/80"
      benchmark_source: "ACC/AHA 2017 Hypertension Guidelines"

  process_measures:
    - measure_id: "METS-PROC-001"
      description: "Lifestyle counseling provided at initial visit"
      target: ">95%"

    - measure_id: "METS-PROC-002"
