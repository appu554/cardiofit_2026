# Community-Acquired Pneumonia Inpatient Management Protocol - IDSA/ATS 2019
protocol_id: "CAP-INPATIENT-001"
name: "Community-Acquired Pneumonia Inpatient Management"
version: "2019.1"
category: "INFECTION"
source: "IDSA/ATS 2019 Community-Acquired Pneumonia Guidelines"
guideline_reference: "Metlay JP, et al. Am J Respir Crit Care Med. 2019;200(7):e45-67"
last_updated: "2019-10-01"

# Activation criteria - ANY of these conditions triggers the protocol
activation_criteria:
  - condition: "infiltrate_on_cxr AND clinical_criteria >= 2"
    description: "CAP diagnosis requires radiographic infiltrate plus clinical features"
    parameters:
      - "fever (temperature > 38°C or < 36°C)"
      - "cough (productive or non-productive)"
      - "sputum_production"
      - "dyspnea OR tachypnea (RR > 20)"
      - "pleuritic_chest_pain"
      - "hypoxemia (SpO2 < 90% on room air)"
  - condition: "CURB65 >= 2 OR PSI_class >= 3"
    description: "Severity score indicates need for inpatient management"
    parameters:
      - "confusion (altered_mental_status)"
      - "BUN > 20 mg/dL"
      - "respiratory_rate >= 30"
      - "blood_pressure (SBP < 90 OR DBP <= 60)"
      - "age >= 65"
  - condition: "severe_CAP_criteria >= 1_major OR >= 3_minor"
    description: "Severe CAP requiring ICU admission"
    parameters:
      - "major: septic_shock OR respiratory_failure_requiring_mechanical_ventilation"
      - "minor: RR >= 30, PaO2/FiO2 <= 250, multilobar_infiltrates, confusion, uremia, leukopenia, thrombocytopenia, hypothermia, hypotension"

# Priority determination based on severity
priority_determination:
  base_priority: "P4_URGENT"
  urgency_factors:
    - condition: "severe_CAP (septic_shock OR mechanical_ventilation)"
      priority_modifier: "IMMEDIATE"
      timeframe: "0 minutes"
    - condition: "CURB65 >= 3 OR PSI_class V"
      priority_modifier: "IMMEDIATE"
      timeframe: "0 minutes"
    - condition: "hypoxemia (SpO2 < 90%) OR respiratory_distress"
      priority_modifier: "URGENT"
      timeframe: "< 30 minutes"
    - condition: "CURB65 = 2 OR PSI_class III-IV"
      priority_modifier: "URGENT"
      timeframe: "< 4 hours"
  default_timeframe: "< 4 hours"

# Clinical actions in recommended sequence
actions:
  - action_id: "CAP-ACT-001"
    category: "DIAGNOSTIC"
    sequence_order: 1
    description: "Obtain chest X-ray to confirm pneumonia and assess extent"
    urgency: "STAT"
    timeframe: "within 1 hour"
    rationale: "Radiographic confirmation required for CAP diagnosis; identifies complications (effusion, cavitation, multilobar involvement)"

    diagnostic_details:
      test_name: "Chest X-ray (PA and lateral)"
      test_type: "IMAGING"
      loinc_code: "36643-5"
      clinical_indication: "Confirm infiltrate presence, assess pneumonia severity and complications"
      expected_findings: "Lobar consolidation, interstitial infiltrates, pleural effusion, multilobar involvement"
      interpretation_guidance: "Any infiltrate confirms pneumonia; multilobar or bilateral involvement suggests severe CAP; effusion may require thoracentesis"
      result_timeframe: "1-2 hours"

    evidence:
      - title: "IDSA/ATS 2019 - Radiographic Diagnosis"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "2.1"
        grade: "1C"
        summary: "Chest imaging required for CAP diagnosis in hospitalized patients"

    prerequisite_checks:
      - "Ensure patient stable for radiology transport"
      - "Portable CXR acceptable if patient too unstable for PA/lateral"

    monitoring_parameters: "Repeat CXR if clinical worsening or lack of improvement at 48-72 hours; follow-up CXR at 6-8 weeks to document resolution"

  - action_id: "CAP-ACT-002"
    category: "DIAGNOSTIC"
    sequence_order: 2
    description: "Obtain blood cultures x2 before antibiotic administration"
    urgency: "STAT"
    timeframe: "within 1 hour (before antibiotics)"
    rationale: "Blood cultures identify bacteremia (5-14% of CAP) and guide targeted therapy; positive in pneumococcal pneumonia"

    diagnostic_details:
      test_name: "Blood cultures x2"
      test_type: "CULTURE"
      loinc_code: "600-7"
      clinical_indication: "Identify causative organism and bacteremia in CAP"
      expected_findings: "Streptococcus pneumoniae most common (positive in 5-14%); also H. influenzae, S. aureus, gram-negatives"
      interpretation_guidance: "Two sets from separate sites; positive cultures guide antibiotic de-escalation; contaminants (coag-negative staph, Corynebacterium) vs. true pathogens"
      result_timeframe: "Preliminary 24-48 hours, Final 5 days"

    evidence:
      - title: "IDSA/ATS 2019 - Blood Cultures in CAP"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        recommendation: "3.1"
        grade: "2B"
        summary: "Blood cultures recommended for severe CAP or hospitalized patients before antibiotics"

    prerequisite_checks:
      - "Use aseptic technique with chlorhexidine skin prep"
      - "Draw from 2 separate peripheral sites (not through central lines unless suspected catheter infection)"
      - "MUST obtain before antibiotic administration"

    monitoring_parameters: "Check preliminary results at 24-48 hours; final results at 5 days; de-escalate antibiotics based on culture results"

  - action_id: "CAP-ACT-003"
    category: "DIAGNOSTIC"
    sequence_order: 3
    description: "Obtain sputum culture (if adequate sample) and respiratory viral panel"
    urgency: "STAT"
    timeframe: "within 1 hour (before antibiotics)"
    rationale: "Sputum culture identifies bacterial pathogen in 40-50%; viral panel detects influenza and other respiratory viruses"

    diagnostic_details:
      test_name: "Sputum culture and gram stain, respiratory viral PCR panel"
      test_type: "CULTURE"
      clinical_indication: "Identify bacterial and viral pathogens causing CAP"
      expected_findings: "Adequate sputum: >25 PMNs, <10 epithelial cells per LPF; S. pneumoniae, H. influenzae, M. catarrhalis, S. aureus; influenza, RSV, coronavirus"
      interpretation_guidance: "Gram stain immediate (gram-positive diplococci = pneumococcus); culture results 24-48 hours; viral PCR 2-4 hours"
      result_timeframe: "Gram stain immediate, culture 24-48 hours, viral PCR 2-4 hours"

    evidence:
      - title: "IDSA/ATS 2019 - Sputum Culture"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        recommendation: "3.2"
        grade: "2B"
        summary: "Sputum culture recommended for hospitalized CAP if adequate sample obtained"

    prerequisite_checks:
      - "Assess if patient can produce adequate sputum sample (deep cough, not saliva)"
      - "Respiratory viral panel especially important during influenza season"

    monitoring_parameters: "Gram stain results guide initial antibiotic choice; culture results allow de-escalation to narrow-spectrum therapy"

  - action_id: "CAP-ACT-004"
    category: "DIAGNOSTIC"
    sequence_order: 4
    description: "Obtain CBC, CMP, arterial blood gas (if hypoxemic)"
    urgency: "STAT"
    timeframe: "within 1 hour"
    rationale: "Laboratory evaluation assesses severity (leukocytosis, renal dysfunction, acidosis), guides management, and calculates severity scores"

    diagnostic_details:
      test_name: "Complete blood count, comprehensive metabolic panel, arterial blood gas"
      test_type: "LAB"
      clinical_indication: "Assess CAP severity, organ function, oxygenation status"
      expected_findings: "WBC >15,000 or <4,000, elevated BUN/creatinine, hyponatremia, metabolic acidosis, hypoxemia (PaO2 <60 mmHg)"
      interpretation_guidance: "Leukocytosis or leukopenia indicates bacterial infection; BUN >20 is CURB-65 criterion; PaO2/FiO2 ratio <250 suggests severe CAP"

    evidence:
      - title: "IDSA/ATS 2019 - Laboratory Evaluation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "3.3"
        grade: "1C"
        summary: "Laboratory evaluation including CBC, chemistry, and ABG (if indicated) recommended for hospitalized CAP"

    monitoring_parameters: "Trend WBC daily; monitor renal function (creatinine, BUN); repeat ABG if hypoxemia or clinical deterioration"

  - action_id: "CAP-ACT-005"
    category: "MEDICATION"
    sequence_order: 5
    description: "Administer empiric antibiotic therapy: Ceftriaxone + Azithromycin"
    urgency: "URGENT"
    timeframe: "within 4 hours of hospital arrival (within 1 hour if severe CAP)"
    rationale: "Early antibiotic administration reduces mortality; combination therapy covers S. pneumoniae (including resistant) and atypical pathogens"

    medication_details:
      name: "Ceftriaxone + Azithromycin"
      brand_name: "Rocephin + Zithromax"
      drug_class: "Third-generation cephalosporin + Macrolide antibiotic"
      indication: "Empiric treatment of hospitalized CAP (non-ICU) covering typical and atypical pathogens"

      dose_calculation_method: "fixed_dose"
      standard_dose: "1-2 g ceftriaxone + 500 mg azithromycin"
      dose_unit: "g (ceftriaxone), mg (azithromycin)"
      dose_range: "1-2 g ceftriaxone daily, 500 mg azithromycin daily"

      route: "IV (both initially, may transition to PO azithromycin)"
      administration_instructions: "Ceftriaxone 1-2g IV once daily; Azithromycin 500mg IV or PO once daily; infuse ceftriaxone over 30 minutes"
      frequency: "Once daily (both)"
      duration: "Minimum 5 days, typically 7 days; continue until afebrile x 48-72 hours and clinically stable"

      max_single_dose: "2 g ceftriaxone, 500 mg azithromycin"
      max_daily_dose: "2 g ceftriaxone, 500 mg azithromycin"

      adverse_effects:
        - "Diarrhea, C. difficile infection (ceftriaxone)"
        - "QTc prolongation (azithromycin, monitor EKG if risk factors)"
        - "Hypersensitivity reactions (rash, anaphylaxis <1%)"
        - "Thrombocytopenia (ceftriaxone, reversible)"
        - "Nausea, abdominal pain (azithromycin)"

      lab_monitoring:
        - "WBC daily (expect normalization by 48-72 hours)"
        - "Temperature every 4-6 hours (expect defervescence by 48-72 hours)"
        - "Renal function (creatinine) daily if impaired"
        - "EKG if baseline QTc prolongation or cardiac risk factors (azithromycin)"

    evidence:
      - title: "IDSA/ATS 2019 - Empiric Antibiotic Therapy"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "4.1"
        grade: "1A"
        summary: "Beta-lactam plus macrolide or respiratory fluoroquinolone recommended for hospitalized CAP"
      - title: "Postma DF, et al. Antibiotic treatment strategies for CAP"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "JAMA. 2015;313(7):677-86"
        summary: "Beta-lactam/macrolide combination reduces mortality vs. beta-lactam alone (OR 0.78)"

    contraindications:
      - type: "ALLERGY"
        description: "Cephalosporin or penicillin allergy"
        severity: "ABSOLUTE"
        alternative_action:
          medication_name: "Levofloxacin monotherapy"
          dose: "750"
          dose_unit: "mg"
          route: "IV"
          frequency: "once daily"
          rationale: "Respiratory fluoroquinolone covers typical and atypical pathogens without beta-lactam"

      - type: "CARDIAC_CONDITION"
        description: "QTc prolongation (>500 ms) or risk factors for torsades"
        severity: "RELATIVE"
        alternative_action:
          medication_name: "Ceftriaxone + Doxycycline"
          dose: "1-2g ceftriaxone + 100mg doxycycline"
          route: "IV"
          frequency: "once daily (ceftriaxone), BID (doxycycline)"
          rationale: "Doxycycline alternative to macrolide without QTc risk"

      - type: "CLINICAL_CONTEXT"
        description: "Suspected aspiration pneumonia (witnessed aspiration, poor dentition, dysphagia)"
        severity: "RELATIVE"
        alternative_action:
          medication_name: "Ampicillin-Sulbactam OR Piperacillin-Tazobactam"
          dose: "3g ampicillin-sulbactam OR 4.5g piperacillin-tazobactam"
          route: "IV"
          frequency: "q6h"
          rationale: "Add anaerobic coverage for aspiration pneumonia"

      - type: "CLINICAL_CONTEXT"
        description: "Recent hospitalization (<90 days) or healthcare-associated risk factors"
        severity: "RELATIVE"
        alternative_action:
          medication_name: "Piperacillin-Tazobactam + Azithromycin OR Levofloxacin"
          dose: "4.5g piperacillin-tazobactam"
          route: "IV"
          frequency: "q6h"
          rationale: "Broader coverage for MRSA and Pseudomonas risk in healthcare-associated pneumonia"

    prerequisite_checks:
      - "Verify no beta-lactam allergy (check allergy list)"
      - "Blood and sputum cultures obtained (do NOT delay antibiotics if cultures not drawn)"
      - "Assess for aspiration risk (recent stroke, dysphagia, decreased consciousness)"
      - "Check EKG baseline QTc if cardiac risk factors"
      - "Review recent antibiotic use and hospitalization history"

    required_lab_values:
      - "baseline_wbc"

    monitoring_parameters: "Monitor for clinical improvement (defervescence, WBC normalization, improved oxygenation) by 48-72 hours; switch to oral antibiotics when clinically stable; culture results guide de-escalation"

  - action_id: "CAP-ACT-006"
    category: "MEDICATION"
    sequence_order: 6
    description: "Alternative regimen: Levofloxacin monotherapy"
    urgency: "URGENT"
    timeframe: "within 4 hours if beta-lactam allergy"
    rationale: "Respiratory fluoroquinolones provide single-agent coverage for typical and atypical CAP pathogens"

    medication_details:
      name: "Levofloxacin"
      brand_name: "Levaquin"
      drug_class: "Respiratory fluoroquinolone"
      indication: "Empiric CAP therapy (alternative to beta-lactam/macrolide), beta-lactam allergy, or penicillin-resistant pneumococcus"

      dose_calculation_method: "fixed_dose"
      standard_dose: "750"
      dose_unit: "mg"

      route: "IV or PO"
      administration_instructions: "750mg IV or PO once daily; IV infuse over 90 minutes (not rapid push); excellent oral bioavailability allows early PO switch"
      frequency: "Once daily"
      duration: "Minimum 5 days, typically 7 days; continue until afebrile x 48-72 hours and clinically stable"

      max_single_dose: "750 mg"
      max_daily_dose: "750 mg"

      adverse_effects:
        - "Tendinopathy and tendon rupture (rare, <0.5%, increased risk >60 years, corticosteroid use)"
        - "QTc prolongation (monitor EKG)"
        - "Peripheral neuropathy (rare but potentially irreversible)"
        - "CNS effects (dizziness, insomnia, seizures in susceptible patients)"
        - "C. difficile infection risk"
        - "Dysglycemia (especially in diabetics)"

      lab_monitoring:
        - "WBC daily"
        - "Renal function (dose adjustment needed if CrCl <50 mL/min)"
        - "EKG if baseline QTc prolongation"
        - "Glucose monitoring in diabetics"

    evidence:
      - title: "IDSA/ATS 2019 - Fluoroquinolone Monotherapy"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "4.2"
        grade: "1A"
        summary: "Respiratory fluoroquinolone acceptable alternative for hospitalized CAP"

    contraindications:
      - type: "MUSCULOSKELETAL_CONDITION"
        description: "History of tendinopathy or tendon rupture with fluoroquinolones"
        severity: "ABSOLUTE"
        alternative_action:
          medication_name: "Moxifloxacin OR Ceftriaxone + Doxycycline"
          dose: "400mg moxifloxacin OR 1-2g ceftriaxone + 100mg doxycycline"
          frequency: "once daily (moxifloxacin), once daily + BID"
          rationale: "Alternative fluoroquinolone or non-fluoroquinolone regimen"

      - type: "CARDIAC_CONDITION"
        description: "QTc prolongation (>500 ms)"
        severity: "ABSOLUTE"
        alternative_action:
          medication_name: "Ceftriaxone + Doxycycline"
          dose: "1-2g + 100mg"
          frequency: "once daily + BID"
          rationale: "Avoid fluoroquinolone if QTc prolonged"

      - type: "NEUROLOGIC_CONDITION"
        description: "Seizure disorder or CNS pathology"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Use with caution; consider alternative regimen if high seizure risk"

    prerequisite_checks:
      - "Check renal function for dose adjustment"
      - "Screen for tendinopathy history"
      - "EKG if cardiac risk factors (QTc monitoring)"
      - "Assess for concurrent corticosteroid use (increases tendon rupture risk)"

    required_lab_values:
      - "creatinine"
      - "eGFR"

    monitoring_parameters: "Monitor for tendon pain (discontinue immediately if occurs); clinical improvement by 48-72 hours; switch IV to PO when stable"

  - action_id: "CAP-ACT-007"
    category: "SUPPORTIVE_CARE"
    sequence_order: 7
    description: "Oxygen therapy to maintain SpO2 >90%"
    urgency: "STAT"
    timeframe: "Immediately if hypoxemic"
    rationale: "Hypoxemia common in pneumonia; supplemental oxygen prevents tissue hypoxia and reduces mortality"

    diagnostic_details:
      test_name: "Supplemental oxygen therapy"
      test_type: "SUPPORTIVE_CARE"
      clinical_indication: "Maintain adequate oxygenation (SpO2 >90%, PaO2 >60 mmHg)"
      expected_findings: "SpO2 improvement with nasal cannula (1-6 L/min) or face mask (6-15 L/min)"
      interpretation_guidance: "Titrate oxygen to SpO2 target 90-94%; if requiring >6 L/min or FiO2 >40%, consider high-flow nasal cannula or ICU"

    evidence:
      - title: "IDSA/ATS 2019 - Oxygen Therapy"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "5.1"
        grade: "1C"
        summary: "Supplemental oxygen recommended to maintain SpO2 >90% in CAP"

    monitoring_parameters: "SpO2 continuous monitoring; titrate oxygen to maintain 90-94%; assess for respiratory distress requiring escalation"

  - action_id: "CAP-ACT-008"
    category: "SUPPORTIVE_CARE"
    sequence_order: 8
    description: "IV fluid hydration and electrolyte management"
    urgency: "URGENT"
    timeframe: "within 2 hours"
    rationale: "Pneumonia often causes dehydration from fever, increased insensible losses, and poor oral intake"

    diagnostic_details:
      test_name: "IV crystalloid hydration"
      test_type: "SUPPORTIVE_CARE"
      clinical_indication: "Restore euvolemia, maintain renal perfusion"
      expected_findings: "Improved urine output, normalization of BUN/creatinine ratio"
      interpretation_guidance: "Typical fluid needs 1-2 L bolus, then maintenance 75-125 mL/hr; avoid overhydration (monitor lung exam, O2 requirement)"

    evidence:
      - title: "IDSA/ATS 2019 - Supportive Care"
        type: "CLINICAL_GUIDELINE"
        strength: "EXPERT_CONSENSUS"
        grade: "BPS"
        summary: "Adequate hydration and supportive care essential in CAP management"

    monitoring_parameters: "Urine output (goal >0.5 mL/kg/hr), lung exam (watch for volume overload), electrolytes (replace as needed)"

  - action_id: "CAP-ACT-009"
    category: "CONSULTATION"
    sequence_order: 9
    description: "Respiratory therapy and pulmonary consultation if severe"
    urgency: "URGENT"
    timeframe: "within 2 hours for severe CAP"
    rationale: "Respiratory therapy assists with secretion clearance; pulmonary consultation for ICU-level care or complications"

    escalation_criteria:
      - "Requiring high-flow oxygen (>6 L/min) or FiO2 >40%"
      - "Respiratory distress (RR >30, accessory muscle use)"
      - "Need for high-flow nasal cannula, CPAP, or mechanical ventilation"
      - "Parapneumonic effusion requiring thoracentesis"
      - "ICU admission criteria met"

    evidence:
      - title: "IDSA/ATS 2019 - ICU Admission Criteria"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "6.1"
        grade: "1B"
        summary: "Severe CAP requires ICU admission for advanced respiratory support and monitoring"

  - action_id: "CAP-ACT-010"
    category: "ESCALATION"
    sequence_order: 10
    description: "ICU transfer for severe CAP or septic shock"
    urgency: "IMMEDIATE"
    timeframe: "within 1 hour if criteria met"
    rationale: "Severe CAP mortality 20-50%; ICU management with vasopressors and mechanical ventilation reduces mortality"

    escalation_criteria:
      - "Septic shock (hypotension requiring vasopressors despite fluids)"
      - "Respiratory failure requiring mechanical ventilation"
      - "CURB-65 ≥3 OR PSI class V"
      - "≥3 minor criteria (RR ≥30, PaO2/FiO2 ≤250, multilobar infiltrates, confusion, BUN ≥20, leukopenia, thrombocytopenia, hypothermia, hypotension requiring fluids)"

    evidence:
      - title: "IDSA/ATS 2019 - ICU Admission"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "6.1"
        grade: "1B"
        summary: "1 major or ≥3 minor criteria warrant ICU admission for severe CAP"

# Overall protocol contraindications
contraindications:
  - type: "CLINICAL_CONTEXT"
    description: "Non-infectious pulmonary infiltrate (pulmonary edema, pulmonary embolism, malignancy)"
    severity: "ABSOLUTE"
    rationale: "Antibiotics not indicated for non-infectious infiltrates; treat underlying condition"

  - type: "GOALS_OF_CARE"
    description: "Comfort measures only or hospice"
    severity: "ABSOLUTE"
    rationale: "Aggressive pneumonia treatment inconsistent with comfort-focused care"

  - type: "CLINICAL_CONTEXT"
    description: "Healthcare-associated pneumonia (recent hospitalization, nursing home resident)"
    severity: "RELATIVE"
    rationale: "Requires broader antibiotic coverage (anti-Pseudomonal, anti-MRSA therapy)"

# Monitoring requirements for overall protocol
monitoring_requirements:
  - parameter: "Temperature"
    frequency: "Every 4-6 hours"
    target: "Defervescence (afebrile x 48-72 hours) expected by 48-72 hours"

  - parameter: "Oxygen saturation"
    frequency: "Continuous if supplemental oxygen; every 4 hours on room air"
    target: "SpO2 >90%"

  - parameter: "Respiratory rate"
    frequency: "Every 4 hours"
    target: "RR <24 (clinical stability criterion)"

  - parameter: "White blood cell count"
    frequency: "Daily until normalizing"
    target: "WBC 4,000-12,000 (normalization expected by 48-72 hours)"

  - parameter: "Blood cultures"
    frequency: "Check preliminary at 24-48 hours, final at 5 days"
    target: "De-escalate antibiotics if positive cultures with susceptibilities"

  - parameter: "Sputum culture"
    frequency: "Check results at 24-48 hours"
    target: "De-escalate to narrow-spectrum based on culture results"

  - parameter: "Chest X-ray"
    frequency: "Repeat if no clinical improvement at 48-72 hours; follow-up at 6-8 weeks"
    target: "Radiographic resolution by 6-8 weeks (slow resolution normal)"

# Escalation criteria for worsening clinical status
escalation_criteria:
  - condition: "No clinical improvement after 48-72 hours of appropriate antibiotics"
    action: "Reassess diagnosis, check culture results, consider resistant organisms or complications (empyema, abscess), ID consultation"
    timeframe: "< 24 hours"

  - condition: "Respiratory distress or increasing oxygen requirement"
    action: "Pulmonary consultation, consider high-flow nasal cannula or mechanical ventilation, ICU transfer"
    timeframe: "Immediate"

  - condition: "Hypotension or septic shock"
    action: "ICU transfer, fluid resuscitation, vasopressor support (norepinephrine), broaden antibiotic coverage"
    timeframe: "Immediate"

  - condition: "Parapneumonic effusion (>1 cm on lateral decubitus CXR)"
    action: "Thoracentesis for diagnostic evaluation (rule out empyema), pulmonary consultation if complicated effusion"
    timeframe: "< 12 hours"

  - condition: "Persistent bacteremia despite 48-72 hours of antibiotics"
    action: "Infectious disease consultation, search for metastatic infection, consider endocarditis evaluation, extend antibiotic duration"
    timeframe: "< 24 hours"

# Expected clinical outcomes
expected_outcomes:
  - outcome: "Defervescence (afebrile x 48-72 hours)"
    timeframe: "48-72 hours"

  - outcome: "Clinical stability: afebrile, RR <24, HR <100, SBP >90, SpO2 >90%, tolerating oral intake"
    timeframe: "48-96 hours"

  - outcome: "WBC normalization"
    timeframe: "48-72 hours"

  - outcome: "Improved oxygenation (room air or baseline oxygen)"
    timeframe: "72-96 hours"

  - outcome: "Transition from IV to oral antibiotics"
    timeframe: "48-72 hours (when clinically stable)"

  - outcome: "Hospital discharge"
    timeframe: "3-5 days (median for uncomplicated CAP)"

  - outcome: "Radiographic improvement or resolution"
    timeframe: "6-8 weeks post-discharge (CXR follow-up)"

# De-escalation and completion criteria
completion_criteria:
  - "Clinically stable x 24 hours: afebrile, RR <24, HR <100, SBP >90, SpO2 >90% on room air or baseline"
  - "Tolerating oral intake and medications"
  - "No acute comorbidities requiring hospitalization"
  - "Transitioned to oral antibiotic therapy"
  - "Total antibiotic duration: 5-7 days for uncomplicated CAP; longer (14-21 days) if bacteremic, S. aureus, or complicated"
  - "Outpatient follow-up arranged within 1-2 weeks with repeat CXR at 6-8 weeks to document resolution"
  - "Patient education on completion of antibiotic course, pneumococcal and influenza vaccination, smoking cessation"
