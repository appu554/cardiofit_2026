# ============================================================
# NEUTROPENIC FEVER MANAGEMENT PROTOCOL (CDS-COMPLIANT)
# ============================================================
# IDSA 2023 Guidelines for Neutropenic Fever
# Taplitz RA, et al. Clin Infect Dis. 2023;77(2):137-163
# Last Updated: 2025-10-21
# ============================================================

protocol_id: "NEUTROPENIC-FEVER-001"
name: "Neutropenic Fever Management Protocol"
category: "INFECTIOUS_DISEASE"
specialty: "ONCOLOGY"
version: "2.1"
last_updated: "2025-10-21"

# ============================================================
# TRIGGER CRITERIA
# ============================================================
trigger_criteria:
  match_logic: "ANY_OF"

  conditions:
    - condition_id: "NEUTFEVER-TRIG-001"
      description: "Severe neutropenia with single high fever"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "absolute_neutrophil_count"
          operator: "<"
          threshold: 500
          unit: "cells/mm³"
          source: "lab_results"

        - parameter: "temperature"
          operator: ">="
          threshold: 38.3
          unit: "°C"
          source: "vital_signs"

    - condition_id: "NEUTFEVER-TRIG-002"
      description: "Severe neutropenia with sustained fever"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "absolute_neutrophil_count"
          operator: "<"
          threshold: 500
          unit: "cells/mm³"
          source: "lab_results"

        - parameter: "temperature_sustained"
          operator: ">="
          threshold: 38.0
          unit: "°C"
          source: "vital_signs"

        - parameter: "sustained_duration_hours"
          operator: ">="
          threshold: 1
          unit: "hours"
          source: "clinical_assessment"

    - condition_id: "NEUTFEVER-TRIG-003"
      description: "Neutropenia expected to decline with fever"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "absolute_neutrophil_count"
          operator: "<"
          threshold: 1000
          unit: "cells/mm³"
          source: "lab_results"

        - parameter: "expected_decline_to_500"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

        - parameter: "temperature"
          operator: ">="
          threshold: 38.0
          unit: "°C"
          source: "vital_signs"

    - condition_id: "NEUTFEVER-TRIG-004"
      description: "Neutropenia with sepsis signs"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "absolute_neutrophil_count"
          operator: "<"
          threshold: 500
          unit: "cells/mm³"
          source: "lab_results"

        - match_logic: "ANY_OF"
          conditions:
            - parameter: "systolic_bp"
              operator: "<"
              threshold: 90
              unit: "mmHg"
              source: "vital_signs"

            - parameter: "altered_mental_status"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "respiratory_distress"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

# ============================================================
# CONFIDENCE SCORING
# ============================================================
confidence_scoring:
  base_confidence: 0.90

  modifiers:
    - modifier_id: "NEUTFEVER-CONF-001"
      description: "Profound neutropenia (ANC <100)"
      condition:
        parameter: "absolute_neutrophil_count"
        operator: "<"
        threshold: 100
        unit: "cells/mm³"
      adjustment: 0.08

    - modifier_id: "NEUTFEVER-CONF-002"
      description: "Hemodynamic instability or septic shock"
      condition:
        parameter: "systolic_bp"
        operator: "<"
        threshold: 90
        unit: "mmHg"
      adjustment: 0.07

    - modifier_id: "NEUTFEVER-CONF-003"
      description: "Low MASCC score (<21)"
      condition:
        parameter: "mascc_score"
        operator: "<"
        threshold: 21
      adjustment: 0.05

  activation_threshold: 0.70

# ============================================================
# EVIDENCE SOURCE
# ============================================================
evidence_source:
  primary_guideline: "Infectious Diseases Society of America (IDSA) 2023 Guidelines for Neutropenic Fever"
  guideline_version: "IDSA 2023"
  publication_date: "2023-07"
  evidence_level: "STRONG"

  key_citations:
    - citation_id: "IDSA-2023-NEUTFEVER"
      authors: "Taplitz RA, Kennedy EB, Bow EJ, et al."
      title: "Antimicrobial Prophylaxis for Adult Patients With Cancer-Related Immunosuppression: ASCO and IDSA Clinical Practice Guideline Update"
      journal: "Clin Infect Dis"
      year: 2023
      pmid: "37364236"
      doi: "10.1093/cid/ciad428"

  last_review_date: "2024-07-01"
  next_review_date: "2026-07-01"

# ============================================================
# ACTIONS
# ============================================================
actions:
  # Blood cultures before antibiotics
  - action_id: "NEUTFEVER-ACT-001"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 1

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 30

    diagnostic:
      test_name: "Blood cultures x2 sets (peripheral + central line)"
      test_code: "LOINC-600-7"
      sample_type: "blood"
      number_of_samples: 2
      collection_sites: ["peripheral", "central_line_all_lumens"]
      urgency: "STAT"
      instructions: "Collect 8-10 mL per bottle; strict aseptic technique; MUST collect before antibiotics but do NOT delay antibiotics >1 hour"

  # Laboratory assessment
  - action_id: "NEUTFEVER-ACT-002"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 2

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 30

    diagnostic:
      test_name: "CBC with differential, CMP, lactate"
      urgency: "STAT"
      instructions: "Confirm ANC, assess organ function"

  # MASCC risk stratification
  - action_id: "NEUTFEVER-ACT-003"
    type: "CLINICAL_ASSESSMENT"
    priority: "HIGH"
    sequence_number: 3

    timing:
      window: "URGENT"
      max_delay_minutes: 30

    clinical_assessment:
      assessment_type: "MASCC Risk Index Score calculation"
      frequency: "once"
      specific_parameters:
        - "Score ≥21: low risk (outpatient possible)"
        - "Score <21: high risk (admission required)"

  # Empiric antibiotic - Cefepime with renal dosing
  - action_id: "NEUTFEVER-ACT-004"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 4

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "NORMAL_RENAL_FUNCTION"
          description: "Standard cefepime dosing for eGFR >60"

          condition:
            parameter: "egfr"
            operator: ">="
            threshold: 60
            unit: "mL/min"

          primary_medication:
            name: "Cefepime"
            dose: "2"
            dose_unit: "g"
            route: "IV"
            frequency: "q8h"
            duration: "Minimum 7 days or until ANC >500 for 48h and afebrile 24-48h"
            administration_instructions: "Infuse 2g IV over 30 minutes"

          alternative_medication:
            name: "Piperacillin-Tazobactam"
            dose: "4.5"
            dose_unit: "g"
            route: "IV"
            frequency: "q6h"
            indication: "Alternative anti-pseudomonal beta-lactam"

        - criteria_id: "MODERATE_RENAL_IMPAIRMENT"
          description: "Renal dose adjustment for eGFR 30-60"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "egfr"
                operator: ">="
                threshold: 30
                unit: "mL/min"

              - parameter: "egfr"
                operator: "<"
                threshold: 60
                unit: "mL/min"

          primary_medication:
            name: "Cefepime"
            dose: "2"
            dose_unit: "g"
            route: "IV"
            frequency: "q12h"
            dose_adjustment_rationale: "eGFR 30-60: extend interval to q12h"

        - criteria_id: "SEVERE_RENAL_IMPAIRMENT"
          description: "Renal dose adjustment for eGFR 10-30"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "egfr"
                operator: ">="
                threshold: 10
                unit: "mL/min"

              - parameter: "egfr"
                operator: "<"
                threshold: 30
                unit: "mL/min"

          primary_medication:
            name: "Cefepime"
            dose: "1"
            dose_unit: "g"
            route: "IV"
            frequency: "q12h"
            dose_adjustment_rationale: "eGFR 10-30: reduce dose to 1g q12h; monitor for neurotoxicity"

  # Vancomycin for high-risk features (NOT routine)
  - action_id: "NEUTFEVER-ACT-005"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 5

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "HIGH_RISK_GRAM_POSITIVE"
          description: "Add vancomycin only for specific high-risk features"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "skin_soft_tissue_infection"
                operator: "=="
                threshold: true

              - parameter: "catheter_related_infection"
                operator: "=="
                threshold: true

              - parameter: "septic_shock"
                operator: "=="
                threshold: true

              - parameter: "mrsa_colonization"
                operator: "=="
                threshold: true

              - parameter: "severe_mucositis"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Vancomycin"
            dose: "15-20"
            dose_unit: "mg/kg"
            route: "IV"
            frequency: "q8-12h (based on renal function)"
            administration_instructions: "Infuse over 60-90 minutes (minimum 1 hour per gram); target trough 15-20 mg/L"

  # G-CSF for high-risk patients
  - action_id: "NEUTFEVER-ACT-006"
    type: "MEDICATION"
    priority: "MEDIUM"
    sequence_number: 6

    timing:
      window: "ROUTINE"
      max_delay_minutes: 1440  # 24 hours

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "HIGH_RISK_FEATURES"
          description: "G-CSF for MASCC <21, age >65, pneumonia, or invasive fungal infection"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "mascc_score"
                operator: "<"
                threshold: 21

              - parameter: "age"
                operator: ">="
                threshold: 65
                unit: "years"

              - parameter: "pneumonia"
                operator: "=="
                threshold: true

              - parameter: "invasive_fungal_infection"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Filgrastim (G-CSF)"
            dose: "5"
            dose_unit: "mcg/kg"
            route: "Subcutaneous"
            frequency: "Daily"
            duration: "Until ANC >1000-1500 for 2 consecutive days"

  # ICU consultation for severe cases
  - action_id: "NEUTFEVER-ACT-007"
    type: "CONSULTATION"
    priority: "HIGH"
    sequence_number: 7

    timing:
      window: "URGENT"
      max_delay_minutes: 30

    consultation:
      specialty: "CRITICAL_CARE"
      urgency: "URGENT"
      reason: "ICU-level care for neutropenic septic shock"
      specific_questions:
        - "Vasopressor support needed?"
        - "ICU transfer timing?"

# ============================================================
# TIME CONSTRAINTS
# ============================================================
time_constraints:
  - constraint_id: "NEUTFEVER-TIME-001"
    bundle_name: "Hour-1 Antibiotic Bundle"
    description: "Antibiotics MUST start within 1 hour of fever recognition"
    offset_minutes: 60
    critical: true

    required_actions:
      - action_id: "NEUTFEVER-ACT-001"
        description: "Blood cultures (but do NOT delay antibiotics >1h)"
      - action_id: "NEUTFEVER-ACT-004"
        description: "Empiric anti-pseudomonal antibiotic"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 30
      critical_alert_at_minutes: 0
      missed_deadline_message: "CRITICAL: Each hour delay increases mortality by 18% in neutropenic sepsis"

# ============================================================
# CONTRAINDICATIONS
# ============================================================
contraindications:
  - contraindication_id: "NEUTFEVER-CONTRA-001"
    condition_description: "Beta-lactam allergy (anaphylaxis)"

    trigger_condition:
      match_logic: "ALL_OF"
      conditions:
        - parameter: "allergies"
          operator: "CONTAINS"
          threshold: "cephalosporin"

        - parameter: "allergy_severity"
          operator: "=="
          threshold: "SEVERE"

    severity: "CRITICAL"
    affected_actions:
      - "NEUTFEVER-ACT-004"

    alternative_action:
      action_id: "NEUTFEVER-CONTRA-ALT-001"
      type: "MEDICATION"
      medication:
        name: "Aztreonam + Vancomycin"
        dose: "2g aztreonam q8h + 15-20 mg/kg vancomycin q8-12h"
        route: "IV"
      rationale: "Aztreonam provides gram-negative/Pseudomonas coverage without beta-lactam cross-reactivity"

# ============================================================
# MONITORING REQUIREMENTS
# ============================================================
monitoring_requirements:
  - monitoring_id: "NEUTFEVER-MON-001"
    parameter: "vital_signs"

    target_range:
      min: 65  # MAP minimum
      max: null
      unit: "mmHg"

    frequency: "hourly (continuous if unstable or ANC <100)"
    duration_hours: 72

    alert_condition:
      parameter: "mean_arterial_pressure"
      operator: "<"
      threshold: 65

  - monitoring_id: "NEUTFEVER-MON-002"
    parameter: "absolute_neutrophil_count"

    target_range:
      min: 500
      max: null
      unit: "cells/mm³"

    frequency: "daily"
    duration_hours: 168  # Monitor until recovery

# ============================================================
# SPECIAL POPULATIONS
# ============================================================
special_populations:
  - population_id: "ELDERLY"
    description: "Patients ≥65 years"

    inclusion_criteria:
      parameter: "age"
      operator: ">="
      threshold: 65
      unit: "years"

    modifications:
      - action_id: "NEUTFEVER-ACT-004"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Renal function declines with age; monitor closely for neurotoxicity"

        new_parameters:
          monitoring: "Monitor renal function daily; assess for confusion/neurotoxicity; may need dose reduction"

  - population_id: "RENAL_IMPAIRMENT"
    description: "Severe renal impairment (eGFR <30)"

    inclusion_criteria:
      parameter: "egfr"
      operator: "<"
      threshold: 30
      unit: "mL/min"

    modifications:
      - action_id: "NEUTFEVER-ACT-004"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Prevent neurotoxic cefepime accumulation"

        new_parameters:
          dose: "1g q12-24h based on eGFR"
          monitoring: "Monitor for neurotoxicity (confusion, seizures); daily renal function"

  - population_id: "IMMUNOCOMPROMISED"
    description: "Transplant recipients or profound immunosuppression"

    inclusion_criteria:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "transplant_recipient"
          operator: "=="
          threshold: true

        - parameter: "absolute_neutrophil_count"
          operator: "<"
          threshold: 100
          unit: "cells/mm³"

    modifications:
      - action_id: "NEUTFEVER-ACT-004"
        modification_type: "BROADER_COVERAGE"
        rationale: "Higher risk of resistant organisms and fungal infections"

        additional_medications:
          - name: "Antifungal (Voriconazole or Liposomal Amphotericin B)"
            dose: "200 mg q12h (voriconazole)"
            route: "IV"
            indication: "Consider if persistent fever >5-7 days or fungal risk factors"

# ============================================================
# ESCALATION RULES
# ============================================================
escalation_rules:
  - rule_id: "NEUTFEVER-ESC-001"
    description: "ICU transfer for septic shock"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "mean_arterial_pressure"
          operator: "<"
          threshold: 65
          unit: "mmHg"

        - parameter: "lactate"
          operator: ">="
          threshold: 4.0
          unit: "mmol/L"

        - parameter: "absolute_neutrophil_count"
          operator: "<"
          threshold: 100
          unit: "cells/mm³"

    recommendation:
      escalation_level: "ICU_TRANSFER"
      urgency: "IMMEDIATE"
      rationale: "Neutropenic septic shock requires intensive monitoring and vasopressor support"

      required_interventions:
        - "Fluid resuscitation 30 mL/kg"
        - "Vasopressor initiation (norepinephrine)"
        - "Central venous access"
        - "Arterial line for continuous BP monitoring"

  - rule_id: "NEUTFEVER-ESC-002"
    description: "Add antifungal for persistent fever"

    escalation_trigger:
      match_logic: "ALL_OF"
      conditions:
        - parameter: "fever_duration_days"
          operator: ">="
          threshold: 5

        - parameter: "antibiotics_appropriate"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "CONSULT"
      urgency: "URGENT"
      rationale: "Persistent fever after 5 days suggests invasive fungal infection"

      specialist_consultation:
        - specialty: "INFECTIOUS_DISEASE"
          urgency: "URGENT"
          specific_question: "Add antifungal therapy (voriconazole vs amphotericin B); CT imaging for occult infection"

# ============================================================
# DE-ESCALATION CRITERIA
# ============================================================
de_escalation_criteria:
  - criteria_id: "NEUTFEVER-DE-ESC-001"
    description: "Discontinue vancomycin if cultures negative"

    conditions:
      - parameter: "blood_culture_time_hours"
        operator: ">="
        threshold: 48

      - parameter: "blood_culture_result"
        operator: "=="
        threshold: "negative"

      - parameter: "no_resistant_gram_positive"
        operator: "=="
        threshold: true

    recommendation:
      action: "Discontinue vancomycin; continue cefepime monotherapy"
      rationale: "Vancomycin only indicated for culture-positive resistant gram-positive infections"

# ============================================================
# OUTCOME TRACKING
# ============================================================
outcome_tracking:
  primary_outcomes:
    - outcome_id: "NEUTFEVER-OUT-001"
      metric: "time_to_antibiotics"
      target: "<60 minutes in >95% of cases"

    - outcome_id: "NEUTFEVER-OUT-002"
      metric: "defervescence_rate"
      target: ">80% afebrile within 48-72 hours"

  process_measures:
    - measure_id: "NEUTFEVER-PROC-001"
      description: "Blood cultures obtained before antibiotics"
      target: ">95% compliance"

# ============================================================
# METADATA
# ============================================================
metadata:
  protocol_type: "CLINICAL_PATHWAY"
  implementation_complexity: "HIGH"
  requires_icu_level_care: false
  estimated_implementation_time_minutes: 60

  tags:
    - "time-critical"
    - "oncology"
    - "infectious-disease"
    - "one-hour-bundle"

  change_log:
    - version: "2.1"
      date: "2025-10-21"
      changes:
        - "Enhanced to CDS-compliant structure"
        - "Added medication selection with renal dosing algorithms"
        - "Added Hour-1 antibiotic bundle time constraint"
        - "Enhanced special population dosing guidance"
