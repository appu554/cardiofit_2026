# ============================================================
# GI BLEEDING MANAGEMENT PROTOCOL (CDS-COMPLIANT)
# ============================================================
# ACG 2021 Upper GI Bleeding Guidelines
# Laine L, et al. Am J Gastroenterol. 2021;116(5):899-917
# Last Updated: 2025-10-21
# ============================================================

protocol_id: "GI-BLEED-UGIB-001"
name: "Upper GI Bleeding Management Protocol"
category: "GASTROINTESTINAL"
specialty: "GASTROENTEROLOGY"
version: "2.1"
last_updated: "2025-10-21"

# ============================================================
# TRIGGER CRITERIA
# ============================================================
trigger_criteria:
  match_logic: "ANY_OF"

  conditions:
    - condition_id: "UGIB-TRIG-001"
      description: "Clinical evidence of upper GI bleeding"
      match_logic: "ANY_OF"
      conditions:
        - parameter: "hematemesis"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

        - parameter: "coffee_ground_emesis"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

    - condition_id: "UGIB-TRIG-002"
      description: "Melena with significant anemia"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "melena"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

        - parameter: "hemoglobin_drop"
          operator: ">="
          threshold: 2.0
          unit: "g/dL"
          source: "lab_results"

    - condition_id: "UGIB-TRIG-003"
      description: "Hemodynamic instability with suspected UGIB"
      match_logic: "ALL_OF"
      conditions:
        - match_logic: "ANY_OF"
          conditions:
            - parameter: "systolic_bp"
              operator: "<"
              threshold: 100
              unit: "mmHg"
              source: "vital_signs"

            - parameter: "heart_rate"
              operator: ">"
              threshold: 100
              unit: "bpm"
              source: "vital_signs"

            - parameter: "orthostatic_hypotension"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

        - parameter: "suspected_ugib"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

    - condition_id: "UGIB-TRIG-004"
      description: "Severe anemia with UGIB suspicion"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "hemoglobin"
          operator: "<"
          threshold: 7.0
          unit: "g/dL"
          source: "lab_results"

        - parameter: "suspected_ugib"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

# ============================================================
# CONFIDENCE SCORING
# ============================================================
confidence_scoring:
  base_confidence: 0.85

  modifiers:
    - modifier_id: "UGIB-CONF-001"
      description: "Hemodynamic instability increases urgency"
      condition:
        parameter: "systolic_bp"
        operator: "<"
        threshold: 90
        unit: "mmHg"
      adjustment: 0.10

    - modifier_id: "UGIB-CONF-002"
      description: "High Glasgow-Blatchford score"
      condition:
        parameter: "glasgow_blatchford_score"
        operator: ">="
        threshold: 12
      adjustment: 0.08

    - modifier_id: "UGIB-CONF-003"
      description: "Active hematemesis is high-risk feature"
      condition:
        parameter: "active_hematemesis"
        operator: "=="
        threshold: true
      adjustment: 0.07

  activation_threshold: 0.70

# ============================================================
# EVIDENCE SOURCE
# ============================================================
evidence_source:
  primary_guideline: "American College of Gastroenterology (ACG) 2021 Guidelines for Upper GI Bleeding"
  guideline_version: "ACG 2021"
  publication_date: "2021-05"
  evidence_level: "STRONG"

  key_citations:
    - citation_id: "ACG-2021-UGIB"
      authors: "Laine L, Barkun AN, Saltzman JR, et al."
      title: "ACG Clinical Guideline: Upper Gastrointestinal and Ulcer Bleeding"
      journal: "Am J Gastroenterol"
      year: 2021
      pmid: "33929377"
      doi: "10.14309/ajg.0000000000001245"

  last_review_date: "2024-05-01"
  next_review_date: "2026-05-01"

# ============================================================
# ACTIONS
# ============================================================
actions:
  # ==========================================================
  # ACTION 1: HEMODYNAMIC MONITORING AND IV ACCESS
  # ==========================================================
  - action_id: "UGIB-ACT-001"
    type: "CLINICAL_ASSESSMENT"
    priority: "CRITICAL"
    sequence_number: 1

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 15

    clinical_assessment:
      assessment_type: "Hemodynamic monitoring and resuscitation access"
      frequency: "continuous"
      duration_hours: 24
      specific_parameters:
        - "Continuous vital signs (HR, BP, SpO2)"
        - "Establish 2 large-bore IVs (18G or larger)"
        - "Type and crossmatch blood"
        - "Central line placement if shock or massive transfusion anticipated"

  # ==========================================================
  # ACTION 2: FLUID RESUSCITATION
  # ==========================================================
  - action_id: "UGIB-ACT-002"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 2

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 15

    medication:
      name: "0.9% Normal Saline"
      dose: "1000-2000"
      dose_unit: "mL"
      route: "IV"
      frequency: "Bolus, repeat PRN"
      administration_instructions: "Rapid bolus via large-bore IV; reassess after each 500-1000 mL"

  # ==========================================================
  # ACTION 3: BLOOD TRANSFUSION WITH SELECTION ALGORITHM
  # ==========================================================
  - action_id: "UGIB-ACT-003"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 3

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "STANDARD_THRESHOLD"
          description: "Restrictive transfusion strategy (Hgb <7 g/dL)"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "hemoglobin"
                operator: "<"
                threshold: 7.0
                unit: "g/dL"

              - parameter: "active_cardiovascular_disease"
                operator: "=="
                threshold: false

          primary_medication:
            name: "Packed Red Blood Cells (PRBCs)"
            dose: "1"
            dose_unit: "unit"
            route: "IV"
            frequency: "Transfuse 1 unit, recheck Hgb, repeat PRN"
            administration_instructions: "Infuse each unit over 2-4 hours via blood administration set with filter; verify patient identification and blood type match"

        - criteria_id: "CARDIOVASCULAR_DISEASE"
          description: "Higher transfusion threshold for cardiac disease"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "hemoglobin"
                operator: "<"
                threshold: 9.0
                unit: "g/dL"

              - parameter: "active_cardiovascular_disease"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Packed Red Blood Cells (PRBCs)"
            dose: "1"
            dose_unit: "unit"
            route: "IV"
            frequency: "Transfuse to maintain Hgb >9 g/dL"
            dose_adjustment_rationale: "Higher threshold for myocardial oxygen delivery in ACS"

  # ==========================================================
  # ACTION 4: PROTON PUMP INHIBITOR
  # ==========================================================
  - action_id: "UGIB-ACT-004"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 4

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "NO_PPI_ALLERGY"
          description: "Standard high-dose PPI therapy"

          condition:
            parameter: "allergies"
            operator: "NOT_CONTAINS"
            threshold: "pantoprazole"

          primary_medication:
            name: "Pantoprazole"
            generic_name: "Pantoprazole"
            dose: "80"
            dose_unit: "mg"
            route: "IV"
            frequency: "80 mg bolus then 8 mg/hr continuous infusion"
            duration: "72 hours post-endoscopy if high-risk stigmata"
            administration_instructions: "Give 80 mg IV bolus over 2-5 minutes, then start continuous infusion of 8 mg/hr"

          alternative_medication:
            name: "Famotidine"
            dose: "20"
            dose_unit: "mg"
            route: "IV"
            frequency: "q12h"
            indication: "PPI allergy - H2 blocker less effective but acceptable alternative"

  # ==========================================================
  # ACTION 5: PROPHYLACTIC ANTIBIOTICS FOR CIRRHOSIS
  # ==========================================================
  - action_id: "UGIB-ACT-005"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 5

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "CIRRHOSIS_PRESENT"
          description: "Antibiotic prophylaxis for cirrhotic patients"

          condition:
            parameter: "cirrhosis"
            operator: "=="
            threshold: true

          primary_medication:
            name: "Ceftriaxone"
            dose: "1"
            dose_unit: "g"
            route: "IV"
            frequency: "q24h"
            duration: "7 days or until discharge"
            administration_instructions: "Infuse 1 g IV over 30 minutes"

          alternative_medication:
            name: "Ciprofloxacin"
            dose: "400"
            dose_unit: "mg"
            route: "IV"
            frequency: "q12h"
            indication: "Cephalosporin allergy"

  # ==========================================================
  # ACTION 6: LABORATORY ASSESSMENT
  # ==========================================================
  - action_id: "UGIB-ACT-006"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 6

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 30

    diagnostic:
      test_name: "CBC, PT/INR, PTT, Type and Screen"
      test_code: "LOINC-58410-2"
      sample_type: "blood"
      urgency: "STAT"
      instructions: "Obtain before transfusion; must not delay treatment"

      repeat_testing:
        repeat_interval_hours: 6
        repeat_condition:
          parameter: "ongoing_bleeding"
          operator: "=="
          threshold: true

  # ==========================================================
  # ACTION 7: RISK STRATIFICATION
  # ==========================================================
  - action_id: "UGIB-ACT-007"
    type: "CLINICAL_ASSESSMENT"
    priority: "HIGH"
    sequence_number: 7

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    clinical_assessment:
      assessment_type: "Glasgow-Blatchford Score calculation"
      frequency: "once"
      specific_parameters:
        - "BUN, Hgb, BP, HR"
        - "Score ≥12: very high risk (ICU, urgent endoscopy)"
        - "Score 0-1: very low risk (outpatient management)"

  # ==========================================================
  # ACTION 8: ENDOSCOPY CONSULTATION
  # ==========================================================
  - action_id: "UGIB-ACT-008"
    type: "CONSULTATION"
    priority: "HIGH"
    sequence_number: 8

    timing:
      window: "URGENT"
      max_delay_minutes: 720  # 12 hours for high-risk

    consultation:
      specialty: "GASTROENTEROLOGY"
      urgency: "URGENT"
      reason: "Endoscopy for diagnosis and therapeutic intervention"
      specific_questions:
        - "Timing of endoscopy (within 12h for high-risk, 24h for stable)"
        - "Need for endoscopic hemostasis"

# ============================================================
# TIME CONSTRAINTS
# ============================================================
time_constraints:
  - constraint_id: "UGIB-TIME-001"
    bundle_name: "Initial Resuscitation Bundle"
    description: "Critical interventions within first hour"
    offset_minutes: 60
    critical: true

    required_actions:
      - action_id: "UGIB-ACT-001"
        description: "IV access and monitoring"
      - action_id: "UGIB-ACT-002"
        description: "Fluid resuscitation"
      - action_id: "UGIB-ACT-004"
        description: "PPI administration"
      - action_id: "UGIB-ACT-006"
        description: "Laboratory assessment"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 30
      critical_alert_at_minutes: 0
      missed_deadline_message: "Initial resuscitation bundle not completed within 1 hour"

# ============================================================
# CONTRAINDICATIONS
# ============================================================
contraindications:
  - contraindication_id: "UGIB-CONTRA-001"
    condition_description: "Suspected aortoenteric fistula"

    trigger_condition:
      parameter: "aortoenteric_fistula_suspected"
      operator: "=="
      threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "UGIB-ACT-008"

    alternative_action:
      action_id: "UGIB-CONTRA-ALT-001"
      type: "CONSULTATION"
      consultation:
        specialty: "VASCULAR_SURGERY"
        urgency: "STAT"
        reason: "Emergent vascular surgery required; endoscopy may worsen bleeding"

  - contraindication_id: "UGIB-CONTRA-002"
    condition_description: "Jehovah's Witness or blood product refusal"

    trigger_condition:
      parameter: "blood_product_refusal"
      operator: "=="
      threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "UGIB-ACT-003"

    alternative_action:
      action_id: "UGIB-CONTRA-ALT-002"
      type: "MEDICATION"
      medication:
        name: "Aggressive crystalloid resuscitation"
        dose: "30"
        dose_unit: "mL/kg"
        route: "IV"
      rationale: "Maximize intravascular volume without blood products; early endoscopic intervention"

# ============================================================
# MONITORING REQUIREMENTS
# ============================================================
monitoring_requirements:
  - monitoring_id: "UGIB-MON-001"
    parameter: "vital_signs"

    target_range:
      min: 90  # SBP minimum
      max: null
      unit: "mmHg"

    frequency: "q15min until stable, then hourly"
    duration_hours: 24

    alert_condition:
      parameter: "systolic_bp"
      operator: "<"
      threshold: 90

  - monitoring_id: "UGIB-MON-002"
    parameter: "hemoglobin"

    target_range:
      min: 7.0
      max: null
      unit: "g/dL"

    frequency: "q6-8h or PRN"
    duration_hours: 48

    alert_condition:
      parameter: "hemoglobin_drop"
      operator: ">="
      threshold: 2.0

# ============================================================
# SPECIAL POPULATIONS
# ============================================================
special_populations:
  - population_id: "ELDERLY"
    description: "Patients ≥65 years"

    inclusion_criteria:
      parameter: "age"
      operator: ">="
      threshold: 65
      unit: "years"

    modifications:
      - action_id: "UGIB-ACT-002"
        modification_type: "CAUTION"
        rationale: "Increased risk of fluid overload in elderly with cardiac disease"

        new_parameters:
          dose: "500-1000 mL initial bolus (reduced from 1-2L)"
          monitoring: "Reassess volume status after 500 mL; lung exam for rales"

  - population_id: "RENAL_IMPAIRMENT"
    description: "Patients with CKD or AKI"

    inclusion_criteria:
      parameter: "creatinine_clearance"
      operator: "<"
      threshold: 30
      unit: "mL/min"

    modifications:
      - action_id: "UGIB-ACT-005"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Ceftriaxone dose adjustment for severe renal dysfunction"

        new_parameters:
          dose: "1 g (no adjustment for ceftriaxone, but monitor closely)"
          monitoring: "Monitor renal function daily"

  - population_id: "PREGNANCY"
    description: "Pregnant patients"

    inclusion_criteria:
      parameter: "pregnancy_status"
      operator: "=="
      threshold: true

    modifications:
      - action_id: "UGIB-ACT-004"
        modification_type: "CAUTION"
        rationale: "PPIs are Category C in pregnancy - benefits generally outweigh risks in UGIB"

        new_parameters:
          monitoring: "Discuss risk/benefit with patient and OB; PPI generally safe but Category C"

# ============================================================
# ESCALATION RULES
# ============================================================
escalation_rules:
  - rule_id: "UGIB-ESC-001"
    description: "ICU transfer for refractory hypotension"

    escalation_trigger:
      match_logic: "ALL_OF"
      conditions:
        - parameter: "systolic_bp"
          operator: "<"
          threshold: 90
          unit: "mmHg"

        - parameter: "crystalloid_volume"
          operator: ">="
          threshold: 2000
          unit: "mL"

    recommendation:
      escalation_level: "ICU_TRANSFER"
      urgency: "IMMEDIATE"
      rationale: "Persistent hypotension despite resuscitation requires intensive monitoring and vasopressor consideration"

      required_interventions:
        - "Central venous access"
        - "Arterial line for continuous BP monitoring"
        - "Consider vasopressor support"
        - "Urgent endoscopy coordination"

  - rule_id: "UGIB-ESC-002"
    description: "Urgent endoscopy for ongoing bleeding"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "active_hematemesis"
          operator: "=="
          threshold: true

        - parameter: "hemoglobin_drop"
          operator: ">="
          threshold: 2.0

    recommendation:
      escalation_level: "CONSULT"
      urgency: "STAT"
      rationale: "Active bleeding requires urgent endoscopy within 2-6 hours"

      specialist_consultation:
        - specialty: "GASTROENTEROLOGY"
          urgency: "STAT"
          specific_question: "Urgent endoscopy for hemostasis - timing and preparation"

# ============================================================
# DE-ESCALATION CRITERIA
# ============================================================
de_escalation_criteria:
  - criteria_id: "UGIB-DE-ESC-001"
    description: "Transition to oral PPI after IV therapy"

    conditions:
      - parameter: "time_since_endoscopy"
        operator: ">="
        threshold: 72
        unit: "hours"

      - parameter: "no_rebleeding"
        operator: "=="
        threshold: true

    recommendation:
      action: "Transition from IV PPI to oral PPI BID"
      rationale: "72 hours IV PPI for high-risk lesions complete; transition to oral therapy"
      specific_changes:
        - "Discontinue pantoprazole 8 mg/hr infusion"
        - "Start pantoprazole 40 mg PO BID"

  - criteria_id: "UGIB-DE-ESC-002"
    description: "Discontinue antibiotics if no cirrhosis"

    conditions:
      - parameter: "cirrhosis"
        operator: "=="
        threshold: false

    recommendation:
      action: "Do not initiate or discontinue antibiotics"
      rationale: "Antibiotics only indicated for cirrhotic patients with GI bleeding"

# ============================================================
# OUTCOME TRACKING
# ============================================================
outcome_tracking:
  primary_outcomes:
    - outcome_id: "UGIB-OUT-001"
      metric: "hemodynamic_stabilization"
      target: ">90% achieve BP >90/60 within 2 hours"

    - outcome_id: "UGIB-OUT-002"
      metric: "cessation_of_bleeding"
      target: ">85% achieve hemostasis within 24 hours"

  process_measures:
    - measure_id: "UGIB-PROC-001"
      description: "Time to PPI administration"
      target: "<60 minutes from presentation"

    - measure_id: "UGIB-PROC-002"
      description: "Time to endoscopy"
      target: "<24 hours (12 hours for high-risk)"

# ============================================================
# METADATA
# ============================================================
metadata:
  protocol_type: "CLINICAL_PATHWAY"
  implementation_complexity: "HIGH"
  requires_icu_level_care: true
  estimated_implementation_time_minutes: 120

  tags:
    - "time-sensitive"
    - "resuscitation"
    - "hemorrhage"
    - "endoscopy"

  change_log:
    - version: "2.1"
      date: "2025-10-21"
      changes:
        - "Enhanced to CDS-compliant structure"
        - "Added medication selection algorithms"
        - "Added time constraints and bundles"
        - "Enhanced special population considerations"
