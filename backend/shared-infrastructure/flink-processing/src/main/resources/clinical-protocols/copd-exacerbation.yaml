# COPD Exacerbation Management Protocol - GOLD 2024
protocol_id: "COPD-EXACERBATION-001"
name: "COPD Exacerbation Management"
version: "2024.1"
category: "RESPIRATORY"
source: "Global Initiative for Chronic Obstructive Lung Disease (GOLD) 2024"
guideline_reference: "GOLD 2024 Report. Global Strategy for Prevention, Diagnosis and Management of COPD"
last_updated: "2024-01-01"

# Activation criteria - ANY of these conditions triggers the protocol
activation_criteria:
  - condition: "Acute worsening of respiratory symptoms"
    description: "Increase in dyspnea, cough, sputum volume, and/or sputum purulence beyond normal day-to-day variation"
    parameters:
      - "Increased dyspnea (worsening breathlessness)"
      - "Increased sputum production (>50% increase from baseline)"
      - "Increased sputum purulence (green or yellow color change)"
      - "Increased cough frequency or severity"

  - condition: "Objective respiratory compromise"
    description: "Measurable decline in lung function or gas exchange"
    parameters:
      - "SpO2 <90% on room air or <88% in COPD patients"
      - "Respiratory rate >25 breaths/min"
      - "Use of accessory muscles or paradoxical chest wall motion"
      - "New or worsening wheezing or chest tightness"

  - condition: "Severe exacerbation indicators"
    description: "Life-threatening features requiring immediate intervention"
    parameters:
      - "SpO2 <85% despite supplemental oxygen"
      - "Altered mental status or confusion (hypercapnic encephalopathy)"
      - "Respiratory rate >30 or <10 breaths/min"
      - "Hemodynamic instability (HR >110 or <60, BP <90/60)"

# Priority determination based on severity
priority_determination:
  base_priority: "P1_URGENT"
  urgency_factors:
    - condition: "SpO2 <85% OR altered_mental_status OR respiratory_distress"
      priority_modifier: "IMMEDIATE"
      timeframe: "0 minutes"
    - condition: "SpO2 85-88% OR RR >30 OR severe_dyspnea"
      priority_modifier: "URGENT"
      timeframe: "< 15 minutes"
    - condition: "SpO2 88-90% OR increased_symptoms"
      priority_modifier: "URGENT"
      timeframe: "< 30 minutes"
  default_timeframe: "< 1 hour"

# Clinical actions in recommended sequence
actions:
  - action_id: "COPD-ACT-001"
    category: "DIAGNOSTIC"
    sequence_order: 1
    description: "Obtain arterial blood gas (ABG) or venous blood gas (VBG)"
    urgency: "STAT"
    timeframe: "within 15 minutes"
    rationale: "ABG/VBG assesses severity of hypoxemia and hypercapnia, guides oxygen therapy and identifies need for ventilatory support"

    diagnostic_details:
      test_name: "Arterial blood gas (ABG) or venous blood gas (VBG)"
      test_type: "LAB"
      loinc_code: "24336-0 (ABG panel)"
      clinical_indication: "Assess oxygenation, ventilation status, and acid-base balance in COPD exacerbation"
      specimen_requirements:
        - "Arterial sample preferred (radial artery)"
        - "VBG acceptable if ABG not feasible (pH within 0.03 of ABG)"
        - "Ice immediately, analyze within 15 minutes"
        - "Note FiO2 and oxygen delivery method at time of draw"
      expected_findings: "PaO2 <60 mmHg, PaCO2 >50 mmHg (may be >60 in severe), pH <7.35 (respiratory acidosis), bicarbonate elevated (chronic compensation)"
      interpretation_guidance: "Compare to baseline values if available; acute pH drop suggests acute-on-chronic hypercapnia; assess A-a gradient"
      result_timeframe: "10-20 minutes"
      normal_range: "PaO2 80-100 mmHg, PaCO2 35-45 mmHg, pH 7.35-7.45"

    evidence:
      - title: "GOLD 2024 - ABG in COPD Exacerbation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "1.1"
        grade: "Strong recommendation, High evidence"
        summary: "ABG essential for assessing severity and guiding oxygen therapy in COPD exacerbation"

    prerequisite_checks:
      - "Verify adequate collateral circulation (modified Allen test for radial artery)"
      - "Note current oxygen therapy and baseline SpO2"

    monitoring_parameters: "Repeat ABG 30-60 min after oxygen therapy changes or if clinical deterioration; trend PaCO2 and pH"

  - action_id: "COPD-ACT-002"
    category: "DIAGNOSTIC"
    sequence_order: 2
    description: "Obtain chest X-ray"
    urgency: "STAT"
    timeframe: "within 30 minutes"
    rationale: "CXR identifies complications (pneumonia, pneumothorax, pulmonary edema) and alternative diagnoses"

    diagnostic_details:
      test_name: "Portable chest X-ray (AP view)"
      test_type: "IMAGING"
      clinical_indication: "Evaluate for pneumonia, pneumothorax, heart failure, or other complications"
      expected_findings: "Hyperinflation, flattened diaphragms (chronic COPD), possible infiltrates (pneumonia), pneumothorax, or pulmonary edema"
      interpretation_guidance: "Compare to prior imaging if available; look for acute changes suggesting infection or pneumothorax"

    evidence:
      - title: "GOLD 2024 - Imaging in COPD Exacerbation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Strong recommendation, Moderate evidence"
        summary: "CXR recommended to exclude alternative diagnoses and identify complications"

    monitoring_parameters: "Repeat CXR if clinical deterioration or suspected pneumothorax"

  - action_id: "COPD-ACT-003"
    category: "DIAGNOSTIC"
    sequence_order: 3
    description: "Obtain complete blood count (CBC) and basic metabolic panel (BMP)"
    urgency: "STAT"
    timeframe: "within 1 hour"
    rationale: "Lab work identifies infection (elevated WBC), electrolyte abnormalities, and renal function for medication dosing"

    diagnostic_details:
      test_name: "CBC with differential, BMP, consider procalcitonin"
      test_type: "LAB"
      clinical_indication: "Assess for infection, electrolyte abnormalities, renal function"
      expected_findings: "WBC may be elevated (infection) or normal; electrolyte abnormalities common; creatinine elevation with renal dysfunction"
      interpretation_guidance: "Procalcitonin >0.25 ng/mL suggests bacterial infection and supports antibiotic use"

    evidence:
      - title: "GOLD 2024 - Laboratory Testing"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        grade: "Conditional recommendation, Moderate evidence"
        summary: "CBC and BMP aid in assessing severity and guiding treatment decisions"

    monitoring_parameters: "Monitor daily if hospitalized; check renal function before and during antibiotic therapy"

  - action_id: "COPD-ACT-004"
    category: "THERAPEUTIC"
    sequence_order: 4
    description: "Initiate controlled oxygen therapy"
    urgency: "STAT"
    timeframe: "Immediately (within 5 minutes)"
    rationale: "Controlled oxygen prevents hypoxia while avoiding excessive hyperoxia that can worsen hypercapnia by suppressing hypoxic drive"

    medication_details:
      name: "Supplemental oxygen - controlled therapy"
      drug_class: "Medical gas therapy"
      indication: "Hypoxemic COPD exacerbation with SpO2 <88-90%"

      dose_calculation_method: "titration_to_target"
      standard_dose: "Start 1-2 L/min via nasal cannula"
      dose_unit: "L/min"

      route: "Inhalation"
      administration_instructions: "Start low, titrate slowly to target SpO2 88-92%; use Venturi mask for precise FiO2 if needed"
      frequency: "Continuous"
      duration: "Until hypoxemia resolves and underlying cause treated"

      target_spo2: "88-92%"
      target_rationale: "Avoid suppressing hypoxic drive which can worsen hypercapnia; higher targets (>92%) associated with increased mortality in COPD"

      oxygen_delivery_options:
        - method: "Nasal cannula"
          flow_rate: "1-3 L/min"
          approximate_fio2: "24-32%"
          indication: "Mild hypoxemia (SpO2 85-88%)"

        - method: "Venturi mask"
          flow_rate: "Variable (24%, 28%, 31%, 35%, 40% FiO2options)"
          approximate_fio2: "24-40%"
          indication: "Precise FiO2 control, moderate hypoxemia"

        - method: "Non-rebreather mask"
          flow_rate: "10-15 L/min"
          approximate_fio2: "60-95%"
          indication: "AVOID in stable COPD; use only transiently for severe hypoxemia before titrating down"

      adverse_effects:
        - "Hypercapnia from loss of hypoxic drive (if SpO2 >92%)"
        - "Respiratory acidosis worsening (PaCO2 >70, pH <7.25)"
        - "Altered mental status from CO2 narcosis"
        - "Oxygen toxicity with prolonged high FiO2"

      monitoring:
        - "Continuous pulse oximetry (target 88-92%)"
        - "ABG 30-60 min after oxygen initiation to assess PaCO2"
        - "Monitor respiratory rate and mental status"
        - "STOP if SpO2 >92% and PaCO2 rising"

    evidence:
      - title: "GOLD 2024 - Oxygen Therapy in COPD"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "2.1"
        grade: "Strong recommendation, High evidence"
        summary: "Target SpO2 88-92% in COPD exacerbation to prevent hypercapnia"
      - title: "Austin MA, et al. Effect of high flow oxygen on mortality in COPD"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "BMJ. 2010;341:c5462"
        summary: "Controlled oxygen (88-92%) reduced mortality vs high-flow oxygen in pre-hospital COPD"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Severe hypoxemia (SpO2 <80%) requiring immediate high-flow oxygen"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Use high-flow oxygen transiently, reassess ABG within 15 min, prepare for NIV or intubation if PaCO2 rises significantly"

    prerequisite_checks:
      - "Baseline SpO2 and respiratory rate documented"
      - "History of COPD confirmed (if known)"
      - "Check for home oxygen requirement (return to baseline after acute phase)"

    monitoring_parameters: "Continuous SpO2; ABG after 30-60 min; if PaCO2 rises >10 mmHg or pH drops, reduce oxygen and consider NIV"

  - action_id: "COPD-ACT-005"
    category: "MEDICATION"
    sequence_order: 5
    description: "Administer inhaled bronchodilators (short-acting beta-agonist + anticholinergic)"
    urgency: "STAT"
    timeframe: "within 15 minutes"
    rationale: "Bronchodilators are first-line therapy for COPD exacerbation, rapidly improve airflow obstruction and dyspnea"

    medication_details:
      name: "Albuterol (SABA) + Ipratropium (SAMA) combination"
      brand_name: "DuoNeb, Combivent"
      drug_class: "Short-acting beta-2 agonist + Short-acting muscarinic antagonist"
      indication: "Bronchodilation in acute COPD exacerbation"

      dose_calculation_method: "standard_fixed_dose"
      standard_dose: "Albuterol 2.5 mg + Ipratropium 0.5 mg via nebulizer"
      dose_unit: "mg"

      route: "Inhalation (nebulized or MDI with spacer)"
      administration_instructions: "Nebulize with 3-4 mL normal saline over 10-15 minutes; or 4-8 puffs MDI via spacer (albuterol 90 mcg/puff, ipratropium 18 mcg/puff)"
      frequency: "q4h initially, may give q2-4h for first 24 hours if severe, then space to q4-6h"
      duration: "Continue until symptoms resolve and transition to maintenance therapy"

      max_single_dose: "Albuterol 5 mg + Ipratropium 0.5 mg"
      max_daily_dose: "Albuterol 40 mg, Ipratropium 4 mg (practical limit, though no strict ceiling)"

      adverse_effects:
        - "Tachycardia, tremor (albuterol - beta-agonist effects)"
        - "Palpitations, anxiety (albuterol)"
        - "Dry mouth, urinary retention (ipratropium - anticholinergic)"
        - "Paradoxical bronchospasm (rare)"
        - "Hypokalemia (with frequent albuterol dosing)"

      lab_monitoring:
        - "Potassium levels if frequent dosing (>q2h for >24 hours)"
        - "Monitor ECG if cardiac history and tachycardia develops"

    evidence:
      - title: "GOLD 2024 - Bronchodilators in COPD Exacerbation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "3.1"
        grade: "Strong recommendation, High evidence"
        summary: "Short-acting bronchodilators are first-line therapy; combination (SABA+SAMA) superior to either alone"
      - title: "McCrory DC, Brown CD. Inhaled short-acting bronchodilators for COPD exacerbation"
        type: "META_ANALYSIS"
        strength: "STRONG"
        citation: "Cochrane Database Syst Rev. 2003;(1):CD001495"
        summary: "Combination SABA+SAMA improves FEV1 more than either agent alone"

    contraindications:
      - type: "ALLERGY"
        description: "Known hypersensitivity to albuterol, ipratropium, or atropine derivatives"
        severity: "ABSOLUTE"
        alternative_action:
          medication_name: "Levalbuterol (if albuterol allergy) or albuterol alone (if ipratropium allergy)"
          dose: "Levalbuterol 1.25 mg neb q4-6h OR albuterol 2.5 mg neb q4-6h"
          rationale: "Alternative bronchodilator based on specific allergy"

      - type: "CLINICAL_CONDITION"
        description: "Severe tachycardia (HR >130) or unstable cardiac arrhythmias"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Use ipratropium alone (0.5 mg q6h) if beta-agonist contraindicated; monitor cardiac status closely"

      - type: "CLINICAL_CONDITION"
        description: "Narrow-angle glaucoma (relative contraindication for ipratropium)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Use nebulized medication carefully (avoid eye contact) or use MDI; albuterol alone acceptable"

    prerequisite_checks:
      - "Verify no documented allergy to beta-agonists or anticholinergics"
      - "Check baseline heart rate (caution if >120)"
      - "Ensure proper nebulizer or MDI technique"

    required_lab_values:
      - "potassium (if frequent dosing anticipated)"

    monitoring_parameters: "Monitor heart rate, blood pressure, respiratory rate, dyspnea severity (0-10 scale), SpO2; assess response 15-30 min after treatment; monitor for tremor, palpitations"

  - action_id: "COPD-ACT-006"
    category: "MEDICATION"
    sequence_order: 6
    description: "Administer systemic corticosteroids"
    urgency: "URGENT"
    timeframe: "within 1 hour"
    rationale: "Systemic corticosteroids reduce treatment failure, shorten hospital stay, and accelerate recovery in COPD exacerbations"

    medication_details:
      name: "Prednisone (oral) or Methylprednisolone (IV)"
      drug_class: "Systemic corticosteroid"
      indication: "Moderate to severe COPD exacerbation to reduce inflammation and improve lung function"

      dose_calculation_method: "standard_fixed_dose"
      standard_dose: "Prednisone 40 mg PO daily OR Methylprednisolone 125 mg IV initially, then 40 mg IV q6h"
      dose_unit: "mg"

      route: "Oral preferred (PO); IV if unable to take oral or severe exacerbation"
      administration_instructions: "Give with food to reduce GI upset; IV methylprednisolone if NPO or severe distress"
      frequency: "Once daily (prednisone) or divided dosing (methylprednisolone)"
      duration: "5 days total (no taper needed for 5-day course)"

      max_single_dose: "Prednisone 60 mg PO OR Methylprednisolone 125 mg IV"
      max_daily_dose: "Prednisone 60 mg OR Methylprednisolone 500 mg IV (divided)"

      adverse_effects:
        - "Hyperglycemia (monitor blood glucose in diabetics)"
        - "Hypertension (monitor blood pressure)"
        - "Mood changes, insomnia, agitation"
        - "GI upset, peptic ulcer (rare with short course)"
        - "Immunosuppression, increased infection risk"
        - "Hypokalemia (when combined with beta-agonists)"

      lab_monitoring:
        - "Blood glucose daily if diabetic or if glucose >180 mg/dL"
        - "Potassium levels (corticosteroids + beta-agonists can worsen hypokalemia)"
        - "Blood pressure monitoring"

    evidence:
      - title: "GOLD 2024 - Systemic Corticosteroids in COPD Exacerbation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "4.1"
        grade: "Strong recommendation, High evidence"
        summary: "Systemic corticosteroids shorten recovery time and improve lung function; 5-day course equivalent to 14-day course"
      - title: "Leuppi JD, et al. Short-term vs conventional glucocorticoid therapy in COPD"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "JAMA. 2013;309(21):2223-2231"
        summary: "5-day prednisone 40mg equivalent to 14-day course for COPD exacerbation"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Active systemic fungal infection"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Treat infection first; consider corticosteroids only if life-threatening COPD exacerbation"

      - type: "CLINICAL_CONDITION"
        description: "Uncontrolled diabetes (glucose >400 mg/dL)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Control glucose first with insulin; then proceed with corticosteroids if essential; monitor glucose closely"

      - type: "CLINICAL_CONDITION"
        description: "Severe osteoporosis or recent vertebral fracture"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Use lowest effective dose (prednisone 30 mg); short course (5 days) has minimal bone impact"

    prerequisite_checks:
      - "Check blood glucose baseline (especially diabetics)"
      - "Review medication list for drug interactions"
      - "Verify patient can tolerate oral intake (if using PO prednisone)"

    required_lab_values:
      - "glucose"
      - "potassium"

    monitoring_parameters: "Monitor blood glucose daily (target <180 mg/dL); monitor for hyperglycemia, hypertension, mood changes; assess clinical improvement (dyspnea, lung function)"

  - action_id: "COPD-ACT-007"
    category: "MEDICATION"
    sequence_order: 7
    description: "Consider antibiotics if purulent sputum or clinical signs of bacterial infection"
    urgency: "URGENT"
    timeframe: "within 1-2 hours"
    rationale: "Antibiotics reduce treatment failure in COPD exacerbations with purulent sputum (Anthonisen Type I or II criteria)"

    medication_details:
      name: "Azithromycin (first-line) OR Amoxicillin-clavulanate OR Doxycycline"
      drug_class: "Macrolide antibiotic OR Beta-lactam OR Tetracycline"
      indication: "Bacterial infection in COPD exacerbation (purulent sputum, increased sputum volume, increased dyspnea)"

      dose_calculation_method: "standard_fixed_dose"
      standard_dose: "Azithromycin 500 mg PO daily x 5 days OR Amoxicillin-clavulanate 875/125 mg PO BID x 5-7 days OR Doxycycline 100 mg PO BID x 5-7 days"
      dose_unit: "mg"

      route: "Oral (PO); IV only if severe sepsis or unable to tolerate oral"
      administration_instructions: "Azithromycin: once daily; Amox-clav: with food to reduce GI upset; Doxycycline: with food, avoid dairy"
      frequency: "Daily (azithromycin) or BID (amoxicillin-clavulanate, doxycycline)"
      duration: "5 days (azithromycin) or 5-7 days (others)"

      antibiotic_selection_criteria:
        - scenario: "No risk factors, no recent antibiotics"
          recommended: "Azithromycin 500 mg PO daily x 5 days OR Doxycycline 100 mg PO BID x 5-7 days"
          rationale: "Cover typical pathogens (H. influenzae, S. pneumoniae, M. catarrhalis)"

        - scenario: "Recent antibiotic use (<3 months) or frequent exacerbations (>2/year)"
          recommended: "Amoxicillin-clavulanate 875/125 mg PO BID x 5-7 days OR Levofloxacin 750 mg PO daily x 5 days"
          rationale: "Broader coverage for resistant organisms; beta-lactamase producing bacteria"

        - scenario: "Severe exacerbation requiring hospitalization"
          recommended: "Levofloxacin 750 mg PO/IV daily x 5 days OR Ceftriaxone 1g IV daily + Azithromycin 500 mg PO/IV daily"
          rationale: "Hospital-acquired pathogens, pseudomonas risk"

      adverse_effects:
        - "GI upset (nausea, diarrhea) - common with all antibiotics"
        - "QT prolongation (azithromycin) - avoid if QTc >500 ms"
        - "C. difficile colitis (all antibiotics) - monitor for watery diarrhea"
        - "Photosensitivity (doxycycline) - sun protection advised"
        - "Tendon rupture (levofloxacin) - rare but serious"

      lab_monitoring:
        - "Monitor for clinical improvement (sputum color change, fever resolution)"
        - "CBC if prolonged therapy (>7 days)"
        - "Renal function for dose adjustment (if using fluoroquinolones)"

    evidence:
      - title: "GOLD 2024 - Antibiotics in COPD Exacerbation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "5.1"
        grade: "Strong recommendation, Moderate evidence"
        summary: "Antibiotics indicated for COPD exacerbations with purulent sputum (Anthonisen Type I) or severe exacerbations requiring mechanical ventilation"
      - title: "Anthonisen NR, et al. Antibiotic therapy in COPD exacerbations"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "Ann Intern Med. 1987;106(2):196-204"
        summary: "Antibiotics beneficial in Type I exacerbations (all 3 cardinal symptoms including purulent sputum)"

    contraindications:
      - type: "ALLERGY"
        description: "Documented allergy to macrolides"
        severity: "ABSOLUTE"
        alternative_action:
          medication_name: "Amoxicillin-clavulanate OR Doxycycline OR Levofloxacin"
          dose: "Amox-clav 875/125 mg PO BID x 5-7d OR Doxycycline 100 mg PO BID x 5-7d OR Levofloxacin 750 mg daily x 5d"
          rationale: "Alternative antibiotic class for macrolide allergy"

      - type: "CLINICAL_CONDITION"
        description: "QTc prolongation (>500 ms) or concurrent QT-prolonging medications"
        severity: "ABSOLUTE for azithromycin"
        alternative_action:
          medication_name: "Amoxicillin-clavulanate OR Doxycycline"
          dose: "Amox-clav 875/125 mg PO BID x 5-7 days OR Doxycycline 100 mg PO BID x 5-7 days"
          rationale: "Avoid azithromycin if QTc >500 ms; risk of torsades de pointes"

      - type: "ORGAN_DYSFUNCTION"
        description: "Severe renal impairment (CrCl <30 mL/min)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Adjust dose: Levofloxacin 750 mg PO then 500 mg daily; Azithromycin no adjustment needed"

    prerequisite_checks:
      - "Verify antibiotic indication: purulent sputum (green/yellow) OR ≥2 Anthonisen criteria"
      - "Check allergy list for beta-lactam, macrolide, fluoroquinolone allergies"
      - "Review recent antibiotic use (<3 months)"
      - "Assess renal function for dose adjustment"
      - "ECG if azithromycin and cardiac history (check QTc)"

    required_lab_values:
      - "creatinine or eGFR (for fluoroquinolone dosing)"

    monitoring_parameters: "Monitor clinical improvement (sputum color change from purulent to clear, fever resolution); assess for antibiotic side effects (GI upset, rash); monitor for C. diff if diarrhea develops"

  - action_id: "COPD-ACT-008"
    category: "PROCEDURE"
    sequence_order: 8
    description: "Consider non-invasive ventilation (NIV) for persistent hypercapnia or respiratory acidosis"
    urgency: "URGENT"
    timeframe: "within 30-60 minutes if indicated"
    rationale: "NIV reduces mortality, intubation rates, and hospital length of stay in COPD exacerbations with respiratory acidosis"

    procedure_details:
      procedure_name: "Non-invasive positive pressure ventilation (BiPAP)"
      indication: "Persistent respiratory acidosis (pH <7.35, PaCO2 >45) despite optimal medical therapy; severe dyspnea with accessory muscle use"

      settings:
        - mode: "BiPAP"
          ipap: "10-20 cmH2O (start 10, increase by 2 cmH2O increments to target TV 6-8 mL/kg)"
          epap: "4-8 cmH2O (start 4-5, increase for oxygenation)"
          backup_rate: "12-16 breaths/min (set below patient's spontaneous rate)"
          fio2: "Titrate to SpO2 88-92%"

      trial_duration: "1-2 hours with close monitoring"
      success_criteria: "pH normalization (>7.30), PaCO2 reduction, decreased RR (<25), improved dyspnea, patient tolerance"
      failure_criteria: "Worsening pH (<7.25), hemodynamic instability, inability to clear secretions, patient intolerance, no improvement after 2 hours"

    evidence:
      - title: "GOLD 2024 - NIV in COPD Exacerbation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "6.1"
        grade: "Strong recommendation, High evidence"
        summary: "NIV reduces mortality (NNT 10) and intubation rates (NNT 5) in COPD exacerbations with respiratory acidosis"
      - title: "Osadnik CR, et al. Non-invasive ventilation for COPD exacerbation"
        type: "META_ANALYSIS"
        strength: "STRONG"
        citation: "Cochrane Database Syst Rev. 2017;(2):CD004104"
        summary: "NIV reduces mortality (RR 0.48), intubation (RR 0.41), and hospital stay in COPD exacerbations"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Inability to protect airway, impaired consciousness (GCS <10)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Proceed to intubation and mechanical ventilation"

      - type: "CLINICAL_CONDITION"
        description: "Severe hemodynamic instability or cardiac arrest"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Intubate and mechanically ventilate; stabilize hemodynamics"

      - type: "CLINICAL_CONDITION"
        description: "Copious secretions with inability to clear airway"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Consider intubation for airway protection; trial NIV with frequent suctioning if patient cooperative"

      - type: "CLINICAL_CONDITION"
        description: "Facial trauma or burns precluding mask seal"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Intubate if ventilatory support needed"

    prerequisite_checks:
      - "Patient alert and cooperative (able to follow commands)"
      - "Adequate mask fit available"
      - "Hemodynamically stable (no shock)"
      - "ABG showing respiratory acidosis (pH <7.35, PaCO2 >45)"

    monitoring_parameters: "Continuous monitoring for first 1-2 hours: SpO2, HR, BP, RR, mental status, patient tolerance; ABG at 1-2 hours; prepare for intubation if failure criteria met"

  - action_id: "COPD-ACT-009"
    category: "MONITORING"
    sequence_order: 9
    description: "Continuous monitoring and ICU evaluation if severe"
    urgency: "STAT"
    timeframe: "Immediate"
    rationale: "Severe COPD exacerbations require close monitoring for respiratory failure, response to therapy, and potential need for intubation"

    monitoring_parameters: "Continuous pulse oximetry (target 88-92%); vital signs q15-30min initially; respiratory rate and work of breathing; mental status; serial ABGs (q4-6h if on NIV); daily CXR if hospitalized"

    evidence:
      - title: "GOLD 2024 - Monitoring in COPD Exacerbation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Strong recommendation"
        summary: "Close monitoring essential for early detection of treatment failure and need for escalation"

  - action_id: "COPD-ACT-010"
    category: "ESCALATION"
    sequence_order: 10
    description: "ICU consultation for severe exacerbation or NIV failure"
    urgency: "URGENT"
    timeframe: "within 1 hour if criteria met"
    rationale: "Severe COPD exacerbations and NIV failure require ICU-level care for potential intubation and advanced support"

    escalation_criteria:
      - "Severe respiratory acidosis (pH <7.30, PaCO2 >60)"
      - "NIV failure (worsening pH or PaCO2 after 1-2 hours)"
      - "Altered mental status or confusion (hypercapnic encephalopathy)"
      - "Hemodynamic instability requiring vasopressor support"
      - "Refractory hypoxemia (SpO2 <85% despite maximal therapy)"

    evidence:
      - title: "GOLD 2024 - ICU Admission Criteria"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Strong recommendation"
        summary: "ICU admission required for severe acidosis, NIV failure, or altered mental status"

# Overall protocol contraindications
contraindications:
  - type: "GOALS_OF_CARE"
    description: "Comfort measures only (CMO) or hospice status"
    severity: "ABSOLUTE"
    rationale: "Aggressive COPD exacerbation management inconsistent with comfort-focused goals"

  - type: "GOALS_OF_CARE"
    description: "Do not intubate (DNI) orders"
    severity: "RELATIVE"
    rationale: "Bronchodilators, corticosteroids, and NIV still appropriate; clarify goals regarding NIV use"

  - type: "CLINICAL_CONTEXT"
    description: "Pneumothorax (untreated)"
    severity: "ABSOLUTE for NIV"
    rationale: "Positive pressure ventilation can worsen pneumothorax; chest tube required before NIV"

# Monitoring requirements for overall protocol
monitoring_requirements:
  - parameter: "Continuous pulse oximetry"
    frequency: "Continuous"
    target: "SpO2 88-92%"

  - parameter: "Arterial blood gas"
    frequency: "30-60 min after oxygen therapy initiation, then q4-6h if on NIV or severe"
    target: "pH >7.30, PaCO2 improving or stable, PaO2 >60"

  - parameter: "Vital signs"
    frequency: "Every 15-30 min initially, then hourly when stable"
    target: "RR <25, HR <110, BP stable"

  - parameter: "Respiratory rate and work of breathing"
    frequency: "Continuous observation for first 2-4 hours, then hourly"
    target: "RR <25, no accessory muscle use, improved dyspnea"

  - parameter: "Complete blood count"
    frequency: "Baseline, repeat if fever or suspicion of infection"
    target: "Trend WBC if infection suspected"

  - parameter: "Basic metabolic panel"
    frequency: "Daily if hospitalized"
    target: "Monitor electrolytes (especially potassium), renal function"

  - parameter: "Chest X-ray"
    frequency: "Baseline, repeat if clinical deterioration"
    target: "Monitor for pneumonia, pneumothorax, heart failure"

# Escalation criteria for worsening clinical status
escalation_criteria:
  - condition: "Worsening respiratory acidosis (pH <7.30 or PaCO2 >60 despite therapy)"
    action: "Initiate NIV if not already started; ICU consultation; prepare for intubation"
    timeframe: "< 30 minutes"

  - condition: "NIV failure (no improvement or worsening after 1-2 hours)"
    action: "Intubation and mechanical ventilation; ICU transfer"
    timeframe: "< 1 hour"

  - condition: "Altered mental status or depressed consciousness (GCS <10)"
    action: "Emergent intubation; ICU transfer"
    timeframe: "Immediate"

  - condition: "Refractory hypoxemia (SpO2 <85% despite oxygen and NIV)"
    action: "Intubation; evaluate for pneumothorax, pulmonary embolism, pneumonia"
    timeframe: "< 15 minutes"

  - condition: "Hemodynamic instability (shock, severe arrhythmias)"
    action: "ICU transfer; intubation if needed for hemodynamic stabilization"
    timeframe: "Immediate"

  - condition: "Pneumothorax on imaging"
    action: "Chest tube placement (urgently if tension pneumothorax); stop NIV until resolved"
    timeframe: "Immediate for tension PTX, < 1 hour for simple PTX"

# Expected clinical outcomes
expected_outcomes:
  - outcome: "SpO2 88-92% maintained on controlled oxygen"
    timeframe: "30-60 minutes"

  - outcome: "Improved dyspnea and respiratory rate (<25 breaths/min)"
    timeframe: "1-2 hours"

  - outcome: "Stabilization or improvement in ABG (pH >7.30, PaCO2 stable or decreasing)"
    timeframe: "2-4 hours"

  - outcome: "Resolution of acute symptoms (return to baseline dyspnea)"
    timeframe: "24-72 hours"

  - outcome: "Successful NIV weaning (if applicable)"
    timeframe: "24-48 hours"

# Weaning and completion criteria
completion_criteria:
  - "Symptom improvement: dyspnea at or near baseline, improved exercise tolerance"
  - "Stable ABG: pH >7.35, PaCO2 at baseline (if chronic CO2 retention)"
  - "SpO2 88-92% on room air or baseline home oxygen requirement"
  - "Successfully weaned from NIV (if applicable)"
  - "Completed 5-day course of corticosteroids and antibiotics (if indicated)"
  - "Transition to maintenance COPD therapy (long-acting bronchodilators, inhaled corticosteroids)"
  - "Patient education: inhaler technique, smoking cessation, exacerbation action plan"
  - "Follow-up arranged: pulmonary clinic within 1-2 weeks"
