# Diabetic Ketoacidosis (DKA) Management Protocol - ADA 2023
protocol_id: "DKA-MANAGEMENT-001"
name: "Diabetic Ketoacidosis Management Protocol"
version: "2023.1"
category: "ENDOCRINE"
source: "American Diabetes Association 2023 Standards of Care"
guideline_reference: "ADA. Diabetes Care. 2023;46(Suppl 1):S158-S178"
last_updated: "2023-01-01"

# Activation criteria - ALL of these conditions required for DKA diagnosis
activation_criteria:
  - condition: "DKA diagnostic triad met"
    description: "Hyperglycemia, ketosis, and metabolic acidosis"
    parameters:
      - "glucose >250 mg/dL (may be lower in euglycemic DKA)"
      - "arterial_pH <7.3 OR venous_pH <7.25 OR serum_bicarbonate <18 mEq/L"
      - "serum_ketones positive OR urine_ketones positive OR beta-hydroxybutyrate >3 mmol/L"
      - "anion_gap >12 (AG = Na - [Cl + HCO3])"
  - condition: "Severe DKA"
    description: "pH <7.0 or severe acidosis requiring ICU"
    parameters:
      - "arterial_pH <7.0"
      - "bicarbonate <10 mEq/L"
      - "altered_mental_status OR hemodynamic_instability"

# Priority determination based on DKA severity
priority_determination:
  base_priority: "P0_CRITICAL"
  urgency_factors:
    - condition: "Severe DKA: pH <7.0, altered mental status, hypotension"
      priority_modifier: "IMMEDIATE"
      timeframe: "ICU admission, aggressive resuscitation <1 hour"
    - condition: "Moderate DKA: pH 7.0-7.24, bicarbonate <10"
      priority_modifier: "URGENT"
      timeframe: "ICU or step-down unit, insulin infusion within 1-2 hours"
    - condition: "Mild DKA: pH 7.25-7.30, bicarbonate 10-18"
      priority_modifier: "URGENT"
      timeframe: "Monitored unit, insulin therapy within 2-4 hours"
  default_timeframe: "Immediate treatment initiation for all DKA severities"

# Clinical actions in recommended sequence
actions:
  - action_id: "DKA-ACT-001"
    category: "DIAGNOSTIC"
    sequence_order: 1
    description: "Obtain comprehensive metabolic panel, arterial/venous blood gas, ketones"
    urgency: "STAT"
    timeframe: "within 30 minutes of DKA recognition"
    rationale: "Confirm DKA diagnosis, assess severity, and establish baseline for monitoring resolution"

    diagnostic_details:
      test_name: "CMP, ABG or VBG, beta-hydroxybutyrate, serum/urine ketones"
      test_type: "LAB"
      clinical_indication: "Confirm DKA diagnosis (hyperglycemia, acidosis, ketosis, anion gap) and severity"
      expected_findings: "Glucose >250 mg/dL, pH <7.3, HCO3 <18, AG >12, positive ketones, beta-hydroxybutyrate >3 mmol/L, possible hyponatremia/hyperkalemia/hypophosphatemia"
      result_timeframe: "30-60 minutes"
      interpretation_guidance: "Calculate anion gap (Na - [Cl + HCO3]); corrected sodium = measured Na + 1.6 x [(glucose - 100)/100]; assess severity by pH and bicarbonate"

    evidence:
      - title: "ADA 2023 Standards of Care - DKA Diagnosis"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "1.1"
        grade: "Class I, Level B"
        summary: "DKA diagnosis requires hyperglycemia, acidosis, and ketonemia/ketonuria with anion gap >10"

    prerequisite_checks:
      - "Obtain labs immediately; do not delay treatment for results if clinical DKA suspected"

    monitoring_parameters: "Repeat basic metabolic panel and venous pH every 2-4 hours until DKA resolution; beta-hydroxybutyrate if available"

  - action_id: "DKA-ACT-002"
    category: "DIAGNOSTIC"
    sequence_order: 2
    description: "Obtain additional labs: CBC, phosphate, magnesium, urinalysis, ECG"
    urgency: "STAT"
    timeframe: "within 1 hour"
    rationale: "Identify precipitating factors (infection) and electrolyte abnormalities requiring correction"

    diagnostic_details:
      test_name: "CBC with differential, phosphate, magnesium, urinalysis, ECG, consider HbA1c"
      test_type: "LAB"
      clinical_indication: "Identify infection precipitant, assess for electrolyte depletion, monitor for cardiac arrhythmias from electrolyte abnormalities"
      expected_findings: "Leukocytosis (may be stress response or infection), hypophosphatemia/hypomagnesemia (with treatment), ECG may show peaked T waves if hyperkalemic or flat T waves if hypokalemic"

    evidence:
      - title: "ADA 2023 Standards of Care - DKA Evaluation"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        grade: "Class IIa, Level C"
        summary: "Complete laboratory evaluation to identify precipitating factors and complications"

    monitoring_parameters: "Repeat phosphate and magnesium if low; monitor ECG if significant K+ abnormalities"

  - action_id: "DKA-ACT-003"
    category: "MEDICATION"
    sequence_order: 3
    description: "Initiate aggressive IV fluid resuscitation with normal saline"
    urgency: "STAT"
    timeframe: "Immediately (before insulin)"
    rationale: "Fluid resuscitation corrects hypovolemia and tissue hypoperfusion, lowers glucose through dilution and improved renal clearance"

    medication_details:
      name: "0.9% Normal Saline (NS)"
      drug_class: "Crystalloid fluid"
      indication: "Volume resuscitation in DKA with dehydration (typical 3-6L deficit)"

      dose_calculation_method: "weight_based"
      weight_based_formula: "15-20 mL/kg in first hour (typically 1-1.5 L bolus)"
      dose_unit: "mL"

      route: "IV"
      administration_instructions: "Initial: 1-1.5 L NS over 1 hour (15-20 mL/kg); Subsequent: 250-500 mL/hr NS or 0.45% saline based on corrected sodium and hydration status"
      frequency: "Continuous infusion with rate adjustments"
      duration: "Until adequate rehydration (typically 24-48 hours)"

      adverse_effects:
        - "Fluid overload (pulmonary edema, especially in elderly or heart failure patients)"
        - "Hyperchloremic metabolic acidosis (large volume NS)"

      lab_monitoring:
        - "Urine output (goal >0.5 mL/kg/hr)"
        - "Corrected sodium (reassess fluid choice after initial resuscitation)"
        - "Volume status (jugular venous pressure, lung exam, vital signs)"

    evidence:
      - title: "ADA 2023 Standards of Care - Fluid Therapy in DKA"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "2.1"
        grade: "Class I, Level B"
        summary: "Initial fluid therapy with NS 15-20 mL/kg/hr (1-1.5L) in first hour, then adjust based on hydration status and corrected sodium"

    contraindications:
      - type: "ORGAN_DYSFUNCTION"
        description: "Decompensated heart failure or pulmonary edema"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Use smaller boluses (250-500 mL), frequent reassessment, consider central venous pressure monitoring; may require ICU with invasive monitoring"

      - type: "ORGAN_DYSFUNCTION"
        description: "Severe heart failure (EF <30%) or ESRD on dialysis"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Reduce initial fluid volume; close monitoring for volume overload; early nephrology/cardiology consultation"

    prerequisite_checks:
      - "Establish adequate IV access (preferably two large-bore peripheral IVs)"
      - "Baseline lung exam and volume status assessment"
      - "Check for history of heart failure or renal disease"

    monitoring_parameters: "Hourly urine output (Foley catheter recommended), vital signs hourly, lung exam every 4 hours; switch to 0.45% saline if corrected Na high or normal after initial resuscitation"

  - action_id: "DKA-ACT-004"
    category: "MEDICATION"
    sequence_order: 4
    description: "Initiate continuous IV regular insulin infusion"
    urgency: "STAT"
    timeframe: "after initial fluid resuscitation (1-2 hours) AND adequate K+ (>3.3 mEq/L)"
    rationale: "Insulin suppresses ketogenesis, increases glucose utilization, and reverses metabolic acidosis; delay until adequate K+ to avoid life-threatening hypokalemia"

    medication_details:
      name: "Regular Insulin (human insulin)"
      brand_name: "Humulin R, Novolin R"
      drug_class: "Rapid-acting insulin"
      indication: "Suppress ketogenesis and correct hyperglycemia in DKA"

      dose_calculation_method: "weight_based"
      weight_based_formula: "0.1 units/kg/hour IV infusion (no initial bolus per current ADA guidelines)"
      dose_unit: "units/hour"

      route: "IV continuous infusion via pump"
      administration_instructions: "Mix 100 units regular insulin in 100 mL NS (1 unit/mL concentration); start at 0.1 units/kg/hr; adjust to decrease glucose by 50-75 mg/dL/hr"
      frequency: "Continuous infusion with hourly rate adjustments"
      duration: "Until DKA resolution (anion gap <12, pH >7.3, bicarbonate >18), then transition to subcutaneous insulin"

      adverse_effects:
        - "Hypoglycemia (if glucose drops too rapidly or inadequate dextrose added)"
        - "Hypokalemia (insulin drives K+ intracellularly, can be life-threatening)"
        - "Cerebral edema (rare, <1%, primarily in children, associated with rapid glucose correction)"

      lab_monitoring:
        - "Glucose hourly (finger-stick acceptable)"
        - "Potassium every 2-4 hours (critical to prevent hypokalemia)"
        - "Basic metabolic panel and venous pH every 2-4 hours"
        - "Anion gap calculation (monitor for closure)"

    evidence:
      - title: "ADA 2023 Standards of Care - Insulin Therapy in DKA"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "3.1"
        grade: "Class I, Level A"
        summary: "Regular insulin continuous IV infusion at 0.1 units/kg/hr recommended; no bolus needed in most cases"
      - title: "JCEM 2012 - Insulin Bolus vs No Bolus in DKA"
        type: "RESEARCH"
        strength: "MODERATE"
        citation: "J Clin Endocrinol Metab. 2012;97(11):4036-43"
        summary: "No difference in DKA resolution time with or without insulin bolus; continuous infusion alone effective"

    contraindications:
      - type: "ELECTROLYTE"
        description: "Hypokalemia (K+ <3.3 mEq/L)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "HOLD insulin until K+ >3.3 mEq/L; give potassium replacement aggressively (20-40 mEq/hr with continuous cardiac monitoring); insulin will worsen hypokalemia and cause life-threatening arrhythmias"

      - type: "METABOLIC"
        description: "Severe hypophosphatemia (<1.0 mg/dL)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Consider phosphate replacement before insulin if severe hypophosphatemia; monitor closely during treatment"

    prerequisite_checks:
      - "Verify potassium >3.3 mEq/L before starting insulin (CRITICAL)"
      - "Adequate IV fluid resuscitation started (at least 1 hour of fluids first)"
      - "Continuous cardiac monitoring if K+ 3.3-4.0 mEq/L"
      - "Establish hourly glucose monitoring capability"

    required_lab_values:
      - "potassium"
      - "glucose"

    monitoring_parameters: "Glucose hourly (goal decrease 50-75 mg/dL/hr); K+ every 2-4h; when glucose reaches 200-250 mg/dL, add dextrose to IV fluids AND continue insulin (to clear ketones); adjust insulin rate to maintain glucose 150-200 mg/dL until DKA resolves"

  - action_id: "DKA-ACT-005"
    category: "MEDICATION"
    sequence_order: 5
    description: "Potassium repletion and maintenance"
    urgency: "STAT"
    timeframe: "Start with or shortly after insulin infusion"
    rationale: "Insulin drives K+ intracellularly causing precipitous drop in serum K+; aggressive replacement prevents life-threatening hypokalemia and arrhythmias"

    medication_details:
      name: "Potassium chloride (KCl)"
      drug_class: "Electrolyte replacement"
      indication: "Prevent and treat hypokalemia during DKA treatment with insulin"

      dose_calculation_method: "level_based"
      dose_unit: "mEq/hour"

      route: "IV (mixed in NS or 0.45% saline maintenance fluid)"
      administration_instructions: "Add KCl to IV fluids based on serum K+ level; administer via peripheral line if <10 mEq/hr or central line if >10 mEq/hr with cardiac monitoring"
      frequency: "Continuous in IV fluids"
      duration: "Until DKA resolved and patient tolerating PO intake"

      renal_dosing:
        - egfr_range: ">50"
          dose: "20-40 mEq/hr if K+ <3.3; 10-20 mEq/hr if K+ 3.3-4.0"
          adjustment: "Standard dosing"
        - egfr_range: "<50 OR anuric"
          dose: "10-20 mEq/hr maximum; close monitoring"
          adjustment: "Reduce dose in renal failure; monitor K+ more frequently (q2h)"

      adverse_effects:
        - "Hyperkalemia (if excessive replacement or renal failure)"
        - "Cardiac arrhythmias (both hypo- and hyperkalemia)"
        - "Phlebitis (if peripheral concentration >10 mEq/100mL)"

      lab_monitoring:
        - "Potassium every 2-4 hours (initially every 2 hours)"
        - "ECG monitoring continuously if K+ <3.5 or >5.5 mEq/L"
        - "Renal function (creatinine) daily"

    evidence:
      - title: "ADA 2023 Standards of Care - Potassium Replacement in DKA"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "4.1"
        grade: "Class I, Level B"
        summary: "Potassium replacement essential to prevent life-threatening hypokalemia during insulin therapy"

    contraindications:
      - type: "ELECTROLYTE"
        description: "Hyperkalemia (K+ >5.5 mEq/L)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "HOLD potassium supplementation; monitor K+ hourly; insulin therapy will lower K+; recheck K+ before starting insulin if >5.5"

      - type: "ORGAN_DYSFUNCTION"
        description: "Acute kidney injury with anuria"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Reduce potassium supplementation dose; monitor K+ every 2 hours; nephrology consultation for possible dialysis"

    prerequisite_checks:
      - "Initial potassium level known"
      - "Adequate urine output (>0.5 mL/kg/hr) before aggressive K+ replacement"
      - "Continuous cardiac monitoring available if K+ abnormal"

    required_lab_values:
      - "potassium"
      - "creatinine"

    monitoring_parameters: "K+ every 2-4 hours; goal K+ 4-5 mEq/L; add 20-30 mEq KCl per liter of IV fluid once K+ 3.3-5.3; hold K+ if >5.3 or anuric; ECG if K+ <3.3 or >5.5"

  - action_id: "DKA-ACT-006"
    category: "MEDICATION"
    sequence_order: 6
    description: "Add dextrose to IV fluids when glucose reaches 200-250 mg/dL"
    urgency: "URGENT"
    timeframe: "When glucose drops to 200-250 mg/dL (typically 4-8 hours after insulin start)"
    rationale: "Continue insulin to clear ketones while preventing hypoglycemia by providing glucose substrate"

    medication_details:
      name: "Dextrose 5% in 0.45% saline (D5 1/2 NS)"
      drug_class: "IV fluid with dextrose"
      indication: "Prevent hypoglycemia while continuing insulin infusion to clear ketones"

      dose_calculation_method: "fixed_rate"
      standard_dose: "150-250"
      dose_unit: "mL/hour"

      route: "IV"
      administration_instructions: "Switch from NS/0.45% saline to D5 1/2 NS at 150-250 mL/hr when glucose reaches 200-250 mg/dL; continue insulin infusion at 0.05-0.1 units/kg/hr"
      frequency: "Continuous infusion"
      duration: "Until DKA resolution and transition to subcutaneous insulin"

      adverse_effects:
        - "Hyperglycemia (if too much dextrose relative to insulin)"
        - "Prolonged ketoacidosis (if insulin stopped prematurely)"

      lab_monitoring:
        - "Glucose hourly"
        - "Anion gap and ketones every 2-4 hours (ensure closure despite glucose control)"

    evidence:
      - title: "ADA 2023 Standards of Care - Dextrose in DKA Management"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "5.1"
        grade: "Class I, Level B"
        summary: "Add dextrose to IV fluids when glucose <200-250 mg/dL to prevent hypoglycemia while continuing insulin for ketone clearance"

    prerequisite_checks:
      - "Glucose confirmed <250 mg/dL on two consecutive readings"
      - "Insulin infusion running"

    monitoring_parameters: "Maintain glucose 150-200 mg/dL by adjusting dextrose concentration (5-10%) and insulin rate; goal is ketone clearance not just glucose control"

  - action_id: "DKA-ACT-007"
    category: "MEDICATION"
    sequence_order: 7
    description: "Consider sodium bicarbonate only if pH <6.9"
    urgency: "URGENT"
    timeframe: "If pH <6.9 after initial resuscitation"
    rationale: "Severe acidosis (pH <6.9) may impair cardiac contractility and ventilation; bicarbonate controversial but considered in extreme acidosis"

    medication_details:
      name: "Sodium bicarbonate"
      drug_class: "Alkalinizing agent"
      indication: "Severe metabolic acidosis (pH <6.9) in DKA"

      dose_calculation_method: "fixed_dose"
      standard_dose: "100"
      dose_unit: "mEq"

      route: "IV"
      administration_instructions: "100 mEq sodium bicarbonate in 400 mL sterile water with 20 mEq KCl, infuse over 2 hours; repeat if pH remains <7.0"
      frequency: "Every 2 hours until pH >7.0"
      duration: "Until pH >7.0 (typically not needed; insulin and fluids correct acidosis)"

      adverse_effects:
        - "Paradoxical CNS acidosis"
        - "Hypokalemia (bicarbonate drives K+ intracellularly)"
        - "Volume overload (sodium load)"
        - "Possible increased risk of cerebral edema in children"

      lab_monitoring:
        - "Arterial pH every 2 hours"
        - "Potassium every 2 hours (correct hypokalemia first before bicarbonate)"

    evidence:
      - title: "ADA 2023 Standards of Care - Bicarbonate in DKA"
        type: "CLINICAL_GUIDELINE"
        strength: "WEAK"
        grade: "Class IIb, Level C"
        summary: "Bicarbonate therapy not routinely recommended; may consider if pH <6.9 but evidence of benefit lacking"

    contraindications:
      - type: "ELECTROLYTE"
        description: "Hypokalemia (K+ <3.3 mEq/L)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Correct potassium before giving bicarbonate; bicarbonate will worsen hypokalemia"

      - type: "CLINICAL_CONTEXT"
        description: "pH >6.9 or improving acidosis with standard therapy"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Avoid bicarbonate; insulin and fluids will correct acidosis without bicarbonate risks"

    prerequisite_checks:
      - "Arterial pH documented <6.9"
      - "Potassium >3.3 mEq/L"
      - "Patient in ICU setting with close monitoring"

    monitoring_parameters: "Arterial pH every 2 hours; discontinue bicarbonate once pH >7.0; monitor K+ closely"

  - action_id: "DKA-ACT-008"
    category: "MEDICATION"
    sequence_order: 8
    description: "Phosphate replacement if severe hypophosphatemia"
    urgency: "ROUTINE"
    timeframe: "If phosphate <1.0 mg/dL"
    rationale: "Severe hypophosphatemia can cause respiratory failure, cardiac dysfunction, and rhabdomyolysis; routine replacement not recommended"

    medication_details:
      name: "Potassium phosphate"
      drug_class: "Electrolyte replacement"
      indication: "Severe hypophosphatemia (<1.0 mg/dL) in DKA"

      dose_calculation_method: "fixed_dose"
      standard_dose: "20-30"
      dose_unit: "mmol"

      route: "IV (mixed in maintenance fluids)"
      administration_instructions: "Can substitute potassium phosphate for potassium chloride in IV fluids (1 mmol phosphate = 1.5 mEq K+); max rate 4.5 mmol/hr"
      frequency: "Continuous in IV fluids"
      duration: "Until phosphate >1.5 mg/dL and patient tolerating PO"

      adverse_effects:
        - "Hypocalcemia (phosphate binds calcium)"
        - "Hyperphosphatemia (if excessive replacement)"
        - "Metastatic calcification (calcium-phosphate precipitation)"

      lab_monitoring:
        - "Phosphate every 4-6 hours if replacing"
        - "Calcium (ionized preferred) if giving phosphate"
        - "Magnesium (often low with hypophosphatemia)"

    evidence:
      - title: "ADA 2023 Standards of Care - Phosphate in DKA"
        type: "CLINICAL_GUIDELINE"
        strength: "WEAK"
        grade: "Class IIb, Level C"
        summary: "Routine phosphate replacement not recommended; consider if severe hypophosphatemia (<1.0 mg/dL) or risk factors for cardiac/respiratory dysfunction"

    contraindications:
      - type: "ELECTROLYTE"
        description: "Hyperphosphatemia or hypocalcemia"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Avoid phosphate if already elevated or calcium low; may precipitate calcium-phosphate complexes"

      - type: "ORGAN_DYSFUNCTION"
        description: "Severe renal dysfunction (CrCl <30 mL/min)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Reduce dose or avoid phosphate in renal failure; high risk of hyperphosphatemia"

    prerequisite_checks:
      - "Baseline phosphate, calcium, magnesium levels"
      - "Assess for cardiac or respiratory dysfunction"

    monitoring_parameters: "Phosphate, calcium, magnesium every 4-6 hours if replacing; stop when phosphate >1.5 mg/dL"

  - action_id: "DKA-ACT-009"
    category: "MONITORING"
    sequence_order: 9
    description: "Intensive monitoring and assessment for complications"
    urgency: "STAT"
    timeframe: "Continuous throughout DKA treatment"
    rationale: "Early detection of complications (cerebral edema, hypokalemia, hypoglycemia) allows rapid intervention"

    monitoring_parameters: "Hourly: glucose, vital signs, fluid I/O, mental status; Every 2-4h: K+, Na, Cl, HCO3, anion gap, venous pH; Every 4-6h: phosphate, magnesium; Continuous: cardiac monitor if K+ abnormal or arrhythmias"

    evidence:
      - title: "ADA 2023 Standards of Care - DKA Monitoring"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Class I, Level C"
        summary: "Frequent monitoring of glucose, electrolytes, and acid-base status essential during DKA treatment"

  - action_id: "DKA-ACT-010"
    category: "ESCALATION"
    sequence_order: 10
    description: "Assess for cerebral edema (especially in children and young adults)"
    urgency: "URGENT"
    timeframe: "Continuous vigilance during first 24 hours"
    rationale: "Cerebral edema is rare (<1%) but life-threatening complication, primarily in children; early recognition and treatment crucial"

    escalation_criteria:
      - "Severe headache or change in mental status (lethargy, irritability)"
      - "Recurrent vomiting after initial improvement"
      - "Bradycardia with hypertension (Cushing's triad)"
      - "Seizures or focal neurological deficits"
      - "Sudden deterioration in Glasgow Coma Scale"

    evidence:
      - title: "ADA 2023 Standards of Care - Cerebral Edema in DKA"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        grade: "Class IIa, Level C"
        summary: "High index of suspicion for cerebral edema in children with DKA; immediate treatment with mannitol or hypertonic saline if suspected"

    monitoring_parameters: "Mental status assessment hourly; if cerebral edema suspected: STAT head CT, mannitol 0.5-1 g/kg IV or 3% saline 2.5-5 mL/kg over 10-15 min, neurosurgery consult"

# Overall protocol contraindications
contraindications:
  - type: "DIAGNOSIS"
    description: "Hyperglycemic hyperosmolar state (HHS) without ketoacidosis"
    severity: "RELATIVE"
    rationale: "Different management with more cautious fluid resuscitation and lower insulin doses"

  - type: "GOALS_OF_CARE"
    description: "Comfort measures only or hospice status"
    severity: "ABSOLUTE"
    rationale: "Aggressive DKA management inconsistent with comfort-focused goals"

# Monitoring requirements for overall protocol
monitoring_requirements:
  - parameter: "Glucose"
    frequency: "Hourly (finger-stick acceptable)"
    target: "Decrease 50-75 mg/dL/hr initially, then maintain 150-200 mg/dL until DKA resolves"

  - parameter: "Potassium"
    frequency: "Every 2-4 hours"
    target: "Maintain 4-5 mEq/L throughout treatment"

  - parameter: "Anion gap"
    frequency: "Every 2-4 hours (calculate from basic metabolic panel)"
    target: "Closure to <12 indicates DKA resolution"

  - parameter: "Venous pH or arterial pH"
    frequency: "Every 2-4 hours"
    target: "pH >7.3 indicates DKA resolution"

  - parameter: "Bicarbonate"
    frequency: "Every 2-4 hours (from basic metabolic panel)"
    target: ">18 mEq/L indicates DKA resolution"

  - parameter: "Beta-hydroxybutyrate"
    frequency: "Every 4-6 hours if available"
    target: "<0.6 mmol/L indicates resolution (most accurate marker)"

  - parameter: "Fluid input/output"
    frequency: "Hourly"
    target: "Urine output >0.5 mL/kg/hr; positive balance first 12-24h then neutral"

  - parameter: "Vital signs"
    frequency: "Hourly"
    target: "Normalization of HR, BP; temperature (assess for infection)"

  - parameter: "Mental status"
    frequency: "Hourly"
    target: "Improving mental status; watch for cerebral edema signs"

# Escalation criteria for worsening clinical status or complications
escalation_criteria:
  - condition: "Hypokalemia (K+ <3.3 mEq/L)"
    action: "HOLD insulin immediately, give potassium 20-40 mEq/hr IV with continuous cardiac monitoring, recheck K+ every 1-2 hours"
    timeframe: "Immediate"

  - condition: "Suspected cerebral edema (headache, vomiting, altered mental status, bradycardia)"
    action: "STAT head CT, mannitol 0.5-1 g/kg IV or 3% saline 2.5-5 mL/kg IV, elevate head of bed, neurosurgery consult, reduce IV fluid rate"
    timeframe: "Immediate"

  - condition: "Hypoglycemia (glucose <70 mg/dL)"
    action: "Give dextrose 25-50 mL D50 IV push, increase dextrose concentration in fluids, reduce insulin rate, recheck glucose in 15 minutes"
    timeframe: "Immediate"

  - condition: "Persistent or worsening acidosis despite treatment"
    action: "Reassess for sepsis or other precipitant, check insulin infusion running properly, consider occult infection, lactate level for lactic acidosis"
    timeframe: "Within 1-2 hours"

  - condition: "Cardiac arrhythmias"
    action: "12-lead ECG, check potassium and magnesium STAT, correct electrolytes aggressively, continuous telemetry monitoring"
    timeframe: "Immediate"

  - condition: "Respiratory distress or hypoxemia"
    action: "Arterial blood gas, chest X-ray, assess for pulmonary edema from excessive fluids or aspiration pneumonia, reduce fluid rate, supplemental O2"
    timeframe: "Within 30 minutes"

# Expected clinical outcomes
expected_outcomes:
  - outcome: "Anion gap closure to <12"
    timeframe: "12-24 hours (average DKA resolution time)"

  - outcome: "pH normalization to >7.3"
    timeframe: "12-24 hours"

  - outcome: "Bicarbonate increase to >18 mEq/L"
    timeframe: "12-24 hours"

  - outcome: "Glucose controlled 150-200 mg/dL"
    timeframe: "4-8 hours"

  - outcome: "Ketones cleared (beta-hydroxybutyrate <0.6 mmol/L)"
    timeframe: "12-24 hours"

  - outcome: "Mental status normalized"
    timeframe: "6-12 hours"

# DKA resolution criteria and transition to subcutaneous insulin
completion_criteria:
  - "DKA resolved: anion gap <12 AND pH >7.3 AND bicarbonate >18 mEq/L"
  - "Patient able to eat and tolerate oral intake"
  - "No nausea or vomiting for >4 hours"
  - "Transition to subcutaneous insulin: give first SC insulin dose 1-2 hours BEFORE stopping IV insulin (to prevent rebound ketoacidosis)"
  - "Calculate total daily insulin dose: typically 0.5-0.8 units/kg/day (higher if insulin-resistant)"
  - "Split as 50% basal (long-acting) + 50% prandial (rapid-acting before meals)"
  - "Continue hourly glucose monitoring for 4-6 hours after stopping IV insulin"
  - "Identify and treat precipitating factor (infection, medication non-adherence, new diabetes diagnosis)"
  - "Diabetes education: insulin administration, glucose monitoring, sick day management, ketone testing"
  - "Endocrinology follow-up within 1-2 weeks; primary care follow-up within 1 week"
