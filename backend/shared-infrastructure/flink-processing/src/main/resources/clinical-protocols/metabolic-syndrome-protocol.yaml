# Metabolic Syndrome Management Protocol - AHA/NHLBI 2005
protocol_id: "METABOLIC-SYNDROME-001"
name: "Metabolic Syndrome Comprehensive Management"
version: "2005.1"
category: "ENDOCRINE_METABOLIC"
source: "AHA/NHLBI Scientific Statement on Metabolic Syndrome"
guideline_reference: "Grundy SM, et al. Circulation. 2005;112(17):2735-52"
last_updated: "2005-09-27"

# Activation criteria - ANY of these conditions triggers the protocol
activation_criteria:
  - condition: "metabolic_syndrome_criteria >= 3"
    description: "Metabolic syndrome defined by presence of 3 or more ATP III criteria"
    parameters:
      - "waist_circumference > 40 inches (men) OR > 35 inches (women)"
      - "triglycerides >= 150 mg/dL"
      - "HDL < 40 mg/dL (men) OR < 50 mg/dL (women)"
      - "blood_pressure >= 130/85 mmHg OR on_antihypertensive_medication"
      - "fasting_glucose >= 100 mg/dL OR on_antidiabetic_medication"
  - condition: "high_cardiovascular_risk AND metabolic_risk_factors >= 2"
    description: "High-risk patients with multiple metabolic abnormalities"
    parameters:
      - "10_year_ASCVD_risk > 10%"
      - "family_history_premature_CVD"
      - "BMI >= 30"

# Priority determination based on severity
priority_determination:
  base_priority: "P4_SEMI_URGENT"
  urgency_factors:
    - condition: "metabolic_syndrome_criteria >= 4"
      priority_modifier: "URGENT"
      timeframe: "< 2 weeks"
    - condition: "fasting_glucose >= 126 mg/dL (diabetes) OR HbA1c >= 6.5%"
      priority_modifier: "URGENT"
      timeframe: "< 1 week"
    - condition: "10_year_ASCVD_risk >= 20%"
      priority_modifier: "URGENT"
      timeframe: "< 1 week"
    - condition: "metabolic_syndrome_criteria = 3"
      priority_modifier: "SEMI_URGENT"
      timeframe: "< 4 weeks"
  default_timeframe: "< 4 weeks"

# Clinical actions in recommended sequence
actions:
  - action_id: "METS-ACT-001"
    category: "DIAGNOSTIC"
    sequence_order: 1
    description: "Complete metabolic syndrome assessment panel"
    urgency: "SEMI_URGENT"
    timeframe: "within 2 weeks"
    rationale: "Comprehensive laboratory evaluation establishes metabolic syndrome diagnosis and quantifies cardiovascular risk"

    diagnostic_details:
      test_name: "Metabolic syndrome comprehensive panel"
      test_type: "LAB"
      clinical_indication: "Diagnose metabolic syndrome and assess cardiovascular risk factors"
      expected_findings: "Elevated triglycerides, low HDL, elevated glucose, possible elevated LDL, elevated HbA1c"
      interpretation_guidance: "≥3 criteria define metabolic syndrome; calculate 10-year ASCVD risk; assess for prediabetes (FG 100-125) or diabetes (FG ≥126)"
      result_timeframe: "24-48 hours"
      normal_range: "TG <150 mg/dL, HDL >40/>50 mg/dL (M/F), FG <100 mg/dL, BP <130/85 mmHg"

    evidence:
      - title: "AHA/NHLBI 2005 - Metabolic Syndrome Diagnosis"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "2.1"
        grade: "1A"
        summary: "ATP III criteria for metabolic syndrome diagnosis using waist circumference, triglycerides, HDL, BP, and glucose"

    prerequisite_checks:
      - "Fasting 8-12 hours before laboratory draw"
      - "Measure waist circumference at iliac crest (not at belt line)"
      - "Obtain accurate blood pressure (seated, appropriate cuff size)"

    monitoring_parameters: "Repeat lipid panel and glucose every 3-6 months during intervention; annual reassessment once stable"

  - action_id: "METS-ACT-002"
    category: "DIAGNOSTIC"
    sequence_order: 2
    description: "Calculate 10-year ASCVD risk and assess cardiovascular risk factors"
    urgency: "SEMI_URGENT"
    timeframe: "within 2 weeks"
    rationale: "ASCVD risk calculation guides intensity of lipid and blood pressure management"

    diagnostic_details:
      test_name: "10-year ASCVD risk calculation"
      test_type: "RISK_ASSESSMENT"
      clinical_indication: "Quantify cardiovascular disease risk to guide therapy intensity"
      expected_findings: "ASCVD risk typically 10-20% in metabolic syndrome patients; may be >20% with multiple risk factors"
      interpretation_guidance: "<5% low risk, 5-7.5% borderline, 7.5-20% intermediate, >20% high risk; metabolic syndrome is risk enhancer"

    evidence:
      - title: "ACC/AHA 2019 Cholesterol Guidelines - Risk Assessment"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "3.1"
        grade: "1A"
        summary: "Use Pooled Cohort Equations to estimate 10-year ASCVD risk; metabolic syndrome is risk-enhancing factor"

    monitoring_parameters: "Recalculate ASCVD risk annually or with significant risk factor changes"

  - action_id: "METS-ACT-003"
    category: "LIFESTYLE"
    sequence_order: 3
    description: "Intensive lifestyle modification counseling: diet, exercise, weight loss"
    urgency: "URGENT"
    timeframe: "within 2 weeks (initial counseling)"
    rationale: "Lifestyle intervention is first-line therapy; 7-10% weight loss significantly improves all metabolic syndrome components"

    diagnostic_details:
      test_name: "Therapeutic lifestyle changes program"
      test_type: "LIFESTYLE_INTERVENTION"
      clinical_indication: "Primary therapy for metabolic syndrome; targets weight reduction, improved diet, increased physical activity"
      expected_findings: "7-10% weight loss goal, 150 minutes/week moderate exercise, Mediterranean or DASH diet pattern"
      interpretation_guidance: "Weight loss of 5-10% improves insulin sensitivity, BP, lipids; exercise improves HDL and triglycerides independently of weight loss"

    evidence:
      - title: "AHA/NHLBI 2005 - Lifestyle as Primary Treatment"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "4.1"
        grade: "1A"
        summary: "Weight reduction and increased physical activity are primary interventions for metabolic syndrome"
      - title: "DPP Research Group. Reduction in diabetes incidence with lifestyle intervention"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "N Engl J Med. 2002;346(6):393-403"
        summary: "Lifestyle intervention reduced diabetes incidence by 58% vs. 31% with metformin in prediabetic patients"

    prerequisite_checks:
      - "Assess readiness for behavior change (motivational interviewing)"
      - "Screen for barriers (food insecurity, physical limitations, depression)"
      - "Consider referral to registered dietitian and exercise physiologist"

    monitoring_parameters: "Weight monthly for first 3 months, then quarterly; exercise logs; dietary recall; consider continuous glucose monitoring if prediabetic"

  - action_id: "METS-ACT-004"
    category: "MEDICATION"
    sequence_order: 4
    description: "Initiate metformin for prediabetes or metabolic syndrome with obesity"
    urgency: "SEMI_URGENT"
    timeframe: "within 4 weeks if lifestyle intervention insufficient"
    rationale: "Metformin reduces diabetes progression by 31% in prediabetic patients; improves insulin sensitivity and weight"

    medication_details:
      name: "Metformin"
      brand_name: "Glucophage"
      drug_class: "Biguanide, insulin sensitizer"
      indication: "Prediabetes (fasting glucose 100-125 mg/dL or HbA1c 5.7-6.4%) with BMI ≥35 OR age <60 OR history of gestational diabetes"

      dose_calculation_method: "titration_based"
      standard_dose: "500"
      dose_unit: "mg"
      dose_range: "500-2000"

      route: "PO"
      administration_instructions: "Start 500mg PO once daily with dinner; increase by 500mg weekly as tolerated to target 1000mg BID or 2000mg daily; use extended-release formulation to reduce GI side effects"
      frequency: "BID (or once daily if extended-release)"
      duration: "Long-term (years); continue as long as prediabetes persists and medication tolerated"

      max_single_dose: "1000 mg"
      max_daily_dose: "2550 mg (typically limit to 2000mg)"

      adverse_effects:
        - "Gastrointestinal distress (diarrhea, nausea, abdominal discomfort in 30%)"
        - "Vitamin B12 deficiency (with long-term use, check annually)"
        - "Lactic acidosis (rare, <0.03 cases/1000 patient-years, avoid if eGFR <30)"
        - "Metallic taste"

      lab_monitoring:
        - "Baseline: creatinine, eGFR, liver function tests"
        - "HbA1c every 3-6 months (goal <5.7% to prevent diabetes progression)"
        - "Fasting glucose every 3 months"
        - "Vitamin B12 annually after 1 year"
        - "Renal function (creatinine, eGFR) every 6-12 months"

    evidence:
      - title: "ADA 2021 Standards of Care - Metformin for Prediabetes"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        recommendation: "3.4"
        grade: "2A"
        summary: "Metformin should be considered for prediabetes prevention, especially in those with BMI ≥35, age <60, or prior gestational diabetes"
      - title: "DPP Research Group. Long-term effects of metformin on diabetes prevention"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "Lancet. 2009;374(9702):1677-86"
        summary: "Metformin reduced diabetes incidence by 31% over 10 years; most effective in younger, more obese patients"

    contraindications:
      - type: "ORGAN_DYSFUNCTION"
        description: "Severe renal impairment (eGFR <30 mL/min/1.73m²)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Discontinue metformin; focus on lifestyle intervention; consider alternative agents like GLP-1 agonist if diabetes develops"

      - type: "ORGAN_DYSFUNCTION"
        description: "Acute or chronic metabolic acidosis, diabetic ketoacidosis"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Metformin contraindicated in acidotic states; treat underlying condition first"

      - type: "CLINICAL_CONTEXT"
        description: "Contrast dye study planned (hold metformin 48 hours before and after)"
        severity: "TEMPORARY"
        alternative_action:
          clinical_guidance: "Hold metformin 48 hours before contrast procedure; resume 48 hours after if renal function stable"

      - type: "ORGAN_DYSFUNCTION"
        description: "Moderate renal impairment (eGFR 30-45 mL/min/1.73m²)"
        severity: "RELATIVE"
        alternative_action:
          medication_name: "Metformin (reduced dose)"
          dose: "500"
          dose_unit: "mg"
          frequency: "once daily, max 1000mg/day"
          rationale: "Reduce dose to 50% in moderate renal impairment; monitor renal function closely"

    prerequisite_checks:
      - "Check baseline creatinine and eGFR (must be >30 mL/min/1.73m²)"
      - "Confirm prediabetes diagnosis (fasting glucose 100-125 mg/dL OR HbA1c 5.7-6.4%)"
      - "Assess for contraindications (renal dysfunction, liver disease, heart failure)"
      - "Document lifestyle intervention attempted or concurrent"

    required_lab_values:
      - "creatinine"
      - "eGFR"
      - "fasting_glucose OR HbA1c"

    monitoring_parameters: "HbA1c every 3-6 months; assess for diabetes progression (FG ≥126 or HbA1c ≥6.5%); monitor GI tolerance; check B12 annually"

  - action_id: "METS-ACT-005"
    category: "MEDICATION"
    sequence_order: 5
    description: "Initiate statin therapy for dyslipidemia"
    urgency: "URGENT"
    timeframe: "within 4 weeks if ASCVD risk ≥7.5% or LDL ≥100 mg/dL"
    rationale: "Metabolic syndrome patients have high cardiovascular risk; statin reduces ASCVD events by 25-35%"

    medication_details:
      name: "Atorvastatin"
      brand_name: "Lipitor"
      drug_class: "HMG-CoA reductase inhibitor (statin)"
      indication: "Metabolic syndrome with ASCVD risk ≥7.5% OR LDL ≥100 mg/dL with risk enhancers"

      dose_calculation_method: "risk_based"
      standard_dose: "10-20"
      dose_unit: "mg"
      dose_range: "10-80"

      route: "PO"
      administration_instructions: "Take once daily at any time of day; 10-20mg for moderate-intensity, 40-80mg for high-intensity LDL lowering"
      frequency: "once daily"
      duration: "Long-term (indefinite for primary prevention in metabolic syndrome)"

      max_single_dose: "80 mg"
      max_daily_dose: "80 mg"

      adverse_effects:
        - "Myalgia (muscle aches in 10-15%, usually mild)"
        - "Elevated liver enzymes (transient, <3%)"
        - "Rhabdomyolysis (rare, <0.1%, risk increased with high-dose or drug interactions)"
        - "New-onset diabetes (10-12% increase in diabetes risk, outweighed by CV benefit)"
        - "Cognitive concerns (not supported by evidence)"

      lab_monitoring:
        - "Baseline lipid panel, liver function tests"
        - "Lipid panel 4-12 weeks after initiation (goal LDL reduction ≥30-50%)"
        - "Liver enzymes NOT routinely monitored unless symptomatic"
        - "CK only if muscle symptoms develop"
        - "Repeat lipid panel every 3-12 months"

    evidence:
      - title: "ACC/AHA 2019 Cholesterol Guidelines - Statin for Primary Prevention"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "5.1"
        grade: "1A"
        summary: "Moderate-to-high intensity statin for adults 40-75 with ASCVD risk ≥7.5%; metabolic syndrome is risk enhancer"
      - title: "Cholesterol Treatment Trialists. Efficacy of statin therapy"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "Lancet. 2010;376(9753):1670-81"
        summary: "Statin reduces major vascular events by ~25% per 1 mmol/L LDL reduction"

    contraindications:
      - type: "ORGAN_DYSFUNCTION"
        description: "Active liver disease or persistent transaminase elevation >3x ULN"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Defer statin until liver disease resolves; consider ezetimibe or PCSK9 inhibitor if very high risk"

      - type: "PREGNANCY"
        description: "Pregnancy or planning pregnancy"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Discontinue statin; lipid management deferred during pregnancy; use bile acid sequestrants if needed"

      - type: "ALLERGY"
        description: "Statin-associated muscle symptoms or confirmed statin intolerance"
        severity: "RELATIVE"
        alternative_action:
          medication_name: "Rosuvastatin (alternative statin) OR Ezetimibe"
          dose: "5mg rosuvastatin OR 10mg ezetimibe"
          frequency: "once daily"
          rationale: "Try alternative statin at low dose; if intolerant to all statins, use ezetimibe (non-statin LDL-lowering)"

    prerequisite_checks:
      - "Calculate 10-year ASCVD risk (statin recommended if ≥7.5%)"
      - "Check baseline lipid panel (LDL, HDL, triglycerides, total cholesterol)"
      - "Baseline liver function tests"
      - "Assess for pregnancy (women of childbearing age)"
      - "Review drug interactions (fibrates, cyclosporine, HIV protease inhibitors)"

    required_lab_values:
      - "LDL_cholesterol"
      - "ALT"
      - "AST"

    monitoring_parameters: "Lipid panel 4-12 weeks after initiation (goal ≥30-50% LDL reduction); assess for muscle symptoms at each visit; repeat lipids every 3-12 months"

  - action_id: "METS-ACT-006"
    category: "MEDICATION"
    sequence_order: 6
    description: "Initiate ACE inhibitor or ARB for hypertension (BP ≥130/85)"
    urgency: "URGENT"
    timeframe: "within 4 weeks if BP ≥130/85 mmHg"
    rationale: "ACE inhibitors/ARBs lower blood pressure and provide cardiorenal protection in metabolic syndrome"

    medication_details:
      name: "Lisinopril"
      brand_name: "Prinivil, Zestril"
      drug_class: "Angiotensin-converting enzyme (ACE) inhibitor"
      indication: "Hypertension in metabolic syndrome (BP ≥130/85 mmHg)"

      dose_calculation_method: "titration_based"
      standard_dose: "10"
      dose_unit: "mg"
      dose_range: "10-40"

      route: "PO"
      administration_instructions: "Start 10mg PO once daily; titrate by 10mg every 2-4 weeks to achieve BP <130/80 mmHg; max 40mg daily"
      frequency: "once daily"
      duration: "Long-term (indefinite for hypertension management)"

      max_single_dose: "40 mg"
      max_daily_dose: "40 mg"

      adverse_effects:
        - "Dry cough (10-20%, due to bradykinin accumulation)"
        - "Hyperkalemia (especially with renal insufficiency or concurrent potassium-sparing diuretics)"
        - "Angioedema (rare, <0.5%, can be life-threatening)"
        - "Acute kidney injury (with bilateral renal artery stenosis or volume depletion)"
        - "First-dose hypotension (especially if volume depleted)"

      lab_monitoring:
        - "Baseline creatinine, eGFR, potassium"
        - "Recheck creatinine and potassium 1-2 weeks after initiation or dose increase"
        - "Blood pressure at every visit (goal <130/80 mmHg)"
        - "Monitor potassium and creatinine every 6-12 months"

    evidence:
      - title: "ACC/AHA 2017 Hypertension Guidelines - BP Targets"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "7.1"
        grade: "1A"
        summary: "BP target <130/80 mmHg for most adults; ACE inhibitors/ARBs first-line in diabetes or CKD"
      - title: "HOPE Study. Effects of ramipril on cardiovascular outcomes"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "N Engl J Med. 2000;342(3):145-53"
        summary: "ACE inhibitor reduced MI, stroke, and CV death by 22% in high-risk patients"

    contraindications:
      - type: "PREGNANCY"
        description: "Pregnancy or planning pregnancy"
        severity: "ABSOLUTE"
        alternative_action:
          medication_name: "Nifedipine XL OR Labetalol"
          dose: "30mg nifedipine OR 100mg labetalol"
          frequency: "once daily (nifedipine) OR BID (labetalol)"
          rationale: "ACE inhibitors/ARBs contraindicated in pregnancy; use calcium channel blocker or beta-blocker"

      - type: "ALLERGY"
        description: "History of angioedema with ACE inhibitor"
        severity: "ABSOLUTE"
        alternative_action:
          medication_name: "Losartan (ARB) with caution OR Amlodipine"
          dose: "50mg losartan OR 5mg amlodipine"
          frequency: "once daily"
          rationale: "ARB has lower angioedema risk (0.1-0.5%) but cross-reactivity possible; calcium channel blocker safe alternative"

      - type: "ORGAN_DYSFUNCTION"
        description: "Bilateral renal artery stenosis"
        severity: "ABSOLUTE"
        alternative_action:
          medication_name: "Amlodipine OR Hydralazine"
          dose: "5mg amlodipine"
          frequency: "once daily"
          rationale: "ACE inhibitors/ARBs can cause acute renal failure in bilateral RAS"

      - type: "ELECTROLYTE_ABNORMALITY"
        description: "Hyperkalemia (K >5.5 mEq/L)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Treat hyperkalemia first; use alternative antihypertensive (calcium channel blocker, diuretic); recheck potassium before ACE inhibitor"

    prerequisite_checks:
      - "Baseline creatinine and potassium (ACE inhibitors can elevate both)"
      - "Assess for pregnancy (women of childbearing age)"
      - "Check for history of angioedema"
      - "Screen for bilateral renal artery stenosis risk (elderly, atherosclerosis, abdominal bruit)"

    required_lab_values:
      - "creatinine"
      - "eGFR"
      - "potassium"

    monitoring_parameters: "BP at every visit (goal <130/80); potassium and creatinine 1-2 weeks after initiation, then every 6-12 months; assess for cough or angioedema"

  - action_id: "METS-ACT-007"
    category: "MONITORING"
    sequence_order: 7
    description: "Establish regular follow-up schedule for metabolic syndrome management"
    urgency: "SEMI_URGENT"
    timeframe: "within 4 weeks (initial visit), then quarterly"
    rationale: "Regular monitoring ensures therapy adherence, tracks progress toward goals, and adjusts treatment as needed"

    monitoring_parameters: "Weight, BMI, waist circumference monthly initially; BP at every visit; lipid panel every 3-6 months; HbA1c every 3-6 months if prediabetic; lifestyle adherence assessment"

    evidence:
      - title: "AHA/NHLBI 2005 - Follow-up Strategy"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        grade: "2C"
        summary: "Regular monitoring of weight, BP, lipids, and glucose essential for metabolic syndrome management"

  - action_id: "METS-ACT-008"
    category: "CONSULTATION"
    sequence_order: 8
    description: "Specialist referral for refractory metabolic syndrome or complications"
    urgency: "SEMI_URGENT"
    timeframe: "within 8 weeks if goals not achieved"
    rationale: "Subspecialty expertise may be needed for complex cases or when standard therapy insufficient"

    escalation_criteria:
      - "Progression to diabetes despite metformin and lifestyle (HbA1c ≥6.5% or FG ≥126 mg/dL)"
      - "Inability to achieve BP goal <130/80 despite 2+ medications"
      - "LDL not at goal despite statin (consider cardiology for PCSK9 inhibitor)"
      - "Significant weight loss goal not achieved (consider bariatric surgery evaluation if BMI ≥40 or ≥35 with comorbidities)"
      - "Suspected secondary hypertension or endocrine disorder (consider endocrinology)"

    evidence:
      - title: "AHA/NHLBI 2005 - Specialist Consultation"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        grade: "2C"
        summary: "Consider subspecialty referral for complex or refractory metabolic syndrome"

# Overall protocol contraindications
contraindications:
  - type: "CLINICAL_CONTEXT"
    description: "Isolated risk factors without meeting metabolic syndrome criteria (<3 components)"
    severity: "RELATIVE"
    rationale: "Isolated risk factors treated individually per guidelines; metabolic syndrome protocol for ≥3 components"

  - type: "PATIENT_PREFERENCE"
    description: "Patient declines medical therapy, desires lifestyle-only approach"
    severity: "RELATIVE"
    rationale: "Respect patient autonomy; lifestyle intervention alone is evidence-based first-line therapy"

# Monitoring requirements for overall protocol
monitoring_requirements:
  - parameter: "Weight and BMI"
    frequency: "Monthly for first 3-6 months, then quarterly"
    target: "7-10% weight loss from baseline; BMI <30 kg/m²"

  - parameter: "Waist circumference"
    frequency: "Every 3-6 months"
    target: "<40 inches (men), <35 inches (women)"

  - parameter: "Blood pressure"
    frequency: "At every visit (monthly initially)"
    target: "<130/80 mmHg"

  - parameter: "Fasting glucose or HbA1c"
    frequency: "Every 3-6 months"
    target: "FG <100 mg/dL, HbA1c <5.7% (prevent diabetes progression)"

  - parameter: "Lipid panel"
    frequency: "Every 3-6 months during therapy adjustment, then annually"
    target: "LDL ≥30-50% reduction from baseline, TG <150 mg/dL, HDL >40/>50 mg/dL (M/F)"

  - parameter: "Liver function tests"
    frequency: "Baseline, then as clinically indicated (NOT routine with statin)"
    target: "ALT/AST <3x ULN"

  - parameter: "Renal function (creatinine, eGFR, potassium)"
    frequency: "Baseline, 1-2 weeks after ACE inhibitor initiation, then every 6-12 months"
    target: "Stable creatinine, eGFR >60, potassium 3.5-5.0 mEq/L"

  - parameter: "Vitamin B12"
    frequency: "Annually if on metformin >1 year"
    target: ">200 pg/mL"

# Escalation criteria for worsening clinical status
escalation_criteria:
  - condition: "Progression to diabetes (FG ≥126 mg/dL or HbA1c ≥6.5% on 2 occasions)"
    action: "Endocrinology referral, initiate diabetes management protocol, intensify glycemic control"
    timeframe: "< 2 weeks"

  - condition: "Acute coronary syndrome or stroke"
    action: "Emergency management per ACS/stroke protocol, intensive risk factor modification, cardiology consultation"
    timeframe: "Immediate"

  - condition: "Persistent inability to achieve weight loss goal despite intensive lifestyle intervention"
    action: "Consider referral for bariatric surgery evaluation if BMI ≥40 OR ≥35 with comorbidities"
    timeframe: "< 3 months"

  - condition: "Blood pressure not controlled on 2+ medications"
    action: "Evaluate for secondary hypertension, consider nephrology or cardiology referral, add third agent"
    timeframe: "< 4 weeks"

  - condition: "LDL not at goal despite maximally tolerated statin"
    action: "Cardiology referral for consideration of PCSK9 inhibitor, ezetimibe, or other lipid-lowering therapy"
    timeframe: "< 8 weeks"

# Expected clinical outcomes
expected_outcomes:
  - outcome: "Weight loss of 7-10% from baseline"
    timeframe: "6-12 months"

  - outcome: "Blood pressure <130/80 mmHg"
    timeframe: "3-6 months"

  - outcome: "LDL reduction ≥30-50% from baseline"
    timeframe: "3 months"

  - outcome: "Triglycerides <150 mg/dL"
    timeframe: "3-6 months"

  - outcome: "HDL increase >40/>50 mg/dL (M/F)"
    timeframe: "6-12 months"

  - outcome: "Fasting glucose <100 mg/dL, HbA1c <5.7% (prevent diabetes)"
    timeframe: "6-12 months"

  - outcome: "Waist circumference reduction (goal <40/<35 inches M/F)"
    timeframe: "6-12 months"

  - outcome: "Reduction in 10-year ASCVD risk by ≥5-10%"
    timeframe: "12 months"

# De-escalation and completion criteria
completion_criteria:
  - "Achievement of metabolic syndrome component goals: BP <130/80, FG <100, TG <150, HDL >40/>50, waist <40/<35"
  - "Stable weight maintenance with 7-10% reduction from baseline sustained >6 months"
  - "No progression to diabetes (HbA1c <5.7%, FG <100 mg/dL)"
  - "ASCVD risk reduced to <7.5% OR on appropriate preventive therapy (statin, antihypertensive)"
  - "Lifestyle modifications well-established and maintained (exercise ≥150 min/week, Mediterranean or DASH diet adherence)"
  - "Transition to annual monitoring for stable patients meeting all goals"
