# Acute Respiratory Failure Management Protocol
protocol_id: "RESP-FAIL-001"
name: "Acute Respiratory Failure Management"
version: "2024.1"
category: "RESPIRATORY"
source: "ATS/ERS Acute Respiratory Failure Guidelines 2024"
guideline_reference: "Rochwerg B, et al. Am J Respir Crit Care Med. 2024;209(1):10-58"
last_updated: "2024-01-15"

# Activation criteria - ANY of these conditions triggers the protocol
activation_criteria:
  - condition: "Hypoxemic respiratory failure"
    description: "PaO2 <60 mmHg or SpO2 <90% on room air, or PaO2/FiO2 ratio <300"
    parameters:
      - "Moderate: PaO2/FiO2 200-300"
      - "Severe: PaO2/FiO2 100-200"
      - "Critical ARDS: PaO2/FiO2 <100"

  - condition: "Hypercapnic respiratory failure"
    description: "PaCO2 >50 mmHg with pH <7.35 (acute respiratory acidosis)"
    parameters:
      - "Mild: pH 7.30-7.35"
      - "Moderate: pH 7.25-7.30"
      - "Severe: pH <7.25"

  - condition: "Clinical signs of respiratory distress"
    description: "Severe dyspnea with respiratory rate >30 or accessory muscle use"
    parameters:
      - "Respiratory rate >30 breaths/min"
      - "Accessory muscle use (intercostal retractions, tripod positioning)"
      - "Paradoxical breathing or abdominal-thoracic dyssynchrony"
      - "Altered mental status from hypoxia/hypercapnia"

# Priority determination based on severity
priority_determination:
  base_priority: "P0_CRITICAL"
  urgency_factors:
    - condition: "PaO2 <50 OR SpO2 <85% OR altered_mental_status"
      priority_modifier: "IMMEDIATE"
      timeframe: "0 minutes - prepare for intubation"
    - condition: "PaO2 50-60 OR SpO2 85-90% OR RR >35"
      priority_modifier: "URGENT"
      timeframe: "< 15 minutes"
    - condition: "PaO2/FiO2 200-300 OR progressive hypoxemia"
      priority_modifier: "URGENT"
      timeframe: "< 30 minutes"
  default_timeframe: "< 1 hour"

# Clinical actions in recommended sequence
actions:
  - action_id: "RESP-ACT-001"
    category: "DIAGNOSTIC"
    sequence_order: 1
    description: "Obtain arterial blood gas (ABG)"
    urgency: "STAT"
    timeframe: "within 15 minutes"
    rationale: "ABG definitively diagnoses type and severity of respiratory failure and guides oxygen therapy"

    diagnostic_details:
      test_name: "Arterial blood gas analysis"
      test_type: "LAB"
      loinc_code: "24336-0 (ABG panel)"
      clinical_indication: "Evaluate oxygenation, ventilation, and acid-base status"
      specimen_requirements:
        - "Arterial sample (radial artery preferred)"
        - "Heparinized syringe"
        - "Ice immediately, analyze within 15 minutes"
        - "Note FiO2 at time of sampling"
      expected_findings: "PaO2 <60, PaCO2 >50 (hypercapnic), pH <7.35, lactate may be elevated"
      interpretation_guidance: "Calculate A-a gradient and PaO2/FiO2 ratio; assess acid-base status"
      result_timeframe: "10-20 minutes"

    evidence:
      - title: "ATS/ERS 2024 - ABG in Respiratory Failure"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "1.1"
        grade: "Strong recommendation, Moderate evidence"
        summary: "ABG is gold standard for diagnosing respiratory failure type and severity"

    prerequisite_checks:
      - "Verify adequate collateral circulation (modified Allen test for radial artery)"
      - "Note current oxygen delivery method and FiO2"

    monitoring_parameters: "Repeat ABG 30-60 min after oxygen therapy changes; trend PaO2/FiO2 ratio"

  - action_id: "RESP-ACT-002"
    category: "DIAGNOSTIC"
    sequence_order: 2
    description: "Obtain portable chest X-ray"
    urgency: "STAT"
    timeframe: "within 30 minutes"
    rationale: "CXR identifies etiology (pneumonia, pulmonary edema, pneumothorax) and guides treatment"

    diagnostic_details:
      test_name: "Portable chest X-ray (AP and lateral if possible)"
      test_type: "IMAGING"
      clinical_indication: "Identify cause of respiratory failure and complications"
      expected_findings: "Infiltrates (pneumonia, ARDS), pulmonary edema, pneumothorax, pleural effusions"
      interpretation_guidance: "Assess for bilateral infiltrates (ARDS), unilateral (pneumonia), vascular congestion (cardiogenic pulmonary edema)"

    evidence:
      - title: "ATS/ERS 2024 - Imaging in Respiratory Failure"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Strong recommendation, High evidence"
        summary: "Chest imaging essential to diagnose etiology and guide therapy"

    monitoring_parameters: "Daily CXR while intubated or if clinical deterioration"

  - action_id: "RESP-ACT-003"
    category: "THERAPEUTIC"
    sequence_order: 3
    description: "Initiate supplemental oxygen therapy"
    urgency: "STAT"
    timeframe: "Immediately (within 5 minutes)"
    rationale: "Correct hypoxemia to prevent end-organ damage while addressing underlying cause"

    medication_details:
      name: "Supplemental oxygen - tiered approach"
      drug_class: "Medical gas therapy"
      indication: "Hypoxemic respiratory failure"

      dose_calculation_method: "titration_to_target"
      standard_dose: "Variable by delivery method"
      dose_unit: "L/min or FiO2"

      route: "Inhalation"
      administration_instructions: "Start with lowest FiO2 to achieve SpO2 target; escalate delivery method as needed"
      frequency: "Continuous"
      duration: "Until hypoxemia resolves"

      tiered_oxygen_delivery:
        - level: 1
          method: "Nasal cannula"
          flow_rate: "1-6 L/min"
          approximate_fio2: "24-44%"
          indication: "Mild hypoxemia (SpO2 88-92%)"

        - level: 2
          method: "Simple face mask"
          flow_rate: "6-10 L/min"
          approximate_fio2: "35-60%"
          indication: "Moderate hypoxemia (SpO2 85-88%)"

        - level: 3
          method: "Non-rebreather mask"
          flow_rate: "10-15 L/min"
          approximate_fio2: "60-95%"
          indication: "Severe hypoxemia (SpO2 <85%) or high oxygen demand"

        - level: 4
          method: "High-flow nasal cannula (HFNC)"
          flow_rate: "30-60 L/min"
          approximate_fio2: "30-100%"
          indication: "Persistent hypoxemia despite non-rebreather; avoid intubation"
          additional_benefits: "Provides PEEP (3-5 cmH2O), washout of dead space, improved comfort"

        - level: 5
          method: "Non-invasive ventilation (BiPAP/CPAP)"
          settings: "IPAP 10-20, EPAP 5-10 cmH2O"
          indication: "Hypercapnic respiratory failure (COPD, CHF) or hypoxemic failure with need for positive pressure"

        - level: 6
          method: "Mechanical ventilation (intubation)"
          indication: "Refractory hypoxemia, respiratory arrest, inability to protect airway"

      target_spo2:
        - condition: "COPD or chronic CO2 retention"
          target: "88-92%"
          rationale: "Avoid suppressing hypoxic drive"
        - condition: "Acute hypoxemic respiratory failure (non-COPD)"
          target: "92-96%"
          rationale: "Adequate oxygenation without excessive hyperoxia"
        - condition: "ARDS or severe hypoxemia"
          target: "88-95%"
          rationale: "Permissive hypoxemia to minimize ventilator-induced lung injury"

      adverse_effects:
        - "Oxygen toxicity (FiO2 >60% for >48 hours)"
        - "Absorption atelectasis"
        - "Hypercapnia in COPD (if over-oxygenated)"
        - "Nasal/facial skin breakdown (with masks/HFNC)"

      monitoring:
        - "Continuous pulse oximetry"
        - "ABG 30-60 min after therapy change"
        - "Respiratory rate and work of breathing"

    evidence:
      - title: "ATS/ERS 2024 - Oxygen Therapy"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "2.1"
        grade: "Strong recommendation, High evidence"
        summary: "Titrate oxygen to target SpO2 88-92% (COPD) or 92-96% (non-COPD)"
      - title: "BTS Oxygen Guidelines 2024"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        summary: "Target-driven oxygen therapy reduces mortality vs liberal oxygen"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Bleomycin use (relative contraindication for high FiO2)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Use lowest FiO2 possible; high FiO2 can exacerbate bleomycin lung toxicity"

    prerequisite_checks:
      - "Verify baseline SpO2 and respiratory rate"
      - "Check for history of COPD or chronic CO2 retention (adjust target SpO2)"

    monitoring_parameters: "Continuous SpO2; ABG after 30-60 min; assess work of breathing; escalate oxygen delivery if SpO2 target not met"

  - action_id: "RESP-ACT-004"
    category: "THERAPEUTIC"
    sequence_order: 4
    description: "Treat underlying cause (antibiotics, diuretics, bronchodilators)"
    urgency: "STAT to URGENT"
    timeframe: "within 1 hour"
    rationale: "Address root cause while supporting oxygenation and ventilation"

    treatment_options:
      - etiology: "Pneumonia/Sepsis"
        treatment: "Broad-spectrum antibiotics per sepsis protocol"
        examples: "Piperacillin-tazobactam 4.5g IV q6h, ceftriaxone 2g IV daily + azithromycin 500mg IV daily"

      - etiology: "Cardiogenic pulmonary edema"
        treatment: "Diuretics (furosemide 40-80mg IV bolus), afterload reduction (nitroglycerin), consider BiPAP"
        examples: "Furosemide 40-80mg IV, nitroglycerin drip 10-200 mcg/min"

      - etiology: "COPD/Asthma exacerbation"
        treatment: "Bronchodilators (albuterol, ipratropium), corticosteroids (methylprednisolone 125mg IV)"
        examples: "Albuterol 2.5-5mg neb q20min x3, ipratropium 0.5mg neb, methylprednisolone 125mg IV"

      - etiology: "Pulmonary embolism"
        treatment: "Anticoagulation (heparin bolus 80 units/kg, infusion 18 units/kg/hr), consider thrombolytics if massive PE"
        examples: "Heparin 80 units/kg bolus, 18 units/kg/hr infusion; tPA 50mg IV over 2 hours if massive PE"

      - etiology: "ARDS"
        treatment: "Lung-protective ventilation (low tidal volume 6 mL/kg IBW), prone positioning, conservative fluid management"
        examples: "Intubate with TV 6 mL/kg, PEEP 10-15, FiO2 titrated to SpO2 88-95%"

    evidence:
      - title: "ATS/ERS 2024 - Etiology-Specific Treatment"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Strong recommendation"
        summary: "Treat underlying cause concurrently with supportive oxygen therapy"

    prerequisite_checks:
      - "Identify most likely etiology from history, exam, CXR"
      - "Adjust treatment based on clinical presentation"

    monitoring_parameters: "Monitor response to therapy; adjust based on clinical improvement or deterioration"

  - action_id: "RESP-ACT-005"
    category: "PROCEDURE"
    sequence_order: 5
    description: "Consider non-invasive ventilation (NIV) for hypercapnic or selected hypoxemic failure"
    urgency: "URGENT"
    timeframe: "within 30 minutes if indicated"
    rationale: "NIV reduces intubation rates and mortality in COPD, cardiogenic pulmonary edema, and immunocompromised patients"

    procedure_details:
      procedure_name: "Non-invasive positive pressure ventilation (BiPAP/CPAP)"
      indication: "Hypercapnic respiratory failure (COPD, obesity hypoventilation), cardiogenic pulmonary edema, immunocompromised with hypoxemia"

      settings:
        - mode: "BiPAP"
          ipap: "10-20 cmH2O (start 8-10, titrate for tidal volume 6-8 mL/kg)"
          epap: "5-10 cmH2O (start 4-5, titrate for oxygenation)"
          backup_rate: "10-15 breaths/min"
          fio2: "Titrate to SpO2 target"

        - mode: "CPAP"
          pressure: "5-10 cmH2O"
          indication: "Cardiogenic pulmonary edema, obstructive sleep apnea, atelectasis"

      trial_duration: "1-2 hours with close monitoring"
      success_criteria: "Improved pH, decreased PaCO2, decreased RR, improved mental status, patient tolerance"
      failure_criteria: "Worsening hypoxemia, hemodynamic instability, inability to clear secretions, patient intolerance"

    evidence:
      - title: "ATS/ERS 2024 - NIV in Acute Respiratory Failure"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "3.1"
        grade: "Strong recommendation, High evidence"
        summary: "NIV reduces intubation and mortality in COPD exacerbation and cardiogenic pulmonary edema"
      - title: "Cochrane Review - NIV for COPD"
        type: "META_ANALYSIS"
        strength: "STRONG"
        citation: "Cochrane Database Syst Rev. 2017;(7):CD004104"
        summary: "NIV reduces mortality (RR 0.52) and intubation (RR 0.41) in COPD exacerbations"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Inability to protect airway, impaired consciousness (GCS <10)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Proceed directly to intubation"

      - type: "CLINICAL_CONDITION"
        description: "Severe facial trauma or burns precluding mask seal"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Intubate if respiratory support needed"

      - type: "CLINICAL_CONDITION"
        description: "Hemodynamic instability (shock, severe arrhythmias)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Stabilize hemodynamics first; may need intubation"

      - type: "CLINICAL_CONDITION"
        description: "Copious secretions or inability to clear secretions"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Consider intubation for airway protection"

      - type: "CLINICAL_CONDITION"
        description: "Severe hypoxemia (PaO2/FiO2 <150) unresponsive to HFNC"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "NIV trial acceptable if no other contraindications, but prepare for intubation"

    prerequisite_checks:
      - "Patient cooperative and able to protect airway"
      - "Adequate mask fit available"
      - "Hemodynamically stable"
      - "Not in extremis requiring immediate intubation"

    monitoring_parameters: "Continuous monitoring for 1-2 hours: SpO2, HR, BP, RR, work of breathing, mental status, patient tolerance; ABG at 1-2 hours"

  - action_id: "RESP-ACT-006"
    category: "PROCEDURE"
    sequence_order: 6
    description: "Prepare for endotracheal intubation if NIV failure or severe hypoxemia"
    urgency: "STAT"
    timeframe: "Immediate if indicated"
    rationale: "Intubation and mechanical ventilation prevent respiratory arrest and allow definitive airway management"

    procedure_details:
      procedure_name: "Endotracheal intubation and mechanical ventilation"
      indication: "Apnea, severe hypoxemia (PaO2 <50 despite maximal support), hypercapnic coma (pH <7.20), hemodynamic instability, inability to protect airway"

      pre_intubation_checklist:
        - "Assemble difficult airway equipment (video laryngoscope, bougie, LMA)"
        - "Preoxygenate with 100% O2 for 3-5 minutes (or 8 vital capacity breaths)"
        - "Position patient (head-up 30 degrees if tolerated, sniffing position)"
        - "Have suction ready"
        - "Prepare RSI medications (induction + paralytic)"
        - "Prepare post-intubation sedation and ventilator settings"

      rsi_medications:
        - agent: "Etomidate (induction)"
          dose: "0.3 mg/kg IV push"
          rationale: "Hemodynamically neutral induction agent"

        - agent: "Rocuronium (paralytic)"
          dose: "1.2 mg/kg IV push"
          rationale: "Rapid onset neuromuscular blockade for optimal intubating conditions"

      initial_ventilator_settings:
        - mode: "Volume Assist Control (AC)"
          tidal_volume: "6-8 mL/kg ideal body weight (lower for ARDS)"
          respiratory_rate: "12-20 breaths/min"
          peep: "5-10 cmH2O (higher for ARDS, hypoxemia)"
          fio2: "Start 100%, wean to SpO2 88-95%"
          plateau_pressure: "Goal <30 cmH2O (lung protective ventilation)"

    evidence:
      - title: "ATS/ERS 2024 - Indications for Intubation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Strong recommendation, Moderate evidence"
        summary: "Intubate for refractory hypoxemia, ventilatory failure, or inability to protect airway"
      - title: "ARDSNet Low Tidal Volume Trial"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "N Engl J Med. 2000;342:1301-1308"
        summary: "Tidal volume 6 mL/kg IBW reduced mortality by 22% vs 12 mL/kg in ARDS"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Severe upper airway obstruction (angioedema, tumor)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Consider awake fiberoptic intubation or surgical airway; avoid paralytics until airway secured"

    prerequisite_checks:
      - "Assess airway difficulty (LEMON criteria)"
      - "Verify RSI medications drawn up and ready"
      - "Confirm ventilator settings programmed"
      - "Have backup airway plan (difficult airway cart)"

    monitoring_parameters: "Post-intubation: ETCO2 waveform (confirm placement), CXR (confirm depth ~2-3 cm above carina), ABG 30 min post-intubation, continuous waveform capnography"

  - action_id: "RESP-ACT-007"
    category: "MONITORING"
    sequence_order: 7
    description: "Continuous monitoring and ICU transfer"
    urgency: "STAT"
    timeframe: "Immediate"
    rationale: "Acute respiratory failure requires ICU-level monitoring and potential for rapid deterioration"

    monitoring_parameters: "Continuous pulse oximetry, cardiac telemetry, vital signs every 15 min initially; serial ABGs; assess work of breathing; monitor for NIV/ventilator asynchrony"

    evidence:
      - title: "ATS/ERS 2024 - ICU Monitoring"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Strong recommendation"
        summary: "Patients with acute respiratory failure requiring advanced oxygen support or NIV should be in ICU setting"

  - action_id: "RESP-ACT-008"
    category: "ESCALATION"
    sequence_order: 8
    description: "Pulmonary/Critical Care consultation"
    urgency: "URGENT"
    timeframe: "within 1 hour for severe cases"
    rationale: "Specialist input for complex respiratory failure, ARDS management, and ventilator optimization"

    escalation_criteria:
      - "Refractory hypoxemia despite maximal oxygen therapy"
      - "ARDS (PaO2/FiO2 <300 with bilateral infiltrates)"
      - "Ventilator management complexity (high PEEP, prone positioning)"
      - "Consideration for ECMO (PaO2/FiO2 <80, pH <7.20 despite optimal ventilation)"

    evidence:
      - title: "ATS/ERS 2024 - Specialist Consultation"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        grade: "Conditional recommendation"
        summary: "Early consultation recommended for severe or refractory respiratory failure"

# Overall protocol contraindications
contraindications:
  - type: "GOALS_OF_CARE"
    description: "Comfort measures only (CMO) or hospice status"
    severity: "ABSOLUTE"
    rationale: "Intubation and aggressive support inconsistent with comfort-focused goals"

  - type: "GOALS_OF_CARE"
    description: "Do not intubate (DNI) orders"
    severity: "RELATIVE"
    rationale: "Limits to NIV and non-invasive support; clarify goals of care"

# Monitoring requirements for overall protocol
monitoring_requirements:
  - parameter: "Continuous pulse oximetry"
    frequency: "Continuous"
    target: "SpO2 88-92% (COPD) or 92-96% (non-COPD)"

  - parameter: "Arterial blood gas"
    frequency: "30-60 min after therapy changes, then q4-6h when stable"
    target: "PaO2 >60, pH >7.30, PaCO2 trend improving"

  - parameter: "Respiratory rate and work of breathing"
    frequency: "Continuous observation for first 2-4 hours, then hourly"
    target: "RR <30, no accessory muscle use"

  - parameter: "Chest X-ray"
    frequency: "Baseline, post-intubation (if applicable), daily if intubated"
    target: "Monitor for complications (pneumothorax, ARDS progression, pulmonary edema)"

  - parameter: "Vital signs"
    frequency: "Every 15 min x 1 hour, then hourly when stable"
    target: "Hemodynamic stability, no arrhythmias"

# Escalation criteria for worsening respiratory status
escalation_criteria:
  - condition: "Worsening hypoxemia despite escalating oxygen therapy (PaO2 <50 or SpO2 <85%)"
    action: "Escalate oxygen delivery (HFNC → NIV → intubation); ICU transfer if not already there"
    timeframe: "< 15 minutes"

  - condition: "NIV failure (worsening ABG, patient intolerance, hemodynamic instability)"
    action: "Prepare for intubation immediately; pulmonary/critical care consultation"
    timeframe: "< 30 minutes"

  - condition: "Respiratory arrest or peri-arrest (apnea, gasping respirations, severe altered mental status)"
    action: "Emergent intubation; ACLS if needed"
    timeframe: "Immediate"

  - condition: "Severe ARDS (PaO2/FiO2 <100) or refractory hypoxemia on maximal vent settings"
    action: "Pulmonary consultation, consider prone positioning, neuromuscular blockade, ECMO evaluation"
    timeframe: "< 1 hour"

  - condition: "Pneumothorax (especially tension pneumothorax with hemodynamic compromise)"
    action: "Emergent chest tube placement (needle decompression if tension PTX)"
    timeframe: "Immediate"

# Expected clinical outcomes
expected_outcomes:
  - outcome: "SpO2 within target range (88-92% COPD, 92-96% non-COPD)"
    timeframe: "15-30 minutes"

  - outcome: "Improved ABG parameters (PaO2 >60, pH >7.30, decreasing PaCO2 if hypercapnic)"
    timeframe: "1-2 hours"

  - outcome: "Decreased work of breathing (RR <30, no accessory muscle use)"
    timeframe: "1-2 hours"

  - outcome: "Improved mental status (alert and oriented if previously altered)"
    timeframe: "2-4 hours"

  - outcome: "Resolution of underlying cause (e.g., pneumonia improving on antibiotics)"
    timeframe: "24-72 hours"

# Weaning and de-escalation criteria
completion_criteria:
  - "Underlying cause treated or resolving"
  - "Improved oxygenation: PaO2 >60 on FiO2 <50% (or SpO2 >90% on <4 L NC)"
  - "Improved ventilation: pH >7.35, PaCO2 normalized or at baseline (if chronic)"
  - "Hemodynamic stability without vasopressor support"
  - "Spontaneous breathing trial successful (if intubated)"
  - "Wean oxygen as tolerated to room air or baseline home oxygen requirement"
  - "Consider discharge when stable on baseline oxygen for 24+ hours without acute distress"
