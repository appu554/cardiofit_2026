# ============================================================
# ENHANCED CLINICAL PROTOCOL: Supraventricular Tachycardia Management
# ============================================================
# Version: 2.0 (CDS-Compliant)
# Based on: ACC/AHA/HRS 2015 SVT Guidelines
# Last Updated: 2025-10-21
# ============================================================

protocol_id: "SVT-MANAGEMENT-001"
name: "Supraventricular Tachycardia Management"
category: "CARDIOVASCULAR"
specialty: "CARDIOLOGY"
version: "2.0"
last_updated: "2025-10-21"

# ============================================================
# TRIGGER CRITERIA
# ============================================================
trigger_criteria:
  match_logic: "ANY_OF"

  conditions:
    - condition_id: "SVT-TRIG-001"
      description: "Classic SVT presentation with narrow complex tachycardia"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "heart_rate"
          operator: ">"
          threshold: 150
          unit: "bpm"
          source: "vital_signs"

        - parameter: "regular_rhythm"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

        - parameter: "qrs_duration"
          operator: "<"
          threshold: 120
          unit: "ms"
          source: "ecg"

    - condition_id: "SVT-TRIG-002"
      description: "Paroxysmal SVT with abrupt onset"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "heart_rate"
          operator: ">"
          threshold: 150
          unit: "bpm"
          source: "vital_signs"

        - parameter: "abrupt_onset"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

        - parameter: "narrow_complex"
          operator: "=="
          threshold: true
          source: "ecg"

    - condition_id: "SVT-TRIG-003"
      description: "Symptomatic rapid palpitations"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "heart_rate"
          operator: ">"
          threshold: 150
          unit: "bpm"
          source: "vital_signs"

        - match_logic: "ANY_OF"
          conditions:
            - parameter: "palpitations"
              operator: "=="
              threshold: true
            - parameter: "dyspnea"
              operator: "=="
              threshold: true
            - parameter: "chest_discomfort"
              operator: "=="
              threshold: true

# ============================================================
# CONFIDENCE SCORING
# ============================================================
confidence_scoring:
  base_confidence: 0.85

  modifiers:
    - modifier_id: "SVT-CONF-001"
      description: "ECG confirms narrow QRS and regular rhythm"
      condition:
        match_logic: "ALL_OF"
        conditions:
          - parameter: "qrs_duration"
            operator: "<"
            threshold: 120
            unit: "ms"
          - parameter: "regular_rhythm"
            operator: "=="
            threshold: true
      adjustment: 0.10

    - modifier_id: "SVT-CONF-002"
      description: "Previous history of SVT increases confidence"
      condition:
        parameter: "previous_svt_episodes"
        operator: ">"
        threshold: 0
      adjustment: 0.08

    - modifier_id: "SVT-CONF-003"
      description: "Reduce confidence if wide complex tachycardia"
      condition:
        parameter: "qrs_duration"
        operator: ">="
        threshold: 120
        unit: "ms"
      adjustment: -0.15

    - modifier_id: "SVT-CONF-004"
      description: "Irregular rhythm suggests alternative diagnosis"
      condition:
        parameter: "regular_rhythm"
        operator: "=="
        threshold: false
      adjustment: -0.12

  activation_threshold: 0.70

# ============================================================
# EVIDENCE SOURCE
# ============================================================
evidence_source:
  primary_guideline: "ACC/AHA/HRS SVT Guidelines 2015"
  guideline_version: "2015.1"
  publication_date: "2015-09"
  evidence_level: "STRONG"

  key_citations:
    - citation_id: "CITE-001"
      authors: "Page RL, Joglar JA, Caldwell MA, et al."
      title: "2015 ACC/AHA/HRS Guideline for the Management of Adult Patients With Supraventricular Tachycardia"
      journal: "J Am Coll Cardiol"
      year: 2016
      pmid: "26409259"
      doi: "10.1016/j.jacc.2015.08.856"

  last_review_date: "2024-09-01"
  next_review_date: "2026-09-01"

# ============================================================
# ACTIONS
# ============================================================
actions:
  - action_id: "SVT-ACT-001"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 1

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 5

    diagnostic:
      test_name: "12-lead ECG"
      test_code: "11524-6"
      urgency: "STAT"
      instructions: "Obtain during tachycardia to confirm SVT diagnosis and exclude WPW pattern"

  - action_id: "SVT-ACT-002"
    type: "CLINICAL_ASSESSMENT"
    priority: "CRITICAL"
    sequence_number: 2

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 5

    clinical_assessment:
      assessment_type: "Hemodynamic stability assessment"
      frequency: "continuous"
      specific_parameters:
        - "Blood pressure (SBP >90 mmHg stable)"
        - "Mental status (alert, oriented)"
        - "Chest pain severity"
        - "Signs of heart failure (pulmonary edema)"

  - action_id: "SVT-ACT-003"
    type: "PROCEDURE"
    priority: "HIGH"
    sequence_number: 3

    timing:
      window: "URGENT"
      max_delay_minutes: 10

    procedure:
      procedure_name: "Vagal maneuvers"
      indication: "Non-pharmacologic SVT termination"
      urgency: "URGENT"
      consent_required: false
      location: "Bedside"

  - action_id: "SVT-ACT-004"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 4

    timing:
      window: "URGENT"
      max_delay_minutes: 15
      sequence: "AFTER"
      reference_action: "SVT-ACT-003"

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "NO_CONTRAINDICATIONS"
          description: "First-line adenosine for stable SVT without contraindications"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "wpw_pattern"
                operator: "=="
                threshold: false
              - parameter: "severe_asthma"
                operator: "=="
                threshold: false
              - parameter: "av_block"
                operator: "=="
                threshold: false

          primary_medication:
            name: "Adenosine"
            generic_name: "Adenosine"
            dose: "6"
            dose_unit: "mg"
            route: "IV"
            frequency: "single dose"
            administration_instructions: "Rapid IV push over 1-2 seconds via large proximal vein, immediately follow with 20 mL saline flush; elevate arm after administration"

          alternative_medication:
            name: "Adenosine (second dose)"
            dose: "12"
            dose_unit: "mg"
            route: "IV"
            frequency: "single dose"
            indication: "If first dose ineffective after 1-2 minutes"
            administration_instructions: "Same rapid IV push technique; may repeat once more if needed"

        - criteria_id: "ASTHMA_COPD"
          description: "Calcium channel blocker for patients with severe bronchospastic disease"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "severe_asthma"
                operator: "=="
                threshold: true
              - parameter: "active_bronchospasm"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Diltiazem"
            dose: "0.25"
            dose_unit: "mg/kg"
            route: "IV"
            frequency: "single dose"
            administration_instructions: "Infuse slowly over 2 minutes; if inadequate response after 15 minutes, may give second dose of 0.35 mg/kg"
            dose_adjustment_rationale: "Safer in bronchospastic disease than adenosine"

        - criteria_id: "MEDICATION_INTERACTION"
          description: "Reduced adenosine dose for patients on dipyridamole or carbamazepine"

          condition:
            match_logic: "ANY_OF"
            conditions:
              - parameter: "dipyridamole_use"
                operator: "=="
                threshold: true
              - parameter: "carbamazepine_use"
                operator: "=="
                threshold: true

          primary_medication:
            name: "Adenosine (reduced dose)"
            dose: "3"
            dose_unit: "mg"
            route: "IV"
            frequency: "single dose"
            dose_adjustment_rationale: "Medications potentiate adenosine effect; start with half-dose"
            administration_instructions: "Rapid IV push; may increase to 6mg if needed"

  - action_id: "SVT-ACT-005"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 5

    timing:
      window: "URGENT"
      max_delay_minutes: 30

    medication:
      name: "Diltiazem"
      dose: "0.25"
      dose_unit: "mg/kg"
      route: "IV"
      frequency: "single dose, may repeat at 0.35 mg/kg"
      administration_instructions: "Infuse over 2 minutes; follow with continuous infusion 5-15 mg/hr if needed for rate control"

  - action_id: "SVT-ACT-006"
    type: "PROCEDURE"
    priority: "CRITICAL"
    sequence_number: 6

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 5

    procedure:
      procedure_name: "Synchronized electrical cardioversion"
      indication: "Hemodynamically unstable SVT or refractory to medications"
      urgency: "EMERGENT"
      consent_required: false
      location: "Bedside or procedural area"

  - action_id: "SVT-ACT-007"
    type: "CONSULTATION"
    priority: "MEDIUM"
    sequence_number: 7

    timing:
      window: "ROUTINE"

    consultation:
      specialty: "CARDIOLOGY"
      urgency: "SEMI_URGENT"
      reason: "Recurrent SVT episodes or consideration for catheter ablation"
      specific_questions:
        - "Is patient candidate for catheter ablation?"
        - "Need for long-term antiarrhythmic therapy?"

# ============================================================
# TIME CONSTRAINTS
# ============================================================
time_constraints:
  - constraint_id: "SVT-TIME-001"
    bundle_name: "Initial Assessment Bundle"
    description: "Rapid assessment and diagnosis within 15 minutes"
    offset_minutes: 15
    critical: true

    required_actions:
      - action_id: "SVT-ACT-001"
        description: "12-lead ECG"
      - action_id: "SVT-ACT-002"
        description: "Hemodynamic assessment"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 10
      missed_deadline_message: "SVT assessment bundle not completed"

  - constraint_id: "SVT-TIME-002"
    bundle_name: "Treatment Initiation Bundle"
    description: "Vagal maneuvers and medication within 30 minutes"
    offset_minutes: 30
    critical: true

    required_actions:
      - action_id: "SVT-ACT-003"
        description: "Vagal maneuvers"
      - action_id: "SVT-ACT-004"
        description: "Adenosine administration"

# ============================================================
# CONTRAINDICATIONS
# ============================================================
contraindications:
  - contraindication_id: "SVT-CONTRA-001"
    condition_description: "Wolff-Parkinson-White syndrome with pre-excitation"

    trigger_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "delta_waves"
          operator: "=="
          threshold: true
        - parameter: "short_pr_interval"
          operator: "=="
          threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "SVT-ACT-004"
      - "SVT-ACT-005"

    alternative_action:
      action_id: "SVT-ALT-001"
      type: "MEDICATION"
      medication:
        name: "Procainamide"
        dose: "20-50"
        dose_unit: "mg/min"
        route: "IV infusion"
        frequency: "until arrhythmia suppressed or max 17 mg/kg"
      rationale: "AV nodal blockers can precipitate ventricular fibrillation in WPW; procainamide or cardioversion preferred"

  - contraindication_id: "SVT-CONTRA-002"
    condition_description: "Hemodynamic instability requiring immediate cardioversion"

    trigger_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "systolic_bp"
          operator: "<"
          threshold: 90
          unit: "mmHg"
        - parameter: "altered_mental_status"
          operator: "=="
          threshold: true
        - parameter: "acute_heart_failure"
          operator: "=="
          threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "SVT-ACT-003"
      - "SVT-ACT-004"

    alternative_action:
      action_id: "SVT-ALT-002"
      type: "PROCEDURE"
      procedure:
        procedure_name: "Immediate synchronized cardioversion"
        urgency: "EMERGENT"
        indication: "Unstable tachycardia"
      rationale: "Skip vagal maneuvers and medications; proceed directly to cardioversion"

# ============================================================
# MONITORING REQUIREMENTS
# ============================================================
monitoring_requirements:
  - monitoring_id: "SVT-MON-001"
    parameter: "heart_rate"

    target_range:
      min: 60
      max: 100
      unit: "bpm"

    frequency: "continuous"
    duration_hours: 6

    alert_condition:
      parameter: "heart_rate"
      operator: ">"
      threshold: 150

    escalation_action:
      description: "Recurrent SVT - consider repeat intervention or continuous infusion"
      reference_action: "SVT-ACT-004"

  - monitoring_id: "SVT-MON-002"
    parameter: "blood_pressure"

    target_range:
      min: 90
      max: null
      unit: "mmHg"

    frequency: "every 5 minutes during interventions"
    duration_hours: 2

    alert_condition:
      parameter: "systolic_bp"
      operator: "<"
      threshold: 90

  - monitoring_id: "SVT-MON-003"
    parameter: "rhythm"

    frequency: "continuous cardiac monitoring"
    duration_hours: 24

    alert_condition:
      parameter: "rhythm"
      operator: "!="
      threshold: "sinus_rhythm"

# ============================================================
# SPECIAL POPULATIONS
# ============================================================
special_populations:
  - population_id: "ELDERLY"
    description: "Patients ≥65 years"

    inclusion_criteria:
      parameter: "age"
      operator: ">="
      threshold: 65
      unit: "years"

    modifications:
      - action_id: "SVT-ACT-005"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Increased sensitivity to calcium channel blockers in elderly"

        new_parameters:
          dose: "0.20 mg/kg initial dose (reduced from 0.25)"
          monitoring: "Close BP monitoring; higher risk of hypotension"

  - population_id: "PREGNANCY"
    description: "Pregnant patients"

    inclusion_criteria:
      parameter: "pregnancy_status"
      operator: "=="
      threshold: true

    modifications:
      - action_id: "SVT-ACT-004"
        modification_type: "CAUTION"
        rationale: "Adenosine is pregnancy category C but considered safe; limited alternatives"

        new_parameters:
          monitoring: "Fetal monitoring during administration; adenosine preferred over calcium channel blockers in pregnancy"

      - action_id: "SVT-ACT-006"
        modification_type: "CAUTION"
        rationale: "Cardioversion safe in pregnancy with fetal monitoring"

        new_parameters:
          additional_precautions: "Continuous fetal heart rate monitoring during cardioversion"

  - population_id: "HEART_FAILURE"
    description: "Patients with reduced ejection fraction (EF <40%)"

    inclusion_criteria:
      parameter: "ejection_fraction"
      operator: "<"
      threshold: 40
      unit: "percent"

    modifications:
      - action_id: "SVT-ACT-005"
        modification_type: "CONTRAINDICATION"
        rationale: "Calcium channel blockers can worsen heart failure in reduced EF"

        alternative_medication:
          name: "Adenosine followed by cardioversion if ineffective"
          rationale: "Avoid diltiazem/verapamil in reduced EF; consider early cardioversion"

# ============================================================
# ESCALATION RULES
# ============================================================
escalation_rules:
  - rule_id: "SVT-ESC-001"
    description: "ICU transfer for refractory or recurrent SVT"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "failed_cardioversion_attempts"
          operator: ">="
          threshold: 2

        - match_logic: "ALL_OF"
          conditions:
            - parameter: "recurrent_svt_episodes"
              operator: ">="
              threshold: 3
            - parameter: "time_window_hours"
              operator: "<="
              threshold: 6

    recommendation:
      escalation_level: "ICU_TRANSFER"
      urgency: "URGENT"
      rationale: "Refractory or recurrent SVT requiring continuous infusion and close monitoring"

      required_interventions:
        - "Continuous calcium channel blocker or beta-blocker infusion"
        - "Cardiology consultation for consideration of ablation"

      specialist_consultation:
        - specialty: "CARDIOLOGY"
          urgency: "URGENT"
          specific_question: "Catheter ablation candidate assessment for refractory SVT"

  - rule_id: "SVT-ESC-002"
    description: "Immediate cardioversion for hemodynamic instability"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "systolic_bp"
          operator: "<"
          threshold: 90
        - parameter: "altered_mental_status"
          operator: "=="
          threshold: true
        - parameter: "acute_heart_failure"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "IMMEDIATE_TRANSFER"
      urgency: "STAT"
      rationale: "Hemodynamic instability requires immediate cardioversion"

      required_interventions:
        - "Synchronized cardioversion 50-100 J biphasic"
        - "Sedation if patient conscious (midazolam 2-5mg IV)"

# ============================================================
# DE-ESCALATION CRITERIA
# ============================================================
de_escalation_criteria:
  - criteria_id: "SVT-DE-ESC-001"
    description: "Transition to observation after successful cardioversion"

    conditions:
      - parameter: "sinus_rhythm_stable"
        operator: "=="
        threshold: true

      - parameter: "time_in_sinus_rhythm"
        operator: ">="
        threshold: 4
        unit: "hours"

    recommendation:
      action: "Transition from continuous monitoring to telemetry observation"
      rationale: "Stable sinus rhythm for 4-6 hours suggests low risk of recurrence"
      specific_changes:
        - "Continue telemetry monitoring for 24 hours"
        - "Arrange outpatient cardiology follow-up"

  - criteria_id: "SVT-DE-ESC-002"
    description: "Consider outpatient management for single episode"

    conditions:
      - parameter: "first_svt_episode"
        operator: "=="
        threshold: true

      - parameter: "sinus_rhythm_stable"
        operator: "=="
        threshold: true

      - parameter: "no_structural_heart_disease"
        operator: "=="
        threshold: true

    recommendation:
      action: "Discharge with cardiology follow-up for single SVT episode"
      rationale: "Low-risk patients with first episode can be managed outpatient"

# ============================================================
# OUTCOME TRACKING
# ============================================================
outcome_tracking:
  primary_outcomes:
    - outcome_id: "SVT-OUT-001"
      metric: "svt_termination_rate"
      target: ">90%"
      benchmark_source: "ACC/AHA/HRS 2015 Guidelines"

    - outcome_id: "SVT-OUT-002"
      metric: "time_to_rhythm_conversion"
      target: "<30 minutes"
      benchmark_source: "ACC/AHA/HRS 2015 Guidelines"

  process_measures:
    - measure_id: "SVT-PROC-001"
      description: "12-lead ECG obtained within 5 minutes"
      target: ">95%"

    - measure_id: "SVT-PROC-002"
      description: "Vagal maneuvers attempted before medications"
      target: ">85%"

  balancing_measures:
    - measure_id: "SVT-BAL-001"
      description: "Adenosine-related adverse events"
      target: "<5% requiring intervention"
      specific_events:
        - "Prolonged asystole >5 seconds"
        - "Severe bronchospasm"

# ============================================================
# METADATA
# ============================================================
metadata:
  protocol_type: "CLINICAL_PATHWAY"
  implementation_complexity: "MEDIUM"
  requires_icu_level_care: false
  estimated_implementation_time_minutes: 60
  review_cycle_months: 24

  tags:
    - "time-sensitive"
    - "cardiovascular"
    - "arrhythmia"
    - "emergency"

  related_protocols:
    - protocol_id: "AFIB-MANAGEMENT-001"
      relationship: "ALTERNATIVE_TO"

  approval_history:
    - approver: "Clinical Governance Committee"
      approval_date: "2025-10-21"
      version: "2.0"

  change_log:
    - version: "2.0"
      date: "2025-10-21"
      changes:
        - "Enhanced to CDS-compliant structure"
        - "Added medication selection algorithm"
        - "Added confidence scoring and special populations"
        - "Added time constraints and escalation rules"

# ============================================================
# END OF PROTOCOL
# ============================================================
