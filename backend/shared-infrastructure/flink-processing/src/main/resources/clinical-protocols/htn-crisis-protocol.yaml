# ============================================================
# HYPERTENSIVE EMERGENCY MANAGEMENT PROTOCOL (CDS-COMPLIANT)
# ============================================================
# ACC/AHA 2017 Hypertension Guidelines
# Whelton PK, et al. J Am Coll Cardiol. 2018;71(19):e127-248
# Last Updated: 2025-10-21
# ============================================================

protocol_id: "HTN-EMERGENCY-001"
name: "Hypertensive Emergency Management Protocol"
category: "CARDIOVASCULAR"
specialty: "CARDIOLOGY"
version: "2.1"
last_updated: "2025-10-21"

# ============================================================
# TRIGGER CRITERIA
# ============================================================
trigger_criteria:
  match_logic: "ANY_OF"

  conditions:
    - condition_id: "HTN-TRIG-001"
      description: "Severe BP elevation with end-organ damage"
      match_logic: "ALL_OF"
      conditions:
        - match_logic: "ANY_OF"
          conditions:
            - parameter: "systolic_bp"
              operator: ">="
              threshold: 180
              unit: "mmHg"
              source: "vital_signs"

            - parameter: "diastolic_bp"
              operator: ">="
              threshold: 120
              unit: "mmHg"
              source: "vital_signs"

        - match_logic: "ANY_OF"
          conditions:
            - parameter: "chest_pain"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "dyspnea"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "severe_headache"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "altered_mental_status"
              operator: "=="
              threshold: true
              source: "clinical_assessment"

            - parameter: "troponin_elevation"
              operator: "=="
              threshold: true
              source: "lab_results"

    - condition_id: "HTN-TRIG-002"
      description: "Critical BP elevation (SBP ≥220 or DBP ≥140)"
      match_logic: "ANY_OF"
      conditions:
        - parameter: "systolic_bp"
          operator: ">="
          threshold: 220
          unit: "mmHg"
          source: "vital_signs"

        - parameter: "diastolic_bp"
          operator: ">="
          threshold: 140
          unit: "mmHg"
          source: "vital_signs"

# ============================================================
# CONFIDENCE SCORING
# ============================================================
confidence_scoring:
  base_confidence: 0.85

  modifiers:
    - modifier_id: "HTN-CONF-001"
      description: "Critical BP elevation (>220/140)"
      condition:
        match_logic: "ANY_OF"
        conditions:
          - parameter: "systolic_bp"
            operator: ">="
            threshold: 220
            unit: "mmHg"

          - parameter: "diastolic_bp"
            operator: ">="
            threshold: 140
            unit: "mmHg"
      adjustment: 0.10

    - modifier_id: "HTN-CONF-002"
      description: "Acute coronary syndrome or pulmonary edema"
      condition:
        match_logic: "ANY_OF"
        conditions:
          - parameter: "troponin_elevation"
            operator: "=="
            threshold: true

          - parameter: "pulmonary_edema"
            operator: "=="
            threshold: true
      adjustment: 0.08

    - modifier_id: "HTN-CONF-003"
      description: "Neurological symptoms"
      condition:
        match_logic: "ANY_OF"
        conditions:
          - parameter: "altered_mental_status"
            operator: "=="
            threshold: true

          - parameter: "focal_neurologic_deficit"
            operator: "=="
            threshold: true
      adjustment: 0.07

  activation_threshold: 0.70

# ============================================================
# EVIDENCE SOURCE
# ============================================================
evidence_source:
  primary_guideline: "American College of Cardiology/American Heart Association (ACC/AHA) 2017 Hypertension Guidelines"
  guideline_version: "ACC/AHA 2017"
  publication_date: "2017-11"
  evidence_level: "STRONG"

  key_citations:
    - citation_id: "ACC-AHA-2017-HTN"
      authors: "Whelton PK, Carey RM, Aronow WS, et al."
      title: "2017 ACC/AHA/AAPA/ABC/ACPM/AGS/APhA/ASH/ASPC/NMA/PCNA Guideline for the Prevention, Detection, Evaluation, and Management of High Blood Pressure in Adults"
      journal: "J Am Coll Cardiol"
      year: 2018
      pmid: "29146535"
      doi: "10.1016/j.jacc.2017.11.006"

  last_review_date: "2024-11-01"
  next_review_date: "2026-11-01"

# ============================================================
# ACTIONS
# ============================================================
actions:
  # End-organ damage assessment
  - action_id: "HTN-ACT-001"
    type: "CLINICAL_ASSESSMENT"
    priority: "CRITICAL"
    sequence_number: 1

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 30

    clinical_assessment:
      assessment_type: "End-organ damage assessment"
      frequency: "once"
      specific_parameters:
        - "Chest pain (ACS)"
        - "Dyspnea (pulmonary edema)"
        - "Headache/AMS (encephalopathy)"
        - "Focal neurologic deficit (stroke)"
        - "Distinguish hypertensive emergency from urgency"

  # Laboratory and ECG
  - action_id: "HTN-ACT-002"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 2

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 30

    diagnostic:
      test_name: "ECG, troponin, BNP, creatinine, urinalysis"
      urgency: "STAT"
      instructions: "Assess cardiac ischemia, heart failure, renal injury"

  # Imaging
  - action_id: "HTN-ACT-003"
    type: "DIAGNOSTIC"
    priority: "HIGH"
    sequence_number: 3

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    diagnostic:
      test_name: "Chest X-ray +/- Head CT"
      urgency: "STAT"
      instructions: "CXR for pulmonary edema; Head CT if neurologic symptoms"

  # IV Nicardipine (first-line)
  - action_id: "HTN-ACT-004"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 4

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "NO_AORTIC_STENOSIS"
          description: "Nicardipine for most hypertensive emergencies"

          condition:
            parameter: "severe_aortic_stenosis"
            operator: "=="
            threshold: false

          primary_medication:
            name: "Nicardipine"
            dose: "5"
            dose_unit: "mg/hr"
            route: "IV"
            frequency: "Continuous infusion, titrate by 2.5 mg/hr every 5-15 min"
            duration: "Until BP stabilized, then transition to oral within 24-48h"
            administration_instructions: "Start at 5 mg/hr; increase by 2.5 mg/hr every 5-15 minutes to achieve target BP reduction; max 15 mg/hr"

          alternative_medication:
            name: "Clevidipine"
            dose: "1-2"
            dose_unit: "mg/hr"
            route: "IV"
            frequency: "Titrate by 1-2 mg/hr every 90 seconds"
            indication: "Ultra-short-acting alternative for heart failure patients"

        - criteria_id: "AORTIC_STENOSIS"
          description: "Avoid calcium channel blockers in severe aortic stenosis"

          condition:
            parameter: "severe_aortic_stenosis"
            operator: "=="
            threshold: true

          primary_medication:
            name: "Esmolol"
            dose: "500"
            dose_unit: "mcg/kg"
            route: "IV"
            frequency: "Bolus then 50-200 mcg/kg/min infusion"
            dose_adjustment_rationale: "Beta-blocker preferred in aortic stenosis"

  # IV Labetalol (alternative)
  - action_id: "HTN-ACT-005"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 5

    timing:
      window: "URGENT"
      max_delay_minutes: 60

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "NO_HEART_FAILURE"
          description: "Labetalol for tachycardia or coronary ischemia"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "decompensated_heart_failure"
                operator: "=="
                threshold: false

              - parameter: "heart_block"
                operator: "=="
                threshold: false

              - parameter: "severe_asthma"
                operator: "=="
                threshold: false

          primary_medication:
            name: "Labetalol"
            dose: "20"
            dose_unit: "mg"
            route: "IV"
            frequency: "Bolus q10min (20mg → 40mg → 80mg), max 300mg total"
            administration_instructions: "Start with 20 mg IV bolus over 2 minutes; if inadequate response after 10 minutes, give 40 mg; then 80 mg every 10 minutes"

  # Continuous BP monitoring
  - action_id: "HTN-ACT-006"
    type: "CLINICAL_ASSESSMENT"
    priority: "CRITICAL"
    sequence_number: 6

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 0

    clinical_assessment:
      assessment_type: "Continuous blood pressure monitoring"
      frequency: "every 5 minutes during titration"
      duration_hours: 24
      specific_parameters:
        - "Arterial line preferred for severe cases (BP >220/140)"
        - "Automated cuff every 5 minutes during titration"
        - "Target MAP reduction of 10-20% in first hour"
        - "Do NOT normalize BP immediately"

  # ICU admission
  - action_id: "HTN-ACT-007"
    type: "CONSULTATION"
    priority: "HIGH"
    sequence_number: 7

    timing:
      window: "URGENT"
      max_delay_minutes: 120

    consultation:
      specialty: "CRITICAL_CARE"
      urgency: "URGENT"
      reason: "ICU-level monitoring for titratable IV antihypertensive therapy"
      specific_questions:
        - "Arterial line placement for continuous BP monitoring?"
        - "ICU bed availability?"

  # Specialty consultation based on organ involvement
  - action_id: "HTN-ACT-008"
    type: "CONSULTATION"
    priority: "MEDIUM"
    sequence_number: 8

    timing:
      window: "URGENT"
      max_delay_minutes: 240

    consultation:
      specialty: "CARDIOLOGY"
      urgency: "URGENT"
      reason: "Cardiology for ACS, heart failure; Neurology for stroke/encephalopathy; Nephrology for AKI"

# ============================================================
# TIME CONSTRAINTS
# ============================================================
time_constraints:
  - constraint_id: "HTN-TIME-001"
    bundle_name: "Hour-1 BP Reduction Bundle"
    description: "Gradual BP reduction within first hour (10-20% MAP reduction)"
    offset_minutes: 60
    critical: true

    required_actions:
      - action_id: "HTN-ACT-001"
        description: "End-organ damage assessment"
      - action_id: "HTN-ACT-002"
        description: "Laboratory assessment"
      - action_id: "HTN-ACT-004"
        description: "IV antihypertensive initiation"
      - action_id: "HTN-ACT-006"
        description: "Continuous BP monitoring"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 30
      critical_alert_at_minutes: 0
      missed_deadline_message: "Target 10-20% MAP reduction in first hour; avoid excessive reduction"

# ============================================================
# CONTRAINDICATIONS
# ============================================================
contraindications:
  - contraindication_id: "HTN-CONTRA-001"
    condition_description: "Acute ischemic stroke (permissive hypertension)"

    trigger_condition:
      parameter: "acute_ischemic_stroke"
      operator: "=="
      threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "HTN-ACT-004"
      - "HTN-ACT-005"

    alternative_action:
      action_id: "HTN-CONTRA-ALT-001"
      type: "CONSULTATION"
      consultation:
        specialty: "NEUROLOGY"
        urgency: "STAT"
        reason: "Permissive hypertension may be beneficial in acute stroke (SBP <220); neurology guidance required before BP reduction"

  - contraindication_id: "HTN-CONTRA-002"
    condition_description: "Aortic dissection suspected"

    trigger_condition:
      parameter: "aortic_dissection_suspected"
      operator: "=="
      threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "HTN-ACT-004"

    alternative_action:
      action_id: "HTN-CONTRA-ALT-002"
      type: "MEDICATION"
      medication:
        name: "Esmolol + Nicardipine"
        dose: "Esmolol 500 mcg/kg bolus + nicardipine 5 mg/hr"
        route: "IV"
      rationale: "Beta-blocker FIRST before vasodilation to prevent aortic stress; target HR <60 and SBP <120"

  - contraindication_id: "HTN-CONTRA-003"
    condition_description: "Severe aortic stenosis"

    trigger_condition:
      parameter: "severe_aortic_stenosis"
      operator: "=="
      threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "HTN-ACT-004"

    alternative_action:
      action_id: "HTN-CONTRA-ALT-003"
      type: "MEDICATION"
      medication:
        name: "Esmolol"
        dose: "500 mcg/kg bolus then 50-200 mcg/kg/min"
        route: "IV"
      rationale: "Avoid vasodilators in aortic stenosis; use beta-blocker"

# ============================================================
# MONITORING REQUIREMENTS
# ============================================================
monitoring_requirements:
  - monitoring_id: "HTN-MON-001"
    parameter: "blood_pressure"

    target_range:
      min: null
      max: null  # Target 10-20% reduction in first hour
      unit: "mmHg"

    frequency: "every 5 minutes during titration, then every 15 minutes once stable"
    duration_hours: 24

    alert_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "map_reduction_percentage"
          operator: ">"
          threshold: 25

        - parameter: "map_reduction_percentage"
          operator: "<"
          threshold: 10

  - monitoring_id: "HTN-MON-002"
    parameter: "heart_rate"

    target_range:
      min: 60
      max: 100
      unit: "bpm"

    frequency: "continuous"
    duration_hours: 24

# ============================================================
# SPECIAL POPULATIONS
# ============================================================
special_populations:
  - population_id: "ELDERLY"
    description: "Patients ≥65 years"

    inclusion_criteria:
      parameter: "age"
      operator: ">="
      threshold: 65
      unit: "years"

    modifications:
      - action_id: "HTN-ACT-004"
        modification_type: "CAUTION"
        rationale: "Elderly patients more susceptible to cerebral hypoperfusion with rapid BP reduction"

        new_parameters:
          monitoring: "More gradual BP reduction (aim for lower end of 10-20% target); monitor for confusion and weakness"

  - population_id: "PREGNANCY"
    description: "Pregnant patients"

    inclusion_criteria:
      parameter: "pregnancy_status"
      operator: "=="
      threshold: true

    modifications:
      - action_id: "HTN-ACT-004"
        modification_type: "CONTRAINDICATION"
        rationale: "Nicardipine and labetalol both acceptable in pregnancy, but avoid ACE inhibitors and ARBs"

        alternative_medication:
          name: "Labetalol (preferred) or Nifedipine"
          dose: "20 mg labetalol IV or 10 mg nifedipine immediate-release PO"
          route: "IV or PO"
          indication: "Safe in pregnancy for severe preeclampsia/eclampsia"

  - population_id: "RENAL_IMPAIRMENT"
    description: "Severe renal impairment or ESRD"

    inclusion_criteria:
      parameter: "egfr"
      operator: "<"
      threshold: 30
      unit: "mL/min"

    modifications:
      - action_id: "HTN-ACT-004"
        modification_type: "CAUTION"
        rationale: "Monitor for worsening renal function with rapid BP reduction"

        new_parameters:
          monitoring: "Daily creatinine; avoid excessive BP reduction which may worsen renal perfusion"

# ============================================================
# ESCALATION RULES
# ============================================================
escalation_rules:
  - rule_id: "HTN-ESC-001"
    description: "Refractory hypertension despite maximal therapy"

    escalation_trigger:
      match_logic: "ALL_OF"
      conditions:
        - parameter: "nicardipine_dose"
          operator: ">="
          threshold: 15
          unit: "mg/hr"

        - parameter: "map_reduction_percentage"
          operator: "<"
          threshold: 10

    recommendation:
      escalation_level: "CONSULT"
      urgency: "URGENT"
      rationale: "Refractory hypertension may indicate secondary causes or need for combination therapy"

      specialist_consultation:
        - specialty: "NEPHROLOGY"
          urgency: "URGENT"
          specific_question: "Secondary hypertension evaluation; possible renal artery stenosis or pheochromocytoma"

  - rule_id: "HTN-ESC-002"
    description: "Excessive BP reduction or symptomatic hypotension"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "map_reduction_percentage"
          operator: ">"
          threshold: 25

        - parameter: "symptomatic_hypotension"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "IMMEDIATE_TRANSFER"
      urgency: "STAT"
      rationale: "Stop infusion; monitor for cerebral/cardiac hypoperfusion; consider IV fluids"

      required_interventions:
        - "Stop antihypertensive infusion immediately"
        - "Consider IV fluids (250-500 mL bolus)"
        - "Neurologic exam for stroke symptoms"
        - "ECG for cardiac ischemia"

# ============================================================
# DE-ESCALATION CRITERIA
# ============================================================
de_escalation_criteria:
  - criteria_id: "HTN-DE-ESC-001"
    description: "Transition to oral antihypertensives"

    conditions:
      - parameter: "bp_stable_hours"
        operator: ">="
        threshold: 24

      - parameter: "systolic_bp"
        operator: "<"
        threshold: 160
        unit: "mmHg"

      - parameter: "diastolic_bp"
        operator: "<"
        threshold: 100
        unit: "mmHg"

    recommendation:
      action: "Transition from IV to oral antihypertensive therapy"
      rationale: "BP controlled for 24 hours; ready for oral regimen"
      specific_changes:
        - "Start oral amlodipine 5-10 mg daily or metoprolol 25-50 mg BID"
        - "Overlap IV and oral for 6-12 hours"
        - "Wean IV infusion gradually"

# ============================================================
# OUTCOME TRACKING
# ============================================================
outcome_tracking:
  primary_outcomes:
    - outcome_id: "HTN-OUT-001"
      metric: "bp_reduction_first_hour"
      target: "10-20% MAP reduction in >90% of cases"

    - outcome_id: "HTN-OUT-002"
      metric: "resolution_of_end_organ_symptoms"
      target: ">85% symptom resolution within 2-4 hours"

  process_measures:
    - measure_id: "HTN-PROC-001"
      description: "Time to IV antihypertensive initiation"
      target: "<60 minutes from diagnosis"

    - measure_id: "HTN-PROC-002"
      description: "Gradual BP reduction compliance"
      target: ">95% achieve 10-20% reduction without excessive drop"

# ============================================================
# METADATA
# ============================================================
metadata:
  protocol_type: "CLINICAL_PATHWAY"
  implementation_complexity: "HIGH"
  requires_icu_level_care: true
  estimated_implementation_time_minutes: 60

  tags:
    - "cardiovascular"
    - "hypertensive-emergency"
    - "gradual-bp-reduction"
    - "ICU-required"

  change_log:
    - version: "2.1"
      date: "2025-10-21"
      changes:
        - "Enhanced to CDS-compliant structure"
        - "Added medication selection algorithms (nicardipine vs labetalol)"
        - "Added contraindication handling (aortic stenosis, stroke, dissection)"
        - "Enhanced special population guidance (pregnancy, elderly, renal)"
        - "Added gradual BP reduction monitoring and targets"
