# Acute Kidney Injury Management Protocol - KDIGO 2024
protocol_id: "AKI-MANAGEMENT-001"
name: "Acute Kidney Injury Management Protocol"
version: "2024.1"
category: "NEPHROLOGY"
source: "Kidney Disease: Improving Global Outcomes (KDIGO) 2024"
guideline_reference: "KDIGO 2024 Clinical Practice Guideline for Acute Kidney Injury. Kidney Int. 2024"
last_updated: "2024-01-01"

# Activation criteria - ANY of these conditions triggers the protocol
activation_criteria:
  - condition: "Serum creatinine criteria"
    description: "Rise in serum creatinine meeting KDIGO AKI definition"
    parameters:
      - "Increase in SCr ≥0.3 mg/dL within 48 hours"
      - "Increase in SCr to ≥1.5 times baseline (within prior 7 days)"
      - "Known or presumed to have occurred within prior 7 days"

  - condition: "Urine output criteria"
    description: "Oliguria meeting KDIGO AKI definition"
    parameters:
      - "Urine output <0.5 mL/kg/hr for 6 consecutive hours"
      - "Urine output <0.3 mL/kg/hr for ≥24 hours (Stage 3)"
      - "Anuria for ≥12 hours"

  - condition: "Clinical presentation of AKI"
    description: "Signs and symptoms suggesting acute kidney injury"
    parameters:
      - "Sudden onset oliguria or anuria"
      - "Volume overload (edema, pulmonary congestion)"
      - "Electrolyte abnormalities (hyperkalemia, acidosis)"
      - "Uremic symptoms (nausea, confusion, pericarditis)"

# Priority determination based on KDIGO AKI staging
priority_determination:
  base_priority: "P1_URGENT"
  urgency_factors:
    - condition: "Stage 3 AKI (Cr ≥3x baseline OR Cr ≥4.0 mg/dL OR UO <0.3 mL/kg/hr x24h OR anuria) OR life-threatening complications"
      priority_modifier: "IMMEDIATE"
      timeframe: "0 minutes"
    - condition: "Stage 2 AKI (Cr 2-2.9x baseline OR UO <0.5 mL/kg/hr x12-24h) OR hyperkalemia >6.0"
      priority_modifier: "URGENT"
      timeframe: "< 30 minutes"
    - condition: "Stage 1 AKI (Cr 1.5-1.9x baseline OR UO <0.5 mL/kg/hr x6-12h)"
      priority_modifier: "URGENT"
      timeframe: "< 1 hour"
  default_timeframe: "< 2 hours"

# Clinical actions in recommended sequence
actions:
  - action_id: "AKI-ACT-001"
    category: "DIAGNOSTIC"
    sequence_order: 1
    description: "Obtain comprehensive metabolic panel and urinalysis"
    urgency: "STAT"
    timeframe: "within 30 minutes"
    rationale: "CMP confirms AKI stage, identifies electrolyte abnormalities and acid-base disturbances; urinalysis helps determine etiology"

    diagnostic_details:
      test_name: "Comprehensive metabolic panel (CMP), urinalysis with microscopy"
      test_type: "LAB"
      clinical_indication: "Confirm AKI, stage severity, identify complications (hyperkalemia, acidosis), determine pre-renal vs intrinsic vs post-renal cause"
      specimen_requirements:
        - "Serum sample for CMP (creatinine, BUN, electrolytes, bicarb, glucose)"
        - "Fresh urine sample for urinalysis (dipstick and microscopy)"
        - "Avoid delay in analysis"
      expected_findings: "Elevated Cr (compare to baseline), elevated BUN, possible hyperkalemia (>5.5), metabolic acidosis (bicarb <20); UA: proteinuria, hematuria, casts (muddy brown casts suggest ATN)"
      interpretation_guidance: "BUN/Cr ratio >20:1 suggests pre-renal; ratio <10-15:1 suggests intrinsic AKI; review urine sediment for casts (granular casts = ATN, RBC casts = glomerulonephritis)"
      result_timeframe: "30-60 minutes"

    evidence:
      - title: "KDIGO 2024 - Laboratory Diagnosis of AKI"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "1.1"
        grade: "Strong recommendation, High evidence"
        summary: "Measure SCr and urine output to diagnose and stage AKI; obtain urinalysis to determine cause"

    prerequisite_checks:
      - "Verify baseline creatinine available (within 7 days or estimate from MDRD equation)"
      - "Urine output monitored (foley catheter or strict I&O)"

    monitoring_parameters: "Repeat CMP every 6-12 hours initially (Stage 2-3 AKI) or daily (Stage 1); trend creatinine and electrolytes; monitor urine output hourly"

  - action_id: "AKI-ACT-002"
    category: "DIAGNOSTIC"
    sequence_order: 2
    description: "Calculate fractional excretion of sodium (FENa) or urea (FEUrea)"
    urgency: "URGENT"
    timeframe: "within 1 hour"
    rationale: "FENa/FEUrea helps differentiate pre-renal AKI (volume responsive) from intrinsic AKI (ATN)"

    diagnostic_details:
      test_name: "Fractional excretion of sodium (FENa) or fractional excretion of urea (FEUrea)"
      test_type: "CALCULATED LAB"
      clinical_indication: "Differentiate pre-renal AKI from acute tubular necrosis (ATN)"
      specimen_requirements:
        - "Simultaneous serum and urine samples for Na, Cr (FENa) or urea (FEUrea)"
        - "Obtain BEFORE diuretic administration (diuretics falsely elevate FENa)"
      calculation:
        - "FENa = (Urine Na / Serum Na) / (Urine Cr / Serum Cr) x 100"
        - "FEUrea = (Urine Urea / Serum Urea) / (Urine Cr / Serum Cr) x 100"
      interpretation_guidance: "FENa <1% OR FEUrea <35% suggests pre-renal AKI (volume responsive); FENa >2% OR FEUrea >50% suggests ATN; Use FEUrea if patient on diuretics"
      expected_findings: "Pre-renal: FENa <1%, FEUrea <35%; ATN: FENa >2%, FEUrea >50%"

    evidence:
      - title: "KDIGO 2024 - FENa and FEUrea in AKI"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        recommendation: "1.2"
        grade: "Conditional recommendation, Moderate evidence"
        summary: "FENa or FEUrea can help distinguish pre-renal from intrinsic AKI when clinical assessment unclear"

    prerequisite_checks:
      - "Obtain BEFORE diuretics if possible (use FEUrea if on diuretics)"
      - "Ensure simultaneous serum and urine samples"

    monitoring_parameters: "Single measurement usually sufficient; repeat only if clinical picture changes or diagnosis uncertain"

  - action_id: "AKI-ACT-003"
    category: "DIAGNOSTIC"
    sequence_order: 3
    description: "Obtain renal ultrasound to assess for obstruction"
    urgency: "STAT"
    timeframe: "within 2-4 hours"
    rationale: "Renal ultrasound identifies post-renal obstruction (hydronephrosis), kidney size (acute vs chronic), and structural abnormalities"

    diagnostic_details:
      test_name: "Renal ultrasound (non-contrast)"
      test_type: "IMAGING"
      clinical_indication: "Rule out obstructive uropathy (post-renal AKI), assess kidney size and structure"
      expected_findings: "Hydronephrosis (dilated collecting system) suggests obstruction; normal or enlarged kidneys suggest acute process; small kidneys (<9 cm) suggest chronic kidney disease"
      interpretation_guidance: "Bilateral hydronephrosis = bladder outlet obstruction (BPH, neurogenic bladder); unilateral hydronephrosis = ureteral obstruction (stone, tumor, stricture); absence of hydronephrosis does NOT exclude early obstruction"

    evidence:
      - title: "KDIGO 2024 - Imaging in AKI"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "2.1"
        grade: "Strong recommendation, Moderate evidence"
        summary: "Perform renal ultrasound to rule out obstruction in all patients with AKI of unclear etiology"

    prerequisite_checks:
      - "No contrast needed (avoid contrast in AKI)"
      - "Can be performed at bedside (portable ultrasound)"

    monitoring_parameters: "Single ultrasound usually sufficient; repeat if clinical suspicion for obstruction persists or AKI worsens"

  - action_id: "AKI-ACT-004"
    category: "DIAGNOSTIC"
    sequence_order: 4
    description: "Review medication list and stop nephrotoxins"
    urgency: "STAT"
    timeframe: "within 30 minutes"
    rationale: "Nephrotoxic medications are a common reversible cause of AKI; early discontinuation prevents further injury"

    diagnostic_details:
      clinical_guidance: "Systematically review all medications; stop or adjust nephrotoxic drugs"

      nephrotoxic_medications_to_stop:
        - category: "NSAIDs"
          examples: "Ibuprofen, naproxen, ketorolac"
          rationale: "Cause afferent arteriolar vasoconstriction, reduce GFR, can cause ATN or interstitial nephritis"

        - category: "ACE inhibitors / ARBs"
          examples: "Lisinopril, losartan, enalapril"
          rationale: "Reduce efferent arteriolar tone, can precipitate AKI in volume depletion or bilateral renal artery stenosis; STOP temporarily, restart when Cr stable"

        - category: "Diuretics (if hypovolemic)"
          examples: "Furosemide, hydrochlorothiazide"
          rationale: "Can worsen pre-renal AKI by reducing intravascular volume; hold until euvolemic"

        - category: "Aminoglycosides"
          examples: "Gentamicin, tobramycin"
          rationale: "Direct tubular toxicity; avoid or use with extreme caution (monitor levels)"

        - category: "IV contrast"
          examples: "Iodinated contrast for CT scans, angiography"
          rationale: "Contrast-induced nephropathy; avoid or use iso-osmolar contrast with prophylaxis (IV fluids)"

        - category: "Vancomycin"
          examples: "Vancomycin"
          rationale: "Tubular toxicity, especially with supratherapeutic trough levels; monitor levels closely"

        - category: "Other nephrotoxins"
          examples: "Amphotericin B, cisplatin, methotrexate, lithium, calcineurin inhibitors (tacrolimus, cyclosporine)"
          rationale: "Various mechanisms of nephrotoxicity; adjust dose or discontinue"

      medications_requiring_dose_adjustment:
        - "Renally cleared antibiotics (adjust for GFR): cephalosporins, fluoroquinolones, beta-lactams"
        - "Anticoagulants (enoxaparin, dabigatran): reduce dose based on CrCl"
        - "Antidiabetic agents (metformin, SGLT2 inhibitors): hold or adjust"
        - "Antivirals (acyclovir, ganciclovir): adjust for renal function"

    evidence:
      - title: "KDIGO 2024 - Nephrotoxin Avoidance in AKI"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "3.1"
        grade: "Strong recommendation, High evidence"
        summary: "Discontinue nephrotoxic agents and adjust doses of renally cleared drugs in AKI"

    prerequisite_checks:
      - "Obtain complete medication list (including OTC NSAIDs, supplements)"
      - "Calculate CrCl or eGFR for dose adjustments"

    monitoring_parameters: "Daily medication review; restart ACE-I/ARB once Cr stable and euvolemic (after discharge); continue to monitor renal function"

  - action_id: "AKI-ACT-005"
    category: "THERAPEUTIC"
    sequence_order: 5
    description: "Assess volume status and initiate appropriate fluid management"
    urgency: "STAT"
    timeframe: "within 1 hour"
    rationale: "Volume resuscitation is first-line therapy for pre-renal AKI; avoid over-resuscitation in euvolemic/hypervolemic states"

    medication_details:
      name: "Isotonic crystalloid fluid (0.9% Normal Saline or Lactated Ringer's)"
      drug_class: "Crystalloid resuscitation fluid"
      indication: "Pre-renal AKI from hypovolemia (dehydration, blood loss, sepsis)"

      volume_status_assessment:
        - status: "Hypovolemic (pre-renal AKI)"
          clinical_signs: "Hypotension, tachycardia, dry mucous membranes, low JVP, decreased skin turgor, orthostatic hypotension"
          fena: "<1%"
          bun_cr_ratio: ">20:1"
          treatment: "IV fluid bolus 500-1000 mL over 1-2 hours; reassess; goal is euvolemia"

        - status: "Euvolemic (intrinsic AKI)"
          clinical_signs: "Normal vital signs, normal JVP, no edema"
          fena: ">2%"
          bun_cr_ratio: "10-15:1"
          treatment: "Maintenance IV fluids (75-100 mL/hr) to match insensible losses + urine output; avoid over-resuscitation"

        - status: "Hypervolemic (volume overload, heart failure, nephrotic syndrome)"
          clinical_signs: "Hypertension, elevated JVP, pulmonary edema, peripheral edema"
          treatment: "AVOID IV fluids; give IV diuretics (furosemide 40-80 mg IV); fluid restriction"

      dose_calculation_method: "clinical_assessment"
      standard_dose: "500-1000 mL bolus if hypovolemic"
      dose_unit: "mL"

      route: "IV"
      administration_instructions: "IV bolus over 1-2 hours if hypovolemic; reassess volume status after each bolus; monitor for fluid overload"
      frequency: "Bolus, then reassess; transition to maintenance rate"
      duration: "Until euvolemia achieved"

      adverse_effects:
        - "Fluid overload (pulmonary edema) if over-resuscitated"
        - "Hyperchloremic metabolic acidosis (with normal saline)"
        - "Worsening hypertension or heart failure if hypervolemic patient receives fluids"

      monitoring:
        - "Vital signs (BP, HR) every 15-30 min during resuscitation"
        - "Urine output (goal >0.5 mL/kg/hr)"
        - "Volume status reassessment (JVP, lung exam, edema)"
        - "Daily weights"
        - "Creatinine response (should improve within 24-48 hours if pre-renal)"

    evidence:
      - title: "KDIGO 2024 - Fluid Management in AKI"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "4.1"
        grade: "Strong recommendation, Moderate evidence"
        summary: "Use isotonic crystalloids for volume expansion in hypovolemic AKI; avoid fluid overload"
      - title: "SMART Trial - Balanced crystalloids vs saline"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "N Engl J Med. 2018;378:829-839"
        summary: "Balanced crystalloids (LR) reduced adverse kidney outcomes vs normal saline"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Volume overload (pulmonary edema, peripheral edema, elevated JVP)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Give IV diuretics (furosemide 40-80 mg IV) instead of fluids; fluid restriction; monitor for response"

      - type: "CLINICAL_CONDITION"
        description: "Heart failure with reduced ejection fraction (HFrEF)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Use small boluses (250-500 mL) with frequent reassessment; avoid fluid overload"

      - type: "CLINICAL_CONDITION"
        description: "Hypernatremia (Na >150 mmol/L)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Use D5W or hypotonic saline to correct hypernatremia while resuscitating"

    prerequisite_checks:
      - "Assess volume status clinically: vital signs, JVP, mucous membranes, skin turgor, lung exam, edema"
      - "Consider passive leg raise test or fluid responsiveness assessment (pulse pressure variation)"
      - "Baseline creatinine and BUN/Cr ratio"

    monitoring_parameters: "Reassess volume status after each 500-1000 mL bolus; monitor urine output (goal >0.5 mL/kg/hr); daily weights; repeat CMP in 6-12 hours to assess creatinine response"

  - action_id: "AKI-ACT-006"
    category: "THERAPEUTIC"
    sequence_order: 6
    description: "Treat underlying cause of AKI"
    urgency: "URGENT"
    timeframe: "within 1-2 hours"
    rationale: "Identifying and treating the underlying cause is essential for AKI recovery"

    treatment_options:
      - etiology: "Pre-renal (hypovolemia)"
        treatment: "IV fluid resuscitation (see action AKI-ACT-005)"
        examples: "0.9% NS or LR 500-1000 mL boluses; goal euvolemia"

      - etiology: "Post-renal (obstruction)"
        treatment: "Relieve obstruction: Foley catheter (bladder outlet obstruction), urology consultation for ureteral stent or nephrostomy tube"
        examples: "Insert foley for urinary retention; urgent urology consult for stones/tumors"

      - etiology: "Sepsis-induced AKI"
        treatment: "Sepsis bundle: IV fluids, broad-spectrum antibiotics, source control"
        examples: "30 mL/kg crystalloid, antibiotics within 1 hour, remove infected catheters"

      - etiology: "Cardiorenal syndrome (heart failure)"
        treatment: "Optimize cardiac output: IV diuretics (furosemide), inotropes if low output, treat underlying heart failure"
        examples: "Furosemide 40-80 mg IV; dobutamine if cardiogenic shock"

      - etiology: "Acute tubular necrosis (ATN)"
        treatment: "Supportive care, avoid nephrotoxins, maintain euvolemia; ATN typically resolves in 7-14 days"
        examples: "Stop nephrotoxins, maintenance IV fluids, monitor for recovery"

      - etiology: "Acute interstitial nephritis (AIN)"
        treatment: "Stop offending drug (NSAIDs, antibiotics, PPIs); consider corticosteroids if severe"
        examples: "Stop NSAID; prednisone 0.5-1 mg/kg/day if biopsy-confirmed AIN"

      - etiology: "Contrast-induced nephropathy"
        treatment: "IV fluids (isotonic bicarb or saline) before and after contrast; avoid repeat contrast; consider N-acetylcysteine (weak evidence)"
        examples: "Isotonic bicarb 1 mL/kg/hr x 12 hours pre- and post-contrast"

      - etiology: "Rhabdomyolysis"
        treatment: "Aggressive IV fluid resuscitation (goal UO 200-300 mL/hr), urine alkalinization (isotonic bicarb), monitor CK and electrolytes"
        examples: "Normal saline 1-2 L/hr; sodium bicarb to maintain urine pH >6.5"

      - etiology: "Glomerulonephritis (suspected if hematuria, proteinuria, RBC casts)"
        treatment: "Nephrology consultation urgently; may need kidney biopsy; immunosuppression"
        examples: "Urgent nephrology consult; IV methylprednisolone if rapidly progressive GN"

    evidence:
      - title: "KDIGO 2024 - Treating Underlying Causes of AKI"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "5.1"
        grade: "Strong recommendation"
        summary: "Identify and treat underlying cause to improve AKI outcomes"

    prerequisite_checks:
      - "Determine most likely etiology from history, labs, imaging"
      - "Adjust treatment based on cause"

    monitoring_parameters: "Monitor for response to therapy; trend creatinine; adjust treatment if no improvement in 24-48 hours"

  - action_id: "AKI-ACT-007"
    category: "THERAPEUTIC"
    sequence_order: 7
    description: "Manage electrolyte abnormalities and metabolic acidosis"
    urgency: "URGENT to STAT (depending on severity)"
    timeframe: "within 1-2 hours (STAT for severe hyperkalemia >6.5)"
    rationale: "Hyperkalemia and severe acidosis are life-threatening complications of AKI requiring urgent treatment"

    medication_details:
      name: "Hyperkalemia management protocol"
      indication: "Hyperkalemia (K >5.5 mmol/L) complicating AKI"

      hyperkalemia_management:
        - severity: "Mild (K 5.5-6.0)"
          treatment: "Eliminate K sources (stop K supplements, ACE-I/ARB); loop diuretic (furosemide 40 mg IV); resin binder (sodium zirconium cyclosilicate 10g PO TID or patiromer 8.4g PO daily)"
          urgency: "URGENT"

        - severity: "Moderate (K 6.0-6.5)"
          treatment: "Above + Insulin/glucose (10 units regular insulin IV + 1 amp D50 or 25g glucose); albuterol nebulizer (10-20 mg)"
          urgency: "URGENT"

        - severity: "Severe (K >6.5 OR ECG changes)"
          treatment: "STAT: Calcium gluconate 1g IV (cardioprotection); Insulin/glucose + Albuterol + Furosemide; prepare for dialysis if refractory"
          urgency: "STAT"
          ecg_changes: "Peaked T waves, widened QRS, loss of P waves, sine wave (emergent dialysis needed)"

      metabolic_acidosis_management:
        - condition: "Severe metabolic acidosis (pH <7.20, bicarb <10)"
          treatment: "Sodium bicarbonate 50-100 mEq IV over 1-2 hours; repeat as needed to maintain pH >7.20; consider dialysis if refractory"
          rationale: "Severe acidosis impairs cardiac contractility and increases K+ release from cells"

    evidence:
      - title: "KDIGO 2024 - Electrolyte Management in AKI"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "6.1"
        grade: "Strong recommendation, High evidence"
        summary: "Aggressively manage hyperkalemia and severe acidosis to prevent cardiac arrhythmias and death"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Severe metabolic alkalosis (pH >7.50)"
        severity: "ABSOLUTE for bicarbonate therapy"
        alternative_action:
          clinical_guidance: "Do not give bicarbonate if alkalotic; focus on treating AKI"

    prerequisite_checks:
      - "Obtain ECG if K >6.0 (look for peaked T waves, widened QRS)"
      - "Check blood gas if acidosis suspected (pH, bicarb)"

    required_lab_values:
      - "potassium"
      - "bicarbonate or pH"

    monitoring_parameters: "Repeat K and bicarb every 2-4 hours during acute treatment; continuous ECG monitoring if K >6.5; prepare for dialysis if refractory hyperkalemia (K >7.0) or severe acidosis (pH <7.10)"

  - action_id: "AKI-ACT-008"
    category: "MONITORING"
    sequence_order: 8
    description: "Continuous monitoring and strict intake/output"
    urgency: "STAT"
    timeframe: "Immediate"
    rationale: "Close monitoring detects complications early and guides fluid management and treatment adjustments"

    monitoring_parameters: "Strict intake/output (foley catheter recommended for accurate UO monitoring); hourly urine output (goal >0.5 mL/kg/hr); daily weights (same time, same scale); vital signs q2-4h; continuous cardiac telemetry if hyperkalemia; daily CMP (creatinine, electrolytes, bicarb)"

    evidence:
      - title: "KDIGO 2024 - Monitoring in AKI"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Strong recommendation"
        summary: "Close monitoring of urine output, electrolytes, and volume status is essential for AKI management"

  - action_id: "AKI-ACT-009"
    category: "ESCALATION"
    sequence_order: 9
    description: "Nephrology consultation for Stage 2-3 AKI or complications"
    urgency: "URGENT"
    timeframe: "within 2-4 hours for Stage 3, within 24 hours for Stage 2"
    rationale: "Nephrology expertise guides complex AKI management and determines need for renal replacement therapy (dialysis)"

    escalation_criteria:
      - "Stage 3 AKI (Cr ≥3x baseline OR Cr ≥4.0 mg/dL OR UO <0.3 mL/kg/hr x24h)"
      - "Life-threatening complications: Hyperkalemia >6.5 refractory to medical management, severe acidosis (pH <7.10), uremia (pericarditis, encephalopathy), volume overload unresponsive to diuretics"
      - "Suspected glomerulonephritis (hematuria, proteinuria, RBC casts)"
      - "AKI of unclear etiology requiring kidney biopsy"
      - "Need for renal replacement therapy (dialysis) consideration"

    dialysis_indications:
      - "Refractory hyperkalemia (K >7.0 despite medical management)"
      - "Severe metabolic acidosis (pH <7.10) unresponsive to bicarbonate"
      - "Volume overload causing pulmonary edema unresponsive to diuretics"
      - "Uremic complications (pericarditis, encephalopathy, bleeding)"
      - "Toxic ingestions (ethylene glycol, methanol, lithium, aspirin)"

    evidence:
      - title: "KDIGO 2024 - Nephrology Consultation and RRT"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "7.1"
        grade: "Strong recommendation, Moderate evidence"
        summary: "Consult nephrology for Stage 3 AKI or complications; initiate RRT for life-threatening complications"

# Overall protocol contraindications
contraindications:
  - type: "GOALS_OF_CARE"
    description: "Comfort measures only (CMO) or hospice status"
    severity: "ABSOLUTE"
    rationale: "Dialysis and aggressive AKI management inconsistent with comfort-focused goals"

  - type: "CLINICAL_CONTEXT"
    description: "End-stage renal disease (ESRD) already on dialysis"
    severity: "RELATIVE"
    rationale: "Protocol targets acute changes; chronic dialysis patients follow different management"

  - type: "CLINICAL_CONTEXT"
    description: "Chronic kidney disease Stage 5 (eGFR <15) without acute change"
    severity: "RELATIVE"
    rationale: "Elevated baseline creatinine does NOT indicate AKI without acute rise"

# Monitoring requirements for overall protocol
monitoring_requirements:
  - parameter: "Serum creatinine and BUN"
    frequency: "Daily (or every 6-12 hours if Stage 3 AKI)"
    target: "Trend toward baseline; improvement expected in 24-48h if pre-renal and treated"

  - parameter: "Electrolytes (Na, K, Cl, bicarb)"
    frequency: "Daily (or every 6-12 hours if severe hyperkalemia or acidosis)"
    target: "K 3.5-5.0 mmol/L, bicarb >20 mmol/L, Na 135-145 mmol/L"

  - parameter: "Urine output"
    frequency: "Hourly (use foley catheter for accuracy)"
    target: ">0.5 mL/kg/hr (>35 mL/hr for 70 kg patient)"

  - parameter: "Daily weights"
    frequency: "Daily (same time, same scale)"
    target: "Stable weight (euvolemia)"

  - parameter: "Vital signs"
    frequency: "Every 2-4 hours"
    target: "BP, HR stable; monitor for volume overload or depletion"

  - parameter: "Volume status assessment"
    frequency: "Every shift (q8-12h): JVP, lung exam, edema, mucous membranes"
    target: "Euvolemia (no JVP elevation, clear lungs, trace or no edema)"

  - parameter: "ECG"
    frequency: "STAT if K >6.0, then PRN for hyperkalemia monitoring"
    target: "Normal sinus rhythm, no peaked T waves or QRS widening"

# Escalation criteria for worsening AKI
escalation_criteria:
  - condition: "Worsening renal function despite treatment (Cr continues to rise or UO declining)"
    action: "Nephrology consultation; reassess volume status and nephrotoxins; consider kidney biopsy if etiology unclear"
    timeframe: "< 24 hours"

  - condition: "Life-threatening hyperkalemia (K >7.0 OR ECG changes refractory to medical therapy)"
    action: "Emergent dialysis; nephrology consultation STAT; continuous cardiac monitoring"
    timeframe: "< 1 hour"

  - condition: "Severe metabolic acidosis (pH <7.10) unresponsive to bicarbonate"
    action: "Emergent dialysis; ICU transfer; nephrology consultation STAT"
    timeframe: "< 1 hour"

  - condition: "Volume overload with pulmonary edema unresponsive to diuretics"
    action: "Emergent dialysis (ultrafiltration); ICU transfer; nephrology consultation"
    timeframe: "< 2 hours"

  - condition: "Uremic complications (pericarditis, encephalopathy, bleeding)"
    action: "Emergent dialysis; ICU transfer; nephrology consultation STAT"
    timeframe: "< 2 hours"

  - condition: "Obstructive uropathy confirmed on imaging"
    action: "Urgent urology consultation for bladder catheter, ureteral stent, or nephrostomy tube"
    timeframe: "< 2 hours"

  - condition: "Suspected glomerulonephritis (hematuria, RBC casts, proteinuria)"
    action: "Urgent nephrology consultation for kidney biopsy and immunosuppression consideration"
    timeframe: "< 4 hours"

# Expected clinical outcomes
expected_outcomes:
  - outcome: "Urine output restoration (>0.5 mL/kg/hr)"
    timeframe: "6-24 hours (if pre-renal AKI)"

  - outcome: "Creatinine stabilization or improvement"
    timeframe: "24-48 hours (if pre-renal AKI and treated); ATN may take 7-14 days for recovery"

  - outcome: "Electrolyte normalization (K <5.5, bicarb >20)"
    timeframe: "12-24 hours with treatment"

  - outcome: "Volume status optimization (euvolemia)"
    timeframe: "24-48 hours"

  - outcome: "Resolution of uremic symptoms (if present)"
    timeframe: "48-72 hours (may require dialysis if severe)"

# Recovery and completion criteria
completion_criteria:
  - "Creatinine returned to baseline or stabilized at new baseline"
  - "Urine output adequate (>0.5 mL/kg/hr sustained)"
  - "Electrolytes normalized (K 3.5-5.0, bicarb >20)"
  - "Volume status euvolemic (no edema, no pulmonary congestion)"
  - "Nephrotoxins discontinued or doses adjusted appropriately"
  - "Underlying cause treated or resolving (obstruction relieved, sepsis controlled, volume resuscitated)"
  - "If intrinsic AKI (ATN): recovery expected in 7-14 days; may discharge with close follow-up"
  - "If dialysis initiated: ongoing dialysis plan established with nephrology"
  - "Patient education: medication adjustments, nephrotoxin avoidance, follow-up labs, when to seek care"
  - "Follow-up arranged: Nephrology clinic within 1-2 weeks; primary care within 1 week; repeat CMP in 3-5 days"
