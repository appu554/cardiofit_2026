# Acute Heart Failure Decompensation - ACC/AHA 2022
protocol_id: "HF-ACUTE-DECOMP-001"
name: "Acute Heart Failure Decompensation Management"
version: "2022.1"
category: "CARDIOLOGY"
source: "American College of Cardiology/American Heart Association 2022"
guideline_reference: "Heidenreich PA, et al. 2022 AHA/ACC/HFSA Guideline for Management of Heart Failure. Circulation. 2022;145:e895-e1032"
last_updated: "2022-04-01"

# Activation criteria - ANY of these conditions triggers the protocol
activation_criteria:
  - condition: "Clinical signs of volume overload"
    description: "Acute worsening of dyspnea, orthopnea, or edema suggesting fluid accumulation"
    parameters:
      - "Dyspnea at rest or with minimal exertion (NYHA Class III-IV)"
      - "Orthopnea (dyspnea when lying flat) or paroxysmal nocturnal dyspnea (PND)"
      - "Peripheral edema (2+ or greater) or rapid weight gain (>2 kg in 3 days)"
      - "Jugular venous distension (JVD >8 cm at 45 degrees)"

  - condition: "Pulmonary congestion"
    description: "Evidence of pulmonary edema on exam or imaging"
    parameters:
      - "Crackles/rales on lung auscultation (bibasilar or worse)"
      - "Hypoxemia (SpO2 <92% on room air)"
      - "Chest X-ray showing pulmonary edema or pleural effusions"
      - "Increased work of breathing or respiratory distress"

  - condition: "Elevated cardiac biomarkers"
    description: "Elevated BNP/NT-proBNP suggesting cardiac volume/pressure overload"
    parameters:
      - "BNP >500 pg/mL (acute HF highly likely if >500)"
      - "NT-proBNP >900 pg/mL (age <50), >1800 pg/mL (age 50-75), >3600 pg/mL (age >75)"
      - "Rapid rise in BNP/NT-proBNP from baseline (>50% increase)"

  - condition: "Hemodynamic compromise"
    description: "Signs of low cardiac output or cardiogenic shock"
    parameters:
      - "Hypotension (SBP <90 mmHg) with signs of poor perfusion"
      - "Cool, clammy extremities (poor peripheral perfusion)"
      - "Altered mental status (confusion, obtundation)"
      - "Oliguria (<0.5 mL/kg/hr) or acute kidney injury"

# Priority determination based on severity
priority_determination:
  base_priority: "P1_URGENT"
  urgency_factors:
    - condition: "Cardiogenic shock (SBP <90 AND poor_perfusion) OR respiratory_distress"
      priority_modifier: "IMMEDIATE"
      timeframe: "0 minutes"
    - condition: "Hypoxemia (SpO2 <90%) OR severe_pulmonary_edema OR hypotension"
      priority_modifier: "URGENT"
      timeframe: "< 15 minutes"
    - condition: "Moderate symptoms (dyspnea, edema, BNP >500)"
      priority_modifier: "URGENT"
      timeframe: "< 30 minutes"
  default_timeframe: "< 1 hour"

# Clinical actions in recommended sequence
actions:
  - action_id: "HF-ACT-001"
    category: "DIAGNOSTIC"
    sequence_order: 1
    description: "Obtain BNP or NT-proBNP level"
    urgency: "STAT"
    timeframe: "within 30 minutes"
    rationale: "BNP/NT-proBNP confirms acute HF diagnosis, correlates with severity, and guides treatment intensity"

    diagnostic_details:
      test_name: "B-type natriuretic peptide (BNP) or N-terminal pro-BNP (NT-proBNP)"
      test_type: "LAB"
      loinc_code: "42637-9 (BNP), 33762-6 (NT-proBNP)"
      clinical_indication: "Confirm acute heart failure diagnosis and assess severity"
      specimen_requirements:
        - "Plasma sample (EDTA or heparin tube)"
        - "Send to lab immediately"
        - "Avoid hemolysis"
      expected_findings: "BNP >500 pg/mL or NT-proBNP >900-3600 pg/mL (age-dependent) suggests acute HF"
      interpretation_guidance: "BNP >100 pg/mL or NT-proBNP >300 pg/mL makes HF likely; higher values correlate with worse prognosis; lower cutoffs for obese patients"
      result_timeframe: "30-60 minutes"
      normal_range: "BNP <100 pg/mL, NT-proBNP <125 pg/mL (acute HF unlikely)"

    evidence:
      - title: "ACC/AHA 2022 - BNP/NT-proBNP in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "1.1"
        grade: "Class I, Level A"
        summary: "Measure BNP or NT-proBNP to support diagnosis of acute HF when diagnosis uncertain"

    prerequisite_checks:
      - "Verify no recent BNP/NT-proBNP (<24 hours) available"

    monitoring_parameters: "Trend BNP/NT-proBNP at discharge to establish new baseline; decreasing levels correlate with treatment response"

  - action_id: "HF-ACT-002"
    category: "DIAGNOSTIC"
    sequence_order: 2
    description: "Obtain chest X-ray"
    urgency: "STAT"
    timeframe: "within 30 minutes"
    rationale: "CXR confirms pulmonary edema, assesses severity, and excludes alternative diagnoses (pneumonia, pneumothorax)"

    diagnostic_details:
      test_name: "Portable chest X-ray (AP and lateral if possible)"
      test_type: "IMAGING"
      clinical_indication: "Evaluate for pulmonary edema, cardiomegaly, pleural effusions"
      expected_findings: "Pulmonary vascular congestion, interstitial or alveolar edema (Kerley B lines, bat-wing pattern), cardiomegaly, pleural effusions"
      interpretation_guidance: "Assess for vascular redistribution (cephalization), interstitial edema, alveolar edema; compare to prior films if available"

    evidence:
      - title: "ACC/AHA 2022 - Imaging in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Class I, Level B"
        summary: "CXR recommended to assess severity of pulmonary congestion and identify complications"

    monitoring_parameters: "Repeat CXR if clinical deterioration or to assess response to diuresis after 24-48 hours"

  - action_id: "HF-ACT-003"
    category: "DIAGNOSTIC"
    sequence_order: 3
    description: "Obtain ECG and cardiac biomarkers (troponin)"
    urgency: "STAT"
    timeframe: "within 30 minutes"
    rationale: "ECG identifies arrhythmias, ischemia, or MI as precipitants; troponin detects acute coronary syndrome"

    diagnostic_details:
      test_name: "12-lead ECG, high-sensitivity troponin I or T"
      test_type: "DIAGNOSTIC_TEST / LAB"
      clinical_indication: "Identify arrhythmias (atrial fibrillation, VT), ischemia, or acute MI as triggers for HF decompensation"
      expected_findings: "ECG: may show atrial fibrillation, LVH, ST changes, Q waves; Troponin: elevated if acute MI or myocardial injury"
      interpretation_guidance: "Compare ECG to prior; new atrial fibrillation or ischemia requires targeted therapy; troponin elevation suggests ACS as trigger"

    evidence:
      - title: "ACC/AHA 2022 - ECG and Troponin in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Class I, Level C"
        summary: "Obtain ECG and troponin to identify reversible causes and guide treatment"

    monitoring_parameters: "Repeat troponin if initially elevated (0 and 3-6 hour protocol for ACS rule-out); continuous telemetry for arrhythmia monitoring"

  - action_id: "HF-ACT-004"
    category: "DIAGNOSTIC"
    sequence_order: 4
    description: "Obtain comprehensive laboratory panel"
    urgency: "STAT"
    timeframe: "within 1 hour"
    rationale: "Labs assess renal function, electrolytes, anemia, and identify precipitants or complications"

    diagnostic_details:
      test_name: "CBC, CMP, magnesium, liver function tests, TSH"
      test_type: "LAB"
      clinical_indication: "Assess renal function (guide diuretic dosing), electrolytes (hypokalemia, hyponatremia), anemia (precipitant), liver congestion, thyroid dysfunction"
      expected_findings: "Elevated creatinine (cardiorenal syndrome), hyponatremia (dilutional), hypokalemia (diuretic use), anemia, elevated LFTs (hepatic congestion)"
      interpretation_guidance: "Baseline renal function critical for diuretic dosing; hyponatremia <130 mmol/L associated with worse prognosis"

    evidence:
      - title: "ACC/AHA 2022 - Laboratory Testing in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Class I, Level C"
        summary: "Comprehensive metabolic panel and CBC recommended to guide therapy and identify comorbidities"

    monitoring_parameters: "Monitor daily while on IV diuretics: electrolytes, renal function; trend hemoglobin if anemic"

  - action_id: "HF-ACT-005"
    category: "THERAPEUTIC"
    sequence_order: 5
    description: "Initiate supplemental oxygen therapy"
    urgency: "STAT"
    timeframe: "Immediately (within 5 minutes)"
    rationale: "Correct hypoxemia from pulmonary edema to prevent end-organ hypoxia"

    medication_details:
      name: "Supplemental oxygen"
      drug_class: "Medical gas therapy"
      indication: "Hypoxemia from pulmonary edema (SpO2 <92%)"

      dose_calculation_method: "titration_to_target"
      standard_dose: "Start 2-4 L/min via nasal cannula"
      dose_unit: "L/min"

      route: "Inhalation"
      administration_instructions: "Titrate to SpO2 >92%; escalate to non-rebreather mask if needed; consider BiPAP if respiratory distress"
      frequency: "Continuous"
      duration: "Until pulmonary edema resolves and SpO2 >92% on room air"

      target_spo2: "92-96%"

      adverse_effects:
        - "Oxygen toxicity (prolonged high FiO2 >60%)"
        - "CO2 retention (rare in HF unless concurrent COPD)"

      monitoring:
        - "Continuous pulse oximetry"
        - "Respiratory rate and work of breathing"

    evidence:
      - title: "ACC/AHA 2022 - Oxygen Therapy in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Class I, Level B"
        summary: "Administer supplemental oxygen to maintain SpO2 >90%"

    prerequisite_checks:
      - "Baseline SpO2 documented"
      - "Assess for concurrent COPD (adjust target to 88-92% if present)"

    monitoring_parameters: "Continuous SpO2 monitoring; escalate to BiPAP if SpO2 <90% despite non-rebreather or if respiratory distress"

  - action_id: "HF-ACT-006"
    category: "MEDICATION"
    sequence_order: 6
    description: "Administer IV loop diuretic"
    urgency: "STAT"
    timeframe: "within 30 minutes"
    rationale: "IV diuretics are first-line therapy for acute HF with volume overload, rapidly reduce preload and pulmonary congestion"

    medication_details:
      name: "Furosemide (Lasix)"
      brand_name: "Lasix"
      drug_class: "Loop diuretic"
      indication: "Acute heart failure with volume overload and pulmonary congestion"

      dose_calculation_method: "home_dose_based"
      standard_dose: "40-80 mg IV bolus (initial dose)"
      dose_unit: "mg"
      dose_range: "20-200 mg"

      dosing_strategy:
        - scenario: "Diuretic-naive patient"
          dose: "20-40 mg IV bolus"
          rationale: "Start low in diuretic-naive patients"

        - scenario: "On home oral diuretic"
          dose: "Equal to or 2x home oral daily dose IV (e.g., 40 mg PO daily → 40-80 mg IV)"
          rationale: "Match or exceed home dose; IV bioavailability ~100% vs 50% oral"

        - scenario: "Severe volume overload or inadequate response"
          dose: "80-200 mg IV bolus OR continuous infusion (5-20 mg/hr)"
          rationale: "Higher doses or continuous infusion overcome diuretic resistance"

      renal_dosing:
        - egfr_range: ">60"
          dose: "40-80"
          adjustment: "Standard dosing"
        - egfr_range: "30-60"
          dose: "80-120"
          adjustment: "Higher doses needed for adequate diuresis"
        - egfr_range: "<30"
          dose: "120-200 or continuous infusion"
          adjustment: "High doses or continuous infusion; may require nephrology consultation"

      route: "IV"
      administration_instructions: "IV push over 2-5 minutes; may repeat bolus every 6-12 hours or start continuous infusion"
      frequency: "q6-12h bolus OR continuous infusion"
      duration: "Until euvolemia achieved (typically 24-72 hours), then transition to oral"

      max_single_dose: "200 mg bolus"
      max_daily_dose: "600 mg (continuous infusion may exceed)"

      adverse_effects:
        - "Hypokalemia (monitor K+, replace aggressively)"
        - "Hypomagnesemia (monitor Mg, replace to maintain >2 mg/dL)"
        - "Hyponatremia (dilutional)"
        - "Acute kidney injury (pre-renal azotemia from over-diuresis)"
        - "Ototoxicity (rare, with high doses or concurrent aminoglycosides)"
        - "Hyperuricemia (gout exacerbation)"

      lab_monitoring:
        - "Daily BMP (electrolytes, creatinine) while on IV diuretic"
        - "Monitor urine output (goal >1-2 L/day net negative)"
        - "Daily weights (goal -0.5 to -1 kg/day)"
        - "Potassium and magnesium replacement as needed"

    evidence:
      - title: "ACC/AHA 2022 - IV Diuretics in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "2.1"
        grade: "Class I, Level B"
        summary: "IV loop diuretics recommended for all patients hospitalized with HF and evidence of volume overload"
      - title: "DOSE Trial - Diuretic Optimization Strategies Evaluation"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "N Engl J Med. 2011;364(9):797-805"
        summary: "High-dose furosemide (2.5x home dose) improved dyspnea faster than low-dose; bolus vs continuous infusion equivalent"

    contraindications:
      - type: "ALLERGY"
        description: "Documented sulfa or furosemide allergy"
        severity: "ABSOLUTE"
        alternative_action:
          medication_name: "Ethacrynic acid"
          dose: "50-100"
          dose_unit: "mg"
          route: "IV"
          frequency: "q8-12h"
          rationale: "Non-sulfa loop diuretic for sulfa allergy"

      - type: "CLINICAL_CONDITION"
        description: "Severe volume depletion or hypotension (SBP <90 mmHg)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Hold diuretic until hemodynamically stable; consider inotropes or vasopressors first; cautious small dose (20-40 mg) if pulmonary edema severe"

      - type: "ORGAN_DYSFUNCTION"
        description: "Anuria or severe AKI unresponsive to diuretics"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Nephrology consultation; may need ultrafiltration or dialysis"

    prerequisite_checks:
      - "Baseline renal function (creatinine, eGFR) available"
      - "Baseline electrolytes (K, Na, Mg) available"
      - "Blood pressure adequate (SBP >90 mmHg)"
      - "Verify home diuretic dose if on chronic therapy"

    required_lab_values:
      - "creatinine"
      - "eGFR"
      - "potassium"
      - "sodium"

    monitoring_parameters: "Monitor urine output (foley catheter or strict I&O); daily weights (goal -0.5 to -1 kg/day); daily BMP; assess volume status (JVD, edema, lung exam); monitor for over-diuresis (hypotension, AKI)"

  - action_id: "HF-ACT-007"
    category: "MEDICATION"
    sequence_order: 7
    description: "Initiate vasodilator therapy if SBP >110 mmHg"
    urgency: "URGENT"
    timeframe: "within 30-60 minutes"
    rationale: "Vasodilators reduce afterload and preload, rapidly improve symptoms in hypertensive acute HF"

    medication_details:
      name: "Nitroglycerin (IV infusion)"
      brand_name: "Tridil, Nitro-Bid IV"
      drug_class: "Nitrate vasodilator"
      indication: "Acute HF with hypertension (SBP >110 mmHg) or persistent pulmonary congestion"

      dose_calculation_method: "titration_protocol"
      standard_dose: "10-20 mcg/min initial infusion"
      dose_unit: "mcg/min"
      dose_range: "10-200 mcg/min"

      route: "IV infusion"
      administration_instructions: "Start 10-20 mcg/min, increase by 10-20 mcg/min every 5-10 min to target BP reduction or symptom relief; use non-PVC tubing"
      frequency: "Continuous infusion"
      duration: "24-48 hours, then transition to oral vasodilator (hydralazine, isosorbide dinitrate) or ACE-I/ARB"

      titration_protocol:
        - target: "Reduce SBP by 10-15% (not below 90 mmHg)"
        - increase_increment: "10-20 mcg/min every 5-10 minutes"
        - max_dose: "200 mcg/min"
        - hold_criteria: "SBP <90 mmHg OR headache OR dizziness"

      max_dose: "200 mcg/min"

      adverse_effects:
        - "Hypotension (most common, dose-dependent)"
        - "Headache (common, may require acetaminophen)"
        - "Reflex tachycardia"
        - "Tolerance (with prolonged use >24-48 hours)"
        - "Methemoglobinemia (rare, with very high doses)"

      lab_monitoring:
        - "Continuous blood pressure monitoring (arterial line if labile)"
        - "Monitor heart rate"
        - "No specific lab monitoring needed"

    evidence:
      - title: "ACC/AHA 2022 - Vasodilators in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "MODERATE"
        recommendation: "3.1"
        grade: "Class IIa, Level B"
        summary: "IV vasodilators reasonable for acute HF with hypertension to reduce symptoms and improve hemodynamics"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Hypotension (SBP <90 mmHg)"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Hold vasodilators; focus on diuretics alone; consider inotropes if low output state"

      - type: "CLINICAL_CONDITION"
        description: "Severe aortic stenosis or hypertrophic cardiomyopathy with outflow obstruction"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Avoid vasodilators; can worsen hemodynamics; use diuretics cautiously"

      - type: "MEDICATION_INTERACTION"
        description: "Recent PDE-5 inhibitor use (sildenafil, tadalafil) within 24-48 hours"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Hold nitroglycerin for 24 hours (sildenafil) or 48 hours (tadalafil) after PDE-5 inhibitor; risk of severe hypotension"

      - type: "CLINICAL_CONDITION"
        description: "Right ventricular infarction or predominant RV failure"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Avoid vasodilators in RV infarction; RV is preload-dependent; give IV fluids instead"

    prerequisite_checks:
      - "Verify SBP >110 mmHg"
      - "Rule out severe aortic stenosis (check echocardiogram if available)"
      - "Confirm no recent PDE-5 inhibitor use (ask specifically about erectile dysfunction medications)"
      - "Exclude RV infarction (ECG, echocardiogram)"

    monitoring_parameters: "Continuous blood pressure monitoring (every 5-10 min during titration, then q15-30min); monitor for headache, dizziness, hypotension; titrate dose based on BP response and symptom improvement"

  - action_id: "HF-ACT-008"
    category: "MEDICATION"
    sequence_order: 8
    description: "Continue or initiate guideline-directed medical therapy (ACE-I/ARB, beta-blocker)"
    urgency: "NON-URGENT (after stabilization)"
    timeframe: "within 24-48 hours of stabilization"
    rationale: "Continue home ACE-I/ARB and beta-blocker unless contraindicated (hypotension, shock); initiate if not on therapy"

    medication_details:
      name: "ACE inhibitor (e.g., Lisinopril, Enalapril) OR ARB (e.g., Losartan, Valsartan)"
      drug_class: "ACE inhibitor OR Angiotensin receptor blocker"
      indication: "Chronic HF management to reduce mortality and prevent remodeling"

      dosing_guidance:
        - scenario: "On home ACE-I/ARB and hemodynamically stable"
          recommendation: "Continue home dose; hold if hypotensive (SBP <90)"
          rationale: "Maintain GDMT unless contraindicated"

        - scenario: "Not on ACE-I/ARB and now stable"
          recommendation: "Initiate low dose (e.g., lisinopril 2.5-5 mg daily, losartan 25 mg daily) once euvolemic"
          rationale: "Early initiation improves long-term outcomes"

        - scenario: "Hypotension or cardiogenic shock"
          recommendation: "Hold ACE-I/ARB until SBP >90 and stable; restart before discharge"
          rationale: "Avoid exacerbating hypotension during acute phase"

      beta_blocker_guidance:
        - scenario: "On home beta-blocker and hemodynamically stable"
          recommendation: "Continue home dose (may reduce by 50% if severe decompensation)"
          rationale: "Avoid abrupt withdrawal; can worsen rebound tachycardia"

        - scenario: "Cardiogenic shock or severe bradycardia"
          recommendation: "Hold beta-blocker; restart once stabilized before discharge"
          rationale: "Beta-blockers can worsen shock; reinitiate is critical before discharge"

    evidence:
      - title: "ACC/AHA 2022 - GDMT in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "4.1"
        grade: "Class I, Level A"
        summary: "Continue ACE-I/ARB and beta-blocker in stable patients; initiate before discharge if not on therapy"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Cardiogenic shock or hypotension (SBP <90 mmHg)"
        severity: "ABSOLUTE (temporary)"
        alternative_action:
          clinical_guidance: "Hold ACE-I/ARB and beta-blocker during shock; reinitiate before discharge once stable"

    monitoring_parameters: "Monitor blood pressure, heart rate, renal function (creatinine, potassium) after initiating or up-titrating ACE-I/ARB"

  - action_id: "HF-ACT-009"
    category: "PROCEDURE"
    sequence_order: 9
    description: "Consider non-invasive positive pressure ventilation (BiPAP) for respiratory distress"
    urgency: "URGENT"
    timeframe: "within 30 minutes if indicated"
    rationale: "BiPAP reduces preload and afterload, improves oxygenation, reduces intubation rates in acute cardiogenic pulmonary edema"

    procedure_details:
      procedure_name: "Non-invasive positive pressure ventilation (BiPAP or CPAP)"
      indication: "Severe dyspnea with respiratory distress, hypoxemia (SpO2 <90%) despite oxygen, pulmonary edema"

      settings:
        - mode: "BiPAP"
          ipap: "10-15 cmH2O (start 8-10, titrate for comfort and work of breathing)"
          epap: "5-8 cmH2O (start 5, increase for oxygenation)"
          fio2: "Titrate to SpO2 >92%"

        - mode: "CPAP"
          pressure: "5-10 cmH2O"
          indication: "Simpler option for cardiogenic pulmonary edema; reduces preload and afterload"

      trial_duration: "1-2 hours with close monitoring"
      success_criteria: "Improved dyspnea, decreased work of breathing, SpO2 >92%, improved mental status"
      failure_criteria: "Worsening hypoxemia, hemodynamic instability, patient intolerance, no improvement after 1-2 hours"

    evidence:
      - title: "ACC/AHA 2022 - NIV in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        recommendation: "5.1"
        grade: "Class IIa, Level B"
        summary: "NIV reduces intubation rates and improves symptoms in acute cardiogenic pulmonary edema"
      - title: "Gray A, et al. Non-invasive ventilation in acute cardiogenic pulmonary edema"
        type: "RESEARCH"
        strength: "STRONG"
        citation: "N Engl J Med. 2008;359(2):142-151"
        summary: "CPAP reduced need for intubation compared to standard oxygen therapy"

    contraindications:
      - type: "CLINICAL_CONDITION"
        description: "Inability to protect airway, impaired consciousness"
        severity: "ABSOLUTE"
        alternative_action:
          clinical_guidance: "Proceed to intubation"

      - type: "CLINICAL_CONDITION"
        description: "Cardiogenic shock with severe hypotension (SBP <90 despite therapy)"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "Stabilize hemodynamics first with inotropes/vasopressors; may trial BiPAP with caution"

      - type: "CLINICAL_CONDITION"
        description: "Acute coronary syndrome requiring immediate catheterization"
        severity: "RELATIVE"
        alternative_action:
          clinical_guidance: "May use BiPAP as bridge to catheterization; do not delay intervention"

    prerequisite_checks:
      - "Patient alert and cooperative"
      - "Hemodynamically stable (SBP >90 mmHg)"
      - "No contraindications (facial trauma, unable to protect airway)"

    monitoring_parameters: "Continuous monitoring: SpO2, BP, HR, RR, work of breathing, mental status; reassess after 30-60 min; prepare for intubation if failure criteria met"

  - action_id: "HF-ACT-010"
    category: "MONITORING"
    sequence_order: 10
    description: "Continuous telemetry and hemodynamic monitoring"
    urgency: "STAT"
    timeframe: "Immediate"
    rationale: "Acute HF requires continuous monitoring for arrhythmias, hemodynamic stability, and response to therapy"

    monitoring_parameters: "Continuous cardiac telemetry; vital signs q15-30min initially, then hourly; strict intake/output; daily weights; continuous pulse oximetry; assess volume status (JVD, edema, lung exam) every shift"

    evidence:
      - title: "ACC/AHA 2022 - Monitoring in Acute HF"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Class I, Level C"
        summary: "Continuous monitoring essential for early detection of arrhythmias and hemodynamic changes"

  - action_id: "HF-ACT-011"
    category: "ESCALATION"
    sequence_order: 11
    description: "Cardiology consultation and ICU evaluation if severe"
    urgency: "URGENT"
    timeframe: "within 1-2 hours"
    rationale: "Cardiology input guides advanced therapy; ICU required for shock, inotropes, or advanced monitoring"

    escalation_criteria:
      - "Cardiogenic shock (SBP <90 mmHg with poor perfusion despite therapy)"
      - "Need for inotropic or vasopressor support"
      - "Severe respiratory distress requiring BiPAP or intubation"
      - "Refractory hypotension or diuretic resistance"
      - "Acute coronary syndrome as precipitant (needs catheterization)"
      - "Arrhythmias requiring cardioversion or advanced management"

    evidence:
      - title: "ACC/AHA 2022 - Specialty Consultation"
        type: "CLINICAL_GUIDELINE"
        strength: "STRONG"
        grade: "Class I, Level C"
        summary: "Cardiology consultation recommended for all acute HF admissions; ICU for severe cases"

# Overall protocol contraindications
contraindications:
  - type: "GOALS_OF_CARE"
    description: "Comfort measures only (CMO) or hospice status"
    severity: "ABSOLUTE"
    rationale: "Aggressive HF management inconsistent with comfort-focused goals"

  - type: "CLINICAL_CONTEXT"
    description: "High-output heart failure (e.g., severe anemia, thyrotoxicosis, AV fistula)"
    severity: "RELATIVE"
    rationale: "Treat underlying cause (transfuse, treat hyperthyroidism) rather than diuresis alone"

# Monitoring requirements for overall protocol
monitoring_requirements:
  - parameter: "Vital signs (BP, HR, RR, SpO2)"
    frequency: "Every 15-30 min initially, then hourly when stable"
    target: "SBP 90-140, HR 60-100, RR <20, SpO2 >92%"

  - parameter: "Daily weights"
    frequency: "Daily (same time, same scale)"
    target: "Goal -0.5 to -1 kg/day until euvolemic"

  - parameter: "Strict intake and output"
    frequency: "Every shift (q8h), calculate net balance"
    target: "Net negative 1-2 L/day"

  - parameter: "Basic metabolic panel (BMP)"
    frequency: "Daily while on IV diuretics"
    target: "Monitor renal function (Cr stable), electrolytes (K >4, Na >135)"

  - parameter: "Clinical volume assessment"
    frequency: "Every shift: JVD, edema, lung exam"
    target: "Trend toward euvolemia (no JVD, trace edema, clear lungs)"

  - parameter: "BNP or NT-proBNP"
    frequency: "At discharge (establish new baseline)"
    target: "Decreasing trend from admission"

# Escalation criteria for worsening clinical status
escalation_criteria:
  - condition: "Cardiogenic shock (SBP <90 mmHg with poor perfusion, cool extremities, altered mental status)"
    action: "ICU transfer; consider inotropes (dobutamine, milrinone); cardiology consultation; possible mechanical circulatory support"
    timeframe: "Immediate"

  - condition: "Refractory hypoxemia (SpO2 <90% despite BiPAP and maximal medical therapy)"
    action: "Intubation and mechanical ventilation; ICU transfer"
    timeframe: "< 30 minutes"

  - condition: "Acute coronary syndrome as precipitant (elevated troponin, ECG changes)"
    action: "Cardiology consultation for urgent catheterization; dual antiplatelet therapy; anticoagulation"
    timeframe: "< 1 hour"

  - condition: "Diuretic resistance (inadequate urine output <1 L/day despite high-dose diuretic)"
    action: "Continuous furosemide infusion; add thiazide (metolazone 2.5-5 mg PO daily); nephrology consultation; consider ultrafiltration"
    timeframe: "< 6 hours"

  - condition: "Severe electrolyte abnormalities (K <3.0 or >5.5, Na <125)"
    action: "Aggressive electrolyte repletion; reduce diuretic dose; nephrology consultation if refractory"
    timeframe: "< 2 hours"

  - condition: "Worsening renal function (Cr increase >0.3 mg/dL or >50% from baseline)"
    action: "Reduce diuretic dose; assess for over-diuresis vs cardiorenal syndrome; nephrology consultation if persistent"
    timeframe: "< 6 hours"

# Expected clinical outcomes
expected_outcomes:
  - outcome: "Improved dyspnea and respiratory rate (<20 breaths/min)"
    timeframe: "2-6 hours"

  - outcome: "SpO2 >92% on room air or baseline oxygen"
    timeframe: "6-12 hours"

  - outcome: "Net negative fluid balance (1-2 L/day)"
    timeframe: "24-48 hours"

  - outcome: "Reduced JVD and peripheral edema"
    timeframe: "48-72 hours"

  - outcome: "Improved CXR (resolution of pulmonary edema)"
    timeframe: "48-72 hours"

  - outcome: "Stable renal function and electrolytes"
    timeframe: "Ongoing throughout hospitalization"

# Discharge planning and completion criteria
completion_criteria:
  - "Clinical euvolemia: no JVD, trace or no edema, clear lung exam"
  - "Stable vital signs: SBP >90, HR 60-100, RR <20, SpO2 >92% on room air or baseline O2"
  - "Diuresis complete: transitioned from IV to oral diuretic"
  - "Electrolytes and renal function stable or at acceptable baseline"
  - "BNP/NT-proBNP decreasing trend from admission (measure at discharge)"
  - "On optimal GDMT: ACE-I/ARB, beta-blocker, mineralocorticoid antagonist (if EF <40%)"
  - "Patient education: daily weights, low-sodium diet (<2g/day), fluid restriction (1.5-2L/day if severe HF), symptom monitoring"
  - "Follow-up arranged: Cardiology or HF clinic within 7-14 days; primary care within 1 week"
  - "Medication reconciliation complete: clear discharge prescriptions, dosing instructions"
