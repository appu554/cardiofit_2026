# ============================================================
# STEMI MANAGEMENT PROTOCOL - CDS-COMPLIANT ENHANCED VERSION
# ============================================================
# Clinical Guideline: AHA/ACC 2017 STEMI Guidelines (Updated 2023)
# Evidence Level: STRONG (Class I, Level A for most recommendations)
# Last Updated: 2025-10-21
# ============================================================

protocol_id: "STEMI-PROTOCOL-001"
name: "ST-Elevation Myocardial Infarction (STEMI) Management - Door-to-Balloon <90 Minutes"
category: "CARDIOVASCULAR"
specialty: "CARDIOLOGY"
version: "2.0"
last_updated: "2025-10-21"

# ============================================================
# SECTION 2: TRIGGER CRITERIA
# ============================================================
trigger_criteria:
  match_logic: "ANY_OF"

  conditions:
    # Condition 1: ST elevation on ECG
    - condition_id: "STEMI-TRIG-001"
      description: "ST elevation ≥1 mm in 2+ contiguous leads (≥2 mm in V2-V3 for men, ≥1.5 mm for women)"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "st_elevation_present"
          operator: "=="
          threshold: true
          source: "ecg"

        - parameter: "st_elevation_magnitude"
          operator: ">="
          threshold: 1.0
          unit: "mm"
          source: "ecg"

        - parameter: "contiguous_leads"
          operator: ">="
          threshold: 2
          source: "ecg"

    # Condition 2: New LBBB with clinical suspicion
    - condition_id: "STEMI-TRIG-002"
      description: "New or presumably new LBBB with ischemic symptoms"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "new_lbbb"
          operator: "=="
          threshold: true
          source: "ecg"

        - parameter: "sgarbossa_criteria"
          operator: ">="
          threshold: 3
          source: "clinical_assessment"

        - parameter: "ischemic_chest_pain"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

    # Condition 3: Posterior MI pattern
    - condition_id: "STEMI-TRIG-003"
      description: "Posterior MI: ST depression V1-V3 with tall R waves"
      match_logic: "ALL_OF"
      conditions:
        - parameter: "st_depression_v1_v3"
          operator: "=="
          threshold: true
          source: "ecg"

        - parameter: "tall_r_waves_v1_v2"
          operator: "=="
          threshold: true
          source: "ecg"

        - parameter: "chest_pain_present"
          operator: "=="
          threshold: true
          source: "clinical_assessment"

# ============================================================
# SECTION 3: CONFIDENCE SCORING
# ============================================================
confidence_scoring:
  base_confidence: 0.90  # Very strong evidence for STEMI protocols

  modifiers:
    - modifier_id: "STEMI-CONF-001"
      description: "Classic ST elevation pattern in multiple leads"
      condition:
        parameter: "contiguous_leads"
        operator: ">="
        threshold: 4
      adjustment: 0.08

    - modifier_id: "STEMI-CONF-002"
      description: "Cardiogenic shock increases urgency and certainty"
      condition:
        parameter: "cardiogenic_shock"
        operator: "=="
        threshold: true
      adjustment: 0.10

    - modifier_id: "STEMI-CONF-003"
      description: "Troponin elevation confirms MI"
      condition:
        parameter: "troponin_i"
        operator: ">"
        threshold: 0.04
        unit: "ng/mL"
      adjustment: 0.07

    - modifier_id: "STEMI-CONF-004"
      description: "Symptom onset <3 hours (optimal treatment window)"
      condition:
        parameter: "symptom_onset_hours"
        operator: "<"
        threshold: 3
        unit: "hours"
      adjustment: 0.05

  activation_threshold: 0.75

# ============================================================
# SECTION 4: EVIDENCE SOURCE
# ============================================================
evidence_source:
  primary_guideline: "AHA/ACC Guideline for STEMI Management (2017, Updated 2023)"
  guideline_version: "ACC/AHA 2017 STEMI"
  publication_date: "2023-04"
  evidence_level: "STRONG"

  key_citations:
    - citation_id: "AHA-ACC-STEMI-2023"
      authors: "O'Gara PT, Kushner FG, Ascheim DD, et al."
      title: "2023 Update to the 2017 ACC/AHA Guideline for STEMI Management"
      journal: "Journal of the American College of Cardiology"
      year: 2023
      pmid: "37079885"
      doi: "10.1016/j.jacc.2023.04.001"

    - citation_id: "PRIMARY-PCI-META"
      authors: "Keeley EC, Boura JA, Grines CL"
      title: "Primary angioplasty versus intravenous thrombolytic therapy for acute myocardial infarction: a quantitative review"
      journal: "Lancet"
      year: 2003
      pmid: "12517460"

  last_review_date: "2024-06-01"
  next_review_date: "2026-06-01"

# ============================================================
# SECTION 5: ACTIONS
# ============================================================
actions:
  - action_id: "STEMI-ACT-001"
    type: "DIAGNOSTIC"
    priority: "CRITICAL"
    sequence_number: 1

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 10

    diagnostic:
      test_name: "12-lead ECG"
      urgency: "STAT"
      instructions: "Obtain within 10 minutes of arrival. Activate cath lab if STEMI criteria met. Consider posterior leads (V7-V9) if inferior STEMI."

    # GUIDELINE INTEGRATION
    guideline_reference: "GUIDE-ACCAHA-STEMI-2023"
    recommendation_id: "ACC-STEMI-2023-REC-001"
    evidence_quality: "HIGH"
    recommendation_strength: "STRONG"
    class_of_recommendation: "CLASS_I"
    level_of_evidence: "B-NR"
    citation_pmids:
      - "37079885"
      - "12517460"
      - "27282490"

  - action_id: "STEMI-ACT-002"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 2

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 5

    medication:
      name: "Aspirin"
      dose: "324"
      dose_unit: "mg"
      route: "PO (chewable)"
      frequency: "Single loading dose, then 81 mg daily"
      administration_instructions: "Chew and swallow immediately. Non-enteric coated formulation for rapid absorption."

    # GUIDELINE INTEGRATION
    guideline_reference: "GUIDE-ACCAHA-STEMI-2023"
    recommendation_id: "ACC-STEMI-2023-REC-003"
    evidence_quality: "HIGH"
    recommendation_strength: "STRONG"
    class_of_recommendation: "CLASS_I"
    level_of_evidence: "A"
    clinical_rationale: "Aspirin reduces mortality in STEMI by approximately 23% (ISIS-2 trial). Should be given immediately upon STEMI recognition."
    citation_pmids:
      - "37079885"
      - "3081859"
      - "18160631"

  - action_id: "STEMI-ACT-003"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 3

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 10

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "P2Y12_NO_CONTRAINDICATIONS"
          description: "Ticagrelor preferred over clopidogrel for STEMI"

          condition:
            parameter: "active_bleeding"
            operator: "=="
            threshold: false

          primary_medication:
            name: "Ticagrelor"
            dose: "180"
            dose_unit: "mg"
            route: "PO"
            frequency: "Loading dose, then 90 mg BID"
            administration_instructions: "Preferred P2Y12 inhibitor for STEMI per PLATO trial. More potent than clopidogrel."

          alternative_medication:
            name: "Clopidogrel"
            dose: "600"
            dose_unit: "mg"
            route: "PO"
            frequency: "Loading dose, then 75 mg daily"
            indication: "If ticagrelor not available or patient on strong CYP3A inhibitor"

        - criteria_id: "CYP3A_INHIBITOR_INTERACTION"
          description: "Use clopidogrel if patient on strong CYP3A inhibitor"

          condition:
            parameter: "strong_cyp3a_inhibitor"
            operator: "=="
            threshold: true

          primary_medication:
            name: "Clopidogrel"
            dose: "600"
            dose_unit: "mg"
            route: "PO"
            frequency: "Loading dose, then 75 mg daily"
            dose_adjustment_rationale: "Ticagrelor contraindicated with strong CYP3A inhibitors (ketoconazole, clarithromycin)"

    # GUIDELINE INTEGRATION
    guideline_reference: "GUIDE-ACCAHA-STEMI-2023"
    recommendation_id: "ACC-STEMI-2023-REC-004"
    evidence_quality: "HIGH"
    recommendation_strength: "STRONG"
    class_of_recommendation: "CLASS_I"
    level_of_evidence: "A"
    clinical_rationale: "Dual antiplatelet therapy reduces stent thrombosis and cardiovascular events. Ticagrelor and prasugrel are more potent than clopidogrel (PLATO and TRITON-TIMI 38 trials)."
    citation_pmids:
      - "37079885"
      - "19717846"
      - "23031330"
      - "17982182"

  - action_id: "STEMI-ACT-004"
    type: "MEDICATION"
    priority: "CRITICAL"
    sequence_number: 4

    timing:
      window: "IMMEDIATE"
      max_delay_minutes: 15

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "NO_HIT_HISTORY"
          description: "Unfractionated heparin for primary PCI"

          condition:
            parameter: "heparin_induced_thrombocytopenia_history"
            operator: "=="
            threshold: false

          primary_medication:
            name: "Unfractionated Heparin"
            dose: "70-100 units/kg bolus (50-70 if GP IIb/IIIa planned)"
            dose_unit: "units/kg"
            route: "IV"
            frequency: "Bolus in ED, additional boluses in cath lab to maintain ACT 250-350 seconds"
            administration_instructions: "Weight-based bolus. Monitor ACT in cath lab."

          alternative_medication:
            name: "Enoxaparin"
            dose: "30 mg IV bolus + 1 mg/kg SC"
            dose_unit: "mg"
            route: "IV + SC"
            frequency: "Initial IV bolus + SC dose, then 1 mg/kg SC q12h"
            indication: "If PCI delayed or conservative management"

        - criteria_id: "HIT_HISTORY_PRESENT"
          description: "Use bivalirudin if HIT history"

          condition:
            parameter: "heparin_induced_thrombocytopenia_history"
            operator: "=="
            threshold: true

          primary_medication:
            name: "Bivalirudin"
            dose: "0.75 mg/kg bolus, then 1.75 mg/kg/hr infusion"
            dose_unit: "mg/kg"
            route: "IV"
            frequency: "Bolus + infusion during PCI"
            indication: "Direct thrombin inhibitor safe in HIT history"

  - action_id: "STEMI-ACT-005"
    type: "PROCEDURE"
    priority: "CRITICAL"
    sequence_number: 5

    timing:
      window: "URGENT"
      max_delay_minutes: 90  # Door-to-balloon goal

    procedure:
      procedure_name: "Primary percutaneous coronary intervention (PCI)"
      procedure_code: "CPT-92920"
      indication: "Acute STEMI with <12 hours from symptom onset"
      urgency: "EMERGENT"
      consent_required: true
      location: "Cardiac catheterization laboratory"

    # GUIDELINE INTEGRATION
    guideline_reference: "GUIDE-ACCAHA-STEMI-2023"
    recommendation_id: "ACC-STEMI-2023-REC-002"
    evidence_quality: "HIGH"
    recommendation_strength: "STRONG"
    class_of_recommendation: "CLASS_I"
    level_of_evidence: "A"
    clinical_rationale: "Primary PCI is superior to fibrinolysis when performed in timely manner. Door-to-balloon time <90 minutes associated with significantly lower mortality."
    citation_pmids:
      - "37079885"
      - "12517460"
      - "26260736"
      - "18160631"

  - action_id: "STEMI-ACT-006"
    type: "MEDICATION"
    priority: "HIGH"
    sequence_number: 6

    timing:
      window: "URGENT"
      max_delay_minutes: 1440  # Within 24 hours

    medication:
      name: "Atorvastatin"
      dose: "80"
      dose_unit: "mg"
      route: "PO"
      frequency: "Daily"
      administration_instructions: "High-intensity statin. Goal LDL <70 mg/dL (ideally <55 mg/dL)."

  - action_id: "STEMI-ACT-007"
    type: "MEDICATION"
    priority: "MEDIUM"
    sequence_number: 7

    timing:
      window: "ROUTINE"
      max_delay_minutes: 1440

    medication_selection:
      selection_strategy: "RULE_BASED"

      selection_criteria:
        - criteria_id: "NO_CONTRAINDICATIONS_ACE"
          description: "ACE inhibitor for anterior MI, reduced EF, or heart failure"

          condition:
            match_logic: "ALL_OF"
            conditions:
              - parameter: "systolic_bp"
                operator: ">="
                threshold: 100
                unit: "mmHg"
              - parameter: "allergies"
                operator: "NOT_CONTAINS"
                threshold: "ace_inhibitor_angioedema"

          primary_medication:
            name: "Lisinopril"
            dose: "2.5-5"
            dose_unit: "mg"
            route: "PO"
            frequency: "Daily (titrate to 10-20 mg daily)"
            administration_instructions: "Start low dose, titrate as tolerated. Monitor K+ and creatinine at 1-2 weeks."

          alternative_medication:
            name: "ARB (e.g., Valsartan)"
            dose: "20 mg BID, titrate to 160 mg BID"
            dose_unit: "mg"
            route: "PO"
            frequency: "BID"
            indication: "If ACE inhibitor intolerant (cough, angioedema)"

        - criteria_id: "RENAL_IMPAIRMENT_ACE"
          description: "Use caution with ACE inhibitor if severe renal dysfunction"

          condition:
            parameter: "creatinine"
            operator: ">"
            threshold: 2.5
            unit: "mg/dL"

          primary_medication:
            name: "Lisinopril (low dose)"
            dose: "2.5"
            dose_unit: "mg"
            route: "PO"
            frequency: "Daily with close monitoring"
            dose_adjustment_rationale: "Start low dose, monitor creatinine and K+ closely. May need dose reduction or avoidance if Cr >3.0."

  - action_id: "STEMI-ACT-008"
    type: "MEDICATION"
    priority: "MEDIUM"
    sequence_number: 8

    timing:
      window: "ROUTINE"
      max_delay_minutes: 1440

    medication:
      name: "Metoprolol"
      dose: "25-50"
      dose_unit: "mg"
      route: "PO"
      frequency: "BID or daily (extended release)"
      administration_instructions: "Start within 24h if no contraindications. Titrate to resting HR 50-60 bpm. Avoid IV beta-blocker in acute phase."

  - action_id: "STEMI-ACT-009"
    type: "CLINICAL_ASSESSMENT"
    priority: "HIGH"
    sequence_number: 9

    clinical_assessment:
      assessment_type: "Continuous cardiac monitoring and telemetry"
      frequency: "Continuous for 24-48 hours minimum"
      duration_hours: 48
      specific_parameters:
        - "Continuous ECG telemetry (detect VT/VF, heart block)"
        - "Vital signs every 15 min x 2h, then hourly when stable"
        - "Serial troponins (0, 3-6, 12-24 hours)"
        - "Serial ECGs (post-PCI, daily x 3 days, or if symptoms recur)"

# ============================================================
# SECTION 6: TIME CONSTRAINTS
# ============================================================
time_constraints:
  - constraint_id: "STEMI-DOOR-TO-BALLOON"
    bundle_name: "Door-to-Balloon Time"
    description: "Primary PCI within 90 minutes of hospital arrival"
    offset_minutes: 90
    critical: true

    required_actions:
      - action_id: "STEMI-ACT-001"
        description: "ECG within 10 minutes"
      - action_id: "STEMI-ACT-002"
        description: "Aspirin administered"
      - action_id: "STEMI-ACT-003"
        description: "P2Y12 inhibitor administered"
      - action_id: "STEMI-ACT-005"
        description: "Primary PCI initiated"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 60
      critical_alert_at_minutes: 0
      missed_deadline_message: "CRITICAL: Door-to-balloon time >90 minutes. National benchmark is <90 minutes for primary PCI."

  - constraint_id: "STEMI-ECG-TIME"
    bundle_name: "ECG Acquisition Time"
    description: "12-lead ECG within 10 minutes of arrival"
    offset_minutes: 10
    critical: true

    required_actions:
      - action_id: "STEMI-ACT-001"
        description: "12-lead ECG obtained and interpreted"

    compliance_monitoring:
      track_completion: true
      alert_at_minutes: 5
      critical_alert_at_minutes: 0
      missed_deadline_message: "ECG acquisition delayed beyond 10 minutes. Immediate ECG required for STEMI diagnosis."

# ============================================================
# SECTION 7: CONTRAINDICATIONS
# ============================================================
contraindications:
  - contraindication_id: "STEMI-CONTRA-001"
    condition_description: "Severe beta-blocker contraindications (cardiogenic shock, decompensated HF)"

    trigger_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "cardiogenic_shock"
          operator: "=="
          threshold: true
        - parameter: "decompensated_heart_failure"
          operator: "=="
          threshold: true
        - parameter: "advanced_av_block"
          operator: "=="
          threshold: true

    severity: "CRITICAL"
    affected_actions:
      - "STEMI-ACT-008"

    alternative_action:
      action_id: "STEMI-ALT-001"
      type: "MEDICATION"
      rationale: "Defer beta-blocker until hemodynamically stable. Reassess after 24-48 hours when compensated."

# ============================================================
# SECTION 8: MONITORING REQUIREMENTS
# ============================================================
monitoring_requirements:
  - monitoring_id: "STEMI-MON-001"
    parameter: "continuous_telemetry"

    target_range:
      min: null
      max: null
      unit: null

    frequency: "continuous"
    duration_hours: 48

    alert_condition:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "ventricular_tachycardia"
          operator: "=="
          threshold: true
        - parameter: "ventricular_fibrillation"
          operator: "=="
          threshold: true

  - monitoring_id: "STEMI-MON-002"
    parameter: "troponin"

    target_range:
      min: null
      max: null
      unit: "ng/mL"

    frequency: "0, 3-6, 12-24 hours"
    duration_hours: 24

    alert_condition:
      parameter: "troponin_peak"
      operator: ">"
      threshold: 10.0

# ============================================================
# SECTION 9: SPECIAL POPULATIONS
# ============================================================
special_populations:
  - population_id: "ELDERLY"
    description: "Patients ≥75 years old"

    inclusion_criteria:
      parameter: "age"
      operator: ">="
      threshold: 75
      unit: "years"

    modifications:
      - action_id: "STEMI-ACT-003"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Increased bleeding risk in elderly with P2Y12 inhibitors"

        new_parameters:
          monitoring: "Enhanced bleeding surveillance. Consider reduced clopidogrel loading dose (300 mg vs 600 mg) if age >75 and low weight."

      - action_id: "STEMI-ACT-008"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Start beta-blocker at lower dose due to increased bradycardia risk"

        new_parameters:
          dose: "12.5-25 mg"
          monitoring: "Titrate slowly, monitor HR and BP closely"

  - population_id: "PREGNANCY"
    description: "Pregnant patients with STEMI (rare but high-risk)"

    inclusion_criteria:
      parameter: "pregnancy_status"
      operator: "=="
      threshold: true

    modifications:
      - action_id: "STEMI-ACT-005"
        modification_type: "CAUTION"
        rationale: "Radiation exposure concerns during PCI; use radial access and minimize fluoroscopy time"

        new_parameters:
          monitoring: "Radial access preferred. Shield abdomen. Minimize fluoroscopy time. Obstetric consultation required."

      - action_id: "STEMI-ACT-006"
        modification_type: "CONTRAINDICATION"
        rationale: "Statins are Category X in pregnancy (teratogenic)"

        contraindications:
          - "Avoid all statins during pregnancy"

        alternative_medication:
          name: "None - defer statin until after delivery"
          rationale: "Statins contraindicated in pregnancy. Focus on antiplatelet therapy and revascularization."

  - population_id: "RENAL_FAILURE"
    description: "Patients with severe renal impairment or on dialysis"

    inclusion_criteria:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "egfr"
          operator: "<"
          threshold: 30
          unit: "mL/min"
        - parameter: "dialysis_dependent"
          operator: "=="
          threshold: true

    modifications:
      - action_id: "STEMI-ACT-004"
        modification_type: "DOSE_ADJUSTMENT"
        rationale: "Avoid or reduce enoxaparin dose in severe renal dysfunction"

        new_parameters:
          dose: "Use UFH instead of enoxaparin (not renally cleared) OR reduce enoxaparin to 1 mg/kg q24h"
          monitoring: "Monitor anti-Xa levels if using enoxaparin in renal failure"

# ============================================================
# SECTION 10: ESCALATION RULES
# ============================================================
escalation_rules:
  - rule_id: "STEMI-ESC-001"
    description: "Immediate intervention for cardiogenic shock"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "systolic_bp"
          operator: "<"
          threshold: 90
          unit: "mmHg"
        - parameter: "cardiogenic_shock"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "IMMEDIATE_TRANSFER"
      urgency: "STAT"
      rationale: "Cardiogenic shock complicating STEMI requires immediate PCI and potential mechanical circulatory support"

      required_interventions:
        - "STAT cath lab activation"
        - "Inotropic/vasopressor support (norepinephrine, dopamine, dobutamine)"
        - "Consider IABP or Impella for mechanical circulatory support"
        - "ICU bed arranged"

      specialist_consultation:
        - specialty: "CARDIOLOGY"
          urgency: "STAT"
          specific_question: "Immediate PCI and consideration of mechanical circulatory support (IABP, Impella)"

  - rule_id: "STEMI-ESC-002"
    description: "Cardiac surgery consultation for mechanical complications"

    escalation_trigger:
      match_logic: "ANY_OF"
      conditions:
        - parameter: "new_murmur"
          operator: "=="
          threshold: true
        - parameter: "acute_mitral_regurgitation_suspected"
          operator: "=="
          threshold: true
        - parameter: "ventricular_septal_defect_suspected"
          operator: "=="
          threshold: true

    recommendation:
      escalation_level: "CONSULT"
      urgency: "URGENT"
      rationale: "Mechanical complications (acute MR, VSD) may require surgical intervention"

      specialist_consultation:
        - specialty: "CARDIAC_SURGERY"
          urgency: "URGENT"
          specific_question: "Evaluation for surgical repair of mechanical complication (acute MR, VSD, free wall rupture)"

# ============================================================
# SECTION 11: DE-ESCALATION CRITERIA
# ============================================================
de_escalation_criteria:
  - criteria_id: "STEMI-DE-ESC-001"
    description: "Transition from ICU to step-down unit"

    conditions:
      - parameter: "hemodynamically_stable"
        operator: "=="
        threshold: true

      - parameter: "no_arrhythmias_24h"
        operator: "=="
        threshold: true

      - parameter: "successful_pci"
        operator: "=="
        threshold: true

    recommendation:
      action: "Transfer to cardiac step-down unit for continued monitoring"
      rationale: "Low-risk post-PCI STEMI patients can safely transition to step-down care after 24 hours"

# ============================================================
# SECTION 12: OUTCOME TRACKING
# ============================================================
outcome_tracking:
  primary_outcomes:
    - outcome_id: "STEMI-OUT-001"
      metric: "door_to_balloon_time"
      target: "<90 minutes"
      benchmark_source: "AHA/ACC 2017 STEMI Guidelines"

    - outcome_id: "STEMI-OUT-002"
      metric: "in_hospital_mortality"
      target: "<5%"
      benchmark_source: "National Cardiovascular Data Registry"

  process_measures:
    - measure_id: "STEMI-PROC-001"
      description: "ECG within 10 minutes of arrival"
      target: ">95% compliance"

    - measure_id: "STEMI-PROC-002"
      description: "Aspirin administered within 5 minutes"
      target: ">98% compliance"

  balancing_measures:
    - measure_id: "STEMI-BAL-001"
      description: "Major bleeding rate"
      target: "<3%"

# ============================================================
# SECTION 13: METADATA
# ============================================================
metadata:
  protocol_type: "CLINICAL_PATHWAY"
  implementation_complexity: "HIGH"
  requires_icu_level_care: true
  estimated_implementation_time_minutes: 120
  review_cycle_months: 12

  tags:
    - "time-sensitive"
    - "door-to-balloon"
    - "primary-pci"
    - "high-mortality"

  related_protocols:
    - protocol_id: "ACS-NSTEMI-001"
      relationship: "ALTERNATIVE_TO"

  approval_history:
    - approver: "Clinical Governance Committee"
      approval_date: "2025-10-21"
      version: "2.0"

  change_log:
    - version: "2.0"
      date: "2025-10-21"
      changes:
        - "Migrated to enhanced CDS-compliant YAML structure"
