# medications/cardiovascular/vasopressors/norepinephrine.yaml
medicationId: MED-NORE-001
genericName: Norepinephrine
brandNames:
- Levophed
rxNormCode: '7512'
ndcCode: 0409-3375
atcCode: C01CA03
classification:
  therapeuticClass: Vasopressor
  pharmacologicClass: Alpha and beta-1 adrenergic agonist
  chemicalClass: Catecholamine
  category: Cardiovascular
  subcategories:
  - Vasopressor
  - Critical care
  - Continuous infusion
  highAlert: true
  blackBoxWarning: true
adultDosing:
  standard:
    dose: 0.01-0.5 mcg/kg/min
    route: IV continuous infusion
    frequency: Continuous
    duration: Until hemodynamic stability
    maxDailyDose: 3 mcg/kg/min (rarely needed)
    infusionDuration: Continuous via central line preferred
  indicationBased:
    septic_shock:
      dose: 0.05-0.5 mcg/kg/min
      frequency: Titrate to MAP ≥65
    cardiogenic_shock:
      dose: 0.01-0.3 mcg/kg/min
      frequency: Titrate to effect
  renalAdjustment:
    creatinineClearanceMethod: Not applicable
    requiresDialysisAdjustment: false
    adjustments: {}
    hemodialysis:
      adjustedDose: No adjustment
      rationale: Short half-life
pediatricDosing:
  weightBased: true
  weightBasedDose: Consult pediatric dosing guidelines
  safetyConsiderations:
  - Age-appropriate dosing required
geriatricDosing:
  requiresAdjustment: true
  adjustedDose: Based on renal function
  rationale: Age-related physiologic decline
contraindications:
  absolute:
  - Hypovolemia (must correct first)
  - Mesenteric or peripheral vascular thrombosis
  relative:
  - Myocardial infarction
  - Severe hypoxia
  allergies:
  - sulfite (contains sodium metabisulfite)
  diseaseStates: []
majorInteractions: []
adverseEffects:
  common:
    bradycardia: Variable
    peripheral ischemia: Dose-dependent
  serious:
    extravasation necrosis: Common if peripherally infused
    arrhythmias: Variable
    myocardial ischemia: Dose-dependent
  blackBoxWarnings:
  - Extravasation can cause severe tissue necrosis
  monitoring: Continuous BP, HR, MAP, urine output, perfusion, IV site
pregnancyLactation:
  fdaCategory: C
  pregnancyRisk: High
  lactationRisk: Use Caution
  pregnancyGuidance: May reduce uterine blood flow
  breastfeedingGuidance: Unknown excretion
  infantRiskCategory: L3
monitoring:
  labTests:
  - Serum lactate
  - Mixed venous oxygen saturation
  - Troponin if myocardial ischemia suspected
  monitoringFrequency: Continuous
  vitalSigns:
  - Blood pressure (arterial line)
  - Heart rate
  - MAP
  - CVP
  clinicalAssessment:
  - Peripheral perfusion
  - Urine output
  - Mental status
  - IV site for extravasation
lastUpdated: '2025-10-24'
source: FDA Package Insert, Micromedex, Lexicomp
version: '1.0'
