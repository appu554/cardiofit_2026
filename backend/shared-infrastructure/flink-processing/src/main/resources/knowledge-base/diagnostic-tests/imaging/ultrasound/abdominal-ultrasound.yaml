# ==================================================================
# ABDOMINAL ULTRASOUND IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-ABD-US-001"
studyName: "Abdominal Ultrasound Complete"
cptCode: "76700"
commonNames: "Abdominal US, RUQ Ultrasound, Abd Sono"
modality: "ULTRASOUND"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "NPO 6-8 hours before exam (to visualize gallbladder and reduce bowel gas)"
  positioning: "Supine, may require left/right lateral positions"
  views: "Liver, gallbladder, CBD, pancreas, spleen, kidneys, aorta, IVC"
  contrastRequired: false  # Can use microbubble contrast for liver lesions (not routine)
  sedationRequired: false
  specialInstructions: "Breath holding during some acquisitions. Takes 20-30 minutes"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Safe - preferred imaging modality in pregnancy (no radiation)"
  renalFunction: "Not applicable (no contrast)"
  allergies: "Not applicable (no contrast in routine exam)"
  implants: "Safe with all implants (pacemaker, ICD, etc.)"
  pediatricConsiderations: "Safe for all ages, preferred over CT to avoid radiation"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "0 mSv (ultrasound - no ionizing radiation)"
  comparison: "No radiation - completely safe"
  justification: "First-line imaging for many abdominal conditions"
  alara: "Not applicable - ultrasound is non-ionizing"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Same day for emergent (RUQ pain, suspected AAA), 1-7 days for routine"
  urgentAvailability: "24/7 for emergent indications (portable ultrasound available)"
  studyDuration: "20-30 minutes"
  resultsTurnaround: "Preliminary images available immediately, formal radiology read 4-24 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Right upper quadrant pain (suspected cholecystitis)"
      acrRating: 9
      clinicalContext: "Ultrasound is gold standard for gallbladder evaluation - sensitivity >95% for cholecystitis"
      evidence: "ACR Appropriateness Criteria, Tokyo Guidelines for Cholecystitis"

    - indication: "Suspected abdominal aortic aneurysm (AAA)"
      acrRating: 9
      clinicalContext: "Ultrasound for AAA screening and size monitoring"
      evidence: "USPSTF AAA Screening Recommendations"

    - indication: "Jaundice (elevated bilirubin)"
      acrRating: 9
      clinicalContext: "Evaluate for biliary obstruction (dilated CBD >6mm), choledocholithiasis"
      evidence: "ACG Clinical Guideline on Jaundice"

    - indication: "Renal colic (flank pain, suspected kidney stone)"
      acrRating: 8
      clinicalContext: "First-line in pregnancy, children. Detects hydronephrosis (may miss small stones)"
      evidence: "AUA Kidney Stone Guidelines - US preferred over CT in pregnancy/pediatrics"

    - indication: "Ascites evaluation"
      acrRating: 9
      clinicalContext: "Detect and quantify ascites, guide paracentesis"
      evidence: "AASLD Practice Guideline on Ascites"

    - indication: "Hepatomegaly or abnormal liver function tests"
      acrRating: 7
      clinicalContext: "Evaluate liver size, echogenicity (fatty liver), masses, bile duct dilation"
      evidence: "ACR Appropriateness Criteria"

  may_be_appropriate_4_6:
    - indication: "Non-specific abdominal pain"
      acrRating: 5
      clinicalContext: "May detect gallstones, masses, free fluid. CT more sensitive for most causes"
      evidence: "ACR Appropriateness - US reasonable first-line, CT if high suspicion for other pathology"

    - indication: "Suspected appendicitis (pediatrics or pregnancy)"
      acrRating: 6
      clinicalContext: "US first-line in children and pregnant women. CT if US non-diagnostic in adults"
      evidence: "ACR Appropriateness - US preferred in pregnancy/pediatrics to avoid radiation"

  usually_not_appropriate_1_3:
    - indication: "Acute abdominal pain with peritonitis"
      acrRating: 3
      clinicalContext: "CT abdomen/pelvis superior for acute surgical abdomen"
      evidence: "ACR Appropriateness - CT preferred for undifferentiated acute abdomen"

    - indication: "Small bowel obstruction"
      acrRating: 2
      clinicalContext: "CT is gold standard - US limited by bowel gas"
      evidence: "ACR Appropriateness - CT much more sensitive"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Normal liver size and echogenicity, no gallstones, CBD <6mm, normal kidneys, no free fluid"

  commonAbnormalities:
    - finding: "Cholelithiasis (gallstones)"
      interpretation: "Echogenic foci with posterior acoustic shadowing in gallbladder"
      actionable: "If symptomatic: surgery consult for cholecystectomy. If asymptomatic: no treatment needed"

    - finding: "Acute cholecystitis"
      interpretation: "Gallstones + gallbladder wall thickening (>3mm) + pericholecystic fluid + sonographic Murphy sign"
      actionable: "NPO, IV antibiotics, surgery consult for cholecystectomy (urgent if complicated)"

    - finding: "Dilated common bile duct (CBD >6mm)"
      interpretation: "Suggests biliary obstruction - stone, stricture, or malignancy"
      actionable: "ERCP if choledocholithiasis suspected, MRCP or CT if mass suspected"

    - finding: "Hydronephrosis"
      interpretation: "Dilated renal collecting system - obstruction (stone, mass, stricture)"
      actionable: "Urology consult, CT if stone suspected, possible nephrostomy tube if infected"

    - finding: "Abdominal aortic aneurysm (AAA)"
      interpretation: "Aortic diameter >3cm (normal <2cm)"
      actionable: |
        3-4.4 cm: Monitor with US q12 months
        4.5-5.4 cm: Monitor q6 months
        ≥5.5 cm: Vascular surgery referral for repair

    - finding: "Hepatic steatosis (fatty liver)"
      interpretation: "Increased liver echogenicity compared to kidney (bright liver)"
      actionable: "Evaluate for metabolic syndrome, alcohol use, viral hepatitis. Lifestyle modification"

  criticalFindings:
    - "Ruptured AAA - EMERGENT vascular surgery, activate massive transfusion protocol"
    - "Acute cholecystitis with perforation or emphysematous changes - URGENT surgery"
    - "Large obstructing kidney stone with hydronephrosis and infection - URGENT decompression (nephrostomy or stent)"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Right upper quadrant pain (suspected gallbladder disease)"
    - "Jaundice or elevated liver enzymes"
    - "Suspected AAA screening or surveillance"
    - "Renal colic (pregnancy, pediatrics, or initial evaluation)"
    - "Ascites evaluation"

  contraindications: []  # Ultrasound is very safe, no absolute contraindications

  prerequisiteTests: []

  stewardshipRecommendations: |
    NPO 6-8 hours improves gallbladder visualization
    Use point-of-care ultrasound (POCUS) in ED for RUQ pain, AAA, free fluid
    AVOID CT for RUQ pain when US is diagnostic for cholecystitis
    US first for pregnancy and pediatrics to avoid radiation


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate fasting (gallbladder distended)"
    - "Complete evaluation of all structures (liver, GB, pancreas, kidneys, aorta)"
    - "Use of Doppler for vascular structures (portal vein, hepatic veins)"

  followUpGuidance: |
    Cholelithiasis: Surgery referral if symptomatic. No follow-up if asymptomatic
    AAA: Surveillance intervals based on size (q12mo for 3-4.4cm, q6mo for 4.5-5.4cm)
    Dilated CBD: ERCP for stones, MRCP for mass/stricture evaluation
    Hydronephrosis: CT urogram for stones, urology consult


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 150.00
  patientCharge: 500.00
  highUtilization: true
  costEffectiveness: "Most cost-effective imaging for RUQ pain, AAA screening, and biliary pathology"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 29939133 (Tokyo Guidelines for Cholecystitis 2018)"
  - "PMID: 30193618 (USPSTF AAA Screening 2019)"
  - "PMID: 29698649 (ACG Guideline on Jaundice 2018)"
  - "PMID: 24315646 (AUA Kidney Stone Guidelines 2014)"
  - "PMID: 24976805 (AASLD Ascites Guidelines 2012)"


guidelineReferences:
  - "ACR Appropriateness Criteria for RUQ Pain"
  - "Tokyo Guidelines for Acute Cholecystitis 2018"
  - "USPSTF AAA Screening Recommendations 2019"
  - "ACG Clinical Guideline on Evaluation of Abnormal Liver Chemistries"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    acute_abdomen_peritonitis: "ALERT: Consider CT abdomen/pelvis for acute surgical abdomen - more sensitive than US"
    small_bowel_obstruction: "ALERT: CT is gold standard for SBO - US limited by bowel gas"

  autoOrderWith: []

  reflexOrdering:
    cholecystitis_confirmed: "Surgery consult for cholecystectomy"
    dilated_cbd: "Order ERCP if stone suspected, MRCP if mass/stricture suspected"
    aaa_above_5.5cm: "URGENT vascular surgery referral for repair evaluation"
    hydronephrosis_with_fever: "Urology consult, possible emergent nephrostomy or ureteral stent"

  followUpGuidance: |
    Gallstones (symptomatic): Laparoscopic cholecystectomy
    AAA 3-4.4cm: Repeat US in 12 months
    AAA 4.5-5.4cm: Repeat US in 6 months
    AAA ≥5.5cm: Vascular surgery referral for EVAR or open repair
    Fatty liver: Lifestyle modification, evaluate for metabolic syndrome


