# ==================================================================
# URINE DRUG SCREEN TEST DEFINITION
# ==================================================================
testId: "LAB-UDS-001"
testName: "Urine Drug Screen"
loincCode: "19295-5"
commonNames: "UDS, Urine Tox Screen, Urine Drug Test"
category: "TOXICOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "URINE"
  collection: "Random urine sample (observed collection for legal/employment purposes)"
  container: "Sterile urine cup with tamper-evident seal (for chain of custody)"
  volumeRequired: 30.0  # mL
  specialHandling: "Room temperature acceptable; refrigerate if delayed; chain of custody required for legal testing"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 120  # Immunoassay screening
  urgentTurnaroundMinutes: 60
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: true  # Rapid immunoassay strips available


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "qualitative"
    normal:
      interpretation: "Negative for all tested substances"
    critical:
      interpretation: |
        Positive results indicate recent drug use (detection windows vary by drug):
        - Amphetamines: 2-4 days
        - Cocaine: 2-4 days (up to 12 days for heavy use)
        - Opiates: 2-4 days (longer for methadone)
        - THC (Marijuana): 3-30 days (depends on frequency of use)
        - Benzodiazepines: 3-7 days (longer for long-acting agents)
        - Phencyclidine (PCP): 7-14 days
        - Barbiturates: 2-4 days (longer for phenobarbital)


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    negative: "Negative - No drugs detected above cutoff threshold"
    positive_amphetamines: "Amphetamines positive - Recent use of methamphetamine, amphetamine, MDMA, or false positive (see below)"
    positive_cocaine: "Cocaine positive - Recent cocaine use (benzoylecgonine metabolite)"
    positive_opiates: "Opiates positive - Morphine, codeine, heroin (6-MAM), or false positive (poppy seeds)"
    positive_thc: "THC positive - Recent marijuana use (can persist weeks in chronic users)"
    positive_benzodiazepines: "Benzodiazepines positive - Recent use of diazepam, alprazolam, lorazepam, or related drugs"
    positive_pcp: "PCP positive - Recent phencyclidine use or false positive (dextromethorphan)"
    positive_barbiturates: "Barbiturates positive - Phenobarbital or other barbiturate use"

  clinicalSignificance: |
    Urine drug screen (UDS) is a qualitative immunoassay screening test for common drugs of abuse.
    Detects drug classes, not specific drugs (e.g., "opiates" positive, but doesn't specify heroin vs codeine).
    Cut-off thresholds designed to minimize false positives while detecting recent use.
    Positive screening test requires confirmation by GC-MS or LC-MS/MS for legal/employment purposes.
    Detection windows vary by drug, dose, frequency of use, and individual metabolism.
    False positives common - many medications and foods cross-react with immunoassays.
    False negatives possible - dilute urine, drugs not included in panel (fentanyl, buprenorphine, synthetic cannabinoids).

  commonCauses:
    amphetamines_positive:
      - "Methamphetamine, amphetamine, MDMA (ecstasy) use"
      - "Prescription stimulants (Adderall, Vyvanse)"
      - "FALSE POSITIVE: Bupropion, pseudoephedrine, trazodone, labetalol, ranitidine"

    opiates_positive:
      - "Heroin (detects as morphine after metabolism)"
      - "Morphine, codeine use (prescription or illicit)"
      - "FALSE POSITIVE: Poppy seed ingestion, quinolone antibiotics (levofloxacin, ofloxacin), rifampin"

    thc_positive:
      - "Marijuana (cannabis) use - THC metabolites"
      - "Can remain positive for weeks in chronic users (accumulates in fat)"
      - "FALSE POSITIVE: Rare (NSAIDs like ibuprofen, efavirenz, pantoprazole)"

    benzodiazepines_positive:
      - "Prescription benzodiazepines (diazepam, alprazolam, lorazepam, clonazepam)"
      - "Illicit benzodiazepine use"
      - "FALSE POSITIVE: Sertraline, oxaprozin"

    cocaine_positive:
      - "Cocaine use (benzoylecgonine metabolite)"
      - "FALSE POSITIVE: Topical anesthetics containing cocaine (rare)"

    pcp_positive:
      - "Phencyclidine (PCP) use"
      - "FALSE POSITIVE: Dextromethorphan (DXM), tramadol, venlafaxine, ibuprofen"

  differentialDiagnosis:
    - "Positive result with prescription: Verify prescription (check PDMP), confirm appropriate use"
    - "Positive result with denied use: Consider false positive (confirm with GC-MS), evaluate for non-prescribed use"
    - "Negative result with suspected use: Drug not on panel (fentanyl, buprenorphine), dilute specimen, or use beyond detection window"
    - "Dilute specimen (creatinine <20 mg/dL, specific gravity <1.003): Intentional dilution or overhydration"
    - "Multiple positive substances: Polysubstance use disorder, evaluate for treatment needs"

  actionableFindings: |
    Any positive result: Correlate with patient history, medication list, clinical presentation
    Positive opiates: Differentiate prescription (codeine, morphine) from heroin (check for 6-MAM); evaluate for opioid use disorder
    Positive amphetamines: Verify prescription stimulants (ADHD medications); if no prescription, evaluate for methamphetamine use
    Positive benzodiazepines: Verify prescription; if non-prescribed, assess for anxiety disorder, substance use disorder
    Positive THC: Counsel on risks; evaluate for cannabis use disorder if daily use
    Positive cocaine or PCP: No legitimate medical use - evaluate for substance use disorder, offer treatment
    Dilute specimen: Repeat test; if persistent, consider observed collection
    Discordant result (positive screen, patient denies use): Confirm with GC-MS; discuss false positive possibilities
    Unexpected negative (patient on prescribed opioids/benzodiazepines): Ensure compliance vs diversion


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected drug intoxication or overdose"
    - "Altered mental status of unknown etiology"
    - "Preoperative screening (elective surgery)"
    - "Substance use disorder evaluation or treatment monitoring"
    - "Chronic pain management - opioid prescribing compliance"
    - "Trauma patients (clinical evaluation, not medico-legal)"
    - "Employment or legal testing (requires chain of custody)"
    - "Pregnancy substance use screening"

  contraindications:
    - "None absolute"
    - "Ethical considerations: Informed consent preferred except in emergency or altered mental status"

  minimumIntervalHours: 168  # Weekly for substance use disorder monitoring
  requiresConsent: true  # Informed consent preferred; implied in emergency situations
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Dilute urine (creatinine <20 mg/dL, specific gravity <1.003) - may cause false negatives"
    - "Concentrated urine - may increase detection sensitivity"
    - "Adulterants (bleach, vinegar, detergent) - intentional tampering"
    - "Time since last use - beyond detection window causes false negative"

  interferingMedications:
    - "FALSE POSITIVES (require GC-MS confirmation):"
    - "Amphetamines: Bupropion, pseudoephedrine, trazodone, labetalol, ranitidine"
    - "Opiates: Quinolone antibiotics (levofloxacin), rifampin, poppy seeds"
    - "THC: NSAIDs (ibuprofen high dose), efavirenz, pantoprazole (rare)"
    - "PCP: Dextromethorphan (DXM), tramadol, venlafaxine, ibuprofen"
    - "Benzodiazepines: Sertraline, oxaprozin"

  stability: "Stable refrigerated for 7 days; confirm positive results with GC-MS within 72 hours"
  rejectionCriteria: "Insufficient volume, temperature out of range (suggests specimen substitution), visible adulterants"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 25.00
  patientCharge: 80.00
  highUtilization: true
  stewardshipRecommendations: "Order only when clinically indicated; avoid routine screening without indication; confirm positive results with GC-MS for legal/employment purposes"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 31891434 (Urine drug testing interpretation)"
  - "PMID: 28072074 (False positive drug screens)"
  - "PMID: 26461721 (Chronic pain management drug testing)"
  - "PMID: 30789120 (Substance use disorder screening)"

guidelineReferences:
  - "SAMHSA Guidelines for Drug Testing"
  - "CDC Guidelines for Opioid Prescribing and Monitoring"
  - "ASAM Guidelines for Substance Use Disorder Treatment"
  - "ACOG Guidelines for Substance Use in Pregnancy"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Acetaminophen level (overdose risk with opioid/substance use)"
    - "Salicylate level (if altered mental status)"
    - "Blood alcohol level (common co-intoxicant)"
    - "BMP (electrolyte abnormalities with substance use)"

  reflexTesting:
    any_positive_result: "Correlate with clinical history and medication list; confirm with GC-MS if legal/employment or discordant with history"
    opiates_positive: "Check for 6-MAM (heroin-specific metabolite); differentiate prescription opioids from heroin; evaluate for opioid use disorder"
    dilute_specimen: "Creatinine <20 mg/dL or specific gravity <1.003 - repeat test with observed collection"
    multiple_positives: "Polysubstance use - evaluate for substance use disorder, offer treatment referral"

  followUpGuidance: |
    Positive Opiates:
      - Verify prescription opioids (check PDMP database)
      - Differentiate heroin from prescription opioids (6-MAM is heroin-specific)
      - If prescription opioid present: Confirm patient is taking (not diverting)
      - If heroin or non-prescribed opioids: Evaluate for opioid use disorder, offer buprenorphine or methadone treatment
      - Naloxone prescription for overdose prevention
    Positive Amphetamines:
      - Verify prescription stimulants (Adderall, Vyvanse for ADHD)
      - If no prescription: Evaluate for methamphetamine use, substance use disorder
      - Confirm with GC-MS to differentiate amphetamine/methamphetamine from prescription medications
    Positive Cocaine:
      - No legitimate medical use (except rare topical anesthetic)
      - Evaluate for cocaine use disorder, cardiovascular complications
      - Assess for polysubstance use (often combined with opioids, alcohol)
      - Offer substance use disorder treatment referral
    Positive THC (Marijuana):
      - Counsel on risks (cognitive impairment, driving safety, pregnancy risks)
      - If daily use: Evaluate for cannabis use disorder
      - Consider medical marijuana card if applicable jurisdiction
    Positive Benzodiazepines:
      - Verify prescription (check PDMP)
      - If non-prescribed: Evaluate for anxiety disorder, substance use disorder
      - Caution on combining with opioids (respiratory depression risk)
    False Positive Suspected:
      - Confirm with GC-MS or LC-MS/MS (gold standard)
      - Review medication list for cross-reactants
      - Discuss dietary factors (poppy seeds for opiates)
    Chronic Pain Management Monitoring:
      - Unexpected positive: Evaluate for non-prescribed drug use
      - Unexpected negative: Evaluate for medication non-adherence or diversion
      - Random testing recommended (deters diversion)
    Substance Use Disorder Treatment:
      - Positive cocaine/heroin/methamphetamine: Offer evidence-based treatment (MAT for opioids, behavioral therapy)
      - Naloxone prescription for opioid use
      - Harm reduction counseling (safe injection sites, fentanyl test strips)
      - Referral to addiction specialist, inpatient/outpatient rehabilitation


