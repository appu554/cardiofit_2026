# ==================================================================
# CHLORIDE TEST DEFINITION
# ==================================================================
testId: "LAB-CHLORIDE-001"
testName: "Chloride"
loincCode: "2075-0"
commonNames: "Cl, Serum Chloride"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 2.0  # mL
  specialHandling: "Stable at room temperature"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 45
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mmol/L"
    normal:
      min: 98.0
      max: 107.0
      interpretation: "Normal chloride level"
    critical:
      criticalLow: 88.0
      criticalHigh: 115.0
      criticalInterpretation: "Severe electrolyte disturbance"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    low: "<98 mmol/L: Hypochloremia - vomiting, diuretics, metabolic alkalosis"
    normal: "98-107 mmol/L: Normal chloride homeostasis"
    high: ">107 mmol/L: Hyperchloremia - dehydration, metabolic acidosis, hyperventilation"
    critical_low: "<88 mmol/L: Severe hypochloremia - aggressive replacement needed"
    critical_high: ">115 mmol/L: Severe hyperchloremia - evaluate acid-base status"

  clinicalSignificance: |
    Chloride is the major extracellular anion, working with sodium to maintain osmotic balance.
    Inversely related to bicarbonate in acid-base balance. Chloride follows sodium in renal handling.

  commonCauses:
    - "Hypochloremia: Vomiting, NG suction, diuretics, CHF, SIADH, metabolic alkalosis"
    - "Hyperchloremia: Dehydration, diarrhea, renal tubular acidosis, metabolic acidosis, normal saline overload"

  actionableFindings: |
    Cl <88: Check acid-base status, consider chloride replacement
    Cl >115: Evaluate for metabolic acidosis, consider fluid therapy


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Comprehensive metabolic panel"
    - "Acid-base disturbance evaluation"
    - "Electrolyte monitoring"

  contraindications: []
  minimumIntervalHours: 24
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true
  autoOrderWith: ["Sodium", "Potassium", "Bicarbonate"]


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "Clinical Laboratory Standards"
version: "1.0"
evidenceLevel: "A"
