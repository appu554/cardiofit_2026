# ==================================================================
# HEMOGLOBIN TEST DEFINITION
# ==================================================================
testId: "LAB-HEMOGLOBIN-001"
testName: "Hemoglobin"
loincCode: "718-7"
commonNames: "Hgb, Hb, Hemoglobin"
category: "HEMATOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Lavender top (EDTA)"
  volumeRequired: 3.0  # mL
  specialHandling: "Mix gently by inversion, avoid hemolysis"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult_male:
    population: "adult"
    sex: "M"
    ageMin: 18
    ageMax: 120
    unit: "g/dL"
    normal:
      min: 13.5
      max: 17.5
      interpretation: "Normal oxygen-carrying capacity"
    critical:
      criticalLow: 7.0
      criticalHigh: 20.0
      criticalInterpretation: "Severe anemia (<7) or polycythemia (>20)"

  adult_female:
    population: "adult"
    sex: "F"
    ageMin: 18
    ageMax: 120
    unit: "g/dL"
    normal:
      min: 12.0
      max: 16.0
      interpretation: "Normal oxygen-carrying capacity"
    critical:
      criticalLow: 7.0
      criticalHigh: 18.0
      criticalInterpretation: "Severe anemia (<7) or polycythemia (>18)"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "g/dL"
    normal:
      min: 11.0
      max: 16.0
      interpretation: "Normal (varies by age)"
    critical:
      criticalLow: 7.0
      criticalHigh: 18.0
      criticalInterpretation: "Critical anemia or polycythemia"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "Male 13.5-17.5, Female 12.0-16.0 g/dL: Normal hemoglobin"
    anemia_mild: "Male 11-13.4, Female 10-11.9 g/dL: Mild anemia"
    anemia_moderate: "8-10.9 g/dL: Moderate anemia - evaluate cause"
    anemia_severe: "<8 g/dL: Severe anemia - consider transfusion"
    anemia_critical: "<7 g/dL: Life-threatening anemia - transfuse if symptomatic"
    polycythemia: "Male >17.5, Female >16.0 g/dL: Polycythemia - evaluate cause"

  clinicalSignificance: |
    Hemoglobin measures oxygen-carrying capacity of blood. Low hemoglobin (anemia)
    causes tissue hypoxia, fatigue, and cardiac stress. Severe anemia may require
    transfusion. High hemoglobin (polycythemia) increases blood viscosity and thrombosis risk.

  commonCauses:
    - "Anemia: Iron deficiency, blood loss, chronic disease, hemolysis, bone marrow failure"
    - "Polycythemia: Dehydration, COPD, polycythemia vera, high altitude, smoking"

  differentialDiagnosis:
    - "Microcytic anemia (MCV <80): Iron deficiency, thalassemia, chronic disease"
    - "Normocytic anemia (MCV 80-100): Acute blood loss, chronic disease, hemolysis, bone marrow failure"
    - "Macrocytic anemia (MCV >100): B12/folate deficiency, alcohol, liver disease, hypothyroidism"

  actionableFindings: |
    Hgb <7 g/dL: Consider transfusion if symptomatic or active bleeding (restrictive threshold)
    Hgb <8 g/dL with cardiac disease: Transfusion threshold 8 g/dL for cardiac patients
    Acute drop >2 g/dL: Evaluate for active bleeding, hemolysis
    New anemia: Order iron studies, reticulocyte count, peripheral smear
    Polycythemia >18 g/dL: Evaluate for polycythemia vera, secondary causes


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected anemia"
    - "Routine CBC"
    - "Blood loss evaluation"
    - "Pre-operative assessment"
    - "Transfusion decisions"
    - "Chronic disease monitoring"

  contraindications: []

  minimumIntervalHours: 8  # Daily monitoring for active bleeding/transfusions
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (falsely low)"
    - "Lipemia (falsely high)"
    - "Leukocytosis >50K (falsely high)"
    - "IV fluid dilution (falsely low)"
    - "Dehydration (falsely high)"

  interferingMedications:
    - "Erythropoietin (increase Hgb)"
    - "Chemotherapy (decrease Hgb)"
    - "Iron supplements (increase Hgb over time)"

  stability: "Stable 24 hours at room temperature, 1 week refrigerated"
  rejectionCriteria: "Clotted specimen, grossly hemolyzed"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 8.00
  patientCharge: 25.00
  highUtilization: true
  stewardshipRecommendations: "Part of CBC - avoid ordering hemoglobin alone. Hematocrit provides same information (Hct ≈ 3 x Hgb)"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 27121245 (AABB Transfusion Guidelines 2016)"
  - "PMID: 26398073 (Restrictive transfusion strategy)"
  - "PMID: 24226924 (Anemia evaluation WHO guidelines)"
  - "PMID: 31573637 (Iron deficiency anemia)"


guidelineReferences:
  - "AABB Clinical Practice Guidelines on Red Blood Cell Transfusion"
  - "WHO Guidelines on Anemia"
  - "ASH Choosing Wisely Recommendations"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Complete blood count"
    - "Hematocrit"
    - "RBC indices (MCV, MCH, MCHC)"

  reflexTesting:
    result_below_10: "Order iron studies, reticulocyte count, evaluate for bleeding"
    result_below_8: "Consider transfusion if symptomatic or cardiac disease"
    result_below_7: "URGENT - Transfusion likely needed if symptomatic, evaluate for active bleeding"
    acute_drop_2: "Evaluate for acute blood loss, hemolysis (LDH, haptoglobin, bilirubin)"
    result_above_17: "Evaluate for polycythemia vera (JAK2 mutation), secondary causes"

  followUpGuidance: |
    Severe anemia <7 g/dL: Transfuse 1 unit PRBC, recheck Hgb, repeat as needed
    Moderate anemia 7-10 g/dL: Evaluate cause, oral iron if iron deficient
    New anemia: Iron studies, B12/folate, reticulocyte count, peripheral smear
    Post-transfusion: Recheck Hgb 15 min after transfusion (expect 1 g/dL rise per unit)
    Chronic anemia: Monitor q3-6 months, treat underlying cause


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "AABB Transfusion Guidelines 2016, UpToDate, WHO Anemia Guidelines"
version: "1.0"
