# ==================================================================
# WHITE BLOOD CELL COUNT TEST DEFINITION
# ==================================================================
testId: "LAB-WBC-001"
testName: "White Blood Cell Count"
loincCode: "6690-2"
commonNames: "WBC, Leukocyte Count, White Count"
category: "HEMATOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Lavender top (EDTA)"
  volumeRequired: 3.0  # mL
  specialHandling: "Mix gently by inversion, analyze within 4 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "10^3/uL (K/uL)"
    normal:
      min: 4.5
      max: 11.0
      interpretation: "Normal immune function"
    critical:
      criticalLow: 1.0
      criticalHigh: 30.0
      criticalInterpretation: "Severe leukopenia (<1.0) or leukocytosis (>30) - evaluate urgently"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "10^3/uL"
    normal:
      min: 5.0
      max: 14.5
      interpretation: "Normal (varies by age)"
    critical:
      criticalLow: 1.5
      criticalHigh: 35.0
      criticalInterpretation: "Critical - evaluate for infection or malignancy"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "4.5-11.0 K/uL: Normal WBC count"
    leukopenia_mild: "3.0-4.4 K/uL: Mild leukopenia - monitor"
    leukopenia_moderate: "1.5-2.9 K/uL: Moderate leukopenia - infection risk"
    leukopenia_severe: "<1.0 K/uL: Severe leukopenia/neutropenia - high infection risk, reverse isolation"
    leukocytosis_mild: "11.1-15.0 K/uL: Mild leukocytosis - infection, inflammation, stress"
    leukocytosis_moderate: "15.1-30.0 K/uL: Moderate leukocytosis - likely infection or inflammation"
    leukocytosis_severe: ">30.0 K/uL: Severe leukocytosis - evaluate for leukemia, leukemoid reaction"

  clinicalSignificance: |
    WBC count reflects immune system activity and bone marrow function.
    Leukocytosis suggests infection, inflammation, or malignancy.
    Leukopenia increases infection risk and may indicate bone marrow suppression.
    Differential count is essential to determine specific cell line abnormalities.

  commonCauses:
    - "Leukocytosis: Bacterial infection, inflammation, malignancy, corticosteroids, stress"
    - "Leukopenia: Viral infection, chemotherapy, bone marrow failure, autoimmune, medications"
    - "Neutropenia: Chemotherapy, sepsis, bone marrow infiltration, immune destruction"

  differentialDiagnosis:
    - "Leukocytosis with neutrophilia: Bacterial infection, inflammation, malignancy"
    - "Leukocytosis with lymphocytosis: Viral infection, CLL, pertussis"
    - "Leukopenia with neutropenia: Bone marrow failure, drug-induced, sepsis"

  actionableFindings: |
    WBC <1.0 K/uL: Severe neutropenia - reverse isolation, prophylactic antibiotics, G-CSF
    WBC <1.5 K/uL with fever: Febrile neutropenia - URGENT broad-spectrum antibiotics
    WBC >30 K/uL: Order differential, peripheral smear, evaluate for leukemia
    WBC >50 K/uL: Leukostasis risk - urgent hematology consult, possible leukapheresis


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected infection"
    - "Fever evaluation"
    - "Routine CBC"
    - "Chemotherapy monitoring"
    - "Immunosuppression monitoring"
    - "Pre-operative evaluation"

  contraindications: []

  minimumIntervalHours: 8  # Daily monitoring adequate for most cases
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Clotted specimen (falsely low)"
    - "EDTA-dependent pseudoleukopenia (rare)"
    - "Delayed analysis >24 hours (cell degradation)"
    - "Extreme leukocytosis >100K (may require dilution)"

  interferingMedications:
    - "Corticosteroids (increase WBC - demargination)"
    - "G-CSF (increase WBC)"
    - "Chemotherapy (decrease WBC)"
    - "Clozapine (agranulocytosis risk)"
    - "Beta-lactam antibiotics (may cause leukopenia)"

  stability: "Stable 24 hours at room temperature"
  rejectionCriteria: "Clotted specimen, insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 8.00
  patientCharge: 25.00
  highUtilization: true
  stewardshipRecommendations: "Part of CBC - avoid ordering WBC alone. Order differential only when clinically indicated"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 33147620 (IDSA Febrile Neutropenia Guidelines 2020)"
  - "PMID: 28985173 (NCCN Myeloid Growth Factors)"
  - "PMID: 30348537 (Leukocytosis evaluation)"
  - "PMID: 25426837 (Neutropenia management)"


guidelineReferences:
  - "IDSA Clinical Practice Guideline for Febrile Neutropenia"
  - "NCCN Guidelines for Myeloid Growth Factors"
  - "ASH Clinical Practice Guidelines"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Complete blood count with differential"
    - "Hemoglobin/Hematocrit"
    - "Platelet count"

  reflexTesting:
    result_below_1.5: "URGENT - Order differential, evaluate for neutropenia, infection precautions"
    result_below_1.0_with_fever: "EMERGENT - Febrile neutropenia protocol, broad-spectrum antibiotics within 1 hour"
    result_above_15: "Order differential to identify cell line causing leukocytosis"
    result_above_30: "Order differential and peripheral smear, hematology consult for possible leukemia"
    result_above_50: "URGENT - Hematology consult, evaluate for leukostasis, possible leukapheresis"

  followUpGuidance: |
    Neutropenia <1.5 K/uL: Daily CBC monitoring, infection precautions, consider G-CSF
    Febrile neutropenia: Broad-spectrum antibiotics within 1 hour, admit for monitoring
    Leukocytosis >15 K/uL: Evaluate for infection, obtain cultures if febrile
    Unexplained leukocytosis >20 K/uL: Peripheral smear, consider bone marrow biopsy


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "IDSA Guidelines 2020, UpToDate, Mayo Clinic Laboratory Reference"
version: "1.0"
