# ==================================================================
# RENAL ULTRASOUND IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-US-RENAL-001"
studyName: "Renal Ultrasound (Bilateral)"
cptCode: "76770"
commonNames: "Kidney Ultrasound, Renal US, KUB Ultrasound"
modality: "ULTRASOUND"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "No fasting required. Full bladder may improve visualization of ureters"
  positioning: "Supine and lateral decubitus positions for optimal kidney visualization"
  views: "Bilateral kidneys in longitudinal and transverse planes, bladder assessment"
  contrastRequired: false  # Can use microbubble contrast for lesion characterization in select cases
  sedationRequired: false
  specialInstructions: "Remain still during exam. 20-30 minutes for bilateral study"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Safe - no radiation. Preferred imaging modality for renal issues in pregnancy"
  renalFunction: "Not applicable (no contrast)"
  allergies: "No allergy concerns (ultrasound gel only)"
  implants: "Safe with all implants including pacemakers"
  pediatricConsiderations: "Safe for all ages, no radiation. Preferred over CT in children"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "0 mSv (ultrasound - no ionizing radiation)"
  comparison: "No radiation - completely safe"
  justification: "First-line imaging for many renal conditions, especially in pregnancy and children"
  alara: "Not applicable - ultrasound is non-ionizing"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Same day for acute kidney injury or suspected obstruction, 1-7 days for routine"
  urgentAvailability: "Available during business hours, portable for inpatients 24/7"
  studyDuration: "20-30 minutes for bilateral study"
  resultsTurnaround: "Preliminary interpretation immediate, formal radiology read 4-12 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Acute kidney injury (AKI)"
      acrRating: 9
      clinicalContext: "Evaluate for hydronephrosis (obstruction), kidney size, echogenicity (intrinsic renal disease)"
      evidence: "KDIGO AKI Guidelines - ultrasound recommended for unexplained AKI"

    - indication: "Suspected hydronephrosis or urinary obstruction"
      acrRating: 9
      clinicalContext: "Sensitivity 90% for hydronephrosis detection, evaluate level of obstruction"
      evidence: "AUA Guidelines - ultrasound first-line for suspected obstruction"

    - indication: "Chronic kidney disease (CKD) evaluation"
      acrRating: 8
      clinicalContext: "Assess kidney size (small kidneys suggest chronicity), echogenicity, cortical thickness"
      evidence: "KDIGO CKD Guidelines - renal ultrasound recommended in CKD workup"

    - indication: "Renal colic/nephrolithiasis"
      acrRating: 7
      clinicalContext: "Detect hydronephrosis (stone obstruction), visualize large stones (>5mm). CT more sensitive for small stones"
      evidence: "AUA Guidelines - ultrasound alternative to CT for stone evaluation (lower radiation)"

    - indication: "Follow-up of known renal mass or cyst"
      acrRating: 8
      clinicalContext: "Surveillance of simple cysts, Bosniak classification for complex cysts"
      evidence: "Bosniak Classification system for cystic renal masses"

    - indication: "Renal transplant evaluation"
      acrRating: 9
      clinicalContext: "Assess for hydronephrosis, fluid collections (hematoma, urinoma), perfusion with Doppler"
      evidence: "Standard post-transplant imaging modality"

  may_be_appropriate_4_6:
    - indication: "Hematuria workup"
      acrRating: 6
      clinicalContext: "CT urography preferred for comprehensive evaluation, but ultrasound reasonable first step"
      evidence: "AUA Hematuria Guidelines - CT urography gold standard, ultrasound acceptable initial test"

    - indication: "Screening for renal artery stenosis"
      acrRating: 4
      clinicalContext: "Limited sensitivity - CTA or MRA preferred if high suspicion"
      evidence: "ACC/AHA Guidelines - Doppler ultrasound has limited accuracy for RAS"

  usually_not_appropriate_1_3:
    - indication: "Routine screening in asymptomatic patients"
      acrRating: 1
      clinicalContext: "Not indicated without clinical indication or risk factors"
      evidence: "No guidelines support routine renal screening"

    - indication: "Small kidney stone detection (<5mm)"
      acrRating: 3
      clinicalContext: "CT more sensitive - ultrasound may miss small stones"
      evidence: "CT has 95% sensitivity vs ultrasound 60-70% for stones"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Bilateral kidneys normal size (9-12 cm), normal cortical thickness, no hydronephrosis, no masses or stones"

  keyMeasurements:
    - measurement: "Kidney length"
      normalRange: "9-12 cm (adults)"
      interpretation: |
        <9 cm: Small kidneys suggest chronic kidney disease
        >13 cm: Enlarged kidneys (consider diabetes, amyloidosis, HIV nephropathy)

    - measurement: "Cortical thickness"
      normalRange: "≥7mm"
      interpretation: |
        <7mm: Cortical thinning suggests chronic disease
        Normal thickness: Acute or reversible process more likely

    - measurement: "Resistive index (RI) on Doppler"
      normalRange: "0.50-0.70"
      interpretation: |
        >0.70: Elevated suggests intrinsic renal disease, obstruction, or rejection (transplant)

  commonAbnormalities:
    - finding: "Hydronephrosis"
      interpretation: "Dilation of renal pelvis and calyces. Mild, moderate, or severe. Assess for stones, mass, extrinsic compression"
      actionable: "Mild: May be physiologic in pregnancy. Moderate-severe: Urology consult, relieve obstruction (stent or nephrostomy)"

    - finding: "Simple renal cyst (Bosniak I)"
      interpretation: "Anechoic, round, smooth walls, posterior acoustic enhancement"
      actionable: "No follow-up needed - benign finding (present in >50% of adults >50 years)"

    - finding: "Complex renal cyst (Bosniak III-IV)"
      interpretation: "Septations, calcifications, solid components, enhancement. Concern for malignancy"
      actionable: "Urology consult, contrast-enhanced CT or MRI for characterization, surgical resection often needed"

    - finding: "Solid renal mass"
      interpretation: "Echogenic or hypoechoic mass - concern for renal cell carcinoma"
      actionable: "Contrast-enhanced CT or MRI for staging, urology consult for biopsy or nephrectomy"

    - finding: "Small echogenic kidneys (<9cm)"
      interpretation: "Chronic kidney disease with irreversible damage"
      actionable: "Nephrology referral, avoid nephrotoxins, prepare for dialysis if GFR <15"

    - finding: "Nephrolithiasis"
      interpretation: "Echogenic focus with posterior acoustic shadowing"
      actionable: "Stone <5mm: Medical expulsive therapy (tamsulosin), hydration. Stone >5mm: Urology consult for lithotripsy or ureteroscopy"

  criticalFindings:
    - "Bilateral hydronephrosis - urgent relief of obstruction (bladder outlet obstruction vs bilateral ureteral obstruction)"
    - "Renal transplant with no perfusion - EMERGENT surgical exploration"
    - "Large solid renal mass - urgent urology referral for malignancy workup"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute kidney injury (unexplained AKI)"
    - "Suspected hydronephrosis or urinary obstruction"
    - "Chronic kidney disease evaluation"
    - "Flank pain with suspected nephrolithiasis (alternative to CT)"
    - "Follow-up of known renal cyst or mass"
    - "Renal transplant surveillance"

  contraindications: []  # No contraindications for ultrasound

  prerequisiteTests: []

  stewardshipRecommendations: |
    Use ultrasound FIRST for AKI evaluation (avoid CT unless high suspicion for stone)
    For nephrolithiasis: Ultrasound acceptable alternative to CT (lower radiation, especially in young patients)
    CT urography preferred for comprehensive hematuria workup, but ultrasound acceptable initial test
    Avoid routine screening ultrasound in asymptomatic patients


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Bilateral kidney visualization with size measurements"
    - "Assessment of cortical thickness and echogenicity"
    - "Evaluation for hydronephrosis, masses, and stones"
    - "Bladder assessment for outlet obstruction"

  followUpGuidance: |
    Simple cyst (Bosniak I): No follow-up needed
    Complex cyst (Bosniak II): Follow-up ultrasound or CT in 6-12 months
    Bosniak III-IV: Contrast-enhanced CT or MRI, urology consult for surgical evaluation
    Solid renal mass: CT or MRI for staging, urology referral
    Hydronephrosis: Relieve obstruction, repeat ultrasound after treatment to assess resolution


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 200.00
  patientCharge: 500.00
  highUtilization: true
  costEffectiveness: "Cost-effective first-line test for many renal conditions - avoid CT when ultrasound adequate"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 22890468 (KDIGO AKI Guidelines 2012)"
  - "PMID: 23201239 (KDIGO CKD Guidelines 2012)"
  - "PMID: 22992668 (Bosniak Classification Update 2012)"
  - "PMID: 22425129 (AUA Hematuria Guidelines 2012)"
  - "PMID: 25102643 (AUA Nephrolithiasis Guidelines 2014)"


guidelineReferences:
  - "KDIGO Clinical Practice Guidelines for Acute Kidney Injury 2012"
  - "KDIGO Clinical Practice Guidelines for CKD 2012"
  - "AUA Guidelines on Hematuria Evaluation 2012"
  - "AUA Guidelines on Nephrolithiasis Management 2014"
  - "Bosniak Renal Cyst Classification System"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    routine_screening: "ALERT: Routine renal ultrasound not indicated for asymptomatic patients without risk factors"
    ct_better_for_stones: "ALERT: For small kidney stones, CT has higher sensitivity than ultrasound (consider non-contrast CT)"

  autoOrderWith:
    - "Consider creatinine/eGFR if not recently checked"
    - "Consider urinalysis if hematuria or infection suspected"

  reflexOrdering:
    bilateral_hydronephrosis: "URGENT urology consult - bladder scan for retention, Foley catheter if outlet obstruction"
    solid_renal_mass: "Contrast-enhanced CT or MRI for characterization and staging, urology referral"
    complex_cyst_bosniak_3_4: "Urology consult, contrast-enhanced imaging (CT or MRI) for surgical planning"
    small_echogenic_kidneys: "Nephrology referral for CKD management, avoid nephrotoxins, prepare for renal replacement therapy"

  followUpGuidance: |
    Simple cyst (Bosniak I): No follow-up imaging needed
    Bosniak II cyst: Repeat imaging in 6-12 months (ultrasound or CT)
    Bosniak IIF cyst: Repeat imaging every 6 months for 2 years, then annually
    Bosniak III-IV cyst or solid mass: Surgical consultation for nephrectomy or biopsy
    Hydronephrosis: Repeat ultrasound after obstruction relief to confirm resolution


