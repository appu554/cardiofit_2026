# ==================================================================
# ALT (ALANINE AMINOTRANSFERASE) TEST DEFINITION
# ==================================================================
testId: "LAB-ALT-001"
testName: "ALT (Alanine Aminotransferase)"
loincCode: "1742-6"
commonNames: "ALT, SGPT, Alanine Transaminase"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 1.0  # mL
  specialHandling: "Avoid hemolysis, minimize tourniquet time"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "U/L"
    normal:
      min: 7
      max: 56
      interpretation: "Normal hepatocellular function"
    critical:
      criticalLow: null
      criticalHigh: 1000
      criticalInterpretation: "Acute hepatocellular injury - immediate evaluation for acute liver failure"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "7-56 U/L: Normal liver enzyme activity"
    elevated_mild: "57-150 U/L: Mild elevation - NAFLD, chronic hepatitis, medications"
    elevated_moderate: "151-500 U/L: Moderate elevation - viral hepatitis, autoimmune hepatitis, drug toxicity"
    elevated_severe: "501-1000 U/L: Severe elevation - acute viral hepatitis, ischemic hepatitis, drug-induced liver injury"
    critical: "≥1000 U/L: CRITICAL - Acute hepatocellular necrosis (acetaminophen toxicity, acute viral hepatitis, ischemic liver injury)"

  clinicalSignificance: |
    ALT is the most liver-specific transaminase enzyme, primarily located in hepatocyte cytoplasm.
    ALT is more sensitive and specific for hepatocellular injury than AST.
    ALT elevation indicates hepatocyte damage and is the primary screening test for liver disease.
    ALT/AST ratio helps differentiate etiology:
    - ALT > AST: Non-alcoholic fatty liver disease, viral hepatitis, drug-induced liver injury
    - ALT < AST (ratio <1): Alcoholic liver disease, cirrhosis, Wilson disease

  commonCauses:
    - "Non-alcoholic fatty liver disease (NAFLD) - most common in US"
    - "Viral hepatitis (HAV, HBV, HCV)"
    - "Drug-induced liver injury (acetaminophen, antibiotics, statins)"
    - "Alcoholic liver disease"
    - "Autoimmune hepatitis"
    - "Hemochromatosis"
    - "Wilson disease"
    - "Alpha-1 antitrypsin deficiency"
    - "Celiac disease"
    - "Ischemic hepatitis (shock liver)"

  actionableFindings: |
    ALT >1000: Immediate hepatology consultation, check acetaminophen level, PT/INR, viral hepatitis panel, right upper quadrant ultrasound
    ALT 500-1000: Urgent evaluation for acute liver injury - repeat daily with hepatic function panel
    ALT 150-500: Evaluate for viral hepatitis, autoimmune hepatitis, drug-induced liver injury
    ALT 57-150: Screen for NAFLD (obesity, diabetes), viral hepatitis, alcohol use
    ALT trending up on serial measurements: Investigate for progressive liver disease


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Comprehensive metabolic panel"
    - "Hepatic function panel"
    - "Suspected liver disease"
    - "Elevated AST or alkaline phosphatase"
    - "Monitoring hepatotoxic medications"
    - "Metabolic syndrome screening"
    - "Abnormal liver imaging"

  contraindications: []
  minimumIntervalHours: 24
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (minimal effect compared to AST)"
    - "Lipemia (may interfere with some assays)"
    - "Strenuous exercise (mild elevation)"

  interferingMedications:
    - "Acetaminophen (dose-dependent hepatotoxicity)"
    - "Statins (mild elevation common, monitor)"
    - "Antibiotics (amoxicillin-clavulanate, isoniazid, nitrofurantoin)"
    - "Anti-epileptics (phenytoin, valproate)"
    - "NSAIDs (ibuprofen, diclofenac)"
    - "Herbal supplements (kava, green tea extract)"

  stability: "7 days refrigerated, stable at room temperature for 24 hours"
  rejectionCriteria: "Clotted specimen, insufficient volume"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true
  autoOrderWith: ["AST", "Alkaline Phosphatase", "Bilirubin Total", "Albumin", "GGT if cholestatic pattern"]

  reflexTesting:
    result_above_1000: "URGENT - Check acetaminophen level, PT/INR, viral hepatitis panel (HAV IgM, HBsAg, anti-HCV), right upper quadrant ultrasound, hepatology consultation"
    result_above_500: "Check comprehensive hepatic panel, viral hepatitis serologies, autoimmune hepatitis panel (ANA, ASMA), drug history review"
    result_above_150: "Repeat in 1-2 weeks with AST, alkaline phosphatase, bilirubin; screen for metabolic syndrome, viral hepatitis risk factors"
    result_57_to_150: "Repeat in 4-8 weeks; screen for NAFLD risk factors (obesity, diabetes, dyslipidemia), alcohol use"

  followUpGuidance: |
    ALT >1000: Daily monitoring until trending down, assess for acute liver failure (encephalopathy, coagulopathy)
    ALT 150-1000: Repeat in 3-7 days with full hepatic panel, identify and remove hepatotoxins
    ALT 57-150: Repeat in 4-8 weeks; if persistent, evaluate for chronic liver disease
    ALT trending up: Investigate progressive liver disease, consider liver biopsy if diagnosis unclear


