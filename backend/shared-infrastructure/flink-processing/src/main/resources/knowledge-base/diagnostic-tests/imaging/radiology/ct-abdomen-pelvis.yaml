# ==================================================================
# CT ABDOMEN/PELVIS WITH IV CONTRAST IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-CT-ABD-PELV-001"
studyName: "CT Abdomen/Pelvis with IV Contrast"
cptCode: "74177"
commonNames: "CT Abdomen/Pelvis, Abdominal CT, CT AP"
modality: "COMPUTED_TOMOGRAPHY"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "NPO 2-4 hours before IV contrast. Oral contrast 1-2 hours before (if ordered). Remove metal objects"
  positioning: "Supine, arms above head"
  views: "Axial slices from diaphragm to symphysis pubis with coronal/sagittal reconstructions"
  contrastRequired: true  # Can be done without contrast if contraindicated
  contrastType: "Iodinated IV contrast (100-150 mL), optional oral contrast"
  sedationRequired: false
  specialInstructions: "Breath hold during acquisition (15-20 seconds). IV access required. Oral contrast may be given for bowel opacification"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Contraindicated unless life-threatening emergency. Ultrasound or MRI preferred"

  renalFunction: |
    CHECK CREATININE before IV contrast administration
    eGFR <30: High risk for contrast-induced nephropathy (CIN)
    eGFR 30-45: Moderate risk - ensure hydration, consider non-contrast study
    eGFR >45: Low risk - hydration recommended
    Acute kidney injury: AVOID contrast unless emergent

  allergies: |
    Contrast allergy history: Pre-medicate with corticosteroids + antihistamine
    Severe prior reaction: Consider non-contrast CT or MRI
    Shellfish allergy: NOT a contraindication (myth debunked)

  implants: "Pacemaker/ICD not contraindication for CT (unlike MRI)"

  pediatricConsiderations: "Minimize radiation - use low-dose protocols, consider ultrasound or MRI first"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "10-20 mSv (abdomen/pelvis CT with contrast)"
  comparison: "Equivalent to 3-7 years of natural background radiation, or 200-300 chest X-rays"
  justification: "Higher radiation but essential for acute abdominal evaluation"
  alara: "Use iterative reconstruction, limit scan range, consider ultrasound/MRI alternatives when appropriate"
  cancerRisk: "Estimated 1 in 1000 lifetime cancer risk from single abdomen/pelvis CT"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "STAT for acute abdomen/trauma (0-2 hours), same day for urgent, 1-7 days for routine"
  urgentAvailability: "24/7 for emergent indications"
  studyDuration: "20-30 minutes including contrast and oral contrast administration"
  resultsTurnaround: "Preliminary 1-2 hours, final radiology read 4-24 hours, STAT reads <1 hour"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Acute abdominal pain (suspected surgical abdomen)"
      acrRating: 9
      clinicalContext: "Appendicitis, diverticulitis, bowel obstruction, perforation evaluation"
      evidence: "ACR Appropriateness Criteria - CT is gold standard for acute abdomen"

    - indication: "Suspected appendicitis"
      acrRating: 9
      clinicalContext: "Sensitivity 95%, specificity 94% for appendicitis diagnosis"
      evidence: "Multiple meta-analyses confirm CT superiority over ultrasound and clinical exam"

    - indication: "Suspected diverticulitis"
      acrRating: 9
      clinicalContext: "Assess for complicated vs uncomplicated disease, abscess, perforation"
      evidence: "AGA Guidelines on Diverticulitis 2015"

    - indication: "Blunt abdominal trauma"
      acrRating: 9
      clinicalContext: "Evaluate for solid organ injury (liver, spleen, kidney), bowel injury, free fluid"
      evidence: "ATLS protocols - CT triple phase for hemodynamically stable trauma patients"

    - indication: "Suspected bowel obstruction"
      acrRating: 8
      clinicalContext: "Determine level, cause (adhesions vs mass), assess for ischemia/strangulation"
      evidence: "World Journal of Emergency Surgery Guidelines"

    - indication: "Abdominal/pelvic cancer staging"
      acrRating: 9
      clinicalContext: "Assess primary tumor, lymph nodes, metastases"
      evidence: "NCCN Guidelines for various malignancies"

    - indication: "Suspected nephrolithiasis (kidney stones)"
      acrRating: 9
      clinicalContext: "Non-contrast CT preferred (stones visible without contrast), assess for hydronephrosis"
      evidence: "AUA Guidelines on Nephrolithiasis - CT is gold standard"

  may_be_appropriate_4_6:
    - indication: "Right lower quadrant pain in women (reproductive age)"
      acrRating: 6
      clinicalContext: "Pelvic ultrasound first (evaluate ovarian pathology), CT if ultrasound negative"
      evidence: "ACR Appropriateness - ultrasound first to avoid radiation in young women"

    - indication: "Uncomplicated diverticulitis (known from prior imaging)"
      acrRating: 5
      clinicalContext: "CT may not be needed if classic presentation and prior CT documentation"
      evidence: "Some guidelines suggest clinical diagnosis for uncomplicated recurrent diverticulitis"

  usually_not_appropriate_1_3:
    - indication: "Chronic stable abdominal pain"
      acrRating: 3
      clinicalContext: "Low yield for CT in chronic pain without alarm features"
      evidence: "Choosing Wisely - avoid routine CT for chronic abdominal pain"

    - indication: "Screening for asymptomatic disease"
      acrRating: 1
      clinicalContext: "Not indicated for general screening"
      evidence: "No evidence supporting routine abdominal CT screening"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Normal solid organs (liver, spleen, pancreas, kidneys), no free fluid, no bowel wall thickening, no obstruction"

  commonAbnormalities:
    - finding: "Appendicitis"
      interpretation: "Dilated appendix >6mm, wall thickening, periappendiceal fat stranding, appendicolith"
      actionable: "Surgical consult for appendectomy (laparoscopic preferred), antibiotics"

    - finding: "Diverticulitis"
      interpretation: "Colonic diverticula with wall thickening, fat stranding. Complicated if abscess or perforation"
      actionable: "Uncomplicated: antibiotics, bowel rest. Complicated: surgical consult, possible percutaneous drainage"

    - finding: "Bowel obstruction"
      interpretation: "Dilated bowel loops, transition point, collapsed bowel distally. Assess for ischemia (closed-loop, whirl sign)"
      actionable: "NG tube decompression, NPO, surgical consult if high-grade or signs of ischemia"

    - finding: "Nephrolithiasis"
      interpretation: "Stone size, location (kidney vs ureter), hydronephrosis"
      actionable: "Stones <5mm: medical expulsive therapy. Stones >5mm: urology consult for intervention"

    - finding: "Solid organ injury (liver/spleen)"
      interpretation: "Grade I-V based on injury severity, active contrast extravasation suggests bleeding"
      actionable: "Grade I-III: conservative management. Grade IV-V or hemodynamic instability: surgical consult"

    - finding: "Free intraperitoneal air"
      interpretation: "Perforated viscus (peptic ulcer, diverticulitis, bowel perforation)"
      actionable: "EMERGENT surgical consult for exploratory laparotomy"

  criticalFindings:
    - "Free air (pneumoperitoneum) - perforated viscus, EMERGENT surgical consult"
    - "Bowel ischemia (pneumatosis, portal venous gas) - EMERGENT surgery"
    - "Ruptured abdominal aortic aneurysm - EMERGENT vascular surgery"
    - "Active hemorrhage with hemodynamic instability - EMERGENT intervention"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute abdominal pain (suspected surgical abdomen)"
    - "Suspected appendicitis, diverticulitis, or bowel obstruction"
    - "Blunt abdominal trauma (hemodynamically stable)"
    - "Suspected nephrolithiasis (order non-contrast for stones)"
    - "Abdominal/pelvic malignancy staging"
    - "Abscess or fluid collection localization for drainage"

  contraindications:
    - "Pregnancy (relative - ultrasound or MRI preferred)"
    - "Severe contrast allergy without pre-medication"
    - "eGFR <30 without urgent indication"

  prerequisiteTests:
    - "Creatinine/eGFR (within 30 days for outpatient, 7 days for inpatient)"
    - "Pregnancy test (women of childbearing age)"

  stewardshipRecommendations: |
    Consider ultrasound FIRST for RLQ pain in young women (ovarian pathology)
    Use NON-CONTRAST CT for nephrolithiasis (stones visible without contrast)
    AVOID routine CT for chronic stable abdominal pain
    Consider MRI for pregnant patients when ultrasound inadequate
    Use low-dose protocols when available


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate IV contrast bolus (portal venous phase standard)"
    - "Adequate oral contrast if ordered (bowel opacification)"
    - "Minimal motion artifact (adequate breath hold)"
    - "Appropriate field of view (diaphragm to symphysis pubis)"

  followUpGuidance: |
    Appendicitis: No routine follow-up imaging after appendectomy
    Diverticulitis: Colonoscopy 6-8 weeks after resolution to rule out colon cancer
    Bowel obstruction: Repeat imaging if clinical deterioration
    Renal stones: Repeat KUB or ultrasound to assess stone passage
    Incidental findings: Follow guidelines (e.g., Fleischner for lung nodules, Bosniak for renal cysts)


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 550.00
  patientCharge: 2000.00
  highUtilization: true
  costEffectiveness: "High cost but essential for acute abdominal evaluation, superior to ultrasound and clinical exam"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 26057388 (ACR Appropriateness Criteria Acute Abdominal Pain)"
  - "PMID: 25667141 (AGA Guidelines on Diverticulitis 2015)"
  - "PMID: 24832682 (Contrast-induced nephropathy prevention)"
  - "PMID: 23422427 (WSES Guidelines on Bowel Obstruction)"
  - "PMID: 25102643 (AUA Guidelines on Nephrolithiasis)"


guidelineReferences:
  - "ACR Appropriateness Criteria for Acute Abdominal Pain"
  - "AGA Guidelines on Acute Diverticulitis 2015"
  - "ATLS Guidelines for Trauma 10th Edition"
  - "World Journal of Emergency Surgery Guidelines"
  - "AUA Guidelines on Nephrolithiasis"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    chronic_pain: "ALERT: CT not indicated for chronic stable abdominal pain without alarm features"
    young_female_rlq: "ALERT: Consider pelvic ultrasound FIRST for RLQ pain in women of reproductive age"
    renal_stones: "ALERT: For nephrolithiasis, order NON-CONTRAST CT (stones visible without contrast)"
    renal_check: "ALERT: Creatinine required within 30 days before contrast CT - order if not available"
    pregnancy_check: "ALERT: Pregnancy test required for women of childbearing age before CT"

  autoOrderWith:
    - "Creatinine if not checked within 30 days"
    - "Pregnancy test for women 12-55 years"

  reflexOrdering:
    appendicitis_confirmed: "STAT surgical consult for appendectomy"
    complicated_diverticulitis: "Surgical consult if abscess >4cm or perforation, consider IR drainage"
    free_air: "EMERGENT surgical consult for exploratory laparotomy"
    bowel_ischemia: "EMERGENT surgical consult"
    incidental_renal_mass: "Follow Bosniak classification for cystic masses, urology referral for solid masses"

  followUpGuidance: |
    Diverticulitis: Colonoscopy 6-8 weeks after resolution to exclude malignancy
    Incidental pulmonary nodules: Follow Fleischner guidelines
    Incidental adrenal masses: Endocrinology consult if >1cm or suspicious features
    Incidental renal cysts: Follow Bosniak classification


