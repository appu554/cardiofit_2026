# ==================================================================
# FIBRINOGEN TEST DEFINITION
# ==================================================================
testId: "LAB-FIBRINOGEN-001"
testName: "Fibrinogen"
loincCode: "3255-7"
commonNames: "Fibrinogen, Factor I, Fibrinogen Activity"
category: "HEMATOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Light blue top (3.2% sodium citrate) - MUST be filled to line"
  volumeRequired: 2.7  # mL (must fill to proper ratio)
  specialHandling: "Fill tube completely for accurate ratio. Invert gently 3-4 times. Analyze within 4 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 120
  urgentTurnaroundMinutes: 60
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/dL"
    normal:
      min: 200.0
      max: 400.0
      interpretation: "Normal coagulation and clot formation"
    critical:
      criticalLow: 100.0
      criticalHigh: 700.0
      criticalInterpretation: "DIC/bleeding risk (<100) or thrombosis risk (>700)"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "mg/dL"
    normal:
      min: 200.0
      max: 400.0
      interpretation: "Normal (similar to adults)"
    critical:
      criticalLow: 100.0
      criticalHigh: 700.0
      criticalInterpretation: "DIC/bleeding risk (<100) or thrombosis risk (>700)"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "200-400 mg/dL: Normal fibrinogen level"
    hypofibrinogenemia_mild: "100-200 mg/dL: Mildly low - monitor for bleeding"
    hypofibrinogenemia_severe: "<100 mg/dL: CRITICAL - High bleeding risk, consider replacement"
    hyperfibrinogenemia_mild: "400-500 mg/dL: Mildly elevated - acute phase reaction"
    hyperfibrinogenemia_moderate: "500-700 mg/dL: Moderately elevated - inflammation or thrombosis risk"
    hyperfibrinogenemia_severe: ">700 mg/dL: Severely elevated - significant thrombosis risk"

  clinicalSignificance: |
    Fibrinogen (Factor I) is a coagulation protein essential for clot formation. It is
    converted to fibrin by thrombin during coagulation. Low fibrinogen causes bleeding
    (DIC, liver failure, congenital deficiency). Fibrinogen is also an acute phase reactant
    that increases with inflammation, infection, pregnancy, and malignancy. Critical for
    DIC diagnosis (low fibrinogen + high D-dimer + thrombocytopenia). Fibrinogen <100 mg/dL
    requires replacement therapy (cryoprecipitate or fibrinogen concentrate).

  commonCauses:
    - "Low fibrinogen (Hypofibrinogenemia): DIC, liver failure, congenital afibrinogenemia, massive transfusion, thrombolytic therapy"
    - "High fibrinogen (Hyperfibrinogenemia): Acute phase reaction (inflammation, infection, trauma), pregnancy, malignancy, smoking, nephrotic syndrome"

  differentialDiagnosis:
    - "DIC (disseminated intravascular coagulation): Low fibrinogen + high D-dimer + thrombocytopenia + prolonged PT/PTT"
    - "Liver failure: Low fibrinogen + prolonged PT/PTT + low albumin + high bilirubin"
    - "Massive transfusion: Dilutional coagulopathy - low fibrinogen + thrombocytopenia"
    - "Congenital afibrinogenemia: Very low/absent fibrinogen, bleeding since childhood"
    - "Acute inflammation: High fibrinogen + high CRP/ESR"

  actionableFindings: |
    Fibrinogen <100 mg/dL: CRITICAL - Transfuse cryoprecipitate (10 units raise fibrinogen ~70 mg/dL) or fibrinogen concentrate
    Fibrinogen <150 mg/dL with bleeding: Transfuse cryoprecipitate to target >150 mg/dL
    Fibrinogen <200 mg/dL pre-operatively: Transfuse cryoprecipitate before major surgery
    Low fibrinogen + high D-dimer + low platelets: URGENT - Suspected DIC, evaluate cause (sepsis, trauma, malignancy)
    Fibrinogen >700 mg/dL: Increased thrombosis risk - evaluate for underlying inflammation, malignancy
    Rapid fibrinogen decline: Evaluate for active DIC, massive bleeding


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected DIC"
    - "Unexplained bleeding or bruising"
    - "Pre-operative assessment (major surgery)"
    - "Massive transfusion protocol"
    - "Monitoring thrombolytic therapy"
    - "Congenital bleeding disorder evaluation"
    - "Postpartum hemorrhage"

  contraindications: []

  minimumIntervalHours: 12  # More frequent in DIC or massive transfusion
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Underfilled tube (falsely prolonged coagulation tests)"
    - "Overfilled tube (falsely shortened)"
    - "Hematocrit >55% (incorrect citrate ratio)"
    - "Delay in analysis >4 hours"
    - "Clotted specimen (invalid)"
    - "Lipemia (interferes with optical methods)"

  interferingMedications:
    - "Heparin (minimal direct effect on fibrinogen level)"
    - "Thrombolytic therapy (tPA, streptokinase) - decreases fibrinogen"
    - "L-asparaginase (chemotherapy) - decreases fibrinogen"
    - "Anabolic steroids (increase fibrinogen)"
    - "Oral contraceptives (increase fibrinogen)"

  stability: "Stable 4 hours at room temperature, 2 weeks frozen"
  rejectionCriteria: "Clotted specimen, underfilled tube, hemolyzed, icteric"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 25.00
  patientCharge: 75.00
  highUtilization: false
  stewardshipRecommendations: "Order fibrinogen for DIC evaluation, bleeding disorders, or massive transfusion. Do not order routinely with PT/PTT. Use in conjunction with D-dimer, platelets, PT/PTT for DIC diagnosis"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 27121245 (Massive transfusion guidelines)"
  - "PMID: 30702144 (DIC diagnosis and management)"
  - "PMID: 29473854 (Fibrinogen replacement therapy)"
  - "PMID: 28233605 (Coagulation factor replacement)"


guidelineReferences:
  - "ASH Guidelines on DIC Management"
  - "European Guidelines on Perioperative Coagulation Management"
  - "AABB Massive Transfusion Protocol Guidelines"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "PT/INR"
    - "PTT"
    - "D-dimer"
    - "CBC with platelets"

  reflexTesting:
    fibrinogen_below_100: "CRITICAL - Transfuse cryoprecipitate (10 units) or fibrinogen concentrate immediately"
    fibrinogen_100_to_150: "Low - Consider cryoprecipitate if bleeding or pre-operative"
    fibrinogen_below_200_preop: "Order cryoprecipitate before major surgery to prevent bleeding"
    low_fib_high_ddimer_low_plt: "URGENT - Suspected DIC. Order PT/PTT, peripheral smear. Evaluate for sepsis, trauma, malignancy"
    fibrinogen_above_700: "Very high - Increased thrombosis risk. Evaluate for malignancy, inflammation"
    rapid_decline: "Evaluate for active DIC, massive bleeding. Consider serial monitoring"

  followUpGuidance: |
    Fibrinogen <100 mg/dL: Transfuse 10 units cryoprecipitate, recheck fibrinogen (expect ~70 mg/dL rise)
    Alternative: Fibrinogen concentrate 50-70 mg/kg IV
    DIC management: Treat underlying cause (sepsis, trauma), transfuse cryoprecipitate to maintain fibrinogen >150 mg/dL
    Massive transfusion: Monitor fibrinogen q1-2h, transfuse cryoprecipitate to keep >200 mg/dL
    Pre-operative: Target fibrinogen >200 mg/dL before major surgery
    Post-partum hemorrhage: Transfuse cryoprecipitate if fibrinogen <200 mg/dL
    Monitor fibrinogen closely in DIC (q6-12h) or massive transfusion (q1-2h)


