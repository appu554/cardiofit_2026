# ==================================================================
# AUTOMATED DIFFERENTIAL TEST DEFINITION
# ==================================================================
testId: "LAB-DIFFERENTIAL-001"
testName: "Automated Differential (White Blood Cell Differential)"
loincCode: "69738-3"
commonNames: "Diff, CBC with Diff, WBC Differential, Automated Diff"
category: "HEMATOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Lavender top (EDTA)"
  volumeRequired: 3.0  # mL
  specialHandling: "Mix gently by inversion, analyze within 24 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 90
  urgentTurnaroundMinutes: 45
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult_neutrophils:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "%"
    normal:
      min: 40.0
      max: 70.0
      interpretation: "Normal neutrophil percentage"
    critical:
      criticalLow: 1.0
      criticalHigh: 90.0
      criticalInterpretation: "Severe neutropenia (<1%) or leukemoid reaction (>90%)"

  adult_lymphocytes:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "%"
    normal:
      min: 20.0
      max: 40.0
      interpretation: "Normal lymphocyte percentage"
    critical:
      criticalLow: 5.0
      criticalHigh: 80.0
      criticalInterpretation: "Lymphopenia (<5%) or lymphocytosis (>80%)"

  adult_monocytes:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "%"
    normal:
      min: 2.0
      max: 8.0
      interpretation: "Normal monocyte percentage"
    critical:
      criticalLow: null
      criticalHigh: 20.0
      criticalInterpretation: "Monocytosis (>20%) - chronic infection, malignancy"

  adult_eosinophils:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "%"
    normal:
      min: 1.0
      max: 4.0
      interpretation: "Normal eosinophil percentage"
    critical:
      criticalLow: null
      criticalHigh: 15.0
      criticalInterpretation: "Severe eosinophilia (>15%) - parasites, drugs, malignancy"

  adult_basophils:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "%"
    normal:
      min: 0.0
      max: 1.0
      interpretation: "Normal basophil percentage"
    critical:
      criticalLow: null
      criticalHigh: 3.0
      criticalInterpretation: "Basophilia (>3%) - consider myeloproliferative disorder"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "Neutrophils 40-70%, Lymphocytes 20-40%, Monocytes 2-8%, Eosinophils 1-4%, Basophils 0-1%: Normal differential"
    neutrophilia: "Neutrophils >70%: Bacterial infection, inflammation, stress, corticosteroids"
    neutropenia: "Neutrophils <40%: Viral infection, bone marrow failure, chemotherapy"
    left_shift: "Increased bands (>10%): Acute bacterial infection, sepsis"
    lymphocytosis: "Lymphocytes >40%: Viral infection, chronic lymphocytic leukemia, lymphoma"
    lymphopenia: "Lymphocytes <20%: HIV, corticosteroids, stress, autoimmune disease"
    monocytosis: "Monocytes >8%: Chronic infection (TB), recovery from infection, malignancy"
    eosinophilia: "Eosinophils >4%: Allergies, parasites, drugs, autoimmune disease"
    basophilia: "Basophils >1%: Myeloproliferative disorders, allergic reactions"

  clinicalSignificance: |
    The white blood cell differential provides the percentage breakdown of WBC types:
    neutrophils (bacterial infection), lymphocytes (viral infection, immunity), monocytes
    (chronic infection), eosinophils (allergies, parasites), and basophils (rare conditions).
    Combined with absolute counts, differential helps diagnose infections, hematologic
    malignancies, allergic disorders, and immune dysfunction. Left shift (increased bands)
    indicates acute bacterial infection.

  commonCauses:
    - "Neutrophilia: Bacterial infection, inflammation, stress, corticosteroids, myeloid leukemia"
    - "Neutropenia: Viral infection, chemotherapy, aplastic anemia, autoimmune neutropenia"
    - "Lymphocytosis: Viral infection (EBV, CMV), chronic lymphocytic leukemia, pertussis"
    - "Lymphopenia: HIV/AIDS, corticosteroids, malnutrition, autoimmune disease"
    - "Monocytosis: Tuberculosis, endocarditis, recovery from infection, myelodysplasia"
    - "Eosinophilia: Allergies, parasites (strongyloides), drugs (antibiotics), vasculitis"

  differentialDiagnosis:
    - "Neutrophilia with left shift: Bacterial sepsis, abscess, pneumonia, appendicitis"
    - "Lymphocytosis: Viral infection vs chronic lymphocytic leukemia (CLL)"
    - "Monocytosis: Chronic infection (TB, endocarditis) vs myelodysplastic syndrome"
    - "Eosinophilia: Allergic reaction vs parasitic infection vs drug reaction vs vasculitis"
    - "Pancytopenia: Aplastic anemia, myelodysplasia, leukemia, bone marrow infiltration"

  actionableFindings: |
    Absolute neutrophil count (ANC) <500 cells/μL: Febrile neutropenia - empiric antibiotics
    ANC <1000 cells/μL: Neutropenic precautions, avoid live vaccines
    Left shift >10% bands: Suspect bacterial infection - blood cultures, antibiotics
    Lymphocytosis >5000 cells/μL in adult: Consider CLL - order flow cytometry
    Eosinophilia >1500 cells/μL: Evaluate for parasites (strongyloides), drug reaction
    Blasts present: URGENT - Suspect acute leukemia, order manual smear and flow cytometry
    Atypical lymphocytes: Viral infection (EBV, CMV, HIV) - order serology


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected infection"
    - "Routine CBC evaluation"
    - "Fever of unknown origin"
    - "Suspected leukemia or lymphoma"
    - "Monitoring chemotherapy"
    - "Allergic disorder evaluation"
    - "Unexplained lymphadenopathy"

  contraindications: []

  minimumIntervalHours: 24
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Clotted specimen (invalid)"
    - "Delay >24 hours (cell degradation)"
    - "Hemolysis (interferes with automated count)"
    - "Extreme leukocytosis (requires dilution)"
    - "Nucleated RBCs (falsely elevates WBC count)"

  interferingMedications:
    - "Corticosteroids (neutrophilia, lymphopenia)"
    - "Chemotherapy (pancytopenia)"
    - "G-CSF/GM-CSF (neutrophilia)"
    - "Lithium (neutrophilia)"
    - "Epinephrine (lymphocytosis - transient)"

  stability: "Stable 24 hours at room temperature, 48 hours refrigerated"
  rejectionCriteria: "Clotted specimen, severely hemolyzed, unlabeled tube"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 12.00
  patientCharge: 35.00
  highUtilization: true
  stewardshipRecommendations: "Part of CBC with differential - do not order differential alone. Automated differential is adequate for screening; manual differential only for abnormal flags or specific indications"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 29562145 (WBC differential interpretation)"
  - "PMID: 31473648 (Neutropenia evaluation guidelines)"
  - "PMID: 28605608 (Eosinophilia diagnostic approach)"
  - "PMID: 30285222 (Left shift significance in infection)"


guidelineReferences:
  - "ASH Guidelines on Neutropenia Management"
  - "IDSA Guidelines on Febrile Neutropenia"
  - "NCCN Guidelines on Hematologic Malignancies"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Complete blood count (WBC, hemoglobin, platelets)"
    - "Absolute neutrophil count (ANC)"
    - "Absolute lymphocyte count"

  reflexTesting:
    anc_below_500: "URGENT - Febrile neutropenia risk. If fever, start empiric antibiotics immediately"
    anc_below_1000: "Neutropenic precautions. Avoid crowds, live vaccines. Monitor closely"
    left_shift_bands_above_10: "Left shift suggests bacterial infection - consider blood cultures, empiric antibiotics"
    lymphocytosis_above_5000: "Order flow cytometry to evaluate for CLL or lymphoproliferative disorder"
    eosinophilia_above_1500: "Evaluate for parasitic infection (strongyloides serology/stool O&P), drug reaction, vasculitis"
    blasts_present: "URGENT - Manual peripheral smear review, flow cytometry. Suspect acute leukemia"
    atypical_lymphocytes: "Consider viral infection - EBV/CMV serology, HIV test"

  followUpGuidance: |
    ANC <500 cells/μL with fever: EMERGENT - Blood cultures, empiric broad-spectrum antibiotics (cefepime or carbapenem)
    Neutropenia: Repeat CBC in 1-2 weeks, consider bone marrow biopsy if persistent
    Left shift with fever: Blood cultures, consider sepsis protocol
    Lymphocytosis in adult: Flow cytometry if ALC >5000 cells/μL or persistent
    Eosinophilia: Stool O&P x3, strongyloides serology, review medications
    Manual smear review: Needed if blasts, atypical cells, or analyzer flags


