# ==================================================================
# CT CHEST WITH CONTRAST IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-CT-CHEST-001"
studyName: "CT Chest with IV Contrast"
cptCode: "71260"
commonNames: "Chest CT, CT Thorax, Contrast-Enhanced Chest CT"
modality: "COMPUTED_TOMOGRAPHY"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "NPO 2 hours before if IV contrast. Remove metal objects"
  positioning: "Supine, arms above head"
  views: "Axial slices with coronal/sagittal reconstructions"
  contrastRequired: true  # Can be done without contrast if contraindicated
  contrastType: "Iodinated IV contrast (100-150 mL)"
  sedationRequired: false
  specialInstructions: "Breath hold during acquisition (10-15 seconds). IV access required for contrast"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Contraindicated unless life-threatening emergency. Use MRI if possible"

  renalFunction: |
    CHECK CREATININE before IV contrast administration
    eGFR <30: High risk for contrast-induced nephropathy (CIN)
    eGFR 30-45: Moderate risk - ensure hydration, consider non-contrast study
    eGFR >45: Low risk - hydration recommended
    Acute kidney injury: AVOID contrast unless emergent

  allergies: |
    Contrast allergy history: Pre-medicate with corticosteroids + antihistamine
    Severe prior reaction: Consider non-contrast CT or alternative imaging
    Shellfish allergy: NOT a contraindication (myth debunked)

  implants: "Pacemaker/ICD not contraindication for CT (unlike MRI)"

  pediatricConsiderations: "Minimize radiation - use low-dose protocols, avoid if plain film adequate"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "7 mSv (chest CT with contrast)"
  comparison: "Equivalent to ~2.3 years of natural background radiation, or 100 chest X-rays"
  justification: "Higher radiation than CXR but necessary for detailed evaluation"
  alara: "Use low-dose protocols when possible, limit scan range to area of interest"
  cancerRisk: "Estimated 1 in 2000 lifetime cancer risk from single chest CT"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Same day for emergent (PE, aortic dissection), 1-7 days for routine"
  urgentAvailability: "24/7 for emergent indications"
  studyDuration: "15-20 minutes including contrast administration"
  resultsTurnaround: "Preliminary 1-2 hours, final radiology read 4-24 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Suspected pulmonary embolism (PE)"
      acrRating: 9
      clinicalContext: "CT pulmonary angiography (CTPA) is gold standard for PE diagnosis"
      evidence: "PIOPED III study, ACCP Guidelines on VTE"

    - indication: "Characterization of pulmonary nodule found on CXR"
      acrRating: 9
      clinicalContext: "CT chest required to measure size, assess for malignancy features"
      evidence: "Fleischner Society Guidelines for Pulmonary Nodules"

    - indication: "Staging of known lung cancer"
      acrRating: 9
      clinicalContext: "Assess tumor size, lymph nodes, metastases"
      evidence: "NCCN Lung Cancer Guidelines"

    - indication: "Suspected aortic dissection"
      acrRating: 9
      clinicalContext: "CT angiography chest/abdomen for dissection evaluation"
      evidence: "ACC/AHA Aortic Disease Guidelines"

    - indication: "Hemoptysis (moderate-severe)"
      acrRating: 8
      clinicalContext: "Identify source of bleeding, evaluate for malignancy"
      evidence: "ACR Appropriateness Criteria"

    - indication: "Complicated pneumonia or empyema"
      acrRating: 8
      clinicalContext: "Assess for abscess, loculation, need for drainage"
      evidence: "IDSA/ATS Pneumonia Guidelines"

  may_be_appropriate_4_6:
    - indication: "Acute chest pain (low-intermediate cardiac risk)"
      acrRating: 6
      clinicalContext: "Triple rule-out CT for PE, dissection, ACS (if ECG/troponin normal)"
      evidence: "ACEP Clinical Policy on Chest Pain"

    - indication: "Persistent cough >8 weeks (normal CXR)"
      acrRating: 5
      clinicalContext: "Consider if alarm features present, normal CXR but high suspicion"
      evidence: "ACCP Cough Guidelines"

  usually_not_appropriate_1_3:
    - indication: "Uncomplicated community-acquired pneumonia"
      acrRating: 3
      clinicalContext: "CXR sufficient for diagnosis and management"
      evidence: "Choosing Wisely - avoid CT for uncomplicated CAP"

    - indication: "Routine lung cancer screening (wrong modality)"
      acrRating: 2
      clinicalContext: "Use LOW-DOSE CT without contrast for screening"
      evidence: "USPSTF Lung Cancer Screening Guidelines"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Clear lung parenchyma, no nodules/masses, normal mediastinum and vasculature"

  commonAbnormalities:
    - finding: "Pulmonary embolism"
      interpretation: "Filling defect in pulmonary artery - central vs peripheral, bilateral vs unilateral"
      actionable: "Anticoagulation (heparin or DOAC), assess RV strain, consider thrombolysis if massive PE"

    - finding: "Pulmonary nodule"
      interpretation: "Measure size, assess for spiculation, growth rate (compare priors)"
      actionable: "Follow Fleischner guidelines: <6mm follow-up, 6-8mm repeat CT, >8mm PET or biopsy"

    - finding: "Lung cancer/mass"
      interpretation: "Assess size, location, lymph nodes, metastases (TNM staging)"
      actionable: "Thoracic oncology consult, PET-CT for staging, tissue diagnosis"

    - finding: "Aortic dissection"
      interpretation: "Intimal flap, true/false lumen, extent (Type A vs B)"
      actionable: "Type A (ascending aorta): EMERGENT cardiothoracic surgery; Type B: blood pressure control"

    - finding: "Pneumonia/consolidation"
      interpretation: "Dense consolidation (bacterial) vs ground-glass (viral/PJP)"
      actionable: "Antibiotics, consider bronchoscopy if atypical pattern"

  criticalFindings:
    - "Massive pulmonary embolism with RV strain - consider thrombolysis"
    - "Type A aortic dissection - EMERGENT cardiac surgery consult"
    - "Tension pneumothorax - EMERGENT chest tube"
    - "Large hemothorax - chest tube and possible surgery"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected pulmonary embolism (Wells score or PERC positive)"
    - "Pulmonary nodule characterization"
    - "Lung cancer staging"
    - "Suspected aortic dissection"
    - "Complicated pneumonia or empyema"
    - "Hemoptysis"

  contraindications:
    - "Pregnancy (relative - MRI preferred)"
    - "Severe contrast allergy without pre-medication"
    - "eGFR <30 without urgent indication"

  prerequisiteTests:
    - "Creatinine/eGFR (within 30 days for outpatient, 7 days for inpatient)"
    - "Pregnancy test (women of childbearing age)"

  stewardshipRecommendations: |
    AVOID CT chest for uncomplicated pneumonia (CXR sufficient)
    AVOID routine CT for lung cancer screening (use LOW-DOSE non-contrast)
    Consider CXR first before CT for most chest complaints
    Use non-contrast CT if contrast not needed (nodule follow-up, ILD evaluation)


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate contrast bolus timing (pulmonary arterial phase for PE)"
    - "Minimal motion artifact (adequate breath hold)"
    - "Appropriate field of view (lung apices to adrenals)"

  followUpGuidance: |
    Pulmonary nodule: Follow Fleischner guidelines for surveillance intervals
    Pneumonia: Repeat imaging NOT routinely needed if clinical improvement
    Lung cancer: Repeat CT in 6-8 weeks after treatment to assess response
    PE: No routine follow-up imaging unless persistent symptoms


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 450.00
  patientCharge: 1500.00
  highUtilization: true
  costEffectiveness: "Higher cost than CXR but essential for PE diagnosis and nodule characterization"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 16467544 (PIOPED III - CTPA for PE diagnosis)"
  - "PMID: 28159492 (Fleischner Society Pulmonary Nodule Guidelines 2017)"
  - "PMID: 27262168 (NCCN Lung Cancer Screening)"
  - "PMID: 22315259 (ACC/AHA Aortic Dissection Guidelines)"
  - "PMID: 24832682 (Contrast-induced nephropathy prevention)"


guidelineReferences:
  - "ACR Appropriateness Criteria for Acute Chest Pain and PE"
  - "Fleischner Society Guidelines for Pulmonary Nodules 2017"
  - "ACCP Guidelines on Venous Thromboembolism"
  - "NCCN Lung Cancer Guidelines"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    uncomplicated_pneumonia: "ALERT: CT not indicated for uncomplicated CAP - CXR sufficient per guidelines"
    routine_screening: "ALERT: For lung cancer screening, use LOW-DOSE CT without contrast"
    renal_check: "ALERT: Creatinine required within 30 days before contrast CT - order if not available"
    pregnancy_check: "ALERT: Pregnancy test required for women of childbearing age before CT"

  autoOrderWith:
    - "Creatinine if not checked within 30 days"
    - "Pregnancy test for women 12-55 years"

  reflexOrdering:
    pe_confirmed: "Consider lower extremity venous duplex ultrasound to assess DVT"
    nodule_detected: "Follow Fleischner guidelines for surveillance intervals based on size and risk"
    dissection_confirmed: "STAT cardiothoracic surgery consult if Type A dissection"

  followUpGuidance: |
    PE diagnosed: Anticoagulation for 3-6 months, no routine repeat imaging
    Pulmonary nodule: Surveillance CT per Fleischner (6-12 months depending on size)
    Aortic dissection: Urgent surgical consult for Type A, ICU admission for Type B


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ACR Appropriateness Criteria 2023, Fleischner Guidelines 2017, ACCP VTE Guidelines"
version: "1.0"
