# ==================================================================
# C-REACTIVE PROTEIN TEST DEFINITION
# ==================================================================
testId: "LAB-CRP-001"
testName: "C-Reactive Protein"
loincCode: "1988-5"
commonNames: "CRP, C-Reactive Protein, High-Sensitivity CRP"
category: "INFLAMMATORY_MARKERS"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 2.0  # mL
  specialHandling: "Stable at room temperature for 24 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/L"
    normal:
      min: 0.0
      max: 10.0
      interpretation: "Normal - no significant inflammation"
    critical:
      criticalLow: null
      criticalHigh: 100.0
      criticalInterpretation: "Severe inflammation or infection"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "<10 mg/L: No significant acute inflammation"
    elevated_mild: "10-40 mg/L: Mild inflammation - viral infection, minor trauma"
    elevated_moderate: "40-100 mg/L: Moderate inflammation - bacterial infection, autoimmune flare"
    elevated_severe: "100-200 mg/L: Severe inflammation - severe bacterial infection, major trauma"
    elevated_critical: ">200 mg/L: Extreme inflammation - sepsis, severe tissue injury, burns"

  clinicalSignificance: |
    CRP is an acute phase reactant synthesized by the liver in response to inflammation.
    Rises within 6-8 hours of inflammatory stimulus, peaks at 48 hours.
    Non-specific marker - does not differentiate bacterial from viral or other causes.
    Useful for monitoring disease activity and treatment response in inflammatory conditions.
    hs-CRP (<3 mg/L) used for cardiovascular risk assessment.

  commonCauses:
    - "Bacterial infections (pneumonia, UTI, sepsis)"
    - "Viral infections (usually <40 mg/L)"
    - "Acute myocardial infarction"
    - "Autoimmune diseases (SLE, RA, IBD)"
    - "Malignancy"
    - "Trauma or surgery"
    - "Burns"
    - "Pancreatitis"
    - "Tissue necrosis"

  differentialDiagnosis:
    - "CRP >100 mg/L: Bacterial infection, severe trauma, pancreatitis, burns"
    - "CRP 10-100 mg/L: Viral infection, autoimmune disease, minor infection"
    - "CRP <10 mg/L: No significant acute inflammation"

  actionableFindings: |
    CRP <10 mg/L: Low likelihood of bacterial infection
    CRP 10-40 mg/L: Possible viral infection or mild inflammation
    CRP 40-100 mg/L: Probable bacterial infection - consider antibiotics
    CRP >100 mg/L: Severe infection or inflammation - urgent evaluation
    CRP trending down: Appropriate treatment response
    CRP trending up: Inadequate treatment or complication


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected bacterial infection"
    - "Monitor inflammatory disease activity"
    - "Assess treatment response in infection or autoimmune disease"
    - "Differentiate inflammatory from non-inflammatory conditions"
    - "Post-operative infection monitoring"
    - "Fever of unknown origin"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 24  # For serial monitoring
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (minimal effect)"
    - "Lipemia (minimal effect)"

  interferingMedications:
    - "NSAIDs (may reduce CRP elevation)"
    - "Corticosteroids (may suppress CRP response)"
    - "Immunosuppressive drugs (may reduce CRP)"

  stability: "7 days at 2-8°C, 6 months frozen"
  rejectionCriteria: "Clotted specimen, insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 12.00
  patientCharge: 40.00
  highUtilization: true
  stewardshipRecommendations: "Use serial CRP to monitor treatment response rather than one-time measurement"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 30265503 (CRP in infection diagnosis)"
  - "PMID: 31398342 (CRP kinetics in bacterial infection)"
  - "PMID: 28747437 (CRP-guided antibiotic therapy)"
  - "PMID: 15155530 (CRP in cardiovascular disease)"

guidelineReferences:
  - "IDSA Guidelines for Community-Acquired Pneumonia"
  - "ACR Guidelines for Rheumatoid Arthritis Monitoring"
  - "ACC/AHA Guidelines for Cardiovascular Risk Assessment"

evidenceLevel: "B"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Procalcitonin (for infection differentiation)"
    - "CBC with differential"
    - "ESR (complementary inflammatory marker)"
    - "Blood cultures (if infection suspected)"

  reflexTesting:
    result_above_40: "Consider bacterial infection - check procalcitonin and blood cultures"
    result_above_100: "URGENT - Severe inflammation/infection - sepsis workup"

  followUpGuidance: |
    Initial CRP elevated: Repeat in 24-48 hours to assess trend
    CRP declining (>50% drop): Appropriate treatment, continue monitoring
    CRP rising or plateau: Consider treatment failure, source control, or antibiotic resistance
    CRP normalizing: Consider treatment discontinuation based on clinical improvement


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "IDSA Guidelines, ACC/AHA Guidelines"
version: "1.0"
