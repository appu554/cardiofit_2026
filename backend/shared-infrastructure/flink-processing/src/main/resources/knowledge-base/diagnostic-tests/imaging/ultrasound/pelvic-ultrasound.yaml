# ==================================================================
# PELVIC ULTRASOUND (TRANSABDOMINAL) IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-US-PELVIS-001"
studyName: "Pelvic Ultrasound (Transabdominal)"
cptCode: "76856"
commonNames: "Pelvic US, Transvaginal Ultrasound, Gynecologic Ultrasound"
modality: "ULTRASOUND"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "Full bladder required for transabdominal approach (drink 32oz water 1 hour before). Empty bladder for transvaginal approach"
  positioning: "Supine for transabdominal, lithotomy for transvaginal"
  views: "Transabdominal (TA) and/or transvaginal (TV) based on indication. TV provides superior detail"
  contrastRequired: false
  sedationRequired: false
  specialInstructions: "Transabdominal: full bladder acts as acoustic window. Transvaginal: higher resolution for pelvic organs. 20-30 minutes"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Safe - no radiation. Preferred imaging for pregnancy and gynecologic issues"
  renalFunction: "Not applicable (no contrast)"
  allergies: "No allergy concerns (ultrasound gel only)"
  implants: "Safe with all implants including pacemakers"
  pediatricConsiderations: "Safe for all ages. Transabdominal only in prepubertal girls"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "0 mSv (ultrasound - no ionizing radiation)"
  comparison: "No radiation - completely safe"
  justification: "First-line imaging for pelvic pain, pregnancy, ovarian and uterine pathology"
  alara: "Not applicable - ultrasound is non-ionizing"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "STAT for ectopic pregnancy or ovarian torsion concern (0-2 hours), same day for acute pain, 1-7 days for routine"
  urgentAvailability: "24/7 for emergent indications (ectopic, torsion, appendicitis in pregnancy)"
  studyDuration: "20-30 minutes (TA), 15-20 minutes (TV)"
  resultsTurnaround: "Preliminary interpretation immediate for emergencies, formal radiology read 4-12 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "First trimester pregnancy with vaginal bleeding"
      acrRating: 9
      clinicalContext: "Rule out ectopic pregnancy, assess viability, evaluate for miscarriage"
      evidence: "ACOG Guidelines - ultrasound mandatory for first trimester bleeding"

    - indication: "Suspected ectopic pregnancy"
      acrRating: 9
      clinicalContext: "Transvaginal ultrasound with beta-hCG correlation. Empty uterus with hCG >1500-2000 suggests ectopic"
      evidence: "ACOG Practice Bulletin - TV ultrasound gold standard for ectopic diagnosis"

    - indication: "Acute pelvic pain in women of reproductive age"
      acrRating: 9
      clinicalContext: "Evaluate for ovarian torsion, ruptured cyst, tubo-ovarian abscess, appendicitis, ectopic"
      evidence: "ACR Appropriateness Criteria - ultrasound first-line for acute pelvic pain"

    - indication: "Palpable pelvic mass"
      acrRating: 9
      clinicalContext: "Characterize ovarian vs uterine mass, assess for malignancy features"
      evidence: "ACOG Guidelines - ultrasound first-line for pelvic mass evaluation"

    - indication: "Abnormal uterine bleeding"
      acrRating: 8
      clinicalContext: "Evaluate endometrial thickness, fibroids, polyps"
      evidence: "ACOG Guidelines on Abnormal Uterine Bleeding"

    - indication: "Suspected ovarian torsion"
      acrRating: 9
      clinicalContext: "Assess ovarian size, Doppler flow (absent/decreased flow suggests torsion)"
      evidence: "Surgical emergency - ultrasound with Doppler is diagnostic test of choice"

  may_be_appropriate_4_6:
    - indication: "Infertility workup"
      acrRating: 7
      clinicalContext: "Assess antral follicle count, uterine/ovarian anatomy"
      evidence: "ASRM Guidelines - transvaginal ultrasound part of infertility evaluation"

    - indication: "Postmenopausal bleeding"
      acrRating: 8
      clinicalContext: "Endometrial thickness >4mm warrants endometrial biopsy (rule out malignancy)"
      evidence: "ACOG Guidelines - ultrasound first step, biopsy if thickened endometrium"

  usually_not_appropriate_1_3:
    - indication: "Routine screening in asymptomatic low-risk women"
      acrRating: 1
      clinicalContext: "No evidence for ovarian cancer screening benefit in general population"
      evidence: "USPSTF Grade D - recommends against routine ovarian cancer screening"

    - indication: "Chronic stable pelvic pain without new symptoms"
      acrRating: 3
      clinicalContext: "Low yield for repeat imaging if prior workup negative"
      evidence: "Avoid repeated imaging without clinical change"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Normal uterus and ovaries, no free fluid, no adnexal masses"

  keyMeasurements:
    - measurement: "Endometrial thickness"
      normalRange: "Variable by cycle phase: proliferative 5-7mm, secretory 7-14mm, postmenopausal <4mm"
      interpretation: |
        Premenopausal: Varies with cycle phase
        Postmenopausal >4mm: Increased risk of endometrial cancer - biopsy indicated

    - measurement: "Ovarian volume"
      normalRange: "<20 cm³ (premenopausal), <10 cm³ (postmenopausal)"
      interpretation: |
        Enlarged ovary: Consider cyst, mass, or polycystic ovarian syndrome (PCOS)

  commonAbnormalities:
    - finding: "Ectopic pregnancy"
      interpretation: "Adnexal mass with gestational sac outside uterus, or empty uterus with beta-hCG >1500-2000"
      actionable: "OB/GYN consult - methotrexate if hemodynamically stable and meets criteria, OR surgical management (laparoscopy)"

    - finding: "Ovarian torsion"
      interpretation: "Enlarged ovary (>4cm), absent or decreased Doppler flow, free fluid"
      actionable: "EMERGENT OB/GYN surgical consult for detorsion (within 4-6 hours to save ovary)"

    - finding: "Tubo-ovarian abscess (TOA)"
      interpretation: "Complex adnexal mass with thick walls, internal debris. Associated with PID"
      actionable: "IV antibiotics (ceftriaxone + doxycycline + metronidazole), OB/GYN consult for drainage if no response to antibiotics"

    - finding: "Ovarian cyst - simple"
      interpretation: "Anechoic, thin-walled, smooth, no internal echoes or solid components"
      actionable: "Premenopausal <5cm: Likely functional cyst - repeat ultrasound in 6-12 weeks. >5cm: OB/GYN referral"

    - finding: "Ovarian cyst - complex or solid components"
      interpretation: "Septations, solid nodules, thick walls, irregular borders. Concern for malignancy"
      actionable: "OB/GYN consult, consider tumor markers (CA-125, CEA, AFP), MRI or CT for staging if malignancy suspected"

    - finding: "Uterine fibroids"
      interpretation: "Well-defined hypoechoic masses within uterine wall"
      actionable: "Asymptomatic: No treatment needed. Symptomatic (bleeding, pain, pressure): OB/GYN referral for medical or surgical management"

  criticalFindings:
    - "Ectopic pregnancy with rupture (free fluid) - EMERGENT surgical management"
    - "Ovarian torsion - EMERGENT surgical detorsion (time-sensitive)"
    - "Tubo-ovarian abscess with rupture - EMERGENT surgery and IV antibiotics"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute pelvic pain in women of reproductive age"
    - "First trimester vaginal bleeding"
    - "Suspected ectopic pregnancy"
    - "Palpable pelvic mass"
    - "Abnormal uterine bleeding"
    - "Suspected ovarian torsion"

  contraindications: []  # No contraindications for ultrasound

  prerequisiteTests:
    - "Beta-hCG (if suspected pregnancy or ectopic)"
    - "Pregnancy test (all women of childbearing age with pelvic pain)"

  stewardshipRecommendations: |
    AVOID routine screening ultrasound for ovarian cancer in asymptomatic low-risk women (USPSTF Grade D)
    Use transvaginal ultrasound for better resolution (transabdominal if patient declines or anatomically difficult)
    AVOID CT for right lower quadrant pain in young women - ultrasound first (avoid radiation to ovaries)
    Check beta-hCG before imaging in women of reproductive age with pelvic pain


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate visualization of uterus, both ovaries, and adnexa"
    - "Doppler assessment when indicated (torsion, ectopic)"
    - "Measurement of endometrial thickness"
    - "Documentation of free fluid if present"

  followUpGuidance: |
    Ectopic pregnancy: Serial beta-hCG monitoring after treatment, repeat ultrasound PRN
    Simple ovarian cyst <5cm: Repeat ultrasound in 6-12 weeks (functional cysts should resolve)
    Complex ovarian mass: OB/GYN referral, MRI or CT for staging if malignancy suspected
    Ovarian torsion: Post-operative ultrasound to assess ovarian viability
    Fibroids: Repeat ultrasound only if symptoms change


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 250.00
  patientCharge: 600.00
  highUtilization: true
  costEffectiveness: "Cost-effective first-line imaging for pelvic pathology - avoid CT in young women when possible"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 29794677 (ACOG Practice Bulletin on Ectopic Pregnancy 2018)"
  - "PMID: 30575661 (ACR Appropriateness Criteria Acute Pelvic Pain 2018)"
  - "PMID: 29939940 (ACOG Practice Bulletin on Abnormal Uterine Bleeding 2019)"
  - "PMID: 29112962 (USPSTF Ovarian Cancer Screening 2018 - Grade D)"
  - "PMID: 24264611 (Ovarian Torsion Diagnosis and Management 2013)"


guidelineReferences:
  - "ACOG Practice Bulletin on Ectopic Pregnancy 2018"
  - "ACR Appropriateness Criteria for Acute Pelvic Pain in Reproductive Age Women"
  - "ACOG Practice Bulletin on Abnormal Uterine Bleeding 2019"
  - "USPSTF Recommendation on Ovarian Cancer Screening 2018"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    routine_screening: "ALERT: Routine pelvic ultrasound for ovarian cancer screening NOT recommended in asymptomatic low-risk women (USPSTF Grade D)"
    pregnancy_test_required: "ALERT: Beta-hCG required for women of childbearing age with pelvic pain before imaging"

  autoOrderWith:
    - "Beta-hCG (if pregnancy suspected or woman of reproductive age with pelvic pain)"
    - "Pregnancy test (all women of childbearing age)"

  reflexOrdering:
    ectopic_pregnancy: "EMERGENT OB/GYN consult - methotrexate if stable and meets criteria, OR laparoscopy if unstable"
    ovarian_torsion: "EMERGENT OB/GYN surgical consult for detorsion within 4-6 hours"
    tubo_ovarian_abscess: "IV antibiotics (ceftriaxone + doxycycline + metronidazole), OB/GYN consult for drainage if no response"
    complex_ovarian_mass: "OB/GYN referral, tumor markers (CA-125), MRI or CT for staging if malignancy suspected"

  followUpGuidance: |
    Ectopic pregnancy: Serial beta-hCG after treatment until undetectable
    Simple ovarian cyst <5cm: Repeat ultrasound in 6-12 weeks to confirm resolution
    Complex ovarian mass: OB/GYN referral for surgical evaluation
    Postmenopausal bleeding with thick endometrium (>4mm): Endometrial biopsy required
    Fibroids: Symptomatic - OB/GYN referral for medical or surgical management


