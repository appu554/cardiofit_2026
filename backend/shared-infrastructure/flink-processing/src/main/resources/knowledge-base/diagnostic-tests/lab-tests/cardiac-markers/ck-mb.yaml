# ==================================================================
# CK-MB TEST DEFINITION
# ==================================================================
testId: "LAB-CK-MB-001"
testName: "CK-MB"
loincCode: "13969-1"
commonNames: "Creatine Kinase MB, CK-MB mass, Cardiac CK"
category: "CARDIAC_MARKERS"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 3.0  # mL
  specialHandling: "No special handling required, stable at room temperature for 24 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "ng/mL"
    normal:
      min: 0.0
      max: 5.0
      interpretation: "No myocardial injury detected"
    critical:
      criticalLow: null
      criticalHigh: 25.0
      criticalInterpretation: "Severely elevated CK-MB - acute myocardial infarction"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "<5.0 ng/mL: No acute myocardial injury"
    elevated_mild: "5.0-10.0 ng/mL: Mild elevation - possible myocardial injury, consider serial testing"
    elevated_moderate: "10.0-25.0 ng/mL: Moderate elevation - likely acute coronary syndrome"
    elevated_severe: ">25.0 ng/mL: Severe elevation - acute myocardial infarction"
    critical: ">25.0 ng/mL: CRITICAL VALUE - Immediate cardiology evaluation"

  clinicalSignificance: |
    CK-MB is a cardiac-specific isoenzyme of creatine kinase, historically used for MI diagnosis.
    Rises 4-6 hours after symptom onset, peaks at 12-24 hours, normalizes in 48-72 hours.
    Being largely replaced by troponin for acute MI diagnosis, but useful for detecting
    re-infarction due to faster return to baseline. CK-MB relative index (CK-MB/total CK >2.5%)
    helps distinguish cardiac from skeletal muscle injury.

  commonCauses:
    - "Acute myocardial infarction (STEMI/NSTEMI)"
    - "Myocarditis"
    - "Cardiac contusion/trauma"
    - "Post-cardiac surgery or PCI"
    - "Defibrillation/cardioversion"
    - "Skeletal muscle injury (if CK-MB/total CK <2.5%)"
    - "Rhabdomyolysis (non-cardiac elevation)"
    - "Renal failure (mild elevation)"

  differentialDiagnosis:
    - "Acute MI: CK-MB >25 ng/mL with appropriate clinical context"
    - "Re-infarction: Rising CK-MB after initial decline"
    - "Skeletal muscle injury: Elevated total CK with normal CK-MB relative index"
    - "Post-procedural: Expected rise after PCI or cardiac surgery"

  actionableFindings: |
    CK-MB >25 ng/mL with chest pain: Activate STEMI protocol if ECG positive
    CK-MB rising pattern: Acute MI - urgent cardiology consult
    CK-MB re-elevation after initial decline: Suspect re-infarction
    CK-MB elevated but troponin normal: Consider skeletal muscle injury or non-cardiac causes
    Serial CK-MB (0, 3, 6 hours) for diagnosis, then q8h to detect re-infarction


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Chest pain suspicious for acute coronary syndrome"
    - "Detection of re-infarction (troponin may remain elevated)"
    - "Post-PCI or CABG monitoring"
    - "Suspected myocarditis"
    - "Cardiac risk stratification when troponin unavailable"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 3  # For serial CK-MB protocol
  requiresConsent: false
  appropriatenessLevel: "MAY_BE_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (may falsely elevate)"
    - "Skeletal muscle injury (check CK-MB relative index)"
    - "Macro-CK (CK-immunoglobulin complex)"

  interferingMedications:
    - "None known"

  stability: "7 days at 2-8°C, 6 months frozen"
  rejectionCriteria: "Clotted specimen, insufficient volume, gross hemolysis"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 22.00
  patientCharge: 75.00
  highUtilization: false
  stewardshipRecommendations: "Troponin preferred for initial MI diagnosis. Reserve CK-MB for re-infarction detection or when troponin unavailable"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 30681346 (Fourth Universal Definition of MI)"
  - "PMID: 28549995 (ESC Guidelines for NSTEMI)"
  - "PMID: 12668699 (CK-MB vs troponin comparison)"
  - "PMID: 11401906 (CK-MB for re-infarction detection)"

guidelineReferences:
  - "Fourth Universal Definition of Myocardial Infarction (2018)"
  - "ESC Guidelines for NSTEMI (2020)"
  - "ACC/AHA Chest Pain Guidelines (2021)"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "ECG (12-lead)"
    - "Troponin I or T"
    - "Total CK (for relative index calculation)"
    - "Complete metabolic panel"
    - "CBC"

  reflexTesting:
    result_above_5.0: "Repeat CK-MB in 3 hours for serial measurement; order troponin if not done"
    result_above_25.0: "URGENT - Cardiology consult and consider cardiac catheterization"

  followUpGuidance: |
    Serial CK-MB protocol: 0, 3, 6 hours for initial diagnosis
    Then q8h monitoring for 24-48 hours to detect re-infarction
    Rising pattern (>20% change): Acute MI or re-infarction
    Falling pattern: Recovery from MI
    Calculate CK-MB relative index: (CK-MB/total CK) x 100%
    Relative index >2.5%: Cardiac origin
    Relative index <2.5%: Skeletal muscle origin


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "Fourth Universal Definition of MI, Institutional Lab Manual"
version: "1.0"
