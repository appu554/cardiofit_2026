# ==================================================================
# LOWER EXTREMITY VENOUS DOPPLER ULTRASOUND IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-US-VENOUS-LEG-001"
studyName: "Lower Extremity Venous Doppler Ultrasound (Bilateral)"
cptCode: "93970"
commonNames: "LE Venous Doppler, DVT Ultrasound, Lower Extremity Venous Study"
modality: "ULTRASOUND"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "No fasting required. Remove pants/socks for leg access"
  positioning: "Supine and reverse Trendelenburg for calf veins, leg externally rotated"
  views: "Common femoral, femoral, popliteal, posterior tibial, peroneal veins with compression and Doppler"
  contrastRequired: false
  sedationRequired: false
  specialInstructions: "Remain still during exam. 20-30 minutes per leg (bilateral study 40-60 minutes)"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Safe - no radiation, no contrast. Preferred imaging for DVT in pregnancy"
  renalFunction: "Not applicable (no contrast)"
  allergies: "No allergy concerns (ultrasound gel only)"
  implants: "Safe with all implants including pacemakers"
  pediatricConsiderations: "Safe for all ages, no radiation"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "0 mSv (ultrasound - no ionizing radiation)"
  comparison: "No radiation - completely safe"
  justification: "First-line imaging for DVT evaluation"
  alara: "Not applicable - ultrasound is non-ionizing"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Same day for suspected DVT (0-4 hours), urgent for hospitalized patients"
  urgentAvailability: "Available during business hours, limited after-hours availability, portable for inpatients"
  studyDuration: "20-30 minutes per leg (unilateral), 40-60 minutes (bilateral)"
  resultsTurnaround: "Preliminary interpretation immediate, formal vascular lab read 2-4 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Suspected deep vein thrombosis (DVT)"
      acrRating: 9
      clinicalContext: "Wells score ≥2 or moderate-high pretest probability. Leg swelling, pain, warmth, Homan's sign"
      evidence: "ACCP VTE Guidelines 2016 - compression ultrasound is gold standard for DVT diagnosis"

    - indication: "Pulmonary embolism (evaluate for DVT source)"
      acrRating: 8
      clinicalContext: "DVT present in 30-50% of PE patients - may guide anticoagulation duration"
      evidence: "Concurrent DVT evaluation recommended in PE workup"

    - indication: "Symptomatic leg swelling with Wells score ≥2"
      acrRating: 9
      clinicalContext: "Wells score risk stratification - score ≥2 warrants ultrasound"
      evidence: "Wells Score validated for DVT prediction - sensitivity 95% with ultrasound"

    - indication: "Post-operative orthopedic surgery with leg symptoms"
      acrRating: 8
      clinicalContext: "High DVT risk after hip/knee replacement - symptoms warrant imaging"
      evidence: "ACCP Guidelines - symptomatic patients require imaging despite prophylaxis"

  may_be_appropriate_4_6:
    - indication: "Low pretest probability (Wells <2) with positive D-dimer"
      acrRating: 6
      clinicalContext: "D-dimer alone insufficient in moderate risk - ultrasound needed"
      evidence: "Wells <2 with D-dimer <500: DVT unlikely. Positive D-dimer warrants imaging"

    - indication: "Surveillance after known DVT (on anticoagulation)"
      acrRating: 4
      clinicalContext: "Routine surveillance NOT recommended - repeat only if symptoms change"
      evidence: "Choosing Wisely - avoid routine surveillance ultrasound in asymptomatic patients"

  usually_not_appropriate_1_3:
    - indication: "Low pretest probability (Wells <2) with negative D-dimer"
      acrRating: 1
      clinicalContext: "DVT effectively ruled out - ultrasound NOT indicated"
      evidence: "Negative D-dimer with Wells <2 has 99% negative predictive value"

    - indication: "Asymptomatic screening in high-risk patients"
      acrRating: 2
      clinicalContext: "Not recommended - prophylaxis preferred over screening"
      evidence: "ACCP Guidelines - pharmacologic prophylaxis preferred over screening"

    - indication: "Superficial thrombophlebitis (no deep vein involvement)"
      acrRating: 3
      clinicalContext: "Ultrasound to rule out DVT extension, but treatment differs"
      evidence: "Superficial thrombophlebitis: NSAIDs/compression. Ultrasound if concern for DVT extension"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Fully compressible veins throughout, normal respiratory phasicity, no intraluminal echoes, normal Doppler waveforms"

  keyFindings:
    - finding: "Acute DVT"
      interpretation: "Non-compressible vein segment, intraluminal echoes (thrombus), absent or diminished Doppler flow"
      actionable: "Anticoagulation (heparin, LMWH, or DOAC), assess for PE if symptomatic, avoid compression of affected leg"

    - finding: "Proximal DVT (femoral or popliteal)"
      interpretation: "Higher risk for PE and post-thrombotic syndrome"
      actionable: "URGENT anticoagulation, consider IVC filter if anticoagulation contraindicated, pulmonology consult if PE suspected"

    - finding: "Distal DVT (calf veins only)"
      interpretation: "Lower PE risk but can propagate proximally"
      actionable: "Anticoagulation vs surveillance strategy (repeat ultrasound in 1 week). Consider anticoagulation if symptomatic or risk factors"

    - finding: "Chronic DVT"
      interpretation: "Thickened vein walls, partial recanalization, collateral veins"
      actionable: "Compression stockings for post-thrombotic syndrome, continue anticoagulation per guidelines"

    - finding: "Superficial thrombophlebitis"
      interpretation: "Thrombus in superficial vein (great or small saphenous), no deep vein involvement"
      actionable: "NSAIDs, compression stockings, warm compresses. Anticoagulation if extensive or near SFJ/SPJ"

  criticalFindings:
    - "Proximal DVT (iliofemoral) - URGENT anticoagulation, high PE risk"
    - "Extensive DVT with phlegmasia cerulea dolens - vascular surgery consult, consider catheter-directed thrombolysis"
    - "DVT with anticoagulation contraindication - IVC filter placement"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected DVT with Wells score ≥2 or moderate-high pretest probability"
    - "Positive D-dimer with clinical suspicion of DVT"
    - "Pulmonary embolism (evaluate for DVT source)"
    - "Leg swelling, pain, warmth, erythema"
    - "Superficial thrombophlebitis (rule out DVT extension)"

  contraindications: []  # No contraindications for ultrasound

  prerequisiteTests:
    - "Wells Score calculation (recommended for risk stratification)"
    - "D-dimer (if low-intermediate pretest probability)"

  stewardshipRecommendations: |
    ALWAYS calculate Wells Score before ordering ultrasound
    AVOID ultrasound if Wells <2 AND negative D-dimer (DVT ruled out)
    AVOID routine surveillance ultrasound in asymptomatic patients on anticoagulation
    AVOID screening ultrasound in asymptomatic high-risk patients (use prophylaxis instead)
    Order bilateral study if unilateral swelling to compare sides


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Complete compression of common femoral, femoral, popliteal, and calf veins"
    - "Adequate Doppler assessment of flow and respiratory phasicity"
    - "Evaluation of great saphenous vein at saphenofemoral junction"

  followUpGuidance: |
    Acute proximal DVT: Anticoagulation 3-6 months minimum, no routine repeat ultrasound unless symptomatic
    Distal DVT: Repeat ultrasound in 1 week if surveillance strategy chosen (assess for propagation)
    Post-thrombotic syndrome: Compression stockings, elevate legs, no routine repeat imaging
    Provoked DVT: 3 months anticoagulation if reversible risk factor (surgery, immobility)
    Unprovoked DVT: Consider extended anticoagulation after initial 3-6 months


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 250.00
  patientCharge: 600.00
  highUtilization: true
  costEffectiveness: "Cost-effective first-line test for DVT - avoid D-dimer in high pretest probability (order ultrasound directly)"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 26867832 (ACCP VTE Guidelines 2016)"
  - "PMID: 12969426 (Wells Score for DVT - original validation 2003)"
  - "PMID: 16880624 (Negative D-dimer rules out DVT in low-risk patients 2006)"
  - "PMID: 20738765 (ACCP Guidelines on Anticoagulation for VTE 2012)"
  - "PMID: 25738674 (Distal DVT management - anticoagulation vs surveillance 2015)"


guidelineReferences:
  - "ACCP Evidence-Based Clinical Practice Guidelines on VTE 2016"
  - "ESC Guidelines on Diagnosis and Management of Acute PE 2019"
  - "ASH Guidelines on VTE Management 2020"
  - "Wells Score for DVT Risk Stratification"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    wells_score_low_ddimer_negative: "ALERT: DVT ruled out with Wells <2 and negative D-dimer - ultrasound NOT indicated"
    wells_score_required: "ALERT: Calculate Wells Score for risk stratification before ordering ultrasound"
    surveillance_not_indicated: "ALERT: Routine surveillance ultrasound NOT recommended for asymptomatic patients on anticoagulation"

  autoOrderWith:
    - "Wells Score calculation (if not documented)"
    - "D-dimer (if Wells <2 and not already ordered)"
    - "Consider CTPA if PE suspected"

  reflexOrdering:
    proximal_dvt: "URGENT anticoagulation (heparin, LMWH, or DOAC), assess for PE symptoms, avoid leg compression"
    distal_dvt: "Anticoagulation OR repeat ultrasound in 1 week (surveillance for proximal extension). Consider anticoagulation if symptomatic"
    dvt_with_pe: "Anticoagulation for 3-6 months minimum, consider extended therapy if unprovoked"
    anticoag_contraindication: "IVC filter placement if DVT confirmed and anticoagulation contraindicated"

  followUpGuidance: |
    Proximal DVT: Anticoagulation 3-6 months, assess bleeding risk, no routine repeat ultrasound
    Distal DVT: Anticoagulation OR surveillance with repeat ultrasound in 1 week
    Provoked DVT: 3 months anticoagulation, discontinue if risk factor resolved
    Unprovoked DVT: Consider extended anticoagulation (shared decision-making)
    Post-thrombotic syndrome: Compression stockings 30-40 mmHg, elevate legs, mobilize


