# ==================================================================
# ALBUMIN TEST DEFINITION
# ==================================================================
testId: "LAB-ALB-001"
testName: "Albumin, Serum"
loincCode: "1751-7"
commonNames: "Albumin, Serum Albumin"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 1.0  # mL
  specialHandling: "Standard handling, stable specimen"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "g/dL"
    normal:
      min: 3.5
      max: 5.5
      interpretation: "Normal hepatic synthetic function and nutritional status"
    critical:
      criticalLow: 2.0
      criticalHigh: null
      criticalInterpretation: "Severe hypoalbuminemia - acute liver failure, severe malnutrition, or nephrotic syndrome"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "3.5-5.5 g/dL: Normal hepatic synthesis and nutritional status"
    low_mild: "3.0-3.4 g/dL: Mild hypoalbuminemia - chronic disease, mild malnutrition"
    low_moderate: "2.5-2.9 g/dL: Moderate hypoalbuminemia - chronic liver disease, nephrotic syndrome, malabsorption"
    low_severe: "2.0-2.4 g/dL: Severe hypoalbuminemia - cirrhosis, acute liver failure, severe malnutrition"
    critical: "<2.0 g/dL: CRITICAL - Life-threatening hypoalbuminemia, evaluate for acute liver failure, severe protein-losing state"

  clinicalSignificance: |
    Albumin is synthesized exclusively by the liver and is a marker of hepatic synthetic function.
    Half-life of 20 days makes albumin a marker of chronic, not acute, liver disease.
    Hypoalbuminemia causes decreased oncotic pressure leading to edema and ascites.
    Albumin is used to calculate corrected calcium: Corrected Ca = measured Ca + 0.8 × (4.0 - albumin).
    Albumin is a negative acute phase reactant (decreases in inflammation/infection).
    Child-Pugh score and MELD-Na score use albumin to assess cirrhosis severity.

  commonCauses:
    - "Decreased synthesis: Chronic liver disease (cirrhosis), acute liver failure, malnutrition, inflammatory states"
    - "Increased loss: Nephrotic syndrome (urinary loss), protein-losing enteropathy, severe burns, exudative wounds"
    - "Dilution: Volume overload, SIADH, congestive heart failure"
    - "Increased catabolism: Sepsis, hyperthyroidism, trauma"
    - "Redistribution: Acute illness, inflammation (negative acute phase reactant)"

  actionableFindings: |
    Albumin <2.0: Urgent evaluation for acute liver failure (check PT/INR, bilirubin, hepatic encephalopathy), severe malnutrition (nutritional assessment), or nephrotic syndrome (urinalysis for proteinuria)
    Albumin 2.0-2.5 with cirrhosis: Calculate Child-Pugh and MELD scores, evaluate for liver transplant candidacy
    Albumin 2.5-3.4: Evaluate for chronic liver disease, malnutrition, protein-losing states; consider nutritional supplementation
    Hypoalbuminemia with edema/ascites: Diuretic therapy, sodium restriction, evaluate for cirrhosis complications (SBP, hepatorenal syndrome)


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Comprehensive metabolic panel"
    - "Hepatic function panel"
    - "Evaluation of chronic liver disease"
    - "Assessment of nutritional status"
    - "Edema or ascites evaluation"
    - "Preoperative risk assessment"
    - "Nephrotic syndrome workup"

  contraindications: []
  minimumIntervalHours: 168  # 1 week (due to 20-day half-life)
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Dehydration (falsely elevated)"
    - "Volume overload (falsely decreased)"
    - "Body position (higher when upright)"
    - "Tourniquet application time (prolonged increases albumin)"

  interferingMedications:
    - "Anabolic steroids (may increase albumin)"
    - "Corticosteroids (may increase albumin)"
    - "Growth hormone (may increase albumin)"
    - "Exogenous albumin infusion (falsely elevated)"

  stability: "Stable for 7 days refrigerated, 3 days at room temperature"
  rejectionCriteria: "Clotted specimen, insufficient volume"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true
  autoOrderWith: ["Total Protein", "ALT", "AST", "Bilirubin Total", "PT/INR (if liver disease suspected)", "Urinalysis (if nephrotic syndrome suspected)"]

  reflexTesting:
    result_below_2.0: "URGENT - Check PT/INR, bilirubin, AST/ALT for acute liver failure; urinalysis for proteinuria (nephrotic syndrome); hepatology consultation"
    result_2.0_to_2.5: "Check comprehensive hepatic panel, calculate Child-Pugh and MELD scores if cirrhosis known; evaluate for malnutrition (prealbumin, nutritional assessment)"
    result_2.5_to_3.4: "Repeat in 4-8 weeks; evaluate for chronic liver disease, malnutrition, inflammatory states"

  followUpGuidance: |
    Albumin <2.5 with cirrhosis: Calculate Child-Pugh score (albumin <2.8 = 3 points), MELD-Na score; evaluate for transplant
    Albumin <3.0 with malnutrition: Nutritional supplementation, repeat albumin in 2-4 weeks, consider prealbumin (shorter half-life) for acute changes
    Albumin <3.5 preoperatively: Increased surgical risk, consider nutritional optimization before elective surgery
    Albumin used for calcium correction: Monitor corrected calcium in hypoalbuminemic patients


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "Child-Pugh classification (Pugh RN, et al. 1973)"
  - "MELD-Na score for liver disease severity"
  - "Albumin as negative acute phase reactant (Fleck A, et al. 1985)"


guidelineReferences:
  - "AASLD Guidelines for Management of Cirrhosis"
  - "KDIGO Guidelines for Nephrotic Syndrome"


