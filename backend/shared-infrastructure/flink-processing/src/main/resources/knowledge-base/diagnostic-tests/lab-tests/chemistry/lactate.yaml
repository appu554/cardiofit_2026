# ==================================================================
# SERUM LACTATE TEST DEFINITION
# ==================================================================
testId: "LAB-LACTATE-001"
testName: "Serum Lactate"
loincCode: "2524-7"
commonNames: "Lactic Acid, Blood Lactate, L-Lactate"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture (preferred) or Arterial line"
  container: "Gray top tube (sodium fluoride/potassium oxalate)"
  volumeRequired: 1.0  # mL
  specialHandling: "Transport on ice, analyze within 15 minutes to prevent glycolysis"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 30
  urgentTurnaroundMinutes: 15
  criticalResultMinutes: 15
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mmol/L"
    normal:
      min: 0.5
      max: 2.0
      interpretation: "Normal tissue perfusion, adequate oxygen delivery"
    critical:
      criticalLow: null
      criticalHigh: 4.0
      criticalInterpretation: "Severe lactic acidosis - septic shock, cardiogenic shock, or tissue hypoperfusion"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "mmol/L"
    normal:
      min: 0.5
      max: 2.0
      interpretation: "Normal"
    critical:
      criticalHigh: 4.0
      criticalInterpretation: "Critical - immediate evaluation needed"

  neonatal:
    population: "neonatal"
    sex: "ALL"
    ageMin: 0
    ageMax: 0
    unit: "mmol/L"
    normal:
      min: 0.5
      max: 2.5
      interpretation: "Normal for neonate"
    critical:
      criticalHigh: 5.0
      criticalInterpretation: "Critical"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "0.5-2.0 mmol/L: Normal tissue perfusion"
    elevated_mild: "2.1-3.9 mmol/L: Mild elevation - monitor closely, identify source"
    elevated_severe: "≥4.0 mmol/L: Severe hyperlactatemia - septic shock, tissue hypoperfusion"
    critical: "≥4.0 mmol/L: CRITICAL VALUE - Immediate intervention required"

  clinicalSignificance: |
    Lactate is a marker of tissue hypoperfusion and anaerobic metabolism.
    Elevated lactate (>2 mmol/L) in sepsis indicates organ dysfunction and is
    associated with increased mortality. Serial lactate measurements guide
    resuscitation effectiveness.

  commonCauses:
    - "Septic shock (most common in ICU)"
    - "Cardiogenic shock"
    - "Hypovolemic shock"
    - "Tissue hypoxia"
    - "Liver failure (decreased lactate clearance)"
    - "Seizures"
    - "Metformin use"
    - "Malignancy"
    - "Thiamine deficiency"

  differentialDiagnosis:
    - "Type A lactic acidosis (tissue hypoxia): Sepsis, shock, severe anemia"
    - "Type B lactic acidosis (no tissue hypoxia): Liver disease, malignancy, medications"

  actionableFindings: |
    Lactate >2.0 mmol/L: Initiate sepsis resuscitation if infection suspected
    Lactate ≥4.0 mmol/L: Septic shock - aggressive resuscitation, ICU transfer
    Lactate >2.0 with trending down: Adequate resuscitation
    Lactate >2.0 with trending up: Inadequate resuscitation, escalate care


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected sepsis or septic shock"
    - "Unexplained metabolic acidosis"
    - "Shock of any etiology"
    - "Monitoring resuscitation effectiveness"
    - "Suspected mesenteric ischemia"
    - "Post-cardiac arrest"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 2  # For serial monitoring in sepsis
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Prolonged tourniquet time (falsely elevated)"
    - "Fist clenching during draw (falsely elevated)"
    - "Delay in analysis >15 minutes (falsely elevated due to glycolysis)"
    - "Hemolysis"

  interferingMedications:
    - "Metformin (may cause lactic acidosis)"
    - "Nucleoside reverse transcriptase inhibitors (NRTIs)"
    - "Epinephrine (may increase lactate)"
    - "Albuterol (may increase lactate)"

  stability: "15 minutes at room temperature, 4 hours on ice"
  rejectionCriteria: "Clotted specimen, insufficient volume, wrong tube type"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 12.50
  patientCharge: 45.00
  highUtilization: true
  stewardshipRecommendations: "Use serial lactate measurements to guide sepsis resuscitation rather than single measurement"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 34605781 (SSC 2021 - Measure lactate in sepsis)"
  - "PMID: 28114553 (Lactate clearance in sepsis)"
  - "PMID: 21378355 (Lactate-guided resuscitation)"
  - "PMID: 20200382 (Lactate prognostic value)"


guidelineReferences:
  - "Surviving Sepsis Campaign 2021"
  - "Society of Critical Care Medicine (SCCM) Guidelines"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Blood cultures"
    - "CBC"
    - "Comprehensive metabolic panel"
    - "Arterial blood gas"

  reflexTesting:
    result_above_2: "Consider repeat lactate in 2-4 hours to assess clearance"
    result_above_4: "URGENT - Repeat lactate in 2 hours AND initiate sepsis bundle"

  followUpGuidance: |
    Initial lactate ≥2 mmol/L: Repeat within 2-4 hours
    Target: Lactate clearance ≥10% from baseline
    If lactate not clearing: Escalate resuscitation, consider ICU transfer


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "Surviving Sepsis Campaign 2021, Institutional Lab Manual"
version: "1.0"
