# ==================================================================
# URINALYSIS WITH MICROSCOPY TEST DEFINITION
# ==================================================================
testId: "LAB-UA-001"
testName: "Urinalysis with Microscopy"
loincCode: "24356-8"
commonNames: "UA, Urinalysis, Complete Urinalysis, UA with Micro"
category: "URINALYSIS"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "URINE"
  collection: "Clean catch midstream or catheterized specimen"
  container: "Sterile urine cup"
  volumeRequired: 10.0  # mL
  specialHandling: "Analyze within 2 hours or refrigerate; room temperature allows bacterial overgrowth"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult_chemical:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "qualitative"
    normal:
      interpretation: |
        Chemical dipstick normal values:
        - Color: Yellow to amber
        - Clarity: Clear
        - Specific gravity: 1.005-1.030
        - pH: 4.5-8.0 (typically 5.5-6.5)
        - Protein: Negative or trace
        - Glucose: Negative
        - Ketones: Negative
        - Blood: Negative
        - Bilirubin: Negative
        - Urobilinogen: 0.1-1.0 mg/dL
        - Nitrites: Negative
        - Leukocyte esterase: Negative

  adult_microscopy:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "per HPF"
    normal:
      interpretation: |
        Microscopic examination normal values:
        - WBCs: 0-5 per high power field (HPF)
        - RBCs: 0-2 per HPF
        - Epithelial cells: Few
        - Bacteria: None or rare
        - Casts: None (occasional hyaline casts acceptable)
        - Crystals: None or few (type depends on pH)
    critical:
      criticalHigh: 100
      criticalInterpretation: "Pyuria >100 WBCs/HPF suggests severe UTI, pyelonephritis, or sterile pyuria"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    proteinuria: "Protein 1+ to 4+: Glomerular disease, nephrotic syndrome, preeclampsia, multiple myeloma"
    hematuria: "Blood trace to 3+: UTI, nephrolithiasis, glomerulonephritis, malignancy, trauma"
    pyuria: "WBCs >5/HPF or LE positive: UTI, pyelonephritis, interstitial nephritis, sterile pyuria (TB, STI)"
    glucosuria: "Glucose 1+ to 4+: Diabetes mellitus, renal glycosuria, SGLT2 inhibitors"
    ketonuria: "Ketones trace to 3+: DKA, starvation, low-carb diet, vomiting"
    positive_nitrites: "Nitrites positive: Bacterial UTI (gram-negative bacteria convert nitrate to nitrite)"
    casts: "RBC casts: Glomerulonephritis; WBC casts: Pyelonephritis, interstitial nephritis; Granular casts: ATN"

  clinicalSignificance: |
    Urinalysis is a rapid, low-cost screening test for renal and urologic disease.
    Chemical dipstick detects: protein, blood, glucose, ketones, leukocyte esterase, nitrites, bilirubin.
    Microscopy examines sediment for cells, casts, crystals, bacteria.
    Pyuria (WBCs >5/HPF or positive LE) + nitrites = UTI until proven otherwise.
    Hematuria requires evaluation to rule out malignancy (cystoscopy if >35 years or risk factors).
    RBC casts are pathognomonic for glomerulonephritis.
    WBC casts indicate pyelonephritis or interstitial nephritis.
    Proteinuria >1+ requires quantification with urine protein/creatinine ratio or 24-hour collection.

  commonCauses:
    proteinuria:
      - "Glomerular disease (nephrotic syndrome, glomerulonephritis)"
      - "Diabetic nephropathy"
      - "Hypertensive nephrosclerosis"
      - "Preeclampsia in pregnancy"
      - "Multiple myeloma (Bence Jones protein)"
      - "Orthostatic proteinuria (benign in young patients)"

    hematuria:
      - "UTI (cystitis, pyelonephritis)"
      - "Nephrolithiasis (kidney stones)"
      - "Glomerulonephritis (IgA nephropathy, post-streptococcal GN)"
      - "Bladder or renal malignancy"
      - "Trauma"
      - "Anticoagulation"
      - "Exercise-induced hematuria (benign)"

    pyuria:
      - "Bacterial UTI (cystitis, pyelonephritis)"
      - "Sexually transmitted infections (chlamydia, gonorrhea)"
      - "Tuberculosis (sterile pyuria)"
      - "Interstitial nephritis (drug-induced)"
      - "Appendicitis (irritation of ureter)"
      - "Contamination from vaginal discharge"

  differentialDiagnosis:
    - "Pyuria + Nitrites positive: Bacterial UTI (gram-negative) - order urine culture"
    - "Pyuria + Nitrites negative: Consider gram-positive UTI, STI (chlamydia/gonorrhea), TB, interstitial nephritis"
    - "Hematuria + Proteinuria + RBC casts: Glomerulonephritis - nephrology referral, check ANA, ANCA, complement, anti-GBM"
    - "Hematuria without pyuria: Nephrolithiasis, malignancy - imaging (CT urography), cystoscopy if age >35"
    - "Proteinuria 3-4+ with hypoalbuminemia: Nephrotic syndrome - 24-hour urine protein, nephrology referral"
    - "WBC casts: Pyelonephritis or acute interstitial nephritis - review medications, check renal function"

  actionableFindings: |
    Pyuria (>5 WBCs/HPF) + Nitrites positive: Presumed UTI - order urine culture, start empiric antibiotics
    Pyuria >100 WBCs/HPF: Severe UTI or pyelonephritis - blood cultures, imaging if pyelonephritis suspected
    Hematuria (>3 RBCs/HPF): Evaluate for malignancy (cystoscopy if age >35 or risk factors), nephrolithiasis (CT), or glomerulonephritis
    RBC casts: Glomerulonephritis - URGENT nephrology referral, check ANA, ANCA, complement, anti-GBM antibody, renal function
    WBC casts: Pyelonephritis or acute interstitial nephritis - blood cultures, renal ultrasound, review medications
    Proteinuria ≥2+: Quantify with urine protein/creatinine ratio; if >0.5 g/g, nephrology referral
    Glucose positive with normal blood glucose: Renal glycosuria or SGLT2 inhibitor use
    Ketones 2-3+ with hyperglycemia: DKA evaluation - check BMP, VBG, beta-hydroxybutyrate


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected UTI (dysuria, frequency, urgency)"
    - "Unexplained fever"
    - "Flank pain or pyelonephritis"
    - "Hematuria evaluation"
    - "Preoperative screening"
    - "Pregnancy prenatal visit"
    - "Diabetes or hypertension monitoring (proteinuria screening)"
    - "Acute kidney injury evaluation"
    - "Suspected glomerulonephritis or nephrotic syndrome"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 24  # For serial UTI or proteinuria monitoring
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Contamination from vaginal discharge or menstrual blood (false positive blood/WBCs)"
    - "Delay in analysis >2 hours (bacterial overgrowth, false positive nitrites, cast breakdown)"
    - "Concentrated urine (false positive protein)"
    - "Dilute urine (false negative protein, cells, casts)"
    - "Alkaline urine pH >8 (false negative nitrites, LE)"

  interferingMedications:
    - "Ascorbic acid (vitamin C) - false negative blood, glucose"
    - "Phenazopyridine (Pyridium) - interferes with dipstick color readings"
    - "Rifampin - orange-red discoloration"
    - "Nitrofurantoin - false positive glucose (Clinitest method)"
    - "SGLT2 inhibitors (canagliflozin, dapagliflozin) - glucosuria expected"

  stability: "Analyze within 2 hours; refrigerate if delayed (stable 24 hours refrigerated)"
  rejectionCriteria: "Insufficient volume, fecal contamination, specimen >2 hours old unrefrigerated"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 8.00
  patientCharge: 30.00
  highUtilization: true
  stewardshipRecommendations: "Avoid screening urinalysis in asymptomatic patients except pregnancy; order urine culture only if UA suggests UTI"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 29271486 (IDSA UTI guidelines)"
  - "PMID: 32860505 (AUA asymptomatic bacteriuria guidelines)"
  - "PMID: 22895429 (Hematuria evaluation guidelines)"
  - "PMID: 23302426 (Proteinuria evaluation)"

guidelineReferences:
  - "IDSA Guidelines for Uncomplicated Cystitis and Pyelonephritis"
  - "AUA Guidelines for Asymptomatic Bacteriuria"
  - "AUA/SUFU Guidelines for Hematuria Evaluation"
  - "KDIGO Guidelines for Proteinuria Evaluation"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Urine culture (if pyuria and/or nitrites positive)"
    - "Urine protein/creatinine ratio (if proteinuria ≥1+)"
    - "BMP (if proteinuria or hematuria to assess renal function)"

  reflexTesting:
    pyuria_with_nitrites: "Order urine culture and sensitivity; start empiric antibiotics for UTI (nitrofurantoin, TMP-SMX, or fosfomycin)"
    pyuria_above_100: "Severe pyuria - order urine culture, consider pyelonephritis (blood cultures, renal ultrasound)"
    rbc_casts_present: "URGENT - Glomerulonephritis: Nephrology referral, check ANA, ANCA, complement C3/C4, anti-GBM, BMP, urine protein/creatinine"
    proteinuria_2plus_or_greater: "Quantify proteinuria with urine protein/creatinine ratio or 24-hour urine protein; nephrology referral if >0.5 g/g"
    hematuria_without_infection: "Evaluate for malignancy (cystoscopy if age >35), nephrolithiasis (CT urography), glomerulonephritis"

  followUpGuidance: |
    UTI (Pyuria + Nitrites):
      - Order urine culture and sensitivity
      - Start empiric antibiotics: Nitrofurantoin 100 mg BID x 5d, TMP-SMX DS BID x 3d, or fosfomycin 3g single dose
      - If pyelonephritis suspected (fever, flank pain, WBC casts): Blood cultures, renal ultrasound, IV antibiotics (ceftriaxone)
    Hematuria (>3 RBCs/HPF):
      - If UTI present, treat and repeat UA after treatment to confirm resolution
      - If persistent hematuria without infection: Cystoscopy (if age >35 or risk factors), CT urography (for nephrolithiasis)
      - If RBC casts or dysmorphic RBCs: Glomerulonephritis workup (ANA, ANCA, complement, nephrology referral)
    Proteinuria (≥1+):
      - Quantify with urine protein/creatinine ratio (spot urine) or 24-hour urine protein
      - If UPCR >0.5 g/g or 24-hour >500 mg: Nephrology referral, evaluate for nephrotic syndrome
      - Check BMP, albumin, lipid panel; consider diabetic nephropathy, hypertensive nephrosclerosis
    Glucosuria:
      - Check blood glucose to rule out diabetes mellitus
      - If blood glucose normal: Renal glycosuria (benign) or SGLT2 inhibitor use
    Ketonuria:
      - Check blood glucose and electrolytes
      - If hyperglycemia (>250 mg/dL) + ketonuria: DKA evaluation (VBG, beta-hydroxybutyrate, anion gap)
      - If normoglycemia: Starvation ketosis, low-carb diet, vomiting (usually benign)


