# ==================================================================
# CALCIUM TEST DEFINITION
# ==================================================================
testId: "LAB-CALCIUM-001"
testName: "Calcium Total"
loincCode: "17861-6"
commonNames: "Ca, Serum Calcium, Total Calcium"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 2.0  # mL
  specialHandling: "Avoid prolonged tourniquet time"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 45
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/dL"
    normal:
      min: 8.5
      max: 10.5
      interpretation: "Normal calcium homeostasis"
    critical:
      criticalLow: 7.0
      criticalHigh: 12.0
      criticalInterpretation: "Life-threatening calcium disturbance"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    low: "<8.5 mg/dL: Hypocalcemia - check ionized calcium, PTH, vitamin D"
    normal: "8.5-10.5 mg/dL: Normal calcium regulation"
    high: ">10.5 mg/dL: Hypercalcemia - check PTH, malignancy workup"
    critical_low: "<7.0 mg/dL: Severe hypocalcemia - tetany, seizures, cardiac arrhythmias"
    critical_high: ">12.0 mg/dL: Hypercalcemic crisis - confusion, renal failure, cardiac arrest"

  clinicalSignificance: |
    Calcium is essential for neuromuscular function, bone metabolism, and coagulation.
    Total calcium must be corrected for albumin (corrected Ca = measured Ca + 0.8 × (4.0 - albumin)).
    Ionized calcium is the physiologically active form.

  commonCauses:
    - "Hypocalcemia: Vitamin D deficiency, hypoparathyroidism, chronic kidney disease, pancreatitis, hypomagnesemia"
    - "Hypercalcemia: Primary hyperparathyroidism, malignancy, vitamin D toxicity, thiazide diuretics, immobilization"

  actionableFindings: |
    Ca <7.0: IV calcium replacement, check ionized calcium, ECG monitoring
    Ca >12.0: IV fluids, bisphosphonates, evaluate for malignancy or PTH excess


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Comprehensive metabolic panel"
    - "Parathyroid disorder evaluation"
    - "Malignancy workup (hypercalcemia of malignancy)"
    - "Neuromuscular symptoms (tetany, paresthesias)"

  contraindications: []
  minimumIntervalHours: 24
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: ["Albumin for calcium correction"]


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true
  autoOrderWith: ["Albumin", "Phosphorus", "Magnesium", "PTH if abnormal"]

  reflexTesting:
    result_below_7.0: "Check ionized calcium, PTH, vitamin D, magnesium"
    result_above_12.0: "Check PTH, PTHrP, vitamin D, malignancy screening"


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "Clinical Laboratory Standards"
version: "1.0"
evidenceLevel: "A"
