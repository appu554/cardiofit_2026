# ==================================================================
# D-DIMER TEST DEFINITION
# ==================================================================
testId: "LAB-DDIMER-001"
testName: "D-Dimer"
loincCode: "48065-7"
commonNames: "D-dimer, Fibrin degradation fragment"
category: "COAGULATION"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Blue top tube (sodium citrate)"
  volumeRequired: 2.7  # mL
  specialHandling: "Fill tube to appropriate level (9:1 blood:anticoagulant ratio critical)"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/L FEU"
    normal:
      min: 0.0
      max: 0.5
      interpretation: "Low probability of venous thromboembolism"
    critical:
      criticalLow: null
      criticalHigh: 0.5
      criticalInterpretation: "Elevated - increased risk of VTE, requires imaging confirmation"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "<0.5 mg/L: VTE unlikely (high negative predictive value 97-99%)"
    elevated_mild: "0.5-2.0 mg/L: Possible VTE, requires imaging confirmation"
    elevated_moderate: "2.0-5.0 mg/L: Probable VTE, urgent imaging required"
    elevated_severe: ">5.0 mg/L: High probability VTE, consider DIC workup"

  clinicalSignificance: |
    D-dimer is a fibrin degradation product elevated in thrombotic conditions.
    Excellent negative predictive value (>97%) - normal D-dimer effectively rules out VTE.
    Poor positive predictive value - many non-thrombotic conditions elevate D-dimer.
    Must be used with pretest probability (Wells Score) for optimal interpretation.

  commonCauses:
    - "Deep vein thrombosis (DVT)"
    - "Pulmonary embolism (PE)"
    - "Disseminated intravascular coagulation (DIC)"
    - "Pregnancy (physiologic elevation)"
    - "Recent surgery or trauma"
    - "Active cancer"
    - "Infection/sepsis"
    - "Heart failure"
    - "Advanced age (>70 years)"
    - "Hospitalization"

  differentialDiagnosis:
    - "Thrombotic: DVT, PE, DIC, arterial thrombosis"
    - "Non-thrombotic: Pregnancy, malignancy, infection, recent surgery, liver disease"

  actionableFindings: |
    D-dimer <0.5 mg/L + Low Wells Score: VTE ruled out, no imaging needed
    D-dimer <0.5 mg/L + High Wells Score: Consider imaging despite negative D-dimer
    D-dimer ≥0.5 mg/L: Proceed to imaging (venous ultrasound for DVT, CTPA for PE)
    D-dimer >5.0 mg/L: Consider DIC workup (PT/PTT, fibrinogen, platelets)


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected DVT or pulmonary embolism"
    - "Low to moderate pretest probability for VTE"
    - "Evaluation for DIC"
    - "Pregnancy with suspected VTE"
    - "Post-thrombotic workup"

  contraindications:
    - "High pretest probability VTE (proceed directly to imaging)"
    - "Active bleeding (will be elevated, non-diagnostic)"

  minimumIntervalHours: 24  # If monitoring for DIC
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests:
    - "Calculate Wells Score for DVT/PE before ordering"


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (may falsely elevate)"
    - "Lipemia"
    - "Underfilled tube (falsely elevated)"
    - "Clotted specimen (invalid result)"

  interferingMedications:
    - "Anticoagulants (heparin, warfarin) do not affect result"
    - "Thrombolytic therapy (will elevate D-dimer)"

  stability: "4 hours at room temperature, 24 hours at 2-8°C"
  rejectionCriteria: "Clotted specimen, insufficient volume, wrong tube type, underfilled tube"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 18.00
  patientCharge: 65.00
  highUtilization: true
  stewardshipRecommendations: "Use Wells Score to guide D-dimer ordering - avoid in high-probability VTE (go straight to imaging)"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 31300064 (ESC Guidelines for PE 2019)"
  - "PMID: 25622718 (D-dimer in pregnancy)"
  - "PMID: 17296974 (Wells Score validation)"
  - "PMID: 23281319 (Age-adjusted D-dimer cutoff)"

guidelineReferences:
  - "ESC Guidelines for Acute Pulmonary Embolism (2019)"
  - "ACCP Guidelines for VTE Diagnosis (2021)"
  - "NICE Guidelines for VTE Diagnosis"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Wells Score calculation"
    - "Consider: Venous ultrasound or CTPA based on clinical suspicion"

  reflexTesting:
    result_above_0.5: "Proceed to imaging - venous ultrasound for DVT, CTPA for PE"
    result_above_5.0: "Consider DIC workup: PT/PTT, fibrinogen, platelets, peripheral smear"

  followUpGuidance: |
    D-dimer <0.5 + Low Wells: No further testing
    D-dimer <0.5 + Moderate Wells: Consider imaging based on clinical judgment
    D-dimer <0.5 + High Wells: Proceed to imaging despite negative D-dimer
    D-dimer ≥0.5: Always proceed to imaging regardless of Wells Score
    Age-adjusted cutoff: Consider using (age × 10) μg/L for patients >50 years


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ESC PE Guidelines 2019, ACCP VTE Guidelines 2021"
version: "1.0"
