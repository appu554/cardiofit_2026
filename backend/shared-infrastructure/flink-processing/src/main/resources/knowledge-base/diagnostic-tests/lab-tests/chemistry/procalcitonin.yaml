# ==================================================================
# PROCALCITONIN TEST DEFINITION
# ==================================================================
testId: "LAB-PROCALCITONIN-001"
testName: "Procalcitonin"
loincCode: "33959-8"
commonNames: "PCT, ProCT"
category: "INFLAMMATORY_MARKERS"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 2.0  # mL
  specialHandling: "Stable at room temperature for 24 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 90
  urgentTurnaroundMinutes: 60
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "ng/mL"
    normal:
      min: 0.0
      max: 0.05
      interpretation: "Bacterial infection unlikely"
    critical:
      criticalLow: null
      criticalHigh: 2.0
      criticalInterpretation: "Severe bacterial infection or sepsis"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "<0.05 ng/mL: Bacterial infection unlikely, consider viral or non-infectious cause"
    elevated_low: "0.05-0.5 ng/mL: Possible bacterial infection, localized infection"
    elevated_moderate: "0.5-2.0 ng/mL: Probable bacterial infection, consider antibiotics"
    elevated_severe: "2.0-10.0 ng/mL: Severe bacterial infection, sepsis likely"
    elevated_critical: ">10.0 ng/mL: Septic shock, severe systemic infection"

  clinicalSignificance: |
    Procalcitonin is a biomarker for bacterial infection and sepsis severity.
    Rises within 3-6 hours of bacterial infection, peaks at 24 hours.
    Helps differentiate bacterial from viral infections and guides antibiotic therapy.
    Serial measurements track treatment response and can guide antibiotic discontinuation.

  commonCauses:
    - "Bacterial sepsis (most common)"
    - "Severe bacterial pneumonia"
    - "Bacterial meningitis"
    - "Complicated urinary tract infection"
    - "Bacterial peritonitis"
    - "Severe trauma or burns (first 48 hours)"
    - "Post-cardiac arrest"
    - "Major surgery (first 24-48 hours)"

  differentialDiagnosis:
    - "Bacterial infection: PCT >0.5 ng/mL"
    - "Viral infection: PCT usually <0.5 ng/mL"
    - "SIRS without infection: PCT may be mildly elevated"
    - "Fungal infection: Variable PCT elevation"

  actionableFindings: |
    PCT <0.05: Bacterial infection unlikely - consider stopping antibiotics if clinically improving
    PCT 0.05-0.5: Localized bacterial infection - may need antibiotics
    PCT >0.5: Bacterial sepsis likely - initiate broad-spectrum antibiotics
    PCT >2.0: Severe sepsis/septic shock - aggressive resuscitation and antibiotics
    PCT decline >80% from peak: Consider antibiotic de-escalation or discontinuation


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected bacterial sepsis"
    - "Differentiate bacterial from viral infection"
    - "Guide antibiotic therapy initiation"
    - "Monitor response to antibiotics"
    - "Antibiotic stewardship - guide discontinuation"
    - "Fever of unknown origin"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 24  # For serial monitoring
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (minimal effect)"
    - "Lipemia (minimal effect)"
    - "Icterus (minimal effect)"

  interferingMedications:
    - "Immunosuppressive drugs (may blunt PCT response)"
    - "Corticosteroids (may reduce PCT elevation)"

  stability: "7 days at 2-8°C, 6 months frozen"
  rejectionCriteria: "Clotted specimen, insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 35.00
  patientCharge: 95.00
  highUtilization: true
  stewardshipRecommendations: "Use PCT to guide antibiotic discontinuation (stop when PCT <0.5 or declined >80%)"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 34605781 (SSC 2021 - PCT for antibiotic stewardship)"
  - "PMID: 29382248 (PCT-guided antibiotic therapy)"
  - "PMID: 30265503 (PCT for bacterial infection diagnosis)"
  - "PMID: 28114555 (PCT meta-analysis)"

guidelineReferences:
  - "Surviving Sepsis Campaign 2021"
  - "IDSA Guidelines for Antibiotic Stewardship"
  - "ESCMID Procalcitonin Guidelines"

evidenceLevel: "B"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Blood cultures"
    - "Lactate"
    - "CBC with differential"
    - "CRP"

  reflexTesting:
    result_above_0.5: "Consider initiating antibiotics if not already started"
    result_above_2.0: "URGENT - Sepsis protocol activation, broad-spectrum antibiotics"

  followUpGuidance: |
    Initial PCT >0.5: Repeat in 24-48 hours to assess treatment response
    PCT declining (>50% drop): Appropriate antibiotic therapy, continue monitoring
    PCT rising or plateau: Consider antibiotic resistance or source control issues
    PCT <0.5 on antibiotics: Consider antibiotic de-escalation or discontinuation


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "Surviving Sepsis Campaign 2021, ESCMID PCT Guidelines"
version: "1.0"
