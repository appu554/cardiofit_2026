# ==================================================================
# BLOOD ALCOHOL LEVEL TEST DEFINITION
# ==================================================================
testId: "LAB-ETOH-001"
testName: "Blood Alcohol Level"
loincCode: "5639-0"
commonNames: "BAL, Blood Alcohol, Ethanol Level, BAC"
category: "TOXICOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture (non-alcohol swab for skin prep)"
  container: "Gray top tube (sodium fluoride/potassium oxalate)"
  volumeRequired: 3.0  # mL
  specialHandling: "Use non-alcohol skin prep (iodine or chlorhexidine); sodium fluoride preserves sample and prevents fermentation"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true  # Breathalyzer available but blood test is legal standard


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/dL"
    normal:
      min: 0.0
      max: 0.0
      interpretation: "No alcohol detected"
    critical:
      criticalLow: null
      criticalHigh: 400.0
      criticalHighInterpretation: "Life-threatening intoxication - respiratory depression, coma, death risk"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    minimal: "10-50 mg/dL: Minimal impairment - mild euphoria, relaxation"
    mild_intoxication: "50-80 mg/dL: Mild intoxication - impaired coordination, judgment"
    legal_intoxication: "80-150 mg/dL: Legal intoxication (≥80 mg/dL or 0.08%) - significantly impaired driving, judgment, coordination"
    moderate_intoxication: "150-300 mg/dL: Moderate intoxication - severe impairment, slurred speech, ataxia, confusion"
    severe_intoxication: "300-400 mg/dL: Severe intoxication - stupor, vomiting, respiratory depression"
    life_threatening: ">400 mg/dL: Life-threatening - coma, respiratory arrest, death (LD50 ~400-500 mg/dL)"

  clinicalSignificance: |
    Blood alcohol level (BAL) measures ethanol concentration in blood.
    Legal intoxication: ≥80 mg/dL (0.08 g/dL or 0.08%) in most jurisdictions.
    BAL correlates with clinical symptoms, but chronic drinkers develop tolerance.
    Peak BAL occurs 30-90 minutes after ingestion (fasting faster absorption).
    Alcohol metabolism: ~15-20 mg/dL per hour (one standard drink per hour).
    BAL >400 mg/dL is life-threatening - risk of respiratory depression, coma, death.
    Elevated osmolar gap without other toxic alcohol (methanol, ethylene glycol) suggests ethanol intoxication.

  commonCauses:
    elevated_alcohol:
      - "Ethanol ingestion (beer, wine, liquor)"
      - "Chronic alcohol use disorder"
      - "Acute alcohol intoxication"
      - "Binge drinking"
      - "Intentional overdose (suicide attempt)"
      - "Accidental pediatric ingestion"

  differentialDiagnosis:
    - "BAL 80-150 mg/dL with impairment: Legal intoxication - assess need for observation vs discharge with responsible adult"
    - "BAL 150-300 mg/dL: Moderate intoxication - monitor for vomiting/aspiration, provide IV fluids, thiamine/folate"
    - "BAL >300 mg/dL: Severe intoxication - ICU monitoring, airway protection, supportive care"
    - "High BAL without symptoms: Chronic alcohol use with tolerance - evaluate for alcohol use disorder, withdrawal risk"
    - "Low BAL with severe symptoms: Consider co-ingestion (sedatives, opioids), traumatic brain injury, or metabolic derangement"
    - "Osmolar gap >10 with low/absent ethanol: Toxic alcohol ingestion (methanol, ethylene glycol, isopropanol)"

  actionableFindings: |
    BAL 80-150 mg/dL: Legal intoxication - assess mental status, gait, ensure safe disposition with responsible adult or observation
    BAL 150-300 mg/dL: Moderate intoxication - IV fluids, thiamine 100 mg IV, folate, monitor for vomiting/aspiration, check electrolytes
    BAL >300 mg/dL: Severe intoxication - ICU admission, continuous monitoring, airway protection (consider intubation), IV fluids, dextrose/thiamine
    BAL >400 mg/dL: CRITICAL - Life-threatening intoxication, high risk of respiratory arrest, coma; ICU with mechanical ventilation readiness
    Chronic drinkers with any BAL: Assess withdrawal risk (CIWA score), provide thiamine/folate/multivitamin, consider lorazepam for withdrawal prophylaxis
    High BAL with head trauma: CT head (risk of subdural hematoma, intracranial hemorrhage in intoxicated patients)
    High BAL with hypoglycemia: IV dextrose (alcoholic ketoacidosis or poor nutrition)


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected acute alcohol intoxication"
    - "Altered mental status with alcohol odor"
    - "Medico-legal evaluation (DUI, assault, sexual assault)"
    - "Trauma patients with suspected intoxication"
    - "Pediatric accidental ingestion"
    - "Unexplained altered mental status"
    - "Elevated osmolar gap (rule out ethanol vs toxic alcohol)"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 2  # For serial monitoring of declining levels
  requiresConsent: false  # Implied consent for medical care; explicit consent for legal purposes
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Alcohol skin prep (falsely elevated - use non-alcohol swab)"
    - "Microbial contamination or fermentation (falsely elevated - use gray top tube)"
    - "Volatilization (sample evaporation - keep tube capped)"

  interferingMedications:
    - "Disulfiram (Antabuse) - does not affect BAL measurement but causes severe reaction with alcohol"
    - "Other alcohols (isopropanol, methanol, ethylene glycol) - detected by different assays"

  stability: "Stable in gray top tube (sodium fluoride) for 14 days refrigerated"
  rejectionCriteria: "Clotted specimen, insufficient volume, alcohol skin prep documented"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 15.00
  patientCharge: 50.00
  highUtilization: true
  stewardshipRecommendations: "Order only when clinically indicated or medico-legally required; breathalyzer sufficient for screening in some cases"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 27245949 (Alcohol intoxication management)"
  - "PMID: 28226226 (Alcohol withdrawal management)"
  - "PMID: 24813120 (Toxic alcohol ingestion)"
  - "PMID: 21496926 (Ethanol pharmacokinetics)"

guidelineReferences:
  - "ASAM Guidelines for Alcohol Use Disorder Treatment"
  - "SAMHSA Guidelines for Alcohol Withdrawal Management"
  - "American Academy of Clinical Toxicology Guidelines"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "BMP (electrolytes, glucose in intoxicated patients)"
    - "Osmolality (calculate osmolar gap to rule out toxic alcohols)"
    - "Urine drug screen (evaluate for co-ingestions)"
    - "Liver function tests (chronic alcohol use)"

  reflexTesting:
    result_above_150: "Moderate intoxication - check BMP (electrolytes, glucose), provide IV fluids, thiamine 100 mg IV, folate"
    result_above_300: "Severe intoxication - ICU monitoring, check BMP, osmolality, consider airway protection, IV thiamine/dextrose"
    result_above_400: "CRITICAL - Life-threatening intoxication: ICU admission, continuous monitoring, mechanical ventilation readiness, IV fluids, thiamine/dextrose"
    elevated_osmolar_gap_low_alcohol: "Check toxic alcohol screen (methanol, ethylene glycol) if osmolar gap >10 with low/absent ethanol"

  followUpGuidance: |
    Acute Alcohol Intoxication (BAL 150-300 mg/dL):
      - IV fluids (normal saline or LR)
      - Thiamine 100 mg IV (before dextrose to prevent Wernicke's encephalopathy)
      - Folate 1 mg IV/PO
      - Check BMP (hypokalemia, hypomagnesemia, hypoglycemia)
      - Assess aspiration risk (if vomiting, consider lateral positioning or airway protection)
      - Monitor for decline in mental status
      - Repeat BAL in 2-4 hours to confirm declining level (~15-20 mg/dL/hr)
    Severe Intoxication (BAL >300 mg/dL):
      - ICU admission
      - Continuous pulse oximetry and cardiac monitoring
      - Airway protection (intubation if GCS <8, severe respiratory depression, or inability to protect airway)
      - IV fluids (normal saline 100-200 mL/hr)
      - Thiamine 100 mg IV, dextrose 50 g IV (D50W), folate 1 mg IV
      - Check BMP, magnesium, phosphate (correct electrolyte abnormalities)
      - CT head if trauma or unexplained altered mental status
      - Repeat BAL every 2-4 hours until <100 mg/dL and improving clinically
    Chronic Alcohol Use Disorder:
      - Assess withdrawal risk (CIWA-Ar score)
      - Thiamine 100 mg IV daily x 3 days, then 100 mg PO daily (Wernicke's prevention)
      - Folate 1 mg PO daily, multivitamin
      - Benzodiazepines for withdrawal prophylaxis (lorazepam 1-2 mg PO/IV q6h PRN CIWA >10)
      - Nutritional support (often malnourished)
      - Substance use disorder treatment referral (inpatient or outpatient rehabilitation)
    Elevated Osmolar Gap with Low/Absent Ethanol:
      - Toxic alcohol ingestion (methanol, ethylene glycol)
      - Check toxic alcohol screen, VBG (metabolic acidosis)
      - Fomepizole (alcohol dehydrogenase inhibitor) if suspected
      - Nephrology/toxicology consultation for emergent hemodialysis


