# ==================================================================
# NT-proBNP TEST DEFINITION
# ==================================================================
testId: "LAB-NT-PROBNP-001"
testName: "NT-proBNP"
loincCode: "33762-6"
commonNames: "N-terminal pro B-type Natriuretic Peptide, NT-proBNP"
category: "CARDIAC_MARKERS"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Lavender top (EDTA) or Gold top (SST) tube"
  volumeRequired: 3.0  # mL
  specialHandling: "Stable at room temperature for 72 hours, or refrigerate at 2-8°C"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 90
  urgentTurnaroundMinutes: 45
  criticalResultMinutes: 45
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES (Age-Dependent)
# ==================================================================
referenceRanges:
  adult_under_50:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 49
    unit: "pg/mL"
    normal:
      min: 0.0
      max: 450.0
      interpretation: "Heart failure unlikely for age <50 years"
    critical:
      criticalLow: null
      criticalHigh: 450.0
      criticalInterpretation: "Heart failure likely - urgent evaluation required"

  adult_50_to_75:
    population: "adult"
    sex: "ALL"
    ageMin: 50
    ageMax: 75
    unit: "pg/mL"
    normal:
      min: 0.0
      max: 900.0
      interpretation: "Heart failure unlikely for age 50-75 years"
    critical:
      criticalLow: null
      criticalHigh: 900.0
      criticalInterpretation: "Heart failure likely - urgent evaluation required"

  adult_over_75:
    population: "adult"
    sex: "ALL"
    ageMin: 76
    ageMax: 120
    unit: "pg/mL"
    normal:
      min: 0.0
      max: 1800.0
      interpretation: "Heart failure unlikely for age >75 years"
    critical:
      criticalLow: null
      criticalHigh: 1800.0
      criticalInterpretation: "Heart failure likely - urgent evaluation required"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal_under_50: "<450 pg/mL (age <50): Heart failure unlikely (NPV >95%)"
    normal_50_to_75: "<900 pg/mL (age 50-75): Heart failure unlikely (NPV >95%)"
    normal_over_75: "<1800 pg/mL (age >75): Heart failure unlikely (NPV >95%)"
    elevated_mild: "Above age cutoff but <2x: Heart failure possible, evaluate clinically"
    elevated_moderate: "2-4x age cutoff: Heart failure likely - moderate severity"
    elevated_severe: ">4x age cutoff: Heart failure very likely - severe, urgent management"
    critical: "Above age-specific cutoff: CRITICAL - Urgent cardiology evaluation"

  clinicalSignificance: |
    NT-proBNP is the inactive N-terminal fragment of BNP, secreted by cardiac ventricles
    in response to increased wall stretch and volume overload. Superior to BNP for several reasons:
    longer half-life (120 minutes vs 20 minutes for BNP), greater stability in vitro,
    higher plasma concentrations allowing better analytical precision, and not affected by
    neprilysin inhibitors (e.g., sacubitril/valsartan). Preferred biomarker in many guidelines.
    Excellent rule-out test for HF. Age-dependent reference ranges essential for interpretation.

  commonCauses:
    - "Acute heart failure (decompensated HF)"
    - "Chronic heart failure (systolic or diastolic)"
    - "Acute coronary syndrome"
    - "Pulmonary embolism"
    - "Severe renal failure (particularly elevated)"
    - "Pulmonary hypertension"
    - "Valvular heart disease"
    - "Atrial fibrillation"
    - "Sepsis with myocardial dysfunction"
    - "Advanced age (physiologic increase)"

  differentialDiagnosis:
    - "Acute HF: NT-proBNP >age cutoff with dyspnea and clinical signs"
    - "Chronic stable HF: Elevated but lower than acute decompensation"
    - "Dyspnea not due to HF: NT-proBNP below age cutoff suggests alternative cause"
    - "Renal dysfunction: Markedly elevated, interpret with caution"

  actionableFindings: |
    NT-proBNP below age cutoff: Heart failure unlikely, consider other causes of dyspnea
    NT-proBNP 1-2x age cutoff: Gray zone - correlate with clinical picture and echocardiography
    NT-proBNP >2x age cutoff: Heart failure likely - initiate diuretic therapy and cardiology evaluation
    NT-proBNP >4x age cutoff: Severe heart failure - consider ICU admission and aggressive management
    Rising NT-proBNP trend: Worsening HF or inadequate treatment
    Falling NT-proBNP trend: Improving HF, effective therapy
    Use NT-proBNP (not BNP) in patients on sacubitril/valsartan


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute dyspnea of unclear etiology"
    - "Suspected acute heart failure"
    - "Risk stratification in known heart failure"
    - "Monitoring response to heart failure therapy"
    - "Prognosis assessment in ACS"
    - "Screening high-risk patients"
    - "Preferred test for patients on neprilysin inhibitors"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 24  # For monitoring therapy response
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Age (increases significantly with age - use age-specific cutoffs)"
    - "Sex (higher in women)"
    - "Renal function (markedly elevated in renal failure)"
    - "Obesity (lower levels, adipocytes clear peptide)"
    - "Atrial fibrillation (elevated)"

  interferingMedications:
    - "NOT affected by neprilysin inhibitors (sacubitril/valsartan) - preferred over BNP"

  stability: "72 hours at room temperature, 7 days at 2-8°C, 12 months frozen"
  rejectionCriteria: "Clotted specimen, insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 38.00
  patientCharge: 130.00
  highUtilization: true
  stewardshipRecommendations: "Preferred over BNP for patients on neprilysin inhibitors. Use age-specific cutoffs for interpretation. Serial NT-proBNP for monitoring therapy response"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 15652003 (PRIDE study - NT-proBNP in acute dyspnea)"
  - "PMID: 28942432 (ACC/AHA HF Guidelines)"
  - "PMID: 27206819 (ESC HF Guidelines)"
  - "PMID: 22387460 (NT-proBNP-guided therapy)"
  - "PMID: 24847795 (NT-proBNP age-specific cutoffs)"
  - "PMID: 31707003 (NT-proBNP in neprilysin inhibitor era)"

guidelineReferences:
  - "ACC/AHA/HFSA Heart Failure Guidelines (2022)"
  - "ESC Heart Failure Guidelines (2021)"
  - "NICE Heart Failure Guidelines (2018)"
  - "Canadian Cardiovascular Society HF Guidelines (2021)"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Echocardiogram (if not done recently)"
    - "ECG (12-lead)"
    - "Complete metabolic panel (especially creatinine for GFR)"
    - "Chest X-ray"
    - "CBC"
    - "Troponin (if ACS suspected)"

  reflexTesting:
    result_above_age_cutoff: "Order echocardiogram if not done within 6 months"
    result_above_4x_age_cutoff: "URGENT - Cardiology consult and consider ICU admission"

  followUpGuidance: |
    Age-specific interpretation is CRITICAL:
    - Age <50: HF unlikely if <450 pg/mL
    - Age 50-75: HF unlikely if <900 pg/mL
    - Age >75: HF unlikely if <1800 pg/mL

    Below age cutoff: HF unlikely, pursue alternative diagnoses
    1-2x age cutoff: Gray zone - order echocardiogram and chest X-ray
    >2x age cutoff: Initiate HF therapy (diuretics, ACE-I/ARB, beta-blocker)
    >4x age cutoff: Severe HF - urgent cardiology consult, consider ICU

    Serial monitoring: Every 24-48 hours during acute HF treatment
    Outpatient monitoring: Every 3-6 months for chronic HF management
    NT-proBNP reduction >30% indicates adequate therapy response

    Renal impairment: Interpret with caution, levels may be 2-3x higher
    Neprilysin inhibitor therapy: NT-proBNP is preferred (BNP unreliable)


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ACC/AHA HF Guidelines, ESC HF Guidelines, PRIDE Study, Institutional Lab Manual"
version: "1.0"
