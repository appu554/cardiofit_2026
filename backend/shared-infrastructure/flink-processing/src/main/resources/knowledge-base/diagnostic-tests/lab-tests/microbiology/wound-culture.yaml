# Wound Culture
# Detection and identification of bacterial pathogens in wound infections

TestID: "wound-culture"
TestName: "Wound Culture, Routine"
Category: "Microbiology"
Subcategory: "Wound Culture"

LOINCCode: "625-4"
LOINCDisplay: "Bacteria identified in Wound by Culture"

CPTCodes:
  - Code: "87070"
    Description: "Culture, bacterial; any other source except urine, blood or stool, aerobic"
  - Code: "87075"
    Description: "Culture, bacterial; any source except blood, anaerobic (if ordered)"
  - Code: "87205"
    Description: "Smear, primary source with interpretation; Gram stain"
  - Code: "87184"
    Description: "Susceptibility studies, antimicrobial agent; disk method, per plate"

SpecimenType: "Wound exudate, tissue, or aspirate"
SpecimenVolume: "1-2 mL aspirate or tissue specimen; swab (less preferred)"
SpecimenContainer: "Sterile culturette swab or sterile container with transport media"

CollectionInstructions:
  - "PREFERRED: Tissue biopsy or needle aspiration (most accurate)"
  - "ACCEPTABLE: Swab from deep wound base after debridement"
  - "Clean wound surface with sterile saline before collection"
  - "Remove surface debris, necrotic tissue, and exudate"
  - "Sample from advancing edge of wound or deep tissue"
  - "Avoid surface swabs of chronic wounds (high contamination)"
  - "For abscesses: aspirate purulent material with needle/syringe"
  - "Place swab in culturette tube immediately (prevents drying)"
  - "Label with patient ID, date/time, wound location, collection method"

SpecialHandling:
  - "Transport to lab immediately (within 2 hours preferred)"
  - "Room temperature acceptable for transport <2 hours"
  - "Refrigerate at 2-8°C if transport delayed >2 hours"
  - "For anaerobic culture: use anaerobic transport media"
  - "Process within 24 hours of collection"

ReferenceRange:
  Normal: "Skin flora only (coagulase-negative staphylococci, diphtheroids, non-pathogenic bacteria)"
  Interpretation: "No pathogenic organisms isolated - normal skin flora present"

AbnormalValues:
  - Value: "Staphylococcus aureus (moderate to heavy growth)"
    Severity: "HIGH"
    ClinicalSignificance: "Most common wound pathogen - cellulitis, abscess, surgical site infection"
  - Value: "MRSA (Methicillin-resistant S. aureus)"
    Severity: "CRITICAL"
    ClinicalSignificance: "Requires contact precautions and specific antibiotic therapy"
    AutoNotify: true
    NotificationRecipients: ["ordering_physician", "infection_control"]
  - Value: "Streptococcus pyogenes (Group A Strep)"
    Severity: "HIGH"
    ClinicalSignificance: "Rapidly spreading cellulitis, necrotizing fasciitis risk"
  - Value: "Pseudomonas aeruginosa"
    Severity: "HIGH"
    ClinicalSignificance: "Common in burn wounds, diabetic ulcers, chronic wounds"
  - Value: "Enterococcus species"
    Severity: "MODERATE"
    ClinicalSignificance: "Often polymicrobial, pressure ulcers, post-operative wounds"
  - Value: "Anaerobes (Bacteroides, Clostridium)"
    Severity: "HIGH"
    ClinicalSignificance: "Deep tissue infection, gangrene, necrotizing infection"
  - Value: "Polymicrobial (≥3 organisms)"
    Severity: "HIGH"
    ClinicalSignificance: "Chronic wounds, diabetic ulcers, pressure ulcers, fecal contamination"

TurnaroundTime:
  Preliminary: "2-4 hours (Gram stain)"
  Intermediate: "24-48 hours (preliminary organism identification)"
  Final: "48-72 hours (final identification and antibiotic susceptibility)"
  Anaerobic: "5-7 days (if anaerobic culture ordered)"

CriticalValues:
  - Value: "MRSA isolated"
    Action: "Notify ordering provider and infection control"
    Timeframe: "Within 4 hours of identification"
  - Value: "Group A Streptococcus with necrotizing infection"
    Action: "Immediate phone notification - surgical emergency"
    Timeframe: "Within 1 hour of identification"
  - Value: "Clostridium perfringens (gas gangrene)"
    Action: "Immediate phone notification - surgical emergency"
    Timeframe: "Within 1 hour of identification"

Indications:
  - "Purulent wound drainage"
  - "Cellulitis or erythema around wound"
  - "Abscess or fluctuant collection"
  - "Post-operative surgical site infection"
  - "Diabetic foot ulcer with infection signs"
  - "Pressure ulcer (decubitus) with infection"
  - "Burn wound infection"
  - "Bite wound (animal or human)"
  - "Necrotizing soft tissue infection"
  - "Failed empiric antibiotic therapy"

Contraindications:
  - "Clean, healing wounds without infection signs"
  - "Surface swabs of chronic wounds (low clinical utility)"
  - "Colonization vs infection: culture only if clinical infection present"

AutoOrderWith:
  - TestID: "cbc-with-differential"
    Reason: "Assess systemic infection (leukocytosis)"
  - TestID: "crp-serum"
    Reason: "Inflammatory marker for infection severity"
  - TestID: "blood-culture-aerobic"
    Reason: "If systemic signs of infection (fever, tachycardia, hypotension)"
  - TestID: "wound-gram-stain"
    Reason: "Rapid preliminary organism morphology"

InterpretationGuidance:
  - Context: "Specimen source and quality"
    Guidance: "Tissue biopsy > aspirate > deep swab > surface swab (in order of accuracy)"
  - Context: "Quantity of growth"
    Guidance: "Heavy/predominant growth more significant than light/mixed growth"
  - Context: "Polymicrobial growth"
    Guidance: "Common in chronic wounds, diabetic ulcers, pressure ulcers, fecal contamination"
  - Context: "Skin flora"
    Guidance: "Coagulase-negative staph, diphtheroids may be colonization, not infection"
  - Context: "Common wound pathogens"
    Guidance: "S. aureus, Streptococcus, Pseudomonas, Enterococcus, E. coli, Proteus"

ClinicalNotes:
  - "Clinical diagnosis of infection: purulence, erythema, warmth, induration, pain"
  - "Culture results must be interpreted with clinical findings"
  - "Chronic wounds often colonized - culture only if infection present"
  - "Surface swabs of chronic wounds have poor specificity (high contamination)"
  - "Tissue biopsy is gold standard for chronic wound infection diagnosis"
  - "Diabetic foot infections often polymicrobial (aerobes + anaerobes)"
  - "Bite wounds: culture for Pasteurella (animal), Eikenella (human)"
  - "Necrotizing fasciitis: Group A Strep OR polymicrobial with anaerobes"
  - "Pressure ulcers: often polymicrobial with enteric organisms and anaerobes"

QualityMetrics:
  PreferredSpecimenType: "Tissue biopsy or aspirate (>80% of specimens)"
  TimeToGramStain: "<4 hours from receipt"
  PreAnalyticRejectionCriteria:
    - "Dry swab (not in transport media)"
    - "Specimen >24 hours old without refrigeration"
    - "Unlabeled specimen"
    - "Surface swab of chronic wound (if better specimen available)"

RegionalConsiderations:
  - Region: "All"
    Note: "MRSA prevalence varies by region - consult local antibiograms"
  - Region: "Global"
    Note: "Increasing prevalence of multidrug-resistant organisms"

RegulatoryCodes:
  CLIA_Complexity: "High"
  RequiresApproval: false

EvidenceLevel: "A"
EvidenceReferences:
  - "IDSA Practice Guidelines for the Diagnosis and Management of Skin and Soft Tissue Infections (2014)"
  - "Clinical Microbiology Procedures Handbook, ASM Press (4th Edition)"
  - "Infectious Diseases Society of America Guidelines for Diabetic Foot Infections (2012)"

CostConsiderations:
  EstimatedCost_USD: "50-100 (culture), additional $50-100 if susceptibility testing performed"
  ReimbursementNotes: "Covered by most insurance for clinical wound infections"

PatientInstructions:
  - "Keep wound clean and dry before specimen collection"
  - "Do not apply topical antibiotics before collection"
  - "Notify provider if increasing pain, redness, swelling, or drainage"

ClinicalDecisionSupport:
  - Condition: "Diabetic foot ulcer"
    Recommendation: "Consider anaerobic culture; often polymicrobial infection"
  - Condition: "Necrotizing fasciitis suspected"
    Recommendation: "URGENT: Immediate surgical consult - tissue biopsy with aerobic and anaerobic culture"
  - Condition: "Post-operative wound"
    Recommendation: "S. aureus most common - check for MRSA"

LastUpdated: "2025-01-15"
Version: "1.0"
