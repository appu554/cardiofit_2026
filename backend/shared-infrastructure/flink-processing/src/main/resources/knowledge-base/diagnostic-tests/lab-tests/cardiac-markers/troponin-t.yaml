# ==================================================================
# TROPONIN T TEST DEFINITION
# ==================================================================
testId: "LAB-TROPONIN-T-001"
testName: "Troponin T"
loincCode: "6598-7"
commonNames: "cTnT, Cardiac Troponin T, High-Sensitivity Troponin T"
category: "CARDIAC_MARKERS"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 3.0  # mL
  specialHandling: "No special handling required, stable at room temperature for 24 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "ng/mL"
    normal:
      min: 0.0
      max: 0.01
      interpretation: "No myocardial injury detected"
    critical:
      criticalLow: null
      criticalHigh: 0.01
      criticalInterpretation: "Elevated troponin - acute myocardial injury or infarction"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "<0.01 ng/mL: No acute myocardial injury"
    elevated_mild: "0.01-0.05 ng/mL: Mild elevation - myocardial injury, consider serial testing"
    elevated_moderate: "0.05-0.5 ng/mL: Moderate elevation - likely acute coronary syndrome"
    elevated_severe: ">0.5 ng/mL: Severe elevation - acute myocardial infarction"
    critical: ">0.01 ng/mL: CRITICAL VALUE - Immediate cardiology evaluation"

  clinicalSignificance: |
    Troponin T is a gold standard biomarker for myocardial injury and infarction.
    High-sensitivity troponin T has excellent diagnostic accuracy for acute MI.
    Elevation indicates cardiac myocyte damage. Serial measurements (0, 3, 6 hours)
    improve sensitivity for acute MI. Rise and fall pattern distinguishes acute from
    chronic elevation. Troponin T may remain elevated longer than Troponin I.

  commonCauses:
    - "Acute myocardial infarction (STEMI/NSTEMI)"
    - "Myocarditis"
    - "Takotsubo cardiomyopathy"
    - "Severe heart failure"
    - "Pulmonary embolism"
    - "Renal failure (chronic elevation)"
    - "Septic shock"
    - "Cardiac contusion/trauma"

  differentialDiagnosis:
    - "Type 1 MI: Plaque rupture with thrombosis"
    - "Type 2 MI: Supply-demand mismatch (tachycardia, hypotension, anemia)"
    - "Non-ACS causes: Myocarditis, PE, sepsis, renal failure"

  actionableFindings: |
    Troponin T >0.01 ng/mL with chest pain: Activate STEMI protocol if ECG positive
    Troponin T rising pattern: Acute MI - urgent cardiology consult
    Troponin T elevated but stable: Consider non-ACS causes
    Troponin T normal but symptoms <3 hours: Repeat at 3 hours


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Chest pain suspicious for acute coronary syndrome"
    - "ECG changes suggesting ischemia"
    - "Shortness of breath with cardiac risk factors"
    - "Post-PCI or CABG monitoring"
    - "Suspected myocarditis"
    - "Heart failure exacerbation"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 3  # For serial troponin protocol
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (may falsely elevate)"
    - "Fibrin clots"
    - "Heterophile antibodies"
    - "Skeletal muscle disease (rare cross-reactivity)"

  interferingMedications:
    - "None known"

  stability: "7 days at 2-8°C, 6 months frozen"
  rejectionCriteria: "Clotted specimen, insufficient volume, hemolysis"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 28.00
  patientCharge: 90.00
  highUtilization: true
  stewardshipRecommendations: "Use serial troponin (0, 3, 6 hours) rather than single measurement for ACS evaluation"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 30681346 (Fourth Universal Definition of MI)"
  - "PMID: 25748004 (High-sensitivity troponin guidelines)"
  - "PMID: 28549995 (ESC Guidelines for NSTEMI)"
  - "PMID: 29222079 (ACC/AHA Chest Pain Guidelines)"
  - "PMID: 31590612 (High-sensitivity cardiac troponin T diagnostic accuracy)"

guidelineReferences:
  - "Fourth Universal Definition of Myocardial Infarction (2018)"
  - "ESC Guidelines for NSTEMI (2020)"
  - "ACC/AHA Chest Pain Guidelines (2021)"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "ECG (12-lead)"
    - "CK-MB"
    - "Complete metabolic panel"
    - "CBC"

  reflexTesting:
    result_above_0.01: "Repeat troponin in 3 hours for serial measurement"
    result_above_0.5: "URGENT - Cardiology consult and consider cardiac catheterization"

  followUpGuidance: |
    Serial troponin protocol: 0, 3, 6 hours
    Rising pattern (>20% change): Acute MI
    Falling pattern: Possible recent MI or non-cardiac cause
    Persistently elevated: Consider chronic causes (renal failure, heart failure)


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "Fourth Universal Definition of MI, Institutional Lab Manual"
version: "1.0"
