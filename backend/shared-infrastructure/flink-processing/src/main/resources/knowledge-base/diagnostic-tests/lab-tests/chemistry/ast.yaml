# ==================================================================
# AST (ASPARTATE AMINOTRANSFERASE) TEST DEFINITION
# ==================================================================
testId: "LAB-AST-001"
testName: "AST (Aspartate Aminotransferase)"
loincCode: "1920-8"
commonNames: "AST, SGOT, Aspartate Transaminase"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 1.0  # mL
  specialHandling: "Avoid hemolysis, which falsely elevates AST"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "U/L"
    normal:
      min: 10
      max: 40
      interpretation: "Normal hepatocellular integrity"
    critical:
      criticalLow: null
      criticalHigh: 1000
      criticalInterpretation: "Severe hepatocellular injury - acute hepatitis, ischemic hepatitis, drug-induced liver injury"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "10-40 U/L: Normal liver enzyme activity"
    elevated_mild: "41-100 U/L: Mild elevation - chronic liver disease, fatty liver, medications"
    elevated_moderate: "101-500 U/L: Moderate elevation - alcoholic hepatitis, chronic hepatitis"
    elevated_severe: "501-1000 U/L: Severe elevation - acute viral hepatitis, drug toxicity"
    critical: "≥1000 U/L: CRITICAL - Acute hepatocellular necrosis (acetaminophen toxicity, ischemic hepatitis, acute viral hepatitis)"

  clinicalSignificance: |
    AST is a liver enzyme found in hepatocytes, cardiac muscle, skeletal muscle, kidney, and red blood cells.
    AST is less liver-specific than ALT. AST/ALT ratio helps differentiate causes:
    - AST/ALT >2: Suggests alcoholic liver disease
    - AST/ALT <1: Suggests non-alcoholic fatty liver disease or viral hepatitis
    Elevated AST with normal ALT may indicate cardiac or muscle source.

  commonCauses:
    - "Acute viral hepatitis (HAV, HBV, HCV, EBV, CMV)"
    - "Drug-induced liver injury (acetaminophen, statins, antibiotics)"
    - "Alcoholic hepatitis (AST/ALT ratio >2)"
    - "Non-alcoholic fatty liver disease"
    - "Ischemic hepatitis (shock liver)"
    - "Autoimmune hepatitis"
    - "Hemochromatosis"
    - "Wilson disease"
    - "Myocardial infarction (less specific)"
    - "Rhabdomyolysis"

  actionableFindings: |
    AST >1000: Immediate evaluation for acute liver failure - check acetaminophen level, viral serologies, right upper quadrant ultrasound
    AST/ALT >2 with alcohol history: Alcoholic hepatitis - consider corticosteroids if severe
    AST 100-500 with positive viral serologies: Acute viral hepatitis - monitor for fulminant hepatic failure
    Isolated AST elevation: Check troponin (MI), CK (muscle injury), hemolysis


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Comprehensive metabolic panel"
    - "Hepatic function panel"
    - "Suspected acute hepatitis"
    - "Drug-induced liver injury monitoring"
    - "Chronic liver disease surveillance"
    - "Alcohol use disorder screening"

  contraindications: []
  minimumIntervalHours: 24
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (falsely elevated due to RBC AST)"
    - "Strenuous exercise (muscle source)"
    - "Intramuscular injections"
    - "Macroenzymes (rare)"

  interferingMedications:
    - "Acetaminophen overdose (markedly elevated)"
    - "Statins (mild elevation)"
    - "Antibiotics (isoniazid, nitrofurantoin)"
    - "Anti-epileptics (phenytoin, valproate)"
    - "NSAIDs"

  stability: "7 days refrigerated, stable at room temperature for 24 hours"
  rejectionCriteria: "Clotted specimen, insufficient volume, grossly hemolyzed"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true
  autoOrderWith: ["ALT", "Alkaline Phosphatase", "Bilirubin Total", "Albumin", "PT/INR if severe elevation"]

  reflexTesting:
    result_above_1000: "Urgent hepatology consultation, check acetaminophen level, viral hepatitis panel, right upper quadrant ultrasound"
    result_above_500: "Check ALT, alkaline phosphatase, bilirubin, PT/INR, viral hepatitis serologies"
    result_above_100: "Repeat in 1-2 weeks with comprehensive hepatic function panel"

  followUpGuidance: |
    AST >1000: Daily monitoring until trending down, evaluate for acute liver failure criteria
    AST 100-1000: Repeat in 3-7 days with full hepatic panel
    AST/ALT >2: Screen for alcohol use disorder, consider alcohol-related liver disease


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "Clinical Laboratory Standards, AASLD Guidelines"
version: "1.0"
evidenceLevel: "A"
