# ==================================================================
# ALKALINE PHOSPHATASE TEST DEFINITION
# ==================================================================
testId: "LAB-ALP-001"
testName: "Alkaline Phosphatase"
loincCode: "6768-6"
commonNames: "ALP, Alk Phos, Alkaline Phosphatase"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 1.0  # mL
  specialHandling: "Stable at room temperature, avoid prolonged storage"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "U/L"
    normal:
      min: 44
      max: 147
      interpretation: "Normal biliary function and bone metabolism"
    critical:
      criticalLow: null
      criticalHigh: 500
      criticalInterpretation: "Severe cholestasis or infiltrative liver disease - bile duct obstruction, primary biliary cholangitis, malignancy"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "44-147 U/L: Normal biliary and bone enzyme activity"
    elevated_mild: "148-300 U/L: Mild elevation - early cholestasis, bone disease, pregnancy, growth"
    elevated_moderate: "301-500 U/L: Moderate elevation - cholestatic liver disease, Paget disease"
    elevated_severe: "≥500 U/L: Severe elevation - bile duct obstruction, primary biliary cholangitis, infiltrative disease"
    critical: "≥500 U/L: CRITICAL - Complete or near-complete bile duct obstruction, severe cholestatic injury"

  clinicalSignificance: |
    Alkaline phosphatase is found in liver (bile duct epithelium), bone, intestine, placenta, and kidney.
    Elevated ALP with normal GGT suggests bone source (Paget disease, fracture, bone metastases).
    Elevated ALP with elevated GGT suggests hepatobiliary source (cholestasis).
    Cholestatic pattern: ALP > 3x ULN with ALT/AST < 5x ULN.
    Hepatocellular pattern: ALT/AST > 5x ULN with ALP < 2x ULN.

  commonCauses:
    - "Hepatobiliary causes: Bile duct obstruction (choledocholithiasis, pancreatic cancer, cholangiocarcinoma), primary biliary cholangitis, primary sclerosing cholangitis, drug-induced cholestasis"
    - "Bone causes: Paget disease, bone metastases, healing fractures, hyperparathyroidism, osteomalacia, rickets"
    - "Physiologic: Pregnancy (third trimester), adolescent growth spurt"
    - "Other: Chronic kidney disease (bone disease), congestive heart failure, malignancy, hyperthyroidism"

  actionableFindings: |
    ALP ≥500: Urgent right upper quadrant ultrasound or MRCP to evaluate for bile duct obstruction, check GGT and bilirubin
    ALP >300 with elevated GGT: Cholestatic liver disease - evaluate for primary biliary cholangitis (AMA), primary sclerosing cholangitis (p-ANCA, MRCP)
    ALP >300 with normal GGT: Bone disease - check calcium, phosphorus, PTH, consider bone scan or imaging
    Isolated ALP elevation: Fractionate ALP isoenzymes (liver vs bone) or check GGT to differentiate source


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Comprehensive metabolic panel"
    - "Hepatic function panel"
    - "Suspected cholestatic liver disease"
    - "Bile duct obstruction"
    - "Bone disease evaluation"
    - "Unexplained jaundice"
    - "Right upper quadrant pain"

  contraindications: []
  minimumIntervalHours: 24
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Pregnancy (placental ALP, especially third trimester)"
    - "Blood type O or B (intestinal ALP after fatty meal)"
    - "Recent bone fracture or surgery"
    - "Age (higher in children and adolescents due to bone growth)"

  interferingMedications:
    - "Hepatotoxic drugs (phenytoin, estrogens, anabolic steroids)"
    - "Cholestatic drugs (chlorpromazine, erythromycin)"
    - "Bone-active medications (teriparatide - may increase ALP)"

  stability: "Stable for 3 days at room temperature, 7 days refrigerated"
  rejectionCriteria: "Clotted specimen, insufficient volume"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true
  autoOrderWith: ["GGT (to confirm hepatobiliary source)", "Bilirubin Total", "ALT", "AST", "Albumin"]

  reflexTesting:
    result_above_500: "URGENT - Right upper quadrant ultrasound or MRCP, check GGT, total bilirubin, direct bilirubin, PT/INR, hepatology consultation"
    result_above_300: "Check GGT to confirm hepatobiliary source; if elevated GGT: evaluate for cholestatic liver disease (AMA, right upper quadrant ultrasound); if normal GGT: evaluate for bone disease (calcium, phosphorus, PTH, vitamin D)"
    result_above_147: "Repeat in 2-4 weeks with GGT; if persistent, evaluate for chronic cholestatic disease or bone disease"

  followUpGuidance: |
    ALP >500 with obstructive imaging: ERCP or surgical consultation for bile duct decompression
    ALP >300 with elevated GGT and AMA positive: Primary biliary cholangitis - start ursodeoxycholic acid
    ALP >300 with normal GGT: Bone scan or imaging to evaluate for Paget disease or bone metastases
    Persistent mild ALP elevation (147-300): Serial monitoring every 3-6 months


