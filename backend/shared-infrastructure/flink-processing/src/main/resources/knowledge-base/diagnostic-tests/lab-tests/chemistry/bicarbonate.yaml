# ==================================================================
# BICARBONATE TEST DEFINITION
# ==================================================================
testId: "LAB-BICARBONATE-001"
testName: "Bicarbonate"
loincCode: "1963-8"
commonNames: "HCO3, CO2, Total CO2"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 2.0  # mL
  specialHandling: "Minimize air exposure, analyze promptly"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 45
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mmol/L"
    normal:
      min: 22.0
      max: 29.0
      interpretation: "Normal acid-base balance"
    critical:
      criticalLow: 15.0
      criticalHigh: 40.0
      criticalInterpretation: "Severe acid-base disturbance"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    low: "<22 mmol/L: Metabolic acidosis or respiratory alkalosis compensation"
    normal: "22-29 mmol/L: Normal acid-base status"
    high: ">29 mmol/L: Metabolic alkalosis or respiratory acidosis compensation"
    critical_low: "<15 mmol/L: Severe metabolic acidosis - DKA, lactic acidosis, renal failure"
    critical_high: ">40 mmol/L: Severe metabolic alkalosis - vomiting, diuretics"

  clinicalSignificance: |
    Bicarbonate is the major buffer in blood, regulating pH. Low HCO3 indicates metabolic acidosis
    or compensation for respiratory alkalosis. High HCO3 indicates metabolic alkalosis or
    compensation for respiratory acidosis.

  commonCauses:
    - "Low HCO3: DKA, lactic acidosis, renal failure, diarrhea, sepsis"
    - "High HCO3: Vomiting, NG suction, diuretics, COPD with CO2 retention"

  actionableFindings: |
    HCO3 <15: Check anion gap, lactate, glucose - consider DKA or lactic acidosis
    HCO3 >40: Evaluate for contraction alkalosis, excessive diuretics


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acid-base disturbance"
    - "Comprehensive metabolic panel"
    - "DKA or lactic acidosis evaluation"

  contraindications: []
  minimumIntervalHours: 24
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true
  autoOrderWith: ["Anion gap calculation", "ABG if severe disturbance"]


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "Clinical Laboratory Standards"
version: "1.0"
evidenceLevel: "A"
