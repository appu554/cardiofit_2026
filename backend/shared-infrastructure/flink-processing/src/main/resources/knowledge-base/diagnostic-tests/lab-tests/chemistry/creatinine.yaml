# ==================================================================
# CREATININE TEST DEFINITION
# ==================================================================
testId: "LAB-CREATININE-001"
testName: "Serum Creatinine"
loincCode: "2160-0"
commonNames: "Creatinine, Serum Creat, SCr"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Red top, gold top (SST), or green top (lithium heparin)"
  volumeRequired: 1.0  # mL
  specialHandling: "No special handling required"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 45
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult_male:
    population: "adult"
    sex: "M"
    ageMin: 18
    ageMax: 120
    unit: "mg/dL"
    normal:
      min: 0.7
      max: 1.3
      interpretation: "Normal renal function (eGFR >60 mL/min/1.73m²)"
    critical:
      criticalLow: null
      criticalHigh: 5.0
      criticalInterpretation: "Severe renal failure - consider dialysis evaluation"

  adult_female:
    population: "adult"
    sex: "F"
    ageMin: 18
    ageMax: 120
    unit: "mg/dL"
    normal:
      min: 0.6
      max: 1.1
      interpretation: "Normal renal function (eGFR >60 mL/min/1.73m²)"
    critical:
      criticalLow: null
      criticalHigh: 5.0
      criticalInterpretation: "Severe renal failure - consider dialysis evaluation"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "mg/dL"
    normal:
      min: 0.3
      max: 1.0
      interpretation: "Normal (varies by age and muscle mass)"
    critical:
      criticalHigh: 3.0
      criticalInterpretation: "Severe renal impairment"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "0.6-1.3 mg/dL: Normal kidney function (eGFR >60)"
    mild_elevation: "1.4-1.9 mg/dL: Mild renal impairment (eGFR 30-60) - CKD Stage 2-3"
    moderate_elevation: "2.0-4.9 mg/dL: Moderate-severe renal impairment (eGFR <30) - CKD Stage 3B-4"
    critical: "≥5.0 mg/dL: Severe renal failure (eGFR <15) - CKD Stage 5, consider dialysis"

  clinicalSignificance: |
    Creatinine is a waste product of muscle metabolism filtered by kidneys.
    Elevated levels indicate decreased glomerular filtration rate (GFR) and
    impaired kidney function. Used to calculate eGFR for staging chronic kidney disease.
    Note: Creatinine lags behind acute changes in GFR by 24-48 hours.

  commonCauses:
    - "Acute kidney injury (AKI): Sepsis, nephrotoxins, contrast, hypovolemia, obstruction"
    - "Chronic kidney disease (CKD): Diabetes, hypertension, glomerulonephritis"
    - "Prerenal: Dehydration, heart failure, shock"
    - "Intrinsic renal: ATN, interstitial nephritis, glomerulonephritis"
    - "Postrenal: Obstruction (BPH, stones, tumor)"
    - "Increased muscle mass (falsely elevated)"
    - "Rhabdomyolysis"

  differentialDiagnosis:
    - "AKI: Prerenal azotemia, ATN, acute interstitial nephritis, contrast nephropathy"
    - "CKD: Diabetic nephropathy, hypertensive nephrosclerosis, PCKD"

  actionableFindings: |
    Acute rise >0.3 mg/dL in 48h or >50% in 7 days: Acute kidney injury (KDIGO Stage 1+)
    Creat 1.5-2.0: Review medications, hold nephrotoxins, ensure hydration
    Creat 2.0-3.0: Nephrology consult, adjust medication dosing
    Creat >3.0 or doubling from baseline: Urgent nephrology consult
    Creat >5.0: Evaluate for dialysis indications (AEIOU criteria)


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Routine metabolic panel"
    - "Suspected acute kidney injury"
    - "Chronic kidney disease monitoring"
    - "Before contrast administration"
    - "Medication dosing (renally cleared drugs)"
    - "Pre-operative evaluation"

  contraindications: []

  minimumIntervalHours: 12  # Daily monitoring adequate for most cases
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Increased muscle mass (bodybuilders - falsely elevated)"
    - "Decreased muscle mass (elderly, malnutrition - falsely low)"
    - "Recent meat ingestion (slight elevation)"
    - "Hemolysis (slight interference with Jaffe method)"

  interferingMedications:
    - "Cimetidine (blocks tubular secretion, increases creatinine)"
    - "Trimethoprim (blocks tubular secretion, increases creatinine)"
    - "Cephalosporins (Jaffe method interference)"
    - "Fenofibrate (increases creatinine)"

  stability: "Stable 7 days refrigerated, 24 hours at room temperature"
  rejectionCriteria: "Grossly hemolyzed (Jaffe method), insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 4.00
  patientCharge: 18.00
  highUtilization: true
  stewardshipRecommendations: "Part of basic metabolic panel - avoid ordering separately. Use eGFR calculation instead of ordering GFR separately"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 22890468 (KDIGO AKI Guidelines 2012)"
  - "PMID: 23890468 (KDIGO CKD Guidelines 2012)"
  - "PMID: 28712169 (Contrast-induced AKI prevention)"
  - "PMID: 26597926 (Creatinine in drug dosing)"


guidelineReferences:
  - "KDIGO Clinical Practice Guidelines for Acute Kidney Injury 2012"
  - "KDIGO Clinical Practice Guidelines for CKD 2012"
  - "NKF-KDOQI Guidelines"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "BUN (calculate BUN/Creatinine ratio)"
    - "Electrolytes (potassium critical in renal failure)"
    - "Urinalysis"
    - "eGFR calculation (auto-calculated from creatinine)"

  reflexTesting:
    result_above_1.5: "Calculate eGFR, review medications for renal dosing adjustments"
    result_above_2.0: "Order urinalysis, consider nephrology consult"
    result_above_3.0: "URGENT - Nephrology consult, check potassium, evaluate for dialysis"
    acute_rise_0.3: "AKI Stage 1 - Review meds, ensure hydration, avoid nephrotoxins"

  followUpGuidance: |
    New elevated creatinine: Repeat in 24-48h to assess trend, review baseline
    AKI: Daily monitoring until resolution or stabilization
    CKD: Monitor per stage - Stage 3A+ at least every 3-6 months
    Pre-contrast: If elevated, ensure adequate hydration, consider alternative imaging
    Medication dosing: Adjust renally-cleared drugs per eGFR


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "KDIGO Guidelines 2012, UpToDate, Mayo Clinic Laboratory Reference"
version: "1.0"
