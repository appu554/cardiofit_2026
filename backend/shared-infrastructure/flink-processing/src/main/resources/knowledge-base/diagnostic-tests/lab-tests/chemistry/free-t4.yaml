# ==================================================================
# FREE T4 (FREE THYROXINE) TEST DEFINITION
# ==================================================================
testId: "LAB-FT4-001"
testName: "Free T4"
loincCode: "3024-7"
commonNames: "Free T4, Free Thyroxine, FT4"
category: "ENDOCRINE"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 1.0  # mL
  specialHandling: "No special handling required"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 120
  urgentTurnaroundMinutes: 60
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "ng/dL"
    normal:
      min: 0.8
      max: 1.8
      interpretation: "Normal thyroid function"
    critical:
      criticalLow: 0.4
      criticalLowInterpretation: "Severe hypothyroidism - myxedema coma risk"
      criticalHigh: 4.0
      criticalHighInterpretation: "Severe hyperthyroidism - thyroid storm risk"

  pregnancy_first_trimester:
    population: "adult"
    sex: "FEMALE"
    ageMin: 18
    ageMax: 50
    unit: "ng/dL"
    normal:
      min: 0.8
      max: 2.0
      interpretation: "Normal for first trimester (physiologically elevated)"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    low: "<0.8 ng/dL: Hypothyroidism - low thyroid hormone production"
    normal: "0.8-1.8 ng/dL: Normal thyroid function (euthyroid)"
    high: ">1.8 ng/dL: Hyperthyroidism - excess thyroid hormone"
    severe_low: "<0.4 ng/dL: Severe hypothyroidism - myxedema coma risk"
    severe_high: ">4.0 ng/dL: Severe hyperthyroidism - thyroid storm risk"

  clinicalSignificance: |
    Free T4 measures the unbound (biologically active) thyroxine hormone.
    Free T4 is preferred over total T4 as it is not affected by binding protein changes (pregnancy, estrogen, liver disease).
    Free T4 is ordered to confirm thyroid dysfunction when TSH is abnormal.
    Low TSH + High Free T4 = Primary hyperthyroidism (Graves, toxic nodule).
    High TSH + Low Free T4 = Primary hypothyroidism (Hashimoto's, post-ablation).
    Low TSH + Low Free T4 = Central hypothyroidism (pituitary/hypothalamic disease).
    Normal TSH + Abnormal Free T4 = Rare (central disorders, assay interference).

  commonCauses:
    low_free_t4:
      - "Hashimoto's thyroiditis (autoimmune hypothyroidism)"
      - "Post-thyroidectomy or radioiodine ablation"
      - "Severe iodine deficiency"
      - "Medications (lithium, amiodarone, interferon)"
      - "Central hypothyroidism (pituitary/hypothalamic disease)"
      - "Sick euthyroid syndrome (critical illness)"
      - "Congenital hypothyroidism"

    high_free_t4:
      - "Graves disease (autoimmune hyperthyroidism)"
      - "Toxic multinodular goiter or toxic adenoma"
      - "Thyroiditis (subacute, postpartum, painless) - transient phase"
      - "Excess exogenous thyroid hormone (overreplacement, factitious)"
      - "Iodine-induced hyperthyroidism (Jod-Basedow phenomenon)"
      - "TSH-secreting pituitary adenoma (rare)"
      - "Thyroid hormone resistance syndrome (rare)"

  differentialDiagnosis:
    - "High TSH + Low Free T4: Primary hypothyroidism (thyroid gland failure)"
    - "High TSH + Normal Free T4: Subclinical hypothyroidism"
    - "Low TSH + High Free T4: Primary hyperthyroidism (Graves, toxic nodule)"
    - "Low TSH + Normal Free T4: Subclinical hyperthyroidism"
    - "Low TSH + Low Free T4: Central hypothyroidism (pituitary/hypothalamus) - check other pituitary hormones"
    - "Normal TSH + Low Free T4: Sick euthyroid syndrome (critical illness), recent TSH suppression recovery"
    - "High TSH + High Free T4: Thyroid hormone resistance, TSH-secreting adenoma (very rare)"

  actionableFindings: |
    Low Free T4 + High TSH: Overt hypothyroidism - start levothyroxine 1.6 mcg/kg/day
    Low Free T4 + Low/Normal TSH: Central hypothyroidism - evaluate pituitary function (ACTH, cortisol, IGF-1, LH/FSH, prolactin), MRI pituitary
    High Free T4 + Low TSH: Overt hyperthyroidism - check TSH receptor antibodies (Graves), thyroid ultrasound, radioiodine uptake
    High Free T4 + Normal/High TSH: Rare - check for thyroid hormone resistance, TSH-secreting adenoma, assay interference
    Free T4 <0.4 ng/dL: Severe hypothyroidism - evaluate for myxedema coma (hypothermia, altered mental status, hypotension)
    Free T4 >4.0 ng/dL: Severe hyperthyroidism - evaluate for thyroid storm (fever, tachycardia, altered mental status)


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Abnormal TSH requiring confirmation of thyroid dysfunction"
    - "Suspected central hypothyroidism (pituitary/hypothalamic disease)"
    - "Monitor levothyroxine therapy dose adjustment"
    - "Pregnancy thyroid function monitoring"
    - "Suspected thyroid hormone resistance"
    - "Evaluate thyrotoxicosis severity"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 1008  # 6 weeks (thyroid hormone equilibration time)
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests:
    - "TSH (free T4 usually ordered after abnormal TSH)"


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Biotin supplementation (falsely elevated free T4 in some assays - stop 2 days before testing)"
    - "Heterophile antibodies (rare assay interference)"
    - "Severe illness (sick euthyroid syndrome - transiently low T4)"
    - "Heparin therapy (may affect some assays)"
    - "Pregnancy (physiologically higher free T4 in first trimester)"

  interferingMedications:
    - "Biotin >5 mg/day (falsely high free T4 in immunoassays)"
    - "Amiodarone (inhibits T4 to T3 conversion)"
    - "Glucocorticoids (may suppress T4)"
    - "Phenytoin, carbamazepine (increase T4 clearance)"
    - "Furosemide (high dose may displace T4 from binding proteins)"

  stability: "Stable at 2-8°C for 7 days, stable frozen for months"
  rejectionCriteria: "Insufficient volume, grossly hemolyzed specimen"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 22.00
  patientCharge: 65.00
  highUtilization: true
  stewardshipRecommendations: "Order free T4 only when TSH is abnormal or central hypothyroidism suspected; TSH alone sufficient for screening"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 23315954 (ATA guidelines for hypothyroidism)"
  - "PMID: 28129079 (Thyroid function testing in pregnancy)"
  - "PMID: 26462967 (Interpretation of thyroid function tests)"
  - "PMID: 30924398 (Central hypothyroidism diagnosis)"

guidelineReferences:
  - "ATA Guidelines for Hypothyroidism Management"
  - "ATA Guidelines for Hyperthyroidism Management"
  - "AACE Guidelines for Thyroid Disease in Pregnancy"
  - "Endocrine Society Guidelines for Central Hypothyroidism"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "TSH (always order together for comprehensive thyroid assessment)"
    - "Free T3 (if hyperthyroidism suspected with high T4)"
    - "TPO antibodies (if hypothyroidism confirmed)"

  reflexTesting:
    high_t4_low_tsh: "Hyperthyroidism confirmed - check TSH receptor antibodies for Graves disease, thyroid ultrasound, radioiodine uptake scan"
    low_t4_high_tsh: "Hypothyroidism confirmed - start levothyroxine replacement, check TPO antibodies"
    low_t4_low_tsh: "URGENT - Central hypothyroidism: Check cortisol (ACTH deficiency risk), prolactin, IGF-1, LH/FSH, order pituitary MRI"
    high_t4_normal_tsh: "Rare pattern - check for thyroid hormone resistance, TSH-secreting adenoma, or assay interference"

  followUpGuidance: |
    Hyperthyroidism (High Free T4 + Low TSH):
      - Start antithyroid drugs (methimazole) and beta-blockers for symptom control
      - Check TSH receptor antibodies (positive = Graves disease)
      - Thyroid ultrasound and radioiodine uptake scan for etiology
      - Endocrinology referral for definitive treatment (radioiodine vs surgery)
    Hypothyroidism (Low Free T4 + High TSH):
      - Start levothyroxine 1.6 mcg/kg/day (lower if elderly or cardiac disease)
      - Recheck TSH and free T4 in 6-8 weeks after dose change
      - Goal TSH 0.4-4.0 mIU/L, free T4 mid-normal range
      - Once stable, monitor TSH annually
    Central Hypothyroidism (Low Free T4 + Low/Normal TSH):
      - URGENT endocrinology referral
      - Check ACTH stimulation test (rule out adrenal insufficiency before treating thyroid)
      - Check other pituitary hormones (prolactin, IGF-1, LH/FSH)
      - Pituitary MRI to evaluate for adenoma, mass, or infiltrative disease
      - Start levothyroxine AFTER confirming normal cortisol (avoid precipitating adrenal crisis)


