# ==================================================================
# SODIUM TEST DEFINITION
# ==================================================================
testId: "LAB-SODIUM-001"
testName: "Serum Sodium"
loincCode: "2951-2"
commonNames: "Na, Sodium, Serum Na"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Red top, gold top (SST), or green top (lithium heparin)"
  volumeRequired: 1.0  # mL
  specialHandling: "Avoid hemolysis"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 45
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mEq/L"
    normal:
      min: 135
      max: 145
      interpretation: "Normal sodium balance"
    critical:
      criticalLow: 120
      criticalHigh: 160
      criticalInterpretation: "Severe dysnatremia - risk of seizures (low) or osmotic demyelination (rapid correction)"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "mEq/L"
    normal:
      min: 135
      max: 145
      interpretation: "Normal"
    critical:
      criticalLow: 125
      criticalHigh: 155
      criticalInterpretation: "Critical dysnatremia"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "135-145 mEq/L: Normal sodium balance"
    hyponatremia_mild: "130-134 mEq/L: Mild hyponatremia - often asymptomatic"
    hyponatremia_moderate: "125-129 mEq/L: Moderate hyponatremia - may have symptoms"
    hyponatremia_severe: "<125 mEq/L: Severe hyponatremia - risk of seizures, cerebral edema"
    hypernatremia_mild: "146-150 mEq/L: Mild hypernatremia"
    hypernatremia_moderate: "151-160 mEq/L: Moderate hypernatremia"
    hypernatremia_severe: ">160 mEq/L: Severe hypernatremia - altered mental status, seizures"

  clinicalSignificance: |
    Sodium is the primary extracellular cation determining plasma osmolality.
    Hyponatremia can cause cerebral edema and seizures; hypernatremia causes
    cellular dehydration. Correction rate is critical - too rapid correction
    of chronic hyponatremia risks osmotic demyelination syndrome (ODS).

  commonCauses:
    - "Hyponatremia: SIADH, diuretics, heart failure, cirrhosis, psychogenic polydipsia, beer potomania"
    - "Hypernatremia: Dehydration, diabetes insipidus, hypertonic fluid administration, inadequate free water intake"

  differentialDiagnosis:
    - "Hypovolemic hyponatremia: Diuretics, GI losses, third-spacing"
    - "Euvolemic hyponatremia: SIADH, psychogenic polydipsia, hypothyroidism"
    - "Hypervolemic hyponatremia: Heart failure, cirrhosis, nephrotic syndrome"
    - "Hypernatremia: Diabetes insipidus, dehydration, hypertonic saline"

  actionableFindings: |
    Na <125: URGENT - Risk of seizures. Check osmolality, urine sodium. Restrict free water or hypertonic saline
    Na <120 with symptoms: HYPERTONIC SALINE 3% - target 4-6 mEq/L increase over 24h (max 8 mEq/L/day chronic)
    Na >155: URGENT - Free water deficit calculation, IV hypotonic fluid or free water
    Rapid Na correction: Risk of osmotic demyelination - monitor closely, may need DDAVP to slow correction


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Routine metabolic panel"
    - "Altered mental status"
    - "Suspected SIADH or diabetes insipidus"
    - "Volume status assessment"
    - "Diuretic therapy monitoring"

  contraindications: []

  minimumIntervalHours: 4  # Frequent monitoring during active correction
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Pseudohyponatremia: Severe hyperlipidemia or hyperproteinemia (osmolality normal)"
    - "Hyperglycemia (dilutional - correct 1.6 mEq/L decrease per 100 mg/dL glucose rise)"
    - "Hemolysis (slight interference)"

  interferingMedications:
    - "Diuretics (decrease sodium)"
    - "SSRIs (may cause SIADH)"
    - "Carbamazepine (causes SIADH)"
    - "Hypertonic saline (increase sodium)"
    - "Desmopressin (decrease sodium)"

  stability: "Stable 7 days refrigerated"
  rejectionCriteria: "Grossly hemolyzed, insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 3.50
  patientCharge: 15.00
  highUtilization: true
  stewardshipRecommendations: "Part of basic metabolic panel - avoid separate ordering"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 23698071 (Hyponatremia guidelines 2014)"
  - "PMID: 28178011 (SIADH diagnosis and management)"
  - "PMID: 25287933 (Osmotic demyelination syndrome)"
  - "PMID: 30428280 (Hypernatremia management)"


guidelineReferences:
  - "European Clinical Practice Guidelines on Hyponatremia 2014"
  - "American College of Physicians - Hyponatremia Management"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Basic metabolic panel"
    - "Osmolality (if Na <130 or >150)"
    - "Urine sodium (if evaluating hyponatremia)"

  reflexTesting:
    result_below_130: "Order serum osmolality, urine sodium, urine osmolality to evaluate etiology"
    result_below_125: "URGENT - Check symptoms. If symptomatic, consider 3% saline. Nephrology consult"
    result_above_150: "Order urine osmolality, calculate free water deficit, IV hypotonic fluids"
    result_above_160: "URGENT - Calculate free water deficit, slow IV correction, ICU monitoring"

  followUpGuidance: |
    Severe hyponatremia (<125): Recheck Na q2-4h during correction, target 4-6 mEq/L increase in 24h
    Chronic hyponatremia: Correct slowly to avoid ODS - max 8 mEq/L per 24h
    Acute symptomatic hyponatremia: May correct 1-2 mEq/L/h for first 3-4h then slow
    Hypernatremia: Recheck Na q4-6h during correction, target 0.5 mEq/L/h decrease (max 10-12 mEq/L/24h)


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "European Hyponatremia Guidelines 2014, UpToDate, Mayo Clinic Reference"
version: "1.0"
