# Urine Culture
# Detection and quantification of bacteria in urine for urinary tract infection diagnosis

TestID: "urine-culture"
TestName: "Urine Culture, Routine"
Category: "Microbiology"
Subcategory: "Urine Culture"

LOINCCode: "630-4"
LOINCDisplay: "Bacteria identified in Urine by Culture"

CPTCodes:
  - Code: "87086"
    Description: "Culture, bacterial; quantitative colony count, urine"
  - Code: "87088"
    Description: "Culture, bacterial; with isolation and presumptive identification"
  - Code: "87184"
    Description: "Susceptibility studies, antimicrobial agent; disk method, per plate"

SpecimenType: "Urine"
SpecimenVolume: "1-5 mL minimum (clean catch or catheter)"
SpecimenContainer: "Sterile urine collection cup or urine transport tube"

CollectionInstructions:
  - "PREFERRED: Clean-catch midstream urine collection"
  - "Cleanse urethral area with antiseptic wipe"
  - "Void initial stream into toilet, collect midstream in sterile cup"
  - "ALTERNATIVE: Straight catheterization or suprapubic aspiration"
  - "For catheterized patients: collect from catheter port (not collection bag)"
  - "Label specimen with patient ID, date/time, collection method"
  - "Collect BEFORE starting antibiotics when possible"

SpecialHandling:
  - "Refrigerate at 2-8°C if transport delayed >2 hours"
  - "Process within 24 hours of collection"
  - "Room temperature storage acceptable if <2 hours to lab"
  - "Boric acid preservative tubes allow 24-48 hour room temperature storage"

ReferenceRange:
  Normal: "<10,000 CFU/mL (colony forming units per milliliter)"
  Interpretation: "No significant bacteriuria - negative for urinary tract infection"

AbnormalValues:
  - Value: "≥100,000 CFU/mL (single organism)"
    Severity: "HIGH"
    ClinicalSignificance: "Urinary tract infection (UTI) present - significant bacteriuria"
    AutoNotify: false
  - Value: "10,000-100,000 CFU/mL (single organism)"
    Severity: "MODERATE"
    ClinicalSignificance: "Possible UTI - correlate with symptoms and urinalysis"
  - Value: "≥100,000 CFU/mL (multiple organisms)"
    Severity: "WARNING"
    ClinicalSignificance: "Likely contamination - recollection recommended"
  - Value: "≥1,000 CFU/mL (catheterized specimen)"
    Severity: "HIGH"
    ClinicalSignificance: "UTI threshold lower for catheterized specimens"
  - Value: "Any growth in suprapubic aspirate"
    Severity: "HIGH"
    ClinicalSignificance: "Any bacterial growth significant with suprapubic collection"

TurnaroundTime:
  Preliminary: "24 hours (initial growth assessment)"
  Intermediate: "24-48 hours (organism identification and colony count)"
  Final: "48-72 hours (final identification and antibiotic susceptibility)"
  Stat: "Same day preliminary report available if requested"

CriticalValues:
  - Value: "≥100,000 CFU/mL with Gram negative sepsis organism"
    Action: "Phone notification for hospitalized patients with systemic symptoms"
    Timeframe: "Within 4 hours of identification"

Indications:
  - "Suspected urinary tract infection (UTI)"
  - "Dysuria, frequency, urgency, suprapubic pain"
  - "Fever with urinary symptoms"
  - "Abnormal urinalysis (pyuria, bacteriuria, nitrites)"
  - "Recurrent UTI evaluation"
  - "Complicated UTI (diabetes, immunocompromised, structural abnormalities)"
  - "Pyelonephritis evaluation"
  - "Post-urologic procedure surveillance"
  - "Pregnancy screening (asymptomatic bacteriuria)"

Contraindications:
  - "Asymptomatic patients without risk factors (screening not recommended except pregnancy)"
  - "Catheterized patients without symptoms (colonization common, treatment not indicated)"

AutoOrderWith:
  - TestID: "urinalysis-microscopic"
    Reason: "Pyuria and bacteriuria support UTI diagnosis"
  - TestID: "urine-gram-stain"
    Reason: "Rapid preliminary organism morphology (if available)"
  - TestID: "pregnancy-test-urine"
    Reason: "If reproductive age female with UTI symptoms"

InterpretationGuidance:
  - Context: "Colony count and organism type"
    Guidance: "≥100,000 CFU/mL single organism = definite UTI; 10,000-100,000 = possible UTI"
  - Context: "Collection method"
    Guidance: "Catheter: ≥1,000 CFU/mL significant; Suprapubic: any growth significant"
  - Context: "Common uropathogens"
    Guidance: "E. coli (80%), Klebsiella, Proteus, Enterococcus, Staphylococcus saprophyticus"
  - Context: "Mixed flora"
    Guidance: "≥3 organisms suggests contamination - recommend recollection"
  - Context: "Pregnancy"
    Guidance: "Screen all pregnant women; treat asymptomatic bacteriuria (≥100,000 CFU/mL)"

ClinicalNotes:
  - "E. coli causes 80-85% of community-acquired UTIs"
  - "Antibiotic susceptibility testing (AST) performed on significant growth"
  - "Asymptomatic bacteriuria does NOT require treatment (except pregnancy, pre-urologic surgery)"
  - "Catheter-associated UTI (CAUTI) requires symptoms + positive culture"
  - "Recurrent UTI: ≥2 infections in 6 months or ≥3 in 12 months"
  - "Complicated UTI: males, pregnancy, catheter, structural abnormalities, immunocompromised"
  - "Fungal UTI (Candida) common in catheterized, diabetic, or antibiotic-treated patients"

QualityMetrics:
  ContaminationRateTarget: "<5% (mixed flora with ≥3 organisms)"
  TimeToFinalReport: "48-72 hours"
  PreAnalyticRejectionCriteria:
    - "Specimen >24 hours old without refrigeration"
    - "Specimen collected from urinary bag (catheterized patients)"
    - "Insufficient volume (<1 mL)"
    - "Unlabeled specimen"

RegionalConsiderations:
  - Region: "All"
    Note: "Increasing antibiotic resistance patterns - track local antibiograms"
  - Region: "Global"
    Note: "ESBL-producing E. coli and Klebsiella increasingly common"

RegulatoryCodes:
  CLIA_Complexity: "High"
  RequiresApproval: false

EvidenceLevel: "A"
EvidenceReferences:
  - "IDSA Clinical Practice Guideline for the Management of Asymptomatic Bacteriuria (2019)"
  - "IDSA Guidelines for the Diagnosis and Treatment of Uncomplicated UTI (2010)"
  - "Clinical Microbiology Procedures Handbook, ASM Press (4th Edition)"
  - "European Association of Urology (EAU) Guidelines on Urological Infections (2023)"

CostConsiderations:
  EstimatedCost_USD: "30-80 (culture), additional $50-100 if susceptibility testing performed"
  ReimbursementNotes: "Covered by most insurance for symptomatic patients"

PatientInstructions:
  - "Cleanse genital area thoroughly before collection"
  - "Collect midstream urine (not first or last part of void)"
  - "Refrigerate specimen if unable to transport immediately"
  - "Do not collect from toilet or urinary bag"

LastUpdated: "2025-01-15"
Version: "1.0"
