# Sputum Culture
# Detection and identification of respiratory pathogens in lower respiratory tract infections

TestID: "sputum-culture"
TestName: "Sputum Culture, Routine"
Category: "Microbiology"
Subcategory: "Respiratory Culture"

LOINCCode: "624-7"
LOINCDisplay: "Bacteria identified in Sputum by Culture"

CPTCodes:
  - Code: "87070"
    Description: "Culture, bacterial; any other source except urine, blood or stool, aerobic"
  - Code: "87205"
    Description: "Smear, primary source with interpretation; Gram stain"
  - Code: "87184"
    Description: "Susceptibility studies, antimicrobial agent; disk method, per plate"

SpecimenType: "Sputum"
SpecimenVolume: "2-5 mL of expectorated sputum"
SpecimenContainer: "Sterile sputum collection cup with screw cap"

CollectionInstructions:
  - "Collect early morning specimen (highest yield)"
  - "Rinse mouth with water before collection (remove oral flora)"
  - "Do NOT use mouthwash (may inhibit bacterial growth)"
  - "Induce deep cough to produce lower respiratory tract sputum"
  - "Expectorate directly into sterile container"
  - "Avoid saliva - specimen must be from deep cough"
  - "For intubated patients: endotracheal aspiration or bronchoscopy specimen"
  - "Label with patient ID, date/time, collection method"

SpecialHandling:
  - "Transport to lab immediately (within 2 hours preferred)"
  - "Refrigerate at 2-8°C if transport delayed"
  - "Process within 24 hours of collection"
  - "Do not freeze specimen"

SpecimenQualityAssessment:
  - "Acceptable: <10 epithelial cells and >25 WBCs per low-power field (Gram stain)"
  - "Unacceptable: >25 epithelial cells per low-power field (saliva contamination)"
  - "Rejected: Pure saliva, insufficient volume, unlabeled"

ReferenceRange:
  Normal: "Normal respiratory flora (viridans streptococci, Neisseria species, non-pathogenic bacteria)"
  Interpretation: "No pathogenic organisms isolated - normal upper respiratory flora present"

AbnormalValues:
  - Value: "Streptococcus pneumoniae (heavy growth)"
    Severity: "HIGH"
    ClinicalSignificance: "Pneumococcal pneumonia - most common bacterial pneumonia pathogen"
  - Value: "Haemophilus influenzae (moderate to heavy growth)"
    Severity: "HIGH"
    ClinicalSignificance: "Haemophilus pneumonia or COPD exacerbation"
  - Value: "Moraxella catarrhalis (moderate to heavy growth)"
    Severity: "MODERATE"
    ClinicalSignificance: "COPD exacerbation or pneumonia"
  - Value: "Staphylococcus aureus (heavy growth)"
    Severity: "HIGH"
    ClinicalSignificance: "Post-influenza pneumonia, necrotizing pneumonia risk"
  - Value: "MRSA (Methicillin-resistant S. aureus)"
    Severity: "CRITICAL"
    ClinicalSignificance: "Healthcare-associated pneumonia - contact precautions required"
  - Value: "Pseudomonas aeruginosa"
    Severity: "HIGH"
    ClinicalSignificance: "Ventilator-associated pneumonia, cystic fibrosis, bronchiectasis"
  - Value: "Klebsiella pneumoniae"
    Severity: "HIGH"
    ClinicalSignificance: "Aspiration pneumonia, alcoholism, necrotizing pneumonia"

TurnaroundTime:
  Preliminary: "2-4 hours (Gram stain)"
  Intermediate: "24-48 hours (preliminary organism identification)"
  Final: "48-72 hours (final identification and antibiotic susceptibility)"
  Stat: "Same day (Gram stain with preliminary interpretation)"

CriticalValues:
  - Value: "MRSA isolated"
    Action: "Notify infection control and ordering provider"
    Timeframe: "Within 4 hours of identification"
  - Value: "Multidrug-resistant Gram negative rods"
    Action: "Notify ordering provider and infection control"
    Timeframe: "Within 4 hours of identification"

Indications:
  - "Community-acquired pneumonia (CAP)"
  - "Hospital-acquired pneumonia (HAP)"
  - "Ventilator-associated pneumonia (VAP)"
  - "COPD exacerbation with purulent sputum"
  - "Cystic fibrosis pulmonary exacerbation"
  - "Bronchiectasis infection"
  - "Lung abscess evaluation"
  - "Failed empiric antibiotic therapy for pneumonia"

Contraindications:
  - "None absolute"
  - "Limited value in outpatient CAP (empiric therapy preferred)"
  - "Poor specimen quality (saliva) - recollection preferred over culture"

AutoOrderWith:
  - TestID: "chest-xray"
    Reason: "Confirm pneumonia or pulmonary infiltrate"
  - TestID: "cbc-with-differential"
    Reason: "Assess infection severity (leukocytosis, left shift)"
  - TestID: "blood-culture-aerobic"
    Reason: "For severe pneumonia or sepsis evaluation"
  - TestID: "procalcitonin"
    Reason: "Bacterial infection biomarker"

InterpretationGuidance:
  - Context: "Specimen quality"
    Guidance: "Only interpret culture if <10 epithelial cells per LPF on Gram stain"
  - Context: "Gram stain correlation"
    Guidance: "Predominant organism on Gram stain should correlate with culture growth"
  - Context: "Quantity of growth"
    Guidance: "Heavy/predominant growth more clinically significant than light/mixed growth"
  - Context: "Normal flora"
    Guidance: "Viridans streptococci, coagulase-negative staph, Neisseria = normal flora, not pathogens"
  - Context: "COPD patients"
    Guidance: "H. influenzae, M. catarrhalis, S. pneumoniae common in exacerbations"

ClinicalNotes:
  - "Sputum culture has limited value for outpatient CAP - empiric therapy preferred"
  - "Most useful for: HAP, VAP, failed therapy, immunocompromised, severe CAP"
  - "Gram stain provides preliminary guidance within 2-4 hours"
  - "50% of CAP patients cannot produce adequate sputum specimen"
  - "Bronchoscopy with BAL (bronchoalveolar lavage) more specific than expectorated sputum"
  - "Legionella, Mycoplasma, Chlamydia NOT detected by routine culture (require special tests)"
  - "Fungal culture requires specific order (not part of routine sputum culture)"
  - "TB culture requires acid-fast bacilli (AFB) culture order (separate test)"

QualityMetrics:
  SpecimenRejectionRate: "<20% (due to saliva contamination)"
  TimeToGramStain: "<4 hours from receipt"
  PreAnalyticRejectionCriteria:
    - "Pure saliva (>25 epithelial cells per LPF)"
    - "Specimen >24 hours old without refrigeration"
    - "Insufficient volume (<1 mL)"
    - "Unlabeled specimen"

RegionalConsiderations:
  - Region: "All"
    Note: "Track local antibiotic resistance patterns (antibiogram)"
  - Region: "Global"
    Note: "Increasing prevalence of multidrug-resistant organisms in healthcare settings"

RegulatoryCodes:
  CLIA_Complexity: "High"
  RequiresApproval: false

EvidenceLevel: "A"
EvidenceReferences:
  - "IDSA/ATS Guidelines for Community-Acquired Pneumonia (2019)"
  - "IDSA/ATS Guidelines for Hospital-Acquired and Ventilator-Associated Pneumonia (2016)"
  - "Clinical Microbiology Procedures Handbook, ASM Press (4th Edition)"

CostConsiderations:
  EstimatedCost_USD: "50-100 (culture), additional $50-100 if susceptibility testing performed"
  ReimbursementNotes: "Covered by most insurance for pneumonia diagnosis"

PatientInstructions:
  - "Collect specimen in morning before eating or brushing teeth"
  - "Rinse mouth with water only (no mouthwash)"
  - "Cough deeply to bring up mucus from lungs"
  - "Spit directly into sterile cup (do not touch inside of cup)"
  - "Refrigerate if unable to transport immediately"

