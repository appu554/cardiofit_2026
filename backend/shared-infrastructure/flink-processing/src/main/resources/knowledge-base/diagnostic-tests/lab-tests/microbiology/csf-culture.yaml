# Cerebrospinal Fluid (CSF) Culture
# Detection of bacterial pathogens in cerebrospinal fluid for meningitis diagnosis

TestID: "csf-culture"
TestName: "Cerebrospinal Fluid (CSF) Culture"
Category: "Microbiology"
Subcategory: "CSF Culture"

LOINCCode: "608-0"
LOINCDisplay: "Bacteria identified in Cerebral spinal fluid by Culture"

CPTCodes:
  - Code: "87070"
    Description: "Culture, bacterial; any other source except urine, blood or stool, aerobic"
  - Code: "87205"
    Description: "Smear, primary source with interpretation; Gram stain"
  - Code: "87184"
    Description: "Susceptibility studies, antimicrobial agent; disk method, per plate"

SpecimenType: "Cerebrospinal Fluid (CSF)"
SpecimenVolume: "1-5 mL minimum (collect as much as safely possible)"
SpecimenContainer: "Sterile screw-cap tube (labeled Tube #3 or #4 for culture)"

CollectionInstructions:
  - "Collected by lumbar puncture (LP) by physician"
  - "Strict aseptic technique - disinfect skin with chlorhexidine or iodine"
  - "Collect 3-4 tubes in sequence (Tube 3 or 4 for culture preferred)"
  - "Tube 1: Cell count and differential"
  - "Tube 2: Glucose and protein"
  - "Tube 3: Culture and Gram stain (HIGHEST PRIORITY)"
  - "Tube 4: Additional studies (PCR, special tests)"
  - "Label each tube with patient ID, date/time, tube number"
  - "Collect BEFORE starting antibiotics when possible"

SpecialHandling:
  - "STAT processing - meningitis is medical emergency"
  - "Transport to lab IMMEDIATELY at room temperature"
  - "Do NOT refrigerate - maintain 20-25°C"
  - "Process within 1 hour of collection (preferably <15 minutes)"
  - "Alert lab before LP performed for immediate processing"

ReferenceRange:
  Normal: "No growth after 5 days incubation"
  Interpretation: "Sterile CSF - no bacterial meningitis detected"

AbnormalValues:
  - Value: "Any bacterial growth"
    Severity: "CRITICAL"
    ClinicalSignificance: "Bacterial meningitis - medical emergency requiring immediate antibiotic therapy"
    AutoNotify: true
    NotificationRecipients: ["ordering_physician", "infectious_disease", "neurology", "pharmacy"]
  - Value: "Streptococcus pneumoniae"
    Severity: "CRITICAL"
    ClinicalSignificance: "Pneumococcal meningitis - most common bacterial meningitis (adults), 20-30% mortality"
  - Value: "Neisseria meningitidis"
    Severity: "CRITICAL"
    ClinicalSignificance: "Meningococcal meningitis - highly contagious, prophylaxis for close contacts required"
  - Value: "Haemophilus influenzae"
    Severity: "CRITICAL"
    ClinicalSignificance: "H. influenzae meningitis - more common in unvaccinated or immunocompromised"
  - Value: "Listeria monocytogenes"
    Severity: "CRITICAL"
    ClinicalSignificance: "Listeria meningitis - elderly, immunocompromised, pregnancy"
  - Value: "Streptococcus agalactiae (Group B Strep)"
    Severity: "CRITICAL"
    ClinicalSignificance: "Neonatal meningitis - high mortality, neurologic sequelae"

TurnaroundTime:
  Preliminary: "1-2 hours (Gram stain - STAT)"
  Intermediate: "24-48 hours (preliminary organism identification)"
  Final: "48-72 hours (final identification and antibiotic susceptibility)"
  Stat: "Gram stain within 1 hour of collection"

CriticalValues:
  - Value: "Any positive Gram stain or culture"
    Action: "IMMEDIATE phone notification to ordering provider"
    Timeframe: "Within 1 hour of detection (Gram stain within 30 minutes)"

Indications:
  - "Suspected bacterial meningitis (fever, headache, neck stiffness, altered mental status)"
  - "Meningeal signs: Kernig sign, Brudzinski sign positive"
  - "Seizures with fever"
  - "Neonatal sepsis evaluation"
  - "Post-neurosurgical infection"
  - "CSF shunt infection"
  - "Immunocompromised patient with CNS symptoms"

Contraindications:
  - "Increased intracranial pressure (papilledema) - CT scan first"
  - "Platelet count <50,000 or coagulopathy (bleeding risk)"
  - "Skin infection at LP site"
  - "Spinal instability or cord compression"

AutoOrderWith:
  - TestID: "csf-cell-count"
    Reason: "Elevated WBC (>5 cells/μL) indicates meningitis"
  - TestID: "csf-glucose"
    Reason: "Low CSF glucose (<40 mg/dL) suggests bacterial meningitis"
  - TestID: "csf-protein"
    Reason: "Elevated protein (>45 mg/dL) indicates inflammation"
  - TestID: "blood-glucose"
    Reason: "Calculate CSF:serum glucose ratio (<0.4 suggests bacterial meningitis)"
  - TestID: "blood-culture-aerobic"
    Reason: "Bacterial meningitis often accompanied by bacteremia"
  - TestID: "cbc-with-differential"
    Reason: "Assess systemic infection (leukocytosis)"

InterpretationGuidance:
  - Context: "Gram stain results"
    Guidance: "Gram positive cocci = S. pneumoniae; Gram negative diplococci = N. meningitidis"
  - Context: "CSF parameters"
    Guidance: "Bacterial: WBC >1,000, PMN >80%, protein >200, glucose <40; Viral: WBC <1,000, lymphocytes, normal glucose"
  - Context: "Age-specific pathogens"
    Guidance: "Neonates: Group B Strep, E. coli, Listeria; Adults: S. pneumoniae, N. meningitidis; Elderly: S. pneumoniae, Listeria"
  - Context: "Prior antibiotics"
    Guidance: "Pre-treatment antibiotics reduce culture sensitivity by 30-50% - CSF PCR or procalcitonin may help"

ClinicalNotes:
  - "Bacterial meningitis is medical emergency - empiric antibiotics should NOT be delayed for LP"
  - "If LP delayed (e.g., for CT scan), give antibiotics first then perform LP"
  - "Gram stain positive in 60-80% of untreated bacterial meningitis"
  - "Culture positive in 70-85% of untreated bacterial meningitis"
  - "CSF glucose <40 mg/dL or CSF:serum glucose <0.4 suggests bacterial meningitis"
  - "N. meningitidis: Notify public health - chemoprophylaxis for close contacts"
  - "Dexamethasone adjunctive therapy reduces mortality in S. pneumoniae meningitis"
  - "Viral meningitis: CSF WBC <1,000, lymphocyte predominance, normal glucose"

QualityMetrics:
  TimeToGramStain: "<1 hour from specimen receipt"
  TimeToNotification: "<30 minutes for positive Gram stain"
  PreAnalyticRejectionCriteria:
    - "Insufficient volume (<0.5 mL)"
    - "Clotted specimen"
    - "Unlabeled tube"
    - "Delayed processing (>4 hours at room temperature)"

RegionalConsiderations:
  - Region: "All"
    Note: "Pneumococcal vaccination has reduced S. pneumoniae meningitis incidence"
  - Region: "Global"
    Note: "Antibiotic resistance increasing - perform susceptibility testing"

RegulatoryCodes:
  CLIA_Complexity: "High"
  RequiresApproval: false

EvidenceLevel: "A"
EvidenceReferences:
  - "IDSA Practice Guidelines for Bacterial Meningitis (2004, updated 2020)"
  - "Clinical Microbiology Procedures Handbook, ASM Press (4th Edition)"
  - "ESCMID Guidelines on Diagnosis and Treatment of Acute Bacterial Meningitis (2016)"

CostConsiderations:
  EstimatedCost_USD: "100-200 (culture), additional $100-150 for susceptibility testing"
  ReimbursementNotes: "Covered by insurance for suspected meningitis (medical emergency)"

ClinicalDecisionSupport:
  - Condition: "Suspected bacterial meningitis"
    Recommendation: "Start empiric antibiotics immediately (ceftriaxone + vancomycin); add ampicillin if age >50 or immunocompromised"
  - Condition: "Positive N. meningitidis"
    Recommendation: "Notify public health; chemoprophylaxis for close contacts (rifampin, ciprofloxacin, or ceftriaxone)"
  - Condition: "Post-neurosurgical meningitis"
    Recommendation: "Empiric coverage for S. aureus (including MRSA) and Gram negative rods"

InfectionControlMeasures:
  - Organism: "Neisseria meningitidis"
    Precautions: "Droplet precautions for first 24 hours of antibiotic therapy"
  - Organism: "Haemophilus influenzae"
    Precautions: "Droplet precautions for first 24 hours of antibiotic therapy"

LastUpdated: "2025-01-15"
Version: "1.0"
