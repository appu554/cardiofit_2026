# ==================================================================
# BLOOD UREA NITROGEN (BUN) TEST DEFINITION
# ==================================================================
testId: "LAB-BUN-001"
testName: "Blood Urea Nitrogen"
loincCode: "3094-0"
commonNames: "BUN, Urea Nitrogen, UN"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Red top, gold top (SST), or green top (lithium heparin)"
  volumeRequired: 1.0  # mL
  specialHandling: "No special handling required"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 45
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/dL"
    normal:
      min: 7
      max: 20
      interpretation: "Normal nitrogen waste excretion"
    critical:
      criticalLow: null
      criticalHigh: 100
      criticalInterpretation: "Severe uremia - evaluate for dialysis"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "mg/dL"
    normal:
      min: 5
      max: 18
      interpretation: "Normal"
    critical:
      criticalHigh: 80
      criticalInterpretation: "Severe azotemia"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "7-20 mg/dL: Normal renal function and protein metabolism"
    elevated: "21-50 mg/dL: Azotemia - prerenal, renal, or postrenal causes"
    severe: "51-100 mg/dL: Severe azotemia - urgent evaluation needed"
    critical: ">100 mg/dL: Severe uremia - evaluate for dialysis"

  clinicalSignificance: |
    BUN measures urea nitrogen, a waste product from protein metabolism.
    Elevated BUN indicates impaired renal excretion or increased protein catabolism.
    BUN/Creatinine ratio helps differentiate prerenal (>20:1) from intrinsic renal causes.

  commonCauses:
    - "Prerenal azotemia (BUN/Cr >20): Dehydration, heart failure, GI bleeding"
    - "Intrinsic renal (BUN/Cr 10-20): Acute tubular necrosis, glomerulonephritis"
    - "Postrenal (BUN/Cr 10-20): Urinary obstruction"
    - "High protein intake or increased catabolism"
    - "GI bleeding (blood protein absorbed)"
    - "Corticosteroid use"

  differentialDiagnosis:
    - "Elevated BUN alone: Prerenal azotemia, high protein diet, GI bleeding, corticosteroids"
    - "BUN + Creatinine elevated: AKI, CKD, obstruction"

  actionableFindings: |
    BUN/Cr ratio >20:1: Prerenal azotemia - aggressive fluid resuscitation
    BUN >50 with normal Cr: Consider GI bleeding, high protein diet, or corticosteroids
    BUN >100: Evaluate for uremic symptoms (pericarditis, encephalopathy, bleeding)
    Rising BUN in AKI: Monitor for uremic complications, nephrology consult


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Routine metabolic panel"
    - "Suspected kidney dysfunction"
    - "Volume status assessment"
    - "GI bleeding evaluation"
    - "Pre-operative evaluation"

  contraindications: []

  minimumIntervalHours: 12
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "High protein diet (elevated)"
    - "Low protein diet or liver disease (decreased)"
    - "Hemolysis (slight interference)"

  interferingMedications:
    - "Corticosteroids (increase BUN)"
    - "Tetracyclines (increase BUN)"
    - "Nephrotoxic drugs (increase BUN)"

  stability: "Stable 7 days refrigerated"
  rejectionCriteria: "Insufficient volume, grossly contaminated"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 4.00
  patientCharge: 18.00
  highUtilization: true
  stewardshipRecommendations: "Part of basic metabolic panel - avoid ordering separately"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 22890468 (KDIGO AKI Guidelines)"
  - "PMID: 18322281 (BUN/Cr ratio utility)"
  - "PMID: 17699722 (Prerenal azotemia diagnosis)"


guidelineReferences:
  - "KDIGO Clinical Practice Guidelines for AKI"
  - "NKF-KDOQI Guidelines"


evidenceLevel: "B"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Creatinine (calculate BUN/Cr ratio)"
    - "Electrolytes"

  reflexTesting:
    ratio_above_20: "Prerenal azotemia - assess volume status, consider fluid resuscitation"
    result_above_50: "Evaluate for uremic symptoms, check creatinine trend"
    result_above_100: "URGENT - Nephrology consult, evaluate for dialysis indications"

  followUpGuidance: |
    BUN/Cr >20:1 with AKI: Volume resuscitation, hold diuretics
    BUN >50: Monitor for uremic symptoms
    Elevated BUN + normal Cr: Consider GI bleeding, protein catabolism


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
