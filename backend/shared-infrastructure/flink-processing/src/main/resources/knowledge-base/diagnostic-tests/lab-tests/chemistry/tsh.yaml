# ==================================================================
# THYROID STIMULATING HORMONE (TSH) TEST DEFINITION
# ==================================================================
testId: "LAB-TSH-001"
testName: "Thyroid Stimulating Hormone"
loincCode: "3016-3"
commonNames: "TSH, Thyrotropin"
category: "ENDOCRINE"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 1.0  # mL
  specialHandling: "No special handling required"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 120
  urgentTurnaroundMinutes: 60
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mIU/L"
    normal:
      min: 0.4
      max: 4.0
      interpretation: "Euthyroid - normal thyroid function"
    critical:
      criticalLow: 0.1
      criticalLowInterpretation: "Severe hyperthyroidism - risk of thyroid storm"
      criticalHigh: 20.0
      criticalHighInterpretation: "Severe hypothyroidism - risk of myxedema coma"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    suppressed: "<0.1 mIU/L: Severe hyperthyroidism (Graves disease, toxic nodule, thyroiditis, excess thyroid hormone)"
    low: "0.1-0.4 mIU/L: Mild hyperthyroidism or subclinical hyperthyroidism"
    normal: "0.4-4.0 mIU/L: Normal thyroid function (euthyroid)"
    elevated: "4.0-10.0 mIU/L: Mild hypothyroidism or subclinical hypothyroidism"
    high: "10.0-20.0 mIU/L: Moderate hypothyroidism"
    severe: ">20.0 mIU/L: Severe hypothyroidism - risk of myxedema coma"

  clinicalSignificance: |
    TSH is the most sensitive test for primary thyroid disorders (thyroid gland dysfunction).
    TSH is secreted by pituitary in response to low thyroid hormones (T3/T4).
    Low TSH indicates hyperthyroidism (excess thyroid hormone suppresses TSH).
    High TSH indicates hypothyroidism (low thyroid hormone stimulates TSH release).
    TSH has inverse log-linear relationship with free T4 - small changes in T4 cause large TSH changes.
    Subclinical thyroid disease: Abnormal TSH with normal free T4.
    TSH alone is usually sufficient for screening; add free T4 if abnormal TSH.

  commonCauses:
    low_tsh:
      - "Graves disease (autoimmune hyperthyroidism)"
      - "Toxic multinodular goiter"
      - "Toxic adenoma (single hyperfunctioning nodule)"
      - "Thyroiditis (subacute, postpartum, painless - transient hyperthyroidism)"
      - "Excess exogenous thyroid hormone (overreplacement or factitious)"
      - "TSH-secreting pituitary adenoma (rare)"
      - "Pregnancy first trimester (hCG cross-reactivity)"
      - "Central hypothyroidism (pituitary/hypothalamic disorder)"

    high_tsh:
      - "Hashimoto's thyroiditis (autoimmune hypothyroidism)"
      - "Post-thyroidectomy or radioiodine ablation"
      - "Iodine deficiency"
      - "Medications (lithium, amiodarone, interferon)"
      - "Subclinical hypothyroidism"
      - "Thyroid hormone resistance (rare)"
      - "TSH-secreting pituitary adenoma (rare)"
      - "Recovery phase of thyroiditis"

  differentialDiagnosis:
    - "TSH <0.1 mIU/L: Overt hyperthyroidism - check free T4, free T3, TSH receptor antibodies (Graves), thyroid uptake scan"
    - "TSH 0.1-0.4 mIU/L: Subclinical hyperthyroidism - check free T4, repeat in 6-12 weeks"
    - "TSH 4.0-10.0 mIU/L: Subclinical hypothyroidism - check free T4, TPO antibodies, repeat in 6-12 weeks"
    - "TSH >10.0 mIU/L: Overt hypothyroidism - check free T4, start levothyroxine replacement"
    - "Low TSH with low free T4: Central hypothyroidism (pituitary/hypothalamic) - check other pituitary hormones"
    - "High TSH with high free T4: TSH-secreting adenoma or thyroid hormone resistance (rare)"

  actionableFindings: |
    TSH <0.1 mIU/L: Check free T4 and free T3 to confirm hyperthyroidism; evaluate for Graves (TSH receptor Ab), toxic nodule (ultrasound, uptake scan)
    TSH 0.1-0.4 mIU/L with symptoms: Check free T4; consider treatment if symptomatic, age >65, or cardiac disease
    TSH 4.0-10.0 mIU/L: Subclinical hypothyroidism - check free T4 and TPO antibodies; consider treatment if TPO+ or symptomatic
    TSH >10.0 mIU/L: Overt hypothyroidism - start levothyroxine 1.6 mcg/kg/day (lower dose if elderly or cardiac disease)
    TSH >20.0 mIU/L: Severe hypothyroidism - evaluate for myxedema coma (hypothermia, altered mental status, hypotension)
    TSH normal with hypothyroid symptoms: Check free T4 to rule out central hypothyroidism


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Screening for thyroid dysfunction"
    - "Symptoms of hypothyroidism (fatigue, weight gain, cold intolerance, constipation)"
    - "Symptoms of hyperthyroidism (weight loss, palpitations, tremor, heat intolerance)"
    - "Monitor levothyroxine therapy"
    - "Unexplained atrial fibrillation"
    - "Hyperlipidemia evaluation"
    - "Depression or cognitive dysfunction"
    - "Pregnancy planning or prenatal care"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 1008  # 6 weeks for therapy monitoring (TSH equilibration time)
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Biotin supplementation (falsely low TSH in some assays - stop 2 days before testing)"
    - "Heterophile antibodies (rare assay interference)"
    - "Recent illness or hospitalization (sick euthyroid syndrome)"
    - "Pregnancy first trimester (physiologically low TSH)"

  interferingMedications:
    - "Biotin >5 mg/day (falsely low TSH in immunoassays)"
    - "Levothyroxine (appropriate suppression of TSH)"
    - "Amiodarone (may cause hypo- or hyperthyroidism)"
    - "Lithium (may cause hypothyroidism)"
    - "Interferon, interleukin-2 (may cause thyroid dysfunction)"
    - "Glucocorticoids (may suppress TSH)"
    - "Dopamine, dobutamine (may suppress TSH)"

  stability: "Stable at 2-8°C for 7 days, stable frozen for months"
  rejectionCriteria: "Insufficient volume, grossly hemolyzed specimen"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 20.00
  patientCharge: 60.00
  highUtilization: true
  stewardshipRecommendations: "TSH alone sufficient for screening; add free T4 only if TSH abnormal or suspicion of central hypothyroidism"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 23315954 (ATA guidelines for hypothyroidism)"
  - "PMID: 27384330 (TSH reference range controversies)"
  - "PMID: 26462967 (Subclinical hypothyroidism management)"
  - "PMID: 28129079 (TSH in pregnancy)"

guidelineReferences:
  - "ATA Guidelines for Hypothyroidism Management"
  - "ATA Guidelines for Hyperthyroidism Management"
  - "AACE Guidelines for Thyroid Disease in Pregnancy"
  - "USPSTF Recommendations for Thyroid Screening"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Free T4 (if TSH abnormal)"
    - "TPO antibodies (if TSH elevated - Hashimoto's evaluation)"
    - "Free T3 (if TSH low with normal free T4)"

  reflexTesting:
    result_below_0_4: "Check free T4 and free T3 to confirm hyperthyroidism; if confirmed, check TSH receptor antibodies for Graves disease"
    result_above_4_0: "Check free T4 to distinguish subclinical (normal T4) from overt (low T4) hypothyroidism; check TPO antibodies"
    result_above_10: "Overt hypothyroidism - start levothyroxine replacement therapy"
    result_above_20: "Severe hypothyroidism - evaluate for myxedema coma risk (hypothermia, altered mental status, bradycardia)"

  followUpGuidance: |
    Hypothyroidism treatment:
      - Start levothyroxine 1.6 mcg/kg/day (lower if elderly or cardiac disease)
      - Recheck TSH in 6-8 weeks after dose change
      - Goal TSH 0.4-4.0 mIU/L (individualize based on age and symptoms)
      - Once stable, check TSH annually
    Hyperthyroidism evaluation:
      - TSH <0.1 mIU/L with high free T4/T3: Start antithyroid drugs (methimazole), beta-blockers for symptoms
      - Check TSH receptor antibodies (Graves), thyroid ultrasound, radioiodine uptake scan
      - Endocrinology referral for definitive treatment (radioiodine vs surgery)
    Subclinical thyroid disease:
      - TSH 4-10 mIU/L: Repeat in 6-12 weeks; treat if TPO+, symptomatic, or progressive elevation
      - TSH 0.1-0.4 mIU/L: Repeat in 6-12 weeks; treat if symptomatic, age >65, or osteoporosis/cardiac disease


