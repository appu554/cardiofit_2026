# ==================================================================
# PROTHROMBIN TIME / INR TEST DEFINITION
# ==================================================================
testId: "LAB-PT-INR-001"
testName: "Prothrombin Time / International Normalized Ratio"
loincCode: "5902-2"
commonNames: "PT/INR, Protime, PT, INR"
category: "HEMATOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Light blue top (3.2% sodium citrate) - MUST be filled to line"
  volumeRequired: 2.7  # mL (must fill to proper ratio)
  specialHandling: "Fill tube completely for accurate ratio. Invert gently 3-4 times. Analyze within 4 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 90
  urgentTurnaroundMinutes: 45
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: true  # POC INR devices available


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult_not_anticoagulated:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "seconds (PT) and ratio (INR)"
    normal:
      min: 11.0  # PT seconds
      max: 13.5  # PT seconds
      interpretation: "Normal coagulation (INR 0.9-1.1)"
    critical:
      criticalLow: null
      criticalHigh: 20.0  # PT >20 seconds or INR >5.0
      criticalInterpretation: "Severe coagulopathy - bleeding risk"

  adult_on_warfarin:
    population: "adult_anticoagulated"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "INR"
    normal:
      min: 2.0  # Therapeutic range for most indications
      max: 3.0  # Therapeutic range for most indications
      interpretation: "Therapeutic anticoagulation (varies by indication)"
    critical:
      criticalLow: null
      criticalHigh: 5.0
      criticalInterpretation: "Supratherapeutic - high bleeding risk"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal_no_anticoag: "INR 0.9-1.1: Normal coagulation"
    therapeutic_afib: "INR 2.0-3.0: Therapeutic for AF, DVT/PE, most indications"
    therapeutic_mechanical_valve: "INR 2.5-3.5: Therapeutic for mechanical heart valves"
    subtherapeutic: "INR 1.2-1.9: Subtherapeutic - increased thrombosis risk"
    supratherapeutic_mild: "INR 3.1-4.5: Mildly supratherapeutic - reduce dose"
    supratherapeutic_moderate: "INR 4.6-9.9: Moderately supratherapeutic - hold dose, consider vitamin K"
    supratherapeutic_severe: "INR ≥10: Severely supratherapeutic - vitamin K + PCC if bleeding"

  clinicalSignificance: |
    PT/INR measures the extrinsic coagulation pathway (factors II, VII, X, V) and
    is used to monitor warfarin therapy. INR standardizes PT results across labs.
    Target INR varies by indication: AF/VTE (2-3), mechanical valves (2.5-3.5).
    Elevated INR also indicates liver dysfunction (decreased clotting factor synthesis).

  commonCauses:
    - "Elevated INR: Warfarin therapy, liver disease, vitamin K deficiency, DIC, factor deficiency"
    - "Low INR on warfarin: Non-adherence, vitamin K intake, drug interactions (rifampin)"

  differentialDiagnosis:
    - "Isolated prolonged PT: Factor VII deficiency, early warfarin effect, early liver disease"
    - "Prolonged PT + PTT: DIC, liver disease, warfarin overdose, vitamin K deficiency"

  actionableFindings: |
    INR <2.0 on warfarin: Subtherapeutic - increase dose per protocol
    INR 3.1-4.5: Hold 1 dose, reduce weekly dose
    INR 4.6-9.9 without bleeding: Hold warfarin, consider vitamin K 1-2.5mg PO
    INR ≥10 without bleeding: Vitamin K 5-10mg PO, hold warfarin
    INR >5 with major bleeding: EMERGENT - Vitamin K 10mg IV + 4-factor PCC, hold warfarin


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Warfarin therapy monitoring"
    - "Pre-operative coagulation assessment"
    - "Suspected liver disease"
    - "Bleeding disorder evaluation"
    - "DIC evaluation"

  contraindications: []

  minimumIntervalHours: 24  # Daily for initial warfarin dosing, weekly-monthly for stable
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Underfilled tube (falsely prolonged - MOST COMMON ERROR)"
    - "Overfilled tube (falsely shortened)"
    - "Hematocrit >55% (falsely prolonged)"
    - "Delay in analysis >4 hours (factor VII degradation)"
    - "Clotted specimen (invalid)"

  interferingMedications:
    - "Warfarin (prolongs INR - intended effect)"
    - "Antibiotics (many potentiate warfarin - azoles, metronidazole, sulfonamides)"
    - "Rifampin (decreases INR)"
    - "Amiodarone (increases INR)"
    - "NSAIDs (increase bleeding risk but do NOT prolong INR)"
    - "Vitamin K foods (decrease INR)"

  stability: "Analyze within 4 hours at room temperature, 24 hours refrigerated"
  rejectionCriteria: "Clotted specimen, underfilled tube, hemolyzed"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 15.00
  patientCharge: 50.00
  highUtilization: true
  stewardshipRecommendations: "Use POC INR for monitoring warfarin therapy in anticoagulation clinic. DOACs (apixaban, rivaroxaban) do NOT require INR monitoring"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 29635051 (ACCP Anticoagulation Guidelines 2018)"
  - "PMID: 23266518 (AHA/ACC AF Guidelines)"
  - "PMID: 32203977 (Warfarin reversal guidelines)"
  - "PMID: 25361546 (INR management protocols)"


guidelineReferences:
  - "ACCP Guidelines on Antithrombotic Therapy 2018"
  - "AHA/ACC/HRS Atrial Fibrillation Guidelines"
  - "ASH Guidelines on VTE Management"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "PTT (if evaluating coagulopathy)"
    - "CBC (platelets for bleeding risk)"

  reflexTesting:
    inr_above_3.0: "Review warfarin dose, check for drug interactions, consider dose reduction"
    inr_above_4.5: "Hold warfarin dose, consider vitamin K 1-2.5mg PO, recheck INR in 24h"
    inr_above_10: "URGENT - Vitamin K 5-10mg PO, hold warfarin, recheck INR in 12-24h"
    inr_above_5_with_bleeding: "EMERGENT - Vitamin K 10mg IV + 4-factor PCC, transfuse if needed"
    inr_below_2.0_on_warfarin: "Increase warfarin dose per protocol, recheck in 3-7 days"

  followUpGuidance: |
    Initiating warfarin: Check INR on day 3, then q3-7 days until stable
    Stable warfarin: Check INR q4 weeks if INR consistently therapeutic
    Dose changes: Recheck INR in 3-7 days after dose adjustment
    INR >5: Hold warfarin, vitamin K if >10 or bleeding, recheck INR in 12-24h
    Warfarin reversal: PCC (4-factor prothrombin complex concentrate) for emergent reversal


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ACCP Anticoagulation Guidelines 2018, UpToDate, Mayo Clinic Reference"
version: "1.0"
