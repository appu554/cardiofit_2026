# ==================================================================
# URINE PROTEIN/CREATININE RATIO TEST DEFINITION
# ==================================================================
testId: "LAB-UPCR-001"
testName: "Urine Protein/Creatinine Ratio"
loincCode: "14958-3"
commonNames: "UPCR, Spot Urine Protein/Creatinine, Protein/Creatinine Ratio"
category: "URINALYSIS"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "URINE"
  collection: "Random spot urine sample (first morning preferred)"
  container: "Sterile urine cup"
  volumeRequired: 10.0  # mL
  specialHandling: "No special handling required; refrigerate if delayed"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 120
  urgentTurnaroundMinutes: 60
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/mg"
    normal:
      min: 0.0
      max: 0.2
      interpretation: "Normal - no significant proteinuria"
    critical:
      criticalLow: null
      criticalHigh: 3.5
      criticalHighInterpretation: "Nephrotic range proteinuria - high risk of nephrotic syndrome"

  pregnancy:
    population: "adult"
    sex: "FEMALE"
    ageMin: 18
    ageMax: 50
    unit: "mg/mg"
    normal:
      min: 0.0
      max: 0.3
      interpretation: "Normal in pregnancy (slightly higher than non-pregnant)"
    critical:
      criticalLow: null
      criticalHigh: 0.3
      criticalHighInterpretation: "Preeclampsia threshold - requires urgent evaluation"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "<0.2 mg/mg: Normal - no significant proteinuria"
    microalbuminuria: "0.2-0.5 mg/mg: Mild proteinuria or microalbuminuria (early diabetic/hypertensive nephropathy)"
    moderate_proteinuria: "0.5-3.5 mg/mg: Moderate proteinuria - glomerular disease, diabetic nephropathy, CKD"
    nephrotic_range: ">3.5 mg/mg: Nephrotic range proteinuria - nephrotic syndrome, severe glomerular disease"
    pregnancy_abnormal: ">0.3 mg/mg in pregnancy: Preeclampsia or gestational hypertension - urgent evaluation"

  clinicalSignificance: |
    UPCR is a spot urine test that estimates 24-hour protein excretion.
    UPCR >0.2 mg/mg correlates with >200 mg/24h urine protein (abnormal).
    UPCR >3.5 mg/mg correlates with >3500 mg/24h (nephrotic range).
    Advantage over 24-hour collection: Convenient, no collection errors, faster result.
    First morning urine preferred (minimizes orthostatic proteinuria).
    UPCR <0.2 mg/mg rules out significant proteinuria (high negative predictive value).
    Nephrotic range proteinuria (>3.5) defines nephrotic syndrome with hypoalbuminemia, edema, hyperlipidemia.

  commonCauses:
    mild_proteinuria:
      - "Early diabetic nephropathy (microalbuminuria)"
      - "Hypertensive nephrosclerosis"
      - "Orthostatic proteinuria (benign in young patients)"
      - "Fever or exercise (transient)"
      - "Chronic kidney disease (early stage)"

    moderate_proteinuria:
      - "Diabetic nephropathy"
      - "Hypertensive kidney disease"
      - "Focal segmental glomerulosclerosis (FSGS)"
      - "IgA nephropathy"
      - "Membranous nephropathy"
      - "HIV-associated nephropathy"
      - "Drug-induced (NSAIDs, lithium)"

    nephrotic_range_proteinuria:
      - "Minimal change disease (children, drug-induced)"
      - "Focal segmental glomerulosclerosis (FSGS)"
      - "Membranous nephropathy"
      - "Diabetic nephropathy (advanced)"
      - "Amyloidosis"
      - "Lupus nephritis"
      - "Preeclampsia/HELLP syndrome (pregnancy)"

  differentialDiagnosis:
    - "UPCR 0.2-0.5 mg/mg: Microalbuminuria - screen for diabetes, hypertension; start ACE-I/ARB if diabetic"
    - "UPCR 0.5-3.5 mg/mg: Moderate proteinuria - evaluate for diabetic nephropathy, glomerular disease, CKD; nephrology referral"
    - "UPCR >3.5 mg/mg: Nephrotic syndrome - check albumin, lipids, renal function; nephrology referral for possible biopsy"
    - "UPCR >0.3 mg/mg in pregnancy: Preeclampsia evaluation - check BP, platelets, liver enzymes, assess fetal well-being"
    - "Isolated proteinuria without hematuria: Diabetic nephropathy, FSGS, minimal change disease"
    - "Proteinuria with hematuria: IgA nephropathy, lupus nephritis, post-infectious GN, membranoproliferative GN"

  actionableFindings: |
    UPCR 0.2-0.5 mg/mg (microalbuminuria): Start ACE-I or ARB (especially if diabetic or hypertensive); optimize BP and glycemic control
    UPCR 0.5-3.5 mg/mg: Nephrology referral; check BMP, albumin, lipids; start ACE-I/ARB; evaluate for secondary causes
    UPCR >3.5 mg/mg: URGENT nephrology referral for nephrotic syndrome evaluation; check albumin, lipids, coagulation (hypercoagulable)
    UPCR >3.5 with hypoalbuminemia <3.0 g/dL: Nephrotic syndrome - consider renal biopsy, start diuretics, consider anticoagulation (DVT risk)
    UPCR >0.3 in pregnancy: URGENT obstetrics evaluation for preeclampsia - check BP, CBC, CMP, LDH; consider magnesium sulfate and delivery
    UPCR elevated with hematuria: Glomerulonephritis workup - ANA, ANCA, complement, anti-GBM; nephrology referral


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Quantify proteinuria detected on urinalysis dipstick"
    - "Screen for diabetic nephropathy (annual screening in diabetes)"
    - "Monitor chronic kidney disease progression"
    - "Evaluate nephrotic syndrome"
    - "Preeclampsia evaluation in pregnancy"
    - "Monitor proteinuria response to ACE-I/ARB therapy"
    - "Evaluate glomerular disease"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 672  # Monthly for CKD or nephrotic syndrome monitoring
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests:
    - "Urinalysis (to detect proteinuria initially)"


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Concentrated or dilute urine (UPCR normalizes for dilution via creatinine)"
    - "Strenuous exercise (transient proteinuria)"
    - "Fever or acute illness (transient proteinuria)"
    - "Orthostatic proteinuria (reduced with first morning urine)"
    - "Menstrual contamination (false elevation)"

  interferingMedications:
    - "NSAIDs (can cause proteinuria)"
    - "Lithium (chronic toxicity causes proteinuria)"
    - "ACE inhibitors/ARBs (reduce proteinuria - therapeutic effect)"
    - "Gold, penicillamine (membranous nephropathy)"

  stability: "Stable refrigerated for 7 days"
  rejectionCriteria: "Insufficient volume, gross contamination"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 18.00
  patientCharge: 55.00
  highUtilization: true
  stewardshipRecommendations: "UPCR preferred over 24-hour urine collection for convenience and accuracy; avoid repeating within 1 month unless acute change"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 23302426 (KDIGO proteinuria evaluation)"
  - "PMID: 18322366 (UPCR vs 24-hour urine correlation)"
  - "PMID: 24703395 (Diabetic nephropathy screening)"
  - "PMID: 23869405 (Preeclampsia diagnosis)"

guidelineReferences:
  - "KDIGO Guidelines for CKD Evaluation and Management"
  - "ADA Standards of Care for Diabetic Nephropathy Screening"
  - "ACOG Guidelines for Preeclampsia Diagnosis"
  - "KDOQI Guidelines for Proteinuria Evaluation"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "BMP (assess renal function with creatinine and GFR)"
    - "Albumin (nephrotic syndrome evaluation)"
    - "Lipid panel (nephrotic syndrome hyperlipidemia)"
    - "Urinalysis (evaluate for hematuria, casts)"

  reflexTesting:
    result_0_2_to_0_5: "Microalbuminuria - start ACE-I or ARB (especially if diabetic); optimize BP <130/80 and HbA1c <7%"
    result_0_5_to_3_5: "Moderate proteinuria - nephrology referral; check BMP, albumin, lipids; start ACE-I/ARB if not already on; evaluate secondary causes"
    result_above_3_5: "URGENT - Nephrotic range proteinuria: Nephrology referral for biopsy; check albumin, lipids, BMP; if albumin <3.0 g/dL, consider anticoagulation (DVT prophylaxis)"
    pregnancy_above_0_3: "URGENT - Preeclampsia evaluation: Check BP, CBC (platelets), CMP (AST/ALT, creatinine), LDH; obstetrics consultation for delivery timing"

  followUpGuidance: |
    Microalbuminuria (UPCR 0.2-0.5 mg/mg):
      - Start ACE-I (lisinopril 10-40 mg/day) or ARB (losartan 50-100 mg/day)
      - Target BP <130/80 mmHg (stricter if diabetic or CKD)
      - Optimize glycemic control (HbA1c <7%) if diabetic
      - Recheck UPCR in 3-6 months to assess treatment response
      - Annual screening in diabetes and hypertension
    Moderate Proteinuria (UPCR 0.5-3.5 mg/mg):
      - Nephrology referral for evaluation
      - Maximize ACE-I/ARB dose (titrate to max tolerated dose)
      - Check BMP, albumin, lipid panel
      - Evaluate secondary causes: ANA (lupus), SPEP/UPEP (myeloma), HIV, hepatitis B/C
      - Monitor UPCR every 3 months; declining proteinuria indicates treatment response
    Nephrotic Range Proteinuria (UPCR >3.5 mg/mg):
      - URGENT nephrology referral for renal biopsy (diagnose specific glomerular disease)
      - Check albumin, lipid panel, BMP
      - If albumin <3.0 g/dL: Nephrotic syndrome confirmed
        - Start diuretics for edema (furosemide 40-80 mg/day)
        - Consider anticoagulation (warfarin or LMWH) for DVT prophylaxis if albumin <2.5 g/dL
        - Statin for hyperlipidemia
        - ACE-I/ARB for proteinuria reduction
      - Monitor for complications: DVT, infection (pneumococcal vaccine), AKI, hyperlipidemia
    Preeclampsia (UPCR >0.3 in pregnancy):
      - URGENT obstetrics evaluation
      - Check BP (>140/90 confirms preeclampsia)
      - Check CBC (platelets), CMP (AST/ALT, creatinine), LDH
      - Fetal monitoring (NST, ultrasound for growth and amniotic fluid)
      - Magnesium sulfate for seizure prophylaxis if severe features
      - Delivery timing based on gestational age and severity (definitive treatment)


