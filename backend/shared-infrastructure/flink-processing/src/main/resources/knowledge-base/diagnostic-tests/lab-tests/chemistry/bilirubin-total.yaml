# ==================================================================
# TOTAL BILIRUBIN TEST DEFINITION
# ==================================================================
testId: "LAB-TBILI-001"
testName: "Bilirubin, Total"
loincCode: "1975-2"
commonNames: "Total Bili, T Bili, Total Bilirubin"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 1.0  # mL
  specialHandling: "Protect from light (bilirubin photodegrades), analyze within 4 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/dL"
    normal:
      min: 0.3
      max: 1.2
      interpretation: "Normal bilirubin metabolism and excretion"
    critical:
      criticalLow: null
      criticalHigh: 12.0
      criticalInterpretation: "Severe hyperbilirubinemia - acute liver failure, severe hemolysis, or complete biliary obstruction"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "0.3-1.2 mg/dL: Normal bilirubin metabolism"
    elevated_mild: "1.3-3.0 mg/dL: Mild hyperbilirubinemia - Gilbert syndrome, mild hemolysis, early cholestasis"
    elevated_moderate: "3.1-12.0 mg/dL: Moderate hyperbilirubinemia - hepatocellular injury, hemolysis, biliary obstruction"
    elevated_severe: "≥12.0 mg/dL: Severe hyperbilirubinemia - acute liver failure, severe cholestasis, complete biliary obstruction"
    critical: "≥12.0 mg/dL: CRITICAL - Evaluate for acute liver failure, severe hemolysis, or complete bile duct obstruction"

  clinicalSignificance: |
    Total bilirubin = conjugated (direct) + unconjugated (indirect) bilirubin.
    Elevated unconjugated bilirubin (indirect >80%): Hemolysis, Gilbert syndrome, Crigler-Najjar syndrome.
    Elevated conjugated bilirubin (direct >50%): Hepatocellular injury, cholestasis, biliary obstruction.
    Direct/total ratio >50%: Suggests conjugated hyperbilirubinemia (hepatobiliary cause).
    Jaundice becomes clinically apparent at bilirubin >2.5 mg/dL.

  commonCauses:
    - "Unconjugated hyperbilirubinemia: Gilbert syndrome (most common), hemolytic anemia, ineffective erythropoiesis, large hematoma resorption, Crigler-Najjar syndrome"
    - "Conjugated hyperbilirubinemia: Viral hepatitis, alcoholic hepatitis, drug-induced liver injury, biliary obstruction (choledocholithiasis, pancreatic cancer), primary biliary cholangitis, primary sclerosing cholangitis, sepsis, Dubin-Johnson syndrome, Rotor syndrome"
    - "Mixed: Cirrhosis, severe hepatocellular injury"

  actionableFindings: |
    Bilirubin ≥12.0: Urgent hepatology consultation, check PT/INR for liver synthetic function, evaluate for acute liver failure
    Bilirubin >3.0: Check direct/indirect fractionation, hepatic panel (ALT, AST, ALP), right upper quadrant ultrasound
    Bilirubin 1.3-3.0 with normal liver enzymes: Consider Gilbert syndrome, hemolysis (check CBC, reticulocyte count, haptoglobin, LDH)
    Conjugated hyperbilirubinemia: Right upper quadrant ultrasound or MRCP to evaluate biliary tree
    Unconjugated hyperbilirubinemia: Hemolysis workup (CBC, reticulocyte count, peripheral smear, Coombs test, haptoglobin)


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Comprehensive metabolic panel"
    - "Hepatic function panel"
    - "Jaundice or scleral icterus"
    - "Suspected liver disease"
    - "Suspected hemolysis"
    - "Biliary obstruction"
    - "Monitoring liver function in hepatotoxic drug therapy"

  contraindications: []
  minimumIntervalHours: 24
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Light exposure (photodegradation of bilirubin)"
    - "Lipemia (may interfere with assay)"
    - "Hemolysis (may falsely increase bilirubin)"
    - "Prolonged fasting (may increase unconjugated bilirubin)"

  interferingMedications:
    - "Rifampin (may increase bilirubin excretion)"
    - "Indinavir, atazanavir (may increase unconjugated bilirubin)"
    - "Hepatotoxic drugs (increase conjugated bilirubin)"

  stability: "4 hours at room temperature in the dark, 3 days refrigerated protected from light"
  rejectionCriteria: "Clotted specimen, insufficient volume, prolonged light exposure"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true
  autoOrderWith: ["Bilirubin Direct (fractionation)", "ALT", "AST", "Alkaline Phosphatase", "Albumin", "PT/INR if elevated"]

  reflexTesting:
    result_above_12: "URGENT - Check PT/INR, direct bilirubin, hepatic panel, right upper quadrant ultrasound, hepatology consultation for acute liver failure evaluation"
    result_above_3: "Check direct bilirubin for fractionation; if conjugated: right upper quadrant ultrasound, hepatic panel; if unconjugated: CBC, reticulocyte count, haptoglobin, LDH, peripheral smear"
    result_1.3_to_3: "Check direct bilirubin; if unconjugated and normal liver enzymes: consider Gilbert syndrome; if conjugated: evaluate for hepatobiliary disease"

  followUpGuidance: |
    Bilirubin >12: Daily monitoring with PT/INR, assess for hepatic encephalopathy and acute liver failure criteria
    Bilirubin 3-12: Repeat every 2-3 days with hepatic panel until etiology identified and treatment initiated
    Gilbert syndrome (unconjugated, normal enzymes): Reassurance, no specific treatment, monitor if symptomatic
    Conjugated hyperbilirubinemia with obstruction: ERCP or surgical consultation for biliary decompression


