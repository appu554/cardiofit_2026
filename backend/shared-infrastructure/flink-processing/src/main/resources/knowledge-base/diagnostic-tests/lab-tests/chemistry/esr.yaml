# ==================================================================
# ERYTHROCYTE SEDIMENTATION RATE (ESR) TEST DEFINITION
# ==================================================================
testId: "LAB-ESR-001"
testName: "Erythrocyte Sedimentation Rate"
loincCode: "4537-7"
commonNames: "ESR, Sed Rate, Sedimentation Rate"
category: "INFLAMMATORY_MARKERS"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Lavender top (EDTA) tube"
  volumeRequired: 2.0  # mL
  specialHandling: "Must be run within 4 hours of collection, keep at room temperature"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 60  # Not typically urgent
  criticalResultMinutes: 60
  availability: "Business hours"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult_male:
    population: "adult"
    sex: "MALE"
    ageMin: 18
    ageMax: 50
    unit: "mm/hr"
    normal:
      min: 0
      max: 15
      interpretation: "Normal - no significant inflammation"
    critical:
      criticalLow: null
      criticalHigh: 100
      criticalInterpretation: "Severe inflammation - consider infection, malignancy, temporal arteritis"

  adult_male_elderly:
    population: "adult"
    sex: "MALE"
    ageMin: 50
    ageMax: 120
    unit: "mm/hr"
    normal:
      min: 0
      max: 20
      interpretation: "Normal for elderly male"
    critical:
      criticalLow: null
      criticalHigh: 100
      criticalInterpretation: "Severe inflammation"

  adult_female:
    population: "adult"
    sex: "FEMALE"
    ageMin: 18
    ageMax: 50
    unit: "mm/hr"
    normal:
      min: 0
      max: 20
      interpretation: "Normal - no significant inflammation"
    critical:
      criticalLow: null
      criticalHigh: 100
      criticalInterpretation: "Severe inflammation"

  adult_female_elderly:
    population: "adult"
    sex: "FEMALE"
    ageMin: 50
    ageMax: 120
    unit: "mm/hr"
    normal:
      min: 0
      max: 30
      interpretation: "Normal for elderly female"
    critical:
      criticalLow: null
      criticalHigh: 100
      criticalInterpretation: "Severe inflammation"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "Male <15 mm/hr, Female <20 mm/hr: No significant inflammation"
    elevated_mild: "20-40 mm/hr: Mild inflammation - anemia, pregnancy, mild infection"
    elevated_moderate: "40-70 mm/hr: Moderate inflammation - autoimmune disease, infection, malignancy"
    elevated_marked: "70-100 mm/hr: Marked inflammation - active autoimmune disease, osteomyelitis"
    elevated_extreme: ">100 mm/hr: Extreme inflammation - temporal arteritis, multiple myeloma, severe infection"

  clinicalSignificance: |
    ESR measures the rate at which red blood cells settle in a tube over 1 hour.
    Nonspecific marker of inflammation, slower to rise and fall than CRP (days vs hours).
    Affected by plasma proteins (fibrinogen, immunoglobulins) that cause RBC aggregation.
    Particularly useful for diagnosing temporal arteritis, polymyalgia rheumatica, monitoring RA.
    ESR >100 mm/hr has differential: infection (especially osteomyelitis), malignancy (myeloma, lymphoma), temporal arteritis, severe autoimmune disease.

  commonCauses:
    - "Temporal arteritis (ESR often >100 mm/hr)"
    - "Polymyalgia rheumatica"
    - "Rheumatoid arthritis and other autoimmune diseases"
    - "Multiple myeloma and lymphoma"
    - "Chronic infections (osteomyelitis, endocarditis, TB)"
    - "Pregnancy (physiologically elevated)"
    - "Anemia (especially severe anemia)"
    - "Renal disease (nephrotic syndrome)"
    - "Acute myocardial infarction"
    - "Malignancy"

  differentialDiagnosis:
    - "ESR >100 mm/hr: Temporal arteritis, multiple myeloma, lymphoma, severe infection, end-stage renal disease"
    - "ESR 40-100 mm/hr: Active autoimmune disease, infection, malignancy, severe anemia"
    - "ESR 20-40 mm/hr: Mild inflammation, anemia, pregnancy, mild infection"
    - "ESR <20 mm/hr: Normal, or conditions with low ESR (polycythemia, sickle cell anemia, hypofibrinogenemia)"

  actionableFindings: |
    ESR <20 mm/hr: Normal for most adults, makes systemic inflammatory disease less likely
    ESR 20-40 mm/hr: Mild elevation - correlate with clinical findings
    ESR 40-70 mm/hr: Moderate elevation - evaluate for autoimmune disease, infection, malignancy
    ESR >100 mm/hr: CRITICAL - High priority evaluation for temporal arteritis (if age >50 with headache/jaw claudication),
                     multiple myeloma (with bone pain/anemia), or severe infection
    ESR with normal CRP: Consider multiple myeloma, hypergammaglobulinemia, or pregnancy
    ESR trending down: Treatment response in inflammatory conditions


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected temporal arteritis or polymyalgia rheumatica"
    - "Monitor rheumatoid arthritis or other autoimmune disease activity"
    - "Fever of unknown origin"
    - "Suspected osteomyelitis or chronic infection"
    - "Suspected multiple myeloma"
    - "Evaluation of unexplained anemia"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 168  # Weekly for serial monitoring (ESR changes slowly)
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Anemia (falsely elevated ESR)"
    - "Polycythemia (falsely low ESR)"
    - "Macrocytosis (falsely elevated)"
    - "Microcytosis (falsely low)"
    - "Pregnancy (physiologically elevated)"
    - "Age (increases with age)"
    - "Female sex (higher reference range)"
    - "Hypofibrinogenemia (falsely low)"
    - "Hypergammaglobulinemia (falsely elevated)"

  interferingMedications:
    - "NSAIDs and corticosteroids (may reduce ESR)"
    - "Oral contraceptives (may elevate ESR)"
    - "Heparin (may affect measurement)"

  stability: "Must be analyzed within 4 hours, do not refrigerate"
  rejectionCriteria: "Clotted specimen, specimen >4 hours old, insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 8.00
  patientCharge: 25.00
  highUtilization: true
  stewardshipRecommendations: "Use CRP for acute inflammation monitoring; ESR more appropriate for temporal arteritis, RA monitoring, and chronic inflammatory conditions"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 10566907 (ESR in temporal arteritis diagnosis)"
  - "PMID: 27098047 (ESR vs CRP clinical utility)"
  - "PMID: 15328214 (ESR in rheumatoid arthritis monitoring)"
  - "PMID: 23690436 (ESR >100 mm/hr differential diagnosis)"

guidelineReferences:
  - "ACR Guidelines for Giant Cell Arteritis Management"
  - "ACR Guidelines for Rheumatoid Arthritis Monitoring"
  - "BSR Guidelines for Polymyalgia Rheumatica Management"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "CRP (complementary acute phase reactant)"
    - "CBC with differential (assess for anemia affecting ESR)"
    - "Serum protein electrophoresis (if ESR >100 mm/hr to rule out myeloma)"

  reflexTesting:
    result_above_100: "URGENT - ESR >100 mm/hr: If age >50, consider temporal arteritis biopsy; check SPEP for myeloma; evaluate for severe infection or malignancy"
    result_above_50_with_headache: "Consider temporal artery biopsy if age >50 with new headache, jaw claudication, or visual symptoms"

  followUpGuidance: |
    ESR >100 mm/hr in patient >50: URGENT temporal arteritis evaluation - do not delay treatment while awaiting biopsy
    ESR >100 mm/hr with bone pain: Check SPEP, serum free light chains, consider multiple myeloma
    ESR >100 mm/hr with fever: Evaluate for osteomyelitis, endocarditis, abscess, malignancy
    ESR elevated with normal CRP: Consider multiple myeloma, pregnancy, hypergammaglobulinemia
    Serial ESR monitoring: Check every 4-8 weeks for autoimmune disease monitoring (ESR changes slowly)
    ESR normalizing: Indicates disease control in inflammatory conditions


