# ==================================================================
# CHEST X-RAY IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-CXR-001"
studyName: "Chest X-Ray (2-View)"
cptCode: "71046"
commonNames: "CXR, Chest Radiograph, PA and Lateral Chest"
modality: "RADIOGRAPHY"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "Remove metal objects, jewelry from chest/neck. Gown provided"
  positioning: "Standing PA and lateral (portable AP if unable to stand)"
  views: "PA (posterior-anterior) and lateral standard. AP portable if bedbound"
  contrastRequired: false
  sedationRequired: false
  specialInstructions: "Deep breath and hold during exposure (3-5 seconds)"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Shield abdomen if pregnant. Avoid if first trimester unless critical"
  renalFunction: "Not applicable (no contrast)"
  allergies: "Not applicable (no contrast)"
  implants: "Pacemaker/ICD visible on film but not contraindication"
  pediatricConsiderations: "Use lowest radiation dose, minimize repeat imaging"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "0.02 mSv (PA view), 0.1 mSv (2-view)"
  comparison: "Equivalent to 2-10 days of natural background radiation"
  justification: "Benefits generally outweigh minimal radiation risk for appropriate indications"
  alara: "As Low As Reasonably Achievable - optimize technique, avoid unnecessary views"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Same day to 24 hours for routine, STAT for emergent"
  urgentAvailability: "24/7 for portable CXR"
  studyDuration: "5 minutes (department), 2 minutes (portable)"
  resultsTurnaround: "Preliminary 1-2 hours, final radiology read 4-24 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_9:
    - indication: "Acute respiratory symptoms with fever"
      acrRating: 9
      clinicalContext: "Suspected pneumonia - CXR first-line imaging"
      evidence: "IDSA/ATS CAP Guidelines 2019"

    - indication: "Acute dyspnea or hypoxia"
      acrRating: 9
      clinicalContext: "Evaluate for pneumonia, pulmonary edema, pneumothorax, effusion"
      evidence: "Standard of care for acute respiratory failure"

    - indication: "Suspected pneumothorax"
      acrRating: 9
      clinicalContext: "Post-procedure (central line, thoracentesis), trauma, spontaneous"
      evidence: "Required to diagnose pneumothorax before chest tube placement"

    - indication: "Chest trauma (blunt or penetrating)"
      acrRating: 9
      clinicalContext: "Evaluate for pneumothorax, hemothorax, rib fractures, pulmonary contusion"
      evidence: "ATLS protocols"

    - indication: "Suspected heart failure exacerbation"
      acrRating: 9
      clinicalContext: "Evaluate for pulmonary edema, pleural effusions, cardiomegaly"
      evidence: "ACC/AHA Heart Failure Guidelines"

  may_be_appropriate_4_6:
    - indication: "Routine pre-operative evaluation (asymptomatic)"
      acrRating: 4
      clinicalContext: "NOT routinely recommended unless cardiopulmonary symptoms or risk factors"
      evidence: "Choosing Wisely - avoid routine pre-op CXR in asymptomatic patients"

    - indication: "Chronic stable COPD (no change)"
      acrRating: 3
      clinicalContext: "Not indicated for stable COPD - only if acute exacerbation"
      evidence: "GOLD COPD Guidelines"

  usually_not_appropriate_1_3:
    - indication: "Routine health screening (asymptomatic)"
      acrRating: 1
      clinicalContext: "Not recommended - no evidence of benefit"
      evidence: "USPSTF recommends against routine screening CXR"

    - indication: "Uncomplicated URI or bronchitis"
      acrRating: 2
      clinicalContext: "CXR not needed for simple cough/cold without pneumonia features"
      evidence: "Choosing Wisely - avoid CXR for acute uncomplicated bronchitis"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Clear lung fields, normal cardiac silhouette, no effusions/pneumothorax"

  commonAbnormalities:
    - finding: "Infiltrate/consolidation"
      interpretation: "Pneumonia (bacterial if lobar, viral if diffuse interstitial)"
      actionable: "Antibiotics for bacterial pneumonia per guidelines"

    - finding: "Pulmonary edema"
      interpretation: "Cardiogenic (perihilar bat wing, Kerley B lines) or non-cardiogenic (ARDS)"
      actionable: "Diuretics for cardiogenic, lung-protective ventilation for ARDS"

    - finding: "Pneumothorax"
      interpretation: "Air in pleural space - small vs large, tension pneumothorax if mediastinal shift"
      actionable: "Chest tube if >20% or symptomatic, emergent if tension"

    - finding: "Pleural effusion"
      interpretation: "Fluid in pleural space - transudative vs exudative (requires thoracentesis)"
      actionable: "Thoracentesis if >1cm on lateral decubitus or symptomatic"

    - finding: "Cardiomegaly"
      interpretation: "Cardiothoracic ratio >0.5 suggests heart failure, pericardial effusion"
      actionable: "Echocardiogram for further evaluation"

  criticalFindings:
    - "Tension pneumothorax (mediastinal shift) - EMERGENT chest tube"
    - "Massive hemothorax - EMERGENT chest tube and blood transfusion"
    - "Free air under diaphragm - perforated viscus, surgical consult"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute respiratory symptoms (dyspnea, hypoxia, fever with cough)"
    - "Post-procedure check (central line, NG tube, ET tube placement)"
    - "Suspected pneumothorax or pleural effusion"
    - "Chest trauma"
    - "Heart failure exacerbation"

  contraindications:
    - "Pregnancy (relative - use only if benefit outweighs risk)"

  prerequisiteTests: []

  stewardshipRecommendations: |
    AVOID routine pre-op CXR in asymptomatic patients <70 years
    AVOID CXR for uncomplicated acute bronchitis
    AVOID daily CXR in stable ICU patients (order only for clinical change)
    Consider ultrasound for pleural effusion/pneumothorax evaluation (no radiation)


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate inspiration (9-10 posterior ribs visible)"
    - "No rotation (clavicles equidistant from spine)"
    - "Adequate penetration (vertebral bodies faintly visible through heart)"

  followUpGuidance: |
    Pneumonia: Repeat CXR in 6 weeks to confirm resolution (smokers, >50 years)
    Pleural effusion: Repeat after thoracentesis or if clinical change
    Pneumothorax: Repeat after chest tube to confirm resolution before removal
    Pulmonary nodule: CT chest for characterization if >6mm or suspicious


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 75.00
  patientCharge: 250.00
  highUtilization: true
  costEffectiveness: "Most cost-effective initial imaging for chest complaints"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 31573350 (IDSA/ATS CAP Guidelines 2019)"
  - "PMID: 23247303 (ACR Appropriateness Criteria Acute Respiratory Illness)"
  - "PMID: 28150362 (Choosing Wisely - avoiding unnecessary CXR)"
  - "PMID: 27650822 (ICU daily CXR not beneficial)"


guidelineReferences:
  - "ACR Appropriateness Criteria"
  - "IDSA/ATS Community-Acquired Pneumonia Guidelines 2019"
  - "ACEP Clinical Policy on Pneumothorax"
  - "Choosing Wisely Campaign Recommendations"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    pre_op_routine: "ALERT: Routine pre-op CXR not recommended for asymptomatic patients <70 years without cardiopulmonary disease"
    acute_bronchitis: "ALERT: CXR not indicated for uncomplicated acute bronchitis - consider if pneumonia features present"
    stable_copd: "ALERT: CXR not indicated for stable COPD without acute symptoms"

  autoOrderWith:
    - "Consider CT chest if CXR shows concerning nodule or mass"
    - "Consider ultrasound for pleural effusion characterization"

  reflexOrdering:
    nodule_detected: "If pulmonary nodule >6mm, recommend CT chest for characterization"
    infiltrate_detected: "If pneumonia confirmed, follow-up CXR in 6 weeks recommended for smokers >50 years"

  followUpGuidance: |
    Normal CXR with persistent symptoms: Consider CT chest for further evaluation
    Abnormal CXR: Communicate critical findings to ordering provider within 1 hour
    Incidental findings: Follow Fleischner Society guidelines for pulmonary nodules


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ACR Appropriateness Criteria 2023, IDSA Guidelines, Choosing Wisely"
version: "1.0"
