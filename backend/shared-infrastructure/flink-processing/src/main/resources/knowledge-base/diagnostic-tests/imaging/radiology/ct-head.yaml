# ==================================================================
# CT HEAD (NON-CONTRAST) IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-CT-HEAD-001"
studyName: "CT Head without Contrast"
cptCode: "70450"
commonNames: "Head CT, CT Brain, Non-Contrast Head CT, NCCT Head"
modality: "COMPUTED_TOMOGRAPHY"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "Remove metal objects, glasses, hairpins, dentures if possible"
  positioning: "Supine, head in head holder"
  views: "Axial slices from skull base to vertex"
  contrastRequired: false  # Non-contrast is standard for acute neurological evaluation
  sedationRequired: false  # May require sedation for pediatrics or agitated patients
  specialInstructions: "Patient must remain still during scan (2-5 minutes)"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Relative contraindication - shield abdomen. Consider MRI if non-emergent"
  renalFunction: "Not applicable (non-contrast study)"
  allergies: "Not applicable (no contrast)"
  implants: "Safe with pacemaker/ICD. Not safe with certain aneurysm clips (check compatibility)"
  pediatricConsiderations: "Use lowest radiation dose protocols. Consider ultrasound for infants with open fontanelles"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "2 mSv (head CT non-contrast)"
  comparison: "Equivalent to ~8 months of natural background radiation"
  justification: "Benefits outweigh risks for appropriate acute neurological indications"
  alara: "Use low-dose protocols, especially in pediatrics and young adults"
  cancerRisk: "Minimal - brain less radiation-sensitive than other organs"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "STAT for acute stroke, trauma, altered mental status"
  urgentAvailability: "24/7 for emergent indications"
  studyDuration: "2-5 minutes"
  resultsTurnaround: "Preliminary read 15-30 minutes (emergent), final read 4-24 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Acute stroke symptoms (within 24 hours)"
      acrRating: 9
      clinicalContext: "Rule out hemorrhage before tPA. NCCT is first-line for acute stroke"
      evidence: "AHA/ASA Stroke Guidelines 2019 - NCCT required before thrombolysis"

    - indication: "Head trauma with altered mental status or focal deficit"
      acrRating: 9
      clinicalContext: "Evaluate for intracranial hemorrhage, skull fracture, herniation"
      evidence: "ACEP Clinical Policy on Head Trauma, Canadian CT Head Rule"

    - indication: "Acute severe headache (thunderclap, worst headache of life)"
      acrRating: 9
      clinicalContext: "Rule out subarachnoid hemorrhage (SAH), LP if CT negative"
      evidence: "Ottawa SAH Rule, ACEP Clinical Policy"

    - indication: "New focal neurological deficit"
      acrRating: 9
      clinicalContext: "Evaluate for stroke, hemorrhage, mass lesion"
      evidence: "Standard of care for acute neurological changes"

    - indication: "Altered mental status (acute change)"
      acrRating: 8
      clinicalContext: "Rule out intracranial process (bleed, stroke, mass, hydrocephalus)"
      evidence: "ACEP Clinical Policy on Altered Mental Status"

    - indication: "Suspected increased intracranial pressure (ICP)"
      acrRating: 8
      clinicalContext: "Papilledema, vomiting, headache - evaluate for mass, hydrocephalus"
      evidence: "Neuro-ophthalmology guidelines"

  may_be_appropriate_4_6:
    - indication: "Seizure (first-time, adult)"
      acrRating: 6
      clinicalContext: "CT or MRI to evaluate for structural lesion. MRI preferred if non-emergent"
      evidence: "AAN Practice Parameter on First Seizure"

    - indication: "Headache (chronic, stable pattern)"
      acrRating: 4
      clinicalContext: "Low yield unless red flags present. MRI preferred if imaging indicated"
      evidence: "ACR Appropriateness - avoid CT for chronic headache without red flags"

  usually_not_appropriate_1_3:
    - indication: "Minor head trauma (no LOC, normal mental status)"
      acrRating: 2
      clinicalContext: "Canadian CT Head Rule and PECARN rules recommend observation only"
      evidence: "Choosing Wisely - avoid CT for minor head trauma without risk factors"

    - indication: "Syncope (simple, no head trauma or neuro deficit)"
      acrRating: 2
      clinicalContext: "Low yield for intracranial pathology if no focal findings"
      evidence: "ACC/AHA Syncope Guidelines - imaging not routinely indicated"

    - indication: "Routine screening (asymptomatic)"
      acrRating: 1
      clinicalContext: "No role for screening head CT in general population"
      evidence: "Choosing Wisely recommendations"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "No acute hemorrhage, mass, midline shift, or hydrocephalus. Normal gray-white differentiation"

  commonAbnormalities:
    - finding: "Acute intracranial hemorrhage"
      interpretation: |
        Intraparenchymal: Hypertensive hemorrhage, amyloid angiopathy, AVM, tumor
        Subdural: Acute (hyperdense), subacute (isodense), chronic (hypodense)
        Epidural: Lens-shaped, typically temporal (middle meningeal artery injury)
        Subarachnoid: Blood in sulci/cisterns - aneurysm rupture until proven otherwise
      actionable: "Neurosurgery consult, BP control, reverse anticoagulation if applicable"

    - finding: "Acute ischemic stroke"
      interpretation: "Loss of gray-white differentiation, hyperdense MCA sign (early), established infarct (late)"
      actionable: "If <4.5 hours: tPA if no contraindications. Consider thrombectomy if large vessel occlusion"

    - finding: "Mass lesion"
      interpretation: "Primary brain tumor, metastasis, abscess - further evaluation with MRI and contrast"
      actionable: "Neurosurgery/neuro-oncology consult, MRI brain with contrast"

    - finding: "Hydrocephalus"
      interpretation: "Enlarged ventricles - obstructive vs communicating"
      actionable: "Neurosurgery consult for possible VP shunt or EVD placement"

    - finding: "Midline shift"
      interpretation: "Mass effect from hemorrhage, tumor, or edema - risk of herniation"
      actionable: "URGENT neurosurgery consult, ICP monitoring, consider decompressive craniectomy"

  criticalFindings:
    - "Acute intracranial hemorrhage with mass effect or midline shift - URGENT neurosurgery"
    - "Acute stroke within tPA window (<4.5 hours) - STAT neurology consult"
    - "Herniation (uncal, central, tonsillar) - EMERGENT neurosurgery, hyperventilation, mannitol"
    - "Large SAH - URGENT neurosurgery for aneurysm evaluation and treatment"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute stroke symptoms (FAST positive)"
    - "Head trauma with LOC, amnesia, vomiting, or altered mental status"
    - "Thunderclap headache or worst headache of life"
    - "New focal neurological deficit"
    - "Acute altered mental status"

  contraindications:
    - "Pregnancy (relative - use if benefits outweigh risks)"

  prerequisiteTests: []

  stewardshipRecommendations: |
    Use Canadian CT Head Rule for minor head trauma to reduce unnecessary CT
    AVOID CT for simple syncope without head trauma or neuro findings
    AVOID CT for chronic headache without red flags (use MRI if imaging needed)
    AVOID routine CT for first-time seizure if patient alert and normal neuro exam (MRI outpatient)


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate coverage (skull base to vertex)"
    - "Minimal motion artifact"
    - "Appropriate window settings for bone and soft tissue"

  followUpGuidance: |
    Acute stroke: CTA head/neck if considering thrombectomy, MRI for small strokes
    SAH on CT: Cerebral angiography (CTA or conventional) to identify aneurysm
    Negative CT with high SAH suspicion: Lumbar puncture (LP) after 6 hours for xanthochromia
    Mass lesion: MRI brain with contrast for characterization
    Traumatic brain injury: Repeat CT in 6-24 hours if initially abnormal or clinical deterioration


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 300.00
  patientCharge: 1000.00
  highUtilization: true
  costEffectiveness: "Essential for acute neurological emergencies, but overused for minor trauma and headaches"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 31662037 (AHA/ASA Stroke Guidelines 2019)"
  - "PMID: 11734707 (Canadian CT Head Rule for trauma)"
  - "PMID: 21310240 (PECARN Pediatric Head Trauma Rule)"
  - "PMID: 23558440 (Ottawa SAH Rule)"
  - "PMID: 23558442 (ACEP Clinical Policy Head Trauma)"


guidelineReferences:
  - "AHA/ASA Guidelines for Early Management of Acute Ischemic Stroke 2019"
  - "ACEP Clinical Policy on Head Trauma"
  - "ACR Appropriateness Criteria for Headache"
  - "Canadian CT Head Rule"
  - "Choosing Wisely Campaign"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    minor_trauma: "ALERT: Canadian CT Head Rule - CT not indicated for minor head trauma without high-risk features"
    simple_syncope: "ALERT: CT head not indicated for simple syncope without head trauma or neurological findings"
    chronic_headache: "ALERT: CT not indicated for chronic stable headache - use MRI if imaging needed"

  autoOrderWith:
    - "CTA head/neck (if acute stroke and considering thrombectomy)"

  reflexOrdering:
    acute_stroke_within_window: "STAT neurology consult for tPA evaluation. Consider CTA for thrombectomy candidacy"
    intracranial_hemorrhage: "URGENT neurosurgery consult, reverse anticoagulation, BP control"
    sah_detected: "Cerebral angiography (CTA or catheter) to identify aneurysm source"
    negative_ct_thunderclap_headache: "Perform LP after 6 hours to evaluate for SAH (xanthochromia)"

  followUpGuidance: |
    Acute stroke: tPA if <4.5 hours, thrombectomy if <24 hours with large vessel occlusion
    ICH: Neurosurgery evaluation, reverse coagulopathy, BP <140 systolic
    SAH: Neurosurgery consult, nimodipine, aneurysm repair (coiling vs clipping)
    Negative CT with persistent symptoms: Consider MRI for small strokes or lesions


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "AHA/ASA Stroke Guidelines 2019, ACEP Clinical Policies, ACR Appropriateness Criteria"
version: "1.0"
