# ==================================================================
# STOOL CULTURE TEST DEFINITION
# ==================================================================
testId: "LAB-STOOL-CULTURE-001"
testName: "Stool Culture"
loincCode: "625-4"
commonNames: "Fecal Culture, Stool Culture for Enteric Pathogens"
category: "MICROBIOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "STOOL"
  collection: "Fresh stool sample (unformed stool preferred)"
  container: "Sterile stool collection container or Cary-Blair transport medium"
  volumeRequired: 5.0  # grams (walnut-sized sample)
  specialHandling: "Transport at room temperature within 2 hours OR use Cary-Blair medium for delayed transport. Do NOT refrigerate. Do NOT contaminate with urine or toilet water"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 2880  # 48 hours preliminary
  urgentTurnaroundMinutes: 1440  # 24 hours for Gram stain and preliminary
  criticalResultMinutes: 60  # For positive C. difficile or life-threatening pathogens
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "qualitative"
    normal:
      interpretation: "Normal intestinal flora only (no pathogens)"
    critical:
      criticalInterpretation: "Pathogenic bacteria detected (Salmonella, Shigella, Campylobacter, E. coli O157:H7, Yersinia, C. difficile)"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 0
    ageMax: 17
    unit: "qualitative"
    normal:
      interpretation: "Normal intestinal flora only"
    critical:
      criticalInterpretation: "Pathogenic bacteria detected"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "Normal intestinal flora only - no enteric pathogens detected"
    positive_salmonella: "Salmonella species detected - reportable disease, antibiotic susceptibility testing performed"
    positive_shigella: "Shigella species detected - reportable disease, highly contagious"
    positive_campylobacter: "Campylobacter jejuni/coli detected - most common bacterial diarrhea"
    positive_ecoli_o157: "E. coli O157:H7 detected - CRITICAL, risk of HUS (hemolytic uremic syndrome)"
    positive_cdiff: "Clostridioides difficile toxin detected - antibiotic-associated colitis"
    positive_yersinia: "Yersinia enterocolitica detected - mimics appendicitis"

  clinicalSignificance: |
    Stool culture identifies bacterial pathogens causing acute gastroenteritis and colitis.
    Standard culture detects: Salmonella, Shigella, Campylobacter, E. coli O157:H7.
    Extended culture (if requested) detects: Yersinia, Vibrio, Aeromonas, Plesiomonas.
    C. difficile requires separate C. difficile toxin assay (PCR or EIA).
    Most acute diarrhea is viral (Norovirus, Rotavirus) and culture will be negative.
    Routine stool culture is LOW YIELD (<5% positive) - order based on clinical criteria.

  commonCauses:
    - "Salmonella: Poultry, eggs, reptile exposure. Causes enterocolitis, bacteremia (especially Typhi)"
    - "Shigella: Person-to-person transmission, daycare outbreaks. Low inoculum (10-100 organisms). Bloody diarrhea"
    - "Campylobacter: Most common bacterial cause. Poultry, unpasteurized milk. Bloody diarrhea. Guillain-Barré association"
    - "E. coli O157:H7: Undercooked beef, unpasteurized juice. Risk of HUS (hemolytic uremic syndrome), especially in children"
    - "C. difficile: Antibiotic-associated, healthcare-acquired. Toxin-mediated pseudomembranous colitis"
    - "Yersinia: Pork, contaminated water. Mimics appendicitis (mesenteric adenitis)"

  differentialDiagnosis:
    - "Bacterial diarrhea: Salmonella, Shigella, Campylobacter, E. coli O157:H7, C. difficile"
    - "Viral gastroenteritis: Norovirus, Rotavirus (more common, culture negative)"
    - "Parasitic: Giardia, Cryptosporidium, Entamoeba (requires ova & parasite exam, not culture)"
    - "Inflammatory bowel disease: Ulcerative colitis, Crohn disease (culture negative)"

  actionableFindings: |
    Positive culture: Isolate patient (contact precautions), antibiotic susceptibility testing, report to public health
    Salmonella/Shigella: Reportable disease - notify public health within 24 hours
    E. coli O157:H7: CRITICAL - Risk of HUS, monitor renal function (creatinine, platelets), avoid antibiotics (may increase HUS risk)
    C. difficile: Contact isolation, discontinue inciting antibiotics, start oral vancomycin or fidaxomicin
    Campylobacter: Usually self-limited, consider azithromycin for severe cases or immunocompromised
    Negative culture with persistent diarrhea: Consider parasites (O&P exam), viral PCR, inflammatory bowel disease


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute diarrhea with fever, bloody stools, or severe abdominal pain"
    - "Diarrhea >7 days duration"
    - "Recent travel to endemic areas (traveler's diarrhea)"
    - "Outbreak investigation (foodborne illness, daycare)"
    - "Immunocompromised patients with diarrhea"
    - "Recent antibiotic use (consider C. difficile toxin instead)"
    - "Suspected food poisoning with multiple affected individuals"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 48  # Repeat culture rarely indicated unless persistent symptoms
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests:
    - "Consider: Fecal leukocyte test (WBCs in stool suggest invasive bacterial diarrhea)"
    - "Consider: C. difficile toxin assay (if recent antibiotics or healthcare exposure)"
    - "Consider: Ova & Parasite exam (if travel to endemic areas)"


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Contamination with urine or toilet water (false positives)"
    - "Delay in transport >2 hours without Cary-Blair medium (false negatives)"
    - "Refrigeration (kills Shigella)"
    - "Formed stool (lower yield than unformed stool)"
    - "Antibiotic therapy started before culture collection (false negatives)"

  interferingMedications:
    - "Antibiotics (reduce bacterial yield - collect before starting antibiotics)"
    - "Barium sulfate (from recent radiologic studies - interferes with culture)"
    - "Laxatives containing mineral oil (interferes with culture)"

  stability: "Transport immediately at room temperature, or use Cary-Blair medium for up to 48 hours"
  rejectionCriteria: "Insufficient sample (<1 gram), contamination with urine, improper transport medium, sample received >48 hours after collection without transport medium"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 45.00
  patientCharge: 120.00
  highUtilization: false  # LOW YIELD test (<5% positive)
  stewardshipRecommendations: |
    Stool culture has LOW YIELD (<5% positive) and is EXPENSIVE. Order selectively based on:
    - Bloody diarrhea or severe symptoms (fever, dehydration)
    - Diarrhea >7 days
    - Immunocompromised patients
    - Outbreak investigation
    DO NOT order for:
    - Watery diarrhea without fever (likely viral)
    - Diarrhea <3 days in immunocompetent patients
    - Hospitalized patients with diarrhea >3 days after admission (test for C. difficile instead)
    Consider multiplex GI PCR panel for higher sensitivity and faster results (detects 22 pathogens in 1 hour)


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 27418580 (IDSA Guidelines on Infectious Diarrhea)"
  - "PMID: 28124990 (Stool culture yield and appropriateness)"
  - "PMID: 24005221 (C. difficile diagnosis and management)"
  - "PMID: 31573638 (Multiplex GI PCR vs stool culture)"

guidelineReferences:
  - "IDSA Guidelines for Diagnosis and Management of Infectious Diarrhea (2017)"
  - "CDC Guidelines for Enteric Disease Surveillance"
  - "SHEA/IDSA Guidelines for C. difficile Infection"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "C. difficile toxin assay (if recent antibiotics or healthcare exposure)"
    - "Fecal leukocyte test or fecal calprotectin (inflammatory diarrhea marker)"
    - "Ova & Parasite exam (if travel history or persistent diarrhea)"

  reflexTesting:
    positive_salmonella: "Antibiotic susceptibility testing, blood culture if fever, notify public health"
    positive_shigella: "Antibiotic susceptibility testing, notify public health (highly contagious)"
    positive_ecoli_o157: "URGENT - Monitor for HUS: CBC (hemolysis, thrombocytopenia), BMP (renal failure). AVOID ANTIBIOTICS. Notify public health"
    positive_cdiff: "Isolate patient (contact precautions), discontinue inciting antibiotics, start oral vancomycin 125 mg QID or fidaxomicin"
    positive_campylobacter: "Consider azithromycin if severe or immunocompromised"
    negative_culture_persistent_diarrhea: "Consider: Ova & Parasite exam, GI PCR panel, colonoscopy (inflammatory bowel disease)"

  followUpGuidance: |
    Positive culture: Contact isolation, hand hygiene, antibiotic therapy based on susceptibility
    Salmonella/Shigella: Report to public health, source investigation
    E. coli O157:H7: Monitor renal function daily for 7-10 days (HUS risk), AVOID antibiotics and anti-motility agents
    C. difficile: Contact isolation, oral vancomycin 125 mg QID × 10-14 days OR fidaxomicin 200 mg BID × 10 days
    Negative culture with persistent diarrhea: Consider parasites, viral PCR, inflammatory bowel disease
    Prevention: Hand hygiene, food safety education, avoid antibiotics for viral gastroenteritis


