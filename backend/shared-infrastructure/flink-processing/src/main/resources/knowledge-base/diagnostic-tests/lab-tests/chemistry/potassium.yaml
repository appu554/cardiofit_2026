# ==================================================================
# POTASSIUM TEST DEFINITION
# ==================================================================
testId: "LAB-POTASSIUM-001"
testName: "Serum Potassium"
loincCode: "2823-3"
commonNames: "K, Potassium, Serum K"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture without tourniquet or minimal tourniquet time"
  container: "Red top, gold top (SST), or green top (lithium heparin) - NOT EDTA"
  volumeRequired: 1.0  # mL
  specialHandling: "Avoid hemolysis, prolonged tourniquet, fist clenching. Separate plasma/serum promptly"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 45
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 15  # Critical for cardiac arrhythmias
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mEq/L"
    normal:
      min: 3.5
      max: 5.0
      interpretation: "Normal potassium balance"
    critical:
      criticalLow: 2.5
      criticalHigh: 6.0
      criticalInterpretation: "Severe dyskalemia - risk of life-threatening arrhythmias"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "mEq/L"
    normal:
      min: 3.5
      max: 5.0
      interpretation: "Normal"
    critical:
      criticalLow: 2.8
      criticalHigh: 6.5
      criticalInterpretation: "Critical - cardiac monitoring required"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "3.5-5.0 mEq/L: Normal potassium homeostasis"
    hypokalemia_mild: "3.0-3.4 mEq/L: Mild hypokalemia - replete orally"
    hypokalemia_moderate: "2.5-2.9 mEq/L: Moderate hypokalemia - IV replacement, monitor ECG"
    hypokalemia_severe: "<2.5 mEq/L: Severe hypokalemia - URGENT IV replacement, continuous cardiac monitoring"
    hyperkalemia_mild: "5.1-5.9 mEq/L: Mild hyperkalemia - repeat to confirm, review meds"
    hyperkalemia_moderate: "6.0-6.9 mEq/L: Moderate hyperkalemia - ECG, consider treatment"
    hyperkalemia_severe: "≥7.0 mEq/L: Severe hyperkalemia - URGENT treatment, ECG, cardiac monitoring"

  clinicalSignificance: |
    Potassium is the primary intracellular cation critical for cardiac and neuromuscular function.
    Both hypo- and hyperkalemia can cause life-threatening cardiac arrhythmias.
    ECG changes precede arrhythmias: hypokalemia (U waves, ST depression), hyperkalemia (peaked T waves, widened QRS).

  commonCauses:
    - "Hypokalemia: Diuretics, GI losses (diarrhea, vomiting), RTA, hypomagnesemia, insulin"
    - "Hyperkalemia: Renal failure, ACEi/ARB, K-sparing diuretics, rhabdomyolysis, tumor lysis, acidosis, hemolysis (pseudohyperkalemia)"

  differentialDiagnosis:
    - "Hypokalemia: Renal losses (diuretics, RTA) vs GI losses vs transcellular shift (insulin, alkalosis)"
    - "Hyperkalemia: Decreased excretion (renal failure, meds) vs increased release (rhabdomyolysis, tumor lysis) vs pseudohyperkalemia (hemolysis)"

  actionableFindings: |
    K <2.5: URGENT IV potassium replacement, cardiac monitoring, check Mg (replete if low)
    K 2.5-3.0: IV or oral potassium, ECG monitoring
    K 3.0-3.4: Oral potassium repletion
    K >6.0: URGENT - Obtain ECG, calcium gluconate if ECG changes, insulin+dextrose, kayexalate, consider dialysis
    K ≥7.0 or ECG changes: EMERGENT - Calcium gluconate, insulin+dextrose, albuterol, dialysis consult


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Routine metabolic panel"
    - "Suspected dyskalemia"
    - "Diuretic therapy monitoring"
    - "Renal failure"
    - "Cardiac arrhythmias"
    - "ACEi/ARB/K-sparing diuretic use"

  contraindications: []

  minimumIntervalHours: 4  # Frequent monitoring during active treatment
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (FALSELY ELEVATED - most common cause of pseudohyperkalemia)"
    - "Prolonged tourniquet time (falsely elevated)"
    - "Fist clenching during draw (falsely elevated)"
    - "Leukocytosis >100K or thrombocytosis >1M (falsely elevated)"
    - "Delayed separation of serum/plasma (falsely elevated)"

  interferingMedications:
    - "ACEi/ARBs (increase K)"
    - "K-sparing diuretics (spironolactone, amiloride - increase K)"
    - "NSAIDs (increase K)"
    - "Loop/thiazide diuretics (decrease K)"
    - "Insulin (decrease K - transcellular shift)"
    - "Beta-2 agonists (decrease K)"

  stability: "Separate within 1 hour to prevent falsely elevated K"
  rejectionCriteria: "Grossly hemolyzed specimen (repeat draw required)"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 3.50
  patientCharge: 15.00
  highUtilization: true
  stewardshipRecommendations: "Part of basic metabolic panel - avoid separate ordering"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 25730861 (Hyperkalemia management guidelines)"
  - "PMID: 29032872 (Hypokalemia clinical practice)"
  - "PMID: 31591037 (KDIGO hyperkalemia consensus)"
  - "PMID: 23632675 (Potassium and cardiac arrhythmias)"


guidelineReferences:
  - "KDIGO Controversies Conference on Potassium Homeostasis"
  - "Renal Association Clinical Practice Guidelines"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Basic metabolic panel"
    - "Magnesium (if K <3.0 - must replete Mg to correct K)"
    - "ECG (if K <2.5 or >6.0)"

  reflexTesting:
    result_below_3.0: "Order magnesium level, ECG if <2.5, evaluate for causes"
    result_below_2.5: "URGENT - ECG, cardiac monitoring, IV potassium + magnesium repletion"
    result_above_5.5: "Repeat to confirm (rule out hemolysis), obtain ECG"
    result_above_6.0: "URGENT - ECG, if changes: calcium gluconate. Start treatment (insulin+dextrose, kayexalate)"
    result_above_7.0: "EMERGENT - Stat ECG, calcium gluconate, insulin+dextrose, dialysis consult"

  followUpGuidance: |
    Hypokalemia: Replete K and Mg, recheck q4-6h until >3.5 mEq/L
    Severe hypokalemia: Cardiac monitoring during IV K repletion (max 10-20 mEq/h central line, 10 mEq/h peripheral)
    Hyperkalemia: ECG for all K >6.0, repeat K q2-4h during treatment
    Severe hyperkalemia: Continuous cardiac monitoring, consider dialysis if K >7 or refractory


