# ==================================================================
# MRI BRAIN WITH/WITHOUT CONTRAST IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-MRI-BRAIN-001"
studyName: "MRI Brain with/without Gadolinium Contrast"
cptCode: "70553"
commonNames: "Brain MRI, MRI Head, Cranial MRI"
modality: "MAGNETIC_RESONANCE_IMAGING"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "Remove all metal objects, jewelry, hearing aids. Screen for implants and claustrophobia"
  positioning: "Supine, head in coil"
  views: "T1, T2, FLAIR, DWI sequences. Contrast-enhanced T1 if indicated"
  contrastRequired: false  # Depends on indication - contrast used for tumor, infection, inflammation
  contrastType: "Gadolinium-based contrast agent (10-20 mL IV)"
  sedationRequired: false  # May be needed for claustrophobia or pediatric patients
  specialInstructions: "Must remain motionless for 30-45 minutes. Earplugs provided (loud noises). Screening for MRI safety mandatory"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Generally safe - no ionizing radiation. Gadolinium contrast avoided in first trimester unless essential"

  renalFunction: |
    CHECK eGFR before gadolinium contrast
    eGFR <30: Risk for nephrogenic systemic fibrosis (NSF) with gadolinium - avoid contrast or use macrocyclic agents
    eGFR 30-60: Use lowest dose of macrocyclic gadolinium agents
    eGFR >60: Low risk - standard gadolinium dosing safe

  allergies: |
    Gadolinium allergy rare (<1%) - much safer than iodinated contrast
    Prior gadolinium reaction: Pre-medicate or consider non-contrast study
    Iodine allergy: NOT relevant (gadolinium is different from iodinated contrast)

  implants: |
    CRITICAL MRI SAFETY SCREENING REQUIRED:
    - Pacemaker/ICD: Most modern devices MRI-conditional, verify compatibility
    - Cochlear implants: Many now MRI-conditional, verify model
    - Metallic foreign bodies near eyes: Orbital X-ray to rule out metal fragments
    - Aneurysm clips: Old clips may be ferromagnetic - contraindicated
    - Prosthetic heart valves: Most are MRI-safe
    - Orthopedic hardware: Usually safe but may cause artifact

  pediatricConsiderations: "No radiation - preferred over CT in children. Sedation often required <6 years old"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "0 mSv (MRI uses magnetic field and radio waves - NO ionizing radiation)"
  comparison: "No radiation exposure - completely safe regarding cancer risk"
  justification: "Preferred over CT when radiation avoidance is priority (children, pregnant women, repeated imaging)"
  alara: "Not applicable - no ionizing radiation used"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "STAT for acute stroke (0-1 hour), emergent for suspected abscess/herniation (2-4 hours), 1-7 days for routine"
  urgentAvailability: "24/7 for stroke code and emergent indications in most centers"
  studyDuration: "30-60 minutes (longer than CT)"
  resultsTurnaround: "Preliminary 2-4 hours, final radiology read 12-24 hours, STAT reads <1 hour"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Acute stroke <24 hours (stroke code)"
      acrRating: 9
      clinicalContext: "DWI sequence detects hyperacute infarct within minutes. CT may be normal initially"
      evidence: "AHA/ASA Stroke Guidelines 2018 - MRI more sensitive than CT for acute ischemic stroke"

    - indication: "Suspected brain tumor or mass"
      acrRating: 9
      clinicalContext: "Contrast-enhanced MRI for tumor characterization, extent, surrounding edema"
      evidence: "MRI superior to CT for brain tumor detection and characterization"

    - indication: "Multiple sclerosis evaluation"
      acrRating: 9
      clinicalContext: "FLAIR sequence detects white matter lesions (periventricular, corpus callosum)"
      evidence: "McDonald Criteria 2017 - MRI essential for MS diagnosis"

    - indication: "New-onset seizures"
      acrRating: 8
      clinicalContext: "Evaluate for structural lesion (tumor, vascular malformation, hippocampal sclerosis)"
      evidence: "AAN Practice Parameter - MRI preferred over CT for seizure workup"

    - indication: "Suspected meningitis or encephalitis"
      acrRating: 8
      clinicalContext: "Contrast-enhanced MRI detects meningeal enhancement, abscess, complications"
      evidence: "IDSA Meningitis Guidelines - MRI if focal neurologic signs or concern for complications"

    - indication: "Pituitary adenoma evaluation"
      acrRating: 9
      clinicalContext: "Dedicated pituitary protocol with thin slices, contrast enhancement"
      evidence: "Endocrine Society Guidelines - MRI is gold standard for pituitary imaging"

  may_be_appropriate_4_6:
    - indication: "Chronic stable headache (no red flags)"
      acrRating: 3
      clinicalContext: "Low yield for MRI in chronic tension or migraine headaches without neurologic deficits"
      evidence: "Choosing Wisely - avoid MRI for chronic headache without red flags"

    - indication: "Simple syncope (no neurologic findings)"
      acrRating: 2
      clinicalContext: "Neuroimaging not indicated for simple syncope"
      evidence: "ACC/AHA Syncope Guidelines - brain imaging rarely useful"

  usually_not_appropriate_1_3:
    - indication: "Routine screening (asymptomatic, no risk factors)"
      acrRating: 1
      clinicalContext: "Not indicated for general population screening"
      evidence: "Choosing Wisely - avoid brain MRI for asymptomatic screening"

    - indication: "Uncomplicated concussion"
      acrRating: 2
      clinicalContext: "CT sufficient if imaging needed (rule out bleed). MRI not routinely needed"
      evidence: "CDC Concussion Guidelines - imaging not routinely indicated"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Normal brain parenchyma, no mass lesions, normal ventricles, no abnormal enhancement, no restricted diffusion"

  commonAbnormalities:
    - finding: "Acute ischemic stroke"
      interpretation: "Restricted diffusion on DWI (bright), dark on ADC map. FLAIR shows infarct after 3-6 hours"
      actionable: "If <4.5 hours: tPA if eligible. If <24 hours: thrombectomy if large vessel occlusion. Stroke neurology consult"

    - finding: "Brain tumor (glioma)"
      interpretation: "Mass with enhancement, surrounding edema, mass effect. Grade based on enhancement pattern"
      actionable: "Neurosurgery consult for biopsy/resection, oncology consult, consider dexamethasone for edema"

    - finding: "Multiple sclerosis lesions"
      interpretation: "Periventricular white matter lesions on FLAIR, perpendicular to corpus callosum (Dawson fingers)"
      actionable: "Neurology consult, consider lumbar puncture for oligoclonal bands, initiate disease-modifying therapy"

    - finding: "Brain abscess"
      interpretation: "Ring-enhancing lesion with restricted diffusion, surrounding edema"
      actionable: "Neurosurgery consult for drainage, IV antibiotics, blood cultures, source identification"

    - finding: "Pituitary adenoma"
      interpretation: "Sellar mass, may compress optic chiasm. Macroadenoma >1cm, microadenoma <1cm"
      actionable: "Endocrinology consult, visual field testing, hormone levels (prolactin, IGF-1, cortisol). Surgery if symptomatic"

  criticalFindings:
    - "Acute large vessel occlusion stroke - EMERGENT thrombectomy evaluation"
    - "Brain abscess - neurosurgery consult for drainage"
    - "Herniation (uncal, tonsillar) - EMERGENT neurosurgery consult"
    - "Large brain tumor with mass effect - neurosurgery consult, consider dexamethasone"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute stroke (stroke code) - MRI with DWI preferred over CT"
    - "Suspected brain tumor or mass"
    - "Multiple sclerosis evaluation"
    - "New-onset seizures"
    - "Suspected meningitis/encephalitis with focal signs"
    - "Pituitary adenoma evaluation"

  contraindications:
    - "Cardiac pacemaker/ICD (unless MRI-conditional and verified)"
    - "Metallic foreign body near eyes"
    - "Old aneurysm clips (ferromagnetic)"
    - "Severe claustrophobia without sedation"

  prerequisiteTests:
    - "eGFR if gadolinium contrast planned (within 30 days)"
    - "MRI safety screening questionnaire (mandatory)"
    - "Pregnancy test (women of childbearing age, though MRI generally safe)"

  stewardshipRecommendations: |
    AVOID MRI for chronic headache without red flags (new headache >50yo, thunderclap, neurologic deficits)
    AVOID routine brain MRI for syncope without neurologic findings
    Use NON-CONTRAST MRI for stroke (contrast not needed for acute infarct detection)
    Prefer MRI over CT for children, pregnant women, repeated imaging (no radiation)
    CT faster and more available - use CT for trauma, acute hemorrhage assessment


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate field strength (1.5T or 3T preferred for brain imaging)"
    - "Minimal motion artifact (critical for image quality)"
    - "Appropriate sequences for indication (DWI for stroke, FLAIR for MS, contrast for tumor)"

  followUpGuidance: |
    Brain tumor: Repeat MRI every 2-3 months during treatment, then q3-6 months
    Multiple sclerosis: Annual MRI to monitor disease progression and treatment response
    Stroke: MRI at 24 hours if clinical change, otherwise no routine repeat
    Pituitary adenoma: MRI q6-12 months for surveillance if not surgically treated


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 800.00
  patientCharge: 3000.00
  highUtilization: false  # Lower than CT due to longer scan time and cost
  costEffectiveness: "Higher cost than CT but superior soft tissue contrast and no radiation"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 29367334 (AHA/ASA Stroke Guidelines 2018)"
  - "PMID: 28878060 (McDonald Criteria for MS Diagnosis 2017)"
  - "PMID: 28212506 (ACR Appropriateness Criteria Headache 2019)"
  - "PMID: 27999348 (AAN Seizure Imaging Guidelines 2016)"
  - "PMID: 21975659 (NSF risk with gadolinium - ACRIN data)"


guidelineReferences:
  - "AHA/ASA Guidelines for Early Management of Acute Ischemic Stroke 2018"
  - "McDonald Criteria for Multiple Sclerosis Diagnosis 2017"
  - "ACR Appropriateness Criteria for Headache, Seizures, and Stroke"
  - "AAN Practice Parameter on Neuroimaging in Epilepsy"
  - "Endocrine Society Guidelines on Pituitary Imaging"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    chronic_headache_no_red_flags: "ALERT: MRI not indicated for chronic stable headache without red flags (thunderclap, neurologic deficit, age >50 with new headache)"
    syncope_without_neuro_signs: "ALERT: Brain imaging not indicated for simple syncope without focal neurologic findings"
    mri_safety_screen: "ALERT: MRI safety screening REQUIRED before scan - check for pacemaker, metallic implants, foreign bodies"
    gadolinium_renal_check: "ALERT: eGFR required before gadolinium contrast - order if not available"

  autoOrderWith:
    - "eGFR if gadolinium contrast planned and not checked within 30 days"
    - "MRI safety screening questionnaire (mandatory)"

  reflexOrdering:
    large_vessel_occlusion: "STAT thrombectomy evaluation if acute stroke <24 hours with large vessel occlusion"
    brain_tumor: "Neurosurgery consult, consider dexamethasone if significant edema/mass effect"
    ms_diagnosis: "Neurology consult, consider lumbar puncture for oligoclonal bands"
    pituitary_adenoma: "Endocrinology consult, check prolactin, IGF-1, cortisol, visual field testing"

  followUpGuidance: |
    Acute stroke: Neurology follow-up, secondary prevention (antiplatelet, statin, blood pressure control)
    Brain tumor: Neurosurgery consult for resection, repeat MRI q2-3 months during treatment
    MS: Neurology follow-up, consider disease-modifying therapy, annual MRI
    Pituitary adenoma: Endocrinology follow-up, surgery if macroadenoma or hormone-secreting


