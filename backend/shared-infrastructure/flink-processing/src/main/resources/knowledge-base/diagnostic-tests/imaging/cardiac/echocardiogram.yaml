# ==================================================================
# TRANSTHORACIC ECHOCARDIOGRAM IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-ECHO-TTE-001"
studyName: "Transthoracic Echocardiogram (TTE)"
cptCode: "93306"
commonNames: "Echo, TTE, Cardiac Ultrasound, Echocardiography"
modality: "ULTRASOUND"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "No fasting required. Remove shirt/bra for probe placement"
  positioning: "Left lateral decubitus position"
  views: "Parasternal long/short axis, apical 4-chamber/2-chamber, subcostal, suprasternal"
  contrastRequired: false  # Can use microbubble contrast if poor acoustic windows
  sedationRequired: false
  specialInstructions: "Breath holding during some acquisitions. Takes 30-45 minutes"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Safe - no radiation, preferred cardiac imaging in pregnancy"
  renalFunction: "Not applicable (no contrast, or microbubbles safe in renal failure)"
  allergies: "Generally no allergy concerns (if contrast echo, check for egg/albumin allergy)"
  implants: "Safe with pacemaker/ICD (unlike MRI)"
  pediatricConsiderations: "Safe for all ages, no radiation"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "0 mSv (ultrasound - no ionizing radiation)"
  comparison: "No radiation - completely safe"
  justification: "Preferred imaging for cardiac structure/function assessment"
  alara: "Not applicable - ultrasound is non-ionizing"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Same day for emergent (STEMI, shock), 1-7 days for routine"
  urgentAvailability: "24/7 for emergent indications (can be done at bedside)"
  studyDuration: "30-45 minutes"
  resultsTurnaround: "Preliminary images available immediately, formal cardiology read 4-24 hours"


# ==================================================================
# CLINICAL INDICATIONS & APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Acute myocardial infarction (STEMI/NSTEMI)"
      appropriatenessRating: 9
      clinicalContext: "Assess wall motion abnormalities, ejection fraction, complications (VSR, mitral regurgitation, thrombus)"
      evidence: "ACC/AHA STEMI Guidelines 2013"

    - indication: "New or worsening heart failure"
      appropriatenessRating: 9
      clinicalContext: "Determine ejection fraction (HFrEF vs HFpEF), valve function, volume status"
      evidence: "ACC/AHA Heart Failure Guidelines 2022"

    - indication: "New murmur with symptoms"
      appropriatenessRating: 9
      clinicalContext: "Assess valve stenosis or regurgitation severity"
      evidence: "ACC/AHA Valvular Heart Disease Guidelines 2020"

    - indication: "Suspected endocarditis"
      appropriatenessRating: 9
      clinicalContext: "Evaluate for vegetations, abscess, valve destruction (TTE first, TEE if negative)"
      evidence: "AHA Infective Endocarditis Guidelines 2015"

    - indication: "Cardiogenic shock"
      appropriatenessRating: 9
      clinicalContext: "Assess LV function, RV function, tamponade, acute valvular insufficiency"
      evidence: "Standard of care for undifferentiated shock"

    - indication: "Suspected pericardial effusion or tamponade"
      appropriatenessRating: 9
      clinicalContext: "Diagnose effusion, assess for hemodynamic compromise (RA/RV collapse)"
      evidence: "ESC Pericardial Disease Guidelines 2015"

  may_be_appropriate_4_6:
    - indication: "Atrial fibrillation (initial evaluation)"
      appropriatenessRating: 7
      clinicalContext: "Assess for structural heart disease, LA enlargement, LV function"
      evidence: "AHA/ACC AF Guidelines 2019"

    - indication: "Syncope with suspected cardiac cause"
      appropriatenessRating: 6
      clinicalContext: "Evaluate for structural heart disease, AS, HOCM"
      evidence: "ACC/AHA Syncope Guidelines"

  usually_not_appropriate_1_3:
    - indication: "Routine screening (asymptomatic, no risk factors)"
      appropriatenessRating: 1
      clinicalContext: "Not indicated for general population screening"
      evidence: "Choosing Wisely - avoid routine screening echo"

    - indication: "Routine surveillance of mild valvular disease (asymptomatic, no change)"
      appropriatenessRating: 3
      clinicalContext: "Mild AS/MR stable - surveillance every 3-5 years sufficient"
      evidence: "ACC/AHA Valve Guidelines - avoid annual echo for stable mild disease"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Normal LV size and systolic function (EF 55-70%), normal valves, no effusion"

  keyMeasurements:
    - measurement: "Left ventricular ejection fraction (LVEF)"
      normalRange: "55-70%"
      interpretation: |
        >50%: Normal (HFpEF if heart failure symptoms)
        40-49%: Mildly reduced
        30-39%: Moderately reduced (HFrEF - consider ICD)
        <30%: Severely reduced (HFrEF - ICD indicated)

    - measurement: "Left ventricular end-diastolic dimension (LVEDD)"
      normalRange: "3.9-5.3 cm (women), 4.2-5.9 cm (men)"
      interpretation: "Dilated if >5.3 cm (women) or >5.9 cm (men) - suggests volume overload or DCM"

    - measurement: "Left atrial volume index (LAVI)"
      normalRange: "<34 mL/m²"
      interpretation: "Elevated suggests chronic diastolic dysfunction, AF risk"

    - measurement: "Aortic valve area (AVA)"
      normalRange: "3-4 cm²"
      interpretation: |
        1.0-1.5 cm²: Moderate AS
        <1.0 cm²: Severe AS (consider AVR)
        <0.8 cm²: Critical AS (AVR indicated)

  commonAbnormalities:
    - finding: "Reduced ejection fraction (HFrEF)"
      interpretation: "LVEF <40% indicates systolic dysfunction"
      actionable: "ACE inhibitor, beta-blocker, diuretics, consider ICD if <35% despite optimal medical therapy"

    - finding: "Regional wall motion abnormality"
      interpretation: "Suggests coronary artery disease, prior MI, or acute ischemia"
      actionable: "Cardiac catheterization for revascularization evaluation"

    - finding: "Severe aortic stenosis"
      interpretation: "AVA <1.0 cm², mean gradient >40 mmHg"
      actionable: "Surgical AVR or TAVR evaluation"

    - finding: "Pericardial effusion with tamponade"
      interpretation: "RA/RV collapse, respiratory variation in mitral inflow"
      actionable: "EMERGENT pericardiocentesis"

    - finding: "Vegetation (endocarditis)"
      interpretation: "Mobile mass on valve, abscess formation"
      actionable: "Blood cultures, IV antibiotics, cardiothoracic surgery consult"

  criticalFindings:
    - "Cardiac tamponade - EMERGENT pericardiocentesis"
    - "LVEF <20% - high-risk for sudden cardiac death, consider ICD"
    - "Severe AS with symptoms - urgent AVR/TAVR evaluation"
    - "Acute severe mitral regurgitation - urgent cardiac surgery"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute coronary syndrome (STEMI/NSTEMI)"
    - "New or worsening heart failure"
    - "New murmur"
    - "Suspected endocarditis"
    - "Shock or hypotension (evaluate LV function, tamponade)"
    - "Syncope with suspected cardiac cause"

  contraindications: []  # Echo is very safe, no absolute contraindications

  prerequisiteTests: []

  stewardshipRecommendations: |
    AVOID routine annual echo for stable mild valve disease
    AVOID screening echo in asymptomatic low-risk patients
    Use point-of-care echo (POCUS) for initial assessment in ICU/ED when appropriate
    TTE before TEE for endocarditis evaluation


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate acoustic windows for all standard views"
    - "Use of harmonic imaging to improve image quality"
    - "Contrast echo if poor windows (microbubble contrast)"

  followUpGuidance: |
    Severe AS: Repeat echo q6-12 months if asymptomatic, AVR/TAVR if symptomatic
    Moderate AS: Repeat echo annually
    HFrEF: Repeat echo in 3-6 months after initiation of GDMT to assess for improvement
    Endocarditis: TEE if TTE negative but high clinical suspicion


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 350.00
  patientCharge: 1200.00
  highUtilization: true
  costEffectiveness: "Gold standard for cardiac structure/function assessment, no radiation"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 34614326 (ACC/AHA Heart Failure Guidelines 2022)"
  - "PMID: 33332150 (ACC/AHA Valvular Heart Disease Guidelines 2020)"
  - "PMID: 30686041 (AHA/ACC AF Guidelines 2019)"
  - "PMID: 25956868 (ASE Echo Guidelines 2015)"
  - "PMID: 29222386 (AHA Infective Endocarditis Guidelines 2015)"


guidelineReferences:
  - "ACC/AHA Heart Failure Guidelines 2022"
  - "ACC/AHA Valvular Heart Disease Guidelines 2020"
  - "ASE Echocardiography Guidelines 2015"
  - "ESC Pericardial Disease Guidelines 2015"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    routine_screening: "ALERT: Routine screening echo not recommended for asymptomatic low-risk patients"
    stable_mild_valve: "ALERT: Annual echo not needed for stable mild valve disease - guidelines recommend q3-5 years"

  autoOrderWith: []

  reflexOrdering:
    ef_below_35: "Consider ICD evaluation if LVEF <35% despite optimal medical therapy for >3 months"
    severe_as: "Cardiothoracic surgery consult for AVR or TAVR evaluation"
    vegetation_detected: "Order blood cultures, start empiric antibiotics, cardiac surgery consult"
    tamponade: "EMERGENT pericardiocentesis - cardiology/cardiac surgery consult"

  followUpGuidance: |
    New HFrEF: Repeat echo in 3-6 months after GDMT initiation to assess for improvement
    Severe valve disease: Cardiothoracic surgery referral
    Endocarditis suspicion with negative TTE: Order TEE (higher sensitivity)
    LVEF <35%: Consider ICD if persistent after 3 months of optimal therapy


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ACC/AHA Guidelines 2022, ASE Guidelines 2015, ESC Guidelines"
version: "1.0"
