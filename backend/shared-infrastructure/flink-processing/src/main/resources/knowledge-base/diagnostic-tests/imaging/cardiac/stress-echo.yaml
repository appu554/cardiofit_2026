# ==================================================================
# STRESS ECHOCARDIOGRAM IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-ECHO-STRESS-001"
studyName: "Stress Echocardiogram (Exercise or Dobutamine)"
cptCode: "93351"
commonNames: "Stress Echo, Dobutamine Stress Echo, Exercise Echo"
modality: "ULTRASOUND"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "NPO 4 hours before. Comfortable clothing/shoes for exercise. Hold beta-blockers 24-48 hours if approved by physician"
  positioning: "Left lateral decubitus for imaging, upright for exercise stress"
  views: "Resting images (parasternal, apical views) and peak stress images to assess wall motion"
  contrastRequired: false  # Contrast echo may be used if poor acoustic windows
  sedationRequired: false
  specialInstructions: "Exercise stress: Treadmill or bike to target heart rate. Dobutamine stress: IV infusion with incremental dosing. 45-60 minutes total"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Safe - no radiation. Preferred cardiac stress test in pregnancy if indicated"

  renalFunction: "Not applicable (no contrast, or microbubbles safe in renal failure)"

  allergies: "Generally no allergy concerns (if contrast echo, check for egg/albumin allergy)"

  implants: "Safe with pacemaker/ICD (unlike MRI)"

  contraindications: |
    Absolute contraindications:
    - Acute MI within 48 hours
    - Unstable angina
    - Uncontrolled arrhythmias
    - Symptomatic severe aortic stenosis
    - Acute myocarditis, pericarditis, endocarditis
    - Acute pulmonary embolism
    - Acute aortic dissection
    Relative contraindications:
    - Severe hypertension (SBP >200, DBP >110)
    - Significant left main coronary stenosis
    - Moderate stenotic valvular disease
    - High-degree AV block

  pediatricConsiderations: "Safe for all ages, no radiation"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "0 mSv (ultrasound - no ionizing radiation)"
  comparison: "No radiation - completely safe (vs nuclear stress test 10-15 mSv)"
  justification: "Preferred stress imaging modality when radiation avoidance is priority"
  alara: "Not applicable - ultrasound is non-ionizing"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Outpatient scheduled test - 1-14 days depending on urgency"
  urgentAvailability: "Not typically done emergently (stress ECG sufficient for acute scenarios)"
  studyDuration: "45-60 minutes (resting echo, stress protocol, recovery imaging)"
  resultsTurnaround: "Preliminary interpretation immediate, formal cardiology read 4-24 hours"


# ==================================================================
# CLINICAL INDICATIONS & APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Chest pain with intermediate pretest probability of CAD"
      appropriatenessRating: 9
      clinicalContext: "Detect inducible ischemia (wall motion abnormality at peak stress)"
      evidence: "ACC/AHA Guidelines on Stable Ischemic Heart Disease 2012"

    - indication: "Unable to exercise (orthopedic limitations, deconditioning)"
      appropriatenessRating: 9
      clinicalContext: "Dobutamine stress echo alternative to exercise testing"
      evidence: "Standard alternative when exercise not feasible"

    - indication: "Equivocal or uninterpretable stress ECG"
      appropriatenessRating: 8
      clinicalContext: "Stress echo provides direct visualization of ischemia (wall motion abnormality)"
      evidence: "ACC/AHA Guidelines - imaging stress test if baseline ECG abnormalities"

    - indication: "Risk stratification after ACS"
      appropriatenessRating: 8
      clinicalContext: "Assess residual ischemia and viable myocardium"
      evidence: "ACC/AHA NSTEMI Guidelines - stress imaging for risk stratification"

    - indication: "Evaluation of known CAD or prior revascularization"
      appropriatenessRating: 8
      clinicalContext: "Assess for interval change in ischemic burden"
      evidence: "ACC/AHA Guidelines on Revascularization 2011"

  may_be_appropriate_4_6:
    - indication: "Low pretest probability chest pain"
      appropriatenessRating: 4
      clinicalContext: "Low yield - consider clinical evaluation only"
      evidence: "Choosing Wisely - avoid stress testing in low-risk chest pain"

    - indication: "Asymptomatic screening (low-risk patients)"
      appropriatenessRating: 2
      clinicalContext: "Not indicated without symptoms or high-risk features"
      evidence: "USPSTF recommends against routine screening stress tests"

  usually_not_appropriate_1_3:
    - indication: "Routine screening in asymptomatic low-risk patients"
      appropriatenessRating: 1
      clinicalContext: "No evidence of benefit, high false positive rate"
      evidence: "Choosing Wisely - avoid routine stress testing in asymptomatic patients"

    - indication: "High pretest probability of CAD with typical angina"
      appropriatenessRating: 3
      clinicalContext: "Proceed directly to coronary angiography"
      evidence: "ACC/AHA Guidelines - high pretest probability warrants angiography, not stress test"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "No inducible wall motion abnormalities at peak stress, adequate heart rate achieved (≥85% age-predicted max HR), normal augmentation of LV function"

  keyMeasurements:
    - measurement: "Target heart rate"
      normalRange: "≥85% of age-predicted maximum heart rate (220 - age)"
      interpretation: |
        Achieved target HR: Adequate stress, negative test is reliable
        Suboptimal HR (<85%): Test may be non-diagnostic

    - measurement: "Wall motion score index (WMSI)"
      normalRange: "1.0 (normal wall motion in all segments)"
      interpretation: |
        1.0: Normal
        >1.0: Wall motion abnormality (higher score = more segments affected)

  commonAbnormalities:
    - finding: "Inducible wall motion abnormality"
      interpretation: "New or worsening hypokinesis/akinesis in coronary territory at peak stress - indicates ischemia"
      actionable: "Positive for ischemia - coronary angiography for anatomic definition and revascularization consideration"

    - finding: "Resting wall motion abnormality without worsening at stress"
      interpretation: "Prior MI with scar, no active ischemia"
      actionable: "Optimize medical therapy, no urgent revascularization needed"

    - finding: "Viable myocardium (improvement with low-dose dobutamine)"
      interpretation: "Hibernating myocardium - may benefit from revascularization"
      actionable: "Consider revascularization if significant viable territory"

    - finding: "Hypotensive response to stress"
      interpretation: "Concerning for severe CAD, left main disease, or multivessel disease"
      actionable: "URGENT cardiology consult, consider coronary angiography"

  criticalFindings:
    - "Extensive inducible ischemia (>2 coronary territories) - high-risk for events, urgent angiography"
    - "Hypotensive response with ischemia - concerning for left main or severe multivessel CAD"
    - "Sustained ventricular tachycardia during stress - terminate test, cardiology consult"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Intermediate pretest probability chest pain"
    - "Unable to exercise (dobutamine stress as alternative)"
    - "Equivocal or uninterpretable stress ECG (LBBB, paced rhythm, baseline ST changes)"
    - "Risk stratification after ACS"
    - "Evaluation of known CAD or prior revascularization"

  contraindications:
    - "Acute MI within 48 hours"
    - "Unstable angina"
    - "Severe symptomatic aortic stenosis"
    - "Uncontrolled arrhythmias"
    - "Acute PE, myocarditis, pericarditis, endocarditis, aortic dissection"

  prerequisiteTests:
    - "Resting ECG"
    - "Recent echocardiogram (if structural heart disease suspected)"

  stewardshipRecommendations: |
    AVOID stress testing in low pretest probability chest pain (Choosing Wisely)
    AVOID routine screening stress tests in asymptomatic low-risk patients
    Use stress ECHO (not nuclear) if radiation avoidance desired (pregnancy, young patients)
    Proceed directly to angiography if high pretest probability of CAD


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate heart rate achieved (≥85% age-predicted max)"
    - "Adequate image quality at rest and peak stress"
    - "Complete 16-segment wall motion assessment"

  followUpGuidance: |
    Normal stress echo: No further cardiac workup needed, reassess if symptoms change
    Positive stress echo (inducible ischemia): Coronary angiography for anatomic definition
    Indeterminate/non-diagnostic (suboptimal HR): Consider pharmacologic stress or nuclear stress test
    High-risk features (extensive ischemia, hypotension): Urgent angiography


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 500.00
  patientCharge: 1500.00
  highUtilization: true
  costEffectiveness: "Cost-effective alternative to nuclear stress test (no radiation, lower cost)"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 23277334 (ACC/AHA Stable Ischemic Heart Disease Guidelines 2012)"
  - "PMID: 22070834 (ACC/AHA PCI Revascularization Guidelines 2011)"
  - "PMID: 25085961 (AHA Exercise Testing Guidelines 2013)"
  - "PMID: 23608470 (Stress Echo Accuracy Meta-analysis 2013)"
  - "PMID: 30423392 (Choosing Wisely - avoiding inappropriate stress tests 2018)"


guidelineReferences:
  - "ACC/AHA Guidelines on Stable Ischemic Heart Disease 2012"
  - "ACC/AHA Guidelines on NSTEMI Management 2014"
  - "AHA Scientific Statement on Exercise Testing 2013"
  - "Choosing Wisely - American College of Cardiology"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    low_pretest_probability: "ALERT: Stress testing not indicated for low pretest probability chest pain (Choosing Wisely)"
    routine_screening: "ALERT: Stress testing NOT recommended for routine screening in asymptomatic low-risk patients"
    high_pretest_probability: "ALERT: High pretest probability of CAD - consider proceeding directly to coronary angiography"

  autoOrderWith:
    - "Resting ECG (if not done within 30 days)"
    - "Consider resting echocardiogram if structural heart disease suspected"

  reflexOrdering:
    positive_stress_echo: "Coronary angiography for anatomic definition and revascularization evaluation"
    high_risk_features: "URGENT cardiology consult - extensive ischemia, hypotension, or sustained arrhythmia"
    indeterminate_test: "Consider alternative stress modality (nuclear stress, coronary CTA, or angiography)"

  followUpGuidance: |
    Normal stress echo: Reassurance, optimize risk factors, reassess if symptoms change
    Positive stress echo: Coronary angiography, cardiology follow-up
    Indeterminate: Repeat with alternative modality or proceed to angiography based on clinical suspicion
    High-risk features: URGENT angiography within 24-48 hours


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ACC/AHA Stable Ischemic Heart Disease Guidelines 2012, AHA Exercise Testing Guidelines 2013"
version: "1.0"


# ==================================================================
# PERFORMANCE CHARACTERISTICS
# ==================================================================
diagnosticAccuracy:
  sensitivity: "80-85%"
  specificity: "80-88%"
  positivePrediciveValue: "Variable based on pretest probability"
  negativePrediciveValue: ">95% if adequate stress achieved"
  comparison: "Similar accuracy to nuclear stress test, lower sensitivity than coronary angiography (gold standard)"
