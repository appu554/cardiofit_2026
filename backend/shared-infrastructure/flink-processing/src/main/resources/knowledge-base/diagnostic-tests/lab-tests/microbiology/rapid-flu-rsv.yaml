# Rapid Influenza and RSV Detection Test
# Rapid antigen-based detection of Influenza A/B and Respiratory Syncytial Virus

TestID: "rapid-flu-rsv"
TestName: "Rapid Influenza A/B and RSV Antigen Test"
Category: "Microbiology"
Subcategory: "Rapid Viral Detection"

LOINCCode: "92142-9"
LOINCDisplay: "Influenza virus A and B and RSV RNA panel - Respiratory specimen by NAA with probe detection"

CPTCodes:
  - Code: "87804"
    Description: "Influenza virus, immunoassay with direct optical observation"
  - Code: "87807"
    Description: "Respiratory syncytial virus, immunoassay with direct optical observation"
  - Code: "87631"
    Description: "Respiratory virus (multiplex) reverse transcription and amplified probe technique"

SpecimenType: "Nasopharyngeal swab or nasal aspirate"
SpecimenVolume: "One swab or 1-2 mL aspirate"
SpecimenContainer: "Viral transport media (VTM) or manufacturer-specific collection device"

CollectionInstructions:
  - "PREFERRED: Nasopharyngeal (NP) swab for highest sensitivity"
  - "Insert swab into nostril parallel to palate (not upward)"
  - "Advance until resistance felt at nasopharynx (6-10 cm adults, 3-5 cm pediatrics)"
  - "Rotate swab gently for 3-5 seconds, leave in place briefly"
  - "Withdraw swab slowly with rotating motion"
  - "Place swab immediately into transport media or test device"
  - "ALTERNATIVE: Anterior nasal swab (slightly lower sensitivity)"
  - "BEST TIME: Collect within 3-4 days of symptom onset (highest viral load)"
  - "Label with patient ID, date/time, collection site"

SpecialHandling:
  - "Test immediately for best results (point-of-care test)"
  - "If transport required: refrigerate at 2-8°C, test within 24 hours"
  - "Do NOT freeze specimen"
  - "Room temperature acceptable if tested within 2 hours"

ReferenceRange:
  Normal: "Negative for Influenza A, Influenza B, and RSV"
  Interpretation: "No viral antigens detected - does not rule out influenza or RSV infection"

AbnormalValues:
  - Value: "Influenza A Positive"
    Severity: "HIGH"
    ClinicalSignificance: "Influenza A infection - consider antiviral therapy if within 48 hours of onset"
    AutoNotify: false
  - Value: "Influenza B Positive"
    Severity: "HIGH"
    ClinicalSignificance: "Influenza B infection - consider antiviral therapy if within 48 hours of onset"
    AutoNotify: false
  - Value: "RSV Positive"
    Severity: "HIGH"
    ClinicalSignificance: "RSV infection - high risk for infants, elderly, immunocompromised; contact precautions"
    AutoNotify: false
  - Value: "Co-infection (Influenza + RSV)"
    Severity: "HIGH"
    ClinicalSignificance: "Dual viral infection - increased disease severity risk"

TurnaroundTime:
  Preliminary: "15-30 minutes (point-of-care rapid antigen test)"
  Final: "15-30 minutes (no additional testing unless confirmatory PCR ordered)"
  Stat: "15-30 minutes (point-of-care test)"

CriticalValues:
  - Value: "None (results reported immediately upon completion)"
    Action: "Provider notified directly if point-of-care test"
    Timeframe: "Immediate (15-30 minutes)"

Indications:
  - "Acute respiratory illness with fever and cough during flu season"
  - "Influenza-like illness (ILI): fever ≥100°F + cough or sore throat"
  - "High-risk patients: age <2 years, >65 years, pregnancy, immunocompromised"
  - "Hospitalized patients with suspected influenza or RSV"
  - "Outbreak investigation in healthcare or institutional settings"
  - "Consideration of antiviral therapy (oseltamivir, baloxavir)"
  - "Pediatric respiratory distress with wheezing (RSV)"

Contraindications:
  - "None absolute"
  - "Test within 3-4 days of symptom onset for optimal accuracy"

AutoOrderWith:
  - TestID: "chest-xray"
    Reason: "If respiratory distress or pneumonia suspected"
  - TestID: "cbc-with-differential"
    Reason: "Assess infection severity (leukopenia common with viral infections)"
  - TestID: "respiratory-pathogen-panel-pcr"
    Reason: "If rapid test negative but high clinical suspicion - PCR more sensitive"

InterpretationGuidance:
  - Context: "Test sensitivity and specificity"
    Guidance: "Rapid antigen tests: 50-70% sensitivity, 90-95% specificity; PCR: >95% sensitivity"
  - Context: "Negative rapid test"
    Guidance: "Does NOT rule out influenza/RSV - consider PCR confirmatory testing if high suspicion"
  - Context: "Positive rapid test"
    Guidance: "True positive highly likely (high specificity) - start treatment if indicated"
  - Context: "Timing of collection"
    Guidance: "Sensitivity highest within 3-4 days of symptom onset (peak viral shedding)"
  - Context: "Influenza treatment window"
    Guidance: "Antiviral therapy most effective if started within 48 hours of symptom onset"

ClinicalNotes:
  - "Rapid antigen tests have lower sensitivity than PCR (50-70% vs >95%)"
  - "Negative rapid test does NOT exclude influenza/RSV - PCR confirmatory if high suspicion"
  - "Positive rapid test highly specific - false positives rare"
  - "Oseltamivir (Tamiflu) reduces symptom duration by ~1 day if started within 48 hours"
  - "Influenza treatment indications: hospitalized patients, high-risk patients, severe illness"
  - "RSV treatment primarily supportive (hydration, oxygen, bronchodilators)"
  - "RSV can cause severe bronchiolitis in infants (<1 year) and elderly"
  - "Contact precautions for RSV-positive patients in healthcare settings"
  - "Influenza season: October-May (Northern Hemisphere)"

TestPerformanceCharacteristics:
  Sensitivity: "50-70% (rapid antigen), >95% (PCR)"
  Specificity: "90-95% (rapid antigen), >95% (PCR)"
  PositivePredictiveValue: "Variable - depends on influenza prevalence in community"
  NegativePredictiveValue: "Moderate - negative result does not rule out infection"

QualityMetrics:
  TimeToResult: "15-30 minutes for point-of-care test"
  PreAnalyticRejectionCriteria:
    - "Insufficient specimen"
    - "Dry swab (no transport media)"
    - "Specimen >24 hours old without refrigeration"
    - "Unlabeled specimen"

RegionalConsiderations:
  - Region: "All"
    Note: "Influenza activity peaks December-February; RSV peaks fall through spring"
  - Region: "Global"
    Note: "Influenza strains vary by season and region - annual vaccination recommended"

RegulatoryCodes:
  CLIA_Complexity: "Waived (most rapid point-of-care tests)"
  RequiresApproval: false

EvidenceLevel: "A"
EvidenceReferences:
  - "CDC Influenza Testing Guidance for Clinicians (2023-2024 season)"
  - "IDSA Clinical Practice Guidelines for Seasonal Influenza (2018)"
  - "American Academy of Pediatrics Red Book: RSV Infection (2021)"

CostConsiderations:
  EstimatedCost_USD: "20-50 (rapid antigen test), $100-200 (respiratory PCR panel)"
  ReimbursementNotes: "Covered by most insurance during flu season for symptomatic patients"

PatientInstructions:
  - "Avoid eating, drinking, or nasal medications 1 hour before test"
  - "Expect brief discomfort during nasopharyngeal swab collection"
  - "Results available in 15-30 minutes"
  - "If positive for influenza: start antiviral therapy if within 48 hours of symptom onset"
  - "Practice respiratory hygiene: cover coughs, hand hygiene, stay home when sick"

ClinicalDecisionSupport:
  - Condition: "Positive Influenza A or B"
    Recommendation: "Consider oseltamivir (Tamiflu) 75 mg PO BID x 5 days if within 48 hours of onset"
  - Condition: "High-risk patient with negative rapid test"
    Recommendation: "Consider empiric antiviral therapy while awaiting PCR confirmation"
  - Condition: "Positive RSV in infant <1 year"
    Recommendation: "Monitor for respiratory distress; consider hospitalization if oxygen saturation <92%"
  - Condition: "Healthcare worker with positive test"
    Recommendation: "Exclude from work for 24 hours after fever resolves without antipyretics"

InfectionControlMeasures:
  - Organism: "Influenza A/B"
    Precautions: "Droplet precautions for hospitalized patients; healthcare workers avoid work x 24 hours after fever"
  - Organism: "RSV"
    Precautions: "Contact and droplet precautions for hospitalized patients; cohort RSV-positive infants"

LastUpdated: "2025-01-15"
Version: "1.0"
