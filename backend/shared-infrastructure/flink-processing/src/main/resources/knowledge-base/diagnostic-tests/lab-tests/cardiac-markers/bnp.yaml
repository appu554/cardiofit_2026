# ==================================================================
# BNP TEST DEFINITION
# ==================================================================
testId: "LAB-BNP-001"
testName: "BNP"
loincCode: "30934-4"
commonNames: "B-type Natriuretic Peptide, Brain Natriuretic Peptide"
category: "CARDIAC_MARKERS"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Lavender top (EDTA) tube"
  volumeRequired: 3.0  # mL
  specialHandling: "Keep sample at room temperature, process within 4 hours, or refrigerate at 2-8°C"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 90
  urgentTurnaroundMinutes: 45
  criticalResultMinutes: 45
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "pg/mL"
    normal:
      min: 0.0
      max: 100.0
      interpretation: "Heart failure unlikely"
    critical:
      criticalLow: null
      criticalHigh: 400.0
      criticalInterpretation: "Heart failure likely - urgent evaluation required"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "<100 pg/mL: Heart failure unlikely (NPV >90%)"
    elevated_mild: "100-400 pg/mL: Gray zone - heart failure possible, consider other causes"
    elevated_moderate: "400-900 pg/mL: Heart failure likely - evaluate severity and etiology"
    elevated_severe: ">900 pg/mL: Heart failure very likely - urgent management required"
    critical: ">400 pg/mL: CRITICAL VALUE - Urgent cardiology evaluation and treatment"

  clinicalSignificance: |
    BNP is secreted by cardiac ventricles in response to increased wall stretch and volume overload.
    Excellent rule-out test for acute heart failure (NPV >90% when <100 pg/mL).
    Levels correlate with HF severity and prognosis. Rapid clearance (half-life 20 minutes)
    makes BNP responsive to acute changes. Higher levels in women, elderly, and renal dysfunction.
    Lower levels in obesity. Used for HF diagnosis, prognosis, and guiding therapy.

  commonCauses:
    - "Acute heart failure (decompensated HF)"
    - "Chronic heart failure (systolic or diastolic)"
    - "Acute coronary syndrome"
    - "Pulmonary embolism"
    - "Severe renal failure"
    - "Pulmonary hypertension"
    - "Valvular heart disease"
    - "Atrial fibrillation"
    - "Sepsis with myocardial dysfunction"

  differentialDiagnosis:
    - "Acute HF: BNP >400 pg/mL with dyspnea and clinical signs"
    - "Chronic stable HF: Elevated but lower than acute decompensation"
    - "Dyspnea not due to HF: BNP <100 pg/mL suggests alternative cause"
    - "Renal dysfunction: Chronically elevated, interpret with caution"

  actionableFindings: |
    BNP <100 pg/mL: Heart failure unlikely, consider other causes of dyspnea
    BNP 100-400 pg/mL: Gray zone - correlate with clinical picture and echocardiography
    BNP >400 pg/mL: Heart failure likely - initiate diuretic therapy and cardiology evaluation
    BNP >900 pg/mL: Severe heart failure - consider ICU admission and aggressive management
    Rising BNP trend: Worsening HF or inadequate treatment
    Falling BNP trend: Improving HF, effective therapy


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Acute dyspnea of unclear etiology"
    - "Suspected acute heart failure"
    - "Risk stratification in known heart failure"
    - "Monitoring response to heart failure therapy"
    - "Prognosis assessment in ACS"
    - "Screening high-risk patients"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 24  # For monitoring therapy response
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Age (increases with age)"
    - "Sex (higher in women)"
    - "Renal function (elevated in renal failure)"
    - "Obesity (lower levels, adipocytes clear BNP)"
    - "Atrial fibrillation (elevated)"

  interferingMedications:
    - "Sacubitril/valsartan (increases BNP, use NT-proBNP instead)"
    - "Neprilysin inhibitors (interfere with BNP clearance)"

  stability: "4 hours at room temperature, 24 hours at 2-8°C, 6 months frozen"
  rejectionCriteria: "Clotted specimen, insufficient volume, improper tube type"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 35.00
  patientCharge: 120.00
  highUtilization: true
  stewardshipRecommendations: "Use BNP to rule out HF in emergency department dyspnea evaluation. Serial BNP for monitoring therapy response and prognosis"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 12084585 (Breathing Not Properly study - BNP in acute dyspnea)"
  - "PMID: 15364186 (BNP-guided therapy trial)"
  - "PMID: 28942432 (ACC/AHA HF Guidelines)"
  - "PMID: 27206819 (ESC HF Guidelines)"
  - "PMID: 16533910 (BNP for prognosis in ACS)"

guidelineReferences:
  - "ACC/AHA/HFSA Heart Failure Guidelines (2022)"
  - "ESC Heart Failure Guidelines (2021)"
  - "NICE Heart Failure Guidelines (2018)"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Echocardiogram (if not done recently)"
    - "ECG (12-lead)"
    - "Complete metabolic panel (especially creatinine)"
    - "Chest X-ray"
    - "CBC"
    - "Troponin (if ACS suspected)"

  reflexTesting:
    result_above_400: "Order echocardiogram if not done within 6 months"
    result_above_900: "URGENT - Cardiology consult and consider ICU admission"

  followUpGuidance: |
    BNP <100: HF unlikely, pursue alternative diagnoses
    BNP 100-400: Gray zone - order echocardiogram and chest X-ray
    BNP >400: Initiate HF therapy (diuretics, ACE-I/ARB, beta-blocker)
    Serial BNP monitoring: Every 24-48 hours during acute HF treatment
    Outpatient monitoring: Every 3-6 months for chronic HF management
    BNP reduction >30% indicates adequate therapy response
    Note: If patient on sacubitril/valsartan, use NT-proBNP instead


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ACC/AHA HF Guidelines, ESC HF Guidelines, Institutional Lab Manual"
version: "1.0"
