# Blood Culture - Aerobic
# Detection of aerobic bacteria in bloodstream for bacteremia/sepsis diagnosis

TestID: "blood-culture-aerobic"
TestName: "Blood Culture, Aerobic"
Category: "Microbiology"
Subcategory: "Blood Culture"

LOINCCode: "600-7"
LOINCDisplay: "Blood culture aerobic"

CPTCodes:
  - Code: "87040"
    Description: "Culture, bacterial; blood, aerobic"
  - Code: "87070"
    Description: "Culture, bacterial; any other source except urine, blood or stool, aerobic"
  - Code: "87184"
    Description: "Susceptibility studies, antimicrobial agent; disk method, per plate (12 or fewer agents)"

SpecimenType: "Blood"
SpecimenVolume: "8-10 mL per bottle (adults), 1-5 mL (pediatrics)"
SpecimenContainer: "Aerobic blood culture bottle (yellow or green cap)"

CollectionInstructions:
  - "Draw 2 sets from different venipuncture sites, 10-15 minutes apart"
  - "Collect BEFORE antibiotic administration whenever possible"
  - "Strict aseptic technique to prevent contamination"
  - "Disinfect bottle tops with 70% alcohol, allow to dry"
  - "Inoculate aerobic bottle first if drawing both aerobic and anaerobic"
  - "Do NOT draw through existing IV lines unless no other option"
  - "Label each bottle with patient ID, date/time, and collection site"

SpecialHandling:
  - "Transport to lab immediately at room temperature"
  - "Do NOT refrigerate - maintains optimal growth temperature"
  - "Load into automated blood culture system within 4 hours"
  - "Maintain specimen at 20-25°C during transport"

ReferenceRange:
  Normal: "No growth after 5 days incubation"
  Interpretation: "Negative blood culture - no bacteremia detected"

AbnormalValues:
  - Value: "Growth detected"
    Severity: "CRITICAL"
    ClinicalSignificance: "Bacteremia/sepsis present - requires immediate antibiotic therapy"
    AutoNotify: true
    NotificationRecipients: ["ordering_physician", "infectious_disease", "pharmacy"]
  - Value: "Gram positive cocci in clusters"
    Severity: "CRITICAL"
    ClinicalSignificance: "Possible Staphylococcus aureus - high mortality risk"
  - Value: "Gram negative rods"
    Severity: "CRITICAL"
    ClinicalSignificance: "Possible Enterobacteriaceae or Pseudomonas - broad spectrum coverage needed"
  - Value: "Contaminant (single positive bottle, skin flora)"
    Severity: "WARNING"
    ClinicalSignificance: "Likely contamination - clinical correlation required"

TurnaroundTime:
  Preliminary: "2-4 hours (Gram stain if positive)"
  Intermediate: "24-48 hours (preliminary organism identification)"
  Final: "3-5 days (final identification and susceptibility)"
  Stat: "Same day (Gram stain and preliminary culture)"

CriticalValues:
  - Value: "Any positive blood culture"
    Action: "Immediate phone notification to ordering provider"
    Timeframe: "Within 1 hour of detection"

Indications:
  - "Suspected bacteremia or sepsis"
  - "Fever of unknown origin"
  - "Signs of systemic infection (SIRS criteria)"
  - "Endocarditis evaluation"
  - "Immunocompromised patients with fever"
  - "Post-operative fever"
  - "Central line-associated bloodstream infection (CLABSI) evaluation"

Contraindications:
  - "None absolute"
  - "Use caution with coagulopathy (bleeding risk)"

AutoOrderWith:
  - TestID: "lactate-serum"
    Reason: "Sepsis evaluation - elevated lactate indicates tissue hypoperfusion"
  - TestID: "cbc-with-differential"
    Reason: "Assess infection severity and immune response"
  - TestID: "procalcitonin"
    Reason: "Bacterial infection biomarker"
  - TestID: "blood-culture-anaerobic"
    Reason: "Complete blood culture set requires both aerobic and anaerobic bottles"

InterpretationGuidance:
  - Context: "Clinical presentation and timing"
    Guidance: "Two positive blood cultures from separate sites within 48 hours = true bacteremia"
  - Context: "Single positive culture with skin flora"
    Guidance: "Single coagulase-negative Staphylococcus often represents contamination"
  - Context: "Time to positivity"
    Guidance: "Positive within 12-24 hours suggests high bacterial load (>100 CFU/mL)"
  - Context: "Common organisms"
    Guidance: "S. aureus, E. coli, Klebsiella, Streptococcus, Enterococcus, Pseudomonas"

ClinicalNotes:
  - "Draw cultures BEFORE starting antibiotics - reduces sensitivity by 35-40%"
  - "Two sets (4 bottles total: 2 aerobic + 2 anaerobic) is standard for suspected bacteremia"
  - "Positive culture triggers antibiotic susceptibility testing (AST)"
  - "CLABSI requires simultaneous draw from central line and peripheral site"
  - "Contamination rate should be <3% for proper collection technique"
  - "Consider endocarditis with persistent positive cultures (>3 days)"

QualityMetrics:
  ContaminationRateTarget: "<3%"
  TimeToNotification: "<1 hour for positive cultures"
  PreAnalyticRejectionCriteria:
    - "Insufficient volume (<1 mL)"
    - "Clotted specimen"
    - "Unlabeled bottle"

Regulatory:
  CLIA_Complexity: "High"
  RequiresApproval: false

EvidenceLevel: "A"
EvidenceReferences:
  - "IDSA/ATS Guidelines for Healthcare-Associated Pneumonia and Bacteremia (2016)"
  - "Clinical Microbiology Procedures Handbook, ASM Press (4th Edition)"
  - "Surviving Sepsis Campaign Guidelines (2021)"

LastUpdated: "2025-01-15"
Version: "1.0"
