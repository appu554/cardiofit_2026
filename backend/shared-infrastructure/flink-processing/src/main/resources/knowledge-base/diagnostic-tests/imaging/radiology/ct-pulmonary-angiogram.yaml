# ==================================================================
# CT PULMONARY ANGIOGRAM (CTPA) IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-CTPA-001"
studyName: "CT Pulmonary Angiogram (CTPA)"
cptCode: "71275"
commonNames: "CTPA, CT Angiography Chest, PE Protocol CT"
modality: "COMPUTED_TOMOGRAPHY"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "NPO 2 hours before IV contrast. Remove metal objects"
  positioning: "Supine, arms above head"
  views: "Axial slices with coronal/sagittal reconstructions, pulmonary arterial phase timing"
  contrastRequired: true  # Timed bolus essential for pulmonary artery opacification
  contrastType: "Iodinated IV contrast (80-100 mL) with bolus tracking for optimal pulmonary arterial phase"
  sedationRequired: false
  specialInstructions: "Deep breath hold during acquisition (10-15 seconds). 18-20 gauge IV required for high flow rate (4-5 mL/sec)"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Relative contraindication - VQ scan preferred if mother hemodynamically stable. CTPA if high suspicion and unstable"

  renalFunction: |
    CHECK CREATININE before IV contrast administration
    eGFR <30: High risk for contrast-induced nephropathy (CIN) - consider VQ scan
    eGFR 30-45: Moderate risk - ensure hydration, risk vs benefit assessment
    eGFR >45: Low risk - hydration recommended
    Acute kidney injury: Consider VQ scan if available

  allergies: |
    Contrast allergy history: Pre-medicate with corticosteroids + antihistamine
    Severe prior reaction: Consider VQ scan as alternative
    Shellfish allergy: NOT a contraindication (myth debunked)

  implants: "Pacemaker/ICD not contraindication for CT (unlike MRI)"

  pediatricConsiderations: "Minimize radiation - use weight-based protocols, consider VQ scan if appropriate"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "7-15 mSv (CTPA)"
  comparison: "Equivalent to 2-5 years of natural background radiation, higher breast dose in women"
  justification: "Essential for PE diagnosis - gold standard imaging modality"
  alara: "Use prospective ECG gating if available, reduce mA in obese patients, limit scan range to lung apices to diaphragm"
  cancerRisk: "Estimated 1 in 2000 lifetime cancer risk, higher in young women due to breast radiation exposure"
  breastDoseConsideration: "Young women: VQ scan has lower breast radiation dose - consider as alternative"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "STAT for hemodynamically unstable or high-risk PE (0-2 hours), urgent same day for others"
  urgentAvailability: "24/7 for emergent indications"
  studyDuration: "10-15 minutes including contrast administration"
  resultsTurnaround: "Preliminary 1 hour, final radiology read 2-4 hours, STAT reads <30 minutes"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Suspected pulmonary embolism with positive Wells score or PERC rule"
      acrRating: 9
      clinicalContext: "Wells >4 (PE likely) or Wells 2-4 with positive D-dimer"
      evidence: "PIOPED III study - CTPA sensitivity 83%, specificity 96% for PE"

    - indication: "Suspected PE in pregnancy (high clinical suspicion)"
      acrRating: 8
      clinicalContext: "After negative lower extremity ultrasound, if high suspicion persists"
      evidence: "ACR-SPR Practice Parameter - CTPA acceptable in pregnancy when indicated"

    - indication: "Hemodynamically unstable patient with suspected massive PE"
      acrRating: 9
      clinicalContext: "Assess RV strain, clot burden, consider thrombolysis"
      evidence: "ESC Pulmonary Embolism Guidelines 2019"

    - indication: "Suspected chronic thromboembolic pulmonary hypertension (CTEPH)"
      acrRating: 8
      clinicalContext: "Evaluate for chronic clot, mosaic attenuation pattern"
      evidence: "CHEST Guidelines on CTEPH 2019"

  may_be_appropriate_4_6:
    - indication: "Low pretest probability PE (Wells <2) with negative D-dimer"
      acrRating: 2
      clinicalContext: "PE effectively ruled out - CTPA NOT indicated"
      evidence: "YEARS Algorithm - D-dimer <500 with Wells <2 rules out PE"

    - indication: "Moderate pretest probability with negative D-dimer (age-adjusted)"
      acrRating: 3
      clinicalContext: "Age-adjusted D-dimer may allow avoidance of CTPA in elderly"
      evidence: "ADJUST-PE Study - age-adjusted D-dimer safely reduces CTPA use"

  usually_not_appropriate_1_3:
    - indication: "Low pretest probability (Wells <2) without D-dimer"
      acrRating: 1
      clinicalContext: "Order D-dimer first to risk stratify"
      evidence: "Choosing Wisely - avoid CTPA without pretest probability assessment and D-dimer"

    - indication: "Routine screening for PE in asymptomatic patients"
      acrRating: 1
      clinicalContext: "Not indicated without clinical suspicion"
      evidence: "No evidence for routine screening"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Patent pulmonary arteries without filling defects, normal RV size, no parenchymal abnormalities"

  commonAbnormalities:
    - finding: "Acute pulmonary embolism"
      interpretation: "Filling defect in pulmonary artery - central vs peripheral, unilateral vs bilateral. Assess RV/LV ratio"
      actionable: "Anticoagulation (heparin or DOAC), assess hemodynamic stability, consider thrombolysis if massive PE with RV strain"

    - finding: "Massive PE with RV strain"
      interpretation: "RV/LV ratio >1.0, RV dilation, septal bowing, clot burden score"
      actionable: "ICU admission, consider systemic thrombolysis (tPA) or catheter-directed therapy, cardiology consult"

    - finding: "Saddle pulmonary embolus"
      interpretation: "Clot at bifurcation of main pulmonary artery, high clot burden"
      actionable: "High mortality risk - aggressive anticoagulation, consider thrombolysis if unstable"

    - finding: "Subsegmental PE"
      interpretation: "Small peripheral clot in subsegmental arteries, clinical significance debated"
      actionable: "Anticoagulation in most cases, clinical correlation - some small subsegmental PE may not require treatment"

    - finding: "Chronic PE"
      interpretation: "Eccentric clot, webs, bands, mosaic perfusion pattern"
      actionable: "Evaluate for CTEPH - right heart catheterization, pulmonary hypertension workup"

  criticalFindings:
    - "Massive PE with RV strain (RV/LV >1.0) - consider thrombolysis"
    - "Saddle embolus - high mortality, aggressive treatment required"
    - "PE with hypotension/shock - EMERGENT thrombolysis consideration"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected PE with positive Wells score (>4) or intermediate Wells (2-4) with positive D-dimer"
    - "Hemodynamically unstable patient with suspected PE"
    - "Positive D-dimer with clinical symptoms suggestive of PE"
    - "Suspected chronic PE or CTEPH"

  contraindications:
    - "Pregnancy (relative - VQ scan preferred if stable)"
    - "Severe contrast allergy without pre-medication"
    - "eGFR <30 (relative - consider VQ scan)"

  prerequisiteTests:
    - "Wells Score or PERC rule calculation"
    - "D-dimer (if low-intermediate pretest probability)"
    - "Creatinine/eGFR (within 30 days for outpatient, 7 days for inpatient)"
    - "Pregnancy test (women of childbearing age)"

  stewardshipRecommendations: |
    ALWAYS assess pretest probability with Wells Score or Geneva Score before ordering CTPA
    Order D-dimer FIRST if low-intermediate pretest probability (Wells <4)
    AVOID CTPA if Wells <2 and negative age-adjusted D-dimer (PE ruled out)
    Consider VQ scan for pregnant women, young women (lower breast radiation), or renal failure
    Use YEARS algorithm to reduce unnecessary CTPA in low-risk patients


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Optimal pulmonary arterial phase timing (bolus tracking essential)"
    - "Adequate IV flow rate (4-5 mL/sec requires 18-20 gauge IV)"
    - "Minimal motion artifact (adequate breath hold)"
    - "Pulmonary artery opacification >200 Hounsfield Units"

  followUpGuidance: |
    Acute PE: Anticoagulation for 3-6 months minimum, no routine repeat imaging unless persistent symptoms
    Massive PE: Reassess RV function with echocardiogram in 3-6 months
    Unprovoked PE: Consider extended anticoagulation after initial 3-6 months
    Recurrent PE on anticoagulation: Hematology consult, consider IVC filter


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 500.00
  patientCharge: 1800.00
  highUtilization: true
  costEffectiveness: "High cost - avoid overuse with proper pretest probability assessment and D-dimer utilization"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 16467544 (PIOPED III - CTPA for PE diagnosis 2006)"
  - "PMID: 28459336 (YEARS Algorithm - reduces CTPA use 2017)"
  - "PMID: 24506975 (ADJUST-PE - age-adjusted D-dimer 2014)"
  - "PMID: 31473594 (ESC Pulmonary Embolism Guidelines 2019)"
  - "PMID: 27136952 (ACR Appropriateness Criteria Acute Chest Pain 2016)"


guidelineReferences:
  - "ESC Guidelines on Diagnosis and Management of Acute Pulmonary Embolism 2019"
  - "ACCP Evidence-Based Clinical Practice Guidelines on VTE 2016"
  - "ACR Appropriateness Criteria for Suspected Pulmonary Embolism"
  - "YEARS Algorithm for PE Diagnosis 2017"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    wells_score_required: "ALERT: Calculate Wells Score or Geneva Score before ordering CTPA"
    ddimer_first: "ALERT: If Wells <4, order D-dimer FIRST before CTPA"
    low_prob_negative_ddimer: "ALERT: PE effectively ruled out with Wells <2 and negative age-adjusted D-dimer - CTPA NOT indicated"
    renal_check: "ALERT: Creatinine required within 30 days before contrast CT - order if not available"
    pregnancy_check: "ALERT: Pregnancy test required for women of childbearing age before CTPA"

  autoOrderWith:
    - "Wells Score calculation (if not documented)"
    - "D-dimer (if Wells <4 and not already ordered)"
    - "Creatinine if not checked within 30 days"
    - "Pregnancy test for women 12-55 years"
    - "Consider lower extremity venous duplex ultrasound"

  reflexOrdering:
    pe_confirmed: "Order lower extremity venous duplex to assess for DVT (concurrent in 30-50% of PE)"
    massive_pe_rvstrain: "STAT cardiology consult, consider systemic thrombolysis (tPA 50mg over 2 hours) or catheter-directed therapy"
    subsegmental_pe: "Anticoagulation decision based on clinical context - discuss with pulmonology if uncertain"
    negative_ctpa_high_suspicion: "Consider VQ scan or repeat CTPA if high clinical suspicion persists"

  followUpGuidance: |
    Acute PE: Anticoagulation 3-6 months, no routine repeat imaging unless symptomatic
    Provoked PE (surgery, trauma, immobility): 3 months anticoagulation, discontinue if risk factor resolved
    Unprovoked PE: Consider indefinite anticoagulation after shared decision-making
    PE with RV strain: Repeat echocardiogram in 3-6 months to assess for persistent RV dysfunction (CTEPH risk)


