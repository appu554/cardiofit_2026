# ==================================================================
# CAROTID DUPLEX ULTRASOUND IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-US-CAROTID-001"
studyName: "Carotid Duplex Ultrasound (Bilateral)"
cptCode: "93880"
commonNames: "Carotid Doppler, Carotid Ultrasound, Carotid Artery Study"
modality: "ULTRASOUND"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "No fasting required. Remove jewelry/necklaces from neck"
  positioning: "Supine with neck extended, head turned away from side being scanned"
  views: "Bilateral common carotid, internal carotid, external carotid, vertebral arteries with B-mode and Doppler"
  contrastRequired: false
  sedationRequired: false
  specialInstructions: "Remain still during exam. 30-45 minutes for bilateral study"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Safe - no radiation, no contrast"
  renalFunction: "Not applicable (no contrast)"
  allergies: "No allergy concerns (ultrasound gel only)"
  implants: "Safe with all implants including pacemakers"
  pediatricConsiderations: "Safe for all ages, no radiation"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "0 mSv (ultrasound - no ionizing radiation)"
  comparison: "No radiation - completely safe"
  justification: "Preferred first-line imaging for carotid stenosis evaluation"
  alara: "Not applicable - ultrasound is non-ionizing"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Same day for TIA/stroke workup, 1-7 days for routine screening"
  urgentAvailability: "Available during business hours, limited after-hours availability"
  studyDuration: "30-45 minutes for bilateral study"
  resultsTurnaround: "Preliminary interpretation immediate, formal vascular lab read 4-24 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Transient ischemic attack (TIA) or stroke"
      acrRating: 9
      clinicalContext: "Evaluate for carotid stenosis as source of emboli - carotid endarterectomy if ≥70% stenosis"
      evidence: "AHA/ASA Stroke Guidelines 2021 - carotid imaging mandatory in TIA/stroke workup"

    - indication: "Asymptomatic carotid bruit"
      acrRating: 8
      clinicalContext: "Bruit may indicate stenosis - assess degree of narrowing"
      evidence: "ACC/AHA Guidelines on Peripheral Arterial Disease"

    - indication: "Preoperative carotid evaluation before CABG"
      acrRating: 8
      clinicalContext: "Screen for significant stenosis in patients undergoing cardiac surgery (stroke risk)"
      evidence: "ACC/AHA CABG Guidelines - carotid screening recommended if age >65 or high-risk features"

    - indication: "Surveillance after carotid endarterectomy (CEA)"
      acrRating: 8
      clinicalContext: "Monitor for restenosis - duplex at 1 month, 6 months, then annually"
      evidence: "SVS Guidelines on Carotid Endarterectomy - surveillance duplex recommended"

    - indication: "Surveillance after carotid artery stenting (CAS)"
      acrRating: 8
      clinicalContext: "Monitor for in-stent restenosis - more common than post-CEA"
      evidence: "SVS Guidelines on Carotid Stenting"

  may_be_appropriate_4_6:
    - indication: "Asymptomatic screening in high-risk patients"
      acrRating: 5
      clinicalContext: "Controversial - consider in age >65 with multiple vascular risk factors"
      evidence: "USPSTF Grade C recommendation - may screen in select high-risk patients"

    - indication: "Pulsatile neck mass"
      acrRating: 7
      clinicalContext: "Assess for carotid aneurysm or tortuous vessel"
      evidence: "Standard workup for neck masses with vascular characteristics"

  usually_not_appropriate_1_3:
    - indication: "Routine screening in asymptomatic low-risk patients"
      acrRating: 2
      clinicalContext: "Not recommended - low yield, potential for overtreatment"
      evidence: "USPSTF Grade D recommendation against routine screening"

    - indication: "Non-specific dizziness without focal neurologic signs"
      acrRating: 2
      clinicalContext: "Carotid stenosis does not cause isolated dizziness"
      evidence: "Choosing Wisely - avoid carotid imaging for non-specific dizziness"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Patent bilateral carotid arteries with normal peak systolic velocities (PSV <125 cm/s), no plaque, smooth vessel walls"

  keyMeasurements:
    - measurement: "Peak systolic velocity (PSV) in internal carotid artery (ICA)"
      normalRange: "<125 cm/s"
      interpretation: |
        <125 cm/s: Normal (no stenosis)
        125-230 cm/s: 50-69% stenosis (moderate)
        >230 cm/s: ≥70% stenosis (severe)
        >400 cm/s: Near-occlusion (>90% stenosis)

    - measurement: "ICA/CCA ratio (internal/common carotid PSV ratio)"
      normalRange: "<2.0"
      interpretation: |
        <2.0: <50% stenosis
        2.0-4.0: 50-69% stenosis
        >4.0: ≥70% stenosis

    - measurement: "End-diastolic velocity (EDV) in ICA"
      normalRange: "<40 cm/s"
      interpretation: |
        <40 cm/s: <50% stenosis
        40-100 cm/s: 50-69% stenosis
        >100 cm/s: ≥70% stenosis

  commonAbnormalities:
    - finding: "Severe carotid stenosis (70-99%)"
      interpretation: "PSV >230 cm/s, EDV >100 cm/s, ICA/CCA ratio >4.0, visible plaque on B-mode"
      actionable: "Symptomatic: URGENT carotid endarterectomy (CEA) or stenting. Asymptomatic: CEA if life expectancy >5 years and surgical risk low"

    - finding: "Moderate carotid stenosis (50-69%)"
      interpretation: "PSV 125-230 cm/s, EDV 40-100 cm/s, visible plaque"
      actionable: "Symptomatic: Consider CEA/CAS. Asymptomatic: medical management (antiplatelet, statin, BP control), surveillance duplex annually"

    - finding: "Carotid occlusion"
      interpretation: "No flow in internal carotid artery"
      actionable: "Confirm with CTA or MRA. No surgical intervention for chronic occlusion. Optimize medical therapy"

    - finding: "Carotid dissection"
      interpretation: "Intimal flap, pseudoaneurysm, abnormal waveform"
      actionable: "CTA or MRA for confirmation, neurology consult, anticoagulation vs antiplatelet therapy"

  criticalFindings:
    - "Severe symptomatic stenosis ≥70% - URGENT vascular surgery consult for CEA/CAS"
    - "Carotid dissection - neurology consult, consider anticoagulation"
    - "Acute carotid occlusion in stroke patient - consider endovascular thrombectomy if <24 hours"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "TIA or ischemic stroke (anterior circulation)"
    - "Asymptomatic carotid bruit"
    - "Pre-operative screening before CABG (age >65 or risk factors)"
    - "Surveillance after CEA or carotid stenting"
    - "Amaurosis fugax (transient monocular blindness)"

  contraindications: []  # No contraindications for ultrasound

  prerequisiteTests: []

  stewardshipRecommendations: |
    AVOID routine screening in asymptomatic low-risk patients (USPSTF Grade D)
    AVOID carotid imaging for non-specific dizziness without focal neurologic signs
    Use duplex ultrasound as FIRST-LINE test (avoid CTA/MRA unless ultrasound inadequate)
    Surveillance after CEA: 1 month, 6 months, then annually (not more frequently unless indicated)


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate visualization of common carotid, ICA, ECA bilaterally"
    - "Angle-corrected Doppler measurements (60 degrees or less)"
    - "Complete evaluation of plaque morphology (calcified, soft, ulcerated)"

  followUpGuidance: |
    Severe stenosis (≥70%): Vascular surgery consult for CEA or CAS evaluation
    Moderate stenosis (50-69%): Repeat duplex in 6-12 months, optimize medical therapy
    Post-CEA/CAS surveillance: Duplex at 1 month, 6 months, 12 months, then annually
    Normal or mild stenosis: No routine follow-up unless symptoms develop


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 200.00
  patientCharge: 500.00
  highUtilization: true
  costEffectiveness: "Cost-effective first-line test for carotid stenosis - avoid CTA/MRA unless ultrasound non-diagnostic"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 34192812 (AHA/ASA Stroke Secondary Prevention Guidelines 2021)"
  - "PMID: 21282560 (NASCET Trial - carotid endarterectomy benefit 1991)"
  - "PMID: 15249508 (ACAS Trial - asymptomatic carotid stenosis 2004)"
  - "PMID: 29268916 (SVS Carotid Artery Disease Guidelines 2021)"
  - "PMID: 33687283 (USPSTF Carotid Stenosis Screening 2021)"


guidelineReferences:
  - "AHA/ASA Guidelines for Stroke Secondary Prevention 2021"
  - "Society for Vascular Surgery (SVS) Carotid Artery Disease Guidelines 2021"
  - "ACC/AHA Guidelines on Peripheral Arterial Disease"
  - "USPSTF Recommendation on Carotid Stenosis Screening 2021"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    routine_screening_low_risk: "ALERT: Routine carotid screening NOT recommended in asymptomatic low-risk patients (USPSTF Grade D)"
    nonspecific_dizziness: "ALERT: Carotid stenosis does not cause isolated dizziness - imaging not indicated without focal neurologic signs"

  autoOrderWith:
    - "Consider brain MRI/CT if TIA or stroke (evaluate for infarct)"
    - "Consider transcranial Doppler if severe stenosis or occlusion (assess collateral flow)"

  reflexOrdering:
    severe_stenosis_symptomatic: "URGENT vascular surgery consult for carotid endarterectomy or stenting"
    severe_stenosis_asymptomatic: "Vascular surgery consult for CEA consideration if low surgical risk"
    moderate_stenosis: "Optimize medical therapy: antiplatelet (aspirin or clopidogrel), high-intensity statin, BP control. Repeat duplex in 6-12 months"
    carotid_dissection: "Neurology consult, CTA or MRA for confirmation, consider anticoagulation vs antiplatelet"

  followUpGuidance: |
    Severe stenosis (≥70%) symptomatic: CEA/CAS within 2 weeks of symptom onset (NASCET data)
    Severe stenosis (≥70%) asymptomatic: CEA if surgical risk <3% and life expectancy >5 years
    Moderate stenosis (50-69%): Medical management, surveillance duplex q6-12 months
    Post-CEA/CAS: Duplex at 1 month, 6 months, 12 months, then annually


