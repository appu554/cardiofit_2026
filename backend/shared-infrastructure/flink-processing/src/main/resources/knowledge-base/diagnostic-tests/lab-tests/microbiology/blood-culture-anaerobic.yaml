# Blood Culture - Anaerobic
# Detection of anaerobic bacteria in bloodstream for bacteremia/sepsis diagnosis

TestID: "blood-culture-anaerobic"
TestName: "Blood Culture, Anaerobic"
Category: "Microbiology"
Subcategory: "Blood Culture"

LOINCCode: "601-5"
LOINCDisplay: "Blood culture anaerobic"

CPTCodes:
  - Code: "87040"
    Description: "Culture, bacterial; blood, anaerobic"
  - Code: "87075"
    Description: "Culture, bacterial; any source except blood, anaerobic"
  - Code: "87184"
    Description: "Susceptibility studies, antimicrobial agent; disk method, per plate (12 or fewer agents)"

SpecimenType: "Blood"
SpecimenVolume: "8-10 mL per bottle (adults), 1-5 mL (pediatrics)"
SpecimenContainer: "Anaerobic blood culture bottle (orange or red cap)"

CollectionInstructions:
  - "Draw 2 sets from different venipuncture sites, 10-15 minutes apart"
  - "Collect BEFORE antibiotic administration whenever possible"
  - "Strict aseptic technique to prevent contamination"
  - "Disinfect bottle tops with 70% alcohol, allow to dry"
  - "Inoculate anaerobic bottle SECOND (after aerobic bottle)"
  - "Do NOT introduce air into anaerobic bottle - maintain anaerobic environment"
  - "Label each bottle with patient ID, date/time, and collection site"

SpecialHandling:
  - "Transport to lab immediately at room temperature"
  - "Do NOT refrigerate - maintains optimal growth temperature"
  - "Load into automated blood culture system within 4 hours"
  - "Protect from oxygen exposure during processing"
  - "Maintain specimen at 20-25°C during transport"

ReferenceRange:
  Normal: "No growth after 5 days incubation"
  Interpretation: "Negative anaerobic blood culture - no anaerobic bacteremia detected"

AbnormalValues:
  - Value: "Growth detected"
    Severity: "CRITICAL"
    ClinicalSignificance: "Anaerobic bacteremia present - requires specific antibiotic therapy"
    AutoNotify: true
    NotificationRecipients: ["ordering_physician", "infectious_disease", "pharmacy"]
  - Value: "Bacteroides species"
    Severity: "CRITICAL"
    ClinicalSignificance: "Intra-abdominal or pelvic infection likely - surgical evaluation needed"
  - Value: "Clostridium perfringens"
    Severity: "CRITICAL"
    ClinicalSignificance: "Gas gangrene or clostridial sepsis - high mortality risk"
  - Value: "Peptostreptococcus species"
    Severity: "HIGH"
    ClinicalSignificance: "Often polymicrobial infection - abscess or deep tissue infection"

TurnaroundTime:
  Preliminary: "2-4 hours (Gram stain if positive)"
  Intermediate: "48-72 hours (preliminary organism identification)"
  Final: "5-7 days (final identification and susceptibility)"
  Stat: "Same day (Gram stain and preliminary culture)"

CriticalValues:
  - Value: "Any positive anaerobic blood culture"
    Action: "Immediate phone notification to ordering provider"
    Timeframe: "Within 1 hour of detection"

Indications:
  - "Suspected anaerobic bacteremia or sepsis"
  - "Intra-abdominal infection or abscess"
  - "Pelvic inflammatory disease"
  - "Aspiration pneumonia"
  - "Necrotizing soft tissue infection"
  - "Dental infection with systemic signs"
  - "Post-abdominal surgery fever"
  - "Decubitus ulcer with systemic infection"

Contraindications:
  - "None absolute"
  - "Use caution with coagulopathy (bleeding risk)"

AutoOrderWith:
  - TestID: "blood-culture-aerobic"
    Reason: "Complete blood culture set requires both aerobic and anaerobic bottles"
  - TestID: "lactate-serum"
    Reason: "Sepsis evaluation - elevated lactate indicates tissue hypoperfusion"
  - TestID: "cbc-with-differential"
    Reason: "Assess infection severity and immune response"
  - TestID: "ct-abdomen-pelvis"
    Reason: "If anaerobic bacteremia detected, evaluate for intra-abdominal source"

InterpretationGuidance:
  - Context: "Clinical presentation and source"
    Guidance: "Anaerobic bacteremia often indicates deep-seated infection requiring drainage"
  - Context: "Common anaerobic organisms"
    Guidance: "Bacteroides fragilis, Clostridium species, Peptostreptococcus, Fusobacterium"
  - Context: "Polymicrobial infection"
    Guidance: "Anaerobes often grow alongside aerobes in mixed infections"
  - Context: "Time to positivity"
    Guidance: "Anaerobes typically take longer to grow (48-72 hours) than aerobes"

ClinicalNotes:
  - "Anaerobic bacteremia is less common (5-15% of positive blood cultures)"
  - "Often indicates intra-abdominal, pelvic, or oral/dental infection source"
  - "Bacteroides fragilis is most common anaerobic blood isolate"
  - "Consider surgical source control for persistent anaerobic bacteremia"
  - "Metronidazole or carbapenems provide good anaerobic coverage"
  - "Anaerobic culture may take 5-7 days for final identification"
  - "Clostridium species require urgent surgical evaluation"

QualityMetrics:
  ContaminationRateTarget: "<3%"
  TimeToNotification: "<1 hour for positive cultures"
  PreAnalyticRejectionCriteria:
    - "Insufficient volume (<1 mL)"
    - "Clotted specimen"
    - "Unlabeled bottle"
    - "Oxygen exposure (bottle cap removed)"

RegionalConsiderations:
  - Region: "All"
    Note: "Anaerobic bacteremia incidence varies by patient population and risk factors"

RegulatoryCodes:
  CLIA_Complexity: "High"
  RequiresApproval: false

EvidenceLevel: "A"
EvidenceReferences:
  - "Clinical Microbiology Procedures Handbook, ASM Press (4th Edition)"
  - "Anaerobe Laboratory Manual, Wadsworth-KTL (4th Edition)"
  - "IDSA Clinical Practice Guidelines for Intra-Abdominal Infection (2010)"

CostConsiderations:
  EstimatedCost_USD: "50-150 per bottle"
  ReimbursementNotes: "Typically covered when ordered with aerobic culture as complete set"

LastUpdated: "2025-01-15"
Version: "1.0"
