# ==================================================================
# CORONARY CT ANGIOGRAPHY IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-CCTA-001"
studyName: "Coronary CT Angiography (CCTA)"
cptCode: "75574"
commonNames: "Cardiac CTA, Coronary CTA, Heart CT Angiogram"
modality: "COMPUTED_TOMOGRAPHY"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "NPO 4 hours before. Avoid caffeine 12 hours prior. Heart rate <60 bpm required (beta-blocker given if needed)"
  positioning: "Supine, arms above head"
  views: "Axial slices with 3D reconstruction of coronary arteries"
  contrastRequired: true  # Iodinated IV contrast mandatory for coronary artery visualization
  contrastType: "Iodinated IV contrast (80-100 mL) with ECG-gated bolus timing"
  sedationRequired: false
  specialInstructions: "Sublingual nitroglycerin given before scan (vasodilate coronaries). Breath hold 5-10 seconds. HR control critical for image quality"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Contraindicated - high radiation to fetus. Alternative: stress echo or MRI"

  renalFunction: |
    CHECK CREATININE before IV contrast administration
    eGFR <30: High risk for contrast-induced nephropathy (CIN) - consider alternative test
    eGFR 30-45: Moderate risk - ensure hydration
    eGFR >45: Low risk - hydration recommended
    Acute kidney injury: AVOID contrast

  allergies: |
    Contrast allergy history: Pre-medicate with corticosteroids + antihistamine
    Severe prior reaction: Consider stress echo or MRI as alternative
    Shellfish allergy: NOT a contraindication (myth debunked)

  heartRateControl: |
    Target heart rate <60 bpm for optimal image quality
    Beta-blocker (metoprolol 25-100mg PO) given 1 hour before if HR >60
    Contraindications to beta-blocker: Severe asthma, high-degree AV block, decompensated heart failure

  implants: "Pacemaker/ICD not contraindication for CT (unlike MRI)"

  pediatricConsiderations: "Minimize radiation - use weight-based protocols, avoid unless essential"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "5-15 mSv (CCTA with modern protocols)"
  comparison: "Equivalent to 1.5-5 years of natural background radiation. Lower than diagnostic catheterization (7-20 mSv)"
  justification: "Non-invasive alternative to diagnostic coronary angiography with excellent negative predictive value"
  alara: "Use prospective ECG gating (vs retrospective), iterative reconstruction, limit scan range to heart only"
  cancerRisk: "Estimated 1 in 2000-5000 lifetime cancer risk from single CCTA"
  breastDoseConsideration: "Higher breast radiation in women - consider stress echo or MRI in young women"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Outpatient test - 1-7 days for low-intermediate risk chest pain, same day for chest pain centers"
  urgentAvailability: "Available during business hours, limited after-hours availability"
  studyDuration: "20-30 minutes (including heart rate control and contrast administration)"
  resultsTurnaround: "Preliminary 2-4 hours, formal cardiology read 12-24 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Low-intermediate pretest probability chest pain"
      acrRating: 9
      clinicalContext: "Excellent negative predictive value (>95%) - effectively rules out CAD if normal"
      evidence: "ACC/AHA Chest Pain Guidelines 2021 - CCTA appropriate for low-intermediate risk"

    - indication: "Acute chest pain in ED (low-intermediate risk, negative troponins)"
      acrRating: 8
      clinicalContext: "CCTA enables safe early discharge if normal - reduces hospital admissions"
      evidence: "PROMISE Trial, SCOT-HEART Trial - CCTA superior to functional testing for CAD diagnosis"

    - indication: "Equivocal stress test result"
      acrRating: 8
      clinicalContext: "Anatomic imaging to clarify indeterminate functional test"
      evidence: "CCTA provides definitive anatomic assessment"

    - indication: "New-onset heart failure with reduced EF (unknown CAD status)"
      acrRating: 7
      clinicalContext: "Rule out ischemic cardiomyopathy vs non-ischemic"
      evidence: "ACC/AHA Heart Failure Guidelines - assess for CAD as etiology"

  may_be_appropriate_4_6:
    - indication: "Intermediate-high pretest probability of CAD"
      acrRating: 5
      clinicalContext: "Higher false positive rate - consider stress test or invasive angiography"
      evidence: "CCTA may show non-obstructive disease requiring further testing"

    - indication: "Coronary artery calcium score >400 Agatston units"
      acrRating: 4
      clinicalContext: "Heavy calcification limits CCTA accuracy - consider alternative test"
      evidence: "Calcium score >400 reduces CCTA diagnostic accuracy"

  usually_not_appropriate_1_3:
    - indication: "High pretest probability of CAD with typical angina"
      acrRating: 2
      clinicalContext: "Proceed directly to invasive coronary angiography"
      evidence: "High likelihood of obstructive disease - angiography indicated"

    - indication: "Routine screening in asymptomatic low-risk patients"
      acrRating: 1
      clinicalContext: "Not indicated - no evidence of benefit, radiation exposure"
      evidence: "Choosing Wisely - avoid screening CCTA in asymptomatic patients"

    - indication: "Irregular heart rhythm (atrial fibrillation, frequent PVCs)"
      acrRating: 2
      clinicalContext: "Image quality degraded by irregular rhythm - consider alternative test"
      evidence: "ECG gating unreliable in atrial fibrillation"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "No coronary artery stenosis, no atherosclerotic plaque, normal coronary anatomy"

  keyStenosisGrading:
    - grade: "No stenosis"
      interpretation: "Normal coronary arteries - excellent prognosis"
      actionable: "Reassurance, optimize risk factors, no further cardiac workup"

    - grade: "Non-obstructive CAD (1-49% stenosis)"
      interpretation: "Atherosclerotic plaque present but not flow-limiting"
      actionable: "Aggressive risk factor modification (statin, aspirin, BP control), no revascularization needed"

    - grade: "Moderate stenosis (50-69%)"
      interpretation: "Intermediate stenosis - functional significance uncertain"
      actionable: "Consider stress test or FFR-CT to assess ischemia. Medical therapy (statin, antiplatelet)"

    - grade: "Severe stenosis (≥70%)"
      interpretation: "Obstructive CAD - likely ischemia-producing"
      actionable: "Invasive coronary angiography for revascularization consideration (PCI or CABG)"

  commonAbnormalities:
    - finding: "Left main coronary artery stenosis"
      interpretation: "High-risk anatomy - stenosis >50% is significant"
      actionable: "URGENT invasive angiography, cardiology/cardiac surgery consult for revascularization (CABG preferred)"

    - finding: "Three-vessel disease"
      interpretation: "Obstructive stenosis in all three major coronary territories"
      actionable: "Invasive angiography, consider CABG vs PCI based on SYNTAX score"

    - finding: "Non-obstructive CAD with high-risk plaque features"
      interpretation: "Positive remodeling, low-attenuation plaque, napkin-ring sign - vulnerable plaque"
      actionable: "Aggressive medical therapy (high-intensity statin, aspirin), close follow-up"

    - finding: "Coronary anomaly"
      interpretation: "Anomalous coronary origin - assess for inter-arterial course (sudden cardiac death risk)"
      actionable: "Cardiology consult, consider cardiac surgery if inter-arterial course"

  criticalFindings:
    - "Left main stenosis >50% - URGENT invasive angiography and revascularization"
    - "Severe three-vessel disease - invasive angiography for CABG vs PCI"
    - "Anomalous coronary with inter-arterial course - cardiac surgery consult"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Low-intermediate pretest probability chest pain"
    - "Acute chest pain in ED (low-intermediate risk, negative troponins)"
    - "Equivocal stress test result"
    - "New-onset heart failure (rule out ischemic etiology)"
    - "Coronary artery calcium score 1-399 Agatston units"

  contraindications:
    - "Pregnancy"
    - "Irregular heart rhythm (atrial fibrillation, frequent PVCs)"
    - "Severe contrast allergy without pre-medication"
    - "eGFR <30 (relative contraindication)"
    - "Inability to achieve HR <60 bpm despite beta-blocker"
    - "Coronary calcium score >400 Agatston units (relative - limits accuracy)"

  prerequisiteTests:
    - "Creatinine/eGFR (within 30 days for outpatient, 7 days for inpatient)"
    - "Pregnancy test (women of childbearing age)"
    - "Coronary artery calcium score (optional - helps assess suitability)"

  stewardshipRecommendations: |
    AVOID CCTA in high pretest probability CAD - proceed to invasive angiography
    AVOID routine screening CCTA in asymptomatic patients (Choosing Wisely)
    Consider stress echo or MRI in young women (lower breast radiation)
    AVOID CCTA if calcium score >400 (poor image quality) - consider stress test or angiography
    Check heart rate BEFORE scheduling - target <60 bpm for optimal image quality


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Heart rate <60 bpm during acquisition"
    - "Adequate coronary artery opacification (>250 HU)"
    - "Minimal motion artifact"
    - "Complete visualization of all coronary segments"

  followUpGuidance: |
    Normal CCTA: No further cardiac workup, optimize risk factors, repeat imaging only if symptoms change
    Non-obstructive CAD: Aggressive medical therapy, no routine repeat CCTA
    Moderate stenosis (50-69%): Stress test or FFR-CT to assess functional significance
    Severe stenosis (≥70%): Invasive coronary angiography for revascularization


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 600.00
  patientCharge: 2000.00
  highUtilization: false  # Lower than stress testing but increasing utilization
  costEffectiveness: "Cost-effective for low-intermediate risk chest pain - high negative predictive value reduces need for further testing"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 25907157 (PROMISE Trial - CCTA vs functional testing 2015)"
  - "PMID: 25788509 (SCOT-HEART Trial - CCTA improves diagnosis and outcomes 2015)"
  - "PMID: 30813537 (ACC/AHA Chest Pain Guidelines 2021)"
  - "PMID: 27056773 (DISCHARGE Trial - CCTA vs invasive angiography 2022)"
  - "PMID: 27282611 (ACR Appropriateness Criteria Chest Pain 2016)"


guidelineReferences:
  - "ACC/AHA Chest Pain Guidelines 2021"
  - "SCCT Guidelines on Coronary CTA 2021"
  - "ACR Appropriateness Criteria for Acute Chest Pain"
  - "ESC Guidelines on Chronic Coronary Syndromes 2019"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    high_pretest_probability: "ALERT: High pretest probability CAD - consider invasive angiography rather than CCTA"
    routine_screening: "ALERT: Routine screening CCTA NOT recommended in asymptomatic patients (Choosing Wisely)"
    atrial_fibrillation: "ALERT: Irregular rhythm (Afib, frequent PVCs) degrades CCTA quality - consider stress test or angiography"
    high_calcium_score: "ALERT: Calcium score >400 limits CCTA accuracy - consider stress test or invasive angiography"
    renal_check: "ALERT: Creatinine required within 30 days before contrast CCTA - order if not available"
    pregnancy_check: "ALERT: Pregnancy test required for women of childbearing age before CCTA"
    heart_rate_control: "ALERT: Heart rate must be <60 bpm for optimal image quality - beta-blocker may be needed"

  autoOrderWith:
    - "Creatinine if not checked within 30 days"
    - "Pregnancy test for women 12-55 years"
    - "Consider coronary artery calcium score (assess suitability for CCTA)"

  reflexOrdering:
    left_main_stenosis: "URGENT invasive coronary angiography, cardiology/cardiac surgery consult for revascularization (CABG preferred)"
    severe_stenosis: "Invasive coronary angiography for revascularization evaluation (PCI or CABG)"
    moderate_stenosis: "Stress test or FFR-CT to assess functional significance, optimize medical therapy"
    non_obstructive_cad: "Aggressive medical therapy: high-intensity statin (atorvastatin 40-80mg or rosuvastatin 20-40mg), aspirin 81mg"

  followUpGuidance: |
    Normal CCTA: Excellent prognosis (1% annual event rate), no further cardiac workup needed
    Non-obstructive CAD: Statin, aspirin, BP control, no routine repeat imaging
    Moderate stenosis: Stress test or FFR-CT, cardiology follow-up
    Severe stenosis (≥70%): Invasive angiography within 1-4 weeks for revascularization


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ACC/AHA Chest Pain Guidelines 2021, SCCT Guidelines 2021, PROMISE/SCOT-HEART Trials"
version: "1.0"


# ==================================================================
# PERFORMANCE CHARACTERISTICS
# ==================================================================
diagnosticAccuracy:
  sensitivity: "95-99%"
  specificity: "85-90%"
  positivePrediciveValue: "Variable based on pretest probability and calcium score"
  negativePrediciveValue: ">95% (excellent for ruling out CAD)"
  comparison: "Similar sensitivity to invasive angiography, non-invasive with lower risk"
