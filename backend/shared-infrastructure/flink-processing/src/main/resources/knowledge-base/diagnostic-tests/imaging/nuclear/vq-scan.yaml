# ==================================================================
# VENTILATION-PERFUSION (VQ) SCAN IMAGING STUDY DEFINITION
# ==================================================================
studyId: "IMG-NM-VQ-001"
studyName: "Ventilation-Perfusion (VQ) Scan"
cptCode: "78580"
commonNames: "VQ Scan, Lung Scan, V/Q Scan, Perfusion Scan"
modality: "NUCLEAR_MEDICINE"


# ==================================================================
# IMAGING REQUIREMENTS
# ==================================================================
imagingRequirements:
  preparation: "No fasting required. Recent chest X-ray required (within 24 hours) for interpretation"
  positioning: "Supine and multiple views (anterior, posterior, lateral, oblique)"
  views: "Ventilation phase (inhaled radioactive gas/aerosol) followed by perfusion phase (IV radiotracer)"
  contrastRequired: false  # Uses radiopharmaceuticals, not iodinated contrast
  radiopharmaceutical: "Ventilation: Tc-99m DTPA aerosol or Xe-133 gas. Perfusion: Tc-99m MAA (macroaggregated albumin)"
  sedationRequired: false
  specialInstructions: "Remain still during imaging. Ventilation phase 5-10 minutes, perfusion phase 10-15 minutes. Total 30-45 minutes"


# ==================================================================
# SAFETY CHECKS
# ==================================================================
safetyChecks:
  pregnancy: "Relative contraindication - CTPA preferred if hemodynamically stable. VQ scan has lower radiation to fetus than CTPA in some cases"

  renalFunction: "Not applicable - radiopharmaceuticals not nephrotoxic (unlike iodinated contrast)"

  allergies: |
    Radiopharmaceutical allergy extremely rare
    No iodinated contrast used - safe in contrast allergy
    Tc-99m MAA allergy: Rare, pre-medicate if prior reaction

  shuntEvaluation: |
    Right-to-left shunt: Reduce Tc-99m MAA particles to prevent systemic embolization
    Check for known cardiac shunts (PFO, ASD) before perfusion scan

  implants: "Safe with pacemakers, ICD, all metal implants (not MRI)"

  pediatricConsiderations: "Safe for all ages. Radiation exposure lower than CT in children"


# ==================================================================
# RADIATION EXPOSURE
# ==================================================================
radiationExposure:
  effectiveDose: "2-3 mSv (VQ scan)"
  comparison: "Lower than CTPA (7-15 mSv), equivalent to ~1 year of natural background radiation"
  justification: "Lower radiation alternative to CTPA, especially in pregnancy and young patients"
  alara: "Use lowest radiopharmaceutical dose, optimize imaging time"
  cancerRisk: "Estimated 1 in 10,000 lifetime cancer risk from single VQ scan (lower than CTPA)"
  pregnancyConsideration: "Lower fetal radiation than CTPA in some studies - consider as alternative in pregnancy"


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  schedulingPriority: "Same day for suspected PE (emergent), available during business hours"
  urgentAvailability: "Limited availability - CTPA more readily available 24/7 in most centers"
  studyDuration: "30-45 minutes (ventilation + perfusion phases)"
  resultsTurnaround: "Preliminary 1-2 hours, final nuclear medicine read 4-12 hours"


# ==================================================================
# CLINICAL INDICATIONS & ACR APPROPRIATENESS
# ==================================================================
clinicalIndications:
  usually_appropriate_7_9:
    - indication: "Suspected PE with CTPA contraindication (renal failure, contrast allergy)"
      acrRating: 9
      clinicalContext: "VQ scan alternative when CTPA cannot be performed"
      evidence: "ESC PE Guidelines 2019 - VQ scan acceptable alternative to CTPA"

    - indication: "Suspected PE in pregnancy (alternative to CTPA)"
      acrRating: 8
      clinicalContext: "Lower breast radiation than CTPA, but higher fetal radiation in some studies. CTPA generally preferred"
      evidence: "ACR-SPR Practice Parameter - either VQ or CTPA acceptable in pregnancy"

    - indication: "Young women with low-intermediate PE probability"
      acrRating: 7
      clinicalContext: "Lower breast radiation dose than CTPA - reasonable alternative"
      evidence: "VQ scan avoids high breast radiation from CTPA"

    - indication: "Chronic thromboembolic pulmonary hypertension (CTEPH) screening"
      acrRating: 8
      clinicalContext: "VQ scan more sensitive than CTPA for chronic PE - shows mosaic perfusion defects"
      evidence: "ESC/ERS Pulmonary Hypertension Guidelines - VQ scan preferred for CTEPH screening"

  may_be_appropriate_4_6:
    - indication: "High pretest probability PE"
      acrRating: 5
      clinicalContext: "CTPA preferred for definitive diagnosis. VQ scan may be indeterminate"
      evidence: "PIOPED II - VQ scan has higher indeterminate rate than CTPA"

    - indication: "Suspected PE with abnormal chest X-ray"
      acrRating: 4
      clinicalContext: "Pneumonia, effusion, atelectasis reduce VQ scan accuracy - CTPA preferred"
      evidence: "Abnormal CXR reduces VQ scan specificity"

  usually_not_appropriate_1_3:
    - indication: "Suspected PE in patient with COPD or chronic lung disease"
      acrRating: 3
      clinicalContext: "Baseline V/Q mismatch reduces diagnostic accuracy - CTPA preferred"
      evidence: "COPD causes false positive VQ scan results"

    - indication: "Routine PE screening in asymptomatic patients"
      acrRating: 1
      clinicalContext: "Not indicated without clinical suspicion"
      evidence: "No evidence for routine PE screening"


# ==================================================================
# INTERPRETATION GUIDANCE
# ==================================================================
interpretation:
  normalFindings: "Matched ventilation and perfusion throughout both lungs - no PE"

  diagnosticCriteria:
    - result: "Normal VQ scan"
      interpretation: "PE effectively ruled out (negative predictive value >95%)"
      actionable: "No anticoagulation needed, pursue alternative diagnosis for symptoms"

    - result: "High probability for PE"
      interpretation: "≥2 large segmental or ≥4 moderate segmental V/Q mismatches (perfusion defect without ventilation defect)"
      actionable: "Treat as PE - anticoagulation (heparin, LMWH, or DOAC). Positive predictive value ~85%"

    - result: "Intermediate (indeterminate) probability"
      interpretation: "Single moderate-large V/Q mismatch, or other patterns not fitting high/low/normal"
      actionable: "Further testing required - CTPA, venous duplex, or d-dimer correlation. Clinical judgment needed"

    - result: "Low probability for PE"
      interpretation: "Small V/Q mismatches, matched V/Q defects (triple match), or perfusion defect <25% of segment"
      actionable: "Correlate with clinical probability. Wells <2: PE unlikely. Wells >4: Consider CTPA for definitive diagnosis"

  commonAbnormalities:
    - finding: "High probability VQ scan (≥2 large segmental V/Q mismatches)"
      interpretation: "Consistent with PE - perfusion defects without ventilation defects"
      actionable: "Anticoagulation, assess for RV strain with echocardiogram, consider thrombolysis if massive PE"

    - finding: "Indeterminate VQ scan"
      interpretation: "Non-diagnostic - occurs in 30-50% of VQ scans"
      actionable: "Obtain CTPA for definitive diagnosis, or venous duplex (treat if DVT present)"

    - finding: "Matched V/Q defects (ventilation and perfusion both abnormal)"
      interpretation: "Not typical for PE - suggests parenchymal lung disease (pneumonia, COPD)"
      actionable: "Low probability for PE - consider alternative pulmonary diagnoses"

  criticalFindings:
    - "High probability VQ scan with hemodynamic instability - consider massive PE and thrombolysis"


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected PE with CTPA contraindication (renal failure, contrast allergy)"
    - "Suspected PE in pregnancy (alternative to CTPA)"
    - "Young women with PE suspicion (lower breast radiation than CTPA)"
    - "Chronic PE or CTEPH evaluation"
    - "Normal chest X-ray with suspected PE"

  contraindications:
    - "Severe right-to-left cardiac shunt (relative - reduce Tc-99m MAA dose)"
    - "Inability to cooperate with breathing instructions (ventilation phase)"

  prerequisiteTests:
    - "Wells Score or Geneva Score calculation"
    - "D-dimer (if low-intermediate pretest probability)"
    - "Chest X-ray within 24 hours (required for VQ scan interpretation)"

  stewardshipRecommendations: |
    CTPA is generally preferred over VQ scan (higher diagnostic accuracy, lower indeterminate rate)
    Use VQ scan when CTPA contraindicated: renal failure (eGFR <30), severe contrast allergy
    Consider VQ scan in young women (lower breast radiation than CTPA)
    AVOID VQ scan if abnormal chest X-ray (pneumonia, effusion) or COPD - CTPA preferred
    VQ scan more sensitive than CTPA for chronic PE (CTEPH screening)


# ==================================================================
# QUALITY & FOLLOW-UP
# ==================================================================
quality:
  technicalQualityIndicators:
    - "Adequate radiopharmaceutical distribution (ventilation and perfusion)"
    - "Multiple views obtained (anterior, posterior, lateral, oblique)"
    - "Recent chest X-ray available for interpretation"
    - "Clear labeling of ventilation vs perfusion images"

  followUpGuidance: |
    Normal VQ scan: PE ruled out, no further imaging needed
    High probability VQ scan: Anticoagulation for 3-6 months, no routine repeat imaging unless symptomatic
    Indeterminate VQ scan: Obtain CTPA or venous duplex for definitive diagnosis
    Low probability with high clinical suspicion: Obtain CTPA or treat based on clinical judgment


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 400.00
  patientCharge: 1200.00
  highUtilization: false  # Lower utilization than CTPA (CTPA more widely available)
  costEffectiveness: "Lower cost than CTPA, but higher indeterminate rate may require additional testing"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 1852907 (PIOPED Study - VQ scan for PE diagnosis 1990)"
  - "PMID: 16467544 (PIOPED II - CTPA vs VQ scan 2006)"
  - "PMID: 31473594 (ESC Pulmonary Embolism Guidelines 2019)"
  - "PMID: 19713419 (VQ SPECT improves diagnostic accuracy 2009)"
  - "PMID: 26129847 (VQ scan in pregnancy - ACR-SPR 2015)"


guidelineReferences:
  - "ESC Guidelines on Diagnosis and Management of Acute Pulmonary Embolism 2019"
  - "ACCP Evidence-Based Clinical Practice Guidelines on VTE 2016"
  - "ACR-SPR Practice Parameter on VQ Scintigraphy 2015"
  - "ESC/ERS Pulmonary Hypertension Guidelines 2022"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnInappropriate: true

  appropriatenessChecks:
    ctpa_generally_preferred: "ALERT: CTPA is generally preferred over VQ scan for PE diagnosis (higher diagnostic accuracy, lower indeterminate rate)"
    abnormal_cxr: "ALERT: Abnormal chest X-ray reduces VQ scan accuracy - consider CTPA instead"
    copd_patient: "ALERT: COPD/chronic lung disease reduces VQ scan specificity - CTPA preferred"
    cxr_required: "ALERT: Chest X-ray within 24 hours required for VQ scan interpretation - order if not available"

  autoOrderWith:
    - "Wells Score calculation (if not documented)"
    - "D-dimer (if Wells <4 and not already ordered)"
    - "Chest X-ray (if not done within 24 hours)"

  reflexOrdering:
    high_probability_vq: "Anticoagulation (heparin or DOAC), consider echocardiogram to assess RV strain, cardiology consult if massive PE"
    indeterminate_vq: "Order CTPA for definitive diagnosis, OR venous duplex (treat if DVT present)"
    low_probability_high_clinical_suspicion: "Consider CTPA for definitive diagnosis, or treat based on clinical judgment if CTPA contraindicated"

  followUpGuidance: |
    Normal VQ scan: PE ruled out, no anticoagulation, pursue alternative diagnosis
    High probability VQ scan: Anticoagulation 3-6 months, assess for provoked vs unprovoked PE
    Indeterminate VQ scan: Obtain CTPA or treat based on clinical probability and d-dimer
    Chronic PE (CTEPH screening): Right heart catheterization for pulmonary hypertension confirmation


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ESC PE Guidelines 2019, ACCP VTE Guidelines 2016, PIOPED Studies, ACR-SPR Practice Parameter 2015"
version: "1.0"


# ==================================================================
# PERFORMANCE CHARACTERISTICS
# ==================================================================
diagnosticAccuracy:
  sensitivity: "80-90% (high probability scan)"
  specificity: "90-95% (high probability scan)"
  indeterminateRate: "30-50% (major limitation compared to CTPA)"
  negativePrediciveValue: ">95% (normal scan effectively rules out PE)"
  comparison: "CTPA has lower indeterminate rate (~5%) and is generally preferred"
