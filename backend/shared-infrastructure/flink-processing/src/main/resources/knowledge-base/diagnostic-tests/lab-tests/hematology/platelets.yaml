# ==================================================================
# PLATELET COUNT TEST DEFINITION
# ==================================================================
testId: "LAB-PLATELETS-001"
testName: "Platelet Count"
loincCode: "777-3"
commonNames: "PLT, Platelet Count, Thrombocytes"
category: "HEMATOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Lavender top (EDTA)"
  volumeRequired: 3.0  # mL
  specialHandling: "Mix gently by inversion, analyze within 4 hours. Examine for clumping if low count"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "10^3/uL (K/uL)"
    normal:
      min: 150
      max: 400
      interpretation: "Normal hemostasis"
    critical:
      criticalLow: 20
      criticalHigh: 1000
      criticalInterpretation: "Severe thrombocytopenia (<20K) or thrombocytosis (>1000K)"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "10^3/uL"
    normal:
      min: 150
      max: 450
      interpretation: "Normal"
    critical:
      criticalLow: 20
      criticalHigh: 1000
      criticalInterpretation: "Critical - bleeding or clotting risk"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "150-400 K/uL: Normal platelet count and hemostasis"
    thrombocytopenia_mild: "100-149 K/uL: Mild thrombocytopenia - minimal bleeding risk"
    thrombocytopenia_moderate: "50-99 K/uL: Moderate thrombocytopenia - bleeding with trauma/surgery"
    thrombocytopenia_severe: "20-49 K/uL: Severe thrombocytopenia - spontaneous bleeding risk"
    thrombocytopenia_critical: "<20 K/uL: Critical - high risk spontaneous bleeding (CNS, GI)"
    thrombocytosis_mild: "400-600 K/uL: Mild thrombocytosis - reactive vs primary"
    thrombocytosis_moderate: "600-1000 K/uL: Moderate thrombocytosis - evaluate for myeloproliferative disorder"
    thrombocytosis_severe: ">1000 K/uL: Severe thrombocytosis - bleeding paradox and thrombosis risk"

  clinicalSignificance: |
    Platelets are essential for primary hemostasis and clot formation.
    Thrombocytopenia <50K increases surgical bleeding risk; <20K risks spontaneous bleeding.
    Thrombocytosis >1000K paradoxically increases both bleeding and thrombosis risk.
    Must rule out pseudothrombocytopenia (platelet clumping in EDTA) before treatment.

  commonCauses:
    - "Thrombocytopenia: ITP, TTP, HIT, DIC, hypersplenism, bone marrow failure, medications"
    - "Thrombocytosis: Reactive (infection, inflammation, iron deficiency), primary (ET, PV, CML)"

  differentialDiagnosis:
    - "Thrombocytopenia: Decreased production (bone marrow failure, chemo) vs increased destruction (ITP, TTP, HIT, DIC) vs sequestration (hypersplenism)"
    - "Thrombocytosis: Reactive (inflammation, malignancy, bleeding) vs primary myeloproliferative (ET, PV)"

  actionableFindings: |
    PLT <10K: URGENT platelet transfusion, avoid procedures, neuro checks q1h
    PLT <20K: Transfuse if bleeding or high-risk procedure planned
    PLT <50K: Hold invasive procedures, transfuse if active bleeding or surgery needed
    PLT 50-100K: Safe for most surgeries with transfusion available
    PLT >1000K: Evaluate for myeloproliferative disorder, consider aspirin or cytoreduction


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Routine CBC"
    - "Bleeding or bruising"
    - "Pre-operative evaluation"
    - "Chemotherapy monitoring"
    - "Suspected HIT (heparin-induced thrombocytopenia)"
    - "DIC evaluation"

  contraindications: []

  minimumIntervalHours: 8  # Daily monitoring for chemotherapy, DIC, transfusions
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "PSEUDOTHROMBOCYTOPENIA: Platelet clumping in EDTA (most common false low) - repeat in citrate or heparin tube"
    - "Platelet satellitism (platelets adhering to WBCs)"
    - "Giant platelets (undercounted by automated analyzers)"
    - "Clotted specimen (falsely low)"

  interferingMedications:
    - "Heparin (can cause HIT - thrombocytopenia)"
    - "Chemotherapy (decreases platelets)"
    - "Quinidine, sulfonamides (drug-induced thrombocytopenia)"
    - "Antiplatelet agents (aspirin, clopidogrel - do NOT lower count, only function)"

  stability: "Stable 24 hours at room temperature"
  rejectionCriteria: "Clotted specimen, insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 8.00
  patientCharge: 25.00
  highUtilization: true
  stewardshipRecommendations: "Part of CBC - avoid ordering platelets alone"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 31373666 (ASH ITP Guidelines 2019)"
  - "PMID: 29477251 (AABB Platelet Transfusion Guidelines 2015)"
  - "PMID: 23321946 (HIT diagnosis and management)"
  - "PMID: 28213621 (Thrombocytopenia in ICU)"


guidelineReferences:
  - "ASH Guidelines on Immune Thrombocytopenia 2019"
  - "AABB Clinical Practice Guidelines on Platelet Transfusion"
  - "ACCP Guidelines on HIT"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Complete blood count"
    - "Peripheral smear (if <100K to confirm)"

  reflexTesting:
    result_below_100: "Order peripheral smear to confirm and evaluate platelet morphology"
    result_below_50: "Evaluate for causes: peripheral smear, consider DIC labs (PT/INR, fibrinogen, D-dimer)"
    result_below_20: "URGENT - Platelet transfusion if bleeding or high-risk. Hematology consult"
    result_below_10: "EMERGENT - Immediate platelet transfusion, neuro checks, bleeding precautions"
    heparin_exposure_drop_50pct: "URGENT - HIT evaluation: Stop heparin, order HIT antibodies, start alternative anticoagulation"
    result_above_600: "Evaluate for reactive causes (infection, inflammation, bleeding, iron deficiency)"
    result_above_1000: "Hematology consult, peripheral smear, JAK2 mutation, bone marrow if indicated"

  followUpGuidance: |
    Severe thrombocytopenia <20K: Transfuse 1 apheresis unit or 6-pack, recheck in 1 hour
    ITP management: Corticosteroids, IVIG, consider rituximab or splenectomy
    HIT: Stop ALL heparin (including flushes), start argatroban or bivalirudin
    Thrombocytosis >1000K: Aspirin if no bleeding, hydroxyurea if symptomatic


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ASH ITP Guidelines 2019, AABB Transfusion Guidelines, UpToDate"
