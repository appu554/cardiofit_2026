# ==================================================================
# GLUCOSE TEST DEFINITION
# ==================================================================
testId: "LAB-GLUCOSE-001"
testName: "Blood Glucose"
loincCode: "2345-7"
commonNames: "Serum Glucose, Blood Sugar, Random Glucose"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture or fingerstick (POC)"
  container: "Gray top tube (sodium fluoride) or red top"
  volumeRequired: 1.0  # mL
  specialHandling: "Analyze within 30 minutes or use fluoride tube to prevent glycolysis"
  fastingRequired: false  # For random glucose; fasting required for fasting glucose


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 20
  urgentTurnaroundMinutes: 10
  criticalResultMinutes: 15
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/dL"
    normal:
      min: 70
      max: 100
      interpretation: "Normal fasting glucose; random <140 mg/dL normal"
    critical:
      criticalLow: 40
      criticalHigh: 400
      criticalInterpretation: "Severe hypoglycemia (<40) or hyperglycemia (>400) requires immediate treatment"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "mg/dL"
    normal:
      min: 70
      max: 100
      interpretation: "Normal fasting glucose"
    critical:
      criticalLow: 50
      criticalHigh: 300
      criticalInterpretation: "Critical - immediate evaluation"

  neonatal:
    population: "neonatal"
    sex: "ALL"
    ageMin: 0
    ageMax: 0
    unit: "mg/dL"
    normal:
      min: 40
      max: 100
      interpretation: "Normal for neonate (first 24 hours 40-60 acceptable)"
    critical:
      criticalLow: 30
      criticalHigh: 200
      criticalInterpretation: "Neonatal hypoglycemia or hyperglycemia"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "70-100 mg/dL fasting, <140 mg/dL random: Normal glucose metabolism"
    low: "50-69 mg/dL: Mild hypoglycemia - treat if symptomatic"
    high: "101-125 mg/dL fasting: Impaired fasting glucose; 140-199 mg/dL random: Impaired glucose tolerance"
    critical_low: "<40-50 mg/dL: Severe hypoglycemia - immediate glucose administration"
    critical_high: ">400 mg/dL: Severe hyperglycemia - evaluate for DKA or HHS"

  clinicalSignificance: |
    Glucose is essential for cellular energy metabolism. Abnormal values indicate
    diabetes, hypoglycemia, or stress hyperglycemia. Critical values require
    immediate intervention to prevent seizures (hypoglycemia) or DKA/HHS (hyperglycemia).

  commonCauses:
    - "Hypoglycemia: Insulin excess, oral hypoglycemics, sepsis, liver failure, adrenal insufficiency"
    - "Hyperglycemia: Diabetes mellitus, stress response, corticosteroids, sepsis, pancreatitis"
    - "Impaired fasting glucose: Prediabetes"

  differentialDiagnosis:
    - "Hypoglycemia: Insulinoma, medication effect, critical illness, adrenal insufficiency"
    - "Hyperglycemia: Type 1 DM, Type 2 DM, stress hyperglycemia, drug-induced"

  actionableFindings: |
    <40 mg/dL: Immediate IV dextrose or glucagon, recheck in 15 min
    40-60 mg/dL: Oral glucose if alert, IV dextrose if altered mental status
    >250 mg/dL with ketones: Evaluate for DKA
    >600 mg/dL: Evaluate for hyperosmolar hyperglycemic state (HHS)


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Altered mental status"
    - "Diabetes management"
    - "Suspected hypoglycemia or hyperglycemia"
    - "Critical illness"
    - "Steroid therapy"
    - "Routine metabolic panel"

  contraindications: []

  minimumIntervalHours: 0  # Can repeat frequently for glucose monitoring
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (falsely elevated)"
    - "Delay in analysis >30 minutes without fluoride (falsely decreased)"
    - "IV fluids containing dextrose (falsely elevated)"
    - "Drawing from IV line with dextrose (falsely elevated)"

  interferingMedications:
    - "Corticosteroids (increase glucose)"
    - "Insulin (decrease glucose)"
    - "Oral hypoglycemics (decrease glucose)"
    - "Beta-blockers (may mask hypoglycemia symptoms)"
    - "Thiazides (increase glucose)"

  stability: "30 minutes at room temperature, 8 hours with sodium fluoride"
  rejectionCriteria: "Clotted specimen, grossly hemolyzed, insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 3.50
  patientCharge: 15.00
  highUtilization: true
  stewardshipRecommendations: "Use POC glucose for frequent monitoring; reserve lab glucose for initial evaluation and confirmation"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 32032894 (ADA Standards of Care 2024)"
  - "PMID: 31862753 (Glycemic targets in critically ill)"
  - "PMID: 23507936 (Hospital hyperglycemia management)"
  - "PMID: 20876206 (Glucose management in ICU)"


guidelineReferences:
  - "American Diabetes Association Standards of Care 2024"
  - "NICE Guideline NG17 - Type 1 Diabetes"
  - "Society of Critical Care Medicine Glycemic Control Guidelines"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Hemoglobin A1c (if new hyperglycemia)"
    - "Comprehensive metabolic panel"
    - "Urinalysis (if hyperglycemia >250)"

  reflexTesting:
    result_below_50: "URGENT - Administer glucose, recheck in 15 minutes"
    result_above_250: "Check ketones (urine or blood), consider DKA evaluation"
    result_above_400: "URGENT - Evaluate for DKA or HHS, obtain ABG and electrolytes"

  followUpGuidance: |
    Hypoglycemia: Recheck glucose q15min until >70 mg/dL
    New hyperglycemia: Order HbA1c, fasting glucose, consider OGTT
    Known diabetes with poor control: Adjust medications, diabetes consult
    Stress hyperglycemia in ICU: Target 140-180 mg/dL per NICE-SUGAR trial


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ADA Standards of Care 2024, UpToDate, Mayo Clinic Laboratory Reference"
version: "1.0"
