# ==================================================================
# BLEEDING TIME TEST DEFINITION
# ==================================================================
testId: "LAB-BLEEDING-TIME-001"
testName: "Bleeding Time"
loincCode: "11067-6"
commonNames: "BT, Bleeding Time Test, Ivy Bleeding Time"
category: "HEMATOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "SKIN"
  collection: "Skin incision on volar forearm"
  container: "N/A (in vivo test)"
  volumeRequired: null
  specialHandling: "Standardized incision with template device. Time to cessation of bleeding measured with filter paper"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 30  # Test performed at bedside
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "8AM-5PM weekdays (rarely performed)"
  pointOfCareAvailable: true  # Performed at bedside, but being replaced by PFA-100


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "minutes"
    normal:
      min: 2.0
      max: 9.0
      interpretation: "Normal platelet function and primary hemostasis"
    critical:
      criticalLow: null
      criticalHigh: 15.0
      criticalInterpretation: "Prolonged bleeding time (>15 min) - significant platelet dysfunction"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "minutes"
    normal:
      min: 2.0
      max: 9.0
      interpretation: "Normal (similar to adults)"
    critical:
      criticalLow: null
      criticalHigh: 15.0
      criticalInterpretation: "Prolonged bleeding time - platelet dysfunction"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "2-9 minutes: Normal platelet function and primary hemostasis"
    prolonged_mild: "10-12 minutes: Mildly prolonged - evaluate platelet function"
    prolonged_moderate: "13-15 minutes: Moderately prolonged - platelet dysfunction likely"
    prolonged_severe: ">15 minutes: Severely prolonged - significant platelet dysfunction or vascular disorder"

  clinicalSignificance: |
    Bleeding time measures primary hemostasis (platelet plug formation and vascular
    integrity). It evaluates platelet function and vascular response in vivo. Prolonged
    bleeding time indicates platelet dysfunction (acquired or congenital), von Willebrand
    disease, or vascular disorders. NOTE: Bleeding time is largely being REPLACED by
    PFA-100 (Platelet Function Analyzer) in modern practice due to poor standardization,
    operator dependence, and patient discomfort. PFA-100 provides similar information
    without skin incision.

  commonCauses:
    - "Prolonged bleeding time: Aspirin/NSAIDs, von Willebrand disease, platelet dysfunction (Glanzmann thrombasthenia, Bernard-Soulier), uremia, severe anemia"
    - "Very prolonged (>15 min): Severe platelet dysfunction, von Willebrand disease type 3, hereditary hemorrhagic telangiectasia"

  differentialDiagnosis:
    - "Prolonged BT + normal platelet count: Platelet function disorder, von Willebrand disease, aspirin/NSAIDs, uremia"
    - "Prolonged BT + low platelet count: Thrombocytopenia (primary cause of prolonged BT if <50K platelets)"
    - "Prolonged BT + normal PT/PTT: Isolated platelet/vascular defect"
    - "Normal BT does NOT exclude platelet dysfunction: Poor sensitivity for mild defects"

  actionableFindings: |
    Bleeding time >15 minutes: Significant platelet dysfunction or vascular disorder
    Prolonged BT pre-operatively: High bleeding risk - evaluate with PFA-100, platelet aggregation studies
    Prolonged BT with normal platelets: Consider von Willebrand disease (order vWF antigen, activity, multimers)
    Prolonged BT on aspirin/NSAIDs: Stop antiplatelet agents 7-10 days before surgery
    Prolonged BT with mucosal bleeding: Evaluate for von Willebrand disease, platelet function disorder
    NOTE: PFA-100 is preferred over bleeding time in modern practice


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected platelet function disorder"
    - "Pre-operative bleeding risk assessment (rarely used now)"
    - "Unexplained mucosal bleeding with normal platelet count"
    - "Suspected von Willebrand disease (NOTE: PFA-100 preferred)"
    - "Evaluation of aspirin/NSAID effect (NOTE: PFA-100 preferred)"

  contraindications:
    - "Thrombocytopenia <50K (test invalid, high bleeding risk)"
    - "Antiplatelet therapy within 7-10 days (aspirin, clopidogrel, NSAIDs)"
    - "Keloid formation tendency"
    - "Poor skin integrity or infection at test site"
    - "Uncooperative patient"

  minimumIntervalHours: null  # Rarely repeated, leaves scar
  requiresConsent: true  # Informed consent due to scarring risk
  appropriatenessLevel: "RARELY_APPROPRIATE"

  prerequisiteTests:
    - "CBC with platelet count (must be >50K to perform test)"


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Thrombocytopenia <50K (falsely prolonged - do NOT perform)"
    - "Severe anemia Hct <30% (falsely prolonged)"
    - "Operator technique variation (poor standardization)"
    - "Patient movement during test"
    - "Ambient temperature (cold room prolongs BT)"
    - "Blood pressure cuff pressure variation"

  interferingMedications:
    - "Aspirin (prolongs BT up to 7-10 days after last dose)"
    - "NSAIDs (prolong BT for 3-5 days after stopping)"
    - "Clopidogrel/ticagrelor (prolong BT)"
    - "SSRIs (mild prolongation)"
    - "Penicillin/cephalosporins (high-dose can prolong BT)"

  stability: "N/A (in vivo test)"
  rejectionCriteria: "Platelet count <50K, active aspirin/NSAID use, keloid history, patient refusal"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 50.00
  patientCharge: 150.00
  highUtilization: false
  stewardshipRecommendations: "Bleeding time is OBSOLETE in most institutions. Use PFA-100 (Platelet Function Analyzer) instead - more standardized, no scarring, better sensitivity. Consider platelet aggregation studies for definitive platelet function testing"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 15286524 (Bleeding time limitations and alternatives)"
  - "PMID: 19880497 (PFA-100 vs bleeding time comparison)"
  - "PMID: 22289886 (von Willebrand disease diagnosis)"
  - "PMID: 20871437 (Platelet function testing guidelines)"


guidelineReferences:
  - "ASH Guidelines on von Willebrand Disease"
  - "ISTH Guidelines on Platelet Function Testing"
  - "CAP/ASH Guidelines on Bleeding Disorder Evaluation"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "CBC with platelet count"
    - "PT/PTT"

  reflexTesting:
    bt_above_15: "Significant platelet dysfunction. Order PFA-100, von Willebrand panel (vWF antigen, activity, multimers)"
    bt_above_12: "Platelet dysfunction likely. Consider PFA-100, review medications (aspirin, NSAIDs)"
    prolonged_with_normal_platelets: "Order von Willebrand panel: vWF antigen, vWF activity (ristocetin cofactor), vWF multimers"
    prolonged_with_mucosal_bleeding: "Evaluate for von Willebrand disease, platelet function disorder (PFA-100, platelet aggregation)"
    platelet_count_below_50k: "DO NOT perform bleeding time - invalid test, high bleeding risk"

  followUpGuidance: |
    Prolonged bleeding time: Order PFA-100 (more standardized, replaces bleeding time)
    PFA-100 closure times: Collagen-epinephrine <165 sec, Collagen-ADP <120 sec
    von Willebrand disease suspected: vWF antigen, vWF activity, vWF multimers, factor VIII
    Platelet function disorder suspected: Platelet aggregation studies (ADP, collagen, arachidonic acid, ristocetin)
    Pre-operative: If prolonged BT, stop aspirin/NSAIDs 7-10 days before surgery
    NOTE: Bleeding time is OBSOLETE - use PFA-100 or platelet aggregation studies instead


