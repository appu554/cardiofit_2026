# ==================================================================
# HEMATOCRIT TEST DEFINITION
# ==================================================================
testId: "LAB-HEMATOCRIT-001"
testName: "Hematocrit"
loincCode: "4544-3"
commonNames: "Hct, HCT, Crit, Packed Cell Volume"
category: "HEMATOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Lavender top (EDTA)"
  volumeRequired: 3.0  # mL
  specialHandling: "Mix gently by inversion, avoid hemolysis"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 60
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult_male:
    population: "adult"
    sex: "M"
    ageMin: 18
    ageMax: 120
    unit: "%"
    normal:
      min: 39.0
      max: 49.0
      interpretation: "Normal oxygen-carrying capacity (Hct ≈ 3 × Hgb)"
    critical:
      criticalLow: 20.0
      criticalHigh: 60.0
      criticalInterpretation: "Severe anemia (<20%) or polycythemia (>60%)"

  adult_female:
    population: "adult"
    sex: "F"
    ageMin: 18
    ageMax: 120
    unit: "%"
    normal:
      min: 36.0
      max: 44.0
      interpretation: "Normal oxygen-carrying capacity (Hct ≈ 3 × Hgb)"
    critical:
      criticalLow: 20.0
      criticalHigh: 54.0
      criticalInterpretation: "Severe anemia (<20%) or polycythemia (>54%)"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "%"
    normal:
      min: 33.0
      max: 48.0
      interpretation: "Normal (varies by age)"
    critical:
      criticalLow: 20.0
      criticalHigh: 55.0
      criticalInterpretation: "Critical anemia or polycythemia"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "Male 39-49%, Female 36-44%: Normal hematocrit"
    anemia_mild: "Male 33-38%, Female 30-35%: Mild anemia"
    anemia_moderate: "24-29%: Moderate anemia - evaluate cause"
    anemia_severe: "<24%: Severe anemia - consider transfusion"
    anemia_critical: "<20%: Life-threatening anemia - transfuse if symptomatic"
    polycythemia: "Male >49%, Female >44%: Polycythemia - evaluate cause"
    polycythemia_critical: "Male >60%, Female >54%: Critical polycythemia - hyperviscosity risk"

  clinicalSignificance: |
    Hematocrit measures the percentage of blood volume occupied by red blood cells.
    It correlates directly with hemoglobin (Hct ≈ 3 × Hgb) and reflects oxygen-carrying
    capacity. Low hematocrit (anemia) causes tissue hypoxia and cardiac stress. High
    hematocrit (polycythemia) increases blood viscosity and thrombosis risk. Part of CBC.

  commonCauses:
    - "Low Hct (Anemia): Iron deficiency, blood loss, chronic disease, hemolysis, bone marrow failure, pregnancy"
    - "High Hct (Polycythemia): Dehydration, COPD, polycythemia vera, high altitude, smoking, renal tumors"

  differentialDiagnosis:
    - "Anemia with low MCV (microcytic): Iron deficiency, thalassemia, chronic disease"
    - "Anemia with normal MCV (normocytic): Acute blood loss, chronic disease, hemolysis, renal failure"
    - "Anemia with high MCV (macrocytic): B12/folate deficiency, alcohol, liver disease, hypothyroidism"
    - "Polycythemia: Primary (polycythemia vera) vs secondary (COPD, high altitude, EPO-secreting tumor)"

  actionableFindings: |
    Hct <20%: CRITICAL - Consider transfusion if symptomatic or active bleeding
    Hct <24% with cardiac disease: Transfusion threshold 24% for cardiac patients (equivalent to Hgb 8 g/dL)
    Acute drop >6%: Evaluate for active bleeding, hemolysis
    New anemia: Order iron studies, reticulocyte count, peripheral smear
    Hct >60% (male) or >54% (female): Phlebotomy if polycythemia vera, hydration if dehydration
    Hct >55%: Hyperviscosity risk - evaluate cause, monitor for thrombosis


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Routine CBC"
    - "Suspected anemia"
    - "Blood loss evaluation"
    - "Pre-operative assessment"
    - "Transfusion decisions"
    - "Chronic disease monitoring"
    - "Polycythemia evaluation"

  contraindications: []

  minimumIntervalHours: 8  # Daily monitoring for active bleeding/transfusions
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (falsely low)"
    - "Lipemia (falsely high)"
    - "Leukocytosis >50K (falsely high)"
    - "IV fluid dilution (falsely low)"
    - "Dehydration (falsely high)"
    - "Pregnancy (physiologic dilution, falsely low)"

  interferingMedications:
    - "Erythropoietin (increase Hct)"
    - "Chemotherapy (decrease Hct)"
    - "Iron supplements (increase Hct over time)"
    - "Diuretics (increase Hct by hemoconcentration)"

  stability: "Stable 24 hours at room temperature, 1 week refrigerated"
  rejectionCriteria: "Clotted specimen, grossly hemolyzed"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 8.00
  patientCharge: 25.00
  highUtilization: true
  stewardshipRecommendations: "Part of CBC - do not order hematocrit alone. Provides same information as hemoglobin (Hct ≈ 3 × Hgb). Hemoglobin is preferred for clinical decision-making"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 27121245 (AABB Transfusion Guidelines 2016)"
  - "PMID: 26398073 (Restrictive transfusion strategy)"
  - "PMID: 24226924 (Anemia evaluation WHO guidelines)"
  - "PMID: 31573637 (Iron deficiency anemia)"


guidelineReferences:
  - "AABB Clinical Practice Guidelines on Red Blood Cell Transfusion"
  - "WHO Guidelines on Anemia"
  - "ASH Choosing Wisely Recommendations"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Complete blood count"
    - "Hemoglobin"
    - "RBC indices (MCV, MCH, MCHC)"

  reflexTesting:
    result_below_30: "Order iron studies, reticulocyte count, evaluate for bleeding"
    result_below_24: "Consider transfusion if symptomatic or cardiac disease"
    result_below_20: "URGENT - Transfusion likely needed if symptomatic, evaluate for active bleeding"
    acute_drop_6: "Evaluate for acute blood loss, hemolysis (LDH, haptoglobin, bilirubin)"
    result_above_52: "Evaluate for polycythemia vera (JAK2 mutation), secondary causes (COPD, sleep apnea)"
    result_above_60: "CRITICAL hyperviscosity risk - phlebotomy if polycythemia vera, hydration if dehydration"

  followUpGuidance: |
    Severe anemia Hct <20%: Transfuse 1 unit PRBC, recheck Hct, repeat as needed (each unit raises Hct by ~3%)
    Moderate anemia Hct 21-30%: Evaluate cause, oral iron if iron deficient
    New anemia: Iron studies, B12/folate, reticulocyte count, peripheral smear
    Post-transfusion: Recheck Hct 15 min after transfusion (expect 3% rise per unit)
    Chronic anemia: Monitor q3-6 months, treat underlying cause
    Polycythemia >55%: Phlebotomy to target Hct <45% if polycythemia vera


