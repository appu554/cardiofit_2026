# ==================================================================
# MAGNESIUM TEST DEFINITION
# ==================================================================
testId: "LAB-MAGNESIUM-001"
testName: "Magnesium"
loincCode: "19123-9"
commonNames: "Mg, Serum Magnesium"
category: "CHEMISTRY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 2.0  # mL
  specialHandling: "Avoid hemolysis (falsely elevates result)"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 45
  urgentTurnaroundMinutes: 30
  criticalResultMinutes: 30
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mg/dL"
    normal:
      min: 1.7
      max: 2.2
      interpretation: "Normal magnesium homeostasis"
    critical:
      criticalLow: 1.0
      criticalHigh: 4.0
      criticalInterpretation: "Severe magnesium disturbance - cardiac arrhythmias, seizures"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    low: "<1.7 mg/dL: Hypomagnesemia - check for renal losses, GI losses, inadequate intake"
    normal: "1.7-2.2 mg/dL: Normal magnesium status"
    high: ">2.2 mg/dL: Hypermagnesemia - usually iatrogenic (IV Mg, MgSO4, antacids)"
    critical_low: "<1.0 mg/dL: Severe hypomagnesemia - risk of torsades de pointes, seizures, tetany"
    critical_high: ">4.0 mg/dL: Severe hypermagnesemia - respiratory depression, cardiac arrest"

  clinicalSignificance: |
    Magnesium is the second most abundant intracellular cation (after potassium). Essential for
    >300 enzymatic reactions, neuromuscular transmission, and cardiac conduction. Hypomagnesemia
    is common (up to 12% of hospitalized patients) and often coexists with hypokalemia and
    hypocalcemia. Serum magnesium underestimates total body magnesium (only 1% is in serum).
    Hypomagnesemia causes refractory hypokalemia and hypocalcemia.

  commonCauses:
    - "Hypomagnesemia: Diuretics (loop, thiazide), PPI therapy, diarrhea, alcohol use disorder, DKA, refeeding syndrome, malabsorption"
    - "Hypermagnesemia: Chronic kidney disease (reduced excretion), excessive IV MgSO4 (eclampsia treatment), Mg-containing antacids/laxatives"

  differentialDiagnosis:
    - "Hypomagnesemia with hypokalemia: Common combination. Correct Mg first to correct K (Mg required for K channel function)"
    - "Hypomagnesemia with hypocalcemia: Mg required for PTH secretion and action. Correct Mg to correct Ca"
    - "Hypomagnesemia with normal K/Ca: Isolated Mg deficiency from GI losses or inadequate intake"

  actionableFindings: |
    Mg <1.0: IV magnesium replacement (MgSO4 1-2 g IV over 15 min, then 4-6 g over 24 hours)
    Mg <1.7 with cardiac arrhythmias: IV Mg replacement (prevent torsades de pointes)
    Mg <1.7 with refractory hypokalemia: Correct Mg first (required for K channel function)
    Mg <1.7 with hypocalcemia: Correct Mg first (required for PTH function)
    Mg >4.0: Stop Mg-containing medications, IV calcium gluconate (antagonist), dialysis if severe


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Refractory hypokalemia (K not correcting despite replacement)"
    - "Hypocalcemia (Mg required for PTH secretion)"
    - "Cardiac arrhythmias (torsades de pointes, atrial fibrillation)"
    - "Seizures or altered mental status"
    - "Chronic diarrhea or malabsorption"
    - "Alcohol use disorder"
    - "Diuretic therapy (loop or thiazide diuretics)"
    - "PPI therapy (chronic use decreases Mg absorption)"
    - "DKA or refeeding syndrome"
    - "Preeclampsia/eclampsia (monitoring MgSO4 therapy)"

  contraindications: []
  minimumIntervalHours: 24
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Hemolysis (falsely elevated - intracellular Mg released)"
    - "Prolonged tourniquet time (falsely elevated)"
    - "Contamination with EDTA anticoagulant (falsely decreased)"

  interferingMedications:
    - "Diuretics (loop, thiazide): Increase urinary Mg loss → hypomagnesemia"
    - "PPIs (omeprazole, lansoprazole): Decrease Mg absorption → hypomagnesemia with chronic use"
    - "Aminoglycosides, amphotericin B, cisplatin: Increase urinary Mg loss"
    - "Mg-containing laxatives/antacids: Can cause hypermagnesemia"
    - "IV MgSO4 (eclampsia treatment): Can cause hypermagnesemia"

  stability: "Stable 7 days at 2-8°C"
  rejectionCriteria: "Hemolyzed specimen, clotted specimen, EDTA tube (use SST or red top)"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 8.00
  patientCharge: 25.00
  highUtilization: true
  stewardshipRecommendations: "Order magnesium when correcting refractory hypokalemia or hypocalcemia. Check Mg levels in patients on chronic diuretics or PPIs"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 25062316 (Clinical significance of magnesium disorders)"
  - "PMID: 23558164 (Hypomagnesemia in hospitalized patients)"
  - "PMID: 29870636 (PPI-induced hypomagnesemia)"
  - "PMID: 24005214 (Magnesium and cardiac arrhythmias)"

guidelineReferences:
  - "American Heart Association Guidelines on Torsades de Pointes Management"
  - "ACOG Guidelines on Magnesium Sulfate for Preeclampsia"
  - "ASPEN Guidelines on Refeeding Syndrome"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Potassium (Mg required for K correction)"
    - "Calcium (Mg required for PTH function)"
    - "Comprehensive metabolic panel"

  reflexTesting:
    mg_below_1.0: "URGENT - IV magnesium replacement: MgSO4 1-2 g IV over 15 min, then 4-6 g over 24 hours"
    mg_below_1.7_with_low_potassium: "Correct magnesium FIRST before attempting potassium correction (Mg required for K channel function)"
    mg_below_1.7_with_low_calcium: "Correct magnesium FIRST before attempting calcium correction (Mg required for PTH secretion and action)"
    mg_below_1.7_with_arrhythmia: "IV magnesium replacement to prevent torsades de pointes (2 g MgSO4 IV over 15 min)"
    mg_above_4.0: "URGENT - Stop all Mg-containing medications, IV calcium gluconate 1-2 g (antagonist), consider dialysis if severe or symptomatic"

  followUpGuidance: |
    Hypomagnesemia: Correct underlying cause (stop diuretics/PPIs if possible)
    Mild hypomagnesemia (1.4-1.7): Oral magnesium oxide 400 mg TID
    Severe hypomagnesemia (<1.0): IV MgSO4 1-2 g over 15 min, then 4-6 g over 24 hours
    Refractory hypokalemia: ALWAYS check magnesium - correct Mg first, then K will correct
    Hypocalcemia with normal PTH: Check magnesium - low Mg impairs PTH secretion
    Hypermagnesemia: Stop Mg sources, IV calcium if symptomatic, dialysis if renal failure
    Prevention: Avoid chronic PPI use, monitor Mg in patients on loop diuretics


