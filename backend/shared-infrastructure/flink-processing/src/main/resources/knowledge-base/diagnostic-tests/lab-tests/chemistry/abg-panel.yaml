# Arterial Blood Gas (ABG) Panel - Critical Multi-Component Test
# LOINC: 24336-0 - Gas panel - Arterial blood
#
# Comprehensive assessment of acid-base status, ventilation, and oxygenation
# Critical for respiratory failure, metabolic disorders, shock states
#
# Evidence Level: A - Essential diagnostic test for critically ill patients
# Last Updated: 2025-10-23

testId: "ABG_PANEL"
testName: "Arterial Blood Gas Panel"
category: "CHEMISTRY"
subcategory: "BLOOD_GAS"
loincCode: "24336-0"
loincDisplay: "Gas panel - Arterial blood"

# Clinical Overview
description: |
  Arterial Blood Gas (ABG) panel is a critical diagnostic test that simultaneously measures
  multiple parameters to assess acid-base balance, ventilation adequacy, and oxygenation status.
  It is essential for evaluating respiratory and metabolic disorders in critically ill patients.

clinicalSignificance: |
  ABG analysis provides immediate assessment of:
  - Acid-base status (pH, bicarbonate, base excess)
  - Ventilation adequacy (PaCO2)
  - Oxygenation status (PaO2)
  - Metabolic compensation mechanisms
  - Critical for diagnosis and management of respiratory failure, metabolic acidosis/alkalosis,
    shock states, and monitoring mechanical ventilation

# Multi-Component Panel Structure
panelType: "MULTI_COMPONENT"
components:
  - componentId: "ABG_PH"
    componentName: "pH - Arterial blood"
    loincCode: "2744-1"
    loincDisplay: "pH of Arterial blood"
    unit: "pH"
    referenceRange:
      normalRange:
        min: 7.35
        max: 7.45
        optimalMin: 7.38
        optimalMax: 7.42
    criticalValues:
      low: 7.20
      high: 7.60
      immediate_action_required: true
    clinicalInterpretation: |
      pH measures hydrogen ion concentration, reflecting overall acid-base status.
      - <7.35: Acidemia (respiratory or metabolic acidosis)
      - >7.45: Alkalemia (respiratory or metabolic alkalosis)
      - <7.20 or >7.60: Life-threatening, immediate intervention required

  - componentId: "ABG_PAO2"
    componentName: "PaO2 - Partial pressure of oxygen"
    loincCode: "2703-7"
    loincDisplay: "Oxygen [Partial pressure] in Arterial blood"
    unit: "mmHg"
    referenceRange:
      normalRange:
        min: 80
        max: 100
        optimalMin: 85
        optimalMax: 95
      ageAdjusted: true
      ageAdjustmentFormula: "PaO2 (mmHg) = 104.2 - (0.27 × age in years)"
    criticalValues:
      low: 60
      critical_low: 50
      immediate_action_required: true
    clinicalInterpretation: |
      PaO2 measures oxygen dissolved in arterial blood, assessing oxygenation.
      - 80-100 mmHg: Normal oxygenation
      - 60-79 mmHg: Mild hypoxemia
      - 50-59 mmHg: Moderate hypoxemia
      - <50 mmHg: Severe hypoxemia, immediate oxygen therapy required
      - Decreases with age, use age-adjusted formula for interpretation

  - componentId: "ABG_PACO2"
    componentName: "PaCO2 - Partial pressure of carbon dioxide"
    loincCode: "2019-8"
    loincDisplay: "Carbon dioxide [Partial pressure] in Arterial blood"
    unit: "mmHg"
    referenceRange:
      normalRange:
        min: 35
        max: 45
        optimalMin: 38
        optimalMax: 42
    criticalValues:
      low: 20
      high: 60
      immediate_action_required: true
    clinicalInterpretation: |
      PaCO2 measures carbon dioxide in arterial blood, reflecting ventilation adequacy.
      - 35-45 mmHg: Normal ventilation
      - <35 mmHg: Hypocapnia (hyperventilation, respiratory alkalosis)
      - >45 mmHg: Hypercapnia (hypoventilation, respiratory acidosis)
      - <20 or >60 mmHg: Critical, immediate intervention required

  - componentId: "ABG_HCO3"
    componentName: "Bicarbonate (HCO3)"
    loincCode: "1960-4"
    loincDisplay: "Bicarbonate [Moles/volume] in Arterial blood"
    unit: "mEq/L"
    referenceRange:
      normalRange:
        min: 22
        max: 26
        optimalMin: 23
        optimalMax: 25
    criticalValues:
      low: 15
      high: 40
      immediate_action_required: true
    clinicalInterpretation: |
      Bicarbonate reflects metabolic component of acid-base balance.
      - 22-26 mEq/L: Normal metabolic status
      - <22 mEq/L: Metabolic acidosis or renal compensation for respiratory alkalosis
      - >26 mEq/L: Metabolic alkalosis or renal compensation for respiratory acidosis
      - <15 or >40 mEq/L: Severe metabolic disorder, immediate intervention required

  - componentId: "ABG_BASE_EXCESS"
    componentName: "Base Excess (BE)"
    loincCode: "1925-7"
    loincDisplay: "Base excess in Arterial blood by calculation"
    unit: "mEq/L"
    referenceRange:
      normalRange:
        min: -2
        max: 2
        optimalMin: -1
        optimalMax: 1
    criticalValues:
      low: -10
      high: 10
      immediate_action_required: true
    clinicalInterpretation: |
      Base Excess quantifies metabolic component independent of respiratory changes.
      - -2 to +2 mEq/L: Normal metabolic status
      - Negative BE: Metabolic acidosis (lactic acidosis, DKA, renal failure)
      - Positive BE: Metabolic alkalosis (vomiting, diuretics, volume depletion)
      - <-10 or >+10 mEq/L: Severe metabolic derangement

# Specimen Requirements
specimenType: "BLOOD"
specimenSubtype: "ARTERIAL"
collectionMethod: "ARTERIAL_PUNCTURE"
collectionSites:
  - site: "RADIAL_ARTERY"
    preferred: true
    notes: "Most common site, perform Allen test first"
  - site: "FEMORAL_ARTERY"
    preferred: false
    notes: "Alternative site, higher risk of complications"
  - site: "BRACHIAL_ARTERY"
    preferred: false
    notes: "Alternative site, avoid if possible due to lack of collateral circulation"

containerType: "HEPARINIZED_SYRINGE"
containerDetails:
  type: "Arterial blood gas syringe"
  anticoagulant: "Lithium or sodium heparin"
  syringe_type: "Specialty ABG syringe with cap"
  volume_required: "1-3 mL"
  fill_requirements: "Expel all air bubbles immediately after collection"

minimumVolume: 1.0
minimumVolumeUnit: "mL"
optimalVolume: 2.0
optimalVolumeUnit: "mL"

# Special Handling Requirements
specialHandling:
  - requirement: "IMMEDIATE_ANALYSIS"
    description: "Analyze within 15 minutes of collection"
    critical: true
    reason: "Cellular metabolism continues ex vivo, altering gas values"
  - requirement: "ICE_TRANSPORT"
    description: "Transport on ice if analysis delayed"
    critical: true
    reason: "Slows cellular metabolism, preserves gas values"
  - requirement: "AIR_BUBBLE_REMOVAL"
    description: "Expel all air bubbles immediately after collection"
    critical: true
    reason: "Air bubbles equilibrate with room air, falsely elevating PaO2 and lowering PaCO2"
  - requirement: "ANAEROBIC_COLLECTION"
    description: "Maintain anaerobic conditions during collection and transport"
    critical: true
    reason: "Exposure to air invalidates results"
  - requirement: "MIXING"
    description: "Mix gently by rolling syringe, do not shake vigorously"
    critical: false
    reason: "Ensures homogeneous sample, prevents hemolysis"

# Turnaround Time
turnaroundTimeMinutes: 30
urgentTurnaroundMinutes: 15
statAvailable: true
pointOfCareAvailable: true
pointOfCareTurnaroundMinutes: 5

# Availability
availability:
  schedule: "24/7"
  stat_availability: true
  point_of_care: true
  location_restrictions: "None - critical test available at all times"

# Clinical Indications
indications:
  primary:
    - indication: "Respiratory failure or acute respiratory distress"
      icd10Codes: ["J96.00", "J96.90"]
      urgency: "STAT"
      evidence_level: "A"
    - indication: "Suspected metabolic acidosis (DKA, lactic acidosis, renal failure)"
      icd10Codes: ["E87.2", "E11.10", "N18.9"]
      urgency: "STAT"
      evidence_level: "A"
    - indication: "Shock states (septic, cardiogenic, hypovolemic)"
      icd10Codes: ["R57.9", "A41.9", "I50.9"]
      urgency: "STAT"
      evidence_level: "A"
    - indication: "Acute exacerbation of COPD or asthma"
      icd10Codes: ["J44.1", "J45.901"]
      urgency: "STAT"
      evidence_level: "A"
    - indication: "Post-cardiac arrest"
      icd10Codes: ["I46.9"]
      urgency: "STAT"
      evidence_level: "A"

  secondary:
    - indication: "Monitoring mechanical ventilation"
      icd10Codes: ["Z99.11"]
      urgency: "ROUTINE"
      evidence_level: "A"
    - indication: "Suspected pulmonary embolism"
      icd10Codes: ["I26.99"]
      urgency: "URGENT"
      evidence_level: "B"
    - indication: "Drug overdose with respiratory depression"
      icd10Codes: ["T40.2X1A", "T42.3X1A"]
      urgency: "STAT"
      evidence_level: "A"
    - indication: "Diabetic ketoacidosis"
      icd10Codes: ["E10.10", "E11.10"]
      urgency: "STAT"
      evidence_level: "A"
    - indication: "Severe sepsis or septic shock"
      icd10Codes: ["R65.20", "A41.9"]
      urgency: "STAT"
      evidence_level: "A"

# Comprehensive Interpretation Guidelines
interpretation:
  primaryDisorders:
    - disorder: "RESPIRATORY_ACIDOSIS"
      criteria:
        pH: "<7.35"
        PaCO2: ">45 mmHg"
      causes:
        - "COPD exacerbation"
        - "Severe asthma"
        - "Respiratory muscle weakness"
        - "CNS depression (drugs, stroke)"
        - "Airway obstruction"
      compensation: "Renal retention of bicarbonate (HCO3 >26 mEq/L) if chronic"
      treatment_approach: "Improve ventilation, treat underlying cause"

    - disorder: "RESPIRATORY_ALKALOSIS"
      criteria:
        pH: ">7.45"
        PaCO2: "<35 mmHg"
      causes:
        - "Hyperventilation (anxiety, pain)"
        - "Hypoxemia"
        - "Pulmonary embolism"
        - "Sepsis"
        - "Mechanical ventilation (over-ventilation)"
      compensation: "Renal loss of bicarbonate (HCO3 <22 mEq/L) if chronic"
      treatment_approach: "Treat underlying cause, adjust ventilator settings if applicable"

    - disorder: "METABOLIC_ACIDOSIS"
      criteria:
        pH: "<7.35"
        HCO3: "<22 mEq/L"
        base_excess: "Negative"
      causes:
        - "Diabetic ketoacidosis (DKA)"
        - "Lactic acidosis (shock, sepsis, hypoperfusion)"
        - "Renal failure (uremic acidosis)"
        - "Diarrhea (GI bicarbonate loss)"
        - "Toxic ingestions (methanol, ethylene glycol, salicylates)"
      compensation: "Respiratory compensation (PaCO2 <35 mmHg)"
      additional_tests: "Anion gap calculation, lactate, glucose, ketones"
      treatment_approach: "Treat underlying cause, consider bicarbonate if severe (pH <7.1)"

    - disorder: "METABOLIC_ALKALOSIS"
      criteria:
        pH: ">7.45"
        HCO3: ">26 mEq/L"
        base_excess: "Positive"
      causes:
        - "Vomiting or nasogastric suction (loss of gastric acid)"
        - "Diuretic therapy"
        - "Volume depletion"
        - "Hypokalemia"
        - "Hyperaldosteronism"
      compensation: "Respiratory compensation (PaCO2 >45 mmHg)"
      additional_tests: "Electrolytes, chloride, potassium"
      treatment_approach: "Volume repletion, correct electrolyte abnormalities, treat underlying cause"

  mixedDisorders:
    - disorder: "MIXED_RESPIRATORY_METABOLIC_ACIDOSIS"
      criteria: "pH <7.35, PaCO2 >45 mmHg, HCO3 <22 mEq/L"
      clinical_context: "Cardiopulmonary arrest, severe shock with respiratory failure"
      severity: "Life-threatening"

    - disorder: "MIXED_RESPIRATORY_METABOLIC_ALKALOSIS"
      criteria: "pH >7.45, PaCO2 <35 mmHg, HCO3 >26 mEq/L"
      clinical_context: "Hyperventilating patient on diuretics, liver disease"
      severity: "Moderate to severe"

    - disorder: "TRIPLE_DISORDER"
      criteria: "Complex patterns requiring detailed analysis"
      clinical_context: "Multiple simultaneous acid-base disturbances"
      severity: "Severe, requires expert consultation"

  compensationRules:
    acute_respiratory_acidosis:
      expected_HCO3_change: "1 mEq/L increase per 10 mmHg PaCO2 increase"
      timeframe: "Minutes to hours"
    chronic_respiratory_acidosis:
      expected_HCO3_change: "3.5 mEq/L increase per 10 mmHg PaCO2 increase"
      timeframe: "3-5 days"
    acute_respiratory_alkalosis:
      expected_HCO3_change: "2 mEq/L decrease per 10 mmHg PaCO2 decrease"
      timeframe: "Minutes to hours"
    chronic_respiratory_alkalosis:
      expected_HCO3_change: "5 mEq/L decrease per 10 mmHg PaCO2 decrease"
      timeframe: "3-5 days"
    metabolic_acidosis:
      expected_PaCO2: "PaCO2 = 1.5 × (HCO3) + 8 ± 2 (Winter's formula)"
      timeframe: "12-24 hours"
    metabolic_alkalosis:
      expected_PaCO2_change: "0.7 mmHg increase per 1 mEq/L HCO3 increase"
      timeframe: "12-24 hours"

  oxygenationAssessment:
    A_a_gradient:
      formula: "A-a gradient = PAO2 - PaO2, where PAO2 = (FiO2 × [Patm - PH2O]) - (PaCO2/0.8)"
      normal_range: "5-10 mmHg on room air, increases with age"
      interpretation: |
        - Normal A-a gradient with hypoxemia: Hypoventilation, high altitude
        - Elevated A-a gradient with hypoxemia: V/Q mismatch, shunt, diffusion defect
    PaO2_FiO2_ratio:
      formula: "P/F ratio = PaO2 / FiO2"
      normal_range: ">300"
      interpretation: |
        - >300: Normal oxygenation
        - 200-300: Mild ARDS
        - 100-200: Moderate ARDS
        - <100: Severe ARDS

# Auto-Order With (Reflexive Testing)
autoOrderWith:
  - testId: "LACTATE"
    testName: "Lactate - Arterial blood"
    loincCode: "2518-9"
    indication: "All ABG orders to assess tissue perfusion and anaerobic metabolism"
    evidence_level: "A"
  - testId: "GLUCOSE_ABG"
    testName: "Glucose - Arterial blood"
    loincCode: "14749-6"
    indication: "Suspected DKA or hypoglycemia"
    evidence_level: "A"
  - testId: "ELECTROLYTES"
    testName: "Basic Metabolic Panel"
    loincCode: "24323-8"
    indication: "Calculate anion gap for metabolic acidosis evaluation"
    evidence_level: "A"
  - testId: "ANION_GAP"
    testName: "Anion gap calculation"
    loincCode: "33037-3"
    indication: "Differentiate high vs normal anion gap metabolic acidosis"
    evidence_level: "A"

# Quality Control
qualityControl:
  preAnalytical:
    - "Verify proper arterial puncture technique (Allen test performed if radial artery)"
    - "Confirm absence of air bubbles in syringe"
    - "Verify sample on ice if transport time >5 minutes"
    - "Document time of collection and analysis"
    - "Confirm patient oxygen therapy status (FiO2, flow rate)"
  analytical:
    - "Calibrate blood gas analyzer per manufacturer specifications"
    - "Run quality control samples (low, normal, high levels)"
    - "Verify temperature correction if patient hypothermic or hyperthermic"
    - "Check for clots or hemolysis"
  postAnalytical:
    - "Verify results are physiologically plausible"
    - "Correlate with venous pH if available"
    - "Document critical values reported to ordering provider"
    - "Review for evidence of mixed disorders"

# Interfering Factors
interferingFactors:
  - factor: "Air bubbles"
    effect: "Falsely elevates PaO2, falsely lowers PaCO2"
    severity: "CRITICAL"
    mitigation: "Expel all air bubbles immediately after collection"
  - factor: "Delayed analysis"
    effect: "Decreases PaO2, increases PaCO2, decreases pH"
    severity: "CRITICAL"
    mitigation: "Analyze within 15 minutes or transport on ice"
  - factor: "Venous contamination"
    effect: "Lowers PaO2, elevates PaCO2"
    severity: "CRITICAL"
    mitigation: "Ensure proper arterial puncture technique, pulsatile blood flow"
  - factor: "Excess heparin"
    effect: "Lowers pH, may dilute sample"
    severity: "MODERATE"
    mitigation: "Use pre-heparinized syringes, expel excess heparin"
  - factor: "Fever"
    effect: "Increases metabolism, may lower PaO2 and pH"
    severity: "MODERATE"
    mitigation: "Apply temperature correction factor if available"
  - factor: "Hypothermia"
    effect: "Decreases metabolism, may elevate PaO2"
    severity: "MODERATE"
    mitigation: "Apply temperature correction factor"
  - factor: "Leukocytosis (>100,000/mm³)"
    effect: "Leukocytes consume oxygen, falsely lowers PaO2"
    severity: "MODERATE"
    mitigation: "Analyze immediately, consider point-of-care testing"

# Contraindications and Precautions
contraindications:
  - contraindication: "Negative Allen test"
    type: "RELATIVE"
    reason: "Inadequate collateral circulation to hand if radial artery damaged"
    alternative: "Use femoral or brachial artery"
  - contraindication: "Coagulopathy or anticoagulation"
    type: "RELATIVE"
    reason: "Increased bleeding risk"
    precaution: "Apply prolonged pressure (10-15 minutes), use compressible site"
  - contraindication: "Severe peripheral vascular disease"
    type: "RELATIVE"
    reason: "Difficult arterial access, risk of thrombosis"
    alternative: "Consider venous blood gas as alternative"
  - contraindication: "Previous arterial graft or AV fistula in limb"
    type: "ABSOLUTE"
    reason: "Risk of graft/fistula damage"
    alternative: "Use contralateral limb or alternative site"

# Complications
complications:
  - complication: "Hematoma formation"
    frequency: "Common (2-10%)"
    severity: "MILD"
    management: "Local pressure, ice application"
  - complication: "Arterial spasm"
    frequency: "Uncommon (1-2%)"
    severity: "MODERATE"
    management: "Warmth, analgesics, usually self-limiting"
  - complication: "Arterial thrombosis"
    frequency: "Rare (<1%)"
    severity: "SEVERE"
    management: "Immediate vascular surgery consultation"
  - complication: "Nerve injury"
    frequency: "Rare (<1%)"
    severity: "MODERATE to SEVERE"
    management: "Neurology consultation if persistent symptoms"
  - complication: "Infection"
    frequency: "Very rare (<0.1%)"
    severity: "MODERATE to SEVERE"
    management: "Antibiotics, surgical consultation if abscess"

