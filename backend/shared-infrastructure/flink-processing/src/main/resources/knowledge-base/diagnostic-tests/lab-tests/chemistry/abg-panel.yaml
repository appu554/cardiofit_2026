# Educational Resources
patientEducation: |
  Arterial blood gas (ABG) test measures oxygen, carbon dioxide, and acid levels in your blood
  directly from an artery. This test helps your doctor understand how well your lungs are working
  and if your body's chemistry is in balance. The procedure involves inserting a needle into an
  artery (usually in your wrist), which may cause brief discomfort. Pressure will be applied
  afterward to prevent bleeding. Results help guide treatment for breathing problems, lung disease,
  or metabolic disorders.

clinicianEducation: |
  ABG interpretation requires systematic approach:
  1. Assess oxygenation (PaO2, A-a gradient, P/F ratio)
  2. Determine pH status (acidemia vs alkalemia)
  3. Identify primary disorder (respiratory vs metabolic)
  4. Assess compensation (appropriate, partial, or none)
  5. Calculate anion gap if metabolic acidosis present
  6. Consider mixed disorders if compensation is excessive
  7. Correlate with clinical context and other laboratory data

  Key formulas:
  - Winter's formula: Expected PaCO2 = 1.5 × (HCO3) + 8 ± 2
  - A-a gradient: PAO2 - PaO2 (normal <10-15 mmHg)
  - Anion gap: Na - (Cl + HCO3) (normal 8-12 mEq/L)

