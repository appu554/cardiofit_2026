# ==================================================================
# CORTISOL (AM) TEST DEFINITION
# ==================================================================
testId: "LAB-CORTISOL-001"
testName: "Cortisol, AM"
loincCode: "2143-6"
commonNames: "Serum Cortisol, Morning Cortisol, 8 AM Cortisol"
category: "ENDOCRINE"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 1.0  # mL
  specialHandling: "Must be collected between 7-9 AM (peak cortisol time)"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 120
  urgentTurnaroundMinutes: 60
  criticalResultMinutes: 60
  availability: "Business hours"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult_am:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mcg/dL"
    normal:
      min: 7.0
      max: 25.0
      interpretation: "Normal AM cortisol - normal adrenal function"
    critical:
      criticalLow: 3.0
      criticalLowInterpretation: "Adrenal insufficiency - risk of adrenal crisis"
      criticalHigh: 50.0
      criticalHighInterpretation: "Severe Cushing's syndrome or acute stress"

  adult_pm:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "mcg/dL"
    normal:
      min: 3.0
      max: 16.0
      interpretation: "Normal PM cortisol (4-8 PM) - diurnal variation preserved"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    very_low: "<3 mcg/dL: Adrenal insufficiency - inadequate cortisol production"
    low: "3-7 mcg/dL: Possible adrenal insufficiency - confirm with ACTH stimulation test"
    normal: "7-25 mcg/dL: Normal AM cortisol - adequate adrenal function"
    high: "25-50 mcg/dL: Elevated - Cushing's syndrome, acute stress, or critical illness"
    very_high: ">50 mcg/dL: Severe hypercortisolism - Cushing's or extreme stress"

  clinicalSignificance: |
    Cortisol is the primary glucocorticoid hormone produced by adrenal cortex.
    Exhibits diurnal variation: peaks at 7-9 AM, nadir at midnight.
    AM cortisol <3 mcg/dL suggests adrenal insufficiency (primary or secondary).
    AM cortisol >25 mcg/dL may indicate Cushing's syndrome or stress.
    Random cortisol has limited utility except in acute illness or stress evaluation.
    ACTH stimulation test is gold standard for diagnosing adrenal insufficiency.
    24-hour urine free cortisol or late-night salivary cortisol preferred for Cushing's screening.

  commonCauses:
    low_cortisol:
      - "Primary adrenal insufficiency (Addison's disease - autoimmune, TB, hemorrhage)"
      - "Secondary adrenal insufficiency (pituitary ACTH deficiency)"
      - "Tertiary adrenal insufficiency (chronic glucocorticoid suppression)"
      - "Acute adrenal crisis (sepsis, hemorrhage, meningococcemia)"
      - "Congenital adrenal hyperplasia"
      - "Medications (ketoconazole, etomidate, mitotane)"

    high_cortisol:
      - "Cushing's syndrome (pituitary adenoma, ectopic ACTH, adrenal tumor)"
      - "Cushing's disease (pituitary ACTH-secreting adenoma)"
      - "Acute physiologic stress (surgery, trauma, sepsis, hypoglycemia)"
      - "Critical illness"
      - "Severe depression or anxiety"
      - "Chronic alcoholism"
      - "Obesity"
      - "Poorly controlled diabetes"

  differentialDiagnosis:
    - "AM cortisol <3 mcg/dL: Adrenal insufficiency - check ACTH to differentiate primary (high ACTH) vs secondary (low ACTH)"
    - "AM cortisol 3-7 mcg/dL: Borderline - perform ACTH stimulation test to confirm/exclude adrenal insufficiency"
    - "AM cortisol >25 mcg/dL: Possible Cushing's - screen with 24-hour urine free cortisol, late-night salivary cortisol, or overnight dexamethasone suppression test"
    - "High cortisol with low ACTH: Primary adrenal source (adrenal adenoma or carcinoma)"
    - "High cortisol with high ACTH: Pituitary Cushing's disease or ectopic ACTH syndrome"

  actionableFindings: |
    AM cortisol <3 mcg/dL: URGENT - Adrenal insufficiency confirmed; start hydrocortisone immediately, check ACTH and electrolytes
    AM cortisol 3-7 mcg/dL: Possible adrenal insufficiency - perform ACTH stimulation test (cosyntropin test)
    AM cortisol >25 mcg/dL: If Cushing's suspected clinically, screen with 24-hour urine free cortisol or late-night salivary cortisol
    AM cortisol >50 mcg/dL: Severe Cushing's or extreme stress - endocrinology referral for further evaluation
    Critically ill patient with random cortisol <10 mcg/dL: Consider relative adrenal insufficiency - may need stress-dose steroids


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Suspected adrenal insufficiency (fatigue, hypotension, hyperpigmentation, hyponatremia)"
    - "Unexplained hypotension or shock"
    - "Suspected Cushing's syndrome (weight gain, hypertension, diabetes, moon facies, striae)"
    - "Evaluate hypothalamic-pituitary-adrenal axis function"
    - "Screen patients on chronic glucocorticoid therapy (assess for suppression)"
    - "Critical illness with hemodynamic instability"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 168  # Weekly for serial monitoring
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Time of collection (MUST be 7-9 AM for baseline evaluation)"
    - "Stress, pain, illness (physiologically elevates cortisol)"
    - "Hospitalization (stress elevates cortisol)"
    - "Estrogen (increases cortisol-binding globulin, falsely elevates total cortisol)"
    - "Pregnancy (physiologically elevated cortisol)"
    - "Obesity (may have mildly elevated cortisol)"

  interferingMedications:
    - "Exogenous glucocorticoids (suppress endogenous cortisol production)"
    - "Ketoconazole, etomidate, mitotane (inhibit cortisol synthesis)"
    - "Oral contraceptives, estrogen (increase cortisol-binding globulin)"
    - "Rifampin, phenytoin, barbiturates (increase cortisol metabolism)"
    - "Megestrol acetate (glucocorticoid activity)"

  stability: "Stable at 2-8°C for 7 days, stable frozen for months"
  rejectionCriteria: "Insufficient volume, incorrect collection time not documented"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 25.00
  patientCharge: 75.00
  highUtilization: false
  stewardshipRecommendations: "Single random cortisol has limited utility; use ACTH stimulation test for adrenal insufficiency, 24-hour urine or salivary cortisol for Cushing's"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 26760045 (Endocrine Society guidelines for adrenal insufficiency)"
  - "PMID: 18515776 (Endocrine Society guidelines for Cushing's syndrome)"
  - "PMID: 28459524 (Cortisol testing interpretation)"
  - "PMID: 29920129 (Adrenal insufficiency in critical illness)"

guidelineReferences:
  - "Endocrine Society Guidelines for Adrenal Insufficiency Diagnosis and Management"
  - "Endocrine Society Guidelines for Cushing's Syndrome"
  - "Surviving Sepsis Campaign Guidelines for Corticosteroid Use"

evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "ACTH (to differentiate primary vs secondary adrenal insufficiency)"
    - "Electrolytes (hyponatremia and hyperkalemia in adrenal insufficiency)"
    - "Glucose (hypoglycemia in adrenal insufficiency)"

  reflexTesting:
    result_below_3: "URGENT - Adrenal insufficiency confirmed: Check ACTH, electrolytes, glucose; start hydrocortisone 100 mg IV immediately"
    result_3_to_7: "Borderline cortisol - perform ACTH stimulation test (cosyntropin 250 mcg): cortisol >18-20 mcg/dL at 30-60 min = normal response"
    result_above_25: "Elevated cortisol - if Cushing's suspected, order 24-hour urine free cortisol, late-night salivary cortisol, or overnight dexamethasone suppression test"
    result_above_50: "Severe hypercortisolism - endocrinology referral for Cushing's evaluation (pituitary MRI, inferior petrosal sinus sampling)"

  followUpGuidance: |
    Adrenal Insufficiency (AM cortisol <3 mcg/dL):
      - URGENT: Start hydrocortisone 100 mg IV immediately, then 50 mg IV q6h
      - Check ACTH to differentiate: High ACTH = primary (Addison's), Low ACTH = secondary/tertiary
      - Check electrolytes (hyponatremia, hyperkalemia), glucose (hypoglycemia)
      - Check renin/aldosterone if primary adrenal insufficiency (mineralocorticoid deficiency)
      - Transition to chronic replacement: hydrocortisone 15-25 mg/day divided doses + fludrocortisone if primary
    Borderline Cortisol (3-7 mcg/dL):
      - Perform ACTH stimulation test: Give cosyntropin 250 mcg IV, measure cortisol at 0, 30, 60 min
      - Normal response: Cortisol >18-20 mcg/dL at 30-60 min (rules out adrenal insufficiency)
      - Abnormal response: Peak cortisol <18 mcg/dL confirms adrenal insufficiency
    Cushing's Screening (AM cortisol >25 mcg/dL with clinical features):
      - Order 24-hour urine free cortisol (>90 mcg/24h = Cushing's)
      - Order late-night salivary cortisol (loss of diurnal rhythm)
      - Perform overnight dexamethasone suppression test (1 mg at 11 PM, cortisol <1.8 mcg/dL at 8 AM = normal)
      - If screening positive: Check ACTH to localize (low ACTH = adrenal source, high ACTH = pituitary or ectopic)


