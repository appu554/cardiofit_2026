# ==================================================================
# PARTIAL THROMBOPLASTIN TIME TEST DEFINITION
# ==================================================================
testId: "LAB-PTT-001"
testName: "Partial Thromboplastin Time (Activated)"
loincCode: "3173-2"
commonNames: "PTT, aPTT, Activated Partial Thromboplastin Time"
category: "HEMATOLOGY"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Light blue top (3.2% sodium citrate) - MUST be filled to line"
  volumeRequired: 2.7  # mL (must fill to proper ratio)
  specialHandling: "Fill tube completely for accurate ratio. Invert gently 3-4 times. Analyze within 4 hours"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 90
  urgentTurnaroundMinutes: 45
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: true


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult:
    population: "adult"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "seconds"
    normal:
      min: 25.0
      max: 35.0
      interpretation: "Normal intrinsic coagulation pathway"
    critical:
      criticalLow: null
      criticalHigh: 100.0
      criticalInterpretation: "Severe coagulopathy - bleeding risk (PTT >100 sec)"

  adult_on_heparin:
    population: "adult_anticoagulated"
    sex: "ALL"
    ageMin: 18
    ageMax: 120
    unit: "seconds"
    normal:
      min: 60.0  # Therapeutic range 1.5-2.5 × control (typically 60-80 sec)
      max: 80.0
      interpretation: "Therapeutic anticoagulation with unfractionated heparin"
    critical:
      criticalLow: null
      criticalHigh: 100.0
      criticalInterpretation: "Supratherapeutic - high bleeding risk"

  pediatric:
    population: "pediatric"
    sex: "ALL"
    ageMin: 1
    ageMax: 17
    unit: "seconds"
    normal:
      min: 25.0
      max: 40.0
      interpretation: "Normal (varies slightly by age)"
    critical:
      criticalLow: null
      criticalHigh: 100.0
      criticalInterpretation: "Severe coagulopathy"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    normal: "25-35 seconds: Normal intrinsic coagulation pathway"
    therapeutic_heparin: "60-80 seconds (1.5-2.5 × control): Therapeutic anticoagulation"
    prolonged_mild: "36-50 seconds: Mildly prolonged - evaluate cause"
    prolonged_moderate: "51-80 seconds: Moderately prolonged - bleeding risk"
    prolonged_severe: ">80 seconds: Severely prolonged - high bleeding risk"
    prolonged_critical: ">100 seconds: Critical coagulopathy - emergent evaluation"

  clinicalSignificance: |
    PTT measures the intrinsic coagulation pathway (factors XII, XI, IX, VIII, X, V, II, I)
    and is used to monitor unfractionated heparin therapy. Target PTT for heparin is
    1.5-2.5 times control (typically 60-80 seconds). Prolonged PTT indicates factor
    deficiency, heparin therapy, or inhibitors (lupus anticoagulant). PTT does NOT
    monitor LMWH (enoxaparin) or DOACs (apixaban, rivaroxaban).

  commonCauses:
    - "Prolonged PTT: Heparin therapy, hemophilia A/B (factor VIII/IX deficiency), von Willebrand disease, DIC, lupus anticoagulant"
    - "Very prolonged PTT: Factor inhibitors, severe hemophilia, high-dose heparin, direct thrombin inhibitors"

  differentialDiagnosis:
    - "Isolated prolonged PTT (normal PT): Hemophilia A/B, von Willebrand disease, factor XI/XII deficiency, lupus anticoagulant, heparin"
    - "Prolonged PT + PTT: DIC, liver disease, vitamin K deficiency, warfarin, direct oral anticoagulants"
    - "PTT corrects with mixing study: Factor deficiency (hemophilia, vitamin K deficiency)"
    - "PTT does NOT correct with mixing study: Factor inhibitor (acquired hemophilia, lupus anticoagulant)"

  actionableFindings: |
    PTT >100 seconds: URGENT - High bleeding risk. Hold heparin, consider protamine if on heparin
    PTT 80-100 seconds on heparin: Reduce heparin infusion rate, recheck in 6 hours
    PTT <60 seconds on heparin: Subtherapeutic - increase heparin rate per protocol
    PTT >50 seconds off anticoagulation: Order PT/INR, mixing study, factor VIII/IX/XI levels
    PTT prolonged with bleeding: Consider factor replacement (FFP, cryoprecipitate), evaluate for DIC
    Isolated prolonged PTT: Order mixing study to differentiate factor deficiency vs inhibitor


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Unfractionated heparin monitoring"
    - "Pre-operative coagulation assessment"
    - "Suspected hemophilia or von Willebrand disease"
    - "Bleeding disorder evaluation"
    - "Unexplained bleeding or bruising"
    - "DIC evaluation"
    - "Lupus anticoagulant screening"

  contraindications: []

  minimumIntervalHours: 6  # Every 6 hours for initial heparin dosing, daily for stable
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Underfilled tube (falsely prolonged - MOST COMMON ERROR)"
    - "Overfilled tube (falsely shortened)"
    - "Hematocrit >55% (falsely prolonged)"
    - "Delay in analysis >4 hours (factor degradation)"
    - "Clotted specimen (invalid)"
    - "Hemolysis (interferes with analysis)"

  interferingMedications:
    - "Heparin (prolongs PTT - intended effect for monitoring)"
    - "Low molecular weight heparin/LMWH (minimal effect on PTT - do NOT use PTT to monitor)"
    - "Direct thrombin inhibitors (argatroban, bivalirudin) - prolong PTT"
    - "Warfarin (minimal effect on PTT, primarily affects PT/INR)"
    - "DOACs (apixaban, rivaroxaban) - variable effect, do NOT use PTT to monitor"

  stability: "Analyze within 4 hours at room temperature, 24 hours refrigerated"
  rejectionCriteria: "Clotted specimen, underfilled tube, hemolyzed, icteric"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 15.00
  patientCharge: 50.00
  highUtilization: true
  stewardshipRecommendations: "Use anti-Xa levels (not PTT) for monitoring LMWH. DOACs do NOT require PTT monitoring. Consider point-of-care PTT devices for heparin monitoring in ICU"


# ==================================================================
# EVIDENCE & GUIDELINES
# ==================================================================
evidenceReferences:
  - "PMID: 29635051 (ACCP Anticoagulation Guidelines 2018)"
  - "PMID: 31473641 (Heparin monitoring protocols)"
  - "PMID: 25361546 (PTT interpretation guidelines)"
  - "PMID: 28233608 (Hemophilia diagnosis and management)"


guidelineReferences:
  - "ACCP Guidelines on Antithrombotic Therapy 2018"
  - "ASH Guidelines on VTE Management"
  - "World Federation of Hemophilia Guidelines"


evidenceLevel: "A"


# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "PT/INR (if evaluating coagulopathy)"
    - "CBC (platelets for bleeding risk)"

  reflexTesting:
    ptt_above_100: "URGENT - High bleeding risk. Hold heparin if on therapy. Consider protamine reversal"
    ptt_80_to_100: "Supratherapeutic - Reduce heparin rate, recheck PTT in 6 hours"
    ptt_below_60_on_heparin: "Subtherapeutic - Increase heparin per protocol, recheck PTT in 6 hours"
    ptt_above_50_off_anticoag: "Order PT/INR, mixing study to differentiate factor deficiency vs inhibitor"
    ptt_prolonged_with_bleeding: "URGENT - Consider FFP, cryoprecipitate. Evaluate for DIC (D-dimer, fibrinogen, platelets)"
    mixing_study_no_correction: "Factor inhibitor present - order factor VIII inhibitor assay, lupus anticoagulant panel"

  followUpGuidance: |
    Initiating heparin: Check PTT 6 hours after starting infusion, adjust per protocol
    Therapeutic heparin: Target PTT 1.5-2.5 × control (typically 60-80 seconds)
    Heparin dose changes: Recheck PTT 6 hours after rate adjustment
    PTT >100 seconds: Hold heparin, recheck PTT in 4-6 hours, consider protamine if bleeding
    Prolonged PTT off heparin: Order mixing study, PT/INR, factor VIII/IX/XI levels
    Hemophilia A: Factor VIII deficiency - treat with factor VIII concentrate
    Hemophilia B: Factor IX deficiency - treat with factor IX concentrate


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2024-01-15"
source: "ACCP Anticoagulation Guidelines 2018, ASH VTE Guidelines, UpToDate"
version: "1.0"
