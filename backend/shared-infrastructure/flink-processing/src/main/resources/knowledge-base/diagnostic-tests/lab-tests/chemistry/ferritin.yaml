# FERRITIN TEST DEFINITION
# ==================================================================
testId: "LAB-FERRITIN-001"
testName: "Ferritin"
loincCode: "2276-4"
commonNames: "Serum Ferritin, Ferritin Level"
category: "IRON_STUDIES"


# ==================================================================
# SPECIMEN & COLLECTION
# ==================================================================
specimen:
  specimenType: "BLOOD"
  collection: "Venipuncture"
  container: "Gold top (SST) or Red top tube"
  volumeRequired: 1.0  # mL
  specialHandling: "No special handling required"
  fastingRequired: false


# ==================================================================
# TIMING & LOGISTICS
# ==================================================================
timing:
  turnaroundTimeMinutes: 120
  urgentTurnaroundMinutes: 60
  criticalResultMinutes: 60
  availability: "24/7"
  pointOfCareAvailable: false


# ==================================================================
# REFERENCE RANGES
# ==================================================================
referenceRanges:
  adult_male:
    population: "adult"
    sex: "MALE"
    ageMin: 18
    ageMax: 120
    unit: "ng/mL"
    normal:
      min: 30
      max: 400
      interpretation: "Normal iron stores"
    critical:
      criticalLow: 15
      criticalLowInterpretation: "Iron deficiency anemia"
      criticalHigh: 10000
      criticalHighInterpretation: "Hemophagocytic lymphohistiocytosis (HLH) or severe iron overload"

  adult_female:
    population: "adult"
    sex: "FEMALE"
    ageMin: 18
    ageMax: 120
    unit: "ng/mL"
    normal:
      min: 15
      max: 150
      interpretation: "Normal iron stores"
    critical:
      criticalLow: 10
      criticalLowInterpretation: "Iron deficiency anemia"
      criticalHigh: 10000
      criticalHighInterpretation: "HLH or severe iron overload"


# ==================================================================
# CLINICAL INTERPRETATION
# ==================================================================
interpretation:
  resultInterpretation:
    depleted: "<15 ng/mL: Iron deficiency anemia - depleted iron stores"
    low: "15-30 ng/mL: Low iron stores - early iron deficiency"
    normal: "Male 30-400, Female 15-150 ng/mL: Normal iron stores"
    elevated: "400-1000 ng/mL: Elevated - inflammation, chronic disease, or mild iron overload"
    high: "1000-5000 ng/mL: High - hemochromatosis, repeated transfusions, or severe inflammation"
    critical: ">10,000 ng/mL: CRITICAL - Hemophagocytic lymphohistiocytosis (HLH), adult Still's disease, or extreme iron overload"

  clinicalSignificance: |
    Ferritin is the major iron storage protein and reflects total body iron stores.
    Low ferritin (<30 ng/mL) is specific for iron deficiency and precedes anemia.
    Ferritin is also an acute phase reactant - elevated in inflammation, infection, malignancy.
    Extremely elevated ferritin (>10,000 ng/mL) is hallmark of HLH and adult Still's disease.
    Normal ferritin does NOT rule out iron deficiency in presence of inflammation (ferritin artificially elevated).
    Ferritin <30 ng/mL in inflammatory conditions indicates absolute iron deficiency.

  commonCauses:
    low_ferritin:
      - "Iron deficiency anemia (blood loss, poor intake, malabsorption)"
      - "Chronic blood loss (GI bleeding, menorrhagia)"
      - "Malabsorption (celiac disease, IBD, post-gastric bypass)"
      - "Increased iron requirements (pregnancy, rapid growth)"
      - "Poor dietary intake (vegetarian/vegan diet)"

    high_ferritin:
      - "Hemochromatosis (genetic iron overload)"
      - "Repeated blood transfusions (transfusion-dependent anemias)"
      - "Acute or chronic inflammation (acute phase reactant)"
      - "Chronic liver disease (hepatocyte damage releases ferritin)"
      - "Malignancy (especially leukemia, lymphoma, hepatocellular carcinoma)"
      - "Alcohol abuse"
      - "Metabolic syndrome"
      - "Hemophagocytic lymphohistiocytosis (HLH) - ferritin >10,000"
      - "Adult Still's disease - ferritin >5,000"

  differentialDiagnosis:
    - "Ferritin <15 ng/mL: Iron deficiency anemia - check CBC, iron studies, evaluate for blood loss"
    - "Ferritin 15-30 ng/mL: Early iron deficiency or low iron stores"
    - "Ferritin >1000 ng/mL: Hemochromatosis, repeated transfusions, severe inflammation, malignancy"
    - "Ferritin >5000 ng/mL: Adult Still's disease, HLH, severe liver disease"
    - "Ferritin >10,000 ng/mL: CRITICAL - HLH (check HLH criteria), adult Still's disease"

  actionableFindings: |
    Ferritin <30 ng/mL: Iron deficiency - evaluate for cause (GI bleeding, celiac, menorrhagia), start iron supplementation
    Ferritin <15 ng/mL: Severe iron deficiency - urgent evaluation for blood loss or malabsorption
    Ferritin >1000 ng/mL: Evaluate for hemochromatosis (check transferrin saturation, HFE gene), repeated transfusions, inflammation
    Ferritin >5000 ng/mL with fever/rash: Consider adult Still's disease - check rheumatology consultation
    Ferritin >10,000 ng/mL: URGENT HLH evaluation - check HLH criteria (fever, splenomegaly, cytopenias, triglycerides, fibrinogen, NK cell activity)
    Ferritin elevated with normal CRP: Consider hemochromatosis or chronic liver disease rather than acute inflammation


# ==================================================================
# ORDERING RULES
# ==================================================================
orderingRules:
  indications:
    - "Anemia evaluation - especially microcytic anemia"
    - "Suspected iron deficiency"
    - "Monitor iron stores in chronic kidney disease"
    - "Suspected hemochromatosis"
    - "Monitor iron overload in transfusion-dependent patients"
    - "Unexplained fever with very high ferritin (HLH evaluation)"
    - "Adult Still's disease evaluation"

  contraindications:
    - "None absolute"

  minimumIntervalHours: 168  # Weekly for acute monitoring, monthly for chronic conditions
  requiresConsent: false
  appropriatenessLevel: "USUALLY_APPROPRIATE"

  prerequisiteTests: []


# ==================================================================
# QUALITY & INTERFERENCE
# ==================================================================
quality:
  interferingFactors:
    - "Inflammation (falsely elevates ferritin)"
    - "Infection (acute phase reactant)"
    - "Liver disease (releases stored ferritin)"
    - "Hemolysis (minimal effect)"

  interferingMedications:
    - "Recent iron supplementation or IV iron (elevated ferritin)"
    - "Recent blood transfusion (elevated ferritin)"
    - "NSAIDs and corticosteroids (may affect inflammation)"

  stability: "Stable at 2-8°C for 7 days, stable frozen for 1 year"
  rejectionCriteria: "Grossly hemolyzed specimen, insufficient volume"


# ==================================================================
# COSTS & UTILIZATION
# ==================================================================
cost:
  institutionalCost: 15.00
  patientCharge: 50.00
  highUtilization: true
  stewardshipRecommendations: "Order with complete iron studies (iron, TIBC, transferrin saturation) for comprehensive iron assessment"


