# ==================================================================
# CLINICAL DECISION SUPPORT
# ==================================================================
cdsRules:
  alertOnCritical: true

  autoOrderWith:
    - "Iron, Serum"
    - "Total Iron Binding Capacity (TIBC)"
    - "Transferrin Saturation"
    - "CBC with differential"

  reflexTesting:
    result_below_15: "Iron deficiency confirmed - evaluate for blood loss (GI, GYN), check celiac serology, start iron supplementation"
    result_above_1000: "Check transferrin saturation for hemochromatosis; if >45%, check HFE gene mutation"
    result_above_5000: "Consider adult Still's disease or HLH - check fever, rash, arthritis, HLH criteria"
    result_above_10000: "URGENT - HLH evaluation: check fever, splenomegaly, CBC, triglycerides, fibrinogen, soluble IL-2 receptor, NK cell activity"

  followUpGuidance: |
    Ferritin <30 ng/mL: Start iron supplementation (oral or IV), evaluate for cause of iron deficiency
      - Check colonoscopy/EGD if GI blood loss suspected
      - Check celiac serology (TTG-IgA) for malabsorption
      - Menstruating women: evaluate for menorrhagia
      - Recheck ferritin in 8-12 weeks after iron supplementation
    Ferritin >1000 ng/mL with transferrin saturation >45%: Hemochromatosis evaluation - check HFE gene, consider liver biopsy
    Ferritin >10,000 ng/mL: URGENT hematology/rheumatology consultation for HLH or adult Still's disease evaluation
    Ferritin elevated in CKD: Target ferritin >100 ng/mL for ESA responsiveness, monitor for iron overload
    Ferritin trending down with iron therapy: Poor adherence or ongoing blood loss - reevaluate


