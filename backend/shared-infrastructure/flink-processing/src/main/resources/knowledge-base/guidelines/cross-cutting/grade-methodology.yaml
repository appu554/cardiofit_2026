# GRADE METHODOLOGY META-GUIDELINE
# ==================================================================
guidelineId: "GUIDE-GRADE-METHODOLOGY"
name: "GRADE: Grading of Recommendations Assessment, Development and Evaluation - Methodology Framework"
shortName: "GRADE Methodology"
organization: "GRADE Working Group"
topic: "Evidence Quality Assessment and Recommendation Strength Framework"


# ==================================================================
# VERSIONING
# ==================================================================
version: "2013.1"
publicationDate: "2013-04-18"
lastReviewDate: "2013-04-18"
nextReviewDate: null
status: "CURRENT"


# ==================================================================
# PUBLICATION DETAILS
# ==================================================================
publication:
  journal: "Journal of Clinical Epidemiology"
  year: 2013
  volume: 66
  issue: 7
  pages: "726-735"
  doi: "10.1016/j.jclinepi.2013.02.003"
  pmid: "23570745"
  url: "https://www.jclinepi.com/article/S0895-4356(13)00083-0/fulltext"


# ==================================================================
# SCOPE & APPLICABILITY
# ==================================================================
scope:
  clinicalDomain: "All medical specialties - meta-framework for guideline development"
  targetPopulations:
    - "Guideline developers"
    - "Systematic review authors"
    - "Healthcare policymakers"
  targetSettings:
    - "All clinical settings"
  geographicScope: "Global"


# ==================================================================
# PURPOSE
# ==================================================================
purpose: |
  GRADE (Grading of Recommendations Assessment, Development and Evaluation) is a systematic framework
  for rating quality of evidence and grading strength of recommendations in clinical practice guidelines.

  Used by: WHO, ATS, ERS, NICE, ACC/AHA, SSC, and 100+ organizations worldwide.

  GRADE provides:
  1. Transparent evidence quality assessment
  2. Explicit recommendation strength grading
  3. Separation of evidence quality from recommendation strength
  4. Structured consideration of benefits, harms, values, resources


# ==================================================================
# EVIDENCE QUALITY LEVELS (GRADE)
# ==================================================================
evidenceQualityLevels:
  - qualityLevel: "HIGH"
    definition: "We are very confident that the true effect lies close to that of the estimate of the effect"
    symbol: "⊕⊕⊕⊕"
    criteria: |
      Starting point: Randomized trials
      HIGH quality maintained when:
      - Multiple RCTs with consistent results
      - No serious risk of bias
      - No serious inconsistency
      - Direct evidence (not indirect)
      - Precise estimates (narrow confidence intervals)
      - No publication bias
    interpretation: "Further research is very unlikely to change our confidence in the estimate of effect"
    exampleStudyTypes:
      - "Multiple high-quality RCTs with consistent findings"
      - "Systematic review of RCTs with low heterogeneity"
      - "RCTs with low risk of bias across all domains"


  - qualityLevel: "MODERATE"
    definition: "We are moderately confident in the effect estimate: The true effect is likely to be close to the estimate, but there is a possibility that it is substantially different"
    symbol: "⊕⊕⊕◯"
    criteria: |
      Starting point: Randomized trials downgraded OR observational studies upgraded
      MODERATE quality when:
      - RCTs with serious limitations (one downgrade)
      - OR Observational studies with large effect and no plausible confounders (upgrade)
      - Moderate inconsistency, indirectness, or imprecision
    interpretation: "Further research is likely to have an important impact on our confidence in the estimate and may change the estimate"
    exampleStudyTypes:
      - "RCTs with moderate risk of bias"
      - "RCTs with moderate heterogeneity (I² 30-60%)"
      - "Well-designed cohort studies with large effect size (RR >2 or <0.5)"


  - qualityLevel: "LOW"
    definition: "Our confidence in the effect estimate is limited: The true effect may be substantially different from the estimate"
    symbol: "⊕⊕◯◯"
    criteria: |
      LOW quality when:
      - RCTs with very serious limitations (two downgrades)
      - OR Observational studies (starting point)
      - Serious inconsistency + indirectness
      - Wide confidence intervals (serious imprecision)
    interpretation: "Further research is very likely to have an important impact on our confidence in the estimate and is likely to change the estimate"
    exampleStudyTypes:
      - "RCTs with high risk of bias + inconsistency"
      - "Observational studies without confounding adjustment"
      - "Indirect comparisons without head-to-head trials"


  - qualityLevel: "VERY_LOW"
    definition: "We have very little confidence in the effect estimate: The true effect is likely to be substantially different from the estimate"
    symbol: "⊕◯◯◯"
    criteria: |
      VERY LOW quality when:
      - RCTs with critical flaws (three or more downgrades)
      - OR Observational studies with serious limitations
      - OR Expert opinion, case series
      - Very serious inconsistency, indirectness, imprecision
    interpretation: "Any estimate of effect is very uncertain"
    exampleStudyTypes:
      - "Case series"
      - "Expert opinion without systematic evidence"
      - "RCTs with fatal flaws (allocation concealment failure, massive loss to follow-up)"
      - "Observational studies with serious confounding and selection bias"


# ==================================================================
# RECOMMENDATION STRENGTH GRADING (GRADE)
# ==================================================================
recommendationStrengthGrading:
  - strengthLevel: "STRONG"
    terminology: "We recommend..."
    definition: "The desirable effects of an intervention clearly outweigh the undesirable effects, or clearly do not"
    symbol: '"1" (GRADE numeric) or "Class I" (ACC/AHA)'
    implications:
      forPatients: "Most individuals in this situation would want the recommended course of action, and only a small proportion would not"
      forClinicians: "Most patients should receive the intervention. Adherence to this recommendation could be used as a quality criterion or performance indicator"
      forPolicymakers: "The recommendation can be adopted as policy in most situations"
    criteriaForStrong:
      - "High or moderate quality evidence"
      - "Large magnitude of effect"
      - "Benefits clearly outweigh harms"
      - "Patient values and preferences consistent"
      - "Reasonable resource use"
    examples:
      - "Aspirin for STEMI (mortality benefit, minimal harm)"
      - "Low tidal volume ventilation for ARDS (mortality benefit)"
      - "Antibiotics within 1 hour for septic shock (time-critical survival benefit)"


  - strengthLevel: "WEAK"
    terminology: "We suggest..." or "Consider..."
    definition: "The desirable effects probably outweigh the undesirable effects, but appreciable uncertainty exists"
    symbol: '"2" (GRADE numeric) or "Class IIa/IIb" (ACC/AHA)'
    implications:
      forPatients: "The majority of individuals would want the suggested course of action, but many would not. Decision aids may be useful"
      forClinicians: "Different choices will be appropriate for individual patients, and clinicians must help each patient arrive at a management decision consistent with their values and preferences"
      forPolicymakers: "Policy-making will require substantial debate and involvement of various stakeholders"
    criteriaForWeak:
      - "Low or very low quality evidence"
      - "OR uncertain balance of benefits and harms"
      - "OR benefits and harms closely balanced"
      - "OR uncertainty in patient values/preferences"
      - "OR high resource requirements with uncertain cost-effectiveness"
    examples:
      - "Neuromuscular blockade for severe ARDS (conflicting trials - ACURASYS vs ROSE)"
      - "Hydrocortisone for septic shock in SSC 2016 (upgraded to STRONG in SSC 2021 after ADRENAL/APROCCHSS)"
      - "Complete revascularization in STEMI with multivessel disease (timing uncertain)"


  - strengthLevel: "CONDITIONAL"
    terminology: "Conditional recommendation" or "No recommendation for or against"
    definition: "Evidence suggests benefits and harms are closely balanced, or there is considerable uncertainty"
    implications:
      forPatients: "Values and preferences critical for decision-making"
      forClinicians: "Shared decision-making essential"
      forPolicymakers: "Local context, values, and resources will determine policy"
    examples:
      - "Conservative vs liberal fluid strategy in ARDS (depends on shock status)"


# ==================================================================
# FACTORS INFLUENCING RECOMMENDATION STRENGTH
# ==================================================================
factorsInfluencingRecommendationStrength:
  - factor: "Quality of Evidence"
    impact: "Higher quality → stronger recommendations (but not automatic)"
    note: "High-quality evidence can lead to weak recommendation if benefits/harms closely balanced"

  - factor: "Balance of Benefits and Harms"
    impact: "Larger net benefit → stronger recommendations"
    note: "Small benefits with substantial harms → weak or negative recommendation"

  - factor: "Values and Preferences"
    impact: "Consistent patient preferences → stronger recommendations"
    note: "Variability in values → weak recommendation (e.g., invasive procedures)"

  - factor: "Resource Use"
    impact: "Cost-effective interventions → stronger recommendations"
    note: "High cost with marginal benefit → weak recommendation"


# ==================================================================
# GRADE APPROACH TO DOWNGRADING EVIDENCE
# ==================================================================
downgradingCriteria:
  - criterion: "Risk of Bias"
    downgradeSituations:
      - "Lack of allocation concealment"
      - "Lack of blinding"
      - "Large loss to follow-up (>20%)"
      - "Stopped early for benefit"
      - "Industry-sponsored with potential bias"

  - criterion: "Inconsistency"
    downgradeSituations:
      - "Heterogeneity: I² >50%"
      - "Non-overlapping confidence intervals"
      - "Conflicting results (some beneficial, some harmful)"

  - criterion: "Indirectness"
    downgradeSituations:
      - "Population differs from question of interest"
      - "Intervention differs (e.g., dose, formulation)"
      - "Comparator differs from usual practice"
      - "Surrogate outcomes instead of patient-important outcomes"

  - criterion: "Imprecision"
    downgradeSituations:
      - "Wide confidence intervals crossing threshold of clinical importance"
      - "Small sample size (underpowered)"
      - "Few events (rule of thumb: <300 events)"

  - criterion: "Publication Bias"
    downgradeSituations:
      - "Funnel plot asymmetry"
      - "Industry-sponsored trials only"
      - "Gray literature suggests unpublished negative trials"


# ==================================================================
# GRADE APPROACH TO UPGRADING EVIDENCE
# ==================================================================
upgradingCriteria:
  - criterion: "Large Magnitude of Effect"
    upgradeSituations:
      - "RR >2 or <0.5 (upgrade 1 level)"
      - "RR >5 or <0.2 (upgrade 2 levels)"
      - "Example: Aspirin in STEMI (RR 0.77 for mortality)"

  - criterion: "Dose-Response Gradient"
    upgradeSituations:
      - "Clear dose-response relationship"
      - "Example: Smoking pack-years and lung cancer risk"

  - criterion: "All Plausible Confounders Would Reduce Effect"
    upgradeSituations:
      - "Observational study with effect despite confounders working against it"
      - "Example: Smoking and lung cancer (healthy worker bias would underestimate effect)"


# ==================================================================
# PRACTICAL APPLICATION OF GRADE
# ==================================================================
practicalApplication:
  stepByStepApproach:
    - step: 1
      description: "Formulate clinical question (PICO format)"
      pico: "Population, Intervention, Comparator, Outcome"

    - step: 2
      description: "Identify and synthesize evidence (systematic review)"

    - step: 3
      description: "Rate quality of evidence for each outcome (start with study design, then apply downgrades/upgrades)"

    - step: 4
      description: "Determine overall quality of evidence (usually lowest quality of critical outcomes)"

    - step: 5
      description: "Consider factors influencing recommendation strength (benefits/harms, values, resources)"

    - step: 6
      description: "Grade recommendation strength (strong vs weak)"

  exampleWorkthrough:
    clinicalQuestion: "Should adults with STEMI receive primary PCI vs fibrinolysis?"
    population: "Adults with STEMI presenting to hospital"
    intervention: "Primary percutaneous coronary intervention (PCI)"
    comparator: "Fibrinolytic therapy"
    criticalOutcome: "30-day mortality"

    evidenceRating:
      studyDesign: "Multiple RCTs (Keeley meta-analysis, DANAMI-2, etc.)"
      initialQuality: "High (RCTs)"
      riskOfBias: "Low (well-conducted trials)"
      inconsistency: "None (consistent mortality benefit)"
      indirectness: "None (direct comparison)"
      imprecision: "None (narrow CI, large sample)"
      publicationBias: "None detected"
      finalQuality: "HIGH ⊕⊕⊕⊕"

    recommendationGrading:
      benefitsVsHarms: "Clear mortality benefit (RR 0.73), lower reinfarction, minimal additional harm"
      patientValues: "Most patients would choose life-saving intervention"
      resources: "PCI expensive but cost-effective for mortality reduction"
      recommendationStrength: "STRONG"
      wording: "We recommend primary PCI over fibrinolysis when performed within 120 minutes"


# ==================================================================
# GRADE vs OTHER SYSTEMS
# ==================================================================
comparisonToOtherSystems:
  - system: "ACC/AHA Classification"
    levelMapping:
      - accaha: "Class I, Level A"
        grade: "STRONG recommendation, HIGH quality evidence"
      - accaha: "Class IIa, Level B"
        grade: "WEAK recommendation, MODERATE quality evidence"
      - accaha: "Class III (No Benefit)"
        grade: "STRONG recommendation AGAINST"

  - system: "Oxford Centre for Evidence-Based Medicine"
    levelMapping:
      - oxford: "Level 1a (Systematic review of RCTs)"
        grade: "HIGH quality evidence"
      - oxford: "Level 2b (Cohort study)"
        grade: "LOW quality evidence"
      - oxford: "Level 5 (Expert opinion)"
        grade: "VERY LOW quality evidence"


