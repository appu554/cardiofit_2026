# ==================================================================
# ACC/AHA STEMI 2013 GUIDELINE (SUPERSEDED)
# ==================================================================
guidelineId: "GUIDE-ACCAHA-STEMI-2013"
name: "2013 ACCF/AHA Guideline for the Management of ST-Elevation Myocardial Infarction"
shortName: "ACC/AHA STEMI 2013"
organization: "American College of Cardiology Foundation / American Heart Association Task Force on Practice Guidelines"
topic: "ST-Elevation Myocardial Infarction (STEMI) Management"


# ==================================================================
# VERSIONING
# ==================================================================
version: "2013.1"
publicationDate: "2013-01-29"
lastReviewDate: "2013-01-29"
nextReviewDate: "2018-01-29"
status: "SUPERSEDED"
supersededBy: "GUIDE-ACCAHA-STEMI-2023"
supersededDate: "2023-04-20"


# ==================================================================
# PUBLICATION DETAILS
# ==================================================================
publication:
  journal: "Circulation"
  year: 2013
  volume: 127
  issue: 4
  pages: "e362-e425"
  doi: "10.1161/CIR.0b013e3182742cf6"
  pmid: "23247304"
  url: "https://www.ahajournals.org/doi/10.1161/CIR.0b013e3182742cf6"
  pdfUrl: "https://www.ahajournals.org/doi/pdf/10.1161/CIR.0b013e3182742cf6"


# ==================================================================
# SCOPE & APPLICABILITY
# ==================================================================
scope:
  clinicalDomain: "Cardiology / Emergency Medicine"
  targetPopulations:
    - "Adults (≥18 years) with ST-elevation myocardial infarction"
    - "Adults with new or presumably new LBBB"
  targetSettings:
    - "Emergency Department"
    - "Cardiac Catheterization Laboratory"
    - "ICU / CCU"
  exclusions:
    - "Non-ST-elevation ACS"
    - "Pediatric patients"
  geographicScope: "United States"


# ==================================================================
# METHODOLOGY
# ==================================================================
methodology:
  approachUsed: "ACC/AHA Guideline Methodology"
  evidenceSearchStrategy: "Systematic review through 2012"
  evidenceSearchDate: "2012-12-31"
  panelSize: 18
  panelComposition:
    - "15 cardiologists"
    - "2 emergency physicians"
    - "1 cardiac surgeon"
  conflictOfInterestPolicy: "All panel members disclosed conflicts"
  externalReview: true


# ==================================================================
# RECOMMENDATIONS (HISTORICAL)
# ==================================================================
recommendations:
  # SECTION 1: EARLY DIAGNOSIS

  - recommendationId: "ACC-STEMI-2013-REC-001"
    number: "1.1"
    section: "Initial Evaluation"
    title: "12-Lead ECG Within 10 Minutes"
    statement: "A 12-lead ECG should be performed and shown to an experienced emergency physician within 10 minutes of ED arrival for all patients with chest discomfort or other symptoms suggestive of STEMI"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "B"
    rationale: "Early ECG is critical for STEMI diagnosis and rapid reperfusion decision-making"
    keyEvidence:
      - "23247304"  # ACC/AHA STEMI 2013 guideline
      - "12517460"  # Keeley EC - Primary PCI meta-analysis
    linkedProtocolActions:
      - "STEMI-ACT-001"


  - recommendationId: "ACC-STEMI-2013-REC-002"
    number: "2.1"
    section: "Reperfusion Therapy"
    title: "Primary PCI Within 90 Minutes (Door-to-Balloon)"
    statement: "Primary PCI should be performed in patients with STEMI and ischemic symptoms of less than 12 hours' duration. The goal for first medical contact-to-device time is 90 minutes or less"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: "Primary PCI is superior to fibrinolysis when performed in timely manner"
    keyEvidence:
      - "23247304"
      - "12517460"  # Keeley EC - Lancet 2003
      - "11794169"  # Andersen HR - DANAMI-2 trial
    linkedProtocolActions:
      - "STEMI-ACT-008"


  - recommendationId: "ACC-STEMI-2013-REC-003"
    number: "3.1"
    section: "Antiplatelet Therapy"
    title: "Aspirin 162-325 mg"
    statement: "Aspirin 162 to 325 mg should be given on first medical contact to all patients with STEMI for whom aspirin is not contraindicated"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: "ISIS-2 trial demonstrated 23% mortality reduction with aspirin in MI"
    keyEvidence:
      - "23247304"
      - "3081859"   # ISIS-2 trial (Lancet 1988)
    linkedProtocolActions:
      - "STEMI-ACT-002"


  - recommendationId: "ACC-STEMI-2013-REC-004"
    number: "3.2"
    section: "Antiplatelet Therapy"
    title: "Clopidogrel 600 mg Loading Dose"
    statement: "Clopidogrel should be administered to patients with STEMI undergoing PCI. A loading dose of 600 mg is recommended"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "B"
    rationale: "Dual antiplatelet therapy reduces ischemic complications post-PCI"
    keyEvidence:
      - "23247304"
      - "16531614"  # CLARITY-TIMI 28 - Clopidogrel in STEMI
      - "16531621"  # COMMIT - Clopidogrel in MI
    linkedProtocolActions:
      - "STEMI-ACT-003"
    clinicalConsiderations: |
      NOTE: By 2023, ticagrelor and prasugrel have largely replaced clopidogrel as preferred P2Y12 inhibitors
      due to superior outcomes in PLATO and TRITON-TIMI 38 trials (see 2023 guideline).


  - recommendationId: "ACC-STEMI-2013-REC-005"
    number: "2.2"
    section: "Fibrinolytic Therapy"
    title: "Fibrinolysis if PCI Delay >90 Minutes"
    statement: "Fibrinolytic therapy should be administered to patients with STEMI at non-PCI-capable hospitals when the anticipated first medical contact-to-device time exceeds 90 minutes"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: "When timely PCI unavailable, fibrinolysis reduces mortality in STEMI"
    keyEvidence:
      - "23247304"
      - "8437037"   # FTT meta-analysis - Lancet 1994
      - "9039269"   # GUSTO-I - Alteplase vs streptokinase
    linkedProtocolActions:
      - "STEMI-ACT-010"
      - "STEMI-ACT-011"
    clinicalConsiderations: |
      NOTE: 2023 guideline extended this threshold to 120 minutes based on additional evidence
      from CAPTIM and STREAM trials showing PCI superiority even with longer transfer times.


  - recommendationId: "ACC-STEMI-2013-REC-006"
    number: "4.1"
    section: "Adjunctive Therapy"
    title: "Beta-Blocker Within 24 Hours"
    statement: "Oral beta-blocker therapy should be initiated in the first 24 hours for patients with STEMI who do not have signs of heart failure, low output state, increased risk for cardiogenic shock, or other contraindications"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "B"
    rationale: "Early beta-blockade reduces infarct size, arrhythmias, and reinfarction"
    keyEvidence:
      - "23247304"
      - "16401995"  # Freemantle N - Beta-blocker meta-analysis (BMJ 1999)
    linkedProtocolActions:
      - "STEMI-ACT-013"
    clinicalConsiderations: |
      NOTE: 2023 guideline de-emphasized early beta-blocker after COMMIT trial showed increased
      cardiogenic shock with immediate IV beta-blockade. Now recommend starting in stable patients
      after initial stabilization period.


# ==================================================================
# RELATED GUIDELINES
# ==================================================================
relatedGuidelines:
  - guidelineId: "GUIDE-ACCAHA-STEMI-2023"
    relationship: "SUPERSEDED_BY"
    note: "This 2013 guideline was updated and replaced by the 2023 ACC/AHA/SCAI STEMI guideline"


# ==================================================================
# KEY DIFFERENCES VS 2023 GUIDELINE
# ==================================================================
evolutionTo2023Guideline:
  - change: "Fibrinolysis threshold"
    guideline2013: "Transfer for PCI if anticipated delay >90 minutes; otherwise fibrinolysis"
    guideline2023: "Transfer for PCI if anticipated delay ≤120 minutes; otherwise fibrinolysis"
    rationale: "CAPTIM and STREAM trials showed PCI superiority even with longer transfer times"

  - change: "Preferred P2Y12 inhibitor"
    guideline2013: "Clopidogrel 600 mg loading dose"
    guideline2023: "Ticagrelor 180 mg or prasugrel 60 mg preferred over clopidogrel"
    rationale: "PLATO and TRITON-TIMI 38 trials showed superior outcomes with ticagrelor/prasugrel"

  - change: "Early beta-blocker"
    guideline2013: "Class I recommendation for oral beta-blocker within 24 hours"
    guideline2023: "More cautious - recommend in stable patients without shock risk"
    rationale: "COMMIT trial showed increased cardiogenic shock with immediate IV beta-blockade"

  - change: "Statin intensity"
    guideline2013: "Class IIa recommendation for statin therapy"
    guideline2023: "Class I recommendation for HIGH-INTENSITY statin therapy"
    rationale: "PROVE-IT TIMI 22 and other trials showed benefit of aggressive LDL lowering"

  - change: "Radial access"
    guideline2013: "No preference between radial vs femoral access"
    guideline2023: "Radial access preferred over femoral when expertise available"
    rationale: "MATRIX, RIVAL trials showed reduced bleeding with radial approach"


# ==================================================================
# ALGORITHM SUMMARY (2013)
# ==================================================================
algorithmSummary: |
  STEMI Recognition (ECG ≤10 min) → Aspirin 162-325 mg
  ├─ PCI-capable hospital: Door-to-balloon ≤90 min → Primary PCI + clopidogrel 600 mg
  └─ Non-PCI-capable hospital: Expected door-to-balloon?
      ├─ ≤90 min → Transfer for primary PCI
      └─ >90 min → Fibrinolytic therapy → Transfer for angiography

  Post-Reperfusion: Beta-blocker within 24 hours, statin, ACE-I, aspirin + clopidogrel


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2013-01-29"
source: "American College of Cardiology Foundation / American Heart Association"
version: "1.0"
supersededNote: |
  This guideline has been SUPERSEDED by the 2023 ACC/AHA/SCAI STEMI guideline (PMID: 37079885).
  Key updates include: extended fibrinolysis threshold (90→120 min), preference for ticagrelor/prasugrel
  over clopidogrel, more cautious early beta-blocker use, stronger high-intensity statin recommendation,
  and preference for radial over femoral PCI access.
