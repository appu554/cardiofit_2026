# ==================================================================
# SCOPE & APPLICABILITY
# ==================================================================
scope:
  clinicalDomain: "Cardiology / Emergency Medicine / Critical Care"
  targetPopulations:
    - "Adults with ST-elevation myocardial infarction"
    - "Adults with NSTEMI (covered in same guideline)"
    - "Adults with unstable angina"
  targetSettings:
    - "Emergency Department"
    - "Cardiac Catheterization Laboratory"
    - "ICU / CCU"
    - "Pre-hospital (EMS)"
  exclusions:
    - "Pediatric patients"
    - "Pregnancy (separate guidance)"
  geographicScope: "Europe (adaptable globally)"


# ==================================================================
# METHODOLOGY
# ==================================================================
methodology:
  approachUsed: "ESC Guideline Development Process (GRADE-based)"
  evidenceSearchStrategy: "Systematic review through 2023"
  evidenceSearchDate: "2023-06-30"
  panelSize: 32
  panelComposition:
    - "26 cardiologists (interventional and non-interventional)"
    - "3 emergency physicians"
    - "2 cardiac surgeons"
    - "1 methodologist"
  conflictOfInterestPolicy: "All conflicts disclosed; recusal for significant conflicts"
  externalReview: true
  numberOfReviewers: 55


# ==================================================================
# RECOMMENDATIONS
# ==================================================================
recommendations:
  # SECTION 1: DIAGNOSIS AND RISK ASSESSMENT

  - recommendationId: "ESC-STEMI-2023-REC-001"
    number: "1.1"
    section: "Initial Diagnosis"
    title: "ECG Within 10 Minutes of First Medical Contact"
    statement: "A 12-lead ECG is recommended within 10 minutes of first medical contact in patients with suspected ACS"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "B"
    rationale: "Rapid ECG diagnosis enables timely reperfusion therapy activation and improves outcomes"
    keyEvidence:
      - "37622656"  # ESC ACS 2023 guideline
      - "12517460"  # Keeley EC - Primary PCI meta-analysis
    linkedProtocolActions:
      - "STEMI-ACT-001"
    clinicalConsiderations: |
      - Pre-hospital ECG transmission reduces time to reperfusion
      - Consider posterior (V7-V9) and right-sided (V3R-V4R) leads when appropriate


  - recommendationId: "ESC-STEMI-2023-REC-002"
    number: "2.1"
    section: "Reperfusion Strategy"
    title: "Primary PCI Within 120 Minutes of First Medical Contact"
    statement: "Primary PCI is recommended as the preferred reperfusion strategy when it can be performed by an experienced team within 120 minutes of first medical contact"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: |
      Primary PCI superior to fibrinolysis for STEMI when performed in timely manner. ESC uses 120-minute
      threshold (vs ACC/AHA's 90-minute for PCI-capable hospitals) reflecting European healthcare geography
      and transport networks.
    keyEvidence:
      - "37622656"  # ESC ACS 2023
      - "12517460"  # Keeley EC - Primary PCI vs fibrinolysis
      - "26260736"  # Terkelsen CJ - Time-to-treatment mortality
      - "23801412"  # DANAMI-2 long-term follow-up
    linkedProtocolActions:
      - "STEMI-ACT-008"
    clinicalConsiderations: |
      - ESC recommends 120-minute threshold for all patients (not differentiated by hospital PCI capability)
      - Pre-hospital triage and direct transfer to PCI center reduces delays
      - Cardiogenic shock: immediate angiography regardless of time from symptom onset


  - recommendationId: "ESC-STEMI-2023-REC-003"
    number: "2.2"
    section: "Pre-Hospital Fibrinolysis"
    title: "Pre-Hospital Fibrinolysis if PCI Delay >120 Minutes"
    statement: "Pre-hospital fibrinolytic therapy should be considered when primary PCI cannot be performed within 120 minutes of first medical contact, particularly when symptom onset is <3 hours"
    strength: "WEAK"
    classOfRecommendation: "Class IIa"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "B"
    rationale: |
      When PCI unavailable within 120 minutes, pre-hospital fibrinolysis can be lifesaving, especially
      in early presenters (<3 hours from symptom onset). CAPTIM trial showed similar outcomes with
      pre-hospital lysis vs primary PCI in early presenters.
    keyEvidence:
      - "37622656"  # ESC ACS 2023
      - "12801956"  # CAPTIM trial - Pre-hospital lysis
      - "23773875"  # STREAM trial - Fibrinolysis strategy
    linkedProtocolActions:
      - "STEMI-ACT-010"
      - "STEMI-ACT-011"
    clinicalConsiderations: |
      - Pre-hospital fibrinolysis requires trained EMS personnel
      - Tenecteplase preferred (single bolus)
      - Transfer for angiography after fibrinolysis (pharmacoinvasive strategy)
      - Rescue PCI if fibrinolysis fails


  - recommendationId: "ESC-STEMI-2023-REC-004"
    number: "2.3"
    section: "Access Site"
    title: "Radial Access Preferred Over Femoral for Primary PCI"
    statement: "Radial access is recommended over femoral access for coronary angiography and PCI in patients with ACS when performed by an experienced radial operator"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: |
      Radial access reduces major bleeding, vascular complications, and mortality compared to femoral
      access in STEMI patients. MATRIX trial showed 1.6% absolute reduction in NACE (net adverse
      clinical events) with radial approach.
    keyEvidence:
      - "37622656"  # ESC ACS 2023
      - "25791214"  # MATRIX trial - Radial vs femoral in ACS
      - "21992124"  # RIVAL trial - Radial vs femoral
      - "26385580"  # Valgimigli M - Radial access meta-analysis
    linkedProtocolActions:
      - "STEMI-ACT-008"  # PCI procedure - access site selection
    clinicalConsiderations: |
      - Radial access requires experienced operator (learning curve ~30-50 cases)
      - Femoral access acceptable if radial expertise unavailable or anatomical contraindication
      - Reduced bleeding particularly important in patients requiring long-term anticoagulation


  - recommendationId: "ESC-STEMI-2023-REC-005"
    number: "3.1"
    section: "Antiplatelet Therapy"
    title: "Ticagrelor or Prasugrel Preferred Over Clopidogrel"
    statement: "Ticagrelor (180 mg loading dose, then 90 mg twice daily) or prasugrel (60 mg loading dose, then 10 mg daily) is recommended in preference to clopidogrel for patients with ACS undergoing PCI"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: |
      Ticagrelor and prasugrel are more potent P2Y12 inhibitors with faster onset and less variability
      than clopidogrel. PLATO trial showed 16% relative risk reduction in CV death/MI/stroke with
      ticagrelor vs clopidogrel. TRITON-TIMI 38 showed prasugrel superiority vs clopidogrel in PCI patients.
    keyEvidence:
      - "37622656"  # ESC ACS 2023
      - "19717846"  # PLATO trial - Ticagrelor vs clopidogrel
      - "17982182"  # TRITON-TIMI 38 - Prasugrel vs clopidogrel
      - "23031330"  # Wiviott SD - Prasugrel long-term outcomes
    linkedProtocolActions:
      - "STEMI-ACT-003"
    clinicalConsiderations: |
      - Ticagrelor: Reversible binding, faster offset, used in STEMI and NSTEMI
      - Prasugrel: Irreversible binding, avoid if age >75, weight <60 kg, prior stroke/TIA
      - Clopidogrel: Use if ticagrelor/prasugrel contraindicated or not tolerated
      - Continue DAPT for 12 months post-ACS


  - recommendationId: "ESC-STEMI-2023-REC-006"
    number: "4.1"
    section: "Cardiogenic Shock"
    title: "Immediate Angiography and Revascularization for Cardiogenic Shock"
    statement: "Immediate coronary angiography and revascularization is recommended in patients with STEMI complicated by cardiogenic shock, irrespective of time delay from symptom onset"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "B"
    rationale: |
      SHOCK trial demonstrated mortality benefit of early revascularization strategy in cardiogenic
      shock complicating MI. Immediate PCI indicated regardless of symptom duration.
    keyEvidence:
      - "37622656"  # ESC ACS 2023
      - "10485606"  # SHOCK trial (N Engl J Med 1999)
      - "19920994"  # SHOCK trial 6-year follow-up
    linkedProtocolActions:
      - "STEMI-ACT-008"  # Emergent cath lab activation
      - "SHOCK-ACT-001"  # Cardiogenic shock management protocol
    clinicalConsiderations: |
      - Do not delay revascularization even if >12-24 hours from symptom onset
      - Consider mechanical circulatory support (IABP, Impella, VA-ECMO)
      - Multivessel disease common - consider complete revascularization vs culprit-only


  - recommendationId: "ESC-STEMI-2023-REC-007"
    number: "2.4"
    section: "Complete Revascularization"
    title: "Complete Revascularization Before Hospital Discharge"
    statement: "Complete revascularization should be considered in patients with STEMI and multivessel disease before hospital discharge"
    strength: "WEAK"
    classOfRecommendation: "Class IIa"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "B"
    rationale: |
      COMPLETE trial showed reduced CV death/MI with complete revascularization vs culprit-only in
      STEMI patients with multivessel disease. Timing (index procedure vs staged) depends on clinical
      stability and lesion complexity.
    keyEvidence:
      - "37622656"  # ESC ACS 2023
      - "31562798"  # COMPLETE trial
      - "30145930"  # PRAGUE-13 trial
    linkedProtocolActions:
      - "STEMI-ACT-008"
    clinicalConsiderations: |
      - FFR or iFR-guided revascularization for non-culprit lesions
      - Can be performed at index procedure (if hemodynamically stable) or staged within hospitalization
      - Avoid complete revascularization in cardiogenic shock (culprit-only per CULPRIT-SHOCK trial)


# ==================================================================
# RELATED GUIDELINES
# ==================================================================
relatedGuidelines:
  - guidelineId: "GUIDE-ACCAHA-STEMI-2023"
    relationship: "COMPLEMENTARY"
    note: "American perspective - key difference: ESC uses 120-min PCI threshold universally, ACC/AHA uses 90-min for PCI-capable hospitals"

  - guidelineId: "GUIDE-ESC-STEMI-2017"
    relationship: "SUPERSEDES"
    note: "This 2023 guideline updates the 2017 ESC STEMI guideline"


# ==================================================================
# KEY DIFFERENCES VS ACC/AHA 2023
# ==================================================================
regionalDifferences:
  - aspect: "PCI time threshold"
    esc2023: "120 minutes for all patients (first medical contact-to-device)"
    accaha2023: "90 minutes for PCI-capable hospitals, 120 minutes for transfer from non-PCI hospitals"
    rationale: "ESC reflects European geography and centralized STEMI networks; ACC/AHA distinguishes by hospital capability"

  - aspect: "Radial access"
    esc2023: "Class I recommendation - radial preferred over femoral"
    accaha2023: "Class IIa recommendation - radial reasonable when expertise available"
    rationale: "ESC has stronger evidence base from European trials (MATRIX) and higher radial adoption rates"

  - aspect: "Complete revascularization"
    esc2023: "Class IIa - should be considered before discharge (COMPLETE trial)"
    accaha2023: "Class IIa - reasonable to consider (more conservative)"
    rationale: "ESC guideline published after COMPLETE trial primary results"

  - aspect: "Pre-hospital fibrinolysis"
    esc2023: "Class IIa - should be considered when PCI delay >120 min"
    accaha2023: "Class I - should be given (stronger recommendation)"
    rationale: "Different fibrinolysis adoption rates and pre-hospital systems between regions"


# ==================================================================
# ALGORITHM SUMMARY (ESC)
# ==================================================================
algorithmSummary: |
  STEMI Recognition (ECG ≤10 min) → Aspirin + P2Y12 inhibitor (ticagrelor/prasugrel preferred)

  Reperfusion Strategy:
  ├─ PCI within 120 min possible? → Primary PCI (radial access preferred)
  │   └─ Multivessel disease → Complete revascularization (before discharge, FFR-guided)
  │
  └─ PCI delay >120 min? → Pre-hospital fibrinolysis → Transfer for angiography (3-24 hours)

  Special Populations:
  ├─ Cardiogenic shock → Immediate angiography + revascularization (culprit-only)
  └─ Early presenters (<3 hours) → Pre-hospital fibrinolysis acceptable if PCI unavailable

  Post-Reperfusion: DAPT × 12 months, high-intensity statin, ACE-I/ARB, beta-blocker


# ==================================================================
# QUALITY INDICATORS (ESC)
# ==================================================================
qualityIndicators:
  - indicatorId: "QI-ESC-STEMI-001"
    measure: "First medical contact-to-device time ≤120 minutes"
    target: "≥85% of patients"
    rationale: "Time-to-reperfusion mortality relationship"

  - indicatorId: "QI-ESC-STEMI-002"
    measure: "Radial access utilization"
    target: "≥70% of PCIs (when experienced operator available)"
    rationale: "Reduced bleeding and vascular complications"

  - indicatorId: "QI-ESC-STEMI-003"
    measure: "Ticagrelor or prasugrel use (vs clopidogrel)"
    target: "≥80% of patients"
    rationale: "Superior efficacy of newer P2Y12 inhibitors"

  - indicatorId: "QI-ESC-STEMI-004"
    measure: "Complete revascularization in multivessel disease"
    target: "≥60% of eligible patients"
    rationale: "COMPLETE trial mortality/MI reduction"


