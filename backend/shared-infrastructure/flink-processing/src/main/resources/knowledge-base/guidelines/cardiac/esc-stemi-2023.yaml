# ==================================================================
guidelineId: "GUIDE-ESC-STEMI-2023"
name: "2023 ESC Guidelines for the Management of Acute Coronary Syndromes"
shortName: "ESC STEMI 2023"
organization: "European Society of Cardiology"
topic: "ST-Elevation Myocardial Infarction (STEMI) and Acute Coronary Syndromes"


