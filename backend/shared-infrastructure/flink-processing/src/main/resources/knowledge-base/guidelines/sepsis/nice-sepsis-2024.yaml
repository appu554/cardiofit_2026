# ==================================================================
# RECOMMENDATIONS (UK NHS-SPECIFIC)
# ==================================================================
recommendations:
  # SECTION 1: RISK STRATIFICATION (UK-SPECIFIC)

  - recommendationId: "NICE-SEPSIS-2024-REC-001"
    number: "1.1"
    section: "Risk Stratification"
    title: "Use NEWS2 (National Early Warning Score 2) for Risk Assessment"
    statement: "Use the National Early Warning Score 2 (NEWS2) to identify people aged 16 or over with suspected sepsis who are at risk of severe illness or death"
    strength: "STRONG"
    classOfRecommendation: "Recommendation"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    rationale: |
      NEWS2 is the UK NHS-adopted early warning score for detecting clinical deterioration. NEWS2 ≥5
      triggers urgent clinical review; ≥7 indicates high risk requiring emergency assessment. NEWS2
      integrates vital signs (RR, SpO2, BP, HR, temp, consciousness) into single score.
    keyEvidence:
      - "29769354"  # Smith GB - NEWS2 validation study
      - "30555596"  # Royal College of Physicians - NEWS2 report
    linkedProtocolActions:
      - "SEPSIS-ASSESS-001"  # NEWS2 scoring
    clinicalConsiderations: |
      NEWS2 components: Respiratory rate, SpO2, supplemental oxygen, temperature, systolic BP, heart rate, consciousness (AVPU)
      - NEWS2 0-4: Low risk - continue routine monitoring
      - NEWS2 5-6: Medium risk - urgent review by clinician
      - NEWS2 ≥7: High risk - emergency assessment, consider critical care

      UK-SPECIFIC: NEWS2 is mandated across NHS England for sepsis screening


  - recommendationId: "NICE-SEPSIS-2024-REC-002"
    number: "1.2"
    section: "Initial Management"
    title: "Sepsis 6 Bundle Within 1 Hour of Recognition"
    statement: "Immediately start the 'Sepsis 6' care bundle for people with suspected sepsis who meet high-risk criteria"
    strength: "STRONG"
    classOfRecommendation: "Recommendation"
    evidenceQuality: "LOW"
    gradeLevel: "Low"
    rationale: |
      Sepsis 6 is UK-developed bundle: 3 therapeutic interventions + 3 diagnostic tests completed within 1 hour.
      Derived from Surviving Sepsis Campaign but simplified for NHS implementation. Bundle compliance correlates
      with reduced mortality in UK hospitals.
    keyEvidence:
      - "25475231"  # Daniels R - Sepsis Six implementation (Emerg Med J 2011)
      - "27098896"  # SSC 2016 guideline
    linkedProtocolActions:
      - "SEPSIS-ACT-001"  # Lactate
      - "SEPSIS-ACT-002"  # Blood cultures
      - "SEPSIS-ACT-003"  # IV antibiotics
      - "SEPSIS-ACT-005"  # IV fluid resuscitation
      - "SEPSIS-MONITOR-001"  # Urine output monitoring
      - "SEPSIS-MONITOR-002"  # Oxygen saturation monitoring
    clinicalConsiderations: |
      SEPSIS 6 BUNDLE (UK):

      Give 3:
      1. Oxygen - target SpO2 94-98% (or 88-92% if COPD risk)
      2. IV fluids - crystalloid bolus
      3. IV antibiotics - broad-spectrum within 1 hour

      Take 3:
      1. Blood lactate
      2. Blood cultures (before antibiotics if possible)
      3. Urine output measurement (catheter if needed)


  - recommendationId: "NICE-SEPSIS-2024-REC-003"
    number: "2.1"
    section: "Antimicrobial Therapy"
    title: "IV Antibiotics Within 1 Hour of Sepsis Recognition"
    statement: "Give intravenous antibiotics within 1 hour of identifying that a person has sepsis"
    strength: "STRONG"
    classOfRecommendation: "Recommendation"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    rationale: "Antibiotic delay increases mortality - each hour delay increases risk by approximately 7%"
    keyEvidence:
      - "16625125"  # Kumar A - Antibiotic timing mortality
      - "25734408"  # Ferrer R - Antibiotic timing JAMA
    linkedProtocolActions:
      - "SEPSIS-ACT-003"
    clinicalConsiderations: |
      UK antibiotic guidelines recommend:
      - Community-acquired sepsis: Amoxicillin + gentamicin OR co-amoxiclav + gentamicin
      - Hospital-acquired sepsis: Piperacillin-tazobactam + gentamicin
      - Neutropenic sepsis: Piperacillin-tazobactam (NICE NG5)
      - Adjust based on local antimicrobial resistance patterns and guidelines


  - recommendationId: "NICE-SEPSIS-2024-REC-004"
    number: "2.2"
    section: "Microbiological Investigation"
    title: "Blood Cultures and Lactate Before Antibiotics"
    statement: "Take blood cultures before giving antibiotics if this does not delay treatment by more than 45 minutes. Measure blood lactate concentration"
    strength: "STRONG"
    classOfRecommendation: "Recommendation"
    evidenceQuality: "LOW"
    gradeLevel: "Low"
    rationale: "Blood cultures identify causative organism for targeted therapy; lactate identifies tissue hypoperfusion"
    keyEvidence:
      - "27098896"  # SSC 2016
      - "28114553"  # Lactate measurement
    linkedProtocolActions:
      - "SEPSIS-ACT-001"  # Lactate
      - "SEPSIS-ACT-002"  # Blood cultures
    clinicalConsiderations: |
      - Take at least 2 sets of blood cultures (aerobic + anaerobic bottles)
      - Do NOT delay antibiotics >45 minutes waiting for cultures
      - Lactate >2 mmol/L indicates tissue hypoperfusion
      - Repeat lactate if initially elevated to assess response


  - recommendationId: "NICE-SEPSIS-2024-REC-005"
    number: "3.1"
    section: "Fluid Resuscitation"
    title: "IV Fluid Resuscitation Guided by Clinical Response"
    statement: "Give an initial intravenous fluid bolus. Reassess the person regularly and give further fluid boluses as needed"
    strength: "STRONG"
    classOfRecommendation: "Recommendation"
    evidenceQuality: "LOW"
    gradeLevel: "Low"
    rationale: "Early fluid resuscitation critical for septic shock; frequent reassessment prevents over-resuscitation"
    keyEvidence:
      - "27098896"  # SSC 2016
      - "24635773"  # ProCESS trial
    linkedProtocolActions:
      - "SEPSIS-ACT-005"
    clinicalConsiderations: |
      - Initial bolus: 500 mL crystalloid over 15-30 minutes
      - Reassess after each bolus: BP, HR, urine output, respiratory status
      - Consider fluid responsiveness indicators (passive leg raise, stroke volume variation)
      - Avoid over-resuscitation (pulmonary edema risk)
      - Crystalloids preferred (0.9% saline or Hartmann's solution)


  - recommendationId: "NICE-SEPSIS-2024-REC-006"
    number: "4.1"
    section: "Escalation and Transfer"
    title: "Escalate to Critical Care if Not Responding to Initial Treatment"
    statement: "Arrange transfer to a higher level of care (critical care) if the person with sepsis is not responding to initial treatment"
    strength: "STRONG"
    classOfRecommendation: "Recommendation"
    evidenceQuality: "LOW"
    gradeLevel: "Low"
    rationale: "Non-responders to initial resuscitation require intensive monitoring, vasopressors, advanced support"
    keyEvidence:
      - "29769354"  # NEWS2 escalation pathways
    linkedProtocolActions:
      - "SEPSIS-ESCALATE-001"  # Critical care consultation
    clinicalConsiderations: |
      Indications for critical care escalation:
      - Persistent hypotension despite fluid resuscitation (need for vasopressors)
      - Lactate >4 mmol/L or not clearing
      - Acute organ dysfunction (AKI, confusion, hypoxemia)
      - NEWS2 ≥7 persisting after initial treatment
      - Need for mechanical ventilation


