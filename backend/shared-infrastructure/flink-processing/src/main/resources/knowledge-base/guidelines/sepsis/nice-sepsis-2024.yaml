# ==================================================================
# UK-SPECIFIC IMPLEMENTATION
# ==================================================================
ukImplementation:
  news2Integration: |
    NEWS2 (National Early Warning Score 2) is mandated across NHS England for sepsis screening.
    NEWS2 thresholds trigger escalation pathways:
    - NEWS2 5-6: Ward-based urgent clinical review
    - NEWS2 ≥7: Emergency assessment, consider critical care referral

  sepsis6Bundle: |
    Sepsis 6 is UK-developed bundle implemented across NHS hospitals. Simplified from SSC bundles
    for NHS workflow integration. Bundle completion within 1 hour associated with reduced mortality
    in UK hospitals.

  antibioticStewardship: |
    UK guidelines emphasize narrow-spectrum antibiotics when possible (vs broad-spectrum in US).
    Local antimicrobial guidelines and resistance patterns guide selection. Mandatory antimicrobial
    stewardship programs across NHS.

  escalationPathways: |
    Clear escalation pathways defined by NHS:
    - Ward → Critical Care Outreach Team → ICU
    - Standardized handover tools (SBAR: Situation, Background, Assessment, Recommendation)


# ==================================================================
# ALGORITHM SUMMARY (NICE/UK)
# ==================================================================
algorithmSummary: |
  Suspected Sepsis → NEWS2 Score Calculation:

  NEWS2 ≥5 (Medium/High Risk) → SEPSIS 6 BUNDLE (within 1 hour):

  Give 3:
  1. Oxygen (SpO2 target 94-98%)
  2. IV fluids (500 mL bolus, reassess)
  3. IV antibiotics (within 1 hour)

  Take 3:
  1. Blood lactate
  2. Blood cultures (before antibiotics if no delay >45 min)
  3. Urine output (catheter if needed)

  Ongoing Management:
  - Reassess frequently (NEWS2, vital signs, lactate)
  - Escalate to critical care if not responding:
    - Persistent hypotension
    - Lactate not clearing
    - Organ dysfunction
    - NEWS2 ≥7 persisting


# ==================================================================
# DIFFERENCES VS SURVIVING SEPSIS CAMPAIGN
# ==================================================================
differencesSsc:
  - aspect: "Risk stratification tool"
    nice2024: "NEWS2 (UK-mandated early warning score)"
    ssc2021: "No specific early warning score mandated"
    rationale: "NEWS2 standardized across NHS for consistency"

  - aspect: "Bundle structure"
    nice2024: "Sepsis 6 (3 give + 3 take)"
    ssc2021: "Hour-1 bundle (lactate, cultures, antibiotics, fluids, vasopressors if needed)"
    rationale: "Sepsis 6 simplified for NHS workflow"

  - aspect: "Fluid resuscitation"
    nice2024: "Initial bolus with frequent reassessment (no fixed volume)"
    ssc2021: "Initial fluid challenge with reassessment (de-emphasizes 30 mL/kg fixed target)"
    rationale: "Both guidelines moved away from rigid 30 mL/kg; emphasize reassessment"

  - aspect: "Escalation pathways"
    nice2024: "Explicit NHS escalation pathways (ward → outreach → ICU)"
    ssc2021: "General recommendation for higher level of care"
    rationale: "NHS has standardized escalation infrastructure"


