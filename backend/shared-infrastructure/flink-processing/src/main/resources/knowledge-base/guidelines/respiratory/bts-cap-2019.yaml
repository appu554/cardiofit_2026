# ==================================================================
# ALGORITHM SUMMARY
# ==================================================================
algorithmSummary: |
  Suspected CAP → Chest X-Ray (confirm infiltrate) → CURB-65 Score:

  CURB-65 0-1 (Low risk, 0.7-2.1% mortality):
  ├─ Outpatient treatment (if socially appropriate)
  └─ Amoxicillin 500 mg PO TID × 5 days

  CURB-65 2 (Moderate risk, 9.2% mortality):
  ├─ Consider hospital admission
  ├─ Amoxicillin 500 mg-1 g PO/IV TID
  └─ Add macrolide if atypical pathogen suspected

  CURB-65 ≥3 (High risk, 22% mortality):
  ├─ Urgent hospital admission
  ├─ Consider ICU if CURB-65 ≥4
  ├─ Dual therapy: Co-amoxiclav 1.2 g IV TID + Clarithromycin 500 mg IV BID
  └─ Oxygen to target SpO2 94-98%

  Duration: 5 days if uncomplicated and clinically stable


# ==================================================================
# QUALITY INDICATORS
# ==================================================================
qualityIndicators:
  - indicatorId: "QI-BTS-CAP-001"
    measure: "CURB-65 score documented"
    target: "≥90% of CAP patients"
    rationale: "Severity assessment guides admission and treatment decisions"

  - indicatorId: "QI-BTS-CAP-002"
    measure: "Antibiotics started within 4 hours of hospital arrival"
    target: "≥85% of patients"
    rationale: "Early antibiotic therapy reduces mortality"

  - indicatorId: "QI-BTS-CAP-003"
    measure: "Chest X-ray performed"
    target: "≥95% of suspected CAP"
    rationale: "Confirms diagnosis and identifies complications"


