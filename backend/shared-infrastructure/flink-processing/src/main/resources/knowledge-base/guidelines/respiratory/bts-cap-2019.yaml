# ==================================================================
# BTS COMMUNITY-ACQUIRED PNEUMONIA 2019 GUIDELINE
# ==================================================================
guidelineId: "GUIDE-BTS-CAP-2019"
name: "British Thoracic Society Guideline for Community-Acquired Pneumonia in Adults (2019 Update)"
shortName: "BTS CAP 2019"
organization: "British Thoracic Society"
topic: "Community-Acquired Pneumonia in Adults"


# ==================================================================
# VERSIONING
# ==================================================================
version: "2019.1"
publicationDate: "2019-12-01"
lastReviewDate: "2019-12-01"
nextReviewDate: "2024-12-01"
status: "CURRENT"


# ==================================================================
# PUBLICATION DETAILS
# ==================================================================
publication:
  journal: "Thorax"
  year: 2019
  volume: 74
  issue: "Suppl 2"
  pages: "1-43"
  doi: "10.1136/thoraxjnl-2019-213999"
  pmid: "31672818"
  url: "https://thorax.bmj.com/content/74/Suppl_2/1"
  pdfUrl: "https://thorax.bmj.com/content/thoraxjnl/74/Suppl_2/1.full.pdf"


# ==================================================================
# SCOPE & APPLICABILITY
# ==================================================================
scope:
  clinicalDomain: "Respiratory Medicine / Emergency Medicine / Primary Care"
  targetPopulations:
    - "Adults (≥18 years) with community-acquired pneumonia"
  targetSettings:
    - "Primary Care (GP practices)"
    - "Emergency Department"
    - "Hospital Wards"
    - "ICU"
  exclusions:
    - "Healthcare-associated pneumonia (separate guidance)"
    - "Immunocompromised patients (separate guidance)"
  geographicScope: "United Kingdom"


# ==================================================================
# METHODOLOGY
# ==================================================================
methodology:
  approachUsed: "GRADE (Grading of Recommendations Assessment, Development and Evaluation)"
  evidenceSearchStrategy: "Systematic review through 2018"
  evidenceSearchDate: "2018-12-31"
  panelSize: 22
  panelComposition:
    - "Respiratory physicians"
    - "Emergency medicine consultants"
    - "Microbiologists"
    - "GPs"
  conflictOfInterestPolicy: "All conflicts disclosed"
  externalReview: true


# ==================================================================
# RECOMMENDATIONS
# ==================================================================
recommendations:
  # SECTION 1: SEVERITY ASSESSMENT

  - recommendationId: "BTS-CAP-2019-REC-001"
    number: "1.1"
    section: "Severity Assessment"
    title: "Use CURB-65 Score for Pneumonia Severity Assessment"
    statement: "Use the CURB-65 severity score to stratify adults with community-acquired pneumonia into risk groups for mortality"
    strength: "STRONG"
    classOfRecommendation: "Grade A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: |
      CURB-65 is validated tool for predicting 30-day mortality in CAP. Guides admission decisions and
      antibiotic selection. Each point increases mortality risk.
    keyEvidence:
      - "31672818"  # BTS CAP 2019 guideline
      - "12725688"  # Lim WS - Defining community acquired pneumonia severity on presentation to hospital (Thorax 2003)
      - "14555453"  # Lim WS - CURB-65 validation (Thorax 2003)
    linkedProtocolActions:
      - "CAP-ASSESS-001"  # CURB-65 scoring
    clinicalConsiderations: |
      CURB-65 Score Components (1 point each):
      C - Confusion (new onset, AMT ≤8)
      U - Urea >7 mmol/L (BUN >19 mg/dL)
      R - Respiratory rate ≥30/min
      B - Blood pressure: SBP <90 OR DBP ≤60 mmHg
      65 - Age ≥65 years

      Interpretation:
      - CURB-65 0-1: Low risk (0.7-2.1% mortality) - Consider outpatient treatment
      - CURB-65 2: Moderate risk (9.2% mortality) - Consider hospital admission
      - CURB-65 ≥3: High risk (22% mortality) - Urgent hospital admission, consider ICU


  - recommendationId: "BTS-CAP-2019-REC-002"
    number: "2.1"
    section: "Microbiological Investigation"
    title: "Chest X-Ray for All Suspected CAP"
    statement: "A chest X-ray should be performed in all patients with suspected community-acquired pneumonia to confirm the diagnosis"
    strength: "STRONG"
    classOfRecommendation: "Grade A"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    rationale: "Chest X-ray confirms pneumonia infiltrate, excludes alternative diagnoses, identifies complications"
    keyEvidence:
      - "31672818"
    linkedProtocolActions:
      - "CAP-DIAG-001"  # Chest X-ray PA and lateral
    clinicalConsiderations: |
      - CXR findings: Lobar consolidation, patchy infiltrates, pleural effusion
      - Normal CXR does NOT exclude pneumonia if dehydrated (repeat if high suspicion)
      - Consider CT chest if CXR unclear or complications suspected


  - recommendationId: "BTS-CAP-2019-REC-003"
    number: "3.1"
    section: "Antibiotic Therapy"
    title: "Amoxicillin for Uncomplicated Low-Severity CAP"
    statement: "Amoxicillin is recommended as first-line therapy for low-severity community-acquired pneumonia (CURB-65 0-1) in patients without risk factors for resistant organisms"
    strength: "STRONG"
    classOfRecommendation: "Grade A"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    rationale: |
      Amoxicillin covers Streptococcus pneumoniae (most common CAP pathogen) and is narrow-spectrum,
      reducing antibiotic resistance pressure. Equivalent to broader agents for uncomplicated CAP.
    keyEvidence:
      - "31672818"
      - "11794169"  # Amoxicillin vs broader agents meta-analysis
    linkedProtocolActions:
      - "CAP-MED-001"  # Amoxicillin 500 mg TID × 5 days
    clinicalConsiderations: |
      Amoxicillin 500 mg orally three times daily for 5 days
      - First-line for CURB-65 0-1 (low severity)
      - Alternative: Doxycycline 200 mg loading, then 100 mg daily × 5 days (if penicillin allergy)
      - Add macrolide if atypical pathogen suspected (Legionella, Mycoplasma)


  - recommendationId: "BTS-CAP-2019-REC-004"
    number: "3.2"
    section: "Antibiotic Therapy"
    title: "Dual Therapy for Severe CAP (Beta-Lactam + Macrolide)"
    statement: "Patients with severe community-acquired pneumonia (CURB-65 ≥3) should receive dual antibiotic therapy with a beta-lactam PLUS a macrolide"
    strength: "STRONG"
    classOfRecommendation: "Grade A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: |
      Dual therapy covers both typical (S. pneumoniae, H. influenzae) and atypical (Legionella, Mycoplasma)
      pathogens. Reduces mortality in severe CAP compared to beta-lactam monotherapy.
    keyEvidence:
      - "31672818"
      - "17804840"  # Garin N - Beta-lactam-macrolide combination in severe CAP (Chest 2014)
      - "24043270"  # Postma DF - Macrolide benefit in severe CAP (Eur Respir J 2015)
    linkedProtocolActions:
      - "CAP-MED-002"  # Co-amoxiclav + clarithromycin IV
    clinicalConsiderations: |
      Severe CAP (CURB-65 ≥3) - Dual therapy:
      - Co-amoxiclav 1.2 g IV TID PLUS Clarithromycin 500 mg IV BID
      - OR Ceftriaxone 1-2 g IV OD PLUS Clarithromycin 500 mg IV BID
      - Switch to oral after 48-72 hours if improving
      - Total duration: 7-10 days (longer if slow response or bacteremic)


  - recommendationId: "BTS-CAP-2019-REC-005"
    number: "4.1"
    section: "Admission Criteria"
    title: "Admit if CURB-65 ≥2"
    statement: "Consider hospital admission for patients with CURB-65 score of 2 or more"
    strength: "STRONG"
    classOfRecommendation: "Grade A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: "CURB-65 ≥2 associated with 9.2-22% mortality risk; requires hospital monitoring and IV therapy"
    keyEvidence:
      - "31672818"
      - "12725688"  # Lim WS - CURB-65 validation
    linkedProtocolActions:
      - "CAP-ADMIT-001"  # Hospital admission decision
    clinicalConsiderations: |
      Admission criteria:
      - CURB-65 ≥2: Consider hospital admission
      - CURB-65 ≥3: Urgent admission, consider ICU if ≥4
      - Social factors: Inability to cope at home, no support
      - Oxygen requirement: SpO2 <92% on room air


  - recommendationId: "BTS-CAP-2019-REC-006"
    number: "5.1"
    section: "Supportive Care"
    title: "Oxygen Therapy - Target SpO2 94-98%"
    statement: "Give supplemental oxygen if SpO2 <94%, targeting SpO2 94-98% (or 88-92% if risk of hypercapnic respiratory failure)"
    strength: "STRONG"
    classOfRecommendation: "Grade A"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    rationale: "Hypoxemia common in CAP; supplemental oxygen prevents tissue hypoxia"
    keyEvidence:
      - "31672818"
      - "18757655"  # BTS oxygen guideline
    linkedProtocolActions:
      - "CAP-SUPPORT-001"  # Oxygen therapy
    clinicalConsiderations: |
      - Target SpO2 94-98% for most patients
      - Target SpO2 88-92% if COPD or risk of CO2 retention
      - Start with nasal cannula 2-4 L/min, titrate to target
      - Escalate to high-flow nasal oxygen or NIV if persistent hypoxemia


  - recommendationId: "BTS-CAP-2019-REC-007"
    number: "3.3"
    section: "Antibiotic Duration"
    title: "5-Day Antibiotic Course for Uncomplicated CAP"
    statement: "A 5-day course of antibiotics is recommended for patients with uncomplicated community-acquired pneumonia who are clinically stable"
    strength: "STRONG"
    classOfRecommendation: "Grade A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: |
      5-day course non-inferior to 7-10 days for uncomplicated CAP. Reduces antibiotic exposure,
      side effects, and resistance. Extend duration if slow response, bacteremia, or complications.
    keyEvidence:
      - "31672818"
      - "26466479"  # Uranga A - 5 vs 10 days antibiotics (JAMA Intern Med 2016)
      - "27735812"  # El Moussaoui R - Short-course antibiotics (BMJ 2006)
    linkedProtocolActions:
      - "CAP-MED-001"  # Antibiotic duration
    clinicalConsiderations: |
      5-day course appropriate if:
      - Clinically stable (afebrile, normal vital signs)
      - Improving symptoms
      - Able to take oral antibiotics
      - No complications (empyema, bacteremia, abscess)

      Extend to 7-10 days if:
      - Slow clinical response
      - Bacteremia
      - Legionella or Staphylococcus aureus pneumonia
      - Complications (empyema, abscess)


