name: "Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock 2016"
shortName: "SSC 2016"
organization: "Society of Critical Care Medicine / European Society of Intensive Care Medicine"
topic: "Sepsis and Septic Shock Management"


# ==================================================================
# VERSIONING
# ==================================================================
version: "2016.1"
publicationDate: "2017-01-01"
lastReviewDate: "2017-01-01"
nextReviewDate: "2021-01-01"
status: "SUPERSEDED"
supersededBy: "GUIDE-SSC-2021"
supersededDate: "2021-11-01"


# ==================================================================
# PUBLICATION DETAILS
# ==================================================================
publication:
  journal: "Critical Care Medicine / Intensive Care Medicine"
  year: 2017
  volume: 45
  issue: 3
  pages: "486-552"
  doi: "10.1097/CCM.0000000000002255"
  pmid: "27098896"
  url: "https://journals.lww.com/ccmjournal/Fulltext/2017/03000/Surviving_Sepsis_Campaign___International.15.aspx"
