# ==================================================================
# SCOPE & APPLICABILITY
# ==================================================================
scope:
  clinicalDomain: "Critical Care / Emergency Medicine / Infectious Diseases"
  targetPopulations:
    - "Adults (≥18 years) with sepsis or septic shock"
    - "Pediatric considerations provided separately"
  targetSettings:
    - "ICU"
    - "Emergency Department"
    - "Hospital Wards"
  exclusions:
    - "Neonates (<28 days) - separate guidelines"
  geographicScope: "International"


# ==================================================================
# METHODOLOGY
# ==================================================================
methodology:
  approachUsed: "GRADE (Grading of Recommendations Assessment, Development and Evaluation)"
  evidenceSearchStrategy: "Systematic review of literature through 2015"
  evidenceSearchDate: "2015-12-31"
  panelSize: 55
  panelComposition:
    - "51 international experts in critical care"
    - "4 methodologists"
  conflictOfInterestPolicy: "All panel members disclosed conflicts"
  externalReview: true


# ==================================================================
# RECOMMENDATIONS (HISTORICAL - SSC 2016)
# ==================================================================
recommendations:
  # SECTION 1: INITIAL RESUSCITATION

  - recommendationId: "SSC-2016-REC-001"
    number: "1.1"
    section: "Initial Resuscitation"
    title: "Measure Lactate Within 1 Hour"
    statement: "We recommend that blood lactate level be measured to identify tissue hyperperfusion in patients with suspected sepsis"
    strength: "STRONG"
    classOfRecommendation: "Strong recommendation"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    rationale: "Elevated lactate (>2 mmol/L) identifies tissue hypoperfusion and predicts mortality"
    keyEvidence:
      - "27098896"  # SSC 2016 guideline
      - "28114553"  # Lactate clearance trials
      - "21378355"  # Jones AE - Lactate-guided resuscitation
    linkedProtocolActions:
      - "SEPSIS-ACT-001"  # Measure lactate
      - "SEPSIS-ACT-004"  # Repeat lactate for clearance
    clinicalConsiderations: |
      Same recommendation as SSC 2021 - lactate measurement remains core sepsis resuscitation marker


  - recommendationId: "SSC-2016-REC-002"
    number: "1.2"
    section: "Initial Resuscitation"
    title: "Blood Cultures Before Antibiotics"
    statement: "We recommend obtaining appropriate routine cultures (including blood) before starting antimicrobial therapy if doing so results in no substantial delay (>45 min) in the start of antimicrobials"
    strength: "STRONG"
    classOfRecommendation: "Best Practice Statement"
    evidenceQuality: "LOW"
    gradeLevel: "Low"
    rationale: "Blood cultures identify causative organism and guide antibiotic de-escalation"
    keyEvidence:
      - "27098896"
      - "25734408"  # Kumar A - Antibiotic timing and mortality
    linkedProtocolActions:
      - "SEPSIS-ACT-002"  # Blood cultures × 2 sets
    clinicalConsiderations: |
      Same recommendation as SSC 2021 - cultures before antibiotics if no substantial delay


  - recommendationId: "SSC-2016-REC-003"
    number: "1.3"
    section: "Antimicrobial Therapy"
    title: "Broad-Spectrum Antibiotics Within 1 Hour"
    statement: "We recommend that administration of IV antimicrobials be initiated as soon as possible after recognition and within one hour for both sepsis and septic shock"
    strength: "STRONG"
    classOfRecommendation: "Strong recommendation"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "C"
    rationale: |
      Every hour delay in antibiotic administration increases mortality by ~7% in septic shock (Kumar 2006).
      Time to antibiotics is one of the most critical interventions in sepsis.
    keyEvidence:
      - "27098896"
      - "16625125"  # Kumar A - Antibiotic delay mortality (Crit Care Med 2006)
      - "25734408"  # Ferrer R - Antibiotic timing (JAMA 2014)
    linkedProtocolActions:
      - "SEPSIS-ACT-003"  # Broad-spectrum antibiotics
    clinicalConsiderations: |
      Same recommendation as SSC 2021 - antibiotics within 1 hour critical for survival


  - recommendationId: "SSC-2016-REC-004"
    number: "1.4"
    section: "Fluid Resuscitation"
    title: "30 mL/kg Crystalloid for Hypotension or Lactate ≥4"
    statement: "We recommend that at least 30 mL/kg of IV crystalloid fluid be given within the first 3 hours for patients with sepsis-induced hypoperfusion"
    strength: "STRONG"
    classOfRecommendation: "Strong recommendation"
    evidenceQuality: "LOW"
    gradeLevel: "Low"
    levelOfEvidence: "C"
    rationale: |
      Early goal-directed therapy (EGDT) trials showed benefit of early aggressive fluid resuscitation.
      30 mL/kg is initial fluid bolus target for hypotension or elevated lactate.
    keyEvidence:
      - "27098896"
      - "11794169"  # Rivers E - Early goal-directed therapy (N Engl J Med 2001)
      - "24635773"  # ProCESS trial
    linkedProtocolActions:
      - "SEPSIS-ACT-005"  # Crystalloid bolus 30 mL/kg
    clinicalConsiderations: |
      NOTE: SSC 2021 softened this recommendation after FEAST trial showed potential harm of aggressive
      fluids in resource-limited settings. 2021 guideline emphasizes "frequent reassessment" and dynamic
      parameters rather than fixed 30 mL/kg target.


  - recommendationId: "SSC-2016-REC-005"
    number: "2.1"
    section: "Vasopressors"
    title: "Norepinephrine as First-Line Vasopressor"
    statement: "We recommend norepinephrine as the first-choice vasopressor"
    strength: "STRONG"
    classOfRecommendation: "Strong recommendation"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    rationale: "Norepinephrine superior to dopamine for septic shock - less arrhythmias, lower mortality"
    keyEvidence:
      - "27098896"
      - "20200382"  # SOAP II trial - Norepinephrine vs dopamine (N Engl J Med 2010)
    linkedProtocolActions:
      - "SEPSIS-ACT-006"  # Norepinephrine infusion
    clinicalConsiderations: |
      Same recommendation as SSC 2021 - norepinephrine remains first-line vasopressor


  - recommendationId: "SSC-2016-REC-006"
    number: "2.2"
    section: "Vasopressors"
    title: "Target MAP ≥65 mmHg"
    statement: "We recommend an initial target mean arterial pressure (MAP) of 65 mmHg in patients with septic shock requiring vasopressors"
    strength: "STRONG"
    classOfRecommendation: "Strong recommendation"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    rationale: "MAP ≥65 mmHg maintains organ perfusion; higher targets no benefit in most patients (SEPSISPAM)"
    keyEvidence:
      - "27098896"
      - "24635773"  # SEPSISPAM trial - MAP targets (N Engl J Med 2014)
    linkedProtocolActions:
      - "SEPSIS-ACT-006"
    clinicalConsiderations: |
      Same recommendation as SSC 2021 - MAP ≥65 mmHg target


  - recommendationId: "SSC-2016-REC-007"
    number: "1.5"
    section: "Resuscitation Goals"
    title: "Lactate Clearance as Resuscitation Goal"
    statement: "We suggest guiding resuscitation to normalize lactate in patients with elevated lactate levels as a marker of tissue hypoperfusion"
    strength: "WEAK"
    classOfRecommendation: "Weak recommendation"
    evidenceQuality: "LOW"
    gradeLevel: "Low"
    rationale: "Lactate clearance correlates with improved outcomes; targeting normalization may guide therapy"
    keyEvidence:
      - "27098896"
      - "21378355"  # Jones AE - Lactate clearance (JAMA 2010)
      - "23361625"  # Jansen TC - Lactate-guided resuscitation
    linkedProtocolActions:
      - "SEPSIS-ACT-004"  # Serial lactate measurements
    clinicalConsiderations: |
      NOTE: SSC 2021 DE-EMPHASIZED lactate clearance as explicit goal. 2021 recommends repeat lactate
      if initially elevated, but does NOT recommend targeting lactate normalization as primary endpoint
      (shift from ScvO2 and lactate clearance targets to dynamic assessment of fluid responsiveness).


  - recommendationId: "SSC-2016-REC-008"
    number: "3.1"
    section: "Corticosteroids"
    title: "Hydrocortisone for Refractory Shock (if fluids + vasopressors inadequate)"
    statement: "We suggest IV hydrocortisone be given at a dose of 200 mg per day in patients with septic shock whose blood pressure is poorly responsive to fluid and vasopressor therapy"
    strength: "WEAK"
    classOfRecommendation: "Weak recommendation"
    evidenceQuality: "LOW"
    gradeLevel: "Low"
    rationale: "Corticosteroids may improve hemodynamics and reduce vasopressor duration in refractory shock"
    keyEvidence:
      - "27098896"
      - "18184957"  # CORTICUS trial (N Engl J Med 2008)
      - "12186604"  # Annane D - Corticosteroids meta-analysis
    linkedProtocolActions:
      - "SEPSIS-ACT-007"  # Hydrocortisone 50 mg IV Q6H or 200 mg/day continuous
    clinicalConsiderations: |
      NOTE: SSC 2021 STRENGTHENED this recommendation after ADRENAL and APROCCHSS trials. 2021 makes
      this a STRONG recommendation (not weak) for patients in refractory shock. Evidence base improved
      significantly between 2016 and 2021.


