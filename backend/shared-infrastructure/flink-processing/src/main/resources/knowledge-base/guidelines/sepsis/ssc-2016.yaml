    relationship: "SUPERSEDED_BY"
    note: "This 2016 guideline was updated and replaced by the 2021 Surviving Sepsis Campaign guideline"


# ==================================================================
# KEY EVOLUTION TO SSC 2021
# ==================================================================
evolutionTo2021Guideline:
  - change: "Fluid resuscitation strategy"
    guideline2016: "Strong recommendation for 30 mL/kg crystalloid bolus"
    guideline2021: "Suggests initial fluid bolus with FREQUENT REASSESSMENT and dynamic parameters (de-emphasizes fixed 30 mL/kg)"
    rationale: "FEAST trial, CLASSIC trial - more conservative fluids in certain populations; focus on fluid responsiveness"

  - change: "Lactate clearance as goal"
    guideline2016: "Weak recommendation to target lactate normalization as resuscitation goal"
    guideline2021: "Recommends repeat lactate measurement if elevated, but does NOT recommend targeting lactate clearance as primary endpoint"
    rationale: "Shift from fixed ScvO2/lactate targets to dynamic assessment; concern about over-resuscitation"

  - change: "Corticosteroid recommendation"
    guideline2016: "WEAK recommendation for hydrocortisone in refractory shock"
    guideline2021: "STRONG recommendation for hydrocortisone in refractory shock (not responding to fluids + vasopressors)"
    rationale: "ADRENAL (2018) and APROCCHSS (2018) trials strengthened evidence base for steroids in septic shock"

  - change: "Early goal-directed therapy (EGDT)"
    guideline2016: "Recommendations based on Rivers EGDT trial (2001)"
    guideline2021: "De-emphasized protocolized EGDT after ProCESS, ARISE, ProMISe trials showed no benefit of strict EGDT"
    rationale: "Three large trials (ProCESS, ARISE, ProMISe) showed EGDT protocol no better than usual care with early antibiotics/fluids"

  - change: "Albumin use"
    guideline2016: "Suggests albumin in addition to crystalloids for initial resuscitation when patients require substantial amounts of crystalloids"
    guideline2021: "Suggests albumin in addition to crystalloids in selected patients (de-emphasized compared to 2016)"
    rationale: "ALBIOS trial showed no overall mortality benefit; albumin expensive; crystalloids preferred"


# ==================================================================
# ALGORITHM SUMMARY (SSC 2016)
# ==================================================================
algorithmSummary: |
  Sepsis Recognition → Hour-1 Bundle:
  1. Measure lactate (repeat if >2 mmol/L)
  2. Blood cultures BEFORE antibiotics
  3. Broad-spectrum antibiotics within 1 hour
  4. 30 mL/kg crystalloid bolus for hypotension or lactate ≥4 mmol/L
  5. Vasopressors (norepinephrine) if hypotensive during/after fluid bolus → target MAP ≥65 mmHg

  Ongoing Resuscitation:
  - Target lactate clearance (normalize lactate)
  - ScvO2 ≥70% if central line available
  - Hydrocortisone 200 mg/day if refractory shock (weak recommendation)
  - Early EGDT protocol per Rivers 2001


# ==================================================================
# METADATA
# ==================================================================
lastUpdated: "2017-01-01"
source: "Society of Critical Care Medicine / European Society of Intensive Care Medicine"
version: "1.0"
supersededNote: |
  This guideline has been SUPERSEDED by the 2021 Surviving Sepsis Campaign guideline (PMID: 34605781).
  Key updates include: more conservative fluid resuscitation strategy, de-emphasis of lactate clearance
  as resuscitation target, stronger corticosteroid recommendation for refractory shock, and de-emphasis
  of protocolized early goal-directed therapy (EGDT).
