# ==================================================================
# ACR APPROPRIATENESS CRITERIA (IMAGING GUIDELINES)
# ==================================================================
guidelineId: "GUIDE-ACR-APPROPRIATENESS"
name: "ACR Appropriateness Criteria: Evidence-Based Guidelines for Imaging Test Selection"
shortName: "ACR Appropriateness Criteria"
organization: "American College of Radiology"
topic: "Diagnostic Imaging Selection and Appropriateness"


# ==================================================================
# VERSIONING
# ==================================================================
version: "2024.1"
publicationDate: "2024-01-01"
lastReviewDate: "2024-01-01"
nextReviewDate: "2025-01-01"
status: "CURRENT"


# ==================================================================
# PUBLICATION DETAILS
# ==================================================================
publication:
  publicationType: "Evidence-Based Clinical Practice Guidelines"
  year: 2024
  url: "https://www.acr.org/Clinical-Resources/ACR-Appropriateness-Criteria"


# ==================================================================
# SCOPE & APPLICABILITY
# ==================================================================
scope:
  clinicalDomain: "Radiology / All Clinical Specialties"
  targetPopulations:
    - "All patients requiring diagnostic imaging"
    - "Ordering clinicians (all specialties)"
    - "Radiologists"
  targetSettings:
    - "Emergency Department"
    - "Outpatient Clinics"
    - "Hospital Wards"
    - "ICU"
  geographicScope: "United States (applicable globally)"


# ==================================================================
# PURPOSE
# ==================================================================
purpose: |
  ACR Appropriateness Criteria provide evidence-based guidance on imaging test selection for
  specific clinical conditions. Goals:
  1. Optimize diagnostic imaging utilization (reduce inappropriate imaging)
  2. Improve diagnostic accuracy (right test for right indication)
  3. Minimize radiation exposure
  4. Reduce healthcare costs
  5. Link diagnostic tests to clinical decision-making

  Covers 200+ clinical topics across all body systems and imaging modalities.


# ==================================================================
# ACR APPROPRIATENESS RATING SCALE
# ==================================================================
appropriatenessRatingScale:
  - rating: 9
    interpretation: "Usually Appropriate"
    description: "Imaging is appropriate for the indication in most patients. Benefits clearly outweigh risks."
    actionGuidance: "Order this imaging study"
    examples:
      - "CT chest with contrast for suspected pulmonary embolism"
      - "Echocardiography for new heart failure"
      - "CT head for acute stroke evaluation"

  - rating: 8
    interpretation: "Usually Appropriate"
    description: "Imaging is appropriate for the indication. Benefits outweigh risks."

  - rating: 7
    interpretation: "Usually Appropriate"
    description: "Imaging is generally appropriate. Benefits outweigh risks in most cases."

  - rating: 6
    interpretation: "May Be Appropriate"
    description: "Imaging may be appropriate. Benefits and risks are closely balanced or uncertain."
    actionGuidance: "Consider clinical context, availability, patient preferences"
    examples:
      - "MRI brain for chronic headache without red flags"
      - "CT abdomen for chronic abdominal pain (after negative basic workup)"

  - rating: 5
    interpretation: "May Be Appropriate"
    description: "Uncertain appropriateness. Balance of benefits and risks unclear."

  - rating: 4
    interpretation: "May Be Appropriate"
    description: "Imaging may be appropriate in select cases. Individualize decision."

  - rating: 3
    interpretation: "Usually Not Appropriate"
    description: "Imaging is generally not appropriate. Risks may outweigh benefits."
    actionGuidance: "Avoid this imaging study in most cases"
    examples:
      - "CT head for simple syncope (no head trauma, no focal neuro signs)"
      - "Lumbar spine MRI for acute low back pain <6 weeks (no red flags)"

  - rating: 2
    interpretation: "Usually Not Appropriate"
    description: "Imaging is not appropriate. Risks outweigh benefits."

  - rating: 1
    interpretation: "Usually Not Appropriate"
    description: "Imaging is inappropriate for the indication. Provides little value, exposes to unnecessary risk/cost."
    actionGuidance: "Do not order this imaging study"
    examples:
      - "Whole-body CT screening in asymptomatic patients"
      - "Daily chest X-rays in stable ICU patients"


# ==================================================================
# KEY IMAGING RECOMMENDATIONS
# ==================================================================
recommendations:
  # CARDIOVASCULAR IMAGING

  - recommendationId: "ACR-CV-001"
    number: "CV-1"
    section: "Cardiovascular Imaging"
    title: "Echocardiography for Suspected Acute Heart Failure"
    clinicalScenario: "Adult patient with new-onset dyspnea, suspected acute heart failure"
    recommendedImaging: "Transthoracic Echocardiography (TTE)"
    appropriatenessRating: 9
    ratingCategory: "Usually Appropriate"
    rationale: |
      TTE is gold standard for assessing left ventricular function (systolic/diastolic), valve function,
      and pericardial disease. Guides heart failure classification (HFrEF vs HFpEF) and treatment decisions.
      Non-invasive, no radiation, high diagnostic accuracy.
    alternativeImaging:
      - imaging: "Chest X-ray"
        rating: 8
        note: "Assess pulmonary edema, cardiomegaly, pleural effusions"
      - imaging: "BNP/NT-proBNP"
        rating: 9
        note: "Biomarker for heart failure diagnosis (not imaging, but complementary)"
    linkedDiagnosticTests:
      - "IMAGING-ECHO-001"  # Transthoracic echocardiography
      - "LAB-BNP-001"  # BNP/NT-proBNP


  - recommendationId: "ACR-CV-002"
    number: "CV-2"
    section: "Cardiovascular Imaging"
    title: "CT Angiography for Suspected Pulmonary Embolism"
    clinicalScenario: "Adult with suspected acute pulmonary embolism (elevated D-dimer or high clinical probability)"
    recommendedImaging: "CT Pulmonary Angiography (CTPA)"
    appropriatenessRating: 9
    ratingCategory: "Usually Appropriate"
    rationale: |
      CTPA is imaging modality of choice for PE diagnosis. Sensitivity >90%, specificity >95%. Directly
      visualizes thrombus in pulmonary arteries. Also identifies alternative diagnoses (pneumonia, aortic
      dissection, pneumothorax).
    alternativeImaging:
      - imaging: "Ventilation-Perfusion (V/Q) Scan"
        rating: 7
        note: "Alternative if contrast allergy or renal insufficiency"
      - imaging: "Chest X-ray"
        rating: 5
        note: "Low sensitivity for PE, but screens for other causes of dyspnea"
    linkedDiagnosticTests:
      - "IMAGING-CT-CHEST-ANGIO-001"  # CT pulmonary angiography
      - "LAB-D-DIMER-001"  # D-dimer (screening test)


  # NEUROIMAGING

  - recommendationId: "ACR-NEURO-001"
    number: "NEURO-1"
    section: "Neuroimaging"
    title: "CT Head for Acute Stroke Evaluation (Within 20 Minutes)"
    clinicalScenario: "Adult with acute neurological deficit concerning for stroke (onset <4.5 hours)"
    recommendedImaging: "CT Head Without Contrast (Noncontrast CT)"
    appropriatenessRating: 9
    ratingCategory: "Usually Appropriate"
    rationale: |
      Noncontrast CT head is first-line imaging for acute stroke. PRIMARY GOAL: Exclude hemorrhage
      (contraindication to thrombolytics). SECONDARY: Detect large territory infarct, hyperdense vessel
      sign. Must be performed within 20 minutes of ED arrival per stroke guidelines.
    alternativeImaging:
      - imaging: "MRI Brain with DWI"
        rating: 8
        note: "More sensitive for acute infarct, but takes longer (delays thrombolysis)"
      - imaging: "CT Angiography Head/Neck"
        rating: 8
        note: "Identifies large vessel occlusion (candidate for thrombectomy)"
    linkedDiagnosticTests:
      - "IMAGING-CT-HEAD-001"  # CT head noncontrast
    linkedProtocolActions:
      - "STROKE-ACT-001"  # Acute stroke imaging within 20 minutes


  - recommendationId: "ACR-NEURO-002"
    number: "NEURO-2"
    section: "Neuroimaging"
    title: "Avoid Imaging for Uncomplicated Low Back Pain <6 Weeks"
    clinicalScenario: "Adult with acute low back pain (<6 weeks), no red flags (no fever, trauma, neuro deficit, cancer history, or progressive weakness)"
    recommendedImaging: "None - Conservative management"
    appropriatenessRating: 1
    ratingCategory: "Usually Not Appropriate"
    rationale: |
      Most acute low back pain resolves spontaneously within 6 weeks. Early imaging does NOT improve
      outcomes and leads to incidental findings, unnecessary procedures, and increased costs. Imaging
      indicated ONLY if red flags present.
    redFlagsRequiringImaging:
      - "Age >50 with new onset back pain (cancer concern)"
      - "History of cancer"
      - "Fever (infection concern)"
      - "IV drug use (osteomyelitis, epidural abscess)"
      - "Trauma"
      - "Progressive neurological deficit (cauda equina syndrome)"
      - "Bowel/bladder dysfunction"
    imagingIfRedFlags:
      - imaging: "MRI Lumbar Spine"
        rating: 9
        note: "If red flags present - evaluates for infection, malignancy, nerve compression"


  # CHEST IMAGING

  - recommendationId: "ACR-CHEST-001"
    number: "CHEST-1"
    section: "Chest Imaging"
    title: "Chest X-Ray for Suspected Community-Acquired Pneumonia"
    clinicalScenario: "Adult with fever, cough, dyspnea, suspected community-acquired pneumonia"
    recommendedImaging: "Chest X-ray (PA and Lateral)"
    appropriatenessRating: 8
    ratingCategory: "Usually Appropriate"
    rationale: |
      Chest X-ray confirms infiltrate (pneumonia diagnosis), identifies complications (pleural effusion,
      abscess), and excludes alternative diagnoses. Low radiation, widely available, cost-effective.
    alternativeImaging:
      - imaging: "CT Chest"
        rating: 6
        note: "More sensitive, but not routinely needed for uncomplicated CAP. Reserve for treatment failures or complications"
      - imaging: "Ultrasound Chest"
        rating: 5
        note: "Can detect consolidation and effusion, but operator-dependent and not standard of care"
    linkedDiagnosticTests:
      - "IMAGING-CXR-001"  # Chest X-ray PA and lateral
    linkedProtocolActions:
      - "CAP-DIAG-001"  # Chest X-ray for pneumonia diagnosis


  # ABDOMINAL IMAGING

  - recommendationId: "ACR-ABD-001"
    number: "ABD-1"
    section: "Abdominal Imaging"
    title: "CT Abdomen/Pelvis for Suspected Appendicitis"
    clinicalScenario: "Adult with right lower quadrant pain, suspected acute appendicitis"
    recommendedImaging: "CT Abdomen/Pelvis with IV Contrast"
    appropriatenessRating: 9
    ratingCategory: "Usually Appropriate"
    rationale: |
      CT has high sensitivity (95%) and specificity (94%) for appendicitis. Identifies complications
      (perforation, abscess) and alternative diagnoses. Guides surgical decision-making.
    alternativeImaging:
      - imaging: "Ultrasound Abdomen"
        rating: 7
        note: "First-line in children and pregnant women (no radiation), operator-dependent"
      - imaging: "MRI Abdomen"
        rating: 7
        note: "Alternative in pregnancy if ultrasound inconclusive"
    linkedDiagnosticTests:
      - "IMAGING-CT-ABD-PELVIS-001"  # CT abdomen/pelvis with contrast


  # CHOOSING WISELY RECOMMENDATIONS

  - recommendationId: "ACR-WISELY-001"
    number: "WISELY-1"
    section: "Choosing Wisely (Overuse Reduction)"
    title: "Avoid Routine Pre-operative Chest X-rays"
    clinicalScenario: "Asymptomatic patient undergoing elective surgery"
    recommendedImaging: "None - Avoid routine pre-operative CXR"
    appropriatenessRating: 1
    ratingCategory: "Usually Not Appropriate"
    rationale: |
      Routine pre-operative chest X-rays in asymptomatic patients do NOT improve outcomes and rarely
      change management. Order only if specific cardiopulmonary symptoms or high-risk surgery.
    exceptions:
      - "Age >70 undergoing thoracic/upper abdominal surgery"
      - "Known cardiopulmonary disease with new symptoms"
      - "Recent respiratory infection"


  - recommendationId: "ACR-WISELY-002"
    number: "WISELY-2"
    section: "Choosing Wisely"
    title: "Avoid Daily Routine Chest X-rays in Stable ICU Patients"
    clinicalScenario: "ICU patient, clinically stable, on mechanical ventilation"
    recommendedImaging: "None - On-demand CXR only"
    appropriatenessRating: 1
    ratingCategory: "Usually Not Appropriate"
    rationale: |
      Daily routine CXRs in stable ICU patients do NOT improve outcomes vs on-demand imaging. Increases
      radiation exposure, costs, and incidental findings without benefit.
    onDemandIndications:
      - "New respiratory symptoms (hypoxemia, increased secretions)"
      - "Post-procedure (central line, chest tube, intubation)"
      - "Clinical deterioration"


# ==================================================================
# RADIATION DOSE CONSIDERATIONS
# ==================================================================
radiationDoseGuidance:
  relativeDoseLevels:
    - imaging: "Chest X-ray"
      dose: "Low (0.1 mSv)"
      equivalent: "10 days of background radiation"

    - imaging: "CT Head"
      dose: "Low-Moderate (2 mSv)"
      equivalent: "8 months of background radiation"

    - imaging: "CT Chest"
      dose: "Moderate (7 mSv)"
      equivalent: "2 years of background radiation"

    - imaging: "CT Abdomen/Pelvis"
      dose: "Moderate-High (10 mSv)"
      equivalent: "3 years of background radiation"

    - imaging: "CT Coronary Angiography"
      dose: "High (12 mSv)"
      equivalent: "4 years of background radiation"

  pregnancyConsiderations:
    - "Avoid CT when possible (high radiation to fetus)"
    - "Ultrasound first-line when feasible"
    - "MRI without contrast safe in pregnancy (after first trimester)"
    - "Shield abdomen/pelvis during chest X-ray"


# ==================================================================
# INTEGRATION WITH PHASE 4 DIAGNOSTIC TEST LIBRARY
# ==================================================================
integrationWithDiagnosticTests: |
  ACR Appropriateness Criteria link to Phase 4 diagnostic test library:
  - Troponin measurement → ECG → Echocardiography (for STEMI/heart failure workup)
  - D-dimer → CT pulmonary angiography (for PE diagnosis)
  - Chest X-ray → CT chest (for pneumonia complications)
  - BNP/NT-proBNP → Echocardiography (for heart failure diagnosis)

  This creates complete diagnostic pathway:
  Clinical Presentation → Lab Tests (Phase 4) → Imaging Tests (ACR) → Clinical Protocols (Sepsis, STEMI, etc.)


# ==================================================================
# ALGORITHM SUMMARY
# ==================================================================
algorithmSummary: |
  Clinical Scenario → ACR Appropriateness Rating:

  Rating 7-9 (Usually Appropriate):
  └─ Order imaging study - benefits clearly outweigh risks

  Rating 4-6 (May Be Appropriate):
  └─ Individualize decision - consider clinical context, alternatives, patient preferences

  Rating 1-3 (Usually Not Appropriate):
  └─ Avoid imaging - risks/costs outweigh benefits, alternative approach preferred


# ==================================================================
# QUALITY INDICATORS
# ==================================================================
qualityIndicators:
  - indicatorId: "QI-ACR-001"
    measure: "Imaging studies performed with appropriate indication (rating ≥7)"
    target: "≥85% of all imaging orders"
    rationale: "Reduce inappropriate imaging utilization"

  - indicatorId: "QI-ACR-002"
    measure: "Avoid low back pain imaging in first 6 weeks (unless red flags)"
    target: "≥90% compliance"
    rationale: "Reduce overuse of lumbar spine imaging"

  - indicatorId: "QI-ACR-003"
    measure: "CT head performed within 20 minutes for acute stroke"
    target: "≥95% of stroke patients"
    rationale: "Time-critical imaging for thrombolysis decision"


