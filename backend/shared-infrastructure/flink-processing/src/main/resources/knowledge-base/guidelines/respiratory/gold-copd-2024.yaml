# ==================================================================
# ALGORITHM SUMMARY
# ==================================================================
algorithmSummary: |
  COPD Diagnosis: Spirometry FEV1/FVC <0.7 post-bronchodilator + clinical context
  ↓
  ABE Assessment:
  - Symptoms: mMRC or CAT score
  - Exacerbation risk: 0-1 moderate (no hosp) vs ≥2 moderate or ≥1 hosp

  Group A (low symptoms, low risk):
  └─ LAMA OR LABA monotherapy

  Group B (high symptoms, low risk):
  ├─ Start: LAMA OR LABA
  └─ If inadequate: Escalate to LAMA + LABA

  Group E (high exacerbation risk):
  ├─ If eosinophils ≥300: Triple therapy (ICS + LABA + LAMA)
  └─ If eosinophils <300: LAMA + LABA (consider ICS if ≥2 exacerbations)

  ALL Patients:
  - Smoking cessation (varenicline or bupropion + counseling)
  - Pulmonary rehabilitation if symptomatic
  - LTOT if PaO2 ≤55 mmHg (≥15 hrs/day)


