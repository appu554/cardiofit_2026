# ==================================================================
# GOLD COPD 2024 GUIDELINE
# ==================================================================
guidelineId: "GUIDE-GOLD-COPD-2024"
name: "Global Initiative for Chronic Obstructive Lung Disease (GOLD) 2024 Report"
shortName: "GOLD COPD 2024"
organization: "Global Initiative for Chronic Obstructive Lung Disease"
topic: "Chronic Obstructive Pulmonary Disease (COPD) Diagnosis and Management"


# ==================================================================
# VERSIONING
# ==================================================================
version: "2024.1"
publicationDate: "2024-01-01"
lastReviewDate: "2024-01-01"
nextReviewDate: "2025-01-01"
status: "CURRENT"


# ==================================================================
# PUBLICATION DETAILS
# ==================================================================
publication:
  publicationType: "International Consensus Report"
  year: 2024
  url: "https://goldcopd.org/2024-gold-report/"
  pdfUrl: "https://goldcopd.org/wp-content/uploads/2023/11/GOLD-2024-Report.pdf"


# ==================================================================
# SCOPE & APPLICABILITY
# ==================================================================
scope:
  clinicalDomain: "Pulmonary Medicine / Primary Care"
  targetPopulations:
    - "Adults (≥40 years) with COPD or at risk for COPD"
    - "Smokers and ex-smokers with respiratory symptoms"
  targetSettings:
    - "Primary Care"
    - "Outpatient Pulmonary Clinics"
    - "Emergency Department (exacerbations)"
    - "Hospital (acute exacerbations)"
  exclusions:
    - "Asthma-only patients (separate guidance)"
  geographicScope: "Global"


# ==================================================================
# METHODOLOGY
# ==================================================================
methodology:
  approachUsed: "Evidence-based consensus by international expert panel"
  evidenceSearchStrategy: "Continuous review of literature through 2023"
  evidenceSearchDate: "2023-11-01"
  panelSize: 45
  panelComposition:
    - "Pulmonologists from 25+ countries"
    - "Primary care physicians"
    - "Respiratory therapists"
  conflictOfInterestPolicy: "All conflicts disclosed"
  externalReview: true


# ==================================================================
# RECOMMENDATIONS
# ==================================================================
recommendations:
  # SECTION 1: DIAGNOSIS

  - recommendationId: "GOLD-COPD-2024-REC-001"
    number: "1.1"
    section: "Diagnosis"
    title: "Spirometry Required for COPD Diagnosis (FEV1/FVC <0.7 Post-Bronchodilator)"
    statement: "COPD diagnosis requires spirometry demonstrating post-bronchodilator FEV1/FVC ratio <0.7 in the appropriate clinical context"
    strength: "STRONG"
    classOfRecommendation: "Evidence A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: |
      Spirometry is gold standard for COPD diagnosis. Fixed ratio FEV1/FVC <0.7 after bronchodilator
      defines airflow limitation that is not fully reversible. Clinical symptoms alone insufficient for diagnosis.
    keyEvidence:
      - "35396567"  # GOLD 2022 report (updated annually)
      - "21071074"  # Spirometry in COPD diagnosis
    linkedProtocolActions:
      - "COPD-DIAG-001"  # Spirometry testing
    clinicalConsiderations: |
      Spirometry Technique:
      - Perform BEFORE and AFTER bronchodilator (400 mcg albuterol)
      - FEV1/FVC <0.7 post-bronchodilator confirms airflow limitation
      - FEV1% predicted determines severity (GOLD 1-4)
      - Clinical context required: age ≥40, smoking history, respiratory symptoms


  - recommendationId: "GOLD-COPD-2024-REC-002"
    number: "2.1"
    section: "Assessment"
    title: "ABE Assessment Tool for Symptom/Risk Stratification"
    statement: "Use the ABE assessment tool to evaluate symptoms (using mMRC or CAT) and exacerbation risk to guide treatment"
    strength: "STRONG"
    classOfRecommendation: "Evidence A"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    rationale: |
      GOLD ABE tool combines symptom burden and exacerbation risk to stratify patients into groups A, B, E.
      Replaces previous ABCD tool (2024 update simplified to ABE). Guides pharmacological therapy decisions.
    keyEvidence:
      - "35396567"  # GOLD 2024 (ABE tool introduced)
    linkedProtocolActions:
      - "COPD-ASSESS-001"  # ABE assessment
    clinicalConsiderations: |
      ABE Assessment Tool (2024):

      Symptom Burden (mMRC or CAT):
      - mMRC 0-1 OR CAT <10: Low symptoms
      - mMRC ≥2 OR CAT ≥10: High symptoms

      Exacerbation History (past 12 months):
      - 0-1 moderate exacerbation (no hospitalizations): Low risk
      - ≥2 moderate OR ≥1 hospitalization: High risk

      Groups:
      - Group A: Low symptoms, low risk
      - Group B: High symptoms, low risk
      - Group E: High risk (regardless of symptoms)


  - recommendationId: "GOLD-COPD-2024-REC-003"
    number: "3.1"
    section: "Pharmacotherapy"
    title: "LAMA or LABA for Initial Bronchodilator Therapy"
    statement: "For symptomatic COPD patients, initiate treatment with a long-acting muscarinic antagonist (LAMA) or long-acting beta-agonist (LABA)"
    strength: "STRONG"
    classOfRecommendation: "Evidence A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: |
      Long-acting bronchodilators (LAMA or LABA) are more effective than short-acting for symptom control
      and reducing exacerbations. LAMA may have slight advantage over LABA for exacerbation prevention.
    keyEvidence:
      - "35396567"  # GOLD 2024
      - "21803369"  # LAMA vs LABA meta-analysis
      - "22318601"  # Tiotropium efficacy (UPLIFT trial)
    linkedProtocolActions:
      - "COPD-MED-001"  # LAMA (tiotropium, glycopyrronium, umeclidinium)
      - "COPD-MED-002"  # LABA (formoterol, salmeterol, indacaterol)
    clinicalConsiderations: |
      Initial Bronchodilator Selection:
      - LAMA: Tiotropium 18 mcg daily, glycopyrronium 50 mcg daily, umeclidinium 62.5 mcg daily
      - LABA: Formoterol 12 mcg BID, salmeterol 50 mcg BID, indacaterol 150-300 mcg daily

      Group A (low symptoms, low risk): LAMA OR LABA (monotherapy)
      Group B (high symptoms, low risk): LAMA OR LABA (escalate to LAMA+LABA if inadequate response)
      Group E (high risk): LAMA + LABA + ICS (if eosinophils ≥300 or frequent exacerbations)


  - recommendationId: "GOLD-COPD-2024-REC-004"
    number: "3.2"
    section: "Pharmacotherapy"
    title: "Triple Therapy (ICS + LABA + LAMA) for Frequent Exacerbators with Eosinophilia"
    statement: "For COPD patients with frequent exacerbations (≥2 moderate or ≥1 hospitalization) and blood eosinophils ≥300 cells/μL, use triple therapy with ICS + LABA + LAMA"
    strength: "STRONG"
    classOfRecommendation: "Evidence A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: |
      Triple therapy reduces exacerbations in high-risk patients with eosinophilic inflammation. IMPACT
      trial showed 15% reduction in exacerbations vs dual bronchodilator. Eosinophils ≥300 predict ICS response.
    keyEvidence:
      - "35396567"  # GOLD 2024
      - "30152837"  # IMPACT trial - Triple therapy (N Engl J Med 2018)
      - "27130691"  # Eosinophils as biomarker for ICS response
    linkedProtocolActions:
      - "COPD-MED-003"  # Triple therapy (fluticasone/umeclidinium/vilanterol or equivalent)
    clinicalConsiderations: |
      Triple Therapy Indications:
      - Group E (high exacerbation risk)
      - Blood eosinophils ≥300 cells/μL (strong predictor of ICS benefit)
      - Consider if eosinophils 100-300 and ≥2 exacerbations/year

      Single-Inhaler Triple Therapy (SITT):
      - Fluticasone furoate/umeclidinium/vilanterol 100/62.5/25 mcg daily
      - Beclomethasone/glycopyrronium/formoterol 100/12.5/6 mcg BID
      - Budesonide/glycopyrronium/formoterol 160/9/5 mcg BID

      ICS Risks:
      - Pneumonia (monitor for symptoms)
      - Oral thrush (rinse mouth after use)
      - Consider withdrawal if no exacerbations × 12 months


  - recommendationId: "GOLD-COPD-2024-REC-005"
    number: "4.1"
    section: "Non-Pharmacological"
    title: "Pulmonary Rehabilitation for All Symptomatic COPD Patients"
    statement: "Pulmonary rehabilitation is recommended for all symptomatic COPD patients (mMRC ≥1 or CAT ≥10)"
    strength: "STRONG"
    classOfRecommendation: "Evidence A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: |
      Pulmonary rehabilitation (exercise training + education) improves dyspnea, exercise capacity, quality
      of life, and reduces hospitalizations. Most effective non-pharmacological intervention in COPD.
    keyEvidence:
      - "35396567"  # GOLD 2024
      - "23632329"  # Pulmonary rehab Cochrane review
      - "24813102"  # Puhan MA - Pulmonary rehab after exacerbation
    linkedProtocolActions:
      - "COPD-REHAB-001"  # Pulmonary rehabilitation referral
    clinicalConsiderations: |
      Pulmonary Rehabilitation Components:
      - Exercise training (aerobic + strength): 2-3 sessions/week × 6-8 weeks minimum
      - Education: Disease management, inhaler technique, nutrition
      - Psychosocial support
      - Optimal timing: Post-exacerbation within 4 weeks (reduces readmissions)

      Indications: ALL symptomatic COPD patients
      - mMRC ≥1 OR CAT ≥10
      - Especially beneficial post-hospitalization


  - recommendationId: "GOLD-COPD-2024-REC-006"
    number: "5.1"
    section: "Oxygen Therapy"
    title: "Long-Term Oxygen Therapy for Chronic Hypoxemia (PaO2 <55 mmHg)"
    statement: "Long-term oxygen therapy (≥15 hours/day) is indicated for COPD patients with chronic hypoxemia (PaO2 ≤55 mmHg or SpO2 ≤88%)"
    strength: "STRONG"
    classOfRecommendation: "Evidence A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: |
      LTOT improves survival in COPD with severe hypoxemia when used ≥15 hours/day. NOTT and MRC trials
      showed mortality reduction. Does NOT improve survival in moderate hypoxemia (PaO2 56-65 mmHg).
    keyEvidence:
      - "35396567"  # GOLD 2024
      - "7190540"   # NOTT trial (Ann Intern Med 1980) - LTOT survival benefit
      - "31682518"  # LOTT trial - No benefit in moderate hypoxemia (N Engl J Med 2016)
    linkedProtocolActions:
      - "COPD-O2-001"  # Long-term oxygen therapy
    clinicalConsiderations: |
      LTOT Indications:
      - PaO2 ≤55 mmHg OR SpO2 ≤88% at rest on room air (stable state)
      - OR PaO2 56-59 mmHg with evidence of cor pulmonale or polycythemia (Hct >55%)

      Oxygen Prescription:
      - Goal: PaO2 ≥60 mmHg OR SpO2 ≥90% at rest
      - Duration: ≥15 hours/day (more hours = better survival)
      - Flow rate: Titrate to maintain SpO2 88-92%
      - Reassess after 60-90 days (some patients improve and no longer need LTOT)


  - recommendationId: "GOLD-COPD-2024-REC-007"
    number: "6.1"
    section: "Prevention"
    title: "Smoking Cessation as Primary Intervention"
    statement: "Smoking cessation is the single most effective intervention to reduce COPD progression and improve outcomes"
    strength: "STRONG"
    classOfRecommendation: "Evidence A"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    rationale: |
      Smoking cessation slows FEV1 decline, reduces exacerbations, improves survival. Pharmacotherapy
      (varenicline, bupropion, NRT) combined with counseling doubles quit rates vs no treatment.
    keyEvidence:
      - "35396567"  # GOLD 2024
      - "19783535"  # Anthonisen NR - Lung Health Study smoking cessation
      - "24778409"  # Cahill K - Pharmacotherapy for smoking cessation (Cochrane)
    linkedProtocolActions:
      - "COPD-PREVENT-001"  # Smoking cessation intervention
    clinicalConsiderations: |
      Smoking Cessation Pharmacotherapy:
      - Varenicline 0.5-1 mg BID × 12 weeks (most effective)
      - Bupropion SR 150 mg BID × 7-12 weeks
      - Nicotine replacement therapy (patch, gum, lozenge)
      - Combination therapy (varenicline + NRT) for heavy smokers

      Counseling: Brief (5-minute) counseling + pharmacotherapy most effective


