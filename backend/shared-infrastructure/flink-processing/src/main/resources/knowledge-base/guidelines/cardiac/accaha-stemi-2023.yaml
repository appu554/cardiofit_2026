# ==================================================================
# ACC/AHA/SCAI STEMI 2023 GUIDELINE
# ==================================================================
guidelineId: "GUIDE-ACCAHA-STEMI-2023"
name: "2023 ACC/AHA/SCAI Guideline for the Management of Patients With Acute Myocardial Infarction"
shortName: "ACC/AHA STEMI 2023"
organization: "American College of Cardiology / American Heart Association / Society for Cardiovascular Angiography and Interventions"
topic: "ST-Elevation Myocardial Infarction (STEMI) Management"


# ==================================================================
# VERSIONING
# ==================================================================
version: "2023.1"
publicationDate: "2023-04-20"
lastReviewDate: "2023-04-20"
nextReviewDate: "2028-04-20"
status: "CURRENT"


# ==================================================================
# PUBLICATION DETAILS
# ==================================================================
publication:
  journal: "Journal of the American College of Cardiology"
  year: 2023
  volume: 81
  issue: 14
  pages: "1372-1424"
  doi: "10.1016/j.jacc.2023.04.001"
  pmid: "37079885"
  url: "https://www.jacc.org/doi/10.1016/j.jacc.2023.04.001"
  pdfUrl: "https://www.jacc.org/doi/pdf/10.1016/j.jacc.2023.04.001"


# ==================================================================
# SCOPE & APPLICABILITY
# ==================================================================
scope:
  clinicalDomain: "Cardiology / Emergency Medicine / Critical Care"
  targetPopulations:
    - "Adults (≥18 years) with ST-elevation myocardial infarction"
    - "Adults with new or presumably new left bundle branch block (LBBB) and ischemic symptoms"
    - "Adults with suspected posterior myocardial infarction"
  targetSettings:
    - "Emergency Department"
    - "Cardiac Catheterization Laboratory"
    - "ICU / CCU"
    - "Pre-hospital (EMS)"
  exclusions:
    - "Non-ST-elevation ACS (separate guideline)"
    - "Pediatric patients (<18 years)"
  geographicScope: "United States"


# ==================================================================
# METHODOLOGY
# ==================================================================
methodology:
  approachUsed: "ACC/AHA Guideline Methodology (Modified GRADE)"
  evidenceSearchStrategy: "Systematic review of literature through December 2022"
  evidenceSearchDate: "2022-12-31"
  panelSize: 21
  panelComposition:
    - "17 cardiologists (interventional and non-interventional)"
    - "2 emergency physicians"
    - "1 cardiac surgeon"
    - "1 methodologist"
  conflictOfInterestPolicy: "All panel members disclosed conflicts; recusal from relevant recommendations if significant conflict"
  externalReview: true
  numberOfReviewers: 42


# ==================================================================
# RECOMMENDATIONS
# ==================================================================
recommendations:
  # SECTION 1: EARLY DIAGNOSIS AND RISK STRATIFICATION

  - recommendationId: "ACC-STEMI-2023-REC-001"
    number: "1.1"
    section: "Initial Evaluation and Risk Stratification"
    title: "12-Lead ECG Within 10 Minutes of First Medical Contact"
    statement: "A 12-lead ECG should be performed and evaluated for STEMI within 10 minutes of first medical contact (FMC) in patients with symptoms suggestive of STEMI"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "B-NR"
    rationale: |
      Early ECG identification is critical for timely reperfusion therapy. Every 10-minute delay in
      door-to-balloon time increases mortality by 0.4%. ECG within 10 minutes enables rapid cath lab
      activation and reperfusion decision-making.
    keyEvidence:
      - "37079885"  # ACC/AHA STEMI 2023 guideline
      - "12517460"  # Keeley EC - Primary PCI meta-analysis
      - "27282490"  # Rathore SS - Door-to-balloon time and mortality
    linkedProtocolActions:
      - "STEMI-ACT-001"  # 12-lead ECG STAT
    clinicalConsiderations: |
      - Consider posterior leads (V7-V9) if inferior STEMI present
      - Consider right-sided leads (V3R-V4R) if inferior STEMI to assess RV infarction
      - Serial ECGs if initial ECG non-diagnostic but suspicion remains high


  - recommendationId: "ACC-STEMI-2023-REC-002"
    number: "2.1"
    section: "Reperfusion Therapy"
    title: "Primary PCI Within 90 Minutes for PCI-Capable Hospitals"
    statement: "For patients with STEMI presenting to a PCI-capable hospital, primary PCI should be performed with a first medical contact-to-device time of 90 minutes or less"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: |
      Primary PCI is superior to fibrinolysis for STEMI when performed in a timely manner. Door-to-balloon
      time <90 minutes is associated with significantly lower mortality compared to longer delays. This is
      one of the most time-sensitive interventions in medicine.
    keyEvidence:
      - "37079885"  # ACC/AHA STEMI 2023
      - "12517460"  # Keeley EC - Primary PCI vs fibrinolysis (Lancet 2003)
      - "26260736"  # Terkelsen CJ - Mortality reduction with primary PCI
      - "18160631"  # De Luca G - Impact of time to treatment on mortality
    linkedProtocolActions:
      - "STEMI-ACT-008"  # Activate cath lab
      - "STEMI-ACT-009"  # Transfer to PCI-capable hospital (if needed)
    clinicalConsiderations: |
      - If first medical contact-to-device time will exceed 120 minutes, consider fibrinolysis
      - Cardiogenic shock is indication for immediate PCI regardless of symptom duration
      - For patients presenting >12 hours after symptom onset, PCI benefit decreases


  - recommendationId: "ACC-STEMI-2023-REC-003"
    number: "3.1"
    section: "Antiplatelet Therapy"
    title: "Aspirin 162-325 mg Loading Dose"
    statement: "Aspirin 162 to 325 mg should be given as soon as possible to all patients with STEMI who do not have a true aspirin allergy"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: |
      Aspirin reduces mortality in STEMI by approximately 23% (ISIS-2 trial). Should be given immediately
      upon STEMI recognition. Non-enteric coated formulation chewed for rapid absorption.
    keyEvidence:
      - "37079885"  # ACC/AHA STEMI 2023
      - "3081859"   # ISIS-2 trial (Lancet 1988) - Aspirin mortality benefit
      - "18160631"  # De Luca G - Aspirin in primary PCI
    linkedProtocolActions:
      - "STEMI-ACT-002"  # Aspirin 324 mg PO chewable
    clinicalConsiderations: |
      - Chewable aspirin preferred for faster absorption
      - Continue 81 mg daily indefinitely after loading dose
      - True aspirin allergy rare (not aspirin sensitivity/GI upset)


  - recommendationId: "ACC-STEMI-2023-REC-004"
    number: "3.2"
    section: "Antiplatelet Therapy"
    title: "P2Y12 Inhibitor Loading Dose for Primary PCI"
    statement: "A P2Y12 inhibitor should be given as early as possible or at time of primary PCI to patients with STEMI"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: |
      Dual antiplatelet therapy (DAPT) with aspirin + P2Y12 inhibitor reduces stent thrombosis and
      cardiovascular events. Ticagrelor and prasugrel are more potent than clopidogrel and preferred
      for STEMI undergoing PCI.
    keyEvidence:
      - "37079885"  # ACC/AHA STEMI 2023
      - "19717846"  # PLATO trial - Ticagrelor vs clopidogrel (N Engl J Med 2009)
      - "23031330"  # TRITON-TIMI 38 - Prasugrel vs clopidogrel (N Engl J Med 2007)
      - "17982182"  # Wiviott SD - Prasugrel STEMI subgroup
    linkedProtocolActions:
      - "STEMI-ACT-003"  # P2Y12 inhibitor (ticagrelor or prasugrel)
    clinicalConsiderations: |
      - Ticagrelor 180 mg loading dose, then 90 mg BID (preferred)
      - Prasugrel 60 mg loading dose, then 10 mg daily (avoid if age >75, weight <60 kg, prior stroke/TIA)
      - Clopidogrel 600 mg loading dose, then 75 mg daily (if ticagrelor/prasugrel contraindicated)
      - Continue DAPT for at least 12 months post-STEMI


  - recommendationId: "ACC-STEMI-2023-REC-005"
    number: "3.3"
    section: "Anticoagulation"
    title: "Anticoagulation During Primary PCI"
    statement: "Anticoagulation with unfractionated heparin, bivalirudin, or enoxaparin is recommended for all patients with STEMI undergoing primary PCI"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "B-R"
    rationale: |
      Anticoagulation prevents thrombus propagation during PCI and reduces ischemic complications.
      Unfractionated heparin most commonly used due to rapid onset/offset and ability to monitor ACT.
      Bivalirudin may reduce bleeding but with possible increase in stent thrombosis.
    keyEvidence:
      - "37079885"  # ACC/AHA STEMI 2023
      - "18645041"  # HORIZONS-AMI - Bivalirudin vs heparin+GPI
      - "24315361"  # HEAT-PPCI - Heparin vs bivalirudin
      - "23131066"  # ATOLL - Enoxaparin vs UFH in STEMI
    linkedProtocolActions:
      - "STEMI-ACT-004"  # Anticoagulation (heparin or bivalirudin)
    clinicalConsiderations: |
      - Unfractionated heparin: 70-100 units/kg IV bolus (max 10,000 units), target ACT 250-300 seconds
      - Bivalirudin: 0.75 mg/kg bolus, then 1.75 mg/kg/hr infusion during PCI
      - Enoxaparin: 0.5 mg/kg IV bolus (if used in place of UFH)
      - GPI (glycoprotein IIb/IIIa inhibitor) use now less common due to bleeding risk


  - recommendationId: "ACC-STEMI-2023-REC-006"
    number: "2.2"
    section: "Fibrinolytic Therapy"
    title: "Fibrinolysis if PCI Unavailable Within 120 Minutes"
    statement: "Fibrinolytic therapy should be given to patients with STEMI at non-PCI-capable hospitals when the anticipated first medical contact-to-device time at a PCI-capable hospital exceeds 120 minutes"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: |
      When timely PCI is not available, fibrinolytic therapy restores coronary blood flow and reduces
      mortality in STEMI. Benefit greatest when given within 2-3 hours of symptom onset. Risk of intracranial
      hemorrhage ~0.9-1% with alteplase.
    keyEvidence:
      - "37079885"  # ACC/AHA STEMI 2023
      - "8437037"   # FTT meta-analysis - Fibrinolysis mortality benefit (Lancet 1994)
      - "9039269"   # GUSTO-I - Alteplase vs streptokinase (N Engl J Med 1993)
      - "22357974"  # Boersma E - Fibrinolysis time-to-treatment analysis
    linkedProtocolActions:
      - "STEMI-ACT-010"  # Fibrinolytic therapy decision
      - "STEMI-ACT-011"  # Administer fibrinolytic (alteplase, tenecteplase, reteplase)
    clinicalConsiderations: |
      - Absolute contraindications: Prior ICH, known structural vascular lesion, ischemic stroke <3 months, active bleeding, significant closed head trauma <3 months
      - Tenecteplase preferred (single bolus) over alteplase (infusion)
      - Transfer for angiography after fibrinolysis (pharmacoinvasive strategy)
      - If fibrinolysis fails (persistent chest pain, <50% ST resolution at 60-90 min), perform rescue PCI


  - recommendationId: "ACC-STEMI-2023-REC-007"
    number: "1.2"
    section: "Biomarkers"
    title: "Cardiac Troponin Measurement at Presentation"
    statement: "Cardiac troponin should be measured at presentation in all patients with symptoms suggestive of STEMI"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "MODERATE"
    gradeLevel: "Moderate"
    levelOfEvidence: "B-NR"
    rationale: |
      Troponin confirms myocardial necrosis and aids diagnosis when ECG is non-diagnostic. High-sensitivity
      troponin assays detect MI earlier and more accurately than conventional assays. However, ECG should
      not wait for troponin results - reperfusion decision based on ECG.
    keyEvidence:
      - "37079885"  # ACC/AHA STEMI 2023
      - "22357974"  # Thygesen K - Universal MI definition
      - "26432801"  # Roffi M - High-sensitivity troponin in ACS
    linkedProtocolActions:
      - "STEMI-ACT-005"  # Troponin I or T measurement
    clinicalConsiderations: |
      - Do NOT delay reperfusion therapy waiting for troponin results
      - Troponin may be normal if drawn very early (<3 hours from symptom onset)
      - Repeat troponin at 3-6 hours if initial negative and ongoing suspicion
      - High-sensitivity troponin allows earlier rule-out protocols


  - recommendationId: "ACC-STEMI-2023-REC-008"
    number: "4.1"
    section: "Discharge Medications"
    title: "High-Intensity Statin Therapy at Discharge"
    statement: "High-intensity statin therapy should be initiated or continued in all patients with STEMI unless contraindicated"
    strength: "STRONG"
    classOfRecommendation: "Class I"
    evidenceQuality: "HIGH"
    gradeLevel: "High"
    levelOfEvidence: "A"
    rationale: |
      High-intensity statins reduce LDL cholesterol, stabilize plaque, and reduce recurrent cardiovascular
      events post-MI. PROVE-IT TIMI 22 showed 16% reduction in death/MI with atorvastatin 80 mg vs pravastatin
      40 mg. Early initiation (in-hospital) improves long-term adherence.
    keyEvidence:
      - "37079885"  # ACC/AHA STEMI 2023
      - "15520660"  # PROVE-IT TIMI 22 - Atorvastatin 80 mg benefit (N Engl J Med 2004)
      - "25771785"  # Stone NJ - ACC/AHA Cholesterol guideline 2013
      - "16401995"  # Schwartz GG - MIRACL trial - Early statin in ACS
    linkedProtocolActions:
      - "STEMI-ACT-012"  # Discharge medications
    clinicalConsiderations: |
      - High-intensity statins: Atorvastatin 80 mg daily OR rosuvastatin 20-40 mg daily
      - Goal LDL <70 mg/dL (preferably <55 mg/dL per ESC 2019)
      - Start in-hospital before discharge to improve adherence
      - Continue indefinitely unless intolerable side effects


