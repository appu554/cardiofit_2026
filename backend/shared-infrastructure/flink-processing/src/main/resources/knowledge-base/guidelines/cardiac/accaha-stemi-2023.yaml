# ==================================================================
# QUALITY INDICATORS
# ==================================================================
qualityIndicators:
  - indicatorId: "QI-STEMI-001"
    measure: "Door-to-balloon time ≤90 minutes"
    target: "≥90% of patients"
    rationale: "Time-to-reperfusion directly correlates with mortality"

  - indicatorId: "QI-STEMI-002"
    measure: "Aspirin given within 24 hours of arrival"
    target: "≥99% of patients (unless contraindicated)"
    rationale: "Aspirin reduces mortality by 23%"

  - indicatorId: "QI-STEMI-003"
    measure: "DAPT (aspirin + P2Y12 inhibitor) at discharge"
    target: "≥98% of patients"
    rationale: "Prevents stent thrombosis and recurrent MI"

  - indicatorId: "QI-STEMI-004"
    measure: "High-intensity statin at discharge"
    target: "≥95% of patients"
    rationale: "Reduces recurrent cardiovascular events"


# ==================================================================
# ALGORITHM SUMMARY
# ==================================================================
algorithmSummary: |
  STEMI Recognition (ECG ≤10 min) → Aspirin 162-325 mg + P2Y12 inhibitor
  ├─ PCI-capable hospital: Cath lab activation → Door-to-balloon ≤90 min
  │   └─ Anticoagulation (UFH/bivalirudin) + Primary PCI
  │
  └─ Non-PCI-capable hospital: Expected FMC-to-device time?
      ├─ ≤120 min → Transfer for primary PCI
      └─ >120 min → Fibrinolytic therapy → Transfer for angiography (3-24 hours)

  Post-Reperfusion: High-intensity statin, beta-blocker, ACE-I/ARB, DAPT × 12 months


# ==================================================================
# UPDATES FROM 2013 GUIDELINE
# ==================================================================
majorUpdates:
  - "PCI time threshold extended from first medical contact-to-device ≤90 min (2013) - remains same in 2023"
  - "Fibrinolysis threshold changed from >90 minutes (2013) to >120 minutes (2023) based on STREAM, CAPTIM trials"
  - "Ticagrelor and prasugrel now preferred over clopidogrel (stronger evidence from PLATO, TRITON-TIMI 38)"
  - "De-emphasis of early beta-blocker (within 24 hours) due to COMMIT trial - now recommend in stable patients"
  - "High-intensity statin recommendation strengthened from Class IIa to Class I"
  - "Radial access preferred over femoral for PCI (reduced bleeding, MATRIX trial)"


