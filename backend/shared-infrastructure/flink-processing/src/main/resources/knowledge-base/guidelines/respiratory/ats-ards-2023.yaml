name: "American Thoracic Society Clinical Practice Guideline: Mechanical Ventilation in Adult Patients with Acute Respiratory Distress Syndrome"
shortName: "ATS ARDS 2023"
organization: "American Thoracic Society"
topic: "Acute Respiratory Distress Syndrome (ARDS) and Mechanical Ventilation"


