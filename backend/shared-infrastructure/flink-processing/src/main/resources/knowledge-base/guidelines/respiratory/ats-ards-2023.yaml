# ==================================================================
# ALGORITHM SUMMARY
# ==================================================================
algorithmSummary: |
  ARDS Diagnosis (Berlin Criteria: acute onset, bilateral infiltrates, PaO2/FiO2 <300, not cardiogenic)
  ↓
  LUNG-PROTECTIVE VENTILATION (ALL ARDS):
  - Tidal volume: 6 mL/kg PBW
  - Plateau pressure: <30 cmH2O
  - PEEP: Use PEEP/FiO2 table (higher PEEP strategy)
  ↓
  Moderate ARDS (P/F 100-200):
  - Conservative fluid strategy (if not in shock)
  - Consider prone positioning if P/F <150
  ↓
  Severe ARDS (P/F <100):
  - PRONE POSITIONING (12-16 hrs/day)
  - Consider neuromuscular blockade × 48 hours
  - If refractory (P/F <80 × 6 hours) → VV-ECMO
  ↓
  Weaning (when improving):
  - Daily SBT screen
  - Extubate if SBT successful


