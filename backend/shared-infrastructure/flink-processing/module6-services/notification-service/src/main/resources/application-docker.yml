spring:
  # Kafka Configuration for Docker
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      properties:
        # Docker-specific Kafka settings
        request.timeout.ms: 60000
        connections.max.idle.ms: 540000

  # Redis Configuration for Docker
  data:
    redis:
      host: redis
      port: 6379

# Firebase Configuration for Docker
firebase:
  credentials-path: /app/firebase-credentials.json
  enabled: ${FIREBASE_ENABLED:true}

# Server Configuration
server:
  port: 8070

# Logging Configuration for Docker
logging:
  level:
    root: INFO
    com.cardiofit: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Management Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
