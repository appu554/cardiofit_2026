server:
  port: 8050

spring:
  application:
    name: export-reporting-service

  datasource:
    url: jdbc:postgresql://localhost:5433/cardiofit_analytics
    username: cardiofit
    password: cardiofit_analytics_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY:your-sendgrid-api-key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# Reporting Configuration
reporting:
  enabled: true
  email:
    from: reports@cardiofit.com
    daily-recipients: quality-team@cardiofit.com
    weekly-recipients: executives@cardiofit.com
    monthly-recipients: compliance@cardiofit.com,leadership@cardiofit.com

# Logging
logging:
  level:
    com.cardiofit: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
