server:
  port: 8050

spring:
  datasource:
    url: jdbc:postgresql://postgres-analytics:5433/cardiofit_analytics
    username: cardiofit
    password: cardiofit_analytics_pass

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY}

reporting:
  enabled: ${REPORTING_ENABLED:true}
  email:
    from: ${REPORT_FROM_EMAIL:reports@cardiofit.com}
    daily-recipients: ${DAILY_RECIPIENTS:quality-team@cardiofit.com}
    weekly-recipients: ${WEEKLY_RECIPIENTS:executives@cardiofit.com}
    monthly-recipients: ${MONTHLY_RECIPIENTS:compliance@cardiofit.com}

logging:
  level:
    com.cardiofit: DEBUG
