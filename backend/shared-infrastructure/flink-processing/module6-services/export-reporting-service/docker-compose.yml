version: '3.8'

services:
  export-reporting-service:
    build: .
    container_name: export-reporting-service
    ports:
      - "8050:8050"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-your-sendgrid-api-key}
      - REPORTING_ENABLED=true
      - DAILY_RECIPIENTS=quality-team@cardiofit.com
      - WEEKLY_RECIPIENTS=executives@cardiofit.com
      - MONTHLY_RECIPIENTS=compliance@cardiofit.com,leadership@cardiofit.com
    networks:
      - cardiofit-network
    depends_on:
      - postgres-analytics
    restart: unless-stopped

  # PostgreSQL Analytics Database (if not already running)
  postgres-analytics:
    image: postgres:15-alpine
    container_name: postgres-analytics
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=cardiofit_analytics
      - POSTGRES_USER=cardiofit
      - POSTGRES_PASSWORD=cardiofit_analytics_pass
    volumes:
      - postgres-analytics-data:/var/lib/postgresql/data
    networks:
      - cardiofit-network
    restart: unless-stopped

volumes:
  postgres-analytics-data:

networks:
  cardiofit-network:
    driver: bridge
