version: '3.8'

services:
  dashboard-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cardiofit-dashboard-ui
    ports:
      - "3000:80"
    environment:
      - VITE_GRAPHQL_URL=${VITE_GRAPHQL_URL:-http://localhost:4000/graphql}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:4000/graphql}
      - VITE_ENABLE_WEBSOCKET=${VITE_ENABLE_WEBSOCKET:-true}
      - VITE_HOSPITAL_NAME=${VITE_HOSPITAL_NAME:-CardioFit Medical Center}
    networks:
      - cardiofit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cardiofit-network:
    external: true
    name: cardiofit-network
