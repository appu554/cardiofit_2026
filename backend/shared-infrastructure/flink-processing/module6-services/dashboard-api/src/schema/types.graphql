scalar DateTime
scalar JSON

# Root Query
type Query {
  # Hospital-wide KPIs
  hospitalKpis(hospitalId: String!, timeRange: TimeRange): HospitalKPIs
  hospitalKpisTrend(hospitalId: String!, startTime: DateTime!, endTime: DateTime!): [HospitalKPIs!]!

  # Department Metrics
  departmentMetrics(hospitalId: String!, departmentId: String, timeRange: TimeRange): [DepartmentMetrics!]!
  departmentMetricsTrend(departmentId: String!, startTime: DateTime!, endTime: DateTime!): [DepartmentMetrics!]!

  # Patient Risk Profiles
  patientRiskProfile(patientId: String!): PatientRiskProfile
  highRiskPatients(hospitalId: String!, riskLevel: RiskLevel, limit: Int): [PatientRiskProfile!]!
  patientRiskHistory(patientId: String!, startTime: DateTime!, endTime: DateTime!): [PatientRiskProfile!]!

  # Sepsis Surveillance
  sepsisSurveillance(hospitalId: String!, alertLevel: AlertLevel): [SepsisSurveillance!]!
  sepsisAlerts(hospitalId: String!, startTime: DateTime!, limit: Int): [SepsisSurveillance!]!
  sepsisPatientDetails(patientId: String!): SepsisSurveillance

  # Quality Metrics
  qualityMetrics(hospitalId: String!, metricType: QualityMetricType, timeRange: TimeRange): [QualityMetrics!]!
  qualityMetricsTrend(hospitalId: String!, metricType: QualityMetricType!, startTime: DateTime!, endTime: DateTime!): [QualityMetrics!]!
  complianceScore(hospitalId: String!, timeRange: TimeRange): ComplianceScore!

  # Quality Metrics Dashboard Queries
  bundleCompliance(departmentId: String, period: String!): [BundleComplianceMetric!]!
  outcomeMetrics(departmentId: String): [OutcomeMetric!]!
  departmentQualityComparison: [DepartmentQuality!]!

  # Dashboard Summary
  dashboardSummary(hospitalId: String!): DashboardSummary!

  # Real-time Stats
  realtimeStats(hospitalId: String!): RealtimeStats!
}

# Subscription for real-time updates
type Subscription {
  hospitalKpisUpdated(hospitalId: String!): HospitalKPIs!
  newSepsisAlert(hospitalId: String!): SepsisSurveillance!
  patientRiskChanged(patientId: String!): PatientRiskProfile!
  qualityMetricsUpdated(hospitalId: String!): QualityMetrics!
}

# Hospital KPIs Type
type HospitalKPIs {
  hospitalId: String!
  timestamp: DateTime!
  windowStart: DateTime!
  windowEnd: DateTime!

  # Capacity Metrics
  totalBeds: Int!
  occupiedBeds: Int!
  availableBeds: Int!
  occupancyRate: Float!
  icuOccupancyRate: Float!

  # Patient Metrics
  totalAdmissions: Int!
  totalDischarges: Int!
  averageLengthOfStay: Float!
  readmissionRate: Float!

  # Clinical Metrics
  mortalityRate: Float!
  adverseEventRate: Float!
  infectionRate: Float!

  # Operational Metrics
  averageWaitTime: Float!
  bedTurnoverRate: Float!
  staffUtilizationRate: Float!

  # Financial Indicators
  revenuePerBed: Float
  costPerPatientDay: Float

  # Quality Scores
  patientSatisfactionScore: Float
  clinicalQualityScore: Float

  metadata: JSON
}

# Department Metrics Type
type DepartmentMetrics {
  departmentId: String!
  departmentName: String!
  hospitalId: String!
  timestamp: DateTime!

  # Department Capacity
  totalBeds: Int!
  occupiedBeds: Int!
  occupancyRate: Float!

  # Patient Flow
  currentPatients: Int!
  admissionsToday: Int!
  dischargesToday: Int!
  averageLengthOfStay: Float!

  # Staffing
  activeStaff: Int!
  requiredStaff: Int!
  staffingLevel: Float!

  # Clinical Performance
  adverseEvents: Int!
  medicationErrors: Int!
  fallIncidents: Int!
  pressureUlcers: Int!

  # Alerts
  criticalAlerts: Int!
  warningAlerts: Int!

  # Resource Utilization
  equipmentUtilization: Float
  supplyInventoryLevel: Float

  metadata: JSON
}

# Patient Risk Profile Type
type PatientRiskProfile {
  patientId: String!
  hospitalId: String!
  departmentId: String
  timestamp: DateTime!

  # Demographics
  age: Int
  gender: String

  # Risk Assessment
  overallRiskScore: Float!
  riskLevel: RiskLevel!
  riskCategory: String!

  # Specific Risk Scores
  mortalityRisk: Float
  readmissionRisk: Float
  deteriorationRisk: Float
  sepsisRisk: Float
  fallRisk: Float
  bleedingRisk: Float

  # Clinical Indicators
  vitalSigns: VitalSigns
  labResults: LabResults
  comorbidities: [String!]
  activeConditions: [String!]

  # Alerts
  activeAlerts: [Alert!]
  alertCount: Int!
  criticalAlertCount: Int!

  # Interventions
  recommendedInterventions: [String!]
  activeInterventions: [String!]

  # Predictions
  predictedLengthOfStay: Float
  predictedOutcome: String

  lastUpdated: DateTime!
  metadata: JSON
}

# Sepsis Surveillance Type
type SepsisSurveillance {
  alertId: String!
  patientId: String!
  hospitalId: String!
  departmentId: String
  timestamp: DateTime!

  # Alert Details
  alertLevel: AlertLevel!
  alertStatus: AlertStatus!
  sepsisStage: SepsisStage!

  # SOFA Score Components
  sofaScore: Int!
  sofaComponents: SofaComponents!

  # SIRS Criteria
  sirsScore: Int!
  sirsCriteria: SirsCriteria!

  # Quick SOFA
  qSofaScore: Int!
  qSofaCriteria: QSofaCriteria!

  # Clinical Indicators
  vitalSigns: VitalSigns!
  labResults: LabResults!

  # Infection Indicators
  suspectedInfection: Boolean!
  infectionSite: String
  cultureResults: String
  antibioticStartTime: DateTime

  # Time Metrics
  symptomOnsetTime: DateTime
  alertGeneratedTime: DateTime!
  clinicianNotifiedTime: DateTime
  interventionStartTime: DateTime
  timeToIntervention: Float

  # Interventions
  bundleCompliance: BundleCompliance!
  activeInterventions: [String!]!

  # Outcomes
  resolved: Boolean!
  resolutionTime: DateTime
  outcome: String

  # Risk Factors
  riskFactors: [String!]!
  comorbidities: [String!]!

  metadata: JSON
}

# Quality Metrics Type
type QualityMetrics {
  metricId: String!
  hospitalId: String!
  departmentId: String
  timestamp: DateTime!
  windowStart: DateTime!
  windowEnd: DateTime!

  # Metric Details
  metricType: QualityMetricType!
  metricName: String!
  metricValue: Float!
  targetValue: Float

  # Performance
  performanceStatus: PerformanceStatus!
  trendDirection: TrendDirection!
  percentChange: Float

  # Compliance
  complianceRate: Float
  numerator: Int
  denominator: Int

  # Benchmarks
  nationalBenchmark: Float
  regionalBenchmark: Float
  performancePercentile: Float

  # Contributing Factors
  topContributors: [String!]
  improvementOpportunities: [String!]

  # Breakdown
  byDepartment: JSON
  byProvider: JSON
  byPatientCategory: JSON

  metadata: JSON
}

# Supporting Types

type VitalSigns {
  heartRate: Float
  bloodPressureSystolic: Float
  bloodPressureDiastolic: Float
  respiratoryRate: Float
  temperature: Float
  oxygenSaturation: Float
  consciousnessLevel: String
  timestamp: DateTime!
}

type LabResults {
  whiteBloodCellCount: Float
  lactate: Float
  creatinine: Float
  bilirubin: Float
  plateletCount: Float
  pao2: Float
  timestamp: DateTime!
}

type Alert {
  alertId: String!
  alertType: String!
  severity: String!
  message: String!
  timestamp: DateTime!
  acknowledged: Boolean!
}

type SofaComponents {
  respiration: Int!
  coagulation: Int!
  liver: Int!
  cardiovascular: Int!
  centralNervousSystem: Int!
  renal: Int!
}

type SirsCriteria {
  temperature: Boolean!
  heartRate: Boolean!
  respiratoryRate: Boolean!
  whiteBloodCells: Boolean!
}

type QSofaCriteria {
  alteredMentalStatus: Boolean!
  systolicBpLow: Boolean!
  respiratoryRateHigh: Boolean!
}

type BundleCompliance {
  lactateDrawn: Boolean!
  bloodCultureObtained: Boolean!
  antibioticsAdministered: Boolean!
  fluidResuscitationStarted: Boolean!
  vasopressorsInitiated: Boolean
  overallCompliance: Float!
  complianceTime: Float
}

type ComplianceScore {
  hospitalId: String!
  timestamp: DateTime!
  overallScore: Float!
  categoryScores: JSON!
  trendDirection: TrendDirection!
}

type DashboardSummary {
  hospitalId: String!
  timestamp: DateTime!
  hospitalKpis: HospitalKPIs!
  topDepartments: [DepartmentMetrics!]!
  highRiskPatients: [PatientRiskProfile!]!
  activeSepsisAlerts: [SepsisSurveillance!]!
  qualitySummary: JSON!
  realtimeStats: RealtimeStats!
}

type RealtimeStats {
  hospitalId: String!
  timestamp: DateTime!
  activePatients: Int!
  criticalPatients: Int!
  activeSepsisAlerts: Int!
  pendingDischarges: Int!
  availableBeds: Int!
  staffOnDuty: Int!
  lastUpdated: DateTime!
}

# Enums

enum TimeRange {
  LAST_HOUR
  LAST_6_HOURS
  LAST_24_HOURS
  LAST_7_DAYS
  LAST_30_DAYS
  CUSTOM
}

enum RiskLevel {
  LOW
  MODERATE
  HIGH
  CRITICAL
}

enum AlertLevel {
  INFO
  WARNING
  CRITICAL
  EMERGENCY
}

enum AlertStatus {
  ACTIVE
  ACKNOWLEDGED
  RESOLVED
  ESCALATED
}

enum SepsisStage {
  NO_SEPSIS
  SIRS
  SEPSIS
  SEVERE_SEPSIS
  SEPTIC_SHOCK
}

enum QualityMetricType {
  MORTALITY_RATE
  READMISSION_RATE
  INFECTION_RATE
  MEDICATION_ERROR_RATE
  FALL_RATE
  PRESSURE_ULCER_RATE
  PATIENT_SATISFACTION
  DOOR_TO_ANTIBIOTIC_TIME
  SEPSIS_BUNDLE_COMPLIANCE
  HAND_HYGIENE_COMPLIANCE
}

enum PerformanceStatus {
  EXCELLENT
  GOOD
  NEEDS_IMPROVEMENT
  CRITICAL
}

enum TrendDirection {
  IMPROVING
  STABLE
  DECLINING
}

# Input Types

input TimeRangeInput {
  startTime: DateTime!
  endTime: DateTime!
}

# Quality Metrics Dashboard Types

type BundleComplianceMetric {
  bundleType: String!
  totalCases: Int!
  compliantCases: Int!
  complianceRate: Float!
  avgTimeToCompletion: Float!
  nationalBenchmark: Float!
}

type OutcomeMetric {
  metricType: String!
  currentValue: Float!
  previousPeriodValue: Float!
  nationalBenchmark: Float!
  trend: String!
}

type DepartmentQuality {
  departmentId: String!
  departmentName: String!
  bundleCompliance: Float!
  mortalityRate: Float!
  readmissionRate: Float!
  hcahpsScore: Float!
}
