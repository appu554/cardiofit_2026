# Example GraphQL Queries for Dashboard API
# Copy and paste these into GraphQL Playground at http://localhost:4000/graphql

# =============================================================================
# 1. HOSPITAL KPIs - Overview of hospital-wide performance
# =============================================================================

query HospitalOverview {
  hospitalKpis(hospitalId: "HOSP001") {
    hospitalId
    timestamp

    # Capacity Metrics
    totalBeds
    occupiedBeds
    availableBeds
    occupancyRate
    icuOccupancyRate

    # Patient Flow
    totalAdmissions
    totalDischarges
    averageLengthOfStay
    readmissionRate

    # Clinical Quality
    mortalityRate
    adverseEventRate
    infectionRate

    # Operational Efficiency
    averageWaitTime
    bedTurnoverRate
    staffUtilizationRate

    # Quality Scores
    patientSatisfactionScore
    clinicalQualityScore
  }
}

# =============================================================================
# 2. DEPARTMENT METRICS - Department-level operational status
# =============================================================================

query DepartmentStatus {
  departmentMetrics(hospitalId: "HOSP001") {
    departmentId
    departmentName
    timestamp

    # Capacity
    totalBeds
    occupiedBeds
    occupancyRate

    # Patient Flow
    currentPatients
    admissionsToday
    dischargesToday
    averageLengthOfStay

    # Staffing
    activeStaff
    requiredStaff
    staffingLevel

    # Safety Events
    adverseEvents
    medicationErrors
    fallIncidents
    pressureUlcers

    # Alerts
    criticalAlerts
    warningAlerts
  }
}

# Query specific department
query SpecificDepartment {
  departmentMetrics(
    hospitalId: "HOSP001"
    departmentId: "ICU-001"
  ) {
    departmentName
    occupancyRate
    staffingLevel
    criticalAlerts
  }
}

# =============================================================================
# 3. PATIENT RISK PROFILES - Individual patient risk assessment
# =============================================================================

query PatientRiskDetails {
  patientRiskProfile(patientId: "PAT001") {
    patientId
    hospitalId
    timestamp

    # Demographics
    age
    gender

    # Risk Assessment
    overallRiskScore
    riskLevel
    riskCategory

    # Specific Risks
    mortalityRisk
    readmissionRisk
    deteriorationRisk
    sepsisRisk
    fallRisk
    bleedingRisk

    # Clinical Data
    vitalSigns {
      heartRate
      bloodPressureSystolic
      bloodPressureDiastolic
      respiratoryRate
      temperature
      oxygenSaturation
      consciousnessLevel
      timestamp
    }

    labResults {
      whiteBloodCellCount
      lactate
      creatinine
      bilirubin
      plateletCount
      pao2
      timestamp
    }

    # Conditions
    comorbidities
    activeConditions

    # Alerts
    activeAlerts {
      alertId
      alertType
      severity
      message
      timestamp
      acknowledged
    }
    alertCount
    criticalAlertCount

    # Interventions
    recommendedInterventions
    activeInterventions

    # Predictions
    predictedLengthOfStay
    predictedOutcome

    lastUpdated
  }
}

# High Risk Patients List
query HighRiskPatientsList {
  highRiskPatients(
    hospitalId: "HOSP001"
    riskLevel: CRITICAL
    limit: 20
  ) {
    patientId
    overallRiskScore
    riskLevel
    riskCategory
    mortalityRisk
    sepsisRisk
    activeAlerts {
      alertType
      severity
      message
    }
    recommendedInterventions
    lastUpdated
  }
}

# Patient Risk History
query PatientRiskTrend {
  patientRiskHistory(
    patientId: "PAT001"
    startTime: "2025-11-03T00:00:00Z"
    endTime: "2025-11-04T23:59:59Z"
  ) {
    timestamp
    overallRiskScore
    riskLevel
    mortalityRisk
    sepsisRisk
  }
}

# =============================================================================
# 4. SEPSIS SURVEILLANCE - Active sepsis monitoring
# =============================================================================

query SepsisAlertMonitoring {
  sepsisSurveillance(
    hospitalId: "HOSP001"
    alertLevel: CRITICAL
  ) {
    alertId
    patientId
    timestamp

    # Alert Status
    alertLevel
    alertStatus
    sepsisStage

    # Clinical Scores
    sofaScore
    sofaComponents {
      respiration
      coagulation
      liver
      cardiovascular
      centralNervousSystem
      renal
    }

    sirsScore
    sirsCriteria {
      temperature
      heartRate
      respiratoryRate
      whiteBloodCells
    }

    qSofaScore
    qSofaCriteria {
      alteredMentalStatus
      systolicBpLow
      respiratoryRateHigh
    }

    # Clinical Data
    vitalSigns {
      heartRate
      bloodPressureSystolic
      respiratoryRate
      temperature
      oxygenSaturation
      timestamp
    }

    labResults {
      whiteBloodCellCount
      lactate
      creatinine
      plateletCount
      timestamp
    }

    # Infection
    suspectedInfection
    infectionSite
    antibioticStartTime

    # Timeline
    symptomOnsetTime
    alertGeneratedTime
    clinicianNotifiedTime
    interventionStartTime
    timeToIntervention

    # Bundle Compliance
    bundleCompliance {
      lactateDrawn
      bloodCultureObtained
      antibioticsAdministered
      fluidResuscitationStarted
      vasopressorsInitiated
      overallCompliance
      complianceTime
    }

    # Interventions
    activeInterventions

    # Outcome
    resolved
    resolutionTime
    outcome

    # Risk Factors
    riskFactors
    comorbidities
  }
}

# All Sepsis Alerts
query AllSepsisAlerts {
  sepsisAlerts(
    hospitalId: "HOSP001"
    startTime: "2025-11-04T00:00:00Z"
    limit: 50
  ) {
    alertId
    patientId
    sepsisStage
    sofaScore
    qSofaScore
    bundleCompliance {
      overallCompliance
    }
    timeToIntervention
    resolved
  }
}

# Specific Patient Sepsis Details
query PatientSepsisHistory {
  sepsisPatientDetails(patientId: "PAT001") {
    alertId
    sepsisStage
    sofaScore
    bundleCompliance {
      overallCompliance
      lactateDrawn
      antibioticsAdministered
    }
    timeToIntervention
    outcome
  }
}

# =============================================================================
# 5. QUALITY METRICS - Clinical quality indicators
# =============================================================================

query QualityPerformance {
  qualityMetrics(hospitalId: "HOSP001") {
    metricId
    metricType
    metricName
    timestamp

    # Performance
    metricValue
    targetValue
    performanceStatus
    trendDirection
    percentChange

    # Compliance
    complianceRate
    numerator
    denominator

    # Benchmarks
    nationalBenchmark
    regionalBenchmark
    performancePercentile

    # Analysis
    topContributors
    improvementOpportunities
  }
}

# Specific Metric Type
query SepsisBundleCompliance {
  qualityMetrics(
    hospitalId: "HOSP001"
    metricType: SEPSIS_BUNDLE_COMPLIANCE
  ) {
    metricName
    metricValue
    targetValue
    complianceRate
    performanceStatus
    trendDirection
    improvementOpportunities
  }
}

# Quality Metrics Trend
query QualityTrend {
  qualityMetricsTrend(
    hospitalId: "HOSP001"
    metricType: MORTALITY_RATE
    startTime: "2025-11-01T00:00:00Z"
    endTime: "2025-11-04T23:59:59Z"
  ) {
    timestamp
    metricValue
    targetValue
    trendDirection
    performanceStatus
  }
}

# Overall Compliance Score
query HospitalCompliance {
  complianceScore(hospitalId: "HOSP001") {
    hospitalId
    timestamp
    overallScore
    categoryScores
    trendDirection
  }
}

# =============================================================================
# 6. DASHBOARD SUMMARY - Complete dashboard view
# =============================================================================

query CompleteDashboard {
  dashboardSummary(hospitalId: "HOSP001") {
    hospitalId
    timestamp

    # Hospital Overview
    hospitalKpis {
      occupancyRate
      icuOccupancyRate
      totalAdmissions
      totalDischarges
      mortalityRate
      patientSatisfactionScore
      clinicalQualityScore
    }

    # Top Departments
    topDepartments {
      departmentName
      occupancyRate
      staffingLevel
      criticalAlerts
      currentPatients
    }

    # High Risk Patients
    highRiskPatients {
      patientId
      riskLevel
      overallRiskScore
      activeAlerts {
        alertType
        severity
      }
    }

    # Active Sepsis Alerts
    activeSepsisAlerts {
      alertId
      patientId
      sepsisStage
      sofaScore
      timeToIntervention
    }

    # Quality Summary
    qualitySummary

    # Real-time Statistics
    realtimeStats {
      activePatients
      criticalPatients
      activeSepsisAlerts
      pendingDischarges
      availableBeds
      staffOnDuty
      lastUpdated
    }
  }
}

# =============================================================================
# 7. REAL-TIME STATISTICS - Live dashboard numbers
# =============================================================================

query LiveStats {
  realtimeStats(hospitalId: "HOSP001") {
    hospitalId
    timestamp
    activePatients
    criticalPatients
    activeSepsisAlerts
    pendingDischarges
    availableBeds
    staffOnDuty
    lastUpdated
  }
}

# =============================================================================
# 8. TRENDING QUERIES - Historical analysis
# =============================================================================

query HospitalPerformanceTrend {
  hospitalKpisTrend(
    hospitalId: "HOSP001"
    startTime: "2025-11-03T00:00:00Z"
    endTime: "2025-11-04T23:59:59Z"
  ) {
    timestamp
    occupancyRate
    totalAdmissions
    mortalityRate
    patientSatisfactionScore
  }
}

query DepartmentTrend {
  departmentMetricsTrend(
    departmentId: "ICU-001"
    startTime: "2025-11-03T00:00:00Z"
    endTime: "2025-11-04T23:59:59Z"
  ) {
    timestamp
    occupancyRate
    staffingLevel
    criticalAlerts
  }
}

# =============================================================================
# 9. FILTERED QUERIES - Specific data subsets
# =============================================================================

# Only High and Critical Risk Patients
query HighRiskOnly {
  highRiskPatients(
    hospitalId: "HOSP001"
    riskLevel: HIGH
    limit: 10
  ) {
    patientId
    riskLevel
    overallRiskScore
    recommendedInterventions
  }
}

# Only Critical Sepsis Alerts
query CriticalSepsisOnly {
  sepsisSurveillance(
    hospitalId: "HOSP001"
    alertLevel: CRITICAL
  ) {
    alertId
    patientId
    sepsisStage
    sofaScore
    bundleCompliance {
      overallCompliance
    }
  }
}

# Specific Quality Metric
query MedicationErrorRate {
  qualityMetrics(
    hospitalId: "HOSP001"
    metricType: MEDICATION_ERROR_RATE
  ) {
    metricValue
    targetValue
    complianceRate
    trendDirection
    improvementOpportunities
  }
}

# =============================================================================
# 10. SCHEMA INTROSPECTION - Understanding the API
# =============================================================================

# List all types
query ListAllTypes {
  __schema {
    types {
      name
      kind
      description
    }
  }
}

# Query type details
query QueryTypeFields {
  __type(name: "Query") {
    name
    fields {
      name
      description
      type {
        name
        kind
      }
    }
  }
}

# HospitalKPIs type structure
query HospitalKPIsTypeStructure {
  __type(name: "HospitalKPIs") {
    name
    fields {
      name
      type {
        name
        kind
      }
    }
  }
}

# Available enum values
query RiskLevelEnum {
  __type(name: "RiskLevel") {
    name
    enumValues {
      name
      description
    }
  }
}

