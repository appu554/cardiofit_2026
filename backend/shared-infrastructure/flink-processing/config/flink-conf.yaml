# Flink Configuration for CardioFit EHR Intelligence Engine

# JobManager Configuration
jobmanager.rpc.address: jobmanager
jobmanager.rpc.port: 6123
jobmanager.memory.process.size: 2g
jobmanager.memory.jvm-overhead.max: 512m

# TaskManager Configuration
taskmanager.memory.process.size: 6g
taskmanager.memory.managed.fraction: 0.4
taskmanager.numberOfTaskSlots: 4
taskmanager.memory.jvm-metaspace.size: 256m
taskmanager.memory.jvm-overhead.max: 1g

# Parallelism
parallelism.default: 8
taskmanager.network.numberOfBuffers: 2048

# State Backend Configuration
state.backend: rocksdb
state.backend.incremental: true
state.backend.rocksdb.memory.managed: true
state.backend.rocksdb.memory.high-prio-pool-ratio: 0.1
state.backend.rocksdb.block.cache-size: 256mb
state.backend.rocksdb.writebuffer.size: 64mb
state.backend.rocksdb.writebuffer.count: 4
state.backend.rocksdb.compaction.level.use-dynamic-size: true
state.backend.rocksdb.localdir: /tmp/rocksdb

# Checkpointing
execution.checkpointing.interval: 60000
execution.checkpointing.min-pause: 5000
execution.checkpointing.timeout: 600000
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
execution.checkpointing.unaligned: false
state.checkpoints.dir: file:///checkpoints
state.savepoints.dir: file:///savepoints
state.checkpoints.num-retained: 5

# Restart Strategy
restart-strategy: failure-rate
restart-strategy.failure-rate.max-failures-per-interval: 3
restart-strategy.failure-rate.failure-rate-interval: 5 min
restart-strategy.failure-rate.delay: 10 s

# Network Configuration
taskmanager.network.memory.fraction: 0.15
taskmanager.network.memory.min: 128mb
taskmanager.network.memory.max: 1gb

# Metrics Configuration
metrics.reporters: prom
metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
metrics.reporter.prom.port: 9249
metrics.scope.jm: flink.jobmanager
metrics.scope.tm: flink.taskmanager
metrics.scope.jm.job: flink.jobmanager.job
metrics.scope.tm.job: flink.taskmanager.job
metrics.scope.task: flink.task
metrics.scope.operator: flink.operator

# Web UI
web.submit.enable: true
web.cancel.enable: true
web.upload.dir: /tmp/flink-uploads

# Akka Configuration (for distributed coordination)
akka.ask.timeout: 60 s
akka.lookup.timeout: 60 s
akka.framesize: 10485760b

# Blob Server
blob.server.port: 6124
blob.fetch.retries: 5
blob.fetch.backlog: 1000

# Resource Management
taskmanager.cpu.cores: 2.0
taskmanager.memory.task.heap.size: 2gb
taskmanager.memory.task.off-heap.size: 512mb

# Security (if needed for production)
# security.ssl.enabled: true
# security.ssl.keystore: /path/to/keystore
# security.ssl.keystore-password: password
# security.ssl.truststore: /path/to/truststore
# security.ssl.truststore-password: password

# Queryable State (for external queries)
queryable-state.enable: false

# History Server
# jobmanager.archive.fs.dir: hdfs:///flink-history
# historyserver.archive.fs.dir: hdfs:///flink-history
# historyserver.archive.fs.refresh-interval: 10000

# Advanced Streaming Settings
execution.buffer-timeout: 100
execution.checkpointing.interval: 30s
execution.checkpointing.mode: EXACTLY_ONCE
queryable-state.server.port: 6125
