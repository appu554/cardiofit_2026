global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Flink JobManager metrics
  - job_name: 'flink-jobmanager'
    static_configs:
      - targets: ['jobmanager:9249']
        labels:
          component: 'jobmanager'
          cluster: 'cardiofit-flink'

  # Flink TaskManager metrics
  - job_name: 'flink-taskmanagers'
    static_configs:
      - targets:
          - 'taskmanager-1:9249'
          - 'taskmanager-2:9249'
          - 'taskmanager-3:9249'
        labels:
          component: 'taskmanager'
          cluster: 'cardiofit-flink'

  # Kafka metrics (if exposed from the Kafka cluster)
  - job_name: 'kafka'
    static_configs:
      - targets:
          - 'kafka1:9308'
          - 'kafka2:9308'
          - 'kafka3:9308'
        labels:
          component: 'kafka'
          cluster: 'cardiofit-kafka'

# Alerting rules (optional)
rule_files:
  - '/etc/prometheus/rules/*.yml'

