# Kafka Topic Configuration for Flink Stream Processing
# This file defines the Kafka topics used by Flink jobs
# Last Updated: 2025-01-26

# ============================================
# Kafka Cluster Configuration
# ============================================
kafka.bootstrap.servers=localhost:9092
# For Confluent Cloud, uncomment and configure:
# kafka.bootstrap.servers=pkc-619z3.us-east1.gcp.confluent.cloud:9092
# kafka.security.protocol=SASL_SSL
# kafka.sasl.mechanism=PLAIN
# kafka.sasl.username=${KAFKA_API_KEY}
# kafka.sasl.password=${KAFKA_API_SECRET}

# Consumer group for Flink jobs
kafka.consumer.group.id=flink-stream-processor

# ============================================
# Input Topics - Clinical Events
# ============================================
# Primary patient event streams consumed by Flink
input.topics.clinical=patient-events.v1,medication-events.v1,observation-events.v1,safety-events.v1,encounter-events.v1,diagnostic-events.v1,procedure-events.v1

# Vital signs and lab results from devices
input.topics.vitals=vital-signs-events.v1,lab-result-events.v1

# Device data streams
input.topics.devices=validated-device-data.v1,waveform-data.v1,device-telemetry.v1

# CDC topics for knowledge base updates
input.topics.cdc=kb3.clinical_protocols.changes,kb4.drug_calculations.changes,kb4.dosing_rules.changes,kb4.weight_adjustments.changes,kb5.drug_interactions.changes,kb6.validation_rules.changes,kb7.terminology.changes,semantic-mesh.changes

# Evidence and reasoning events
input.topics.evidence=evidence-requests.v1,clinical-reasoning-events.v1

# Workflow events
input.topics.workflow=workflow-events.v1,decision-support-events.v1

# ============================================
# Output Topics - Enriched Events
# ============================================
# Semantically enriched patient events
output.topic.enriched=enriched-patient-events.v1

# Clinical pattern detection results
output.topic.patterns=clinical-patterns.v1

# Clinical pathway adherence monitoring
output.topic.adherence=pathway-adherence-events.v1

# Patient context snapshots for recovery
output.topic.snapshots=patient-context-snapshots.v1

# ============================================
# Broadcast State Topics
# ============================================
# Semantic mesh updates for broadcast state
broadcast.topic.semantic=semantic-mesh-updates.v1

# Knowledge base broadcast updates
broadcast.topics.knowledge=kb3.clinical_protocols.changes,kb4.drug_calculations.changes,kb5.drug_interactions.changes

# ============================================
# Error Handling Topics (DLQ)
# ============================================
# Dead letter queue for failed validations
dlq.topic.validation=failed-validation.v1

# Critical data failures requiring immediate attention
dlq.topic.critical=critical-data-dlq.v1

# Poison messages that repeatedly fail
dlq.topic.poison=poison-messages.v1

# Flink checkpoint failures
dlq.topic.checkpoints=flink-checkpoint-failures.v1

# ============================================
# Performance Monitoring Topics
# ============================================
# Performance metrics output
metrics.topic=performance-metrics.v1

# Clinical metrics for quality tracking
clinical.metrics.topic=clinical-metrics.v1

# SLA measurement events
sla.topic=sla-measurements.v1

# ============================================
# Sink Configuration Topics
# ============================================
# Topics for multi-sink distribution errors
sink.dlq.fhir=sink-write-failures.v1
sink.dlq.critical=critical-sink-failures.v1
sink.dlq.poison=poison-messages-stage2.v1

# ============================================
# Flink Job-Specific Configurations
# ============================================

# Patient Event Enrichment Job
patient.enrichment.job.name=patient-event-enrichment
patient.enrichment.input.topics=patient-events.v1,medication-events.v1,safety-events.v1,vital-signs-events.v1,lab-result-events.v1
patient.enrichment.output.topic=enriched-patient-events.v1
patient.enrichment.parallelism=4
patient.enrichment.checkpoint.interval=30000

# Clinical Pattern Detection Job
pattern.detection.job.name=clinical-pattern-detection
pattern.detection.input.topics=enriched-patient-events.v1
pattern.detection.output.topic=clinical-patterns.v1
pattern.detection.window.size=300000
pattern.detection.parallelism=2

# Pathway Adherence Monitoring Job
pathway.adherence.job.name=pathway-adherence-monitor
pathway.adherence.input.topics=enriched-patient-events.v1,workflow-events.v1
pathway.adherence.output.topic=pathway-adherence-events.v1
pathway.adherence.protocol.topic=kb3.clinical_protocols.changes
pathway.adherence.parallelism=2

# CDC Processing Job
cdc.processor.job.name=cdc-knowledge-processor
cdc.processor.input.topics=kb3.clinical_protocols.changes,kb4.drug_calculations.changes,kb4.dosing_rules.changes,kb5.drug_interactions.changes,kb6.validation_rules.changes,kb7.terminology.changes
cdc.processor.output.topic=semantic-mesh-updates.v1
cdc.processor.parallelism=1

# Snapshot Generator Job
snapshot.generator.job.name=patient-snapshot-generator
snapshot.generator.input.topics=enriched-patient-events.v1
snapshot.generator.output.topic=patient-context-snapshots.v1
snapshot.generator.interval=60000
snapshot.generator.parallelism=2

# ============================================
# Watermark and Windowing Configuration
# ============================================
# Maximum out-of-orderness for watermarks (5 seconds)
watermark.max.out.of.orderness=5000

# Idle source timeout (1 minute)
watermark.idle.timeout=60000

# Default window size for aggregations (5 minutes)
window.default.size=300000

# ============================================
# State Backend Configuration
# ============================================
# RocksDB state backend for large state
state.backend=rocksdb
state.backend.incremental=true
state.checkpoints.dir=file:///tmp/flink-checkpoints
state.savepoints.dir=file:///tmp/flink-savepoints

# ============================================
# Checkpoint Configuration
# ============================================
# Enable checkpointing every 30 seconds
checkpoint.interval=30000
checkpoint.mode=EXACTLY_ONCE
checkpoint.min.pause=10000
checkpoint.timeout=60000
checkpoint.max.concurrent=1

# ============================================
# Performance Tuning
# ============================================
# Buffer timeout for network latency optimization
buffer.timeout=100

# Enable object reuse for performance
object.reuse=true

# Latency tracking interval
latency.tracking.interval=100

# Maximum parallelism for scaling
max.parallelism=128

# ============================================
# Monitoring and Metrics
# ============================================
# Enable Prometheus metrics
metrics.reporter.prometheus.enabled=true
metrics.reporter.prometheus.port=9249

# Metric scope naming
metrics.scope.jm=flink.jobmanager
metrics.scope.tm=flink.taskmanager
metrics.scope.job=flink.job
metrics.scope.task=flink.task

# ============================================
# Security Configuration
# ============================================
# Enable SSL for internal communication
security.ssl.internal.enabled=false

# Kerberos authentication (if needed)
# security.kerberos.login.keytab=/path/to/keytab
# security.kerberos.login.principal=flink@DOMAIN.COM