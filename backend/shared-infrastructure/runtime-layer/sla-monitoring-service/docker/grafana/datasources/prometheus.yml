# Grafana Data Source Provisioning Configuration

apiVersion: 1

datasources:
  - name: Prometheus SLA
    type: prometheus
    access: proxy
    url: http://prometheus-sla:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: GET
    secureJsonData: {}

  - name: CardioFit Runtime Prometheus
    type: prometheus
    access: proxy
    url: http://host.docker.internal:9090
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: GET
    secureJsonData: {}