# Grafana Dashboard Provisioning Configuration

apiVersion: 1

providers:
  - name: 'SLA Monitoring Dashboards'
    orgId: 1
    folder: 'SLA Monitoring'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards