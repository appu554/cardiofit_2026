global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # Add alerting rules here

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'flink-jobmanager'
    static_configs:
      - targets: ['flink-jobmanager:9249']

  - job_name: 'sla-monitoring'
    static_configs:
      - targets: ['sla-monitoring:8050']
    metrics_path: /metrics

  - job_name: 'l1-cache-prefetcher'
    static_configs:
      - targets: ['l1-cache-prefetcher:8055']
    metrics_path: /metrics

  - job_name: 'evidence-envelope'
    static_configs:
      - targets: ['evidence-envelope:8060']
    metrics_path: /metrics

  - job_name: 'query-router'
    static_configs:
      - targets: ['query-router:8070']
    metrics_path: /metrics