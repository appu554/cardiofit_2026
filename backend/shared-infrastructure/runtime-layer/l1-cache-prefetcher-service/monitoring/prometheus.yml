# Prometheus configuration for L1 Cache and Prefetcher Service monitoring

global:
  scrape_interval: 10s  # High frequency for cache metrics
  evaluation_interval: 15s
  external_labels:
    monitor: 'l1-cache-monitor'

rule_files:
  # - "cache_alerts.yml"

scrape_configs:
  # L1 Cache and Prefetcher Service
  - job_name: 'l1-cache-prefetcher-service'
    static_configs:
      - targets: ['l1-cache-prefetcher:8031']
    scrape_interval: 5s  # Very frequent for cache performance
    metrics_path: /metrics

  # Redis L2 Cache
  - job_name: 'redis-l2-cache'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']