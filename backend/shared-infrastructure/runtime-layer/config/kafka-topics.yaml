# Kafka Topic Mappings for Runtime Layer Services
# This file maps runtime layer services to their respective Kafka topics
# Last Updated: 2025-01-26

# ============================================
# Kafka Cluster Configuration
# ============================================
kafka_config:
  development:
    bootstrap_servers: "localhost:9092"
    security_protocol: "PLAINTEXT"

  staging:
    bootstrap_servers: "pkc-619z3.us-east1.gcp.confluent.cloud:9092"
    security_protocol: "SASL_SSL"
    sasl_mechanism: "PLAIN"
    # Credentials should be loaded from environment variables

  production:
    bootstrap_servers: "pkc-619z3.us-east1.gcp.confluent.cloud:9092"
    security_protocol: "SASL_SSL"
    sasl_mechanism: "PLAIN"
    # Credentials should be loaded from environment variables

# ============================================
# Evidence Envelope Service Topics
# ============================================
evidence_envelope_service:
  # Audit trail for all evidence operations
  audit_topic: "audit-events.v1"

  # Evidence lifecycle events
  events_topic: "envelope-events.v1"

  # Evidence request processing
  requests_topic: "evidence-requests.v1"

  # Validation results
  validations_topic: "evidence-validations.v1"

  # Clinical reasoning integration
  reasoning_input: "clinical-reasoning-events.v1"
  inference_output: "inference-results.v1"

  # Consumer configuration
  consumer_group: "evidence-envelope-consumer"

  # Producer configuration
  producer_id: "evidence-envelope-producer"

# ============================================
# SLA Monitoring Service Topics
# ============================================
sla_monitoring_service:
  # Real-time SLA measurements
  measurements_topic: "sla-measurements.v1"

  # SLA violation alerts
  violations_topic: "sla-violations.v1"

  # Performance metrics input
  metrics_input: "performance-metrics.v1"

  # Clinical metrics tracking
  clinical_metrics: "clinical-metrics.v1"

  # Alert notifications output
  alerts_output: "alert-notifications.v1"

  # Consumer configuration
  consumer_group: "sla-monitoring-consumer"

  # Producer configuration
  producer_id: "sla-monitoring-producer"

# ============================================
# L1 Cache Prefetcher Service Topics
# ============================================
l1_cache_prefetcher_service:
  # Cache invalidation events
  invalidation_topic: "cache-invalidation.v1"

  # ML prefetch predictions
  predictions_topic: "prefetch-predictions.v1"

  # Cache warmup commands
  warmup_topic: "cache-warmup.v1"

  # Query pattern analysis
  patterns_input: "query-patterns.v1"

  # CDC updates for cache invalidation
  cdc_topics:
    - "kb4.drug_calculations.changes"
    - "kb4.dosing_rules.changes"
    - "kb5.drug_interactions.changes"
    - "semantic-mesh.changes"

  # Consumer configuration
  consumer_group: "l1-cache-consumer"

  # Producer configuration
  producer_id: "l1-cache-producer"

# ============================================
# CDC Pipeline Topics
# ============================================
cdc_pipeline:
  # Knowledge base change streams
  kb3_protocols: "kb3.clinical_protocols.changes"
  kb4_drug_calculations: "kb4.drug_calculations.changes"
  kb4_dosing_rules: "kb4.dosing_rules.changes"
  kb4_weight_adjustments: "kb4.weight_adjustments.changes"
  kb5_drug_interactions: "kb5.drug_interactions.changes"
  kb6_validation_rules: "kb6.validation_rules.changes"
  kb7_terminology: "kb7.terminology.changes"

  # Semantic mesh updates
  semantic_mesh: "semantic-mesh.changes"

  # Broadcast state updates for Flink
  broadcast_output: "semantic-mesh-updates.v1"

  # Debezium connector groups
  connector_groups:
    kb3_connector: "debezium-kb3"
    kb4_connector: "debezium-kb4"
    kb5_connector: "debezium-kb5"
    kb6_connector: "debezium-kb6"
    kb7_connector: "debezium-kb7"

# ============================================
# Event Bus Orchestrator Topics
# ============================================
event_bus_orchestrator:
  # Cross-service orchestration
  commands_topic: "orchestration-commands.v1"

  # Workflow coordination
  workflow_events: "workflow-events.v1"

  # Clinical overrides
  overrides_topic: "clinical-overrides.v1"

  # Task assignments
  tasks_topic: "task-assignments.v1"

  # Decision support
  decisions_topic: "decision-support-events.v1"

  # Consumer configuration
  consumer_group: "event-bus-consumer"

  # Producer configuration
  producer_id: "event-bus-producer"

# ============================================
# Query Router Service Topics
# ============================================
query_router:
  # Query pattern tracking for optimization
  patterns_output: "query-patterns.v1"

  # Cache invalidation triggers
  cache_invalidation: "cache-invalidation.v1"

  # Performance metrics
  metrics_output: "performance-metrics.v1"

  # Producer configuration
  producer_id: "query-router-producer"

# ============================================
# Medication Runtime Service Topics
# ============================================
medication_runtime:
  # Medication events
  medication_events: "medication-events.v1"

  # Safety alerts
  safety_events: "safety-events.v1"

  # Drug interaction updates
  drug_interactions: "kb5.drug_interactions.changes"

  # Dosing rule updates
  dosing_rules: "kb4.dosing_rules.changes"

  # Consumer configuration
  consumer_group: "medication-runtime-consumer"

  # Producer configuration
  producer_id: "medication-runtime-producer"

# ============================================
# Neo4j Dual Stream Manager Topics
# ============================================
neo4j_dual_stream:
  # Input from enriched events
  enriched_input: "enriched-patient-events.v1"

  # Clinical patterns for graph updates
  patterns_input: "clinical-patterns.v1"

  # Pathway adherence for relationship tracking
  adherence_input: "pathway-adherence-events.v1"

  # Evidence envelopes for knowledge graph
  evidence_input: "envelope-events.v1"

  # Consumer configuration
  consumer_group: "neo4j-stream-consumer"

# ============================================
# GraphDB Semantic Service Topics
# ============================================
graphdb_semantic:
  # CDC inputs from all knowledge bases
  cdc_inputs:
    - "kb3.clinical_protocols.changes"
    - "kb4.drug_calculations.changes"
    - "kb4.dosing_rules.changes"
    - "kb4.weight_adjustments.changes"
    - "kb5.drug_interactions.changes"
    - "kb6.validation_rules.changes"
    - "kb7.terminology.changes"

  # Semantic mesh broadcast updates
  mesh_updates: "semantic-mesh-updates.v1"

  # Semantic mesh changes for CDC
  mesh_changes: "semantic-mesh.changes"

  # Consumer configuration
  consumer_group: "graphdb-semantic-consumer"

  # Producer configuration
  producer_id: "graphdb-semantic-producer"

# ============================================
# Flink Jobs Integration Topics
# ============================================
flink_jobs:
  # Patient event enrichment job
  patient_enrichment:
    inputs:
      - "patient-events.v1"
      - "medication-events.v1"
      - "safety-events.v1"
      - "vital-signs-events.v1"
      - "lab-result-events.v1"
    output: "enriched-patient-events.v1"

  # Clinical pattern detection job
  pattern_detection:
    input: "enriched-patient-events.v1"
    output: "clinical-patterns.v1"

  # Pathway adherence monitoring job
  pathway_adherence:
    inputs:
      - "enriched-patient-events.v1"
      - "workflow-events.v1"
    protocol_input: "kb3.clinical_protocols.changes"
    output: "pathway-adherence-events.v1"

  # Patient snapshot generator job
  snapshot_generator:
    input: "enriched-patient-events.v1"
    output: "patient-context-snapshots.v1"

# ============================================
# Stream Processing Topics
# ============================================
stream_processing:
  # Real-time patient data streams
  patient_streams:
    - "patient-events.v1"
    - "vital-signs-events.v1"
    - "lab-result-events.v1"

  # Device data streams
  device_streams:
    - "validated-device-data.v1"
    - "waveform-data.v1"
    - "device-telemetry.v1"

  # Enriched output streams
  enriched_streams:
    - "enriched-patient-events.v1"
    - "clinical-patterns.v1"
    - "pathway-adherence-events.v1"

# ============================================
# Ingestion Service Topics (Layer 1)
# ============================================
# Published via Global Outbox SDK (transactional outbox pattern).
# One topic per clinical data category.
ingestion_service:
  # Source topics (9 clinical categories + 1 safety-critical)
  labs: "ingestion.labs"
  vitals: "ingestion.vitals"
  device_data: "ingestion.device-data"
  patient_reported: "ingestion.patient-reported"
  wearable_aggregates: "ingestion.wearable-aggregates"
  cgm_raw: "ingestion.cgm-raw"
  abdm_records: "ingestion.abdm-records"
  medications: "ingestion.medications"
  observations: "ingestion.observations"
  safety_critical: "ingestion.safety-critical"

  # Consumer configuration for Module1b Flink job
  module1b_consumer_group: "flink-module1b-ingestion"

  # DLQ topics
  dlq_labs: "dlq.ingestion.labs.v1"
  dlq_vitals: "dlq.ingestion.vitals.v1"
  dlq_safety_critical: "dlq.ingestion.safety-critical.v1"

# ============================================
# KB Threshold Hot-Swap Topics
# ============================================
kb_thresholds:
  clinical_thresholds_changes: "kb.clinical-thresholds.changes"

# ============================================
# KB Service Event Topics
# ============================================
# Events emitted by the KB services (KB-20 patient profile, KB-23 decision
# cards, KB-26 metabolic digital twin). Consumed by Module 13 Flink state
# sync and future analytics consumers. Contracts documented under
# backend/stream-services/docs/ (see kb26_domain_trajectory_consumer.md).
kb_services:
  # KB-26 — Module 13 Flink state-sync consumes this topic to populate
  # the domain_velocities map. Events are keyed by patient_id so all
  # events for a given patient land on the same partition.
  kb26_domain_trajectory: "kb26.domain_trajectory.v1"

# ============================================
# Dead Letter Queue Topics
# ============================================
error_handling:
  # Validation failures
  validation_dlq: "failed-validation.v1"

  # Critical data failures
  critical_dlq: "critical-data-dlq.v1"

  # Poison messages
  poison_dlq: "poison-messages.v1"

  # Sink write failures
  sink_failures: "sink-write-failures.v1"

  # Critical sink failures
  critical_sink_failures: "critical-sink-failures.v1"

  # Stage 2 poison messages
  stage2_poison: "poison-messages-stage2.v1"

  # Processing errors
  processing_errors: "processing-errors.v1"

  # Integration failures
  integration_failures: "integration-failures.v1"

  # Flink checkpoint failures
  checkpoint_failures: "flink-checkpoint-failures.v1"

# ============================================
# Monitoring and Metrics Topics
# ============================================
monitoring:
  # Performance metrics
  performance: "performance-metrics.v1"

  # Clinical metrics
  clinical: "clinical-metrics.v1"

  # SLA measurements
  sla: "sla-measurements.v1"

  # SLA violations
  violations: "sla-violations.v1"

  # Usage analytics
  analytics: "usage-analytics.v1"

  # Alert notifications
  alerts: "alert-notifications.v1"

# ============================================
# External Integration Topics
# ============================================
external_integration:
  # HL7 messages
  hl7: "hl7-messages.v1"

  # FHIR bundles
  fhir: "fhir-bundles.v1"

  # External lab results
  lab_results: "external-lab-results.v1"

  # Pharmacy orders
  pharmacy: "pharmacy-orders.v1"

  # Billing events
  billing: "billing-events.v1"

  # Google Healthcare sync
  google_healthcare: "google-healthcare-sync.v1"

# ============================================
# Service Registry
# ============================================
services:
  evidence_envelope:
    name: "evidence-envelope-service"
    port: 8020
    topics:
      produces: ["audit-events.v1", "envelope-events.v1", "inference-results.v1"]
      consumes: ["evidence-requests.v1", "clinical-reasoning-events.v1"]

  sla_monitoring:
    name: "sla-monitoring-service"
    port: 8021
    topics:
      produces: ["sla-measurements.v1", "sla-violations.v1", "alert-notifications.v1"]
      consumes: ["performance-metrics.v1", "clinical-metrics.v1"]

  l1_cache_prefetcher:
    name: "l1-cache-prefetcher-service"
    port: 8022
    topics:
      produces: ["prefetch-predictions.v1"]
      consumes: ["cache-invalidation.v1", "query-patterns.v1", "cache-warmup.v1"]

  flink_processor:
    name: "flink-stream-processor"
    port: 8081
    topics:
      produces: ["enriched-patient-events.v1", "clinical-patterns.v1", "pathway-adherence-events.v1", "patient-context-snapshots.v1"]
      consumes: ["patient-events.v1", "medication-events.v1", "safety-events.v1", "vital-signs-events.v1", "lab-result-events.v1"]