# KB-0 Governance Platform Configuration
# =======================================
# This file provides default configuration for the KB-0 Governance Platform.
# Environment variables override these values in production.

server:
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

database:
  host: localhost
  port: 5432
  name: kb0_governance
  user: kb0_user
  password: ""  # Set via KB0_DATABASE_PASSWORD environment variable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  host: localhost
  port: 6379
  password: ""  # Set via KB0_REDIS_PASSWORD environment variable
  db: 0
  cache_ttl: 5m

workflow:
  # SLA settings (hours)
  sla:
    high_risk_review: 24
    high_risk_approval: 48
    med_risk_review: 24
    med_risk_approval: 24
    low_risk_validation: 1
    low_risk_approval: 24

audit:
  # Retention settings
  retention_years: 10

  # Export formats supported
  export_formats:
    - FDA
    - TGA
    - CMS
    - ISO

notifications:
  enabled: false
  # Email settings (when enabled)
  email:
    smtp_host: ""
    smtp_port: 587
    from_address: "kb0-governance@cardiofit.health"

# KB Registry - defines which KBs use which workflow template
kb_registry:
  # High-Risk Clinical (Template A)
  KB-1:
    name: "Drug Dosing"
    template: "CLINICAL_HIGH"
    reviewer_roles: ["pharmacist", "physician"]
    approver_role: "cmo"

  KB-4:
    name: "Patient Safety"
    template: "CLINICAL_HIGH"
    reviewer_roles: ["pharmacist", "physician"]
    approver_role: "cmo"

  KB-5:
    name: "Drug Interactions"
    template: "CLINICAL_HIGH"
    reviewer_roles: ["pharmacist", "physician"]
    approver_role: "cmo"

  # Medium-Risk Quality (Template B)
  KB-6:
    name: "Formulary"
    template: "QUALITY_MED"
    reviewer_roles: ["pharmacist"]
    approver_role: "pt_chair"

  KB-8:
    name: "Calculators"
    template: "QUALITY_MED"
    reviewer_roles: ["physician"]
    approver_role: "clinical_lead"

  # Low-Risk Infrastructure (Template C)
  KB-7:
    name: "Terminology"
    template: "INFRA_LOW"
    reviewer_roles: ["auto"]
    approver_role: "terminology_manager"

  KB-2:
    name: "Clinical Context"
    template: "INFRA_LOW"
    reviewer_roles: ["auto"]
    approver_role: "tech_lead"
