# CMS122 HbA1c Control (<8%) - Expected Conformance Results
# These values are FIXED and must NOT change without clinical review
#
# Measure: CMS122v11 / NQF 0059 / HEDIS HBD
# Description: Percentage of patients 18-75 years of age with diabetes
#              who had hemoglobin A1c (HbA1c) control (<8.0%)
#
# Last Clinical Review: 2024-01-15
# Approved By: CMO Gate Review

measure_id: CMS122
measure_version: "v11"
measurement_period:
  start: "2024-01-01"
  end: "2024-12-31"

# Expected population counts from fixture data
# NOTE: Using standard CMS terminology where Denominator = IP (before exclusions)
expected_results:
  initial_population: 10
  denominator: 10           # Same as IP (standard CMS terminology)
  denominator_exclusion: 2  # Hospice (1) + ESRD (1)
  denominator_exception: 0
  numerator: 5              # HbA1c < 8%
  numerator_exclusion: 0

  # Score = Numerator / (Denominator - Exclusions - Exceptions)
  # Score = 5 / (10 - 2 - 0) = 5/8 = 0.625
  score: 0.625
  performance_rate: 62.5    # As percentage

# Stratification expected results
stratifications:
  - id: "age-18-44"
    numerator: 2
    denominator: 3
    score: 0.667
  - id: "age-45-64"
    numerator: 2
    denominator: 3
    score: 0.667
  - id: "age-65-75"
    numerator: 1
    denominator: 2
    score: 0.500

# Tolerance for floating point comparison
tolerance: 0.001

# Audit metadata
audit:
  created_at: "2024-01-15T00:00:00Z"
  created_by: "CMO Clinical Informatics"
  last_validated: "2024-01-15T00:00:00Z"
  validation_method: "Manual chart review"
