# CMS122v12 - Diabetes: Hemoglobin A1c (HbA1c) Poor Control (>9%)
# Quality Measure Definition for KB-13

type: measure

measure:
  id: "CMS122v12"
  version: "12.0.0"
  name: "DiabetesHbA1cPoorControl"
  title: "Diabetes: Hemoglobin A1c (HbA1c) Poor Control (>9%)"
  description: |
    Percentage of patients 18-75 years of age with diabetes who had
    hemoglobin A1c > 9.0% during the measurement period.

    This is an INVERSE measure - lower rates indicate better performance.
  type: "OUTCOME"
  scoring: "proportion"
  domain: "DIABETES"
  program: "CMS"

  # External identifiers
  nqf_number: "0059"
  cms_number: "CMS122v12"
  hedis_code: "CDC"

  # Measurement period configuration
  measurement_period:
    type: "calendar"
    duration: "P1Y"  # ISO 8601: 1 year
    anchor: "year"   # Calendar year alignment

  # Population criteria (FHIR R4 MeasureReport compliant)
  populations:
    - id: "initial-population"
      type: "initial-population"
      description: "Patients 18-75 with diabetes diagnosis"
      cql_expression: "InitialPopulation"
      criteria:
        demographics:
          age_min: 18
          age_max: 75
        conditions:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.103.12.1001"  # Diabetes
            time_window: "P1Y"

    - id: "denominator"
      type: "denominator"
      description: "Equals Initial Population"
      cql_expression: "Denominator"

    - id: "denominator-exclusion"
      type: "denominator-exclusion"
      description: "Patients with hospice care or advanced illness"
      cql_expression: "DenominatorExclusions"
      criteria:
        conditions:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.1003"  # Hospice
            time_window: "P1Y"

    - id: "numerator"
      type: "numerator"
      description: "Patients with most recent HbA1c > 9.0%"
      cql_expression: "Numerator"
      criteria:
        lab_results:
          - lab_code: "4548-4"  # LOINC: HbA1c
            operator: ">"
            value: 9.0
            time_window: "P1Y"

  # Stratifications for reporting
  stratifications:
    - id: "age-strat"
      description: "Stratification by age group"
      type: "age"
      components:
        - "18-44"
        - "45-64"
        - "65-75"

    - id: "payer-strat"
      description: "Stratification by payer type"
      type: "payer"
      components:
        - "Medicare"
        - "Medicaid"
        - "Commercial"

  # Interpretation guidance
  improvement_notation: "decrease"  # Lower is better (inverse measure)

  # Benchmark reference
  benchmark_ref: "CMS122v12:2024"

  # Clinical evidence
  evidence:
    level: "A"
    source: "American Diabetes Association"
    guideline: "ADA Standards of Medical Care in Diabetes - 2024"
    citation: "ADA. Diabetes Care. 2024;47(Suppl 1):S1-S321."

  # Active status
  active: true
