  version: "2024"
  name: Flu Vaccinations for Adults Ages 18-64
  title: Adult Flu Vaccination
  description: >
    Assesses the percentage of members 18-64 years of age who received an influenza
    vaccination between July 1 and June 30.

  type: PROCESS
  scoring: proportion
  domain: PREVENTIVE
  program: HEDIS

  hedis_code: FVA

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Members 18-64 years of age
      cql_expression: FLU Initial Population
      criteria:
        demographics:
          age_min: 18
          age_max: 64

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: FLU Denominator

    - id: numerator
      type: numerator
      description: Received influenza vaccination
      cql_expression: FLU Numerator

  improvement_notation: increase

  calculation_schedule:
    - monthly

  active: true

