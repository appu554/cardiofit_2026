# HEDIS Preventive Care Measures
# Screenings, Immunizations, and Wellness

type: measure
measure:
  id: BCS
  version: "2024"
  name: Breast Cancer Screening
  title: Mammography Screening
  description: >
    Assesses the percentage of women 50-74 years of age who had at least one mammogram
    to screen for breast cancer in the past two years.

  type: PROCESS
  scoring: proportion
  domain: PREVENTIVE
  program: HEDIS

  nqf_number: "2372"
  cms_number: "CMS125v11"
  hedis_code: BCS

  measurement_period:
    type: rolling
    duration: P2Y
    anchor: current

  populations:
    - id: initial-population
      type: initial-population
      description: Women 50-74 years of age
      cql_expression: BCS Initial Population
      criteria:
        demographics:
          age_min: 50
          age_max: 74
          gender: female

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: BCS Denominator

    - id: denominator-exclusion
      type: denominator-exclusion
      description: Bilateral mastectomy, hospice
      cql_expression: BCS Denominator Exclusion

    - id: numerator
      type: numerator
      description: Mammogram performed in measurement period
      cql_expression: BCS Numerator

  improvement_notation: increase

  calculation_schedule:
    - monthly
    - quarterly

  active: true

