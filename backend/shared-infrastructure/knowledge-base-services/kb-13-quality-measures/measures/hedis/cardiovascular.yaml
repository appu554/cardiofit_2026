  version: "2024"
  name: Ischemic Vascular Disease - Aspirin or Antiplatelet
  title: Aspirin/Antiplatelet Use in IVD
  description: >
    Assesses the percentage of members 18+ years of age with ischemic vascular disease
    who were prescribed aspirin or another antiplatelet medication.

  type: PROCESS
  scoring: proportion
  domain: CARDIOVASCULAR
  program: HEDIS

  hedis_code: IVD

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Members 18+ with IVD
      cql_expression: IVD Initial Population
      criteria:
        demographics:
          age_min: 18
        conditions:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.104.12.1003"

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: IVD Initial Population

    - id: numerator
      type: numerator
      description: Prescribed aspirin or antiplatelet
      cql_expression: IVD Numerator
      criteria:
        medications:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.196.12.1211"
            active_only: true

  improvement_notation: increase

  calculation_schedule:
    - monthly

  active: true
