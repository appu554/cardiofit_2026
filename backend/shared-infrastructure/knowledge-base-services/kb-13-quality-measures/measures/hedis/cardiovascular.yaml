# HEDIS Cardiovascular Measures
# Blood Pressure Control and Statin Therapy

type: measure
measure:
  id: CBP
  version: "2024"
  name: Controlling High Blood Pressure
  title: Blood Pressure Control (<140/90)
  description: >
    Assesses the percentage of members 18-85 years of age who had a diagnosis of hypertension
    and whose blood pressure was adequately controlled (<140/90 mm Hg).

  type: PROCESS
  scoring: proportion
  domain: CARDIOVASCULAR
  program: HEDIS

  nqf_number: "0018"
  cms_number: "CMS165v11"
  hedis_code: CBP

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Members 18-85 years with hypertension diagnosis
      cql_expression: CBP Initial Population
      criteria:
        demographics:
          age_min: 18
          age_max: 85
        conditions:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.104.12.1011"
            time_window: "before end of measurement period"

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: CBP Denominator

    - id: denominator-exclusion
      type: denominator-exclusion
      description: Hospice, ESRD, pregnancy
      cql_expression: CBP Denominator Exclusion

    - id: numerator
      type: numerator
      description: BP adequately controlled (<140/90)
      cql_expression: CBP Numerator
      criteria:
        lab_results:
          - lab_code: "8480-6"
            operator: "<"
            value: 140
            time_window: "most recent"
          - lab_code: "8462-4"
            operator: "<"
            value: 90
            time_window: "most recent"

  stratifications:
    - id: age-strat
      description: Age stratification
      components: ["18-44", "45-64", "65-85"]
    - id: control-level
      description: Control level
      components: ["<130/80", "<140/90", ">=140/90"]

  improvement_notation: increase

  calculation_schedule:
    - daily
    - monthly

  benchmark_ref: CBP

  evidence:
    level: A
    source: ACC/AHA
    guideline: 2017 ACC/AHA Hypertension Guidelines

  active: true

---

type: measure
measure:
  id: SPC
  version: "2024"
  name: Statin Therapy for Patients with Cardiovascular Disease
  title: Statin Use in CVD
  description: >
    Assesses the percentage of males 21-75 years of age and females 40-75 years of age
    with clinical ASCVD who were dispensed at least one high or moderate-intensity statin.

  type: PROCESS
  scoring: proportion
  domain: CARDIOVASCULAR
  program: HEDIS

  cms_number: "CMS347v5"
  hedis_code: SPC

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Members 21-75 with clinical ASCVD
      cql_expression: Statin CVD Initial Population
      criteria:
        demographics:
          age_min: 21
          age_max: 75
        conditions:
          - value_set_oid: "2.16.840.1.113762.1.4.1047.21"

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: Statin CVD Initial Population

    - id: denominator-exclusion
      type: denominator-exclusion
      description: Hospice, pregnancy, statin intolerance
      cql_expression: Statin CVD Denominator Exclusion

    - id: numerator
      type: numerator
      description: Received statin therapy
      cql_expression: Statin CVD Numerator
      criteria:
        medications:
          - value_set_oid: "2.16.840.1.113883.3.526.3.1003"
            active_only: true

  improvement_notation: increase

  calculation_schedule:
    - monthly

  active: true

