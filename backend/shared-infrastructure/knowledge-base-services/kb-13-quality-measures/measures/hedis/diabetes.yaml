# HEDIS Diabetes Measures
# Hemoglobin A1c Control and Comprehensive Diabetes Care

type: measure
measure:
  id: HBD
  version: "2024"
  name: Hemoglobin A1c Control for Patients with Diabetes
  title: HbA1c Control (<8%)
  description: >
    Assesses the percentage of members 18-75 years of age with diabetes (type 1 and type 2)
    who had Hemoglobin A1c (HbA1c) control (<8.0%).

  type: PROCESS
  scoring: proportion
  domain: DIABETES
  program: HEDIS

  nqf_number: "0059"
  cms_number: "CMS122v11"
  hedis_code: HBD

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Members 18-75 years of age with diabetes
      cql_expression: HBD Initial Population
      criteria:
        demographics:
          age_min: 18
          age_max: 75
        conditions:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.103.12.1001"
            time_window: "during measurement period"

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: HBD Denominator

    - id: denominator-exclusion
      type: denominator-exclusion
      description: Members in hospice, with ESRD, or pregnancy
      cql_expression: HBD Denominator Exclusion
      criteria:
        conditions:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.1048"
          - value_set_oid: "2.16.840.1.113883.3.464.1003.109.12.1028"

    - id: numerator
      type: numerator
      description: HbA1c < 8.0%
      cql_expression: HBD Numerator
      criteria:
        lab_results:
          - lab_code: "4548-4"
            operator: "<"
            value: 8.0
            time_window: "during measurement period"

  stratifications:
    - id: age-strat
      description: Age stratification
      components: ["18-44", "45-64", "65-75"]
    - id: control-level
      description: Control level stratification
      components: ["<7%", "<8%", ">9%"]

  improvement_notation: increase

  calculation_schedule:
    - monthly
    - quarterly

  benchmark_ref: HBD

  evidence:
    level: A
    source: American Diabetes Association
    guideline: ADA Standards of Medical Care in Diabetes 2024

  active: true

