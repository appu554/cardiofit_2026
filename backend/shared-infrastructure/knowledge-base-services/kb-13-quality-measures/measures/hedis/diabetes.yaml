type: measure
measure:
  id: CDC-EYE
  version: "2024"
  name: Comprehensive Diabetes Care - Eye Exam
  title: Diabetic Retinal Exam
  description: >
    Assesses the percentage of members 18-75 years of age with diabetes (type 1 and type 2)
    who had a retinal or dilated eye exam.

  type: PROCESS
  scoring: proportion
  domain: DIABETES
  program: HEDIS

  hedis_code: CDC

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Members 18-75 years of age with diabetes
      cql_expression: CDC Eye Exam Initial Population

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: CDC Eye Exam Initial Population

    - id: numerator
      type: numerator
      description: Eye exam performed
      cql_expression: CDC Eye Exam Numerator
      criteria:
        procedures:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.115.12.1088"
            time_window: "during measurement period"

  improvement_notation: increase

  calculation_schedule:
    - monthly
    - quarterly

  active: true

---

type: measure
measure:
  id: KED
  version: "2024"
  name: Kidney Health Evaluation for Patients with Diabetes
  title: Kidney Health Evaluation
  description: >
    Assesses the percentage of members 18-85 years of age with diabetes (type 1 and type 2)
    who received a kidney health evaluation (uACR and eGFR).

  type: PROCESS
  scoring: proportion
  domain: DIABETES
  program: HEDIS

  cms_number: "CMS134v11"
  hedis_code: KED

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Members 18-85 years of age with diabetes
      cql_expression: KED Initial Population
      criteria:
        demographics:
          age_min: 18
          age_max: 85

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: KED Initial Population

    - id: numerator
      type: numerator
      description: Both uACR and eGFR tests performed
      cql_expression: KED Numerator
      criteria:
        lab_results:
          - lab_code: "9318-7"
            time_window: "during measurement period"
          - lab_code: "48642-3"
            time_window: "during measurement period"

  improvement_notation: increase

  calculation_schedule:
    - monthly
    - quarterly

  active: true
