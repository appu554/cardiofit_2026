type: measure
measure:
  id: CMS165
  version: "v11"
  name: Controlling High Blood Pressure
  title: BP Control
  description: >
    Percentage of patients 18-85 years of age who had a diagnosis of hypertension
    overlapping the measurement period and whose most recent blood pressure was
    adequately controlled during the measurement period.

  type: PROCESS
  scoring: proportion
  domain: CARDIOVASCULAR
  program: CMS

  cms_number: "CMS165v11"
  nqf_number: "0018"

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Patients 18-85 with hypertension
      cql_expression: CMS165 Initial Population
      criteria:
        demographics:
          age_min: 18
          age_max: 85
        conditions:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.104.12.1011"

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: CMS165 Denominator

    - id: denominator-exclusion
      type: denominator-exclusion
      description: ESRD, pregnancy, hospice, palliative care
      cql_expression: CMS165 Denominator Exclusion

    - id: numerator
      type: numerator
      description: BP < 140/90 mm Hg
      cql_expression: CMS165 Numerator
      criteria:
        lab_results:
          - lab_code: "8480-6"
            operator: "<"
            value: 140
          - lab_code: "8462-4"
            operator: "<"
            value: 90

  improvement_notation: increase

  calculation_schedule:
    - daily
    - monthly

  evidence:
    level: A
    source: CMS
    guideline: eCQM Specifications

  active: true

