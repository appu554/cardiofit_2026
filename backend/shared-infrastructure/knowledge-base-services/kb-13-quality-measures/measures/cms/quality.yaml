# CMS Quality Measures
# Merit-based Incentive Payment System (MIPS) and eCQM Measures

type: measure
measure:
  id: CMS122
  version: "v11"
  name: Diabetes - Hemoglobin A1c Poor Control (>9%)
  title: HbA1c Poor Control
  description: >
    Percentage of patients 18-75 years of age with diabetes who had hemoglobin A1c > 9.0%
    during the measurement period.

  type: OUTCOME
  scoring: proportion
  domain: DIABETES
  program: CMS

  cms_number: "CMS122v11"
  nqf_number: "0059"

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Patients 18-75 with diabetes
      cql_expression: CMS122 Initial Population
      criteria:
        demographics:
          age_min: 18
          age_max: 75
        conditions:
          - value_set_oid: "2.16.840.1.113883.3.464.1003.103.12.1001"

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: CMS122 Denominator

    - id: denominator-exclusion
      type: denominator-exclusion
      description: Hospice, palliative care
      cql_expression: CMS122 Denominator Exclusion

    - id: numerator
      type: numerator
      description: HbA1c > 9% or no HbA1c test
      cql_expression: CMS122 Numerator
      criteria:
        lab_results:
          - lab_code: "4548-4"
            operator: ">"
            value: 9.0

  improvement_notation: decrease

  calculation_schedule:
    - monthly
    - quarterly

  evidence:
    level: A
    source: CMS
    guideline: eCQM Specifications

  active: true

