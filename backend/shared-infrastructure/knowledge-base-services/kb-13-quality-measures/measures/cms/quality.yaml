type: measure
measure:
  id: CMS2
  version: "v12"
  name: Preventive Care and Screening - Screening for Depression
  title: Depression Screening
  description: >
    Percentage of patients aged 12 years and older screened for depression on the
    date of the encounter or up to 14 days prior to the date of the encounter using
    an age-appropriate standardized depression screening tool.

  type: PROCESS
  scoring: proportion
  domain: BEHAVIORAL_HEALTH
  program: CMS

  cms_number: "CMS2v12"
  nqf_number: "0418"

  measurement_period:
    type: calendar
    duration: P1Y
    anchor: year

  populations:
    - id: initial-population
      type: initial-population
      description: Patients 12+ with qualifying encounter
      cql_expression: CMS2 Initial Population
      criteria:
        demographics:
          age_min: 12

    - id: denominator
      type: denominator
      description: Equals initial population
      cql_expression: CMS2 Denominator

    - id: denominator-exclusion
      type: denominator-exclusion
      description: Bipolar disorder, depression diagnosis, hospice
      cql_expression: CMS2 Denominator Exclusion

    - id: numerator
      type: numerator
      description: Screened for depression with follow-up plan if positive
      cql_expression: CMS2 Numerator

  improvement_notation: increase

  calculation_schedule:
    - monthly

  active: true

