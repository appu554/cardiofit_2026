# Victorian PCW exclusion from S4/S8/S9 administration in residential aged care.
#
# Source: Drugs, Poisons and Controlled Substances Amendment (Medication
# Administration in Residential Aged Care) Act 2025 (Vic).
# Commencement: 1 July 2026. Hard enforcement after 90-day grace period
# (29 September 2026).
#
# Effect: PCWs in Victorian residential aged care facilities may not
# administer S4/S8/S9 medications. Fallback to RN, EN, Pharmacist, or
# Medical practitioner.
authorisation_rule:
  rule_id: "AUS-VIC-PCW-S4-EXCLUSION-2026-07-01"
  jurisdiction: "AU/VIC"
  effective_period:
    start_date: 2026-07-01T00:00:00Z
    end_date: null
    grace_period_days: 90
  applies_to:
    role: "personal_care_worker"
    action_class: "administer"
    medication_schedule:
      - "S4"
      - "S8"
      - "S9"
    medication_class_includes:
      - "antibiotics"
      - "opioid_analgesics"
      - "benzodiazepines"
      - "drugs_of_dependence"
    resident_self_administering: false
  evaluation:
    decision: "denied"
    reason: "Victorian Drugs, Poisons and Controlled Substances Amendment (Medication Administration in Residential Aged Care) Act 2025"
    fallback_required: true
    fallback_eligible_roles:
      - "registered_nurse"
      - "enrolled_nurse"
      - "pharmacist"
      - "medical_practitioner"
  audit:
    legislative_reference: "Drugs, Poisons and Controlled Substances Amendment (Medication Administration in Residential Aged Care) Act 2025 (Vic)"
    source_id: "vic-dpcsa-amend-2025"
    source_version: "as-passed-2025"
    recordkeeping_required: true
    recordkeeping_period_years: 7
