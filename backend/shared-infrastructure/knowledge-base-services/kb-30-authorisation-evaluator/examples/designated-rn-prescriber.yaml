# Designated Registered Nurse Prescriber (DRNP) authority.
#
# Source: NMBA Registration Standard: Endorsement for scheduled medicines —
# designated registered nurse prescriber, effective 30 September 2025.
# Prescribing is partnership-based: a current PrescribingAgreement with an
# authorised medical practitioner must be in place, mentorship must be active
# or complete, and the action's medication class must lie inside the
# agreement's scope.
authorisation_rule:
  rule_id: "AUS-NMBA-DRNP-PRESCRIBING-AGREEMENT-2025-09-30"
  jurisdiction: "AU"
  effective_period:
    start_date: 2025-09-30T00:00:00Z
    end_date: null
  applies_to:
    role: "designated_rn_prescriber"
    action_class: "prescribe"
  evaluation:
    decision: "granted_with_conditions"
    reason: "Designated RN prescribing under partnership model"
    conditions:
      - condition: "valid_prescribing_agreement_in_place"
        check: "PrescribingAgreement.exists_for_person_AND_resident_AND_medication_class"
      - condition: "mentorship_complete_or_active"
        check: "MentorshipStatus IN ['active', 'complete']"
      - condition: "medication_class_in_agreement_scope"
        check: "PrescribingAgreement.scope_includes(medication_class)"
      - condition: "endorsement_current"
        check: "Credential.endorsement_valid_at_action_time"
      - condition: "scope_match"
        check: "Action.scope_matches(PrescribingAgreement.scope)"
    if_any_condition_fails:
      decision: "denied"
      reason: "Designated RN prescribing requirements not met"
  audit:
    legislative_reference: "NMBA Registration Standard: Endorsement for scheduled medicines – designated registered nurse prescriber, effective 30 September 2025"
    source_id: "nmba-drnp-endorsement-2025"
    source_version: "2025-09-30"
    recordkeeping_required: true
    recordkeeping_period_years: 7
