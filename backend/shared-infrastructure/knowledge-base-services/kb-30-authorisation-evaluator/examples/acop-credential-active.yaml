# ACOP-credentialed pharmacist authority to view resident profiles and
# submit recommendations.
#
# Source: Aged Care On-site Pharmacist (ACOP) program. The Pharmacy Board of
# Australia / APC training requirement becomes mandatory from 1 July 2026
# for pharmacists practising under the ACOP funding stream.
authorisation_rule:
  rule_id: "AUS-ACOP-CREDENTIAL-PROFILE-VIEW-2026-07-01"
  jurisdiction: "AU"
  effective_period:
    start_date: 2026-07-01T00:00:00Z
    end_date: null
  applies_to:
    role: "acop_pharmacist"
    action_class: "view_profile"
  evaluation:
    decision: "granted_with_conditions"
    reason: "ACOP pharmacist may view resident profiles when APC training credential is current"
    conditions:
      - condition: "apc_training_credential_current"
        check: "Credential.kind='apc_training' AND Credential.valid_at_action_time"
      - condition: "ahpra_pharmacist_registration_current"
        check: "Credential.kind='ahpra_pharmacist_registration' AND Credential.valid_at_action_time"
    if_any_condition_fails:
      decision: "denied"
      reason: "ACOP pharmacist credential requirements not met"
  audit:
    legislative_reference: "Aged Care On-site Pharmacist program — APC training requirement, effective 1 July 2026"
    source_id: "acop-apc-training-2026"
    source_version: "2026-07-01"
    recordkeeping_required: true
    recordkeeping_period_years: 7
