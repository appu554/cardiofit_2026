# KB-23 Decision Card Template: Monitoring Lapsed
# Triggered when: MonitoringEngagementBatch detects a patient who was
#   actively monitoring home BP (>=7 readings in 28 days) and stopped
#   (0 readings in the last 14 days). The system can't detect masked
#   HTN or BP phenotype changes without home readings — this card
#   surfaces the data gap so the nurse can prompt the patient to
#   resume monitoring before their clinical context changes unobserved.
# Purpose: Close the Patient 18 blind spot from the 20-patient
#   thought experiment. The system can't reason about data it doesn't
#   have, but it CAN detect the absence of data.
# Version: 1.0.0
# Phase: 9 P9-B — Monitoring Engagement Detector

template_id: "dc-monitoring-lapsed-v1"
node_id: "CROSS_NODE"
differential_id: "MONITORING_LAPSED"
version: "1.0.0"
clinical_reviewer: "dr.primary.care.lead"
mcu_gate_default: "SAFE"

card_source: "CLINICAL_SIGNAL"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      HOME BP MONITORING LAPSED: This patient was actively monitoring
      their home blood pressure ({{.PreviousRate}} readings in the prior
      28 days) and has stopped — last reading was {{.DaysSince}} days ago.

      Without home readings, the system cannot detect masked
      hypertension, white-coat effects, or BP phenotype changes.
      Clinical context may have changed unobserved.

      Recommended actions:
        1. Contact the patient to understand why monitoring stopped
           (device issue, travel, lost motivation, health change)
        2. If device issue: verify device accuracy, replace if needed
        3. If motivation: reinforce the clinical importance of home
           monitoring for their specific condition
        4. If health change: schedule an in-person review
        5. Once monitoring resumes, reassess BP classification with
           the new home readings
    action_text_hi: |
      घर पर बीपी निगरानी बंद हो गई: इस रोगी ने अपने घर पर रक्तचाप
      की सक्रिय रूप से निगरानी कर रहे थे और अब बंद कर दी है — अंतिम
      रीडिंग {{.DaysSince}} दिन पहले थी। कृपया रोगी से संपर्क करें।
    rationale_en: |
      Home BP monitoring is the foundation of masked HTN detection,
      white-coat effect identification, and BP phenotype classification.
      When monitoring stops, the clinical decision support system loses
      its primary data source for BP phenotype cards. A patient who was
      actively monitoring and stopped may have experienced a life event
      (hospitalisation, travel, depression) that also affects their
      clinical trajectory — the lapse in monitoring is both a data gap
      and a potential clinical signal.
    guideline_ref: "ESH/ISH 2023 Home BP Monitoring Guidelines"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      MONITORING LAPSED: Patient was actively monitoring home BP
      ({{.PreviousRate}} readings/28d) and has stopped — last reading
      {{.DaysSince}} days ago. Clinical context may have changed
      unobserved. Contact patient to understand the lapse.
    text_hi: |
      निगरानी बंद: रोगी सक्रिय रूप से घर पर बीपी निगरानी कर रहे थे
      ({{.PreviousRate}} रीडिंग/28 दिन) और अब बंद कर दी है — अंतिम
      रीडिंग {{.DaysSince}} दिन पहले।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      We noticed that you haven't taken a home blood pressure reading
      in a while. Your home readings are important — they help your
      care team understand how your blood pressure behaves outside the
      clinic. If your device isn't working or you're having trouble
      with the routine, please let your care team know — they can help.
    text_hi: |
      हमने देखा कि आपने कुछ समय से अपने घर पर रक्तचाप की रीडिंग नहीं
      ली है। आपकी घर की रीडिंग महत्वपूर्ण हैं — वे आपकी देखभाल टीम
      को समझने में मदद करती हैं कि क्लिनिक के बाहर आपका रक्तचाप कैसा
      व्यवहार करता है।
    version: "1.0.0"
