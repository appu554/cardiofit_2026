# Sustained HTN + morning surge card

template_id: "dc-sustained-htn-morning-surge-v1"
node_id: "KB26_BP_CONTEXT"
differential_id: "SUSTAINED_HTN_MORNING_SURGE"
version: "1.0.0"
clinical_reviewer: "dr.bp-context.lead"
mcu_gate_default: "MODIFY"
card_source: "KB26_BP_CONTEXT"
card_type: "SUSTAINED_HTN_MORNING_SURGE"
trigger_event: "BP_CONTEXT_CLASSIFIED"
trigger_condition: "phenotype == SUSTAINED_HTN && morning_surge_compound"
sla_hours: 24
priority: "HIGH"
confidence_tier: "GUIDELINE_CONCORDANT"
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0
recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Consider bedtime dosing of long-acting antihypertensive (chronotherapy)."
    action_text_hi: ""
    rationale_en: "Chronotherapy attenuates morning surge without dose escalation."
    guideline_ref: "Hermida 2020"
    bypasses_confidence_gate: true
    sort_order: 1
  - rec_type: "INVESTIGATION"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Evaluate for obstructive sleep apnea. Strong association exists between exaggerated morning surge and
      sleep-disordered breathing.
    action_text_hi: ""
    rationale_en: "Treating OSA reduces surge amplitude and overall BP burden."
    guideline_ref: "Kario 2019 JACC"
    bypasses_confidence_gate: true
    sort_order: 2
  - rec_type: "MEDICATION_REVIEW"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Prefer 24-hour coverage agents (long-acting ARB or dihydropyridine CCB)."
    action_text_hi: ""
    rationale_en: "Sustained HTN plus surge requires round-the-clock coverage."
    guideline_ref: "ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 3
  - rec_type: "INVESTIGATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Consider 24-hour ABPM to characterise surge amplitude and confirm response."
    action_text_hi: ""
    rationale_en: "ABPM confirms chronotherapy effect and remaining risk."
    guideline_ref: "Kario 2019 JACC"
    bypasses_confidence_gate: true
    sort_order: 4
fragments:
  - fragment_id: "sustained_htn_morning_surge_clinician"
    fragment_type: "CLINICIAN"
    text_en: |
      Clinic BP {{.ClinicSBP}}/{{.ClinicDBP}} mmHg and home mean {{.HomeSBP}}/{{.HomeDBP}} mmHg are both elevated
      with abnormal morning surge (>20 mmHg). Morning surge on top of sustained hypertension significantly
      increases stroke risk during the 06:00-12:00 cardiovascular event window.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
  - fragment_id: "sustained_htn_morning_surge_patient"
    fragment_type: "PATIENT"
    text_en: |
      Your blood pressure is high both in clinic and at home, and it spikes even higher in the morning. That
      combination raises the chance of stroke during early hours. Changing when or which medicines you take can
      lower that risk.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
