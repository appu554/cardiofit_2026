# White coat hypertension card

template_id: "dc-white-coat-hypertension-v1"
node_id: "KB26_BP_CONTEXT"
differential_id: "WHITE_COAT_HYPERTENSION"
version: "1.0.0"
clinical_reviewer: "dr.bp-context.lead"
mcu_gate_default: "OBSERVE"
card_source: "KB26_BP_CONTEXT"
card_type: "WHITE_COAT_HYPERTENSION"
trigger_event: "BP_CONTEXT_CLASSIFIED"
trigger_condition: "phenotype == WHITE_COAT_HTN"
sla_hours: 48
priority: "MODERATE"
confidence_tier: "GUIDELINE_CONCORDANT"
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0
recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Do NOT intensify antihypertensive therapy based on this clinic reading alone. Corroborate with
      structured home or ambulatory monitoring first.
    action_text_hi: ""
    rationale_en: "Clinic-only readings risk overtreatment when white coat effect is present."
    guideline_ref: "ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 1
  - rec_type: "LIFESTYLE"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Continue lifestyle counselling (sodium restriction, exercise, stress reduction) and advise repeat
      HBPM if home mean rises above 135/85 mmHg.
    action_text_hi: ""
    rationale_en: "Lifestyle reinforcement maintains normotension outside clinic visits."
    guideline_ref: "AHA/ACC 2023"
    bypasses_confidence_gate: true
    sort_order: 2
  - rec_type: "INVESTIGATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Consider ABPM if diagnostic uncertainty remains or if clinic BP stays >160 mmHg."
    action_text_hi: ""
    rationale_en: "ABPM helps differentiate persistent hypertension from white coat effect."
    guideline_ref: "ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 3
fragments:
  - fragment_id: "white_coat_hypertension_clinician"
    fragment_type: "CLINICIAN"
    text_en: |
      Clinic BP {{.ClinicSBP}}/{{.ClinicDBP}} mmHg elevated; home mean {{.HomeSBP}}/{{.HomeDBP}} mmHg normal.
      White coat effect: {{.WhiteCoatEffect}} mmHg. Risk of overtreatment: escalating antihypertensives on
      clinic-only readings may cause iatrogenic hypotension. White coat HTN does not carry the same CV risk
      as true sustained HTN.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
  - fragment_id: "white_coat_hypertension_patient"
    fragment_type: "PATIENT"
    text_en: |
      Your blood pressure looked high in clinic but is normal when you check at home. That means your body
      reacts to the clinic setting. Keep tracking readings at home; treatment changes are not needed unless
      home numbers rise.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
