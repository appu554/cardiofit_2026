# Masked uncontrolled hypertension card

template_id: "dc-masked-uncontrolled-v1"
node_id: "KB26_BP_CONTEXT"
differential_id: "MASKED_UNCONTROLLED"
version: "1.0.0"
clinical_reviewer: "dr.bp-context.lead"
mcu_gate_default: "MODIFY"
card_source: "KB26_BP_CONTEXT"
card_type: "MASKED_UNCONTROLLED"
trigger_event: "BP_CONTEXT_CLASSIFIED"
trigger_condition: "phenotype == MASKED_UNCONTROLLED"
sla_hours: 24
priority: "HIGH"
confidence_tier: "GUIDELINE_CONCORDANT"
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0
recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Review the current antihypertensive regimen. Dose adjustment or additional agents are likely
      required because home BP remains uncontrolled while clinic BP appears normal.
    action_text_hi: ""
    rationale_en: "Masked uncontrolled hypertension indicates therapy failure outside clinic supervision."
    guideline_ref: "ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 1
  - rec_type: "ADHERENCE_CHECK"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Compare dosing schedule vs home readings to confirm adherence. Discuss barriers and ensure
      once-daily agents cover the nocturnal window.
    action_text_hi: ""
    rationale_en: "Adherence gaps frequently explain controlled clinic BP yet uncontrolled home BP."
    guideline_ref: "AHA/ACC 2023"
    bypasses_confidence_gate: true
    sort_order: 2
  - rec_type: "INVESTIGATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Consider ambulatory BP monitoring (ABPM) to quantify 24-hour burden before escalation."
    action_text_hi: ""
    rationale_en: "ABPM distinguishes persistent home elevation from episodic spikes."
    guideline_ref: "ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 3
fragments:
  - fragment_id: "masked_uncontrolled_clinician"
    fragment_type: "CLINICIAN"
    text_en: |
      Patient is controlled in clinic but not at home. Clinic BP {{.ClinicSBP}}/{{.ClinicDBP}} mmHg; home mean
      {{.HomeSBP}}/{{.HomeDBP}} mmHg.{{.CKDNote}} Treatment intensification is required in the home environment.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
  - fragment_id: "masked_uncontrolled_patient"
    fragment_type: "PATIENT"
    text_en: |
      Your blood pressure looks ok in clinic but the readings you take at home are still high. That means the
      current medicines are not lasting long enough or doses need adjustment. Share consistent home readings so
      the care team can retune your regimen.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
