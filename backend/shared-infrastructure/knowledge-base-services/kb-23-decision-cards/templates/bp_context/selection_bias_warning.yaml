# Selection bias warning card

template_id: "dc-selection-bias-warning-v1"
node_id: "KB26_BP_CONTEXT"
differential_id: "SELECTION_BIAS_WARNING"
version: "1.0.0"
clinical_reviewer: "dr.bp-context.lead"
mcu_gate_default: "OBSERVE"
card_source: "KB26_BP_CONTEXT"
card_type: "SELECTION_BIAS_WARNING"
trigger_event: "BP_CONTEXT_CLASSIFIED"
trigger_condition: "selection_bias_risk == true"
sla_hours: 72
priority: "ROUTINE"
confidence_tier: "UNCERTAIN"
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0
recommendations:
  - rec_type: "PATIENT_EDUCATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Discuss structured home monitoring protocol (morning and evening readings for 7 consecutive days) and
      ensure the device is validated against clinic equipment.
    action_text_hi: ""
    rationale_en: "Structured HBPM reduces selection bias from crisis-only or avoidant measurement behaviour."
    guideline_ref: "ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 1
  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Do not change therapy based on this classification alone; repeat structured HBPM first."
    action_text_hi: ""
    rationale_en: "Low confidence classification should not drive medication changes."
    guideline_ref: "AHA/ACC 2023"
    bypasses_confidence_gate: true
    sort_order: 2
fragments:
  - fragment_id: "selection_bias_warning_clinician"
    fragment_type: "CLINICIAN"
    text_en: |
      Home BP classification has LOW confidence due to potential selection bias. {{.EngagementDetail}}{{.ReadingDetail}}
      Patients who measure only when symptomatic produce systematically higher readings; measurement-avoidant
      patients produce systematically lower readings. Both distort the clinic-home discordance analysis.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
  - fragment_id: "selection_bias_warning_patient"
    fragment_type: "PATIENT"
    text_en: |
      The readings available may not represent your usual days. Please follow a structured schedule: take two
      readings in the morning and two in the evening for seven days. That gives your care team a reliable view.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
