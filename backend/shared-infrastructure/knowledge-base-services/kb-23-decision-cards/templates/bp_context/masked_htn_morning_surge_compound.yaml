# Masked HTN + morning surge compound card

template_id: "dc-masked-htn-morning-surge-compound-v1"
node_id: "KB26_BP_CONTEXT"
differential_id: "MASKED_HTN_MORNING_SURGE"
version: "1.0.0"
clinical_reviewer: "dr.bp-context.lead"
mcu_gate_default: "HALT"
card_source: "KB26_BP_CONTEXT"
card_type: "MASKED_HTN_MORNING_SURGE_COMPOUND"
trigger_event: "BP_CONTEXT_CLASSIFIED"
trigger_condition: "phenotype in (MASKED_HTN, MASKED_UNCONTROLLED) && morning_surge_compound"
sla_hours: 12
priority: "CRITICAL"
confidence_tier: "GUIDELINE_CONCORDANT"
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0
recommendations:
  - rec_type: "INVESTIGATION"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: "Order 24-hour ABPM to characterise morning surge amplitude and duration."
    action_text_hi: ""
    rationale_en: "ABPM quantifies compounded risk of masked HTN plus exaggerated morning surge."
    guideline_ref: "Kario 2019 JACC"
    bypasses_confidence_gate: true
    sort_order: 1
  - rec_type: "MEDICATION_REVIEW"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: "Review medication timing; consider evening or bedtime dosing of long-acting agent."
    action_text_hi: ""
    rationale_en: "Chronotherapy blunts morning hyperactivity without additional agents."
    guideline_ref: "Hermida 2020"
    bypasses_confidence_gate: true
    sort_order: 2
  - rec_type: "CONSULT"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: "Urgent cardiology consult if home SBP >160 mmHg during 06:00-12:00 window."
    action_text_hi: ""
    rationale_en: "Peak event window coincides with uncontrolled BP; specialist input recommended."
    guideline_ref: "Kario 2019 JACC"
    bypasses_confidence_gate: true
    sort_order: 3
fragments:
  - fragment_id: "masked_htn_morning_surge_clinician"
    fragment_type: "CLINICIAN"
    text_en: |
      Clinic BP {{.ClinicSBP}}/{{.ClinicDBP}} mmHg; home mean {{.HomeSBP}}/{{.HomeDBP}} mmHg with confirmed
      morning surge compound pattern. Combined risk exceeds either condition alone; 06:00-12:00 window aligns
      with uncontrolled period.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
  - fragment_id: "masked_htn_morning_surge_patient"
    fragment_type: "PATIENT"
    text_en: |
      Your home readings rise sharply in the morning even though clinic readings look better. That morning surge
      plus hidden hypertension raises the chance of stroke or heart attack. Medication timing changes are needed
      quickly.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
