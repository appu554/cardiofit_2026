# White coat uncontrolled card

template_id: "dc-white-coat-uncontrolled-v1"
node_id: "KB26_BP_CONTEXT"
differential_id: "WHITE_COAT_UNCONTROLLED"
version: "1.0.0"
clinical_reviewer: "dr.bp-context.lead"
mcu_gate_default: "OBSERVE"
card_source: "KB26_BP_CONTEXT"
card_type: "WHITE_COAT_UNCONTROLLED"
trigger_event: "BP_CONTEXT_CLASSIFIED"
trigger_condition: "phenotype == WHITE_COAT_UNCONTROLLED"
sla_hours: 48
priority: "MODERATE"
confidence_tier: "GUIDELINE_CONCORDANT"
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0
recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Do NOT escalate therapy based on clinic readings alone. Consider reducing dose if patient reports
      symptomatic hypotension despite controlled home BP.
    action_text_hi: ""
    rationale_en: "Therapy is already adequate outside the clinic; escalation risks harm."
    guideline_ref: "ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 1
  - rec_type: "LIFESTYLE"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Reinforce home monitoring cadence and document white coat effect in the chart so future clinicians
      avoid overtreatment.
    action_text_hi: ""
    rationale_en: "Documentation prevents repeated unnecessary escalation attempts."
    guideline_ref: "AHA/ACC 2023"
    bypasses_confidence_gate: true
    sort_order: 2
fragments:
  - fragment_id: "white_coat_uncontrolled_clinician"
    fragment_type: "CLINICIAN"
    text_en: |
      Patient on antihypertensive therapy. Clinic BP {{.ClinicSBP}}/{{.ClinicDBP}} mmHg elevated; home mean
      {{.HomeSBP}}/{{.HomeDBP}} mmHg normal. White coat effect: {{.WhiteCoatEffect}} mmHg. Home readings
      confirm treatment is adequate; clinic elevation reflects environment, not failure.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
  - fragment_id: "white_coat_uncontrolled_patient"
    fragment_type: "PATIENT"
    text_en: |
      Your medicines are working at home even though clinic readings look high. Do not change doses without
      guidance. Keep taking readings morning and evening so your care team can confirm control.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
