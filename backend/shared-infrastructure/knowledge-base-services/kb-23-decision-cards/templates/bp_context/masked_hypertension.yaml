# Masked hypertension core card

template_id: "dc-masked-hypertension-v1"
node_id: "KB26_BP_CONTEXT"
differential_id: "MASKED_HYPERTENSION"
version: "1.0.0"
clinical_reviewer: "dr.bp-context.lead"
mcu_gate_default: "MODIFY"
card_source: "KB26_BP_CONTEXT"
card_type: "MASKED_HYPERTENSION"
trigger_event: "BP_CONTEXT_CLASSIFIED"
trigger_condition: "phenotype == MASKED_HTN"
sla_hours: 24
priority: "HIGH"
confidence_tier: "GUIDELINE_CONCORDANT"
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0
recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Do not rely on clinic BP alone. Initiate or intensify antihypertensive therapy so that
      home BP returns below 130/80 mmHg. Evaluate regimen adequacy and titrate as needed.
    action_text_hi: ""
    rationale_en: "Guidelines recommend treating masked hypertension as sustained hypertension once confirmed."
    guideline_ref: "AHA/ACC 2023; ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 1
  - rec_type: "INVESTIGATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Assess end-organ impact: renal function, retinopathy, LVH, and morning surge burden. Document
      structured home monitoring technique and device validation status.
    action_text_hi: ""
    rationale_en: "Masked hypertension is associated with silent organ damage that is missed in clinic recordings."
    guideline_ref: "ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 2
fragments:
  - fragment_id: "masked_hypertension_clinician"
    fragment_type: "CLINICIAN"
    text_en: |
      Clinic BP {{.ClinicSBP}}/{{.ClinicDBP}} mmHg (normal) but home mean {{.HomeSBP}} mmHg (elevated).
      Home BP exceeds clinic by {{.GapSBP}} mmHg. Masked hypertension carries higher CV risk than
      sustained hypertension because treatment is deferred.{{.RiskMultiplier}}
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
  - fragment_id: "masked_hypertension_patient"
    fragment_type: "PATIENT"
    text_en: |
      Your clinic readings look normal but the readings you take at home are higher. That means your
      treatment plan probably needs to change even if clinic visits look fine. Consistent home readings
      help your care team adjust medicines safely.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
