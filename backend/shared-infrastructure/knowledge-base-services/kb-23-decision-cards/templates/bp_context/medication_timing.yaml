# Medication timing opportunity card

template_id: "dc-medication-timing-v1"
node_id: "KB26_BP_CONTEXT"
differential_id: "MEDICATION_TIMING"
version: "1.0.0"
clinical_reviewer: "dr.bp-context.lead"
mcu_gate_default: "MODIFY"
card_source: "KB26_BP_CONTEXT"
card_type: "MEDICATION_TIMING"
trigger_event: "BP_CONTEXT_CLASSIFIED"
trigger_condition: "medication_timing_hypothesis != '' && on_antihypertensives"
sla_hours: 72
priority: "ROUTINE"
confidence_tier: "GUIDELINE_CONCORDANT"
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0
recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Consider switching once-daily agent to evening dosing based on BP chronotherapy evidence."
    action_text_hi: ""
    rationale_en: "Chronotherapy can reduce 24-hour BP burden without adding drugs."
    guideline_ref: "Hermida 2020"
    bypasses_confidence_gate: true
    sort_order: 1
  - rec_type: "INVESTIGATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Reassess home BP after 4 weeks of timing change before escalating dose."
    action_text_hi: ""
    rationale_en: "Response to timing change should be confirmed before dose increase."
    guideline_ref: "AHA/ACC 2023"
    bypasses_confidence_gate: true
    sort_order: 2
  - rec_type: "INVESTIGATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Order ABPM post-change if circadian pattern needs confirmation."
    action_text_hi: ""
    rationale_en: "ABPM verifies that the new schedule covers morning surge."
    guideline_ref: "ESH 2023"
    bypasses_confidence_gate: true
    sort_order: 3
fragments:
  - fragment_id: "medication_timing_clinician"
    fragment_type: "CLINICIAN"
    text_en: |
      BP pattern suggests suboptimal medication timing. {{.MedicationHypothesis}} Chronotherapy can reduce
      24-hour BP burden without adding agents.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
  - fragment_id: "medication_timing_patient"
    fragment_type: "PATIENT"
    text_en: |
      Your readings show that blood pressure rises at certain times of day. Taking medicine at a different time
      may control it better without adding more pills. Follow the new schedule and record readings for 4 weeks.
    text_hi: ""
    reading_level_validated: false
    version: "1.0.0"
