# KB-23 Decision Card Template: Atrial Fibrillation (new onset)
# Node: P05 (Palpitations), Differential: ATRIAL_FIBRILLATION
# Version: 1.0.0

template_id: "dc-p05-afib-v1"
node_id: "P05"
differential_id: "ATRIAL_FIBRILLATION"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.lead"
mcu_gate_default: "SAFE"

confidence_thresholds:
  firm_posterior: 0.75
  firm_medication_change: 0.82
  probable_posterior: 0.50
  possible_posterior: 0.25

recommendations:
  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Assess haemodynamic stability. If unstable, prepare for cardioversion. Calculate CHA2DS2-VASc score for anticoagulation decision."
    action_text_hi: "हेमोडायनामिक स्थिरता का आकलन करें। यदि अस्थिर हो, तो कार्डियोवर्जन की तैयारी करें। थक्कारोधी निर्णय के लिए CHA2DS2-VASc स्कोर की गणना करें।"
    rationale_en: "New-onset AF requires urgent rhythm assessment. Anticoagulation decision based on stroke risk stratification."
    guideline_ref: "ESC 2020 AF Guidelines, Class I"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    trigger_condition_en: "Irregularly irregular rhythm on ECG/telemetry with absence of P-waves"
    trigger_condition_hi: "P-तरंगों की अनुपस्थिति के साथ ECG/टेलीमेट्री पर अनियमित रूप से अनियमित लय"
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Continuous telemetry. Blood glucose every 6 hours (stress response may cause hyperglycaemia). TSH if not recently checked."
    action_text_hi: "निरंतर टेलीमेट्री। हर 6 घंटे रक्त शर्करा (तनाव प्रतिक्रिया से हाइपरग्लाइसेमिया हो सकता है)। यदि हाल ही में जांच नहीं हुई तो TSH।"
    rationale_en: "AF may be triggered by thyrotoxicosis. Stress hyperglycaemia common in acute arrhythmias."
    guideline_ref: "ESC 2020 AF Guidelines"
    confidence_tier_required: "POSSIBLE"
    bypasses_confidence_gate: false
    sort_order: 2

  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Review current diabetic medications for QTc-prolonging potential. No V-MCU changes needed unless haemodynamically unstable."
    action_text_hi: "QTc-विस्तार क्षमता के लिए वर्तमान मधुमेह दवाओं की समीक्षा करें। हेमोडायनामिक रूप से अस्थिर न हो तो V-MCU परिवर्तन की आवश्यकता नहीं।"
    rationale_en: "Stable AF does not require V-MCU modification. QTc review important if starting antiarrhythmics."
    guideline_ref: "ADA Standards 2024"
    confidence_tier_required: "PROBABLE"
    bypasses_confidence_gate: false
    sort_order: 3

fragments:
  - fragment_id: "frag-p05-afib-clinician"
    fragment_type: "CLINICIAN"
    text_en: "New-onset atrial fibrillation detected. Haemodynamic assessment and CHA2DS2-VASc scoring recommended. V-MCU insulin titration unchanged unless instability develops."
    text_hi: "नवीन अलिंद तंतुविकसन का पता चला। हेमोडायनामिक मूल्यांकन और CHA2DS2-VASc स्कोरिंग अनुशंसित।"
    version: "1.0.0"

  - fragment_id: "frag-p05-afib-patient"
    fragment_type: "PATIENT"
    text_en: "Your heart rhythm is irregular, which is called atrial fibrillation. We are monitoring you closely. Your insulin pump settings do not need changes right now, but we will adjust if needed."
    text_hi: "आपकी हृदय गति अनियमित है, जिसे अलिंद तंतुविकसन कहते हैं। हम आपकी बारीकी से निगरानी कर रहे हैं।"
    patient_advocate_reviewed_by: "patient.advocate.lead"
    reading_level_validated: true
    version: "1.0.0"

  - fragment_id: "frag-p05-afib-safety"
    fragment_type: "SAFETY_INSTRUCTION"
    text_en: "Tell your nurse immediately if you feel your heart racing, chest pain, or dizziness. Continue taking your diabetes medicines as normal unless told otherwise."
    text_hi: "यदि आपको दिल की धड़कन तेज, सीने में दर्द या चक्कर आए तो तुरंत अपनी नर्स को बताएं।"
    patient_advocate_reviewed_by: "patient.advocate.lead"
    reading_level_validated: true
    version: "1.0.0"

gate_rules:
  - condition: "ACUTE_ILLNESS"
    gate: "MODIFY"
    rationale: "Haemodynamically unstable AF requires conservative V-MCU targets."
    adjustment_notes: "Reduce basal by 20%. Widen glucose target to 140-200mg/dL."

  - condition: "ALWAYS"
    gate: "SAFE"
    rationale: "Stable new-onset AF does not require V-MCU modification."
