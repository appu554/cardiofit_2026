# KB-23 Decision Card Template: Acute Decompensated Heart Failure
# Node: P02 (Dyspnea), Differential: HEART_FAILURE_ACUTE
# Version: 1.0.0

template_id: "dc-p02-hf-acute-v1"
node_id: "P02"
differential_id: "HEART_FAILURE_ACUTE"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.lead"
mcu_gate_default: "MODIFY"

confidence_thresholds:
  firm_posterior: 0.75
  firm_medication_change: 0.82
  probable_posterior: 0.50
  possible_posterior: 0.25

recommendations:
  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: "Hold metformin if eGFR <30 or acute kidney injury suspected. Withhold SGLT2 inhibitor if volume depleted. Monitor fluid balance and daily weights."
    action_text_hi: "यदि eGFR <30 या तीव्र गुर्दे की चोट का संदेह हो तो मेटफॉर्मिन रोकें। यदि मात्रा कम हो तो SGLT2 अवरोधक रोकें। द्रव संतुलन और दैनिक वजन की निगरानी करें।"
    rationale_en: "Metformin contraindicated with significant renal impairment. SGLT2i may worsen hypovolaemia in acute decompensation."
    guideline_ref: "ESC 2021 Heart Failure Guidelines, Section 11.4"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    trigger_condition_en: "Signs of fluid overload with BNP >400 pg/mL or NT-proBNP >1800 pg/mL"
    trigger_condition_hi: "BNP >400 pg/mL या NT-proBNP >1800 pg/mL के साथ द्रव अधिभार के संकेत"
    sort_order: 1

  - rec_type: "MEDICATION_MODIFY"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Reduce V-MCU basal rate by 40%. Set glucose target 140-200mg/dL. Suspend correction boluses until euvolaemic state confirmed."
    action_text_hi: "V-MCU बेसल दर 40% कम करें। ग्लूकोज लक्ष्य 140-200mg/dL सेट करें। यूवोलेमिक स्थिति की पुष्टि होने तक सुधार बोलस निलंबित करें।"
    rationale_en: "Fluid shifts in acute HF affect insulin pharmacokinetics. Conservative glycaemic targets reduce hypoglycaemia risk during diuresis."
    guideline_ref: "ADA Standards of Care 2024, Section 16.3"
    confidence_tier_required: "FIRM"
    bypasses_confidence_gate: false
    sort_order: 2

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Blood glucose every 4 hours. Daily renal function panel. BNP trend at 24h and 48h. Continuous pulse oximetry."
    action_text_hi: "हर 4 घंटे रक्त शर्करा। दैनिक गुर्दा कार्य पैनल। 24h और 48h पर BNP प्रवृत्ति। निरंतर पल्स ऑक्सीमेट्री।"
    rationale_en: "Renal function monitoring critical during diuresis. Glucose variability expected during acute HF management."
    guideline_ref: "ESC 2021 Heart Failure Guidelines"
    confidence_tier_required: "POSSIBLE"
    bypasses_confidence_gate: false
    sort_order: 3

  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Review SGLT2 inhibitor candidacy post-stabilisation. Empagliflozin/dapagliflozin indicated for HFrEF if eGFR >20. Restart when euvolaemic."
    action_text_hi: "स्थिरीकरण के बाद SGLT2 अवरोधक उम्मीदवारी की समीक्षा करें। यदि eGFR >20 हो तो HFrEF के लिए एम्पाग्लिफ्लोज़िन/डापाग्लिफ्लोज़िन संकेत।"
    rationale_en: "SGLT2i have mortality benefit in HFrEF. Should be restarted once haemodynamically stable."
    guideline_ref: "EMPEROR-Reduced, DAPA-HF trials"
    confidence_tier_required: "PROBABLE"
    bypasses_confidence_gate: false
    sort_order: 4

fragments:
  - fragment_id: "frag-p02-hf-clinician"
    fragment_type: "CLINICIAN"
    text_en: "Acute decompensated heart failure identified. V-MCU insulin titration modified to conservative targets. Metformin/SGLT2i status under review pending renal function."
    text_hi: "तीव्र विघटित हृदय विफलता की पहचान। V-MCU इंसुलिन अनुमापन रूढ़िवादी लक्ष्यों में संशोधित। गुर्दे की कार्यक्षमता लंबित मेटफॉर्मिन/SGLT2i स्थिति समीक्षा अधीन।"
    version: "1.0.0"

  - fragment_id: "frag-p02-hf-patient"
    fragment_type: "PATIENT"
    text_en: "Your heart is not pumping as strongly as normal, causing fluid to build up. We are adjusting your insulin pump to be gentler and checking your kidneys carefully. Some diabetes medicines may be paused temporarily."
    text_hi: "आपका हृदय सामान्य रूप से जोर से पंप नहीं कर रहा है, जिससे तरल पदार्थ जमा हो रहा है। हम आपके इंसुलिन पंप को सौम्य बनाने के लिए समायोजित कर रहे हैं।"
    patient_advocate_reviewed_by: "patient.advocate.lead"
    reading_level_validated: true
    version: "1.0.0"

  - fragment_id: "frag-p02-hf-safety"
    fragment_type: "SAFETY_INSTRUCTION"
    text_en: "Report any sudden weight gain of more than 2kg in 24 hours. Check blood sugar before each meal. Do not take metformin if you feel very nauseous or have stomach pain."
    text_hi: "24 घंटे में 2kg से अधिक अचानक वजन बढ़ने की रिपोर्ट करें। प्रत्येक भोजन से पहले रक्त शर्करा जांचें।"
    patient_advocate_reviewed_by: "patient.advocate.lead"
    reading_level_validated: true
    guideline_ref: "ESC 2021 HF Guidelines"
    version: "1.0.0"

gate_rules:
  - condition: "ACUTE_ILLNESS"
    gate: "PAUSE"
    rationale: "Acute decompensation with haemodynamic instability requires pausing V-MCU titration."

  - condition: "EGFR_LOW"
    gate: "PAUSE"
    rationale: "eGFR <30 in acute HF: high risk of lactic acidosis and hypoglycaemia."

  - condition: "ALWAYS"
    gate: "MODIFY"
    rationale: "Stable acute HF requires conservative V-MCU targets."
    adjustment_notes: "Reduce basal by 40%. Disable correction boluses. Target 140-200mg/dL."
