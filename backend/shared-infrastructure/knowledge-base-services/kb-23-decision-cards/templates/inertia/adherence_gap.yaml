# KB-23 Decision Card Template: Adherence Gap (Inertia Suppressed)
# Triggered when: InertiaOrchestrator.Evaluate detects an uncontrolled
#   domain AND the patient's EngagementStatus is DISENGAGED or
#   EngagementComposite < 0.4. Instead of generating an INERTIA_DETECTED
#   card (which would recommend therapy escalation), the orchestrator
#   generates this ADHERENCE_GAP card (which recommends adherence
#   assessment). The detector is skipped entirely — no inertia verdict
#   is produced.
# Purpose: Prevent false-positive inertia cards when the target gap is
#   driven by non-adherence, not by insufficient therapy. Recommending
#   therapy escalation to a non-adherent patient is clinically wrong
#   and wastes the escalation opportunity. The correct action is
#   structured adherence assessment, barrier identification, and
#   support — not another prescription.
# Version: 1.0.0
# Phase: 9 P9-A — Adherence-Exclusion Branch

template_id: "dc-adherence-gap-v1"
node_id: "CROSS_NODE"
differential_id: "ADHERENCE_GAP"
version: "1.0.0"
clinical_reviewer: "dr.behavioral.health.lead"
mcu_gate_default: "SAFE"

card_source: "CLINICAL_SIGNAL"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "INVESTIGATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      ADHERENCE ASSESSMENT RECOMMENDED: The clinical target in the
      flagged domain is unmet, but the patient's engagement profile
      suggests non-adherence rather than insufficient therapy. Before
      escalating medication, conduct a structured adherence assessment:
        1. Review pharmacy refill records or pill count
        2. Ask about barriers (cost, side effects, complexity, forgetfulness)
        3. Check home monitoring frequency and timing patterns
        4. Consider simplified regimen (once-daily, combination pills)
      Escalation is appropriate only after confirming the patient is
      taking the current regimen as prescribed and the target is still
      unmet.
    action_text_hi: |
      पालन मूल्यांकन अनुशंसित: नैदानिक लक्ष्य अपूर्ण है, लेकिन
      मरीज़ की सहभागिता प्रोफ़ाइल अपर्याप्त चिकित्सा के बजाय
      गैर-पालन का सुझाव देती है। दवा बढ़ाने से पहले पालन मूल्यांकन
      करें।
    rationale_en: |
      Therapeutic escalation in the setting of non-adherence is the
      second most common prescribing error in chronic disease management
      (after therapeutic inertia itself). If the patient is taking
      metformin 3 days out of 7, adding a second agent will not improve
      control — it will add cost, complexity, and side-effect risk
      without clinical benefit. The adherence-first approach is
      endorsed by ADA SOC 2025 Section 4 and WHO Adherence Framework.
    guideline_ref: "ADA SOC 2025 §4; WHO Adherence to Long-Term Therapies 2003"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      ADHERENCE GAP ({{.Domain}}): Clinical target unmet but engagement
      profile indicates {{.Pattern}} — likely adherence-driven, not
      therapy-failure-driven. Assess adherence before escalating.
    text_hi: |
      पालन अंतराल ({{.Domain}}): नैदानिक लक्ष्य अपूर्ण लेकिन
      सहभागिता प्रोफ़ाइल गैर-पालन दर्शाती है।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your care team has noticed that one of your health targets is
      not being met. Before making changes to your medications, they
      would like to understand how you are taking your current
      medicines. Please bring your medication bottles to your next
      visit, or speak with your pharmacist about a medication review.
      There may be simple changes (like switching to a once-daily
      pill) that make your treatment easier to follow.
    text_hi: |
      आपकी देखभाल टीम ने देखा है कि आपका एक स्वास्थ्य लक्ष्य पूरा
      नहीं हो रहा है। दवाओं में बदलाव करने से पहले, वे समझना चाहते
      हैं कि आप अपनी वर्तमान दवाएं कैसे ले रहे हैं।
    version: "1.0.0"
