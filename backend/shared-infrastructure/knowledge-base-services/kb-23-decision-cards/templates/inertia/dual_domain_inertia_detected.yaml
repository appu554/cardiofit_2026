# KB-23 Decision Card Template: Dual-Domain Therapeutic Inertia
# Triggered when: InertiaOrchestrator.Evaluate detects inertia verdicts
#   in 2 or more clinical domains for the same patient in the same week.
#   This is the composite signal: a patient uncontrolled across multiple
#   axes carries materially higher CV/renal risk than any single-domain
#   inertia, and the clinical intervention differs (combined escalation
#   review rather than domain-specific dose change).
# Purpose: Surface the composite pattern as a distinct card so it is
#   not lost in the per-domain card stream. Urgency is Immediate.
# Version: 1.0.0
# Phase: 7 P7-D — Inertia Weekly Batch Activation

template_id: "dc-dual-domain-inertia-detected-v1"
node_id: "CROSS_NODE"
differential_id: "DUAL_DOMAIN_INERTIA_DETECTED"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.hf.lead"
mcu_gate_default: "MODIFY"

card_source: "CLINICAL_SIGNAL"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "REFERRAL"
    urgency: "URGENT"
    target: "specialist"
    action_text_en: |
      DUAL-DOMAIN INERTIA: The patient is uncontrolled across
      {{.DomainCount}} therapeutic domains ({{.DetectedDomains}})
      simultaneously. This is a composite signal that warrants a
      structured multi-domain review rather than piecemeal titration.
      Options: (1) an integrated-care visit covering all flagged
      domains, (2) referral to an HF / CKD / endocrinology specialist
      if the combination suggests a unifying diagnosis, (3) deploy
      dual-benefit agents (SGLT2i for glycaemic + renal + hemodynamic,
      GLP1-RA for glycaemic + hemodynamic) which address multiple
      axes with one prescription change.
    action_text_hi: |
      दोहरी क्षेत्र जड़ता: {{.DomainCount}} चिकित्सीय क्षेत्रों
      ({{.DetectedDomains}}) में एक साथ अनियंत्रित।
    rationale_en: |
      Multi-domain inertia carries a supra-additive risk profile
      compared to sum of single-domain inertia — the domains interact
      (e.g. uncontrolled glycaemic + hemodynamic accelerates
      diabetic nephropathy). A combined review outperforms sequential
      single-domain visits both clinically and logistically.
    guideline_ref: "Ndumele et al. Circulation 2023 (CKM consensus); ADA SOC 2025 §9"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MEDICATION_MODIFY"
    urgency: "URGENT"
    target: "dual_benefit_agent"
    action_text_en: |
      Consider a dual-benefit agent that addresses multiple flagged
      domains in one prescription change:
        - SGLT2 inhibitor: glycaemic + renal + mild hemodynamic
        - GLP1 receptor agonist: glycaemic + hemodynamic
        - Finerenone: renal + (limited) hemodynamic
      Pick the agent whose primary benefit domain is the most severe
      of the flagged set, then verify that the secondary domains also
      tolerate it (renal thresholds, cardiac contraindications).
    action_text_hi: |
      दोहरे लाभ वाली दवा पर विचार करें।
    rationale_en: |
      Single-prescription multi-domain coverage reduces pill burden,
      improves adherence, and closes multiple inertia clocks at once.
    guideline_ref: "ADA SOC 2025 §9; KDIGO 2024 §3.1"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      DUAL-DOMAIN INERTIA: {{.DomainCount}} domains uncontrolled
      simultaneously ({{.DetectedDomains}}). Schedule a combined
      review and consider a dual-benefit agent (SGLT2i, GLP1-RA,
      or finerenone) as the single-change option.
    text_hi: |
      दोहरी क्षेत्र जड़ता: {{.DomainCount}} क्षेत्र ({{.DetectedDomains}})।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Several of your health targets have been off-track at the same
      time. Your care team is planning a combined review to update
      your treatment — a single medication change may help with more
      than one target at once.
    text_hi: |
      आपके कई स्वास्थ्य लक्ष्य एक साथ असफल हो रहे हैं। आपकी देखभाल
      टीम संयुक्त समीक्षा की योजना बना रही है।
    version: "1.0.0"
