# KB-23 Decision Card Template: MRI Deterioration
# Triggered when: MRI_DETERIORATION event fires and MRI category crosses into
#                 MODERATE_DETERIORATION or HIGH_DETERIORATION.
# Published by: KB-26 MRIEventPublisher (notifyKB23) on worsening category boundary.
# Purpose: Initiate medication review (HIGH) or lifestyle intensification (MODERATE)
#          per MRI specification §7, Table 8.
# Version: 1.0.0

template_id: "MRI_DETERIORATION_01"
differential_id: "MRI_DETERIORATION"
node_id: "MRI-01"
version: "1.0.0"
clinical_reviewer: "dr.metabolic.lead"
mcu_gate_default: "MODIFY"

# Card generated directly by KB-26; not through KB-22 HPI pathway.
card_source: "KB26_MRI_EVENT"
card_type: "METABOLIC_REVIEW"

# HIGH_DETERIORATION (MRI >75): 24h clinician review
# MODERATE_DETERIORATION (MRI 51-75): 72h review
sla_hours: 24
priority: "HIGH"

# Confidence: score-derived from validated MRI algorithm — always FIRM
# when a boundary-crossing event is published.
confidence_tier: "GUIDELINE_CONCORDANT"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: |
      MRI High Deterioration: MRI score {{score}} ({{category}}). Mandatory medication
      review per MRI specification §7.

      Primary driver domain: {{top_driver}}
      MRI trend: {{trend}}

      Recommended actions:
        - Review current medications for metabolic interaction with primary driver domain
        - Assess whether titration velocity should be adjusted given MRI trajectory
        - If diabetes medications: review glycaemic targets and intensification readiness
        - If antihypertensives: verify BP control is adequate before metabolic escalation
        - Document medication review outcome within 24 hours
        - V-MCU gate set to MODIFY pending clinician review
    action_text_hi: |
      MRI उच्च गिरावट: MRI स्कोर {{score}} ({{category}})। MRI विशिष्टता §7 के
      अनुसार अनिवार्य दवा समीक्षा।

      प्राथमिक ड्राइवर डोमेन: {{top_driver}}
      MRI प्रवृत्ति: {{trend}}

      अनुशंसित कार्रवाई:
        - प्राथमिक ड्राइवर डोमेन के साथ चयापचय इंटरैक्शन के लिए वर्तमान दवाओं की समीक्षा करें
        - MRI प्रक्षेप पथ को देखते हुए अनुमापन वेग समायोजित करने पर विचार करें
        - यदि मधुमेह की दवाएं: ग्लाइसेमिक लक्ष्यों और तीव्रीकरण की तत्परता की समीक्षा करें
        - यदि उच्चरक्तचापरोधी: चयापचय वृद्धि से पहले BP नियंत्रण पर्याप्त सत्यापित करें
        - 24 घंटे के भीतर दवा समीक्षा परिणाम दस्तावेज़ करें
        - V-MCU गेट क्लीनिशियन समीक्षा लंबित MODIFY पर सेट है
    rationale_en: "MRI >75 indicates high metabolic deterioration requiring mandatory medication review per MRI specification §7, Table 8. V-MCU gate is set to MODIFY to prevent unreviewed titration escalation."
    guideline_ref: "MRI Specification §7, Table 8; Vaidshala Metabolic Digital Twin Specification v1.0"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    condition_criteria:
      mri_category: "HIGH_DETERIORATION"
    sort_order: 1

  - rec_type: "LIFESTYLE"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      MRI Moderate Deterioration: MRI score {{score}} ({{category}}).
      Lifestyle intervention intensification indicated.

      Primary driver domain: {{top_driver}}
      MRI trend: {{trend}}

      Recommended actions:
        - Intensify lifestyle intervention targeting primary driver domain ({{top_driver}})
        - Review dietary adherence, physical activity, and sleep patterns
        - Consider structured lifestyle programme referral if not already enrolled
        - Reassess MRI trajectory at next scheduled visit (4-6 weeks)
        - Current medications: no mandatory change required at MODERATE level
    action_text_hi: |
      MRI मध्यम गिरावट: MRI स्कोर {{score}} ({{category}})।
      जीवनशैली हस्तक्षेप तीव्रीकरण इंगित किया गया।

      प्राथमिक ड्राइवर डोमेन: {{top_driver}}
      MRI प्रवृत्ति: {{trend}}

      अनुशंसित कार्रवाई:
        - प्राथमिक ड्राइवर डोमेन ({{top_driver}}) को लक्षित जीवनशैली हस्तक्षेप तेज करें
        - आहार पालन, शारीरिक गतिविधि, और नींद के पैटर्न की समीक्षा करें
        - यदि पहले से नामांकित नहीं है तो संरचित जीवनशैली कार्यक्रम रेफरल पर विचार करें
        - अगली निर्धारित यात्रा (4-6 सप्ताह) पर MRI प्रक्षेप पथ का पुनर्मूल्यांकन करें
    rationale_en: "MRI 51-75 indicates moderate metabolic deterioration. Lifestyle intensification targeting the primary driver domain is the first-line intervention before medication changes."
    guideline_ref: "MRI Specification §6; Vaidshala Metabolic Digital Twin Specification v1.0"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    condition_criteria:
      mri_category: "MODERATE_DETERIORATION"
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Continue current management. Monitor MRI trend at next scheduled visit.

      MRI score: {{score}} — primary driver: {{top_driver}}
      Trend: {{trend}}

      No medication change required at current MRI level.
    action_text_hi: |
      वर्तमान प्रबंधन जारी रखें। अगली निर्धारित यात्रा पर MRI प्रवृत्ति की निगरानी करें।

      MRI स्कोर: {{score}} — प्राथमिक ड्राइवर: {{top_driver}}
      प्रवृत्ति: {{trend}}

      वर्तमान MRI स्तर पर कोई दवा परिवर्तन आवश्यक नहीं।
    rationale_en: "Mild MRI dysregulation does not require medication change. Monitoring continuity supports early detection of further deterioration."
    guideline_ref: "MRI Specification §5"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 2

# Gate rules — summarise the decision logic for orchestrators.
# The SignalCardBuilder.evaluateGate() applies these at runtime via event.MCUGateSuggestion.
gate_rules:
  - condition: "mri_category == HIGH_DETERIORATION"
    gate: "MODIFY"
    rationale: "MRI >75 (HIGH_DETERIORATION): mandatory medication review per MRI spec §7"
  - condition: "mri_category == MODERATE_DETERIORATION"
    gate: "SAFE"
    rationale: "MRI 51-75 (MODERATE_DETERIORATION): lifestyle intervention focus, no titration hold"
  - condition: "default"
    gate: "SAFE"
    rationale: "MRI mild dysregulation: maintain current management"

# Panel definitions for UI rendering
panel_1_patient_state:
  fields: [mri_score, mri_category, mri_trend, top_driver_domain, driver_breakdown]

panel_2_guideline_logic:
  fields: [mri_spec_section, gate_decision, card_trigger_reason]

panel_3_safety_checks:
  fields: [mcu_gate, pending_medication_review, sla_deadline]

panel_4_reasoning_trace:
  fields: [mri_score_history, category_transition, domain_contributions, recommended_action]

# Escalation criteria — consumed by V-MCU orchestrator
escalation_triggers:
  - event: "MRI_SUSTAINED_HIGH"
    condition: "mri_category == HIGH_DETERIORATION for >= 2 consecutive assessments"
    action: "Escalate to urgent specialist review; consider HALT gate if no medication review completed"
  - event: "MRI_MEDICATION_REVIEW_OVERDUE"
    condition: "card_age_hours > 24 AND gate == MODIFY AND no_review_documented"
    action: "SLA breach — notify supervising clinician and escalate gate to PAUSE"

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "MRI Score: {{score}} ({{category}}). Trend: {{trend}}. Primary driver: {{top_driver}}. Gate: {{gate}}. SLA: {{sla_hours}}h."
    text_hi: "MRI स्कोर: {{score}} ({{category}})। प्रवृत्ति: {{trend}}। प्राथमिक ड्राइवर: {{top_driver}}। गेट: {{gate}}। SLA: {{sla_hours}} घंटे।"
  - fragment_type: "PATIENT"
    text_en: "Your metabolic health score is {{score}}. {{trend_message}}"
    text_hi: "आपका चयापचय स्वास्थ्य स्कोर {{score}} है। {{trend_message_hi}}"
