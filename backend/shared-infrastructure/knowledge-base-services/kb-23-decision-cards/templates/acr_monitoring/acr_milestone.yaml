# KB-23 Decision Card Template: ACR Milestone (Target Met)
# Triggered when: ACR_TARGET_MET event fires (ACR category improved)
# Purpose: Inform clinician that RAAS therapy is producing renoprotective benefit.
# Version: 1.0.0

template_id: "dc-acr-milestone-v1"
node_id: "KB20_ACR_TRACKING"
differential_id: "ACR_TARGET_MET"
version: "1.0.0"
clinical_reviewer: "dr.nephrology.lead"
mcu_gate_default: "SAFE"

# This card is generated by KB-20 ACR tracking, not through KB-22 HPI pathway.
card_source: "KB20_LAB_TRACKER"
card_type: "MILESTONE"

# No SLA — this is an informational card, not an action-required card.
# sla_hours: null

# Confidence: guideline-concordant (KDIGO 2024 recommendation)
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

confidence_tier: "GUIDELINE_CONCORDANT"

recommendations:
  - rec_type: "INFORMATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      ACR Milestone Achieved: RAAS therapy is reducing proteinuria. The patient's
      ACR category has improved from {{previous_category}} to {{current_category}}.

      This indicates effective renoprotection through RAAS blockade. Evidence shows
      that sustained ACR reduction correlates with slower CKD progression and
      reduced cardiovascular risk (KDIGO 2024, Section 4.2).
    action_text_hi: |
      ACR मील का पत्थर प्राप्त: RAAS चिकित्सा प्रोटीनुरिया को कम कर रही है।
      रोगी की ACR श्रेणी {{previous_category}} से {{current_category}} में सुधर गई है।

      यह RAAS नाकाबंदी के माध्यम से प्रभावी किडनी सुरक्षा को इंगित करता है।
    rationale_en: "ACR category improvement reflects reduced glomerular permeability. Sustained reduction >30% from baseline is associated with 20-30% lower risk of CKD progression (KDIGO 2024). Maintaining current RAAS dose is essential to preserve this benefit."
    guideline_ref: "KDIGO CKD 2024, Section 4.2; Practice Point 4.2.3"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Continue current RAAS dose. Monitoring schedule:
        - Recheck ACR in 3 months to confirm sustained improvement
        - Continue routine creatinine and potassium monitoring per RAAS protocol
        - If ACR remains at improved category for 6+ months, consider this
          a stable renoprotective response
    action_text_hi: |
      वर्तमान RAAS खुराक जारी रखें। निगरानी अनुसूची:
        - निरंतर सुधार की पुष्टि के लिए 3 महीने में ACR दोबारा जांचें
        - RAAS प्रोटोकॉल के अनुसार नियमित क्रिएटिनिन और पोटेशियम निगरानी जारी रखें
        - यदि ACR 6+ महीने तक बेहतर श्रेणी में रहता है, तो इसे
          स्थिर किडनी सुरक्षात्मक प्रतिक्रिया मानें
    rationale_en: "Confirmation of sustained ACR improvement validates the current RAAS strategy. Premature dose reduction risks losing renoprotective benefit."
    guideline_ref: "KDIGO CKD 2024, Section 4.2"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 2

# No escalation triggers — this is a positive milestone card.
escalation_triggers: []

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "ACR milestone: category improved from {{previous_category}} to {{current_category}}. RAAS therapy achieving renoprotective effect. Continue current dose, recheck ACR in 3 months."
    text_hi: "ACR मील का पत्थर: श्रेणी {{previous_category}} से {{current_category}} में सुधरी। RAAS चिकित्सा किडनी सुरक्षात्मक प्रभाव प्राप्त कर रही है।"
  - fragment_type: "PATIENT"
    text_en: "Good news: your kidney health marker (ACR) has improved since starting your blood pressure medication. Please continue taking your medication as prescribed and attend your follow-up test in 3 months."
    text_hi: "अच्छी खबर: आपकी रक्तचाप की दवा शुरू करने के बाद आपका गुर्दे का मार्कर (ACR) सुधर गया है। कृपया अपनी दवा निर्धारित अनुसार लेते रहें और 3 महीने में अपने अनुवर्ती परीक्षण में उपस्थित हों।"
