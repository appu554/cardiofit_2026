# KB-23 Decision Card Template: ACR Worsening Review
# Triggered when: ACR_WORSENING event fires (ACR trend changed to WORSENING)
# Purpose: Prompt clinician to review RAAS therapy and confirm proteinuria trend.
# Version: 1.0.0

template_id: "dc-acr-worsening-review-v1"
node_id: "KB20_ACR_TRACKING"
differential_id: "ACR_WORSENING"
version: "1.0.0"
clinical_reviewer: "dr.nephrology.lead"
mcu_gate_default: "MODIFY"

# This card is generated by KB-20 ACR tracking, not through KB-22 HPI pathway.
card_source: "KB20_LAB_TRACKER"
card_type: "MEDICATION_REVIEW"
sla_hours: 48

# Confidence: guideline-concordant (KDIGO 2024 recommendation)
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

confidence_tier: "GUIDELINE_CONCORDANT"

recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      ACR Worsening Detected: Review RAAS therapy (ACEi/ARB). Dose optimisation
      may improve proteinuria control. Consider:
        - If ACEi/ARB not yet at maximum tolerated dose, uptitrate
        - If already at maximum dose, confirm adherence and rule out secondary causes
        - Check potassium and creatinine before any dose change
        - SGLT2 inhibitor addition should be considered if not already prescribed
          (KDIGO 2024, Practice Point 4.2.2)
    action_text_hi: |
      ACR बिगड़ना पता चला: RAAS चिकित्सा (ACEi/ARB) की समीक्षा करें। खुराक
      अनुकूलन से प्रोटीनुरिया नियंत्रण में सुधार हो सकता है। विचार करें:
        - यदि ACEi/ARB अभी तक अधिकतम सहनशील खुराक पर नहीं है, तो बढ़ाएं
        - यदि पहले से अधिकतम खुराक पर है, तो अनुपालन की पुष्टि करें
        - किसी भी खुराक परिवर्तन से पहले पोटेशियम और क्रिएटिनिन की जांच करें
        - यदि पहले से निर्धारित नहीं है तो SGLT2 अवरोधक जोड़ने पर विचार करें
    rationale_en: "Rising ACR indicates worsening glomerular damage. RAAS blockade is the primary renoprotective intervention. KDIGO 2024 recommends maximising ACEi/ARB before considering additional agents."
    guideline_ref: "KDIGO CKD 2024, Section 4.2; Practice Point 4.2.2"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "INVESTIGATION"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Repeat ACR in 4 weeks to confirm trend. A single elevated ACR may reflect
      transient causes (UTI, exercise, fever). Confirmation requires:
        - Early morning spot urine ACR (preferred)
        - Avoid collection within 24h of vigorous exercise
        - If confirmed rising, classify as persistent proteinuria
    action_text_hi: |
      प्रवृत्ति की पुष्टि के लिए 4 सप्ताह में ACR दोहराएं। एक अकेला ऊंचा ACR
      क्षणिक कारणों (UTI, व्यायाम, बुखार) को दर्शा सकता है। पुष्टि के लिए:
        - सुबह का स्पॉट यूरिन ACR (पसंदीदा)
        - जोरदार व्यायाम के 24 घंटे के भीतर संग्रह से बचें
        - यदि बढ़ना पुष्टि हो, तो लगातार प्रोटीनुरिया के रूप में वर्गीकृत करें
    rationale_en: "ACR variability is high (CV ~40%). A single measurement should be confirmed before escalating therapy. KDIGO recommends at least 2 of 3 samples above threshold."
    guideline_ref: "KDIGO CKD 2024, Section 1.1.2"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 2

  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      If ACR is in category A3 (>30 mg/mmol):
        - Check serum albumin to assess nephrotic-range proteinuria risk
        - Consider nephrology referral if ACR >70 mg/mmol or rapid progression
        - Ensure BP is at target (<130/80 mmHg for CKD with albuminuria)
        - Review dietary sodium intake (<2g/day recommended)
    action_text_hi: |
      यदि ACR श्रेणी A3 (>30 mg/mmol) में है:
        - नेफ्रोटिक-रेंज प्रोटीनुरिया जोखिम का आकलन करने के लिए सीरम एल्ब्यूमिन की जांच करें
        - यदि ACR >70 mg/mmol या तेजी से बढ़ रहा है तो नेफ्रोलॉजी रेफरल पर विचार करें
        - BP लक्ष्य पर है सुनिश्चित करें (<130/80 mmHg)
        - आहार सोडियम सेवन की समीक्षा करें (<2g/दिन अनुशंसित)
    rationale_en: "A3 albuminuria significantly increases CKD progression risk. Nephrology referral is indicated for persistent A3 or rapid ACR rise. Combined RAAS + BP + sodium optimisation provides maximal renoprotection."
    guideline_ref: "KDIGO CKD 2024, Section 4.2; NICE CKD 2021, Section 1.4"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 3

# Escalation criteria — consumed by V-MCU orchestrator
escalation_triggers:
  - event: "ACR_PERSISTENT_A3"
    condition: "acr_category == A3 AND confirmed_on_repeat"
    action: "Escalate to nephrology referral pathway"
  - event: "NEPHROLOGY_REFERRAL_NEEDED"
    condition: "acr_value > 70 OR rapid_progression"
    action: "Generate urgent nephrology referral card"

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "ACR worsening detected. RAAS therapy review required. Repeat ACR in 4 weeks to confirm trend. If A3, check serum albumin and consider nephrology referral."
    text_hi: "ACR बिगड़ना पता चला। RAAS चिकित्सा समीक्षा आवश्यक। 4 सप्ताह में ACR दोहराएं। यदि A3 है, तो सीरम एल्ब्यूमिन की जांच करें।"
  - fragment_type: "PATIENT"
    text_en: "A kidney marker in your urine (ACR) has increased. Your doctor will review your blood pressure medication and may adjust the dose to protect your kidneys. A repeat test will be arranged in 4 weeks."
    text_hi: "आपके मूत्र में एक गुर्दे का मार्कर (ACR) बढ़ गया है। आपके डॉक्टर आपकी रक्तचाप की दवा की समीक्षा करेंगे। 4 सप्ताह में दोबारा परीक्षण की व्यवस्था की जाएगी।"
