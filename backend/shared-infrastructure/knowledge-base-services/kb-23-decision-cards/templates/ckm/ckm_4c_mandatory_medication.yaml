# KB-23 Decision Card Template: CKM Stage 4c Mandatory Medication Check
# Triggered when: A patient transitions into CKM Stage 4c (heart failure in
#   the CKM hierarchy) and KB-23's MandatoryMedChecker detects GDMT gaps in
#   the patient's current medication list. Transition source is KB-20's
#   CKMTransitionPublisher, published via the outbox relay onto
#   clinical.priority-events.v1, consumed by KB-23's PrioritySignalHandler.
# Purpose: Surface the missing guideline-directed medical therapy classes
#   to the clinician so the patient starts them before the next review.
# Version: 1.0.0
# Phase: 7 P7-B — CKM 4c Mandatory Medication Checker Activation

template_id: "dc-ckm-4c-mandatory-medication-v1"
node_id: "CROSS_NODE"
differential_id: "CKM_4C_MANDATORY_MEDICATION"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.hf.lead"
mcu_gate_default: "MODIFY"

card_source: "CLINICAL_SIGNAL"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MEDICATION_MODIFY"
    urgency: "URGENT"
    target: "missing_gdmt_drug_class"
    action_text_en: |
      INITIATE the missing guideline-directed medical therapy (GDMT) classes
      listed in the clinician summary. For HFrEF, the four foundational
      classes are ARNI (or ACEi/ARB if ARNI unavailable), beta-blocker,
      MRA, and SGLT2 inhibitor. For HFmrEF and HFpEF, SGLT2 inhibitor is
      now Class 1A. Start at the lowest effective dose and uptitrate on
      the usual schedule unless contraindicated by the patient's renal
      function, blood pressure, or prior adverse reactions.
    action_text_hi: |
      नैदानिक सारांश में सूचीबद्ध लापता दिशानिर्देश-निर्देशित चिकित्सा
      (GDMT) वर्गों को शुरू करें। HFrEF के लिए चार मूलभूत वर्ग हैं: ARNI,
      बीटा-ब्लॉकर, MRA, और SGLT2 अवरोधक।
    rationale_en: |
      CKM Stage 4c represents heart failure in the cardiovascular-kidney-
      metabolic hierarchy. The Ndumele et al. 2023 consensus and ACC/AHA
      HF guidelines converge on four foundational classes for HFrEF, all
      with Class 1 recommendations and mortality benefit. Withholding any
      of these classes without a documented contraindication is a
      guideline gap that measurably harms the patient.
    guideline_ref: "AHA/ACC/HFSA 2022 HF Guideline; Ndumele 2023 CKM Consensus"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      CKM 4c Monitoring Schedule following GDMT initiation:
        - Week 1: BP, heart rate, renal panel, potassium
        - Week 2-4: Re-check renal panel + potassium before uptitration
        - Week 4-6: Uptitrate to target or maximally tolerated doses
        - Week 12: NYHA class reassessment; consider CRT/ICD referral
                   if indicated (EF ≤35% on optimised GDMT for ≥3 months)
    action_text_hi: |
      CKM 4c निगरानी अनुसूची: सप्ताह 1 — BP, हृदय गति, क्रिएटिनिन;
      सप्ताह 2-4 — खुराक बढ़ाने से पहले जांच; सप्ताह 12 — NYHA पुनर्मूल्यांकन।
    rationale_en: |
      Structured initiation + uptitration protects against the common
      failure modes of GDMT rollout: renal decline, hyperkalaemia, and
      symptomatic hypotension. Each foundational class has a validated
      titration cadence.
    guideline_ref: "AHA/ACC/HFSA 2022 HF Guideline §7.3"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

  - rec_type: "REFERRAL"
    urgency: "URGENT"
    target: "cardiology"
    action_text_en: |
      Refer to heart failure cardiology (or general cardiology if HF
      specialist is unavailable) for GDMT oversight, device assessment,
      and structured follow-up. This is a Stage 4 transition and should
      not be managed in primary care alone.
    action_text_hi: |
      हृदय विफलता कार्डियोलॉजी को संदर्भित करें।
    rationale_en: |
      CKM Stage 4c transitions warrant specialist co-management because
      the GDMT rollout, device eligibility, and longitudinal risk
      stratification exceed the bandwidth of a routine primary-care visit.
    guideline_ref: "AHA/ACC/HFSA 2022 HF Guideline §6.1"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 3

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      CKM STAGE 4c — HF GDMT GAP: Patient transitioned {{.FromStage}}→4c
      ({{.HFType}}). Missing foundational GDMT classes: {{.MissingClasses}}.
      Initiate per guideline, refer to HF cardiology, and schedule Week 1
      safety labs.
    text_hi: |
      CKM स्टेज 4c — HF GDMT अंतराल: मरीज़ {{.FromStage}}→4c ({{.HFType}})।
      लापता GDMT वर्ग: {{.MissingClasses}}।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your heart's pumping function has changed, and the guidelines now
      recommend additional medications that have been shown to improve
      outcomes. Your care team is starting these medications and will
      monitor how your body responds with regular blood tests over the
      next few weeks.
    text_hi: |
      आपके हृदय की पंपिंग क्रिया बदल गई है, और दिशानिर्देश अब अतिरिक्त
      दवाओं की सिफारिश करते हैं जो परिणामों को बेहतर बनाती हैं।
    version: "1.0.0"
