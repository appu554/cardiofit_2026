# KB-23 Decision Card Template: Compound Cardiorenal Deterioration
# Triggered when: KB-26 compound pattern detector identifies concurrent
#   deterioration across multiple vital signs (e.g. eGFR drop + weight
#   gain + BP rise) consistent with a cardiorenal syndrome.
# Purpose: Halt MCU titration and trigger urgent multi-specialty review.
# Version: 1.0.0
# Phase: Gap 16 — Acute-on-Chronic Detection

template_id: "dc-compound-cardiorenal-v1"
node_id: "CROSS_NODE"
differential_id: "COMPOUND_CARDIORENAL"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.lead"
mcu_gate_default: "HALT"

card_source: "ACUTE_DETECTOR"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "CLINICAL_ASSESSMENT"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: |
      COMPOUND DETERIORATION detected across multiple vital signs.
      Urgent multi-specialty review (nephrology + cardiology) recommended.
      Assess volume status, cardiac output, and renal perfusion. Consider
      urgent echocardiogram and renal ultrasound.
    rationale_en: |
      Concurrent deterioration across cardiorenal domains indicates a
      systemic syndrome rather than isolated organ dysfunction. The
      interaction between cardiac and renal failure creates a vicious
      cycle requiring coordinated management.
    guideline_ref: "KDIGO CRS Consensus 2023; ESC Heart Failure 2023"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Compound Deterioration Monitoring:
        - Day 0: Full metabolic panel, BNP/NT-proBNP, urinalysis
        - Day 1: Daily weights, strict I/O monitoring
        - Day 3: Repeat renal function and cardiac biomarkers
        - Day 7: Reassess all domains; decide on specialist referral
    rationale_en: |
      Comprehensive monitoring across all affected domains ensures the
      compound pattern is resolving and not accelerating.
    guideline_ref: "KDIGO CRS 2023 S3"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      COMPOUND DETERIORATION: {{.ClinicalSyndrome}}. {{.RecommendedResponse}}
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Multiple health indicators have changed. Your care team has been urgently notified.
    version: "1.0.0"
