# KB-23 Decision Card Template: Hypertensive Emergency
# Triggered when: KB-26 acute-on-chronic detector identifies SBP significantly
#   above the patient's rolling baseline (e.g. >40 mmHg absolute rise or
#   SBP >180 mmHg).
# Purpose: Halt MCU titration and alert clinician to hypertensive urgency.
# Version: 1.0.0
# Phase: Gap 16 — Acute-on-Chronic Detection

template_id: "dc-hypertensive-emergency-v1"
node_id: "CROSS_NODE"
differential_id: "HYPERTENSIVE_EMERGENCY"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.lead"
mcu_gate_default: "HALT"

card_source: "ACUTE_DETECTOR"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "CLINICAL_ASSESSMENT"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: |
      Confirm reading with repeat measurement after 5 minutes of rest.
      Assess for end-organ damage (headache, visual changes, chest pain,
      dyspnoea). If confirmed hypertensive emergency with end-organ
      involvement, initiate IV antihypertensive protocol.
    rationale_en: |
      An acute SBP rise from the patient's established baseline may
      indicate medication non-adherence, secondary hypertension, or
      end-organ crisis requiring urgent intervention.
    guideline_ref: "ESC/ESH Hypertension 2023; AHA/ACC Stage 2 HTN"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      BP Monitoring Schedule:
        - Immediate: Repeat BP in 5 minutes (patient seated, resting)
        - Hour 1-4: Hourly BP if urgency confirmed
        - Day 1: Reassess medication adherence and adjust therapy
        - Day 7: Follow-up BP and renal function
    rationale_en: |
      Serial BP measurements distinguish a single erroneous reading from
      sustained hypertensive urgency and guide therapeutic escalation.
    guideline_ref: "ESC/ESH 2023 S8.2"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      HYPERTENSIVE URGENCY: SBP {{.CurrentValue}} mmHg (baseline {{.BaselineValue}}, +{{.DeviationAbsolute}} mmHg). {{.SuggestedAction}}
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your blood pressure reading is higher than usual. Please sit quietly and re-measure in 5 minutes.
    version: "1.0.0"
