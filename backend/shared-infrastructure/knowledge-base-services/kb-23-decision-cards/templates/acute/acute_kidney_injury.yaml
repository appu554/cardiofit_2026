# KB-23 Decision Card Template: Acute Kidney Injury
# Triggered when: KB-26 acute-on-chronic detector identifies a significant
#   eGFR decline from the patient's rolling baseline (>25% drop or absolute
#   eGFR <30 in a patient with baseline >45).
# Purpose: Halt MCU titration immediately and surface the acute renal
#   deterioration to the clinician with baseline context.
# Version: 1.0.0
# Phase: Gap 16 — Acute-on-Chronic Detection

template_id: "dc-acute-kidney-injury-v1"
node_id: "CROSS_NODE"
differential_id: "ACUTE_KIDNEY_INJURY"
version: "1.0.0"
clinical_reviewer: "dr.nephrology.lead"
mcu_gate_default: "HALT"

card_source: "ACUTE_DETECTOR"

# Acute alerts bypass confidence gate — the deviation from a persisted
# baseline carries its own evidence weight.
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MEDICATION_HOLD"
    urgency: "IMMEDIATE"
    target: "nephrotoxic_agents"
    action_text_en: |
      HOLD all nephrotoxic and renally-cleared medications until renal
      function is reassessed. Obtain repeat creatinine within 48 hours
      to confirm the eGFR decline is sustained. If confirmed, consult
      nephrology for further management.
    rationale_en: |
      An acute eGFR decline from the patient's established baseline
      indicates potential acute kidney injury superimposed on chronic
      kidney disease. Continuing nephrotoxic agents risks further
      deterioration and accumulation toxicity.
    guideline_ref: "KDIGO AKI 2024; NICE AKI QS76"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Acute Renal Monitoring Schedule:
        - Day 0:  Document eGFR decline, review nephrotoxic agents, fluid status
        - Day 2:  Repeat creatinine + eGFR to confirm sustained decline
        - Day 7:  Reassess CKD staging and medication suitability
        - Day 14: Follow-up eGFR; if recovered, consider cautious resumption
    rationale_en: |
      Structured follow-up distinguishes true AKI from transient eGFR
      fluctuation (dehydration, contrast exposure) and prevents
      unnecessary permanent medication discontinuation.
    guideline_ref: "KDIGO AKI 2024 S2.3"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      ACUTE eGFR DECLINE: Current eGFR {{.CurrentValue}} (baseline {{.BaselineValue}}, {{.DeviationPercent}}% drop). {{.SuggestedAction}}
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your kidney function test showed a significant change. Your care team has been notified.
    version: "1.0.0"
