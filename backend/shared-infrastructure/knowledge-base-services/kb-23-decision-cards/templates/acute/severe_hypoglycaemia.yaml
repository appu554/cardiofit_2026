# KB-23 Decision Card Template: Severe Hypoglycaemia
# Triggered when: KB-26 acute-on-chronic detector identifies sustained
#   glucose below the hypoglycaemia threshold (e.g. <54 mg/dL).
# Purpose: Halt MCU titration and prompt immediate glucose rescue.
# Version: 1.0.0
# Phase: Gap 16 — Acute-on-Chronic Detection

template_id: "dc-severe-hypoglycaemia-v1"
node_id: "CROSS_NODE"
differential_id: "SEVERE_HYPOGLYCAEMIA"
version: "1.0.0"
clinical_reviewer: "dr.endocrinology.lead"
mcu_gate_default: "HALT"

card_source: "ACUTE_DETECTOR"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "IMMEDIATE_ACTION"
    urgency: "IMMEDIATE"
    target: "patient_and_clinician"
    action_text_en: |
      Patient: consume 15g fast-acting carbohydrate immediately (glucose
      tablets, juice, or sugar). Re-check glucose in 15 minutes and repeat
      if still below 70 mg/dL.
      Clinician: review insulin regimen and sulfonylurea dosing. Consider
      dose reduction or discontinuation of the offending agent.
    rationale_en: |
      Sustained severe hypoglycaemia (<54 mg/dL) carries immediate risk
      of neuroglycopenic symptoms, falls, cardiac arrhythmia, and death.
      The 15-15 rule is the standard self-rescue protocol.
    guideline_ref: "ADA Standards of Care 2024 S6; NICE NG17"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MEDICATION_REVIEW"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Hypoglycaemia Medication Review:
        - Identify precipitating agent (insulin, SU, glinide)
        - Reduce dose by 20-50% or discontinue if recurrent
        - Review meal patterns and carbohydrate intake
        - Reassess glycaemic targets (consider relaxation)
    rationale_en: |
      Recurrent severe hypoglycaemia requires systematic medication
      review to prevent future episodes and reduce mortality risk.
    guideline_ref: "ADA Standards of Care 2024 S6.5"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      SEVERE HYPOGLYCAEMIA: Glucose {{.CurrentValue}} mg/dL sustained. {{.SuggestedAction}}
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your glucose has been very low. Please eat 15g of fast-acting carbohydrate now.
    version: "1.0.0"
