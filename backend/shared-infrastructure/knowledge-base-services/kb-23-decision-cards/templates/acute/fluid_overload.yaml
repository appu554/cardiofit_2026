# KB-23 Decision Card Template: Fluid Overload
# Triggered when: KB-26 acute-on-chronic detector identifies rapid weight
#   gain (>2kg in 72 hours from rolling baseline) suggesting fluid retention.
# Purpose: Halt MCU titration and alert clinician to potential decompensation.
# Version: 1.0.0
# Phase: Gap 16 — Acute-on-Chronic Detection

template_id: "dc-fluid-overload-v1"
node_id: "CROSS_NODE"
differential_id: "FLUID_OVERLOAD"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.lead"
mcu_gate_default: "HALT"

card_source: "ACUTE_DETECTOR"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "CLINICAL_ASSESSMENT"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: |
      Assess volume status: JVP, peripheral oedema, lung auscultation.
      Review diuretic regimen and sodium intake. Consider urgent
      echocardiogram if new-onset or worsening heart failure suspected.
    rationale_en: |
      Rapid weight gain in a cardiometabolic patient indicates fluid
      retention that may herald decompensated heart failure, worsening
      CKD, or iatrogenic fluid overload from medication changes.
    guideline_ref: "ESC Heart Failure 2023; NICE CG187"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Fluid Overload Monitoring Schedule:
        - Day 0:  Daily weights, assess fluid balance, review diuretics
        - Day 3:  Reassess weight trajectory and symptoms
        - Day 7:  Follow-up renal function and electrolytes
    rationale_en: |
      Serial weight monitoring confirms whether the fluid retention is
      resolving or progressive, guiding diuretic dose adjustments.
    guideline_ref: "ESC Heart Failure 2023 S11"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      FLUID OVERLOAD: Weight gain {{.WeightGainKg}}kg in 72h (baseline {{.BaselineValue}}kg). {{.SuggestedAction}}
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your weight has increased more than expected. Please contact your care team if you feel short of breath.
    version: "1.0.0"
