# KB-23 Decision Card Template: Medication-Induced Crisis
# Triggered when: KB-26 acute-on-chronic detector identifies a temporal
#   correlation between a recent medication change and vital sign deviation
#   (e.g. new medication started <14 days ago + significant vital shift).
# Purpose: Flag the medication correlation for clinician review and modify
#   the MCU titration plan (not full halt — the medication may still be
#   appropriate at an adjusted dose).
# Version: 1.0.0
# Phase: Gap 16 — Acute-on-Chronic Detection

template_id: "dc-medication-induced-crisis-v1"
node_id: "CROSS_NODE"
differential_id: "MEDICATION_INDUCED_CRISIS"
version: "1.0.0"
clinical_reviewer: "dr.pharmacology.lead"
mcu_gate_default: "MODIFY"

card_source: "ACUTE_DETECTOR"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      A temporal correlation has been detected between a recent medication
      change and a vital sign deviation. Review the suspected agent for
      dose-response relationship. Consider dose reduction before
      discontinuation if the medication is clinically necessary.
    rationale_en: |
      Medication-induced vital sign changes are common in the first 14
      days after initiation or dose change. Early detection allows dose
      adjustment rather than unnecessary discontinuation.
    guideline_ref: "WHO-UMC ADR Assessment; FDA MedWatch"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Medication Correlation Monitoring:
        - Day 0: Document temporal relationship, current vital trend
        - Day 3: Repeat vital sign assessment post dose adjustment
        - Day 7: Confirm resolution or escalate to discontinuation
        - Day 14: Final reassessment and ADR documentation
    rationale_en: |
      Structured monitoring distinguishes true ADR from coincidental
      timing and supports regulatory ADR reporting requirements.
    guideline_ref: "WHO-UMC Causality Assessment"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      {{.ClinicianLabel}}: {{.NewMedication}} started {{.DaysSinceStart}} days ago — {{.VitalSign}} deviated {{.DeviationPercent}}%. {{.SuggestedAction}}
    version: "1.1.0"
  - fragment_type: "PATIENT"
    text_en: |
      {{.PatientLabel}}. Your care team is reviewing.
    version: "1.1.0"
