# KB-23 Decision Card Template: Stale eGFR Surveillance Gap
# Triggered when: DetectStaleEGFR returns IsStale=true for a patient on
#   renal-sensitive medications, meaning the last eGFR reading is older
#   than the expected monitoring interval for their CKD stage and drug
#   profile (30 days for eGFR<30 or combination K+-drugs; 90 days for
#   single K+-drug at eGFR≥45; 180-365 days for stable non-advanced
#   patients).
# Purpose: Prompt the clinician to schedule the overdue renal function
#   panel before medication decisions are made from out-of-date data.
# Version: 1.0.0
# Phase: 7 P7-C — Renal Anticipatory Monthly Activation

template_id: "dc-stale-egfr-v1"
node_id: "CROSS_NODE"
differential_id: "STALE_EGFR"
version: "1.0.0"
clinical_reviewer: "dr.nephrology.lead"
mcu_gate_default: "SAFE"

card_source: "CLINICAL_SIGNAL"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "INVESTIGATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      ORDER A RENAL FUNCTION PANEL: The patient's most recent eGFR is
      {{.DaysSince}} days old, which exceeds the {{.ExpectedMaxDays}}-day
      interval expected for their CKD stage and medication profile per
      KDIGO surveillance recommendations. Order creatinine + eGFR
      (and potassium if on ACEi/ARB/MRA/finerenone) and re-evaluate
      the renal-sensitive medication regimen once fresh results are
      available.
    action_text_hi: |
      गुर्दे का कार्य पैनल आदेश दें: रोगी का सबसे हाल का eGFR
      {{.DaysSince}} दिन पुराना है।
    rationale_en: |
      Medication decisions made from stale renal data miss the window
      for anticipatory planning and delay reactive response when the
      function has already deteriorated. Scheduled surveillance closes
      this gap before it becomes a safety event.
    guideline_ref: "KDIGO CKD 2024 S4.4 — surveillance intervals"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      STALE eGFR: Last reading is {{.DaysSince}} days old (expected
      within {{.ExpectedMaxDays}} days). Severity: {{.Severity}}. Order
      renal function panel before next medication review.
    text_hi: |
      पुराना eGFR: अंतिम रीडिंग {{.DaysSince}} दिन पुरानी है (अपेक्षित
      {{.ExpectedMaxDays}} दिनों के भीतर)।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      It has been a while since your kidney function was last checked.
      Your care team is asking you to visit the lab for a blood test
      so they can make sure your current medications are still the
      right doses for your kidneys.
    text_hi: |
      आपके गुर्दे के कार्य की जांच किए हुए काफी समय हो गया है। आपकी
      देखभाल टीम आपको रक्त परीक्षण के लिए प्रयोगशाला जाने के लिए कह
      रही है।
    version: "1.0.0"
