# KB-23 Decision Card Template: Reactive Renal Dose Reduction
# Triggered when: A newly-derived eGFR causes a currently-active medication
#   class to cross a dose-reduction threshold short of full contraindication
#   (e.g. metformin @ eGFR 30-45 → max 1000 mg/day; many DOACs @ eGFR 15-30).
# Purpose: Surface the dose-reduction gap without halting the therapy —
#   MCU gate is MODIFY, not HALT. Clinician decides the new dose.
# Version: 1.0.0
# Phase: 7 P7-A — Reactive Renal Dose Gating Activation

template_id: "dc-renal-dose-reduce-v1"
node_id: "CROSS_NODE"
differential_id: "RENAL_DOSE_REDUCE"
version: "1.0.0"
clinical_reviewer: "dr.nephrology.lead"
mcu_gate_default: "MODIFY"

card_source: "CLINICAL_SIGNAL"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MEDICATION_MODIFY"
    urgency: "URGENT"
    target: "renally_cleared_drug_class"
    action_text_en: |
      REDUCE dose of the renally-cleared medication(s) listed in the
      clinician summary to the band appropriate for the new eGFR. Do
      NOT discontinue — the medication remains indicated at a lower
      dose. Confirm the eGFR drop is sustained (not a single aberrant
      reading) by repeat creatinine within 7 days. If the reduced dose
      proves sub-therapeutic, review alternative agents rather than
      restoring the full dose.
    action_text_hi: |
      दिए गए नैदानिक सारांश में सूचीबद्ध दवा(ओं) की खुराक नए eGFR के
      अनुसार कम करें। दवा बंद न करें — यह कम खुराक पर निरंतर उपयोगी है।
      7 दिनों के भीतर क्रिएटिनिन दोहराकर eGFR की पुष्टि करें।
    rationale_en: |
      A newly-derived eGFR crossed the dose-reduction threshold but not
      the full contraindication threshold for one or more active
      medications. Continuing the full dose risks drug accumulation and
      dose-dependent toxicity, but discontinuation is unnecessary at
      this eGFR band.
    guideline_ref: "KDIGO CKD 2024 S4; FDA label renal dose adjustments"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Renal Monitoring Schedule following dose-reduction decision:
        - Day 0:  Document new eGFR, record dose change rationale
        - Day 7:  Repeat creatinine + eGFR to confirm sustained drop
        - Day 28: Reassess clinical response to reduced dose; decide on
                  further reduction, alternative agent, or stable
                  maintenance at the new dose
    action_text_hi: |
      गुर्दे की निगरानी: दिन 7 — क्रिएटिनिन दोहराएं; दिन 28 —
      कम खुराक पर नैदानिक प्रतिक्रिया का पुनर्मूल्यांकन।
    rationale_en: |
      Structured follow-up detects both inadequate renal recovery (may
      need further reduction) and over-reduction (sub-therapeutic
      response requires alternative approach).
    guideline_ref: "KDIGO CKD 2024 S4.4"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      RENAL DOSE REDUCTION: eGFR {{.EGFR}} mL/min/1.73m² crosses
      dose-reduction threshold for {{.DrugClasses}}. Reduce dose to the
      eGFR-appropriate band; do not discontinue. Recheck creatinine in
      7 days.
    text_hi: |
      गुर्दे के अनुसार खुराक कमी: eGFR {{.EGFR}} mL/min/1.73m²
      {{.DrugClasses}} के लिए खुराक कम करने की सीमा को पार करता है।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      A recent kidney function test shows your kidneys are processing
      medications more slowly. Your care team is adjusting the dose of
      one or more of your medications to match your current kidney
      function. You will still be taking the medication — just at a
      lower dose.
    text_hi: |
      हाल ही में गुर्दे के कार्य परीक्षण से पता चलता है कि आपके गुर्दे
      दवाओं को धीरे-धीरे प्रोसेस कर रहे हैं। आपकी देखभाल टीम आपकी एक
      या अधिक दवाओं की खुराक को आपके वर्तमान गुर्दे के कार्य के अनुसार
      समायोजित कर रही है।
    version: "1.0.0"
