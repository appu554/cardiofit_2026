# KB-23 Decision Card Template: Anticipatory Renal Threshold Crossing
# Triggered when: RenalAnticipatoryOrchestrator.EvaluatePatient projects an
#   eGFR trajectory that will cross a clinically significant threshold
#   (contraindication, dose-reduce, or efficacy cliff) for an active
#   medication within the formulary's AnticipateMonths lookahead horizon.
#   This is proactive planning, not acute response — the patient still
#   tolerates the medication today.
# Purpose: Give the clinician weeks-to-months of runway to plan substitute
#   therapy, schedule the confirming eGFR, and educate the patient.
# Version: 1.0.0
# Phase: 7 P7-C — Renal Anticipatory Monthly Activation

template_id: "dc-renal-threshold-approaching-v1"
node_id: "CROSS_NODE"
differential_id: "RENAL_THRESHOLD_APPROACHING"
version: "1.0.0"
clinical_reviewer: "dr.nephrology.lead"
mcu_gate_default: "MODIFY"

card_source: "CLINICAL_SIGNAL"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      ANTICIPATORY PLANNING: At the current eGFR trajectory, the patient's
      active medication class will cross a clinical threshold within the
      lookahead horizon. This is not an acute gap — the medication is
      safe today. Use the next clinic visit to: (1) discuss the projected
      crossing with the patient, (2) agree on a substitute therapy plan,
      and (3) schedule the confirming eGFR before the projected crossing
      date so the transition can be made cleanly.
    action_text_hi: |
      अग्रिम योजना: वर्तमान eGFR प्रवृत्ति पर, रोगी की सक्रिय दवा वर्ग
      निकट भविष्य में एक नैदानिक सीमा को पार कर जाएगा। यह तीव्र स्थिति
      नहीं है — दवा आज सुरक्षित है।
    rationale_en: |
      Anticipating a renal threshold crossing by 1-6 months gives the
      clinician time to evaluate alternative therapy, engage the patient
      in shared decision-making, and avoid the acute workflow disruption
      of reactive contraindication or dose-reduction alerts.
    guideline_ref: "KDIGO CKD 2024 S5; care-planning best practice"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "INVESTIGATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Schedule a confirming eGFR approximately 4-6 weeks before the
      projected threshold-crossing date. A single aberrant creatinine
      can shift the projection — verification avoids acting on a
      transient dip.
    action_text_hi: |
      अनुमानित सीमा पार करने की तारीख से 4-6 सप्ताह पहले पुष्टिकरण
      eGFR निर्धारित करें।
    rationale_en: |
      Phase 7 P7-A already handles reactive gating when a confirmed
      threshold is crossed; anticipatory confirmation avoids premature
      regimen changes while keeping the runway for substitute planning.
    guideline_ref: "KDIGO CKD 2024 S4.4 — surveillance intervals"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 2

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      RENAL THRESHOLD APPROACHING: At eGFR {{.EGFR}} mL/min/1.73m² with
      trajectory slope {{.SlopePerYear}}/year, {{.DrugClass}} is projected
      to cross its {{.ThresholdType}} threshold ({{.ThresholdValue}}) in
      approximately {{.MonthsToThreshold}} months. Plan substitute
      therapy; schedule confirming eGFR before the projected crossing.
    text_hi: |
      गुर्दे की सीमा निकट: eGFR {{.EGFR}} पर, {{.DrugClass}} लगभग
      {{.MonthsToThreshold}} महीनों में {{.ThresholdType}} सीमा को पार
      करेगा।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your kidney function tests show a gradual change that your care
      team is watching. One of your current medications may need to be
      adjusted in the coming months — your doctor will discuss the plan
      with you at your next visit and may order a repeat kidney test to
      confirm the trend.
    text_hi: |
      आपके गुर्दे के कार्य परीक्षण से पता चलता है कि एक क्रमिक परिवर्तन
      हो रहा है। आपकी एक दवा को आने वाले महीनों में समायोजित करने की
      आवश्यकता हो सकती है।
    version: "1.0.0"
