# KB-23 Decision Card Template: Acute Coronary Syndrome - STEMI
# Node: P01 (Chest Pain), Differential: ACS_STEMI
# Clinical reviewer: Dr. Cardiology Lead (placeholder)
# Version: 1.0.0

template_id: "dc-p01-acs-stemi-v1"
node_id: "P01"
differential_id: "ACS_STEMI"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.lead"
mcu_gate_default: "PAUSE"

# V-01: Per-template confidence thresholds
confidence_thresholds:
  firm_posterior: 0.75
  firm_medication_change: 0.82
  probable_posterior: 0.50
  possible_posterior: 0.25

# Recommendations — ordered by sort_order
recommendations:
  # V-04: SAFETY_INSTRUCTION bypasses confidence gate
  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: "Activate cardiac catheterization lab. Administer aspirin 300mg stat and heparin bolus per protocol. Obtain 12-lead ECG within 10 minutes."
    action_text_hi: "कार्डियक कैथेटराइजेशन लैब सक्रिय करें। प्रोटोकॉल के अनुसार एस्पिरिन 300mg तत्काल और हेपरिन बोलस दें। 10 मिनट के भीतर 12-लीड ईसीजी प्राप्त करें।"
    rationale_en: "STEMI requires emergent reperfusion therapy. Door-to-balloon target <90 minutes per ACC/AHA guidelines."
    guideline_ref: "ACC/AHA 2013 STEMI Guidelines, Class I"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    trigger_condition_en: "ST-elevation ≥1mm in ≥2 contiguous leads OR new LBBB with clinical suspicion"
    trigger_condition_hi: "≥2 सन्निहित लीड में ST-ऊंचाई ≥1mm या नई LBBB नैदानिक संदेह के साथ"
    sort_order: 1

  - rec_type: "MEDICATION_HOLD"
    urgency: "IMMEDIATE"
    target: "clinician"
    action_text_en: "Hold metformin and all oral hypoglycaemics. Hold SGLT2 inhibitors. Suspend V-MCU insulin titration until haemodynamic stability confirmed."
    action_text_hi: "मेटफॉर्मिन और सभी मौखिक हाइपोग्लाइसेमिक दवाएं रोकें। SGLT2 अवरोधक रोकें। हेमोडायनामिक स्थिरता की पुष्टि होने तक V-MCU इंसुलिन अनुमापन निलंबित करें।"
    rationale_en: "Metformin contraindicated during acute MI due to lactic acidosis risk. Insulin titration unsafe during haemodynamic instability."
    guideline_ref: "ESC 2023 ACS Management, Section 5.4"
    confidence_tier_required: "PROBABLE"
    bypasses_confidence_gate: false
    sort_order: 2

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Continuous telemetry monitoring. Serial troponin at 0h, 3h, 6h. Repeat ECG at 30-minute intervals until catheterization."
    action_text_hi: "निरंतर टेलीमेट्री निगरानी। 0h, 3h, 6h पर सीरियल ट्रोपोनिन। कैथेटराइजेशन तक 30 मिनट के अंतराल पर ईसीजी दोहराएं।"
    rationale_en: "Serial biomarkers and continuous ECG monitoring essential for STEMI risk stratification and arrhythmia detection."
    guideline_ref: "ACC/AHA 2013 STEMI Guidelines, Class I"
    confidence_tier_required: "POSSIBLE"
    bypasses_confidence_gate: false
    sort_order: 3

  # V-05: MEDICATION_REVIEW permitted at PROBABLE tier
  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Review all diabetic medications post-reperfusion. Assess renal function before restarting metformin. Resume V-MCU titration only after 48h haemodynamic stability."
    action_text_hi: "पुनर्संयोजन के बाद सभी मधुमेह दवाओं की समीक्षा करें। मेटफॉर्मिन पुनः शुरू करने से पहले गुर्दे की कार्यक्षमता का आकलन करें। केवल 48 घंटे की हेमोडायनामिक स्थिरता के बाद V-MCU अनुमापन फिर से शुरू करें।"
    rationale_en: "Post-MI medication reconciliation critical for diabetic patients. Contrast-induced nephropathy risk from catheterization affects metformin safety."
    guideline_ref: "KDIGO AKI 2012, Section 4.2"
    confidence_tier_required: "PROBABLE"
    bypasses_confidence_gate: false
    sort_order: 4

# Summary fragments — trilingual with patient advocate review
fragments:
  - fragment_id: "frag-p01-stemi-clinician"
    fragment_type: "CLINICIAN"
    text_en: "STEMI identified with high posterior probability. Cardiac catheterization pathway activated. All diabetic oral medications held; V-MCU insulin titration suspended. Continuous monitoring initiated."
    text_hi: "उच्च पश्च संभावना के साथ STEMI की पहचान। कार्डियक कैथेटराइजेशन मार्ग सक्रिय। सभी मधुमेह मौखिक दवाएं रोकी गईं; V-MCU इंसुलिन अनुमापन निलंबित। निरंतर निगरानी शुरू।"
    guideline_ref: "ACC/AHA 2013 STEMI"
    version: "1.0.0"

  - fragment_id: "frag-p01-stemi-patient"
    fragment_type: "PATIENT"
    text_en: "Your heart test shows a blocked artery that needs urgent treatment. We are pausing your diabetes medicines and insulin pump adjustments to keep you safe during this treatment. You will be closely monitored throughout."
    text_hi: "आपके हृदय परीक्षण में एक अवरुद्ध धमनी दिखाई देती है जिसका तत्काल उपचार आवश्यक है। इस उपचार के दौरान आपकी सुरक्षा के लिए हम आपकी मधुमेह की दवाइयां और इंसुलिन पंप समायोजन रोक रहे हैं। पूरे समय आपकी बारीकी से निगरानी की जाएगी।"
    patient_advocate_reviewed_by: "patient.advocate.lead"
    reading_level_validated: true
    version: "1.0.0"

  # N-04: SAFETY_INSTRUCTION fragment must have patient_advocate_reviewed_by + reading_level_validated
  - fragment_id: "frag-p01-stemi-safety"
    fragment_type: "SAFETY_INSTRUCTION"
    text_en: "CRITICAL: Do not resume metformin within 48 hours of contrast dye administration. Monitor blood glucose every 2 hours during catheterization. Report any chest pain recurrence immediately."
    text_hi: "महत्वपूर्ण: कॉन्ट्रास्ट डाई देने के 48 घंटों के भीतर मेटफॉर्मिन दोबारा शुरू न करें। कैथेटराइजेशन के दौरान हर 2 घंटे में रक्त शर्करा की निगरानी करें। सीने में दर्द की पुनरावृत्ति तुरंत रिपोर्ट करें।"
    patient_advocate_reviewed_by: "patient.advocate.lead"
    reading_level_validated: true
    guideline_ref: "KDIGO AKI 2012"
    version: "1.0.0"

# N-05: Gate rules with dose_adjustment_notes when gate=MODIFY
gate_rules:
  - condition: "stemi_confirmed"
    gate: "PAUSE"
    rationale: "Active STEMI requires pausing all automated insulin titration until haemodynamic stability."

  - condition: "post_reperfusion_stable_48h"
    gate: "MODIFY"
    rationale: "Post-reperfusion with 48h stability allows cautious V-MCU resume with reduced basal rate."
    adjustment_notes: "Reduce basal insulin by 20%. Set glucose target 140-180mg/dL during recovery. Disable aggressive correction boluses."

  - condition: "cardiogenic_shock"
    gate: "HALT"
    rationale: "Cardiogenic shock is an absolute contraindication to automated insulin delivery."
