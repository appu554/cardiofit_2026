# KB-23 Decision Card Template: Acute Coronary Syndrome - NSTEMI
# Node: P01 (Chest Pain), Differential: ACS_NSTEMI
# Version: 1.0.0

template_id: "dc-p01-acs-nstemi-v1"
node_id: "P01"
differential_id: "ACS_NSTEMI"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.lead"
mcu_gate_default: "MODIFY"

confidence_thresholds:
  firm_posterior: 0.75
  firm_medication_change: 0.82
  probable_posterior: 0.50
  possible_posterior: 0.25

recommendations:
  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Administer aspirin 300mg and initiate anticoagulation per GRACE score risk stratification. Obtain serial troponins at 0h and 3h."
    action_text_hi: "GRACE स्कोर जोखिम स्तरीकरण के अनुसार एस्पिरिन 300mg दें और थक्कारोधी शुरू करें। 0h और 3h पर सीरियल ट्रोपोनिन प्राप्त करें।"
    rationale_en: "NSTEMI requires risk-stratified management. High-risk features mandate early invasive strategy within 24 hours."
    guideline_ref: "ESC 2023 NSTE-ACS Guidelines"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    trigger_condition_en: "Troponin rise/fall pattern with ischaemic symptoms and no ST-elevation"
    trigger_condition_hi: "इस्केमिक लक्षणों के साथ ट्रोपोनिन वृद्धि/गिरावट पैटर्न और कोई ST-ऊंचाई नहीं"
    sort_order: 1

  - rec_type: "MEDICATION_MODIFY"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Reduce V-MCU basal rate by 30%. Set conservative glucose target 140-200mg/dL. Hold correction boluses until risk stratification complete."
    action_text_hi: "V-MCU बेसल दर 30% कम करें। रूढ़िवादी ग्लूकोज लक्ष्य 140-200mg/dL सेट करें। जोखिम स्तरीकरण पूर्ण होने तक सुधार बोलस रोकें।"
    rationale_en: "NSTEMI patients require conservative glycaemic targets. Tight control increases hypoglycaemia risk during acute cardiac events."
    guideline_ref: "ADA Standards of Care 2024, Section 16.2"
    confidence_tier_required: "FIRM"
    bypasses_confidence_gate: false
    sort_order: 2

  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: "Review SGLT2 inhibitor status. If on empagliflozin/dapagliflozin, continue unless eGFR <20. Ensure statin intensification post-event."
    action_text_hi: "SGLT2 अवरोधक स्थिति की समीक्षा करें। यदि एम्पाग्लिफ्लोज़िन/डापाग्लिफ्लोज़िन पर हैं, तो eGFR <20 जब तक जारी रखें। घटना के बाद स्टेटिन तीव्रता सुनिश्चित करें।"
    rationale_en: "SGLT2 inhibitors have cardioprotective benefits in ACS. Continue unless contraindicated by renal function."
    guideline_ref: "ESC 2023 NSTE-ACS, Section 8.3"
    confidence_tier_required: "PROBABLE"
    bypasses_confidence_gate: false
    sort_order: 3

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: "Continuous telemetry. Blood glucose monitoring every 4 hours. Repeat ECG if symptoms recur. Serial troponin at 0h, 3h, 6h."
    action_text_hi: "निरंतर टेलीमेट्री। हर 4 घंटे में रक्त शर्करा की निगरानी। लक्षण पुनरावृत्ति पर ईसीजी दोहराएं। 0h, 3h, 6h पर सीरियल ट्रोपोनिन।"
    rationale_en: "NSTEMI monitoring includes glycaemic surveillance due to stress hyperglycaemia and catecholamine-driven glucose variability."
    guideline_ref: "ACC/AHA Chest Pain Guideline 2021"
    confidence_tier_required: "POSSIBLE"
    bypasses_confidence_gate: false
    sort_order: 4

fragments:
  - fragment_id: "frag-p01-nstemi-clinician"
    fragment_type: "CLINICIAN"
    text_en: "NSTEMI identified. Risk stratification via GRACE score recommended. V-MCU titration modified to conservative targets. SGLT2 inhibitor review pending."
    text_hi: "NSTEMI की पहचान। GRACE स्कोर के माध्यम से जोखिम स्तरीकरण अनुशंसित। V-MCU अनुमापन रूढ़िवादी लक्ष्यों में संशोधित। SGLT2 अवरोधक समीक्षा लंबित।"
    version: "1.0.0"

  - fragment_id: "frag-p01-nstemi-patient"
    fragment_type: "PATIENT"
    text_en: "Your blood tests show a mild heart injury. We are adjusting your insulin pump to be more gentle and checking your heart closely. Your heart medicines are being reviewed to make sure they are helping."
    text_hi: "आपके रक्त परीक्षण में हल्की हृदय चोट दिखाई देती है। हम आपके इंसुलिन पंप को अधिक सौम्य बनाने के लिए समायोजित कर रहे हैं और आपके हृदय की बारीकी से जांच कर रहे हैं।"
    patient_advocate_reviewed_by: "patient.advocate.lead"
    reading_level_validated: true
    version: "1.0.0"

  - fragment_id: "frag-p01-nstemi-safety"
    fragment_type: "SAFETY_INSTRUCTION"
    text_en: "Monitor blood glucose every 4 hours. Report any blood sugar below 70 mg/dL immediately. Do not skip meals during monitoring period."
    text_hi: "हर 4 घंटे में रक्त शर्करा की निगरानी करें। 70 mg/dL से नीचे किसी भी रक्त शर्करा की तुरंत रिपोर्ट करें। निगरानी अवधि के दौरान भोजन न छोड़ें।"
    patient_advocate_reviewed_by: "patient.advocate.lead"
    reading_level_validated: true
    guideline_ref: "ADA Standards 2024"
    version: "1.0.0"

gate_rules:
  - condition: "nstemi_high_risk"
    gate: "MODIFY"
    rationale: "High-risk NSTEMI requires conservative V-MCU targets but does not mandate full pause unless haemodynamically unstable."
    adjustment_notes: "Reduce basal by 30%. Disable aggressive correction. Target 140-200mg/dL."

  - condition: "nstemi_haemodynamic_instability"
    gate: "PAUSE"
    rationale: "Haemodynamic instability during NSTEMI escalates to PAUSE for patient safety."

  - condition: "nstemi_resolved_stable"
    gate: "SAFE"
    rationale: "Post-intervention with 24h stability allows return to standard V-MCU operation."
