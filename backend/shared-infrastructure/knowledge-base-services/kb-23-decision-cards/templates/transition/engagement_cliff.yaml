# KB-23 Decision Card Template: Post-Discharge Engagement Cliff
# Triggered when: CareTransitionDetector detects no measurements received
#   for >=72 hours during the active transition window. The post-discharge
#   engagement threshold is stricter than the standard monitoring lapsed
#   threshold because post-discharge patients are at elevated risk.
# Purpose: Alert the care team to re-engage the patient before the data
#   gap becomes clinically dangerous. Post-discharge patients who
#   disengage early have 2-3x higher readmission rates.
# Version: 1.0.0
# Phase: Gap 17 — Care Transition Bridge

template_id: "dc-transition-engagement-cliff-v1"
node_id: "CROSS_NODE"
differential_id: "TRANSITION_ENGAGEMENT_CLIFF"
version: "1.0.0"
clinical_reviewer: "dr.primary.care.lead"
mcu_gate_default: "MODIFY"

card_source: "CARE_TRANSITION"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      POST-DISCHARGE ENGAGEMENT GAP: No home measurements have been
      received for {{.GapHours}} hours during the active care transition
      window. The post-discharge threshold is 72 hours (stricter than
      standard monitoring lapse).

      Recommended actions:
        1. Contact the patient within 24 hours to assess barriers
           (device issues, mobility, confusion about routine, readmission)
        2. If no contact is possible, escalate to the care coordinator
        3. If the patient has been readmitted, update the transition
           status accordingly
        4. Once engagement resumes, reassess the transition milestones
    action_text_hi: |
      छुट्टी के बाद सहभागिता अंतराल: सक्रिय देखभाल संक्रमण अवधि
      के दौरान {{.GapHours}} घंटे से कोई माप प्राप्त नहीं हुआ।
      बाधाओं का आकलन करने के लिए रोगी से संपर्क करें।
    rationale_en: |
      Post-discharge patients who stop engaging with home monitoring
      within the first 30 days are at 2-3x higher risk of readmission.
      The 72-hour threshold is deliberately stricter than standard
      monitoring lapse detection (14 days) because post-discharge
      patients are in a vulnerable clinical state and data gaps are
      more dangerous.
    guideline_ref: "AHA/ACC 2022 Transitions of Care; Leppin et al. JAMA IM 2014"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      POST-DISCHARGE ENGAGEMENT ALERT: No measurements received for
      {{.GapHours}} hours (post-discharge threshold: 72h). Last
      reading: {{.LastReadingDate}}. Contact patient to assess barriers.
    text_hi: |
      छुट्टी के बाद सहभागिता चेतावनी: {{.GapHours}} घंटे से कोई
      माप प्राप्त नहीं। अंतिम रीडिंग: {{.LastReadingDate}}।
      बाधाओं का आकलन करने के लिए रोगी से संपर्क करें।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      We haven't received any health readings from you recently.
      Please measure your blood pressure or weight when you can,
      or let your care team know if you need help.
    text_hi: |
      हमें हाल ही में आपसे कोई स्वास्थ्य रीडिंग प्राप्त नहीं
      हुई है। कृपया जब संभव हो अपना रक्तचाप या वजन मापें, या
      यदि आपको सहायता चाहिए तो अपनी देखभाल टीम को बताएं।
    version: "1.0.0"
