# KB-23 Decision Card Template: Missed Transition Milestone
# Triggered when: CareTransitionDetector detects that a scheduled
#   transition milestone (7-day follow-up, medication reconciliation,
#   14-day midpoint, or 30-day exit) was not completed by its due date.
# Purpose: Alert the care team that the care transition pathway has
#   fallen off track so they can reschedule and re-engage before
#   the patient is lost to follow-up.
# Version: 1.0.0
# Phase: Gap 17 — Care Transition Bridge

template_id: "dc-transition-missed-milestone-v1"
node_id: "CROSS_NODE"
differential_id: "TRANSITION_MISSED_MILESTONE"
version: "1.0.0"
clinical_reviewer: "dr.primary.care.lead"
mcu_gate_default: "MODIFY"

card_source: "CARE_TRANSITION"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      MISSED MILESTONE: A scheduled care transition milestone has
      not been completed by its due date.

      Recommended actions:
        1. Identify the missed milestone and determine why it was
           not completed (staffing, patient unavailable, oversight)
        2. Reschedule within 48 hours if possible
        3. If the patient is unreachable, escalate to the care
           coordinator for outreach
        4. Document the delay and any clinical implications in the
           transition record
        5. Assess whether subsequent milestones need to be adjusted
    action_text_hi: |
      छूटा हुआ मील का पत्थर: एक निर्धारित देखभाल संक्रमण
      मील का पत्थर अपनी नियत तिथि तक पूरा नहीं हुआ। 48 घंटे
      के भीतर पुनर्निर्धारित करें।
    rationale_en: |
      Missed milestones in the post-discharge care pathway are
      associated with increased readmission risk. Each missed
      checkpoint compounds the risk because downstream milestones
      depend on upstream completion. Timely rescheduling preserves
      the integrity of the transition pathway.
    guideline_ref: "AHA/ACC 2022 Transitions of Care"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      MISSED TRANSITION MILESTONE: {{.MilestoneType}} was scheduled
      for {{.ScheduledDate}} but has not been completed. Care pathway
      requires attention.
    text_hi: |
      छूटा हुआ संक्रमण मील का पत्थर: {{.MilestoneType}}
      {{.ScheduledDate}} के लिए निर्धारित था लेकिन पूरा नहीं
      हुआ है। देखभाल मार्ग पर ध्यान आवश्यक है।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      A scheduled check-in was missed. Your care team will reach
      out to reschedule.
    text_hi: |
      एक निर्धारित जांच छूट गई। आपकी देखभाल टीम पुनर्निर्धारण
      के लिए संपर्क करेगी।
    version: "1.0.0"
