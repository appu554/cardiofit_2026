# KB-23 Decision Card Template: 30-Day Transition Exit Assessment
# Triggered when: CareTransitionDetector reaches day 30 of the post-discharge
#   window. The system compiles the full transition outcome: PAI tier at
#   exit, escalation count during the window, and engagement metrics.
# Purpose: Formal exit from the care transition monitoring window. Summarise
#   the transition outcome, close the transition episode, and hand back to
#   the standard ambulatory care pathway.
# Version: 1.0.0
# Phase: Gap 17 — Care Transition Bridge

template_id: "dc-transition-30d-exit-v1"
node_id: "CROSS_NODE"
differential_id: "TRANSITION_30D_EXIT"
version: "1.0.0"
clinical_reviewer: "dr.primary.care.lead"
mcu_gate_default: "SAFE"

card_source: "CARE_TRANSITION"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      TRANSITION EXIT: The 30-day post-discharge monitoring window
      has concluded. Review the transition summary:
        1. Outcome category: successful, partial, or failed
        2. Final PAI tier at exit vs admission PAI tier
        3. Escalation events during the transition window
        4. Engagement metric: average readings per week
      If outcome is partial or failed, consider extending monitoring
      or scheduling an early follow-up visit. Update the patient's
      long-term care plan with any new clinical insights from the
      transition period.
    action_text_hi: |
      संक्रमण समाप्ति: 30-दिवसीय छुट्टी के बाद की निगरानी अवधि
      समाप्त हो गई है। संक्रमण सारांश की समीक्षा करें।
    rationale_en: |
      A structured 30-day exit assessment closes the care transition
      loop and provides the ambulatory team with a complete picture
      of the post-discharge trajectory. Patients with failed
      transitions (readmission, unresolved medication issues, or
      persistent deterioration) require modified long-term plans.
    guideline_ref: "CMS Hospital Readmission Reduction Program; AHA/ACC 2022"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      TRANSITION EXIT ASSESSMENT: Outcome: {{.OutcomeCategory}}.
      PAI at exit: {{.FinalPAITier}}. Escalations during window:
      {{.EscalationCount}}. Engagement: {{.EngagementMetric}}
      readings/week.
    text_hi: |
      संक्रमण समाप्ति मूल्यांकन: परिणाम: {{.OutcomeCategory}}।
      निकास पर PAI: {{.FinalPAITier}}। एस्कलेशन: {{.EscalationCount}}।
      सहभागिता: {{.EngagementMetric}} रीडिंग/सप्ताह।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your post-hospital monitoring period has concluded. Your care
      team will continue your regular care plan.
    text_hi: |
      आपकी अस्पताल के बाद की निगरानी अवधि समाप्त हो गई है।
      आपकी देखभाल टीम आपकी नियमित देखभाल योजना जारी रखेगी।
    version: "1.0.0"
