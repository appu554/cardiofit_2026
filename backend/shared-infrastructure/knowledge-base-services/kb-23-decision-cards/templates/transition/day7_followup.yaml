# KB-23 Decision Card Template: 7-Day Post-Discharge Follow-Up
# Triggered when: CareTransitionDetector reaches day 7 of the post-discharge
#   window. The system evaluates medication reconciliation status, PAI
#   trajectory, and whether clinical contact has occurred.
# Purpose: Structured 7-day checkpoint to ensure the immediate post-discharge
#   period has been managed — medications reconciled, engagement established,
#   and early clinical signals captured.
# Version: 1.0.0
# Phase: Gap 17 — Care Transition Bridge

template_id: "dc-transition-7d-followup-v1"
node_id: "CROSS_NODE"
differential_id: "TRANSITION_7D_FOLLOWUP"
version: "1.0.0"
clinical_reviewer: "dr.primary.care.lead"
mcu_gate_default: "SAFE"

card_source: "CARE_TRANSITION"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      7-DAY POST-DISCHARGE CHECK: Review the following milestones:
        1. Medication reconciliation: confirm completed or escalate
        2. PAI trajectory: assess whether vitals are trending toward
           ambulatory baseline or diverging
        3. Clinical contact: confirm the patient has had at least one
           clinical touchpoint (phone, telehealth, or in-person)
      If any milestone is incomplete, escalate per care transition
      protocol. Schedule the 14-day midpoint review.
    action_text_hi: |
      7-दिवसीय छुट्टी के बाद जांच: दवा मिलान, PAI प्रवृत्ति, और
      नैदानिक संपर्क स्थिति की समीक्षा करें।
    rationale_en: |
      The first 7 days post-discharge represent the highest risk
      window for readmission. Structured follow-up at day 7 allows
      early detection of medication errors, deteriorating vitals,
      and disengagement before they become emergencies.
    guideline_ref: "AHA/ACC 2022 Transitions of Care; CMS Hospital Readmission Reduction Program"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      7-DAY POST-DISCHARGE REVIEW: Reconciliation status:
      {{.ReconciliationStatus}}. PAI trajectory: {{.PAITrajectory}}.
      Clinical contact: {{.ClinicalContactStatus}}.
    text_hi: |
      7-दिवसीय छुट्टी के बाद समीक्षा: मिलान स्थिति:
      {{.ReconciliationStatus}}। PAI प्रवृत्ति: {{.PAITrajectory}}।
      नैदानिक संपर्क: {{.ClinicalContactStatus}}।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      It has been one week since you left hospital. Your care team
      is checking on your progress.
    text_hi: |
      आपको अस्पताल से छुट्टी मिले एक सप्ताह हो गया है। आपकी
      देखभाल टीम आपकी प्रगति की जांच कर रही है।
    version: "1.0.0"
