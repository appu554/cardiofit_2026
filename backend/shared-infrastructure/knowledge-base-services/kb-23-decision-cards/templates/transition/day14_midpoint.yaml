# KB-23 Decision Card Template: 14-Day Transition Midpoint
# Triggered when: CareTransitionDetector reaches day 14 of the post-discharge
#   window. The system evaluates medication stability, baseline recovery,
#   and patient engagement metrics.
# Purpose: Midpoint assessment to determine whether the patient is
#   stabilising toward their ambulatory baseline or requires intervention
#   before the 30-day exit window.
# Version: 1.0.0
# Phase: Gap 17 — Care Transition Bridge

template_id: "dc-transition-14d-midpoint-v1"
node_id: "CROSS_NODE"
differential_id: "TRANSITION_14D_MIDPOINT"
version: "1.0.0"
clinical_reviewer: "dr.primary.care.lead"
mcu_gate_default: "SAFE"

card_source: "CARE_TRANSITION"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      14-DAY MIDPOINT ASSESSMENT: Review the following domains:
        1. Medication stability: confirm reconciled medications are
           tolerated and adherence is adequate
        2. Baseline recovery: compare current vitals (BP, weight, HR)
           against pre-admission ambulatory baseline from KB-26
        3. Engagement: verify the patient is submitting regular
           home readings (target: >=4 readings/week)
      If baseline recovery is not trending toward pre-admission
      levels, consider whether the hospital event has shifted the
      patient's clinical trajectory and update the care plan.
    action_text_hi: |
      14-दिवसीय मध्यबिंदु मूल्यांकन: दवा स्थिरता, आधारभूत
      पुनर्प्राप्ति, और रोगी सहभागिता की समीक्षा करें।
    rationale_en: |
      By day 14, acute post-discharge instability should be resolving.
      Patients who have not returned toward their ambulatory baseline
      by this point are at elevated risk for readmission or clinical
      deterioration. This is the optimal intervention point — early
      enough to modify the trajectory, late enough to have meaningful
      post-discharge data.
    guideline_ref: "AHA/ACC 2022 Transitions of Care; NICE NG5 2015"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      14-DAY TRANSITION MIDPOINT: Medication: {{.MedicationStatus}}.
      Baseline: {{.BaselineStatus}}. Engagement: {{.EngagementStatus}}.
    text_hi: |
      14-दिवसीय संक्रमण मध्यबिंदु: दवा: {{.MedicationStatus}}।
      आधारभूत: {{.BaselineStatus}}। सहभागिता: {{.EngagementStatus}}।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      You are halfway through your post-hospital monitoring period.
      Your care team is reviewing your progress.
    text_hi: |
      आप अपनी अस्पताल के बाद की निगरानी अवधि के आधे रास्ते पर
      हैं। आपकी देखभाल टीम आपकी प्रगति की समीक्षा कर रही है।
    version: "1.0.0"
