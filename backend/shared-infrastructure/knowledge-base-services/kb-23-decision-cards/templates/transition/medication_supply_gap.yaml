# KB-23 Decision Card Template: Medication Supply Gap
# Triggered when: CareTransitionDetector identifies a discharge medication
#   that has a formulary or supply issue — not on the ambulatory formulary,
#   requires prior authorisation, or is a hospital-only formulation that
#   the patient cannot obtain in the community.
# Purpose: Surface formulary and supply barriers early so the clinician
#   can arrange an alternative before the patient runs out of the
#   discharge supply (typically 7-14 days).
# Version: 1.0.0
# Phase: Gap 17 — Care Transition Bridge

template_id: "dc-transition-medication-supply-gap-v1"
node_id: "CROSS_NODE"
differential_id: "TRANSITION_MEDICATION_SUPPLY_GAP"
version: "1.0.0"
clinical_reviewer: "dr.primary.care.lead"
mcu_gate_default: "MODIFY"

card_source: "CARE_TRANSITION"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MEDICATION_MODIFY"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      MEDICATION SUPPLY BARRIER: A discharge medication has a
      formulary or supply issue that may prevent the patient from
      obtaining it in the ambulatory setting.

      Recommended actions:
        1. Verify the formulary issue with the patient's insurer
        2. If not on formulary: prescribe a therapeutically equivalent
           alternative from the ambulatory formulary
        3. If prior authorisation required: initiate the PA process
           and provide a bridge supply
        4. If hospital-only formulation: convert to an equivalent
           community-available formulation
        5. Communicate the change to the patient and update the
           reconciled medication list
    action_text_hi: |
      दवा आपूर्ति बाधा: एक छुट्टी दवा में फॉर्मूलरी या आपूर्ति
      समस्या है। चिकित्सीय रूप से समकक्ष विकल्प पर विचार करें।
    rationale_en: |
      Medication supply gaps are a common but preventable cause of
      non-adherence after hospital discharge. Patients who cannot
      fill a new prescription within the first week post-discharge
      have significantly higher rates of clinical deterioration and
      readmission. Early identification allows proactive substitution.
    guidline_ref: "NICE NG5 2015; WHO Medication Without Harm 2017"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      MEDICATION SUPPLY CONCERN: {{.DrugName}} ({{.DrugClass}}) —
      {{.FormularyIssue}}. {{.SuggestedAlternative}}
    text_hi: |
      दवा आपूर्ति चिंता: {{.DrugName}} ({{.DrugClass}}) —
      {{.FormularyIssue}}। {{.SuggestedAlternative}}
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      One of your new medications may be difficult to obtain. Your
      care team is working on an alternative.
    text_hi: |
      आपकी एक नई दवा प्राप्त करना कठिन हो सकता है। आपकी
      देखभाल टीम एक विकल्प पर काम कर रही है।
    version: "1.0.0"
