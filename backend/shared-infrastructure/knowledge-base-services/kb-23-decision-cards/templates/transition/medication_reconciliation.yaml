# KB-23 Decision Card Template: Post-Discharge Medication Reconciliation
# Triggered when: CareTransitionDetector identifies a recent discharge with
#   medication discrepancies between hospital discharge list and ambulatory
#   medication record. DetectMedicationDiscrepancies compares discharge
#   summary against KB-20 active medication profile.
# Purpose: Surface medication discrepancies early in the post-discharge
#   window so the clinician can reconcile before an adverse drug event
#   occurs. High-risk changes (e.g., insulin dose change, new anticoagulant)
#   escalate MCU gate to HALT.
# Version: 1.0.0
# Phase: Gap 17 — Care Transition Bridge

template_id: "dc-transition-medication-reconciliation-v1"
node_id: "CROSS_NODE"
differential_id: "TRANSITION_MEDICATION_RECONCILIATION"
version: "1.0.0"
clinical_reviewer: "dr.primary.care.lead"
mcu_gate_default: "MODIFY"

card_source: "CARE_TRANSITION"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MEDICATION_MODIFY"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      RECONCILE MEDICATIONS: Compare the hospital discharge medication
      list against the patient's ambulatory medication record. Identify
      additions, deletions, and dose changes. Pay special attention to
      high-risk changes: anticoagulants, insulin, opioids, and RAAS
      inhibitors. Confirm intended changes with the discharging team
      if unclear. Update the ambulatory record and communicate the
      reconciled list to the patient.
    action_text_hi: |
      दवाओं का मिलान करें: अस्पताल छुट्टी दवा सूची की तुलना
      एम्बुलेटरी दवा रिकॉर्ड से करें। उच्च-जोखिम परिवर्तनों पर
      विशेष ध्यान दें।
    rationale_en: |
      Medication discrepancies at care transitions are a leading cause
      of preventable adverse drug events. Up to 67% of patients have
      at least one unintended medication discrepancy at hospital
      discharge. Early reconciliation within 72 hours reduces 30-day
      readmission risk by 20-30%.
    guideline_ref: "WHO High 5s Medication Reconciliation; NICE NG5 2015"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      POST-DISCHARGE MEDICATION REVIEW: {{.DiscrepanciesFound}}
      discrepancy(ies) identified. {{.HighRiskChanges}} high-risk
      change(s). {{.ReconciliationOutcome}}. {{.SuggestedAction}}
    text_hi: |
      छुट्टी के बाद दवा समीक्षा: {{.DiscrepanciesFound}} विसंगति
      पाई गई। {{.HighRiskChanges}} उच्च-जोखिम परिवर्तन।
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your medications may have changed during your hospital stay.
      Your care team is reviewing to ensure everything is correct.
    text_hi: |
      आपके अस्पताल में रहने के दौरान आपकी दवाइयां बदली हो सकती
      हैं। आपकी देखभाल टीम यह सुनिश्चित करने के लिए समीक्षा कर
      रही है कि सब कुछ सही है।
    version: "1.0.0"
