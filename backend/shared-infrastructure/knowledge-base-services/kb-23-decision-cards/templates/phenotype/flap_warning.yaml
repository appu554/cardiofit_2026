# KB-23 Decision Card Template: Phenotype Flap Warning
# Triggered when: Stability engine detects oscillation between phenotype clusters.
# Purpose: Alert clinician to unstable phenotype classification.
# Version: 1.0.0
# Phase: V4-7 — Phenotype Clustering Temporal Stability

template_id: "dc-phenotype-flap-warning-v1"
node_id: "CROSS_NODE"
differential_id: "PHENOTYPE_FLAP_WARNING"
version: "1.0.0"
clinical_reviewer: "dr.endocrinology.lead"
mcu_gate_default: "SAFE"

card_source: "STABILITY_ENGINE"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Patient's phenotype classification is unstable. Hold current therapy
      pathway pending stabilization. Investigate root cause of phenotype
      oscillation — consider medication adherence, lifestyle changes, or
      measurement variability.
    rationale_en: |
      Phenotype oscillation between two clusters without a clear clinical
      driver suggests measurement noise, intermittent adherence, or a
      transitional metabolic state. Changing therapy based on an unstable
      classification risks therapeutic whiplash.
    guideline_ref: "Clinical best practice"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      PHENOTYPE UNSTABLE: Patient oscillating between {{.FlapPair}}.
      Root cause: {{.DomainDriver}} domain instability. Hold current
      pathway pending stabilization.
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your health measurements have been variable recently. Your care team
      is monitoring this closely and will update your plan once a clear
      pattern emerges.
    version: "1.0.0"
