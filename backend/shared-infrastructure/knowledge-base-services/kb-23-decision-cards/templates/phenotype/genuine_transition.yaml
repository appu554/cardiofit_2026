# KB-23 Decision Card Template: Phenotype Transition
# Triggered when: Stability engine accepts a genuine phenotype transition.
# Purpose: Notify clinician of confirmed phenotype change with therapy context.
# Version: 1.0.0
# Phase: V4-7 — Phenotype Clustering Temporal Stability

template_id: "dc-phenotype-transition-v1"
node_id: "CROSS_NODE"
differential_id: "PHENOTYPE_TRANSITION"
version: "1.0.0"
clinical_reviewer: "dr.endocrinology.lead"
mcu_gate_default: "SAFE"

card_source: "STABILITY_ENGINE"

confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "PATHWAY_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Patient phenotype has changed. Review current therapy pathway for
      alignment with the new phenotype classification. Consider whether
      medication targets, monitoring frequency, or lifestyle interventions
      should be adjusted.
    rationale_en: |
      A confirmed phenotype transition indicates the patient's metabolic
      profile has shifted meaningfully. Therapy pathways designed for the
      previous phenotype may no longer be optimal.
    guideline_ref: "ADA Standards of Care 2024; ACC/AHA CKM 2023"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 1

fragments:
  - fragment_type: "CLINICIAN"
    text_en: |
      PHENOTYPE TRANSITION: Patient phenotype changed from {{.PreviousCluster}}
      to {{.NewCluster}} — {{.Interpretation}}. Dominant domain driver:
      {{.DomainDriver}}. Confidence: {{.Confidence}}.
    version: "1.0.0"
  - fragment_type: "PATIENT"
    text_en: |
      Your health profile has been updated based on recent data. Your care
      team will review your treatment plan to ensure it matches your current
      health needs.
    version: "1.0.0"
