# KB-23 Decision Card Template: BP Hypotensive
# Triggered when: ORTHOSTATIC_ALERT fires OR bp_status == HYPOTENSIVE
# Purpose: Alert clinician that patient is over-treated or haemodynamically unstable.
#          Requires dose reduction review, fall risk assessment, and combination
#          therapy evaluation (especially SGLT2i + diuretic in hot seasons).
# Version: 1.0.0

template_id: "dc-bp-hypotensive-v1"
node_id: "KB20_BP_MONITOR"
differential_id: "BP_HYPOTENSIVE"
version: "1.0.0"
clinical_reviewer: "dr.hypertension.lead"
mcu_gate_default: "PAUSE"

# This card is generated by KB-20 BP monitoring when hypotensive readings
# or orthostatic symptoms are detected.
card_source: "KB20_EVENT"
card_type: "HYPERTENSION_REVIEW"
flags:
  - "HYPOTENSIVE"

# Trigger event
trigger_event: "ORTHOSTATIC_ALERT"
trigger_condition: "bp_status == HYPOTENSIVE OR orthostatic_drop_detected"

# SLA: 12 hours -- hypotension requires prompt but not immediate review
sla_hours: 12
priority: "HIGH"

# Confidence tier -- guideline-concordant safety classification
confidence_tier: "GUIDELINE_CONCORDANT"

# No Bayesian thresholds -- this is a threshold-based trigger, not a
# probabilistic differential. The card fires on low BP readings or
# orthostatic drop >= 20 mmHg SBP on standing.
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "DOSE_REDUCTION"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Consider antihypertensive dose reduction. Patient is over-treated or
      haemodynamically unstable.

      Current readings:
        SBP: {{latest_sbp}} mmHg / DBP: {{latest_dbp}} mmHg
        Orthostatic drop: {{orthostatic_drop}} mmHg (standing vs supine)
        Current regimen: {{antihypertensive_regimen}}

      Dose reduction strategy:
        1. Identify the most recently added or increased antihypertensive
        2. Reduce dose by 50% or discontinue if already at minimum dose
        3. Priority order for reduction:
           a. Alpha-blockers (highest orthostatic hypotension risk)
           b. Centrally-acting agents (clonidine, methyldopa)
           c. Diuretics (if volume depletion suspected)
           d. CCBs (especially amlodipine in ankle oedema)
           e. ACEi/ARB (preserve if renal protection needed)
        4. Recheck standing and supine BP after 48 hours
        5. If on multiple agents: consider simplifying to single-pill combination
    action_text_hi: |
      उच्चरक्तचापरोधी खुराक कम करने पर विचार करें। रोगी अधिक उपचारित है या
      हेमोडायनामिक रूप से अस्थिर है।

      वर्तमान रीडिंग:
        SBP: {{latest_sbp}} mmHg / DBP: {{latest_dbp}} mmHg
        ऑर्थोस्टैटिक ड्रॉप: {{orthostatic_drop}} mmHg (खड़े बनाम लेटे हुए)
        वर्तमान आहार: {{antihypertensive_regimen}}

      खुराक कमी रणनीति:
        1. सबसे हाल ही में जोड़ी गई या बढ़ाई गई उच्चरक्तचापरोधी दवा की पहचान करें
        2. खुराक 50% कम करें या न्यूनतम खुराक पर होने पर बंद करें
        3. कमी के लिए प्राथमिकता क्रम:
           a. अल्फा-ब्लॉकर्स (सबसे अधिक ऑर्थोस्टैटिक हाइपोटेंशन जोखिम)
           b. केंद्रीय रूप से कार्य करने वाले एजेंट
           c. मूत्रवर्धक (यदि वॉल्यूम डिप्लीशन संदिग्ध)
           d. CCBs
           e. ACEi/ARB (गुर्दे की सुरक्षा के लिए बनाए रखें)
        4. 48 घंटे बाद खड़े और लेटे हुए BP की जांच करें
    rationale_en: "Antihypertensive over-treatment is common in elderly and CKD patients. Systematic dose reduction guided by orthostatic measurements reduces fall risk by 25-40%."
    guideline_ref: "NICE Hypertension 2023 Section 1.6; ESH/ESC HTN 2023 Section 8.8; KDIGO 2021 BP in CKD"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "ORTHOSTATIC_EDUCATION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Educate patient on positional changes to reduce orthostatic symptoms:
        - Rise slowly from sitting or lying position (take 30 seconds)
        - Hold onto support (bed rail, chair arm, wall) when standing
        - Sit on edge of bed for 1 minute before standing in the morning
        - Avoid prolonged standing, especially in hot environments
        - Ensure adequate hydration (1.5-2L/day unless fluid-restricted)
        - Avoid hot baths/showers (vasodilation worsens orthostasis)
        - Consider compression stockings if recurrent symptoms

      If orthostatic symptoms persist despite education and dose reduction,
      consider tilt-table testing and autonomic function assessment.
    action_text_hi: |
      ऑर्थोस्टैटिक लक्षणों को कम करने के लिए रोगी को स्थितीय परिवर्तनों के बारे
      में शिक्षित करें:
        - बैठने या लेटने की स्थिति से धीरे-धीरे उठें (30 सेकंड लें)
        - खड़े होते समय सहारा पकड़ें (बेड रेल, कुर्सी का हत्था, दीवार)
        - सुबह खड़े होने से पहले 1 मिनट बिस्तर के किनारे बैठें
        - लंबे समय तक खड़े रहने से बचें, विशेषकर गर्म वातावरण में
        - पर्याप्त हाइड्रेशन सुनिश्चित करें (1.5-2L/दिन जब तक द्रव प्रतिबंधित न हो)
        - गर्म स्नान/शावर से बचें (वासोडिलेशन ऑर्थोस्टेसिस को बिगाड़ता है)
        - बार-बार लक्षण होने पर कम्प्रेशन स्टॉकिंग्स पर विचार करें
    rationale_en: "Patient education on positional manoeuvres reduces orthostatic episodes by 30-50%. These non-pharmacological interventions are first-line before medication adjustment."
    guideline_ref: "ESH/ESC HTN 2023 Section 8.8; AHA Orthostatic Hypotension Statement 2022"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 2

  - rec_type: "COMBINATION_REVIEW"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Review SGLT2i + diuretic combination. Dual volume depletion risk, especially
      in summer/monsoon season.

      High-risk combinations for volume depletion:
        - SGLT2i + loop diuretic (furosemide, torsemide)
        - SGLT2i + thiazide + ACEi/ARB (triple volume depletion)
        - Any diuretic combination in elderly (>70 years)

      Seasonal risk factors (MONSOON/SUMMER):
        - Increased insensible losses from sweating
        - Dehydration risk from gastrointestinal illness (monsoon infections)
        - Dietary changes reducing fluid intake

      Volume assessment:
        - Check orthostatic vitals (lying → standing BP and HR)
        - Review urine output and specific gravity if available
        - Check serum sodium and haematocrit (haemoconcentration)
        - Consider reducing diuretic dose by 50% in summer months
        - If acute illness: hold SGLT2i temporarily (sick day rules)
    action_text_hi: |
      SGLT2i + मूत्रवर्धक संयोजन की समीक्षा करें। दोहरी वॉल्यूम डिप्लीशन का
      जोखिम, विशेषकर गर्मी/मानसून के मौसम में।

      वॉल्यूम डिप्लीशन के लिए उच्च-जोखिम संयोजन:
        - SGLT2i + लूप मूत्रवर्धक (फ्यूरोसेमाइड, टोरसेमाइड)
        - SGLT2i + थायज़ाइड + ACEi/ARB (ट्रिपल वॉल्यूम डिप्लीशन)
        - बुजुर्गों में कोई भी मूत्रवर्धक संयोजन (>70 वर्ष)

      मौसमी जोखिम कारक (मानसून/गर्मी):
        - पसीने से बढ़ा हुआ अमहसूस नुकसान
        - गैस्ट्रोइंटेस्टाइनल बीमारी से निर्जलीकरण जोखिम
        - द्रव सेवन कम करने वाले आहार परिवर्तन

      वॉल्यूम मूल्यांकन:
        - ऑर्थोस्टैटिक वाइटल जांचें
        - मूत्र उत्पादन की समीक्षा करें
        - सीरम सोडियम और हेमेटोक्रिट जांचें
        - गर्मी के महीनों में मूत्रवर्धक खुराक 50% कम करने पर विचार करें
        - तीव्र बीमारी में: अस्थायी रूप से SGLT2i रोकें (बीमार दिन के नियम)
    rationale_en: "SGLT2i + diuretic combinations increase volume depletion risk 2-3 fold. Indian subcontinent seasonal patterns (monsoon GI illness, summer heat) exacerbate dehydration risk requiring proactive dose adjustment."
    guideline_ref: "KDIGO 2022 Diabetes-CKD Section 4.2; RSSDI 2022 SGLT2i Safety; ADA 2024 S9.4"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 3

  - rec_type: "FALL_RISK"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Assess fall risk, especially in elderly patients (age > 70). Orthostatic
      hypotension increases fall risk significantly.

      Fall risk assessment:
        - Patient age: {{patient_age}} years
        - Orthostatic drop: {{orthostatic_drop}} mmHg
        - Previous falls in past 12 months: {{previous_falls}}
        - Gait and balance assessment (Timed Up and Go test if available)
        - Polypharmacy review: count of medications causing orthostasis
          (antihypertensives, antidepressants, sedatives, opioids, alpha-blockers)
        - Home safety assessment: rugs, lighting, bathroom rails

      If fall risk HIGH (age > 70 AND orthostatic drop > 20 mmHg AND previous falls):
        - Mandatory antihypertensive dose reduction
        - Consider relaxing BP target to < 150/90 mmHg (frailty-adjusted)
        - Physiotherapy referral for balance and strength training
        - Home environment safety assessment
    action_text_hi: |
      गिरने के जोखिम का आकलन करें, विशेषकर बुजुर्ग रोगियों में (आयु > 70)।
      ऑर्थोस्टैटिक हाइपोटेंशन गिरने के जोखिम को काफी बढ़ाता है।

      गिरने के जोखिम का आकलन:
        - रोगी की आयु: {{patient_age}} वर्ष
        - ऑर्थोस्टैटिक ड्रॉप: {{orthostatic_drop}} mmHg
        - पिछले 12 महीनों में पिछले गिरने: {{previous_falls}}
        - चाल और संतुलन मूल्यांकन
        - बहु-दवा समीक्षा: ऑर्थोस्टेसिस पैदा करने वाली दवाओं की गिनती
        - घर की सुरक्षा मूल्यांकन: कालीन, रोशनी, बाथरूम रेल

      यदि गिरने का जोखिम अधिक है (आयु > 70 और ऑर्थोस्टैटिक ड्रॉप > 20 mmHg और पिछले गिरने):
        - अनिवार्य उच्चरक्तचापरोधी खुराक कमी
        - BP लक्ष्य को < 150/90 mmHg तक शिथिल करने पर विचार करें (दुर्बलता-समायोजित)
        - संतुलन और शक्ति प्रशिक्षण के लिए फिजियोथेरेपी रेफरल
        - घर के वातावरण की सुरक्षा मूल्यांकन
    rationale_en: "Orthostatic hypotension doubles fall risk in elderly patients. Hip fractures from falls have 20-30% one-year mortality in patients >75 years. Relaxing BP targets in frail elderly reduces falls without increasing cardiovascular events (HYVET, SPRINT subgroup)."
    guideline_ref: "ESH/ESC HTN 2023 Section 8.8; NICE Falls Assessment CG161; HYVET 2008; AGS Beers Criteria 2023"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 4

  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "ROUTINE"
    target: "patient"
    action_text_en: |
      Your blood pressure has been lower than expected. This may cause dizziness
      or lightheadedness, especially when standing up. To stay safe:
        - Stand up slowly from sitting or lying down
        - Hold onto something stable when you first stand
        - Drink enough water (unless your doctor has limited your fluids)
        - Avoid standing for long periods, especially in hot weather
        - Tell your doctor if you feel dizzy, faint, or have fallen recently
      Your doctor may need to reduce one of your blood pressure medications.
    action_text_hi: |
      आपका रक्तचाप अपेक्षा से कम रहा है। यह चक्कर या हल्कापन का कारण बन सकता
      है, विशेषकर खड़े होते समय। सुरक्षित रहने के लिए:
        - बैठने या लेटने से धीरे-धीरे खड़े हों
        - पहली बार खड़े होते समय किसी स्थिर चीज को पकड़ें
        - पर्याप्त पानी पिएं (जब तक आपके डॉक्टर ने तरल पदार्थ सीमित न किया हो)
        - लंबे समय तक खड़े रहने से बचें, विशेषकर गर्म मौसम में
        - यदि आपको चक्कर आता है, बेहोशी महसूस होती है, या हाल ही में गिरे हैं तो अपने
          डॉक्टर को बताएं
      आपके डॉक्टर को आपकी रक्तचाप दवाओं में से एक कम करने की आवश्यकता हो सकती है।
    rationale_en: "Patient education on orthostatic precautions reduces fall-related injuries. Simple positional manoeuvres are the most effective first-line intervention for orthostatic hypotension."
    guideline_ref: "NICE Falls CG161; AHA Orthostatic Hypotension Statement 2022"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 5

# Panel definitions for UI rendering
panel_1_patient_state:
  fields: [sbp_7d_mean, dbp_7d_mean, bp_target_sbp, bp_target_dbp, antihypertensive_regimen, eGFR, potassium, bp_pattern, orthostatic_drop]

panel_2_guideline_logic:
  fields: [bp_target_source, trigger_criterion, weeks_above_target]

panel_3_safety_checks:
  fields: [potassium_level, egfr_trend, beta_blocker_active, sglt2i_active, drug_interactions]

panel_4_reasoning_trace:
  fields: [bp_reading_series, trajectory_description, drug_context, proposed_action, guideline_reference]

# Escalation criteria -- consumed by V-MCU orchestrator
escalation_triggers:
  - event: "SYNCOPE_REPORTED"
    condition: "patient_reports_syncope == true"
    action: "Escalate to HALT gate, mandatory same-day clinical review, hold all antihypertensives pending assessment"
  - event: "RECURRENT_FALLS"
    condition: "falls_count >= 2 in past 30 days"
    action: "Generate geriatric assessment card, mandatory antihypertensive reduction, physiotherapy referral"
  - event: "VOLUME_DEPLETION_SEVERE"
    condition: "orthostatic_drop >= 30 AND heart_rate_increase >= 20"
    action: "Hold diuretics and SGLT2i, IV fluid consideration, 4h SLA clinical review"

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "BP HYPOTENSIVE: SBP {{latest_sbp}} mmHg, orthostatic drop {{orthostatic_drop}} mmHg. Gate: PAUSE. SLA 12h. Review antihypertensive doses, assess fall risk, check SGLT2i + diuretic combination."
    text_hi: "BP निम्न: SBP {{latest_sbp}} mmHg, ऑर्थोस्टैटिक ड्रॉप {{orthostatic_drop}} mmHg। गेट: PAUSE। SLA 12 घंटे। उच्चरक्तचापरोधी खुराक की समीक्षा करें, गिरने के जोखिम का आकलन करें, SGLT2i + मूत्रवर्धक संयोजन जांचें।"
  - fragment_type: "PATIENT"
    text_en: "Your blood pressure is lower than expected. Your doctor may reduce your blood pressure medication. Please stand up slowly and hold onto support to prevent dizziness."
    text_hi: "आपका रक्तचाप अपेक्षा से कम है। आपके डॉक्टर आपकी रक्तचाप दवा कम कर सकते हैं। चक्कर से बचने के लिए कृपया धीरे-धीरे खड़े हों और सहारा पकड़ें।"
