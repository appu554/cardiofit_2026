# KB-23 Decision Card Template: Resistant Hypertension Review
# Triggered when: RESISTANT_HTN_DETECTED event fires from KB-20
# Purpose: Alert clinician that patient meets criteria for resistant hypertension
#          and requires specialist evaluation, secondary cause workup, and medication review.
# Version: 1.0.0

template_id: "dc-resistant-htn-review-v1"
node_id: "KB20_RESISTANT_HTN"
differential_id: "RESISTANT_HTN_CONFIRMED"
version: "1.0.0"
clinical_reviewer: "dr.hypertension.lead"
mcu_gate_default: "PAUSE"

# This card is generated by KB-20 when all resistant HTN criteria are met,
# bypassing the standard HPI pathway for immediate clinician notification.
card_source: "KB20_EVENT"
card_type: "HYPERTENSION_REVIEW"
flags:
  - "RESISTANT"

# Trigger event
trigger_event: "RESISTANT_HTN_DETECTED"

# SLA: 24 hours — resistant HTN requires timely specialist evaluation
sla_hours: 24
priority: "HIGH"

# Confidence tier — guideline-concordant classification (ESH/ESC 2023, AHA 2017)
confidence_tier: "GUIDELINE_CONCORDANT"

# No Bayesian thresholds — this is a criteria-based classification, not a
# probabilistic differential. The card is generated when all five criteria
# are met (see DetectResistantHTN in KB-20 patient_service.go).
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "SPECIALIST_REFERRAL"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Resistant Hypertension Confirmed: This patient meets all five criteria for
      resistant hypertension:
        - BP above target despite 3+ antihypertensive drug classes at optimised doses
        - At least one diuretic included in the regimen
        - Adherence >= 85% confirmed by KB-21 behavioural intelligence
        - Sustained for >= 12 weeks above target
      Refer to hypertension specialist or nephrologist for secondary cause workup.
      Secondary causes to exclude: primary hyperaldosteronism, obstructive sleep
      apnoea, renal artery stenosis, phaeochromocytoma, Cushing syndrome.
    action_text_hi: |
      प्रतिरोधी उच्च रक्तचाप की पुष्टि: यह रोगी प्रतिरोधी उच्च रक्तचाप के सभी
      पांच मानदंडों को पूरा करता है:
        - अनुकूलित खुराक पर 3+ एंटीहाइपरटेंसिव दवा वर्गों के बावजूद BP लक्ष्य से ऊपर
        - आहार में कम से कम एक मूत्रवर्धक शामिल
        - KB-21 द्वारा पुष्टि अनुपालन >= 85%
        - >= 12 सप्ताह से लक्ष्य से ऊपर बना हुआ
      द्वितीयक कारण की जांच के लिए उच्च रक्तचाप विशेषज्ञ या नेफ्रोलॉजिस्ट को रेफर करें।
    rationale_en: "Resistant hypertension affects 10-15% of treated hypertensive patients and is associated with a 50% higher risk of cardiovascular events. Secondary causes are identifiable in 5-10% and treatable."
    guideline_ref: "ESH/ESC HTN 2023, Section 8.11; AHA Resistant HTN Statement 2018"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "INVESTIGATION"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Secondary Cause Investigation Panel:
        1. Aldosterone:Renin Ratio (ARR) — screen for primary hyperaldosteronism
           - Ensure appropriate medication washout per Endocrine Society protocol
           - MRA should be stopped >= 4 weeks before test
        2. Renal duplex ultrasonography — screen for renal artery stenosis
           - If inconclusive, consider MR angiography
        3. Sleep study referral if STOP-BANG positive (KB-22 OSA screening node)
           - Polysomnography or home sleep apnoea test
        4. Consider 24-hour urinary metanephrines if paroxysmal symptoms present
    action_text_hi: |
      द्वितीयक कारण जांच पैनल:
        1. एल्डोस्टेरोन:रेनिन अनुपात (ARR) — प्राथमिक हाइपरल्डोस्टेरोनिज़्म की जांच
        2. रीनल डुप्लेक्स अल्ट्रासाउंड — गुर्दे की धमनी स्टेनोसिस की जांच
        3. नींद अध्ययन रेफरल यदि STOP-BANG सकारात्मक
        4. पैरॉक्सिस्मल लक्षण होने पर 24 घंटे मूत्र मेटानेफ्रिन पर विचार करें
    rationale_en: "Systematic screening for secondary causes in resistant HTN identifies treatable conditions in approximately 20% of cases. ARR has the highest diagnostic yield in this population."
    guideline_ref: "Endocrine Society PA Guideline 2016; ACC/AHA RAS 2014; AASM OSA 2017"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 2

  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Medication Optimisation Review:
        - Confirm all 3+ drug classes are at maximally tolerated doses
        - Verify diuretic is appropriate for renal function (thiazide-like if
          eGFR >= 30, loop diuretic if eGFR < 30)
        - Check for interfering medications: NSAIDs, oral contraceptives,
          sympathomimetics, liquorice-containing products
        - Consider adding spironolactone 25-50mg if not contraindicated
          (PATHWAY-2 trial evidence for fourth-line add-on)
        - Review salt intake and lifestyle factors
    action_text_hi: |
      दवा अनुकूलन समीक्षा:
        - सभी 3+ दवा वर्गों की अधिकतम सहनशील खुराक की पुष्टि करें
        - गुर्दे की कार्यक्षमता के लिए उपयुक्त मूत्रवर्धक की जांच करें
        - बाधा उत्पन्न करने वाली दवाओं की जांच करें: NSAIDs, मौखिक गर्भनिरोधक
        - यदि कोई विरोधाभास नहीं है तो स्पिरोनोलैक्टोन 25-50mg जोड़ने पर विचार करें
        - नमक सेवन और जीवनशैली कारकों की समीक्षा करें
    rationale_en: "PATHWAY-2 trial demonstrated spironolactone as the most effective fourth-line agent for resistant HTN. Medication review may identify pseudo-resistance from interfering substances."
    guideline_ref: "Williams B, Lancet 2015 (PATHWAY-2); ESH/ESC HTN 2023, Section 8.11.3"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 3

# Escalation criteria — consumed by V-MCU orchestrator
escalation_triggers:
  - event: "RESISTANT_HTN_CONFIRMED"
    condition: "secondary_cause_workup_complete AND no_secondary_cause_found"
    action: "Label as TRUE_RESISTANT_HTN, consider renal denervation eligibility assessment"
  - event: "SECONDARY_CAUSE_IDENTIFIED"
    condition: "specific_secondary_cause_diagnosed"
    action: "Generate cause-specific treatment card, close resistant HTN review"

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "Resistant HTN confirmed (3+ classes incl. diuretic, adherence >= 85%, BP above target >= 12 wk). SLA 24h. Secondary cause workup required: ARR, renal duplex, sleep study."
    text_hi: "प्रतिरोधी HTN की पुष्टि (3+ वर्ग जिसमें मूत्रवर्धक, अनुपालन >= 85%, BP लक्ष्य से ऊपर >= 12 सप्ताह)। SLA 24 घंटे। द्वितीयक कारण जांच आवश्यक।"
  - fragment_type: "PATIENT"
    text_en: "Your blood pressure is not responding to your current medications despite good adherence. Your doctor needs to check for specific causes and may refer you to a specialist."
    text_hi: "अच्छे अनुपालन के बावजूद आपका रक्तचाप वर्तमान दवाओं से नियंत्रित नहीं हो रहा है। आपके डॉक्टर को विशिष्ट कारणों की जांच करनी होगी और आपको विशेषज्ञ के पास भेज सकते हैं।"
