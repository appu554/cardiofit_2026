# KB-23 Decision Card Template: BP Declining / Early Warning
# Triggered when: BP_TRAJECTORY_CONCERN (EW-04) or DAMAGE_COMPOSITE_ALERT (EW-08) fires
# Purpose: Alert clinician to slowly rising BP trajectory before DECLINING threshold is
#          reached, enabling earlier intervention and avoiding reactive dose escalation.
# Version: 1.0.0

template_id: "dc-bp-declining-v1"
node_id: "VMCU_EW"
differential_id: "BP_TRAJECTORY_DECLINING"
version: "1.0.0"
clinical_reviewer: "dr.cardiology.lead"
mcu_gate_default: "PASS"

# This card is generated by KB-20 early warning loop (EW-01 through EW-08),
# not through the standard KB-22 HPI pathway.
card_source: "KB20_EARLY_WARNING"

card_type: "HYPERTENSION_REVIEW"
confidence_tier: "GUIDELINE_CONCORDANT"

# SLA: 72h for trajectory concern, 24h for damage composite alert
sla:
  BP_TRAJECTORY_CONCERN:
    response_hours: 72
    escalation_after_hours: 96
  DAMAGE_COMPOSITE_ALERT:
    response_hours: 24
    escalation_after_hours: 48

# No Bayesian thresholds -- this is a trajectory-triggered card
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MONITORING"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      BP trending upward slowly (+{{sbp_slope}} mmHg/week). At current rate, patient
      will reach severe range (SBP >= 180 mmHg) in approximately {{weeks_to_severe}} weeks.

      Risk stratum: {{bp_risk_stratum}}
      Consecutive early watch weeks: {{consecutive_early_watch_weeks}}
      Slope confidence: {{slope_confidence}}

      Recommended actions:
        - Increase home BP monitoring frequency to daily if not already
        - Review 7-day SBP trend at next visit
        - Consider ambulatory BP monitoring (ABPM) if slope confidence is LOW
    action_text_hi: |
      BP धीरे-धीरे बढ़ रहा है (+{{sbp_slope}} mmHg/सप्ताह)। वर्तमान दर पर, रोगी
      लगभग {{weeks_to_severe}} सप्ताह में गंभीर सीमा (SBP >= 180 mmHg) तक पहुंच जाएगा।

      जोखिम स्तर: {{bp_risk_stratum}}
      लगातार प्रारंभिक निगरानी सप्ताह: {{consecutive_early_watch_weeks}}
      ढलान विश्वसनीयता: {{slope_confidence}}

      अनुशंसित कार्रवाई:
        - घर पर BP निगरानी की आवृत्ति दैनिक तक बढ़ाएं
        - अगली विजिट पर 7-दिन SBP रुझान की समीक्षा करें
        - यदि ढलान विश्वसनीयता LOW है तो ABPM पर विचार करें
    rationale_en: "Early detection of gradual BP rise allows preventive intervention before frank DECLINING status. KDIGO CKD 2024 emphasises target-driven management with early course correction."
    guideline_ref: "KDIGO CKD 2024 S4.3; NICE Hypertension 2023 Section 1.4"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Review antihypertensive adherence and dietary sodium intake. Consider:
        - Medication adherence assessment (pill count, pharmacy refill data)
        - Dietary sodium intake review (target < 2g/day for CKD patients)
        - Weight change evaluation (fluid retention vs weight gain)
        - Sleep quality assessment (screen for obstructive sleep apnoea)
        - NSAID or OTC decongestant use (may counteract antihypertensives)
    action_text_hi: |
      एंटीहाइपरटेन्सिव दवा पालन और आहार सोडियम सेवन की समीक्षा करें। विचार करें:
        - दवा पालन मूल्यांकन (गोली गिनती, फार्मेसी रिफिल डेटा)
        - आहार सोडियम सेवन समीक्षा (CKD रोगियों के लिए लक्ष्य < 2g/दिन)
        - वजन परिवर्तन मूल्यांकन (द्रव प्रतिधारण बनाम वजन बढ़ना)
        - नींद गुणवत्ता मूल्यांकन (ऑब्सट्रक्टिव स्लीप एपनिया के लिए स्क्रीन)
        - NSAID या OTC डीकंजेस्टेंट उपयोग (एंटीहाइपरटेन्सिव को रोक सकता है)
    rationale_en: "Non-pharmacological factors account for up to 40% of resistant hypertension cases. Adherence confirmation is prerequisite before dose escalation."
    guideline_ref: "KDIGO CKD 2024 S4.3; ESC/ESH HTN 2023 Section 8.9"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 2

  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      If slope confidence LOW: "Projection based on limited readings -- treat
      as indicative only. Confirm with 5+ daily home BP readings over 7 days
      before clinical action."

      If damage composite score >= 5: "Multiple organ-damage signals converging.
      Prioritise renal protection (ACR recheck) alongside BP management."
    action_text_hi: |
      यदि ढलान विश्वसनीयता LOW है: "प्रक्षेपण सीमित रीडिंग पर आधारित है --
      केवल सांकेतिक मानें। नैदानिक कार्रवाई से पहले 7 दिनों में 5+ दैनिक
      घर पर BP रीडिंग से पुष्टि करें।"

      यदि क्षति समग्र स्कोर >= 5: "कई अंग-क्षति संकेत एकत्रित हो रहे हैं।
      BP प्रबंधन के साथ गुर्दे की सुरक्षा (ACR पुनर्जांच) को प्राथमिकता दें।"
    rationale_en: "Transparent confidence communication prevents overreaction to noisy data while ensuring genuine trends receive appropriate attention."
    guideline_ref: "KDIGO CKD 2024 S4.4"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 3

  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "ROUTINE"
    target: "patient"
    action_text_en: |
      Your blood pressure readings have been slowly increasing over the past
      few weeks. This does not require immediate action, but your doctor may
      want to:
        - Check your blood pressure more often
        - Review your medications
        - Discuss your salt intake and exercise habits
      Please continue taking your medications as prescribed and attend your
      scheduled appointments.
    action_text_hi: |
      पिछले कुछ हफ्तों में आपकी रक्तचाप की रीडिंग धीरे-धीरे बढ़ रही है।
      इसके लिए तुरंत कार्रवाई की आवश्यकता नहीं है, लेकिन आपके डॉक्टर चाहेंगे:
        - आपका रक्तचाप अधिक बार जांचें
        - आपकी दवाओं की समीक्षा करें
        - आपके नमक सेवन और व्यायाम की आदतों पर चर्चा करें
      कृपया अपनी दवाएं निर्धारित अनुसार लेते रहें और अपनी निर्धारित
      नियुक्तियों में उपस्थित हों।
    rationale_en: "Patient education about gradual trends reduces anxiety while promoting adherence to monitoring and medication schedules."
    guideline_ref: "NICE Hypertension 2023, Patient Information"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 4

# Escalation criteria -- consumed by V-MCU orchestrator
escalation_triggers:
  - event: "BP_PERSISTENT_DECLINE"
    condition: "bp_status == DECLINING for >= 2 consecutive trajectory computations"
    action: "Upgrade to URGENT, generate DECLINING card with medication titration recommendation"
  - event: "DAMAGE_SCORE_CRITICAL"
    condition: "damage_composite.score >= 7"
    action: "Escalate to 12h SLA, flag for specialist nephrology/cardiology review"

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "BP early warning: SBP slope +{{sbp_slope}} mmHg/week over {{consecutive_early_watch_weeks}} weeks. Stratum {{bp_risk_stratum}}. Weeks to severe: {{weeks_to_severe}}. Damage score: {{damage_score}}/8."
    text_hi: "BP प्रारंभिक चेतावनी: SBP ढलान +{{sbp_slope}} mmHg/सप्ताह {{consecutive_early_watch_weeks}} सप्ताह में। स्तर {{bp_risk_stratum}}। गंभीर तक सप्ताह: {{weeks_to_severe}}। क्षति स्कोर: {{damage_score}}/8।"
  - fragment_type: "PATIENT"
    text_en: "Your blood pressure has been slowly rising. Your doctor is monitoring this trend and may adjust your treatment plan."
    text_hi: "आपका रक्तचाप धीरे-धीरे बढ़ रहा है। आपके डॉक्टर इस रुझान की निगरानी कर रहे हैं और आपकी उपचार योजना में बदलाव कर सकते हैं।"
