# KB-23 Decision Card Template: BP Urgency
# Triggered when: BP_URGENCY_ALERT event fires with bp_status == URGENCY
# Purpose: IMMEDIATE physician contact required. SBP >= 180 mmHg with symptoms.
#          V-MCU is frozen. No titration of any medication permitted.
#          This is a HALT-gated card -- the most restrictive safety gate.
# Version: 1.0.0

template_id: "dc-bp-urgency-v1"
node_id: "KB20_BP_MONITOR"
differential_id: "BP_URGENCY"
version: "1.0.0"
clinical_reviewer: "dr.hypertension.lead"
mcu_gate_default: "HALT"

# This card is generated by KB-20 BP monitoring when hypertensive urgency
# criteria are met, or escalated from bp_severe card with symptoms.
card_source: "KB20_EVENT"
card_type: "HYPERTENSION_REVIEW"
flags:
  - "URGENCY"
  - "CRITICAL"

# Trigger event
trigger_event: "BP_URGENCY_ALERT"
trigger_condition: "bp_status == URGENCY"

# SLA: 0 hours -- immediate real-time notification, not a card SLA.
# This card triggers push notification to on-call clinician immediately.
sla_hours: 0
priority: "CRITICAL"
safety_criticality: "CRITICAL"

# Confidence tier -- guideline-concordant emergency classification
confidence_tier: "GUIDELINE_CONCORDANT"

# No Bayesian thresholds -- this is a threshold + symptom trigger.
# The card fires when SBP >= 180 mmHg AND end-organ symptoms are present.
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "IMMEDIATE_CONTACT"
    urgency: "EMERGENCY"
    target: "clinician"
    action_text_en: |
      URGENT: Immediate physician contact required.

      SBP >= 180 mmHg with symptoms detected:
        Latest SBP: {{latest_sbp}} mmHg
        Latest DBP: {{latest_dbp}} mmHg
        Reported symptoms: {{reported_symptoms}}

      This constitutes a hypertensive urgency/emergency. Actions:
        1. Contact patient by phone immediately to confirm symptoms
        2. Assess for hypertensive emergency (end-organ damage):
           - Neurological: headache, confusion, focal deficits, seizure
           - Cardiac: chest pain, dyspnoea, acute pulmonary oedema
           - Renal: acute oliguria, haematuria, rapid creatinine rise
           - Ophthalmological: papilloedema, retinal haemorrhage
        3. If end-organ damage confirmed: direct to emergency department immediately
        4. If no end-organ damage (hypertensive urgency): oral antihypertensive,
           reduce BP by 25% over 24-48 hours, NOT to normal range acutely
    action_text_hi: |
      तत्काल: तुरंत चिकित्सक संपर्क आवश्यक।

      SBP >= 180 mmHg लक्षणों के साथ पता चला:
        नवीनतम SBP: {{latest_sbp}} mmHg
        नवीनतम DBP: {{latest_dbp}} mmHg
        रिपोर्ट किए गए लक्षण: {{reported_symptoms}}

      यह उच्च रक्तचाप आपातकाल है। कार्रवाई:
        1. लक्षणों की पुष्टि के लिए तुरंत रोगी से फोन पर संपर्क करें
        2. उच्च रक्तचाप आपातकाल (अंग क्षति) का आकलन करें
        3. यदि अंग क्षति की पुष्टि: तुरंत आपातकालीन विभाग में भेजें
        4. यदि अंग क्षति नहीं: मौखिक उच्चरक्तचापरोधी, 24-48 घंटों में BP 25% कम करें
    rationale_en: "Hypertensive urgency (SBP >= 180 with symptoms but without acute end-organ damage) requires controlled BP reduction. Overly rapid reduction risks cerebral hypoperfusion and ischaemic stroke."
    guideline_ref: "ESH/ESC HTN 2023 Section 8.1; AHA Hypertensive Crisis 2017; JNC-8"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "NO_TITRATION"
    urgency: "EMERGENCY"
    target: "clinician"
    action_text_en: |
      V-MCU FROZEN: Do NOT titrate any medication.

      All V-MCU titration pathways are suspended:
        - Insulin dose adjustments: FROZEN
        - SGLT2i dose changes: FROZEN
        - GLP-1 RA titration: FROZEN
        - Antihypertensive titration: FROZEN (managed by physician directly)

      V-MCU will remain frozen until:
        - Clinician manually clears HALT gate after BP assessment
        - BP confirmed < 160/100 mmHg on two consecutive readings >= 4 hours apart
        - No residual end-organ damage symptoms

      This is a Channel A (KB-23 MCU gate) HALT. All three safety channels must
      agree before any medication change can proceed.
    action_text_hi: |
      V-MCU फ्रोजन: कोई भी दवा अनुमापन न करें।

      सभी V-MCU अनुमापन मार्ग निलंबित हैं:
        - इंसुलिन खुराक समायोजन: फ्रोजन
        - SGLT2i खुराक परिवर्तन: फ्रोजन
        - GLP-1 RA अनुमापन: फ्रोजन
        - उच्चरक्तचापरोधी अनुमापन: फ्रोजन (सीधे चिकित्सक द्वारा प्रबंधित)

      V-MCU तब तक फ्रोजन रहेगा जब तक:
        - BP मूल्यांकन के बाद चिकित्सक मैन्युअल रूप से HALT गेट साफ न करें
        - >= 4 घंटे अलग दो लगातार रीडिंग पर BP < 160/100 mmHg की पुष्टि
        - कोई अवशिष्ट अंग क्षति लक्षण नहीं
    rationale_en: "Medication titration during hypertensive crisis compounds cardiovascular risk. V-MCU HALT gate ensures no automated dose changes occur until the crisis is resolved by a physician."
    guideline_ref: "V-MCU Safety Architecture v1.0; 1oo3 Veto Arbiter Protocol"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 2

  - rec_type: "SAME_DAY_REVIEW"
    urgency: "EMERGENCY"
    target: "clinician"
    action_text_en: |
      If headache + visual disturbance present: arrange same-day clinical review.
      Rule out hypertensive encephalopathy.

      Clinical assessment checklist:
        - Fundoscopy: check for papilloedema, retinal haemorrhages, exudates
        - Neurological examination: mental status, cranial nerves, motor/sensory
        - Urinalysis: haematuria, proteinuria (acute renal injury)
        - ECG: left ventricular hypertrophy, ischaemic changes
        - Troponin: if chest pain or dyspnoea present
        - CT head: if neurological symptoms suggest encephalopathy or stroke

      If hypertensive emergency confirmed:
        - Transfer to monitored setting (ICU/HDU)
        - IV antihypertensive therapy (labetalol, nicardipine, or nitroprusside)
        - Target: reduce MAP by no more than 25% in first hour
    action_text_hi: |
      यदि सिरदर्द + दृष्टि विकार मौजूद: उसी दिन नैदानिक समीक्षा की व्यवस्था करें।
      उच्च रक्तचाप एन्सेफैलोपैथी को खारिज करें।

      नैदानिक मूल्यांकन चेकलिस्ट:
        - फंडोस्कोपी: पैपिलोएडेमा, रेटिनल रक्तस्राव, एक्सुडेट की जांच
        - तंत्रिका संबंधी परीक्षा: मानसिक स्थिति, कपाल तंत्रिकाएं
        - मूत्र विश्लेषण: हेमेट्यूरिया, प्रोटीनूरिया
        - ECG: बाएं वेंट्रिकुलर अतिवृद्धि, इस्केमिक परिवर्तन
        - ट्रोपोनिन: सीने में दर्द या सांस की तकलीफ होने पर
        - CT सिर: यदि तंत्रिका संबंधी लक्षण एन्सेफैलोपैथी का सुझाव देते हैं

      यदि उच्च रक्तचाप आपातकाल की पुष्टि:
        - मॉनिटर्ड सेटिंग (ICU/HDU) में स्थानांतरित करें
        - IV उच्चरक्तचापरोधी चिकित्सा
        - लक्ष्य: पहले घंटे में MAP को 25% से अधिक कम न करें
    rationale_en: "Hypertensive encephalopathy is a medical emergency with mortality of 50% if untreated. Early fundoscopy and neurological assessment differentiate encephalopathy from uncomplicated urgency."
    guideline_ref: "ESH/ESC HTN 2023 Section 8.1; AHA Hypertensive Emergency 2017"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 3

  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "EMERGENCY"
    target: "patient"
    action_text_en: |
      YOUR BLOOD PRESSURE IS VERY HIGH AND NEEDS IMMEDIATE ATTENTION.

      Your doctor has been notified and will contact you shortly. While waiting:
        - Sit or lie down in a comfortable position
        - Do NOT take any extra blood pressure medication unless told to by your doctor
        - Do NOT drive or operate heavy machinery
        - If you experience severe headache, vision changes, chest pain, difficulty
          breathing, or confusion: call emergency services (112/108) immediately
        - Stay calm — stress can raise blood pressure further
    action_text_hi: |
      आपका रक्तचाप बहुत अधिक है और तुरंत ध्यान देने की आवश्यकता है।

      आपके डॉक्टर को सूचित किया गया है और वे जल्द ही आपसे संपर्क करेंगे। प्रतीक्षा करते समय:
        - आरामदायक स्थिति में बैठें या लेटें
        - जब तक डॉक्टर न कहें, कोई अतिरिक्त रक्तचाप दवा न लें
        - गाड़ी न चलाएं या भारी मशीनरी न चलाएं
        - यदि गंभीर सिरदर्द, दृष्टि परिवर्तन, सीने में दर्द, सांस लेने में
          कठिनाई, या भ्रम हो: तुरंत आपातकालीन सेवाओं (112/108) को कॉल करें
        - शांत रहें — तनाव रक्तचाप को और बढ़ा सकता है
    rationale_en: "Clear patient instructions during hypertensive crisis prevent self-medication errors and ensure prompt emergency access if symptoms worsen."
    guideline_ref: "AHA Patient Education 2020; NICE Hypertension 2023"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 4

# Panel definitions for UI rendering
panel_1_patient_state:
  fields: [sbp_7d_mean, dbp_7d_mean, bp_target_sbp, bp_target_dbp, antihypertensive_regimen, eGFR, potassium, bp_pattern]

panel_2_guideline_logic:
  fields: [bp_target_source, trigger_criterion, weeks_above_target]

panel_3_safety_checks:
  fields: [potassium_level, egfr_trend, beta_blocker_active, sglt2i_active, drug_interactions]

panel_4_reasoning_trace:
  fields: [bp_reading_series, trajectory_description, drug_context, proposed_action, guideline_reference]

# Escalation criteria -- consumed by V-MCU orchestrator
escalation_triggers:
  - event: "HYPERTENSIVE_EMERGENCY_CONFIRMED"
    condition: "end_organ_damage_confirmed == true AND sbp >= 180"
    action: "Generate emergency transfer card, notify on-call senior physician, log critical safety event"
  - event: "BP_NOT_RESPONDING"
    condition: "sbp >= 180 after 2 hours of oral antihypertensive"
    action: "Recommend emergency department transfer for IV antihypertensive therapy"

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "BP URGENCY: SBP {{latest_sbp}} mmHg with symptoms ({{reported_symptoms}}). Gate: HALT. V-MCU FROZEN. Immediate contact required. SLA: 0h (real-time). Rule out hypertensive encephalopathy."
    text_hi: "BP आपातकाल: SBP {{latest_sbp}} mmHg लक्षणों के साथ ({{reported_symptoms}})। गेट: HALT। V-MCU फ्रोजन। तत्काल संपर्क आवश्यक। SLA: 0 घंटे। उच्च रक्तचाप एन्सेफैलोपैथी को खारिज करें।"
  - fragment_type: "PATIENT"
    text_en: "Your blood pressure is dangerously high. Your doctor has been notified. If you have a severe headache, vision problems, or chest pain, call emergency services immediately."
    text_hi: "आपका रक्तचाप खतरनाक रूप से अधिक है। आपके डॉक्टर को सूचित किया गया है। यदि आपको गंभीर सिरदर्द, दृष्टि समस्याएं, या सीने में दर्द है तो तुरंत आपातकालीन सेवाओं को कॉल करें।"
