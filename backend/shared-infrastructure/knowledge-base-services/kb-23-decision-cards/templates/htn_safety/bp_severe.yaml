# KB-23 Decision Card Template: BP Severe
# Triggered when: BP_SEVERE_ALERT event fires with bp_status == SEVERE
# Purpose: Urgent antihypertensive review when SBP is >=20 mmHg above target.
#          Requires end-organ damage assessment and secondary HTN screening.
#          V-MCU velocity is reduced by 30% until BP controlled.
# Version: 1.0.0

template_id: "dc-bp-severe-v1"
node_id: "KB20_BP_MONITOR"
differential_id: "BP_SEVERE"
version: "1.0.0"
clinical_reviewer: "dr.hypertension.lead"
mcu_gate_default: "PAUSE"

# This card is generated by KB-20 BP monitoring when severe above-target
# readings are detected, or escalated from bp_above_target card.
card_source: "KB20_EVENT"
card_type: "HYPERTENSION_REVIEW"
flags:
  - "SEVERE"

# Trigger event
trigger_event: "BP_SEVERE_ALERT"
trigger_condition: "bp_status == SEVERE"

# SLA: 4 hours -- severe BP requires urgent clinician review
sla_hours: 4
priority: "HIGH"

# Confidence tier -- guideline-concordant severity classification
confidence_tier: "GUIDELINE_CONCORDANT"

# No Bayesian thresholds -- this is a threshold-based trigger, not a
# probabilistic differential. The card fires when SBP exceeds target + 20 mmHg.
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "URGENT_REVIEW"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Urgent antihypertensive review required. SBP is >= 20 mmHg above target.

      Current readings:
        SBP 7-day mean: {{sbp_7d_mean}} mmHg (target: {{bp_target_sbp}} mmHg)
        DBP 7-day mean: {{dbp_7d_mean}} mmHg (target: {{bp_target_dbp}} mmHg)
        Deviation: +{{sbp_deviation}} mmHg above SBP target

      Recommended actions:
        - Review and optimise antihypertensive regimen immediately
        - If on monotherapy: escalate to dual combination (ACEi/ARB + CCB or diuretic)
        - If on dual therapy: add third agent or maximise existing doses
        - Schedule follow-up BP review within 1 week of medication change
        - Consider 24-hour ABPM to rule out white-coat effect if office-only readings
    action_text_hi: |
      तत्काल उच्चरक्तचापरोधी समीक्षा आवश्यक। SBP लक्ष्य से >= 20 mmHg ऊपर है।

      वर्तमान रीडिंग:
        SBP 7-दिन औसत: {{sbp_7d_mean}} mmHg (लक्ष्य: {{bp_target_sbp}} mmHg)
        DBP 7-दिन औसत: {{dbp_7d_mean}} mmHg (लक्ष्य: {{bp_target_dbp}} mmHg)
        विचलन: SBP लक्ष्य से +{{sbp_deviation}} mmHg ऊपर

      अनुशंसित कार्रवाई:
        - तुरंत उच्चरक्तचापरोधी आहार की समीक्षा और अनुकूलन करें
        - यदि मोनोथेरेपी पर: दोहरी संयोजन में वृद्धि करें
        - यदि दोहरी थेरेपी पर: तीसरा एजेंट जोड़ें या मौजूदा खुराक अधिकतम करें
        - दवा परिवर्तन के 1 सप्ताह के भीतर अनुवर्ती BP समीक्षा निर्धारित करें
    rationale_en: "SBP >= 20 mmHg above target is associated with a 2-3 fold increase in cardiovascular event risk. Prompt dose escalation or combination therapy is required to reduce end-organ damage risk."
    guideline_ref: "ADA 2024 S10.3; KDIGO 2021 BP in CKD; ESH/ESC HTN 2023 Section 7"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "END_ORGAN_CHECK"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Check for end-organ damage symptoms:
        - Headache (especially occipital, worse in morning)
        - Visual disturbance (blurred vision, scotomata)
        - Chest pain or tightness (rule out acute coronary syndrome)
        - Dyspnoea (assess for pulmonary oedema / heart failure decompensation)
        - Peripheral oedema (new or worsening)
        - Neurological symptoms (confusion, focal deficits)

      If ANY symptoms present:
        - Escalate to bp_urgency card immediately
        - Arrange same-day clinical assessment
        - Consider emergency department referral if acute presentation
    action_text_hi: |
      अंग क्षति के लक्षणों की जांच करें:
        - सिरदर्द (विशेष रूप से पश्चकपाल, सुबह में बदतर)
        - दृष्टि विकार (धुंधली दृष्टि, स्कोटोमाटा)
        - सीने में दर्द या जकड़न (तीव्र कोरोनरी सिंड्रोम को खारिज करें)
        - सांस की तकलीफ (फुफ्फुसीय शोफ / हृदय विफलता का मूल्यांकन करें)
        - परिधीय शोफ (नया या बिगड़ता)
        - तंत्रिका संबंधी लक्षण (भ्रम, फोकल कमी)

      यदि कोई भी लक्षण मौजूद हैं:
        - तुरंत bp_urgency कार्ड में वृद्धि करें
        - उसी दिन नैदानिक मूल्यांकन की व्यवस्था करें
        - तीव्र प्रस्तुति होने पर आपातकालीन विभाग रेफरल पर विचार करें
    rationale_en: "End-organ damage screening differentiates hypertensive urgency from emergency. Symptomatic severe HTN requires immediate escalation and may indicate malignant hypertension."
    guideline_ref: "ESH/ESC HTN 2023 Section 8.1; AHA Hypertensive Crisis Statement 2017"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 2

  - rec_type: "SECONDARY_SCREEN"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      If new-onset severe hypertension, consider secondary hypertension screen:
        - Renal artery stenosis: renal duplex ultrasonography
          (especially if flash pulmonary oedema, refractory HTN, or asymmetric kidneys)
        - Phaeochromocytoma: 24-hour urinary metanephrines or plasma free metanephrines
          (especially if paroxysmal HTN, headache, sweating, palpitations)
        - Primary aldosteronism: aldosterone:renin ratio (ARR)
          (especially if hypokalaemia or resistant HTN)
        - Cushing syndrome: 24-hour urinary free cortisol or overnight dexamethasone
          suppression test (especially if cushingoid features)
        - Thyroid dysfunction: TSH, free T4

      Note: Medication washout required before ARR testing per Endocrine Society protocol.
    action_text_hi: |
      यदि नई शुरुआत गंभीर उच्च रक्तचाप है, तो माध्यमिक उच्च रक्तचाप की जांच पर विचार करें:
        - गुर्दे की धमनी स्टेनोसिस: गुर्दे डुप्लेक्स अल्ट्रासाउंड
        - फीयोक्रोमोसाइटोमा: 24 घंटे मूत्र मेटानेफ्रिन
        - प्राथमिक एल्डोस्टेरोनिज्म: एल्डोस्टेरोन:रेनिन अनुपात (ARR)
        - कुशिंग सिंड्रोम: 24 घंटे मूत्र मुक्त कोर्टिसोल
        - थायरॉइड डिसफंक्शन: TSH, मुक्त T4

      नोट: ARR परीक्षण से पहले एंडोक्राइन सोसाइटी प्रोटोकॉल के अनुसार दवा वॉशआउट आवश्यक।
    rationale_en: "Secondary hypertension is identified in 5-10% of patients with severe or treatment-resistant HTN. Early identification enables targeted therapy and potential cure."
    guideline_ref: "Endocrine Society PA Guideline 2016; ESH/ESC HTN 2023 Section 8.2"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 3

  - rec_type: "TITRATION_HOLD"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      V-MCU Titration Safety Hold:
        - Hold ALL insulin dose increases until BP is controlled (SBP within 20 mmHg of target)
        - V-MCU velocity reduced by 30% for all active titration pathways
        - Rationale: uncontrolled hypertension increases risk of hypoglycaemia-related
          cardiovascular events; tight glycaemic control should not be pursued while
          BP is severely above target
        - Resume normal titration velocity once BP sustained < target + 10 mmHg for 7 days
    action_text_hi: |
      V-MCU अनुमापन सुरक्षा रोक:
        - BP नियंत्रित होने तक सभी इंसुलिन खुराक वृद्धि रोकें (SBP लक्ष्य के 20 mmHg के भीतर)
        - सभी सक्रिय अनुमापन मार्गों के लिए V-MCU वेग 30% कम किया गया
        - तर्क: अनियंत्रित उच्च रक्तचाप हाइपोग्लाइसीमिया-संबंधित हृदय संबंधी
          घटनाओं का जोखिम बढ़ाता है
        - BP 7 दिनों तक लक्ष्य + 10 mmHg से नीचे बने रहने पर सामान्य अनुमापन वेग फिर से शुरू करें
    rationale_en: "Concurrent severe hypertension and aggressive insulin titration compound cardiovascular risk. ACCORD-BP and SPRINT sub-analyses support BP control as prerequisite for safe glycaemic intensification."
    guideline_ref: "ACCORD-BP 2010; SPRINT 2015; ADA 2024 S10.3"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 4

  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "ROUTINE"
    target: "patient"
    action_text_en: |
      Your blood pressure is significantly higher than your target. Your doctor needs
      to review your medications urgently (within a few hours). In the meantime:
        - Continue taking all your current medications as prescribed
        - Avoid strenuous physical activity until cleared by your doctor
        - Report any headache, vision changes, chest pain, or shortness of breath
          to your doctor immediately
        - Reduce salt intake and avoid caffeinated beverages today
    action_text_hi: |
      आपका रक्तचाप आपके लक्ष्य से काफी अधिक है। आपके डॉक्टर को तत्काल (कुछ
      घंटों के भीतर) आपकी दवाओं की समीक्षा करनी होगी। इस बीच:
        - अपनी सभी वर्तमान दवाएं निर्धारित अनुसार लेते रहें
        - डॉक्टर की अनुमति मिलने तक कठिन शारीरिक गतिविधि से बचें
        - कोई भी सिरदर्द, दृष्टि परिवर्तन, सीने में दर्द, या सांस की तकलीफ
          तुरंत अपने डॉक्टर को बताएं
        - आज नमक का सेवन कम करें और कैफीन युक्त पेय से बचें
    rationale_en: "Patient awareness of warning symptoms enables early detection of hypertensive emergency. Activity restriction reduces acute cardiovascular risk during severe BP episodes."
    guideline_ref: "NICE Hypertension 2023, Patient Information; AHA Patient Education 2020"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 5

# Panel definitions for UI rendering
panel_1_patient_state:
  fields: [sbp_7d_mean, dbp_7d_mean, bp_target_sbp, bp_target_dbp, antihypertensive_regimen, eGFR, potassium, bp_pattern]

panel_2_guideline_logic:
  fields: [bp_target_source, trigger_criterion, weeks_above_target]

panel_3_safety_checks:
  fields: [potassium_level, egfr_trend, beta_blocker_active, sglt2i_active, drug_interactions]

panel_4_reasoning_trace:
  fields: [bp_reading_series, trajectory_description, drug_context, proposed_action, guideline_reference]

# Escalation criteria -- consumed by V-MCU orchestrator
escalation_triggers:
  - event: "BP_URGENCY_DETECTED"
    condition: "any_reading >= 180 AND symptoms_present"
    action: "Escalate to bp_urgency card with HALT gate and immediate notification"
  - event: "END_ORGAN_DAMAGE_CONFIRMED"
    condition: "end_organ_symptoms_confirmed == true"
    action: "Escalate to bp_urgency card, arrange emergency clinical assessment"
  - event: "BP_SEVERE_PERSISTENT"
    condition: "bp_status == SEVERE for >= 7 days despite medication change"
    action: "Generate resistant_htn_review card for specialist evaluation"

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "BP SEVERE: SBP 7d mean {{sbp_7d_mean}} mmHg (+{{sbp_deviation}} above target {{bp_target_sbp}}). Gate: PAUSE. SLA 4h. V-MCU velocity reduced 30%. Screen for end-organ damage and secondary causes."
    text_hi: "BP गंभीर: SBP 7 दिन औसत {{sbp_7d_mean}} mmHg (लक्ष्य {{bp_target_sbp}} से +{{sbp_deviation}} ऊपर)। गेट: PAUSE। SLA 4 घंटे। V-MCU वेग 30% कम। अंग क्षति और माध्यमिक कारणों की जांच करें।"
  - fragment_type: "PATIENT"
    text_en: "Your blood pressure is significantly above your target and needs urgent attention from your doctor. Please report any headache, vision changes, or chest pain immediately."
    text_hi: "आपका रक्तचाप आपके लक्ष्य से काफी ऊपर है और आपके डॉक्टर से तत्काल ध्यान देने की आवश्यकता है। कृपया कोई भी सिरदर्द, दृष्टि परिवर्तन, या सीने में दर्द तुरंत बताएं।"
