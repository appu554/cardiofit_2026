# KB-23 Decision Card Template: BP Above Target
# Triggered when: BP_ALERT event fires with bp_status == ABOVE_TARGET
# Purpose: Alert clinician that patient's BP is above target, prompting review of
#          antihypertensive regimen before escalation to severe range.
# Version: 1.0.0

template_id: "dc-bp-above-target-v1"
node_id: "KB20_BP_MONITOR"
differential_id: "BP_ABOVE_TARGET"
version: "1.0.0"
clinical_reviewer: "dr.hypertension.lead"
mcu_gate_default: "MODIFY"

# This card is generated by KB-20 BP monitoring when sustained above-target
# readings are detected, routed through KB-22 HPI for context enrichment.
card_source: "KB20_EVENT"
card_type: "HYPERTENSION_REVIEW"
flags:
  - "ABOVE_TARGET"

# Trigger event
trigger_event: "BP_ALERT"
trigger_condition: "bp_status == ABOVE_TARGET"

# SLA: 48 hours -- above-target requires timely but non-urgent review
sla_hours: 48
priority: "MODERATE"

# Confidence tier -- guideline-concordant target-based management
confidence_tier: "GUIDELINE_CONCORDANT"

# No Bayesian thresholds -- this is a target-based trigger, not a probabilistic
# differential. The card is generated when BP exceeds guideline-defined targets.
confidence_thresholds:
  firm_posterior: 0.0
  firm_medication_change: 0.0
  probable_posterior: 0.0
  possible_posterior: 0.0

recommendations:
  - rec_type: "MEDICATION_REVIEW"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Review antihypertensive regimen. Consider dose increase of first-line agent
      (ACEi/ARB) before adding second agent.

      Current regimen: {{antihypertensive_regimen}}
      SBP 7-day mean: {{sbp_7d_mean}} mmHg (target: {{bp_target_sbp}} mmHg)
      DBP 7-day mean: {{dbp_7d_mean}} mmHg (target: {{bp_target_dbp}} mmHg)
      Weeks above target: {{weeks_above_target}}

      Recommended actions:
        - Optimise current first-line agent dose before adding new class
        - If already at maximum dose, add second-line agent per guideline stepladder
        - Consider patient preference and adherence history (KB-21 score)
        - Reassess in 2-4 weeks after dose change
    action_text_hi: |
      उच्चरक्तचापरोधी दवा की समीक्षा करें। दूसरी दवा जोड़ने से पहले पहली-पंक्ति
      एजेंट (ACEi/ARB) की खुराक बढ़ाने पर विचार करें।

      वर्तमान आहार: {{antihypertensive_regimen}}
      SBP 7-दिन औसत: {{sbp_7d_mean}} mmHg (लक्ष्य: {{bp_target_sbp}} mmHg)
      DBP 7-दिन औसत: {{dbp_7d_mean}} mmHg (लक्ष्य: {{bp_target_dbp}} mmHg)
      लक्ष्य से ऊपर सप्ताह: {{weeks_above_target}}

      अनुशंसित कार्रवाई:
        - नई श्रेणी जोड़ने से पहले वर्तमान पहली-पंक्ति एजेंट की खुराक अनुकूलित करें
        - यदि अधिकतम खुराक पर है तो दिशानिर्देश के अनुसार दूसरी-पंक्ति एजेंट जोड़ें
        - रोगी की प्राथमिकता और अनुपालन इतिहास पर विचार करें
        - खुराक परिवर्तन के 2-4 सप्ताह बाद पुनर्मूल्यांकन करें
    rationale_en: "Stepwise antihypertensive escalation reduces adverse effects and improves adherence compared to upfront combination. Maximising first-line agent is recommended before adding classes."
    guideline_ref: "ADA 2024 S10.3; KDIGO 2021 BP in CKD; RSSDI 2022 HTN-DM"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 1

  - rec_type: "SAFETY_CHECK"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Safety checks before ACEi/ARB dose increase:
        - Check serum potassium (K+): must be < 5.5 mEq/L before dose increase
        - Check serum creatinine if eGFR < 45 mL/min/1.73m2
        - Acceptable eGFR decline after ACEi/ARB initiation: up to 30% from baseline
          (stabilising within 2 months is expected and not a reason to stop)
        - Review concurrent nephrotoxic agents (NSAIDs, aminoglycosides)
        - If K+ >= 5.5 or eGFR decline > 30%: do NOT increase dose, reassess in 1 week
    action_text_hi: |
      ACEi/ARB खुराक बढ़ाने से पहले सुरक्षा जांच:
        - सीरम पोटैशियम (K+) जांचें: खुराक बढ़ाने से पहले < 5.5 mEq/L होना चाहिए
        - eGFR < 45 mL/min/1.73m2 होने पर सीरम क्रिएटिनिन जांचें
        - ACEi/ARB शुरू करने के बाद स्वीकार्य eGFR गिरावट: बेसलाइन से 30% तक
        - समवर्ती नेफ्रोटॉक्सिक एजेंटों की समीक्षा करें (NSAIDs, एमिनोग्लाइकोसाइड्स)
        - यदि K+ >= 5.5 या eGFR गिरावट > 30%: खुराक न बढ़ाएं, 1 सप्ताह में पुनर्मूल्यांकन करें
    rationale_en: "Hyperkalaemia and acute kidney injury are the principal risks of ACEi/ARB dose escalation. Pre-dose safety labs reduce adverse event incidence by 60% in CKD populations."
    guideline_ref: "KDIGO 2021 BP in CKD Section 3.3; ADA 2024 S10.3"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 2

  - rec_type: "LIFESTYLE"
    urgency: "ROUTINE"
    target: "clinician"
    action_text_en: |
      Reinforce dietary sodium restriction (< 2g/day). If salt_reduction_potential
      is HIGH, prioritise lifestyle modification before medication escalation.

      Additional lifestyle interventions:
        - DASH diet counselling if not already initiated
        - Physical activity: 150 min/week moderate-intensity aerobic exercise
        - Weight management: target BMI < 25 kg/m2 or 5-10% weight loss if overweight
        - Limit alcohol intake to <= 2 standard drinks/day (men), <= 1 (women)
        - Stress management and sleep hygiene assessment
    action_text_hi: |
      आहार में नमक प्रतिबंध (< 2g/दिन) पर जोर दें। यदि नमक कमी की संभावना
      HIGH है तो दवा वृद्धि से पहले जीवनशैली संशोधन को प्राथमिकता दें।

      अतिरिक्त जीवनशैली हस्तक्षेप:
        - DASH आहार परामर्श यदि पहले से शुरू नहीं किया गया
        - शारीरिक गतिविधि: 150 मिनट/सप्ताह मध्यम-तीव्रता वाला एरोबिक व्यायाम
        - वजन प्रबंधन: लक्ष्य BMI < 25 kg/m2 या अधिक वजन होने पर 5-10% वजन कमी
        - शराब का सेवन सीमित करें
        - तनाव प्रबंधन और नींद स्वच्छता मूल्यांकन
    rationale_en: "Lifestyle modifications can reduce SBP by 5-15 mmHg. Sodium restriction alone achieves 5-6 mmHg SBP reduction. Combined interventions may obviate need for additional pharmacotherapy."
    guideline_ref: "ADA 2024 S5.1; KDIGO 2021 Lifestyle; RSSDI 2022 HTN-DM Section 4"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 3

  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "ROUTINE"
    target: "patient"
    action_text_en: |
      Your blood pressure readings have been above your target level over the past
      few weeks. Your doctor may need to:
        - Adjust your blood pressure medication dose
        - Check some blood tests before making changes
        - Discuss salt intake and exercise habits with you
      Please continue taking your medications as prescribed. Reducing salt in your
      diet and staying active can also help lower your blood pressure.
    action_text_hi: |
      पिछले कुछ हफ्तों में आपकी रक्तचाप की रीडिंग आपके लक्ष्य स्तर से ऊपर रही है।
      आपके डॉक्टर को आवश्यकता हो सकती है:
        - आपकी रक्तचाप दवा की खुराक समायोजित करें
        - बदलाव करने से पहले कुछ रक्त जांच करें
        - आपके साथ नमक सेवन और व्यायाम की आदतों पर चर्चा करें
      कृपया अपनी दवाएं निर्धारित अनुसार लेते रहें। अपने आहार में नमक कम करना और
      सक्रिय रहना भी आपके रक्तचाप को कम करने में मदद कर सकता है।
    rationale_en: "Patient education about target-based management improves adherence and reduces anxiety about medication changes."
    guideline_ref: "NICE Hypertension 2023, Patient Information"
    confidence_tier_required: "GUIDELINE_CONCORDANT"
    bypasses_confidence_gate: true
    sort_order: 4

# Panel definitions for UI rendering
panel_1_patient_state:
  fields: [sbp_7d_mean, dbp_7d_mean, bp_target_sbp, bp_target_dbp, antihypertensive_regimen, eGFR, potassium, bp_pattern]

panel_2_guideline_logic:
  fields: [bp_target_source, trigger_criterion, weeks_above_target]

panel_3_safety_checks:
  fields: [potassium_level, egfr_trend, beta_blocker_active, sglt2i_active, drug_interactions]

panel_4_reasoning_trace:
  fields: [bp_reading_series, trajectory_description, drug_context, proposed_action, guideline_reference]

# Escalation criteria -- consumed by V-MCU orchestrator
escalation_triggers:
  - event: "BP_ABOVE_TARGET_SEVERE"
    condition: "sbp_7d_mean >= bp_target_sbp + 20"
    action: "Escalate to bp_severe card with PAUSE gate and 4h SLA"
  - event: "BP_URGENCY_DETECTED"
    condition: "any_reading >= 180 AND symptoms_present"
    action: "Escalate to bp_urgency card with HALT gate and immediate notification"

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "BP above target: SBP 7d mean {{sbp_7d_mean}} mmHg (target {{bp_target_sbp}}), DBP 7d mean {{dbp_7d_mean}} mmHg (target {{bp_target_dbp}}). Weeks above target: {{weeks_above_target}}. Gate: MODIFY. SLA 48h."
    text_hi: "BP लक्ष्य से ऊपर: SBP 7 दिन औसत {{sbp_7d_mean}} mmHg (लक्ष्य {{bp_target_sbp}}), DBP 7 दिन औसत {{dbp_7d_mean}} mmHg (लक्ष्य {{bp_target_dbp}})। लक्ष्य से ऊपर सप्ताह: {{weeks_above_target}}। गेट: MODIFY। SLA 48 घंटे।"
  - fragment_type: "PATIENT"
    text_en: "Your blood pressure has been above your target. Your doctor may adjust your medications or suggest lifestyle changes to help bring it down."
    text_hi: "आपका रक्तचाप आपके लक्ष्य से ऊपर रहा है। आपके डॉक्टर इसे कम करने के लिए आपकी दवाओं में बदलाव कर सकते हैं या जीवनशैली में बदलाव सुझा सकते हैं।"
