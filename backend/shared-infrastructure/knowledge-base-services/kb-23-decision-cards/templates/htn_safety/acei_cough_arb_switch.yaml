# KB-23 Decision Card Template: ACEi Cough → ARB Switch
# Triggered when: PG-15 fires (ACEi-induced cough posterior > 0.70 from KB-22 P03)
# Purpose: Guide clinician through ACEi → ARB switch with monitoring schedule.
#          ARB class-switch is safe in CKD patients and maintains RAAS blockade.
# Version: 1.0.0

template_id: "dc-htn-acei-cough-arb-switch-v1"
node_id: "KB22_P03_ACEI_COUGH"
differential_id: "ACEI_INDUCED_COUGH"
version: "1.0.0"
clinical_reviewer: "dr.nephrology.lead"
mcu_gate_default: "MODIFY"

# This card is generated when KB-22 P03 posterior for ACEi cough exceeds 0.70
# and PG-15 fires in Channel C.
card_source: "KB22_SESSION"

# Confidence thresholds — from KB-22 Bayesian posterior
confidence_thresholds:
  firm_posterior: 0.85
  firm_medication_change: 0.70
  probable_posterior: 0.70
  possible_posterior: 0.50

recommendations:
  - rec_type: "MEDICATION_MODIFY"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      ACEi-Induced Cough — ARB Switch Recommended:
      The cough differential assessment (KB-22 P03) indicates a high probability
      (posterior > 0.70) that the patient's cough is ACEi-induced.

      Recommended Action:
        1. Discontinue current ACEi
        2. Initiate equivalent ARB (see conversion table below)
        3. Maintain same RAAS blockade intensity — DO NOT reduce dose
        4. Monitor creatinine + potassium at Day 7 and Day 14 (per RAAS monitoring protocol)

      ACEi → ARB Conversion (approximate equivalence):
        Ramipril 10mg     → Losartan 100mg / Telmisartan 80mg
        Enalapril 20mg    → Losartan 100mg / Irbesartan 300mg
        Perindopril 8mg   → Losartan 50mg  / Telmisartan 40mg
        Lisinopril 20mg   → Losartan 100mg / Valsartan 160mg

      Note: CKD patients benefit from continued RAAS blockade. ARB switch maintains
      renoprotective effect while eliminating bradykinin-mediated cough.
    action_text_hi: |
      ACEi-प्रेरित खांसी — ARB स्विच अनुशंसित:
      खांसी विभेदक मूल्यांकन (KB-22 P03) उच्च संभावना दर्शाता है कि रोगी की
      खांसी ACEi-प्रेरित है।

      अनुशंसित कार्रवाई:
        1. वर्तमान ACEi बंद करें
        2. समकक्ष ARB शुरू करें
        3. RAAS ब्लॉकेड की तीव्रता बनाए रखें
        4. दिन 7 और 14 पर क्रिएटिनिन + पोटेशियम की निगरानी करें
    rationale_en: "ACEi cough is bradykinin-mediated. ARBs do not inhibit bradykinin degradation and are well-tolerated alternatives with equivalent renoprotective efficacy."
    guideline_ref: "NICE HTN 2022, Step 2; KDIGO CKD 2024 S4.4; ESH/ESC HTN 2023"
    confidence_tier_required: "PROBABLE"
    bypasses_confidence_gate: false
    sort_order: 1

  - rec_type: "MONITORING"
    urgency: "URGENT"
    target: "clinician"
    action_text_en: |
      Post-Switch Monitoring Schedule:
        Day 3:  Assess cough resolution (ACEi cough typically resolves within 1-4 weeks)
                → If no improvement by Day 7 → reconsider diagnosis
        Day 7:  Repeat creatinine + potassium (standard RAAS initiation monitoring)
                → If Cr rise >30% → Escalate per PG-14 protocol
        Day 14: Repeat creatinine + potassium + eGFR
                → Confirm ARB tolerance and cough resolution
        Day 28: Follow-up
                → If cough persists > 4 weeks after switch → NOT ACEi cough
                → Investigate alternative causes (cardiac, GERD, pulmonary)
    action_text_hi: |
      स्विच के बाद निगरानी अनुसूची:
        दिन 3:  खांसी में सुधार का आकलन
        दिन 7:  क्रिएटिनिन + पोटेशियम दोहराएं
        दिन 14: क्रिएटिनिन + पोटेशियम + eGFR दोहराएं
        दिन 28: अनुवर्ती — खांसी का समाधान सत्यापित करें
    rationale_en: "Monitoring confirms diagnosis (cough resolution) and ensures ARB renal safety equivalent to previous ACEi therapy."
    guideline_ref: "NICE CKD 2021, Section 1.6.1"
    confidence_tier_required: "PROBABLE"
    bypasses_confidence_gate: false
    sort_order: 2

  - rec_type: "SAFETY_INSTRUCTION"
    urgency: "ROUTINE"
    target: "patient"
    trigger_condition_en: "ACEi-induced cough posterior > 0.70 and ARB switch initiated"
    action_text_en: |
      Your doctor is switching your blood pressure medication because your current
      medicine (ACE inhibitor) may be causing your cough. The new medicine (ARB)
      works in a similar way to protect your kidneys and heart but usually does
      not cause a cough.

      What to expect:
        - Your cough should improve within 1-4 weeks of the switch
        - Please attend your blood test appointments (Day 7 and Day 14)
        - Contact your doctor if:
            • The cough gets worse instead of better
            • You feel dizzy or faint
            • You notice reduced urine output
            • You develop swelling in your ankles or feet
    action_text_hi: |
      आपके डॉक्टर आपकी रक्तचाप की दवा बदल रहे हैं क्योंकि आपकी वर्तमान
      दवा (ACE अवरोधक) आपकी खांसी का कारण हो सकती है। नई दवा (ARB)
      समान तरीके से काम करती है लेकिन आमतौर पर खांसी नहीं करती।

      क्या उम्मीद करें:
        - स्विच के 1-4 सप्ताह के भीतर खांसी में सुधार होना चाहिए
        - अपनी रक्त परीक्षण नियुक्तियों (दिन 7 और दिन 14) में उपस्थित हों
        - अपने डॉक्टर से संपर्क करें यदि खांसी बदतर हो या चक्कर आए
    rationale_en: "Patient education ensures medication adherence during transition and timely reporting of adverse effects."
    guideline_ref: "NICE CKD 2021, Patient Information"
    confidence_tier_required: "UNCERTAIN"
    bypasses_confidence_gate: true
    sort_order: 3

# Escalation criteria — consumed by V-MCU orchestrator
escalation_triggers:
  - event: "COUGH_NOT_RESOLVED_28D"
    condition: "cough_persists AND days_since_switch >= 28"
    action: "Reclassify cough as non-ACEi. Re-trigger KB-22 P03 with updated priors. Investigate cardiac/GERD/pulmonary causes."
  - event: "RAAS_SWITCH_MONITORING_ESCALATE"
    condition: "creatinine_rise_pct > 30 OR potassium > 5.5"
    action: "Escalate to PG-14 RAAS monitoring protocol. Consider ARB dose reduction."

# Fragments for clinician/patient summaries
fragments:
  - fragment_type: "CLINICIAN"
    text_en: "ACEi cough confirmed (posterior > 0.70). ARB switch initiated. Monitoring schedule active. PG-15 MODIFY applied."
    text_hi: "ACEi खांसी पुष्टि (पोस्टीरियर > 0.70)। ARB स्विच शुरू। निगरानी अनुसूची सक्रिय।"
  - fragment_type: "PATIENT"
    text_en: "Your BP medication is being changed to one that should not cause coughing. Please attend your scheduled blood tests."
    text_hi: "आपकी BP दवा बदली जा रही है जो खांसी नहीं करनी चाहिए। कृपया अपने निर्धारित रक्त परीक्षणों में उपस्थित हों।"
