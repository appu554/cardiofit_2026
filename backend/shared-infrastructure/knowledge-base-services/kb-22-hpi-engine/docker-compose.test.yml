# KB-22 HPI Engine - Integration Test Infrastructure
# Starts PostgreSQL + Redis for integration tests with real containers.
# Usage:
#   docker-compose -f docker-compose.test.yml up -d
#   go test -tags=integration ./tests/integration/...
#   docker-compose -f docker-compose.test.yml down -v

services:
  kb22-test-postgres:
    image: postgres:15-alpine
    container_name: kb22-test-postgres
    environment:
      POSTGRES_USER: kb22_test
      POSTGRES_PASSWORD: kb22_test_pass
      POSTGRES_DB: kb22_test
    ports:
      - "5438:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb22_test -d kb22_test"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 3s

  kb22-test-redis:
    image: redis:7-alpine
    container_name: kb22-test-redis
    ports:
      - "6387:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
