# BB_HYPO_SYMPTOM_MODIFIER - Beta-Blocker Hypoglycaemia Symptom Modifier
# Modifies hypoglycaemia symptom question weights when a beta-blocker is active.
# Beta-blockers mask adrenergic warning signs (palpitations, tremor) while preserving
# neuroglycopaenic and cholinergic symptoms (diaphoresis, cognitive change, hunger).
# Applied as a weight multiplier to downstream HPI question likelihood ratios.

modifier_id: BB_HYPO_SYMPTOM_MODIFIER
version: "1.0"
description: "Beta-blocker hypoglycaemia symptom weight modifier for masked adrenergic response"

# Activation trigger
trigger:
  condition: "beta_blocker_active == true"
  source: "KB-20 patient profile (current_medications)"

# Modifier category
category: HYPOGLYCAEMIA_SYMPTOM

# Symptom weight modifications
# weight_multiplier < 1.0 = suppress (symptom masked by beta-blockade)
# weight_multiplier > 1.0 = amplify (symptom becomes more diagnostically important)
modifications:
  - symptom: palpitations
    weight_multiplier: 0.05
    rationale_en: "Beta-blockers block cardiac beta-1 receptors, abolishing tachycardia response to hypoglycaemia. Palpitations are almost completely suppressed."
    rationale_hi: "बीटा-ब्लॉकर्स कार्डियक बीटा-1 रिसेप्टर्स को ब्लॉक करते हैं, हाइपोग्लाइसीमिया में टैकीकार्डिया प्रतिक्रिया को समाप्त करते हैं। धड़कन लगभग पूरी तरह दबा दी जाती है।"

  - symptom: tremor
    weight_multiplier: 0.10
    rationale_en: "Beta-2 blockade attenuates skeletal muscle tremor. Tremor is markedly reduced, especially with non-selective beta-blockers (propranolol, carvedilol)."
    rationale_hi: "बीटा-2 ब्लॉकेड कंकाल मांसपेशी कंपन को कम करता है। कंपन विशेष रूप से गैर-चयनात्मक बीटा-ब्लॉकर्स (प्रोप्रानोलोल, कार्वेडिलोल) के साथ काफ़ी कम हो जाता है।"

  - symptom: diaphoresis
    weight_multiplier: 2.5
    rationale_en: "Sweating is cholinergically mediated, not adrenergic. It is the most preserved and often most prominent warning sign of hypoglycaemia in beta-blocked patients."
    rationale_hi: "पसीना कोलीनर्जिक रूप से मध्यस्थित होता है, एड्रीनर्जिक नहीं। बीटा-ब्लॉक रोगियों में यह हाइपोग्लाइसीमिया का सबसे संरक्षित और अक्सर सबसे प्रमुख चेतावनी संकेत है।"

  - symptom: cognitive_symptoms
    weight_multiplier: 3.0
    rationale_en: "Confusion, difficulty concentrating, and behavioural change are neuroglycopaenic symptoms unaffected by beta-blockade. In BB patients, these may be the first presentation of hypoglycaemia."
    rationale_hi: "भ्रम, ध्यान केंद्रित करने में कठिनाई, और व्यवहार में बदलाव न्यूरोग्लाइकोपेनिक लक्षण हैं जो बीटा-ब्लॉकेड से अप्रभावित रहते हैं। BB रोगियों में, ये हाइपोग्लाइसीमिया की पहली प्रस्तुति हो सकती है।"

  - symptom: hunger
    weight_multiplier: 2.0
    rationale_en: "Intense hunger is a hypothalamic-mediated response preserved in beta-blockade. Reliable early warning sign in BB patients."
    rationale_hi: "तीव्र भूख एक हाइपोथैलेमिक-मध्यस्थित प्रतिक्रिया है जो बीटा-ब्लॉकेड में संरक्षित रहती है। BB रोगियों में विश्वसनीय प्रारंभिक चेतावनी संकेत।"

  - symptom: perioral_numbness
    weight_multiplier: 2.5
    rationale_en: "Perioral numbness and paraesthesia are neuroglycopaenic symptoms fully preserved in beta-blockade. A reliable discriminating feature for hypoglycaemia in BB patients."
    rationale_hi: "होंठों के आसपास सुन्नता और झुनझुनी न्यूरोग्लाइकोपेनिक लक्षण हैं जो बीटा-ब्लॉकेड में पूरी तरह संरक्षित रहती हैं। BB रोगियों में हाइपोग्लाइसीमिया के लिए एक विश्वसनीय विभेदक विशेषता।"

# Clinical reasoning notes
reasoning_note_en: "Beta-blocker active -- hypoglycaemia question weights modified. Palpitation/tremor suppressed, diaphoresis/cognitive weighted higher. Clinicians should actively ask about sweating, confusion, and hunger rather than relying on the traditional triad of tremor/palpitations/anxiety."
reasoning_note_hi: "बीटा-ब्लॉकर सक्रिय -- हाइपोग्लाइसीमिया प्रश्न भार संशोधित। धड़कन/कंपन दबाया गया, पसीना/संज्ञानात्मक लक्षणों का भार बढ़ाया गया। चिकित्सकों को कंपन/धड़कन/चिंता की पारंपरिक त्रिसूत्री पर निर्भर रहने के बजाय पसीना, भ्रम और भूख के बारे में सक्रिय रूप से पूछना चाहिए।"

# Population references
references:
  - "Cryer PE. Mechanisms of hypoglycemia-associated autonomic failure in diabetes. NEJM 2013"
  - "Murad MH et al. Drug-induced hypoglycemia: a systematic review. JCEM 2009"
  - "Hepburn DA et al. Symptoms of acute insulin-induced hypoglycemia in humans with and without beta-blockade. Clin Sci 1991"
  - "ADA Standards of Care 2024 - Section 6: Glycemic Targets"

# Integration notes
integration:
  applies_to_nodes:
    - "P08_HTN_ORTHOSTATIC"
    - "Any HPI node with HYPOGLYCAEMIA differential"
  kb20_dependency: "beta_blocker_active field from KB-20 patient profile"
  application_method: "Multiply symptom-specific LR by weight_multiplier before Bayesian update"
