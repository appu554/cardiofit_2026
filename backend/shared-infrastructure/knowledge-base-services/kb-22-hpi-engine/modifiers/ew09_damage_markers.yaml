# EW-09 Non-Renal Early Damage Markers (Wave 3.5)
# Clinical flag node for cardiac strain and ophthalmological referral
# based on BP status co-occurrence with symptom signals.
# This is NOT a full Bayesian HPI node — it uses simple co-occurrence flags.

node_id: ew09_damage_markers
version: "1.0.0"
name: "Non-Renal Early Damage Markers"
description: "Flags for cardiac strain and ophthalmological referral based on BP status co-occurrence"
trigger_event: "BP_STATUS_UPDATE"
type: "FLAG_NODE"  # Not a full Bayesian node — simple co-occurrence flags

flags:
  - flag_id: cardiac_strain_suspected
    description: "Exertional dyspnoea co-occurring with SEVERE bp_status"
    conditions:
      - field: symptom_exertional_dyspnoea
        operator: eq
        value: true
      - field: bp_status
        operator: eq
        value: "SEVERE"
    action: "FLAG_FOR_REVIEW"
    urgency: "24h"
    note_en: "Cardiac strain suspected — exertional dyspnoea with severe hypertension. Consider echocardiogram for LVH assessment."
    note_hi: "हृदय तनाव की आशंका — श्रम पर श्वासकष्ट और गंभीर उच्च रक्तचाप। LVH मूल्यांकन के लिए इकोकार्डियोग्राम पर विचार करें।"

  - flag_id: ophthalmology_referral_needed
    description: "Visual disturbance with ABOVE_TARGET BP for 12+ weeks"
    conditions:
      - field: symptom_visual_disturbance
        operator: eq
        value: true
      - field: bp_status
        operator: in
        value: ["ABOVE_TARGET", "SEVERE"]
      - field: weeks_above_target
        operator: gte
        value: 12
    action: "SPECIALIST_REFERRAL"
    urgency: "48h"
    note_en: "Ophthalmology referral needed — visual disturbance with sustained uncontrolled BP (12+ weeks). Screen for hypertensive retinopathy."
    note_hi: "नेत्र विशेषज्ञ रेफरल आवश्यक — दृष्टि गड़बड़ी और लंबे समय से अनियंत्रित रक्तचाप (12+ सप्ताह)। उच्च रक्तचाप रेटिनोपैथी की जांच करें।"

# v2 reserved fields (KB-20 data model preparation)
reserved_data_fields:
  - field: lvh_status
    source: "ECG/ECHO"
    description: "Left ventricular hypertrophy — not yet available in KB-20"
  - field: retinopathy_grade
    source: "OPHTHALMOLOGY"
    description: "Keith-Wagener-Barker grade — not yet available in KB-20"
  - field: cognitive_change_flag
    source: "COGNITIVE_SCREENING"
    description: "Cognitive decline screening — not yet available in KB-20"
