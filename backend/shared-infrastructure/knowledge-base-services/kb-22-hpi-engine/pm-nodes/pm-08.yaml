node_id: PM-08
version: "1.0.0"
type: MONITORING
title_en: "Heart Rate Variability Pattern"
title_hi: "Hriday Gati Parivartan Pattern"

required_inputs:
  - field: rmssd_7d_mean
    source: DEVICE
    unit: ms
    min_observations: 1
    lookback_days: 7
  - field: rmssd_30d_mean
    source: DEVICE
    unit: ms
    min_observations: 1
    lookback_days: 30
  - field: resting_hr_7d_mean
    source: KB-26
    unit: bpm
    min_observations: 1
    lookback_days: 7

computed_fields:
  - name: hrv_trend
    formula: "(rmssd_7d_mean - rmssd_30d_mean) / rmssd_30d_mean"

classifications:
  - category: SEVERELY_DEPRESSED
    condition: "rmssd_7d_mean < 15 AND resting_hr_7d_mean > 90"
    severity: MODERATE
    mcu_gate_suggestion: MODIFY
    card_template: "dc-pm08-severely-depressed-v1"
  - category: DECLINING
    condition: "hrv_trend < -0.20"
    severity: MILD
    mcu_gate_suggestion: SAFE
    card_template: "dc-pm08-declining-v1"
  - category: IMPROVING
    condition: "hrv_trend > 0.20"
    severity: NONE
    mcu_gate_suggestion: SAFE
  - category: STABLE
    condition: ""
    severity: NONE
    mcu_gate_suggestion: SAFE

insufficient_data:
  action: SKIP
  note_en: "HRV data requires wearable device"

cascade_to:
  - MD-04
