node_id: PM-10
version: "1.0.0"
type: MONITORING
title_en: "PHQ-2 Depression Screening"
title_hi: "PHQ-2 Avsad Jaanch"

required_inputs:
  - field: phq2_item1
    source: TIER1_CHECKIN
    unit: score
    min_observations: 1
    lookback_days: 14
  - field: phq2_item2
    source: TIER1_CHECKIN
    unit: score
    min_observations: 1
    lookback_days: 14

computed_fields:
  - name: phq2_score
    formula: "phq2_item1 + phq2_item2"

classifications:
  - category: POSITIVE_SCREEN
    condition: "phq2_score >= 3"
    severity: MODERATE
    mcu_gate_suggestion: SAFE
    card_template: "dc-pm10-phq2-positive-v1"
  - category: NEGATIVE_SCREEN
    condition: "phq2_score < 3"
    severity: NONE
    mcu_gate_suggestion: SAFE

insufficient_data:
  action: SKIP
  note_en: "No PHQ-2 screening data available"

safety_triggers:
  - id: PM10_ST01
    condition: "phq2_score >= 6"
    severity: URGENT
    action: "Maximum PHQ-2 score. Immediate PHQ-9 follow-up and clinician notification required."

cascade_to: []

checkin_prompts:
  - prompt_id: PM10_CK01
    text_en: "Over the last 2 weeks, how often have you had little interest or pleasure in doing things? (0=not at all, 1=several days, 2=more than half the days, 3=nearly every day)"
    text_hi: "Pichle 2 hafton mein, aapko cheezon mein kitni baar ruchi ya khushi ki kami mehsoos hui? (0=bilkul nahi, 1=kuch din, 2=aadhe se zyada din, 3=lagbhag har din)"
    response_type: SCALE
    maps_to: phq2_item1
  - prompt_id: PM10_CK02
    text_en: "Over the last 2 weeks, how often have you felt down, depressed, or hopeless? (0=not at all, 1=several days, 2=more than half the days, 3=nearly every day)"
    text_hi: "Pichle 2 hafton mein, aapko kitni baar udaas, nirash ya be-umeed mehsoos hua? (0=bilkul nahi, 1=kuch din, 2=aadhe se zyada din, 3=lagbhag har din)"
    response_type: SCALE
    maps_to: phq2_item2
