node_id: PM-06
version: "1.0.0"
type: MONITORING
title_en: "FBG Trend Computation"
title_hi: "FBG Rukh Ganana"

required_inputs:
  - field: fbg_current_mean
    source: KB-20
    unit: mg/dL
    min_observations: 3
    lookback_days: 7

aggregated_inputs:
  - field: fbg_values
    source: KB-20
    aggregation: RAW
    lookback_days: 90
    description: "Raw fasting glucose values for trajectory computation"

classifications:
  - category: RAPIDLY_RISING
    condition: "rate_of_change > 5"
    severity: MODERATE
    mcu_gate_suggestion: MODIFY
    card_template: "dc-pm06-rapidly-rising-v1"
  - category: GRADUALLY_RISING
    condition: "rate_of_change > 2"
    severity: MILD
    mcu_gate_suggestion: SAFE
    card_template: "dc-pm06-gradually-rising-v1"
  - category: IMPROVING
    condition: "rate_of_change < -2"
    severity: NONE
    mcu_gate_suggestion: SAFE
  - category: STABLE
    condition: ""
    severity: NONE
    mcu_gate_suggestion: SAFE

insufficient_data:
  action: SKIP
  note_en: "Insufficient fasting glucose readings for trend analysis"

safety_triggers:
  - id: PM06_ST01
    condition: "fbg_current_mean > 250"
    severity: URGENT
    action: "Severely elevated fasting glucose. Review overnight insulin and dietary compliance."

cascade_to:
  - MD-01
  - MD-05
