node_id: PM-01
version: "1.0.0"
type: MONITORING
title_en: "Home BP Monitoring"
title_hi: "Ghar ka BP Monitoring"

required_inputs:
  - field: sbp_home_mean
    source: KB-20
    unit: mmHg
    min_observations: 3
    lookback_days: 7
  - field: dbp_home_mean
    source: KB-20
    unit: mmHg
    min_observations: 3
    lookback_days: 7
  - field: bp_target_sbp
    source: KB-20
    unit: mmHg
    min_observations: 1
    lookback_days: 1

computed_fields:
  - name: sbp_delta
    formula: "sbp_home_mean - bp_target_sbp"

classifications:
  - category: HYPOTENSIVE
    condition: "sbp_home_mean < 90"
    severity: CRITICAL
    mcu_gate_suggestion: PAUSE
    card_template: "dc-pm01-hypotensive-v1"
  - category: SEVERELY_ABOVE
    condition: "sbp_delta > 30"
    severity: CRITICAL
    mcu_gate_suggestion: PAUSE
    card_template: "dc-pm01-severely-above-v1"
  - category: ABOVE_TARGET
    condition: "sbp_delta > 10"
    severity: MODERATE
    mcu_gate_suggestion: MODIFY
    card_template: "dc-pm01-above-target-v1"
  - category: BELOW_TARGET
    condition: "sbp_delta < -10"
    severity: MODERATE
    mcu_gate_suggestion: MODIFY
    card_template: "dc-pm01-below-target-v1"
  - category: AT_TARGET
    condition: "abs(sbp_delta) <= 10"
    severity: NONE
    mcu_gate_suggestion: SAFE

insufficient_data:
  action: SKIP
  note_en: "Insufficient home BP readings"

safety_triggers:
  - id: PM01_ST01
    condition: "sbp_home_mean > 180"
    severity: IMMEDIATE
    action: "Hypertensive crisis. Immediate medical attention required."

cascade_to:
  - MD-02
  - MD-06
