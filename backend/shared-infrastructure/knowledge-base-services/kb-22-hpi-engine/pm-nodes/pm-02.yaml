node_id: PM-02
version: "1.0.0"
type: MONITORING
title_en: "Daily Symptom Check-in"
title_hi: "Dainik Lakshan Jaanch"

required_inputs:
  - field: symptom_headache
    source: TIER1_CHECKIN
    unit: boolean
    min_observations: 1
    lookback_days: 1
  - field: symptom_dizziness
    source: TIER1_CHECKIN
    unit: boolean
    min_observations: 1
    lookback_days: 1
  - field: symptom_chest_pain
    source: TIER1_CHECKIN
    unit: boolean
    min_observations: 1
    lookback_days: 1
  - field: symptom_fatigue
    source: TIER1_CHECKIN
    unit: boolean
    min_observations: 1
    lookback_days: 1
  - field: symptom_oedema
    source: TIER1_CHECKIN
    unit: boolean
    min_observations: 1
    lookback_days: 1

computed_fields:
  - name: symptom_count
    formula: "symptom_headache + symptom_dizziness + symptom_chest_pain + symptom_fatigue + symptom_oedema"

classifications:
  - category: MULTI_SYMPTOM
    condition: "symptom_count >= 3"
    severity: MODERATE
    mcu_gate_suggestion: MODIFY
    card_template: "dc-pm02-multi-symptom-v1"
  - category: SINGLE_SYMPTOM
    condition: "symptom_count >= 1"
    severity: MILD
    mcu_gate_suggestion: SAFE
    card_template: "dc-pm02-single-symptom-v1"
  - category: ASYMPTOMATIC
    condition: ""
    severity: NONE
    mcu_gate_suggestion: SAFE

insufficient_data:
  action: SKIP
  note_en: "Daily symptom check-in not completed"

safety_triggers:
  - id: PM02_ST01
    condition: "symptom_chest_pain > 0.5"
    severity: IMMEDIATE
    action: "Chest pain reported. Escalate to physician immediately."

cascade_to:
  - MD-04
  - MD-06

checkin_prompts:
  - prompt_id: PM02_CK01
    text_en: "Do you have a headache today?"
    text_hi: "Kya aapko aaj sir mein dard hai?"
    response_type: BOOLEAN
    maps_to: symptom_headache
  - prompt_id: PM02_CK02
    text_en: "Are you feeling dizzy?"
    text_hi: "Kya aapko chakkar aa raha hai?"
    response_type: BOOLEAN
    maps_to: symptom_dizziness
  - prompt_id: PM02_CK03
    text_en: "Do you have any chest pain or discomfort?"
    text_hi: "Kya aapko seene mein dard ya taklif hai?"
    response_type: BOOLEAN
    maps_to: symptom_chest_pain
  - prompt_id: PM02_CK04
    text_en: "Are you feeling unusually tired or fatigued?"
    text_hi: "Kya aap asaamaanya roop se thake hue hain?"
    response_type: BOOLEAN
    maps_to: symptom_fatigue
  - prompt_id: PM02_CK05
    text_en: "Do you notice any swelling in your feet or ankles?"
    text_hi: "Kya aapke pairo ya takhno mein sujan hai?"
    response_type: BOOLEAN
    maps_to: symptom_oedema
