node_id: PM-05
version: "1.0.0"
type: MONITORING
title_en: "Glycemic Variability"
title_hi: "Glycemic Parivartan"

aggregated_inputs:
  - field: glucose_cv
    source: KB-20
    aggregation: CV
    lookback_days: 14
    description: "Coefficient of variation of glucose readings over 14 days"

classifications:
  - category: HIGHLY_VARIABLE
    condition: "glucose_cv > 36"
    severity: MODERATE
    mcu_gate_suggestion: MODIFY
    card_template: "dc-pm05-highly-variable-v1"
  - category: MODERATELY_VARIABLE
    condition: "glucose_cv > 20"
    severity: MILD
    mcu_gate_suggestion: SAFE
    card_template: "dc-pm05-moderately-variable-v1"
  - category: STABLE
    condition: ""
    severity: NONE
    mcu_gate_suggestion: SAFE

insufficient_data:
  action: SKIP
  note_en: "Insufficient glucose readings for variability calculation"

safety_triggers:
  - id: PM05_ST01
    condition: "glucose_cv > 50"
    severity: URGENT
    action: "Extreme glycemic variability. Review insulin regimen and meal patterns."

cascade_to:
  - MD-01
  - MD-05
