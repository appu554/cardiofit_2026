# Tasmanian Pharmacist Co-Prescribing Pilot 2026-2027.
#
# Source:
#   Tasmanian state budget 2025-26: $5M allocated to the Pharmacist
#   Co-Prescribing Pilot (in collaboration with the GP per a treatment
#   plan; "co-prescribing" not autonomous prescribing).
#
# STATUS: DRAFT.
# This ScopeRule is staged but NOT in force. Activation depends on the
# Vaidshala v2 Move 1 outcome (per Vaidshala v2 Revision Mapping Part 7
# — commercial Move 1 lands the platform as the digital substrate for
# the pilot). Until then, the rule must NOT be consumed by the runtime
# evaluator (kb-31 store enforces this via the DRAFT exclusion in
# IsActiveAt).
#
# Activation gate: Vaidshala v2 Move 1 outcome confirmation that the
# platform is the pilot's digital substrate. Once confirmed, flip
# status to ACTIVE and re-deploy.
scope_rule:
  rule_id: "AUS-TAS-PHARMACIST-COPRESCRIBE-PILOT-2026"
  jurisdiction: "AU/TAS"
  category: "prescriber_scope"
  status: DRAFT
  activation_gate: "Pilot integration confirmation pending Vaidshala v2 Move 1 outcome (Vaidshala v2 Revision Mapping Part 7). Activate by setting status=ACTIVE only after the platform is confirmed as the pilot digital substrate."
  effective_period:
    start_date: 2026-07-01T00:00:00Z
    end_date: 2027-12-31T23:59:59Z
  applies_to:
    role: "tasmanian_pilot_pharmacist"
    action_class: "prescribe"
  evaluation:
    decision: "granted_with_conditions"
    reason: "Tasmanian Pharmacist Co-Prescribing Pilot — co-prescribing only with GP per treatment plan"
    conditions:
      - condition: "valid_treatment_plan_with_gp"
        check: "TreatmentPlan.exists_for_resident_signed_by_gp_and_pharmacist"
      - condition: "medication_class_in_treatment_plan_scope"
        check: "TreatmentPlan.scope_includes(medication_class)"
      - condition: "pharmacist_pilot_credential_current"
        check: "Credential.kind='tas_pilot_coprescribe' AND Credential.valid_at_action_time"
      - condition: "co_prescribing_not_autonomous"
        check: "Action.requires_gp_in_treatment_plan = true"
    if_any_condition_fails:
      decision: "denied"
      reason: "Tasmanian co-prescribing pilot conditions not met (treatment plan / scope / credential / co-prescribing requirement)"
  audit:
    legislative_reference: "Tasmanian Pharmacist Co-Prescribing Pilot 2026-2027 (Tasmanian Government, $5M state budget 2025-26)"
    source_id: "tas-pharmacist-coprescribe-pilot-2026"
    source_version: "draft-2026"
    source_url: "https://www.treasury.tas.gov.au/budget"
    recordkeeping_required: true
    recordkeeping_period_years: 7
