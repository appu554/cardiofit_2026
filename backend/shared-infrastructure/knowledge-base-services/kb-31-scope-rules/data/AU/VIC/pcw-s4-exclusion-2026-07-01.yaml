# Victorian Personal Care Worker (PCW) exclusion from S4/S8/S9 administration
# in residential aged care.
#
# Legislative reference:
#   Drugs, Poisons and Controlled Substances Amendment (Medication
#   Administration in Residential Aged Care) Act 2025 (Vic).
#
# Commencement:    1 July 2026.
# Grace period:    90 days (hard enforcement begins 29 September 2026).
#
# Effect:
#   Personal Care Workers (PCWs) in Victorian residential aged care
#   facilities may not administer S4 (Prescription Only), S8 (Drugs of
#   Dependence), or S9 (Prohibited Substances) medications, nor any
#   other drug-of-dependence, to residents who are not self-
#   administering. Fallback to Registered Nurse, Enrolled Nurse,
#   Pharmacist, or Medical practitioner.
#
# Source attribution: Victorian Department of Health legislative
#   register (DPCSA Amendment — Medication Administration in Residential
#   Aged Care). source_url below cites the published legislative page.
scope_rule:
  rule_id: "AUS-VIC-PCW-S4-EXCLUSION-2026-07-01"
  jurisdiction: "AU/VIC"
  category: "medication_administration_scope_restriction"
  status: ACTIVE
  effective_period:
    start_date: 2026-07-01T00:00:00Z
    end_date: null
    grace_period_days: 90
  applies_to:
    role: "personal_care_worker"
    action_class: "administer"
    medication_schedule:
      - "S4"
      - "S8"
      - "S9"
    medication_class_includes:
      - "antibiotics"
      - "opioid_analgesics"
      - "benzodiazepines"
      - "drugs_of_dependence"
    resident_self_administering: false
  evaluation:
    decision: "denied"
    reason: "Victorian DPCSA Amendment (Medication Administration in Residential Aged Care) Act 2025 — PCWs may not administer S4/S8/S9 to non-self-administering residents in residential aged care."
    fallback_required: true
    fallback_eligible_roles:
      - "registered_nurse"
      - "enrolled_nurse"
      - "pharmacist"
      - "medical_practitioner"
  audit:
    legislative_reference: "Drugs, Poisons and Controlled Substances Amendment (Medication Administration in Residential Aged Care) Act 2025 (Vic)"
    source_id: "vic-dpcsa-amend-2025"
    source_version: "as-passed-2025"
    source_url: "https://www.legislation.vic.gov.au/in-force/acts/drugs-poisons-and-controlled-substances-act-1981"
    recordkeeping_required: true
    recordkeeping_period_years: 7
