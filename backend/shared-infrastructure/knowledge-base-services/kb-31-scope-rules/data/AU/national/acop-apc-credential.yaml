# Aged Care On-site Pharmacist (ACOP) APC credential scope rule.
#
# Source:
#   ACOP program ($350M Australian Government Aged Care On-site
#   Pharmacist program). The Pharmacy Board of Australia / APC
#   (Australian Pharmacy Council) training requirement for ACOP
#   pharmacists becomes mandatory from 1 July 2026.
#
# Effect:
#   An ACOP pharmacist may view a resident profile and submit
#   recommendations only when their APC training credential is current
#   AND their AHPRA pharmacist registration is current at action time.
#
# Source attribution: Department of Health and Aged Care ACOP program
#   page (source_url below).
scope_rule:
  rule_id: "AUS-ACOP-APC-CREDENTIAL-2026-07-01"
  jurisdiction: "AU"
  category: "credential_scope"
  status: ACTIVE
  effective_period:
    start_date: 2026-07-01T00:00:00Z
    end_date: null
  applies_to:
    role: "acop_pharmacist"
    action_class: "view_profile"
  evaluation:
    decision: "granted_with_conditions"
    reason: "ACOP pharmacist may view resident profiles when APC training credential is current"
    conditions:
      - condition: "apc_training_credential_current"
        check: "Credential.kind='apc_training' AND Credential.valid_at_action_time"
      - condition: "ahpra_pharmacist_registration_current"
        check: "Credential.kind='ahpra_pharmacist_registration' AND Credential.valid_at_action_time"
    if_any_condition_fails:
      decision: "denied"
      reason: "ACOP pharmacist credential requirements not met (APC training and/or AHPRA registration not current)"
  audit:
    legislative_reference: "Aged Care On-site Pharmacist (ACOP) program — APC training requirement, effective 1 July 2026 ($350M ACOP program)"
    source_id: "acop-apc-training-2026"
    source_version: "2026-07-01"
    source_url: "https://www.health.gov.au/our-work/aged-care-on-site-pharmacist-program"
    recordkeeping_required: true
    recordkeeping_period_years: 7
