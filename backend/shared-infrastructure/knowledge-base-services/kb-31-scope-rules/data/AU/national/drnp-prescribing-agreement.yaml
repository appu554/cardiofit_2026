# Designated Registered Nurse Prescriber (DRNP) prescribing-agreement
# scope rule.
#
# Source:
#   NMBA (Nursing and Midwifery Board of Australia) Registration
#   Standard: Endorsement for scheduled medicines — designated registered
#   nurse prescriber. Commenced 30 September 2025; first endorsed RN
#   prescribers are expected mid-2026 once mentorship pathways complete.
#
# Effect:
#   A registered nurse with the DRNP endorsement may prescribe ONLY
#   inside a current PrescribingAgreement with an authorised medical
#   practitioner, and ONLY within the agreement's scope. Mentorship
#   must be active or completed (a 6-month mentorship is part of the
#   endorsement standard). The action's medication class must be
#   inside the agreement.
#
# Source attribution: NMBA Registration Standard published on the
#   AHPRA / NMBA registers; source_url below points to the standard.
scope_rule:
  rule_id: "AUS-NMBA-DRNP-PRESCRIBING-AGREEMENT-2025-09-30"
  jurisdiction: "AU"
  category: "prescriber_scope"
  status: ACTIVE
  effective_period:
    start_date: 2025-09-30T00:00:00Z
    end_date: null
  applies_to:
    role: "designated_rn_prescriber"
    action_class: "prescribe"
  evaluation:
    decision: "granted_with_conditions"
    reason: "Designated RN prescribing under partnership-only model (NMBA endorsement standard, 30 Sep 2025)"
    conditions:
      - condition: "valid_prescribing_agreement_in_place"
        check: "PrescribingAgreement.exists_for_person_AND_resident_AND_medication_class"
      - condition: "mentorship_complete_or_active"
        check: "MentorshipStatus IN ['active', 'complete']"
      - condition: "medication_class_in_agreement_scope"
        check: "PrescribingAgreement.scope_includes(medication_class)"
      - condition: "endorsement_current"
        check: "Credential.endorsement_valid_at_action_time"
      - condition: "scope_match"
        check: "Action.scope_matches(PrescribingAgreement.scope)"
    if_any_condition_fails:
      decision: "denied"
      reason: "Designated RN prescribing requirements not met"
  audit:
    legislative_reference: "NMBA Registration Standard: Endorsement for scheduled medicines — designated registered nurse prescriber, effective 30 September 2025"
    source_id: "nmba-drnp-endorsement-2025"
    source_version: "2025-09-30"
    source_url: "https://www.nursingmidwiferyboard.gov.au/Registration-Standards/Endorsement-for-scheduled-medicines-designated-registered-nurse-prescriber.aspx"
    recordkeeping_required: true
    recordkeeping_period_years: 7
