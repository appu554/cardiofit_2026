# KB-21 Behavioral Intelligence — Test Infrastructure
# Ephemeral PostgreSQL + Redis for integration tests (tmpfs = no persistence).
#
# Usage:
#   docker-compose -f docker-compose.test.yml up -d
#   go test -tags=integration -v -count=1 ./tests/integration/...
#   docker-compose -f docker-compose.test.yml down

services:
  kb21-test-postgres:
    image: postgres:15-alpine
    container_name: kb21-test-postgres
    environment:
      POSTGRES_USER: kb21_test
      POSTGRES_PASSWORD: kb21_test_pass
      POSTGRES_DB: kb21_test
    ports:
      - "5440:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb21_test"]
      interval: 2s
      timeout: 3s
      retries: 10

  kb21-test-redis:
    image: redis:7-alpine
    container_name: kb21-test-redis
    ports:
      - "6389:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
