# Festival Calendar — India 2026
# Used by KB-21 Festival Mode to suppress adherence penalties during culturally
# expected dietary deviations. Dates are region-aware with fasting type classification.
#
# Fasting types:
#   SWEET_HEAVY  — High glycemic load (sweets, fried foods). Expect glucose spikes.
#   FASTING      — Extended fasting periods. Expect hypoglycaemia risk.
#   MIXED        — Combination of fasting and feasting across days.
#   MEAT_FEAST   — High protein/fat. Moderate glycemic impact.
#
# Regions: NORTH, SOUTH, EAST, WEST, ALL (nationwide)
# Window: ±2 days around the core date(s) for the suppression period.

festivals:
  # ── Nationwide festivals ──

  - name: "Makar Sankranti / Pongal"
    date_start: "2026-01-14"
    date_end: "2026-01-16"
    regions: ["ALL"]
    fasting_type: "SWEET_HEAVY"
    notes: "Til-gul (North), Pongal rice (South). High glycemic traditional foods."

  - name: "Republic Day"
    date_start: "2026-01-26"
    date_end: "2026-01-26"
    regions: ["ALL"]
    fasting_type: "SWEET_HEAVY"
    notes: "National holiday — community feasts common."

  - name: "Maha Shivaratri"
    date_start: "2026-02-15"
    date_end: "2026-02-15"
    regions: ["ALL"]
    fasting_type: "FASTING"
    notes: "Full-day fast observed by many Hindu communities."

  - name: "Holi"
    date_start: "2026-03-10"
    date_end: "2026-03-11"
    regions: ["ALL"]
    fasting_type: "SWEET_HEAVY"
    notes: "Thandai, gujiya, sweets. High calorie consumption."

  - name: "Ramadan (start)"
    date_start: "2026-02-18"
    date_end: "2026-03-19"
    regions: ["ALL"]
    fasting_type: "FASTING"
    notes: "Month-long dawn-to-dusk fasting. Risk of hypoglycaemia during day, hyperglycaemia at iftar."

  - name: "Eid ul-Fitr"
    date_start: "2026-03-20"
    date_end: "2026-03-22"
    regions: ["ALL"]
    fasting_type: "SWEET_HEAVY"
    notes: "End of Ramadan. Biryani, seviyan, sweets."

  - name: "Ram Navami"
    date_start: "2026-04-02"
    date_end: "2026-04-02"
    regions: ["ALL"]
    fasting_type: "FASTING"
    notes: "Fast observed in many Hindu households."

  - name: "Independence Day"
    date_start: "2026-08-15"
    date_end: "2026-08-15"
    regions: ["ALL"]
    fasting_type: "SWEET_HEAVY"
    notes: "National holiday — community celebrations."

  - name: "Janmashtami"
    date_start: "2026-08-25"
    date_end: "2026-08-25"
    regions: ["ALL"]
    fasting_type: "FASTING"
    notes: "Full-day fast followed by midnight feast."

  - name: "Eid ul-Adha"
    date_start: "2026-05-27"
    date_end: "2026-05-29"
    regions: ["ALL"]
    fasting_type: "MEAT_FEAST"
    notes: "Qurbani celebration. High protein/fat meals."

  - name: "Ganesh Chaturthi"
    date_start: "2026-08-27"
    date_end: "2026-09-06"
    regions: ["WEST", "SOUTH"]
    fasting_type: "SWEET_HEAVY"
    notes: "Modak, laddu. 10-day festival with daily sweets."

  # ── Navratri / Dussehra season ──

  - name: "Navratri"
    date_start: "2026-10-01"
    date_end: "2026-10-09"
    regions: ["ALL"]
    fasting_type: "FASTING"
    notes: "9 days of fasting (kuttu atta, sabudana — different macros from normal diet)."

  - name: "Dussehra / Vijayadashami"
    date_start: "2026-10-10"
    date_end: "2026-10-10"
    regions: ["ALL"]
    fasting_type: "SWEET_HEAVY"
    notes: "End of Navratri. Feasting resumes."

  # ── Diwali season ──

  - name: "Diwali"
    date_start: "2026-10-28"
    date_end: "2026-11-01"
    regions: ["ALL"]
    fasting_type: "SWEET_HEAVY"
    notes: "Peak dietary disruption. Mithai, namkeen, fried foods for 5 days."

  - name: "Bhai Dooj"
    date_start: "2026-11-02"
    date_end: "2026-11-02"
    regions: ["NORTH", "EAST"]
    fasting_type: "SWEET_HEAVY"
    notes: "Gift sweets to siblings."

  # ── Regional festivals ──

  - name: "Onam"
    date_start: "2026-09-07"
    date_end: "2026-09-09"
    regions: ["SOUTH"]
    fasting_type: "SWEET_HEAVY"
    notes: "Onam sadhya (26-course feast). Kerala specific."

  - name: "Durga Puja"
    date_start: "2026-10-06"
    date_end: "2026-10-10"
    regions: ["EAST"]
    fasting_type: "MIXED"
    notes: "Fasting mornings, feasting evenings. Kolkata bhog culture."

  - name: "Bihu"
    date_start: "2026-04-14"
    date_end: "2026-04-15"
    regions: ["EAST"]
    fasting_type: "SWEET_HEAVY"
    notes: "Assamese New Year. Pitha, laru sweets."

  - name: "Chhath Puja"
    date_start: "2026-11-08"
    date_end: "2026-11-09"
    regions: ["NORTH", "EAST"]
    fasting_type: "FASTING"
    notes: "36-hour waterless fast. Significant hypoglycaemia risk."

  - name: "Lohri"
    date_start: "2026-01-13"
    date_end: "2026-01-13"
    regions: ["NORTH"]
    fasting_type: "SWEET_HEAVY"
    notes: "Til-gur, rewri, peanuts. Punjab/North India."

  - name: "Christmas"
    date_start: "2026-12-25"
    date_end: "2026-12-25"
    regions: ["ALL"]
    fasting_type: "SWEET_HEAVY"
    notes: "Cake, plum pudding, biryani. Christian communities + widespread celebration."
