# Top RACF (Residential Aged Care Facility) drugs — INN watchlist for TGA PI download.
#
# Curated from AU aged-care prescribing literature + the explicit-criteria
# rules already loaded in KB-4 (392 rules across 8 sources). The watchlist
# is one INN per line; the scraper matches against active_ingredients in
# tga_pi_index.json. Multi-brand match is expected (metformin alone returns
# ~38 different PI documents across brands).
#
# Used by:  scripts/tga_pi_scraper.py download --watchlist <this file>
#
# Sourcing:
#   - PBS top-50 dispensed in aged-care 2024
#   - STOPP/START v3 named drugs
#   - Wang 2024 AU PIMs named drugs
#   - AGS Beers 2023 named drugs
#   - Common-condition first-line therapies (CV, T2D, dementia, BPSD)
#
# Curation date: 2026-04-30

