# KB-3 Production Kubernetes Deployment\n# StatefulSet deployment with Neo4j integration and comprehensive monitoring\n\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: kb3-guidelines\n  labels:\n    component: clinical-knowledge-base\n    tier: knowledge-services\n---\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: kb3-config\n  namespace: kb3-guidelines\ndata:\n  # Application configuration\n  KB_VERSION: \"2.0.0\"\n  SERVICE_PORT: \"8084\"\n  REGIONS: \"US,EU,AU,WHO,Global\"\n  \n  # Cache configuration\n  CACHE_STRATEGY: \"multi_layer\"\n  L1_CACHE_SIZE: \"200MB\"\n  L1_CACHE_TTL: \"300\"\n  L2_CACHE_TTL: \"3600\"\n  L3_CACHE_TTL: \"86400\"\n  \n  # Feature flags\n  CONFLICT_RESOLUTION: \"enabled\"\n  SAFETY_OVERRIDES: \"enabled\"\n  NEO4J_ENABLED: \"true\"\n  AUDIT_LOGGING: \"enabled\"\n  \n  # Performance settings\n  MAX_CONCURRENT_QUERIES: \"1000\"\n  QUERY_TIMEOUT: \"30000\"\n  CACHE_PRELOAD: \"enabled\"\n  \n  # Monitoring\n  METRICS_ENABLED: \"true\"\n  TRACING_ENABLED: \"true\"\n  HEALTH_CHECK_INTERVAL: \"30\"\n---\napiVersion: v1\nkind: Secret\nmetadata:\n  name: kb3-secrets\n  namespace: kb3-guidelines\ntype: Opaque\ndata:\n  # Base64 encoded secrets\n  POSTGRES_PASSWORD: cGFzc3dvcmQxMjM=  # password123\n  NEO4J_PASSWORD: bmVvNGpwYXNzd29yZA==    # neo4jpassword\n  REDIS_PASSWORD: cmVkaXNwYXNzd29yZA==      # redispassword\n  JWT_SECRET: and0c2VjcmV0a2V5MTIz        # jwtsecretkey123\n  API_KEY: YXBpa2V5MTIzNDU2Nzg5         # apikey123456789\n---\n# PostgreSQL StatefulSet for metadata and audit\napiVersion: apps/v1\nkind: StatefulSet\nmetadata:\n  name: kb3-postgres\n  namespace: kb3-guidelines\nspec:\n  serviceName: kb3-postgres-service\n  replicas: 1\n  selector:\n    matchLabels:\n      app: kb3-postgres\n  template:\n    metadata:\n      labels:\n        app: kb3-postgres\n    spec:\n      containers:\n      - name: postgres\n        image: postgres:15-alpine\n        env:\n        - name: POSTGRES_DB\n          value: \"kb3_guidelines\"\n        - name: POSTGRES_USER\n          value: \"kb3_user\"\n        - name: POSTGRES_PASSWORD\n          valueFrom:\n            secretKeyRef:\n              name: kb3-secrets\n              key: POSTGRES_PASSWORD\n        - name: PGDATA\n          value: \"/var/lib/postgresql/data/pgdata\"\n        ports:\n        - containerPort: 5432\n        volumeMounts:\n        - name: postgres-data\n          mountPath: /var/lib/postgresql/data\n        resources:\n          requests:\n            memory: \"1Gi\"\n            cpu: \"500m\"\n          limits:\n            memory: \"2Gi\"\n            cpu: \"1000m\"\n        livenessProbe:\n          exec:\n            command:\n            - pg_isready\n            - -U\n            - kb3_user\n          initialDelaySeconds: 30\n          periodSeconds: 10\n        readinessProbe:\n          exec:\n            command:\n            - pg_isready\n            - -U\n            - kb3_user\n          initialDelaySeconds: 5\n          periodSeconds: 5\n  volumeClaimTemplates:\n  - metadata:\n      name: postgres-data\n    spec:\n      accessModes: [\"ReadWriteOnce\"]\n      resources:\n        requests:\n          storage: 50Gi\n      storageClassName: fast-ssd\n---\n# Neo4j StatefulSet for graph relationships\napiVersion: apps/v1\nkind: StatefulSet\nmetadata:\n  name: kb3-neo4j\n  namespace: kb3-guidelines\nspec:\n  serviceName: kb3-neo4j-service\n  replicas: 1\n  selector:\n    matchLabels:\n      app: kb3-neo4j\n  template:\n    metadata:\n      labels:\n        app: kb3-neo4j\n    spec:\n      containers:\n      - name: neo4j\n        image: neo4j:5.0-enterprise\n        env:\n        - name: NEO4J_AUTH\n          value: \"neo4j/$(NEO4J_PASSWORD)\"\n        - name: NEO4J_PASSWORD\n          valueFrom:\n            secretKeyRef:\n              name: kb3-secrets\n              key: NEO4J_PASSWORD\n        - name: NEO4J_PLUGINS\n          value: '[\"apoc\", \"graph-data-science\"]'\n        - name: NEO4J_apoc_export_file_enabled\n          value: \"true\"\n        - name: NEO4J_apoc_import_file_enabled\n          value: \"true\"\n        - name: NEO4J_dbms_security_procedures_unrestricted\n          value: \"apoc.*,gds.*\"\n        ports:\n        - containerPort: 7474\n        - containerPort: 7687\n        volumeMounts:\n        - name: neo4j-data\n          mountPath: /data\n        - name: neo4j-logs\n          mountPath: /logs\n        resources:\n          requests:\n            memory: \"4Gi\"\n            cpu: \"2\"\n          limits:\n            memory: \"8Gi\"\n            cpu: \"4\"\n        livenessProbe:\n          httpGet:\n            path: /\n            port: 7474\n          initialDelaySeconds: 60\n          periodSeconds: 30\n        readinessProbe:\n          httpGet:\n            path: /\n            port: 7474\n          initialDelaySeconds: 30\n          periodSeconds: 10\n  volumeClaimTemplates:\n  - metadata:\n      name: neo4j-data\n    spec:\n      accessModes: [\"ReadWriteOnce\"]\n      resources:\n        requests:\n          storage: 100Gi\n      storageClassName: fast-ssd\n  - metadata:\n      name: neo4j-logs\n    spec:\n      accessModes: [\"ReadWriteOnce\"]\n      resources:\n        requests:\n          storage: 20Gi\n---\n# Redis StatefulSet for L2 caching\napiVersion: apps/v1\nkind: StatefulSet\nmetadata:\n  name: kb3-redis\n  namespace: kb3-guidelines\nspec:\n  serviceName: kb3-redis-service\n  replicas: 1\n  selector:\n    matchLabels:\n      app: kb3-redis\n  template:\n    metadata:\n      labels:\n        app: kb3-redis\n    spec:\n      containers:\n      - name: redis\n        image: redis:7-alpine\n        command:\n        - redis-server\n        - --requirepass\n        - $(REDIS_PASSWORD)\n        - --maxmemory\n        - 2gb\n        - --maxmemory-policy\n        - allkeys-lru\n        env:\n        - name: REDIS_PASSWORD\n          valueFrom:\n            secretKeyRef:\n              name: kb3-secrets\n              key: REDIS_PASSWORD\n        ports:\n        - containerPort: 6379\n        volumeMounts:\n        - name: redis-data\n          mountPath: /data\n        resources:\n          requests:\n            memory: \"1Gi\"\n            cpu: \"500m\"\n          limits:\n            memory: \"2Gi\"\n            cpu: \"1000m\"\n        livenessProbe:\n          exec:\n            command:\n            - redis-cli\n            - --no-auth-warning\n            - -a\n            - $(REDIS_PASSWORD)\n            - ping\n          initialDelaySeconds: 30\n          periodSeconds: 10\n        readinessProbe:\n          exec:\n            command:\n            - redis-cli\n            - --no-auth-warning\n            - -a\n            - $(REDIS_PASSWORD)\n            - ping\n          initialDelaySeconds: 5\n          periodSeconds: 5\n  volumeClaimTemplates:\n  - metadata:\n      name: redis-data\n    spec:\n      accessModes: [\"ReadWriteOnce\"]\n      resources:\n        requests:\n          storage: 10Gi\n---\n# KB-3 Application Deployment\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: kb3-guideline-evidence\n  namespace: kb3-guidelines\n  labels:\n    app: kb3-guidelines\n    version: v2.0.0\nspec:\n  replicas: 3\n  strategy:\n    type: RollingUpdate\n    rollingUpdate:\n      maxSurge: 1\n      maxUnavailable: 0\n  selector:\n    matchLabels:\n      app: kb3-guidelines\n  template:\n    metadata:\n      labels:\n        app: kb3-guidelines\n        version: v2.0.0\n      annotations:\n        prometheus.io/scrape: \"true\"\n        prometheus.io/port: \"8084\"\n        prometheus.io/path: \"/metrics\"\n    spec:\n      securityContext:\n        runAsNonRoot: true\n        runAsUser: 10001\n        fsGroup: 10001\n      containers:\n      - name: kb3-app\n        image: clinical-kb/kb3-guidelines:2.0.0\n        imagePullPolicy: Always\n        env:\n        - name: SERVICE_PORT\n          valueFrom:\n            configMapKeyRef:\n              name: kb3-config\n              key: SERVICE_PORT\n        - name: KB_VERSION\n          valueFrom:\n            configMapKeyRef:\n              name: kb3-config\n              key: KB_VERSION\n        - name: POSTGRES_HOST\n          value: \"kb3-postgres-service\"\n        - name: POSTGRES_PORT\n          value: \"5432\"\n        - name: POSTGRES_DB\n          value: \"kb3_guidelines\"\n        - name: POSTGRES_USER\n          value: \"kb3_user\"\n        - name: POSTGRES_PASSWORD\n          valueFrom:\n            secretKeyRef:\n              name: kb3-secrets\n              key: POSTGRES_PASSWORD\n        - name: NEO4J_URI\n          value: \"bolt://kb3-neo4j-service:7687\"\n        - name: NEO4J_USERNAME\n          value: \"neo4j\"\n        - name: NEO4J_PASSWORD\n          valueFrom:\n            secretKeyRef:\n              name: kb3-secrets\n              key: NEO4J_PASSWORD\n        - name: REDIS_HOST\n          value: \"kb3-redis-service\"\n        - name: REDIS_PORT\n          value: \"6379\"\n        - name: REDIS_PASSWORD\n          valueFrom:\n            secretKeyRef:\n              name: kb3-secrets\n              key: REDIS_PASSWORD\n        - name: CACHE_STRATEGY\n          valueFrom:\n            configMapKeyRef:\n              name: kb3-config\n              key: CACHE_STRATEGY\n        - name: CONFLICT_RESOLUTION\n          valueFrom:\n            configMapKeyRef:\n              name: kb3-config\n              key: CONFLICT_RESOLUTION\n        - name: SAFETY_OVERRIDES\n          valueFrom:\n            configMapKeyRef:\n              name: kb3-config\n              key: SAFETY_OVERRIDES\n        ports:\n        - containerPort: 8084\n          name: http\n        - containerPort: 9090\n          name: metrics\n        volumeMounts:\n        - name: app-config\n          mountPath: /app/config\n          readOnly: true\n        - name: audit-logs\n          mountPath: /app/logs\n        resources:\n          requests:\n            memory: \"2Gi\"\n            cpu: \"1\"\n          limits:\n            memory: \"4Gi\"\n            cpu: \"2\"\n        livenessProbe:\n          httpGet:\n            path: /health\n            port: http\n          initialDelaySeconds: 60\n          periodSeconds: 30\n          timeoutSeconds: 10\n          failureThreshold: 3\n        readinessProbe:\n          httpGet:\n            path: /health/ready\n            port: http\n          initialDelaySeconds: 30\n          periodSeconds: 10\n          timeoutSeconds: 5\n          failureThreshold: 3\n        startupProbe:\n          httpGet:\n            path: /health/startup\n            port: http\n          initialDelaySeconds: 10\n          periodSeconds: 5\n          timeoutSeconds: 3\n          failureThreshold: 20\n      volumes:\n      - name: app-config\n        configMap:\n          name: kb3-config\n      - name: audit-logs\n        persistentVolumeClaim:\n          claimName: kb3-audit-logs\n      \n      # Resource management\n      nodeSelector:\n        node-type: compute-optimized\n      tolerations:\n      - key: \"clinical-workload\"\n        operator: \"Equal\"\n        value: \"true\"\n        effect: \"NoSchedule\"\n      affinity:\n        podAntiAffinity:\n          preferredDuringSchedulingIgnoredDuringExecution:\n          - weight: 100\n            podAffinityTerm:\n              labelSelector:\n                matchExpressions:\n                - key: app\n                  operator: In\n                  values: [\"kb3-guidelines\"]\n              topologyKey: kubernetes.io/hostname\n---\n# Horizontal Pod Autoscaler\napiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\nmetadata:\n  name: kb3-hpa\n  namespace: kb3-guidelines\nspec:\n  scaleTargetRef:\n    apiVersion: apps/v1\n    kind: Deployment\n    name: kb3-guideline-evidence\n  minReplicas: 3\n  maxReplicas: 10\n  metrics:\n  - type: Resource\n    resource:\n      name: cpu\n      target:\n        type: Utilization\n        averageUtilization: 70\n  - type: Resource\n    resource:\n      name: memory\n      target:\n        type: Utilization\n        averageUtilization: 80\n  - type: Pods\n    pods:\n      metric:\n        name: guideline_requests_per_second\n      target:\n        type: AverageValue\n        averageValue: \"100\"\n  behavior:\n    scaleUp:\n      stabilizationWindowSeconds: 60\n      policies:\n      - type: Percent\n        value: 50\n        periodSeconds: 60\n    scaleDown:\n      stabilizationWindowSeconds: 300\n      policies:\n      - type: Percent\n        value: 10\n        periodSeconds: 60\n---\n# Services\napiVersion: v1\nkind: Service\nmetadata:\n  name: kb3-service\n  namespace: kb3-guidelines\n  labels:\n    app: kb3-guidelines\n  annotations:\n    service.beta.kubernetes.io/aws-load-balancer-type: \"nlb\"\n    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: \"true\"\nspec:\n  type: LoadBalancer\n  selector:\n    app: kb3-guidelines\n  ports:\n  - name: http\n    port: 8084\n    targetPort: http\n    protocol: TCP\n  - name: metrics\n    port: 9090\n    targetPort: metrics\n    protocol: TCP\n---\napiVersion: v1\nkind: Service\nmetadata:\n  name: kb3-postgres-service\n  namespace: kb3-guidelines\nspec:\n  selector:\n    app: kb3-postgres\n  ports:\n  - port: 5432\n    targetPort: 5432\n  type: ClusterIP\n---\napiVersion: v1\nkind: Service\nmetadata:\n  name: kb3-neo4j-service\n  namespace: kb3-guidelines\nspec:\n  selector:\n    app: kb3-neo4j\n  ports:\n  - name: http\n    port: 7474\n    targetPort: 7474\n  - name: bolt\n    port: 7687\n    targetPort: 7687\n  type: ClusterIP\n---\napiVersion: v1\nkind: Service\nmetadata:\n  name: kb3-redis-service\n  namespace: kb3-guidelines\nspec:\n  selector:\n    app: kb3-redis\n  ports:\n  - port: 6379\n    targetPort: 6379\n  type: ClusterIP\n---\n# Persistent Volume Claim for audit logs\napiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: kb3-audit-logs\n  namespace: kb3-guidelines\nspec:\n  accessModes:\n  - ReadWriteMany\n  resources:\n    requests:\n      storage: 100Gi\n  storageClassName: efs\n---\n# Network Policy\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: kb3-network-policy\n  namespace: kb3-guidelines\nspec:\n  podSelector:\n    matchLabels:\n      app: kb3-guidelines\n  policyTypes:\n  - Ingress\n  - Egress\n  ingress:\n  - from:\n    - namespaceSelector:\n        matchLabels:\n          name: medication-service\n    - namespaceSelector:\n        matchLabels:\n          name: flow2-orchestrator\n    - namespaceSelector:\n        matchLabels:\n          name: safety-gateway\n    ports:\n    - protocol: TCP\n      port: 8084\n  egress:\n  - to:\n    - podSelector:\n        matchLabels:\n          app: kb3-postgres\n    ports:\n    - protocol: TCP\n      port: 5432\n  - to:\n    - podSelector:\n        matchLabels:\n          app: kb3-neo4j\n    ports:\n    - protocol: TCP\n      port: 7687\n  - to:\n    - podSelector:\n        matchLabels:\n          app: kb3-redis\n    ports:\n    - protocol: TCP\n      port: 6379\n  # Allow external API calls for validation\n  - to: []\n    ports:\n    - protocol: TCP\n      port: 443\n    - protocol: TCP\n      port: 80\n---\n# Pod Disruption Budget\napiVersion: policy/v1\nkind: PodDisruptionBudget\nmetadata:\n  name: kb3-pdb\n  namespace: kb3-guidelines\nspec:\n  minAvailable: 2\n  selector:\n    matchLabels:\n      app: kb3-guidelines\n---\n# Service Monitor for Prometheus\napiVersion: monitoring.coreos.com/v1\nkind: ServiceMonitor\nmetadata:\n  name: kb3-service-monitor\n  namespace: kb3-guidelines\n  labels:\n    app: kb3-guidelines\n    monitoring: enabled\nspec:\n  selector:\n    matchLabels:\n      app: kb3-guidelines\n  endpoints:\n  - port: metrics\n    path: /metrics\n    interval: 30s\n    scrapeTimeout: 10s\n    honorLabels: true\n  namespaceSelector:\n    matchNames:\n    - kb3-guidelines\n---\n# Prometheus Rules\napiVersion: monitoring.coreos.com/v1\nkind: PrometheusRule\nmetadata:\n  name: kb3-alerting-rules\n  namespace: kb3-guidelines\n  labels:\n    app: kb3-guidelines\n    monitoring: enabled\nspec:\n  groups:\n  - name: kb3.rules\n    rules:\n    # SLA monitoring\n    - alert: KB3HighLatency\n      expr: histogram_quantile(0.95, rate(guidelines_request_duration_seconds_bucket[5m])) > 0.05\n      for: 2m\n      labels:\n        severity: warning\n        service: kb3-guidelines\n      annotations:\n        summary: \"KB-3 high latency detected\"\n        description: \"P95 latency is {{ $value }}ms, exceeding 50ms threshold\"\n    \n    - alert: KB3HighErrorRate\n      expr: rate(guidelines_requests_total{status=~\"5..\"}[5m]) / rate(guidelines_requests_total[5m]) > 0.01\n      for: 1m\n      labels:\n        severity: critical\n        service: kb3-guidelines\n      annotations:\n        summary: \"KB-3 high error rate detected\"\n        description: \"Error rate is {{ $value | humanizePercentage }}, exceeding 1% threshold\"\n    \n    - alert: KB3CacheHitRateLow\n      expr: cache_hit_rate{layer=\"L1\"} < 0.85\n      for: 5m\n      labels:\n        severity: warning\n        service: kb3-guidelines\n      annotations:\n        summary: \"KB-3 L1 cache hit rate low\"\n        description: \"L1 cache hit rate is {{ $value | humanizePercentage }}, below 85% threshold\"\n    \n    # Clinical quality monitoring\n    - alert: KB3SafetyOverrideSpike\n      expr: increase(safety_overrides_applied_total[1h]) > 100\n      for: 0m\n      labels:\n        severity: critical\n        service: kb3-guidelines\n      annotations:\n        summary: \"KB-3 safety override spike detected\"\n        description: \"{{ $value }} safety overrides applied in the last hour\"\n    \n    - alert: KB3ConflictResolutionBacklog\n      expr: conflict_resolutions_pending > 10\n      for: 5m\n      labels:\n        severity: warning\n        service: kb3-guidelines\n      annotations:\n        summary: \"KB-3 conflict resolution backlog\"\n        description: \"{{ $value }} unresolved conflicts pending\"\n    \n    - alert: KB3GuidelineOutdated\n      expr: guideline_currency_rate < 0.80\n      for: 0m\n      labels:\n        severity: warning\n        service: kb3-guidelines\n      annotations:\n        summary: \"KB-3 guideline currency below threshold\"\n        description: \"Only {{ $value | humanizePercentage }} of guidelines are current\"\n    \n    # Infrastructure monitoring\n    - alert: KB3DatabaseConnection\n      expr: up{job=\"kb3-postgres\"} == 0\n      for: 1m\n      labels:\n        severity: critical\n        service: kb3-guidelines\n      annotations:\n        summary: \"KB-3 PostgreSQL database down\"\n        description: \"PostgreSQL database is unreachable\"\n    \n    - alert: KB3Neo4jConnection\n      expr: up{job=\"kb3-neo4j\"} == 0\n      for: 1m\n      labels:\n        severity: major\n        service: kb3-guidelines\n      annotations:\n        summary: \"KB-3 Neo4j database down\"\n        description: \"Neo4j graph database is unreachable - operating in degraded mode\"\n    \n    - alert: KB3RedisConnection\n      expr: up{job=\"kb3-redis\"} == 0\n      for: 30s\n      labels:\n        severity: warning\n        service: kb3-guidelines\n      annotations:\n        summary: \"KB-3 Redis cache down\"\n        description: \"Redis cache is unreachable - cache performance degraded\"\n---\n# Ingress Controller\napiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: kb3-ingress\n  namespace: kb3-guidelines\n  annotations:\n    kubernetes.io/ingress.class: \"nginx\"\n    nginx.ingress.kubernetes.io/ssl-redirect: \"true\"\n    nginx.ingress.kubernetes.io/force-ssl-redirect: \"true\"\n    nginx.ingress.kubernetes.io/backend-protocol: \"HTTP\"\n    nginx.ingress.kubernetes.io/rate-limit: \"1000\"\n    nginx.ingress.kubernetes.io/rate-limit-window: \"1m\"\n    cert-manager.io/cluster-issuer: \"letsencrypt-prod\"\nspec:\n  tls:\n  - hosts:\n    - kb3-guidelines.clinical-platform.health\n    secretName: kb3-tls-secret\n  rules:\n  - host: kb3-guidelines.clinical-platform.health\n    http:\n      paths:\n      - path: /\n        pathType: Prefix\n        backend:\n          service:\n            name: kb3-service\n            port:\n              number: 8084\n---\n# RBAC Configuration\napiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: kb3-service-account\n  namespace: kb3-guidelines\n---\napiVersion: rbac.authorization.k8s.io/v1\nkind: Role\nmetadata:\n  name: kb3-role\n  namespace: kb3-guidelines\nrules:\n- apiGroups: [\"\"]\n  resources: [\"configmaps\", \"secrets\"]\n  verbs: [\"get\", \"list\"]\n- apiGroups: [\"\"]\n  resources: [\"pods\"]\n  verbs: [\"get\", \"list\", \"watch\"]\n---\napiVersion: rbac.authorization.k8s.io/v1\nkind: RoleBinding\nmetadata:\n  name: kb3-role-binding\n  namespace: kb3-guidelines\nsubjects:\n- kind: ServiceAccount\n  name: kb3-service-account\n  namespace: kb3-guidelines\nroleRef:\n  kind: Role\n  name: kb3-role\n  apiGroup: rbac.authorization.k8s.io