# KB-3 GraphQL Schema for Advanced Clinical Guideline Queries\n# Comprehensive schema supporting complex clinical pathways and evidence synthesis\n\nscalar DateTime\nscalar JSON\n\n# =============================================================================\n# ROOT QUERY TYPE\n# =============================================================================\n\ntype Query {\n  \"\"\"Get clinical pathway with conflict resolution and safety overrides\"\"\"\n  getClinicalPathway(\n    conditions: [String!]!\n    contraindications: [String!]\n    region: Region!\n    patientFactors: PatientFactorsInput\n  ): ClinicalPathway!\n  \n  \"\"\"Compare multiple guidelines for conflicts and harmonization\"\"\"\n  compareGuidelines(\n    guideline_ids: [String!]!\n    domain: String\n    region: Region\n  ): GuidelineComparison!\n  \n  \"\"\"Synthesize evidence across multiple guidelines and studies\"\"\"\n  synthesizeEvidence(\n    condition: String!\n    intervention: String!\n    outcome: String!\n    region: Region\n    evidence_grade_filter: [EvidenceGrade!]\n  ): EvidenceSynthesis!\n  \n  \"\"\"Get detailed guideline information with relationships\"\"\"\n  getGuideline(\n    guideline_id: String!\n    include_superseded: Boolean = false\n  ): Guideline\n  \n  \"\"\"Search guidelines by multiple criteria\"\"\"\n  searchGuidelines(\n    query: GuidelineSearchInput!\n    pagination: PaginationInput\n  ): GuidelineSearchResult!\n  \n  \"\"\"Get conflict resolution history and patterns\"\"\"\n  getConflictResolutions(\n    filters: ConflictFiltersInput\n    timeframe: String = \"30d\"\n  ): ConflictResolutionResult!\n  \n  \"\"\"Get safety override applications and statistics\"\"\"\n  getSafetyOverrides(\n    active_only: Boolean = true\n    include_statistics: Boolean = false\n  ): SafetyOverrideResult!\n  \n  \"\"\"Get version history and change tracking\"\"\"\n  getVersionHistory(\n    guideline_id: String!\n    include_pending: Boolean = false\n  ): VersionHistoryResult!\n  \n  \"\"\"Get cross-KB linkage validation status\"\"\"\n  getKBLinkages(\n    source_guideline: String\n    target_kb: String\n    validation_status: ValidationStatus\n  ): KBLinkageResult!\n  \n  \"\"\"Get clinical quality metrics and dashboard data\"\"\"\n  getClinicalMetrics(\n    timeframe: String = \"7d\"\n    metric_types: [MetricType!]\n  ): ClinicalMetricsResult!\n}\n\n# =============================================================================\n# MUTATION TYPE\n# =============================================================================\n\ntype Mutation {\n  \"\"\"Create new guideline version with change tracking\"\"\"\n  createGuidelineVersion(\n    guideline_id: String!\n    changes: [ChangeRecordInput!]!\n    change_type: ChangeType!\n  ): VersionCreationResult!\n  \n  \"\"\"Process approval for pending guideline version\"\"\"\n  processApproval(\n    version_id: String!\n    approval_status: ApprovalStatus!\n    comments: String\n    conditions: [String!]\n  ): ApprovalResult!\n  \n  \"\"\"Add or update safety override\"\"\"\n  manageSafetyOverride(\n    override_data: SafetyOverrideInput!\n    action: OverrideAction!\n  ): SafetyOverrideResult!\n  \n  \"\"\"Validate cross-KB linkages\"\"\"\n  validateKBLinkages(\n    linkage_ids: [String!]\n    force_revalidation: Boolean = false\n  ): LinkageValidationResult!\n  \n  \"\"\"Report and resolve guideline conflicts\"\"\"\n  resolveConflict(\n    conflict_id: String!\n    resolution_data: ConflictResolutionInput!\n  ): ConflictResolutionResult!\n}\n\n# =============================================================================\n# SUBSCRIPTION TYPE\n# =============================================================================\n\ntype Subscription {\n  \"\"\"Real-time safety override applications\"\"\"\n  safetyOverrideApplied(\n    priority: Int\n    conditions: [String!]\n  ): SafetyOverrideEvent!\n  \n  \"\"\"Guideline version updates and approvals\"\"\"\n  guidelineVersionUpdates(\n    guideline_ids: [String!]\n  ): VersionUpdateEvent!\n  \n  \"\"\"Conflict resolution events\"\"\"\n  conflictResolutionEvents: ConflictResolutionEvent!\n  \n  \"\"\"Clinical quality metric updates\"\"\"\n  clinicalMetricUpdates(\n    metric_types: [MetricType!]\n  ): MetricUpdateEvent!\n}\n\n# =============================================================================\n# CORE TYPES\n# =============================================================================\n\ntype Guideline {\n  guideline_id: String!\n  organization: String!\n  title: String!\n  region: Region!\n  version: String!\n  condition_primary: String!\n  icd10_codes: [String!]!\n  effective_date: DateTime!\n  superseded_date: DateTime\n  supersedes: String\n  status: GuidelineStatus!\n  approval_status: ApprovalStatus!\n  \n  # Content\n  recommendations: [Recommendation!]!\n  evidence_summary: EvidenceSummary!\n  quality_metrics: QualityMetrics!\n  \n  # Relationships\n  conflicts: [ConflictRelationship!]!\n  safety_overrides: [SafetyOverride!]!\n  kb_linkages: [KBLinkage!]!\n  version_history: [GuidelineVersion!]!\n  \n  # Metadata\n  digital_signature: String\n  created_at: DateTime!\n  updated_at: DateTime!\n  created_by: String\n  approved_by: String\n}\n\ntype Recommendation {\n  rec_id: String!\n  statement: String!\n  domain: RecommendationDomain!\n  evidence: Evidence!\n  population_criteria: PopulationCriteria\n  safety_considerations: [SafetyConsideration!]!\n  linked_kb_refs: KBReferences\n  conflict_resolution: ConflictResolution\n  \n  # Computed fields\n  applicable_overrides: [SafetyOverride!]!\n  alternative_recommendations: [Recommendation!]!\n  quality_score: Int!\n}\n\ntype Evidence {\n  grade: EvidenceGrade!\n  quality_score: Int!\n  supporting_studies: [Study!]!\n  grade_rationale: String\n  limitations: [String!]!\n  publication_span: PublicationSpan\n}\n\ntype Study {\n  study_type: StudyType!\n  sample_size: Int!\n  pmid: String\n  quality_assessment: String\n  publication_year: Int\n  primary_outcome: String\n  statistical_significance: Boolean\n}\n\ntype ClinicalPathway {\n  pathway_id: String!\n  primary_guideline: Guideline!\n  recommendations: [PrioritizedRecommendation!]!\n  decision_points: [DecisionPoint!]!\n  conflicts_resolved: [ConflictResolution!]!\n  safety_overrides_applied: [AppliedOverride!]!\n  monitoring_requirements: [MonitoringRequirement!]!\n  alternative_pathways: [AlternativePathway!]!\n  \n  # Quality metrics\n  confidence_score: Int!\n  evidence_strength: EvidenceStrength!\n  clinical_complexity: ComplexityLevel!\n}\n\ntype PrioritizedRecommendation {\n  recommendation: Recommendation!\n  priority: Int!\n  rationale: String!\n  alternatives: [Recommendation!]!\n  confidence_score: Int!\n  applicable_population: String\n  monitoring_required: Boolean!\n  contraindications: [String!]!\n}\n\ntype DecisionPoint {\n  decision_id: String!\n  question: String!\n  options: [PathwayOption!]!\n  default_choice: String!\n  clinical_context: String\n  evidence_support: EvidenceStrength!\n  risk_benefit_analysis: RiskBenefitAnalysis\n}\n\ntype PathwayOption {\n  option_id: String!\n  description: String!\n  recommendations: [Recommendation!]!\n  prerequisites: [String!]!\n  contraindications: [String!]!\n  monitoring_requirements: [String!]!\n  expected_outcomes: [String!]!\n}\n\n# =============================================================================\n# COMPARISON AND ANALYSIS TYPES\n# =============================================================================\n\ntype GuidelineComparison {\n  comparison_id: String!\n  guidelines: [Guideline!]!\n  domain: String\n  \n  # Conflict analysis\n  conflicts: [GuidelineConflict!]!\n  harmonized_recommendations: [HarmonizedRecommendation!]!\n  \n  # Evidence comparison\n  evidence_comparison: EvidenceComparison!\n  quality_assessment: QualityComparison!\n  \n  # Regional differences\n  regional_variations: [RegionalVariation!]!\n  \n  # Summary\n  consensus_areas: [String!]!\n  divergent_areas: [String!]!\n  overall_agreement: Int! # 0-100 percentage\n}\n\ntype GuidelineConflict {\n  conflict_id: String!\n  conflict_type: ConflictType!\n  severity: ConflictSeverity!\n  description: String!\n  affected_recommendations: [Recommendation!]!\n  resolution_strategy: String\n  resolution_confidence: Int!\n  clinical_impact: ImpactLevel!\n}\n\ntype HarmonizedRecommendation {\n  harmonized_id: String!\n  primary_recommendation: Recommendation!\n  contributing_guidelines: [Guideline!]!\n  harmonization_rationale: String!\n  confidence_level: Int!\n  areas_of_agreement: [String!]!\n  remaining_uncertainties: [String!]!\n}\n\ntype EvidenceSynthesis {\n  synthesis_id: String!\n  condition: String!\n  intervention: String!\n  outcome: String!\n  \n  # Evidence aggregation\n  total_studies: Int!\n  study_breakdown: StudyBreakdown!\n  overall_quality: EvidenceStrength!\n  \n  # Findings\n  synthesized_findings: [SynthesizedFinding!]!\n  strength_of_recommendation: EvidenceGrade!\n  certainty_of_evidence: CertaintyLevel!\n  \n  # Meta-analysis\n  effect_estimates: [EffectEstimate!]!\n  heterogeneity_assessment: HeterogeneityAssessment\n  \n  # Clinical applicability\n  population_applicability: PopulationApplicability!\n  clinical_significance: ClinicalSignificance!\n  implementation_considerations: [String!]!\n}\n\n# =============================================================================\n# SAFETY AND OVERRIDE TYPES\n# =============================================================================\n\ntype SafetyOverride {\n  override_id: String!\n  priority: Int!\n  condition: String!\n  description: String!\n  trigger_conditions: TriggerConditions!\n  override_action: OverrideAction!\n  affected_guidelines: [String!]!\n  requires_audit: Boolean!\n  active: Boolean!\n  \n  # Statistics\n  application_count: Int!\n  last_applied: DateTime\n  emergency_activations: Int!\n  \n  # Governance\n  created_at: DateTime!\n  approved_by: String!\n  last_reviewed: DateTime\n  next_review_date: DateTime\n}\n\ntype AppliedOverride {\n  application_id: String!\n  override: SafetyOverride!\n  conditions_matched: [String!]!\n  action_taken: JSON!\n  rationale: String!\n  requires_immediate_action: Boolean!\n  emergency_protocol_activated: Boolean!\n  notifications_sent: [String!]!\n  clinical_outcome: String\n}\n\ntype TriggerConditions {\n  lab_thresholds: JSON\n  conditions: [String!]\n  medications: [String!]\n  allergies: [String!]\n  age_criteria: AgeRange\n  special_populations: [String!]\n}\n\n# =============================================================================\n# VERSIONING AND CHANGE MANAGEMENT TYPES\n# =============================================================================\n\ntype GuidelineVersion {\n  version_id: String!\n  guideline_id: String!\n  version: String!\n  change_type: ChangeType!\n  changes: [ChangeRecord!]!\n  clinical_impact: ClinicalImpact!\n  approval_chain: [ApprovalRecord!]!\n  transition_plan: TransitionPlan!\n  status: VersionStatus!\n  created_at: DateTime!\n  effective_date: DateTime\n}\n\ntype ChangeRecord {\n  change_id: String!\n  field: String!\n  old_value: JSON\n  new_value: JSON!\n  change_reason: String!\n  evidence_reference: String\n  clinical_justification: String!\n  risk_assessment: RiskLevel!\n}\n\ntype ClinicalImpact {\n  score: Int! # 0-100\n  level: ImpactLevel!\n  affected_domains: [String!]!\n  affected_populations: [String!]!\n  safety_implications: [String!]!\n  monitoring_changes: [String!]!\n  training_required: Boolean!\n  notification_required: Boolean!\n}\n\ntype TransitionPlan {\n  transition_id: String!\n  old_version: String!\n  new_version: String!\n  transition_period_days: Int!\n  parallel_run: Boolean!\n  auto_migration: Boolean!\n  notification_strategy: NotificationStrategy!\n  rollback_plan: RollbackPlan!\n  validation_checkpoints: [ValidationCheckpoint!]!\n}\n\n# =============================================================================\n# SEARCH AND FILTERING TYPES\n# =============================================================================\n\ntype GuidelineSearchResult {\n  total_count: Int!\n  guidelines: [Guideline!]!\n  facets: SearchFacets!\n  suggestions: [String!]!\n  pagination: PaginationInfo!\n}\n\ntype SearchFacets {\n  organizations: [FacetValue!]!\n  regions: [FacetValue!]!\n  conditions: [FacetValue!]!\n  evidence_grades: [FacetValue!]!\n  publication_years: [FacetValue!]!\n}\n\ntype FacetValue {\n  value: String!\n  count: Int!\n  selected: Boolean!\n}\n\n# =============================================================================\n# METRICS AND MONITORING TYPES\n# =============================================================================\n\ntype ClinicalMetricsResult {\n  timeframe: String!\n  metrics: [ClinicalMetric!]!\n  trends: [MetricTrend!]!\n  alerts: [QualityAlert!]!\n  summary: MetricsSummary!\n}\n\ntype ClinicalMetric {\n  metric_name: String!\n  metric_value: Float!\n  metric_unit: String\n  timestamp: DateTime!\n  target_value: Float\n  variance_from_target: Float\n  trend_direction: TrendDirection!\n  significance_level: SignificanceLevel!\n}\n\ntype QualityAlert {\n  alert_id: String!\n  alert_type: AlertType!\n  severity: AlertSeverity!\n  message: String!\n  affected_guidelines: [String!]!\n  resolution_required: Boolean!\n  escalation_level: Int!\n  created_at: DateTime!\n}\n\n# =============================================================================\n# INPUT TYPES\n# =============================================================================\n\ninput PatientFactorsInput {\n  age: Int\n  gender: Gender\n  conditions: [String!]!\n  medications: [String!]\n  allergies: [String!]\n  labs: JSON\n  pregnancy_status: Boolean\n  special_populations: [String!]\n}\n\ninput GuidelineSearchInput {\n  query: String\n  conditions: [String!]\n  organizations: [String!]\n  regions: [Region!]\n  evidence_grades: [EvidenceGrade!]\n  publication_date_range: DateRangeInput\n  status: [GuidelineStatus!]\n  domains: [RecommendationDomain!]\n}\n\ninput ConflictFiltersInput {\n  conflict_types: [ConflictType!]\n  severities: [ConflictSeverity!]\n  guideline_ids: [String!]\n  resolution_status: [ResolutionStatus!]\n  date_range: DateRangeInput\n}\n\ninput ChangeRecordInput {\n  field: String!\n  old_value: JSON\n  new_value: JSON!\n  change_reason: String!\n  evidence_reference: String\n  clinical_justification: String!\n  risk_assessment: RiskLevel!\n}\n\ninput SafetyOverrideInput {\n  override_id: String!\n  priority: Int!\n  condition: String!\n  description: String!\n  trigger_conditions: JSON!\n  override_action: JSON!\n  affected_guidelines: [String!]!\n  requires_audit: Boolean!\n}\n\ninput ConflictResolutionInput {\n  resolution_rule: String!\n  winning_guideline: String\n  rationale: String!\n  patient_context: JSON\n  manual_override: Boolean\n  reviewer_comments: String\n}\n\ninput PaginationInput {\n  offset: Int = 0\n  limit: Int = 20\n  sort_by: String\n  sort_direction: SortDirection = ASC\n}\n\ninput DateRangeInput {\n  start_date: DateTime!\n  end_date: DateTime!\n}\n\n# =============================================================================\n# ENUMS\n# =============================================================================\n\nenum Region {\n  US\n  EU\n  UK\n  AU\n  CA\n  Global\n  WHO\n}\n\nenum EvidenceGrade {\n  A\n  B\n  C\n  D\n  EXPERT_OPINION\n}\n\nenum StudyType {\n  RCT\n  META_ANALYSIS\n  COHORT\n  CASE_CONTROL\n  CASE_SERIES\n  SYSTEMATIC_REVIEW\n}\n\nenum RecommendationDomain {\n  DIAGNOSIS\n  TREATMENT\n  MONITORING\n  PREVENTION\n  PROGNOSIS\n  RISK_ASSESSMENT\n}\n\nenum GuidelineStatus {\n  DRAFT\n  PENDING\n  ACTIVE\n  SUPERSEDED\n  WITHDRAWN\n}\n\nenum ApprovalStatus {\n  PENDING\n  APPROVED\n  REJECTED\n  CONDITIONAL\n}\n\nenum ChangeType {\n  MAJOR\n  MINOR\n  PATCH\n  EMERGENCY\n  SECURITY\n}\n\nenum ImpactLevel {\n  CRITICAL\n  MAJOR\n  MINOR\n  COSMETIC\n}\n\nenum RiskLevel {\n  HIGH\n  MEDIUM\n  LOW\n}\n\nenum VersionStatus {\n  DRAFT\n  PENDING_APPROVAL\n  APPROVED\n  DEPLOYED\n  SUPERSEDED\n  WITHDRAWN\n}\n\nenum ConflictType {\n  DIRECT_CONTRADICTION\n  EVIDENCE_DISAGREEMENT\n  POPULATION_OVERLAP\n  TARGET_DIFFERENCE\n}\n\nenum ConflictSeverity {\n  CRITICAL\n  MAJOR\n  MINOR\n}\n\nenum ResolutionStatus {\n  PENDING\n  RESOLVED\n  ESCALATED\n}\n\nenum EvidenceStrength {\n  VERY_HIGH\n  HIGH\n  MODERATE\n  LOW\n  VERY_LOW\n}\n\nenum ComplexityLevel {\n  SIMPLE\n  MODERATE\n  COMPLEX\n  VERY_COMPLEX\n}\n\nenum CertaintyLevel {\n  VERY_CERTAIN\n  MODERATELY_CERTAIN\n  UNCERTAIN\n  VERY_UNCERTAIN\n}\n\nenum ValidationStatus {\n  PENDING\n  VALID\n  INVALID\n  BROKEN\n  DEPRECATED\n}\n\nenum MetricType {\n  GUIDELINE_CURRENCY\n  EVIDENCE_QUALITY\n  CONFLICT_RESOLUTION\n  SAFETY_OVERRIDES\n  CROSS_KB_VALIDATION\n  PERFORMANCE\n  USAGE\n}\n\nenum TrendDirection {\n  UP\n  DOWN\n  STABLE\n  VOLATILE\n}\n\nenum SignificanceLevel {\n  HIGHLY_SIGNIFICANT\n  SIGNIFICANT\n  MODERATELY_SIGNIFICANT\n  NOT_SIGNIFICANT\n}\n\nenum AlertType {\n  QUALITY_DEGRADATION\n  PERFORMANCE_ISSUE\n  SAFETY_CONCERN\n  VALIDATION_FAILURE\n  COMPLIANCE_VIOLATION\n}\n\nenum AlertSeverity {\n  CRITICAL\n  HIGH\n  MEDIUM\n  LOW\n  INFO\n}\n\nenum Gender {\n  MALE\n  FEMALE\n  OTHER\n  UNKNOWN\n}\n\nenum SortDirection {\n  ASC\n  DESC\n}\n\n# =============================================================================\n# ADDITIONAL SUPPORTING TYPES\n# =============================================================================\n\ntype PopulationCriteria {\n  age_range: AgeRange\n  conditions: [String!]!\n  exclusion_criteria: [String!]!\n  special_populations: [String!]!\n}\n\ntype AgeRange {\n  min_age: Int\n  max_age: Int\n}\n\ntype SafetyConsideration {\n  consideration: String!\n  severity: ConflictSeverity!\n  monitoring_required: Boolean!\n}\n\ntype KBReferences {\n  kb1_dosing: [String!]\n  kb2_interactions: [String!]\n  kb4_monitoring: [String!]\n}\n\ntype ConflictResolution {\n  conflicts_with: [ConflictReference!]!\n  harmonization_notes: String\n}\n\ntype ConflictReference {\n  guideline_id: String!\n  rec_id: String!\n  conflict_type: ConflictType!\n  resolution_strategy: String!\n}\n\ntype EvidenceSummary {\n  total_studies: Int!\n  rct_count: Int!\n  meta_analysis_count: Int!\n  overall_quality: EvidenceStrength!\n  publication_span: PublicationSpan!\n}\n\ntype PublicationSpan {\n  earliest_year: Int!\n  latest_year: Int!\n}\n\ntype QualityMetrics {\n  currency_score: Int!\n  evidence_strength_score: Int!\n  completeness_score: Int!\n  consistency_score: Int!\n  overall_quality_score: Int!\n}\n\n# Additional types for comprehensive coverage\ntype StudyBreakdown {\n  rct_count: Int!\n  meta_analysis_count: Int!\n  cohort_count: Int!\n  case_control_count: Int!\n  case_series_count: Int!\n}\n\ntype SynthesizedFinding {\n  finding_id: String!\n  description: String!\n  evidence_level: EvidenceGrade!\n  consistency_across_studies: Boolean!\n  clinical_relevance: String!\n  statistical_significance: Boolean\n}\n\ntype EffectEstimate {\n  outcome: String!\n  effect_size: Float!\n  confidence_interval: ConfidenceInterval!\n  p_value: Float\n  clinical_significance: String!\n}\n\ntype ConfidenceInterval {\n  lower_bound: Float!\n  upper_bound: Float!\n  confidence_level: Int!\n}\n\ntype HeterogeneityAssessment {\n  i_squared: Float!\n  tau_squared: Float\n  chi_squared_p_value: Float\n  assessment: String!\n}\n\ntype PopulationApplicability {\n  target_population: String!\n  generalizability_score: Int!\n  population_restrictions: [String!]!\n  external_validity: String!\n}\n\ntype ClinicalSignificance {\n  significance_level: SignificanceLevel!\n  minimal_clinically_important_difference: Float\n  number_needed_to_treat: Int\n  clinical_impact_description: String!\n}\n\ntype RiskBenefitAnalysis {\n  benefits: [String!]!\n  risks: [String!]!\n  net_clinical_benefit: String!\n  recommendation_strength: EvidenceStrength!\n}\n\ntype RegionalVariation {\n  region: Region!\n  specific_recommendations: [Recommendation!]!\n  variation_rationale: String!\n  cultural_considerations: [String!]!\n}\n\ntype EvidenceComparison {\n  overlapping_studies: [Study!]!\n  unique_studies_per_guideline: JSON!\n  evidence_quality_comparison: JSON!\n  methodology_differences: [String!]!\n}\n\ntype QualityComparison {\n  overall_quality_scores: JSON!\n  evidence_grade_distribution: JSON!\n  methodology_assessment: JSON!\n  bias_assessment: JSON!\n}\n\ntype AlternativePathway {\n  pathway_id: String!\n  description: String!\n  conditions: [String!]!\n  recommendations: [PrioritizedRecommendation!]!\n  rationale: String!\n}\n\ntype MonitoringRequirement {\n  parameter: String!\n  frequency: String!\n  target_range: String\n  alert_thresholds: JSON\n  clinical_significance: String!\n}\n\ntype ConflictRelationship {\n  conflict_with: String!\n  conflict_type: ConflictType!\n  resolution_status: ResolutionStatus!\n  resolution_rationale: String\n}\n\ntype KBLinkage {\n  linkage_id: String!\n  target_kb: String!\n  target_id: String!\n  link_type: String!\n  validation_status: ValidationStatus!\n  last_validated: DateTime\n}\n\ntype ApprovalRecord {\n  approver_role: String!\n  approver_id: String!\n  approval_status: ApprovalStatus!\n  approval_date: DateTime\n  comments: String\n  conditions: [String!]\n}\n\ntype NotificationStrategy {\n  target_audiences: [String!]!\n  notification_channels: [String!]!\n  advance_notice_days: Int!\n  reminder_schedule: [String!]!\n}\n\ntype RollbackPlan {\n  rollback_triggers: [String!]!\n  rollback_procedure: [String!]!\n  data_preservation: Boolean!\n  notification_required: Boolean!\n  approval_required: Boolean!\n}\n\ntype ValidationCheckpoint {\n  checkpoint_name: String!\n  validation_criteria: [String!]!\n  success_threshold: Int!\n  failure_action: String!\n}\n\ntype PaginationInfo {\n  total_count: Int!\n  offset: Int!\n  limit: Int!\n  has_next_page: Boolean!\n  has_previous_page: Boolean!\n}\n\ntype MetricTrend {\n  metric_name: String!\n  trend_direction: TrendDirection!\n  change_percentage: Float!\n  period_comparison: String!\n}\n\ntype MetricsSummary {\n  total_guidelines: Int!\n  active_guidelines: Int!\n  pending_approvals: Int!\n  active_overrides: Int!\n  recent_conflicts: Int!\n  overall_health_score: Int!\n}\n\n# =============================================================================\n# RESULT TYPES\n# =============================================================================\n\ntype VersionCreationResult {\n  success: Boolean!\n  version: GuidelineVersion\n  errors: [String!]!\n  approval_workflow_id: String\n}\n\ntype ApprovalResult {\n  success: Boolean!\n  approved: Boolean!\n  next_approver: String\n  completed: Boolean!\n  errors: [String!]!\n}\n\ntype SafetyOverrideResult {\n  overrides: [SafetyOverride!]!\n  statistics: SafetyOverrideStatistics\n  recent_applications: [AppliedOverride!]!\n}\n\ntype SafetyOverrideStatistics {\n  total_active: Int!\n  applications_24h: Int!\n  emergency_activations_24h: Int!\n  most_frequent_override: String!\n}\n\ntype ConflictResolutionResult {\n  resolutions: [ConflictResolution!]!\n  statistics: ConflictStatistics!\n  pending_conflicts: [GuidelineConflict!]!\n}\n\ntype ConflictStatistics {\n  total_conflicts: Int!\n  resolved_conflicts: Int!\n  resolution_rate: Float!\n  average_resolution_time: Float!\n  most_common_conflict_type: ConflictType!\n}\n\ntype VersionHistoryResult {\n  versions: [GuidelineVersion!]!\n  current_version: String!\n  pending_versions: [GuidelineVersion!]!\n  transition_timeline: [VersionTransition!]!\n}\n\ntype VersionTransition {\n  from_version: String!\n  to_version: String!\n  transition_date: DateTime!\n  change_summary: String!\n  impact_level: ImpactLevel!\n}\n\ntype KBLinkageResult {\n  linkages: [KBLinkage!]!\n  validation_summary: ValidationSummary!\n  broken_links: [KBLinkage!]!\n}\n\ntype ValidationSummary {\n  total_links: Int!\n  valid_links: Int!\n  broken_links: Int!\n  pending_validation: Int!\n  validation_rate: Float!\n}\n\ntype LinkageValidationResult {\n  validated_count: Int!\n  validation_results: [ValidationResult!]!\n  errors: [String!]!\n}\n\ntype ValidationResult {\n  linkage_id: String!\n  validation_status: ValidationStatus!\n  validation_errors: [String!]!\n  last_validated: DateTime!\n}\n\n# =============================================================================\n# EVENT TYPES FOR SUBSCRIPTIONS\n# =============================================================================\n\ntype SafetyOverrideEvent {\n  event_id: String!\n  override: SafetyOverride!\n  application: AppliedOverride!\n  timestamp: DateTime!\n  requires_attention: Boolean!\n}\n\ntype VersionUpdateEvent {\n  event_id: String!\n  guideline_id: String!\n  version_update: GuidelineVersion!\n  update_type: String!\n  timestamp: DateTime!\n}\n\ntype ConflictResolutionEvent {\n  event_id: String!\n  conflict: GuidelineConflict!\n  resolution: ConflictResolution\n  event_type: String!\n  timestamp: DateTime!\n}\n\ntype MetricUpdateEvent {\n  event_id: String!\n  metric: ClinicalMetric!\n  alert: QualityAlert\n  timestamp: DateTime!\n}