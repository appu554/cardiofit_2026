# KB-3 Conflict Resolution Schema

conflict_resolution:
  conflict_types:
    - type: "direct_contradiction"
      severity: "critical"
      description: "Guidelines provide opposite recommendations for same scenario"
      example: "ACC/AHA: BP target <130/80 vs ESC: BP target <140/90"
      
    - type: "evidence_disagreement"
      severity: "major"
      description: "Same evidence graded differently by organizations"
      example: "Grade A evidence in US guidelines vs Grade B in EU guidelines"
      
    - type: "population_overlap"
      severity: "minor"
      description: "Different population criteria for similar recommendations"
      example: "Different age cutoffs for elderly population (65 vs 70)"
      
    - type: "target_difference"
      severity: "major"
      description: "Different therapeutic targets for same condition"
      example: "HbA1c target <7% vs <6.5% for diabetes"

  resolution_rules:
    - rule_id: "safety_first"
      priority: 1
      logic: "Safety override always takes precedence"
      examples:
        - "SAFETY-001: Hyperkalemia contraindication"
        - "SAFETY-002: Pregnancy teratogenic risk"
    
    - rule_id: "regional_preference"
      priority: 2
      logic: "Prefer guidelines from patient's region"
      examples:
        - "US patient → ACC/AHA guidelines"
        - "EU patient → ESC guidelines"
        - "Unspecified region → WHO guidelines"
      
    - rule_id: "evidence_strength"
      priority: 3
      logic: "Higher evidence grade wins (A > B > C > D > Expert Opinion)"
      examples:
        - "Grade A RCT evidence > Grade C cohort study"
        - "Meta-analysis > single RCT"
    
    - rule_id: "publication_recency"
      priority: 4
      logic: "More recent publication date wins (within 5 years)"
      examples:
        - "2024 guideline > 2019 guideline"
        - "Exception: Major evidence changes reset priority"
      
    - rule_id: "conservative_safety"
      priority: 5
      logic: "When safety concern exists, choose conservative option"
      examples:
        - "Lower blood pressure target when stroke risk"
        - "More frequent monitoring when kidney disease"

  resolution_metadata:
    audit_required: true
    digital_signature: true
    clinical_review: true
    appeal_process: true
    
  resolution_documentation:
    rationale_required: true
    evidence_citation: true
    alternative_options: true
    monitoring_requirements: true