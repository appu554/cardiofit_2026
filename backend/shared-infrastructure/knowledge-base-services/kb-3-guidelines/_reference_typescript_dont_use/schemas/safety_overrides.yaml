# KB-3 Safety Override Configuration

safety_overrides:
  # Critical safety overrides that supersede all guidelines
  
  - override_id: "SAFETY-001"
    priority: 1
    condition: "hyperkalemia"
    description: "Critical hyperkalemia contraindication for RAAS inhibitors"
    override_rule: "Stop ACE inhibitors, ARBs, and aldosterone antagonists regardless of guideline"
    trigger_conditions:
      lab_thresholds:
        potassium:
          operator: ">"
          value: 6.0
          unit: "mmol/L"
      conditions:
        - "acute_kidney_injury"
        - "hyperkalemic_periodic_paralysis"
    override_action:
      action_type: "contraindicate"
      description: "Immediately discontinue RAAS inhibitors"
      alternatives:
        - "calcium_channel_blockers"
        - "beta_blockers"
        - "diuretics_thiazide"
      monitoring_requirements:
        - "daily_potassium_monitoring"
        - "renal_function_q24h"
    affected_guidelines:
      - "ACC-AHA-HTN-2017"
      - "KDIGO-CKD-2024"
      - "ESC-HF-2021"
    requires_audit: true
    
  - override_id: "SAFETY-002"
    priority: 1
    condition: "pregnancy"
    description: "Teratogenic medication contraindication in pregnancy"
    override_rule: "Contraindicate ACE inhibitors, ARBs, and direct renin inhibitors"
    trigger_conditions:
      conditions:
        - "pregnancy_confirmed"
        - "pregnancy_suspected"
        - "breastfeeding"
    override_action:
      action_type: "contraindicate"
      description: "Avoid teratogenic antihypertensive medications"
      alternatives:
        - "methyldopa"
        - "labetalol"
        - "nifedipine_immediate_release"
      monitoring_requirements:
        - "fetal_monitoring"
        - "maternal_bp_daily"
    affected_guidelines:
      - "ACC-AHA-HTN-2017"
      - "ESC-HTN-2023"
    requires_audit: true
    
  - override_id: "SAFETY-003"
    priority: 2
    condition: "severe_renal_impairment"
    description: "Severe CKD dose adjustment requirements"
    override_rule: "Mandatory dose reduction or contraindication for eGFR <30"
    trigger_conditions:
      lab_thresholds:
        egfr:
          operator: "<"
          value: 30
          unit: "mL/min/1.73m2"
      conditions:
        - "ckd_stage_4"
        - "ckd_stage_5"
        - "dialysis"
    override_action:
      action_type: "modify_dose"
      description: "Reduce dose by 50% or contraindicate if eGFR <15"
      alternatives:
        - "renal_replacement_therapy"
        - "conservative_management"
      monitoring_requirements:
        - "weekly_renal_function"
        - "electrolyte_monitoring"
    affected_guidelines:
      - "KDIGO-CKD-2024"
      - "ACC-AHA-HTN-2017"
    requires_audit: true
    
  - override_id: "SAFETY-004"
    priority: 3
    condition: "drug_allergy"
    description: "Known drug allergy contraindication"
    override_rule: "Contraindicate medication class if documented allergy"
    trigger_conditions:
      allergies:
        documented_allergies:
          - "ace_inhibitors"
          - "angioedema_history"
          - "sulfonamide_allergy"
    override_action:
      action_type: "contraindicate"
      description: "Avoid entire medication class"
      alternatives:
        - "alternative_class_medications"
      monitoring_requirements:
        - "allergy_monitoring"
    affected_guidelines:
      - "ALL_GUIDELINES"
    requires_audit: true

override_processing:
  evaluation_order: "priority_ascending"  # Process priority 1 first
  conflict_resolution: "highest_priority_wins"
  audit_logging: "all_overrides"
  clinical_notification: "critical_overrides_only"
  
override_metadata:
  version: "1.0.0"
  last_updated: "2025-09-01"
  clinical_validation: "required"
  legal_review: "completed"
  effective_date: "2025-09-01"