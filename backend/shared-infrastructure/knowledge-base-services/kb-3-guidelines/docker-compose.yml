services:
  # KB-3 Guidelines Service
  kb3-guidelines:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb3-guidelines
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - DATABASE_URL=postgres://postgres:password@postgres:5432/kb3_guidelines?sslmode=disable
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kb3-network
      - kb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: kb3-postgres
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=kb3_guidelines
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - kb3-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5-community
    container_name: kb3-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - kb3-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: kb3-redis
    ports:
      - "6383:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - kb3-network
    restart: unless-stopped

  # Adminer (Database Management UI)
  adminer:
    image: adminer:4
    container_name: kb3-adminer
    ports:
      - "8085:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - kb3-network
    depends_on:
      - postgres
    restart: unless-stopped

networks:
  kb3-network:
    driver: bridge
  kb-network:
    external: true
    name: kb-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
