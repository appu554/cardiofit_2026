    drugName: "Losartan"
    genericName: "Losartan Potassium"
    brandNames: ["Cozaar"]
    atcCode: "C09CA01"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Use of drugs that act on the renin-angiotensin system during the second and third trimesters of pregnancy reduces fetal renal function and increases fetal and neonatal morbidity and death."
    teratogenicEffects:
      - category: "Fetopathy"
        effects: ["Oligohydramnios", "Fetal renal impairment", "Neonatal renal failure", "Hypotension", "Skull hypoplasia"]
        riskPeriod: "Second and third trimester"
    riskPeriod: "Contraindicated throughout pregnancy; highest risk 2nd/3rd trimester"
    discontinuationTiming: "Discontinue immediately when pregnancy detected"
    alternatives:
      - "Methyldopa"
      - "Labetalol"
      - "Nifedipine"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Losartan PLLR Label - Boxed Warning"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=losartan"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "35296"
    drugName: "Ramipril"
    genericName: "Ramipril"
    brandNames: ["Altace"]
    atcCode: "C09AA05"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Use of drugs that act on the renin-angiotensin system during the second and third trimesters of pregnancy reduces fetal renal function and increases fetal and neonatal morbidity and death. Discontinue as soon as pregnancy is detected."
    teratogenicEffects:
      - category: "Renal"
        effects: ["Renal dysgenesis", "Anuria", "Oligohydramnios"]
        riskPeriod: "Second and third trimester"
      - category: "Skeletal"
        effects: ["Skull hypoplasia", "Limb contractures"]
        riskPeriod: "Second and third trimester"
      - category: "Pulmonary"
        effects: ["Pulmonary hypoplasia"]
        riskPeriod: "Second and third trimester"
    riskPeriod: "Contraindicated second and third trimester; use with caution in first trimester"
    discontinuationTiming: "Discontinue as soon as pregnancy detected"
