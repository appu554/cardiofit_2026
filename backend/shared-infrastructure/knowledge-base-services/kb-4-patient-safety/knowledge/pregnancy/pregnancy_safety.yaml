  - rxnorm: "3827"
    drugName: "Enalapril"
    genericName: "Enalapril Maleate"
    brandNames: ["Vasotec", "Epaned"]
    atcCode: "C09AA02"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Use of drugs that act on the renin-angiotensin system during the second and third trimesters of pregnancy reduces fetal renal function and increases fetal and neonatal morbidity and death."
    teratogenicEffects:
      - category: "Renal/Skeletal"
        effects: ["Oligohydramnios", "Fetal renal dysfunction", "Skull hypoplasia", "Neonatal hypotension"]
        riskPeriod: "Second and third trimester"
    riskPeriod: "Contraindicated second and third trimester"
    discontinuationTiming: "Discontinue immediately when pregnancy detected"
    alternatives:
      - "Methyldopa"
      - "Labetalol"
      - "Nifedipine"
      - "Hydralazine"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Enalapril PLLR Label - Boxed Warning"
      sourceSection: "8.1 Pregnancy"
