# FDA Pregnancy and Lactation Labeling Rule (PLLR) - Pregnancy Safety Data
# Source: FDA Drug Safety Communications, FDA PLLR Labeling
# This file is part of KB-4 Patient Safety governed clinical knowledge
# Version: 1.0.0
# Effective Date: 2024-01-01

metadata:
  title: "FDA PLLR Pregnancy Safety Data"
  version: "1.0.0"
  sourceAuthority: "FDA"
  sourceDocument: "Pregnancy and Lactation Labeling Rule (PLLR) - 21 CFR 201.57"
  sourceUrl: "https://www.fda.gov/drugs/labeling-information-drug-products/pregnancy-and-lactation-labeling-drugs-final-rule"
  effectiveDate: "2024-01-01"
  lastReviewed: "2024-12-01"
  jurisdiction: "US"
  clinicalDomain: "Reproductive Health"
  applicablePopulation: "Pregnant women, women of childbearing potential"
  knowledgeVersion: "2024.1"
  approvalStatus: "ACTIVE"
  note: "PLLR replaced legacy pregnancy categories (A, B, C, D, X) with narrative subsections"

# Note on PLLR Categories:
# The FDA's Pregnancy and Lactation Labeling Rule (PLLR) replaced the former
# A, B, C, D, X pregnancy categories with detailed narrative descriptions.
# Risk levels in this file are derived from PLLR narrative content.

# ================================================================
# CATEGORY X EQUIVALENT (CONTRAINDICATED)
# ================================================================

pregnancy_entries:

  # ================================================================
  # TERATOGENIC - ABSOLUTELY CONTRAINDICATED
  # ================================================================

  - rxnorm: "6064"
    drugName: "Isotretinoin"
    genericName: "Isotretinoin"
    brandNames: ["Accutane", "Absorica", "Claravis", "Amnesteem"]
    atcCode: "D10BA01"
    category: "X"  # FDA Pregnancy Category X - Contraindicated
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Isotretinoin is contraindicated during pregnancy. There is an extremely high risk of severe birth defects if pregnancy occurs while taking isotretinoin in any amount, even for short periods of time."
    teratogenicEffects:
      - category: "Craniofacial"
        effects: ["Microtia/anotia", "Micrognathia", "Cleft palate", "Depressed nasal bridge"]
      - category: "Central Nervous System"
        effects: ["Microcephaly", "Hydrocephalus", "Cerebellar malformation", "Cognitive impairment"]
      - category: "Cardiovascular"
        effects: ["Conotruncal heart defects", "Aortic arch abnormalities"]
      - category: "Thymic"
        effects: ["Thymic aplasia/hypoplasia"]
    riskPeriod: "Throughout pregnancy - no safe period"
    absoluteRisk: "25-35% risk of major malformations with any exposure"
    spontaneousAbortionRisk: "Increased"
    remsProgram:
      name: "iPLEDGE"
      requirements:
        - "Two forms of contraception"
        - "Monthly pregnancy tests"
        - "Informed consent"
        - "Monthly prescriber verification"
    preconceptionRecommendation: "Discontinue at least 1 month before attempting pregnancy"
    malePartnerRisk: "No known risk from paternal exposure"
    alternatives:
      - "Topical retinoids with caution"
      - "Non-retinoid acne treatments"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Isotretinoin PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=isotretinoin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"
      approvedBy: "FDA CDER"
      clinicalReviewDate: "2024-01-01"

  - rxnorm: "11289"
    drugName: "Warfarin"
    genericName: "Warfarin Sodium"
    brandNames: ["Coumadin", "Jantoven"]
    atcCode: "B01AA03"
    category: "D"  # FDA Pregnancy Category D - Positive evidence of risk
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Warfarin is contraindicated in women who are pregnant except in pregnant women with mechanical heart valves, who are at high risk of thromboembolism, and for whom the benefits of warfarin may outweigh the risks."
    teratogenicEffects:
      - category: "Warfarin Embryopathy"
        effects: ["Nasal hypoplasia", "Stippled epiphyses", "Limb hypoplasia"]
        riskPeriod: "First trimester (weeks 6-9 critical)"
      - category: "Central Nervous System"
        effects: ["CNS abnormalities", "Dorsal midline dysplasia", "Ventral midline dysplasia"]
        riskPeriod: "Second and third trimester"
      - category: "Hemorrhagic"
        effects: ["Fetal hemorrhage", "Stillbirth"]
        riskPeriod: "Any trimester, especially at delivery"
    riskPeriod: "Throughout pregnancy, highest first trimester"
    absoluteRisk: "~5% risk of embryopathy with first trimester exposure"
    spontaneousAbortionRisk: "Increased"
    criticalExposureWindow: "Weeks 6-9 of gestation for warfarin embryopathy"
    exceptions:
      - condition: "Mechanical heart valves"
        rationale: "High thrombosis risk may outweigh teratogenic risk"
        management: "Shared decision-making, LMWH alternatives in first trimester considered"
    preconceptionRecommendation: "Switch to LMWH before conception if possible"
    alternatives:
      - "Low molecular weight heparin (enoxaparin, dalteparin)"
      - "Unfractionated heparin"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Warfarin PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=warfarin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "6851"
    drugName: "Methotrexate"
    genericName: "Methotrexate"
    brandNames: ["Trexall", "Otrexup", "Rasuvo"]
    atcCode: "L01BA01"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Methotrexate can cause embryo-fetal toxicity, including fetal death and teratogenicity, when administered to a pregnant woman. Methotrexate is contraindicated for use in pregnant women with non-malignant diseases."
    teratogenicEffects:
      - category: "Aminopterin Syndrome"
        effects: ["Craniosynostosis", "Hydrocephalus", "Anencephaly", "Limb defects", "Growth restriction"]
      - category: "CNS"
        effects: ["Intellectual disability", "Facial dysmorphism"]
    riskPeriod: "Throughout pregnancy, especially first trimester"
    absoluteRisk: "High risk - specific percentage varies by dose and timing"
    spontaneousAbortionRisk: "Used therapeutically for ectopic pregnancy and abortion"
    mechanismOfTeratogenicity: "Folic acid antagonist - inhibits dihydrofolate reductase"
    preconceptionRecommendation: "Discontinue at least 3 months before attempting pregnancy"
    folateSupplementation: "High-dose folic acid recommended before and during early pregnancy for women with prior exposure"
    malePartnerRisk: "Men should stop methotrexate 3 months before conception"
    alternatives:
      - "For rheumatoid arthritis: hydroxychloroquine, sulfasalazine, azathioprine"
      - "For psoriasis: topical agents, phototherapy"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Methotrexate PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=methotrexate"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "10582"
    drugName: "Thalidomide"
    genericName: "Thalidomide"
    brandNames: ["Thalomid"]
    atcCode: "L04AX02"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Thalidomide is a known human teratogen that causes severe life-threatening human birth defects. Even a single dose taken during pregnancy can cause severe birth defects."
    teratogenicEffects:
      - category: "Limb"
        effects: ["Phocomelia", "Amelia", "Hypoplastic limbs"]
      - category: "Internal Organs"
        effects: ["Cardiac defects", "Renal abnormalities", "GI abnormalities"]
      - category: "Facial"
        effects: ["Ear abnormalities", "Eye abnormalities", "Facial nerve palsy"]
    riskPeriod: "Critical period days 20-36 post-conception"
    absoluteRisk: "~20-30% risk of major malformations"
    spontaneousAbortionRisk: "Increased"
    remsProgram:
      name: "THALOMID REMS"
      requirements:
        - "Two forms of contraception for females"
        - "Monthly pregnancy tests"
        - "Prescriber and pharmacy certification"
        - "Patient registration"
    preconceptionRecommendation: "Discontinue at least 4 weeks before attempting pregnancy"
    malePartnerRisk: "Present in semen - males must use condoms"
    alternatives:
      - "Lenalidomide and pomalidomide have similar REMS requirements"
      - "Other immunomodulators depending on indication"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Thalidomide PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=thalidomide"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "8331"
    drugName: "Phenytoin"
    genericName: "Phenytoin"
    brandNames: ["Dilantin", "Phenytek"]
    atcCode: "N03AB02"
    riskCategory: "HIGH_RISK"
    pllrRiskSummary: "Phenytoin can cause fetal harm when administered to a pregnant woman. Prenatal exposure to phenytoin may increase the risk for congenital malformations and other adverse developmental outcomes."
    teratogenicEffects:
      - category: "Fetal Hydantoin Syndrome"
        effects: ["Craniofacial abnormalities", "Nail/digit hypoplasia", "Growth deficiency", "Intellectual disability"]
      - category: "Cardiac"
        effects: ["Congenital heart defects"]
      - category: "Orofacial"
        effects: ["Cleft lip/palate"]
    riskPeriod: "Throughout pregnancy, especially first trimester"
    absoluteRisk: "2-3 times increased risk of major malformations"
    hemorrhagicDiseaseOfNewborn: true
    vitaminKRecommendation: "Vitamin K supplementation in last month of pregnancy and to newborn"
    folateSupplementation: "High-dose folic acid recommended"
    alternatives:
      - "Lamotrigine (preferred antiepileptic in pregnancy)"
      - "Levetiracetam"
      - "Avoid valproate (higher teratogenic risk)"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Phenytoin PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=phenytoin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "11118"
    drugName: "Valproic Acid"
    genericName: "Valproic Acid/Valproate"
    brandNames: ["Depakote", "Depakene", "Stavzor"]
    atcCode: "N03AG01"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Valproate can cause major congenital malformations, particularly neural tube defects, and decreased IQ in children exposed in utero. Valproate is contraindicated for use to treat migraine and epilepsy in pregnant women unless other medications have failed."
    teratogenicEffects:
      - category: "Neural Tube Defects"
        effects: ["Spina bifida (1-2% risk)", "Anencephaly", "Meningomyelocele"]
      - category: "Craniofacial"
        effects: ["Midface hypoplasia", "Cleft lip/palate", "Epicanthal folds"]
      - category: "Cardiac"
        effects: ["Atrial septal defect", "Ventricular septal defect"]
      - category: "Neurodevelopmental"
        effects: ["Decreased IQ (average 8-10 points)", "Autism spectrum disorder risk increased"]
    riskPeriod: "Throughout pregnancy, NTD risk highest in first trimester"
    absoluteRisk: "10-12% risk of major malformations (3-4x baseline)"
    neurodevelopmentalRisk: "Dose-dependent decrease in IQ; increased autism risk"
    folateSupplementation: "4-5 mg folic acid recommended before and during pregnancy"
    doseEffect: "Risk increases with dose >1000 mg/day"
    preconceptionRecommendation: "Switch to safer antiepileptic before conception"
    alternatives:
      - "Lamotrigine (preferred for epilepsy)"
      - "Levetiracetam"
      - "For bipolar: lithium with monitoring, second-generation antipsychotics"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Valproate PLLR Label - Boxed Warning"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=valproate"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # ACE INHIBITORS / ARBs - CONTRAINDICATED 2ND/3RD TRIMESTER
  # ================================================================

  - rxnorm: "6960"
    drugName: "Lisinopril"
    genericName: "Lisinopril"
    brandNames: ["Prinivil", "Zestril"]
    atcCode: "C09AA03"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Use of drugs that act on the renin-angiotensin system during the second and third trimesters of pregnancy reduces fetal renal function and increases fetal and neonatal morbidity and death. Discontinue as soon as pregnancy is detected."
    teratogenicEffects:
      - category: "Renal"
        effects: ["Renal dysgenesis", "Anuria", "Oligohydramnios"]
        riskPeriod: "Second and third trimester"
      - category: "Skeletal"
        effects: ["Skull hypoplasia", "Limb contractures"]
        riskPeriod: "Second and third trimester"
      - category: "Pulmonary"
        effects: ["Pulmonary hypoplasia"]
        riskPeriod: "Second and third trimester"
    riskPeriod: "Contraindicated second and third trimester; use with caution in first trimester"
    firstTrimesterData: "Limited data on first trimester exposure; some studies suggest possible risk"
    discontinuationTiming: "Discontinue as soon as pregnancy detected"
    alternatives:
      - "Methyldopa (preferred first-line in pregnancy)"
      - "Labetalol"
      - "Nifedipine (extended-release)"
      - "Hydralazine"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Lisinopril PLLR Label - Boxed Warning"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=lisinopril"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "321064"
    drugName: "Losartan"
    genericName: "Losartan Potassium"
    brandNames: ["Cozaar"]
    atcCode: "C09CA01"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Use of drugs that act on the renin-angiotensin system during the second and third trimesters of pregnancy reduces fetal renal function and increases fetal and neonatal morbidity and death."
    teratogenicEffects:
      - category: "Fetopathy"
        effects: ["Oligohydramnios", "Fetal renal impairment", "Neonatal renal failure", "Hypotension", "Skull hypoplasia"]
        riskPeriod: "Second and third trimester"
    riskPeriod: "Contraindicated throughout pregnancy; highest risk 2nd/3rd trimester"
    discontinuationTiming: "Discontinue immediately when pregnancy detected"
    alternatives:
      - "Methyldopa"
      - "Labetalol"
      - "Nifedipine"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Losartan PLLR Label - Boxed Warning"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=losartan"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # STATINS - CONTRAINDICATED
  # ================================================================

  - rxnorm: "83367"
    drugName: "Atorvastatin"
    genericName: "Atorvastatin Calcium"
    brandNames: ["Lipitor"]
    atcCode: "C10AA05"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Atorvastatin is contraindicated in women who are pregnant or may become pregnant. Lipid-lowering drugs offer no benefit during pregnancy because cholesterol and cholesterol derivatives are needed for normal fetal development."
    teratogenicEffects:
      - category: "Theoretical"
        effects: ["Concern for CNS and limb defects based on mechanism"]
        note: "Limited human data; animal studies show skeletal abnormalities"
    riskPeriod: "Throughout pregnancy"
    rationale: "Cholesterol essential for fetal development; no benefit to lowering during pregnancy"
    epidemiologyData: "Registry data generally reassuring but insufficient to rule out risk"
    preconceptionRecommendation: "Discontinue 1-3 months before planned pregnancy"
    alternatives:
      - "Discontinue during pregnancy - no lipid-lowering therapy indicated"
      - "Bile acid sequestrants if absolutely necessary (not absorbed)"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Atorvastatin PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=atorvastatin"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "36567"
    drugName: "Simvastatin"
    genericName: "Simvastatin"
    brandNames: ["Zocor"]
    atcCode: "C10AA01"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Simvastatin is contraindicated in women who are pregnant or may become pregnant. Atherosclerosis is a chronic process; discontinuation of lipid-lowering drugs during pregnancy should have little impact on long-term outcomes."
    teratogenicEffects:
      - category: "Theoretical"
        effects: ["Cholesterol biosynthesis pathway disruption concerns"]
        note: "Case reports of limb and CNS defects; causality not established"
    riskPeriod: "Throughout pregnancy"
    preconceptionRecommendation: "Discontinue before attempting pregnancy"
    alternatives:
      - "No statin therapy during pregnancy"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Simvastatin PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=simvastatin"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # LITHIUM - HIGH RISK BUT MAY BE USED
  # ================================================================

  - rxnorm: "6448"
    drugName: "Lithium"
    genericName: "Lithium Carbonate/Citrate"
    brandNames: ["Lithobid", "Eskalith"]
    atcCode: "N05AN01"
    riskCategory: "HIGH_RISK"
    pllrRiskSummary: "Lithium may cause fetal harm when administered to a pregnant woman. Data from lithium birth registries suggest an increase in cardiac and other anomalies, especially Ebstein's anomaly."
    teratogenicEffects:
      - category: "Cardiac"
        effects: ["Ebstein's anomaly (absolute risk ~0.1-0.2%)", "Other cardiac defects"]
        riskPeriod: "First trimester"
      - category: "Neonatal"
        effects: ["Neonatal lithium toxicity", "Hypotonia", "Lethargy", "Feeding difficulties"]
        riskPeriod: "Third trimester/delivery"
    riskPeriod: "First trimester highest for cardiac defects; all trimesters for toxicity"
    absoluteRisk: "Ebstein's anomaly risk ~0.1-0.2% (vs baseline 0.005%)"
    riskBenefitConsideration: "For severe bipolar disorder, benefits may outweigh risks"
    monitoringInPregnancy:
      - "Fetal echocardiography at 16-20 weeks"
      - "Frequent lithium levels"
      - "Dose adjustment as renal clearance changes"
      - "Hold or reduce dose at delivery"
    discontinuationRisk: "High relapse rate for bipolar disorder"
    alternatives:
      - "Lamotrigine (lower teratogenic risk)"
      - "Second-generation antipsychotics (olanzapine, quetiapine)"
      - "Continue lithium if severe illness with careful monitoring"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Lithium PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=lithium"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # FLUOROQUINOLONES
  # ================================================================

  - rxnorm: "2551"
    drugName: "Ciprofloxacin"
    genericName: "Ciprofloxacin"
    brandNames: ["Cipro"]
    atcCode: "J01MA02"
    riskCategory: "AVOID_IF_POSSIBLE"
    pllrRiskSummary: "Ciprofloxacin should be used during pregnancy only if the potential benefit justifies the potential risk to the fetus. Animal studies have shown cartilage damage in juvenile animals."
    teratogenicEffects:
      - category: "Musculoskeletal"
        effects: ["Theoretical concern for cartilage toxicity based on animal data"]
        note: "Human data generally reassuring but limited"
    riskPeriod: "Throughout pregnancy"
    humanData: "Large epidemiological studies have not shown increased malformation risk"
    animalData: "Cartilage damage in juvenile animals"
    useRecommendation: "Use only when no safer alternatives available"
    alternatives:
      - "Penicillins (amoxicillin, ampicillin)"
      - "Cephalosporins"
      - "Azithromycin"
      - "Nitrofurantoin (avoid near term)"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Ciprofloxacin PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=ciprofloxacin"
      jurisdiction: "US"
      evidenceLevel: "C"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # TETRACYCLINES
  # ================================================================

  - rxnorm: "10829"
    drugName: "Tetracycline"
    genericName: "Tetracycline"
    brandNames: ["Sumycin", "Achromycin"]
    atcCode: "J01AA07"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Tetracycline should not be used during pregnancy unless no alternative is available. Tetracyclines can cause permanent tooth discoloration and affect bone development."
    teratogenicEffects:
      - category: "Dental"
        effects: ["Permanent teeth discoloration (yellow-gray-brown)", "Enamel hypoplasia"]
        riskPeriod: "Second and third trimester"
      - category: "Skeletal"
        effects: ["Temporary inhibition of bone growth"]
        riskPeriod: "Second and third trimester"
      - category: "Maternal"
        effects: ["Hepatotoxicity (especially IV, especially with renal impairment)"]
    riskPeriod: "Second half of pregnancy for dental/skeletal effects"
    firstTrimesterSafety: "Less concern in first trimester before tooth development"
    alternatives:
      - "Penicillins"
      - "Cephalosporins"
      - "Azithromycin"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Tetracycline PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=tetracycline"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "3640"
    drugName: "Doxycycline"
    genericName: "Doxycycline"
    brandNames: ["Vibramycin", "Doryx", "Oracea"]
    atcCode: "J01AA02"
    riskCategory: "CONTRAINDICATED"
    pllrRiskSummary: "Doxycycline, like other tetracycline-class antibiotics, can cause fetal harm when administered to a pregnant woman. Avoid use during tooth development (second and third trimesters)."
    teratogenicEffects:
      - category: "Dental"
        effects: ["Permanent tooth discoloration", "Enamel hypoplasia"]
        riskPeriod: "After 14 weeks gestation"
    riskPeriod: "After 14 weeks gestation"
    alternatives:
      - "Azithromycin"
      - "Amoxicillin"
      - "Cephalosporins"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Doxycycline PLLR Label"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=doxycycline"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # NSAIDs
  # ================================================================

  - rxnorm: "5640"
    drugName: "Ibuprofen"
    genericName: "Ibuprofen"
    brandNames: ["Advil", "Motrin"]
    atcCode: "M01AE01"
    category: "D"  # FDA Pregnancy Category D (especially in third trimester)
    riskCategory: "AVOID_AFTER_20_WEEKS"
    pllrRiskSummary: "Use of NSAIDs at about 20 weeks gestation or later may cause fetal renal dysfunction leading to oligohydramnios and potential neonatal renal impairment. Use of NSAIDs around 30 weeks gestation or later may cause premature closure of the fetal ductus arteriosus."
    teratogenicEffects:
      - category: "Renal"
        effects: ["Oligohydramnios", "Fetal renal dysfunction"]
        riskPeriod: "After 20 weeks"
      - category: "Cardiovascular"
        effects: ["Premature ductus arteriosus closure", "Pulmonary hypertension"]
        riskPeriod: "After 30 weeks"
      - category: "First Trimester"
        effects: ["Some studies suggest increased miscarriage risk"]
        riskPeriod: "First trimester"
    riskPeriod: "Avoid after 20 weeks; use caution in first trimester"
    fdaSafetyAlert: "2020 FDA Drug Safety Communication regarding oligohydramnios after 20 weeks"
    durationLimit: "If used between 20-30 weeks, limit to lowest dose for shortest duration"
    contraindicated: "After 30 weeks gestation"
    alternatives:
      - "Acetaminophen (analgesic of choice in pregnancy)"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Ibuprofen PLLR Label and FDA Safety Communication 10/2020"
      sourceSection: "8.1 Pregnancy"
      sourceUrl: "https://www.fda.gov/drugs/drug-safety-and-availability/fda-recommends-avoiding-use-nsaids-pregnancy-20-weeks-or-later"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
