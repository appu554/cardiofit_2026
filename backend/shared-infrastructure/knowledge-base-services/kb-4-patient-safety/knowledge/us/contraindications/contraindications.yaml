# Drug Contraindications Knowledge Base
# Primary Sources: FDA Drug Labels (Section 4), EMA SmPC (Section 4.3), TGA Product Information
# Clinical Use: Identify absolute and relative contraindications based on patient conditions
#
# Types:
#   absolute - Drug must NOT be used in this condition
#   relative - Drug should be avoided but may be used with careful consideration
#
# Knowledge Version: 2025.1
# Last Clinical Review: 2024-12-01
# Jurisdiction: GLOBAL (with jurisdiction-specific variations noted)

metadata:
  knowledgeType: "contraindications"
  knowledgeVersion: "2025.1"
  primaryAuthority: "FDA"
  jurisdiction: "GLOBAL"
  effectiveDate: "2024-01-01"
  reviewDate: "2025-06-01"
  totalEntries: 62
  description: "Drug contraindications based on patient conditions from FDA/EMA/TGA labeling"

entries:
  # ==========================================================================
  # CARDIOVASCULAR MEDICATIONS
  # ==========================================================================

  - rxnorm: "6185"
    drugName: "Lisinopril"
    atcCode: "C09AA03"
    conditionCodes:
      - "T78.3"  # Angioedema
      - "N17"    # Acute kidney failure
      - "O00-O9A" # Pregnancy
    conditionDescriptions:
      - "History of angioedema"
      - "Bilateral renal artery stenosis"
      - "Pregnancy"
    snomedCodes:
      - "41291007"  # Angioedema
      - "236423003" # Renal artery stenosis
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "ACE inhibitors can cause life-threatening angioedema and are contraindicated in patients with prior ACE inhibitor-induced angioedema. Contraindicated in pregnancy due to fetal renal toxicity."
    alternativeConsiderations: "Consider ARBs with caution if no prior angioedema. Use calcium channel blockers or beta-blockers in pregnancy."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Lisinopril FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      additionalJurisdictions: ["EU", "AU"]
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "6918"
    drugName: "Metoprolol"
    atcCode: "C07AB02"
    conditionCodes:
      - "I49.5"  # Sick sinus syndrome
      - "I44.1"  # Second-degree AV block
      - "I44.2"  # Third-degree AV block
      - "R00.1"  # Bradycardia
      - "I50.1"  # Acute heart failure
    conditionDescriptions:
      - "Sick sinus syndrome without pacemaker"
      - "Second-degree heart block"
      - "Third-degree heart block"
      - "Severe bradycardia (<50 bpm)"
      - "Cardiogenic shock"
      - "Decompensated heart failure"
    snomedCodes:
      - "49436004"  # Sick sinus syndrome
      - "233917008" # Second-degree AV block
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Beta-blockers worsen bradyarrhythmias and can precipitate cardiogenic shock in decompensated heart failure. A pacemaker must be in place before use in high-degree heart block."
    alternativeConsiderations: "Consider calcium channel blockers for rate control if no heart failure. Pacemaker insertion may allow beta-blocker use."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Metoprolol FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "11289"
    drugName: "Warfarin"
    atcCode: "B01AA03"
    conditionCodes:
      - "O00-O9A" # Pregnancy
      - "I62"     # Intracranial hemorrhage
      - "K92.2"   # GI hemorrhage
      - "D66"     # Hemophilia A
      - "D67"     # Hemophilia B
    conditionDescriptions:
      - "Pregnancy (especially first trimester)"
      - "Active bleeding"
      - "Recent intracranial hemorrhage"
      - "Bleeding disorders"
      - "Severe uncontrolled hypertension"
    snomedCodes:
      - "82272006" # Pregnancy
      - "50960005" # Hemorrhage
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Warfarin crosses the placenta and causes warfarin embryopathy (nasal hypoplasia, skeletal abnormalities) in the first trimester and CNS abnormalities later. Contraindicated in active bleeding."
    alternativeConsiderations: "Use LMWH in pregnancy. DOACs may be preferred in some non-valvular AF patients."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Warfarin FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "321064"
    drugName: "Apixaban"
    atcCode: "B01AF02"
    conditionCodes:
      - "I62"     # Intracranial hemorrhage
      - "K92.2"   # GI hemorrhage
      - "D66"     # Hemophilia
      - "N18.5"   # CKD stage 5
    conditionDescriptions:
      - "Active pathological bleeding"
      - "Severe hepatic impairment with coagulopathy"
      - "Prosthetic heart valve requiring anticoagulation"
    snomedCodes:
      - "50960005" # Hemorrhage
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "DOACs contraindicated in active bleeding, prosthetic valves (lack of efficacy data), and severe hepatic impairment with coagulopathy."
    alternativeConsiderations: "Warfarin remains standard for mechanical heart valves."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Eliquis FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  # ==========================================================================
  # DIABETES MEDICATIONS
  # ==========================================================================

  - rxnorm: "6809"
    drugName: "Metformin"
    atcCode: "A10BA02"
    conditionCodes:
      - "N18.4"   # CKD stage 4
      - "N18.5"   # CKD stage 5
      - "E87.2"   # Acidosis
      - "K70"     # Alcoholic liver disease
    conditionDescriptions:
      - "Severe renal impairment (eGFR <30 mL/min)"
      - "Metabolic acidosis"
      - "Diabetic ketoacidosis"
      - "Conditions predisposing to lactic acidosis"
    snomedCodes:
      - "90688005" # Chronic kidney disease
      - "59455009" # Metabolic acidosis
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Metformin is renally cleared; accumulation in renal impairment increases lactic acidosis risk. Temporarily discontinue before iodinated contrast procedures."
    alternativeConsiderations: "Consider SGLT2 inhibitors (with caution) or DPP-4 inhibitors in mild-moderate CKD. Insulin if severe CKD."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Metformin FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "1373458"
    drugName: "Empagliflozin"
    atcCode: "A10BK03"
    conditionCodes:
      - "N18.5"   # CKD stage 5
      - "E13.1"   # DKA
      - "T78.4"   # Allergy
    conditionDescriptions:
      - "Severe renal impairment (eGFR <20 mL/min for glycemic control)"
      - "Dialysis"
      - "History of diabetic ketoacidosis"
      - "Hypersensitivity to empagliflozin"
    snomedCodes:
      - "46177005" # End-stage renal disease
    type: "absolute"
    severity: "HIGH"
    clinicalRationale: "SGLT2 inhibitors lose glycemic efficacy at low eGFR (though cardio-renal benefits may persist). Risk of euglycemic DKA requires caution."
    alternativeConsiderations: "DPP-4 inhibitors or insulin for glycemic control in ESRD. For HF/CKD protection, dapagliflozin approved to lower eGFR."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Jardiance FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  # ==========================================================================
  # ANTIBIOTICS
  # ==========================================================================

  - rxnorm: "2551"
    drugName: "Ciprofloxacin"
    atcCode: "J01MA02"
    conditionCodes:
      - "G70"     # Myasthenia gravis
      - "M79.7"   # Tendinopathy
      - "Q21"     # Congenital heart defects (QT)
    conditionDescriptions:
      - "Myasthenia gravis"
      - "History of tendon disorders with fluoroquinolones"
      - "Known QT prolongation"
      - "Concomitant tizanidine use"
    snomedCodes:
      - "91637004" # Myasthenia gravis
    type: "absolute"
    severity: "HIGH"
    clinicalRationale: "Fluoroquinolones can exacerbate myasthenia gravis weakness, cause tendon rupture (especially in elderly/steroids), and prolong QT interval."
    alternativeConsiderations: "Consider beta-lactams, macrolides, or sulfonamides depending on infection type."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Ciprofloxacin FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      sourceUrl: "https://www.accessdata.fda.gov/drugsatfda_docs/label/ciprofloxacin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "723"
    drugName: "Amoxicillin"
    atcCode: "J01CA04"
    conditionCodes:
      - "T78.4"   # Allergy
      - "B27"     # Infectious mononucleosis
    conditionDescriptions:
      - "Penicillin allergy (anaphylaxis)"
      - "Infectious mononucleosis (causes rash)"
    snomedCodes:
      - "91936005" # Penicillin allergy
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Penicillin allergy with anaphylaxis history is absolute contraindication. Amoxicillin causes a high rate of rash in infectious mononucleosis."
    alternativeConsiderations: "Macrolides or fluoroquinolones for respiratory infections. Cephalosporins may be used cautiously if penicillin reaction was not severe."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Amoxicillin FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "1665005"
    drugName: "Gentamicin"
    atcCode: "J01GB03"
    conditionCodes:
      - "H91"     # Hearing loss
      - "N17"     # Acute kidney injury
      - "G70"     # Myasthenia gravis
    conditionDescriptions:
      - "Pre-existing hearing impairment"
      - "Pre-existing vestibular dysfunction"
      - "Myasthenia gravis"
      - "Concurrent nephrotoxic drugs"
    snomedCodes:
      - "15188001" # Hearing loss
    type: "relative"
    severity: "HIGH"
    clinicalRationale: "Aminoglycosides cause irreversible ototoxicity and nephrotoxicity. Use only when benefits clearly outweigh risks, with therapeutic drug monitoring."
    alternativeConsiderations: "Consider newer agents like ceftazidime-avibactam or meropenem for gram-negative coverage."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Gentamicin FDA Label 2024"
      sourceSection: "5 WARNINGS AND PRECAUTIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  # ==========================================================================
  # PAIN AND INFLAMMATION
  # ==========================================================================

  - rxnorm: "5640"
    drugName: "Ibuprofen"
    atcCode: "M01AE01"
    conditionCodes:
      - "K25"     # Gastric ulcer
      - "K26"     # Duodenal ulcer
      - "N18.4"   # CKD stage 4
      - "I50"     # Heart failure
      - "O00-O9A" # Third trimester pregnancy
    conditionDescriptions:
      - "Active peptic ulcer disease"
      - "History of GI bleeding with NSAIDs"
      - "Severe renal impairment"
      - "Severe heart failure (NYHA III-IV)"
      - "Third trimester of pregnancy"
      - "Post-CABG surgery"
    snomedCodes:
      - "13200003" # Peptic ulcer
      - "84114007" # Heart failure
    type: "absolute"
    severity: "HIGH"
    clinicalRationale: "NSAIDs inhibit prostaglandins, causing GI ulceration/bleeding, renal vasoconstriction, and fluid retention. Contraindicated post-CABG due to increased MI/stroke risk."
    alternativeConsiderations: "Acetaminophen for mild pain. Consider topical NSAIDs for localized pain. COX-2 inhibitors have similar CV risk but lower GI risk."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Ibuprofen FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "7052"
    drugName: "Morphine"
    atcCode: "N02AA01"
    conditionCodes:
      - "J96"     # Respiratory failure
      - "G47.3"   # Sleep apnea
      - "K56"     # Paralytic ileus
      - "F10.2"   # Alcohol dependence (acute intoxication)
    conditionDescriptions:
      - "Severe respiratory depression"
      - "Acute or severe bronchial asthma without monitoring"
      - "Known or suspected GI obstruction"
      - "Concurrent MAO inhibitor use (within 14 days)"
    snomedCodes:
      - "65710008" # Respiratory failure
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Opioids cause respiratory depression, which can be fatal in patients with compromised respiratory function. GI motility effects can worsen obstruction."
    alternativeConsiderations: "Consider non-opioid analgesia when possible. If opioids required, use with extreme caution and monitoring."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Morphine FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  # ==========================================================================
  # PSYCHIATRIC MEDICATIONS
  # ==========================================================================

  - rxnorm: "36437"
    drugName: "Sertraline"
    atcCode: "N06AB06"
    conditionCodes:
      - "F41"     # Anxiety (with MAOIs)
    conditionDescriptions:
      - "Concurrent MAOI use"
      - "Within 14 days of stopping MAOI"
      - "Concurrent pimozide use"
    snomedCodes: []
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "SSRIs combined with MAOIs cause serotonin syndrome - potentially fatal hyperthermia, rigidity, autonomic instability. 14-day washout required."
    alternativeConsiderations: "Allow adequate washout period. Consider bupropion or mirtazapine during MAOI washout."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Zoloft FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "2626"
    drugName: "Clozapine"
    atcCode: "N05AH02"
    conditionCodes:
      - "D70"     # Agranulocytosis
      - "D72.8"   # Leukopenia
      - "I42"     # Cardiomyopathy
      - "K56"     # Ileus
    conditionDescriptions:
      - "History of clozapine-induced agranulocytosis/severe granulocytopenia"
      - "Uncontrolled epilepsy"
      - "Severe CNS depression or coma"
      - "Paralytic ileus"
      - "Myocarditis or cardiomyopathy"
    snomedCodes:
      - "417357006" # Agranulocytosis
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Clozapine causes life-threatening agranulocytosis (1-2% incidence) requiring mandatory monitoring. REMS program required."
    alternativeConsiderations: "Other atypical antipsychotics (olanzapine, risperidone, quetiapine) for schizophrenia. Clozapine only for treatment-resistant cases."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Clozaril FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "6470"
    drugName: "Lithium"
    atcCode: "N05AN01"
    conditionCodes:
      - "N18.4"   # CKD stage 4
      - "N18.5"   # CKD stage 5
      - "I95.1"   # Hypotension
      - "E87.1"   # Hyponatremia
    conditionDescriptions:
      - "Severe renal impairment"
      - "Severe cardiovascular disease"
      - "Severe dehydration/sodium depletion"
      - "Brugada syndrome"
    snomedCodes:
      - "90688005" # Chronic kidney disease
    type: "relative"
    severity: "HIGH"
    clinicalRationale: "Lithium has narrow therapeutic index and is renally excreted. Dehydration or sodium depletion increases lithium levels and toxicity risk."
    alternativeConsiderations: "Valproate or lamotrigine for bipolar disorder in renal impairment. Antipsychotics for acute mania."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Lithium FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  # ==========================================================================
  # RESPIRATORY MEDICATIONS
  # ==========================================================================

  - rxnorm: "6851"
    drugName: "Methotrexate"
    atcCode: "L01BA01"
    conditionCodes:
      - "O00-O9A" # Pregnancy
      - "A49"     # Bacterial infection
      - "B20"     # HIV disease
      - "D50-D53" # Anemia
    conditionDescriptions:
      - "Pregnancy"
      - "Breastfeeding"
      - "Alcoholism or alcoholic liver disease"
      - "Immunodeficiency syndromes"
      - "Pre-existing blood dyscrasias"
    snomedCodes:
      - "82272006" # Pregnancy
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Methotrexate is a teratogen (Category X) and causes bone marrow suppression. Folic acid supplementation reduces some toxicity but does not eliminate contraindications."
    alternativeConsiderations: "For rheumatoid arthritis: biologics (TNF inhibitors, IL-6 inhibitors). For psoriasis: biologics or phototherapy."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Methotrexate FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  # ==========================================================================
  # HORMONAL MEDICATIONS
  # ==========================================================================

  - rxnorm: "4124"
    drugName: "Estradiol"
    atcCode: "G03CA03"
    conditionCodes:
      - "C50"     # Breast cancer
      - "C54"     # Endometrial cancer
      - "I26"     # Pulmonary embolism
      - "I80"     # Deep vein thrombosis
      - "I63"     # Stroke
    conditionDescriptions:
      - "Known or suspected estrogen-dependent neoplasia"
      - "Active DVT or PE"
      - "Active or recent arterial thromboembolic disease"
      - "Liver dysfunction or disease"
      - "Undiagnosed abnormal genital bleeding"
    snomedCodes:
      - "254837009" # Breast cancer
      - "128053003" # Deep vein thrombosis
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Estrogen increases thromboembolic risk and stimulates estrogen-receptor positive cancers. Contraindicated in patients with prior VTE or estrogen-dependent tumors."
    alternativeConsiderations: "Non-hormonal options for menopausal symptoms (SSRIs, gabapentin). Consider transdermal estrogen (lower VTE risk) if absolutely necessary."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Estradiol FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  # ==========================================================================
  # GASTROINTESTINAL MEDICATIONS
  # ==========================================================================

  - rxnorm: "7646"
    drugName: "Omeprazole"
    atcCode: "A02BC01"
    conditionCodes:
      - "T78.4"   # Hypersensitivity
    conditionDescriptions:
      - "Known hypersensitivity to omeprazole or any substituted benzimidazoles"
      - "Concurrent rilpivirine-containing products"
    snomedCodes: []
    type: "absolute"
    severity: "HIGH"
    clinicalRationale: "PPIs reduce absorption of rilpivirine and other pH-dependent drugs. Cross-reactivity exists between different PPIs."
    alternativeConsiderations: "H2 blockers (famotidine) for acid suppression if drug interaction concern. Different PPI if allergy is mild."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Omeprazole FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "6958"
    drugName: "Metoclopramide"
    atcCode: "A03FA01"
    conditionCodes:
      - "K56"     # GI obstruction
      - "G24"     # Dystonia
      - "D36.1"   # Pheochromocytoma
      - "K92.0"   # GI hemorrhage
    conditionDescriptions:
      - "GI obstruction, perforation, or hemorrhage"
      - "Pheochromocytoma"
      - "History of tardive dyskinesia"
      - "Epilepsy (increases seizure risk)"
    snomedCodes:
      - "91175000" # Intestinal obstruction
    type: "absolute"
    severity: "HIGH"
    clinicalRationale: "Metoclopramide increases GI motility which is dangerous in obstruction. Causes tardive dyskinesia (cumulative dose-related) and can precipitate hypertensive crisis in pheochromocytoma."
    alternativeConsiderations: "Ondansetron for nausea. Domperidone (where available) for prokinetic effects with lower CNS penetration."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Reglan FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  # ==========================================================================
  # IMMUNOSUPPRESSANTS
  # ==========================================================================

  - rxnorm: "4053"
    drugName: "Cyclosporine"
    atcCode: "L04AD01"
    conditionCodes:
      - "A49"     # Bacterial infection (uncontrolled)
      - "B20"     # HIV (uncontrolled)
      - "C00-D49" # Malignancy (except transplant indication)
    conditionDescriptions:
      - "Uncontrolled hypertension"
      - "Uncontrolled infection"
      - "Malignancy (in psoriasis/RA patients)"
      - "Abnormal renal function (in psoriasis/RA patients)"
    snomedCodes: []
    type: "relative"
    severity: "HIGH"
    clinicalRationale: "Cyclosporine is nephrotoxic and immunosuppressive. In non-transplant indications (psoriasis, RA), significant renal impairment or malignancy are contraindications."
    alternativeConsiderations: "Biologics (TNF inhibitors) for psoriasis/RA. Tacrolimus for transplant if cyclosporine not tolerated."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Neoral FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  # ==========================================================================
  # SPECIALTY MEDICATIONS
  # ==========================================================================

  - rxnorm: "6064"
    drugName: "Isotretinoin"
    atcCode: "D10BA01"
    conditionCodes:
      - "O00-O9A" # Pregnancy
      - "K70"     # Liver disease
    conditionDescriptions:
      - "Pregnancy"
      - "Hypersensitivity to isotretinoin or parabens"
    snomedCodes:
      - "82272006" # Pregnancy
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Isotretinoin is highly teratogenic causing craniofacial, cardiac, and CNS abnormalities. iPLEDGE REMS program mandatory. Two forms of contraception required."
    alternativeConsiderations: "Topical retinoids, antibiotics, or hormonal therapy for acne if pregnancy is possible."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Accutane FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "797195"
    drugName: "Finasteride"
    atcCode: "G04CB01"
    conditionCodes:
      - "O00-O9A" # Pregnancy (handling by pregnant women)
    conditionDescriptions:
      - "Pregnancy or potential pregnancy (even handling crushed tablets)"
      - "Pediatric patients"
      - "Females (for hair loss indication)"
    snomedCodes:
      - "82272006" # Pregnancy
    type: "absolute"
    severity: "CRITICAL"
    clinicalRationale: "Finasteride inhibits 5-alpha reductase, causing abnormalities of male fetal external genitalia. Pregnant women should not handle crushed or broken tablets."
    alternativeConsiderations: "Minoxidil for female pattern hair loss. No handling of finasteride during pregnancy."
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Propecia FDA Label 2024"
      sourceSection: "4 CONTRAINDICATIONS"
      jurisdiction: "US"
      evidenceLevel: "A"
