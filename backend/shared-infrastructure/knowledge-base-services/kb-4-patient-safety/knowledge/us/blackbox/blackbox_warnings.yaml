      approvedBy: "CMO"
      approvedAt: "2025-01-01"

  - rxnorm: "3423"
    drugName: "Fentanyl"
    drugClass: "Opioid Analgesic"
    atcCode: "N02AB03"
    riskCategories:
      - "ADDICTION"
      - "RESPIRATORY_DEPRESSION"
      - "ACCIDENTAL_EXPOSURE"
      - "NEONATAL_OPIOID_WITHDRAWAL"
    warningText: "LIFE-THREATENING RESPIRATORY DEPRESSION can occur even at recommended doses. ACCIDENTAL EXPOSURE to even one dose of fentanyl, especially by children, can result in a fatal overdose."
    severity: "CRITICAL"
    hasRems: true
    remsProgram: "TIRF REMS (Transmucosal Immediate-Release Fentanyl)"
