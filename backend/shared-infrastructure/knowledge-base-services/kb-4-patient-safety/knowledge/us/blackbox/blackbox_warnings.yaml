      evidenceLevel: "A"
      effectiveDate: "2024-05-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "139462"
    drugName: "Moxifloxacin"
    drugClass: "Fluoroquinolone Antibiotic"
    atcCode: "J01MA14"
    riskCategories:
      - "TENDON_RUPTURE"
      - "PERIPHERAL_NEUROPATHY"
      - "CNS_EFFECTS"
      - "QT_PROLONGATION"
    warningText: "TENDINITIS AND TENDON RUPTURE, PERIPHERAL NEUROPATHY, CNS EFFECTS, EXACERBATION OF MYASTHENIA GRAVIS. Moxifloxacin can prolong the QT interval. Avoid use in patients with known QT prolongation."
