  # ==========================================================================
  # FLUOROQUINOLONES - Tendon, CNS, and Peripheral Nerve risks
  # ==========================================================================
  - rxnorm: "2551"
    drugName: "Ciprofloxacin"
    drugClass: "Fluoroquinolone Antibiotic"
    atcCode: "J01MA02"
    riskCategories:
      - "TENDON_RUPTURE"
      - "PERIPHERAL_NEUROPATHY"
      - "CNS_EFFECTS"
      - "MYASTHENIA_GRAVIS_EXACERBATION"
    warningText: "TENDINITIS AND TENDON RUPTURE: Fluoroquinolones are associated with an increased risk of tendinitis and tendon rupture in all ages. This risk is further increased in older patients usually over 60 years of age, in patients taking corticosteroid drugs, and in patients with kidney, heart, or lung transplants."
    severity: "HIGH"
    hasRems: false
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Ciprofloxacin"
      sourceSection: "BOXED WARNING"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=ciprofloxacin"
      sourceVersion: "2024-05"
      jurisdiction: "US"
      additionalJurisdictions: ["AU", "EU", "UK"]
      evidenceLevel: "A"
      effectiveDate: "2024-05-01"
      reviewDate: "2025-05-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      approvedBy: "CMO"
      approvedAt: "2025-01-01"

  - rxnorm: "82122"
    drugName: "Levofloxacin"
    drugClass: "Fluoroquinolone Antibiotic"
    atcCode: "J01MA12"
    riskCategories:
      - "TENDON_RUPTURE"
      - "PERIPHERAL_NEUROPATHY"
      - "CNS_EFFECTS"
      - "AORTIC_DISSECTION"
    warningText: "TENDINITIS AND TENDON RUPTURE, PERIPHERAL NEUROPATHY, CNS EFFECTS, EXACERBATION OF MYASTHENIA GRAVIS, AORTIC ANEURYSM AND DISSECTION: Fluoroquinolones have been associated with increased risks of aortic aneurysm and dissection."
    severity: "HIGH"
    hasRems: false
