  # ==========================================================================
  # ANTIPSYCHOTICS - Metabolic, Cardiovascular, and Mortality risks
  # ==========================================================================
  - rxnorm: "2626"
    drugName: "Clozapine"
    drugClass: "Atypical Antipsychotic"
    atcCode: "N05AH02"
    riskCategories:
      - "AGRANULOCYTOSIS"
      - "MYOCARDITIS"
      - "CARDIOMYOPATHY"
      - "SEIZURES"
      - "HYPOTENSION"
    warningText: "AGRANULOCYTOSIS: Clozapine can cause severe neutropenia, which can lead to serious and potentially fatal infections. Patients must have a baseline white blood cell count and absolute neutrophil count before initiation of treatment, followed by regular monitoring."
    severity: "CRITICAL"
    hasRems: true
    remsProgram: "Clozapine REMS Program"
    remsRequirements:
      - "Prescriber certification"
      - "Pharmacy certification"
      - "Patient enrollment"
      - "ANC monitoring before each dispensing"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Clozapine"
