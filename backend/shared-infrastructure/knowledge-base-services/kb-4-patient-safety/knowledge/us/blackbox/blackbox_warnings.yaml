      effectiveDate: "2024-09-01"
      reviewDate: "2025-09-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      approvedBy: "CMO"
      approvedAt: "2025-01-01"

  - rxnorm: "6813"
    drugName: "Methadone"
    drugClass: "Opioid Analgesic"
    atcCode: "N07BC02"
    riskCategories:
      - "ADDICTION"
      - "RESPIRATORY_DEPRESSION"
      - "QT_PROLONGATION"
      - "CARDIAC_ARRHYTHMIA"
    warningText: "QT PROLONGATION AND TORSADES DE POINTES: Cases of QT interval prolongation and serious arrhythmias (torsades de pointes) have been observed during treatment with methadone. Most cases involve patients being treated for pain with large, multiple daily doses of methadone."
    severity: "CRITICAL"
    hasRems: true
    remsProgram: "Opioid Analgesic REMS"
    remsRequirements:
      - "Patient counseling"
      - "Medication guide distribution"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Methadone Hydrochloride"
      sourceSection: "BOXED WARNING"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=methadone"
      sourceVersion: "2024-06"
      jurisdiction: "US"
      additionalJurisdictions: ["AU", "EU"]
      evidenceLevel: "A"
