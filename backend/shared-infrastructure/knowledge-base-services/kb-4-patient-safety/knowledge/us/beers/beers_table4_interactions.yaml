# ============================================================================
# DRUG-DRUG INTERACTIONS TO AVOID IN OLDER ADULTS
# ============================================================================

beers_interaction_entries:
  # ============================================================================
  # BLEEDING RISK INTERACTIONS
  # ============================================================================

  - id: "DDI-001"
    drug1RxNorm: "11170"
    drug1Name: "Warfarin"
    drug1Class: "Anticoagulants"
    drug2RxNorm: "1191"
    drug2Name: "Aspirin"
    drug2Class: "NSAIDs/Antiplatelet"
    interactionType: "Increased Bleeding Risk"
    severity: "Major"
    rationale: "Increased risk of bleeding. In most circumstances, avoid combining aspirin with anticoagulants in older adults."
    recommendation: "Avoid combination unless compelling indication (e.g., recent coronary stent). If used, ensure gastroprotection and close monitoring."
    qualityEvidence: "High"
    strengthRec: "Strong"
    management:
      - "Consider PPI for gastroprotection if combination required"
      - "Monitor for signs of bleeding"
      - "Reassess need for dual therapy regularly"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - id: "DDI-002"
    drug1RxNorm: "11170"
    drug1Name: "Warfarin"
    drug1Class: "Anticoagulants"
    drug2RxNorm: "5640"
    drug2Name: "Ibuprofen"
    drug2Class: "NSAIDs"
    interactionType: "Increased Bleeding Risk"
    severity: "Major"
    rationale: "NSAIDs increase risk of GI bleeding and may increase anticoagulant effect by inhibiting platelet function"
    recommendation: "Avoid combination. Use acetaminophen for pain management."
    qualityEvidence: "High"
    strengthRec: "Strong"
    management:
      - "Substitute acetaminophen for pain"
      - "If NSAID required, use lowest dose for shortest duration"
      - "Add PPI for gastroprotection"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - id: "DDI-003"
    drug1RxNorm: "1191"
    drug1Name: "Aspirin"
    drug1Class: "Antiplatelet"
    drug2RxNorm: "5640"
    drug2Name: "Ibuprofen"
    drug2Class: "NSAIDs"
    interactionType: "Increased Bleeding Risk / Reduced Cardioprotection"
    severity: "Major"
    rationale: "Increased GI bleeding risk; NSAIDs may interfere with antiplatelet effect of aspirin"
    recommendation: "Avoid concurrent use. If both required, take aspirin at least 30 minutes before or 8 hours after NSAID."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Separate dosing times if both required"
      - "Consider alternative analgesics"
      - "Add gastroprotection"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - id: "DDI-004"
    drug1RxNorm: "36437"
    drug1Name: "Sertraline"
    drug1Class: "SSRIs"
    drug2RxNorm: "11170"
    drug2Name: "Warfarin"
    drug2Class: "Anticoagulants"
    interactionType: "Increased Bleeding Risk"
    severity: "Major"
    rationale: "SSRIs impair platelet aggregation and may increase anticoagulant effect via CYP2C9 inhibition"
    recommendation: "Use with caution. Monitor INR closely; consider lower warfarin dose."
    qualityEvidence: "Moderate"
    strengthRec: "Weak"
    management:
      - "Monitor INR more frequently when starting or stopping SSRI"
      - "Monitor for bleeding signs"
      - "Consider mirtazapine or bupropion if alternative needed"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - id: "DDI-005"
    drug1RxNorm: "2623"
    drug1Name: "Clopidogrel"
    drug2RxNorm: "36567"
    drug2Name: "Omeprazole"
    drug2Class: "Proton pump inhibitors"
    interactionType: "Reduced Antiplatelet Effect"
    severity: "Major"
    rationale: "Omeprazole inhibits CYP2C19-mediated activation of clopidogrel, reducing antiplatelet effect"
    recommendation: "Avoid omeprazole and esomeprazole; use pantoprazole or H2 blocker instead."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Substitute pantoprazole, lansoprazole, or dexlansoprazole"
      - "Consider H2 receptor antagonist if gastroprotection needed"
      - "Avoid esomeprazole (similar CYP2C19 inhibition)"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  # ============================================================================
  # CNS DEPRESSION INTERACTIONS
  # ============================================================================

  - id: "DDI-006"
    drug1RxNorm: "7804"
    drug1Name: "Oxycodone"
    drug1Class: "Opioids"
    drug2RxNorm: "28439"
    drug2Name: "Alprazolam"
    drug2Class: "Benzodiazepines"
    interactionType: "Increased CNS Depression"
    severity: "Major"
    rationale: "Additive CNS depression; increased risk of serious sedation, respiratory depression, coma, and death"
    recommendation: "Avoid combination. If concurrent use medically necessary, limit dosages and duration."
    qualityEvidence: "High"
    strengthRec: "Strong"
    management:
      - "Avoid concurrent prescribing if possible"
      - "If essential, use lowest effective doses"
      - "Limit duration to minimum required"
      - "Monitor closely for respiratory depression"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - id: "DDI-007"
    drug1RxNorm: "6754"
    drug1Name: "Morphine"
    drug1Class: "Opioids"
    drug2RxNorm: "36437"
    drug2Name: "Gabapentin"
    drug2Class: "Gabapentinoids"
    interactionType: "Increased CNS Depression"
    severity: "Major"
    rationale: "Additive CNS depression; gabapentinoids associated with increased risk of severe sedation-related adverse events when combined with opioids"
    recommendation: "Avoid combination when possible. Reduce opioid dose if concurrent use necessary."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Consider dose reduction of opioid by 25-50%"
      - "Start gabapentinoid at lower dose"
      - "Monitor closely for sedation and respiratory depression"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - id: "DDI-008"
    drug1RxNorm: "6448"
    drug1Name: "Lorazepam"
    drug1Class: "Benzodiazepines"
    drug2RxNorm: "89013"
    drug2Name: "Olanzapine"
    drug2Class: "Antipsychotics"
    interactionType: "Increased CNS Depression"
    severity: "Major"
    rationale: "Additive CNS and respiratory depression; cases of death reported with parenteral combination"
    recommendation: "Avoid concurrent parenteral administration. Use extreme caution with oral combination."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Avoid parenteral combination"
      - "If oral combination necessary, use lowest doses"
      - "Monitor vital signs closely"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  # ============================================================================
  # QT PROLONGATION INTERACTIONS
  # ============================================================================

  - id: "DDI-009"
    drug1RxNorm: "42347"
    drug1Name: "Citalopram"
    drug1Class: "SSRIs"
    drug2RxNorm: "18631"
    drug2Name: "Azithromycin"
    drug2Class: "Macrolide antibiotics"
    interactionType: "QT Prolongation"
    severity: "Major"
    rationale: "Both drugs prolong QT interval; additive effect increases risk of torsades de pointes"
    recommendation: "Avoid combination. Use alternative antibiotic or antidepressant."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Consider alternative antibiotic (non-QT-prolonging)"
      - "If combination unavoidable, obtain baseline ECG"
      - "Monitor electrolytes"
      - "Watch for symptoms of arrhythmia"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - id: "DDI-010"
    drug1RxNorm: "4501"
    drug1Name: "Haloperidol"
    drug1Class: "Antipsychotics"
    drug2RxNorm: "6448"
    drug2Name: "Metoclopramide"
    drug2Class: "Antiemetics"
    interactionType: "QT Prolongation and Extrapyramidal Effects"
    severity: "Major"
    rationale: "Both drugs can prolong QT interval and cause extrapyramidal symptoms; additive effects increase risk"
    recommendation: "Avoid combination. Use alternative antiemetic."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Substitute ondansetron (if no other QT-prolonging drugs)"
      - "Consider domperidone or prochlorperazine alternatives"
      - "Monitor for EPS and QT prolongation"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  # ============================================================================
  # SEROTONIN SYNDROME INTERACTIONS
  # ============================================================================

  - id: "DDI-011"
    drug1RxNorm: "36437"
    drug1Name: "Sertraline"
    drug1Class: "SSRIs"
    drug2RxNorm: "10689"
    drug2Name: "Tramadol"
    drug2Class: "Opioid analgesics"
    interactionType: "Serotonin Syndrome Risk"
    severity: "Major"
    rationale: "Both drugs increase serotonergic activity; combination increases risk of serotonin syndrome"
    recommendation: "Avoid combination. Use alternative analgesic or antidepressant."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Use non-serotonergic analgesic (e.g., morphine, oxycodone)"
      - "If combination unavoidable, monitor for serotonin syndrome"
      - "Watch for: agitation, hyperthermia, hyperreflexia, tremor"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - id: "DDI-012"
    drug1RxNorm: "6919"
    drug1Name: "Linezolid"
    drug1Class: "Oxazolidinone antibiotics"
    drug2RxNorm: "36437"
    drug2Name: "Sertraline"
    drug2Class: "SSRIs"
    interactionType: "Serotonin Syndrome Risk"
    severity: "Major"
    rationale: "Linezolid is a reversible MAO inhibitor; combination with serotonergic drugs can cause serotonin syndrome"
    recommendation: "Avoid combination. If linezolid required, discontinue SSRI and allow washout."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Discontinue SSRI before starting linezolid if possible"
      - "Allow 2-week washout (5 weeks for fluoxetine)"
      - "Monitor closely for serotonin syndrome if overlap unavoidable"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  # ============================================================================
  # RENAL/ELECTROLYTE INTERACTIONS
  # ============================================================================

  - id: "DDI-013"
    drug1RxNorm: "3827"
    drug1Name: "Lisinopril"
    drug1Class: "ACE inhibitors"
    drug2RxNorm: "9524"
    drug2Name: "Spironolactone"
    drug2Class: "Potassium-sparing diuretics"
    interactionType: "Hyperkalemia Risk"
    severity: "Major"
    rationale: "Both drugs increase potassium; combination significantly increases hyperkalemia risk in older adults"
    recommendation: "Use with caution. Monitor potassium closely; avoid in renal impairment."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Monitor potassium within 1 week of initiation or dose change"
      - "Avoid if eGFR <30 mL/min/1.73m²"
      - "Limit spironolactone dose to 25 mg daily"
      - "Avoid potassium supplements"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - id: "DDI-014"
    drug1RxNorm: "5640"
    drug1Name: "Ibuprofen"
    drug1Class: "NSAIDs"
    drug2RxNorm: "3827"
    drug2Name: "Lisinopril"
    drug2Class: "ACE inhibitors"
    interactionType: "Reduced Antihypertensive Effect / Acute Kidney Injury"
    severity: "Major"
    rationale: "NSAIDs reduce antihypertensive effect and increase risk of acute kidney injury, especially in volume-depleted patients"
    recommendation: "Avoid combination. Use acetaminophen for pain."
    qualityEvidence: "High"
    strengthRec: "Strong"
    management:
      - "Substitute acetaminophen for pain relief"
      - "If NSAID essential, use lowest dose for shortest duration"
      - "Monitor blood pressure and renal function"
      - "Ensure adequate hydration"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  # ============================================================================
  # OTHER INTERACTIONS
  # ============================================================================

  - id: "DDI-015"
    drug1RxNorm: "10582"
    drug1Name: "Carbamazepine"
    drug1Class: "Antiepileptics"
    drug2RxNorm: "11170"
    drug2Name: "Warfarin"
    drug2Class: "Anticoagulants"
    interactionType: "Reduced Anticoagulant Effect"
    severity: "Major"
    rationale: "Carbamazepine induces CYP enzymes that metabolize warfarin, reducing anticoagulant effect"
    recommendation: "Monitor INR closely; substantial warfarin dose increase may be required."
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    management:
      - "Monitor INR frequently when starting, stopping, or adjusting carbamazepine"
      - "Expect warfarin dose increase of 50-100% may be needed"
      - "Consider alternative antiepileptic with less enzyme induction"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 4"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
