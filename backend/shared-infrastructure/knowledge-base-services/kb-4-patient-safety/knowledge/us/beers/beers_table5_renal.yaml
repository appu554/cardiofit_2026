  - rxnorm: "83367"
    drugName: "Atenolol"
    drugClass: "Beta-blockers"
    crclThreshold: 35
    thresholdOperator: "<"
    recommendation: "Reduce dose if CrCl <35 mL/min. Maximum 50 mg daily if CrCl 15-35 mL/min; 25 mg daily if <15 mL/min."
    rationale: "Renally eliminated; accumulation increases bradycardia and hypotension risk"
    alternativeSuggestion: "Consider metoprolol succinate (hepatic elimination)"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "15-35"
        adjustedDose: "Maximum 50 mg daily"
        indication: "Hypertension, angina"
      - crclRange: "<15"
        adjustedDose: "Maximum 25 mg daily"
        indication: "Hypertension, angina"
    governance:
