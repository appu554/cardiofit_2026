  - rxnorm: "10689"
    drugName: "Tramadol"
    drugClass: "Opioid analgesics"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Reduce dose and extend interval if CrCl <30 mL/min. Use immediate-release only."
    rationale: "Renally eliminated; accumulation increases seizure and serotonin syndrome risk"
    alternativeSuggestion: "Consider acetaminophen or topical analgesics"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<30"
        adjustedDose: "50-100 mg every 12 hours maximum; IR only"
        indication: "Pain management"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 5"
