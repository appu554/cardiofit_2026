  - rxnorm: "114979"
    drugName: "Pregabalin"
    drugClass: "Anticonvulsants/Neuropathic pain"
    crclThreshold: 60
    thresholdOperator: "<"
    recommendation: "Reduce dose based on CrCl. Significant dose reduction required as CrCl decreases."
    rationale: "Exclusively renally eliminated; accumulation causes CNS depression, falls, confusion"
    alternativeSuggestion: "Consider duloxetine or topical agents for neuropathic pain"
    qualityEvidence: "Moderate"
