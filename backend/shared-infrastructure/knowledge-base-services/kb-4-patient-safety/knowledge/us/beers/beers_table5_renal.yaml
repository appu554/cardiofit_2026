        adjustedDose: "200-700 mg twice daily"
        indication: "Neuropathic pain"
      - crclRange: "15-29"
        adjustedDose: "200-700 mg once daily"
        indication: "Neuropathic pain"
      - crclRange: "<15"
        adjustedDose: "100-300 mg once daily"
        indication: "Neuropathic pain"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
