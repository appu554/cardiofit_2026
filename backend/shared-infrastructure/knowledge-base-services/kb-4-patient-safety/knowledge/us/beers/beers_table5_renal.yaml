  - rxnorm: "4821"
    drugName: "Glyburide"
    drugClass: "Sulfonylureas"
    crclThreshold: 50
    thresholdOperator: "<"
    recommendation: "Avoid if CrCl <50 mL/min (AGS recommends avoiding in all older adults)"
    rationale: "Active metabolites accumulate; increased risk of prolonged hypoglycemia"
    alternativeSuggestion: "Consider glipizide (shorter-acting), glimepiride with caution, or non-sulfonylurea agents"
    qualityEvidence: "High"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<50"
        adjustedDose: "Avoid"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
