beers_renal_entries:
  # ============================================================================
  # ANTICOAGULANTS
  # ============================================================================

  - rxnorm: "1364430"
    drugName: "Dabigatran"
    drugClass: "Direct thrombin inhibitors"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Avoid if CrCl <30 mL/min. For CrCl 30-50 mL/min, consider dose reduction to 75 mg twice daily for VTE treatment."
    rationale: "Primarily renally eliminated; accumulation leads to increased bleeding risk"
    alternativeSuggestion: "Consider apixaban or warfarin with close monitoring"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "30-50"
        adjustedDose: "75 mg twice daily"
        indication: "VTE treatment/prophylaxis"
      - crclRange: "<30"
        adjustedDose: "Avoid"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 5"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - rxnorm: "1114195"
    drugName: "Rivaroxaban"
    drugClass: "Factor Xa inhibitors"
    crclThreshold: 15
    thresholdOperator: "<"
    recommendation: "Avoid if CrCl <15 mL/min. For CrCl 15-50 mL/min, dose adjustment varies by indication."
    rationale: "Approximately 36% renally eliminated; reduced clearance increases bleeding risk"
    alternativeSuggestion: "Warfarin with close INR monitoring for severe renal impairment"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "15-50"
        adjustedDose: "15 mg daily with evening meal"
        indication: "NVAF"
      - crclRange: "<15"
        adjustedDose: "Avoid"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 5"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - rxnorm: "1232082"
    drugName: "Apixaban"
    drugClass: "Factor Xa inhibitors"
    crclThreshold: 25
    thresholdOperator: "<"
    recommendation: "Reduce dose to 2.5 mg twice daily if CrCl <25 mL/min OR if 2 of 3 criteria met: age ≥80, weight ≤60 kg, SCr ≥1.5 mg/dL"
    rationale: "Less renally eliminated than other DOACs but dose adjustment still recommended"
    alternativeSuggestion: "Can be used with caution in ESRD on dialysis for NVAF (limited data)"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<25"
        adjustedDose: "2.5 mg twice daily"
        indication: "NVAF"
      - crclRange: "ESRD on HD"
        adjustedDose: "5 mg twice daily (or 2.5 mg if dose reduction criteria met)"
        indication: "NVAF only"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 5"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - rxnorm: "1599538"
    drugName: "Edoxaban"
    drugClass: "Factor Xa inhibitors"
    crclThreshold: 15
    thresholdOperator: "<"
    recommendation: "Avoid if CrCl <15 mL/min or CrCl >95 mL/min (reduced efficacy). Reduce to 30 mg daily if CrCl 15-50 mL/min."
    rationale: "Approximately 50% renally eliminated; reduced clearance increases bleeding risk"
    alternativeSuggestion: "Apixaban or warfarin for CrCl <15 mL/min"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "15-50"
        adjustedDose: "30 mg once daily"
        indication: "NVAF, VTE"
      - crclRange: "<15 or >95"
        adjustedDose: "Avoid"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 5"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - rxnorm: "67108"
    drugName: "Enoxaparin"
    drugClass: "Low molecular weight heparins"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Reduce dose to 30 mg once daily (prophylaxis) or 1 mg/kg once daily (treatment) if CrCl <30 mL/min"
    rationale: "Primarily renally eliminated; accumulation increases bleeding risk"
    alternativeSuggestion: "Unfractionated heparin may be preferred in severe renal impairment"
    qualityEvidence: "High"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<30"
        adjustedDose: "30 mg once daily"
        indication: "VTE prophylaxis"
      - crclRange: "<30"
        adjustedDose: "1 mg/kg once daily"
        indication: "VTE treatment"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 5"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

