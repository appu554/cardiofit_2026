  # ============================================================================
  # CARDIOVASCULAR AGENTS
  # ============================================================================

  - rxnorm: "3827"
    drugName: "Digoxin"
    drugClass: "Cardiac glycosides"
    crclThreshold: 50
    thresholdOperator: "<"
    recommendation: "Reduce dose if CrCl <50 mL/min. Target serum level <1.0 ng/mL."
    rationale: "Primarily renally eliminated; accumulation causes toxicity (arrhythmias, visual disturbances, GI symptoms)"
    alternativeSuggestion: "Consider beta-blocker for rate control in atrial fibrillation"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<50"
        adjustedDose: "0.0625-0.125 mg daily or every other day"
        indication: "Heart rate control"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
