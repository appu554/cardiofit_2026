    drugClass: "Anticonvulsants/Neuropathic pain"
    crclThreshold: 60
    thresholdOperator: "<"
    recommendation: "Reduce dose based on CrCl. Significant dose reduction required for CrCl <30 mL/min."
    rationale: "Exclusively renally eliminated; accumulation causes CNS depression, ataxia, falls"
    alternativeSuggestion: "Consider duloxetine (if no renal impairment) or topical lidocaine for neuropathic pain"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
