      knowledgeVersion: "2025.1"

  - rxnorm: "82122"
    drugName: "Levofloxacin"
    drugClass: "Fluoroquinolones"
    crclThreshold: 50
    thresholdOperator: "<"
    recommendation: "Reduce dose if CrCl <50 mL/min according to product labeling"
    rationale: "Primarily renally eliminated; accumulation increases CNS and tendon toxicity risk"
    alternativeSuggestion: "Consider alternative antibiotics based on culture and sensitivity"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "20-49"
        adjustedDose: "750 mg initially, then 500 mg daily; or 500 mg initially, then 250 mg daily"
        indication: "Varies by infection"
      - crclRange: "<20"
        adjustedDose: "Further reduction required per labeling"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
