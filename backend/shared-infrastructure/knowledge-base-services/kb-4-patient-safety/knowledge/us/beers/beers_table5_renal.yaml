      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - rxnorm: "9524"
    drugName: "Spironolactone"
    drugClass: "Potassium-sparing diuretics"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Avoid if CrCl <30 mL/min. Use with extreme caution if CrCl 30-50 mL/min."
    rationale: "Increased risk of hyperkalemia; reduced clearance prolongs effect"
    alternativeSuggestion: "Consider eplerenone with similar cautions; or loop diuretic alone"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
