  - rxnorm: "6813"
    drugName: "Meperidine"
    drugClass: "Opioid analgesics"
    crclThreshold: 50
    thresholdOperator: "<"
    recommendation: "Avoid in all older adults; avoid especially if CrCl <50 mL/min"
    rationale: "Neurotoxic metabolite (normeperidine) accumulates; causes seizures, delirium"
    alternativeSuggestion: "Use any other opioid analgesic"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<50"
        adjustedDose: "Avoid"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
