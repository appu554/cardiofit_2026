  - rxnorm: "6754"
    drugName: "Morphine"
    drugClass: "Opioid analgesics"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Reduce dose and increase interval. Avoid in severe renal impairment."
    rationale: "Active metabolite (M6G) accumulates; increased risk of CNS depression and respiratory depression"
    alternativeSuggestion: "Consider fentanyl or hydromorphone (safer metabolite profiles)"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<30"
        adjustedDose: "Reduce dose by 50-75%; extend interval"
        indication: "Pain management"
      - crclRange: "<15"
        adjustedDose: "Avoid; use alternative opioid"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 5"
