  - rxnorm: "7980"
    drugName: "Nitrofurantoin"
    drugClass: "Urinary anti-infectives"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Avoid if CrCl <30 mL/min"
    rationale: "Lack of efficacy due to inadequate drug concentration in urine; increased risk of pulmonary toxicity"
    alternativeSuggestion: "Use trimethoprim-sulfamethoxazole or fosfomycin for uncomplicated UTI"
    qualityEvidence: "Low"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<30"
        adjustedDose: "Avoid"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
