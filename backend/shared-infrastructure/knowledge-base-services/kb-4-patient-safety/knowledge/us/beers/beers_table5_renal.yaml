  - rxnorm: "25789"
    drugName: "Sitagliptin"
    drugClass: "DPP-4 inhibitors"
    crclThreshold: 50
    thresholdOperator: "<"
    recommendation: "Reduce dose based on CrCl: 50 mg daily if CrCl 30-50 mL/min; 25 mg daily if CrCl <30 mL/min"
    rationale: "Primarily renally eliminated; dose adjustment prevents accumulation"
    alternativeSuggestion: "Linagliptin does not require renal dose adjustment"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "30-50"
        adjustedDose: "50 mg once daily"
        indication: "Type 2 diabetes"
      - crclRange: "<30"
        adjustedDose: "25 mg once daily"
        indication: "Type 2 diabetes"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 5"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

