  - rxnorm: "10831"
    drugName: "Trimethoprim-Sulfamethoxazole"
    drugClass: "Sulfonamide antibiotics"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Reduce dose by 50% if CrCl 15-30 mL/min. Avoid if CrCl <15 mL/min"
    rationale: "Renally eliminated; accumulation increases risk of hyperkalemia, bone marrow suppression"
    alternativeSuggestion: "Consider fosfomycin for UTI; alternative antibiotics for other infections"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "15-30"
        adjustedDose: "50% of standard dose"
        indication: "All indications"
      - crclRange: "<15"
        adjustedDose: "Avoid"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
