  - rxnorm: "2551"
    drugName: "Ciprofloxacin"
    drugClass: "Fluoroquinolones"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Reduce dose to 250-500 mg every 12-24 hours if CrCl <30 mL/min"
    rationale: "Partially renally eliminated; accumulation increases CNS and tendon toxicity risk"
    alternativeSuggestion: "Consider alternative antibiotics if available based on culture"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<30"
        adjustedDose: "250-500 mg every 12-24 hours"
        indication: "Varies by infection"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
