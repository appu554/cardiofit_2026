  - rxnorm: "6851"
    drugName: "Metformin"
    drugClass: "Biguanides"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Avoid if eGFR <30 mL/min/1.73m². Reduce dose if eGFR 30-45 mL/min/1.73m²."
    rationale: "Risk of lactic acidosis increases with decreased renal function"
    alternativeSuggestion: "Consider DPP-4 inhibitors, GLP-1 agonists, or insulin"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "30-45"
        adjustedDose: "Maximum 1000 mg daily; do not initiate therapy"
        indication: "Type 2 diabetes"
      - crclRange: "<30"
        adjustedDose: "Avoid"
        indication: "All indications"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
