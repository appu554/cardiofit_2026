      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - rxnorm: "2101"
    drugName: "Colchicine"
    drugClass: "Antigout agents"
    crclThreshold: 30
    thresholdOperator: "<"
    recommendation: "Reduce dose if CrCl <30 mL/min. Avoid with concomitant P-gp or CYP3A4 inhibitors in renal impairment."
    rationale: "Reduced clearance increases toxicity risk; drug interactions magnify this"
    alternativeSuggestion: "Consider NSAIDs (if not contraindicated) or corticosteroids for gout flares"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    doseAdjustment:
      - crclRange: "<30"
        adjustedDose: "0.3 mg once daily maximum"
        indication: "Gout prophylaxis"
      - crclRange: "<30"
        adjustedDose: "0.6 mg x 1, may repeat in 1 hour (max 1.2 mg/flare)"
        indication: "Acute gout"
