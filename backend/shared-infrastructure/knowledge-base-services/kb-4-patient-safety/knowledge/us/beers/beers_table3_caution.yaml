    rationale: "May exacerbate or cause SIADH or hyponatremia; monitor sodium closely when starting or changing dosage"
    recommendation: "Use with caution; monitor sodium"
    qualityEvidence: "Moderate"
    strengthRec: "Weak"
    monitoringRequired:
