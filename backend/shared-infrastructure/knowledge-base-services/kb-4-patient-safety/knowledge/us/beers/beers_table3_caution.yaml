    drugClass: "Opioid analgesics"
    rationale: "Increased risk of falls, fractures, constipation, nausea, sedation, respiratory depression"
    recommendation: "Use lowest effective dose; monitor for adverse effects"
    qualityEvidence: "High"
    strengthRec: "Strong"
    monitoringRequired:
