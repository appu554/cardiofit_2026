  - rxnorm: "10689"
    drugName: "Tramadol"
    drugClass: "Opioid analgesics"
    rationale: "CNS adverse effects; may cause or exacerbate SIADH or hyponatremia; lowers seizure threshold"
    recommendation: "Use with caution; monitor for CNS effects and sodium"
    qualityEvidence: "Moderate"
    strengthRec: "Weak"
    monitoringRequired:
      - parameter: "CNS effects"
        frequency: "At each visit"
      - parameter: "Serum sodium"
        frequency: "Periodically"
