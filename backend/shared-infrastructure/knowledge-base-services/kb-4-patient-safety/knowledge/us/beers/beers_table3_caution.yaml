      effectiveDate: "2023-05-04"
      reviewDate: "2026-05-04"
      approvalStatus: "ACTIVE"
      jurisdiction: "US"
      knowledgeVersion: "2025.1"

  - rxnorm: "1364430"
    drugName: "Dabigatran"
    drugClass: "Direct oral anticoagulants"
    rationale: "Increased risk of GI bleeding compared with warfarin and other DOACs in adults aged ≥75 years"
    recommendation: "Use with caution in adults aged ≥75 years or CrCl <30 mL/min"
    qualityEvidence: "Moderate"
    strengthRec: "Weak"
    monitoringRequired:
      - parameter: "Renal function"
        frequency: "At least annually"
      - parameter: "Signs of bleeding"
        frequency: "At each visit"
