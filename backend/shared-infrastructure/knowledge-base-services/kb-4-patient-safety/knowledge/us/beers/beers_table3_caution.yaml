  - rxnorm: "3827"
    drugName: "Digoxin"
    drugClass: "Cardiac glycosides"
    rationale: "Use in heart failure may be associated with increased mortality; decreased renal clearance may increase risk of toxicity"
    recommendation: "Avoid doses >0.125 mg/day; reduce dose or discontinue if used for rate control"
    qualityEvidence: "Moderate"
    strengthRec: "Strong"
    monitoringRequired:
      - parameter: "Serum digoxin level"
        frequency: "At initiation, dose change, renal change"
      - parameter: "Renal function"
        frequency: "Every 6 months"
      - parameter: "Heart rate"
        frequency: "At each visit"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
