    drugName: "Rivaroxaban"
    drugClass: "Direct oral anticoagulants"
    rationale: "Increased risk of GI bleeding compared to warfarin in adults aged ≥75 years"
    recommendation: "Use with caution in adults aged ≥75 years"
    qualityEvidence: "Moderate"
