beers_caution_entries:
  # --- Cardiovascular Agents ---
  - rxnorm: "1191"
    drugName: "Aspirin"
    drugClass: "Antiplatelet agents"
    rationale: "Risk of major bleeding with age ≥70 years; lack of evidence for primary prevention of cardiovascular events in adults ≥70"
    recommendation: "Use with caution for primary prevention in adults aged ≥70 years"
    qualityEvidence: "Moderate"
    strengthRec: "Weak"
    monitoringRequired:
      - parameter: "Signs of bleeding"
        frequency: "At each visit"
      - parameter: "Hemoglobin/hematocrit"
        frequency: "Annually or if symptomatic"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "2023 AGS Beers Criteria Update"
      sourceUrl: "https://doi.org/10.1111/jgs.18372"
      sourceSection: "Table 3"
