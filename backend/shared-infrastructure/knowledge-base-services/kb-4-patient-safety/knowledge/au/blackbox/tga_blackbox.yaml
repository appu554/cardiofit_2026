    drugName: "Tacrolimus"
    atcCode: "L04AD02"
    warningTitle: "Serious Infections; Malignancy; Nephrotoxicity"
    warningText: "Increased susceptibility to infection and possible development of lymphoma and other malignancies. Only physicians experienced in immunosuppressive therapy should prescribe. Monitor renal function closely."
    severity: "CRITICAL"
    governance:
