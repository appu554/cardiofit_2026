    warningTitle: "Thyroid C-Cell Tumours"
    warningText: "GLP-1 receptor agonists caused thyroid C-cell tumours in rodents. Contraindicated in patients with personal or family history of medullary thyroid carcinoma or MEN2. Counsel patients about potential thyroid tumour symptoms."
