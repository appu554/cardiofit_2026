    drugName: "Vancomycin"
    atcCode: "J01XA01"
    warningTitle: "Nephrotoxicity; Ototoxicity"
    warningText: "Vancomycin can cause nephrotoxicity and ototoxicity. Risk increases with prolonged therapy, high doses, renal impairment, and concomitant nephrotoxic/ototoxic drugs. Monitor renal function and serum concentrations."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Vancocin Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
