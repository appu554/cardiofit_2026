    atcCode: "R03DA04"
    warningTitle: "Narrow Therapeutic Index; Seizures; Arrhythmias"
    warningText: "Theophylline has a narrow therapeutic index. Serum concentrations above 20 mcg/mL increase risk of toxicity. Life-threatening toxicity includes seizures and cardiac arrhythmias. Many drug interactions affect theophylline levels."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Nuelin Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
