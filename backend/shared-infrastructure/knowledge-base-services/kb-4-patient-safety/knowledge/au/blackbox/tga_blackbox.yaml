    atcCode: "J01XX08"
    warningTitle: "Myelosuppression; Serotonin Syndrome"
    warningText: "Myelosuppression including anaemia, thrombocytopenia, and neutropenia has been reported. Monitor complete blood counts weekly. Risk of serotonin syndrome with serotonergic drugs - linezolid has MAO inhibitor activity."
    severity: "HIGH"
    governance:
