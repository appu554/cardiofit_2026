    atcCode: "L04AD01"
    warningTitle: "Nephrotoxicity; Malignancy; Serious Infections"
    warningText: "Cyclosporin can cause structural kidney damage. Monitor renal function. Increased susceptibility to infection and development of lymphoma and other malignancies, particularly skin. Avoid excessive UV exposure."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Neoral Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
