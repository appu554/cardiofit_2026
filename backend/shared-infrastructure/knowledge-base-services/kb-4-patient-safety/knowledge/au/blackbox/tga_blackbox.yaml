    warningTitle: "Teratogenicity; Haematologic Toxicity; VTE"
    warningText: "Lenalidomide is structurally similar to thalidomide and causes severe birth defects. Available only through restricted programme. Significant neutropenia and thrombocytopenia occur. Deep vein thrombosis and pulmonary embolism risk."
