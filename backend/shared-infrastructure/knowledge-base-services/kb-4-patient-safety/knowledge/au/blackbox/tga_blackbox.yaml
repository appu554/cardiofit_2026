    warningText: "ESAs increase risk of death and serious cardiovascular events when haemoglobin target exceeds 120 g/L. Shortened overall survival and/or time to tumour progression in patients with cancer. Use lowest dose to avoid transfusion."
    severity: "CRITICAL"
    governance:
