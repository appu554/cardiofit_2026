    atcCode: "A10BK01"
    warningTitle: "Lower Limb Amputation Risk"
    warningText: "SGLT2 inhibitors may increase risk of lower limb amputation, primarily affecting toes and midfoot. Risk factors include prior amputation, peripheral vascular disease, neuropathy. Counsel patients on foot care and monitor for infection."
    severity: "HIGH"
