    atcCode: "B03XA02"
    warningTitle: "Increased Mortality and Tumour Progression"
    warningText: "ESAs increase risk of death, myocardial infarction, stroke, and tumour progression when dosed to haemoglobin >120 g/L. Not indicated in patients receiving myelosuppressive chemotherapy when cure is the anticipated outcome."
    severity: "CRITICAL"
