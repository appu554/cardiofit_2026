entries:
  # ==========================================================================
  # CARDIOVASCULAR MEDICATIONS
  # ==========================================================================

  - rxnorm: "32968"
    drugName: "Warfarin"
    atcCode: "B01AA03"
    warningTitle: "Bleeding Risk"
    warningText: "Warfarin can cause major or fatal bleeding. Regular INR monitoring is essential. Risk factors include age >65, history of GI bleeding, hypertension, cerebrovascular disease, serious heart disease, anaemia, malignancy, trauma, renal insufficiency, and certain genetic variations."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Coumadin Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "1364430"
    drugName: "Apixaban"
    atcCode: "B01AF02"
    warningTitle: "Bleeding and Spinal/Epidural Haematoma Risk"
    warningText: "Apixaban increases bleeding risk including potentially fatal bleeding. Epidural or spinal haematomas may occur in patients receiving neuraxial anaesthesia or undergoing spinal puncture. These haematomas may result in long-term or permanent paralysis."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Eliquis Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "1114195"
    drugName: "Rivaroxaban"
    atcCode: "B01AF01"
    warningTitle: "Bleeding and Spinal/Epidural Haematoma Risk"
    warningText: "Rivaroxaban increases risk of bleeding, including potentially fatal haemorrhage. Premature discontinuation increases risk of thrombotic events. Epidural or spinal haematomas may occur in patients receiving neuraxial anaesthesia."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Xarelto Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "1037045"
    drugName: "Dabigatran"
    atcCode: "B01AE07"
    warningTitle: "Bleeding and Spinal/Epidural Haematoma Risk"
    warningText: "Dabigatran can cause serious and potentially fatal bleeding. Spinal or epidural haematomas may occur in patients treated with dabigatran who are receiving neuraxial anaesthesia or undergoing spinal puncture."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Pradaxa Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "3827"
    drugName: "Digoxin"
    atcCode: "C01AA05"
    warningTitle: "Narrow Therapeutic Index - Toxicity Risk"
    warningText: "Digoxin has a narrow therapeutic index. Toxicity may occur at doses only slightly above therapeutic levels. Serum digoxin levels should be monitored. Risk factors include renal impairment, electrolyte disturbances (hypokalaemia, hypomagnesaemia, hypercalcaemia), and drug interactions."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Lanoxin Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "703"
    drugName: "Amiodarone"
    atcCode: "C01BD01"
    warningTitle: "Pulmonary, Hepatic, and Thyroid Toxicity"
    warningText: "Amiodarone can cause potentially fatal pulmonary toxicity (hypersensitivity pneumonitis or interstitial/alveolar pneumonitis). Hepatotoxicity including hepatic failure and death has occurred. Thyroid abnormalities (hypo- and hyperthyroidism) are common. Regular monitoring required."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Cordarone Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "9947"
    drugName: "Sotalol"
    atcCode: "C07AA07"
    warningTitle: "Proarrhythmic Effects - QT Prolongation"
    warningText: "Sotalol can cause life-threatening ventricular arrhythmias, primarily torsades de pointes, associated with QT prolongation. Facilities and personnel for cardiac monitoring and resuscitation must be available during initiation. Dose must be adjusted for renal function."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Sotacor Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # OPIOID ANALGESICS
  # ==========================================================================

  - rxnorm: "7804"
    drugName: "Oxycodone"
    atcCode: "N02AA05"
    warningTitle: "Addiction, Abuse, and Misuse; Respiratory Depression"
    warningText: "Oxycodone exposes users to risks of addiction, abuse, and misuse, which can lead to overdose and death. Serious, life-threatening, or fatal respiratory depression may occur. Accidental ingestion, especially by children, can result in fatal overdose."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "OxyContin Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "4337"
    drugName: "Fentanyl"
    atcCode: "N02AB03"
    warningTitle: "Serious Respiratory Depression; Accidental Exposure"
    warningText: "Fentanyl exposes patients to risks of addiction, abuse, and misuse. Life-threatening respiratory depression can occur. Accidental exposure especially in children can cause fatal overdose. Transdermal patches must be disposed of properly."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Durogesic Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "5489"
    drugName: "Hydromorphone"
    atcCode: "N02AA03"
    warningTitle: "Respiratory Depression; Addiction Risk"
    warningText: "Hydromorphone exposes users to risks of opioid addiction, abuse, and misuse. Serious, life-threatening, or fatal respiratory depression may occur. High concentration formulations are for opioid-tolerant patients only."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Jurnista Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "6813"
    drugName: "Morphine"
    atcCode: "N02AA01"
    warningTitle: "Respiratory Depression; Addiction, Abuse, Misuse"
    warningText: "Morphine exposes users to risks of opioid addiction, abuse, and misuse. Serious, life-threatening, or fatal respiratory depression may occur. Extended-release formulations are indicated for opioid-tolerant patients only."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "MS Contin Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "10689"
    drugName: "Tramadol"
    atcCode: "N02AX02"
    warningTitle: "Seizure Risk; Respiratory Depression"
    warningText: "Tramadol may cause seizures, especially at higher doses or with concomitant medications that lower seizure threshold. Risk of potentially fatal respiratory depression. Serotonin syndrome risk with serotonergic drugs."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Tramal Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "2670"
    drugName: "Codeine"
    atcCode: "N02AA08"
    warningTitle: "Ultra-rapid Metabolisers; Paediatric Deaths"
    warningText: "Deaths have occurred in children receiving codeine following tonsillectomy and/or adenoidectomy. Codeine is contraindicated in children under 12 and post-operatively in children under 18 following tonsillectomy/adenoidectomy. Ultra-rapid metabolisers convert codeine to morphine faster, causing toxicity."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "TGA PI - Codeine Products"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # ANTIPSYCHOTICS
  # ==========================================================================

  - rxnorm: "89013"
    drugName: "Clozapine"
    atcCode: "N05AH02"
    warningTitle: "Agranulocytosis; Myocarditis; Seizures"
    warningText: "Clozapine can cause agranulocytosis, a potentially fatal condition. Patients must be enrolled in a clozapine monitoring programme with mandatory blood monitoring. Myocarditis and cardiomyopathy can occur, especially in first month. Seizure risk is dose-related."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Clozaril Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "7531"
    drugName: "Olanzapine"
    atcCode: "N05AH03"
    warningTitle: "Increased Mortality in Elderly with Dementia"
    warningText: "Elderly patients with dementia-related psychosis treated with antipsychotics are at increased risk of death. Olanzapine is not approved for treating dementia-related psychosis. Metabolic effects including hyperglycaemia and diabetes require monitoring."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Zyprexa Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "8076"
    drugName: "Risperidone"
    atcCode: "N05AX08"
    warningTitle: "Increased Mortality in Elderly with Dementia"
    warningText: "Elderly patients with dementia-related psychosis treated with antipsychotics are at increased risk of death. Cerebrovascular adverse events including stroke have occurred in elderly patients with dementia."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Risperdal Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "73178"
    drugName: "Quetiapine"
    atcCode: "N05AH04"
    warningTitle: "Increased Mortality in Elderly with Dementia; Suicidality"
    warningText: "Elderly patients with dementia-related psychosis treated with antipsychotics are at increased risk of death. Antidepressant-like effects associated with increased risk of suicidal thinking and behaviour in young people."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Seroquel Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "89808"
    drugName: "Aripiprazole"
    atcCode: "N05AX12"
    warningTitle: "Suicidality in Children/Adolescents; Compulsive Behaviours"
    warningText: "Increased risk of suicidal thinking and behaviour in children and adolescents with major depressive disorder. Pathological gambling and other compulsive behaviours have been reported. Patients should be monitored for impulse control disorders."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Abilify Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # ANTIDEPRESSANTS
  # ==========================================================================

  - rxnorm: "36437"
    drugName: "Fluoxetine"
    atcCode: "N06AB03"
    warningTitle: "Suicidality in Children and Adolescents"
    warningText: "Antidepressants increased the risk of suicidal thinking and behaviour in children and adolescents in short-term studies. Monitor closely for clinical worsening and suicidality, especially at treatment initiation and dose changes."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Prozac Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "39786"
    drugName: "Sertraline"
    atcCode: "N06AB06"
    warningTitle: "Suicidality in Children and Adolescents"
    warningText: "Antidepressants may increase suicidal thoughts and behaviours in paediatric patients. Close monitoring is required, especially early in treatment and following dose adjustments."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Zoloft Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "72625"
    drugName: "Venlafaxine"
    atcCode: "N06AX16"
    warningTitle: "Suicidality; Discontinuation Syndrome"
    warningText: "Increased risk of suicidal thinking and behaviour in children, adolescents, and young adults. Abrupt discontinuation may cause discontinuation syndrome. Blood pressure monitoring required due to dose-related hypertension."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Efexor Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "42347"
    drugName: "Duloxetine"
    atcCode: "N06AX21"
    warningTitle: "Suicidality; Hepatotoxicity"
    warningText: "Increased risk of suicidal thinking and behaviour in children, adolescents, and young adults. Should not be used in patients with substantial alcohol use or chronic liver disease. Hepatic failure and death have been reported."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Cymbalta Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # DISEASE-MODIFYING ANTIRHEUMATIC DRUGS (DMARDs)
  # ==========================================================================

  - rxnorm: "6851"
    drugName: "Methotrexate"
    atcCode: "L01BA01"
    warningTitle: "Bone Marrow Suppression; Hepatotoxicity; Pulmonary Toxicity"
    warningText: "Methotrexate can cause severe bone marrow suppression, aplastic anaemia, and GI toxicity. Deaths have occurred from toxic epidermal necrolysis, hepatotoxicity, and pulmonary disease. Must only be administered once weekly for rheumatological indications - daily dosing is fatal."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Methoblastin Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "27169"
    drugName: "Leflunomide"
    atcCode: "L04AA13"
    warningTitle: "Hepatotoxicity; Teratogenicity"
    warningText: "Severe liver injury including fatal liver failure has been reported. Leflunomide is contraindicated in pregnancy. Women of childbearing potential must use effective contraception. Elimination procedure required before pregnancy."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Arava Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "103"
    drugName: "Adalimumab"
    atcCode: "L04AB04"
    warningTitle: "Serious Infections; Malignancy Risk"
    warningText: "Patients are at increased risk for developing serious infections including tuberculosis, invasive fungal infections, and opportunistic infections. Lymphoma and other malignancies have been reported. Screen for latent TB before initiation."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Humira Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "327361"
    drugName: "Etanercept"
    atcCode: "L04AB01"
    warningTitle: "Serious Infections; Malignancy"
    warningText: "Patients treated with etanercept are at increased risk for serious infections. Lymphoma and other malignancies have been reported in children and adolescents. Screen for TB before treatment initiation."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Enbrel Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "191831"
    drugName: "Infliximab"
    atcCode: "L04AB02"
    warningTitle: "Serious Infections; Malignancy; Hepatosplenic T-cell Lymphoma"
    warningText: "Risk of serious infections including tuberculosis and invasive fungal infections. Hepatosplenic T-cell lymphoma has occurred in adolescents and young adults with inflammatory bowel disease. Screen for latent TB."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Remicade Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # ANTICONVULSANTS
  # ==========================================================================

  - rxnorm: "28439"
    drugName: "Carbamazepine"
    atcCode: "N03AF01"
    warningTitle: "Serious Dermatological Reactions; HLA-B*1502"
    warningText: "Serious and sometimes fatal dermatological reactions including Stevens-Johnson syndrome and toxic epidermal necrolysis have occurred. HLA-B*1502 allele is strongly associated with SJS/TEN risk - screening recommended in patients of Asian ancestry before initiation."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Tegretol Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "28439"
    drugName: "Lamotrigine"
    atcCode: "N03AX09"
    warningTitle: "Serious Skin Rash; Stevens-Johnson Syndrome"
    warningText: "Lamotrigine can cause serious and potentially life-threatening rash including Stevens-Johnson syndrome and toxic epidermal necrolysis. Risk is highest during first 8 weeks. Slow dose titration reduces risk. Discontinue at first sign of rash."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Lamictal Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "11170"
    drugName: "Valproate (Sodium Valproate)"
    atcCode: "N03AG01"
    warningTitle: "Teratogenicity; Hepatotoxicity; Pancreatitis"
    warningText: "Valproate can cause major congenital malformations including neural tube defects. Contraindicated in pregnancy unless essential. Life-threatening hepatotoxicity and pancreatitis can occur. Not recommended in women of childbearing potential unless Pregnancy Prevention Programme followed."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Epilim Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  - rxnorm: "8183"
    drugName: "Phenytoin"
    atcCode: "N03AB02"
    warningTitle: "Cardiovascular Risk with IV Administration; Dermatological Reactions"
    warningText: "Severe cardiovascular reactions and fatalities have occurred with rapid IV administration. Maximum infusion rate must not exceed 50 mg/min. Serious skin reactions including SJS/TEN have occurred. HLA-B*1502 associated with increased risk."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Dilantin Australian PI"
      sourceUrl: "https://www.tga.gov.au/product-information"
      sourceSection: "Boxed Warning"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "AU"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # DIABETES MEDICATIONS
  # ==========================================================================

  - rxnorm: "6809"
    drugName: "Metformin"
    atcCode: "A10BA02"
    warningTitle: "Lactic Acidosis"
    warningText: "Metformin can cause lactic acidosis, a rare but serious metabolic complication. Risk factors include renal impairment, hepatic impairment, excessive alcohol intake, and conditions causing hypoxia. Temporarily discontinue before iodinated contrast procedures."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Glucophage Australian PI"
