    drugName: "Moxifloxacin"
    atcCode: "J01MA14"
    warningTitle: "Tendinitis; Peripheral Neuropathy; QT Prolongation"
    warningText: "Risk of disabling and potentially irreversible tendinitis, tendon rupture, and peripheral neuropathy. Moxifloxacin causes QT prolongation - avoid in patients with risk factors for torsades de pointes."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Avelox Australian PI"
