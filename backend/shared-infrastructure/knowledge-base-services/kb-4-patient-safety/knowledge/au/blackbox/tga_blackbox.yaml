    drugName: "Nitrofurantoin"
    atcCode: "J01XE01"
    warningTitle: "Pulmonary Toxicity; Hepatotoxicity"
    warningText: "Acute, subacute, and chronic pulmonary reactions have occurred. Chronic pulmonary reactions can be insidious with malaise and dyspnoea. Hepatic reactions including chronic active hepatitis and hepatic necrosis occur rarely."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Macrodantin Australian PI"
