    drugName: "Hydroxychloroquine"
    atcCode: "P01BA02"
    warningTitle: "Retinal Toxicity; QT Prolongation"
    warningText: "Irreversible retinal damage may occur with long-term use. Annual ophthalmological examination recommended after 5 years of use. QT prolongation and cardiomyopathy reported. Caution with concomitant QT-prolonging drugs."
