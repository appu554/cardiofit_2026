    atcCode: "L04AX02"
    warningTitle: "Severe Birth Defects; VTE Risk"
    warningText: "Thalidomide causes severe life-threatening birth defects. Females of reproductive potential must use two forms of contraception. Available only through restricted programme. Significantly increases risk of venous thromboembolism."
    severity: "CRITICAL"
    governance:
