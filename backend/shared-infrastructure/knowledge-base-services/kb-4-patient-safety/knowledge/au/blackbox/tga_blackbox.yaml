    drugName: "Ciprofloxacin"
    atcCode: "J01MA02"
    warningTitle: "Tendinitis and Tendon Rupture; Peripheral Neuropathy"
    warningText: "Fluoroquinolones are associated with disabling and potentially irreversible serious adverse reactions including tendinitis and tendon rupture, peripheral neuropathy, and CNS effects. Reserve for conditions without alternative treatment options."
    severity: "HIGH"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Ciproxin Australian PI"
