    drugName: "Isotretinoin"
    atcCode: "D10BA01"
    warningTitle: "Teratogenicity; Psychiatric Effects"
    warningText: "Isotretinoin is a potent teratogen. Pregnancy must be excluded before treatment and prevented during treatment and for one month after. Cases of depression, psychosis, and suicide have been reported - monitor for psychiatric symptoms."
    severity: "CRITICAL"
    governance:
