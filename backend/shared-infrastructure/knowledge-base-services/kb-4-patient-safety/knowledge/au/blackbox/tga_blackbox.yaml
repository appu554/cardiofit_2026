    atcCode: "M04AC01"
    warningTitle: "Fatal Overdose; Bone Marrow Suppression"
    warningText: "Fatal overdoses have occurred. The margin between effective and toxic doses is small. Reduce dose in renal or hepatic impairment and with P-glycoprotein or CYP3A4 inhibitors. Bone marrow suppression with prolonged use."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "TGA"
      sourceDocument: "Colchicine Australian PI"
