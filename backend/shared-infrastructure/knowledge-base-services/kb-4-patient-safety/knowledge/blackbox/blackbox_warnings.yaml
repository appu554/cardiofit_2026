  # ==========================================================================
  # OPIOIDS - High addiction and respiratory depression risk
  # ==========================================================================
  - rxnorm: "7804"
    drugName: "Oxycodone"
    drugClass: "Opioid Analgesic"
    atcCode: "N02AA05"
    riskCategories:
      - "ADDICTION"
      - "RESPIRATORY_DEPRESSION"
      - "NEONATAL_OPIOID_WITHDRAWAL"
      - "CYTOCHROME_P450_INTERACTION"
    warningText: "ADDICTION, ABUSE, AND MISUSE: Oxycodone exposes patients and other users to the risks of opioid addiction, abuse, and misuse, which can lead to overdose and death. Assess each patient's risk prior to prescribing and monitor all patients regularly for the development of these behaviors or conditions."
    severity: "CRITICAL"
    hasRems: false
    remsProgram: ""
    remsRequirements: []
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Oxycodone Hydrochloride"
      sourceSection: "BOXED WARNING"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=oxycodone"
      sourceVersion: "2024-09"
      jurisdiction: "US"
      additionalJurisdictions: ["AU", "EU"]
      evidenceLevel: "A"
      effectiveDate: "2024-09-01"
      reviewDate: "2025-09-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      approvedBy: "CMO"
      approvedAt: "2025-01-01"

  - rxnorm: "7052"
    drugName: "Morphine"
    drugClass: "Opioid Analgesic"
    atcCode: "N02AA01"
    riskCategories:
      - "ADDICTION"
      - "RESPIRATORY_DEPRESSION"
      - "NEONATAL_OPIOID_WITHDRAWAL"
      - "ACCIDENTAL_INGESTION"
    warningText: "ADDICTION, ABUSE, AND MISUSE: Morphine sulfate exposes patients and other users to the risks of opioid addiction, abuse, and misuse, which can lead to overdose and death. LIFE-THREATENING RESPIRATORY DEPRESSION: Serious, life-threatening, or fatal respiratory depression may occur. Monitor closely, especially upon initiation or following a dose increase."
    severity: "CRITICAL"
    hasRems: false
    remsProgram: ""
    remsRequirements: []
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Morphine Sulfate"
      sourceSection: "BOXED WARNING"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=morphine"
