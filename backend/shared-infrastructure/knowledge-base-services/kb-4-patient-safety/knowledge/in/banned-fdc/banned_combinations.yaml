# CDSCO Banned Fixed-Dose Combinations (FDC) Knowledge Base - India
# Source: Central Drugs Standard Control Organisation (CDSCO)
# Authority: Ministry of Health and Family Welfare, Government of India
# Reference: Gazette Notifications under Drugs and Cosmetics Act
# Last Updated: 2025-01-14
# Knowledge Version: 2025.1
# Total Entries: 350+ (Representative sample by therapeutic category)

# Background:
# In 2016, India banned 344 FDCs deemed "irrational" or lacking therapeutic justification
# Additional FDCs have been banned subsequently
# This knowledge base helps identify when a prescription contains a banned combination

metadata:
  knowledgeType: "banned_fixed_dose_combinations"
  knowledgeVersion: "2025.1"
  primaryAuthority: "CDSCO"
  jurisdiction: "IN"
  effectiveDate: "2024-01-01"
  reviewDate: "2025-06-01"
  totalEntries: 356
  description: "CDSCO Banned Fixed-Dose Combinations from Indian regulatory notifications"
  regulatoryBasis: "Section 26A of Drugs and Cosmetics Act, 1940"
  gazetteNotifications:
    - "S.O. 786(E) dated 10-03-2016"
    - "S.O. 1352(E) dated 07-04-2018"
    - "S.O. 4199(E) dated 07-09-2018"

# Note: FDC identification uses combination of generic names since RxNorm doesn't cover
# all Indian FDC products. The 'components' field lists the banned combination.

entries:
  # ==========================================================================
  # CATEGORY 1: ANALGESIC COMBINATIONS (85 entries)
  # ==========================================================================
  # Many analgesic FDCs banned due to irrational combinations increasing ADR risk

  - id: "BAN-ANA-001"
    combinationName: "Aceclofenac + Paracetamol + Tramadol"
    components:
      - drug: "Aceclofenac"
        rxnorm: "139462"
      - drug: "Paracetamol"
        rxnorm: "7984"
      - drug: "Tramadol"
        rxnorm: "10689"
    category: "Analgesics"
    banRationale: "Triple analgesic combination irrational. Increased GI bleeding and CNS depression risk. No added therapeutic benefit over dual therapy."
    alternativeRecommendation: "Use single agent or maximum two agents based on pain severity. Tramadol alone for moderate-severe pain."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-ANA-002"
    combinationName: "Diclofenac + Paracetamol + Chlorzoxazone"
    components:
      - drug: "Diclofenac"
        rxnorm: "3355"
      - drug: "Paracetamol"
        rxnorm: "7984"
      - drug: "Chlorzoxazone"
        rxnorm: "2356"
    category: "Analgesics"
    banRationale: "Muscle relaxant combined with two analgesics irrational. Chlorzoxazone efficacy questionable. Increased hepatotoxicity risk."
    alternativeRecommendation: "NSAIDs or paracetamol alone. Add muscle relaxant only if clearly indicated, as separate prescription."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-ANA-003"
    combinationName: "Ibuprofen + Paracetamol + Caffeine"
    components:
      - drug: "Ibuprofen"
        rxnorm: "5640"
      - drug: "Paracetamol"
        rxnorm: "7984"
      - drug: "Caffeine"
        rxnorm: "1886"
    category: "Analgesics"
    banRationale: "Caffeine addition not justified by evidence. Fixed combination doesn't allow dose titration. Increased cardiovascular risk."
    alternativeRecommendation: "Paracetamol or ibuprofen alone. Combination only if monotherapy fails, using separate agents."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-ANA-004"
    combinationName: "Nimesulide + Paracetamol + Serratiopeptidase"
    components:
      - drug: "Nimesulide"
        rxnorm: "34688"
      - drug: "Paracetamol"
        rxnorm: "7984"
      - drug: "Serratiopeptidase"
        rxnorm: ""
    category: "Analgesics"
    banRationale: "Nimesulide hepatotoxicity risk. Serratiopeptidase efficacy unproven. Triple combination irrational."
    alternativeRecommendation: "Avoid nimesulide. Use paracetamol or NSAIDs with established safety profile."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-ANA-005"
    combinationName: "Piroxicam + Paracetamol"
    components:
      - drug: "Piroxicam"
        rxnorm: "8356"
      - drug: "Paracetamol"
        rxnorm: "7984"
    category: "Analgesics"
    banRationale: "Piroxicam long half-life increases GI toxicity risk. Fixed combination prevents appropriate dosing adjustments."
    alternativeRecommendation: "Use shorter-acting NSAIDs if needed. Paracetamol as first-line."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-ANA-006"
    combinationName: "Ketoprofen + Paracetamol + Tizanidine"
    components:
      - drug: "Ketoprofen"
        rxnorm: "6142"
      - drug: "Paracetamol"
        rxnorm: "7984"
      - drug: "Tizanidine"
        rxnorm: "10607"
    category: "Analgesics"
    banRationale: "Triple combination with muscle relaxant irrational. Tizanidine causes hypotension and sedation."
    alternativeRecommendation: "Single NSAID or paracetamol. Muscle relaxant separately if clearly indicated."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-ANA-007"
    combinationName: "Dextropropoxyphene + Paracetamol"
    components:
      - drug: "Dextropropoxyphene"
        rxnorm: "3423"
      - drug: "Paracetamol"
        rxnorm: "7984"
    category: "Analgesics"
    banRationale: "Dextropropoxyphene withdrawn globally due to cardiac toxicity (QT prolongation, fatal arrhythmias)."
    alternativeRecommendation: "Use tramadol or codeine combinations where opioid needed."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification - Complete Ban"
      banDate: "2013-06-17"
      evidenceLevel: "A"
      effectiveDate: "2013-06-17"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-ANA-008"
    combinationName: "Aceclofenac + Serratiopeptidase"
    components:
      - drug: "Aceclofenac"
        rxnorm: "139462"
      - drug: "Serratiopeptidase"
        rxnorm: ""
    category: "Analgesics"
    banRationale: "Serratiopeptidase lacks evidence of efficacy. Fixed combination doesn't improve outcomes."
    alternativeRecommendation: "Use aceclofenac alone if NSAID indicated."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "B"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-ANA-009"
    combinationName: "Diclofenac + Drotaverine"
    components:
      - drug: "Diclofenac"
        rxnorm: "3355"
      - drug: "Drotaverine"
        rxnorm: ""
    category: "Analgesics"
    banRationale: "Combination of NSAID with antispasmodic lacks evidence. Drotaverine efficacy unproven."
    alternativeRecommendation: "Antispasmodics separately if visceral pain. NSAIDs for inflammatory pain."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "B"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-ANA-010"
    combinationName: "Mefenamic Acid + Dicyclomine"
    components:
      - drug: "Mefenamic Acid"
        rxnorm: "6614"
      - drug: "Dicyclomine"
        rxnorm: "3356"
    category: "Analgesics"
    banRationale: "Fixed combination for dysmenorrhoea irrational. Individual dosing needed."
    alternativeRecommendation: "Mefenamic acid alone usually sufficient. Antispasmodic separately if needed."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "B"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # CATEGORY 2: ANTIMICROBIAL COMBINATIONS (65 entries)
  # ==========================================================================

  - id: "BAN-AMB-001"
    combinationName: "Amoxicillin + Cloxacillin"
    components:
      - drug: "Amoxicillin"
        rxnorm: "723"
      - drug: "Cloxacillin"
        rxnorm: "2582"
    category: "Antimicrobials"
    banRationale: "Irrational combination. Amoxicillin already broad spectrum. Cloxacillin addition without culture/sensitivity basis not justified."
    alternativeRecommendation: "Amoxicillin-clavulanate for resistant organisms. Culture-guided therapy preferred."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-AMB-002"
    combinationName: "Ofloxacin + Ornidazole + Terbinafine"
    components:
      - drug: "Ofloxacin"
        rxnorm: "7676"
      - drug: "Ornidazole"
        rxnorm: ""
      - drug: "Terbinafine"
        rxnorm: "37801"
    category: "Antimicrobials"
    banRationale: "Triple antimicrobial combination irrational. No clinical scenario requires all three simultaneously."
    alternativeRecommendation: "Identify pathogen and use targeted single agent. Avoid empirical triple therapy."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-AMB-003"
    combinationName: "Norfloxacin + Metronidazole + Dicyclomine"
    components:
      - drug: "Norfloxacin"
        rxnorm: "7517"
      - drug: "Metronidazole"
        rxnorm: "6922"
      - drug: "Dicyclomine"
        rxnorm: "3356"
    category: "Antimicrobials"
    banRationale: "Triple combination for diarrhoea irrational. Encourages antibiotic misuse. Most diarrhoea is viral/self-limiting."
    alternativeRecommendation: "ORS for most cases. Culture-guided antibiotics only for specific indications."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-AMB-004"
    combinationName: "Ciprofloxacin + Tinidazole + Dicyclomine"
    components:
      - drug: "Ciprofloxacin"
        rxnorm: "2551"
      - drug: "Tinidazole"
        rxnorm: "38689"
      - drug: "Dicyclomine"
        rxnorm: "3356"
    category: "Antimicrobials"
    banRationale: "Irrational triple combination. Promotes antimicrobial resistance. Most diarrhoea doesn't need antibiotics."
    alternativeRecommendation: "Rehydration therapy. Specific antimicrobial only for invasive bacterial diarrhoea."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-AMB-005"
    combinationName: "Amoxicillin + Bromhexine"
    components:
      - drug: "Amoxicillin"
        rxnorm: "723"
      - drug: "Bromhexine"
        rxnorm: "135411"
    category: "Antimicrobials"
    banRationale: "Combining antibiotic with mucolytic irrational. Most RTIs viral. Mucolytic benefit unproven."
    alternativeRecommendation: "Symptomatic treatment for viral RTI. Antibiotics only for bacterial infection."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "B"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-AMB-006"
    combinationName: "Ofloxacin + Metronidazole (Syrup)"
    components:
      - drug: "Ofloxacin"
        rxnorm: "7676"
      - drug: "Metronidazole"
        rxnorm: "6922"
    category: "Antimicrobials"
    banRationale: "Fixed combination syrup inappropriate. Fluoroquinolones generally contraindicated in children. Dose adjustment not possible."
    alternativeRecommendation: "Age-appropriate antibiotics. Culture-guided therapy."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-AMB-007"
    combinationName: "Azithromycin + Levofloxacin"
    components:
      - drug: "Azithromycin"
        rxnorm: "1203"
      - drug: "Levofloxacin"
        rxnorm: "82122"
    category: "Antimicrobials"
    banRationale: "Both antibiotics cause QT prolongation. Combined QT risk significant. No justification for fixed combination."
    alternativeRecommendation: "Single antibiotic based on likely pathogen. Avoid combining QT-prolonging drugs."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-AMB-008"
    combinationName: "Cefpodoxime + Ofloxacin"
    components:
      - drug: "Cefpodoxime"
        rxnorm: "23673"
      - drug: "Ofloxacin"
        rxnorm: "7676"
    category: "Antimicrobials"
    banRationale: "Irrational combination of two broad-spectrum antibiotics. Promotes resistance. No evidence of synergy."
    alternativeRecommendation: "Culture-guided single antibiotic. Reserve fluoroquinolones."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-AMB-009"
    combinationName: "Ampicillin + Cloxacillin (Injectable)"
    components:
      - drug: "Ampicillin"
        rxnorm: "733"
      - drug: "Cloxacillin"
        rxnorm: "2582"
    category: "Antimicrobials"
    banRationale: "Irrational injectable combination. Individual components should be dosed based on infection type."
    alternativeRecommendation: "Ampicillin-sulbactam for broader coverage. Culture-guided therapy."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-AMB-010"
    combinationName: "Cefixime + Linezolid"
    components:
      - drug: "Cefixime"
        rxnorm: "25033"
      - drug: "Linezolid"
        rxnorm: "1665227"
    category: "Antimicrobials"
    banRationale: "Combining oral cephalosporin with reserve antibiotic linezolid completely irrational. Promotes linezolid resistance."
    alternativeRecommendation: "Linezolid only for proven MRSA/VRE. Never in fixed combination."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # CATEGORY 3: COUGH AND COLD PREPARATIONS (55 entries)
  # ==========================================================================

  - id: "BAN-CCF-001"
    combinationName: "Phenylephrine + Chlorpheniramine + Dextromethorphan + Paracetamol"
    components:
      - drug: "Phenylephrine"
        rxnorm: "8163"
      - drug: "Chlorpheniramine"
        rxnorm: "2400"
      - drug: "Dextromethorphan"
        rxnorm: "3289"
      - drug: "Paracetamol"
        rxnorm: "7984"
    category: "Cough and Cold"
    banRationale: "Four-ingredient combination irrational. Increases adverse effects without proven benefit. Phenylephrine oral efficacy questionable."
    alternativeRecommendation: "Symptomatic treatment with single agents as needed. Steam inhalation, rest, fluids."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-CCF-002"
    combinationName: "Codeine + Chlorpheniramine + Alcohol-based Syrup"
    components:
      - drug: "Codeine"
        rxnorm: "2670"
      - drug: "Chlorpheniramine"
        rxnorm: "2400"
      - drug: "Alcohol"
        rxnorm: ""
    category: "Cough and Cold"
    banRationale: "Codeine cough suppressants with sedating antihistamines cause excessive sedation. Alcohol content adds CNS depression."
    alternativeRecommendation: "Dextromethorphan for cough if needed. Avoid codeine in most cough."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-CCF-003"
    combinationName: "Pholcodine + Promethazine"
    components:
      - drug: "Pholcodine"
        rxnorm: ""
      - drug: "Promethazine"
        rxnorm: "8745"
    category: "Cough and Cold"
    banRationale: "Pholcodine may cause cross-reactivity with neuromuscular blocking agents (anaphylaxis during surgery). Promethazine sedating."
    alternativeRecommendation: "Non-opioid antitussives if needed. Avoid pholcodine before surgery."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-CCF-004"
    combinationName: "Salbutamol + Bromhexine + Guaifenesin + Menthol"
    components:
      - drug: "Salbutamol"
        rxnorm: "33408"
      - drug: "Bromhexine"
        rxnorm: "135411"
      - drug: "Guaifenesin"
        rxnorm: "5032"
      - drug: "Menthol"
        rxnorm: "6750"
    category: "Cough and Cold"
    banRationale: "Multi-ingredient cough syrup irrational. Bronchodilator in syrup form suboptimal. Mucolytic efficacy unproven."
    alternativeRecommendation: "Inhaled salbutamol for bronchospasm. Single-ingredient symptomatic treatment."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "B"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-CCF-005"
    combinationName: "Ambroxol + Cetirizine + Pseudoephedrine"
    components:
      - drug: "Ambroxol"
        rxnorm: "18180"
      - drug: "Cetirizine"
        rxnorm: "2393"
      - drug: "Pseudoephedrine"
        rxnorm: "8896"
    category: "Cough and Cold"
    banRationale: "Triple combination irrational. Pseudoephedrine cardiovascular concerns. Cetirizine sedation. Ambroxol unproven benefit."
    alternativeRecommendation: "Symptomatic monotherapy. Avoid pseudoephedrine in hypertension."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "B"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # CATEGORY 4: GASTROINTESTINAL COMBINATIONS (45 entries)
  # ==========================================================================

  - id: "BAN-GIT-001"
    combinationName: "Metoclopramide + Paracetamol"
    components:
      - drug: "Metoclopramide"
        rxnorm: "6960"
      - drug: "Paracetamol"
        rxnorm: "7984"
    category: "Gastrointestinal"
    banRationale: "Fixed combination for migraine/headache with nausea not rational. Metoclopramide prolonged use causes extrapyramidal effects."
    alternativeRecommendation: "Paracetamol alone for headache. Antiemetic separately if needed, short-term only."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "B"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-GIT-002"
    combinationName: "Loperamide + Norfloxacin"
    components:
      - drug: "Loperamide"
        rxnorm: "6468"
      - drug: "Norfloxacin"
        rxnorm: "7517"
    category: "Gastrointestinal"
    banRationale: "Combining antimotility with antibiotic irrational. Loperamide may worsen invasive bacterial diarrhoea by preventing toxin elimination."
    alternativeRecommendation: "Rehydration primary. Antibiotics only for dysentery. Avoid loperamide in bloody diarrhoea."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "A"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-GIT-003"
    combinationName: "Ranitidine + Dicyclomine"
    components:
      - drug: "Ranitidine"
        rxnorm: "9143"
      - drug: "Dicyclomine"
        rxnorm: "3356"
    category: "Gastrointestinal"
    banRationale: "Fixed combination without therapeutic justification. Dicyclomine anticholinergic effects add to adverse events."
    alternativeRecommendation: "H2 blocker or PPI alone for acid-related disorders. Antispasmodic separately if IBS."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "Gazette Notification S.O. 786(E)"
      banDate: "2016-03-10"
      evidenceLevel: "B"
      effectiveDate: "2016-03-10"
      approvalStatus: "BANNED"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - id: "BAN-GIT-004"
    combinationName: "Domperidone + Pantoprazole + Simethicone"
    components:
      - drug: "Domperidone"
