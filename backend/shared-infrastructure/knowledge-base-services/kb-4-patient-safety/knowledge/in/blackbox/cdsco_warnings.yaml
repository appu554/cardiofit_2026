    warningText: "Diclofenac carries higher cardiovascular risk than some other NSAIDs. Risk of serious GI events. Contraindicated in ischaemic heart disease, peripheral arterial disease, cerebrovascular disease."
    severity: "HIGH"
    additionalIndianContext: "Very widely used in India. Multiple formulations available. CDSCO has issued cardiovascular risk advisories."
