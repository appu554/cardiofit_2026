entries:
  # ==========================================================================
  # FLUOROQUINOLONE ANTIBIOTICS
  # ==========================================================================

  - rxnorm: "2551"
    drugName: "Ciprofloxacin"
    atcCode: "J01MA02"
    warningTitle: "Tendinopathy and Peripheral Neuropathy"
    warningText: "Fluoroquinolones are associated with disabling and potentially irreversible adverse reactions including tendinitis, tendon rupture, peripheral neuropathy, and CNS effects. Reserve for conditions without suitable alternative treatments. Contraindicated in patients under 18 years except for specific indications."
    severity: "HIGH"
    additionalIndianContext: "Schedule H1 drug - requires prescription record retention. CDSCO mandates patient counselling on tendon symptoms."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Safety Alert 2019"
      sourceUrl: "https://cdsco.gov.in/opencms/resources/UploadCDSCOWeb/2018/UploadPublic_NoticesFiles/SDB1.pdf"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-06-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "82122"
    drugName: "Levofloxacin"
    atcCode: "J01MA12"
    warningTitle: "Tendinopathy, Peripheral Neuropathy, and QT Prolongation"
    warningText: "Risk of tendinitis, tendon rupture, peripheral neuropathy. Additionally causes QT prolongation - caution with concomitant QT-prolonging drugs. Reserve for serious bacterial infections when no alternative treatment."
    severity: "HIGH"
    additionalIndianContext: "Schedule H1 drug. Widely used in India - enhanced pharmacovigilance required."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Safety Alert"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # OPIOID ANALGESICS
  # ==========================================================================

  - rxnorm: "10689"
    drugName: "Tramadol"
    atcCode: "N02AX02"
    warningTitle: "Seizure Risk; Serotonin Syndrome; Respiratory Depression"
    warningText: "Tramadol may cause seizures, especially in patients with epilepsy or those taking medications that lower seizure threshold. Risk of serotonin syndrome with serotonergic drugs. Respiratory depression can occur, particularly with concomitant CNS depressants."
    severity: "HIGH"
    additionalIndianContext: "Schedule H drug. Very commonly prescribed in India for pain management. CDSCO has received reports of abuse and dependence."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Pharmacovigilance Alert"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "7804"
    drugName: "Oxycodone"
    atcCode: "N02AA05"
    warningTitle: "Opioid Use Disorder; Respiratory Depression"
    warningText: "Oxycodone exposes patients to risks of addiction, abuse, and misuse. Life-threatening respiratory depression may occur. Accidental ingestion, especially in children, can result in fatal overdose."
    severity: "CRITICAL"
    additionalIndianContext: "NDPS Act Schedule - Narcotic drug requiring special licensing. Limited availability in India. Used primarily in cancer pain management."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "NDPS Guidelines"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "6813"
    drugName: "Morphine"
    atcCode: "N02AA01"
    warningTitle: "Addiction Potential; Respiratory Depression"
    warningText: "Morphine carries risks of addiction, abuse, and respiratory depression. Required for severe pain including cancer pain. Proper patient selection and monitoring essential."
    severity: "CRITICAL"
    additionalIndianContext: "NDPS Act regulated. National Palliative Care Policy promotes access for cancer pain while ensuring proper controls."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "NDPS Guidelines"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # ANTICOAGULANTS
  # ==========================================================================

  - rxnorm: "32968"
    drugName: "Warfarin"
    atcCode: "B01AA03"
    warningTitle: "Bleeding Risk; Drug-Food Interactions"
    warningText: "Warfarin can cause major or fatal bleeding. Regular INR monitoring essential. Multiple drug and dietary interactions. Patient education critical for safe use."
    severity: "CRITICAL"
    additionalIndianContext: "Wide use in India for RHD-related valve disease. Genetic polymorphisms (CYP2C9, VKORC1) in Indian population affect dosing. Diet with varying vitamin K content requires education."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "1114195"
    drugName: "Rivaroxaban"
    atcCode: "B01AF01"
    warningTitle: "Bleeding; Spinal/Epidural Haematoma"
    warningText: "Rivaroxaban increases risk of bleeding including potentially fatal haemorrhage. Epidural or spinal haematomas may occur with neuraxial anaesthesia. Renal dose adjustment required."
    severity: "CRITICAL"
    additionalIndianContext: "Increasingly used in India as alternative to warfarin. CDSCO monitoring post-marketing safety data."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Approved Product Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "1364430"
    drugName: "Apixaban"
    atcCode: "B01AF02"
    warningTitle: "Bleeding; Neuraxial Anaesthesia Risk"
    warningText: "Apixaban can cause serious, potentially fatal bleeding. Risk of spinal haematoma with neuraxial procedures. Premature discontinuation increases thrombotic risk."
    severity: "CRITICAL"
    additionalIndianContext: "Growing use in atrial fibrillation management in India."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Approved Product Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # ANTIPSYCHOTICS
  # ==========================================================================

  - rxnorm: "89013"
    drugName: "Clozapine"
    atcCode: "N05AH02"
    warningTitle: "Agranulocytosis; Myocarditis; Seizures"
    warningText: "Clozapine causes potentially fatal agranulocytosis. Mandatory haematological monitoring required. Risk of myocarditis and cardiomyopathy, especially in first weeks. Dose-dependent seizure risk."
    severity: "CRITICAL"
    additionalIndianContext: "CDSCO mandates registration in Clozapine Patient Monitoring Service (CPMS). Weekly blood monitoring initially. Important for treatment-resistant schizophrenia."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Guidelines for Clozapine"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "7531"
    drugName: "Olanzapine"
    atcCode: "N05AH03"
    warningTitle: "Metabolic Effects; Mortality in Elderly Dementia"
    warningText: "Olanzapine causes significant metabolic effects including weight gain, hyperglycaemia, and dyslipidemia. Increased mortality in elderly patients with dementia-related psychosis."
    severity: "HIGH"
    additionalIndianContext: "Widely prescribed in India. High incidence of diabetes in Indian population requires enhanced metabolic monitoring."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Safety Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "8076"
    drugName: "Risperidone"
    atcCode: "N05AX08"
    warningTitle: "Cerebrovascular Events; Mortality in Elderly"
    warningText: "Increased risk of cerebrovascular adverse events and mortality in elderly patients with dementia. Hyperprolactinaemia common."
    severity: "HIGH"
    additionalIndianContext: "One of the most commonly prescribed antipsychotics in India."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Safety Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # ANTIEPILEPTICS
  # ==========================================================================

  - rxnorm: "28439"
    drugName: "Carbamazepine"
    atcCode: "N03AF01"
    warningTitle: "Stevens-Johnson Syndrome; HLA-B*1502 Association"
    warningText: "Serious and sometimes fatal dermatological reactions including SJS and TEN occur. HLA-B*1502 allele strongly associated with risk - screening recommended in patients of Asian ancestry including Indian population."
    severity: "CRITICAL"
    additionalIndianContext: "HLA-B*1502 prevalence higher in Indian population. CDSCO recommends genetic testing before initiation. First-line antiepileptic in India requires careful patient selection."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Safety Alert"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "8183"
    drugName: "Phenytoin"
    atcCode: "N03AB02"
    warningTitle: "Cardiovascular Effects; SJS/TEN; HLA-B*1502"
    warningText: "Rapid IV administration causes cardiovascular depression. Serious skin reactions associated with HLA-B*1502. Purple glove syndrome with IV use."
    severity: "CRITICAL"
    additionalIndianContext: "Very commonly used in India. Generic formulation bioequivalence issues require brand consistency. HLA screening recommended."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Safety Alert"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "11170"
    drugName: "Valproate (Sodium Valproate)"
    atcCode: "N03AG01"
    warningTitle: "Teratogenicity; Hepatotoxicity; Pancreatitis"
    warningText: "Valproate causes major congenital malformations and developmental disorders. Life-threatening hepatotoxicity and pancreatitis can occur. Contraindicated in women of childbearing potential unless pregnancy prevention programme followed."
    severity: "CRITICAL"
    additionalIndianContext: "CDSCO has issued advisories on use in women of childbearing age. Pregnancy Prevention Programme requirements apply."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Safety Advisory"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "6158"
    drugName: "Lamotrigine"
    atcCode: "N03AX09"
    warningTitle: "Serious Skin Reactions; Aseptic Meningitis"
    warningText: "Lamotrigine can cause serious rashes including SJS and TEN. Risk highest in first 8 weeks and with rapid dose escalation. Aseptic meningitis reported."
    severity: "CRITICAL"
    additionalIndianContext: "Increasingly prescribed in India. Slow titration schedule must be followed. Generic formulation quality monitoring important."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # DIABETES MEDICATIONS
  # ==========================================================================

  - rxnorm: "6809"
    drugName: "Metformin"
    atcCode: "A10BA02"
    warningTitle: "Lactic Acidosis"
    warningText: "Metformin may cause lactic acidosis, a rare but serious complication. Risk factors include renal impairment, hepatic impairment, dehydration, excessive alcohol, and conditions causing hypoxia. Temporarily discontinue for iodinated contrast procedures."
    severity: "HIGH"
    additionalIndianContext: "First-line antidiabetic in India. Very widely prescribed. Renal function monitoring important given high prevalence of undiagnosed CKD."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "4815"
    drugName: "Glibenclamide (Glyburide)"
    atcCode: "A10BB01"
    warningTitle: "Hypoglycaemia; Cardiovascular Risk"
    warningText: "Glibenclamide causes severe and prolonged hypoglycaemia, especially in elderly and patients with renal impairment. UGDP study raised cardiovascular concerns. Use with caution."
    severity: "HIGH"
    additionalIndianContext: "Widely available and affordable in India. Higher hypoglycaemia risk in Indian population due to irregular meal patterns. Not preferred in elderly."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "25789"
    drugName: "Pioglitazone"
    atcCode: "A10BG03"
    warningTitle: "Heart Failure; Bladder Cancer Risk"
    warningText: "Pioglitazone may cause or exacerbate heart failure. Epidemiological data suggest possible increased risk of bladder cancer with prolonged use. Contraindicated in heart failure and active bladder cancer."
    severity: "HIGH"
    additionalIndianContext: "CDSCO restricts use in heart failure patients. Box warning required on packaging."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Safety Alert"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # PROTON PUMP INHIBITORS
  # ==========================================================================

  - rxnorm: "7646"
    drugName: "Omeprazole"
    atcCode: "A02BC01"
    warningTitle: "Long-term Use Risks"
    warningText: "Long-term PPI use associated with increased risk of Clostridium difficile infection, bone fractures, hypomagnesemia, vitamin B12 deficiency, and potentially increased pneumonia risk. Use lowest effective dose for shortest duration."
    severity: "MODERATE"
    additionalIndianContext: "Very commonly used in India, often without prescription. CDSCO has issued advisory on appropriate use duration."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Advisory"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "40790"
    drugName: "Pantoprazole"
    atcCode: "A02BC02"
    warningTitle: "Long-term Use Risks; Drug Interactions"
    warningText: "Same class warnings as other PPIs. Additionally, interaction with clopidogrel may reduce antiplatelet effect - preferentially use with prasugrel or ticagrelor."
    severity: "MODERATE"
    additionalIndianContext: "Most commonly prescribed PPI in India. Often used long-term inappropriately."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # ANTIMALARIALS
  # ==========================================================================

  - rxnorm: "5521"
    drugName: "Hydroxychloroquine"
    atcCode: "P01BA02"
    warningTitle: "Retinal Toxicity; QT Prolongation; Cardiomyopathy"
    warningText: "Hydroxychloroquine causes irreversible retinal damage with long-term use. QT prolongation and cardiomyopathy reported. Annual ophthalmological examination recommended after 5 years of continuous use."
    severity: "HIGH"
    additionalIndianContext: "Important drug for malaria prophylaxis and rheumatic diseases in India. CDSCO issued advisory during COVID-19 regarding cardiac risks."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Safety Advisory"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "1922"
    drugName: "Chloroquine"
    atcCode: "P01BA01"
    warningTitle: "Retinal Toxicity; QT Prolongation"
    warningText: "Chloroquine causes dose-dependent irreversible retinal toxicity. QT prolongation and cardiotoxicity risk. Use with caution in patients with cardiac disease."
    severity: "HIGH"
    additionalIndianContext: "Used for malaria treatment in India. Resistance patterns vary by region."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "8333"
    drugName: "Primaquine"
    atcCode: "P01BA03"
    warningTitle: "G6PD Deficiency - Haemolysis"
    warningText: "Primaquine causes severe haemolysis in patients with G6PD deficiency. G6PD screening recommended before use. Contraindicated in severe G6PD deficiency."
    severity: "CRITICAL"
    additionalIndianContext: "Essential for radical cure of P. vivax malaria. G6PD deficiency prevalence varies across Indian states (2-15%). NVBDCP guidelines require G6PD testing."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "NVBDCP Guidelines / CDSCO"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # ANTITUBERCULAR DRUGS
  # ==========================================================================

  - rxnorm: "6038"
    drugName: "Isoniazid"
    atcCode: "J04AC01"
    warningTitle: "Hepatotoxicity; Peripheral Neuropathy"
    warningText: "Isoniazid causes hepatotoxicity including fatal hepatitis. Risk increases with age, alcohol use, and chronic liver disease. Peripheral neuropathy prevented by pyridoxine supplementation."
    severity: "HIGH"
    additionalIndianContext: "First-line TB drug under RNTCP/NTEP. Hepatotoxicity monitoring essential. Pyridoxine co-administration standard practice in India."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "RNTCP Guidelines / CDSCO"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "8987"
    drugName: "Rifampicin"
    atcCode: "J04AB02"
    warningTitle: "Hepatotoxicity; Multiple Drug Interactions"
    warningText: "Rifampicin causes hepatotoxicity. Powerful CYP450 inducer causing numerous drug interactions including reduced efficacy of oral contraceptives, antiretrovirals, and anticoagulants."
    severity: "HIGH"
    additionalIndianContext: "Essential TB drug in India. Drug interactions critical in HIV-TB co-infection. NTEP provides guidance on ARV-ATT interactions."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "RNTCP Guidelines / CDSCO"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "8615"
    drugName: "Pyrazinamide"
    atcCode: "J04AK01"
    warningTitle: "Hepatotoxicity; Hyperuricaemia"
    warningText: "Pyrazinamide causes hepatotoxicity and hyperuricaemia. Gout flares may occur. Monitor liver function and uric acid levels."
    severity: "HIGH"
    additionalIndianContext: "First-line TB drug used in intensive phase. Hepatotoxicity risk additive with other ATT drugs."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "RNTCP Guidelines / CDSCO"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "4110"
    drugName: "Ethambutol"
    atcCode: "J04AK02"
    warningTitle: "Optic Neuritis"
    warningText: "Ethambutol causes dose-dependent optic neuritis with potential for irreversible vision loss. Baseline and periodic visual acuity and colour vision testing required. Risk increases with renal impairment."
    severity: "HIGH"
    additionalIndianContext: "Visual monitoring challenging in resource-limited settings. Patient counselling on visual symptoms essential."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "RNTCP Guidelines / CDSCO"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # DMARDs AND IMMUNOSUPPRESSANTS
  # ==========================================================================

  - rxnorm: "6851"
    drugName: "Methotrexate"
    atcCode: "L01BA01"
    warningTitle: "Bone Marrow Suppression; Hepatotoxicity; Pulmonary Toxicity"
    warningText: "Methotrexate causes severe bone marrow suppression, hepatotoxicity, and pulmonary toxicity. Daily dosing in rheumatology is fatal - must be given weekly. Folic acid supplementation required."
    severity: "CRITICAL"
    additionalIndianContext: "CDSCO has issued multiple alerts on weekly vs daily dosing errors. Pack labelling must prominently display 'WEEKLY DOSING ONLY' for rheumatology use."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Safety Alert"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "3008"
    drugName: "Cyclosporine"
    atcCode: "L04AD01"
    warningTitle: "Nephrotoxicity; Hypertension; Malignancy"
    warningText: "Cyclosporine causes nephrotoxicity and hypertension. Increased risk of lymphoma and skin cancers. Requires therapeutic drug monitoring. Multiple drug interactions."
    severity: "HIGH"
    additionalIndianContext: "Used in transplantation and severe autoimmune diseases. TDM facilities may be limited outside major centres."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "9524"
    drugName: "Tacrolimus"
    atcCode: "L04AD02"
    warningTitle: "Nephrotoxicity; Neurotoxicity; Diabetes"
    warningText: "Tacrolimus causes nephrotoxicity, neurotoxicity, and new-onset diabetes. Narrow therapeutic index requires therapeutic drug monitoring. Increased infection and malignancy risk."
    severity: "HIGH"
    additionalIndianContext: "Primary immunosuppressant for organ transplantation in India. TDM essential but may be challenging in some centres."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # CARDIOVASCULAR DRUGS
  # ==========================================================================

  - rxnorm: "1649"
    drugName: "Amiodarone"
    atcCode: "C01BD01"
    warningTitle: "Pulmonary, Hepatic, Thyroid Toxicity; QT Prolongation"
    warningText: "Amiodarone causes potentially fatal pulmonary toxicity, hepatotoxicity, and thyroid dysfunction. QT prolongation with risk of torsades de pointes. Requires regular monitoring of lungs, liver, and thyroid."
    severity: "CRITICAL"
    additionalIndianContext: "Important antiarrhythmic in India. Long half-life complicates management. Iodine content affects thyroid in iodine-deficient populations."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "3827"
    drugName: "Digoxin"
    atcCode: "C01AA05"
    warningTitle: "Narrow Therapeutic Index; Arrhythmias"
    warningText: "Digoxin has narrow therapeutic index. Toxicity causes life-threatening arrhythmias. Risk increased by hypokalaemia, hypomagnesaemia, hypercalcaemia, and renal impairment. Multiple drug interactions."
    severity: "HIGH"
    additionalIndianContext: "Still commonly used in India for heart failure and AF. Therapeutic level monitoring often unavailable - clinical monitoring essential."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  - rxnorm: "6185"
    drugName: "Lisinopril"
    atcCode: "C09AA03"
    warningTitle: "Fetal Toxicity; Angioedema"
    warningText: "ACE inhibitors cause fetal toxicity including oligohydramnios, fetal renal dysfunction, and death. Contraindicated in pregnancy. Risk of angioedema, higher in certain populations."
    severity: "CRITICAL"
    additionalIndianContext: "Widely used for hypertension and heart failure in India. Pregnancy testing essential before initiation in women of childbearing age."
    governance:
      sourceAuthority: "CDSCO"
      sourceDocument: "CDSCO Drug Information"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      approvalStatus: "ACTIVE"
      jurisdiction: "IN"
      knowledgeVersion: "2025.1"

  # ==========================================================================
  # ANALGESICS
  # ==========================================================================

  - rxnorm: "5640"
    drugName: "Ibuprofen"
    atcCode: "M01AE01"
    warningTitle: "GI Bleeding; Cardiovascular Risk; Renal Toxicity"
    warningText: "NSAIDs including ibuprofen increase risk of serious GI bleeding, cardiovascular events (MI, stroke), and renal impairment. Use lowest effective dose for shortest duration. Avoid in third trimester of pregnancy."
    severity: "HIGH"
    additionalIndianContext: "Very commonly used OTC in India. CDSCO advises caution in patients with cardiovascular disease, GI history, or renal impairment."
