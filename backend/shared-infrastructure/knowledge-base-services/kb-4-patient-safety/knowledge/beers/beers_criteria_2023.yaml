      approvalStatus: "ACTIVE"

  - rxnorm: "3638"
    drugName: "Doxepin"
    drugClass: "Tricyclic Antidepressants"
    atcCode: "N06AA12"
    recommendation: "AVOID"
    rationale: "Highly anticholinergic and sedating. Exception: doses ≤6 mg/day may be appropriate for insomnia."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    maxSafeDose:
      value: 6
      unit: "mg/day"
      note: "Low-dose doxepin (≤6 mg) for insomnia may be appropriate"
    acbScore: 3
    alternatives:
      - "Low-dose doxepin (≤6 mg) if specifically for insomnia"
      - "Melatonin"
      - "Trazodone (low dose)"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Anticholinergics"
