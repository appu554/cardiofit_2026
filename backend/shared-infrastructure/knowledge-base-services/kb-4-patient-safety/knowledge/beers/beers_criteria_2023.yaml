    drugName: "Nortriptyline"
    drugClass: "Tricyclic Antidepressants"
    atcCode: "N06AA10"
    recommendation: "AVOID"
    rationale: "Anticholinergic, sedating, and causes orthostatic hypotension. Less anticholinergic than tertiary amines but still risky."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    acbScore: 2
    alternatives:
