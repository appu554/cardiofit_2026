  # ================================================================
  # BENZODIAZEPINES
  # ================================================================

  - rxnorm: "596"
    drugName: "Alprazolam"
    drugClass: "Benzodiazepines"
    atcCode: "N05BA12"
    recommendation: "AVOID"
    rationale: "Older adults have increased sensitivity to benzodiazepines and decreased metabolism of long-acting agents. All benzodiazepines increase risk of cognitive impairment, delirium, falls, fractures, and motor vehicle crashes."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    exceptions:
      - "Severe generalized anxiety disorder where other treatments have failed"
      - "Benzodiazepine or alcohol withdrawal"
      - "Severe anxiety with dyspnea in end-of-life care"
      - "Procedural sedation"
    alternatives:
      - "For anxiety: SSRIs, SNRIs, buspirone"
      - "For insomnia: CBT-I, melatonin, low-dose trazodone"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Central Nervous System"
      sourceUrl: "https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      knowledgeVersion: "2023.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "2356"
    drugName: "Diazepam"
    drugClass: "Benzodiazepines"
    atcCode: "N05BA01"
    recommendation: "AVOID"
    rationale: "Long half-life in older adults (up to 100 hours). Active metabolites. Increased risk of falls, fractures, cognitive impairment, delirium."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    halfLifeHours: 100
    hasActiveMetabolites: true
    alternatives:
      - "For seizures: levetiracetam, lamotrigine"
      - "For muscle spasm: baclofen, tizanidine (caution)"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Central Nervous System"
      sourceUrl: "https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      knowledgeVersion: "2023.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "6960"
    drugName: "Lorazepam"
    drugClass: "Benzodiazepines"
    atcCode: "N05BA06"
    recommendation: "AVOID"
    rationale: "Increased sensitivity and risk of cognitive impairment, delirium, falls, fractures in older adults."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    exceptions:
      - "Alcohol withdrawal"
      - "Severe generalized anxiety disorder (short-term)"
      - "Procedural sedation"
    alternatives:
      - "SSRIs, SNRIs, buspirone for anxiety"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Central Nervous System"
      sourceUrl: "https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      knowledgeVersion: "2023.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "10355"
    drugName: "Temazepam"
    drugClass: "Benzodiazepines"
    atcCode: "N05CD07"
    recommendation: "AVOID"
    rationale: "Increased risk of cognitive impairment, falls, and fractures. Limited improvement in sleep latency and total sleep time."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    alternatives:
      - "CBT-I (first line for insomnia)"
      - "Melatonin"
      - "Low-dose trazodone"
      - "Ramelteon"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Central Nervous System"
      sourceUrl: "https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      knowledgeVersion: "2023.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "10767"
    drugName: "Triazolam"
    drugClass: "Benzodiazepines"
    atcCode: "N05CD05"
    recommendation: "AVOID"
    rationale: "Ultra-short acting but still carries risks of cognitive impairment, falls, fractures in older adults."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    alternatives:
      - "CBT-I"
      - "Melatonin"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
