  - rxnorm: "7076"
    drugName: "Promethazine"
    drugClass: "First-generation Antihistamines"
    atcCode: "R06AD02"
    recommendation: "AVOID"
    rationale: "Highly anticholinergic; risk of confusion, sedation, extrapyramidal symptoms."
    qualityOfEvidence: "MODERATE"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    acbScore: 3
    alternatives:
