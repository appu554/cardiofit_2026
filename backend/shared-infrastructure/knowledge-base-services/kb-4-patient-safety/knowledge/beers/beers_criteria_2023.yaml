  - rxnorm: "7531"
    drugName: "Oxybutynin"
    drugClass: "Antimuscarinics (Urinary)"
    atcCode: "G04BD04"
    recommendation: "AVOID"
    rationale: "Highly anticholinergic. Increased risk of cognitive impairment and dementia. Effectiveness for urinary incontinence is questionable."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    acbScore: 3
    alternatives:
      - "Mirabegron (beta-3 agonist)"
      - "Vibegron"
      - "Behavioral therapy"
      - "If antimuscarinic needed: trospium (does not cross BBB)"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Anticholinergics"
      sourceUrl: "https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      knowledgeVersion: "2023.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "42356"
    drugName: "Tolterodine"
    drugClass: "Antimuscarinics (Urinary)"
    atcCode: "G04BD07"
    recommendation: "AVOID"
    rationale: "Anticholinergic burden. Risk of cognitive impairment. Less CNS penetration than oxybutynin but still concerning."
    qualityOfEvidence: "MODERATE"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    acbScore: 3
    alternatives:
      - "Mirabegron"
      - "Vibegron"
      - "Trospium"
    governance:
      sourceAuthority: "AGS"
