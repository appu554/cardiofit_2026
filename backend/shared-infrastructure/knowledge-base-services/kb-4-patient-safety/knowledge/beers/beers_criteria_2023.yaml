  # ================================================================
  # NSAIDS
  # ================================================================

  - rxnorm: "5640"
    drugName: "Ibuprofen"
    drugClass: "NSAIDs"
    atcCode: "M01AE01"
    recommendation: "AVOID"
    rationale: "Increased risk of GI bleeding/peptic ulcer disease, especially in those >75 or taking corticosteroids, anticoagulants, or antiplatelet agents. May increase blood pressure and induce kidney injury."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults, especially those with GI, cardiovascular, or renal disease"
    riskFactors:
      - "Age >75"
      - "Concurrent corticosteroids"
      - "Concurrent anticoagulants"
      - "Concurrent antiplatelet agents"
      - "History of GI ulcer or bleeding"
      - "Chronic kidney disease"
      - "Heart failure"
    alternatives:
      - "Acetaminophen (first line for mild-moderate pain)"
      - "Topical NSAIDs (less systemic absorption)"
      - "Topical capsaicin"
      - "For arthritis: intra-articular corticosteroids"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Pain Medications"
      sourceUrl: "https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      knowledgeVersion: "2023.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "7258"
    drugName: "Naproxen"
    drugClass: "NSAIDs"
    atcCode: "M01AE02"
    recommendation: "AVOID"
    rationale: "Risk of GI bleeding, AKI, cardiovascular events. Long half-life increases risk of accumulation."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    alternatives:
      - "Acetaminophen"
      - "Topical NSAIDs"
      - "Topical capsaicin"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Pain Medications"
      sourceUrl: "https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372"
      jurisdiction: "US"
      evidenceLevel: "A"
