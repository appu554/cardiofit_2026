    drugName: "Hydroxyzine"
    drugClass: "First-generation Antihistamines"
    atcCode: "N05BB01"
    recommendation: "AVOID"
    rationale: "Highly anticholinergic; clearance reduced with advanced age. Risk of confusion, constipation, urinary retention."
