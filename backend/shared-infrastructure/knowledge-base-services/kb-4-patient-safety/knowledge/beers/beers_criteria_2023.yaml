      knowledgeVersion: "2023.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "321988"
    drugName: "Solifenacin"
    drugClass: "Antimuscarinics (Urinary)"
    atcCode: "G04BD08"
    recommendation: "AVOID"
    rationale: "Anticholinergic. Risk of cognitive impairment in older adults."
    qualityOfEvidence: "MODERATE"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    acbScore: 3
    alternatives:
      - "Mirabegron"
      - "Vibegron"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
