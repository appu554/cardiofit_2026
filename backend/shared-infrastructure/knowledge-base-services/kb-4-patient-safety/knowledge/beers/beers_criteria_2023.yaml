  - rxnorm: "1191"
    drugName: "Clonazepam"
    drugClass: "Benzodiazepines"
    atcCode: "N03AE01"
    recommendation: "AVOID"
    rationale: "Long half-life. Increased risk of cognitive impairment, falls, fractures in older adults."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    exceptions:
