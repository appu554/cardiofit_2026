beers_entries:
  # ================================================================
  # ANTICHOLINERGICS
  # ================================================================

  - rxnorm: "135447"
    drugName: "Diphenhydramine"
    drugClass: "First-generation Antihistamines"
    atcCode: "R06AA02"
    recommendation: "AVOID"
    rationale: "Highly anticholinergic; clearance reduced with advanced age. Risk of confusion, dry mouth, constipation, urinary retention. Tolerance develops when used as hypnotic."
    qualityOfEvidence: "MODERATE"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    acbScore: 3
    alternatives:
      - "Second-generation antihistamines (cetirizine, loratadine, fexofenadine)"
      - "For sleep: melatonin, CBT-I, trazodone (low dose)"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Anticholinergics"
      sourceUrl: "https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2023-05-04"
      knowledgeVersion: "2023.1"
      approvalStatus: "ACTIVE"
      approvedBy: "AGS Beers Criteria Expert Panel"
      clinicalReviewDate: "2023-05-04"

