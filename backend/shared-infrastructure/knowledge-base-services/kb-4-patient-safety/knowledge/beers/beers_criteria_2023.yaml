  - rxnorm: "704"
    drugName: "Amitriptyline"
    drugClass: "Tricyclic Antidepressants"
    atcCode: "N06AA09"
    recommendation: "AVOID"
    rationale: "Highly anticholinergic, sedating. Increased risk of orthostatic hypotension, falls, and cardiac conduction abnormalities."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    acbScore: 3
    alternatives:
      - "For depression: SSRIs (sertraline, citalopram), SNRIs"
      - "For neuropathic pain: duloxetine, gabapentin, pregabalin"
      - "For migraine prophylaxis: topiramate, propranolol"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
      sourceSection: "Table 1 - Anticholinergics"
      sourceUrl: "https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2023-05-04"
      knowledgeVersion: "2023.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "2597"
    drugName: "Clomipramine"
    drugClass: "Tricyclic Antidepressants"
    atcCode: "N06AA04"
    recommendation: "AVOID"
    rationale: "Highly anticholinergic, sedating. Risk of orthostatic hypotension and cardiac effects."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    acbScore: 3
    alternatives:
      - "For OCD: SSRIs (fluoxetine, fluvoxamine, sertraline)"
    governance:
      sourceAuthority: "AGS"
      sourceDocument: "AGS Beers Criteria 2023"
