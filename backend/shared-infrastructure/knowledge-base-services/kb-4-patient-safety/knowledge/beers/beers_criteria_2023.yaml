    drugName: "Imipramine"
    drugClass: "Tricyclic Antidepressants"
    atcCode: "N06AA02"
    recommendation: "AVOID"
    rationale: "Highly anticholinergic, sedating. Risk of orthostatic hypotension, cardiac conduction abnormalities."
    qualityOfEvidence: "HIGH"
    strengthOfRecommendation: "STRONG"
    conditionsToAvoid:
      - code: "all"
        display: "All older adults"
    acbScore: 3
    alternatives:
