# Drug-Associated Lab Monitoring Requirements
# Sources: FDA Drug Labels, NICE Guidelines, SPS (Specialist Pharmacy Service), Clinical Pharmacology
# This file is part of KB-4 Patient Safety governed clinical knowledge
# Version: 1.0.0
# Effective Date: 2024-01-01

metadata:
  title: "Drug Lab Monitoring Requirements"
  version: "1.0.0"
  sourceAuthorities:
    - "FDA"
    - "NICE"
    - "SPS"
    - "Clinical Practice Guidelines"
  effectiveDate: "2024-01-01"
  lastReviewed: "2024-12-01"
  jurisdiction: "US"
  clinicalDomain: "Laboratory Medicine"
  knowledgeVersion: "2024.1"
  approvalStatus: "ACTIVE"

lab_monitoring_entries:

  # ================================================================
  # ANTICOAGULANTS
  # ================================================================

  - rxnorm: "11289"
    drugName: "Warfarin"
    genericName: "Warfarin Sodium"
    atcCode: "B01AA03"
    drugClass: "Vitamin K Antagonists"
    monitoringRequired: true
    criticalMonitoring: true
    labs:
      - labName: "INR"
        loincCode: "6301-6"
        purpose: "Therapeutic monitoring and dose adjustment"
        targetRange:
          min: 2.0
          max: 3.0
          note: "2.5-3.5 for mechanical heart valves"
        frequency:
          initial: "Daily until stable"
          maintenance: "Weekly x4, then every 2-4 weeks when stable"
          doseChange: "Within 3-5 days of dose change"
        criticalValues:
          low: 1.5
          high: 5.0
          dangerHigh: 9.0
        actionRequired:
          belowRange: "Consider dose increase; assess for dietary/drug interactions"
          aboveRange: "Hold dose; consider vitamin K if INR >5 without bleeding"
          criticalHigh: "Hold warfarin; vitamin K if INR >9 or bleeding"
      - labName: "PT"
        loincCode: "5902-2"
        purpose: "Alternative coagulation measure"
        note: "INR preferred for monitoring"
      - labName: "CBC with Platelets"
        loincCode: "57021-8"
        purpose: "Monitor for bleeding complications"
        frequency:
          initial: "Baseline"
          maintenance: "As clinically indicated"
      - labName: "Liver Function Tests"
        loincCode: "24325-3"
        purpose: "Assess warfarin metabolism"
        frequency:
          initial: "Baseline"
          maintenance: "Annually or if hepatic dysfunction suspected"
    riskFactors:
      - "Drug-drug interactions (especially CYP2C9, CYP3A4 inhibitors/inducers)"
      - "Dietary vitamin K intake changes"
      - "Hepatic impairment"
      - "Genetic polymorphisms (CYP2C9, VKORC1)"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Warfarin Package Insert"
      sourceSection: "Dosage and Administration, Warnings"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "67108"
    drugName: "Enoxaparin"
    genericName: "Enoxaparin Sodium"
    atcCode: "B01AB05"
    drugClass: "Low Molecular Weight Heparins"
    monitoringRequired: true
    criticalMonitoring: false
    labs:
      - labName: "Anti-Xa Level"
        loincCode: "3280-3"
        purpose: "Therapeutic monitoring in specific populations"
        targetRange:
          therapeutic: "0.5-1.0 IU/mL (treatment dose, 4h post-dose)"
          prophylactic: "0.2-0.5 IU/mL"
        frequency:
          routine: "Not required for most patients"
          specialPopulations: "Required for renal impairment (CrCl <30), extremes of body weight, pregnancy"
        timing: "4 hours post-dose for peak level"
      - labName: "Serum Creatinine/eGFR"
        loincCode: "2160-0"
        purpose: "Assess renal function for dose adjustment"
        frequency:
          initial: "Baseline"
          maintenance: "Weekly initially, then periodically"
        renalThreshold:
          reduce: "CrCl <30 mL/min - dose adjustment required"
      - labName: "Platelet Count"
        loincCode: "777-3"
        purpose: "Monitor for heparin-induced thrombocytopenia (HIT)"
        frequency:
          initial: "Baseline"
          monitoring: "Every 2-3 days from day 4-14 if high HIT risk"
        hitThreshold: "50% decrease from baseline or <100,000/mcL"
      - labName: "Hemoglobin/Hematocrit"
        loincCode: "718-7"
        purpose: "Monitor for occult bleeding"
        frequency:
          initial: "Baseline"
          maintenance: "Periodically"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Enoxaparin Package Insert"
      sourceSection: "Dosage and Administration"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "4815"
    drugName: "Heparin"
    genericName: "Heparin Sodium"
    atcCode: "B01AB01"
    drugClass: "Unfractionated Heparin"
    monitoringRequired: true
    criticalMonitoring: true
    labs:
      - labName: "aPTT"
        loincCode: "3173-2"
        purpose: "Therapeutic monitoring for IV heparin"
        targetRange:
          therapeutic: "1.5-2.5 times control (institution-specific)"
        frequency:
          initial: "6 hours after initiation or dose change"
          maintenance: "Every 6 hours until stable, then daily"
        timing: "6 hours after dose change"
      - labName: "Anti-Xa Level"
        loincCode: "3280-3"
        purpose: "Alternative monitoring (preferred in some institutions)"
        targetRange:
          therapeutic: "0.3-0.7 IU/mL"
        note: "May be more accurate than aPTT in certain conditions"
      - labName: "Platelet Count"
        loincCode: "777-3"
        purpose: "Monitor for HIT"
        frequency:
          initial: "Baseline"
          monitoring: "Every 2-3 days from day 4-14"
        hitThreshold: ">50% decrease or <100,000/mcL"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Heparin Package Insert"
      sourceSection: "Dosage and Administration"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # ANTIPSYCHOTICS
  # ================================================================

  - rxnorm: "2626"
    drugName: "Clozapine"
    genericName: "Clozapine"
    atcCode: "N05AH02"
    drugClass: "Atypical Antipsychotics"
    monitoringRequired: true
    criticalMonitoring: true
    remsProgram: "Clozapine REMS"
    labs:
      - labName: "Absolute Neutrophil Count (ANC)"
        loincCode: "751-8"
        purpose: "Monitor for neutropenia/agranulocytosis (Black Box Warning)"
        targetRange:
          min: 1500
          unit: "cells/mcL"
          note: "1000/mcL for BEN patients"
        frequency:
          initial: "Baseline before starting"
          first6Months: "Weekly"
          months6to12: "Every 2 weeks"
          after12Months: "Monthly (if ANC stable)"
        criticalValues:
          mildNeutropenia: 1000-1500
          moderateNeutropenia: 500-1000
          severeNeutropenia: "<500"
        actionRequired:
          mildNeutropenia: "Increase monitoring to 3x/week; continue clozapine"
          moderateNeutropenia: "Interrupt treatment; monitor daily"
          severeNeutropenia: "Discontinue permanently; protective isolation"
        benPatients:
          note: "Benign Ethnic Neutropenia patients have lower thresholds"
          thresholds:
            continue: ">500"
            interrupt: "<500"
      - labName: "WBC"
        loincCode: "6690-2"
        purpose: "Supporting test for ANC monitoring"
        frequency: "Same as ANC"
      - labName: "Fasting Glucose"
        loincCode: "1558-6"
        purpose: "Monitor for diabetes mellitus"
        frequency:
          initial: "Baseline"
          maintenance: "At 4 months, 12 months, then annually"
      - labName: "Lipid Panel"
        loincCode: "57698-3"
        purpose: "Monitor for dyslipidemia"
        frequency:
          initial: "Baseline"
          maintenance: "At 12 weeks, then annually"
      - labName: "Hemoglobin A1c"
        loincCode: "4548-4"
        purpose: "Monitor for diabetes"
        frequency: "Annually after baseline"
      - labName: "Liver Function Tests"
        loincCode: "24325-3"
        purpose: "Monitor for hepatotoxicity"
        frequency:
          initial: "Baseline"
          maintenance: "Periodically during treatment"
      - labName: "Troponin"
        loincCode: "6598-7"
        purpose: "Monitor for myocarditis (if symptomatic)"
        frequency: "If chest pain, dyspnea, palpitations, or fever occur"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Clozapine REMS, Package Insert"
      sourceSection: "Boxed Warning, Warnings and Precautions"
      sourceUrl: "https://www.clozapinerems.com/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "8076"
    drugName: "Olanzapine"
    genericName: "Olanzapine"
    atcCode: "N05AH03"
    drugClass: "Atypical Antipsychotics"
    monitoringRequired: true
    criticalMonitoring: false
    labs:
      - labName: "Fasting Glucose"
        loincCode: "1558-6"
        purpose: "Monitor for hyperglycemia/diabetes"
        frequency:
          initial: "Baseline"
          earlyMonitoring: "At 12 weeks"
          maintenance: "Annually"
      - labName: "Lipid Panel"
        loincCode: "57698-3"
        purpose: "Monitor for dyslipidemia"
        frequency:
          initial: "Baseline"
          earlyMonitoring: "At 12 weeks"
          maintenance: "Annually"
      - labName: "Weight/BMI"
        purpose: "Monitor for metabolic syndrome"
        frequency:
          initial: "Baseline"
          earlyMonitoring: "At 4, 8, 12 weeks"
          maintenance: "Quarterly"
      - labName: "Hemoglobin A1c"
        loincCode: "4548-4"
        purpose: "Monitor for diabetes"
        frequency: "Annually if fasting glucose elevated"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Olanzapine Package Insert"
      sourceSection: "Warnings and Precautions"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # IMMUNOSUPPRESSANTS
  # ================================================================

  - rxnorm: "6851"
    drugName: "Methotrexate"
    genericName: "Methotrexate"
    atcCode: "L01BA01"
    drugClass: "Antimetabolites"
    monitoringRequired: true
    criticalMonitoring: true
    labs:
      - labName: "CBC with Differential"
        loincCode: "57021-8"
        purpose: "Monitor for bone marrow suppression"
        frequency:
          initial: "Baseline"
          earlyMonitoring: "Weekly for first 4 weeks"
          stabilizing: "Every 2 weeks for next 2 months"
          maintenance: "Monthly, or every 1-2 months once stable"
        criticalValues:
          wbc: "<3000/mcL"
          platelets: "<100,000/mcL"
          neutrophils: "<1500/mcL"
        actionRequired:
          myelosuppression: "Hold methotrexate; leucovorin rescue if severe"
      - labName: "Liver Function Tests (ALT, AST, Albumin)"
        loincCode: "24325-3"
        purpose: "Monitor for hepatotoxicity"
        frequency:
          initial: "Baseline"
          monitoring: "Every 4-8 weeks initially; every 8-12 weeks when stable"
        criticalValues:
          alt_ast: ">3x ULN persistently"
          albumin: "<3.0 g/dL"
        actionRequired:
          elevated: "Hold MTX; consider dose reduction or discontinuation"
          fibrosis: "Consider liver biopsy if persistent abnormalities"
      - labName: "Serum Creatinine/BUN"
        loincCode: "2160-0"
        purpose: "Monitor renal function (methotrexate is renally excreted)"
        frequency:
          initial: "Baseline"
          monitoring: "Every 4-8 weeks initially; every 8-12 weeks when stable"
        actionRequired:
          renalImpairment: "Dose adjustment or discontinuation may be required"
      - labName: "Chest X-Ray"
        purpose: "Monitor for pulmonary toxicity (if symptomatic)"
        frequency: "Baseline and if respiratory symptoms develop"
      - labName: "Hepatitis B/C Serology"
        purpose: "Screen before starting; risk of reactivation"
        frequency: "Baseline"
    folateSupplementation: "Folic acid 1-5 mg daily recommended to reduce toxicity"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Methotrexate Package Insert"
      sourceSection: "Boxed Warning, Warnings and Precautions"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "1256"
    drugName: "Azathioprine"
    genericName: "Azathioprine"
    atcCode: "L04AX01"
    drugClass: "Immunosuppressants"
    monitoringRequired: true
    criticalMonitoring: true
    labs:
      - labName: "CBC with Differential"
        loincCode: "57021-8"
        purpose: "Monitor for myelosuppression"
        frequency:
          initial: "Baseline; weekly for first month"
          stabilizing: "Biweekly for 2 months"
          maintenance: "Monthly, or every 1-2 months"
        criticalValues:
          wbc: "<3000/mcL"
          platelets: "<100,000/mcL"
      - labName: "TPMT Genotype/Phenotype"
        loincCode: "35576-6"
        purpose: "Identify patients at risk for severe myelosuppression"
        frequency: "Once (before initiation if possible)"
        actionRequired:
          lowActivity: "Significant dose reduction or alternative therapy"
          intermediateActivity: "Consider reduced starting dose"
      - labName: "Liver Function Tests"
        loincCode: "24325-3"
        purpose: "Monitor for hepatotoxicity"
        frequency:
          initial: "Baseline"
          monitoring: "Every 4 weeks initially; every 1-3 months when stable"
      - labName: "Lipase/Amylase"
        loincCode: "3040-3"
        purpose: "Monitor for pancreatitis (rare)"
        frequency: "If abdominal symptoms develop"
    pharmacogeneticTesting: "TPMT and NUDT15 testing recommended before initiation"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Azathioprine Package Insert"
      sourceSection: "Warnings and Precautions"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # MOOD STABILIZERS
  # ================================================================

  - rxnorm: "6448"
    drugName: "Lithium"
    genericName: "Lithium Carbonate"
    atcCode: "N05AN01"
    drugClass: "Mood Stabilizers"
    monitoringRequired: true
    criticalMonitoring: true
    labs:
      - labName: "Serum Lithium Level"
        loincCode: "14682-9"
        purpose: "Therapeutic drug monitoring"
        targetRange:
          acute: "0.8-1.2 mEq/L"
          maintenance: "0.6-1.0 mEq/L"
          elderly: "0.4-0.8 mEq/L"
        frequency:
          initial: "5-7 days after initiation (after steady state)"
          doseAdjustment: "5-7 days after any dose change"
          maintenance: "Every 3-6 months when stable"
        timing: "12 hours post-dose (trough level)"
        criticalValues:
          toxic: ">1.5 mEq/L"
          severeToxic: ">2.0 mEq/L"
        toxicitySymptoms:
          mild: "Tremor, nausea, diarrhea, fatigue"
          moderate: "Confusion, ataxia, dysarthria"
          severe: "Seizures, arrhythmias, coma"
      - labName: "Serum Creatinine/BUN/eGFR"
        loincCode: "2160-0"
        purpose: "Monitor renal function (lithium is renally excreted and nephrotoxic)"
        frequency:
          initial: "Baseline"
          earlyMonitoring: "Every 2-3 months for first 6 months"
          maintenance: "Every 6-12 months"
      - labName: "TSH"
        loincCode: "3016-3"
        purpose: "Monitor for hypothyroidism"
        frequency:
          initial: "Baseline"
          earlyMonitoring: "At 3 months"
          maintenance: "Every 6-12 months"
      - labName: "Free T4"
        loincCode: "3024-7"
        purpose: "Monitor thyroid function if TSH abnormal"
        frequency: "If TSH elevated"
      - labName: "Calcium"
        loincCode: "17861-6"
        purpose: "Monitor for hypercalcemia/hyperparathyroidism"
        frequency:
          initial: "Baseline"
          maintenance: "Annually"
      - labName: "ECG"
        purpose: "Monitor for cardiac effects (T-wave changes)"
        frequency:
          initial: "Baseline"
          maintenance: "If cardiac symptoms develop"
      - labName: "Urinalysis"
        loincCode: "24356-8"
        purpose: "Monitor for nephrogenic diabetes insipidus"
        frequency: "If polyuria develops"
    drugInteractions:
      - "NSAIDs - increase lithium levels"
      - "ACE inhibitors - increase lithium levels"
      - "Thiazide diuretics - increase lithium levels"
      - "Dehydration - increases lithium levels"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Lithium Package Insert"
      sourceSection: "Warnings and Precautions"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "11118"
    drugName: "Valproic Acid"
    genericName: "Valproic Acid/Divalproex"
    atcCode: "N03AG01"
    drugClass: "Anticonvulsants"
    monitoringRequired: true
    criticalMonitoring: true
    labs:
      - labName: "Serum Valproic Acid Level"
        loincCode: "4086-3"
        purpose: "Therapeutic drug monitoring"
        targetRange:
          epilepsy: "50-100 mcg/mL"
          bipolar: "50-125 mcg/mL"
        frequency:
          initial: "1-2 weeks after initiation"
          doseAdjustment: "After dose changes"
          maintenance: "Every 6-12 months"
        timing: "Trough (before next dose)"
      - labName: "Liver Function Tests"
        loincCode: "24325-3"
        purpose: "Monitor for hepatotoxicity (Black Box Warning)"
        frequency:
          initial: "Baseline"
          earlyMonitoring: "Frequently during first 6 months"
          maintenance: "Periodically thereafter"
        criticalValues:
          alt_ast: ">3x ULN"
        atRiskPatients: "Children <2 years, polypharmacy, metabolic disorders"
      - labName: "CBC with Platelets"
        loincCode: "57021-8"
        purpose: "Monitor for thrombocytopenia"
        frequency:
          initial: "Baseline"
          monitoring: "Prior to surgery; periodically"
      - labName: "Ammonia"
        loincCode: "1925-7"
        purpose: "If encephalopathy symptoms develop"
        frequency: "As clinically indicated"
      - labName: "Pregnancy Test"
        purpose: "Required before starting in women of childbearing potential"
        frequency: "Baseline; as needed"
        note: "Valproate is contraindicated in pregnancy for migraine/bipolar"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Valproate Package Insert"
      sourceSection: "Boxed Warning, Warnings and Precautions"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "28439"
    drugName: "Carbamazepine"
    genericName: "Carbamazepine"
    atcCode: "N03AF01"
    drugClass: "Anticonvulsants"
    monitoringRequired: true
    criticalMonitoring: true
    labs:
      - labName: "Serum Carbamazepine Level"
        loincCode: "3432-0"
        purpose: "Therapeutic drug monitoring"
        targetRange:
          min: 4
          max: 12
          unit: "mcg/mL"
        frequency:
          initial: "1-2 weeks after initiation"
          doseAdjustment: "After dose changes"
          maintenance: "Every 6-12 months"
      - labName: "CBC with Differential"
        loincCode: "57021-8"
        purpose: "Monitor for aplastic anemia, agranulocytosis (Black Box)"
        frequency:
          initial: "Baseline"
          monitoring: "Periodically"
        blackBoxWarning: "Risk of aplastic anemia and agranulocytosis"
      - labName: "Liver Function Tests"
        loincCode: "24325-3"
        purpose: "Monitor for hepatotoxicity"
        frequency:
          initial: "Baseline"
          monitoring: "Periodically"
      - labName: "Serum Sodium"
        loincCode: "2951-2"
        purpose: "Monitor for SIADH/hyponatremia"
        frequency: "Periodically, especially in elderly"
      - labName: "HLA-B*1502"
        purpose: "Screen for SJS/TEN risk in Asian populations"
        frequency: "Once (before initiation)"
        populations: "Patients of Asian ancestry"
        note: "Avoid carbamazepine if positive"
    pharmacogeneticTesting: "HLA-B*1502 testing recommended for Asian patients"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Carbamazepine Package Insert"
      sourceSection: "Boxed Warning"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # ANTIBIOTICS
  # ================================================================

  - rxnorm: "704"
    drugName: "Aminoglycosides"
    genericName: "Gentamicin, Tobramycin, Amikacin"
    atcCode: "J01GB"
    drugClass: "Aminoglycosides"
    monitoringRequired: true
    criticalMonitoring: true
    labs:
      - labName: "Serum Drug Level (Peak)"
        loincCode: "35668-3"
        purpose: "Therapeutic monitoring - efficacy"
        targetRange:
          gentamicinPeak: "5-10 mcg/mL"
          tobramycinPeak: "5-10 mcg/mL"
          amikacinPeak: "20-30 mcg/mL"
        timing: "30 minutes after end of IV infusion"
      - labName: "Serum Drug Level (Trough)"
        loincCode: "35669-1"
        purpose: "Therapeutic monitoring - toxicity prevention"
        targetRange:
          gentamicinTrough: "<2 mcg/mL"
          tobramycinTrough: "<2 mcg/mL"
          amikacinTrough: "<10 mcg/mL"
        timing: "30 minutes before next dose"
        frequency: "After 3rd dose then every 3-4 days"
      - labName: "Serum Creatinine/BUN"
        loincCode: "2160-0"
        purpose: "Monitor for nephrotoxicity"
        frequency:
          initial: "Baseline"
          monitoring: "Every 2-3 days"
        actionRequired:
          nephrotoxicity: "Consider dose adjustment or alternative therapy"
      - labName: "Urinalysis"
        loincCode: "24356-8"
        purpose: "Early detection of nephrotoxicity"
        frequency: "Baseline and periodically"
    audiometry: "Consider audiometric testing for prolonged courses"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Gentamicin Package Insert"
      sourceSection: "Dosage and Administration"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  - rxnorm: "11124"
    drugName: "Vancomycin"
    genericName: "Vancomycin"
    atcCode: "J01XA01"
    drugClass: "Glycopeptides"
    monitoringRequired: true
    criticalMonitoring: true
    labs:
      - labName: "Vancomycin Trough Level"
        loincCode: "20578-1"
        purpose: "Therapeutic monitoring"
        targetRange:
          standard: "10-15 mcg/mL"
          seriousInfection: "15-20 mcg/mL"
          meningitis: "15-20 mcg/mL"
        timing: "30 minutes before 4th or 5th dose"
        frequency: "At steady state; weekly for prolonged therapy"
        note: "AUC-based monitoring increasingly recommended"
      - labName: "Vancomycin AUC"
        purpose: "AUC-guided dosing (emerging standard)"
        targetRange:
          aucMic: "400-600 mcg*h/mL"
        note: "AUC/MIC ratio is better predictor of outcomes"
      - labName: "Serum Creatinine"
        loincCode: "2160-0"
        purpose: "Monitor for nephrotoxicity"
        frequency:
          initial: "Baseline"
          monitoring: "Every 2-3 days initially; weekly when stable"
        nephrotoxicityRisk: "Increased with concurrent nephrotoxins, high troughs, prolonged therapy"
      - labName: "CBC"
        loincCode: "57021-8"
        purpose: "Monitor for neutropenia (rare)"
        frequency: "Weekly for prolonged courses (>2 weeks)"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Vancomycin Package Insert, IDSA Guidelines"
      sourceSection: "Dosage and Administration"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

  # ================================================================
  # CARDIOVASCULAR
  # ================================================================

  - rxnorm: "3407"
    drugName: "Digoxin"
    genericName: "Digoxin"
