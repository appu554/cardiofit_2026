# Dose Limits Knowledge Base
# Source: FDA Maximum Recommended Therapeutic Doses, Clinical Guidelines
# Evidence Level: A (FDA-approved labeling)
# Last Updated: 2025-01-14
#
# This file contains maximum dose limits for medications with governance metadata.
# These limits are used for dose validation during prescribing.

dose_limits:
  - rxnorm: "7804"
    drugName: "Oxycodone"
    atcCode: "N02AA05"
    maxSingleDose: 30.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 120.0
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 15.0
    renalAdjustment: "Reduce dose by 50% if CrCl < 30 mL/min"
    hepaticAdjustment: "Start with 1/3 to 1/2 usual dose in severe impairment"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Oxycodone Hydrochloride Extended-Release Tablets"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=oxycodone"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "May be exceeded in opioid-tolerant patients with documented titration. Geriatric max applies to opioid-naive elderly."

  - rxnorm: "7052"
    drugName: "Morphine"
    atcCode: "N02AA01"
    maxSingleDose: 30.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 200.0
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 15.0
    renalAdjustment: "Avoid in ESRD; active metabolite accumulation"
    hepaticAdjustment: "Reduce dose in cirrhosis"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Morphine Sulfate"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=morphine"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Morphine-6-glucuronide accumulates in renal impairment causing prolonged sedation."

  - rxnorm: "5640"
    drugName: "Ibuprofen"
    atcCode: "M01AE01"
    maxSingleDose: 800.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 3200.0
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 1200.0
    renalAdjustment: "Avoid if CrCl < 30 mL/min"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Ibuprofen Tablets"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=ibuprofen"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "OTC max is 1200mg/day. Prescription max is 3200mg/day. Use lowest effective dose for shortest duration."

  - rxnorm: "161"
    drugName: "Acetaminophen"
    atcCode: "N02BE01"
    maxSingleDose: 1000.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 4000.0
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 3000.0
    hepaticAdjustment: "Max 2000 mg/day in chronic liver disease"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Drug Safety Communication - Acetaminophen"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://www.fda.gov/drugs/drug-safety-and-availability/fda-drug-safety-communication-prescription-acetaminophen-products-be-limited-325-mg-dosage-unit"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "FDA recommends max 3000mg/day for chronic use. Hepatotoxicity risk increases with alcohol use."

  - rxnorm: "8591"
    drugName: "Potassium Chloride"
    atcCode: "A12BA01"
    maxSingleDose: 40.0
    maxSingleDoseUnit: "mEq"
    maxDailyDose: 100.0
    maxDailyDoseUnit: "mEq"
    renalAdjustment: "Reduce in renal impairment; monitor K+ closely"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Potassium Chloride Extended-Release"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=potassium-chloride"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "IV rate should not exceed 10-20 mEq/hour except in emergencies. Oral doses should be divided."

  - rxnorm: "6851"
    drugName: "Methotrexate"
    atcCode: "L01BA01"
    maxSingleDose: 25.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 25.0
    maxDailyDoseUnit: "mg"
    renalAdjustment: "Contraindicated if CrCl < 30 mL/min for RA doses"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Methotrexate Tablets"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=methotrexate"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "For rheumatoid arthritis dosing. Oncology doses may be higher with appropriate monitoring. WEEKLY dosing only for RA - daily dosing is a fatal error."

  - rxnorm: "4603"
    drugName: "Furosemide"
    atcCode: "C03CA01"
    maxSingleDose: 200.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 600.0
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 80.0
    renalAdjustment: "May need higher doses in renal impairment due to reduced secretion"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Furosemide Tablets"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=furosemide"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "High-ceiling loop diuretic. Monitor electrolytes closely. Ototoxicity risk increases with rapid IV administration."

  - rxnorm: "11289"
    drugName: "Warfarin"
    atcCode: "B01AA03"
    maxSingleDose: 10.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 15.0
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 5.0
    hepaticAdjustment: "Reduce initial dose; increased sensitivity"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Warfarin Sodium Tablets"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=warfarin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Highly variable dosing based on INR. Consider CYP2C9/VKORC1 pharmacogenomic testing. Many drug-drug and drug-food interactions."

  - rxnorm: "3393"
    drugName: "Digoxin"
    atcCode: "C01AA05"
    maxSingleDose: 0.5
    maxSingleDoseUnit: "mg"
    maxDailyDose: 0.5
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 0.125
    renalAdjustment: "Reduce dose significantly in renal impairment; target serum level 0.5-0.9 ng/mL"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Digoxin Tablets"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=digoxin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Narrow therapeutic index. Target level 0.5-0.9 ng/mL for heart failure. Monitor potassium - hypokalemia increases toxicity."

  - rxnorm: "2626"
    drugName: "Clozapine"
    atcCode: "N05AH02"
    maxSingleDose: 100.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 900.0
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 300.0
    hepaticAdjustment: "Reduce dose and monitor LFTs"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Clozapine Tablets"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=clozapine"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "REMS program required. Must titrate slowly. Max 900mg/day but typical maintenance is 300-450mg/day. Risk of seizures increases above 600mg/day."

  - rxnorm: "596"
    drugName: "Alprazolam"
    atcCode: "N05BA12"
    maxSingleDose: 2.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 10.0
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 2.0
    hepaticAdjustment: "Start with 0.25mg; reduce dose in hepatic impairment"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Alprazolam Tablets"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=alprazolam"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Beers Criteria - avoid in elderly. High addiction potential. Taper slowly to avoid withdrawal seizures."

  - rxnorm: "6918"
    drugName: "Metoprolol"
    atcCode: "C07AB02"
    maxSingleDose: 200.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 400.0
    maxDailyDoseUnit: "mg"
    geriatricMaxDose: 200.0
    hepaticAdjustment: "Reduce dose in severe hepatic impairment"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Metoprolol Succinate Extended-Release"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=metoprolol"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Metoprolol tartrate and succinate have different dosing. Extended-release given once daily. Do not stop abruptly."

  - rxnorm: "5856"
    drugName: "Insulin Regular"
    atcCode: "A10AB01"
    maxSingleDose: 100.0
    maxSingleDoseUnit: "units"
    maxDailyDose: 300.0
    maxDailyDoseUnit: "units"
    renalAdjustment: "Reduce dose in renal impairment; insulin clearance decreased"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Humulin R"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=insulin-regular"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "ISMP High-Alert Medication. Individualized dosing based on blood glucose. U-500 insulin requires special attention."

  - rxnorm: "67108"
    drugName: "Enoxaparin"
    atcCode: "B01AB05"
    maxSingleDose: 150.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 300.0
    maxDailyDoseUnit: "mg"
    renalAdjustment: "1mg/kg once daily if CrCl < 30 mL/min (instead of BID)"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Enoxaparin Sodium Injection"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=enoxaparin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "ISMP High-Alert Medication. Weight-based dosing. Anti-Xa monitoring may be needed in renal impairment, obesity, or pregnancy."

  - rxnorm: "1364430"
    drugName: "Apixaban"
    atcCode: "B01AF02"
    maxSingleDose: 10.0
    maxSingleDoseUnit: "mg"
    maxDailyDose: 20.0
    maxDailyDoseUnit: "mg"
    renalAdjustment: "2.5mg BID if 2 of 3: age >= 80, weight <= 60kg, Cr >= 1.5"
    hepaticAdjustment: "Avoid in severe hepatic impairment (Child-Pugh C)"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Eliquis (Apixaban)"
      sourceSection: "DOSAGE AND ADMINISTRATION"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=apixaban"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "DOAC for atrial fibrillation and VTE. Dose reduction criteria are specific - apply if 2 of 3 criteria met."
