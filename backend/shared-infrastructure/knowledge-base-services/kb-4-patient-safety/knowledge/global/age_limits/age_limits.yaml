# Age Limits Knowledge Base
# Source: FDA Pediatric Labeling, Clinical Guidelines
# Evidence Level: A (FDA-approved labeling)
# Last Updated: 2025-01-14
#
# This file contains age restrictions for medications with governance metadata.
# These limits prevent prescribing to patients outside approved age ranges.

age_limits:
  - rxnorm: "2551"
    drugName: "Ciprofloxacin"
    atcCode: "J01MA02"
    minAgeYears: 18
    rationale: "Not recommended in pediatrics due to risk of cartilage damage in weight-bearing joints. May use in specific serious infections (anthrax, complicated UTI, pyelonephritis) if no alternative."
    severity: "HIGH"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Ciprofloxacin Tablets"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=ciprofloxacin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "FDA Black Box Warning for fluoroquinolones. Approved for pediatric complicated UTI and inhalational anthrax post-exposure."

  - rxnorm: "36437"
    drugName: "Sertraline"
    atcCode: "N06AB06"
    minAgeYears: 6
    rationale: "Approved for OCD in children 6+. Monitor closely for suicidality in patients under 25. Not approved for depression in pediatrics."
    severity: "MODERATE"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Sertraline Hydrochloride Tablets"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=sertraline"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "FDA Black Box Warning for suicidality in children/adolescents. Only OCD indication is approved for ages 6-17."

  - rxnorm: "6064"
    drugName: "Isotretinoin"
    atcCode: "D10BA01"
    minAgeYears: 12
    rationale: "Not recommended under 12 years. iPLEDGE REMS requirements apply to all patients of childbearing potential regardless of age."
    severity: "HIGH"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Isotretinoin Capsules"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=isotretinoin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "iPLEDGE REMS program mandatory. Category X teratogen. Psychiatric side effects including depression and suicidality reported."

  - rxnorm: "596"
    drugName: "Alprazolam"
    atcCode: "N05BA12"
    minAgeYears: 18
    rationale: "Safety and efficacy not established in pediatric patients. Avoid in elderly due to Beers Criteria - increased risk of falls, cognitive impairment."
    severity: "HIGH"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Alprazolam Tablets"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=alprazolam"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Schedule IV controlled substance. High abuse potential. Beers Criteria recommends avoiding in elderly."

  - rxnorm: "7804"
    drugName: "Oxycodone"
    atcCode: "N02AA05"
    minAgeYears: 11
    rationale: "Extended-release formulations approved for opioid-tolerant patients 11+ weighing at least 20kg. Immediate-release has different age considerations."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Oxycodone Hydrochloride Extended-Release"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=oxycodone-er"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "ER formulations only for opioid-tolerant pediatric patients. ISMP High-Alert Medication. REMS program required."

  - rxnorm: "161"
    drugName: "Aspirin"
    atcCode: "N02BA01"
    minAgeYears: 18
    rationale: "Risk of Reye's syndrome in children with viral illness. Avoid in children and adolescents with fever or viral symptoms."
    severity: "HIGH"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Aspirin"
      sourceSection: "WARNINGS AND PRECAUTIONS"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=aspirin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Reye's syndrome warning mandatory on OTC labeling. Exception: Kawasaki disease treatment in children under specialist care."

  - rxnorm: "3498"
    drugName: "Diphenhydramine"
    atcCode: "R06AA02"
    minAgeYears: 6
    maxAgeYears: 65
    rationale: "Not recommended for children under 6 for cough/cold symptoms. Avoid in elderly (Beers Criteria) due to anticholinergic effects."
    severity: "MODERATE"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Public Health Advisory - OTC Cough and Cold Medicines"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://www.fda.gov/drugs/drug-safety-and-availability/public-health-advisory-nonprescription-cough-and-cold-medicine-use-infants-and-children"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "FDA advisory against use in children <2 years. Many manufacturers voluntarily avoid use <6 years. ACB Score 3 - avoid in elderly."

  - rxnorm: "5640"
    drugName: "Ibuprofen"
    atcCode: "M01AE01"
    minAgeYears: 0.5
    rationale: "Approved for infants 6 months and older. Avoid in premature infants. Beers Criteria recommends caution in elderly."
    severity: "MODERATE"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Ibuprofen Oral Suspension"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=ibuprofen-peds"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Weight-based dosing for pediatrics. Avoid in preterm neonates due to patent ductus arteriosus concerns."

  - rxnorm: "4815"
    drugName: "Glyburide"
    atcCode: "A10BB01"
    minAgeYears: 18
    rationale: "Safety and efficacy not established in pediatric patients. Beers Criteria strongly recommends avoiding in elderly due to prolonged hypoglycemia risk."
    severity: "HIGH"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Glyburide Tablets"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=glyburide"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Beers Criteria - AVOID in elderly. Use shorter-acting sulfonylureas (glipizide) if sulfonylurea needed."

  - rxnorm: "7676"
    drugName: "Oxybutynin"
    atcCode: "G04BD04"
    minAgeYears: 5
    rationale: "Extended-release approved for children 6+ with overactive bladder. Immediate-release approved for 5+. Avoid in elderly (Beers Criteria)."
    severity: "MODERATE"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Oxybutynin Chloride Tablets"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=oxybutynin"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "ACB Score 3. Beers Criteria - strongly avoid in elderly due to cognitive impairment risk. Consider mirabegron as alternative."

  - rxnorm: "2626"
    drugName: "Clozapine"
    atcCode: "N05AH02"
    minAgeYears: 16
    rationale: "Limited pediatric data. FDA approved for treatment-resistant schizophrenia in adolescents 16+. REMS program mandatory."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Clozapine Tablets"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=clozapine"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Clozapine REMS required. Weekly ANC monitoring for first 6 months. Reserved for treatment-resistant schizophrenia."

  - rxnorm: "704"
    drugName: "Amitriptyline"
    atcCode: "N06AA09"
    minAgeYears: 12
    rationale: "Not approved for depression in children under 12. Beers Criteria strongly recommends avoiding in elderly due to high anticholinergic burden."
    severity: "HIGH"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Label - Amitriptyline Hydrochloride Tablets"
      sourceSection: "PEDIATRIC USE"
      sourceUrl: "https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=amitriptyline"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2024-01-01"
      reviewDate: "2025-01-01"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "ACB Score 3. FDA Black Box Warning for suicidality. Beers Criteria - highly anticholinergic, sedating. Use SSRIs instead in elderly."

  - rxnorm: "2670"
    drugName: "Codeine"
    atcCode: "R05DA04"
    minAgeYears: 12
    rationale: "FDA contraindicated in children under 12 due to risk of life-threatening respiratory depression from ultra-rapid CYP2D6 metabolism. Avoid in adolescents 12-18 with obesity, OSA, or severe lung disease."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Drug Safety Communication - Codeine"
      sourceSection: "CONTRAINDICATIONS"
      sourceUrl: "https://www.fda.gov/drugs/drug-safety-and-availability/fda-drug-safety-communication-fda-restricts-use-prescription-codeine"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2017-04-20"
      reviewDate: "2025-04-20"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Black Box Warning. CYP2D6 ultra-rapid metabolizers convert codeine to morphine faster, leading to fatal overdose. Use alternative analgesics in pediatrics."

  - rxnorm: "10689"
    drugName: "Tramadol"
    atcCode: "N02AX02"
    minAgeYears: 12
    rationale: "FDA contraindicated in children under 12 due to risk of life-threatening respiratory depression similar to codeine. Avoid in adolescents 12-18 with obesity, OSA, or severe lung disease."
    severity: "CRITICAL"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "FDA Drug Safety Communication - Tramadol"
      sourceSection: "CONTRAINDICATIONS"
      sourceUrl: "https://www.fda.gov/drugs/drug-safety-and-availability/fda-drug-safety-communication-fda-restricts-use-tramadol-children"
      jurisdiction: "US"
      evidenceLevel: "A"
      effectiveDate: "2017-09-21"
      reviewDate: "2025-09-21"
      knowledgeVersion: "2025.1"
      approvalStatus: "ACTIVE"
      clinicalNotes: "Black Box Warning. Same CYP2D6 metabolism concern as codeine. Tramadol is converted to O-desmethyltramadol (M1) which is more potent."
