  - rxnorm: "6851"
    drugName: "Methotrexate"
    genericName: "Methotrexate"
    atcCode: "L01BA01"
    lactationRisk: "CONTRAINDICATED"
    riskSummary: "Methotrexate is present in breast milk. Because of the potential for serious adverse reactions in breastfed infants, breastfeeding is not recommended during treatment and for 1 week after the final dose."
    milkConcentration: "Detectable in breast milk"
    infantRisk:
      - "Immunosuppression"
      - "Bone marrow suppression"
      - "Growth effects"
      - "Neutropenia"
    recommendation: "Do not breastfeed during treatment and for 1 week after final dose"
    halfLifeHours: 8
    waitPeriodAfterLastDose: "1 week"
    alternatives:
      - "For rheumatoid arthritis: hydroxychloroquine, sulfasalazine (compatible)"
    governance:
      sourceAuthority: "FDA"
      sourceDocument: "Methotrexate PLLR Label and LactMed"
      sourceSection: "8.2 Lactation"
      sourceUrl: "https://www.ncbi.nlm.nih.gov/books/NBK501362/"
      jurisdiction: "US"
      evidenceLevel: "B"
      effectiveDate: "2024-01-01"
      knowledgeVersion: "2024.1"
      approvalStatus: "ACTIVE"

