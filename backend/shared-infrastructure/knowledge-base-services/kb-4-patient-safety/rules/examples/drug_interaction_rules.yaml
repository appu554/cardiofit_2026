# Drug Interaction Safety Rules
# KB-4 Patient Safety Enhancement - YAML Rule DSL Examples
# These rules demonstrate the syntax and capabilities of the rule engine

# Rule 1: Warfarin-Aspirin Interaction
- id: "warfarin_aspirin_interaction"
  name: "Warfarin and Aspirin Bleeding Risk"
  version: "1.2.0"
  description: "Detects concurrent use of warfarin and aspirin which increases bleeding risk"
  category: "drug_interaction"
  severity: "CRITICAL"
  tags: ["bleeding", "anticoagulation", "cardiovascular"]
  author: "Clinical Safety Team"
  source: "https://www.fda.gov/drugs/drug-interactions"
  references:
    - "https://pubmed.ncbi.nlm.nih.gov/12345678"
    - "https://www.guideline.gov/warfarin-aspirin"
  last_updated: "2024-12-15T10:30:00Z"
  max_execution_time: "2s"
  
  conditions:
    operator: "AND"
    conditions:
      - type: "field_comparison"
        field: "concurrent_medications"
        operator: "contains"
        value: "warfarin"
        required: true
      - type: "field_comparison"
        field: "concurrent_medications"
        operator: "contains"  
        value: "aspirin"
        required: true
      - type: "range_check"
        field: "patient_age"
        value:
          min: 18
          max: 120
        required: true
  
  actions:
    - type: "alert"
      severity: "CRITICAL"
      message: "CRITICAL: Warfarin-Aspirin interaction detected. Patient ${patient_name} has increased bleeding risk. Consider alternative antiplatelet therapy or enhanced monitoring."
      code: "WAR_ASP_001"
      allow_override: true
      override_level: 3
      override_reasons:
        - "Cardiology consultation completed"
        - "Patient on enhanced monitoring protocol"
        - "Benefit-risk assessment documented"
      parameters:
        monitoring_required: "PT/INR every 3 days"
        contraindicated_procedures: ["surgery", "dental_work", "injections"]
        alternative_therapies: ["clopidogrel", "ticagrelor"]
  
  test_cases:
    - name: "Positive case - both drugs present"
      description: "Should trigger alert when both warfarin and aspirin are present"
      input:
        concurrent_medications: ["warfarin 5mg", "aspirin 81mg", "metformin 500mg"]
        patient_age: 65
        patient_name: "John Doe"
      expected:
        matched: true
        severity: "CRITICAL"
        actions:
          - type: "alert"
            severity: "CRITICAL"
    
    - name: "Negative case - only warfarin"
      description: "Should not trigger when only warfarin present"
      input:
        concurrent_medications: ["warfarin 5mg", "metformin 500mg"]
        patient_age: 65
        patient_name: "Jane Doe"
      expected:
        matched: false
        actions: []

# Rule 2: Renal Dose Adjustment
- id: "renal_dose_adjustment_metformin"
  name: "Metformin Renal Dose Adjustment"
  version: "1.1.0" 
  description: "Adjusts metformin dosing based on creatinine clearance for renal safety"
  category: "dosing"
  severity: "WARN"
  tags: ["renal", "diabetes", "dose_adjustment"]
  author: "Pharmacy Clinical Team"
  source: "https://www.kidney.org/professionals/guidelines"
  last_updated: "2024-12-10T14:20:00Z"
  max_execution_time: "1s"
  
  conditions:
    operator: "AND"
    conditions:
      - type: "field_comparison"
        field: "drug_code"
        operator: "eq"
        value: "metformin"
        required: true
      - type: "function_call"
        function: "creatinine_clearance"
        args:
          age_years: "${patient_age}"
          weight_kg: "${patient_weight}"
          serum_creatinine_mg_dl: "${serum_creatinine}"
          gender: "${patient_gender}"
  
  actions:
    - type: "warn"
      severity: "WARN"
      message: "Metformin dose adjustment required for patient ${patient_name}. Current CrCl: ${calculated_crcl} mL/min. Recommend dose reduction or discontinuation."
      code: "MET_RENAL_001"
      allow_override: true
      override_level: 2
      override_reasons:
        - "Endocrinologist consultation completed"
        - "Alternative diabetes medication initiated"
        - "Enhanced renal monitoring in place"
      conditions:
        operator: "OR"
        conditions:
          - type: "range_check"
            field: "calculated_crcl"
            value:
              min: 0
              max: 30
          - type: "field_comparison"
            field: "serum_creatinine"
            operator: "gte"
            value: 1.5
      parameters:
        recommendation: "Consider discontinuation if CrCl < 30 mL/min"
        monitoring: "Monitor renal function every 3 months"
        alternatives: ["insulin", "sulfonylureas", "DPP-4 inhibitors"]

# Rule 3: Allergy Cross-Reactivity
- id: "sulfa_allergy_crossreactivity"
  name: "Sulfa Allergy Cross-Reactivity Alert"
  version: "1.0.0"
  description: "Alerts for potential cross-reactivity in patients with documented sulfa allergies"
  category: "allergy"
  severity: "ERROR"
  tags: ["allergy", "sulfonamide", "cross_reactivity"]
  author: "Allergy Clinical Specialist"
  source: "https://www.aaaai.org/conditions-and-treatments/drug-allergies"
  last_updated: "2024-12-05T09:15:00Z"
  max_execution_time: "500ms"
  
  conditions:
    operator: "AND"
    conditions:
      - type: "custom"
        function: "allergy_check"
        field: "drug_code"
        args:
          allergy_type: "sulfonamide"
      - type: "regex_match"
        field: "drug_code"
        pattern: ".*(sulfamethoxazole|sulfadiazine|furosemide|hydrochlorothiazide).*"
        ignore_case: true
  
  actions:
    - type: "block"
      severity: "ERROR"
      message: "ALLERGY ALERT: Patient ${patient_name} has documented sulfa allergy. Prescribed medication ${drug_code} may cause cross-reactive allergic reaction."
      code: "SULFA_ALLERGY_001"
      allow_override: true
      override_level: 2
      override_reasons:
        - "Allergist consultation confirms safety"
        - "Prior tolerance documented"
        - "Emergency indication outweighs risk"
      parameters:
        alternative_medications: ["alternative_antibiotics_list"]
        monitoring_required: "Continuous monitoring for 24 hours after first dose"
        emergency_protocol: "Have epinephrine and corticosteroids readily available"

# Rule 4: Pregnancy Drug Safety
- id: "pregnancy_category_x_block"
  name: "Pregnancy Category X Drug Block"
  version: "1.0.0"
  description: "Blocks administration of Category X drugs to pregnant patients"
  category: "contraindication"
  severity: "CRITICAL"
  tags: ["pregnancy", "teratogenic", "contraindication"]
  author: "Maternal-Fetal Medicine"
  source: "https://www.fda.gov/drugs/labeling-information-drug-products/pregnancy-and-lactation-labeling-drugs"
  last_updated: "2024-12-01T16:45:00Z"
  max_execution_time: "800ms"
  
  conditions:
    operator: "AND"
    conditions:
      - type: "field_comparison"
        field: "patient_is_pregnant"
        operator: "eq"
        value: true
        required: true
      - type: "custom"
        function: "pregnancy_category"
        args:
          drug_code: "${drug_code}"
          pregnancy_status: "${patient_is_pregnant}"
  
  actions:
    - type: "block"
      severity: "CRITICAL"
      message: "CONTRAINDICATED: ${drug_code} is Category X (contraindicated in pregnancy). Patient ${patient_name} is pregnant. Administration blocked for fetal safety."
      code: "PREG_CAT_X_001"
      allow_override: true
      override_level: 3
      override_reasons:
        - "Life-threatening maternal condition"
        - "MFM specialist approval with documented counseling"
        - "Emergency situation with no alternatives"
      parameters:
        fetal_risk: "Positive evidence of human fetal risk"
        counseling_required: "Teratogenic risk counseling mandatory"
        alternative_therapy_review: true

# Rule 5: Therapeutic Drug Monitoring
- id: "digoxin_therapeutic_monitoring"
  name: "Digoxin Therapeutic Level Monitoring"
  version: "1.1.0"
  description: "Monitors digoxin levels for therapeutic range and toxicity prevention"
  category: "monitoring"
  severity: "WARN"
  tags: ["therapeutic_monitoring", "digoxin", "cardiology"]
  author: "Cardiology Clinical Pharmacist"
  source: "https://www.acc.org/guidelines/digoxin-monitoring"
  last_updated: "2024-11-28T11:30:00Z"
  max_execution_time: "1s"
  
  conditions:
    operator: "AND"
    conditions:
      - type: "field_comparison"
        field: "drug_code"
        operator: "eq"
        value: "digoxin"
        required: true
      - type: "custom"
        function: "therapeutic_range"
        args:
          drug_code: "digoxin"
          drug_level: "${serum_digoxin_ng_ml}"
  
  actions:
    - type: "warn"
      severity: "WARN" 
      message: "Digoxin level monitoring required for patient ${patient_name}. Current level: ${serum_digoxin_ng_ml} ng/mL (therapeutic range: 0.8-2.0 ng/mL)."
      code: "DIG_MONITOR_001"
      allow_override: true
      override_level: 1
      override_reasons:
        - "Cardiology managing levels"
        - "Patient on stable dose >3 months"
        - "Alternative cardiac therapy initiated"
      conditions:
        operator: "OR"
        conditions:
          - type: "range_check"
            field: "serum_digoxin_ng_ml"
            value:
              min: 2.1
              max: 999
          - type: "range_check"
            field: "serum_digoxin_ng_ml" 
            value:
              min: 0
              max: 0.7
      parameters:
        monitoring_frequency: "Weekly until stable, then monthly"
        signs_of_toxicity: ["nausea", "visual_disturbances", "arrhythmias"]
        dose_adjustment_algorithm: "Reduce by 25% if level >2.0, increase by 25% if <0.8"

# Rule 6: Complex Multi-Factor Rule
- id: "elderly_anticholinergic_burden"
  name: "Elderly Anticholinergic Burden Assessment"
  version: "2.0.0"
  description: "Evaluates cumulative anticholinergic burden in elderly patients using Beers Criteria"
  category: "monitoring"
  severity: "WARN"
  tags: ["geriatrics", "anticholinergic", "beers_criteria", "cognitive"]
  author: "Geriatric Pharmacotherapy Specialist"
  source: "https://www.americangeriatrics.org/beers-criteria"
  last_updated: "2024-12-20T13:45:00Z"
  max_execution_time: "3s"
  
  conditions:
    operator: "AND"
    conditions:
      - type: "range_check"
        field: "patient_age"
        value:
          min: 65
          max: 120
        required: true
      - type: "function_call"
        function: "calculate_anticholinergic_burden"
        args:
          medications: "${concurrent_medications}"
          scoring_system: "ACB_scale"
    groups:
      - operator: "OR"
        conditions:
          - type: "field_comparison"
            field: "patient_has_dementia"
            operator: "eq"
            value: true
          - type: "field_comparison"
            field: "patient_has_cognitive_impairment"
            operator: "eq"
            value: true
          - type: "range_check"
            field: "mmse_score"
            value:
              min: 0
              max: 24
  
  actions:
    - type: "warn"
      severity: "WARN"
      message: "High anticholinergic burden detected in elderly patient ${patient_name} (age ${patient_age}). Total ACB score: ${total_acb_score}. Consider medication review to reduce cognitive risk."
      code: "ACB_ELDERLY_001"
      allow_override: true
      override_level: 2
      override_reasons:
        - "Geriatrician reviewed and approved regimen"
        - "Benefits outweigh risks with monitoring plan"
        - "Patient/family counseled on risks"
      conditions:
        operator: "OR"
        conditions:
          - type: "range_check"
            field: "total_acb_score"
            value:
              min: 3
              max: 999
          - type: "field_comparison"
            field: "high_risk_anticholinergics_count"
            operator: "gte"
            value: 2
      parameters:
        monitoring_plan: "Cognitive assessment every 3 months"
        medication_review_frequency: "Every 6 months or with cognitive changes"
        alternative_recommendations: true
        family_counseling_required: true
    
    - type: "log"
      severity: "INFO"
      message: "Anticholinergic burden calculated for elderly patient ${patient_name}: ACB score ${total_acb_score}"
      code: "ACB_LOG_001"
      parameters:
        acb_details: "${acb_breakdown}"
        risk_level: "${calculated_risk_level}"

  clinical_context:
    population: "elderly"
    indication: "polypharmacy_management"
    evidence_level: "1A"
    guideline_source: "AGS_Beers_Criteria_2023"

# Rule 7: Pediatric Dosing Safety
- id: "pediatric_dose_weight_check"
  name: "Pediatric Weight-Based Dosing Validation"
  version: "1.0.0"
  description: "Validates pediatric medication doses are within safe weight-based limits"
  category: "dosing"
  severity: "ERROR"
  tags: ["pediatric", "weight_based_dosing", "safety"]
  author: "Pediatric Clinical Pharmacist"
  source: "https://www.aap.org/medication-dosing"
  last_updated: "2024-12-18T08:20:00Z"
  max_execution_time: "1.5s"
  
  conditions:
    operator: "AND"
    conditions:
      - type: "range_check"
        field: "patient_age"
        value:
          min: 0
          max: 17
        required: true
      - type: "field_comparison"
        field: "dosing_method"
        operator: "eq"
        value: "weight_based"
        required: true
      - type: "range_check"
        field: "patient_weight_kg"
        value:
          min: 2
          max: 100
        required: true
  
  actions:
    - type: "block"
      severity: "ERROR"
      message: "PEDIATRIC DOSING ERROR: Prescribed dose ${prescribed_dose_mg} for ${drug_code} exceeds maximum safe dose for patient weight ${patient_weight_kg}kg. Maximum recommended: ${max_safe_dose_mg}."
      code: "PED_DOSE_001"
      allow_override: true
      override_level: 2
      override_reasons:
        - "Pediatrician calculated alternative dosing rationale"
        - "Specialist (oncology/ICU) protocol exception"
        - "Literature support for higher dosing in specific indication"
      conditions:
        operator: "OR"
        conditions:
          - type: "field_comparison"
            field: "dose_exceeds_maximum"
            operator: "eq"
            value: true
          - type: "range_check"
            field: "dose_mg_per_kg"
            value:
              min: "${max_dose_per_kg}"
              max: 999
      parameters:
        max_safe_dose_calculation: "weight_kg * max_dose_per_kg_from_reference"
        monitoring_requirements: "Enhanced monitoring with higher doses"
        parent_counseling_required: true

# Rule 8: Drug-Disease Interaction
- id: "heart_failure_nsaid_contraindication"
  name: "Heart Failure NSAID Contraindication"
  version: "1.0.0"
  description: "Prevents NSAID use in patients with heart failure due to fluid retention risk"
  category: "contraindication"
  severity: "ERROR"
  tags: ["heart_failure", "nsaids", "fluid_retention"]
  author: "Cardiology Pharmacist"
  source: "https://www.heart.org/heart-failure-medications"
  last_updated: "2024-12-12T15:10:00Z"
  max_execution_time: "1s"
  
  conditions:
    operator: "AND"
    conditions:
      - type: "custom"
        function: "contraindication_check"
        args:
          drug_code: "${drug_code}"
          patient_conditions: "${patient_diagnoses}"
      - type: "regex_match"
        field: "drug_code"
        pattern: ".*(ibuprofen|naproxen|diclofenac|celecoxib|indomethacin).*"
        ignore_case: true
    groups:
      - operator: "OR"
        conditions:
          - type: "field_comparison"
            field: "patient_diagnoses"
            operator: "contains"
            value: "heart_failure"
          - type: "field_comparison"
            field: "patient_diagnoses" 
            operator: "contains"
            value: "congestive_heart_failure"
          - type: "field_comparison"
            field: "ejection_fraction"
            operator: "lte"
            value: 40
  
  actions:
    - type: "block"
      severity: "ERROR"
      message: "CONTRAINDICATED: NSAID ${drug_code} is contraindicated in patient ${patient_name} with heart failure (EF: ${ejection_fraction}%). NSAIDs can worsen heart failure through fluid retention."
      code: "HF_NSAID_001"
      allow_override: true
      override_level: 3
      override_reasons:
        - "Cardiologist approved short-term use <3 days"
        - "No alternative pain management options"
        - "Enhanced monitoring with daily weights/symptoms"
      parameters:
        alternative_analgesics: ["acetaminophen", "topical_preparations", "low_dose_opioids"]
        monitoring_plan: "Daily weight, symptom assessment, fluid balance"
        duration_limit: "Maximum 3 days if override approved"
        contraindicated_nsaids: ["all_oral_nsaids", "high_dose_topical_nsaids"]

# Rule 9: Laboratory Value Integration
- id: "warfarin_inr_monitoring"
  name: "Warfarin INR Therapeutic Monitoring"
  version: "1.3.0"
  description: "Monitors INR values for warfarin therapy optimization and bleeding risk prevention"
  category: "monitoring"
  severity: "WARN"
  tags: ["anticoagulation", "inr", "bleeding_risk", "therapeutic_monitoring"]
  author: "Anticoagulation Clinic"
  source: "https://www.chestnet.org/anticoagulation-guidelines"
  last_updated: "2024-12-22T10:00:00Z"
  max_execution_time: "2s"
  
  conditions:
    operator: "AND"
    conditions:
      - type: "field_comparison"
        field: "drug_code"
        operator: "eq"
        value: "warfarin"
        required: true
      - type: "field_comparison"
        field: "inr_value"
        operator: "ne"
        value: null
        required: true
  
  actions:
    - type: "alert"
      severity: "CRITICAL"
      message: "CRITICAL: INR ${inr_value} is dangerously high for patient ${patient_name} on warfarin. High bleeding risk. Consider dose reduction or temporary discontinuation."
      code: "WAR_INR_HIGH_001"
      allow_override: true
      override_level: 3
      override_reasons:
        - "Hematology/anticoagulation clinic managing"
        - "Specific indication requiring higher INR target"
        - "Temporary elevation with known reversible cause"
      conditions:
        operator: "AND"
        conditions:
          - type: "range_check"
            field: "inr_value"
            value:
              min: 4.5
              max: 999
      parameters:
        immediate_actions: ["Hold warfarin", "Check for bleeding", "Consider reversal"]
        reversal_agents: ["vitamin_K", "prothrombin_complex_concentrate"]
        monitoring_frequency: "Daily INR until <3.0"
    
    - type: "warn"
      severity: "WARN"
      message: "Warfarin dose adjustment needed for patient ${patient_name}. INR ${inr_value} is outside target range (2.0-3.0). Consider dose modification."
      code: "WAR_INR_ADJUST_001"
      allow_override: true
      override_level: 1
      conditions:
        operator: "OR"
        conditions:
          - type: "range_check"
            field: "inr_value"
            value:
              min: 3.1
              max: 4.4
          - type: "range_check"
            field: "inr_value"
            value:
              min: 0.5
              max: 1.9
      parameters:
        dose_adjustment_algorithm: "10-15% dose change for 0.5 INR unit deviation"
        recheck_timing: "3-7 days after dose adjustment"
        patient_education: "Consistent vitamin K intake, medication adherence"

  test_cases:
    - name: "High INR requiring intervention"
      input:
        drug_code: "warfarin"
        inr_value: 5.2
        patient_name: "John Smith"
      expected:
        matched: true
        severity: "CRITICAL"
        actions:
          - type: "alert"
            severity: "CRITICAL"
    
    - name: "Normal INR - no intervention"
      input:
        drug_code: "warfarin"
        inr_value: 2.5
        patient_name: "Jane Doe"
      expected:
        matched: false
        actions: []