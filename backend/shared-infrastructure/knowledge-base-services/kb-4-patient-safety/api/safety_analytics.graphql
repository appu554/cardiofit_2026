# KB-4 Patient Safety Analytics GraphQL Schema
# Read-only analytics interface for dashboards and reporting

scalar DateTime
scalar JSON
scalar UUID

type Query {
  # Real-time safety monitoring
  safetyDashboard(timeframe: TimeframeInput!): SafetyDashboard!
  
  # Alert analytics
  safetyAlerts(
    filters: SafetyAlertFilters
    pagination: PaginationInput
    sorting: SortingInput
  ): SafetyAlertsConnection!
  
  # Drug-specific analytics
  drugSafetyProfile(drugCode: String!): DrugSafetyProfile
  drugSafetyTrends(
    drugCodes: [String!]!
    timeframe: TimeframeInput!
  ): [DrugTrendData!]!
  
  # Statistical signal detection
  safetySignals(
    filters: SignalFilters
    algorithm: SignalDetectionAlgorithm
  ): [SafetySignal!]!
  
  # Override analytics
  overrideAnalytics(timeframe: TimeframeInput!): OverrideAnalytics!
  overrideAuditTrail(overrideId: UUID!): OverrideAuditTrail!
  
  # Performance metrics
  serviceMetrics(
    metrics: [MetricType!]!
    timeframe: TimeframeInput!
    aggregation: MetricAggregation!
  ): [ServiceMetric!]!
  
  # Clinical insights
  clinicalInsights(
    patientId: String
    drugCode: String
    timeframe: TimeframeInput!
  ): ClinicalInsights!
}

type Subscription {
  # Real-time safety alerts
  safetyAlertStream(filters: SafetyAlertFilters): SafetyAlert!
  
  # Statistical signal detection updates
  signalDetectionUpdates(drugCodes: [String!]): SafetySignal!
  
  # Override workflow notifications
  overrideUpdates(userId: String!): OverrideUpdate!
  
  # Service health monitoring
  serviceHealthUpdates: ServiceHealthUpdate!
}

# Core types
type SafetyDashboard {
  overview: SafetyOverview!
  recentAlerts: [SafetyAlert!]!
  criticalSignals: [SafetySignal!]!
  performanceMetrics: DashboardMetrics!
  systemHealth: SystemHealth!
  lastUpdated: DateTime!
}

type SafetyOverview {
  totalAlertsToday: Int!
  vetoRate24h: Float!
  overrideRate24h: Float!
  avgResponseTimeMs: Float!
  criticalAlertsActive: Int!
  topRiskDrugs: [DrugRiskSummary!]!
}

type DrugRiskSummary {
  drugCode: String!
  drugName: String!
  alertCount24h: Int!
  vetoCount24h: Int!
  riskScore: Float!
  trendDirection: TrendDirection!
}

enum TrendDirection {
  INCREASING
  DECREASING
  STABLE
  VOLATILE
}

type SafetyAlert {
  eventId: UUID!
  timestamp: DateTime!
  patientId: String!
  therapyId: String!
  drugCode: String!
  drugClass: String!
  
  # Core verdict
  safetyStatus: SafetyStatus!
  findings: [SafetyFinding!]!
  
  # Evidence and audit
  evidenceEnvelope: EvidenceEnvelope!
  decisionHash: String!
  
  # Clinical context
  patientSnapshot: JSON!
  concurrentMeds: [String!]!
  
  # Override state
  overrideState: OverrideLevel!
  overrideInfo: OverrideInfo
  
  # Performance
  evaluationTimeMs: Int!
  cacheHit: Boolean!
  
  # Metadata
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum SafetyStatus {
  PASS
  WARN
  VETO
}

type SafetyFinding {
  findingId: UUID!
  severity: FindingSeverity!
  category: String!
  ruleName: String!
  description: String!
  clinicalRationale: String!
  evidenceIds: [String!]!
  guidelineRefs: [String!]!
  recommendation: String!
  alternativeTherapies: [String!]!
  confidenceScore: Float!
  detectedAt: DateTime!
}

enum FindingSeverity {
  INFO
  LOW
  MODERATE
  HIGH
  CRITICAL
}

type EvidenceEnvelope {
  envelopeId: UUID!
  envelopeHash: String!
  evidenceItems: [EvidenceItem!]!
  knowledgeSources: [String!]!
  appliedRules: [String!]!
  createdAt: DateTime!
  createdBy: String!
  integritySignature: String!
}

type EvidenceItem {
  evidenceId: UUID!
  sourceType: String!
  sourceReference: String!
  evidenceText: String!
  strengthRating: Float!
  metadata: JSON!
}

# Override management
type OverrideInfo {
  overrideId: UUID!
  level: OverrideLevel!
  status: OverrideStatus!
  justification: String!
  authorizedBy: String!
  expiresAt: DateTime!
  approvalChain: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum OverrideLevel {
  NONE
  L1
  L2
  L3
}

enum OverrideStatus {
  PENDING
  APPROVED
  DENIED
  EXPIRED
  REVOKED
}

# Drug safety analytics
type DrugSafetyProfile {
  drugCode: String!
  drugName: String!
  drugClass: String!
  
  # Safety statistics
  safetyStatistics: DrugSafetyStatistics!
  
  # Recent performance
  recentActivity: DrugRecentActivity!
  
  # Rule compliance
  ruleCompliance: RuleComplianceProfile!
  
  # Signal analysis
  detectedSignals: [SafetySignal!]!
  
  # Override patterns
  overridePatterns: OverridePatterns!
  
  lastUpdated: DateTime!
}

type DrugSafetyStatistics {
  totalEvaluations: Int!
  passRate: Float!
  warnRate: Float!
  vetoRate: Float!
  avgEvaluationTimeMs: Float!
  cacheHitRate: Float!
  
  # Time-based trends
  trends30d: SafetyTrend!
  trends7d: SafetyTrend!
  trends24h: SafetyTrend!
}

type SafetyTrend {
  totalAlerts: Int!
  passCount: Int!
  warnCount: Int!
  vetoCount: Int!
  percentChange: Float!
  trendDirection: TrendDirection!
}

type DrugRecentActivity {
  recentAlerts: [SafetyAlert!]!
  recentOverrides: [OverrideInfo!]!
  recentSignals: [SafetySignal!]!
  activitySummary: ActivitySummary!
}

type ActivitySummary {
  alertsLast24h: Int!
  overridesLast24h: Int!
  signalsLast7d: Int!
  peakActivityHour: String!
}

type RuleComplianceProfile {
  totalRules: Int!
  activeRules: Int!
  rulesByCategory: [RuleCategoryCount!]!
  recentRuleUpdates: [RuleUpdate!]!
  complianceScore: Float!
}

type RuleCategoryCount {
  category: String!
  count: Int!
  lastUpdated: DateTime!
}

type RuleUpdate {
  updateId: UUID!
  ruleName: String!
  updateType: String!
  updatedBy: String!
  updatedAt: DateTime!
  description: String!
}

type OverridePatterns {
  totalOverrides: Int!
  overridesByLevel: [OverrideLevelCount!]!
  commonJustifications: [JustificationPattern!]!
  overrideSuccessRate: Float!
  avgApprovalTimeMinutes: Float!
}

type OverrideLevelCount {
  level: OverrideLevel!
  count: Int!
  successRate: Float!
}

type JustificationPattern {
  pattern: String!
  frequency: Int!
  successRate: Float!
  avgApprovalTime: Float!
}

# Statistical signal detection
type SafetySignal {
  signalId: UUID!
  drugCode: String!
  signalType: String!
  signalStrength: Float!
  pValue: Float!
  confidenceIntervalLower: Float!
  confidenceIntervalUpper: Float!
  
  # Clinical context
  clinicalDescription: String!
  affectedPopulations: [String!]!
  severityAssessment: String!
  
  # Temporal
  firstDetected: DateTime!
  lastUpdated: DateTime!
  occurrenceCount: Int!
  
  # Metadata
  detectionMethod: SignalDetectionAlgorithm!
  detectionParameters: JSON!
  
  # Related data
  relatedAlerts: [SafetyAlert!]!
  statisticalContext: StatisticalContext!
}

enum SignalDetectionAlgorithm {
  SPC
  CUSUM
  EWMA
  ML_ANOMALY
}

type StatisticalContext {
  baselineRate: Float!
  currentRate: Float!
  expectedRange: StatisticalRange!
  controlLimits: ControlLimits!
  historicalComparison: HistoricalComparison!
}

type StatisticalRange {
  lower: Float!
  upper: Float!
  confidence: Float!
}

type ControlLimits {
  upperControlLimit: Float!
  lowerControlLimit: Float!
  upperWarningLimit: Float!
  lowerWarningLimit: Float!
}

type HistoricalComparison {
  sameMonth1YearAgo: Float!
  sameQuarter1YearAgo: Float!
  rollingAverage30d: Float!
  percentileRank: Float!
}

