  description: String!
  rationale: String!
  evidenceLevel: String!
  implementationSteps: [String!]!
  expectedOutcome: String!
}

# System health
type SystemHealth {
  overallStatus: ServiceHealth!
  components: [ComponentHealth!]!
  dependencies: [DependencyHealth!]!
  performance: SystemPerformance!
  lastChecked: DateTime!
}

enum ServiceHealth {
  HEALTHY
  DEGRADED
  UNHEALTHY
  CRITICAL
}

type ComponentHealth {
  componentName: String!
  status: ServiceHealth!
  statusMessage: String!
  metrics: [HealthMetric!]!
  lastCheck: DateTime!
}

type HealthMetric {
  metricName: String!
  value: Float!
  unit: String!
  thresholdWarning: Float!
  thresholdCritical: Float!
  status: ServiceHealth!
}

type DependencyHealth {
  dependencyName: String!
  dependencyType: String!
  status: ServiceHealth!
  responseTime: Float!
  lastChecked: DateTime!
  errorRate: Float!
}

type SystemPerformance {
  avgResponseTime: Float!
  throughputPerSecond: Float!
  errorRate: Float!
  cacheHitRate: Float!
  resourceUtilization: ResourceUtilization!
}

type ResourceUtilization {
  cpuPercent: Float!
  memoryPercent: Float!
  diskPercent: Float!
  networkMbps: Float!
}

# Connections and pagination
type SafetyAlertsConnection {
  edges: [SafetyAlertEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
  facets: AlertFacets!
}

type SafetyAlertEdge {
  node: SafetyAlert!
  cursor: String!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type AlertFacets {
  statusCounts: [StatusCount!]!
  drugClassCounts: [DrugClassCount!]!
  severityCounts: [SeverityCount!]!
  timeDistribution: [TimeDistribution!]!
}

type StatusCount {
  status: SafetyStatus!
  count: Int!
}

type DrugClassCount {
  drugClass: String!
  count: Int!
}

type SeverityCount {
  severity: FindingSeverity!
  count: Int!
}

type TimeDistribution {
  hour: Int!
  count: Int!
}

# Subscription types
type OverrideUpdate {
  updateType: String!
  overrideId: UUID!
  override: OverrideInfo!
  timestamp: DateTime!
  affectedUserId: String!
}

type ServiceHealthUpdate {
  component: String!
  previousStatus: ServiceHealth!
  currentStatus: ServiceHealth!
  timestamp: DateTime!
  details: String!
}

# Input types
input TimeframeInput {
  start: DateTime!
  end: DateTime!
  timezone: String
}

input SafetyAlertFilters {
  patientIds: [String!]
  drugCodes: [String!]
  drugClasses: [String!]
  safetyStatuses: [SafetyStatus!]
  severities: [FindingSeverity!]
  timeRange: TimeframeInput
  overrideStates: [OverrideLevel!]
  hasOverride: Boolean
  evaluationTimeRange: IntRange
}

input IntRange {
  min: Int
  max: Int
}

input SignalFilters {
  drugCodes: [String!]
  signalTypes: [String!]
  algorithmTypes: [SignalDetectionAlgorithm!]
  minSignalStrength: Float
  maxPValue: Float
  timeRange: TimeframeInput
  affectedPopulations: [String!]
}

input PaginationInput {
  first: Int
  after: String
  last: Int
  before: String
}

input SortingInput {
  field: String!
  direction: SortDirection!
}

enum SortDirection {
  ASC
  DESC
}

enum MetricType {
  RESPONSE_TIME
  THROUGHPUT
  ERROR_RATE
  CACHE_HIT_RATE
  ALERT_RATE
  OVERRIDE_RATE
  SIGNAL_DETECTION_RATE
  CPU_UTILIZATION
  MEMORY_UTILIZATION
  DISK_UTILIZATION
}

enum MetricAggregation {
  RAW
  AVERAGE
  SUM
  MIN
  MAX
  PERCENTILE_95
}

# Dashboard metrics
type DashboardMetrics {
  responseTime: MetricSummary!
  throughput: MetricSummary!
  errorRate: MetricSummary!
  cachePerformance: CachePerformance!
  alertMetrics: AlertMetrics!
}

type CachePerformance {
  l1HitRate: Float!
  l2HitRate: Float!
  l3HitRate: Float!
  overallHitRate: Float!
  avgLookupTime: Float!
  evictionRate: Float!
}

type AlertMetrics {
  alertsPerHour: Float!
  vetoRatePercent: Float!
  overrideRatePercent: Float!
  avgProcessingTime: Float!
  criticalAlertCount: Int!
}