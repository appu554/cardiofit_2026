type StatisticalRange {
  lower: Float!
  upper: Float!
  confidence: Float!
}

# Clinical insights
type ClinicalInsights {
  insightId: UUID!
  patientInsights: PatientInsights
  drugInsights: DrugInsights
  populationInsights: PopulationInsights!
  temporalInsights: TemporalInsights!
  generatedAt: DateTime!
}

type PatientInsights {
  patientId: String!
  riskProfile: PatientRiskProfile!
  safetyHistory: PatientSafetyHistory!
  recommendations: [ClinicalRecommendation!]!
}

type PatientRiskProfile {
  overallRiskScore: Float!
  riskFactors: [PatientRiskFactor!]!
  protectiveFactors: [ProtectiveFactor!]!
