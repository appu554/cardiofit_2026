# filename: kb4/rules/seed/sglt2_inhibitors.yaml
drugs:
  - code: "class:ATC:A10BK"
    name: "SGLT2 Inhibitors"
    class: "SGLT2i"
    rules:
      - id: "SGLT2I_DKA_RISK_WARN"
        type: "relative"
        condition: "patient.acute_illness == true || patient.surgery_scheduled == true"
        action: "WARN"
        message: "Increased risk of euglycemic DKA. Consider holding SGLT2i during acute illness or perioperatively. Counsel patient on DKA symptoms."
        evidence_refs: ["kb3:ADA-DM-SICKDAY-2025"]
        monitoring: ["glucose@6h", "ketones@12h"]
        kb1_refs: ["SAF-SGLT2I-DKA-001"]
      - id: "SGLT2I_LOW_EGFR_INITIATION_VETO"
        type: "absolute"
        condition: "labs.egfr < 25"
        action: "VETO"
        message: "Initiation of SGLT2 inhibitors is not recommended in patients with an eGFR less than 25 mL/min/1.73m2."
        evidence_refs: ["kb3:ADA-DM-CKD-2025"]
        kb1_refs: ["SAF-SGLT2I-RENAL-001"]
      - id: "SGLT2I_GENITAL_MYCOTIC_INFO"
        type: "monitoring" # Monitoring rules add requirements but may not change the status
        condition: "true" # Applies to all patients
        action: "PASS"
        message: "Counsel patient on the risk of genital mycotic infections and advise on hygiene measures."
        monitoring: ["infection_screening@30d"]
        kb1_refs: ["SAF-SGLT2I-INFECTION-001"]
      - id: "SGLT2I_VOLUME_DEPLETION_WARN"
        type: "relative"
        condition: "patient.volume_depleted == true || patient.diuretic_use == true"
        action: "WARN"
        message: "Risk of volume depletion and hypotension. Consider dose adjustment of concurrent diuretics."
        monitoring: ["BP@7d", "volume_status@7d"]
        kb1_refs: ["SAF-SGLT2I-VOLUME-001"]