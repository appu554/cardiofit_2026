# filename: kb4/rules/seed/metformin_safety.yaml
drugs:
  - code: "metformin"
    name: "Metformin"
    class: "biguanide"
    rules:
      - id: "METFORMIN_LACTIC_ACIDOSIS_VETO"
        type: "absolute"
        condition: "labs.egfr < 30"
        action: "VETO"
        message: "Metformin is contraindicated in patients with eGFR < 30 mL/min/1.73m2 due to risk of lactic acidosis."
        evidence_refs: ["kb3:ADA-DM-2025-002"]
        kb1_refs: ["SAF-METFORMIN-LACTACID-001"]  # Links to KB-1 safety reference
      - id: "METFORMIN_MODERATE_RENAL_WARN"
        type: "relative"
        condition: "labs.egfr >= 30 && labs.egfr <= 45"
        action: "WARN"
        message: "Moderate renal impairment detected. Do not initiate metformin. For existing patients, assess risk/benefit and cap dose at 1000mg daily."
        monitoring: ["eGFR@90d", "lactate@PRN"]
        kb1_refs: ["SAF-METFORMIN-RENAL-001"]
      - id: "METFORMIN_CONTRAST_PROCEDURE_WARN"
        type: "relative"
        condition: "patient.contrast_procedure_scheduled == true"
        action: "WARN"
        message: "Hold metformin 48 hours before and after contrast procedures. Resume only after confirming stable renal function."
        monitoring: ["Cr@48h_post", "eGFR@48h_post"]
        kb1_refs: ["SAF-METFORMIN-CONTRAST-001"]
      - id: "METFORMIN_B12_MONITORING"
        type: "monitoring"
        condition: "patient.metformin_duration_months > 12"
        action: "PASS"
        message: "Long-term metformin use requires vitamin B12 monitoring."
        monitoring: ["B12@12m"]
        kb1_refs: ["SAF-METFORMIN-B12-001"]