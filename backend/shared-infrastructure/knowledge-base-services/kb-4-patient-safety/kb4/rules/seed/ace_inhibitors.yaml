# filename: kb4/rules/seed/ace_inhibitors.yaml
drugs:
  - code: "class:ATC:C09A"
    name: "ACE Inhibitors"
    class: "ACEI"
    rules:
      - id: "ACEI_PREGNANCY_VETO"
        type: "absolute" # Absolute contraindications result in a VETO
        condition: "patient.pregnant == true"
        action: "VETO"
        message: "ACE Inhibitors are contraindicated in pregnancy due to risk of teratogenicity."
        evidence_refs: ["kb3:ACOG-HTN-PREG-2022"]
        kb1_refs: ["SAF-ACEI-PREGNANCY-001"]  # References to KB-1 safety IDs
      - id: "ACEI_ANGIOEDEMA_VETO"
        type: "absolute"
        condition: "patient.history.angioedema_acei == true"
        action: "VETO"
        message: "Absolute contraindication in patients with a history of angioedema related to previous treatment with an ACE inhibitor."
        kb1_refs: ["SAF-ACEI-ANGIOEDEMA-001"]
      - id: "ACEI_HYPERKALEMIA_WARN"
        type: "relative" # Relative contraindications result in a WARN
        condition: "labs.k >= 5.1"
        action: "WARN"
        message: "Caution: Risk of hyperkalemia. Monitor potassium closely."
        monitoring: ["K@7d", "Cr@7d"] # Defines monitoring requirements
        kb1_refs: ["SAF-ACEI-HYPERK-001"]
      - id: "ACEI_RENAL_IMPAIRMENT_WARN"
        type: "relative"
        condition: "labs.egfr < 30"
        action: "WARN"
        message: "Severe renal impairment detected. Consider dose reduction and enhanced monitoring."
        monitoring: ["Cr@3d", "K@3d", "eGFR@7d"]
        kb1_refs: ["SAF-ACEI-RENAL-001"]