version: '3.8'

services:
  kb-26-mdt:
    build: .
    ports:
      - "8137:8137"
    environment:
      - DATABASE_URL=postgres://kb_user:kb26_password@kb26-postgres:5432/kb26_mdt?sslmode=disable
      - REDIS_URL=redis://kb26-redis:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - KB20_URL=http://host.docker.internal:8131
      - KB21_URL=http://host.docker.internal:8133
      - KB25_URL=http://host.docker.internal:8136
    depends_on:
      - kb26-postgres
      - kb26-redis

  kb26-postgres:
    image: postgres:16-alpine
    ports:
      - "5440:5432"
    environment:
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: kb26_password
      POSTGRES_DB: kb26_mdt
    volumes:
      - kb26_pgdata:/var/lib/postgresql/data

  kb26-redis:
    image: redis:7-alpine
    ports:
      - "6391:6379"

volumes:
  kb26_pgdata:
