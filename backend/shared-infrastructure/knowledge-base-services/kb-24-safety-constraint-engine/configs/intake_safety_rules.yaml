# Intake Safety Rules — served via GET /api/v1/intake-triggers
# These rules replace the hardcoded H1-H11 and SF-01-SF-08 in the intake service.
#
# Condition syntax (slot-aware):
#   slot_name=value          string/bool equality
#   slot_name<number         numeric less-than
#   slot_name>number         numeric greater-than
#   slot_name<=number        numeric less-or-equal
#   slot_name>=number        numeric greater-or-equal
#   cond1 AND cond2          logical AND
#   cond1 OR cond2           logical OR
#
# rule_type: HARD_STOP blocks enrollment; SOFT_FLAG raises pharmacist awareness.

rules:
  # ── HARD STOPS (H1–H11) ──────────────────────────────────────────────

  - id: H1
    rule_type: HARD_STOP
    condition: "diabetes_type=T1DM"
    severity: IMMEDIATE
    action: "Type 1 DM — T1DM protocol differs, requires endocrinology management"

  - id: H2
    rule_type: HARD_STOP
    condition: "pregnant=true"
    severity: IMMEDIATE
    action: "Pregnancy — obstetric care required, medication contraindications"

  - id: H3
    rule_type: HARD_STOP
    condition: "dialysis=true OR egfr<15"
    severity: IMMEDIATE
    action: "Dialysis or eGFR < 15 — nephrology management required"

  - id: H4
    rule_type: HARD_STOP
    condition: "active_cancer=true"
    severity: IMMEDIATE
    action: "Active cancer — oncology priority, treatment interactions"

  - id: H5
    rule_type: HARD_STOP
    condition: "egfr<15"
    severity: IMMEDIATE
    action: "eGFR < 15 — CKD stage 5, requires nephrology specialist"

  - id: H6
    rule_type: HARD_STOP
    condition: "mi_stroke_days>=0 AND mi_stroke_days<90"
    severity: IMMEDIATE
    action: "Recent MI/stroke (< 90 days) — acute cardiac event, specialist management required"

  - id: H7
    rule_type: HARD_STOP
    condition: "nyha_class>=3"
    severity: IMMEDIATE
    action: "Heart failure NYHA class III/IV — HF specialist management required"

  - id: H8
    rule_type: HARD_STOP
    condition: "age<18"
    severity: IMMEDIATE
    action: "Patient under 18 — pediatric protocol required"

  - id: H9
    rule_type: HARD_STOP
    condition: "bariatric_surgery_months>=0 AND bariatric_surgery_months<12"
    severity: IMMEDIATE
    action: "Bariatric surgery < 12 months ago — surgical follow-up required"

  - id: H10
    rule_type: HARD_STOP
    condition: "organ_transplant=true"
    severity: IMMEDIATE
    action: "Organ transplant — immunosuppression management required"

  - id: H11
    rule_type: HARD_STOP
    condition: "active_substance_abuse=true"
    severity: IMMEDIATE
    action: "Active substance abuse — addiction medicine referral required"

  # ── SOFT FLAGS (SF-01–SF-08) ──────────────────────────────────────────

  - id: SF-01
    rule_type: SOFT_FLAG
    condition: "age>=75"
    severity: WARN
    action: "Elderly patient (age >= 75) — dose adjustment awareness required"

  - id: SF-02
    rule_type: SOFT_FLAG
    condition: "egfr>=15 AND egfr<=44"
    severity: WARN
    action: "CKD moderate (eGFR 15-44) — renal dose adjustment required"

  - id: SF-03
    rule_type: SOFT_FLAG
    condition: "medication_count>=5"
    severity: WARN
    action: "Polypharmacy (>= 5 medications) — drug interaction review required"

  - id: SF-04
    rule_type: SOFT_FLAG
    condition: "bmi<18.5"
    severity: WARN
    action: "Low BMI (< 18.5) — malnutrition risk assessment required"

  - id: SF-05
    rule_type: SOFT_FLAG
    condition: "insulin=true"
    severity: WARN
    action: "Insulin use — hypoglycemia monitoring required"

  - id: SF-06
    rule_type: SOFT_FLAG
    condition: "falls_history=true OR age>=70"
    severity: WARN
    action: "Falls risk — balance assessment and medication review required"

  - id: SF-07
    rule_type: SOFT_FLAG
    condition: "cognitive_impairment=true"
    severity: WARN
    action: "Cognitive impairment — caregiver involvement recommended"

  - id: SF-08
    rule_type: SOFT_FLAG
    condition: "adherence_score<0.5"
    severity: WARN
    action: "Non-adherent history (score < 0.5) — enhanced follow-up required"
