# KB-6 Formulary Grafana Dashboard Provider Configuration
apiVersion: 1

providers:
  - name: 'KB-6 Formulary'
    orgId: 1
    folder: 'KB-6 Formulary Service'
    folderUid: 'kb6-formulary'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
