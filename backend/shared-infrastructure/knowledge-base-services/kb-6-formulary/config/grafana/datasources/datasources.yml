# KB-6 Formulary Grafana Datasources Configuration
apiVersion: 1

datasources:
  # Prometheus datasource for metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://kb6-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # Elasticsearch datasource for logs and formulary search
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://kb6-elasticsearch:9200
    database: "kb6_formulary"
    isDefault: false
    editable: false
    jsonData:
      esVersion: "8.11.0"
      timeField: "timestamp"
      logMessageField: "message"
      logLevelField: "level"
