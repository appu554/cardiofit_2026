services:
  # KB-6 Formulary Service
  kb6-formulary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb6-formulary
    ports:
      - "8091:8086"  # gRPC port (8086 used by KB-2/KB-5)
      - "8097:8087"  # HTTP REST API port (8087 used by KB-7)
    environment:
      # Server Configuration
      - PORT=8086
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}

      # Database Configuration
      - DB_HOST=kb6-postgres
      - DB_PORT=5432
      - DB_NAME=kb_formulary
      - DB_USER=kb6_admin
      - DB_PASSWORD=${DB_PASSWORD:-kb6_secure_password}
      - DB_SSLMODE=disable

      # Redis Configuration
      - REDIS_URL=kb6-redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

      # Elasticsearch Configuration
      - ELASTICSEARCH_URL=http://kb6-elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ES_PASSWORD:-changeme}
      - ELASTICSEARCH_ENABLED=true

      # Metrics Configuration
      - METRICS_ENABLED=true
      - METRICS_PATH=/metrics
    depends_on:
      kb6-postgres:
        condition: service_healthy
      kb6-redis:
        condition: service_healthy
      kb6-elasticsearch:
        condition: service_healthy
    networks:
      - kb6-network
      - kb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:8086"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # Database Seeder (run with: docker compose --profile seeder up kb6-seeder)
  kb6-seeder:
    build:
      context: .
      dockerfile: Dockerfile.seeder
    container_name: kb6-seeder
    environment:
      - DB_HOST=kb6-postgres
      - DB_PORT=5432
      - DB_NAME=kb_formulary
      - DB_USER=kb6_admin
      - DB_PASSWORD=${DB_PASSWORD:-kb6_secure_password}
    depends_on:
      kb6-postgres:
        condition: service_healthy
    volumes:
      - ./seeds:/seeds:ro
    networks:
      - kb6-network
    profiles:
      - seeder

  # PostgreSQL Database
  kb6-postgres:
    image: postgres:16-alpine
    container_name: kb6-postgres
    ports:
      - "5447:5432"  # External port 5436 to avoid conflicts with other KB services
    environment:
      - POSTGRES_DB=kb_formulary
      - POSTGRES_USER=kb6_admin
      - POSTGRES_PASSWORD=${DB_PASSWORD:-kb6_secure_password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - kb6_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/migrations
      - ./seeds:/seeds
    networks:
      - kb6-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb6_admin -d kb_formulary"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache
  kb6-redis:
    image: redis:7-alpine
    container_name: kb6-redis
    ports:
      - "6390:6379"  # External port (6386 used by KB-22 redis)
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - kb6_redis_data:/data
    networks:
      - kb6-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Elasticsearch for formulary search
  kb6-elasticsearch:
    image: elasticsearch:8.11.0
    container_name: kb6-elasticsearch
    ports:
      - "9206:9200"  # External port 9206 to avoid conflicts with other KB services
      - "9306:9300"
    environment:
      # Cluster settings
      - node.name=kb6-elasticsearch
      - cluster.name=kb6-formulary-cluster
      - discovery.type=single-node

      # Memory settings
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true

      # Security settings (simplified for internal network)
      - xpack.security.enabled=false

      # Performance settings
      - indices.query.bool.max_clause_count=2048
      - search.max_buckets=65536

      # Indexing settings
      - action.auto_create_index=true
      - cluster.routing.allocation.disk.threshold_enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - kb6_elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - kb6-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s

  # Kibana for Elasticsearch management and visualization
  kb6-kibana:
    image: kibana:8.11.0
    container_name: kb6-kibana
    ports:
      - "5606:5601"  # External port 5606 to avoid conflicts
    environment:
      - ELASTICSEARCH_HOSTS=http://kb6-elasticsearch:9200
      - SERVER_NAME=kb6-kibana
      - SERVER_HOST=0.0.0.0
      - LOGGING_ROOT_LEVEL=warn
    depends_on:
      kb6-elasticsearch:
        condition: service_healthy
    networks:
      - kb6-network
    restart: unless-stopped
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Prometheus for metrics collection
  kb6-prometheus:
    image: prom/prometheus:v2.47.0
    container_name: kb6-prometheus
    ports:
      - "9096:9090"  # External port 9096 to avoid conflicts
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - kb6_prometheus_data:/prometheus
    networks:
      - kb6-network
    restart: unless-stopped
    profiles:
      - monitoring
    depends_on:
      - kb6-formulary
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana for metrics visualization
  kb6-grafana:
    image: grafana/grafana:10.1.0
    container_name: kb6-grafana
    ports:
      - "3006:3000"  # External port 3006 to avoid conflicts
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - kb6_grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - kb6-prometheus
    networks:
      - kb6-network
    restart: unless-stopped
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  kb6-network:
    driver: bridge
    name: kb6-formulary-network
  kb-network:
    external: true
    name: kb-network

volumes:
  kb6_postgres_data:
    driver: local
  kb6_redis_data:
    driver: local
  kb6_elasticsearch_data:
    driver: local
  kb6_prometheus_data:
    driver: local
  kb6_grafana_data:
    driver: local