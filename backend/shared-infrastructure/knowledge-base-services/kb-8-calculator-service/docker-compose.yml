# KB-8 Calculator Service - Docker Compose
# Stateless clinical calculator (eGFR, BMI, dose adjustments)
# Usage: docker-compose up -d --build

services:
  kb8-calculator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb8-calculator
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENVIRONMENT: "development"
      LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - kb8-network
      - kb-network

networks:
  kb8-network:
    name: kb8-network
    driver: bridge
  kb-network:
    external: true
    name: kb-network
