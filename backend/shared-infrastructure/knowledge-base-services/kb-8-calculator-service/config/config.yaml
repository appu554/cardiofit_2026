# KB-8 Calculator Service Configuration
#
# Environment variables override these defaults.
# See internal/config/config.go for complete list.

# Server Settings
port: 8080
environment: development
log_level: info
read_timeout: 30s
write_timeout: 30s

# Feature Flags
metrics_enabled: true
playground_enabled: true

# Regional Settings
# GLOBAL: Use Western/WHO cutoffs
# INDIA: Use Asian (India-specific) cutoffs for BMI
# AUSTRALIA: Use standard WHO cutoffs
default_region: GLOBAL
india_adjustments: true

# Calculator Settings
max_batch_size: 20

# Calculator References
# These are informational - actual formulas are in Go code with citations
calculators:
  egfr:
    version: "CKD-EPI-2021-RaceFree"
    reference: "Inker LA, et al. N Engl J Med. 2021;385(19):1737-1749"

  crcl:
    version: "Cockcroft-Gault-1976"
    reference: "Cockcroft DW, Gault MH. Nephron. 1976;16(1):31-41"

  bmi:
    version: "WHO-2004-AsianAdapted"
    reference: "WHO Expert Consultation. Lancet. 2004;363(9403):157-163"

  sofa:
    version: "Vincent-1996"
    reference: "Vincent JL, et al. Intensive Care Med. 1996;22(7):707-710"

  qsofa:
    version: "Sepsis3-2016"
    reference: "Singer M, et al. JAMA. 2016;315(8):801-810"

  cha2ds2vasc:
    version: "Lip-2010"
    reference: "Lip GY, et al. Chest. 2010;137(2):263-272"

  hasbled:
    version: "Pisters-2010"
    reference: "Pisters R, et al. Chest. 2010;138(5):1093-1100"

  ascvd:
    version: "PCE-2013"
    reference: "Goff DC Jr, et al. Circulation. 2014;129(25 Suppl 2):S49-73"
