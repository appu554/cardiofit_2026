# CQL Guideline Registry v1.0.0
#
# This is the explicit mapping between:
#   1. CQL defines (the logic) - in vaidshala/clinical-knowledge-core/tier-4-guidelines/
#   2. Guideline sources (the authority) - KDIGO, ADA, FDA, etc.
#   3. KB fields consumed (the facts) - KB-1, KB-4, KB-16
#
# Each entry is a deliberate clinical assertion:
#   "This CQL logic implements this guideline recommendation using these KB values."
#
# This is clinical traceability for pharmacist review.
# This is the SECOND MOAT after CR-IR - institutional knowledge that compounds.
#
# Maintenance:
#   - Updated when CQL files change
#   - Updated when new guidelines are extracted
#   - Reviewed quarterly by clinical informatics team
#
# Usage:
#   - L5 Compatibility Checker validates extracted facts against expected thresholds
#   - Gap Detector identifies forward/backward/coverage gaps
#   - Pharmacist review uses this for traceability

registry_version: "1.0.0"
last_updated: "2026-02-04"
curator: "clinical-informatics-team"
vaidshala_path: "vaidshala/clinical-knowledge-core/tier-4-guidelines"

# ═══════════════════════════════════════════════════════════════════════════════
# ENTRY SCHEMA
# ═══════════════════════════════════════════════════════════════════════════════
#
# - cql_file: Name of the CQL file
#   cql_define: Name of the define statement
#   cql_line: Line number in CQL file (for quick reference)
#
#   guideline:
#     authority: KDIGO | ADA | FDA | ACC/AHA | etc.
#     document: Full document title
#     section: Section or recommendation ID
#     doi: Optional DOI
#     quote: Verbatim quote from guideline (for audit)
#
#   consumes:
#     - kb: KB-1 | KB-4 | KB-5 | KB-16
#       table: Database table name
#       field: Specific field consumed
#       filter: SQL-like filter for the specific fact
#
#   expected_threshold:
#     parameter: Lab/clinical parameter name
#     operator: < | <= | > | >= | == | between
#     value: Single threshold value (or value_min/value_max for between)
#     unit: Unit of measure
#
#   status: ACTIVE | DEPRECATED | PENDING_REVIEW
# ═══════════════════════════════════════════════════════════════════════════════

entries:
- cql_file: ADA2026Diabetes.cql
  cql_define: SGLT2i Renal Contraindication (KB-4)
  cql_line: 22
  guideline:
    authority: ADA
    document: ADA Standards of Care 2026
    section: 11.7a
    doi: 10.2337/dc26-S011
    quote: "SGLT2 inhibitors should be initiated only in individuals with eGFR \u2265\
      20 mL/min/1.73 m2."
  consumes:
  - kb: KB-4
    table: kb4_safety_signals
    field: labThreshold
    filter: drug_class='SGLT1/2 inhibitor'
  expected_threshold:
    parameter: eGFR
    operator: <
    value: 20
    unit: mL/min/1.73m2
  status: ACTIVE
- cql_file: ADA2026Diabetes.cql
  cql_define: Sotagliflozin Hyperkalemia Withhold (KB-16)
  cql_line: 44
  guideline:
    authority: ADA
    document: ADA Standards of Care 2026
    section: '10.46'
    quote: Serum potassium > 5.5 mmol/L during sotagliflozin therapy triggers reassessment
      of concomitant RAS inhibitor or MRA.
  consumes:
  - kb: KB-16
    table: kb16_clinical_decision_limits
    field: decision_limit_value
    filter: rxnorm_code='2638675'
  expected_threshold:
    parameter: Serum potassium
    operator: '>'
    value: 5.5
    unit: mmol/L
  status: ACTIVE
- cql_file: ADA2026Diabetes.cql
  cql_define: Perindopril UACR Threshold (KB-4)
  cql_line: 54
  guideline:
    authority: ADA
    document: ADA Standards of Care 2026
    section: 11.6a
    quote: "Annual quantitative UACR assessment is needed for diagnosis of albuminuria;\
      \ UACR \u226530 mg/g triggers ACEi/ARB therapy."
  consumes:
  - kb: KB-4
    table: kb4_safety_signals
    field: labThreshold
    filter: rxnorm_code='54552'
  expected_threshold:
    parameter: UACR
    operator: <
    value: 30
    unit: mg/g
  status: ACTIVE
- cql_file: ADA2026Diabetes.cql
  cql_define: Exenatide Renal Contraindication (KB-4)
  cql_line: 64
  guideline:
    authority: ADA
    document: ADA Standards of Care 2026
    section: '9.11'
    quote: Exenatide should not be used in individuals with eGFR < 30 mL/min/1.73
      m2 or on dialysis.
  consumes:
  - kb: KB-4
    table: kb4_safety_signals
    field: labThreshold
    filter: rxnorm_code='60548'
  expected_threshold:
    parameter: Creatinine Clearance
    operator: <=
    value: 30
    unit: mL/min
  status: ACTIVE
