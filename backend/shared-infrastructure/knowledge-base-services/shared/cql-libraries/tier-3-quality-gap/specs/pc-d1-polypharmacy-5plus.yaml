rule_id: VAIDSHALA_PC_D1_POLYPHARMACY_5PLUS_HIGH_RISK
schema_version: "2.0"
library: PharmaCareStandard5
define: "PharmaCare D1 Polypharmacy Trigger 5plus High Risk Class"
criterion_set: VAIDSHALA_TIER3
criterion_id: VAIDSHALA-PC-D1-POLYPHARMACY-5PLUS-HIGH-RISK
content_sha: "eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee"
tier: tier_3_quality_gap
summary: >
  PHARMA-Care domain D1 (medicines optimisation / polypharmacy) lower-threshold gate at 5+ active medicines with HIGH_RISK_DRUG_CLASS_PRESENT concern. Aged Care Quality Standard 5 risk identification. TODO(clinical-author): confirm PHARMA-Care domain-D1 published label.

trigger_sources:
  - source_type: condition_change
    predicate: "concern_or_event_changed"
  - source_type: care_transition
    predicate: "transition_event_recorded"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: polypharmacy_count
      read_or_write: read
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: clinical
      fact_type: care_intensity
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: recommendation
      fact_type: drafted_recommendation
      action: create_drafted_recommendation
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "CurrentCareIntensity(resident) <> 'active_treatment'"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'VAIDSHALA_PC_D1_POLYPHARMACY_5PLUS_HIGH_RISK', 84)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/pc-d1-polypharmacy-5plus-positive.json
    expected_fire: true
    expected_recommendation: "Surface polypharmacy + high-risk-class signal per PHARMA-Care D1"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/pc-d1-polypharmacy-5plus-negative.json
    expected_fire: false
  - name: suppression_palliative_no_fire
    class: care_intensity
    fixture: fixtures/pc-d1-polypharmacy-5plus-suppression.json
    expected_fire: false
