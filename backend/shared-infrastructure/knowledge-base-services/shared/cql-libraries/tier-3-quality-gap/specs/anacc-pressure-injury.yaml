rule_id: VAIDSHALA_ANACC_PRESSURE_INJURY_RISK_EVIDENCE
schema_version: "2.0"
library: ANACCDefensibility
define: "ANACC Pressure Injury Risk Evidence"
criterion_set: VAIDSHALA_TIER3
criterion_id: VAIDSHALA-ANACC-PRESSURE-INJURY-RISK
content_sha: "eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee"
tier: tier_3_quality_gap
summary: >
  AIHW AN-ACC v1.1 pressure-injury-risk indicator (skin integrity). Active PRESSURE_INJURY_STAGE_2_PLUS concern OR recent pressure_injury_event Event AND no AN-ACC reassessment Event in last 30 days.

trigger_sources:
  - source_type: condition_change
    predicate: "concern_or_event_changed"
  - source_type: care_transition
    predicate: "transition_event_recorded"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: clinical
      fact_type: events
      read_or_write: read
    - machine: clinical
      fact_type: care_intensity
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: recommendation
      fact_type: drafted_recommendation
      action: create_drafted_recommendation
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "CurrentCareIntensity(resident) <> 'active_treatment'"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'VAIDSHALA_ANACC_PRESSURE_INJURY_RISK_EVIDENCE', 14)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/anacc-pressure-injury-positive.json
    expected_fire: true
    expected_recommendation: "Surface AN-ACC pressure-injury-risk evidence for assessor review"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/anacc-pressure-injury-negative.json
    expected_fire: false
  - name: suppression_palliative_no_fire
    class: care_intensity
    fixture: fixtures/anacc-pressure-injury-suppression.json
    expected_fire: false
