rule_id: VAIDSHALA_TX_STEWARDSHIP_HANDOFF_DOCUMENTATION_MISSING
schema_version: "2.0"
library: CareTransition
define: "Stewardship Handoff Documentation Missing"
criterion_set: VAIDSHALA_TIER3
criterion_id: VAIDSHALA-TX-STEWARDSHIP-HANDOFF-MISSING
content_sha: "eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee"
tier: tier_3_quality_gap
summary: >
  ACSQHC Antimicrobial Stewardship Framework: documented antimicrobial handoff at care-transition required when antimicrobial (ATC J01) active during hospital_discharge or admission_to_facility Event. No stewardship_handoff_documented concern closed.

trigger_sources:
  - source_type: condition_change
    predicate: "concern_or_event_changed"
  - source_type: care_transition
    predicate: "transition_event_recorded"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: medicine_uses_filtered_by_atc
      read_or_write: read
    - machine: clinical
      fact_type: events
      read_or_write: read
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: clinical
      fact_type: care_intensity
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: recommendation
      fact_type: drafted_recommendation
      action: create_drafted_recommendation
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "CurrentCareIntensity(resident) <> 'active_treatment'"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'VAIDSHALA_TX_STEWARDSHIP_HANDOFF_DOCUMENTATION_MISSING', 7)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/tx-stewardship-handoff-positive.json
    expected_fire: true
    expected_recommendation: "Document antimicrobial stewardship handoff per ACSQHC Stewardship Framework"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/tx-stewardship-handoff-negative.json
    expected_fire: false
  - name: suppression_palliative_no_fire
    class: care_intensity
    fixture: fixtures/tx-stewardship-handoff-suppression.json
    expected_fire: false
