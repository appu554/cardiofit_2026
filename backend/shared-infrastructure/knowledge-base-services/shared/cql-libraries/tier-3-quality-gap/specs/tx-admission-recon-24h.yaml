rule_id: VAIDSHALA_TX_ADMISSION_RECON_NOT_STARTED_24H
schema_version: "2.0"
library: CareTransition
define: "Admission Medication Reconciliation Not Started 24h"
criterion_set: VAIDSHALA_TIER3
criterion_id: VAIDSHALA-TX-ADMISSION-RECON-NOT-STARTED-24H
content_sha: "eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee"
tier: tier_3_quality_gap
summary: >
  Aged Care Quality Standard 5 (Clinical Care) + ACSQHC Medication Safety: medication reconciliation must be initiated within 24h of admission. Recent admission_to_facility Event but no admission_recon_started Event in last 24h.

trigger_sources:
  - source_type: condition_change
    predicate: "concern_or_event_changed"
  - source_type: care_transition
    predicate: "transition_event_recorded"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: events
      read_or_write: read
    - machine: clinical
      fact_type: care_intensity
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: recommendation
      fact_type: drafted_recommendation
      action: create_drafted_recommendation
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "CurrentCareIntensity(resident) <> 'active_treatment'"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'VAIDSHALA_TX_ADMISSION_RECON_NOT_STARTED_24H', 7)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/tx-admission-recon-24h-positive.json
    expected_fire: true
    expected_recommendation: "Initiate admission medication reconciliation per Standard 5"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/tx-admission-recon-24h-negative.json
    expected_fire: false
  - name: suppression_palliative_no_fire
    class: care_intensity
    fixture: fixtures/tx-admission-recon-24h-suppression.json
    expected_fire: false
