rule_id: VAIDSHALA_PC_D3_FALLS_RISK_DRUG_BURDEN
schema_version: "2.0"
library: PharmaCareStandard5
define: "PharmaCare D3 Falls Risk Increasing Drug Burden"
criterion_set: VAIDSHALA_TIER3
criterion_id: VAIDSHALA-PC-D3-FALLS-RISK-DRUG-BURDEN
content_sha: "eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee"
tier: tier_3_quality_gap
summary: >
  PHARMA-Care domain D3 (ADE risk / falls-risk drugs) + Aged Care Quality Standard 5 safety. Resident has FALLS_RISK_INCREASING_DRUG_PRESENT concern AND a recent fall_within_90d Event. TODO(clinical-author): confirm PHARMA-Care domain-D3 falls-risk drug taxonomy published label.

trigger_sources:
  - source_type: condition_change
    predicate: "concern_or_event_changed"
  - source_type: care_transition
    predicate: "transition_event_recorded"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: clinical
      fact_type: events
      read_or_write: read
    - machine: clinical
      fact_type: care_intensity
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: recommendation
      fact_type: drafted_recommendation
      action: create_drafted_recommendation
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "CurrentCareIntensity(resident) <> 'active_treatment'"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'VAIDSHALA_PC_D3_FALLS_RISK_DRUG_BURDEN', 60)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/pc-d3-falls-risk-drug-positive.json
    expected_fire: true
    expected_recommendation: "Surface falls-risk-drug burden signal per PHARMA-Care D3"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/pc-d3-falls-risk-drug-negative.json
    expected_fire: false
  - name: suppression_palliative_no_fire
    class: care_intensity
    fixture: fixtures/pc-d3-falls-risk-drug-suppression.json
    expected_fire: false
