rule_id: VAIDSHALA_T4_PRESCRIBER_CREDENTIAL_EXPIRING_WITHIN_30D
schema_version: "2.0"
library: Lifecycle
define: "Prescriber Credential Expiring Within 30d"
criterion_set: VAIDSHALA_TIER4
criterion_id: VAIDSHALA-T4-PRESCRIBER-CREDENTIAL-EXPIRING-30D
content_sha: "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
tier: tier_4_surveillance
summary: >
  Lifecycle surveillance: prescriber credential / authorisation expiring within 30 days. Aged Care Act 2024 + Quality of Care Principles 2025 require active prescriber authorisation for restrictive-practice and Schedule-8 prescribing. Fires informationally to drive renewal workflow.

trigger_sources:
  - source_type: observation_update
    predicate: "trajectory_or_lifecycle_recomputed"
  - source_type: medication_change
    predicate: "any_change_to_relevant_atc"

state_machine_references:
  reads_from:
    - machine: consent
      fact_type: active_consents_for_class
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "substrate_threshold_not_crossed"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'VAIDSHALA_T4_PRESCRIBER_CREDENTIAL_EXPIRING_WITHIN_30D', 14)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/prescriber-credential-expiring-30d-positive.json
    expected_fire: true
    expected_recommendation: "Prescriber credential expiring within 30 days — initiate renewal workflow"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/prescriber-credential-expiring-30d-negative.json
    expected_fire: false
  - name: suppression_no_fire
    class: suppression
    fixture: fixtures/prescriber-credential-expiring-30d-suppression.json
    expected_fire: false
