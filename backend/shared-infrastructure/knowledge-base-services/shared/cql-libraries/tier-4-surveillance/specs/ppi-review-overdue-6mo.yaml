rule_id: VAIDSHALA_T4_PPI_REVIEW_OVERDUE_6MO
schema_version: "2.0"
library: Lifecycle
define: "PPI Review Overdue 6mo"
criterion_set: VAIDSHALA_TIER4
criterion_id: VAIDSHALA-T4-PPI-REVIEW-OVERDUE-PLACEHOLDER
content_sha: "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
tier: tier_4_surveillance
summary: >
  Lifecycle surveillance: PPI (ATC A02BC) active and no PPI_REVIEW_DONE_180D concern. ADG 2025 PPI review cycle (every 6 months). TODO(layer1-bind): bind to ADG 2025 PPI section once Pipeline-2 extracts the source PDF.

trigger_sources:
  - source_type: observation_update
    predicate: "trajectory_or_lifecycle_recomputed"
  - source_type: medication_change
    predicate: "any_change_to_relevant_atc"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: medicine_uses_filtered_by_atc
      read_or_write: read
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "substrate_threshold_not_crossed"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'VAIDSHALA_T4_PPI_REVIEW_OVERDUE_6MO', 30)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/ppi-review-overdue-6mo-positive.json
    expected_fire: true
    expected_recommendation: "PPI review overdue >6 months — prompt step-down/cessation review"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/ppi-review-overdue-6mo-negative.json
    expected_fire: false
  - name: suppression_no_fire
    class: suppression
    fixture: fixtures/ppi-review-overdue-6mo-suppression.json
    expected_fire: false
