rule_id: VAIDSHALA_T4_STATIN_REVIEW_OVERDUE_12MO
schema_version: "2.0"
library: Lifecycle
define: "Statin Review Overdue 12mo"
criterion_set: VAIDSHALA_TIER4
criterion_id: VAIDSHALA-T4-STATIN-REVIEW-OVERDUE-PLACEHOLDER
content_sha: "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
tier: tier_4_surveillance
summary: >
  Lifecycle surveillance: statin (ATC C10AA) active and no STATIN_REVIEW_DONE_365D concern. ADG 2025 statin review cycle (every 12 months in elderly). TODO(layer1-bind): bind to ADG 2025 statin section once Pipeline-2 extracts the source PDF.

trigger_sources:
  - source_type: observation_update
    predicate: "trajectory_or_lifecycle_recomputed"
  - source_type: medication_change
    predicate: "any_change_to_relevant_atc"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: medicine_uses_filtered_by_atc
      read_or_write: read
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "substrate_threshold_not_crossed"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'VAIDSHALA_T4_STATIN_REVIEW_OVERDUE_12MO', 60)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/statin-review-overdue-12mo-positive.json
    expected_fire: true
    expected_recommendation: "Statin review overdue >12 months — prompt continued-indication review"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/statin-review-overdue-12mo-negative.json
    expected_fire: false
  - name: suppression_no_fire
    class: suppression
    fixture: fixtures/statin-review-overdue-12mo-suppression.json
    expected_fire: false
