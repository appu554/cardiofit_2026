rule_id: START_E1_BONE_PROTECTIVE_THERAPY_OSTEOPOROSIS
schema_version: "2.0"
library: StartV3
define: "START E1 Bone Protective Therapy Osteoporosis"
criterion_set: START_V3
criterion_id: START-V3-E1
content_sha: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
tier: tier_2_deprescribing
summary: >
  Osteoporosis without bone-protective therapy (bisphosphonate ATC M05BA/M05BB or denosumab M05BX) per START v3 §E1 (O'Mahony et al. 2023). Drafts a PRESCRIBING_OMISSION recommendation.

trigger_sources:
  - source_type: medication_change
    predicate: "any_change_to_relevant_atc"
  - source_type: condition_change
    predicate: "indication_concern_changed"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: medicine_uses_filtered_by_atc
      read_or_write: read
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: clinical
      fact_type: care_intensity
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: recommendation
      fact_type: drafted_recommendation
      action: create_drafted_recommendation
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "CurrentCareIntensity(resident) <> 'active_treatment'"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'START_E1_BONE_PROTECTIVE_THERAPY_OSTEOPOROSIS', 90)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/start-e1-bone-osteo-positive.json
    expected_fire: true
    expected_recommendation: "Consider bone-protective therapy per START v3 E1"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/start-e1-bone-osteo-negative.json
    expected_fire: false
  - name: suppression_palliative_no_fire
    class: care_intensity
    fixture: fixtures/start-e1-bone-osteo-suppression.json
    expected_fire: false
