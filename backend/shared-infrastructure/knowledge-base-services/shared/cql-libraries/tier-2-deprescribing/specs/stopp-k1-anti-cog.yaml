rule_id: STOPP_K1_ANTICHOLINERGIC_IN_DELIRIUM_OR_DEMENTIA
schema_version: "2.0"
library: StoppV3
define: "STOPP K1 Anticholinergic In Delirium Or Dementia"
criterion_set: STOPP_V3
criterion_id: STOPP-V3-K1
content_sha: "cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc"
tier: tier_2_deprescribing
summary: >
  Anticholinergic-class medication active in resident with delirium or dementia per STOPP v3 §K1 (O'Mahony et al. 2023). Drafts a deprescribing recommendation.

trigger_sources:
  - source_type: medication_change
    predicate: "any_change_to_relevant_atc"
  - source_type: condition_change
    predicate: "indication_concern_changed"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: medicine_uses_filtered_by_atc
      read_or_write: read
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: clinical
      fact_type: care_intensity
      read_or_write: read
    - machine: recommendation_state
      fact_type: recently_actioned
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: recommendation
      fact_type: drafted_recommendation
      action: create_drafted_recommendation
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

suppressions:
  - class: substrate_state
    predicate: "CurrentCareIntensity(resident) <> 'active_treatment'"
  - class: recently_actioned
    predicate: "WasActionedRecently(resident, 'STOPP_K1_ANTICHOLINERGIC_IN_DELIRIUM_OR_DEMENTIA', 90)"

test_cases:
  - name: positive_fires
    class: positive
    fixture: fixtures/stopp-k1-anti-cog-positive.json
    expected_fire: true
    expected_recommendation: "Consider anticholinergic deprescribing per STOPP v3 K1"
  - name: negative_no_fire
    class: substrate_state
    fixture: fixtures/stopp-k1-anti-cog-negative.json
    expected_fire: false
  - name: suppression_palliative_no_fire
    class: care_intensity
    fixture: fixtures/stopp-k1-anti-cog-suppression.json
    expected_fire: false
