rule_id: FALLS_RISK_COMPOUNDING_MEDICATIONS
schema_version: "2.0"
library: PostFall
define: "Falls Risk Compounding Medications"
criterion_set: VAIDSHALA_TIER1
criterion_id: TIER1-FALL-004
content_sha: "7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d7d"
tier: tier_1_immediate_safety
summary: >
  Resident has ≥3 fall-risk meds active simultaneously across the
  psychotropic + antihypertensive + benzodiazepine combination.
  Drafts a holistic falls-prevention review.

trigger_sources:
  - source_type: medication_change
    predicate: "any_change_to_falls_risk_med_classes"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: medicine_uses_filtered_by_atc
      read_or_write: read
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: clinical
      fact_type: care_intensity
      read_or_write: read
    - machine: evidence_trace
      fact_type: rule_fires_history
      read_or_write: read
  writes_to:
    - machine: recommendation
      fact_type: drafted_recommendation
      action: create_drafted_recommendation
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

authorisation_gating:
  required_roles:
    - "GP"
    - "NP"
    - "Pharmacist"
  latency_budget_ms: 60
  fallback_routing_if_unavailable:
    - after_hours_GP

suppressions:
  - class: substrate_state
    predicate: "HasActiveConcernType(resident, 'FALLS_REVIEW_COMPLETED')"
  - class: substrate_state
    predicate: "CurrentCareIntensity(resident) = 'palliative'"
  - class: recently_actioned
    predicate: "RuleFiredFor(resident, 'FALLS_RISK_COMPOUNDING_MEDICATIONS', last_30d)"

test_cases:
  - name: three_falls_risk_meds_fires
    class: baseline_aware_fire
    fixture: fixtures/compounding-three-meds.json
    expected_fire: true
    expected_recommendation: "Holistic falls-risk medication review"
  - name: two_meds_no_fire
    class: positive
    fixture: fixtures/compounding-two-meds.json
    expected_fire: false
  - name: suppression_falls_review_done
    class: substrate_state
    fixture: fixtures/compounding-review-done.json
    expected_fire: false
  - name: suppression_palliative
    class: care_intensity
    fixture: fixtures/compounding-palliative.json
    expected_fire: false
