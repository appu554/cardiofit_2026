# Tier 1 consent-gated psychotropic example.
# Validates against shared/cql-toolchain/schemas/rule_specification.v2.json.
rule_id: ANTIPSYCHOTIC_CONSENT_MISSING
schema_version: "2.0"
library: TierOneImmediateSafety
define: "Antipsychotic Long Term Without Active Consent"
criterion_set: VAIDSHALA_TIER1
criterion_id: TIER1-PSY-001
content_sha: "2222222222222222222222222222222222222222222222222222222222222222"
tier: tier_1_immediate_safety
summary: >
  Resident has been on an antipsychotic for >90 days without an
  active deprescribe-review consent. Fire a consent-gathering
  recommendation rather than a medication-change recommendation;
  routing goes through the SDM workflow.

trigger_sources:
  - source_type: medication_change
    predicate: "any_change_to_ATC_N05A"
  - source_type: consent_expiry_approaching
    predicate: "Antipsychotic_deprescribe_review expires <= 14d"

state_machine_references:
  reads_from:
    - machine: clinical
      fact_type: medicine_uses_filtered_by_atc
      read_or_write: read
    - machine: clinical
      fact_type: active_concerns
      read_or_write: read
    - machine: consent
      fact_type: active_consents_for_class
      read_or_write: read
    - machine: clinical
      fact_type: care_intensity
      read_or_write: read
  writes_to:
    - machine: recommendation
      fact_type: drafted_recommendation
      action: create_drafted_recommendation
    - machine: evidence_trace
      fact_type: rule_fire_node
      action: record_full_fire_context

consent_gating:
  required_consent_class: "Antipsychotic_deprescribe_review"
  expiry_check: true
  consent_missing_action: create_consent_gathering_recommendation
  consent_missing_recommendation_template: "discuss_psychotropic_with_SDM"

authorisation_gating:
  required_roles:
    - "SDM_workflow_owner"
  latency_budget_ms: 50
  fallback_routing_if_unavailable:
    - deferred

suppressions:
  - class: substrate_state
    predicate: "CurrentCareIntensity(resident) = 'palliative'"
  - class: recently_actioned
    predicate: "RuleFiredFor(resident, 'ANTIPSYCHOTIC_CONSENT_MISSING', last_30d)"

test_cases:
  - name: consent_missing_fires_consent_gathering
    class: consent_gating
    fixture: fixtures/antipsychotic-no-consent.json
    expected_fire: true
    expected_recommendation: "Discuss antipsychotic deprescribing with SDM and obtain consent"
  - name: consent_active_no_fire
    class: positive
    fixture: fixtures/antipsychotic-with-consent.json
    expected_fire: false
  - name: consent_expiring_fires
    class: consent_gating
    fixture: fixtures/antipsychotic-consent-expiring-7d.json
    expected_fire: true
  - name: suppression_palliative
    class: care_intensity
    fixture: fixtures/antipsychotic-palliative.json
    expected_fire: false
  - name: evidence_trace_records_consent_context
    class: evidence_trace
    fixture: fixtures/antipsychotic-no-consent.json
    expected_fire: true
