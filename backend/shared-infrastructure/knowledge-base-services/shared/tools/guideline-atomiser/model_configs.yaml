# MonkeyOCR Model Configuration for Docker Pipeline
# Uses transformers backend (no lmdeploy/vllm dependency needed)
# Models auto-download from HuggingFace on first use

device: cpu  # Docker on macOS has no GPU passthrough; use cpu

weights:
  doclayout_yolo: doclayout-yolo-docstructbench-imgsz1024
  layoutreader: hantian/layoutreader

models_dir: /root/.cache/huggingface/hub

layout_config:
  model: doclayout_yolo

chat_config:
  weight_path: echo840/MonkeyOCR
  backend: transformers
  batch_size: 2  # Conservative for CPU/low-memory
