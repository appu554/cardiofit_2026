[pytest]
# Pin tests/v5/ as its own pytest collection scope so discovery doesn't walk
# up into atomiser/__init__.py (pre-existing relative-import quirk that breaks
# pytest auto-discovery from above this directory).
#
# This file's mere presence makes pytest treat this dir as the rootdir, which
# scopes `norecursedirs` correctly. `testpaths = .` keeps collection here.
testpaths = .
norecursedirs = ..
