# KDIGO 2022 Diabetes in CKD — GuidelineProfile definition
#
# This YAML captures all values that were previously hardcoded in
# run_pipeline_targeted.py for the KDIGO guideline. Loading this file
# with GuidelineProfile.from_yaml() produces the same profile as
# GuidelineProfile.kdigo_default().
#
# To add a new guideline (e.g. ADA 2024), copy this file and change
# all values to match the new guideline's metadata and PDF filenames.

profile_id: kdigo_2022_diabetes_ckd
display_name: "KDIGO 2022 Diabetes in CKD"
authority: KDIGO
document_title: "KDIGO 2022 Diabetes in CKD"
effective_date: "2022-11-01"
doi: "10.1016/j.kint.2022.06.008"
version: "2022"

# PDF filenames (resolved relative to the pipeline's pdfs_dir)
pdf_sources:
  quick-reference: "KDIGO-2022-Diabetes-Guideline-Quick-Reference-Guide.pdf"
  full-guide: "KDIGO-2022-Clinical-Practice-Guideline-for-Diabetes-Management-in-CKD.pdf"
  dosing-report: "KDIGO-DrugDosingReportFinal.pdf"

# Channel B: Additional drug ingredients beyond the base dictionary.
# Format: drug_name: rxnorm_code (or null if no code)
# KDIGO uses the base dictionary as-is — no extras needed.
extra_drug_ingredients: {}

# Channel B: Additional drug class name variants.
# Format: variant_text: CanonicalClassName
extra_drug_classes: {}

# Channel C: Additional regex patterns.
# Format: list of [pattern_regex, confidence, category]
extra_patterns: []

# Drug class names to skip during RxNorm pre-lookup (KB-7).
# These are class-level terms, not individual ingredients.
drug_class_skip_list:
  # Canonical class labels (lowercased) from DossierAssembler v4.2.1
  - sglt2i
  - acei
  - arb
  - "glp-1 ra"
  - mra
  - nsmra
  - "dpp-4i"
  - sulfonylurea
  - tzd
  - rasi
  - beta-blocker
  - ccb
  - diuretic
  - "loop diuretic"
  - statin
  - nsaid

# Section headings indicating non-clinical reference zones.
reference_section_headings:
  - References
  - Bibliography
  - "Supplementary Materials"

# Tiering configuration
tiering_classifier: rule_based
# tiering_golden_dataset: null  # Set to path when trained model is available
