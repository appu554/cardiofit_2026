# Heart Foundation Australia — 2025 ACS + 2023 CVD Risk + Cholesterol Action
#
# Wave 6 source 1 of 5. Aggregates the 9 PDFs downloaded from
# heartfoundation.org.au (assets.contentstack.io CDN) into a single
# profile for Pipeline 1 V4 multi-channel extraction.
#
# Source documents:
#   - ACS Guideline 2025 (full + reference + summary + 2 supplements)
#   - CVD Risk Assessment Guideline 2023
#   - Cholesterol Action Plan 2026
#   - Hypertension Guidelines 2016 (slides — older, lower priority)
#
# Storage:  data/pdfs/AU-HF-*.pdf  (9 files staged 2026-04-30)
# License:  open download from heartfoundation.org.au; copyright posture
#           = facts uncopyrightable, prose re-phrased per Wang 2024 model.

profile_id: heart_foundation_au_2025
display_name: "Heart Foundation Australia — ACS + CVD Risk + Cholesterol"
authority: "Heart Foundation Australia (NHFA)"
document_title: "Heart Foundation Clinical Guidelines (composite)"
effective_date: "2025-01-01"
doi: ""                                 # NHFA guidelines don't carry DOIs
version: "2025"

# PDF filenames (resolved relative to data/pdfs/)
pdf_sources:
  acs-guideline:        "AU-HF-ACS-Guideline-2025.pdf"
  acs-reference:        "AU-HF-ACS-Reference-Guide-2025.pdf"
  acs-summary:          "AU-HF-ACS-Summary-2025.pdf"
  acs-hcp-summary:      "AU-HF-ACS-HCP-Summary-2025.pdf"
  acs-supplement-a:     "AU-HF-ACS-Supplement-A-2025.pdf"
  acs-supplement-b:     "AU-HF-ACS-Supplement-B-2025.pdf"
  cvd-risk:             "AU-HF-CVD-Risk-2023.pdf"
  cholesterol-action:   "AU-HF-Cholesterol-Action-Plan-2026.pdf"
  hypertension-slides:  "AU-HF-Hypertension-Slides-2016.pdf"

# Channel B: Additional drug ingredients beyond the base dictionary.
# Heart-Foundation guidelines reference common cardiovascular agents that
# the base dictionary already covers. AU-specific brand variants only.
# (RxCUIs from RxNav-in-a-Box; null if AU-only brand without RxCUI.)
extra_drug_ingredients:
  ticagrelor: "1116632"          # Brilinta — covered in ACS DAPT
  prasugrel: "613391"            # Effient — covered in ACS DAPT
  rivaroxaban: "1114195"         # Xarelto — covered in ACS antithrombotic
  apixaban: "1364430"            # Eliquis — covered in ACS antithrombotic
  bisoprolol: "19484"            # widely used AU beta-blocker post-ACS
  metoprolol-succinate: "221124" # AU formulary preferred for HF
  sacubitril-valsartan: "1656328" # Entresto — appears in HF sections
  evolocumab: "1657777"          # PCSK9i in cholesterol guidelines
  alirocumab: "1659151"          # PCSK9i in cholesterol guidelines
  inclisiran: "2613084"          # newer PCSK9 silencer

# Channel B: Additional drug class name variants.
extra_drug_classes:
  "P2Y12 inhibitor": "P2Y12i"
  "P2Y12 receptor antagonist": "P2Y12i"
  "DAPT": "DAPT"                  # dual antiplatelet — composite indicator
  "DOAC": "DOAC"
  "NOAC": "DOAC"
  "PCSK9 inhibitor": "PCSK9i"
  "PCSK9-i": "PCSK9i"
  "ARNI": "ARNI"                  # angiotensin receptor-neprilysin inhibitor
  "high-intensity statin": "statin"
  "moderate-intensity statin": "statin"

# Channel C: Additional regex patterns specific to ACS/CVD-risk guidelines.
# Format: list of [pattern_regex, confidence, category]
extra_patterns:
  # Door-to-balloon time (ACS)
  - ['(?i)door[- ]to[- ]balloon\s+(?:time)?\s*(?:[<≤>≥=]?\s*\d+\s*min)?', 0.85, "ACS_TIMING"]
  # Door-to-needle time (ACS)
  - ['(?i)door[- ]to[- ]needle\s+(?:time)?\s*(?:[<≤>≥=]?\s*\d+\s*min)?', 0.85, "ACS_TIMING"]
  # Loading dose pattern for antiplatelets
  - ['(?i)loading\s+dose\s+(?:of\s+)?\d+\s*mg', 0.80, "DOSING"]
  # 5-year CVD risk percentages
  - ['\d+(?:\.\d+)?\s*%\s*(?:5[- ]year|five[- ]year)\s+(?:CVD|cardiovascular)\s+risk', 0.85, "RISK_THRESHOLD"]
  # LDL-C targets
  - ['(?i)LDL[- ]?C\s*[<≤]\s*\d+(?:\.\d+)?\s*mmol/L', 0.90, "LIPID_TARGET"]
  # BP targets
  - ['(?i)(?:target|goal)\s+(?:BP|blood\s+pressure)\s*[<≤]\s*\d{2,3}/\d{2,3}', 0.90, "BP_TARGET"]

# Drug class names to skip during RxNorm pre-lookup (KB-7).
# These are class-level terms, not individual ingredients.
drug_class_skip_list:
  - acei
  - arb
  - arni
  - beta-blocker
  - ccb
  - dapt
  - diuretic
  - "loop diuretic"
  - mra
  - nsaid
  - p2y12i
  - pcsk9i
  - rasi
  - sglt2i
  - statin
  - thiazide

# Section headings indicating non-clinical reference zones.
# These get skipped by the section classifier so we don't waste channels
# extracting from bibliographies / acknowledgements / disclosures.
reference_section_headings:
  - References
  - Bibliography
  - "Supplementary Materials"
  - "Conflicts of Interest"
  - "Conflict of Interest Disclosures"
  - Acknowledgements
  - Acknowledgments
  - "Working Group"
  - "Guideline Development Group"
  - Appendix

# Tiering configuration — rule-based until we have an HF-trained classifier.
tiering_classifier: rule_based
