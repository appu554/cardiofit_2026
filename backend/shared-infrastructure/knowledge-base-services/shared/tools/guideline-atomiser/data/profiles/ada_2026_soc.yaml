# ADA 2026 Standards of Care in Diabetes — GuidelineProfile definition
#
# Published: Diabetes Care, Volume 49, Supplement 1, January 2026
# DOI: 10.2337/dc26-SINT
#
# Delta extraction: Sections 9, 10, 11, 13 (Section 6 pending download).
# Key 2025→2026 changes: tirzepatide first-line, SGLT2i eGFR≥20,
# SBP <120 for high-risk (BPROAD), finerenone+SGLT2i simultaneous (CONFIDENCE).
#
# Usage:
#   python run_pipeline_targeted.py --pipeline 1 \
#     --source delta-pages \
#     --guideline profiles/ada_2026_soc.yaml

profile_id: ada_2026_soc
display_name: "ADA 2026 Standards of Care in Diabetes"
authority: ADA
document_title: "Standards of Care in Diabetes — 2026"
effective_date: "2026-01-01"
doi: "10.2337/dc26-SINT"
version: "2026"

# PDF filenames (resolved relative to the pipeline's pdfs_dir)
pdf_sources:
  section-06: "ADA-2026-SOC-Section06-Glycemic-Goals.pdf"
  section-09: "ADA-2026-SOC-Section09-Pharmacologic.pdf"
  section-10: "ADA-2026-SOC-Section10-CVD.pdf"
  section-11: "ADA-2026-SOC-Section11-CKD.pdf"
  section-13: "ADA-2026-SOC-Section13-Older-Adults.pdf"
  # Merged delta: Sections 9+10+11+13 (98 pages, born-digital)
  # Section 6 will be added when available (adds ~18 pages → ~116 total)
  delta-pages: "ADA-2026-SOC-Delta-98pages.pdf"

# Channel B: ADA 2026 introduces tirzepatide as dual GIP/GLP-1 RA
# and reinforces finerenone (nsMRA) for CKD+DM.
extra_drug_ingredients:
  tirzepatide: "2601723"        # dual GIP/GLP-1 RA (Mounjaro/Zepbound)
  semaglutide: "2200644"        # GLP-1 RA (oral + injectable)
  liraglutide: "475968"         # GLP-1 RA
  dulaglutide: "1551373"        # GLP-1 RA
  exenatide: "60548"            # GLP-1 RA
  empagliflozin: "1545653"      # SGLT2i
  dapagliflozin: "1488564"      # SGLT2i
  canagliflozin: "1373458"      # SGLT2i
  finerenone: "2563978"         # nsMRA
  metformin: "6809"             # biguanide — first-line
  glimepiride: "25789"          # sulfonylurea
  glipizide: "4815"             # sulfonylurea
  glyburide: "4821"             # sulfonylurea
  pioglitazone: "33738"         # TZD
  sitagliptin: "593411"         # DPP-4i
  linagliptin: "1100699"        # DPP-4i
  saxagliptin: "857974"         # DPP-4i
  insulin_glargine: "274783"    # basal insulin
  insulin_degludec: "1670007"   # ultra-long basal insulin
  insulin_lispro: "86009"       # rapid-acting insulin
  insulin_aspart: "86182"       # rapid-acting insulin

# Channel B: ADA drug class variant spellings
extra_drug_classes:
  "GLP-1 receptor agonist": "GLP-1 RA"
  "glucagon-like peptide 1 receptor agonist": "GLP-1 RA"
  "GLP1RA": "GLP-1 RA"
  "dual GIP/GLP-1 RA": "dual GIP/GLP-1 RA"
  "dual GIP and GLP-1 receptor agonist": "dual GIP/GLP-1 RA"
  "SGLT2 inhibitor": "SGLT2i"
  "sodium-glucose cotransporter 2 inhibitor": "SGLT2i"
  "sodium–glucose cotransporter 2 inhibitor": "SGLT2i"
  "non-steroidal MRA": "nsMRA"
  "nonsteroidal mineralocorticoid receptor antagonist": "nsMRA"
  "DPP-4 inhibitor": "DPP-4i"
  "dipeptidyl peptidase 4 inhibitor": "DPP-4i"
  "thiazolidinedione": "TZD"
  "sulfonylurea": "SU"
  "ACE inhibitor": "ACEi"
  "angiotensin-converting enzyme inhibitor": "ACEi"
  "angiotensin receptor blocker": "ARB"
  "angiotensin II receptor blocker": "ARB"
  "calcium channel blocker": "CCB"
  "thiazide-like diuretic": "thiazide"
  "HMG-CoA reductase inhibitor": "statin"
  "high-intensity statin": "statin"
  "moderate-intensity statin": "statin"

# Channel C: ADA-specific patterns not in base grammar
extra_patterns:
  # ADA numbered recommendation format: "9.4 Use SGLT2i..." at line start
  - ["(?m)^\\d+\\.\\d+[a-z]?\\s+[A-Z]", 0.92, "ada_recommendation"]
  # ADA evidence grade at end of recommendation (standalone letter)
  - ["\\s[ABCE]\\s*$", 0.85, "ada_evidence_grade"]
  # Parenthesized ADA grade: "(A)", "(B)", "(C)", "(E)"
  - ["\\([ABCE]\\)\\s*$", 0.90, "ada_evidence_grade"]
  # HbA1c/A1C targets (ADA uses both spellings)
  - ["(?:HbA1c|A1C)\\s*[<>≥≤]\\s*\\d+(?:\\.\\d+)?\\s*%", 0.92, "lab_threshold"]
  # FBG/PPBG thresholds
  - ["(?:FBG|fasting\\s+(?:blood\\s+)?glucose)\\s*[<>≥≤]\\s*\\d+\\s*mg/dL", 0.90, "lab_threshold"]
  - ["(?:PPBG|postprandial\\s+glucose)\\s*[<>≥≤]\\s*\\d+\\s*mg/dL", 0.90, "lab_threshold"]
  # BP targets (ADA format: "<130/80 mmHg" or "systolic <120")
  - ["(?:systolic|SBP)\\s*[<>≥≤]\\s*\\d+\\s*mmHg", 0.90, "bp_threshold"]
  - ["(?:diastolic|DBP)\\s*[<>≥≤]\\s*\\d+\\s*mmHg", 0.90, "bp_threshold"]
  - ["<\\d+/\\d+\\s*mmHg", 0.88, "bp_threshold"]
  # LDL targets
  - ["LDL(?:-C)?\\s*[<>≥≤]\\s*\\d+\\s*mg/dL", 0.90, "lipid_threshold"]
  # eGFR thresholds (shared with KDIGO but ADA uses ≥20 for SGLT2i)
  - ["eGFR\\s*[<>≥≤]\\s*\\d+\\s*mL/min", 0.88, "lab_threshold"]
  # UACR thresholds
  - ["UACR\\s*[<>≥≤]\\s*\\d+\\s*mg/g", 0.88, "lab_threshold"]
  # Time in Range (CGM-specific) — TIR+TBR are paired constraints in ADA S13 Table 13.2
  # (e.g., TIR ≥70% AND TBR ≤4% for healthy elderly). Extracted independently by Channel C;
  # signal merger links co-occurring TIR+TBR spans within same section as paired constraint.
  - ["(?:TIR|time\\s+in\\s+range)\\s*[<>≥≤]\\s*\\d+\\s*%", 0.88, "cgm_threshold"]
  - ["(?:TBR|time\\s+below\\s+range)\\s*[<>≥≤]\\s*\\d+\\s*%", 0.88, "cgm_threshold"]
  - ["(?:TAR|time\\s+above\\s+range)\\s*[<>≥≤]\\s*\\d+\\s*%", 0.88, "cgm_threshold"]

