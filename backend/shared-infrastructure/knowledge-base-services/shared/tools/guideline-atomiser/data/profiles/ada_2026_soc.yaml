# ADA section headings indicating non-clinical reference zones
reference_section_headings:
  - References
  - "Suggested Citation"
  - "Disclosure"
  - "Acknowledgments"

# ADA does NOT use KDIGO-style subordinate headings.
# ADA sections are flat: numbered recommendations with inline text.
# Skip reparenting entirely for ADA by providing empty lists.
subordinate_headings: []
chapter_reset_headings: []

# Tiering: shadow mode (same as KDIGO — rule-based authoritative)
tiering_classifier: shadow
tiering_golden_dataset: "models/tier_assigner.joblib"

