# ============================================================================
# RSSDI section headings indicating non-clinical reference zones
# ============================================================================
reference_section_headings:
  - References
  - Bibliography
  - "Conflict of Interest"
  - "Disclosures"
  - "Acknowledgements"
  - "Author Contributions"

# ============================================================================
# Channel A heading configuration
# ============================================================================
# RSSDI uses a chapter-based format with "Recommendation" subheadings
# that should be reparented under their chapter section.
subordinate_headings:
  - "rationale"
  - "evidence"
  - "clinical considerations"
  - "indian perspective"
  - "practical tips"
  - "key messages"
  - "summary of evidence"

chapter_reset_headings:
  - "references"
  - "suggested reading"

# Tiering: shadow mode (rule-based authoritative, trained model logs)
tiering_classifier: shadow
tiering_golden_dataset: "models/tier_assigner.joblib"

