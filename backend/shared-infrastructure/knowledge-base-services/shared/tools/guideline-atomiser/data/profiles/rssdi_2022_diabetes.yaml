# RSSDI 2022 Clinical Practice Recommendations — GuidelineProfile definition
#
# Published: Int J Diabetes Dev Ctries, Volume 42, Supplement 1, October 2022
# DOI: 10.1007/s13410-022-01129-5
# Open access via PMC: PMC9534592
#
# RSSDI = Research Society for the Study of Diabetes in India
# This is the Tier 2 (India country-override) layer.
# ADA 2026 + KDIGO 2024 form Tier 1 (universal canonical).
# RSSDI modifies Tier 1 rules across 5 axes:
#   1. Glycemic targets (lower intervention thresholds for Indian population)
#   2. Drug sequencing (Indian formulary constraints: ₹200-500/month target)
#   3. BP targets (CSI 2020 alignment, BPROAD applicability)
#   4. CKD management (finerenone availability, monitoring feasibility)
#   5. Monitoring cadences (FPG-based interim when HbA1c quarterly not feasible)
#
# Usage:
#   python run_pipeline_targeted.py --pipeline 1 \
#     --source full-guide \
#     --guideline profiles/rssdi_2022_diabetes.yaml

profile_id: rssdi_2022_diabetes
display_name: "RSSDI 2022 Clinical Practice Recommendations for Diabetes"
authority: RSSDI
document_title: "RSSDI Clinical Practice Recommendations for the Management of Type 2 Diabetes Mellitus 2022"
effective_date: "2022-10-01"
doi: "10.1007/s13410-022-01129-5"
version: "2022"

# PDF filenames (resolved relative to the pipeline's pdfs_dir)
# RSSDI main CPR is a single 143-page document.
# Supplementary RSSDI 2022 position statements on HTN and dyslipidemia
# cover Zone 2 overlap (BP + lipids).
pdf_sources:
  full-guide: "RSSDI-2022-Clinical-Practice-Recommendations.pdf"
  hypertension: "RSSDI-2022-Hypertension-Guidelines.pdf"
  dyslipidemia: "RSSDI-2022-Dyslipidemia-Recommendations.pdf"

# ============================================================================
# Channel B: Indian-market drugs not in the base ADA/KDIGO drug dictionary
# ============================================================================
# These are drugs commonly prescribed in India that may not appear in
# Western-centric drug dictionaries. RxNorm codes where available.
extra_drug_ingredients:
  # Indian-market DPP-4 inhibitors
  teneligliptin: "1598392"        # DPP-4i (Tenelia) — very popular in India, ₹5-8/day
  vildagliptin: "596554"          # DPP-4i (Galvus) — widely used in India
  # Indian-market SGLT2 inhibitors
  remogliflozin: null             # SGLT2i (Remo) — India-first approval, no RxNorm
  # Alpha-glucosidase inhibitors (high usage in India)
  voglibose: "233969"             # AGI (Volix) — preferred over acarbose in India
  acarbose: "16681"               # AGI
  # Fixed-dose combinations popular in India
  glimepiride: "25789"            # SU (most prescribed SU in India)
  gliclazide: "4816"              # SU (preferred SU per RSSDI for lower hypo risk)
  # Standard drugs (reinforce for extraction)
  metformin: "6809"               # biguanide — universal first-line
  pioglitazone: "33738"           # TZD — still widely used in India
  sitagliptin: "593411"           # DPP-4i
  linagliptin: "1100699"          # DPP-4i (no renal dose adjustment — preferred in CKD)
  empagliflozin: "1545653"        # SGLT2i
  dapagliflozin: "1488564"        # SGLT2i
  canagliflozin: "1373458"        # SGLT2i
  semaglutide: "2200644"          # GLP-1 RA (limited access, high cost in India)
  liraglutide: "475968"           # GLP-1 RA (available but expensive)
  dulaglutide: "1551373"          # GLP-1 RA
  insulin_glargine: "274783"      # basal insulin (Basalog/Glaritus biosimilars)
  insulin_degludec: "1670007"     # ultra-long basal insulin
  insulin_aspart: "86182"         # rapid-acting insulin
  insulin_lispro: "86009"         # rapid-acting insulin
  human_insulin: "253182"         # regular human insulin (still first-line insulin in India)
  finerenone: "2563978"           # nsMRA (recently available in India)

