  "GLP-1 receptor agonist": "GLP-1 RA"
  "GLP-1 RA": "GLP-1 RA"
  "GLP1RA": "GLP-1 RA"
  "glucagon-like peptide-1 receptor agonist": "GLP-1 RA"
  "SGLT2 inhibitor": "SGLT2i"
  "SGLT-2 inhibitor": "SGLT2i"
  "sodium-glucose cotransporter 2 inhibitor": "SGLT2i"
  "sodium glucose co-transporter 2 inhibitor": "SGLT2i"
  "DPP-4 inhibitor": "DPP-4i"
  "DPP4 inhibitor": "DPP-4i"
  "dipeptidyl peptidase-4 inhibitor": "DPP-4i"
  "alpha-glucosidase inhibitor": "AGI"
  "α-glucosidase inhibitor": "AGI"
  "sulfonylurea": "SU"
  "sulphonylurea": "SU"          # British spelling (common in Indian literature)
  "thiazolidinedione": "TZD"
  "non-steroidal MRA": "nsMRA"
  "nonsteroidal mineralocorticoid receptor antagonist": "nsMRA"
  "ACE inhibitor": "ACEi"
  "angiotensin-converting enzyme inhibitor": "ACEi"
  "angiotensin receptor blocker": "ARB"
  "calcium channel blocker": "CCB"
  "thiazide-like diuretic": "thiazide"
  "statin": "statin"
  "fixed-dose combination": "FDC"     # RSSDI frequently discusses FDCs
  "premixed insulin": "premix insulin"
  "biphasic insulin": "premix insulin"

# ============================================================================
# Channel C: RSSDI-specific extraction patterns
# ============================================================================
extra_patterns:
  # RSSDI recommendation format (varies — numbered within chapters)
  - ["(?m)^Recommendation\\s*\\d+(?:\\.\\d+)*", 0.92, "rssdi_recommendation"]
  # RSSDI evidence grading: Grade A/B/C/D or Level I/II/III/IV
  - ["Grade\\s+[A-D]", 0.88, "evidence_grade"]
  - ["Level\\s+(?:I{1,3}V?|IV)", 0.88, "evidence_grade"]
  # Indian BMI cutoffs (RSSDI uses ≥23 overweight, ≥25 obese — WHO Asia-Pacific)
  - ["BMI\\s*[<>≥≤]\\s*\\d+(?:\\.\\d+)?\\s*kg/m", 0.90, "anthropometric_threshold"]
  - ["(?:overweight|obese)\\s*(?:≥|>=|>)\\s*\\d+", 0.85, "anthropometric_threshold"]
  # HbA1c/A1C targets
  - ["(?:HbA1c|A1C|HbA1C)\\s*[<>≥≤]\\s*\\d+(?:\\.\\d+)?\\s*%", 0.92, "lab_threshold"]
  # FPG/PPG thresholds (RSSDI uses FPG-based interim monitoring)
  - ["(?:FPG|FBG|fasting\\s+(?:plasma\\s+)?glucose)\\s*[<>≥≤]\\s*\\d+\\s*mg/dL", 0.90, "lab_threshold"]
  - ["(?:PPG|PPBG|postprandial\\s+(?:plasma\\s+)?glucose)\\s*[<>≥≤]\\s*\\d+\\s*mg/dL", 0.90, "lab_threshold"]
  # BP targets
  - ["(?:systolic|SBP)\\s*[<>≥≤]\\s*\\d+\\s*mmHg", 0.90, "bp_threshold"]
  - ["(?:diastolic|DBP)\\s*[<>≥≤]\\s*\\d+\\s*mmHg", 0.90, "bp_threshold"]
  - ["<\\d+/\\d+\\s*mmHg", 0.88, "bp_threshold"]
  # eGFR / UACR (shared with KDIGO/ADA)
  - ["eGFR\\s*[<>≥≤]\\s*\\d+\\s*mL/min", 0.88, "lab_threshold"]
  - ["UACR\\s*[<>≥≤]\\s*\\d+\\s*mg/g", 0.88, "lab_threshold"]
  # LDL targets
  - ["LDL(?:-C)?\\s*[<>≥≤]\\s*\\d+\\s*mg/dL", 0.90, "lipid_threshold"]
  # Cost/affordability markers (unique to RSSDI — tag for formulary override layer)
  - ["(?:cost[- ]effective|affordable|economic|budget|INR|₹)", 0.75, "formulary_context"]
  # Indian population-specific markers
  - ["(?:Indian\\s+population|South\\s+Asian|Asian\\s+Indian)", 0.80, "population_context"]

