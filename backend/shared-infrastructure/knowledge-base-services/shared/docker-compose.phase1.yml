# =============================================================================
# PHASE 1 DATA INGESTION - Docker Compose
# Purpose: Database stack for "Ship Value WITHOUT LLM" data sources
# Services: PostgreSQL, Redis (caching), Adminer (DB UI)
# =============================================================================
#
# Usage:
#   docker-compose -f docker-compose.phase1.yml up -d
#   docker-compose -f docker-compose.phase1.yml logs -f
#   docker-compose -f docker-compose.phase1.yml down
#
# After startup:
#   1. Run migrations: ./scripts/run-migrations.sh
#   2. Load Phase 1 data: go run ./cmd/phase1-ingest/main.go --all
#
# =============================================================================

services:
  # ===========================================================================
  # POSTGRESQL - Canonical Fact Store
  # ===========================================================================
  kb-postgres:
    image: postgres:15-alpine
    container_name: kb-fact-store
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kb_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb_secure_password_2024}
      POSTGRES_DB: ${POSTGRES_DB:-canonical_facts}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Persistent data
      - kb_postgres_data:/var/lib/postgresql/data
      # Initialization scripts (run on first startup)
      - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
      # Migrations volume (for manual runs)
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb_admin} -d ${POSTGRES_DB:-canonical_facts}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - kb-network
    # Performance tuning for clinical workloads
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=16MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    labels:
      com.cardiofit.service: "canonical-fact-store"
      com.cardiofit.phase: "1"
      com.cardiofit.component: "database"

  # ===========================================================================
  # REDIS - Tiered Caching (HOT cache for DDI lookups)
  # ===========================================================================
  kb-redis:
    image: redis:7-alpine
    container_name: kb-cache
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - kb_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - kb-network
    labels:
      com.cardiofit.service: "kb-cache"
      com.cardiofit.phase: "1"
      com.cardiofit.component: "cache"

  # ===========================================================================
  # ADMINER - Database Management UI
  # ===========================================================================
  kb-adminer:
    image: adminer:latest
    container_name: kb-adminer
    ports:
      - "${ADMINER_PORT:-8082}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: kb-postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      kb-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kb-network
    labels:
      com.cardiofit.service: "kb-adminer"
      com.cardiofit.phase: "1"
      com.cardiofit.component: "ui"

  # ===========================================================================
  # MIGRATION RUNNER - One-time container to apply migrations
  # ===========================================================================
  kb-migrate:
    image: postgres:15-alpine
    container_name: kb-migrate
    depends_on:
      kb-postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts:/scripts:ro
    environment:
      PGHOST: kb-postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-kb_admin}
      PGPASSWORD: ${POSTGRES_PASSWORD:-kb_secure_password_2024}
      PGDATABASE: ${POSTGRES_DB:-canonical_facts}
    command: >
      sh -c "
        echo '=== Running Phase 1 Migrations ===' &&
        for f in /migrations/*.sql; do
          echo \"Applying: $$f\" &&
          psql -f \"$$f\" || exit 1
        done &&
        echo '=== Migrations Complete ===' &&
        echo 'Migration versions applied:' &&
        psql -c 'SELECT * FROM schema_migrations ORDER BY version;'
      "
    networks:
      - kb-network
    profiles:
      - migrate
    labels:
      com.cardiofit.service: "kb-migrate"
      com.cardiofit.phase: "1"
      com.cardiofit.component: "migration"

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  kb_postgres_data:
    driver: local
    labels:
      com.cardiofit.data: "canonical-facts"
  kb_redis_data:
    driver: local
    labels:
      com.cardiofit.data: "cache"

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  kb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    labels:
      com.cardiofit.network: "knowledge-base"
