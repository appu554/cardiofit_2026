# KB-7 Knowledge Factory Workflow
# Orchestrates parallel terminology downloads and GitHub workflow dispatch

main:
  params: [input]
  steps:
    - init:
        assign:
          - project_id: $${sys.get_env("GOOGLE_CLOUD_PROJECT")}
          - timestamp: $${text.split(time.format(sys.now()), "T")[0]}
          - trigger: $${default(map.get(input, "trigger"), "manual")}
          - environment: "${environment}"

    - log_start:
        call: sys.log
        args:
          text: $${"Starting KB-7 Knowledge Factory workflow - Trigger: " + trigger}
          severity: INFO

    # Phase 1: Parallel Downloads
    - parallel_downloads:
        parallel:
          shared: [download_results]
          branches:
            # SNOMED CT Download Branch
            - snomed_branch:
                steps:
                  - log_snomed_start:
                      call: sys.log
                      args:
                        text: "Starting SNOMED CT download"
                        severity: INFO

                  - call_snomed_downloader:
                      try:
                        call: http.post
                        args:
                          url: https://${region}-${project_id}.cloudfunctions.net/${snomed_function}
                          auth:
                            type: OIDC
                          body:
                            timestamp: $${timestamp}
                            trigger: $${trigger}
                          timeout: 3600
                        result: snomed_result

                      except:
                        as: e
                        steps:
                          - log_snomed_error:
                              call: sys.log
                              args:
                                text: $${"SNOMED download failed: " + json.encode_to_string(e)}
                                severity: ERROR
                          - assign_snomed_error:
                              assign:
                                - snomed_result:
                                    body:
                                      status: "failed"
                                      error: $${e}

                  - log_snomed_complete:
                      call: sys.log
                      args:
                        text: $${"SNOMED download complete: " + json.encode_to_string(snomed_result.body)}
                        severity: INFO

            # RxNorm Download Branch
            - rxnorm_branch:
                steps:
                  - log_rxnorm_start:
                      call: sys.log
                      args:
                        text: "Starting RxNorm download"
                        severity: INFO

                  - call_rxnorm_downloader:
                      try:
                        call: http.post
                        args:
                          url: https://${region}-${project_id}.cloudfunctions.net/${rxnorm_function}
                          auth:
                            type: OIDC
                          body:
                            timestamp: $${timestamp}
                            trigger: $${trigger}
                          timeout: 3600
                        result: rxnorm_result

                      except:
                        as: e
                        steps:
                          - log_rxnorm_error:
                              call: sys.log
                              args:
                                text: $${"RxNorm download failed: " + json.encode_to_string(e)}
                                severity: ERROR
                          - assign_rxnorm_error:
                              assign:
                                - rxnorm_result:
                                    body:
                                      status: "failed"
                                      error: $${e}

                  - log_rxnorm_complete:
                      call: sys.log
                      args:
                        text: $${"RxNorm download complete: " + json.encode_to_string(rxnorm_result.body)}
                        severity: INFO

            # LOINC Download Branch
            - loinc_branch:
                steps:
                  - log_loinc_start:
                      call: sys.log
                      args:
                        text: "Starting LOINC download"
                        severity: INFO

                  - call_loinc_downloader:
                      try:
                        call: http.post
                        args:
                          url: https://${region}-${project_id}.cloudfunctions.net/${loinc_function}
                          auth:
                            type: OIDC
                          body:
                            timestamp: $${timestamp}
                            trigger: $${trigger}
                          timeout: 1800
                        result: loinc_result

                      except:
                        as: e
                        steps:
                          - log_loinc_error:
                              call: sys.log
                              args:
                                text: $${"LOINC download failed: " + json.encode_to_string(e)}
                                severity: ERROR
                          - assign_loinc_error:
                              assign:
                                - loinc_result:
                                    body:
                                      status: "failed"
                                      error: $${e}

                  - log_loinc_complete:
                      call: sys.log
                      args:
                        text: $${"LOINC download complete: " + json.encode_to_string(loinc_result.body)}
                        severity: INFO

    # Phase 2: Check Download Results
    - check_download_status:
        switch:
          - condition: $${snomed_result.body.status == "failed" OR rxnorm_result.body.status == "failed" OR loinc_result.body.status == "failed"}
            next: handle_download_failure

    # Phase 3: Dispatch GitHub Workflow
    - dispatch_github:
        call: http.post
        args:
          url: https://${region}-${project_id}.cloudfunctions.net/${github_function}
          auth:
            type: OIDC
          body:
            snomed_key: $${snomed_result.body.gcs_key}
            rxnorm_key: $${rxnorm_result.body.gcs_key}
            loinc_key: $${loinc_result.body.gcs_key}
            snomed_version: $${snomed_result.body.version}
            rxnorm_version: $${rxnorm_result.body.version}
            loinc_version: $${loinc_result.body.version}
          timeout: 300
        result: dispatch_result

    - log_dispatch_complete:
        call: sys.log
        args:
          text: $${"GitHub workflow dispatched: " + json.encode_to_string(dispatch_result.body)}
          severity: INFO

    # Phase 4: Return Success
    - return_success:
        return:
          status: "success"
          trigger: $${trigger}
          timestamp: $${timestamp}
          downloads:
            snomed: $${snomed_result.body}
            rxnorm: $${rxnorm_result.body}
            loinc: $${loinc_result.body}
          github_dispatch: $${dispatch_result.body}

    # Error Handling
    - handle_download_failure:
        steps:
          - log_failure:
              call: sys.log
              args:
                text: "One or more downloads failed. Aborting workflow."
                severity: ERROR

          - return_failure:
              return:
                status: "failed"
                trigger: $${trigger}
                timestamp: $${timestamp}
                downloads:
                  snomed: $${snomed_result.body}
                  rxnorm: $${rxnorm_result.body}
                  loinc: $${loinc_result.body}
                error: "Download failures detected"
