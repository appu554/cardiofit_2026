AWSTemplateFormatVersion: '2010-09-09'
Description: 'KB-7 Knowledge Factory - Secrets Manager for API Credentials'

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Environment name

  NHSTRUDApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: NHS TRUD API key (optional - can be set manually later)

  UMLSApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: UMLS API key (optional - can be set manually later)

  LOINCUsername:
    Type: String
    NoEcho: true
    Default: ''
    Description: LOINC username (optional - can be set manually later)

  LOINCPassword:
    Type: String
    NoEcho: true
    Default: ''
    Description: LOINC password (optional - can be set manually later)

  GitHubPAT:
    Type: String
    NoEcho: true
    Default: ''
    Description: GitHub Personal Access Token with repo scope (optional - can be set manually later)

Conditions:
  HasNHSKey: !Not [!Equals [!Ref NHSTRUDApiKey, '']]
  HasUMLSKey: !Not [!Equals [!Ref UMLSApiKey, '']]
  HasLOINCCreds: !And
    - !Not [!Equals [!Ref LOINCUsername, '']]
    - !Not [!Equals [!Ref LOINCPassword, '']]
  HasGitHubPAT: !Not [!Equals [!Ref GitHubPAT, '']]

Resources:
  # NHS TRUD API Key Secret
  NHSTRUDSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'kb7/${EnvironmentName}/nhs-trud-api-key'
      Description: 'NHS Terminology Reference Data Update Distribution (TRUD) API key for SNOMED downloads'
      SecretString: !If
        - HasNHSKey
        - !Sub |
            {
              "api_key": "${NHSTRUDApiKey}",
              "api_endpoint": "https://isd.digital.nhs.uk/trud/api/v1",
              "product_id": "101",
              "rotation_days": 90
            }
        - |
            {
              "api_key": "PLACEHOLDER-UPDATE-AFTER-STACK-CREATION",
              "api_endpoint": "https://isd.digital.nhs.uk/trud/api/v1",
              "product_id": "101",
              "rotation_days": 90
            }
      Tags:
        - Key: Project
          Value: CardioFit-KB7
        - Key: Purpose
          Value: SNOMED-Downloads
        - Key: RotationPolicy
          Value: Every90Days

  # UMLS API Key Secret
  UMLSSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'kb7/${EnvironmentName}/umls-api-key'
      Description: 'NIH Unified Medical Language System (UMLS) API key for RxNorm downloads'
      SecretString: !If
        - HasUMLSKey
        - !Sub |
            {
              "api_key": "${UMLSApiKey}",
              "api_endpoint": "https://uts-ws.nlm.nih.gov/rest",
              "rxnorm_endpoint": "https://rxnav.nlm.nih.gov/REST/rxnorm",
              "rotation_days": 365
            }
        - |
            {
              "api_key": "PLACEHOLDER-UPDATE-AFTER-STACK-CREATION",
              "api_endpoint": "https://uts-ws.nlm.nih.gov/rest",
              "rxnorm_endpoint": "https://rxnav.nlm.nih.gov/REST/rxnorm",
              "rotation_days": 365
            }
      Tags:
        - Key: Project
          Value: CardioFit-KB7
        - Key: Purpose
          Value: RxNorm-Downloads
        - Key: RotationPolicy
          Value: Annual

  # LOINC Credentials Secret
  LOINCSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'kb7/${EnvironmentName}/loinc-credentials'
      Description: 'Regenstrief Institute LOINC.org credentials for terminology downloads'
      SecretString: !If
        - HasLOINCCreds
        - !Sub |
            {
              "username": "${LOINCUsername}",
              "password": "${LOINCPassword}",
              "api_endpoint": "https://loinc.org/downloads",
              "rotation_days": 180
            }
        - |
            {
              "username": "PLACEHOLDER-UPDATE-AFTER-STACK-CREATION",
              "password": "PLACEHOLDER-UPDATE-AFTER-STACK-CREATION",
              "api_endpoint": "https://loinc.org/downloads",
              "rotation_days": 180
            }
      Tags:
        - Key: Project
          Value: CardioFit-KB7
        - Key: Purpose
          Value: LOINC-Downloads
        - Key: RotationPolicy
          Value: Biannual

  # GitHub Personal Access Token Secret
  GitHubPATSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'kb7/${EnvironmentName}/github-pat'
      Description: 'GitHub Personal Access Token for triggering Knowledge Factory workflows via repository_dispatch'
      SecretString: !If
        - HasGitHubPAT
        - !Sub |
            {
              "token": "${GitHubPAT}",
              "repo_owner": "cardiofit",
              "repo_name": "knowledge-factory",
              "api_endpoint": "https://api.github.com",
              "scopes": ["repo", "workflow"],
              "rotation_days": 90
            }
        - |
            {
              "token": "PLACEHOLDER-UPDATE-AFTER-STACK-CREATION",
              "repo_owner": "cardiofit",
              "repo_name": "knowledge-factory",
              "api_endpoint": "https://api.github.com",
              "scopes": ["repo", "workflow"],
              "rotation_days": 90
            }
      Tags:
        - Key: Project
          Value: CardioFit-KB7
        - Key: Purpose
          Value: GitHub-Dispatch
        - Key: RotationPolicy
          Value: Every90Days

  # IAM Role for Secrets Rotation (future enhancement)
  SecretsRotationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'KB7-SecretsRotation-Role-${EnvironmentName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                Resource:
                  - !Ref NHSTRUDSecret
                  - !Ref UMLSSecret
                  - !Ref LOINCSecret
                  - !Ref GitHubPATSecret

  # CloudWatch Alarm for Secret Expiration (30 days warning)
  SecretExpirationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'KB7-Secrets-Expiring-${EnvironmentName}'
      AlarmDescription: 'KB-7 API credentials expiring within 30 days'
      MetricName: SecretsNearingExpiration
      Namespace: KB7/KnowledgeFactory
      Statistic: Sum
      Period: 86400  # Daily check
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  NHSTRUDSecretArn:
    Description: ARN of NHS TRUD API key secret
    Value: !Ref NHSTRUDSecret
    Export:
      Name: !Sub '${AWS::StackName}-NHSTRUDSecretArn'

  UMLSSecretArn:
    Description: ARN of UMLS API key secret
    Value: !Ref UMLSSecret
    Export:
      Name: !Sub '${AWS::StackName}-UMLSSecretArn'

  LOINCSecretArn:
    Description: ARN of LOINC credentials secret
    Value: !Ref LOINCSecret
    Export:
      Name: !Sub '${AWS::StackName}-LOINCSecretArn'

  GitHubPATSecretArn:
    Description: ARN of GitHub PAT secret
    Value: !Ref GitHubPATSecret
    Export:
      Name: !Sub '${AWS::StackName}-GitHubPATSecretArn'

  SecretsRotationRoleArn:
    Description: ARN of secrets rotation role
    Value: !GetAtt SecretsRotationRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RotationRoleArn'

  PostDeploymentInstructions:
    Description: Next steps after stack creation
    Value: !Sub |
      1. Update secrets with actual credentials:
         aws secretsmanager update-secret --secret-id kb7/${EnvironmentName}/nhs-trud-api-key --secret-string '{"api_key":"YOUR_KEY"}'
         aws secretsmanager update-secret --secret-id kb7/${EnvironmentName}/umls-api-key --secret-string '{"api_key":"YOUR_KEY"}'
         aws secretsmanager update-secret --secret-id kb7/${EnvironmentName}/loinc-credentials --secret-string '{"username":"USER","password":"PASS"}'
         aws secretsmanager update-secret --secret-id kb7/${EnvironmentName}/github-pat --secret-string '{"token":"YOUR_PAT"}'
      2. Verify secrets access from Lambda functions
      3. Test manual invocation of Step Functions workflow
