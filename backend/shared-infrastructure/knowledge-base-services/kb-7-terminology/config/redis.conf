# Redis Configuration for KB7 Terminology Hybrid Cache
# Phase 3.5 - Optimized for terminology lookups

# Network and basic settings
bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
tcp-keepalive 60
timeout 0

# Memory management for terminology caching
maxmemory 1gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence settings (AOF for data safety)
appendonly yes
appendfilename "kb7-cache.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Performance tuning for fast lookups
databases 16
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# Slow log for performance monitoring
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Thread I/O for better performance
io-threads 4
io-threads-do-reads yes

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG ""

# Logging
loglevel notice
logfile ""
syslog-enabled no

# Lua scripting
lua-time-limit 5000

# Latency monitoring
latency-monitor-threshold 100

# Active rehashing for better performance
activerehashing yes

# Client connection settings
hz 10
dynamic-hz yes

# RDB snapshots (backup every hour)
save 3600 1
save 300 100
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename kb7-cache.rdb
dir /data