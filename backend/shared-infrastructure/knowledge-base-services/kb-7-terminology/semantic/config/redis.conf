# Redis Configuration for KB-7 Semantic Caching
port 6379
bind 0.0.0.0
protected-mode no
timeout 0
tcp-keepalive 300

# Memory and Performance
maxmemory 1gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence for semantic cache
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename semantic-cache.rdb

# Logging
loglevel notice
logfile ""

# Clinical Data Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_KB7_ONLY"

# Performance optimizations for semantic queries
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Enable keyspace notifications for cache invalidation
notify-keyspace-events "Ex"

# Slowlog for query optimization
slowlog-log-slower-than 10000
slowlog-max-len 128