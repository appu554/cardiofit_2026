# KB7 Terminology Migration Configuration
# Phase 3.5.1 - GraphDB to Hybrid Architecture Migration

# GraphDB Source Configuration
graphdb_endpoint: "http://localhost:7200"
graphdb_repository: "kb7-terminology"
graphdb_username: null  # Set if authentication required
graphdb_password: null  # Set if authentication required

# PostgreSQL Target Configuration
postgres_url: "postgresql://kb7_user:kb7_secure_password@localhost:5433/kb7_terminology"

# Migration Settings
data_dir: "data"
logs_dir: "logs"
batch_size: 1000

# Migration Phases
validate_integrity: true
optimize_graphdb: true
backup_before_migration: true

# Performance Settings
max_concurrent_operations: 3
connection_timeout: 60