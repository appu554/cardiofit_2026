# Elasticsearch Configuration for CardioFit Global Cluster
cluster.name: cardiofit-global-cluster

# Network settings
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# Path settings
path.data: /usr/share/elasticsearch/data
path.logs: /usr/share/elasticsearch/logs

# Memory settings
bootstrap.memory_lock: true

# Discovery settings for cluster
discovery.type: single-node

# Index settings for medical terminology
index:
  number_of_shards: 3
  number_of_replicas: 1
  refresh_interval: 30s
  max_result_window: 50000

# Thread pool settings for search performance
thread_pool:
  search:
    queue_size: 2000
  write:
    queue_size: 1000

# Circuit breaker settings
indices.breaker.total.limit: 70%
indices.breaker.request.limit: 60%
indices.breaker.fielddata.limit: 60%

# Query settings
indices.query.bool.max_clause_count: 2048
search.max_buckets: 65536

# Medical terminology specific settings
action.auto_create_index: true
action.destructive_requires_name: true

# Logging
logger.level: INFO
logger.org.elasticsearch.discovery: DEBUG

# Security (disabled for development)
xpack.security.enabled: false
xpack.monitoring.collection.enabled: true

# Performance optimizations
indices.memory.index_buffer_size: 20%
indices.requests.cache.size: 2%
indices.fielddata.cache.size: 40%

# Slow query logging
index.search.slowlog.threshold.query.warn: 10s
index.search.slowlog.threshold.query.info: 5s
index.search.slowlog.threshold.query.debug: 2s
index.search.slowlog.threshold.query.trace: 500ms

index.search.slowlog.threshold.fetch.warn: 1s
index.search.slowlog.threshold.fetch.info: 800ms
index.search.slowlog.threshold.fetch.debug: 500ms
index.search.slowlog.threshold.fetch.trace: 200ms