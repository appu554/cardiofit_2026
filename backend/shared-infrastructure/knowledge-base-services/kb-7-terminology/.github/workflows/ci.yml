name: KB-7 Terminology Service CI

on:
  push:
    branches: [ main, develop, 'feature/**', 'hotfix/**' ]
    paths:
      - 'backend/services/medication-service/knowledge-bases/kb-7-terminology/**'
      - '.github/workflows/kb-7-terminology-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/services/medication-service/knowledge-bases/kb-7-terminology/**'
      - '.github/workflows/kb-7-terminology-ci.yml'
  workflow_dispatch: # Allow manual trigger

defaults:
  run:
    working-directory: backend/services/medication-service/knowledge-bases/kb-7-terminology

env:
  GO_VERSION: '1.21'
  POSTGRES_VERSION: '15'
  REDIS_VERSION: '7-alpine'

jobs:
  # Lint and Code Quality
  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/services/medication-service/knowledge-bases/kb-7-terminology/go.sum

      - name: Install dependencies
        run: make ci-deps

      - name: Run linting
        run: make ci-lint

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # Unit Tests (no Docker required)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/services/medication-service/knowledge-bases/kb-7-terminology/go.sum

      - name: Install dependencies
        run: make deps

      - name: Run unit tests
        run: make test-unit

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-results
          path: |
            backend/services/medication-service/knowledge-bases/kb-7-terminology/test-results.xml

  # Integration Tests (requires Docker)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: kb_test_user
          POSTGRES_PASSWORD: kb_test_password
          POSTGRES_DB: clinical_governance_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/services/medication-service/knowledge-bases/kb-7-terminology/go.sum

      - name: Install dependencies
        run: make deps

      - name: Wait for services
        run: |
          # Wait for PostgreSQL
          until pg_isready -h localhost -p 5434 -U kb_test_user; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          
          # Wait for Redis
          until redis-cli -h localhost -p 6381 ping | grep -q PONG; do
            echo "Waiting for Redis..."
            sleep 1
          done

      - name: Initialize test database
        run: |
          # Install PostgreSQL client
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
          # Initialize database with extensions
          PGPASSWORD=kb_test_password psql -h localhost -p 5434 -U kb_test_user -d clinical_governance_test < scripts/init-test-db.sql

      - name: Run database integration tests
        env:
          TEST_ENV: docker
          DATABASE_URL: postgresql://kb_test_user:kb_test_password@localhost:5434/clinical_governance_test
          REDIS_URL: redis://localhost:6381/8
        run: make test-database

      - name: Run API integration tests
        env:
          TEST_ENV: docker
          DATABASE_URL: postgresql://kb_test_user:kb_test_password@localhost:5434/clinical_governance_test
          REDIS_URL: redis://localhost:6381/8
        run: make test-api

      - name: Upload integration test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: |
            backend/services/medication-service/knowledge-bases/kb-7-terminology/integration-test-results.xml

  # Build and Security Scan
  build:
    name: Build and Security Scan
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/services/medication-service/knowledge-bases/kb-7-terminology/go.sum

      - name: Install dependencies
        run: make deps

      - name: Build service
        run: make ci-build

      - name: Run security scan
        uses: securecodewarrior/github-action-add-sarif@v1
        with:
          sarif-file: 'gosec-report.sarif'
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: kb-7-terminology-binary
          path: backend/services/medication-service/knowledge-bases/kb-7-terminology/bin/kb-7-terminology
          retention-days: 7

  # Coverage Report
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: kb_test_user
          POSTGRES_PASSWORD: kb_test_password
          POSTGRES_DB: clinical_governance_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/services/medication-service/knowledge-bases/kb-7-terminology/go.sum

      - name: Install dependencies
        run: make deps

      - name: Wait for services
        run: |
          until pg_isready -h localhost -p 5434 -U kb_test_user; do sleep 2; done
          until redis-cli -h localhost -p 6381 ping | grep -q PONG; do sleep 1; done

      - name: Initialize test database
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=kb_test_password psql -h localhost -p 5434 -U kb_test_user -d clinical_governance_test < scripts/init-test-db.sql

      - name: Run tests with coverage
        env:
          TEST_ENV: docker
          DATABASE_URL: postgresql://kb_test_user:kb_test_password@localhost:5434/clinical_governance_test
          REDIS_URL: redis://localhost:6381/8
        run: make test-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/services/medication-service/knowledge-bases/kb-7-terminology/coverage.out
          flags: kb-7-terminology
          name: kb-7-terminology-coverage
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: |
            backend/services/medication-service/knowledge-bases/kb-7-terminology/coverage.out
            backend/services/medication-service/knowledge-bases/kb-7-terminology/coverage.html

  # Performance Testing
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: kb_test_user
          POSTGRES_PASSWORD: kb_test_password
          POSTGRES_DB: clinical_governance_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/services/medication-service/knowledge-bases/kb-7-terminology/go.sum

      - name: Install dependencies
        run: make deps

      - name: Wait for services and initialize
        run: |
          until pg_isready -h localhost -p 5434 -U kb_test_user; do sleep 2; done
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=kb_test_password psql -h localhost -p 5434 -U kb_test_user -d clinical_governance_test < scripts/init-test-db.sql

      - name: Run performance benchmarks
        env:
          TEST_ENV: docker
          DATABASE_URL: postgresql://kb_test_user:kb_test_password@localhost:5434/clinical_governance_test
          REDIS_URL: redis://localhost:6381/8
        run: make test-benchmark

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: backend/services/medication-service/knowledge-bases/kb-7-terminology/benchmark-results.txt

  # Docker Image Build (on main/develop)
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}/kb-7-terminology
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: backend/services/medication-service/knowledge-bases/kb-7-terminology
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deployment (on main branch only)
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker, performance]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying KB-7 Terminology service to staging..."
          # Add deployment scripts here
          
      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Add smoke test scripts here

  # Notification
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, build, coverage]
    if: always()
    steps:
      - name: Notify on success
        if: ${{ needs.lint.result == 'success' && needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' && needs.build.result == 'success' }}
        run: |
          echo "✅ KB-7 Terminology Service CI pipeline completed successfully!"
          
      - name: Notify on failure
        if: ${{ needs.lint.result == 'failure' || needs.unit-tests.result == 'failure' || needs.integration-tests.result == 'failure' || needs.build.result == 'failure' }}
        run: |
          echo "❌ KB-7 Terminology Service CI pipeline failed!"
          echo "Failed jobs:"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Coverage: ${{ needs.coverage.result }}"