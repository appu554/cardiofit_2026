# Institutional Treatment Preferences
# Evidence-based treatment selection preferences for Clinical Synthesis Hub

metadata:
  kb_name: "kb_clinical_context"
  version: "2.0.0"
  institution: "Clinical Synthesis Hub"
  effective_date: "2025-09-01"
  expires_date: "2026-09-01"
  clinical_domains: ["cardiovascular", "diabetes", "renal"]

treatment_preferences:
  
  # ========== HYPERTENSION PREFERENCES ==========
  
  - id: "PREF-HTN-001"
    condition: "hypertension"
    version: "1.0.0"
    effective_date: "2025-09-01"
    institution: "Clinical Synthesis Hub"
    clinical_domain: "cardiovascular"
    
    selection_rules:
      - phenotype: "PHE-CV000001"  # Stage 1 high risk
        patient_criteria: "!patient.contraindications.ace_inhibitor"
        contraindications: ["pregnancy", "angioedema_history", "hyperkalemia"]
        
        preferences:
          first_line:
            - class: "ace_inhibitor"
              specific_agent: "lisinopril"
              dosing:
                starting_dose: "10mg daily"
                target_dose: "20-40mg daily"
                max_dose: "80mg daily"
                titration_schedule: "every 2-4 weeks"
              condition: "!patient.ace_intolerant"
              rationale: "Institutional preference for CV and renal protection"
              evidence_level: "1A"
              cost_tier: 1
            - class: "arb"
              specific_agent: "losartan"
              dosing:
                starting_dose: "50mg daily"
                target_dose: "100mg daily"
                max_dose: "100mg daily"
              condition: "patient.ace_intolerant"
              rationale: "Alternative for ACE inhibitor intolerance"
              evidence_level: "1A"
              cost_tier: 1
            - class: "calcium_channel_blocker"
              specific_agent: "amlodipine"
              dosing:
                starting_dose: "2.5mg daily"
                target_dose: "5-10mg daily"
                max_dose: "10mg daily"
              condition: "patient.race == 'black' && !patient.has_ckd"
              rationale: "Enhanced efficacy in Black patients without CKD"
              evidence_level: "1B"
              cost_tier: 1
          
          alternatives:
            - class: "thiazide_diuretic"
              specific_agent: "hydrochlorothiazide"
              when: "patient.volume_overloaded || patient.heart_failure"
              rationale: "Volume management and CV outcomes"
              dosing:
                starting_dose: "12.5mg daily"
                target_dose: "25mg daily"
                max_dose: "50mg daily"
              monitoring_requirements: ["electrolytes", "kidney_function"]
          
          avoid:
            - class: "beta_blocker"
              reason: "Limited CV benefit as first-line in uncomplicated HTN"
              unless: "patient.has_cad || patient.has_heart_failure"
              severity: "avoid_if_possible"
            - class: "alpha_blocker"
              reason: "Increased cardiovascular events risk"
              unless: "patient.has_bph && other_agents_contraindicated"
              severity: "avoid_if_possible"
          
          combination_therapy:
            - agents: ["ace_inhibitor", "calcium_channel_blocker"]
              indication: "BP not controlled on monotherapy"
              sequence: "sequential"
              monitoring: ["kidney_function", "potassium"]
            - agents: ["ace_inhibitor", "thiazide_diuretic"]
              indication: "Volume overload or heart failure"
              sequence: "sequential"
              monitoring: ["electrolytes", "kidney_function"]
          
          formulary_preferences:
            ace_inhibitor: "lisinopril"  # Tier 1
            arb: "losartan"             # Tier 1
            ccb: "amlodipine"           # Tier 1
            thiazide: "hydrochlorothiazide"  # Tier 1

  # ========== DIABETES PREFERENCES ==========
  
  - id: "PREF-DM-001"
    condition: "diabetes"
    version: "1.0.0"
    effective_date: "2025-09-01"
    institution: "Clinical Synthesis Hub"
    clinical_domain: "diabetes"
    
    selection_rules:
      - phenotype: "PHE-DM000001"  # T2DM with CVD
        patient_criteria: "patient.egfr >= 30"
        contraindications: ["type_1_diabetes", "diabetic_ketoacidosis"]
        
        preferences:
          first_line:
            - class: "sglt2_inhibitor"
              specific_agent: "empagliflozin"
              dosing:
                starting_dose: "10mg daily"
                target_dose: "25mg daily"
                max_dose: "25mg daily"
              rationale: "Proven cardiovascular and renal benefits in T2DM with CVD"
              evidence_level: "1A"
              cost_tier: 2
              monitoring_requirements: ["kidney_function", "ketones", "volume_status"]
            - class: "glp1_agonist"
              specific_agent: "semaglutide"
              dosing:
                starting_dose: "0.25mg weekly"
                target_dose: "1.0mg weekly"
                max_dose: "2.0mg weekly"
              rationale: "Superior cardiovascular outcomes and weight management"
              evidence_level: "1A"
              cost_tier: 3
              monitoring_requirements: ["nausea", "pancreatitis_symptoms"]
          
          alternatives:
            - class: "dpp4_inhibitor"
              specific_agent: "sitagliptin"
              when: "patient.egfr < 30 || patient.sglt2_intolerant"
              rationale: "Kidney-safe alternative with neutral CV effects"
              dosing:
                starting_dose: "100mg daily"
                target_dose: "100mg daily (adjust for CKD)"
          
          avoid:
            - class: "sulfonylurea"
              reason: "Hypoglycemia risk and limited CV benefit"
              unless: "patient.cost_constraints && other_agents_contraindicated"
              severity: "avoid_if_possible"
          
          formulary_preferences:
            sglt2_inhibitor: "empagliflozin"    # Tier 2
            glp1_agonist: "semaglutide"        # Tier 3
            dpp4_inhibitor: "sitagliptin"      # Tier 2

  # ========== HEART FAILURE PREFERENCES ==========
  
  - id: "PREF-HF-001"
    condition: "heart_failure"
    version: "1.0.0"
    effective_date: "2025-09-01"
    institution: "Clinical Synthesis Hub"
    clinical_domain: "cardiovascular"
    
    selection_rules:
      - phenotype: "PHE-CV000003"  # HFrEF
        patient_criteria: "patient.lvef <= 40"
        contraindications: ["cardiogenic_shock", "severe_hypotension"]
        
        preferences:
          first_line:
            - class: "ace_inhibitor"
              specific_agent: "lisinopril"
              dosing:
                starting_dose: "2.5-5mg daily"
                target_dose: "20-40mg daily"
                max_dose: "80mg daily"
              rationale: "Mortality benefit and symptom improvement"
              evidence_level: "1A"
              cost_tier: 1
              monitoring_requirements: ["kidney_function", "potassium", "blood_pressure"]
            - class: "beta_blocker"
              specific_agent: "metoprolol_succinate"
              dosing:
                starting_dose: "12.5-25mg twice daily"
                target_dose: "200mg daily"
                max_dose: "400mg daily"
              rationale: "Mortality benefit in HFrEF"
              evidence_level: "1A"
              cost_tier: 1
              monitoring_requirements: ["heart_rate", "blood_pressure", "symptoms"]
            - class: "aldosterone_antagonist"
              specific_agent: "spironolactone"
              dosing:
                starting_dose: "12.5-25mg daily"
                target_dose: "25-50mg daily"
                max_dose: "50mg daily"
              condition: "patient.egfr >= 30 && patient.potassium < 5.0"
              rationale: "Mortality benefit and reduced hospitalizations"
              evidence_level: "1A"
              cost_tier: 1
              monitoring_requirements: ["potassium", "kidney_function", "gynecomastia"]
          
          combination_therapy:
            - agents: ["ace_inhibitor", "beta_blocker", "aldosterone_antagonist"]
              indication: "Triple therapy for HFrEF"
              sequence: "sequential"
              monitoring: ["kidney_function", "potassium", "blood_pressure", "heart_rate"]
          
          formulary_preferences:
            ace_inhibitor: "lisinopril"           # Tier 1
            beta_blocker: "metoprolol_succinate"  # Tier 1
            aldosterone_antagonist: "spironolactone"  # Tier 1

# ========== GOVERNANCE AND EVIDENCE ==========

clinical_context:
  evidence_sources:
    - source_type: "guideline"
      reference: "2022 AHA/ACC/HFSA Heart Failure Guideline"
      evidence_level: "1A"
      recommendation_class: "I"
    - source_type: "guideline"
      reference: "2017 ACC/AHA Hypertension Guideline"
      evidence_level: "1A"
      recommendation_class: "I"
    - source_type: "guideline"
      reference: "2025 ADA Standards of Care"
      evidence_level: "1A"
      recommendation_class: "A"

governance:
  approval_authority: ["P&T Committee", "Clinical Informatics", "Medical Director"]
  review_committee: "Pharmacy and Therapeutics Committee"
  last_review_date: "2025-08-30"
  next_review_date: "2026-02-28"
  review_frequency: "semi_annual"
  change_control:
    approval_required: true
    impact_assessment_required: true
    clinical_validation_required: true