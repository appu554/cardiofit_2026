# KB-2 Clinical Context Service - Docker Compose Configuration
# Uses MongoDB for document storage and Redis for caching

services:
  # KB-2 Clinical Context API
  kb-2-clinical-context:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb-2-clinical-context
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      ENVIRONMENT: development
      LOG_LEVEL: info
      # MongoDB Configuration
      MONGODB_URI: mongodb://kb2-mongo:27017
      MONGODB_DATABASE: clinical_context
      # Redis Configuration
      REDIS_URL: kb2-redis:6379
      # Metrics
      METRICS_ENABLED: "true"
    depends_on:
      kb2-mongo:
        condition: service_healthy
      kb2-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - kb2-network
    restart: unless-stopped

  # MongoDB for KB-2
  kb2-mongo:
    image: mongo:7.0
    container_name: kb2-mongo
    ports:
      - "27018:27017"
    volumes:
      - kb2-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb2-network
    restart: unless-stopped

  # Redis Cache for KB-2
  kb2-redis:
    image: redis:7-alpine
    container_name: kb2-redis
    ports:
      - "6384:6379"
    command: redis-server --appendonly yes
    volumes:
      - kb2-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb2-network
    restart: unless-stopped

volumes:
  kb2-mongo-data:
    name: kb2-mongo-data
  kb2-redis-data:
    name: kb2-redis-data

networks:
  kb2-network:
    name: kb2-network
    driver: bridge
