# gqlgen.yml configuration for KB-2 Clinical Context Service
schema:
  - schema.graphql

exec:
  filename: internal/graph/generated.go
  package: graph

model:
  filename: internal/graph/model/models_gen.go
  package: model

resolver:
  filename: internal/graph/resolver.go
  package: graph
  type: Resolver

# Scalar configuration
models:
  # Patient is federated and will be generated
  PatientContext:
    model:
      - kb-clinical-context/internal/models.PatientContext
  Demographics:
    model:
      - kb-clinical-context/internal/models.Demographics
  Condition:
    model:
      - kb-clinical-context/internal/models.Condition
  LabResult:
    model:
      - kb-clinical-context/internal/models.LabResult
  Medication:
    model:
      - kb-clinical-context/internal/models.Medication
  DetectedPhenotype:
    model:
      - kb-clinical-context/internal/models.DetectedPhenotype
  PhenotypeDefinition:
    model:
      - kb-clinical-context/internal/models.PhenotypeDefinition
  PhenotypeCriteria:
    model:
      - kb-clinical-context/internal/models.PhenotypeCriteria
  ConditionCriteria:
    model:
      - kb-clinical-context/internal/models.ConditionCriteria
  LabCriteria:
    model:
      - kb-clinical-context/internal/models.LabCriteria
  MedicationCriteria:
    model:
      - kb-clinical-context/internal/models.MedicationCriteria
  ClinicalSignificance:
    model:
      - kb-clinical-context/internal/models.ClinicalSignificance
  CareGap:
    model:
      - kb-clinical-context/internal/models.CareGap

  # Scalar mappings with custom implementations
  DateTime:
    model: time.Time
  UUID:
    model: github.com/google/uuid.UUID
  JSON:
    model: interface{}

# Federation directive handling
federation:
  filename: internal/graph/federation.go
  package: graph

# Do not autobind - we'll map models manually for federation compatibility