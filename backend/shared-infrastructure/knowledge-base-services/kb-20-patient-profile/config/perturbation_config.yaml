# Perturbation Suppression Configuration — KB-20 Track 3

perturbation_windows:
  # P1: Glucocorticoid-induced hyperglycaemia
  glucocorticoid:
    active_extension_days: 7       # steroid stop + 7 days = FULL suppression
    resolution_window_days: 28     # steroid stop + 28 days = DAMPENED

  # P2: SGLT2i initiation
  sglt2i_initiation:
    dampening_window_days: 14

  # P3: Insulin dose change (V-MCU's own action)
  insulin_dose_change:
    dampening_window_days: 5       # 5 half-lives of glargine

  # P4: Festival fasting (per fasting type)
  post_fasting_rebound:
    COMPLETE_FAST: 5               # days
    FRUIT_ONLY: 3
    ONE_MEAL: 2
    DIETARY_RESTRICTION: 0

  # P6: Metformin hold
  metformin_hold:
    dampening_window_days: 7

suppression_modes:
  FULL: 0.0      # CDI glucose contribution = 0, gain_factor = 0.0
  DAMPENED: 0.5   # CDI glucose contribution × 0.5, gain_factor × 0.5
  TAGGED: 1.0     # No suppression, just tagged
  NONE: 1.0

# Priority ordering (highest first) when multiple perturbations active
priority_order:
  - GLUCOCORTICOID
  - ACUTE_ILLNESS
  - FESTIVAL_FASTING
  - METFORMIN_HOLD
  - INSULIN_DOSE_CHANGE
  - SGLT2I_INITIATION
