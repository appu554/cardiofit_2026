# PREVENT Calculator Configuration — KB-20
# AHA PREVENT Equations (Khan et al., Circulation 2024)

risk_tiers:
  low_threshold: 0.05        # <5% = LOW
  borderline_threshold: 0.075 # 5-7.5% = BORDERLINE
  intermediate_threshold: 0.20 # 7.5-20% = INTERMEDIATE
                               # ≥20% = HIGH

sbp_targets:
  standard: 130   # LOW + BORDERLINE
  intensive: 120  # INTERMEDIATE + HIGH, or eGFR <60, or ACR ≥300

# Threshold for intensive SBP target based on PREVENT 10yr CVD risk.
# Patients with risk ≥ this threshold get the intensive target (120 mmHg).
# Default 0.075 (7.5%) = INTERMEDIATE tier boundary per AHA PREVENT 2024.
# Clinical teams may lower this (e.g., 0.05) to extend intensive targeting.
intensive_target_threshold: 0.075

# ADA 2026 Rec 10.4: intensive target regardless of PREVENT score
intensive_override:
  egfr_below: 60
  acr_above: 300

# South Asian population calibration
south_asian:
  bmi_calibration_offset: 3.0     # Add to BMI for patients with BMI 23-30
  bmi_calibration_lower: 23.0
  bmi_calibration_upper: 30.0

# Recomputation is triggered on any input change; cache TTL is secondary expiry
cache_ttl_hours: 24
