# kb-cql-runtime — Plan 0.5
server.port=8140

# Substrate REST API base URL (kb-20-patient-profile /v2/runtime/*)
# Override via SUBSTRATE_BASE_URL env var.
substrate.base-url=${SUBSTRATE_BASE_URL:http://localhost:8131}

# CQL library roots — comma-separated paths.
# Default targets the monorepo layout when running from kb-cql-runtime/.
# Override via KB_CQL_LIBRARY_ROOTS env var.
cql.library.roots=${KB_CQL_LIBRARY_ROOTS:../shared/cql-libraries,../kb-10-rules-engine/cql,../kb-13-quality-measures/cql}

# Logging
logging.level.au.vaidshala.cqlruntime=INFO
