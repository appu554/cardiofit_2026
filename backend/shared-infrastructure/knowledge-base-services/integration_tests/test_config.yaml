# Cross-Service Integration Test Configuration
services:
  kb-drug-rules:
    name: "KB-1 Drug Rules Service"
    base_url: "http://localhost:8081"
    health_endpoint: "/api/v1/health"
    database: "postgresql"
    
  kb-clinical-context:
    name: "KB-2 Clinical Context Service"  
    base_url: "http://localhost:8082"
    health_endpoint: "/api/v1/health"
    database: "mongodb"
    
  kb-guideline-evidence:
    name: "KB-3 Guideline Evidence Service"
    base_url: "http://localhost:8084"
    health_endpoint: "/api/v1/health"
    database: "neo4j"
    
  kb-patient-safety:
    name: "KB-4 Patient Safety Service"
    base_url: "http://localhost:8085"
    health_endpoint: "/api/v1/health"
    database: "postgresql"
    
  kb-drug-interactions:
    name: "KB-5 Drug Interactions Service"
    base_url: "http://localhost:8086"
    health_endpoint: "/api/v1/health"
    database: "postgresql"
    
  kb-formulary:
    name: "KB-6 Formulary Service"
    base_url: "http://localhost:8087"
    health_endpoint: "/api/v1/health"
    database: "elasticsearch"
    
  kb-terminology:
    name: "KB-7 Terminology Service"
    base_url: "http://localhost:8088"
    health_endpoint: "/api/v1/health"
    database: "postgresql"

# Test data sets for consistent testing
test_data:
  medications:
    aspirin:
      rxcui: "161"
      name: "Aspirin"
      generic_name: "acetylsalicylic acid"
    lisinopril:
      rxcui: "29046"
      name: "Lisinopril"
      generic_name: "lisinopril"
    metformin:
      rxcui: "6809"
      name: "Metformin"
      generic_name: "metformin hydrochloride"
  
  conditions:
    cad:
      icd10: "I25.10"
      name: "Coronary artery disease"
      snomed: "53741008"
    diabetes_t2:
      icd10: "E11.9"
      name: "Type 2 diabetes mellitus"
      snomed: "44054006"
    hypertension:
      icd10: "I10"
      name: "Essential hypertension"
      snomed: "59621000"
  
  patient_profiles:
    elderly_male:
      age: 65
      gender: "male"
      weight: 80.0
      height: 175
      creatinine: 1.2
    middle_aged_female:
      age: 45
      gender: "female"
      weight: 65.0
      height: 160
      creatinine: 0.9

# Performance thresholds
performance:
  response_time_thresholds:
    terminology_lookup: 100  # ms
    drug_interaction_check: 200  # ms
    dosing_calculation: 150  # ms
    guideline_search: 300  # ms
    safety_check: 250  # ms
    formulary_search: 200  # ms
    phenotype_match: 400  # ms
  
  concurrent_load_limits:
    max_concurrent_requests: 10
    request_rate_per_second: 100
    
  timeout_settings:
    default_timeout: 30  # seconds
    health_check_timeout: 10  # seconds
    scenario_timeout: 120  # seconds

# Environment-specific settings
environments:
  development:
    log_level: "DEBUG"
    retry_attempts: 3
    circuit_breaker_enabled: false
    
  staging:
    log_level: "INFO" 
    retry_attempts: 5
    circuit_breaker_enabled: true
    
  production:
    log_level: "WARN"
    retry_attempts: 3
    circuit_breaker_enabled: true
    monitoring_enabled: true