# Atrial Fibrillation Anticoagulation Protocol
# Source: AHA/ACC/HRS Atrial Fibrillation Guidelines 2023
# ACC/AHA Evidence Level: A

protocol:
  id: "AFIB-ANTICOAGULATION"
  name: "Atrial Fibrillation Stroke Prevention"
  version: "2023.1"
  category: "CHRONIC"
  priority_class: 4  # Chronic - Long-term optimization

  # Protocol activation criteria
  trigger_criteria:
    - "HasAtrialFibrillation"
    - "CHA2DS2VASc >= 2 (men)"
    - "CHA2DS2VASc >= 3 (women)"

  # Conditions that block this protocol
  contraindication_rules:
    - "ActiveBleeding"
    - "SevereCoagulopathy"
    - "Thrombocytopenia < 50000"
    - "RecentMajorBleeding"
    - "IntracranialHemorrhage"
    - "MechanicalHeartValve"  # Needs warfarin specifically

  # KB-8 calculators needed
  required_calculators:
    - "CHA2DS2VASc"
    - "HAS-BLED"
    - "CrCl"

  # Clinical actions
  actions:
    - id: "afib-doac-preferred"
      type: "MEDICATION"
      target: "apixaban"
      dosing: "5mg BID (2.5mg BID if meets dose reduction criteria)"
      urgency: "ROUTINE"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "DOACs preferred over warfarin for non-valvular AF"
      alternatives:
        - "rivaroxaban 20mg daily"
        - "dabigatran 150mg BID"
        - "edoxaban 60mg daily"

    - id: "afib-warfarin-alternative"
      type: "MEDICATION"
      target: "warfarin"
      dosing: "Dose to INR 2-3"
      condition: "DOAC contraindicated or mechanical valve"
      urgency: "ROUTINE"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "Alternative when DOACs contraindicated"

    - id: "afib-renal-assessment"
      type: "LAB"
      target: "renal_function"
      timing: "baseline and periodically"
      urgency: "ROUTINE"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "DOAC dosing depends on renal function"

  # Dose adjustment rules
  dose_adjustments:
    apixaban:
      reduced_dose_criteria:
        - "Age >= 80"
        - "Weight <= 60 kg"
        - "Creatinine >= 1.5 mg/dL"
      reduction: "Reduce to 2.5mg BID if >= 2 criteria met"
    dabigatran:
      reduced_dose_criteria:
        - "CrCl 30-50 mL/min"
        - "Concurrent P-gp inhibitor"
      reduction: "Reduce to 110mg BID"
    rivaroxaban:
      reduced_dose_criteria:
        - "CrCl 15-50 mL/min"
      reduction: "Reduce to 15mg daily"

  # Monitoring requirements
  monitoring:
    - parameter: "Hemoglobin"
      frequency: "every 3-6 months"
      alert_if_below: "10 g/dL"
    - parameter: "Creatinine"
      frequency: "every 6-12 months"
      rationale: "Renal function affects DOAC dosing"
    - parameter: "INR"
      frequency: "monthly if on warfarin"
      target: "2.0-3.0"

  # Evidence references
  evidence:
    guideline_source: "AHA/ACC/HRS"
    guideline_version: "2023"
    citation: "Joglar JA, et al. 2023 ACC/AHA/ACCP/HRS Guideline for the Diagnosis and Management of Atrial Fibrillation"
    doi: "10.1016/j.jacc.2023.08.017"

  # Applicable clinical settings
  applicable_settings:
    - "OUTPATIENT"
    - "INPATIENT"
    - "STEPDOWN"

  # Target patient populations
  target_population:
    - "Adult"
    - "NonValvularAF"
