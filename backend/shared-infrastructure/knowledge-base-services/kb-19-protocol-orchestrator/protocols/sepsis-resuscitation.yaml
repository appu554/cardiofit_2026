# Sepsis Resuscitation Protocol
# Source: Surviving Sepsis Campaign 2021 Guidelines
# ACC/AHA Evidence Level: A

protocol:
  id: "SEPSIS-RESUSCITATION"
  name: "Sepsis Bundle - Initial Resuscitation"
  version: "2021.1"
  category: "EMERGENCY"
  priority_class: 1  # Emergency - Life-preserving

  # Protocol activation criteria (CQL fact IDs)
  trigger_criteria:
    - "HasSepsis"
    - "HasSepticShock"
    - "qSOFA >= 2"
    - "SOFA >= 2"

  # Conditions that block this protocol
  contraindication_rules:
    - "DoNotResuscitate"
    - "ComfortMeasuresOnly"
    - "PalliativeCareOnly"

  # KB-8 calculators needed
  required_calculators:
    - "SOFA"
    - "qSOFA"
    - "MAP"
    - "ShockIndex"

  # Clinical actions
  actions:
    - id: "sepsis-fluids"
      type: "MEDICATION"
      target: "crystalloid"
      dosing: "30 mL/kg within 3 hours"
      urgency: "STAT"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "Restore intravascular volume in sepsis-induced hypoperfusion"

    - id: "sepsis-lactate"
      type: "LAB"
      target: "lactate"
      timing: "within 1 hour"
      urgency: "URGENT"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "Guide resuscitation adequacy"

    - id: "sepsis-cultures"
      type: "LAB"
      target: "blood_cultures"
      timing: "before antibiotics"
      urgency: "STAT"
      recommendation_class: "I"
      evidence_level: "MODERATE"
      rationale: "Identify causative organism"

    - id: "sepsis-antibiotics"
      type: "MEDICATION"
      target: "broad_spectrum_antibiotic"
      timing: "within 1 hour of recognition"
      urgency: "STAT"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "Early antibiotic therapy reduces mortality"

    - id: "sepsis-vasopressor"
      type: "MEDICATION"
      target: "norepinephrine"
      condition: "MAP < 65 despite fluids"
      urgency: "STAT"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "First-line vasopressor for septic shock"

  # Monitoring requirements
  monitoring:
    - parameter: "MAP"
      frequency: "continuous"
      target: ">= 65 mmHg"
    - parameter: "Lactate"
      frequency: "every 2-4 hours"
      target: "decreasing trend"
    - parameter: "Urine Output"
      frequency: "hourly"
      target: ">= 0.5 mL/kg/hr"
    - parameter: "CVP"
      frequency: "continuous"
      target: "8-12 mmHg"

  # Evidence references
  evidence:
    guideline_source: "Surviving Sepsis Campaign"
    guideline_version: "2021"
    citation: "Rhodes A, et al. Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock 2021"
    doi: "10.1007/s00134-021-06506-y"

  # Applicable clinical settings
  applicable_settings:
    - "ICU"
    - "ED"
    - "STEPDOWN"

  # Target patient populations
  target_population:
    - "Adult"
    - "NonPregnant"
