# Acute Heart Failure Management Protocol
# Source: ACC/AHA Heart Failure Guidelines 2022
# ACC/AHA Evidence Level: A

protocol:
  id: "HF-ACUTE-DECOMPENSATED"
  name: "Acute Decompensated Heart Failure Management"
  version: "2022.1"
  category: "ACUTE"
  priority_class: 2  # Acute - Organ stabilization

  # Protocol activation criteria
  trigger_criteria:
    - "HasHeartFailure"
    - "HasAcuteDecompensation"
    - "BNP > 400"
    - "NTproBNP > 900"
    - "HasPulmonaryEdema"

  # Conditions that block this protocol
  contraindication_rules:
    - "CardiogenicShockOnly"  # Separate protocol for cardiogenic shock
    - "RightHeartFailureOnly"
    - "DoNotResuscitate"

  # KB-8 calculators needed
  required_calculators:
    - "MAGGIC"
    - "GWTG-HF"
    - "ADHERE"

  # Clinical actions
  actions:
    - id: "hf-diuresis"
      type: "MEDICATION"
      target: "furosemide"
      dosing: "IV, dose >= home oral dose or 40mg if naive"
      urgency: "URGENT"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "Relieve congestion in acute HF"

    - id: "hf-oxygen"
      type: "INTERVENTION"
      target: "supplemental_oxygen"
      condition: "SpO2 < 90%"
      urgency: "STAT"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "Maintain adequate oxygenation"

    - id: "hf-vasodilator"
      type: "MEDICATION"
      target: "nitroglycerin"
      condition: "SBP > 110 and pulmonary congestion"
      urgency: "URGENT"
      recommendation_class: "IIa"
      evidence_level: "MODERATE"
      rationale: "Reduce preload and afterload"

    - id: "hf-continue-gdmt"
      type: "MEDICATION"
      target: "guideline_directed_therapy"
      action: "CONTINUE"
      urgency: "ROUTINE"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "Maintain GDMT unless contraindicated"

    - id: "hf-echo"
      type: "IMAGING"
      target: "echocardiogram"
      timing: "within 24 hours"
      urgency: "URGENT"
      recommendation_class: "I"
      evidence_level: "HIGH"
      rationale: "Assess cardiac structure and function"

  # Monitoring requirements
  monitoring:
    - parameter: "Weight"
      frequency: "daily"
      target: "decreasing trend"
    - parameter: "I/O Balance"
      frequency: "every 8 hours"
      target: "negative balance"
    - parameter: "Creatinine"
      frequency: "daily"
      alert_if_above: "25% increase from baseline"
    - parameter: "Electrolytes"
      frequency: "daily"
      rationale: "Monitor for diuretic-induced abnormalities"

  # Evidence references
  evidence:
    guideline_source: "ACC/AHA"
    guideline_version: "2022"
    citation: "Heidenreich PA, et al. 2022 AHA/ACC/HFSA Guideline for the Management of Heart Failure"
    doi: "10.1161/CIR.0000000000001063"

  # Applicable clinical settings
  applicable_settings:
    - "ICU"
    - "STEPDOWN"
    - "TELEMETRY"
    - "ED"

  # Target patient populations
  target_population:
    - "Adult"
    - "HFrEF"
    - "HFpEF"
    - "HFmrEF"
