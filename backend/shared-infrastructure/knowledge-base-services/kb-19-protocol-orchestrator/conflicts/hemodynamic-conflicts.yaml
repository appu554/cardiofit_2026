# Hemodynamic Conflicts
# Conflicts between protocols that affect hemodynamic stability
# Resolution follows clinical priority hierarchy

conflicts:
  - id: "SEPSIS_VS_HF"
    protocol_a: "SEPSIS-RESUSCITATION"
    protocol_b: "HF-ACUTE-DECOMPENSATED"
    conflict_type: "HEMODYNAMIC"
    description: "Sepsis fluid resuscitation conflicts with HF diuresis"
    severity: "HIGH"

    resolution:
      # Sepsis wins in shock state - life-preserving takes priority
      condition: "ShockState != NONE"
      winner: "SEPSIS-RESUSCITATION"
      loser_outcome: "DELAY"
      confidence: 0.95

    clinical_rationale: |
      In septic shock with concurrent heart failure, initial resuscitation takes
      priority. Volume resuscitation is life-preserving. Once shock resolves
      (MAP > 65, lactate normalizing), HF management can resume with careful
      monitoring for volume overload.

    citation: "SSC 2021 + ACC/AHA HF 2022 - Expert consensus on conflicting protocols"

    modifications:
      winner_adjustments:
        - "Reduce fluid bolus rate"
        - "Use smaller boluses with frequent reassessment"
        - "Early vasopressor consideration"
      loser_adjustments:
        - "Hold diuretics during active resuscitation"
        - "Resume once hemodynamically stable"

  - id: "CARDIOGENIC_VS_DISTRIBUTIVE"
    protocol_a: "CARDIOGENIC-SHOCK"
    protocol_b: "SEPSIS-RESUSCITATION"
    conflict_type: "HEMODYNAMIC"
    description: "Cardiogenic shock management conflicts with sepsis fluid resuscitation"
    severity: "CRITICAL"

    resolution:
      # Primary cause determines winner
      condition: "PrimaryShockEtiology == 'CARDIOGENIC'"
      winner: "CARDIOGENIC-SHOCK"
      loser_outcome: "MODIFY"
      confidence: 0.85

    clinical_rationale: |
      In mixed cardiogenic-septic shock, the dominant etiology should guide
      management. Echo assessment and invasive hemodynamics help determine
      primary cause. Aggressive fluids in cardiogenic shock worsen outcomes.

    modifications:
      loser_adjustments:
        - "Limit crystalloid to 10 mL/kg initially"
        - "Use dynamic fluid responsiveness assessment"
        - "Early vasopressor/inotrope support"

  - id: "HYPERTENSIVE_EMERGENCY_VS_STROKE"
    protocol_a: "HTN-EMERGENCY"
    protocol_b: "ACUTE-STROKE"
    conflict_type: "HEMODYNAMIC"
    description: "BP targets differ between hypertensive emergency and acute stroke"
    severity: "HIGH"

    resolution:
      condition: "HasAcuteStroke"
      winner: "ACUTE-STROKE"
      loser_outcome: "MODIFY"
      confidence: 0.90

    clinical_rationale: |
      Acute stroke BP targets are more permissive (SBP < 220 for ischemic,
      < 180 for hemorrhagic or tPA candidates). Rapid BP reduction in stroke
      can extend ischemia.

    modifications:
      loser_adjustments:
        - "Use stroke-specific BP targets"
        - "Avoid rapid BP reduction"
        - "Target 15% reduction in first 24h max"
