# Anticoagulation Conflicts
# Conflicts involving anticoagulation and bleeding risk
# Safety-first resolution with bleeding risk taking priority

conflicts:
  - id: "AFIB_VS_THROMBOCYTOPENIA"
    protocol_a: "AFIB-ANTICOAGULATION"
    protocol_b: "THROMBOCYTOPENIA-MANAGEMENT"
    conflict_type: "ANTICOAGULATION"
    description: "AF stroke prevention conflicts with severe thrombocytopenia"
    severity: "HIGH"

    resolution:
      condition: "Platelets < 50000"
      winner: "THROMBOCYTOPENIA-MANAGEMENT"
      loser_outcome: "AVOID"
      confidence: 0.95

    clinical_rationale: |
      Anticoagulation is contraindicated with platelets < 50,000. Bleeding risk
      exceeds stroke prevention benefit. Hold anticoagulation until platelets
      recover. Consider IVC filter for VTE prophylaxis if needed.

    citation: "ASH 2020 VTE Guidelines"

    hard_block: true
    safety_flags:
      - type: "BLEEDING"
        severity: "CRITICAL"
        message: "Anticoagulation contraindicated - severe thrombocytopenia"

  - id: "AFIB_VS_ACTIVE_BLEEDING"
    protocol_a: "AFIB-ANTICOAGULATION"
    protocol_b: "ACTIVE-GI-BLEED"
    conflict_type: "ANTICOAGULATION"
    description: "AF anticoagulation conflicts with active GI bleeding"
    severity: "CRITICAL"

    resolution:
      condition: "HasActiveGIBleed"
      winner: "ACTIVE-GI-BLEED"
      loser_outcome: "AVOID"
      confidence: 0.99

    clinical_rationale: |
      Active GI bleeding is an absolute contraindication to anticoagulation.
      Stop all anticoagulants, reverse if life-threatening, address bleeding
      source. Resume anticoagulation 24-48h after bleeding cessation.

    hard_block: true
    safety_flags:
      - type: "BLEEDING"
        severity: "CRITICAL"
        message: "Hold anticoagulation - active GI bleeding"

  - id: "VTE_TREATMENT_VS_ICH"
    protocol_a: "VTE-TREATMENT"
    protocol_b: "INTRACRANIAL-HEMORRHAGE"
    conflict_type: "ANTICOAGULATION"
    description: "VTE treatment conflicts with intracranial hemorrhage"
    severity: "CRITICAL"

    resolution:
      condition: "HasIntracranialHemorrhage"
      winner: "INTRACRANIAL-HEMORRHAGE"
      loser_outcome: "AVOID"
      confidence: 0.99

    clinical_rationale: |
      ICH is absolute contraindication to anticoagulation. In setting of
      concurrent VTE + ICH, use IVC filter. Anticoagulation can be considered
      7-14 days post-ICH if stable and VTE risk is high.

    hard_block: true
    safety_flags:
      - type: "ICU_HARD_BLOCK"
        severity: "CRITICAL"
        message: "Anticoagulation blocked - intracranial hemorrhage"

  - id: "AFIB_VS_RENAL_FAILURE"
    protocol_a: "AFIB-ANTICOAGULATION"
    protocol_b: "AKI-MANAGEMENT"
    conflict_type: "ANTICOAGULATION"
    description: "DOAC dosing affected by renal impairment"
    severity: "MODERATE"

    resolution:
      condition: "CrCl < 30"
      winner: "AKI-MANAGEMENT"
      loser_outcome: "MODIFY"
      confidence: 0.90

    clinical_rationale: |
      DOACs are renally cleared. In severe renal impairment (CrCl < 30),
      dabigatran is contraindicated, other DOACs need dose reduction.
      Consider warfarin or apixaban 2.5mg BID.

    modifications:
      loser_adjustments:
        - "Avoid dabigatran if CrCl < 30"
        - "Reduce apixaban to 2.5mg BID"
        - "Reduce rivaroxaban to 15mg daily if CrCl 15-50"
        - "Consider warfarin as alternative"
