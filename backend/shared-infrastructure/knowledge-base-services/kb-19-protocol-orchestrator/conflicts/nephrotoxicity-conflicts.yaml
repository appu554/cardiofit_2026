# Nephrotoxicity Conflicts
# Conflicts involving nephrotoxic medications and renal impairment
# Kidney protection prioritized in AKI settings

conflicts:
  - id: "SEPSIS_AMINOGLYCOSIDES_VS_AKI"
    protocol_a: "SEPSIS-ANTIBIOTIC-SELECTION"
    protocol_b: "AKI-KIDNEY-PROTECTION"
    conflict_type: "NEPHROTOXIC"
    description: "Aminoglycoside antibiotics in sepsis conflict with AKI protection"
    severity: "HIGH"

    resolution:
      condition: "AKIStage >= 2"
      winner: "AKI-KIDNEY-PROTECTION"
      loser_outcome: "MODIFY"
      confidence: 0.90

    clinical_rationale: |
      In setting of AKI stage 2-3, aminoglycosides should be avoided or
      used with extreme caution. Alternative antibiotics with similar
      spectrum but less nephrotoxicity should be preferred.

    modifications:
      loser_adjustments:
        - "Avoid gentamicin, tobramycin, amikacin"
        - "Use alternative antibiotics (ceftriaxone, piperacillin-tazobactam)"
        - "If aminoglycoside essential: extended interval dosing, therapeutic monitoring"

    monitoring_additions:
      - parameter: "Creatinine"
        frequency: "every 12 hours"
      - parameter: "Aminoglycoside trough"
        frequency: "before each dose"

  - id: "CONTRAST_VS_AKI"
    protocol_a: "CT-ANGIOGRAPHY"
    protocol_b: "AKI-KIDNEY-PROTECTION"
    conflict_type: "NEPHROTOXIC"
    description: "IV contrast for imaging conflicts with AKI"
    severity: "MODERATE"

    resolution:
      condition: "eGFR < 30"
      winner: "AKI-KIDNEY-PROTECTION"
      loser_outcome: "MODIFY"
      confidence: 0.85

    clinical_rationale: |
      In severe renal impairment, contrast-induced nephropathy risk is elevated.
      Consider alternative imaging, minimize contrast volume, ensure adequate
      hydration, and hold nephrotoxic medications.

    modifications:
      loser_adjustments:
        - "Use lowest contrast volume possible"
        - "Consider non-contrast alternatives (ultrasound, MRI without gadolinium)"
        - "Pre-hydration with IV saline"
        - "Hold metformin for 48h"
        - "Hold NSAIDs"

  - id: "NSAID_VS_CKD"
    protocol_a: "PAIN-MANAGEMENT"
    protocol_b: "CKD-PROTECTION"
    conflict_type: "NEPHROTOXIC"
    description: "NSAID use conflicts with chronic kidney disease"
    severity: "MODERATE"

    resolution:
      condition: "eGFR < 45 OR HasAKI"
      winner: "CKD-PROTECTION"
      loser_outcome: "MODIFY"
      confidence: 0.95

    clinical_rationale: |
      NSAIDs reduce renal blood flow and can precipitate AKI or accelerate
      CKD progression. Use alternative analgesics in renal impairment.

    modifications:
      loser_adjustments:
        - "Avoid ibuprofen, naproxen, ketorolac, diclofenac"
        - "Use acetaminophen for mild-moderate pain"
        - "Consider low-dose opioids for severe pain"
        - "Topical NSAIDs may be acceptable"

    safety_flags:
      - type: "RENAL"
        severity: "WARNING"
        message: "NSAIDs contraindicated in renal impairment"

  - id: "VANCOMYCIN_VS_AKI"
    protocol_a: "MRSA-TREATMENT"
    protocol_b: "AKI-KIDNEY-PROTECTION"
    conflict_type: "NEPHROTOXIC"
    description: "Vancomycin nephrotoxicity in AKI"
    severity: "MODERATE"

    resolution:
      condition: "AKIStage >= 1"
      winner: "MRSA-TREATMENT"  # MRSA treatment often necessary despite risk
      loser_outcome: "MODIFY"
      confidence: 0.80

    clinical_rationale: |
      While vancomycin is nephrotoxic, it may be necessary for serious MRSA
      infections. Use AUC-based dosing, avoid concomitant nephrotoxins,
      and consider alternatives when possible.

    modifications:
      winner_adjustments:
        - "Use AUC-based dosing (AUC 400-600)"
        - "Avoid trough-based dosing"
        - "Consider daptomycin or linezolid if appropriate"
        - "Avoid concomitant aminoglycosides"

    monitoring_additions:
      - parameter: "Vancomycin AUC"
        frequency: "steady state, then 2x weekly"
      - parameter: "Creatinine"
        frequency: "daily"
