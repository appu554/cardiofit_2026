# Redis Replica Configuration for CardioFit Platform

# Include master configuration
include /usr/local/etc/redis/redis.conf

# Replica-specific settings
replica-read-only yes
replica-serve-stale-data yes
replica-priority 100

# Logging for replica
loglevel notice
logfile ""

# Disable some master-only features
save ""  # Disable persistence on replica (master handles it)
appendonly no

# Replica announcement
replica-announce-ip redis-replica
replica-announce-port 6379