# Neo4j Configuration for CardioFit Platform
# Optimized for clinical knowledge graph and patient data

# Database settings
server.default_database=cardiofit

# Network settings
server.default_listen_address=0.0.0.0
server.bolt.listen_address=0.0.0.0:7687
server.http.listen_address=0.0.0.0:7474

# Authentication and authorization
dbms.security.auth_enabled=true
dbms.security.auth_cache_ttl=10m
dbms.security.auth_cache_max_capacity=10000

# Memory configuration for healthcare data
server.memory.heap.initial_size=512m
server.memory.heap.max_size=2G
server.memory.pagecache.size=1G

# Transaction settings for clinical data integrity
db.transaction.timeout=120s
db.transaction.bookmark_ready_timeout=30s
db.lock.acquisition.timeout=60s

# Query settings for complex clinical queries
cypher.default_language_version=5
cypher.hints_error=false
cypher.lenient_create_relationship=false
cypher.planner=cost
cypher.runtime=pipelined
cypher.min_replan_interval=10s

# Query timeout for clinical analytics
db.transaction.timeout=120s
dbms.cypher.default_language_version=5

# Query cache for frequently accessed patient data
query.cache.size=100
dbms.query_cache_size=100

# Logging for healthcare compliance and audit
dbms.logs.query.enabled=true
dbms.logs.query.threshold=1s
dbms.logs.query.parameter_logging_enabled=true
dbms.logs.query.time_logging_enabled=true
dbms.logs.query.allocation_logging_enabled=true
dbms.logs.query.page_logging_enabled=true

# Security logging
dbms.logs.security.level=INFO
dbms.security.log_successful_authentication=true

# Performance monitoring
metrics.enabled=true
metrics.namespaces=neo4j.causal_clustering,neo4j.database,neo4j.pool,neo4j.database.operation
metrics.prometheus.enabled=true
metrics.prometheus.endpoint=0.0.0.0:2004

# Checkpointing for data durability
db.checkpoint=true
db.checkpoint.interval.time=15m
db.checkpoint.interval.tx=100000

# Transaction log settings
db.tx_log.rotation.retention_policy=7 days
db.tx_log.rotation.size=250M

# Store settings optimized for clinical data
db.store.files.preallocate=true

# Index settings for clinical queries
db.index.default_schema_provider=native-btree-1.0
db.index.fulltext.default_provider=lucene-1.0

# Recovery settings
dbms.recovery.fail_on_missing_files=true

# Browser settings
browser.credential_timeout=0
browser.retain_connection_credentials=true

# Import settings for clinical data loads
apoc.export.file.enabled=true
apoc.import.file.enabled=true
apoc.import.file.use_neo4j_config=true

# APOC procedures for healthcare data processing
dbms.security.procedures.unrestricted=apoc.*,algo.*

# HTTP settings
server.http.log.enabled=true
server.http.content.timeout=120s

# Bolt settings for application connections
server.bolt.connection_timeout=120s
server.bolt.thread_pool_min_size=5
server.bolt.thread_pool_max_size=400
server.bolt.thread_pool_keep_alive=5m

# Clustering settings (for future scaling)
causal_clustering.minimum_core_cluster_size_at_formation=1
causal_clustering.minimum_core_cluster_size_at_runtime=1
causal_clustering.initial_discovery_members=neo4j:5000

# JVM settings for healthcare workloads
server.jvm.additional=-XX:+UseG1GC
server.jvm.additional=-XX:+UnlockExperimentalVMOptions
server.jvm.additional=-XX:+TrustFinalNonStaticFields
server.jvm.additional=-XX:+DisableExplicitGC
server.jvm.additional=-XX:MaxInlineLevel=15

# SSL settings (for production)
dbms.ssl.policy.bolt.enabled=false
dbms.ssl.policy.https.enabled=false

# Procedures whitelist for security
dbms.security.procedures.whitelist=apoc.*,algo.*

# Function whitelist
dbms.security.functions.whitelist=apoc.*

# Path settings
dbms.directories.data=/data
dbms.directories.logs=/logs
dbms.directories.import=/var/lib/neo4j/import
dbms.directories.plugins=/plugins

# Clinical data specific settings
# Enable constraint creation
dbms.security.allow_csv_import_from_file_urls=true

# Memory mapped settings for large clinical datasets
dbms.memory.pagecache.warmup.enable=true
dbms.memory.pagecache.warmup.preload=true