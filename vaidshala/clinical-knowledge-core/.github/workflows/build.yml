# ============================================================
# Clinical Knowledge Core - CI/CD Pipeline
# ============================================================
# Builds, signs, and publishes clinical artifacts.
#
# Triggers:
#   - Push to main: Build and validate
#   - Release creation: Build, sign, and publish
# ============================================================

name: Build Clinical Knowledge Core

on:
  push:
    branches: [main]
    paths:
      - 'tier-*/**'
      - 'scripts/**'
      - 'Makefile'
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      sign_artifacts:
        description: 'Sign artifacts with Ed25519'
        required: false
        default: 'false'
        type: boolean

env:
  CQL_TRANSLATOR_VERSION: '2.11.0'

jobs:
  # ============================================================
  # Build Job: Compile CQL and Expand ValueSets
  # ============================================================
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache CQL Translator
        uses: actions/cache@v4
        with:
          path: ~/.cql-translator
          key: cql-translator-${{ env.CQL_TRANSLATOR_VERSION }}

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Make Scripts Executable
        run: chmod +x scripts/*.sh

      - name: Compile CQL to ELM
        run: make compile-cql

      - name: Expand ValueSets
        run: make expand-valuesets

      - name: Generate Manifest
        run: make manifest

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clinical-knowledge-build
          path: |
            build/cql-to-elm/
            build/valueset-expansion/
            build/manifests/
          retention-days: 30

  # ============================================================
  # Validate Job: Run Tests and Quality Checks
  # ============================================================
  validate:
    name: Validate Artifacts
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: clinical-knowledge-build
          path: build/

      - name: Validate ELM Structure
        run: |
          echo "Validating ELM files..."
          for elm in build/cql-to-elm/*.json; do
            if [ -f "$elm" ]; then
              jq -e '.library' "$elm" > /dev/null || {
                echo "Invalid ELM structure: $elm"
                exit 1
              }
              echo "  Valid: $(basename $elm)"
            fi
          done
          echo "All ELM files validated."

      - name: Validate Manifest
        run: |
          MANIFEST=$(ls -t build/manifests/manifest-*.json 2>/dev/null | head -1)
          if [ -z "$MANIFEST" ]; then
            echo "No manifest found"
            exit 1
          fi

          echo "Validating manifest: $MANIFEST"
          jq -e '.version and .buildTime and .artifacts' "$MANIFEST" > /dev/null
          echo "Manifest is valid."

  # ============================================================
  # Sign Job: Sign Artifacts with Ed25519
  # ============================================================
  sign:
    name: Sign Artifacts
    runs-on: ubuntu-latest
    needs: [build, validate]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.sign_artifacts)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: clinical-knowledge-build
          path: build/

      - name: Decode Signing Key
        run: |
          mkdir -p .keys
          echo "${{ secrets.CLINICAL_SIGNING_KEY }}" | base64 -d > .keys/private.pem
          chmod 600 .keys/private.pem

      - name: Install Dependencies
        run: sudo apt-get install -y jq

      - name: Make Scripts Executable
        run: chmod +x scripts/*.sh

      - name: Sign Artifacts
        run: make sign

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clinical-knowledge-signed
          path: |
            build/manifests/*-signed.json
            build/signatures/
            build/*.tar.gz
            build/*.tar.gz.sig
          retention-days: 90

      - name: Cleanup Signing Key
        if: always()
        run: rm -rf .keys/

  # ============================================================
  # Publish Job: Upload to GitHub Release
  # ============================================================
  publish:
    name: Publish to Release
    runs-on: ubuntu-latest
    needs: sign
    if: github.event_name == 'release'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Signed Artifacts
        uses: actions/download-artifact@v4
        with:
          name: clinical-knowledge-signed
          path: build/

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/manifests/*-signed.json
            build/signatures/signatures.json
            build/*.tar.gz
            build/*.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Notify Job: Send Notifications
  # ============================================================
  notify:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [build, validate]
    if: always()

    steps:
      - name: Build Status Summary
        run: |
          echo "# Clinical Knowledge Core Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
