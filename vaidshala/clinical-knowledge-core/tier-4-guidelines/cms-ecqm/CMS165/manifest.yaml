# CMS165 - Controlling High Blood Pressure
# ============================================================

measure_id: "CMS165"
measure_name: "Controlling High Blood Pressure"
short_name: "BP Control"
cms_version: "v12"
measure_year: 2025

# Source Information
import_source: "https://ecqi.healthit.gov/ecqm/ep/2024/cms165v12"
specification_url: "https://ecqi.healthit.gov/sites/default/files/ecqm/measures/CMS165v12-QDM.html"
fhir_version: "R4 (4.0.1)"
cql_version: "1.5"

# Import Status
import_status: "pending"
import_date: null
imported_by: null
sha256_checksum: null

# Validation
validated_by: null
validation_date: null
production_date: null

# Clinical Context
clinical_domain: "cardiometabolic"
conditions_addressed:
  - "hypertension_essential"

measure_type: "proportion"
measure_scoring: "proportion"

# Population Criteria
initial_population: "Patients 18-85 with hypertension diagnosis"
denominator: "Equals initial population"
denominator_exclusions:
  - "Pregnancy"
  - "End stage renal disease"
  - "Hospice care"
numerator: "BP < 140/90 mmHg"

# Value Sets Required
valuesets:
  - name: "Essential Hypertension"
    oid: "2.16.840.1.113883.3.464.1003.104.12.1011"
  - name: "Systolic Blood Pressure"
    loinc: "8480-6"
  - name: "Diastolic Blood Pressure"
    loinc: "8462-4"

# Dependencies
dependencies:
  - library: "FHIRHelpers"
    version: "4.0.1"
  - library: "QICoreCommon"
    version: "2.0.000"
  - library: "SupplementalDataElements"
    version: "4.0.000"

# Regional Coverage
regional_applicability:
  US: "native"
  IN: "requires_adaptation"  # Asian BP cutoffs may differ
  AU: "native"               # Same thresholds

notes: |
  Priority 1 import per CTO/CMO directive.
  Strong foundation for hypertension management CDS.
