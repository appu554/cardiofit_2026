# CMS134 - Diabetes: Medical Attention for Nephropathy
# ============================================================

measure_id: "CMS134"
measure_name: "Diabetes: Medical Attention for Nephropathy"
short_name: "Diabetic Nephropathy Screening"
cms_version: "v12"
measure_year: 2025

# Source Information
import_source: "https://ecqi.healthit.gov/ecqm/ep/2024/cms134v12"
specification_url: "https://ecqi.healthit.gov/sites/default/files/ecqm/measures/CMS134v12-QDM.html"
fhir_version: "R4 (4.0.1)"
cql_version: "1.5"

# Import Status
import_status: "pending"
import_date: null
imported_by: null
sha256_checksum: null

# Validation
validated_by: null
validation_date: null
production_date: null

# Clinical Context
clinical_domain: "renal"
conditions_addressed:
  - "chronic_kidney_disease"
  - "diabetes_mellitus_type_2"

measure_type: "proportion"
measure_scoring: "proportion"

# Population Criteria
initial_population: "Patients 18-75 with diabetes diagnosis"
denominator: "Equals initial population"
denominator_exclusions:
  - "Hospice care"
  - "Palliative care"
numerator: "Nephropathy screening or evidence of nephropathy treatment"

# Value Sets Required
valuesets:
  - name: "Diabetes"
    oid: "2.16.840.1.113883.3.464.1003.103.12.1001"
  - name: "Urine Albumin Creatinine Ratio"
    oid: "2.16.840.1.113883.3.464.1003.109.12.1024"
  - name: "ACE Inhibitor or ARB"
    oid: "2.16.840.1.113883.3.526.3.1139"

# Dependencies
dependencies:
  - library: "FHIRHelpers"
    version: "4.0.1"
  - library: "QICoreCommon"
    version: "2.0.000"
  - library: "SupplementalDataElements"
    version: "4.0.000"

# Regional Coverage
regional_applicability:
  US: "native"
  IN: "requires_adaptation"
  AU: "requires_adaptation"

notes: |
  Priority 1 import per CTO/CMO directive.
  Links diabetes management with CKD monitoring.
  Supports coverage-index entries for both conditions.
