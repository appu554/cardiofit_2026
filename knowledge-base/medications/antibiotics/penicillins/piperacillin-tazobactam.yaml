# medications/antibiotics/penicillins/piperacillin-tazobactam.yaml
medicationId: "MED-PIPT-001"
genericName: "Piperacillin-Tazobactam"
brandNames: ["Zosyn", "Tazocin"]
rxNormCode: "897183"
ndcCode: "0206-8862"
atcCode: "J01CR05"

classification:
  therapeuticClass: "Anti-infective"
  pharmacologicClass: "Beta-lactam antibiotic"
  chemicalClass: "Penicillin + Beta-lactamase inhibitor"
  category: "Antibiotic"
  subcategories: ["Broad-spectrum", "Injectable"]
  controlledSubstance: null
  highAlert: false
  blackBoxWarning: false

adultDosing:
  standard:
    dose: "4.5 g"
    route: "IV"
    frequency: "every 6 hours"
    duration: "7-14 days"
    maxDailyDose: "18 g"
    infusionDuration: "Over 30 minutes"

  indicationBased:
    "sepsis":
      dose: "4.5 g"
      frequency: "every 6 hours"
    "nosocomial_pneumonia":
      dose: "4.5 g"
      frequency: "every 6 hours"
    "intra_abdominal_infection":
      dose: "3.375 g"
      frequency: "every 6 hours"

  renalAdjustment:
    creatinineClearanceMethod: "Cockcroft-Gault"
    requiresDialysisAdjustment: true
    adjustments:
      "40-80":
        crClRange: "40-80 mL/min"
        adjustedDose: "3.375 g"
        adjustedFrequency: "every 6 hours"
        rationale: "Moderate renal impairment"
      "20-40":
        crClRange: "20-40 mL/min"
        adjustedDose: "2.25 g"
        adjustedFrequency: "every 6 hours"
        rationale: "Severe renal impairment"
      "<20":
        crClRange: "<20 mL/min"
        adjustedDose: "2.25 g"
        adjustedFrequency: "every 8 hours"
        rationale: "End-stage renal disease"
    hemodialysis:
      adjustedDose: "2.25 g"
      adjustedFrequency: "every 8 hours plus 0.75 g after each dialysis session"
      rationale: "Removed by hemodialysis"

  hepaticAdjustment:
    assessmentMethod: "Child-Pugh"
    requiresMonitoring: false
    adjustments:
      "A":
        childPughClass: "A"
        adjustedDose: "No adjustment"
        contraindicated: false
      "B":
        childPughClass: "B"
        adjustedDose: "No adjustment, monitor LFTs"
        contraindicated: false
      "C":
        childPughClass: "C"
        adjustedDose: "Use with caution"
        contraindicated: false

pediatricDosing:
  weightBased: true
  weightBasedDose: "100 mg/kg (piperacillin component) every 6-8 hours"
  maxPediatricDose: "4 g (piperacillin component) per dose"
  ageGroups:
    "neonatal":
      ageRange: "0-1 month"
      minAgeMonths: 0
      maxAgeMonths: 1
      dose: "80 mg/kg every 8-12 hours"
      frequency: "Based on gestational age"
    "infant":
      ageRange: "2-12 months"
      dose: "80-100 mg/kg every 6-8 hours"
    "child":
      ageRange: "1-12 years"
      dose: "100 mg/kg every 6-8 hours"
      maxDose: "4 g per dose"

geriatricDosing:
  requiresAdjustment: true
  adjustedDose: "Based on renal function (age-related decline)"
  rationale: "Elderly patients often have reduced renal function"
  specialPrecautions:
    - "Monitor renal function closely"
    - "Consider lower initial doses"
    - "Assess for dehydration"

contraindications:
  absolute:
    - "Hypersensitivity to penicillins"
    - "History of beta-lactam anaphylaxis"
  relative:
    - "History of seizures (high doses)"
    - "Severe renal impairment without dose adjustment"
  allergies:
    - "penicillin"
    - "beta-lactam"
    - "cephalosporin (10% cross-reactivity)"
  diseaseStates:
    - "cystic_fibrosis (may require higher doses)"

majorInteractions:
  - "INT-PIPT-VANCO-001"  # Nephrotoxicity
  - "INT-PIPT-AMINO-001"  # Chemical inactivation
  - "INT-PIPT-WARFARIN-001"  # Increased INR

adverseEffects:
  common:
    "diarrhea": "11%"
    "nausea": "7%"
    "headache": "8%"
    "insomnia": "7%"
  serious:
    "anaphylaxis": "<1%"
    "c_difficile_infection": "Variable"
    "stevens_johnson_syndrome": "Rare"
    "seizures": "Rare (high doses)"
  monitoring: "CBC, renal function, hepatic function (if prolonged therapy)"

pregnancyLactation:
  fdaCategory: "B"
  pregnancyRisk: "Low"
  pregnancyGuidance: "No adequate studies in pregnant women. Use if benefit outweighs risk."
  lactationRisk: "Safe"
  breastfeedingGuidance: "Excreted in low concentrations. Compatible with breastfeeding."
  infantRiskCategory: "L2"

monitoring:
  labTests:
    - "Complete blood count (baseline and weekly if >2 weeks)"
    - "Serum creatinine / BUN (every 2-3 days)"
    - "Liver function tests (if hepatic disease)"
    - "Prothrombin time (if on anticoagulants)"
  monitoringFrequency: "Every 2-3 days during therapy"
  clinicalAssessment:
    - "Signs of allergic reaction"
    - "Diarrhea (C. difficile)"
    - "Neurological status (seizure risk with high doses)"

administration:
  routes: ["IV"]
  preferredRoute: "IV"
  preparation:
    "IV": "Reconstitute vial with SWFI or NS. Further dilute in 50-150 mL NS or D5W."
  dilution: "Dilute in 50-150 mL compatible solution"
  compatibility: "Compatible with NS, D5W, LR. Y-site compatible with most medications."
  incompatibility: "Incompatible with aminoglycosides (physical incompatibility). Do not mix in same container."
  storage: "Room temperature before reconstitution. Refrigerate 2-8°C after reconstitution."
  stability: "24 hours at room temperature, 7 days refrigerated after reconstitution"

alternatives:
  - alternativeMedicationId: "MED-MERO-001"
    relationship: "Different class - carbapenem"
    indication: "Beta-lactam allergy concerns or ESBL organisms"
    costComparison: "More expensive"
    efficacyComparison: "Broader spectrum, more expensive"

  - alternativeMedicationId: "MED-CEFT-001"
    relationship: "Different class - cephalosporin"
    indication: "Less severe infections, lower cost"
    costComparison: "Less expensive"
    efficacyComparison: "Narrower spectrum"

costFormulary:
  wholesalePrice: 45.50
  institutionalCost: 32.75
  formularyStatus: "Formulary"
  restrictionCriteria: null
  genericAvailable: true
  genericEquivalent: "Piperacillin-Tazobactam (generic)"
  genericCost: 22.00

pharmacokinetics:
  absorption: "N/A (IV only)"
  distribution: "Widely distributed to tissues and body fluids"
  volumeOfDistribution: 0.24  # L/kg
  metabolism: "Minimal hepatic metabolism"
  cyp450Involvement: []
  elimination: "Renal (68% piperacillin, 80% tazobactam)"
  halfLife: "0.7-1.2 hours (piperacillin), 0.7-0.9 hours (tazobactam)"
  proteinBinding: "30% (piperacillin), 30% (tazobactam)"
  bioavailability: null

guidelineReferences:
  - "GUIDE-SSC-2021"
  - "GUIDE-IDSA-HAP-2016"

evidenceReferences:
  - "34605781"  # SSC 2021
  - "27188114"  # HAP/VAP guidelines

packageInsertUrl: "https://www.accessdata.fda.gov/drugsatfda_docs/label/2017/050684s88s89s90lbl.pdf"

lastUpdated: "2024-10-24"
source: "FDA Package Insert, Micromedex, Lexicomp"
version: "1.0"
