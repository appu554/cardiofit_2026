# medications/antibiotics/carbapenems/meropenem.yaml
medicationId: MED-MERO-001
genericName: Meropenem
brandNames:
- Merrem IV
rxNormCode: '6922'
ndcCode: 0186-3920
atcCode: J01DH02
classification:
  therapeuticClass: Anti-infective
  pharmacologicClass: Carbapenem antibiotic
  chemicalClass: Beta-lactam carbapenem
  category: Antibiotic
  subcategories:
  - Broad-spectrum
  - Injectable
  - Reserved
  highAlert: false
  blackBoxWarning: true
  blackBoxDetails: 'FDA BLACK BOX WARNING: Meropenem causes SIGNIFICANT decrease
    in valproic acid serum concentrations (60-100% reduction), leading to loss of
    seizure control. Co-administration is CONTRAINDICATED. Use alternative antibiotic
    or alternative anticonvulsant.'
adultDosing:
  standard:
    dose: 1 g
    route: IV
    frequency: every 8 hours
    duration: 7-14 days
    maxDailyDose: 6 g
    infusionDuration: Over 30 minutes
  indicationBased:
    meningitis:
      dose: 2 g
      frequency: every 8 hours
    sepsis:
      dose: 1 g
      frequency: every 8 hours
    complicated_intra_abdominal:
      dose: 1 g
      frequency: every 8 hours
  renalAdjustment:
    creatinineClearanceMethod: Cockcroft-Gault
    requiresDialysisAdjustment: true
    adjustments:
      26-50:
        crClRange: 26-50 mL/min
        adjustedDose: 1 g
        adjustedFrequency: every 12 hours
        rationale: Moderate renal impairment
      10-25:
        crClRange: 10-25 mL/min
        adjustedDose: 500 mg
        adjustedFrequency: every 12 hours
        rationale: Severe renal impairment
      <10:
        crClRange: <10 mL/min
        adjustedDose: 500 mg
        adjustedFrequency: every 24 hours
        rationale: End-stage renal disease
    hemodialysis:
      adjustedDose: 500 mg
      adjustedFrequency: every 24 hours, give after dialysis
      rationale: Removed by hemodialysis
pediatricDosing:
  weightBased: true
  weightBasedDose: Consult pediatric dosing guidelines
  safetyConsiderations:
  - Age-appropriate dosing required
geriatricDosing:
  requiresAdjustment: true
  adjustedDose: Based on renal function
  rationale: Age-related physiologic decline
contraindications:
  absolute:
  - Hypersensitivity to carbapenems
  - History of anaphylaxis to beta-lactams
  - 'CONTRAINDICATED: Concurrent use with valproic acid or divalproex (FDA BLACK
    BOX WARNING - causes subtherapeutic valproate levels and breakthrough seizures)'
  relative:
  - History of seizures (increased risk with meropenem)
  - CNS disorders (lower seizure threshold)
  allergies:
  - carbapenem
  - beta-lactam
  diseaseStates: []
majorInteractions:
- INT-MERO-VALPROATE-001
adverseEffects:
  common:
    diarrhea: 7%
    nausea: 5%
    headache: 4%
  serious:
    seizures: <1%
    c_difficile: Variable
    anaphylaxis: <1%
  monitoring: CBC, renal function, seizure monitoring in CNS disorders
pregnancyLactation:
  fdaCategory: B
  pregnancyRisk: Low
  lactationRisk: Use Caution
  pregnancyGuidance: Use if benefit outweighs risk
  breastfeedingGuidance: Present in low concentrations
  infantRiskCategory: L2
monitoring:
  labTests:
  - Baseline and periodic monitoring per indication
  monitoringFrequency: Per protocol
  clinicalAssessment:
  - Therapeutic response
  - Adverse effects
lastUpdated: '2025-10-24'
source: FDA Package Insert, Micromedex, Lexicomp
version: '1.0'
