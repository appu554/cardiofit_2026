# =============================================================================
# CALIBRATION GOVERNANCE
# Per Implementation Plan Section 11.5 (Three-Tier Strategy)
# =============================================================================

calibration:

  tier_a_expert_panel:
    composition: "1 diabetologist + 1 internist + 1 general physician"
    review_cycle: Quarterly
    first_review_trigger: "30+ completed dizziness sessions with clinician adjudication"
    max_adjustment_per_cycle: "±30% on any single LR value"
    log_as: "calibration_event with source=EXPERT_PANEL, panel_members, rationale, version_bump"

  tier_b_bayesian_blend:
    activation_trigger: "N >= 30 adjudicated sessions"
    formula: "new_lr = w * literature_lr + (1-w) * observed_lr"
    weight_formula: "w = max(0.3, 1 - sqrt(n / 200))"
    weight_at_n30: 0.87    # Heavily anchored to literature at small N
    weight_at_n100: 0.71
    weight_at_n200: 0.30   # Releases to observed data at N=200
    log_as: "calibration_event with source=BAYESIAN_BLEND, sample_size, w_factor, prior_lr, observed_lr, blended_lr"

  tier_c_data_driven:
    activation_trigger: "N >= 200 adjudicated sessions per stratum"
    method: "Logistic regression with hierarchical shrinkage priors for rare differentials"
    log_as: "calibration_event with source=DATA_DRIVEN, model_version, full regression output"

  kpi_targets:
    concordance_physician_top1: ">=80% (long-term target 85-90%)"
    red_flag_sensitivity: "100% — non-negotiable; any miss triggers immediate node freeze"
    closure_rate: ">=85%"
    median_questions: "8-10"
    false_positive_escalation: "<5%"
    pata_nahi_rate_per_question: "<25% — trigger alt_prompt reword if exceeded"
    contradiction_rate_per_pair: "<15% — trigger question reword if exceeded (from G17 logging)"

  calibrate_marked_lrs:
    # These LRs are consensus estimates. Tier A review is the first calibration gate.
    - question_id: DQ02
      current_lr_positive: 6.0
      basis: "Whipple Triad specificity — no Indian DM+HTN cohort study"
    - question_id: DQ03
      current_lr_positive: 4.0
      basis: "BPPV positional trigger — Western vestibular clinic populations"
    - question_id: DQ04
      current_lr_positive: 4.5
      basis: "Brief positional <60s — Bhattacharyya guideline, not DM+HTN specific"
    - question_id: DQ05
      current_lr_positive: 3.5
      basis: "Adrenergic cluster — ADA symptoms list, no formal LR study"
    - question_id: DQ06
      current_lr_positive: 4.0
      basis: "Palpitations preceding dizziness — ACC/AHA, no DM+HTN cohort data"
    - question_id: DQ07
      current_lr_positive: 3.0
      basis: "Continuous >24h as TIA triage — derived from Kattah HINTS framework"
    - question_id: DQ08
      current_lr_positive: 2.5
      basis: "Pallor+fatigue+DOE cluster — NFHS-5 indicators, no formal LR study"
    - cm_id: CM07_DIZ
      current_delta_p: 0.20
      basis: "India OH PMC 2022 study — CONSENSUS grade, not randomised data"
    - cm_id: CM08_DIZ
      current_delta_p: 0.25
      basis: "Clinical consensus from drug class PK data — no Indian cohort study"

# =============================================================================
# OPEN ISSUES AND DEFERRED ITEMS
# =============================================================================

open_issues:

  - id: OI-01
    title: "SM01 Anaemia Sex Modifier — Activate After Phase 2 Harvest"
    description: >
      Female sex modifier for anaemia (delta_p +0.06) is declared but DEFERRED.
      Activation requires Phase 2 evidence harvest confirming the delta in the DM+HTN
      dizziness subgroup specifically. NFHS-5 gives population-level anaemia prevalence
      by sex; DM+HTN anaemia-as-dizziness-cause by sex requires targeted harvest.
    action: "Remove DEFERRED flag after Phase 2 harvest completes and delta_p is verified."

  - id: OI-02
    title: "CM04 BB Effect on DQ05 — Requires Go Change G8"
    description: >
      CM04 currently sets a safety flag but cannot suppress DQ05's LR contribution
      when BB is active. Full implementation requires G8 (CM active state in condition
      evaluation context). Until G8 ships: DQ05's LR is applied even when BB is active,
      which may over-update hypoglycemia posterior based on absent adrenergic symptoms.
    action: "Implement G8. Connect CM04_DIZ.effect_on_questions to DQ05 LR suppression logic."
    go_change: G8
    priority: MEDIUM
    workaround: >
      The safety_flag on CM04 alerts the clinician. The Bayesian update error is small
      because DQ05's LR- 0.40 update when negative is the relevant case (BB patient
      with no adrenergic symptoms), and 0.40 is closer to 1.0 than a typical LR-.
      Impact is dampened. Acceptable for pilot.

  - id: OI-03
    title: "DX09 Medication-Conditional Differential — Not Included in P00"
    description: >
      P1/P2 include EUGLYCEMIC_DKA and LACTIC_ACIDOSIS as medication-conditional
      differentials (G3). P00 Dizziness does not include these because dizziness is
      a less specific DKA/lactic acidosis presentation. However, SGLT2i DKA can
      present with generalised malaise and dizziness. Currently handled via CM02_DIZ
      (SGLT2i volume depletion) and cross-node flag to P02 Dyspnea.
    action: "Review after P00 Tier A calibration. If DKA presentation via dizziness is
      common in the DM+HTN cohort, add as conditional differential in v2.1."
    priority: LOW

  - id: OI-04
    title: "HINTS Pathway Node Transition — G13 Deferred"
    description: >
      When DQ07=YES (continuous >24h), the ideal architecture hands off to a
      HINTS-informed specialist referral pathway. G13 (Node Transition Protocol)
      is deferred to Week 14+. Until then, the HINTS pathway is implemented as
      a clinician output recommendation only (hints_pathway_note on DQ07).
    action: "Implement HANDOFF transition when G13 ships."
    go_change: G13
    priority: LOW

  - id: OI-05
    title: "Cross-Node Triggers YAML — RF04 Mirror Required"
    description: >
      RF04 (chest pain + dizziness) declares cross_node_action in this file.
      The same trigger must be mirrored in cross_node_triggers.yaml for
      CrossNodeSafety.Load() to pick it up at runtime.
    action: "Add RF04_CHEST_PAIN_COMBO entry to cross_node_triggers.yaml before deployment."
    priority: HIGH
    blocking: true

