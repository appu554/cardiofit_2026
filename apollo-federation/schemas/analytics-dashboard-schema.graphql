# Module 6: Advanced Analytics & Predictive Dashboards
# GraphQL Schema for Real-time Clinical Analytics Dashboard
#
# Data Sources:
# - Redis: Real-time metrics and caching
# - PostgreSQL: Historical analytics data
# - Kafka Topics: Streaming analytics (analytics-population-health, analytics-vital-timeseries, analytics-alert-metrics, analytics-ml-performance)

# =======================
# Hospital-Wide KPIs
# =======================

"Hospital-wide key performance indicators aggregated across all departments"
type HospitalKPIs {
  """Current timestamp of metrics"""
  timestamp: String!

  """Total active patients across all departments"""
  totalPatients: Int!

  """Patients classified as high-risk (risk score >= 0.50)"""
  highRiskPatients: Int!

  """Patients in critical condition (risk score >= 0.75)"""
  criticalPatients: Int!

  """Average mortality risk across all patients (0.0-1.0)"""
  avgMortalityRisk: Float!

  """Average sepsis risk across all patients (0.0-1.0)"""
  avgSepsisRisk: Float!

  """Average readmission risk across all patients (0.0-1.0)"""
  avgReadmissionRisk: Float!

  """Total active alerts requiring attention"""
  activeAlerts: Int!

  """Critical alerts requiring immediate intervention"""
  criticalAlerts: Int!

  """ML model prediction accuracy (last hour)"""
  modelAccuracy: Float

  """Patients on active clinical protocols"""
  patientsOnProtocols: Int
}

"""
Department-specific performance metrics
"""
type DepartmentMetrics {
  """Department identifier (e.g., ICU, ER, CARDIOLOGY)"""
  department: String!

  """Timestamp of metrics snapshot"""
  timestamp: String!

  """Total patients currently in department"""
  totalPatients: Int!

  """High-risk patients count"""
  highRiskPatients: Int!

  """Critical condition patients count"""
  criticalPatients: Int!

  """Average mortality risk for department"""
  avgMortalityRisk: Float!

  """Average sepsis risk for department"""
  avgSepsisRisk: Float!

  """Average readmission risk for department"""
  avgReadmissionRisk: Float

  """Risk distribution by category"""
  riskDistribution: RiskDistribution!

  """Trend indicator (IMPROVING, STABLE, WORSENING)"""
  trendIndicator: String

  """Department overall risk level (LOW, MODERATE, HIGH, CRITICAL)"""
  departmentRiskLevel: String!

  """Percentage of high-risk patients"""
  highRiskPercentage: Float!

  """Percentage of critical patients"""
  criticalPercentage: Float!

  """Overall risk score (0.0-1.0)"""
  overallRiskScore: Float!

  """Indicates if department requires immediate attention"""
  requiresImmediateAttention: Boolean!
}

"""
Distribution of patients across risk categories
"""
type RiskDistribution {
  """Low risk count (0.00-0.25)"""
  LOW: Int!

  """Moderate risk count (0.25-0.50)"""
  MODERATE: Int!

  """High risk count (0.50-0.75)"""
  HIGH: Int!

  """Critical risk count (0.75-1.00)"""
  CRITICAL: Int!
}

# =======================
# Patient Risk Profiles
# =======================

"""
Individual patient risk assessment and predictions
"""
type PatientRiskProfile {
  """Patient identifier"""
  patientId: String!

  """Department assignment"""
  department: String!

  """Mortality risk score (0.0-1.0)"""
  mortalityRisk: Float!

  """Sepsis risk score (0.0-1.0)"""
  sepsisRisk: Float!

  """Readmission risk score (0.0-1.0)"""
  readmissionRisk: Float!

  """Overall calculated risk score (0.0-1.0)"""
  overallRiskScore: Float!

  """Risk level classification (LOW, MODERATE, HIGH, CRITICAL)"""
  riskLevel: String!

  """Last update timestamp"""
  lastUpdated: String!

  """Indicates if patient is high-risk"""
  isHighRisk: Boolean!

  """Indicates if patient is in critical condition"""
  isCritical: Boolean!

  """Active alerts for this patient"""
  activeAlerts: [Alert!]

  """Patient vital trends"""
  vitalTrends: [VitalTimeSeries!]
}

# =======================
# Time-Series Analytics
# =======================

"""
Vital sign time-series data with statistical aggregations
"""
type VitalTimeSeries {
  """Patient identifier"""
  patientId: String!

  """Vital sign type (heart_rate, systolic_bp, diastolic_bp, temp, spo2, resp_rate)"""
  vitalType: String!

  """Average value over window"""
  avg: Float!

  """Minimum value over window"""
  min: Float!

  """Maximum value over window"""
  max: Float!

  """Number of measurements in window"""
  count: Int!

  """Window aggregation timestamp"""
  timestamp: String!

  """Window start time"""
  windowStart: String!

  """Window end time"""
  windowEnd: String!

  """Variability measure (max - min)"""
  variability: Float!

  """Indicates high variability (>20% of average)"""
  isHighlyVariable: Boolean!
}

# =======================
# Alert Management
# =======================

"""
Clinical alert with severity and recommendations
"""
type Alert {
  """Unique alert identifier"""
  alertId: String!

  """Patient identifier"""
  patientId: String!

  """Alert type (VITAL_THRESHOLD, PATTERN_DETECTED, PROTOCOL_VIOLATION, etc.)"""
  alertType: String!

  """Severity level (INFO, WARNING, CRITICAL)"""
  severity: String!

  """Alert message"""
  message: String!

  """Alert creation timestamp"""
  timestamp: String!

  """Alert status (ACTIVE, ACKNOWLEDGED, RESOLVED)"""
  status: String!

  """Clinical recommendations"""
  recommendations: [String!]

  """Supporting evidence"""
  evidence: [String!]

  """Clinical protocol applicable"""
  applicableProtocol: String

  """Acknowledged by user"""
  acknowledgedBy: String

  """Acknowledgment timestamp"""
  acknowledgedAt: String

  """Resolution timestamp"""
  resolvedAt: String
}

"""
Alert metrics and statistics
"""
type AlertMetrics {
  """Metric timestamp"""
  timestamp: String!

  """Total alerts generated"""
  totalAlerts: Int!

  """Critical alerts count"""
  criticalAlerts: Int!

  """Warning alerts count"""
  warningAlerts: Int!

  """Info alerts count"""
  infoAlerts: Int!

  """Average resolution time (minutes)"""
  avgResolutionTime: Float

  """Alert distribution by type"""
  alertsByType: [AlertTypeCount!]!

  """Alert distribution by department"""
  alertsByDepartment: [DepartmentAlertCount!]!
}

type AlertTypeCount {
  alertType: String!
  count: Int!
}

type DepartmentAlertCount {
  department: String!
  count: Int!
}

# =======================
# ML Model Performance
# =======================

"""
Machine learning model performance metrics
"""
type MLPerformanceMetrics {
  """Model name/identifier"""
  modelName: String!

  """Metric timestamp"""
  timestamp: String!

  """Model version"""
  modelVersion: String

  """Total predictions made"""
  totalPredictions: Int!

  """Model accuracy (0.0-1.0)"""
  accuracy: Float

  """Precision score (0.0-1.0)"""
  precision: Float

  """Recall score (0.0-1.0)"""
  recall: Float

  """F1 score (0.0-1.0)"""
  f1Score: Float

  """Area under ROC curve"""
  aucRoc: Float

  """Average inference latency (ms)"""
  avgLatency: Float

  """Predictions per minute"""
  throughput: Float

  """Model drift indicator (true if drift detected)"""
  driftDetected: Boolean
}

# =======================
# Sepsis Surveillance
# =======================

"""
Sepsis risk surveillance metrics
"""
type SepsisMetrics {
  """Total patients under sepsis surveillance"""
  totalPatients: Int!

  """High sepsis risk patients (score >= 0.50)"""
  highRiskCount: Int!

  """Suspected sepsis cases"""
  suspectedCases: Int!

  """Confirmed sepsis cases"""
  confirmedCases: Int!

  """Average sepsis score"""
  avgSepsisScore: Float!

  """Sepsis protocol compliance rate (%)"""
  protocolComplianceRate: Float

  """Average time to antibiotic administration (minutes)"""
  avgTimeToAntibiotics: Float

  """Sepsis bundle completion rate (%)"""
  bundleCompletionRate: Float
}

# =======================
# Quality Metrics
# =======================

"""
Clinical quality and safety metrics
"""
type QualityMetrics {
  """Metric timestamp"""
  timestamp: String!

  """Protocol adherence rate (%)"""
  protocolAdherenceRate: Float!

  """Alert response time (average minutes)"""
  avgAlertResponseTime: Float!

  """Clinical decision support utilization (%)"""
  cdsUtilizationRate: Float

  """Drug interaction catch rate (%)"""
  drugInteractionCatchRate: Float

  """Patient safety events"""
  safetyEvents: Int!

  """Near-miss events prevented"""
  nearMissEvents: Int!
}

# =======================
# Queries
# =======================

type Query {
  """
  Get current hospital-wide KPIs
  """
  hospitalKPIs: HospitalKPIs!

  """
  Get metrics for a specific department
  """
  departmentMetrics(department: String!): DepartmentMetrics

  """
  Get metrics for all departments
  """
  allDepartmentMetrics: [DepartmentMetrics!]!

  """
  Get risk profile for a specific patient
  """
  patientRiskProfile(patientId: String!): PatientRiskProfile

  """
  Get all high-risk patients across hospital
  """
  highRiskPatients(limit: Int = 50): [PatientRiskProfile!]!

  """
  Get high-risk patients for a specific department
  """
  departmentHighRiskPatients(department: String!, limit: Int = 50): [PatientRiskProfile!]!

  """
  Get vital sign time-series for a patient
  """
  patientVitalTimeSeries(
    patientId: String!
    vitalType: String
    startTime: String
    endTime: String
    limit: Int = 100
  ): [VitalTimeSeries!]!

  """
  Get active alerts for a patient
  """
  patientAlerts(patientId: String!, status: String): [Alert!]!

  """
  Get all active alerts across hospital
  """
  activeAlerts(severity: String, limit: Int = 100): [Alert!]!

  """
  Get alert metrics and statistics
  """
  alertMetrics(
    startTime: String
    endTime: String
  ): AlertMetrics!

  """
  Get ML model performance metrics
  """
  mlPerformanceMetrics(
    modelName: String
    startTime: String
    endTime: String
  ): [MLPerformanceMetrics!]!

  """
  Get sepsis surveillance metrics
  """
  sepsisMetrics(department: String): SepsisMetrics!

  """
  Get clinical quality metrics
  """
  qualityMetrics(
    startTime: String
    endTime: String
  ): QualityMetrics!

  """
  Health check for analytics service
  """
  analyticsHealth: HealthStatus!
}

type HealthStatus {
  status: String!
  timestamp: String!
  redisConnected: Boolean!
  postgresConnected: Boolean!
  kafkaConnected: Boolean!
}

# =======================
# Subscriptions (Future Enhancement)
# =======================

type Subscription {
  """
  Real-time hospital KPI updates
  """
  hospitalKPIsUpdated: HospitalKPIs!

  """
  Real-time department metrics updates
  """
  departmentMetricsUpdated(department: String): DepartmentMetrics!

  """
  Real-time new alerts
  """
  newAlert(patientId: String, severity: String): Alert!

  """
  Real-time patient risk updates
  """
  patientRiskUpdated(patientId: String!): PatientRiskProfile!
}
