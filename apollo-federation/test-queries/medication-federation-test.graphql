# Test query to verify medication service federation integration

# Test 1: Query medication types directly
query GetMedications {
  medications(page: 1, limit: 5) {
    items {
      id
      resourceType
      status
      code {
        text
        coding {
          system
          code
          display
        }
      }
      form {
        text
      }
    }
    total
    page
    count
  }
}

# Test 2: Query patient with medication extensions (Federation test)
query GetPatientWithMedications($patientId: String!) {
  patient(id: $patientId) {
    id
    resourceType
    name {
      family
      given
    }
    gender
    birthDate
    
    # These fields come from the medication service via federation
    medications {
      id
      status
      intent
      medicationCodeableConcept {
        text
        coding {
          system
          code
          display
        }
      }
      subject {
        reference
      }
      authoredOn
      dosageInstruction {
        text
        route {
          text
        }
      }
    }
    
    allergies {
      id
      code {
        text
        coding {
          system
          code
          display
        }
      }
      criticality
    }
  }
}

# Test 3: Create a medication request
mutation CreateMedicationRequest($patientId: String!, $medicationCode: String!) {
  createMedicationRequest(
    patientId: $patientId
    medicationCode: $medicationCode
    status: "active"
    intent: "order"
  ) {
    id
    status
    intent
    medicationCodeableConcept {
      text
      coding {
        code
        display
      }
    }
    subject {
      reference
    }
  }
}

# Test 4: Query all medication requests
query GetAllMedicationRequests {
  medicationRequests(page: 1, limit: 10) {
    items {
      id
      status
      intent
      medicationCodeableConcept {
        text
      }
      subject {
        reference
      }
      authoredOn
    }
    total
    page
    count
  }
}
