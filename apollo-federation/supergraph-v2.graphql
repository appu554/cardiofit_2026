schema
  @link(url: "https://specs.apollo.dev/link/v1.0")
  @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key", "@shareable"])
{
  query: Query
  mutation: Mutation
}

type Query {
  patients(page: Int, limit: Int, generalPractitioner: String): PatientConnection
  patient(id: String!): Patient
  searchPatients(name: String): [Patient]
}

type Mutation {
  createPatient(patientData: PatientInput!): Patient
  updatePatient(id: String!, patientData: PatientInput!): Patient
  deletePatient(id: String!): DeleteResponse
}

type DeleteResponse {
  success: Boolean!
  message: String
}

type PatientConnection {
  items: [Patient]
  total: Int
  page: Int
  count: Int
}

type Patient @key(fields: "id") {
  id: String!
  resourceType: String
  text: TextComponent
  identifier: [Identifier]
  active: Boolean
  name: [HumanName]
  telecom: [ContactPoint]
  gender: String
  birthDate: String
  deceasedBoolean: Boolean
  address: [Address]
  maritalStatus: CodeableConcept
  multipleBirthBoolean: Boolean
  contact: [Contact]
  communication: [Communication]
  generalPractitioner: [Reference]
  managingOrganization: Reference
}

type TextComponent {
  status: String
  div: String
}

type Identifier {
  use: String
  type: CodeableConcept
  system: String
  value: String
  period: Period
  assigner: Reference
}

type HumanName {
  use: String
  family: String
  given: [String]
  prefix: [String]
  suffix: [String]
  period: Period
}

type ContactPoint {
  system: String
  value: String
  use: String
  rank: Int
  period: Period
}

type Address {
  use: String
  type: String
  text: String
  line: [String]
  city: String
  district: String
  state: String
  postalCode: String
  country: String
  period: Period
}

type CodeableConcept {
  coding: [Coding]
  text: String
}

type Coding {
  system: String
  version: String
  code: String
  display: String
  userSelected: Boolean
}

type Period {
  start: String
  end: String
}

type Contact {
  relationship: [CodeableConcept]
  name: HumanName
  telecom: [ContactPoint]
  address: Address
  gender: String
  organization: Reference
  period: Period
}

type Communication {
  language: CodeableConcept
  preferred: Boolean
}

type Reference {
  reference: String
  type: String
  identifier: Identifier
  display: String
}

input PatientInput {
  resourceType: String
  text: TextComponentInput
  identifier: [IdentifierInput]
  active: Boolean
  name: [HumanNameInput]
  telecom: [ContactPointInput]
  gender: String
  birthDate: String
  deceasedBoolean: Boolean
  address: [AddressInput]
  maritalStatus: CodeableConceptInput
  multipleBirthBoolean: Boolean
  contact: [ContactInput]
  communication: [CommunicationInput]
  generalPractitioner: [ReferenceInput]
  managingOrganization: ReferenceInput
}

input TextComponentInput {
  status: String
  div: String
}

input IdentifierInput {
  use: String
  type: CodeableConceptInput
  system: String
  value: String
  period: PeriodInput
  assigner: ReferenceInput
}

input HumanNameInput {
  use: String
  family: String
  given: [String]
  prefix: [String]
  suffix: [String]
  period: PeriodInput
}

input ContactPointInput {
  system: String
  value: String
  use: String
  rank: Int
  period: PeriodInput
}

input AddressInput {
  use: String
  type: String
  text: String
  line: [String]
  city: String
  district: String
  state: String
  postalCode: String
  country: String
  period: PeriodInput
}

input CodeableConceptInput {
  coding: [CodingInput]
  text: String
}

input CodingInput {
  system: String
  version: String
  code: String
  display: String
  userSelected: Boolean
}

input PeriodInput {
  start: String
  end: String
}

input ContactInput {
  relationship: [CodeableConceptInput]
  name: HumanNameInput
  telecom: [ContactPointInput]
  address: AddressInput
  gender: String
  organization: ReferenceInput
  period: PeriodInput
}

input CommunicationInput {
  language: CodeableConceptInput
  preferred: Boolean
}

input ReferenceInput {
  reference: String
  type: String
  identifier: IdentifierInput
  display: String
}
