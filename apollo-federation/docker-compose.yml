version: '3'

services:
  apollo-federation:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - PATIENT_SERVICE_URL=http://patient-service:8003/api/graphql
      - OBSERVATION_SERVICE_URL=http://observation-service:8007/api/graphql
      - CONDITION_SERVICE_URL=http://condition-service:8010/api/graphql
      - MEDICATION_SERVICE_URL=http://medication-service:8009/api/graphql
      - ENCOUNTER_SERVICE_URL=http://encounter-service:8011/api/graphql
    depends_on:
      - patient-service
    networks:
      - apollo-network

  patient-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    ports:
      - "8003:8003"
    environment:
      - SERVICE_NAME=patient
      - PORT=8003
    volumes:
      - ./services/patient-service.js:/app/service.js
      - ./schemas/patient-schema.js:/app/schema.js
      - ./resolvers/patient-resolvers.js:/app/resolvers.js
    networks:
      - apollo-network

networks:
  apollo-network:
    driver: bridge
      - ./resolvers:/usr/src/app/resolvers
      - ./services:/usr/src/app/services

networks:
  apollo-network:
    driver: bridge
